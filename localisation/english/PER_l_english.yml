 PER_Iran.2.t: "Shah's Bold Directive: Persia to Be Called Iran"
 PER_Iran.2.d: "[from.GetNewsIcon]In a declaration that has sent ripples through both domestic and foreign circles, His Majesty [PER.GetLeader] has proclaimed that the country hitherto known as Persia shall henceforth be known internationally as \"Iran.\" The announcement, delivered in a formal communiqué to foreign legations, emphasizes the ancient, indigenous designation of the land as Īrān, harkening to its Aryan heritage and centuries of uninterrupted civilization.\n\nThe Shah's directive coincides with an ambitious program of modernization. Roads, railways, and schools are springing up across the plateau, while the central government continues to assert greater control over commerce, education, and the administration of justice. Officials stress that the renaming is no mere affectation, but a symbol of national sovereignty and a statement of Iran's determination to shape its own destiny, free from the shadows of foreign domination.\n\nThe reception of the proclamation is varied. Tehran newspapers lavish praise on the move, declaring it a triumph of patriotism and a long-overdue assertion of identity. Abroad, diplomats report that while some governments have already adopted \"Iran\" in official correspondence, others, particularly in Europe and North America, hesitate, clinging to the familiar term \"Persia\" as they await further guidance."
 PER_Iran.2.A: "Long live Iran!"
 PER_Iran.2.B: "We must respect their decision."

 PER_Flavour.1.t: "The Iranian Famine"
 PER_Flavour.1.d: "[PER.GetNewsIcon]Iran, which is currently under Allied occupation, has been struck by a major famine.\n\nSince the occupation, both the British and the Soviets have sought to expand their influence in their respective zones. They subsequently took control of a large number of privately owned vehicles and railways, but without the importation of spare parts, supply systems swiftly broke down. Famine initially devastated the British side following a poor harvest. The British-promised grain never arrived, and after turning to the Americas for assistance, diplomat Louis G. Dreyfus urged that America should support "the British stand and insist on Iran assisting itself before relying on Allied imports." Officially, the British blamed the famine on hoarding, ineffective distribution, and an insufficient transportation system, but whispers in Washington claim the famine was purposefully caused. The Soviets haven't helped much either, restricting northern food imports and blaming the British for the famine. \n\nFollowing reports of mounting starvation deaths, the United States dispatched Lieutenant-General Patrick J. Hurley to examine the famine. The famine is now seen as entirely avoidable and largely caused by low shipments."
 PER_Flavour.1.A: "Our help wasn’t enough?"
 PER_Flavour.1.B: "How is this our fault? The Iranians are the ones hoarding!"
 PER_Flavour.1.C: "A disaster that should have been avoided."