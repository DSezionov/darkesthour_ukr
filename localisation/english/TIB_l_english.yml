### Dalai Lama
 TIB_Dalai_Lama.1.t: "Death of the 13th Dalai Lama"
 TIB_Dalai_Lama.1.d: "Today, the people of Tibet mourn the passing of His Holiness Thubten Gyatso, the 13th Dalai Lama, who has departed this world at the age of seventy-three. Revered for his wisdom, courage, and dedication to the spiritual and temporal welfare of Tibet, the late Dalai Lama guided the nation through turbulent times, including invasions and political upheavals at the turn of the century.\n\nWith his passing, the process to identify his reincarnation has begun, as per centuries-old tradition. The search will take the most auspicious signs, visions, and omens into account, as lamas and senior monks of the High Lhasa Clergy consult the sacred oracles and sacred objects of the Ganden Phodrang government. The nation waits in solemn anticipation, hoping that the next incarnation of Avalokiteshvara, the 14th Dalai Lama, will continue the spiritual and temporal leadership of Tibet.\n\nIn the monasteries of Lhasa, prayers are offered day and night for the late Dalai Lama's rebirth and for the protection of the nation in these uncertain times."
 TIB_Dalai_Lama.1.A: "Tibet mourns."

 TIB_Dalai_Lama.2.t: "Enthronement of the 14th Dalai Lama"
 TIB_Dalai_Lama.2.d: "After a careful and auspicious search guided by high lamas, young Tenzin Gyatso has been identified as the 14th Dalai Lama. Today, in the sacred Potala Palace, the enthronement ceremony was held with great pomp and devotion. The young boy, only four years of age, was officially recognized as the reincarnation of Avalokiteshvara, bringing joy and relief to Tibet's monks, nobles, and people alike.\n\nThe ceremony was attended by senior lamas, government ministers, and delegates from monasteries across Tibet, who offered prayers, ceremonial offerings, and symbolic gifts. His Holiness was seated upon the Lion Throne, signifying his dual role as both spiritual guide and temporal ruler of Tibet. While too young to exercise full political authority, he will be tutored in the doctrines of governance and Buddhist philosophy under the careful guidance of a regent until he reaches maturity.\n\nThe enthronement renews hope for continuity, spiritual guidance, and national unity at a time when Tibet seeks to maintain its independence amidst a changing world."
 TIB_Dalai_Lama.2.A: "A grand day for the history books!"

 TIB_Dalai_Lama.3.t: "Enthronement of the 14th Dalai Lama"
 TIB_Dalai_Lama.3.d: "[FROM.GetNewsIcon]Lhasa, Tibet - In a ceremony of profound religious and cultural significance, young Tenzin Gyatso has been enthroned as the 14th Dalai Lama of Tibet. The boy, only four years old, has been officially recognized as the reincarnation of the late Thubten Gyatso, the 13th Dalai Lama, whose passing in December 1933 left Tibet in a period of mourning and uncertainty.\n\nThe enthronement took place at the historic Potala Palace, the seat of Tibetan governance and the spiritual heart of the nation, with senior lamas performing sacred rites that have been observed for centuries. Delegates from monasteries across the Himalayan plateau participated in prayers, offerings, and ceremonial processions. The young Dalai Lama was seated on the Lion Throne, symbolizing both his spiritual authority and his future role as the temporal leader of Tibet.\n\nObservers note that while the Dalai Lama is too young to govern directly, his recognition ensures the continuation of the Ganden Phodrang government and the preservation of Tibetan religious and political traditions. International reaction has been one of respectful attention, as Tibet continues to maintain its unique position in the high Himalayas, between powerful neighbors China and British India."
 TIB_Dalai_Lama.3.A: "Wonderful!"
