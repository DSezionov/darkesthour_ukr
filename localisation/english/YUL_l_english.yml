## Events
######################################################################
 YUL.1.t: "A Fateful Mishap"
 YUL.1.d: "Today our Clique was struck by an unforeseen tragedy. Our revered leader, General Jing Yuexiu, known affectionately as the Yulin King, met an untimely end when his pistol accidentally discharged at his residence. His sudden death has left us in shock and uncertainty, with a void in leadership that must be filled.\nAmidst the turmoil, Jing's deputy, Gao Shuangcheng, has stepped forward to assume command."
 YUL.1.A: "Farewell!"