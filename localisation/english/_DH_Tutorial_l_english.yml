 # Scripted Localisation:
 dh_tutorial_window_start_small_title_1: "Changes to the Topbar (1)"
 dh_tutorial_window_start_text_1: "Welcome to the tutorial of the §RDarkest Hour§! mod. \n\nLet's begin the tutorial by talking about the changes to the topbar. \nThe topbar now groups the following values on the left: \n     - §YPolitical Power§! \n     - §YMoney§! \n     - §YStability§! \n     - §YWar Support§! \n     - §YFactories§! \n     - §YManpower§! \n     - §YCommandpower§! \n\nBelow this, the §YTab Buttons§! are located. \n\n\n£dh_tutorial_topbar_left"
 dh_tutorial_window_start_small_title_2: "Changes to the Topbar (2)"
 dh_tutorial_window_start_text_2: "The following values are now located in the center: \n     - §YArmy Experience§! \n     - §YNavy Experience§! \n     - §YAir Experience§! \n\nAnd to the right you can find the following values: \n     - §YFuel§! \n     - §YLogistics Fulfillment§! \n     - §YConvoys§! \n\nBelow this, the §YAlerts§! are located as well as the button to open §YNarratives§! (a feature coming in a future update). \n\n\n£dh_tutorial_topbar_right"
 dh_tutorial_window_start_small_title_3: "Political Tab Changes"
 dh_tutorial_window_start_text_3: "Individual tabs have also been changed. \nThe §YPolitics Tab§! can be accessed by clicking on your country's flag in the top left corner. \n\n\n£dh_tutorial_politics_tab_button \n\n\n\nThere you can find the usual information as in vanilla, the button to access your focus tree and the options to change laws, policies and your Cabinet and Military Staff. \n\nNew additions are buttons to manage your §YEconomy§! as well as your §YSubjects§!. \n\nOpening the §YPolitics Tab§! will give you another tutorial window with more detailed information on those two new mechanics."
 dh_tutorial_window_start_small_title_4: "Mechanics in Decisions"
 dh_tutorial_window_start_text_4: "There are two mechanics that have their own decision categories with unique interfaces displayed under the category title: \n     - §YParliament§! \n     - §YFactions of Interest§! \nThe decisions tab can be accessed by clicking the button with the brief case on it. \n\n£dh_tutorial_decisions_tab_button \n\n\nOpening it will give you a more indepth tutorial about those two mechanics. \n\nHowever, not every country has a parliament or factions. \nIn order to be able to take a look at the decision categories next to the tutorial, you may want to play a country that has access to a parliament (for example @ENG §YUnited Kingdom§!, @FRA §YFrance§!, @USA §YUnited States§! or @GER §YGermany§!) or factions (for example @JAP §YJapan§!, @ITA §YItaly§! or @GER §YGermany§! (however not right at start))."
 dh_tutorial_window_start_small_title_5_dlc: "Intelligence Agency Tab Changes"
 dh_tutorial_window_start_small_title_5: "Diplomacy Tab Changes"
 dh_tutorial_window_start_text_5_dlc: "For the new mechanic of the §YWar Room§! (more on that on page 7), a new intel mechanic was added. \n\nThis can be viewed in the §YIntelligence Agency Tab§!, which can be accessed by clicking on the button with the eye on it. \n\n\n£dh_tutorial_agency_tab_button \n\n\n\nOpening the §YIntelligence Agency Tab§! will give you another tutorial window with more detailed information on this new mechanic."
 dh_tutorial_window_start_text_5: "For the new mechanic of the §YWar Room§! (more on that on page 7), a new intel mechanic was added. \n\nThis can be viewed in the §YDiplomacy Tab§! (when the country list and not a specific country is selected), which can be accessed by clicking on the button with the shaking hands on it. \n\n\n£dh_tutorial_diplomacy_tab_button \n\n\n\nOpening the §YDiplomacy Tab§! will give you another tutorial window with more detailed information on this new mechanic."
 dh_tutorial_window_start_small_title_6: "Recruit & Deploy Tab Changes"
 dh_tutorial_window_start_text_6: "There is a new mechanic called §YReserves & Militias System§!. \n\nThis can be viewed in the §YRecruit & Deploy Tab§!, which can be accessed by clicking on the button with the tank on it. \n\n\n£dh_tutorial_recruit_and_deploy_tab_button \n\n\n\nOpening the §YRecruit & Deploy Tab§! will give you another tutorial window with more detailed information on this new mechanic."
 dh_tutorial_window_start_small_title_7: "New Tab Button"
 dh_tutorial_window_start_text_7: "Besides changing some of the individual tabs, a whole new one has been added as well. The §YWar Room Tab§!. It can be accessed by the button with the map and compasses on it. \n\n£dh_tutorial_war_room_tab_button \n\n\nThe §YWar Room Tab§! allows you to plan and launch unique military operations during the game. \nCurrently, only a few countries have such operations (for example @GER §YGermany§!, @SOV §YSoviet Union§!, @ENG §YUnited Kingdom§! and @USA §YUnited States§!). \n\nOpening the §YWar Room Tab§! will give you another tutorial window with more detailed information on the new mechanic. \n\nSince the §YWar Room Tab§! can only be accessed, if any operations can be obtained during the game, to view this indepth tutorial, you have to play as a nation that has access to any operation."
 dh_tutorial_window_start_small_title_8: "Combat Message Log (1)"
 dh_tutorial_window_start_text_8: "The §YCombat Message Log§! can be found directly below the date controls. \n\n\n\n\n\n\n\n\n£dh_tutorial_message_log"
 dh_tutorial_window_start_small_title_9: "Combat Message Log (2)"
 dh_tutorial_window_start_text_9: "This notification window helps you stay informed about territorial changes during the war. It automatically tracks and displays updates such as when you gain or lose states, when your allies lose territory, or when you face a naval invasion or paradrop. \n\nEach type of event can be toggled on or off using the buttons at the top of the window. \n\nFor example, you can choose to only monitor your own frontlines, or stay fully informed by enabling all categories. \n\nThese notifications are designed to give you a quick overview of frontline changes without having to look at the entire frontline, letting you react faster and maintain control."


 dh_tutorial_window_politics_tab_small_title_1: "Manage Economy"
 dh_tutorial_window_politics_tab_text_1: "The §RDarkest Hour§! mod has added another resource that is used by a lot of things in the game: £money_icon §YMoney§!. \n\nThe highlighted button to the left allows you to open a new window, which let's you view and manage your current income and expenses as well as loans and inflation."
 dh_tutorial_window_politics_tab_small_title_2: "Manage Subjects"
 dh_tutorial_window_politics_tab_text_2_subject: "The interactions with subjects have been greatly modified and expanded upon. \nThe simple vanilla subject overview has been replaced by an indepth mechanic to interac, where you can interact with and take actions on each of your subjects individually. \nSince you currently are a subject yourself, you cannot view it at the moment."
 dh_tutorial_window_politics_tab_text_2: "The interactions with subjects have been greatly modified and expanded upon. \n\nThe simple vanilla subject overview has been replaced by an indepth mechanic. The highlighted button to the left allows you to open a new window, where you can interact with and take actions on each of your subjects individually."

 dh_tutorial_window_subject_manager_small_title_1: "Overview"
 dh_tutorial_window_subject_manager_text_1: "At the top you can see §Y4§! tabs that can be selected. Without a subject selected, you can view all currently active actions as well as which subjects they are active for in the respective categories. \n\n\n\n\n\n\n\n£dh_tutorial_subject_manager_top_overlord"
 dh_tutorial_window_subject_manager_small_title_2: "Subject List"
 dh_tutorial_window_subject_manager_text_2: "Below you can find a scrollable list of all your subjects with their flag, name and autonomy level. \n\nThe different autonomy levels use different background colors to help identifying them even with unique subject names: §BLowest Autonomy Level§!, §gMedium Autonomy Level§! and §YHighest Autonomy Level§!. \n\n\n\n\n£dh_tutorial_subject_manager_bottom \n\n\n\n\n\nReducing the autonomy level below the lowest level will annex the subject, increasing it above the highest level will make the subject free."
 dh_tutorial_window_subject_manager_small_title_3: "Interacting with Subjects"
 dh_tutorial_window_subject_manager_text_3: "In the list you can simply click on a subject's name to select it. Doing so will replace the overview at the top with the overview for the selected subject and the individual actions in the categories. Here you can also increase or decrease the subject's autonomy level, if possible. \n\n\n\n\n\n\n\n£dh_tutorial_subject_manager_top_subject"
 dh_tutorial_window_subject_manager_small_title_4: "Types of Actions"
 dh_tutorial_window_subject_manager_text_4: "Some actions work similar to decision, you click the button and an instant and possibly a delayed effect after some time is granted. Those usually have a duration and a cooldown. \n£dh_tutorial_subject_manager_select_action \n\n\nOther actions work as a toggle, where you can turn them on or off. \n£dh_tutorial_subject_manager_toggle_action \n\n\nSome actions also require to specify a target before they can be used. This makes the subject do the specified action against the selected target. \n£dh_tutorial_subject_manager_toggle_action_with_target"

 dh_tutorial_window_economy_small_title_1: "Income & Expenses"
 dh_tutorial_window_economy_text_1: "The §YEconomy Tab§! is divided into two parts: §GIncome§! and §RExpenses§!. \n\n§YIncome§! comes from taxes, consumer goods and unused civilian factories. The more consumer goods, the higher your monetary income. \n\n§YExpenses§! include regular government spending (social, research, and military) as well as the cost of maintaining active military factories. \n\nBy using the slider buttons below them, certain types of income and expenses can be adjusted to increase or decrease their impact on money gain or loss as well as other aspects affecting your country. \n\nMoney is gained or lost on a weekly basis. Excess money can be spend on various actions, for example decisions. \n\nYou should strive for a positive balance, however a negative balance is not too much of an issue as long as you still have a reserve of money. \nThe current amount of money you have you can see in the topbar. \n\n\n£dh_tutorial_topbar_left"
 dh_tutorial_window_economy_small_title_2: "Loans & Inflation"
 dh_tutorial_window_economy_text_2: "§YLoans§! \nIf you do however reach a negative amount of money, you will automatically take as many loans as needed to get back to a positive amount. You can also take loans manually, if you need money. \n\nBut note that each loan increases your inflation. \nAlso keep in mind that loans are not free money! You have to repay them and until you have fully repaid a loan, you will also have to pay weekly interests. \n\nWhile repaying a loan gets rid of the associated interest payment, you will not lose the inflation that you gained from taking the loan! \n\n§YInflation§! \nInflation increases your costs: for example, decisions and focuses that require money will become more expensive as inflation rises. \n\nInflation can be reduced by the use of specific decisions. However they come at a cost."

 dh_tutorial_window_decisions_tab_small_title_1: "Mechanic: Parliament (1)"
 dh_tutorial_window_decisions_tab_text_1: "If your country has a §Yparliament§!, it can be found inside its own §Ydecision category§!. \n\n\n\n\n\n\n\n£dh_tutorial_parliament"
 dh_tutorial_window_decisions_tab_small_title_2: "Mechanic: Parliament (2)"
 dh_tutorial_window_decisions_tab_text_2: "Here you can see the current amount of seats each party holds and how much they support the current government. \n\nThese values decide how much §Ytotal support§! the current government holds within the parliament. \n\nDecisions in this category may require a very high total support in order to be passed, usually requiring at least §Y50.0%§!. However this threshold can be even higher, such as §Y66.0%§!. \n\nWhile the popularity of ideologies and parties can change constantly, the amount of seats a party has can only be affected by an election."
 dh_tutorial_window_decisions_tab_small_title_3: "Mechanic: Factions (1)"
 dh_tutorial_window_decisions_tab_text_3: "If your country has §YFactions of Interest§!, they can be found in their own §Ydecision category§!. \n\n\n\n\n\n\n\n\n£dh_tutorial_factions"
 dh_tutorial_window_decisions_tab_small_title_4: "Mechanic: Factions (2)"
 dh_tutorial_window_decisions_tab_text_4: "Each faction has an §Yopinion§! and an §Yinfluence§! value. \n\n§YOpinion§! describes the general opinion and support of that faction towards the government. \nThe opinion value ranges from §Y0.0%§! to §Y100.0%§! for each faction individually. \n\n§YInfluence§! describes the general influence the faction has on the government. \nThe influence value ranges from §Y0.0%§! to §Y100.0%§! for all factions combined, meaning the total sum of all factions' influences is §Y100.0%§!. \n\nThe combination of opinion and influence decides what modifiers you gain from the faction. These may include bonuses and maluses. \nThe higher the opinion is, the more likely the modifiers will be bonuses. \nThe higher the influence is, the stronger the modifiers will be."

 dh_tutorial_window_agency_tab_small_title_1: "War Room Intel (1)"
 dh_tutorial_window_agency_tab_text_1: "Other countries may plan §YWar Room Operations§!. \n\nIn order to gain intel you need to send operatives on operations. There are §Y2§! operations: one to gain intel about which War Room Operations the target is planning and one to gain intel about a specific War Room Operation, once you have discovered it is being worked on. \n\n\n\n\n£dh_tutorial_agency_operations \n\n\n\n\n\nTo get access to these, you need to establish the §YWar Room Department§! under the §YAgency Branch Upgrades§!."
 dh_tutorial_window_agency_tab_small_title_2: "War Room Intel (2)"
 dh_tutorial_window_agency_tab_text_2: "Clicking the highlighted button on the left will open an overview of all the War Room Operations you have gained intel on. Intel you have not yet gained from an operation that you have discovered is marked with a '?'. \n\n\n\n\n£dh_tutorial_war_room_intel"

 dh_tutorial_window_diplomacy_tab_small_title_1: "War Room Intel (1)"
 dh_tutorial_window_diplomacy_tab_text_1: "Other countries may plan §YWar Room Operations§!. \n\nIn order to gain intel you need to use diplomatic actions. There are §Y2§! diplomatic actions available: One to gain intel about which War Room Operations the target is planning and one to gain intel about a specific War Room Operation, once you have discovered it is being worked on. \n\n£dh_tutorial_spy_diplomatic_actions"
 dh_tutorial_window_diplomacy_tab_small_title_2: "War Room Intel (2)"
 dh_tutorial_window_diplomacy_tab_text_2: "Once you have gained intel on a country's War Room Operations, it is saved so you can view it later. \n\nTo view all the intel you currently have on other countries' War Room Operations, click on the highlighted button in the bottom left corner to go to the complete country list, instead of viewing a specific country's diplomacy tab."
 dh_tutorial_window_diplomacy_tab_small_title_3: "War Room Intel (3)"
 dh_tutorial_window_diplomacy_tab_text_3: "Clicking the highlighted button on the left will open an overview of all the War Room Operations you have gained intel on. Intel you have not yet gained from an operation that you have discovered is marked with a '?'. \n\n\n\n£dh_tutorial_war_room_intel"

 dh_tutorial_window_war_room_tab_small_title_1: "Active Operations Counter"
 dh_tutorial_window_war_room_tab_text_1: "The §YWar Room Tab§! can be used to plan and launch specific military operations. \n\nThe interface is split into different sections. \nLet's start with the very top. \n\nNext to the title of the window, §YWar Room§!, you can find the amount of currently active War Room Operations. \n£dh_tutorial_war_room_tab_header \n\nThis number, if larger than §Y0§!, can also be found below the button to open the War Room Tab."
 dh_tutorial_window_war_room_tab_small_title_2: "National Spirits"
 dh_tutorial_window_war_room_tab_text_2: "Below that you can find the icon for the War Room, which might differ depending on your country and ruling ideology, as well as active spirits. Here you will see §Ynational spirits§! associated with the preparation of War Room Operations. \n\n\n\n£dh_tutorial_war_room_tab_top \n\n\n\n\n\nThey will not be displayed in the same place where regular national spirits are displayed, in order to not give easy hints to other countries on what you are currently planning."
 dh_tutorial_window_war_room_tab_small_title_3: "Planning Board"
 dh_tutorial_window_war_room_tab_text_3: "Below that you can see the §YPlanning Board§!. \n\n\n\n£dh_tutorial_war_room_tab_middle \n\n\n\n\nHere you can see all the War Room Operations you can gain access to during the playthrough. As long as the operations are not active, they are shown as classified. Once they become active, you are able to see their names and descriptions. \n\nWar Room Operations can become active through different ways. For example, national focuses and events are ways through which War Room Operations may become active."
 dh_tutorial_window_war_room_tab_small_title_4: "Shared Operations"
 dh_tutorial_window_war_room_tab_text_4: "Some War Room Operations might be shared with other countries. This means multiple countries have access to the option to activate the operation. However only one country can actually do that. \n\n\n£dh_tutorial_war_room_tab_shared_operation \n\n\n\nIn the example shown, this means in theory either the @USA §YUnited States§! or the @ENG §YUnited Kingdom§! can activate and plan the operation, but not both."
 dh_tutorial_window_war_room_tab_small_title_5: "Active Operations"
 dh_tutorial_window_war_room_tab_text_5: "At the bottom in the interface there is the part of the window where all the active operations are displayed. \n\n\n\n\n\n\n£dh_tutorial_war_room_tab_bottom \n\n\n\n\n\n\n\nMore details about the part for the individual operations can be found in the next tutorial."

 dh_tutorial_window_war_room_tab_operation_small_title_1: "Overview"
 dh_tutorial_window_war_room_tab_operation_text_1: "When a War Room Operation is active, you will see an entry for the operation in the War Room Tab. \n\nAt the top you can see the full name of the operation, which consists of a prefix (e.g. Operation) and the name (e.g. Groza). Below that you can see the picture of the operation. \nBelow the picture you can find the assigned generals for the operation as well as two tabs, one for the description and one for the decisions. \n\n\n\n\n\n£dh_tutorial_war_room_tab_operation_overview"
 dh_tutorial_window_war_room_tab_operation_small_title_2: "Assigning Generals (1)"
 dh_tutorial_window_war_room_tab_operation_text_2: "You can assign up to §Y4§! generals to a War Room Operation. \n\nGenerals are "used" by decisions. \nFor example if a decision requires §Y1§! general, this will use §Y1§! of the assigned generals, which cannot be used by any other decision until this decision is completed. \nDue to decisions requiring different amounts of generals, you have to decide, which decisions you want to prioritize over others. \n\nYou can assign a general to an operation by clicking the '+' button next to the assigned generals. \n\n\n£dh_tutorial_war_room_tab_operation_assigned_generals"
 dh_tutorial_window_war_room_tab_operation_small_title_3: "Assigning Generals (2)"
 dh_tutorial_window_war_room_tab_operation_text_3: "This opens a new window where you can pick the general you want to assign. \n\n\n\n\n£dh_tutorial_war_room_tab_operation_assign_generals_tab \n\n\n\n\nA general can only be assigned to §Y1§! War Room Operation at a time. Once the operation is launched, the general becomes available to be assigned to another operation. \n\nWhile a general is assigned to an operation, they will suffer maluses to their combat effectiveness. \nDue to some decisions and operations granting bonuses to the assigned generals, you may want to assign specific generals to them."
 dh_tutorial_window_war_room_tab_operation_small_title_4: "Progress & Phases"
 dh_tutorial_window_war_room_tab_operation_text_4: "Each War Room Operation has a planning progress from §Y0.0%§! to §Y100.0%§!. Planning progress can be gained by assigning generals and completing decisions. The planning progress is further divided into different phases. \n\n\n£dh_tutorial_war_room_tab_operation_progress_bar \n\n\n\nThe §Y1st§! phase usually has a rather small threshold. You need to reach it in order to be able to launch the operation. \nAll further phases may be spread across the whole progress bar, with the last phase sitting at full progress. \nReaching one of these phases' thresholds will give you an additional bonus when launching the operation. \n\nIt is up to you, whether you want to prepare only as little as needed and launch quickly or whether you want to prepare longer and gain additional bonuses that might come in handy when the operation is under way."
 dh_tutorial_window_war_room_tab_operation_small_title_5: "Decisions"
 dh_tutorial_window_war_room_tab_operation_text_5: "Decisions for War Room Operations generally work the same as regular decisions: They often have a cost of £command_power §YCommand Power§! and require a specific amount of £war_room_general_text_icon §YGenerals§!. \n\n£dh_tutorial_war_room_tab_operation_decision \n\n\nThey can also have additional requirements you need to fulfill before you can enact them. \nOnce enacted, most decisions will take a specific amount of time to complete. When a decision is completed, it will give you certain effects. \n\nCompleted decisions are moved to the bottom of the list. Active decisions are moved to the top of the list and you can check their remaining duration in the actual decisions tab. \n\n£dh_tutorial_war_room_tab_operation_decision_active_decision_tab"
 dh_tutorial_window_war_room_tab_operation_small_title_6: "Launch & End Results"
 dh_tutorial_window_war_room_tab_operation_text_6: "§YLaunch§! \nEvery operation has a launch decision. After enacting it, you will no longer be able to do any preparation decisions of the operation anymore and the launch effect is executed. \n\n§YEnd Results§! \nAfter an operation has been launched, it can end in one of two outcomes: §Gcompletion§! or §Rfailure§!. Both cases have different conditions and different effects, which can be viewed at the bottom of the operation entry. \n£dh_tutorial_war_room_tab_operation_conditions_and_effects \n\nOnce either of the conditions are met, the operation will complete or fail very quickly afterwards. While there often is no specific requirement to achieve your goals in a specific time frame, keep in mind that the longer the enemy has time to fight back, the harder it will be to complete the objective. \nAfter completing or failing an operation, the outcome will be marked in the §YPlanning Board§! and the operation will be removed from the list of active operations."

 dh_tutorial_window_recruit_and_deploy_tab_small_title_1: "Reserves & Militias (1)"
 dh_tutorial_window_recruit_and_deploy_tab_text_1: "The §YReserves & Militias System§! is located under the §YAdditional Units§! section at the top of the tab. \n\n\n\n\n£dh_tutorial_recruit_and_deploy_tab_reserves_and_militias \n\n\n\n\n\nIt lets you deploy, disband and expand historical reserve formations right from the deployment tab. These units serve as emergency mobilisation forces, ranging from territorial armies to civilian militias, providing countries with additional manpower and equipment during times of war."
 dh_tutorial_window_recruit_and_deploy_tab_small_title_2: "Reserves & Militias (2)"
 dh_tutorial_window_recruit_and_deploy_tab_text_2: "Each formation has unique requirements and drawbacks. Some reserves are available from the start, while others must be obtained through focuses, decisions, or events. When deployed, they possess unique penalties that reflect their historical limitations, and some of these disadvantages will only be resolved once the war is over. Others have short-term effects that end after deployment. \n\n\nDespite having lower quality than regular divisions, these formations provide valuable strategic flexibility. They can be quickly mobilised, returned to the pool when no longer required, and in many cases upgraded through focuses or events."

