 MCO_SBM: "Société des Bains de Mer de Monaco"
 MCO_SBM_desc: "The Société des Bains de Mer (SBM) operates Monaco's main casinos, luxury hotels, and entertainment venues, such as the prominent Casino de Monte-Carlo. It is majority-owned by the state and serves as a primary source of national income through tourism and gambling. The company attracts large amounts of foreign currency and supports infrastructure development, but its economy is heavily reliant on international visitors and high-end clientele."