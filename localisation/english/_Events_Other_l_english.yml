## Colored Puppets
##############################################  
 Colored_Puppet.1.t: "Colored Puppets"
 Colored_Puppet.1.d: "Do you want colored puppets on or off?"
 Colored_Puppet.1.A: "Turn colored puppets on."
 Colored_Puppet.1.B: "Turn colored puppets off."
 Colored_Puppet.2.t: "A Puppet of a foreign power"
 Colored_Puppet.2.d: "We have sadly became a puppet of a foreign power, and they are enforcing their color upon us."
 Colored_Puppet.2.A: "Damn!"
 Colored_Puppet.3.t: "Free from our oppresors!"
 Colored_Puppet.3.d: "We have gain our freedom our oppresors, and therfore we may adopt our own color again."
 Colored_Puppet.3.A: "FREEDOM!"

