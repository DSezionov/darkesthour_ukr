decisions.3.t: "Suez Canal Blown"
decisions.3.desc_eng: "[FROM.GetNewsIcon]In response to hostile forces closing in on the Suez Canal, and risking losing the vital commerce artery to the enemy, [From.GetNameDef] has instead chosen to blown the canal to ensure its use is denied to them. Through a combination of blockships, demolitions, and mining, the destruction is quite complete, and will likely take months of extensive industrial effort to repair."
decisions.3.desc_not_eng: "[FROM.GetNewsIcon]In what can only be described as a daring and brilliant military operation, [From.GetNameDef] has succeeded in severing the vital commerce artery that is the Suez Canal. Through a combination of blockships, demolitions, and mining, the destruction is quite complete, and will likely take months of extensive industrial effort to repair."
decisions.3.a: "A calamity!"
decisions.3.b: "We could not let the enemy use it."
decisions.3.c: "We shall not underestimate their resolve again."
decisions.3.d: "We have cut the cord with their Empire!"
decisions.3.e: "A magnificent blow against the British!"
decisions.3.f: "They made the right call."
decisions.3.g: "A great blow against our ally..."
decisions.3.h: "This will impact the entire world..."

decisions.4.t: "Panama Canal Blown"
decisions.4.desc_usa: "[FROM.GetNewsIcon]In response to their inability to defend the Panama Canal, and risking losing the vital military communications artery to the enemy, [From.GetNameDef] has instead chosen to blown the canal to ensure its use is denied to them. Through a combination of blockships, demolitions, and mining, the destruction is quite complete, and will likely take months of extensive industrial effort to repair."
decisions.4.desc_not_usa: "[FROM.GetNewsIcon]In what can only be described as a daring and brilliant military operation, [From.GetNameDef] has succeeded in severing the vital military communications artery that is the Panama Canal. Through a combination of blockships, demolitions, and mining, the destruction is quite complete, and will likely take months of extensive industrial effort to repair."
decisions.4.a: "A calamity!"
decisions.4.b: "We could not let the enemy use it."
decisions.4.c: "We shall not underestimate their resolve again."
decisions.4.d: "Their navy is cut off on the far side!"
decisions.4.e: "A magnificent blow against the Americans!"
decisions.4.f: "They made the right call."
decisions.4.g: "A great blow against our ally..."
decisions.4.h: "Pacific and Atlantic are divided once again."

decisions.5.t: "Suez Canal Repaired"
decisions.5.desc: "[FROM.GetNewsIcon]With a tremendous industrial effort [From.GetNameDef] has managed to repair the Suez Canal. This morning saw the re-opening of the vital commerce artery into the Mediterranean, after over half a year of intensive repair work."
decisions.5.a: "We have restored the link to our Empire."
decisions.5.b: "A necessary investment for our nation."
decisions.5.c: "This will aid our efforts greatly."
decisions.5.d: "They have undone the setback..."
decisions.5.e: "The effects will be felt by all."

decisions.6.t: "Panama Canal Repaired"
decisions.6.desc: "[FROM.GetNewsIcon]With a tremendous industrial effort [From.GetNameDef] has managed to repair the Panama Canal. This morning saw the re-opening of the vital military link between the Atlantic and the Pacific, after over a year of intensive repair work."
decisions.6.a: "We have restored the vital link between our oceans."
decisions.6.b: "We may once again move from Pacific to Atlantic."
decisions.6.c: "This will aid our efforts greatly."
decisions.6.d: "They have undone the setback..."
decisions.6.e: "The effects will be felt by all."
