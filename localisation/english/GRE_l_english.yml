 GRE_National_Schism: "National Schism"
 GRE_National_Schism_desc: "Beginning in the 1910s, Greece experienced an internal policy breakdown between Prime Minister Eleftherios Venizelos and then-King Constantine I. Venizelos and his faction, the Venizelists, believed that Greece should join the Great War on the side of the Entente, whereas the King and his Royalists preferred neutrality with Central Power favouritism. As the war progressed, the two men's disagreements became so heated that they launched clandestine operations against the other's supporters, waging a covert civil war against one another.\n\nAfter the fighting slowed the Venelists emerged victorious, albeit with many more casualties than the Royalists. The King was exiled, and his son succeeded him, but Greece's troubles did not end there. In the decades since, a deep divide has emerged in Greek society between the still-dominant Venizelists and the Royalists' descendants, the Anti-Venizelists. This National Schism has resulted in widespread civic unrest and crime."

 GRE_Memories_of_1923: "Memories of 1923"
 GRE_Memories_of_1923_desc: "During the Greco-Turkish War of 1919-1922, which the Greek government started in order to seize territories in Western Anatolia promised to them by the Entente, the rising force of the Turkish National Movement won a landslide victory. The lands that were originally destined to be Greek after the Ottoman Empire fell were instead incorporated into the new Turkish state, and more than 1.5 million people were forcibly relocated from Turkey to Greece or vice versa under the Lausanne Convention.\n\nThe complete annihilation of the army, on the other hand, may have had the longest-lasting impact on Greece. More than 50,000 men were killed or injured as a result of the war or its conditions, while a quarter million Greek civilians were killed. This lingering destruction is still felt over a decade later, as the Greek Army struggles to organise effectively, partly due to fear of another annihilation."