###### Engineers
 tech_engineers: "Інженерна рота"
 tech_assault_weapons_1: "Координація атак"
 tech_assault_weapons_1_desc: "Роль інженерних підрозділів виходить за межі будівництва укріплень та підриву споруд і включає тісну співпрацю з передовою піхотою та бронетехнікою. Інтегруючись із штурмовими формуваннями, вони можуть забезпечувати оцінку ситуації на полі бою в режимі реального часу, розчищення перешкод та підтримку при прориві оборони. Їхня координація гарантує, що артилерійські залпи, наступ піхоти та прориви бронетехніки відбуваються вчасно."
 tech_assault_weapons_2: "Вогнемети"
 tech_assault_weapons_2_desc: "Відтоді, як люди вперше навчилися керувати вогнем, ми завжди вигадували нові способи вбивати ним, і сучасність не є винятком. Хоча зброя, що випльовує вогонь на ворога, існувала ще з часів Римської імперії, сучасні вогнемети набагато менш примітивні. Завдяки сучасним досягненням ми можемо використовувати силу полум’я, щоб підпалювати укріплення супротивника та викурювати ворогів, що знаходяться всередині. Не кажучи вже про небезпеку, яку вогонь може становити для самого ворога."
 tech_assault_weapons_3: "Імпровізовані бойові тактики"
 tech_assault_weapons_3_desc: "Наші війська мають бути дисциплінованими та слухатися своїх командирів, але ми також повинні навчити їх і дозволити робити те, що необхідно в даний момент для досягнення перемоги, особливо якщо вони не можуть отримати або передати накази. Часи, коли дві армії билися на рівних, минули; зараз настала епоха хаосу та імпровізації, яку наші війська повинні опанувати. Щоб перемогти, наші солдати повинні пристосовуватися до будь-якої ситуації та використовувати будь-які засоби чи зброю, що є в їхньому розпорядженні."
 tech_assault_weapons_4: "Підривна команда"
 tech_assault_weapons_4_desc: "Наші вороги на війні можуть битися хоробро; навіть якщо нам вдасться встояти й не дати їм прорватися на нашу територію, все одно залишиться питання про просування на їхню територію. У ході наступу ми, безсумнівно, зіткнемося з різноманітними укріпленнями та оборонними спорудами, призначеними для уповільнення нашого наступу. Щоб прорвати ці оборонні лінії, нам слід сформувати спеціалізовані команди, навчені таємно наближатися до будь-яких ворожих укріплень і підривати їх дощенту, забезпечуючи нашим військам вільний доступ."
 tech_assault_weapons_5: "Міношукачі"
 tech_assault_weapons_5_desc: "Занадто часто наші війська та техніка, не підозрюючи про це, потрапляли на приховане вороже мінне поле і за лічені секунди перетворювалися на червону хмару. Щоб ці хитрі пастки більше не вбивали наших бійців, нам доведеться використовувати міношукачі. Міношукачі — це портативні прилади з диском у нижній частині, які також використовуються для пошуку металів загалом. Їх проводять над землею, і вони подають сигнал користувачеві, коли виявляють міну, що дозволяє безпечно її знешкодити."
 tech_assault_weapons_6: "Портативні вогнемети"
 tech_assault_weapons_6_desc: "Нові досягнення в технології вогнеметів дозволили нам переглянути руйнівну силу цього пристрою та вдосконалити його до рівня, що перевищує попередні. Тепер ми можемо прикріпити паливний бак до спини солдата, що дає йому змогу пересуватися з вогнеметом у руках. Це вдосконалення забезпечує більшу ефективність та летальність, оскільки тепер ми можемо стріляти безпосередньо у ворогів, а не намагатися прицілюватися лише в їхньому загальному напрямку."
 tech_warforged_builders: "Військові будівельники"
 tech_warforged_builders_desc: "Інженерні підрозділи проходять спеціальну підготовку та отримують обладнання для швидкого будівництва в бойових умовах. Мостові команди, фахівці з польового укріплення та логістичні фахівці працюють разом, щоб швидко зводити опорні пункти, прокладати колії та зміцнювати інфраструктуру."
 tech_entrenchment_1: "Окопана війна"
 tech_entrenchment_1_desc: "Окоповальна війна — це бойова стратегія, за якої у землі викопують численні довгі ходи, достатньо низькі, щоб кілька солдатів могли пересуватися з місця на місце, не боячись потрапити під обстріл на полі бою. Ця стратегія широко застосовувалася під час Першої світової війни, даючи жорстокі, хоч і виснажливі, результати. Вона використовується переважно у тривалих війнах, метою яких є пережити ворога та зупинити будь-який наступ завдяки величезним розмірам оборонних споруд."
 tech_entrenchment_2: "ДОТи"
 tech_entrenchment_2_desc: "Стаціонарні оборонні споруди вбудовуються в передові та тилові позиції для забезпечення безперервної вогневої підтримки та контролю над ключовими ділянками місцевості. Дзоти будуються із залізобетону або утрамбованого ґрунту та деревини і розраховані на те, щоб витримувати вогонь стрілецької зброї та легкої артилерії. Ці укріплені укриття зазвичай оснащені кулеметами, протитанковими гвинтівками або легкими мінометами, що дозволяє інженерним ротам швидко закріпити оборонну лінію. Їхня наявність уповільнює просування ворога та покращує здатність піхоти утримувати ключові позиції."
 tech_entrenchment_3: "Зміцнені бункери"
 tech_entrenchment_3_desc: "Інженери споруджують укріплені бункери, здатні витримувати тривалий обстріл і прямі влучання з важкої зброї. Ці споруди, зведені з багатошарового бетону, сталевих опор та амортизуючих матеріалів, слугують командними пунктами, складами боєприпасів та захищеними укриттями для військ під інтенсивним вогнем. На відміну від менших польових укріплень, укріплені бункери є напівпостійними спорудами і вимагають ретельного планування та будівництва, але вони значно підвищують виживаність та оперативну стійкість у статичних або контрольованих районах."
 tech_entrenchment_4: "Блокхауси"
 tech_entrenchment_4_desc: "Блокхауси це компактні, але міцні оборонні споруди, збудовані переважно з бетону та сталі, призначені для розміщення невеликих піхотних підрозділів із перекриваючимися полями вогню. Їх легше споруджувати, ніж більш складні бункери, і вони зазвичай використовуються для убезпечення ключових ділянок місцевості, таких як перехрестя, мости або вершини пагорбів. Блокгаузи, оснащені стрілецькими щілинами та внутрішньою вентиляцією, забезпечують всебічний захист від піхотних атак та обмеженого артилерійського вогню."
 tech_entrenchment_5: "Їжаки"
 tech_entrenchment_5_desc: "«Їжак» — це стаціонарний протитанковий бар’єр, що складається зі сталевих балок або армованих матеріалів, розташованих у формі хреста. Він призначений для зупинки або відхилення танків та інших броньованих машин і не потребує технічного обслуговування чи персоналу. Ці перешкоди, які часто розставляють рядами поперек доріг, на відкритих полях або в міських вузьких місцях, прості у виготовленні, швидко встановлюються та надзвичайно ефективні для затримки просування ворога."
 tech_entrenchment_6: "Зуби Дракона"
 tech_entrenchment_6_desc: "Зуби дракона» — це набагато більше, ніж просто загрозлива назва; це нова протитанкова стратегія, яка, у разі застосування, може виявитися надзвичайно ефективною. Укладаючи візерунок із невеликих пірамідальних блоків із залізобетону, що нагадують великі зуби, ми можемо створити для танків і піхоти перешкоду, яку їм нелегко подолати, достатньо сповільнивши їх, щоб наші війська могли досить легко їх знищити. У поєднанні з іншими пастками вони можуть бути надзвичайно смертоносними."
 tech_amphibious_1: "Переправа через річку на плотах"
 tech_amphibious_1_desc: "Тимчасові плотові мости дають змогу інженерним підрозділам переправляти піхоту, легку техніку та постачання через річки та водні перешкоди, коли постійна інфраструктура недоступна. Ці переправи, зроблені з понтонів, деревини або надувних матеріалів, вимагають точної координації та постійної робочої сили. Незважаючи на вразливість до вогню противника та несприятливих погодних умов, вони дають змогу здійснювати швидкі тактичні маневри на місцевості, яка інакше була б непрохідною."
 tech_amphibious_2: "Транспортування вантажними суднами"
 tech_amphibious_2_desc: "Стандартизовані вантажні судна є основою військової логістики на великі відстані, транспортуючи важливі матеріали, транспортні засоби, боєприпаси та персонал через моря. Ці судна спроектовані з урахуванням місткості та автономності, а не швидкості, і курсують у конвоях під захистом військово-морського ескорту. Ефективне обладнання для обробки вантажів та модульні системи зберігання забезпечують швидше завантаження та розвантаження в портах, що робить їх важливою ланкою у підтримці операцій за кордоном та ліній постачання."
 tech_amphibious_3: "Пляжні плацдарми"
 tech_amphibious_3_desc: "Коли морські десантні сили висаджуються на берегах території, контрольованої ворогом, битва часто полягає не в протистоянні людей один проти одного, а в тому, хто зможе забезпечити кращу організацію та підкріплення. Ми отримаємо перевагу, якщо наші солдати створять тимчасову лінію фронту — або плацдарм — з якого вони зможуть оборонятися, доки не прибудуть належні підкріплення для просування вглиб ворожої території. У цьому контексті ми повинні зробити використання плацдармів загальноприйнятою стратегією під час будь-якого майбутнього вторгнення."
 tech_amphibious_4: "Понтонні мости"
 tech_amphibious_4_desc: "Системи плавучих мостів дають змогу швидко переправлятися через річки без потреби у постійній інфраструктурі. Ці мости, складені з з’єднаних між собою модульних понтонів, можуть витримувати вагу піхоти, легкої техніки, а в деяких випадках — і бронетанкових колон. Інженерні підрозділи розгортають їх, щоб зберегти імпульс під час наступу через водні перешкоди, і зазвичай їх використовують у поєднанні з тимчасовими дорогами та поромними системами."
 tech_amphibious_5: "Штурмові катери"
 tech_amphibious_5_desc: "Штурмові катери — це легкі, портативні й часто складані судна, призначені для переправи піхоти через річки або прибережні зони під час бойових операцій. Використовуються переважно під час початкових переправ, при цьому швидкість і ефект несподіванки для них важливіші за захист і місткість, що дозволяє військам закріпитися на березі до прибуття важчого мостового обладнання."
 tech_amphibious_6: "Амфібійні машини"
 tech_amphibious_6_desc: "Амфібійні машини, призначені для пересування як по суші, так і по воді, заповнюють прогалину між морськими десантними операціями та мобільністю вглиб суші. Ці машини, які зазвичай мають легке бронювання та оснащені гусеницями або колесами, можуть транспортувати війська, припаси або легку техніку з корабля на берег, а потім продовжувати діяти вже на суші. Їхня адаптивність робить їх незамінними під час прибережних штурмів, на болотистій місцевості та під час переправи через річки, зменшуючи залежність від постійної інфраструктури."
###### Recon
 tech_recon: "Розвідувальна рота"
 tech_recon2: "Техніки маскування"
 tech_recon2_desc: "Існує безліч способів, за допомогою яких наші солдати можуть залишатися непомітними для ворога і, таким чином, виживати. На жаль, багато наших солдатів або не готові до цього, або не знають про такі техніки маскування, і це помилка, яку необхідно негайно виправити. Ми зможемо втрачати менше солдатів і влаштовувати набагато ефективніші засідки, якщо проведемо дослідження нових технік, що дозволять нашим бійцям залишатися непомітними, а також роздамо їм посібники з використання цих нових методів."
 tech_recon3: "Моторизована розвідка"
 tech_recon3_desc: "Швидкі, легкоозброєні транспортні засоби надають розвідувальним підрозділам мобільність, необхідну для проникнення в тил ворога, розвідки флангів та швидкого реагування. Ці підрозділи, оснащені вантажівками, мотоциклами або легкими універсальними транспортними засобами, відмовляються від потужного бронювання на користь швидкості та дальності дії. Моторизована розвідка використовується для виявлення загроз, пошуку прогалин у обороні та передачі бойової розвідінформації в режимі реального часу. Вона покращує оперативну обізнаність та дозволяє швидше приймати тактичні рішення."
 tech_recon4: "Розвідувальні автомобілі"
 tech_recon4_desc: "Розвідувальні автомобілі, розроблені з урахуванням швидкості, маскування та легкої вогневої підтримки, є більш міцною та добре озброєною альтернативою неброньованим розвідувальним транспортним засобам. Ці броньовані машини патрулюють попереду основних сил, зондуючи позиції ворога та передаючи інформацію з поля бою. Їхні невеликі розміри, маневреність та часто встановлене легке озброєння або кулемети роблять їх ідеальними для глибоких патрулів, виявлення засідок та швидкого контакту з ворожими підрозділами без вступу у повномасштабний бій."
 tech_recon5: "Удосконалені методи стеження"
 tech_recon5_desc: "Удосконалені методи стеження дозволяють розвідувальним підрозділам відстежувати пересування ворога з безпечної відстані, залишаючись непоміченими. Розвідники можуть контролювати скупчення ворожих військ та логістику, не вступаючи в бій, завдяки дисциплінованим пересуванням, ефективному маскуванню та оптимальному використанню рельєфу місцевості, надаючи актуальну розвідувальну інформацію, яка допомагає формувати оперативні рішення."
 tech_recon6: "Спеціалізована розвідка"
 tech_recon6_desc: "Розвідувальні групи, навчені спеціалізованим методам розвідки, можуть виявляти та документувати ключові особливості місцевості, інфраструктури та оборонних позицій. Це включає оцінку стану доріг, визначення глибини річок, маркування мінних полів та виявлення природних вузьких місць."
 tech_recon7: "Підготовка до суворих умов"
 tech_recon7_desc: "Занадто багато наших солдатів були змушені покинути поле бою або загинули внаслідок екстремальних погодних умов через брак знань та підготовки до протистояння не лише ворогам, а й самій Матері-Природі. Будь то обмороження взимку, тепловий удар влітку, раптові повені під час сильних злив чи щось інше — занадто багато хороших людей гине від рук природи. Тому, щоб зменшити ці втрати, ми повинні вимагати від наших солдатів проходження підготовки в суворих умовах."
 tech_recon_in_force: "Розвідка боєм"
 tech_recon_in_force_desc: "Розвідка боєм передбачає відправлення підрозділу для навмисного вступу в бій з ворогом з метою збору розвідданих про його чисельність, позиції та боєготовність. На відміну від традиційної розвідки, мета полягає в тому, щоб спровокувати реакцію, змусивши ворога діяти та давши наступаючим силам можливість оцінити його можливості. Ця тактика надає корисну інформацію для масштабніших наступальних операцій та виявляє слабкі місця в обороні ворога."
 tech_recon_by_fire: "Розвідка вогнем"
 tech_recon_by_fire_desc: "Розвідка вогнем передбачає наведення вогню на ймовірні позиції ворога з метою викликати реакцію, яка викриє присутність та місцезнаходження ворога. Вона особливо корисна в місцевості з густою рослинністю або в умовах поганої видимості, коли візуальний контакт ускладнений. Хоча це несе ризик викриття позиції нападника, це все ж швидкий і агресивний спосіб підтвердити розстановку сил противника перед масштабним боєм."
 tech_shadow_operatives: "Таємні агенти"
 tech_shadow_operatives_desc: "Таємні агенти — це елітні розвідники, навчені мистецтву маскування, проникнення та збору розвідданих від людей. Вони збирають критично важливу інформацію з поля бою, діючи за лінією фронту або на окупованій території, використовуючи техніки маскування, перевдягання та спостереження. Цим агентам часто доручають виявляти командні структури ворога, відстежувати особливо важливі цілі та координувати дії з місцевими інформаторами — і все це, залишаючись непоміченими."
##### Military Police
 tech_military_police: "Військова поліція"
 tech_military_police2: "Військові суди"
 tech_military_police2_desc: "Військові суди — це судові органи, що перебувають у віданні збройних сил і задіюються під час війни або надзвичайного стану. Вони розглядають справи, пов’язані з порушеннями військового законодавства, саботажем, дезертирством та діями, що підривають військову дисципліну або оперативну безпеку. Вони часто застосовують прискорені процедури і покликані виносити швидкі та рішучі рішення для збереження контролю та забезпечення порядку в періоди, коли цивільні правові системи перевантажені або призупинені."
 tech_military_police3: "Інформатори"
 tech_military_police3_desc: "На окупованих територіях ми час від часу зустрічаємо людей, які цілком задоволені нашим правлінням і, в обмін на краще ставлення, пропонують інформувати нас про пересування сил опору, що борються проти нашої окупації. Ці інформатори можуть бути надзвичайно корисними для запобігання повстанням або затримання осіб, які таємно симпатизують опору, про що ми не знаємо. Ми повинні навчити нашу військову поліцію активніше приймати та використовувати інформаторів."
 tech_military_police4: "Часті патрулювання"
 tech_military_police4_desc: "Військова поліція проводить регулярні та добре помітні патрулювання з метою забезпечення дисципліни, безпеки та порядку як на передовій, так і в тилових районах. Ці патрулі слугують постійним нагадуванням про владу, стримуючи порушення дисципліни та виявляючи потенційні загрози чи порушення ще до їх ескалації."
 tech_military_police5: "Більш суворі покарання"
 tech_military_police5_desc: "Дисципліна забезпечується завдяки суворішим вирокам та меншій поблажливості до правопорушень. Військова поліція та командири уповноважені застосовувати суворі покарання за дезертирство, мародерство, непокору та невиконання наказів. Мета полягає в тому, щоб підтримувати згуртованість та порядок у воєнний час шляхом застосування суворих наслідків, які стримують навіть незначні правопорушення."
 tech_military_police6: "Військовий стан"
 tech_military_police6_desc: "Хоча це часто розглядається як тривожна й авторитарна практика, наша військова поліція повинна навчитися повністю й беззастережно контролювати територію, на яку її розгорнуто, навіть якщо це означає заміну місцевого цивільного правління власним шляхом оголошення військового стану. Хоча це, ймовірно, викличе обурення громадськості, для встановлення контролю над регіоном може знадобитися повна військова окупація та тимчасове обмеження свобод."
 tech_military_police7: "Операції проти партизан"
 tech_military_police7_desc: "Військові підрозділи реорганізуються та проходять підготовку для проведення операцій у тилу ворога, спрямованих конкретно проти ворожих нерегулярних формувань та диверсійних мереж. Основна увага приділяється розвідці, швидкому реагуванню та збиранню розвідувальної інформації в важкодоступній місцевості. Військова поліція, місцеві колабораціоністи та загони безпеки співпрацюють, щоб виявляти, ізолювати та ліквідувати партизанські елементи. Ці операції мають на меті забезпечити безпеку шляхів постачання, запобігти повстанням та відновити державну владу на спірних або окупованих територіях."
 tech_military_police8: "Охоронці порядку"
 tech_military_police8_desc: "Невелика група офіцерів військової поліції об’єднана в елітні підрозділи внутрішньої безпеки, завданням яких є підтримання порядку в нестабільних районах. Ці правоохоронці мають розширені повноваження, поєднуючи слідчі навички з парамілітарною підготовкою. Їхня присутність діє як засіб стримування, так і як сили швидкого реагування, здатні придушувати заворушення, забезпечувати дотримання комендантської години та захищати критичну інфраструктуру. Їх часто розгортають у районах підвищеного ризику, де традиційних військових або цивільних поліцейських сил недостатньо."
###### Signal Company
 tech_signal_company: "Рота зв’язку"
 tech_signal_company2: "Ранні засоби телефонного зв’язку"
 tech_signal_company2_desc: "У міру розвитку комунікаційних технологій протягом Першої світової війни можливості численних новостворених сигнальних підрозділів по всьому світу також покращувалися. Удосконалені засоби радіозв’язку та перші мотоцикли почали поступово витісняти старих поштових голубів, але найважливішим досягненням стало використання повноцінних телефонних ліній між підрозділами зв’язку. Це забезпечує нашим хлопцям життєво важливу безпеку, утримуючи наші найважливіші таємниці подалі від рук недоброзичливців."
 tech_signal_company3: "Захист інформації"
 tech_signal_company3_desc: "Щоб краще захистити секретну військову інформацію, війська зв’язку почали використовувати сучасні та передові шифрувальні машини для шифрування та дешифрування конфіденційних даних, що передаються між підрозділами зв’язку. Ці шифри зашифровані за допомогою кодів, які часто настільки досконалі, що єдиний спосіб їх розшифрувати — це отримати оригінальні кодові книги, які наші надійні війська зв’язку нізащо не дозволять потрапити до рук ворога."
 tech_signal_company4: "Радіозв’язок"
 tech_signal_company4_desc: "У міру розвитку радіо- та шифрувальних технологій у міжвоєнний період вони набули такого поширення, що стали стандартним засобом зв’язку між підрозділами. Наші війська більше не покладаються на застарілих поштових голубів, які доставляють рукописні повідомлення, що можуть загубитися або потрапити до рук ворога. Натомість вони використовують найсучасніші засоби радіозв’язку, що забезпечують набагато кращу координацію між різними підрозділами за значно коротший проміжок часу."
 tech_signal_company5: "Управління мережею"
 tech_signal_company5_desc: "Тепер, коли наші комунікаційні технології забезпечують майже миттєву координацію між різними підрозділами, виникла необхідність у створенні комунікаційних вузлів для управління величезним обсягом вихідних та вхідних повідомлень між підрозділами зв’язку. Ці мережеві вузли значно покращать злагодженість підрозділів, а також допоможуть у систематизації величезного потоку військової розвідінформації, що надходить від наших солдатів на передовій."
 tech_signal_company6: "Встановлення радіовеж"
 tech_signal_company6_desc: "Хоча для невеликої групи підрозділів, що зв’язуються на коротких відстанях, може вистачити портативного радіоприймача та одного-двох офіцерів зв’язку, більші формування, які намагаються підтримувати зв’язок на значно більших відстанях, потребуватимуть засобів вищого класу. Будівництво радіовеж поблизу штабів наших різних підрозділів зв’язку значно підвищить ефективність та зменшить навантаження на часто перевантажену мережу зв’язкуk."
 tech_signal_company7: "Команда «Ехо»"
 tech_signal_company7_desc: "Зв’язок на полі бою є одним із найважливіших аспектів сучасної війни, і досягнення в галузі технологій дозволили нам значно його вдосконалити. Наші солдати тепер можуть передавати інформацію швидше й чіткіше, ніж будь-коли раніше, своїм командирам на полі бою, які потім передають цю інформацію всім іншим відповідним солдатам, що дозволяє їм бути готовими та вести бій ефективніше. До цих пристроїв належать рації та сучасні радіостанції."
###### Weather Company
 desert_support_company: "Рота підтримки в пустелі"
 desert_support_company_desc: "Забезпечує спорядження та підтримку на спекотній місцевості та в біомах глибокої пустелі."
 snow_support_company: "Рота підтримки в снігу"
 snow_support_company_desc: "Забезпечує спорядження та підтримку на холодній місцевості та в умовах глибокого снігу."

 weather_company: "Погодне спорядження"
 weather_company_desc: "Погодне спорядження — це тип спеціалізованого спорядження для підтримки військ, призначеного для боротьби з екстремальними погодними умовами на різних полях бою по всьому світу. Наприклад, погодне спорядження може включати медикаменти або одяг, пристосовані до конкретних умов середовища, такі як важчі утеплені пальто та черевики для ведення бойових дій в умовах екстремального холоду або спеціалізований легкий камуфляжний одяг для ведення бойових дій у пустелі. Загалом, це має вирішальне значення для армій, які ведуть бойові дії або проходять підготовку до ведення бойових дій у суворих умовах."

 study_hot_environment: "Дослідження умов спеки"
 study_hot_environment_desc: "У міру вдосконалення наших збройних сил ми усвідомили необхідність забезпечення нашого персоналу відповідним спорядженням. Дослідження високих температур та їхнього впливу на спорядження й персонал дозволяє нам краще адаптуватися до складних ситуацій. Це також підвищує бойову готовність і знижує втрати в посушливих умовах."
 study_cold_environment: "Дослідження холодних умов"
 study_cold_environment_desc: "Суворі зими, постійний бруд і сніг можуть виснажити будь-яку армію, незалежно від її потужності чи чисельності. Якщо ми хочемо цього уникнути, ми повинні навчити нашу армію зберігати бойову ефективність, одночасно зменшуючи втрати. Ми матимемо значну перевагу над наземними силами супротивника."
 weather_company_desert: "Маски для захисту від піску"
 weather_company_desert_desc: "Однією з проблем, з якою стикаються наші війська під час бойових дій у спекотних пустельних районах, є пісок. Вести бій без будь-якого захисту носа чи рота є вкрай небезпечним, проте наші бійці продовжують брати участь у боях, не маючи захисту від природних стихій. Щоб вирішити цю проблему, ми створимо маски, спеціально розроблені для того, щоб не допустити потрапляння піску в легені нашої піхоти, що дозволить їм більше часу приділяти стрільбі, а не задишці."
 weather_company_desert2: "Хустка від піску"
 weather_company_desert2_desc: "Ще один простий спосіб для наших бійців захиститися від настирливих піщинок — забезпечити їх власними хустками або банданами. Хоча це простий і, слід визнати, застарілий метод захисту від піску, він є ефективним, недорогим і легко поєднується з уніформою. Хтось може заперечити, що у нас є кращі та більш досконалі методи захисту наших військ від стихій, але це хороший початок у боротьбі з посушливими атаками Матері-Природи."
 weather_company_desert3: "Окуляри проти піску"
 weather_company_desert3_desc: "Професійні окуляри, якими ми можемо легко забезпечити наших солдатів, є сучасним методом боротьби з пустельними стихіями. У поєднанні з нашими попередніми інвестиціями у засоби захисту носа та рота обличчя наших солдатів нарешті будуть у безпеці. Пісок більше не потраплятиме їм в очі й не відволікатиме їх, адже вони зможуть просто змахнути його з окулярів і продовжувати бій. Крім того, ці окуляри можуть бути ефективними й проти снігу, що робить їх ще кращою інвестицією."
 weather_company_desert4: "Камуфльований шолом"
 weather_company_desert4_desc: "Рельєф пустелі надає мало укриття і майже не залишає ворогу шансів не помітити наших солдатів, але є способи захистити наших бійців від пильного погляду супротивника. Наприклад, ми можемо застосувати тактичний камуфляж на їхніх шоломах. Завдяки цьому їхні голови зливатимуться з піском, що значно ускладнить їхнє виявлення, особливо з висоти. Це дасть нам значну перевагу, коли йдеться про маскування та захист від супротивника в пустелі."
 weather_company_desert5: "Пустельні лисиці"
 weather_company_desert5_desc: "Те, що ми зробили для пом’якшення впливу піску та спеки, вже допомогло нашим військам вести бойові дії в таких умовах. Завдяки створеному нами спорядженню та набутому досвіду ми стали справжніми експертами з ведення боїв у пустелі; ніхто не може заперечити, що спека пустелі більше не є перешкодою для нашої армії. Поки наші найновіші новобранці з нетерпінням стоять у черзі, щоб служити під палючим сонцем, маючи належне спорядження, ми усвідомлюємо, що не лише ефективно воюємо в пісках, а й процвітаємо там."

 weather_company_snow: "Овечі пальта"
 weather_company_snow_desc: "У боротьбі з морозами ми нехтували творіннями природи на користь технологій. Швидким рішенням проблеми пневмонії та обморожень, з якими стикаються наші війська під час зимових боїв, є звернення до тварин, здатних виживати за таких низьких температур, таких як вівці. Поєднавши овечу шкіру та вовну в одне зручне пальто, ми можемо забезпечити наших солдатів природним теплом для захисту від холоду."
 weather_company_snow2: "Тепліша нижня сорочка"
 weather_company_snow2_desc: "Одне з того, що ми можемо зробити, аби захистити наших солдатів від холоду, — це вдосконалити їхній одяг, зокрема нижні сорочки. Хоча їхня уніформа, особливо на зимових полях бою, часто розроблена так, щоб зігрівати їх, нижні сорочки не виконують цієї функції, і це питання необхідно вирішити. Якщо ми забезпечимо наших бійців матеріалами вищої якості для нижнього шару одягу, це, безсумнівно, надасть додаткові переваги, такі як підвищений захист і комфорт, що покращить загальну боєздатність підрозділів, одночасно захищаючи їх від холоду."
 weather_company_snow3: "Товсті пальта"
 weather_company_snow3_desc: "Для захисту від найсуворіших морозів або найгустіших піщаних буревіїв пальто, розроблені так, щоб бути якомога важчими та теплішими, мають стати стандартним спорядженням. Ці пальто повністю захистять нашу піхоту від мінусових температур, дозволяючи їй вести бій як проти ворога, так і проти стихійних лих. Хоча великі розміри цього одягу можуть ускладнювати пересування, очевидно, що переваги значно переважають недоліки."
 weather_company_snow4: "Камуфляжна уніформа"
 weather_company_snow4_desc: "Камуфляж виявився розумною формою маскування, яка діє як для людей, так і для тварин. Під час Великої війни французи використовували приховані орієнтири та пофарбовану артилерію, а британці — на своїх кораблях. Незважаючи на це, камуфляж ще не став поширеним у військовій уніформі через неможливість створення «універсального» камуфляжу. Проте, якщо забезпечити нашу армію уніформою похмурих відтінків, розробленою для злиття з зимовим ландшафтом, ворогам буде набагато складніше вистежити наших бійців."
 weather_company_snow5: "Холоднокровні вовки"
 weather_company_snow5_desc: "Наші зусилля у боротьбі із зимою принесли плоди. Наші бійці тепер впевнені у своїй здатності в разі потреби вторгнутися до Сибіру та захищати її. Ми забезпечили їх настільки чудовим спорядженням, що вони стали справжніми експертами у веденні боїв за мінусових температур. Єдине, що нам залишається зробити, — це провести додаткове навчання та узагальнити набутий досвід у посібниках і інструкціях, щоб усі були в курсі; інакше наші війська будуть полювати, виживати та процвітати серед льоду."
###### Field Hospital
 tech_field_hospital: "Польовий госпіталь"
 tech_field_hospital_health_1: "Перша медична допомога"
 tech_field_hospital_health_1_desc: "На полі бою солдати можуть отримати поранення внаслідок різних загроз, зокрема від місцевої дикої природи, нещасних випадків, погодних умов, а також від ворожих куль і багнетів. Ці рани легко інфікуються, і навіть найменша порізна рана може перерости у щось смертельне. Дослідження у сфері стандартизованих перев’язувальних матеріалів, які будуть видаватися нашим бійцям, стали б надійним способом хоча б запобігти деяким із цих непотрібних смертей."
 tech_field_hospital_health_2: "Базові хірургічні втручання"
 tech_field_hospital_health_2_desc: "Наявність медичного персоналу, готового надати допомогу пораненим, вже давно є невід’ємною частиною ведення війни, але ми маємо йти далі. Залучаючи не лише лікарів і медсестер, а й медичних фахівців, підготовлених до більш складних ситуацій, ми зможемо врятувати більше життів, незалежно від тяжкості поранення, яке раніше вважалося смертельним. Зокрема, залучення спеціалізованих хірургів для порятунку військовослужбовців, що повертаються з передової, усуває ризик смерті та інфікування, які зазвичай супроводжують вогнепальні поранення тощо."
 tech_field_hospital_health_3: "Профілактика захворювань"
 tech_field_hospital_health_3_desc: "Однією з найсерйозніших проблем, з якими стикаються наші збройні сили, є поширеність захворювань. Окрім боротьби з ворогом, хвороби є найпоширенішою причиною смерті серед наших солдатів — чи то через екстремальні погодні умови, відкриті рани, чи просто через необізнаність. Щоб вирішити останню проблему з цього переліку, ми можемо зробити все можливе, щоб навчити наших бійців профілактиці захворювань за допомогою обов’язкових посібників, короткометражних фільмів та будь-яких інших засобів, необхідних для забезпечення належних санітарних умов для наших солдатів."
 tech_field_hospital_health_4: "Антибіотики"
 tech_field_hospital_health_4_desc: "BБактеріальні інфекції становлять постійну загрозу для солдатів на полі бою, оскільки вони дуже заразні й ними легко заразитися. Будь-що — від відкритої рани, недостатньо прожареної їжі до суворих погодних умов — може призвести до того, що хтось із наших бійців захворіє на хворобу, яка виведе його з бою на кілька днів, а то й назавжди. Щоб боротися з цим, ми повинні зробити застосування антибіотиків — ліків, розроблених спеціально для профілактики або знищення бактеріальних інфекцій, — звичним явищем на полі бою."
 tech_field_hospital_health_5: "Переливання крові"
 tech_field_hospital_health_5_desc: "Втрата крові може бути для солдата такою ж небезпечною, як і сама рана. Лікарі, які працюють з пацієнтами, що повертаються з поля бою, завжди мають бути готовими та навченими проводити переливання крові — критично важливу процедуру, під час якої кров здорової людини безпечно забирають і вводять у кровотік пораненого, що втратив кров. Ці процедури існують ще з XIX століття, але останні досягнення зробили їх безпечнішими та ефективнішими."
 tech_field_hospital_health_6: "Основи фармакології"
 tech_field_hospital_health_6_desc: "Фармакологія, або наука про застосування ліків та медикаментів, досліджується ще з XI століття, але через обмеженість технологій того часу вона не вивчалася так широко, як зараз, і зосереджувалася переважно на травах та рослинах. Завдяки новим методам обробки, пристроям та проривам у медицині сучасні дослідження у фармакології, безсумнівно, нададуть нам засоби для боротьби з болем, хворобами та навіть психічними розладами, що потенційно допоможе в подоланні бойового стресу."
 tech_field_hospital_health_7: "Масове виробництво пеніциліну"
 tech_field_hospital_health_7_desc: "У 1928 році Олександр Флемінг відкрив пеніцилін — новий антибіотик, отриманий із плісняви грибка Penicillium. Це відкриття призвело до численних медичних проривів, і вчені й досі відкривають для нього нові сфери застосування. Наразі його використовують для лікування очних інфекцій у новонароджених та стрептококової ангіни — обох захворювань, які раніше вважалися невиліковними."
 tech_field_hospital_psychology_1: "Перший підручник з психології"
 tech_field_hospital_psychology_1_desc: "Психологія, або наука про розум і поведінку, є відносно новою галуззю в сучасну епоху. Оцінка психіки та її мислення корисна як для солдатів, що повертаються з фронту, щоб зрозуміти, чому їхній мозок так реагує на травми, отримані під час війни, так і для використання психологічних досліджень з метою передбачення наступних кроків ворога."
 tech_field_hospital_psychology_2: "Дослідження ПТСР"
 tech_field_hospital_psychology_2_desc: "Хоча згадки про солдатів, які після пережитої серйозної травми відчували неприродний страх поза полем бою, сягають ще часів Ассирії, лише нещодавно ми почали замислюватися над дослідженням або наданням допомоги солдатам, які настільки налякані, що не здатні реінтегруватися у цивільне життя. Під час Першої світової війни ми називали це «артилерійським шоком» і вважали це побічним ефектом слабкого розуму, але тепер ми знаємо, що це невірно."
 tech_field_hospital_psychology_3: "Електрошокова терапія"
 tech_field_hospital_psychology_3_desc: "Використання електричного струму для лікування психічних розладів випробовувалося ще з 1500-х років, і з того часу його популярність та ефективність лише зростали. Завдяки нашій новій технології, яка забезпечує безпечніші умови та більш прямий контакт з електричним струмом, а не зі статичною електрикою — не кажучи вже про численні дослідження, що підтверджують її ефективність, — ми зможемо позбавити хворих від депресії та шизофренії, викликаючи цілеспрямовані судоми за допомогою процедури, відомої як електрошокова терапія."
 tech_field_hospital_psychology_4: "Психіатри"
 tech_field_hospital_psychology_4_desc: "У міру того, як ми продовжуємо досліджувати людський розум і лікувати розлади, з якими наші солдати можуть зіткнутися після війни, нам на кожному кроці будуть потрібні висококваліфіковані фахівці. Цих людей, яких можна вважати справжніми професіоналами у сфері психічного здоров’я, таких як психіатри та психологи, необхідно негайно найняти, щоб вони направляли нас і допомагали численним солдатам, які борються з хворобами, що не обов’язково мають бути постійними."
 tech_field_hospital_psychology_5: "Регулярні контрольні огляди"
 tech_field_hospital_psychology_5_desc: "Одне з найважливіших відкриттів, яке ми отримали від найнятих фахівців з психічного здоров’я, — це важливість встановлення послідовного та незмінного розпорядку дня для пацієнтів, які страждають на різні розлади. Ідея полягає в тому, що забезпечення хворих упорядкованим, рівномірним і стабільним режимом життя покращить їхній психічний стан і, як наслідок, може навіть сприяти формуванню у них більш здорового психічного стану."
 tech_field_hospital_psychology_6: "Групова терапія"
 tech_field_hospital_psychology_6_desc: "Групова терапія — це відносно новий, але не менш цікавий і корисний підхід до подолання травм не лише у військовослужбовців, а й серед широких верств населення. Суть полягає в тому, щоб зібрати групу пацієнтів, які пережили подібні травматичні події, у так звану навчальну групу, де вони ділитимуться своїми історіями та дізнаватимуться одне про одного. Кінцева мета полягає в тому, щоб учасники групи усвідомили, що вони не самотні у своїх труднощах, і завдяки міжособистісній взаємодії покращили свій психічний стан."
 tech_field_hospital_psychology_7: "Реінтеграція в суспільство"
 tech_field_hospital_psychology_7_desc: "У перші роки розвитку психології та лікування психічних захворювань вважалося, що такі люди ніколи не зможуть знову вести нормальне життя. Зазвичай їх утримували в психіатричних закладах аж до смерті, з ними жорстоко поводилися та ізолювали від суспільства. Але тепер це вже не так. Завдяки численним досягненням у галузі психічного здоров’я та відкриттю сучасних методів лікування багатьох захворювань ці бідні душі, можливо, одного дня знайдуть спокій, стабільність і життя поза межами психіатричної лікарні."
 tech_life_wardens: "Рятівники життя"
 tech_life_wardens_desc: "Наші медичні офіцери володіють найсучаснішими знаннями у своїй галузі, а також найкращим обладнанням, доступним на сьогодні. Суворі програми підготовки загартували їхні нерви — достатньо, щоб витягувати вмираючих солдатів із активних зон бойових дій до імпровізованих операційних, де вони проводять операції з порятунку життя, маючи мінімум часу на підготовку."
###### Logistics Company
 tech_logistics_company: "Логістична рота"
 tech_logistics_company2: "Управління лініями постачання"
 tech_logistics_company2_desc: "Ефективне управління лініями постачання гарантує, що підрозділи на передовій завжди отримують паливо, боєприпаси, продовольство та медичні засоби. Основна увага приділяється плануванню ефективних маршрутів транспортування, координації поставок та зменшенню затримок або перебоїв. Оптимізуючи потік ресурсів від складів до зон бойових дій, армія зберігає оперативну динаміку, одночасно зменшуючи ризик дефіциту або перенапруження ресурсів."
 tech_logistics_company3: "Постачання на передову"
 tech_logistics_company3_desc: "ля доставки необхідних товарів на передову потрібно не лише мати запаси; необхідна також гнучка логістика поблизу зони бойових дій. Такий підхід прискорює роботу вузлів постачання та мобільних складів, скорочує час між виникненням потреби та доставкою, а також гарантує, що підрозділи залишаються боєздатними під час операцій, що швидко розвиваються."
 tech_logistics_company4: "Система конвоїв з супроводом"
 tech_logistics_company4_desc: "Щоб зменшити затримки та захистити цінний вантаж, конвої організовуються у групи з супроводом, до складу яких входять призначені супровідники та координатори. Кожен конвой рухається за встановленим графіком, що покращує підзвітність, зменшує втрати та забезпечує стабільний потік поставок на передові позиції."
 tech_logistics_company5: "Система постачання в стаціонарних районах"
 tech_logistics_company5_desc: "Замість того, щоб покладатися виключно на рухомі конвої, поблизу стабільних ліній фронту або гарнізонних районів будуються центри постачання. Ці напівпостійні склади дають змогу здійснювати локалізований розподіл, зменшують навантаження на логістичні підрозділи, пов’язане з перевезеннями, та забезпечують стабільне поповнення запасів у секторах з низькою мобільністю."
 tech_logistics_company6: "Склади постачання в тилу"
 tech_logistics_company6_desc: "За лінією фронту в безпечних місцях облаштовуються великі зони зберігання для накопичення боєприпасів, палива, продовольства та спорядження. Ці склади слугують центральними вузлами в мережі постачання, забезпечуючи передові склади та мобільні конвої, а також гарантуючи, що великі операції можуть тривати навіть у разі тимчасового порушення транспортних шляхів."
 tech_logistics_company7: "Глибока логістична організація"
 tech_logistics_company7_desc: "Багаторівнева та багатошарова логістична структура простягається глибоко в тил збройних сил, об’єднуючи промислові центри, залізничні мережі та фронтові склади в єдину та стійку систему. Чітка ієрархія, делеговані повноваження та визначені маршрути руху дозволяють постачанням переміщатися швидше та надійніше на великі відстані."
 tech_logistics_company8: "Система постачання на нижньому ешелоні"
 tech_logistics_company8_desc: "Армії зменшують свою залежність від вищого командування в питаннях базового поповнення запасів, забезпечуючи передові підрозділи спеціалізованими логістичними підрозділами. Децентралізоване зберігання, спрощені протоколи розподілу та транспорт на рівні підрозділів гарантують швидку доставку критично важливих ресурсів, таких як боєприпаси, продовольство та медичні засоби, навіть під вогнем противника."
 tech_logistics_company9: "Система кругового постачання на передовій"
 tech_logistics_company9_desc: "Модель кругового постачання, на відміну від статичних ліній або прямих маршрутів постачання, забезпечує безперервний потік матеріалів через циклічні контури доставки. Це зменшує затори, знижує ризик перебоїв та гарантує, що матеріали надходять до підрозділів на передовій з різних напрямків. Система добре адаптується до змін лінії фронту, що забезпечує більшу стійкість логістичного ланцюга в умовах динамічних бойових дій."
##### Maintenance Company
 tech_maintenance_company: "Рота техобслуговування"
 tech_maintenance_company2: "Комплексне очищення обладнання"
 tech_maintenance_company2_desc: "Надто часто наші солдати повідомляють, що їхня зброя поламана або заклинила, а потім бригади з технічного обслуговування констатують, що вона просто якимось чином забруднена. За допомогою навчальних брошур та обов’язкових демонстрацій ми навчимо переважну більшість солдатів правильно та ретельно чистити своє спорядження, щоб запобігти таким інцидентам і звільнити їхній час для виконання важливіших завдань."
 tech_maintenance_company3: "Навчання з експлуатації спорядження"
 tech_maintenance_company3_desc: "Навчання солдатів та допоміжного персоналу експлуатації та технічного обслуговування військового спорядження зменшує зношування, кількість аварій та непотрібні простої. Коли персонал розуміє, як працюють інструменти, якими він користується — від гвинтівок до радіостанцій та двигунів, — він краще здатний вчасно виявляти проблеми та виконувати базові польові ремонти. Ці базові знання покращують цикли технічного обслуговування та подовжують термін експлуатації обладнання як на передовій, так і в тилових районах."
 tech_maintenance_company4: "Запаси та зберігання"
 tech_maintenance_company4_desc: "Належне управління запасами та методи зберігання гарантують, що запчастини, інструменти та запасне обладнання будуть під рукою, коли це потрібно. Підрозділи уникають марнотратства, дублювання та критичного дефіциту, організовуючи склади та впроваджуючи базові системи обліку. Ця основа логістичної готовності підтримує поточні операції та сприяє бойовій ефективності, забезпечуючи постійну доступність обладнання."
 tech_maintenance_company5: "Система розподілу робочих завдань"
 tech_maintenance_company5_desc: "Розподіл обов’язків з ремонту та технічного обслуговування за допомогою структурованого процесу розподілу завдань скорочує час простою та усуває плутанину. Завдання розподіляються залежно від їхнього пріоритету та терміновості, що гарантує швидкий ремонт пошкодженої техніки. Ця система підвищує ефективність роботи майстерень, усуває вузькі місця та забезпечує своєчасне технічне обслуговування польових підрозділів."
 tech_maintenance_company6: "Майстерня з ремонту транспортних засобів у тилу"
 tech_maintenance_company6_desc: "Створення спеціалізованих ремонтних об’єктів за лінією фронту дає змогу вилучати пошкоджені транспортні засоби, обслуговувати їх та повертати до ладу, не перевантажуючи ремонтні бригади на передовій. Ці майстерні, укомплектовані кваліфікованими механіками та запасними частинами, подовжують термін експлуатації техніки та забезпечують стабільний потік боєздатних транспортних засобів до бойових підрозділів."
 tech_maintenance_company7: "Організація глибокого ремонту транспортних засобів"
 tech_maintenance_company7_desc: "Багаторівнева мережа ремонту гарантує, що транспортні засоби отримують належний рівень технічного обслуговування відповідно до ступеня пошкодження. Незначні ремонти проводяться поблизу фронту, тоді як більш масштабні капітальні ремонти виконуються у спеціалізованих депо, розташованих глибше в тилу. Така структура скорочує час простою, запобігає накопиченню затримок та забезпечує постійну бойову готовність протягом тривалих військових кампаній."
 tech_maintenance_company8: "Броньовані евакуаційні машини"
 tech_maintenance_company8_desc: "Занадто довго ми втрачали машини на полі бою через механічні несправності, потрапляння в рови або просто внаслідок враження ворогом, після чого ці вороги захоплювали їх, крали нашу технологію, а потім використовували нашу ж зброю проти нас. Щоб вирішити цю проблему, ми мусимо використовувати броньовані евакуаційні машини — великі броньовані машини, побудовані на базі танкових корпусів та інших матеріалів і оснащені кранами для буксирування або ремонту пошкоджених машин, щоб ті могли знову брати участь у боях. Ми можемо навіть буксирувати ворожі машини."
 
 night_vision: "Нічне бачення I"
 night_vision_desc: "Можливість бачити ворога, залишаючись непоміченим, є ключовою для нічних операцій. Завдяки винаходу інфрачервоної технології ми можемо оснастити нашу армію пристроями, які, хоч і громіздкі, роблять це можливим."
 night_vision2: "Нічне бачення II"
 night_vision2_desc: "Ранні інфрачервоні приціли, хоча спочатку й призначалися для снайперів, мали обмежену дальність бачення. У міру покращення як портативності, так і якості зображення ці пристрої можуть використовуватися більшою кількістю військових, що діють уночі."

 
 #### Air Technology #####################################################################################
 fighter: "Винищувач"
 fighter_equipment: "Винищувач"
 fighter_equipment_desc: "Винищувачі — це основа будь-яких повітряних сил. Вони використовуються для забезпечення переваги в повітрі, а також для боротьби з ворожими бомбардувальниками та винищувачами. Це універсальні літаки, здатні виконувати будь-які поставлені перед ними завдання, хоча й не виділяються особливими досягненнями в жодній конкретній сфері."
 
 interceptor: "Винищувачі-бомбардувальники"
 interceptor_equipment_desc: "Винищувачі-бомбардувальники — це винищувачі ближнього радіусу дії, призначені для знищення ворожих бомбардувальників. Вони мають високу швидкість і хорошу маневреність, що робить їх достатньо спритними, щоб ухилятися від кулеметного вогню бомбардувальників, і водночас володіють вогневою потужністю, необхідною для виведення з ладу важкого, броньованого бомбардувальника. Проти ворожих винищувачів вони менш ефективні, проте все одно дають гідний відсіч."
 
 cv_fighter: "Винищувач"
 cv_fighter_equipment: "Авіаносний винищувач"
 cv_fighter_equipment_desc: "Авіаносні літаки — це морська авіація, призначена для дій з авіаносців. Хоча наприкінці Першої світової війни як авіаційна, так і авіаносна технології перебували на відносно ранніх стадіях розвитку, вже розпочалися експерименти з об’єднання цих двох напрямків. Перша посадка на палубу корабля відбулася ще до війни, і з швидким розвитком авіації у військовій справі стала очевидною потреба у спеціалізованих літаках, пристосованих до зльоту та посадки з цих кораблів."

 jet_fighter: "Винищувач"
 jet_fighter_equipment: "Реактивний винищувач"
 jet_fighter_equipment_desc: "Винищувачі — це основа будь-яких повітряних сил. Їх використовують для досягнення переваги в повітрі, а також для боротьби з ворожими бомбардувальниками та винищувачами. Це універсальні літаки, здатні виконувати будь-яке доручене їм завдання, але не виділяються в жодному конкретному напрямку."
 
 nav_bomber: "Морський бомбардувальник"
 nav_bomber_equipment_desc: "Морський бомбардувальник призначений для використання над водою та нанесення точних тактичних ударів по ворожих надводних кораблях за допомогою торпед або бронебійних бомб. Він має обмежені можливості для повітряного бою, що робить його вразливим у разі перехоплення винищувачами."
 
 cv_nav_bomber: "Торпедоносець"
 cv_nav_bomber_equipment_desc: "Торпедоносець — це літак, розроблений незадовго до Першої світової війни з метою перевезення та скидання повітряних торпед, що завдають значної шкоди кораблям будь-якого типу. У пізніших моделях торпеди зазвичай розміщуються під крилами, а в ранніх — під центром літака. Хоча торпеди, що запускаються з бомбардувальника, зазвичай легші за ті, що несуть катери, у великій кількості вони можуть завдати нищівного удару."
 
 tac_bomber: "Тактичний бомбардувальник"
 tac_bomber_equipment_desc: "Тактичні бомбардувальники — це літаки середнього розміру, більші за винищувачі, але менші за стратегічні бомбардувальники, які використовуються переважно для нанесення ударів по наземних підрозділах противника, таких як бронетехніка та піхота. Хоча вони мають обмежені можливості для повітряних боїв, у повітряних сутичках винищувачі легко перевершують їх."
 
 heavy_fighter: "Важкий винищувач"
 heavy_fighter_equipment_desc: "Важкі винищувачі — це винищувачі дальнього радіусу дії, призначені для супроводу бомбардувальників та відбиття атак ворожих перехоплювачів. Вони навчені тактиці виконання цієї місії. У місіях із забезпечення переваги в повітрі вони менш ефективні."
 
 strat_bomber: "Стратегічний бомбардувальник"
 strat_bomber_equipment: "Стратегічний бомбардувальник"
 strat_bomber_equipment_desc: "Стратегічні бомбардувальники — найважчий тип літаків, призначений для доставки великого боєзапасу бомб у ворожі провінції з метою паралізування його промисловості та інфраструктури. Однак, незважаючи на велику дальність польоту, стратегічний бомбардувальник є повільним, що робить його вразливим до атак винищувачів."
 
 transport_plane: "Транспортний літак"
 transport_plane_equipment_desc: "Транспортні літаки призначені для швидкого перевезення особового складу та матеріальних засобів на великі відстані. Десантникам потрібні транспортні літаки для здійснення десантних операцій."
 
 guided_missile: "Ракета"
 guided_missile_desc: "Балістична ракета призначена для доставки вибухового заряду до віддаленої цілі. Її висока швидкість робить її майже неможливою для перехоплення, але це дорогий спосіб знищення ворога за допомогою звичайних вибухових речовин. Щоб надати їй більше, ніж психологічний ефект, потрібна ядерна зброя."

 rocket_interceptor_equipment: "Ракетоперехоплювач"
 rocket_interceptor_equipment_desc: "Літак на ракетному двигуні використовує ракету для руху. Ракетолітаки можуть розвивати набагато вищі швидкості, ніж реактивні літаки аналогічних розмірів, але зазвичай можуть перебувати в режимі активного польоту не більше кількох хвилин, після чого переходять у планерний політ. Оскільки вони не залежать від кисню з атмосфери, вони придатні для польотів на дуже великих висотах. Вони також здатні розвивати набагато більше прискорення та здійснювати зліт з меншої відстані."

 ### Engineering Technology ###################################################################################
 
 
 radar_1: "Радіомовлення"
 radar_1_desc: "Радіо — це відносно новий винахід, перші успішні передачі за допомогою якого відбулися на початку 1900-х років. Хоча сфера його цивільного застосування продовжує розширюватися, саме військовий потенціал радіомовлення вимагає нашої уваги. Забезпечуючи передачу наказів, оновлених розвідувальних даних та стратегічної інформації на великі відстані в режимі реального часу, радіо дозволяє досягти безпрецедентного рівня координації між штабом та підрозділами на полі бою."  
 radar_2: "Дециметровий радар"
 radar_2_desc: "Радарні системи з дециметровими довжинами хвиль мають значно більшу дальність виявлення та надійність, ніж попередні моделі. Ці системи краще підходять для відстеження великих повітряних і морських цілей на великі відстані. Їхня довша довжина хвилі забезпечує кращі характеристики в погану погоду, що робить їх важливою складовою мереж раннього попередження та берегової оборони."  
 radar_3: "Пошуковий радар"
 radar_3_desc: "Пошуковий радар призначений для сканування великих ділянок повітряного простору або відкритих водних просторів, безперервно обертаючись для виявлення наближаючихся загроз на відстані. Він виконує роль «очей» будь-якої системи протиповітряної оборони чи морського екрану, надаючи постійну інформацію про позиції противника та відповідно керуючи силами своїх військ. Його роль є критично важливою для оповіщення командних пунктів та ініціювання відповідних дій."  
 radar_4: "Резонаторний магнетрон"
 radar_4_desc: "Поява резонаторного магнетрона стала переломним моментом у розвитку радіолокаційної техніки. Він дає змогу розробляти компактні та ефективні радіолокаційні комплекси для літаків і кораблів завдяки генерації мікрохвильових частот високої потужності в компактному пристрої. Це вдосконалення забезпечує вищу роздільну здатність, менші розміри антен та ефективніше відстеження й наведення на ціль на різних платформах."  
 radar_5: "Застосування авіаційних радіолокаторів"
 radar_5_desc: "Адаптація радіолокаторів для використання на літаках кардинально змінює повітряний бій та розвідку. Бортові радіолокатори дозволяють пілотам виявляти ворожі літаки, надводні судна або особливості рельєфу за межами зони прямої видимості та в умовах поганої видимості. Ці системи мають вирішальне значення для ведення нічних боїв, перехоплення на великій відстані та навігації на полі бою."  
 radar_6: "Техніка моноімпульсного радара"
 radar_6_desc: "Техніка моноімпульсного радара дозволяє з високою точністю обчислювати напрямок до цілі шляхом розщеплення одного радіолокаційного імпульсу на кілька променів. Це усуває необхідність у затримках сканування та значно покращує здатність відстежувати швидкорухливі або маневрені загрози. Це є значним проривом у точності радіолокації та стійкості до електронних засобів протидії."  
 radar_7: "Сантиметровий радар"
 radar_7_desc: "Ці радари, що використовують сантиметрові довжини хвиль, можуть виявляти менші цілі з більшою точністю. Ця здатність має вирішальне значення для виявлення перископів, швидкісних катерів та низьколітаючих літаків, які можуть уникнути виявлення системами з довшими довжинами хвиль. Вища вихідна частота також допомагає чіткіше розпізнавати цілі в умовах сильних перешкод."  
 radar_8: "Удосконалене бортове застосування"
 radar_8_desc: "У міру того, як радіолокатори все ширше застосовуються на різних платформах, їхня інтеграція на борту суден значно покращується. Системи підключаються безпосередньо до бойових інформаційних центрів та комплексів управління вогнем, що дозволяє швидше приймати рішення. Удосконалені інтерфейси та автоматизована обробка даних дають екіпажам змогу швидко інтерпретувати радіолокаційні дані, підвищуючи як виживаність, так і бойову ефективність у бою."  

 computing_1: "Калькулятор автоматичного приведення даних"
 computing_1_desc: "Цей ранній механічний пристрій автоматизує повторювані обчислення, змінюючи значення змінних за допомогою заздалегідь запрограмованих шестерень і кулачків. Він широко використовується в артилерійських підрозділах та при логістичному плануванні для зменшення ручної роботи, підвищення узгодженості результатів та прискорення підготовки до вогню або інвентаризації запасів."
 computing_2: "Аналогова система управління вогнем"
 computing_2_desc: "Аналогові системи управління вогнем використовують механічні компоненти для перетворення даних про ціль, таких як відстань, швидкість та пеленг, у точні розрахунки для ведення вогню. Ці системи інтегровані у військові кораблі, берегові батареї та зенітні платформи для покращення координації та синхронізації залпового вогню. Оператори вручну вводять мінливі умови, але після налаштування система може швидко обчислювати постійні оновлення, надаючи підрозділам перевагу в бою."
 computing_3: "Аналітичний обчислювальний пристрій"
 computing_3_desc: "Аналітичний обчислювальний пристрій — це концептуальна та частково реалізована конструкція, що спирається на ранні розробки в галузі механічних обчислень. Він виконує складні багатоетапні обчислення за допомогою перфокарт, логічних схем із зубчастим приводом та модульних блоків пам’яті. Незважаючи на свої розміри та складність, він має такі важливі функції, як умовні операції та автоматизований вивід результатів, що робить його корисним для детальних інженерних завдань, криптографічних робіт та логістичного прогнозування."
 computing_4: "Бухгалтерська машина"
 computing_4_desc: "Ці табулюючі пристрої, спочатку розроблені для адміністративних цілей, зараз використовуються у військовій сфері для обробки та систематизації даних, пов’язаних з особовим складом, технікою та переміщеннями поставок. Вони використовують перфокарти та механічні сортувальники для швидкого складання звітів і статистичних зведень. Бухгалтерська машина забезпечує новий рівень швидкості та точності в управлінні величезними бюрократичними вимогами сучасної війни."
 computing_5: "Базова обчислювальна машина"
 computing_5_desc: "Рання обчислювальна платформа, здатна виконувати загальні арифметичні та базові логічні операції. Вона виконує фіксовані процедури, збережені на паперовій стрічці або в жорстко запрограмованих схемах, маючи обмежену пам’ять та швидкість. Незважаючи на свою простоту, вона надзвичайно корисна для повторюваних технічних завдань, таких як балістичні розрахунки, допомога у розшифруванні кодів та логістичне планування."
 computing_6: «Електромеханічний релейний комп’ютер»
 computing_6_desc: "Ці машини використовують реле для послідовного розмикання та замикання ланцюгів, що дозволяє їм виконувати широкий спектр логічних та математичних операцій. Хоча вони повільніші за електронні аналоги, вони надійніші за суто механічні системи та можуть бути переналаштовані для виконання різних завдань. Релейні комп’ютери використовуються в установах з розшифрування кодів, технічних дослідницьких лабораторіях та великих логістичних центрах, де потрібні стабільні обчислення."
 computing_7: "Автоматичний цифровий комп’ютер"
 computing_7_desc: "Перехід на схеми на основі вакуумних трубок дозволяє комп’ютерам цього покоління працювати повністю в електронному режимі, що значно підвищує їхню швидкість та розширює функціонал. Ці машини можна запрограмувати на моделювання боїв, розшифрування складних шифрів та обробку величезних обсягів даних за години, а не дні."
 computing_8: "Комп’ютер із збереженою програмою"
 computing_8_desc: "Ця технологія дозволяє зберігати як інструкції, так і дані у внутрішній пам’яті комп’ютера, завдяки чому машини можуть перемикатися між завданнями або самостійно модифікуватися під час роботи. Це значно скорочує час налаштування та підвищує гнучкість, дозволяючи комп’ютерам виконувати широкий спектр військових функцій, зокрема наведення радіолокаційних систем та прогнозування поставок."
 decryption_encryption_1: "Шифрувальна машина"
 decryption_encryption_1_desc: "Механічні та електромеханічні шифрувальні пристрої генерують і декодують захищені повідомлення за допомогою складних систем роторів, комбінаційних панелей або електронних схем. Вони мають вирішальне значення для захисту зв’язку на суші, у повітрі та на морі, ускладнюючи супротивникам перехоплення або розшифрування конфіденційних даних. Кожен пристрій дотримується синхронізованого протоколу шифрування, що вимагає як точного керування, так і постійної уваги для збереження інформаційної переваги."
 decryption_encryption_2: "Телепринтер"
 decryption_encryption_2_desc: "елепринтер дозволяє здійснювати прямий, друкований обмін повідомленнями на великі відстані шляхом електричної передачі натискань клавіш на з’єднаний пристрій. Це важливий інструмент для військової координації, що забезпечує швидкий обмін повідомленнями між командуваннями без необхідності використовувати ручний морський код або повідомлення, що доставляються особисто. Його надійність та швидкість значно підвищують оперативність реагування командування в зонах бойових дій."
 encryption_1: "Система з 3 роторами"
 encryption_1_desc: "Для перетворення літер у зашифровані символи компактний шифрувальний пристрій використовує серію з трьох обертових коліс, кожне з яких має змінну внутрішню схему з’єднань. Позиція кожного ротора змінюється з кожним натисканням клавіші, що призводить до постійно мінливого коду. Ця система широко використовується завдяки своїй портативності та помірному рівню безпеки, а також слугує основою для шифрування середнього рівня."
 encryption_2: "Система з 6 роторами"
 encryption_2_desc: "Цей вдосконалений шифрувальний пристрій розширює можливості попередніх роторних машин, використовуючи додаткові рівні шифрування за допомогою шести обертових роторів. Підвищена складність значно підвищує рівень безпеки, що значно ускладнює розшифрування коду супротивниками без наявності внутрішньої інформації або ретельного аналізу."
 encryption_3: "5-бітні комбінації"
 encryption_3_desc: "Стандартизована система кодування, яка представляє символи за допомогою п’яти двійкових цифр. Незважаючи на обмежену різноманітність символів, вона є ефективною та надійною для військової телеграфії, радіотелетайпу та ранніх криптографічних систем. Це основа спрощених схем кодування даних, що використовуються в комунікаційних мережах та шифрувальних пристроях."
 decryption_1: "Математична теорія шифрування"
 decryption_1_desc: "Математичні прориви в комбінаториці, перестановках та теорії ймовірностей мають прямий вплив на міцність шифрів та їх аналіз. Застосування суворої теорії до шифрування та дешифрування дозволяє створювати міцніші шифри та застосовувати більш систематичні підходи до розшифрування ворожих повідомлень. Ці теорії впливають на те, як проектуються машини для вирішення складних криптографічних задач."
 decryption_2: "Підтримка обчислювальних машин"
 decryption_2_desc: "Інтеграція ранніх обчислювальних машин у процес розшифрування та аналізу даних відкриває нові можливості в розвідувальній роботі. Ці машини призначені для моделювання шифровальних коліс, тестування перестановок ключів та виявлення повторюваних візерунків у перехоплених даних."
 decryption_3: "Виявлення паралельних текстів"
 decryption_3_desc: "Аналітики розробляють методи для виділення ймовірних фраз або повторюваних термінів шляхом порівняння зашифрованих повідомлень, які, як видається, є копіями або переробленими версіями попередніх текстів. Цей метод має вирішальне значення для вивчення моделей комунікації противника і слугує неоціненним інструментом як для криптоаналітиків, що працюють вручну, так і для операцій із використанням машинного аналізу."
 train_equipment: "Поїзд"
 train_equipment_short: "Поїзд"
 train_equipment_desc: "Поїзди транспортують постачання зі столиці постачання до логістичних вузлів, з’єднаних залізницею."
 train_equipment_1: "Цивільний поїзд"
 train_equipment_1_short: "Цивільний поїзд"
 train_equipment_1_desc: "Цей локомотив, переобладнаний військовими з звичайного цивільного вантажного, добре підходить для перевезення великих обсягів поставок на великі відстані. Однак його цивільна конструкція робить його вразливим."
 train_equipment_2: "Військовий економ-поїзд"
 train_equipment_2_short: "Військовий економ-поїзд"
 train_equipment_2_desc: "Спрощена конструкція, в якій для здешевлення виробництва відмовлено від багатьох елементів, що зазвичай є у звичайних вантажних поїздах. Він залишається таким же вразливим, як і звичайний поїзд, але його легше замінити."
 train_equipment_3: "Броньований поїзд"
 train_equipment_3_short: "Броньований поїзд"
 train_equipment_3_desc: "Локомотив, обшитий важким бронюванням, що робить його менш вразливим до ворожих атак. Він може перевозити стільки ж вантажу, як і будь-яка інша конструкція, але його виробництво коштує дорожче."
 railway_gun_equipment: "Залізнична артилерія"
 railway_gun_equipment_desc: "Важка гармата, встановлена на залізничному вагоні для транспортування."
 railway_gun_desc: "Залізниця дає змогу переміщувати важкі гармати далеко вглиб суші з прийнятною швидкістю, що дозволяє нам обстрілювати ворожі позиції на великій відстані з високою ефективністю."
 railway_gun_equipment_1: "Залізнична гармата"

 rocketry_1: "Експериментальний ракетний двигун"
 rocketry_1_desc: "Розвиток ракетної науки шляхом підвищення дальності польоту та надійності ракет на рідкому паливі дозволить нам отримати достатньо знань про цю технологію, щоб побудувати стартові майданчики для більш досконалих моделей."
 rocketry_2: "Центр випробувань і досліджень ракет"
 rocketry_2_desc: "Будуються спеціалізовані об’єкти для випробування та вдосконалення ракетних силових установок, механізмів наведення та конструкцій боєголовок. Ці об’єкти дають змогу проводити контрольовані експерименти та випробування на великі відстані, прискорюючи прогрес як у сфері ракет «земля-земля», так і в сфері авіаційної зброї."
 rocketry_3: "Ракетний двигун"
 rocketry_3_desc: "Знання в галузі ракетної тяги досягають рівня, що дозволяє нам створювати літаючі бомби та літаки на ракетній тязі, які розвивають раніше недосяжні швидкості."
 rocketry_4: "Літаюча бомба"
 rocketry_4_desc: "езпілотний літальний апарат, оснащений вибуховим зарядом та системою наведення з таймером або примітивною системою наведення. Ці ранні крилаті ракети запускаються з наземних установок або літаків і призначені для ураження цілей без створення небезпеки для пілотів. Незважаючи на обмежену точність, вони мають значний психологічний та стратегічний вплив, відкриваючи еру безпілотних ударних операцій."
 rocketry_5: "Стратегічна ракета"
 rocketry_5_desc: "Можна створювати перші балістичні ракети великої дальності та робити їх дедалі точнішими, що дозволяють досягати віддалених міст супротивника і навіть виходити у космос."
 rocketry_6: "Балістична ракета"
 rocketry_6_desc: "Майбутнє ракетобудування відкриває такі можливості, як міжконтинентальні ракети, дальність яких майже не має обмежень, тоді як їхні боєзаряди стають дедалі більш смертоносними."
 rocketry_jet_1: "Ранній турбореактивний двигун"
 rocketry_jet_1_desc: "Ця силова установка вводить поняття тяги, яка створюється шляхом стиснення повітря, змішування його з паливом та виштовхування на високій швидкості. Ранні моделі мають проблеми з надійністю та вимагають значного технічного обслуговування, але вони можуть розвивати набагато більшу швидкість, ніж поршневі двигуни."
 rocketry_jet_2: "Удосконалений турбореактивний двигун"
 rocketry_jet_2_desc: "Удосконалення матеріалів, технічних допусків та систем подачі палива призвели до створення надійного, відтворюваного турбореактивного двигуна, придатного для служби на передовій. Ці двигуни дають літакам змогу швидко набирати висоту та літати на високих швидкостях, випереджаючи традиційні винищувачі та бомбардувальники."
 rocketry_interceptor_1: "Ракетний перехоплювач"
 rocketry_interceptor_1_desc: "Ракетні перехоплювачі на базі планерів можуть протягом короткого часу рухатися швидше, ніж будь-який інший літак. Хоча нестабільність палива ставить ці літаки під загрозу, вони можуть злітати та реагувати на атаки швидше, ніж будь-який ворог зможе очікувати."
 rocketry_interceptor_2: "Удосконалений ракетний перехоплювач"
 rocketry_interceptor_2_desc: "Ракетні винищувачі, експлуатація яких досі вважається надзвичайно небезпечною, тепер оснащені автопілотами та буксируються іншими літаками, щоб максимально ефективно використовувати їхню надзвичайну швидкість при обмеженому запасі палива."

 nuclear_1: "Генератор Ван де Граафа"
 nuclear_1_desc: "Цей електростатичний генератор, винайдений американським фізиком Робертом Дж. Ван де Граафом, використовує рухомий ремінь для накопичення електричного заряду на порожнистій металевій кулі, розташованій на вершині ізольованої колони, створюючи дуже високі електричні потенціали. Цей генератор був розроблений як один із перших прискорювачів частинок для фізичних досліджень, оскільки його високий потенціал можна використовувати для прискорення субатомних частинок до величезних швидкостей. Незважаючи на свою примітивність, він дає певне уявлення про початки досліджень у галузі ядерної фізики."
 nuclear_2: "Атомні дослідження"
 nuclear_2_desc: "Під час ядерного розпаду атома виділяється величезна кількість енергії та виникає безмежна руйнівна сила."
 nuclear_3: "Дослідницькі лабораторії"
 nuclear_3_desc: "Хоча вчені завжди потребують безпечного та захищеного середовища для проведення потенційно небезпечних експериментів, ми, як держава, маємо очікувати від них більшого, щоб по-справжньому рухатися в майбутнє. Як наслідок, наші архітектори невтомно працюють над макетами нових наукових будівель, які будуть спеціально спроектовані для об’єднання багатьох вчених із найкращим обладнанням та умовами, щоб досягти справді значних проривів."
 nuclear_4: "Ядерні дослідження"
 nuclear_4_desc: "Наукові дослідження властивостей атомних ядер розкривають величезний енергетичний потенціал, прихований у матерії. Радіоактивність, поведінка нейтронів та атомна теорія є основними темами досліджень, сфери застосування яких простягаються від виробництва енергії до створення зброї."
 nuclear_5: "Розділення ізотопів"
 nuclear_5_desc: "Щоб розкрити потенціал ядерної енергії, певні ізотопи, такі як уран-235 або плутоній-239, необхідно відокремити від більш поширених форм. Цей процес вимагає застосування передових технологій, таких як газова дифузія та електромагнітне розділення. Ця технологія є дорогою та складною, але вона необхідна для виробництва матеріалів, придатних для тривалих ланцюгових реакцій."
 nuclear_6: "онтрольована ядерна ланцюгова реакція"
 nuclear_6_desc: "За умови правильного підбору ізотопів та уповільнення нейтронів можлива самопідтримувана ядерна ланцюгова реакція. Цей прорив демонструє, що ядерну енергію можна безпечно використовувати в лабораторних умовах, що відкриває шлях до розробки реакторів і, потенційно, до створення компактних вибухових речовин з високою потужністю."
 nuclear_7: "Експериментальний реактор"
 nuclear_7_desc: "Будівництво першого діючого ядерного реактора дає змогу провести практичні випробування поведінки палива, нейтронного потоку та терморегулювання. Хоча ця установка ще не використовується для великомасштабного виробництва електроенергії, вона слугує полігоном для випробувань безпечного утримання, проектування реакторів та майбутніх протоколів експлуатації атомних систем."
 nuclear_8: "Ядерний реактор"
 nuclear_8_desc: "У міру того, як ми краще розуміємо силу атома, ми мусимо будувати об’єкти для подальшого дослідження ядерних можливостей та випробування ланцюгових реакцій ядерного розщеплення у більшому та безпечнішому масштабі. Ці об’єкти можуть не лише сприяти нашим дослідженням, а й виробляти енергію для нашого народу та зброю для наших збройних сил. Дійсно, деякі з наших вчених висловили прохання використовувати ці об’єкти для створення найпотужнішої та найруйнівнішої зброї, яка тільки можлива."
 nukes: "Ядерна бомба"
 nukes_desc: "Проєкт зі створення атомної бомби стане одним із найтаємничіших і найскладніших завдань, які може взяти на себе держава, але в разі успіху він може змінити не лише хід сучасних воєн, а й майбутнє світу."
 nuclear_10: "Ядерна силова установка"
 nuclear_10_desc: "\n Ядерна морська силова установка — це система руху корабля або підводного човна, що використовує тепло, яке генерується атомною електростанцією. Електростанція нагріває воду для утворення пари, і саме ця пара приводить у дію парові турбіни та турбогенератори. Потім потужність передається на редуктор, який знижує передавальне число приблизно до 50 до 1, і це приводить у дію рушій. Ядерна морська силова установка використовується саме на військових кораблях, таких як суперавіаносці та підводні човни."

 ### Land Doctrines Technology   ########################################################################
 # WW1 + Interwar Doctrines
 Twentieth_Century_Warfare: "Війна у XX столітті"
 Twentieth_Century_Warfare_desc: "З мобілізацією європейських держав на континенті розгорілася повномасштабна війна. По всьому світу люди засвоюють уроки нової війни 20 століття. Жорстока, гучна та безпринципна — минули часи маршів колонами та підняття прапорів. Якщо ми хочемо здобути перевагу в цій новій ері, потрібні нові організаційні структури та тактики."
 Leading_by_Task: "Керівництво за завданнями"
 Leading_by_Task_desc: "Доктрина „Керівництво за завданнями“ наголошує на децентралізованій структурі командування, в якій керівникам доручають конкретні завдання, а не займаються дрібним контролем кожної дії. Такий підхід сприяє ініціативності та адаптивності підлеглих, що дозволяє швидше реагувати на мінливі умови на полі бою. Він ґрунтується на довірі та чіткому розумінні загальної мети, що дає змогу підрозділам діяти самостійно, працюючи над досягненням спільної мети."
 Leading_by_Order: "Керівництво за допомогою наказів"
 Leading_by_Order_desc: "Доктрина „Керівництво за допомогою наказів“ наголошує на централізованому командуванні, в якому рішення приймаються офіцерами вищого рангу та передаються вниз по ланцюгу командування у вигляді чітких наказів. Цей підхід забезпечує сувору дисципліну та контроль над підрозділами, залишаючи мало місця для відхилень від плану. Накази є чіткими та точними, майже не залишаючи підлеглим можливості для власного тлумачення. Хоча це може покращити координацію та зменшити ризик безладних дій, такий підхід також значною мірою залежить від ефективності та рішучості вищого командування, залишаючи менше гнучкості на полі бою."
 Strongpoint: "Опорний пункт"
 Strongpoint_desc: "По всій європейській рівнині траншеї простягаються по всьому ландшафту. Спочатку примітивні, ці бліндажі дають змогу облаштовувати перехідні позиції безпосередньо на полі бою. Концепція опорних пунктів створює зони, де можна використовувати лінії постачання, зв’язку та навіть артилерії для вторгнення або укріплення окремих секторів. На фронті зароджується нова доктрина, і її глибина становить 10 футів."
 Mass_Charge: "Масова атака"
 Mass_Charge_desc: "Хоча війна розпочалася шаленими темпами, зараз вона сповільнилася до повзучого темпу. У спробі прорвати ворожі позиції багато командирів використовують застарілі масові піхотні атаки для перетину так званої «нічиєї землі». Хоча ця тактика принесла певний обмежений успіх, ми несемо великі втрати. Тому, щоб продовжувати цю стратегію, нам потрібно більше бійців для підкріплення наших дивізій."
 Static_Defence: "Статична оборонаe"
 Static_Defence_desc: "Окопана війна стала тепер основною доктриною цього жахливого конфлікту. День у день лінії укріплюються колючим дротом, запаси приховуються, а тунелісти копають. Стає очевидним, що широкомасштабні наступи принесуть лише кров і кілька дюймів території. Перебування під землею, подалі від шквалу куль, забезпечує захист, не схожий на жодний з попередніх конфліктів. Розпочалася війна на виснаження."
 Counterattack: "Контратака"
 Counterattack_desc: "За останні місяці Верховне командування винесло багато уроків щодо наступальних дій в умовах оборони. Тунелісти прокладають шляхи під повітрям, насиченим кулями, офіцери знаходять прориви в колючому дроті, а артилерія створює справжні стіни з снарядів. Поєднання цих тактик із миттєвими контратаками дозволяє нам вимірювати наші здобутки в милях, а не в ярдах."
 Defence_In_Depth: "Глибинна оборона"
 Defence_In_Depth_desc: "Щоб утримати наші армії в конфлікті, потрібні глибші знання тактики укріплення. Окопи прокладаються, звиваючись на милі за полем бою. Розгортаються доти, встановлюється артилерія та розмотується колючий дріт. Буквально ґрунт під нашими ногами оцінюється на предмет його оборонних властивостей. Це вже не статичний фронт — стратегічна глибина є шляхом до повної перемоги."
 Schwerpunkt: "Schwerpunkt"
 Schwerpunkt_desc: "У цій кривавій війні на виснаження широкомасштабні наступи призводять лише до масових втрат. Усі великі битви виснажують людські ресурси країн-учасниць. Натомість використання точки зосередження, або Schwepunkt, принесе тактичний успіх. Кожен підрозділ, рота, офіцер і генерал планують атаку на єдину точку, навіть ризикуючи іншими секторами. Зосереджені ударні сили прорвуть ворожі окопи."
 Separate_Arms_Force: "Збройні сили окремих видів військ"
 Separate_Arms_Force_desc: "Технології йдуть пліч-о-пліч з арміями. Нова металева машина, відома як танк, здатна долати смертоносну середину поля бою та проривати окопи. Літальні апарати, літаки, забезпечують щогодинну розвідку. Артилерія набуває все більшої дальності та калібру. Вона знайшла своє місце в цьому конфлікті, і хоча тактика залишає бажати кращого, її індивідуальний внесок не можна ігнорувати."
 Combined_Arms_Effort: "Об’єднані зусилля"
 Combined_Arms_Effort_desc: "Літаки надсилають звіти про успішні артилерійські залпи. Піхота щільно супроводжує танки через «нічию землю». Повільно, але впевнено ці окремі бойові машини стали невід’ємною частиною сучасної тактики ведення бою. Хоча старі окопи й досі залишаються основним елементом війни, ці технології вкотре змінюють військову доктрину. Метал замінює землю як основний елемент бойового ландшафту."
 Specialized_Branch_Tactical_Experience: "Тактичний досвід спеціалізованих видів військ"
 Specialized_Branch_Tactical_Experience_desc: "Ця жахлива війна зараз перебуває на останньому етапі. За останні кілька років конфлікту ми багато чого навчилися. Наші збройні сили перетворилися на повноцінні, добре розвинені види військ. Наземна піхота, механізовані війська, військово-морські сили відкритого моря та повітряно-десантні війська зараз майстерно доводитимуть це кровопролиття до кінця. Ця доктрина — це майбутнє, хай воно буде світлим чи темним."
 Cross_Branch_Tactical_Experience: "Міжвидовий тактичний досвід"
 Cross_Branch_Tactical_Experience_desc: "Ця жахлива війна зараз перебуває на останньому подиху. За останні кілька років конфлікту ми багато чого навчилися. Наші збройні сили тісно інтегрувалися між окремими родами військ. Військово-морські сили працюють у тандемі з нашими повітряно-десантними флотами, тоді як наземна піхота рухається поряд або трохи позаду нашої механізованої техніки. Ця доктрина — це майбутнє, хай воно буде світлим чи темним."
 Beyond_Trench_Warfare: "Поза межами позиційної війни"
 Beyond_Trench_Warfare_desc: "Велика війна нарешті завершилася. Мільйони людей загинули у найбільшому конфлікті в історії людства.  Індустріалізовані, закріплені в окопах та вибухонебезпечні — бойові дії на полі бою назавжди змінилися. Так багато чого змінилося, і багато хто ще не до кінця розуміє, якою буде доктрина війни за межами окопів. Поки чорнило на договорах ще не висохло, дехто задається питанням, чи це справді кінець, чи лише початок."
 # Mobility Focus
 Mobility_Focus: "Акцент на мобільності"
 Mobility_Focus_desc: "Акцент на мобільності — це тактика, яка використовує швидкість і маневреність для ізоляції та дезорганізації сил супротивника. Замість тривалих лобових боїв ця стратегія передбачає швидкі маневри для прориву слабких місць, обходу укріплень та оточення ворожих підрозділів, відрізаючи їх від постачання, підкріплень та командних структур. Завдяки тому, що вони завжди на крок попереду супротивника, вони зберігають оперативний імпульс і здобувають перевагу, перш ніж ворог встигне перегрупуватися чи зреагувати."
 Spearhead: "Spearhead"
 Spearhead_desc: "Щоб прорвати лінії супротивника, наші бронетанкові сили повинні зосередитися на невеликому фронті та перевершити супротивника. Під час наступу вони повинні мати підтримку піхоти з тилу, щоб захистити свої вразливі фланги та прикрити можливі контратаки. Ці самостійні підрозділи забезпечать нам значну перевагу над будь-якими піхотними силами, з якими ми зіткнемося."
 Armored_Schwerpunkt: "Броньований Шверпункт"
 Armored_Schwerpunkt_desc: "Термін «Шверпункт», або «точка головного зусилля», означає практику концентрації танків, артилерії, піхоти та безпосередньої авіаційної підтримки в одному критично важливому місці з метою прориву ліній противника. Крім того, після прориву нападники продовжують наступ, оточуючи, ізолюючи або обходячи опорні пункти противника, не застрягаючи в боях. Потужні резерви залишаються мобільними, щоб провести контратаку там, де це необхідно, та забезпечити оборонне прикриття для бронетехніки."
 Combined_Arms_Offensive: "Наступ з використанням різних видів військ"
 Combined_Arms_Offensive_desc: "Наступ з використанням різних видів військ» визначається як скоординоване розгортання декількох бойових сил для досягнення переваги на полі бою. Основна мета полягає в тому, щоб перевершити противника, зробивши його вразливим принаймні до одного виду сил, незалежно від того, як він реагуватиме. Крім того, кожен компонент наступу прагне використовувати свої сильні сторони, щоб компенсувати слабкі сторони інших."
 Delay: "Затримка"
 Delay_desc: "Засідки, блокпости та операції типу «удар і втеча» можуть допомогти уповільнити наступ противника, даючи час на підкріплення та відхід. Ці операції можуть перетворити короткострокові втрати на довгострокові здобутки, виснажуючи супротивника або змінюючи загальну ситуацію на полі бою. Хоча вони й не можуть перемогти супротивника, вони здатні схилити шальки терезів на свою користь у масштабній кампанії."
 Elastic_Defense: "Еластична оборона"
 Elastic_Defense_desc: "Еластична оборона — це динамічна оборонна тактика, яка зменшує людські втрати шляхом затримки та виснаження противника за рахунок відступу з території, з подальшими контратаками, коли нападник стає вразливим. Крім того, завдяки створенню «глибшого» шару укріплень еластична оборона дає захиснику більше часу для реагування та проведення контратаки, поки нападник розтягнутий і сповільнений. Як наслідок, щоб створити навантаження на логістику нападника, захисник може поступитися слабо захищеною територією."
 Kampfgruppe: "Kampfgruppe"
 Kampfgruppe_desc: "Термін «Kampfgruppe» позначає бойове формування, що складається з бронетехніки, піхоти та артилерії й адаптоване до вимог конкретного завдання. Воно сприяє гнучкості та локальній перевазі, зберігаючи при цьому децентралізоване командування. Ще однією перевагою є те, що вона сприяє стійкості та може полегшити співпрацю між підрозділами."
 Firebrigades: "Пожежні загони"
 Firebrigades_desc: "Пожежні загони не входять до стандартного бойового плану, але призначені для швидкого усунення прогалин або подолання несподіваних перешкод, подібно до того, як пожежна служба реагує на пожежу. Відповідно, їхня головна мета — локалізувати та, якщо можливо, вирішити ці проблеми, а це означає, що вони готові до дій практично без попередження."
 Spearhead_HQs: "Штаби передових підрозділів"
 Spearhead_HQs_desc: "Основним завданням штабів передових підрозділів є якнайшвидше встановлення командування та управління, формування обстановки на полі бою та надання оперативної інформації командувачам вищого рівня. Крім того, вони покликані негайно взяти на себе командування об’єднаними або комбінованими силами, інтегруючи інформацію, логістику та зв’язок для забезпечення швидких і рішучих дій. Вони є важливою структурою в операціях «Spearhead», оскільки забезпечують необхідну організацію для продовження наступу військ."
 Modern_Blitzkrieg: "Сучасний бліцкриг"
 Modern_Blitzkrieg_desc: "Наші зусилля, спрямовані на вивчення досвіду нашої армії, привели до створення вершини сучасного бойового мистецтва — «Сучасного бліцкригу». Переважна концентрація бронетанкових підрозділів, піхоти та артилерії у поєднанні з постійною повітряною підтримкою стала нашим стандартним способом ведення бою проти будь-якого супротивника, з яким ми можемо зіткнутися. Ми можемо перемогти будь-яку армію за допомогою швидких і рішучих боїв, завдавши нищівного удару ще до того, як вона встигне повністю мобілізуватися."
 # Planning Focus
 Planning_Focus: "Фокус на плануванні"
 Planning_Focus_desc: "Для перемоги в будь-якому конфлікті абсолютно необхідні ретельне планування та підготовка. Отже, якщо ми хочемо оволодіти мистецтвом ведення війни, наші генерали та офіцери повинні зосередитися на ретельному плануванні кожного аспекту та кожної деталі перед початком будь-якого бою — чи то наступальний план, чи то оборонна стратегія. Тільки таким чином ми зможемо розгромити ворожі війська та оголосити про перемогу."
 Grand_Battle_Plan: "Генеральний план битви"
 Grand_Battle_Plan_desc: "Як показала Велика війна, якщо ми хочемо побудувати неприступну оборону та розпочати масштабні наступальні маневри, ми повинні зібрати величезні обсяги інформації, щоб уникнути несподіваних викликів. Це надасть нам значну стратегічну перевагу над супротивниками, що дозволить нам безперешкодно проводити великомасштабні операції."
 Trench_Warfare: "Окопна війна"
 Trench_Warfare_desc: "Попередні міжнародні конфлікти продемонстрували, що окоповальна війна — це єдина стратегія ведення масштабних бойових дій. Ми вдосконалимо нашу бойову стратегію, щоб гарантувати, що наші війська завжди будуть добре укріплені в окопах і зможуть займати позиції вчасно та ефективно. Наші окопи стануть неприступними, грізними фортецями."
 Mass_Assault: "Масовий наступ"
 Mass_Assault_desc: "Безсумнівно, єдиний спосіб подолати й здолати оборонні позиції ворога — це атакувати їх такою величезною кількістю солдатів, щоб вони були змушені здатися або зіткнутися зі смертю. Наші війська мають безжально атакувати будь-якого супротивника, з яким зіткнуться, і забезпечити досягнення поставленої мети за будь-яку ціну. Кількість завжди переважатиме якість."
 Pre_Planned_Defense: "Спланована оборона"
 Pre_Planned_Defense_desc: "Згідно з дослідженнями та статистикою, якщо ми підготуємо нашу оборону задовго до ворожих атак, ми зможемо відбити будь-який напад, хай який великий, що може бути здійснений проти наших військ. Усі командири триматимуть свої війська в окопах і готовими до будь-якої оборонної операції, що може виникнути. Ми ніколи не станемо жертвами раптового нападу."
 Central_Planning: "Центральне планування"
 Central_Planning_desc: "Як зазначалося раніше, секрет успіху будь-якої наступальної операції полягає в ретельному плануванні та належній співпраці між нашими розвідувальними підрозділами. Ми маємо забезпечити, щоб кожен наш напад був добре спланований і підкріплений усією необхідною розвідувальною інформацією. Офіцери з усіх підрозділів тепер працюватимуть разом, щоб організувати операцію так, щоб вона пройшла якомога злагодженіше."
 Attritional_Containment: "Виснажувальне стримування"
 Attritional_Containment_desc: "Якщо ми не в змозі розпочати наступальну операцію з метою знищення позицій ворога, необхідно постійно проводити дрібні атаки. Це призведе до втрат у лавах супротивника та не дасть йому можливості розпочати власний наступ. Крім того, постійні атаки підірвуть бойовий дух ворожих військ, які будуть постійно зазнавати утисків і не зможуть організувати жодної значущої операції або відпочити й відновитися після наших попередніх наступальних операцій."
 Assault_Breakthrough: "Прорив"
 Assault_Breakthrough_desc: "Зосередження наступу на одному фронті часто є набагато ефективнішим, ніж проведення масштабного наступу на всіх фронтах. Щоб звести до мінімуму втрати в живій силі та матеріальні втрати, наші командири прагнутимуть прорвати оборону в одній або двох стратегічно обраних точках. Після прориву наші війська увірвуться в пролом і використають його, розбивши ворожі лінії та завдавши величезних втрат."
 Operational_Stages: "Етапи операції"
 Operational_Stages_desc: "Напад на весь фронт навряд чи буде успішним і може коштувати нам великої кількості військ та ресурсів. Ми проводитимемо наші наступальні маневри поетапно, зосереджуючи війська на менших фронтах, де ми маємо найбільші шанси здобути перевагу та досягти значного просування. Застосовуючи цей метод, ми зможемо подолати лінії ворога та зруйнувати весь фронт."
 Branch_Interoperability: "Співпраця між родами військ"
 Branch_Interoperability_desc: "Співпраця між родами військ є надзвичайно важливою в будь-якій армії, як під час оборонних, так і наступальних операцій. Ми докладатимемо зусиль для покращення взаємовідносин між повітряними силами, флотом та сухопутними військами, навіть якщо це рішення буде непопулярним. Це надасть нам величезні переваги, оскільки співпраця матиме вирішальне значення для того, щоб перевершити наших конкурентів."
 Assault_Concentration: "Концентрація сил для наступуn"
 Assault_Concentration_desc: "Перед початком атаки передові підрозділи ретельно готуються та розгортаються на передових позиціях, що дозволяє застосувати максимальну силу на початкових етапах. Крім того, наступальні сили складатимуться з піхотних та бронетанкових дивізій, що гарантуватиме, що наші успіхи не будуть легко зведені нанівець ворожими контратаками. Усі наступальні операції, що використовують цю тактику, майже напевно закінчаться успіхом."
 Light_Mobility: "Легка мобільність"
 Light_Mobility_desc: "У міру розвитку технологій та військової справи мобільність набуває дедалі більшого значення для наступальних операцій, адже навіть незначні зміни швидкості можуть зірвати навіть найпотужніший наступ. Наші генерали та офіцери почнуть моторизувати наші збройні сили, щоб забезпечити настільки необхідну мобільність для наших наступальних операцій. Часи наступальних операцій із використанням повільної піхоти минули."
 Combined_Arms: "Об’єднані види військ"
 Combined_Arms_desc: "Коли піхота, бронетехніка та підрозділи підтримки діють спільно, вони набагато ефективніші, ніж при окремому застосуванні. Танки можуть прорвати лінії ворога завдяки швидкості та вогневій потужності, тоді як піхота та підрозділи підтримки можуть заповнювати прогалини та відбивати контратаки ворога. Об’єднавшись у злагоджену систему, вони утворять грізну та маневрену силу, якої боятиметься кожен ворог, з яким ми зіткнемося."
 Infiltration_Assault: "Проникнення та штурм"
 Infiltration_Assault_desc: "Піхота повинна наносити удари по слабких місцях лінії противника на початкових етапах атаки, щоб обійти та ізолювати краще захищені ділянки, які потім зможуть знищити решта атакуючих військ. Якщо їм вдасться проникнути в лінії противника, ці лінії можуть зруйнуватися й бути знищені військами. Однак такі атаки слід проводити з обережністю, щоб не зірвати ефект несподіванки."
 Infiltration_in_Depth: "Глибинна інфільтрація"
 Infiltration_in_Depth_desc: "Щоб завдати вирішального удару та здійснити прорив, який можна буде розвинути, ми будемо навчати наші війська обходити та ізолювати опорні пункти противника. Наші штурмові війська досягнуть своєї мети лише в тому випадку, якщо ворог буде повністю відрізаний від усіх ліній зв’язку та постачання. Це викличе паніку серед солдатів і командирів, створивши ідеальні умови для решти військ, щоб розпочати наступ і паралізувати ворожі лінії."
 Light_Infantry_Tactics: "Тактика легкої піхоти"
 Light_Infantry_Tactics_desc: "Ці доктрини навчають піхотні підрозділи проникати в позиції ворога під прикриттям темряви або рельєфу місцевості, завдаючи ударів у вразливих місцях оборони, замість того щоб покладатися на переважну вогневу міць або масові атаки. Завдяки акценту на лідерстві та ініціативі невеликих підрозділів формування легкої піхоти стають більш стійкими та здатними проводити безперервні наступальні операції навіть у складних умовах. Ця стратегія покращує організацію та збільшує потенціал прориву, дозволяючи нашим військам довше утримувати позиції та просуватися глибше під час атак."
 # Firepower Focus
 Firepower_Focus: "Фокус на вогневу міць"
 Firepower_Focus_desc: "Трагедії Великої війни продемонстрували, що кидатися на ворога не тільки не приносить перемоги в боях, а й призводить до марнування людських ресурсів, які ми, можливо, ніколи не зможемо відновити. Відтепер наша стратегія полягатиме в тому, щоб зосередити зусилля на зосередженні величезних обсягів артилерії, здатної обстрілювати та знищувати сили супротивника без необхідності прямого зіткнення наших солдатів з ними. Сподіваємося, що це дозволить зменшити кількість жертв, знищуючи сили противника без єдиного пострілу з гвинтівки."
 Superior_Firepower: "Переважна вогнева потужність"
 Superior_Firepower_desc: "Зробивши акцент на артилерії та зброї підтримки, ми зможемо максимально збільшити збитки, завдані силам, з якими боремося, одночасно захищаючи наші війська від самогубних атак, спрямованих на прорив ліній противника. Точний вогонь і безперервні залпи розбиватимуть ворожі формування, порушуватимуть структури командування та підриватимуть бойовий дух задовго до початку прямих боїв. Крім того, такий підхід не лише рятує життя, а й забезпечує стратегічну перевагу завдяки тактичній дисципліні та досконалій інтеграції озброєння."
 Delay_2: "Затримка"
 Delay_2_desc: "Засідки, блокпости та операції типу «удар і втеча» можуть допомогти уповільнити наступ противника, даючи час на підкріплення та відхід. Ці операції можуть перетворити короткострокові втрати на довгострокові здобутки, виснажуючи супротивника або змінюючи загальну ситуацію на полі бою. Хоча вони й не можуть перемогти супротивника, вони здатні схилити шальки терезів на свою користь у масштабній кампанії."
 Mobile_Defense: "Мобільна оборона"
 Mobile_Defense_desc: "Статичні оборонні формування можуть бути проблематичними, оскільки їх підкріплення вимагає часу та зусиль. Щоб вирішити цю проблему, ми зробимо акцент на стратегічному розгортанні мобільних військ як першому заході у разі загрози прориву оборонної лінії. Це забезпечить значну перевагу, оскільки ми зможемо легше відбивати атаки та підкріплювати наші війська за потреби."
 Stand_Off: "Стійкість"
 Stand_Off_desc: "Покращення тактичної дисципліни, зв’язку та структури командування дозволить нашим піхотним формуванням ефективно діяти в бою навіть за екстремальних умов. Коли війська краще організовані, вони можуть утримувати позиції довше, швидше перегруповуватися та ефективніше реагувати на мінливі умови на полі бою. Наша піхота набуває значної стійкості, що дозволяє їй проводити тривалі операції з більшою впевненістю та стабільністю."
 Integrated_Support: "Інтегрована підтримка"
 Integrated_Support_desc: "Роти підтримки мають вирішальне значення для організації будь-якого підрозділу, особливо піхотних і танкових. Якщо ми хочемо, щоб вони працювали ефективно та надавали найкращу можливу підтримку нашим бійцям, ми повинні повністю інтегрувати їх у наші дивізії. Сили підтримки тісно інтегровані з бойовими військами, що робить дивізії більш боєздатними в наступальних операціях."
 Regimental_Combat_Teams: "Полкові бойові групи"
 Regimental_Combat_Teams_desc: "Піхотні полки тісно співпрацюють із підрозділами підтримки, такими як артилерія, танки та розвідувальні підрозділи, утворюючи полкові бойові групи, що є невеликими, самодостатніми підрозділами з більшою гнучкістю в наступі. Ці об’єднані збройні формування призначені для автономних дій, що дозволяє їм швидко реагувати на мінливі тактичні умови, не покладаючись на централізоване командування чи підкріплення з вищого рівня."
 Mechanized_Offensive: "Механізований наступ"
 Mechanized_Offensive_desc: "Моторизовані війська традиційно демонструють високу ефективність, але для ведення наступальних операцій нам потрібні піхотинці, здатні вирушати в бій на броньованих машинах, що можуть перевозити та захищати важке озброєння. Крім того, хоча бронетехніка може дещо уповільнювати загальний наступ, вона забезпечує критично важливий захист, що дозволяє нам зменшити втрати та робить механізованих солдатів грізним супротивником для ворожих армій."
 Combined_Arms_Defense: "Об’єднана оборона"
 Combined_Arms_Defense_desc: "Завдяки кращій координації військ, бронетехніки та сил підтримки ми можемо створити міцну лінію фронту, здатну відбити навіть найрішучіші атаки. Ця нова оборонна стратегія наголошує на покращенні зв’язку, скоординованих маневрах та взаємодопомозі між різними родами військ, що дозволяє їм покривати слабкі місця один одного. Наші фронтові батальйони будуть краще організовані та здатні витримувати атаки ворога."
 Airland_Battle: "Повітряно-наземна битва"
 Airland_Battle_desc: "Як зазначалося раніше, наші наступальні та оборонні стратегії ґрунтуються на ідеї, що наші війська мають отримувати підтримку та захист ще до вступу в бій. Тому ми будемо співпрацювати з військово-повітряними силами, щоб забезпечити постійний захист наших солдатів з повітря. Захоплення контролю над повітряним простором — це не просто перевага, це необхідність."
 # Manpower Focus
 Manpower_Focus: "Фокус на людський ресурс"
 Manpower_Focus_desc: "Ми не повинні марнувати цінні ресурси та час на дослідження й розробку складних і високотехнологічних видів озброєння для оснащення наших військ. Наші війська можуть перемогти будь-якого ворога, незалежно від того, наскільки сучасним є його спорядження, якщо ми розгорнемо їх у достатній кількості та забезпечимо високий бойовий дух і дисципліну. Зосередившись на створенні великої, добре навченої та мотивованої армії, ми зможемо забезпечити перемогу завдяки людській рішучості та чисельній перевазі."
 Peoples_Army: "Народна армія"
 Peoples_Army_desc: "Ми ставимо людей вище за зброю, вірячи, що вища мотивація компенсує відсталість у технологіях, що вимагає широкої підтримки громадян. Крім того, ця армія буде воювати й перемагати будь-якого супротивника в ім’я народу. Їхня підтримка, внесок та жертви становлять основу будь-яких національних зусиль, які спонукатимуть кожного чоловіка до повної перемоги над будь-якими ворожими збройними силами."
 Large_Front: "Великий фронт"
 Large_Front_desc: "Щоб підтримувати злагоджені та добре організовані фронти, ми мусимо покращити здатність наших солдатів до координації дій на великих територіях. Крім того, використовуючи цей метод, армії можуть витримувати тривалі конфлікти, переграючи супротивників завдяки чистій глибині, масштабу та організаційній перевазі. Цей метод наголошує на інтеграції та синхронізації численних дивізій, корпусів або навіть цілих армій для досягнення стратегічних цілей на кількох фронтах."
 Large_Formation_SOP: "Стандартні оперативні процедури для великих формувань"
 Large_Formation_SOP_desc: "Замість того, щоб покладатися на передові технології чи точні удари, ми виснажимо супротивника постійним тиском і чисельною перевагою. Ця техніка значною мірою спирається на ефективне використання ресурсів та спрощену логістику, щоб забезпечити війська провіантом і готовністю до тривалих бойових дій навіть у суворих умовах. Дисципліна, рішучість та скоординовані дії можуть виснажити будь-якого супротивника."
 Pocket_Defense: "Оборона в оточенні"
 Pocket_Defense_desc: "Зіткнувшись з оточенням ворога, наші війська повинні зробити все, що в їхніх силах, щоб завдати якомога більше втрат, витримуючи до останнього патрона й останнього бійця. Кожен постріл, кожна витрачена хвилина та кожен удар, завданий ворогу, повинні слугувати вищій меті: затримати, ослабити та виснажити нападника. Їхня жертва не буде марною, а стане свідченням духу опору."
 Defense_in_Depth_2: "Глибинна оборона"
 Defense_in_Depth_2_desc: "Здійснюючи виважений, помірний опір і тимчасово поступаючись позиціями, ми можемо обміняти простір на час, затягуючи сили супротивника глибше в нашу оборону. Ця стратегія дає цінний час для перегрупування, підкріплення критично важливих ділянок та планування контратаки. Цей тактичний маневр зриває їхній натиск, одночасно зміцнюючи наші оборонні можливості, що дозволяє нам повернути ініціативу. Коли супротивник виснажений, перевтомлений і втрачає координацію, з’являється можливість завдати вирішального удару."
 Movement_Speed_Offensive: "Теорія швидкого наступу"
 Movement_Speed_Offensive_desc: "Теорія швидкого наступу значно зменшує організаційні втрати під час руху, гарантуючи, що наші підрозділи залишаються згуртованими та готовими до негайних дій навіть у дорозі. Завдяки прискореній швидкості підкріплення ми гарантуємо, що будь-які прогалини в наших рядах швидко заповнюються, що дозволяє продовжувати наступ. Це також дасть нам змогу наносити швидкі та рішучі удари, залишаючись пристосованими до змін на полі бою."
 Mechanized_Wave: "Механізована хвиля"
 Mechanized_Wave_desc: "Механізовані війська найкраще підходять для швидкого просування з метою повного використання проривів, надання підтримки бронетанковим підрозділам та захисту флангів прориву. Після того як бронетанкові війська прорвуть лінії ворога, механізована піхота може стрімко рушити вперед, щоб підтримати та закріпити просування, не даючи ворогу перегрупуватися або підкріпити свої позиції."
 Peoples_War: "Народна війна"
 Peoples_War_desc: "Хоча битви виграють люди та кулі, війни виграє народ. Якщо ми хочемо здобути повну перемогу над ворогами, ми мусимо забезпечити, щоб кожна жінка, кожен чоловік і кожна дитина внесли свій унікальний вклад у військові зусилля. Ці колективні зусилля не лише зміцнюють нашу рішучість, а й плекають почуття єдності та спільної мети серед народу, що, безсумнівно, приведе нас до перемоги."
 Rural_Guerilla_Tactics: "Тактика партизанської війни"
 Rural_Guerilla_Tactics_desc: "Ворог не повинен мати ані хвилини перепочинку, адже кожна секунда, протягом якої він проявляє силу, може призвести до загибелі одного з наших солдатів. Командири повинні наказати своїм військам вести диверсійні дії проти ворожих формувань, незалежно від того, чи ті втікають, чи атакують. Крім того, якщо наші бійці відірвалися від свого підрозділу, вони повинні застосовувати партизанські тактики, щоб обмежити можливості ворога щодо оборони."
 Mobile_Guerilla_Warfare: "Мобільна партизанська війна"
 Mobile_Guerilla_Warfare_desc: "Зосереджуючись на швидких, непередбачуваних переміщеннях та боях, наші сили залишаються важкодоступними та гнучкими, змушуючи ворога постійно бути насторожі. Крім того, цей підхід до ведення бою ґрунтується на тактиці «удар і втеча», що дозволяє нашим військам швидко відновлюватися та перегруповуватися після кожної сутички. Чи то підриваючи ворожі лінії постачання, чи то здійснюючи раптові удари, ми завжди на крок попереду, готові завдати удару тоді, коли цього найменше очікують, і швидко відновлюватися."
 Revolutionary_Base_Areas: "Революційні бази"
 Revolutionary_Base_Areas_desc: "Революційні бази слугують основою для наших довгострокових операцій, надаючи нам гнучкість і стійкість, необхідні для ведення боїв на кількох фронтах, незважаючи на спроби ворога порушити наші лінії постачання. Зосереджуючись на критично важливих пунктах постачання ресурсів та притулків, ми гарантуємо, що наші війська будуть добре забезпечені навіть у найекстремальніших умовах. Це гарантує, що наша сила залишатиметься непохитною, незалежно від викликів, з якими ми стикаємося."
 Revolutionary_Base_Areas_Expansion: "Розширення революційних баз"
 Revolutionary_Base_Areas_Expansion_desc: "Розширення революційних базових районів дає нам змогу будувати ще більше укріплених центрів постачання, що забезпечує більший вплив і контроль над критично важливими регіонами. Збільшуючи кількість критичних зон, ми не лише зменшуємо ймовірність дефіциту постачання, а й зміцнюємо та підтримуємо мережі забезпечення наших військ. Ця розгалужена мережа підвищує гнучкість, дозволяючи нашим силам ефективно діяти на величезних територіях."
 Asymmetric_Warfare: "Асиметрична війна"
 Asymmetric_Warfare_desc: "Незалежно від сили ворога чи його величезних ресурсів, наші війська будуть боротися, використовуючи всі можливі стратегії, щоб відбити атаки та перемогти його. Будь то партизанська війна чи самогубні атаки, наші солдати атакуватимуть ворога, незважаючи на ціну чи ризик. Кожна битва стане не лише кроком назустріч перемозі, а й продемонструє стійкість та мужність нашого народу."
 Deep_Operations: "Глибокі операції"
 Deep_Operations_desc: "Поєднуючи спеціалізовані танки з покращеною організацією та швидкістю, ми створюємо непереборну силу, здатну точно проривати лінії ворога. Завдяки посиленому прориву армії ми гарантуємо, що наші війська зможуть використовувати слабкі місця в обороні ворога та невпинно наступати. Ця стратегія дозволяє нам зберігати імпульс і змушувати супротивника відступати, залишаючись при цьому гнучкими та автономними на всіх рівнях."

 #### Special Technology #############################################################
 FIN_ski_infantry: "Лижні війська"
 FIN_improvised_at: "Імпровізована протитанкова зброя"
 FIN_concentrated_fire: "Зосереджений вогонь"

 #### Industry Technology #############################################################
 Industrial_Management: "Управління промисловістю"
 Industrial_Management_desc: "Управління промисловістю впорядковує хаос масового виробництва. Завдяки організації праці, оптимізації логістики та координації обсягів виробництва між заводами воно забезпечує злагоджену роботу матеріалів, робочої сили та обладнання. Належний контроль зменшує вузькі місця, покращує ланцюги постачання та дає можливість планувальникам швидко реагувати на зміни попиту."
 Factory_Electrification: "Електрифікація заводів"
 Factory_Electrification_desc: "Електрифікація заводів замінює застарілі механічні системи на електроенергію, що забезпечує більшу надійність та гнучкість обладнання. Електродвигуни зменшують витрати на технічне обслуговування, підвищують безпеку та збільшують продуктивність, забезпечуючи швидшу та стабільнішу роботу."
 Facilities_Design: "Проектування виробничих об’єктів"
 Facilities_Design_desc: "Проектування виробничих об’єктів зосереджується на оптимізації планування та інфраструктури виробничих підприємств з метою підвищення ефективності та поліпшення робочих процесів. Воно передбачає стратегічне розміщення обладнання, сировини та робочих місць для скорочення простоїв, підвищення безпеки працівників та збільшення загальної продуктивності."
 Moving_Assembly_Line: "Рухома складальна лінія"
 Moving_Assembly_Line_desc: "Рухома складальна лінія трансформує масове виробництво завдяки впровадженню безперервного, автоматизованого процесу складання продукції. Працівники можуть зосередитися на конкретних завданнях, що виконуються у чіткій послідовності, розміщуючи виріб на конвеєрній системі, яка рухається через різні станції. Ця система значно скорочує час виробництва, збільшує обсяг випуску та знижує витрати на робочу силу, що робить її ключовим компонентом великомасштабного виробництва, особливо для складних виробів, таких як транспортні засоби та машини."
 Mass_Production: "Mасове виробництво"
 Mass_Production_desc: "Масове виробництво — це використання стандартизованих технологій та обладнання для своєчасного й ефективного випуску великих партій однакових виробів. Масове виробництво економить час, кошти та трудові ресурси завдяки застосуванню автоматизованих систем, конвеєрних ліній та взаємозамінних деталей. Цей метод є особливо корисним у таких галузях, як автомобілебудування, виробництво побутової електроніки та зброї."
 Skilled_Workforce: "Кваліфікована робоча сила"
 Skilled_Workforce_desc: "Кваліфікована робоча сила — це група працівників, які мають спеціалізовані знання, підготовку та досвід у конкретній галузі чи професії. Ці працівники здатні виконувати завдання, що вимагають вищого рівня кваліфікації, який часто здобувається завдяки формальній освіті, професійному навчанню або багаторічному практичному досвіду. Виробництво, інженерія, охорона здоров’я та інформаційні технології — всі ці галузі потребують кваліфікованої робочої сили для виконання точних, складних завдань та використання передових технологій."
 Dispersed_Industry: "Розпорошена промисловість"
 Dispersed_Industry_desc: "Розпорошена промисловість — це практика розподілу промислового виробництва між кількома локаціями замість його концентрації в одній центральній зоні. Ця стратегія спрямована на зменшення ризиків, пов’язаних із зосередженням усього виробництва в одному місці, таких як вразливість до стихійних лих, ворожих атак або перебоїв у ланцюгах постачання. Розподіл промислових об’єктів дозволяє країні чи компанії забезпечити безперебійність роботи, підвищити стійкість та, потенційно, оптимізувати регіональний економічний розвиток. Місцеві ресурси, нижчі витрати на робочу силу та зменшення заторів можуть сприяти розвитку розсіяної промисловості."
 Concentrated_Industry: "Зосереджена промисловість"
 Concentrated_Industry_desc: "Зосереджена промисловість — це практика централізації промислового виробництва в декількох ключових місцях, зазвичай у межах певного регіону або міської агломерації. Такий підхід забезпечує економію масштабу, завдяки якій великі заводи та підприємства можуть працювати ефективніше, знижуючи виробничі витрати на одиницю продукції. Він також забезпечує легший доступ до кваліфікованої робочої сили, розвиненої інфраструктури та ширшої споживчої бази. Завдяки близькому розташуванню ресурсів, талановитих фахівців та науково-дослідних центрів концентровані галузі можуть стимулювати прискорення інновацій та технологічного прогресу."
 Factory_Controllers: "Контролери на заводах"
 Factory_Controllers_desc: "Контролери на заводах — це спеціалісти або системи, відповідальні за нагляд та управління виробничими процесами на виробничих об’єктах. До їхніх основних обов’язків належать моніторинг виробничих ліній, забезпечення справності машин та обладнання, управління персоналом та оптимізація використання сировини. Контролери також приділяють першочергову увагу дотриманню високих стандартів контролю якості, виконанню виробничих планів та зменшенню відходів або неефективності у виробничому процесі."
 Assembly_Lines: "Конвеєрні лінії"
 Assembly_Lines_desc: "Конвеєрні лінії — це виробничий процес, під час якого вироби послідовно збираються на ряді етапів, причому кожен працівник або верстат виконує конкретне завдання. Цей метод значно підвищує ефективність виробництва завдяки розбиттю виробничого процесу на спеціалізовані завдання. Працівники або верстати транспортують частково зібрані вироби за допомогою конвеєрної стрічки до наступної станції, де додаються додаткові компоненти або виріб піддається подальшій обробці."
 Serial_Production: "Серійне виробництво"
 Serial_Production_desc: "Серійне виробництво — це безперервне, оптимізоване виготовлення стандартизованих товарів послідовними партіями. Кожен виріб проходить однакові етапи виробництва, що забезпечує ефективність та стабільність якості при великих обсягах. На відміну від масового виробництва, яке вимагає постійного повторення, серійне виробництво допускає періодичні зміни в дизайні або конфігурації, зберігаючи при цьому єдині процеси складання.."
 Parallel_Production: "Паралельне виробництво"
 Parallel_Production_desc: "Паралельне виробництво — це метод виробництва, при якому кілька одиниць або типів продукції виготовляються одночасно на окремих лініях або робочих місцях. На відміну від серійного виробництва, яке дотримується фіксованої послідовності для кожної одиниці, паралельне виробництво дозволяє виконувати різні процеси одночасно, що значно підвищує пропускну здатність і гнучкість. Цей метод особливо корисний, коли час має вирішальне значення або коли перед остаточною збіркою необхідно окремо виготовити кілька компонентів. Воно зменшує вузькі місця завдяки розподілу навантаження, підвищує резервність на випадок виходу обладнання з ладу та дає змогу підприємствам швидко реагувати на зміни попиту."
 Modular_Design: "Модульна конструкція"
 Modular_Design_desc: "Модульна конструкція — це інженерно-виробнича філософія, за якої вироби складаються зі стандартизованих, автономних компонентів, відомих як модулі, які можна створювати, обслуговувати, модернізувати або замінювати незалежно один від одного. Кожен модуль виконує конкретне призначення, а разом вони утворюють цілісну систему. Такий підхід спрощує процеси виробництва та ремонту, скорочує час розробки та забезпечує високий рівень індивідуалізації без необхідності перепроектування всього виробу."
 Bespoke_Design: "Індивідуальне проектування"
 Bespoke_Design_desc: "Індивідуальне проектування — це процес створення обладнання, інструментів або механізмів, адаптованих до конкретних експлуатаційних вимог, замість використання стандартизованих моделей масового виробництва. Цей підхід ставить на перше місце індивідуальне налаштування, гарантуючи, що кожна деталь — від матеріалів до компонування системи — адаптована до конкретного середовища, користувача або завдання. Хоча індивідуальне проектування вимагає більше ресурсів і часу, ніж модульні або серійні методи виробництва, воно забезпечує значні переваги, коли вирішальне значення мають продуктивність, точність або нішева функціональність."
 Production_Scheduling: "Планування виробництва"
 Production_Scheduling_desc: "Планування виробництва — це процес планування та організації виробничих завдань з метою максимального використання часу, робочої сили та матеріалів. Воно визначає, коли і як виконується кожне завдання, синхронізуючи обладнання, робочу силу та ресурси з термінами поставки та цільовими показниками випуску. Ефективне планування скорочує простої, усуває вузькі місця та підвищує загальну продуктивність. Воно дозволяє підприємствам переходити від одного типу продукції до іншого з мінімальними перебоями, одночасно збалансовуючи навантаження між різними відділами або виробничими лініями."
 Basic_Construction_Machines: "Основні будівельні машини"
 Basic_Construction_Machines_desc: "BОсновні будівельні машини забезпечують механічну допомогу у виконанні важких робіт, які раніше виконувалися лише вручну або за допомогою тварин. До них належать ранні бульдозери, парові екскаватори, крани та бетономішалки, які значно скорочують час і трудові ресурси, необхідні для будівництва інфраструктури — від доріг до заводів."
 Novel_Drills: "Новітні бурові машини"
 Novel_Drills_desc: "Прогрес у технології буріння підвищив швидкість, точність та довговічність земляних та бурових робіт. Ці інноваційні бурові машини, що працюють на компактних двигунах або за допомогою ранніх електричних систем, замінили старі ручні та парові інструменти на більш ефективні роторні та ударні механізми."
 Contemporary_Construction_Standards: "Сучасні будівельні стандарти"
 Contemporary_Construction_Standards_desc: "Сучасне будівництво виграє від переходу до стандартизованих будівельних практик, що забезпечують послідовність, безпеку та ефективність. Ці стандарти визначають матеріали, вимоги до несучої здатності та допуски при проектуванні, що зменшує кількість руйнувань конструкцій та покращує сумісність між проектами та регіонами. Архітектори та будівельники можуть оптимізувати планування та забезпечити сумісність із новими технологіями, такими як префабрикація та модульне складання, завдяки впровадженню уніфікованих норм та інженерних принципів."
 Advanced_Drilling_Method: "Сучасні методи буріння"
 Advanced_Drilling_Method_desc: "Сучасні технології буріння підвищують швидкість, точність та універсальність у будівництві, гірничій промисловості та розвитку інфраструктури. Ці методи передбачають використання обладнання з прецизійним наведенням, роторних та ударних систем, а також бурових головок, здатних адаптуватися до різноманітних геологічних умов."
 Construction_Site_Management: "Управління будівельним майданчиком"
 Construction_Site_Management_desc: "Ефективне управління будівельним майданчиком має вирішальне значення для вчасного виконання великомасштабних будівельних проєктів у межах бюджету. Ця дисципліна координує роботу персоналу, обладнання, матеріали та протоколи безпеки, щоб забезпечити безперебійний хід щоденних робіт. Чітке розподілення завдань, логістичне планування, мінімізація ризиків та комунікація між інженерними та робочими бригадами — все це є важливими найкращими практиками. Ефективний нагляд за будівельним майданчиком мінімізує затримки, запобігає нещасним випадкам та забезпечує дотримання нормативних вимог."
 Mineral_Discovery: "Розвідка корисних копалин"
 Mineral_Discovery_desc: "Пошук цінних родовищ корисних копалин має вирішальне значення для промислового розвитку та стратегічного планування ресурсів. Досягнення в галузі геологічної розвідки, відбору кернів та методів дистанційного зондування дозволяють точніше ідентифікувати та оцінювати підземні запаси."
 Heavy_Load_Transport_Trucks: "Вантажні автомобілі для перевезення важких вантажів"
 Heavy_Load_Transport_Trucks_desc: "Вантажні автомобілі для перевезення важких вантажів, призначені для транспортування величезних обсягів матеріалів, обладнання та поставок, є логістичною основою сучасної промисловості та військових операцій. Ці автомобілі, оснащені посиленим шасі, двигунами з високим крутним моментом та здатністю до руху по будь-якій місцевості, можуть з легкістю перевозити вантажі на великі відстані та по пересіченій місцевості. Вони збільшують оперативний радіус дії та ефективність, забезпечуючи передову або підтримуючи великомасштабні будівельні проєкти."
 Superior_Soil_Surveys: "Поглиблені геологічні дослідження ґрунтів"
 Superior_Soil_Surveys_desc: "Точне розуміння рельєфу місцевості має вирішальне значення для ефективного будівництва та освоєння ресурсів. Поглиблені ґрунтові дослідження дозволяють оцінити склад ґрунту, його стабільність та несучу здатність завдяки використанню сучасних методів відбору проб, вдосконалених систем класифікації та попереднього геотехнічного аналізу. Ці дослідження допомагають інженерам і проектувальникам обирати найкращі методи будівництва, зменшувати ймовірність руйнування конструкцій та оптимізувати проекти фундаментів. У результаті проєкти реалізуються швидше, матеріали використовуються ефективніше, а затримок, спричинених непередбаченими ґрунтовими умовами, стає менше."
 Motorized_Plowing: "Механізована оранка"
 Motorized_Plowing_desc: "Механізована оранка замінює традиційні знаряддя, що тягнуться тваринами, на трактори та плуги з двигуном, що призводить до значно вищої ефективності сільського господарства. Така механізація дозволяє швидше готувати ґрунт, проводити глибшу оранку та обробляти більші площі з меншою кількістю робітників. Моторизована оранка підвищує врожайність, одночасно зменшуючи ручну працю та розширюючи можливості орних земель, тим самим сприяючи загальному виробництву продовольства та зусиллям у сфері розвитку сільських територій."
 Farm_Tractors: "Сільськогосподарські трактори"
 Farm_Tractors_desc: "Сільськогосподарські трактори є основою сучасного механізованого сільського господарства, забезпечуючи потужність, необхідну для виконання різноманітних завдань, таких як оранка, боронування, перевезення та посів. Їхня універсальність та довговічність значно зменшують потребу в ручній праці та використанні тяглової сили тварин. Трактори, оснащені стандартизованими системами зчеплення та дедалі потужнішими двигунами, оптимізують польові роботи та дають змогу використовувати спеціалізоване навісне обладнання, що робить великомасштабне сільське господарство ефективнішим, стабільнішим та продуктивнішим."
 Scientific_Agricultural_Processes: "Наукові сільськогосподарські процеси"
 Scientific_Agricultural_Processes_desc: "Наукові сільськогосподарські процеси використовують принципи біології, хімії та екологічних наук для підвищення врожайності та поліпшення стану ґрунту. Серед застосовуваних методів — сівозміна, цільове внесення добрив, інтегрований захист рослин від шкідників та використання високоврожайних сортів насіння. Фермери, які застосовують методи, засновані на наукових дослідженнях, можуть підвищити продуктивність, одночасно зменшуючи відходи та довгострокове пошкодження ґрунту."
 Mechanized_Agriculture: "Механізоване сільське господарство"
 Mechanized_Agriculture_desc: "Оранка, посів, зрошення та збирання врожаю — це приклади механізованого сільського господарства, яке передбачає використання машин для виконання завдань, що раніше виконувалися вручну. Трактори, комбайни та інша спеціалізована техніка значно підвищують ефективність і дають змогу вести господарство у більших масштабах. Такий перехід до механізації знижує витрати на робочу силу та економить час, що дозволяє фермерським господарствам підвищити продуктивність та обробляти більші площі землі."
 Agricultural_Chemistry: "Сільськогосподарська хімія"
 Agricultural_Chemistry_desc: "Сільськогосподарська хімія охоплює вивчення та застосування добрив, пестицидів, гербіцидів і регуляторів росту, а також хімію ґрунту з метою максимізації врожайності та збереження здоров’я ґрунту. Сільськогосподарська хімія спрямована на захист сільськогосподарських культур від шкідників і хвороб шляхом розробки спеціалізованих хімічних речовин і технологій, підвищення доступності поживних речовин та поліпшення загального росту рослин."
 Industrial_Pasteurization: "Промислова пастеризація"
 Industrial_Pasteurization_desc: "Промислова пастеризація — це великомасштабна контрольована термічна обробка, яка видаляє шкідливі мікроорганізми зі швидкопсувних продуктів харчування та напоїв, насамперед молока, соків та консервів, зберігаючи при цьому смак і подовжуючи термін придатності. Завдяки стандартизації температурних режимів та тривалості обробки цей процес забезпечує безпеку та стабільність якості продукції у всіх партіях."
 Rudimentary_Oil_Refining: "Примітивна переробка нафти"
 Rudimentary_Oil_Refining_desc: "Примітивна переробка нафти охоплює основні методи розділення сирої нафти на корисні компоненти, такі як гас, мастильні матеріали та мазут. За допомогою простих дистиляційних колон та малоефективних печей у цьому процесі тепло використовується для випаровування сирої нафти та конденсації її фракцій при різних температурах."
 Oil_Distillation: "Дистиляція нафти"
 Oil_Distillation_desc: "Дистиляція нафти — це систематичне розділення сирої нафти на окремі фракції, такі як бензин, дизельне паливо та важкі нафти, за допомогою контрольованого нагрівання та конденсації. У цьому процесі використовуються колони фракційної дистиляції для сортування вуглеводнів за їхніми температурами кипіння."
 Basic_Oil_Refining: "Базове нафтоперероблення"
 Basic_Oil_Refining_desc: "Базова переробка нафти охоплює необхідну інфраструктуру та методи перетворення сирої нафти на корисні продукти, такі як гас, мазут та мастильні матеріали. Вона є значним кроком вперед у перетворенні сирої нафти на практичні джерела енергії завдяки застосуванню простих процесів термічної дистиляції."
 Enhanced_Catalytic_Reformer: "Удосконалений каталітичний реформер"
 Enhanced_Catalytic_Reformer_desc: "Удосконалений каталітичний реформер підвищує ефективність та якість виробництва палива завдяки впровадженню в процес переробки сучасних каталізаторів та систем, що працюють під вищим тиском. Це дозволяє отримувати більший вихід високооктанового бензину та цінних нафтохімічних побічних продуктів із сировини нижчої якості. Таке вдосконалення дає нафтопереробним заводам змогу задовольняти зростаючий попит на промислове та транспортне паливо, одночасно зменшуючи обсяги відходів та покращуючи загальну економічну ефективність процесу. Він також сприяє виробництву важливих сировинних матеріалів для пластмас, авіаційного палива та синтетичних матеріалів."
 Isomerization: "Ізомеризація"
 Isomerization_desc: "Ізомеризація змінює молекулярну структуру вуглеводнів, перетворюючи низькооктанові сполуки на високооктанові палива. Цей процес покращує якість бензину шляхом перетворення прямоланцюгових парафінів на розгалужені ізомери, при цьому споживаючи менше сирої нафти. Ізомеризація приносить користь нафтопереробним заводам, підвищуючи ефективність використання палива, зменшуючи детонацію двигуна та збільшуючи гнучкість у змішуванні продуктів."
 Early_Synthetic_Rubber_Production: "Раннє виробництво синтетичного каучуку"
 Early_Synthetic_Rubber_Production_desc: "Раннє виробництво синтетичного каучуку з’явилося у відповідь на дефіцит натурального каучуку, особливо під час війни або перебоїв у торгівлі. Виробники використовують основні нафтохімічні процеси для створення альтернатив, таких як «Буна-S» та «Буна-N» — каучуків, отриманих зі стиролу та бутадієну. Хоча ці ранні синтетичні каучуки не такі гнучкі та довговічні, як натуральний каучук, вони мають вирішальне значення для виробництва шин, шлангів, ущільнювачів та інших важливих компонентів."
 Nitrile_Butadiene_Rubber_Fabrication: "Виробництво нітрил-бутадієнового каучуку"
 Nitrile_Butadiene_Rubber_Fabrication_desc: "Виробництво нітрил-бутадіенового каучуку є значним проривом у розвитку синтетичних еластомерів. Інженери створюють матеріал із чудовою стійкістю до масел, палива та стирання шляхом кополімеризації бутадієну та акрилонітрилу, що робить його ідеальним для вимогливих промислових та автомобільних застосувань. NBR отримують шляхом контрольованої емульсійної полімеризації, після чого відбувається змішування, вулканізація та формування. Поєднання гнучкості, хімічної стійкості та довговічності робить його популярним матеріалом для ущільнювачів, прокладок, паливних магістралей та захисних рукавичок."
 Chloroprene_Rubber_Production: "Виробництво хлоропренового каучуку"
 Chloroprene_Rubber_Production_desc: "Хлоропреновий каучук, також відомий як неопрен, утворюється в результаті полімеризації хлоропрену. Цей синтетичний каучук відрізняється стійкістю до атмосферних впливів, вогнестійкістю та помірною стійкістю до масел, завдяки чому він підходить для різноманітних промислових та побутових застосувань. Процес виробництва починається з контрольованої емульсійної полімеризації, після чого відбуваються коагуляція, сушіння та компандування. У результаті отримують універсальний еластомер, який можна використовувати у водолазних костюмах, ременях, шлангах, електричній ізоляції та промислових прокладках."
 Early_Synthetic_Oil_Production: "Раннє виробництво синтетичної нафти"
 Early_Synthetic_Oil_Production_desc: "Раннє виробництво синтетичної нафти виникло через необхідність доповнити або замінити природну нафту штучними альтернативами. Використовуючи вугілля або природний газ як сировину, цей процес зазвичай перетворює вуглецеві матеріали на синтетичні вуглеводні за допомогою таких методів, як синтез Фішера-Тропша або термічний крекінг. Хоча цей процес є менш ефективним, ніж пряме видобування природної нафти з надр Землі, цей ранній етап є значним прогресом, особливо в регіонах з обмеженими запасами сирої нафти."
 Widespread_Use_of_Lignite_Coal: "Широке використання бурого вугілля"
 Widespread_Use_of_Lignite_Coal_desc: "У міру зростання енергетичних потреб та зменшення доступності високоякісного вугілля використання бурого вугілля стрімко зростає. Незважаючи на нижчий вміст вуглецю та вищу вологість порівняно з бітумінозним вугіллям, буре вугілля є в достатку, його легко видобувати, і його вистачає для багатьох промислових застосувань. Його широке використання забезпечує паливом електростанції, парові локомотиви та ранні галузі хімічної промисловості. Незважаючи на те, що буре вугілля є менш ефективним і більш забруднюючим, ніж твердіші види вугілля, воно відіграє вирішальну роль у регіонах з обмеженими енергетичними можливостями, забезпечуючи виробництво електроенергії та раннє виробництво синтетичного палива."
 Refined_Pyrolysis_Process: "Удосконалений процес піролізу"
 Refined_Pyrolysis_Process_desc: "Досягнення в галузі органічного піролізу тепер дозволяють здійснювати більш контрольований термічний розклад, що дає змогу отримувати побічні продукти вищої якості, такі як синтетичний газ, дьоготь, деревне вугілля та олії. Ефективність і надійність цього процесу можна значно підвищити завдяки вдосконаленню подачі тепла, контролю тиску та підготовки сировини. Метод вдосконаленого піролізу є особливо корисним у зародкових стадіях розвитку нафтохімічної промисловості та під час виробництва палива в умовах війни. Він забезпечує спосіб вилучення корисних вуглеводнів із низькоякісної біомаси та вугілля, відкриваючи шлях до отримання синтетичних палив, вуглецево-багатих матеріалів та різноманітних промислових хімікатів."
 Major_Hydrogeneration_Productivity_Gain: "Значне підвищення продуктивності гідрогенізації"
 Major_Hydrogeneration_Productivity_Gain_desc: "Значні вдосконалення процесу гідрування, який використовується для рафінування палива, затвердіння олій та виробництва синтетичних матеріалів, призвели до значного підвищення продуктивності в широкому спектрі галузей промисловості. Завдяки оптимізації каталізаторів, умов тиску та конструкції реакторів підприємства тепер можуть досягати швидших часів реакції, вищих виходів та нижчого енергоспоживання. Ці досягнення особливо корисні у виробництві синтетичного палива, хімічній промисловості та харчовій промисловості."

