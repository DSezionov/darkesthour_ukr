###### Engineers
 tech_engineers: "Інженерна рота"
 tech_assault_weapons_1: "Координація атак"
 tech_assault_weapons_1_desc: "Роль інженерних підрозділів виходить за межі будівництва укріплень та підриву споруд і включає тісну співпрацю з передовою піхотою та бронетехнікою. Інтегруючись із штурмовими формуваннями, вони можуть забезпечувати оцінку ситуації на полі бою в режимі реального часу, розчищення перешкод та підтримку при прориві оборони. Їхня координація гарантує, що артилерійські залпи, наступ піхоти та прориви бронетехніки відбуваються вчасно."
 tech_assault_weapons_2: "Вогнемети"
 tech_assault_weapons_2_desc: "Відтоді, як люди вперше навчилися керувати вогнем, ми завжди вигадували нові способи вбивати ним, і сучасність не є винятком. Хоча зброя, що випльовує вогонь на ворога, існувала ще з часів Римської імперії, сучасні вогнемети набагато менш примітивні. Завдяки сучасним досягненням ми можемо використовувати силу полум’я, щоб підпалювати укріплення супротивника та викурювати ворогів, що знаходяться всередині. Не кажучи вже про небезпеку, яку вогонь може становити для самого ворога."
 tech_assault_weapons_3: "Імпровізовані бойові тактики"
 tech_assault_weapons_3_desc: "Наші війська мають бути дисциплінованими та слухатися своїх командирів, але ми також повинні навчити їх і дозволити робити те, що необхідно в даний момент для досягнення перемоги, особливо якщо вони не можуть отримати або передати накази. Часи, коли дві армії билися на рівних, минули; зараз настала епоха хаосу та імпровізації, яку наші війська повинні опанувати. Щоб перемогти, наші солдати повинні пристосовуватися до будь-якої ситуації та використовувати будь-які засоби чи зброю, що є в їхньому розпорядженні."
 tech_assault_weapons_4: "Підривна команда"
 tech_assault_weapons_4_desc: "Наші вороги на війні можуть битися хоробро; навіть якщо нам вдасться встояти й не дати їм прорватися на нашу територію, все одно залишиться питання про просування на їхню територію. У ході наступу ми, безсумнівно, зіткнемося з різноманітними укріпленнями та оборонними спорудами, призначеними для уповільнення нашого наступу. Щоб прорвати ці оборонні лінії, нам слід сформувати спеціалізовані команди, навчені таємно наближатися до будь-яких ворожих укріплень і підривати їх дощенту, забезпечуючи нашим військам вільний доступ."
 tech_assault_weapons_5: "Міношукачі"
 tech_assault_weapons_5_desc: "Занадто часто наші війська та техніка, не підозрюючи про це, потрапляли на приховане вороже мінне поле і за лічені секунди перетворювалися на червону хмару. Щоб ці хитрі пастки більше не вбивали наших бійців, нам доведеться використовувати міношукачі. Міношукачі — це портативні прилади з диском у нижній частині, які також використовуються для пошуку металів загалом. Їх проводять над землею, і вони подають сигнал користувачеві, коли виявляють міну, що дозволяє безпечно її знешкодити."
 tech_assault_weapons_6: "Портативні вогнемети"
 tech_assault_weapons_6_desc: "Нові досягнення в технології вогнеметів дозволили нам переглянути руйнівну силу цього пристрою та вдосконалити його до рівня, що перевищує попередні. Тепер ми можемо прикріпити паливний бак до спини солдата, що дає йому змогу пересуватися з вогнеметом у руках. Це вдосконалення забезпечує більшу ефективність та летальність, оскільки тепер ми можемо стріляти безпосередньо у ворогів, а не намагатися прицілюватися лише в їхньому загальному напрямку."
 tech_warforged_builders: "Військові будівельники"
 tech_warforged_builders_desc: "Інженерні підрозділи проходять спеціальну підготовку та отримують обладнання для швидкого будівництва в бойових умовах. Мостові команди, фахівці з польового укріплення та логістичні фахівці працюють разом, щоб швидко зводити опорні пункти, прокладати колії та зміцнювати інфраструктуру."
 tech_entrenchment_1: "Окопана війна"
 tech_entrenchment_1_desc: "Окоповальна війна — це бойова стратегія, за якої у землі викопують численні довгі ходи, достатньо низькі, щоб кілька солдатів могли пересуватися з місця на місце, не боячись потрапити під обстріл на полі бою. Ця стратегія широко застосовувалася під час Першої світової війни, даючи жорстокі, хоч і виснажливі, результати. Вона використовується переважно у тривалих війнах, метою яких є пережити ворога та зупинити будь-який наступ завдяки величезним розмірам оборонних споруд."
 tech_entrenchment_2: "ДОТи"
 tech_entrenchment_2_desc: "Стаціонарні оборонні споруди вбудовуються в передові та тилові позиції для забезпечення безперервної вогневої підтримки та контролю над ключовими ділянками місцевості. Дзоти будуються із залізобетону або утрамбованого ґрунту та деревини і розраховані на те, щоб витримувати вогонь стрілецької зброї та легкої артилерії. Ці укріплені укриття зазвичай оснащені кулеметами, протитанковими гвинтівками або легкими мінометами, що дозволяє інженерним ротам швидко закріпити оборонну лінію. Їхня наявність уповільнює просування ворога та покращує здатність піхоти утримувати ключові позиції."
 tech_entrenchment_3: "Зміцнені бункери"
 tech_entrenchment_3_desc: "Інженери споруджують укріплені бункери, здатні витримувати тривалий обстріл і прямі влучання з важкої зброї. Ці споруди, зведені з багатошарового бетону, сталевих опор та амортизуючих матеріалів, слугують командними пунктами, складами боєприпасів та захищеними укриттями для військ під інтенсивним вогнем. На відміну від менших польових укріплень, укріплені бункери є напівпостійними спорудами і вимагають ретельного планування та будівництва, але вони значно підвищують виживаність та оперативну стійкість у статичних або контрольованих районах."
 tech_entrenchment_4: "Блокхауси"
 tech_entrenchment_4_desc: "Блокхауси це компактні, але міцні оборонні споруди, збудовані переважно з бетону та сталі, призначені для розміщення невеликих піхотних підрозділів із перекриваючимися полями вогню. Їх легше споруджувати, ніж більш складні бункери, і вони зазвичай використовуються для убезпечення ключових ділянок місцевості, таких як перехрестя, мости або вершини пагорбів. Блокгаузи, оснащені стрілецькими щілинами та внутрішньою вентиляцією, забезпечують всебічний захист від піхотних атак та обмеженого артилерійського вогню."
 tech_entrenchment_5: "Їжаки"
 tech_entrenchment_5_desc: "«Їжак» — це стаціонарний протитанковий бар’єр, що складається зі сталевих балок або армованих матеріалів, розташованих у формі хреста. Він призначений для зупинки або відхилення танків та інших броньованих машин і не потребує технічного обслуговування чи персоналу. Ці перешкоди, які часто розставляють рядами поперек доріг, на відкритих полях або в міських вузьких місцях, прості у виготовленні, швидко встановлюються та надзвичайно ефективні для затримки просування ворога."
 tech_entrenchment_6: "Зуби Дракона"
 tech_entrenchment_6_desc: "Зуби дракона» — це набагато більше, ніж просто загрозлива назва; це нова протитанкова стратегія, яка, у разі застосування, може виявитися надзвичайно ефективною. Укладаючи візерунок із невеликих пірамідальних блоків із залізобетону, що нагадують великі зуби, ми можемо створити для танків і піхоти перешкоду, яку їм нелегко подолати, достатньо сповільнивши їх, щоб наші війська могли досить легко їх знищити. У поєднанні з іншими пастками вони можуть бути надзвичайно смертоносними."
 tech_amphibious_1: "Переправа через річку на плотах"
 tech_amphibious_1_desc: "Тимчасові плотові мости дають змогу інженерним підрозділам переправляти піхоту, легку техніку та постачання через річки та водні перешкоди, коли постійна інфраструктура недоступна. Ці переправи, зроблені з понтонів, деревини або надувних матеріалів, вимагають точної координації та постійної робочої сили. Незважаючи на вразливість до вогню противника та несприятливих погодних умов, вони дають змогу здійснювати швидкі тактичні маневри на місцевості, яка інакше була б непрохідною."
 tech_amphibious_2: "Транспортування вантажними суднами"
 tech_amphibious_2_desc: "Стандартизовані вантажні судна є основою військової логістики на великі відстані, транспортуючи важливі матеріали, транспортні засоби, боєприпаси та персонал через моря. Ці судна спроектовані з урахуванням місткості та автономності, а не швидкості, і курсують у конвоях під захистом військово-морського ескорту. Ефективне обладнання для обробки вантажів та модульні системи зберігання забезпечують швидше завантаження та розвантаження в портах, що робить їх важливою ланкою у підтримці операцій за кордоном та ліній постачання."
 tech_amphibious_3: "Пляжні плацдарми"
 tech_amphibious_3_desc: "Коли морські десантні сили висаджуються на берегах території, контрольованої ворогом, битва часто полягає не в протистоянні людей один проти одного, а в тому, хто зможе забезпечити кращу організацію та підкріплення. Ми отримаємо перевагу, якщо наші солдати створять тимчасову лінію фронту — або плацдарм — з якого вони зможуть оборонятися, доки не прибудуть належні підкріплення для просування вглиб ворожої території. У цьому контексті ми повинні зробити використання плацдармів загальноприйнятою стратегією під час будь-якого майбутнього вторгнення."
 tech_amphibious_4: "Понтонні мости"
 tech_amphibious_4_desc: "Системи плавучих мостів дають змогу швидко переправлятися через річки без потреби у постійній інфраструктурі. Ці мости, складені з з’єднаних між собою модульних понтонів, можуть витримувати вагу піхоти, легкої техніки, а в деяких випадках — і бронетанкових колон. Інженерні підрозділи розгортають їх, щоб зберегти імпульс під час наступу через водні перешкоди, і зазвичай їх використовують у поєднанні з тимчасовими дорогами та поромними системами."
 tech_amphibious_5: "Штурмові катери"
 tech_amphibious_5_desc: "Штурмові катери — це легкі, портативні й часто складані судна, призначені для переправи піхоти через річки або прибережні зони під час бойових операцій. Використовуються переважно під час початкових переправ, при цьому швидкість і ефект несподіванки для них важливіші за захист і місткість, що дозволяє військам закріпитися на березі до прибуття важчого мостового обладнання."
 tech_amphibious_6: "Амфібійні машини"
 tech_amphibious_6_desc: "Амфібійні машини, призначені для пересування як по суші, так і по воді, заповнюють прогалину між морськими десантними операціями та мобільністю вглиб суші. Ці машини, які зазвичай мають легке бронювання та оснащені гусеницями або колесами, можуть транспортувати війська, припаси або легку техніку з корабля на берег, а потім продовжувати діяти вже на суші. Їхня адаптивність робить їх незамінними під час прибережних штурмів, на болотистій місцевості та під час переправи через річки, зменшуючи залежність від постійної інфраструктури."
###### Recon
 tech_recon: "Розвідувальна рота"
 tech_recon2: "Техніки маскування"
 tech_recon2_desc: "Існує безліч способів, за допомогою яких наші солдати можуть залишатися непомітними для ворога і, таким чином, виживати. На жаль, багато наших солдатів або не готові до цього, або не знають про такі техніки маскування, і це помилка, яку необхідно негайно виправити. Ми зможемо втрачати менше солдатів і влаштовувати набагато ефективніші засідки, якщо проведемо дослідження нових технік, що дозволять нашим бійцям залишатися непомітними, а також роздамо їм посібники з використання цих нових методів."
 tech_recon3: "Моторизована розвідка"
 tech_recon3_desc: "Швидкі, легкоозброєні транспортні засоби надають розвідувальним підрозділам мобільність, необхідну для проникнення в тил ворога, розвідки флангів та швидкого реагування. Ці підрозділи, оснащені вантажівками, мотоциклами або легкими універсальними транспортними засобами, відмовляються від потужного бронювання на користь швидкості та дальності дії. Моторизована розвідка використовується для виявлення загроз, пошуку прогалин у обороні та передачі бойової розвідінформації в режимі реального часу. Вона покращує оперативну обізнаність та дозволяє швидше приймати тактичні рішення."
 tech_recon4: "Розвідувальні автомобілі"
 tech_recon4_desc: "Розвідувальні автомобілі, розроблені з урахуванням швидкості, маскування та легкої вогневої підтримки, є більш міцною та добре озброєною альтернативою неброньованим розвідувальним транспортним засобам. Ці броньовані машини патрулюють попереду основних сил, зондуючи позиції ворога та передаючи інформацію з поля бою. Їхні невеликі розміри, маневреність та часто встановлене легке озброєння або кулемети роблять їх ідеальними для глибоких патрулів, виявлення засідок та швидкого контакту з ворожими підрозділами без вступу у повномасштабний бій."
 tech_recon5: "Удосконалені методи стеження"
 tech_recon5_desc: "Удосконалені методи стеження дозволяють розвідувальним підрозділам відстежувати пересування ворога з безпечної відстані, залишаючись непоміченими. Розвідники можуть контролювати скупчення ворожих військ та логістику, не вступаючи в бій, завдяки дисциплінованим пересуванням, ефективному маскуванню та оптимальному використанню рельєфу місцевості, надаючи актуальну розвідувальну інформацію, яка допомагає формувати оперативні рішення."
 tech_recon6: "Спеціалізована розвідка"
 tech_recon6_desc: "Розвідувальні групи, навчені спеціалізованим методам розвідки, можуть виявляти та документувати ключові особливості місцевості, інфраструктури та оборонних позицій. Це включає оцінку стану доріг, визначення глибини річок, маркування мінних полів та виявлення природних вузьких місць."
 tech_recon7: "Підготовка до суворих умов"
 tech_recon7_desc: "Занадто багато наших солдатів були змушені покинути поле бою або загинули внаслідок екстремальних погодних умов через брак знань та підготовки до протистояння не лише ворогам, а й самій Матері-Природі. Будь то обмороження взимку, тепловий удар влітку, раптові повені під час сильних злив чи щось інше — занадто багато хороших людей гине від рук природи. Тому, щоб зменшити ці втрати, ми повинні вимагати від наших солдатів проходження підготовки в суворих умовах."
 tech_recon_in_force: "Розвідка боєм"
 tech_recon_in_force_desc: "Розвідка боєм передбачає відправлення підрозділу для навмисного вступу в бій з ворогом з метою збору розвідданих про його чисельність, позиції та боєготовність. На відміну від традиційної розвідки, мета полягає в тому, щоб спровокувати реакцію, змусивши ворога діяти та давши наступаючим силам можливість оцінити його можливості. Ця тактика надає корисну інформацію для масштабніших наступальних операцій та виявляє слабкі місця в обороні ворога."
 tech_recon_by_fire: "Розвідка вогнем"
 tech_recon_by_fire_desc: "Розвідка вогнем передбачає наведення вогню на ймовірні позиції ворога з метою викликати реакцію, яка викриє присутність та місцезнаходження ворога. Вона особливо корисна в місцевості з густою рослинністю або в умовах поганої видимості, коли візуальний контакт ускладнений. Хоча це несе ризик викриття позиції нападника, це все ж швидкий і агресивний спосіб підтвердити розстановку сил противника перед масштабним боєм."
 tech_shadow_operatives: "Таємні агенти"
 tech_shadow_operatives_desc: "Таємні агенти — це елітні розвідники, навчені мистецтву маскування, проникнення та збору розвідданих від людей. Вони збирають критично важливу інформацію з поля бою, діючи за лінією фронту або на окупованій території, використовуючи техніки маскування, перевдягання та спостереження. Цим агентам часто доручають виявляти командні структури ворога, відстежувати особливо важливі цілі та координувати дії з місцевими інформаторами — і все це, залишаючись непоміченими."
##### Military Police
 tech_military_police: "Військова поліція"
 tech_military_police2: "Військові суди"
 tech_military_police2_desc: "Військові суди — це судові органи, що перебувають у віданні збройних сил і задіюються під час війни або надзвичайного стану. Вони розглядають справи, пов’язані з порушеннями військового законодавства, саботажем, дезертирством та діями, що підривають військову дисципліну або оперативну безпеку. Вони часто застосовують прискорені процедури і покликані виносити швидкі та рішучі рішення для збереження контролю та забезпечення порядку в періоди, коли цивільні правові системи перевантажені або призупинені."
 tech_military_police3: "Інформатори"
 tech_military_police3_desc: "На окупованих територіях ми час від часу зустрічаємо людей, які цілком задоволені нашим правлінням і, в обмін на краще ставлення, пропонують інформувати нас про пересування сил опору, що борються проти нашої окупації. Ці інформатори можуть бути надзвичайно корисними для запобігання повстанням або затримання осіб, які таємно симпатизують опору, про що ми не знаємо. Ми повинні навчити нашу військову поліцію активніше приймати та використовувати інформаторів."
 tech_military_police4: "Часті патрулювання"
 tech_military_police4_desc: "Військова поліція проводить регулярні та добре помітні патрулювання з метою забезпечення дисципліни, безпеки та порядку як на передовій, так і в тилових районах. Ці патрулі слугують постійним нагадуванням про владу, стримуючи порушення дисципліни та виявляючи потенційні загрози чи порушення ще до їх ескалації."
 tech_military_police5: "Більш суворі покарання"
 tech_military_police5_desc: "Дисципліна забезпечується завдяки суворішим вирокам та меншій поблажливості до правопорушень. Військова поліція та командири уповноважені застосовувати суворі покарання за дезертирство, мародерство, непокору та невиконання наказів. Мета полягає в тому, щоб підтримувати згуртованість та порядок у воєнний час шляхом застосування суворих наслідків, які стримують навіть незначні правопорушення."
 tech_military_police6: "Військовий стан"
 tech_military_police6_desc: "Хоча це часто розглядається як тривожна й авторитарна практика, наша військова поліція повинна навчитися повністю й беззастережно контролювати територію, на яку її розгорнуто, навіть якщо це означає заміну місцевого цивільного правління власним шляхом оголошення військового стану. Хоча це, ймовірно, викличе обурення громадськості, для встановлення контролю над регіоном може знадобитися повна військова окупація та тимчасове обмеження свобод."
 tech_military_police7: "Операції проти партизан"
 tech_military_police7_desc: "Військові підрозділи реорганізуються та проходять підготовку для проведення операцій у тилу ворога, спрямованих конкретно проти ворожих нерегулярних формувань та диверсійних мереж. Основна увага приділяється розвідці, швидкому реагуванню та збиранню розвідувальної інформації в важкодоступній місцевості. Військова поліція, місцеві колабораціоністи та загони безпеки співпрацюють, щоб виявляти, ізолювати та ліквідувати партизанські елементи. Ці операції мають на меті забезпечити безпеку шляхів постачання, запобігти повстанням та відновити державну владу на спірних або окупованих територіях."
 tech_military_police8: "Охоронці порядку"
 tech_military_police8_desc: "Невелика група офіцерів військової поліції об’єднана в елітні підрозділи внутрішньої безпеки, завданням яких є підтримання порядку в нестабільних районах. Ці правоохоронці мають розширені повноваження, поєднуючи слідчі навички з парамілітарною підготовкою. Їхня присутність діє як засіб стримування, так і як сили швидкого реагування, здатні придушувати заворушення, забезпечувати дотримання комендантської години та захищати критичну інфраструктуру. Їх часто розгортають у районах підвищеного ризику, де традиційних військових або цивільних поліцейських сил недостатньо."
###### Signal Company
 tech_signal_company: "Рота зв’язку"
 tech_signal_company2: "Ранні засоби телефонного зв’язку"
 tech_signal_company2_desc: "У міру розвитку комунікаційних технологій протягом Першої світової війни можливості численних новостворених сигнальних підрозділів по всьому світу також покращувалися. Удосконалені засоби радіозв’язку та перші мотоцикли почали поступово витісняти старих поштових голубів, але найважливішим досягненням стало використання повноцінних телефонних ліній між підрозділами зв’язку. Це забезпечує нашим хлопцям життєво важливу безпеку, утримуючи наші найважливіші таємниці подалі від рук недоброзичливців."
 tech_signal_company3: "Захист інформації"
 tech_signal_company3_desc: "Щоб краще захистити секретну військову інформацію, війська зв’язку почали використовувати сучасні та передові шифрувальні машини для шифрування та дешифрування конфіденційних даних, що передаються між підрозділами зв’язку. Ці шифри зашифровані за допомогою кодів, які часто настільки досконалі, що єдиний спосіб їх розшифрувати — це отримати оригінальні кодові книги, які наші надійні війська зв’язку нізащо не дозволять потрапити до рук ворога."
 tech_signal_company4: "Радіозв’язок"
 tech_signal_company4_desc: "У міру розвитку радіо- та шифрувальних технологій у міжвоєнний період вони набули такого поширення, що стали стандартним засобом зв’язку між підрозділами. Наші війська більше не покладаються на застарілих поштових голубів, які доставляють рукописні повідомлення, що можуть загубитися або потрапити до рук ворога. Натомість вони використовують найсучасніші засоби радіозв’язку, що забезпечують набагато кращу координацію між різними підрозділами за значно коротший проміжок часу."
 tech_signal_company5: "Управління мережею"
 tech_signal_company5_desc: "Тепер, коли наші комунікаційні технології забезпечують майже миттєву координацію між різними підрозділами, виникла необхідність у створенні комунікаційних вузлів для управління величезним обсягом вихідних та вхідних повідомлень між підрозділами зв’язку. Ці мережеві вузли значно покращать злагодженість підрозділів, а також допоможуть у систематизації величезного потоку військової розвідінформації, що надходить від наших солдатів на передовій."
 tech_signal_company6: "Встановлення радіовеж"
 tech_signal_company6_desc: "Хоча для невеликої групи підрозділів, що зв’язуються на коротких відстанях, може вистачити портативного радіоприймача та одного-двох офіцерів зв’язку, більші формування, які намагаються підтримувати зв’язок на значно більших відстанях, потребуватимуть засобів вищого класу. Будівництво радіовеж поблизу штабів наших різних підрозділів зв’язку значно підвищить ефективність та зменшить навантаження на часто перевантажену мережу зв’язкуk."
 tech_signal_company7: "Команда «Ехо»"
 tech_signal_company7_desc: "Зв’язок на полі бою є одним із найважливіших аспектів сучасної війни, і досягнення в галузі технологій дозволили нам значно його вдосконалити. Наші солдати тепер можуть передавати інформацію швидше й чіткіше, ніж будь-коли раніше, своїм командирам на полі бою, які потім передають цю інформацію всім іншим відповідним солдатам, що дозволяє їм бути готовими та вести бій ефективніше. До цих пристроїв належать рації та сучасні радіостанції."
###### Weather Company
 desert_support_company: "Рота підтримки в пустелі"
 desert_support_company_desc: "Забезпечує спорядження та підтримку на спекотній місцевості та в біомах глибокої пустелі."
 snow_support_company: "Рота підтримки в снігу"
 snow_support_company_desc: "Забезпечує спорядження та підтримку на холодній місцевості та в умовах глибокого снігу."

 weather_company: "Погодне спорядження"
 weather_company_desc: "Погодне спорядження — це тип спеціалізованого спорядження для підтримки військ, призначеного для боротьби з екстремальними погодними умовами на різних полях бою по всьому світу. Наприклад, погодне спорядження може включати медикаменти або одяг, пристосовані до конкретних умов середовища, такі як важчі утеплені пальто та черевики для ведення бойових дій в умовах екстремального холоду або спеціалізований легкий камуфляжний одяг для ведення бойових дій у пустелі. Загалом, це має вирішальне значення для армій, які ведуть бойові дії або проходять підготовку до ведення бойових дій у суворих умовах."

 study_hot_environment: "Дослідження умов спеки"
 study_hot_environment_desc: "У міру вдосконалення наших збройних сил ми усвідомили необхідність забезпечення нашого персоналу відповідним спорядженням. Дослідження високих температур та їхнього впливу на спорядження й персонал дозволяє нам краще адаптуватися до складних ситуацій. Це також підвищує бойову готовність і знижує втрати в посушливих умовах."
 study_cold_environment: "Дослідження холодних умов"
 study_cold_environment_desc: "Суворі зими, постійний бруд і сніг можуть виснажити будь-яку армію, незалежно від її потужності чи чисельності. Якщо ми хочемо цього уникнути, ми повинні навчити нашу армію зберігати бойову ефективність, одночасно зменшуючи втрати. Ми матимемо значну перевагу над наземними силами супротивника."
 weather_company_desert: "Маски для захисту від піску"
 weather_company_desert_desc: "Однією з проблем, з якою стикаються наші війська під час бойових дій у спекотних пустельних районах, є пісок. Вести бій без будь-якого захисту носа чи рота є вкрай небезпечним, проте наші бійці продовжують брати участь у боях, не маючи захисту від природних стихій. Щоб вирішити цю проблему, ми створимо маски, спеціально розроблені для того, щоб не допустити потрапляння піску в легені нашої піхоти, що дозволить їм більше часу приділяти стрільбі, а не задишці."
 weather_company_desert2: "Хустка від піску"
 weather_company_desert2_desc: "Ще один простий спосіб для наших бійців захиститися від настирливих піщинок — забезпечити їх власними хустками або банданами. Хоча це простий і, слід визнати, застарілий метод захисту від піску, він є ефективним, недорогим і легко поєднується з уніформою. Хтось може заперечити, що у нас є кращі та більш досконалі методи захисту наших військ від стихій, але це хороший початок у боротьбі з посушливими атаками Матері-Природи."
 weather_company_desert3: "Окуляри проти піску"
 weather_company_desert3_desc: "Професійні окуляри, якими ми можемо легко забезпечити наших солдатів, є сучасним методом боротьби з пустельними стихіями. У поєднанні з нашими попередніми інвестиціями у засоби захисту носа та рота обличчя наших солдатів нарешті будуть у безпеці. Пісок більше не потраплятиме їм в очі й не відволікатиме їх, адже вони зможуть просто змахнути його з окулярів і продовжувати бій. Крім того, ці окуляри можуть бути ефективними й проти снігу, що робить їх ще кращою інвестицією."
 weather_company_desert4: "Камуфльований шолом"
 weather_company_desert4_desc: "Рельєф пустелі надає мало укриття і майже не залишає ворогу шансів не помітити наших солдатів, але є способи захистити наших бійців від пильного погляду супротивника. Наприклад, ми можемо застосувати тактичний камуфляж на їхніх шоломах. Завдяки цьому їхні голови зливатимуться з піском, що значно ускладнить їхнє виявлення, особливо з висоти. Це дасть нам значну перевагу, коли йдеться про маскування та захист від супротивника в пустелі."
 weather_company_desert5: "Пустельні лисиці"
 weather_company_desert5_desc: "Те, що ми зробили для пом’якшення впливу піску та спеки, вже допомогло нашим військам вести бойові дії в таких умовах. Завдяки створеному нами спорядженню та набутому досвіду ми стали справжніми експертами з ведення боїв у пустелі; ніхто не може заперечити, що спека пустелі більше не є перешкодою для нашої армії. Поки наші найновіші новобранці з нетерпінням стоять у черзі, щоб служити під палючим сонцем, маючи належне спорядження, ми усвідомлюємо, що не лише ефективно воюємо в пісках, а й процвітаємо там."

 weather_company_snow: "Овечі пальта"
 weather_company_snow_desc: "У боротьбі з морозами ми нехтували творіннями природи на користь технологій. Швидким рішенням проблеми пневмонії та обморожень, з якими стикаються наші війська під час зимових боїв, є звернення до тварин, здатних виживати за таких низьких температур, таких як вівці. Поєднавши овечу шкіру та вовну в одне зручне пальто, ми можемо забезпечити наших солдатів природним теплом для захисту від холоду."
 weather_company_snow2: "Тепліша нижня сорочка"
 weather_company_snow2_desc: "Одне з того, що ми можемо зробити, аби захистити наших солдатів від холоду, — це вдосконалити їхній одяг, зокрема нижні сорочки. Хоча їхня уніформа, особливо на зимових полях бою, часто розроблена так, щоб зігрівати їх, нижні сорочки не виконують цієї функції, і це питання необхідно вирішити. Якщо ми забезпечимо наших бійців матеріалами вищої якості для нижнього шару одягу, це, безсумнівно, надасть додаткові переваги, такі як підвищений захист і комфорт, що покращить загальну боєздатність підрозділів, одночасно захищаючи їх від холоду."
 weather_company_snow3: "Товсті пальта"
 weather_company_snow3_desc: "Для захисту від найсуворіших морозів або найгустіших піщаних буревіїв пальто, розроблені так, щоб бути якомога важчими та теплішими, мають стати стандартним спорядженням. Ці пальто повністю захистять нашу піхоту від мінусових температур, дозволяючи їй вести бій як проти ворога, так і проти стихійних лих. Хоча великі розміри цього одягу можуть ускладнювати пересування, очевидно, що переваги значно переважають недоліки."
 weather_company_snow4: "Камуфляжна уніформа"
 weather_company_snow4_desc: "Камуфляж виявився розумною формою маскування, яка діє як для людей, так і для тварин. Під час Великої війни французи використовували приховані орієнтири та пофарбовану артилерію, а британці — на своїх кораблях. Незважаючи на це, камуфляж ще не став поширеним у військовій уніформі через неможливість створення «універсального» камуфляжу. Проте, якщо забезпечити нашу армію уніформою похмурих відтінків, розробленою для злиття з зимовим ландшафтом, ворогам буде набагато складніше вистежити наших бійців."
 weather_company_snow5: "Холоднокровні вовки"
 weather_company_snow5_desc: "Наші зусилля у боротьбі із зимою принесли плоди. Наші бійці тепер впевнені у своїй здатності в разі потреби вторгнутися до Сибіру та захищати її. Ми забезпечили їх настільки чудовим спорядженням, що вони стали справжніми експертами у веденні боїв за мінусових температур. Єдине, що нам залишається зробити, — це провести додаткове навчання та узагальнити набутий досвід у посібниках і інструкціях, щоб усі були в курсі; інакше наші війська будуть полювати, виживати та процвітати серед льоду."
###### Field Hospital
 tech_field_hospital: "Польовий госпіталь"
 tech_field_hospital_health_1: "Перша медична допомога"
 tech_field_hospital_health_1_desc: "На полі бою солдати можуть отримати поранення внаслідок різних загроз, зокрема від місцевої дикої природи, нещасних випадків, погодних умов, а також від ворожих куль і багнетів. Ці рани легко інфікуються, і навіть найменша порізна рана може перерости у щось смертельне. Дослідження у сфері стандартизованих перев’язувальних матеріалів, які будуть видаватися нашим бійцям, стали б надійним способом хоча б запобігти деяким із цих непотрібних смертей."
 tech_field_hospital_health_2: "Базові хірургічні втручання"
 tech_field_hospital_health_2_desc: "Наявність медичного персоналу, готового надати допомогу пораненим, вже давно є невід’ємною частиною ведення війни, але ми маємо йти далі. Залучаючи не лише лікарів і медсестер, а й медичних фахівців, підготовлених до більш складних ситуацій, ми зможемо врятувати більше життів, незалежно від тяжкості поранення, яке раніше вважалося смертельним. Зокрема, залучення спеціалізованих хірургів для порятунку військовослужбовців, що повертаються з передової, усуває ризик смерті та інфікування, які зазвичай супроводжують вогнепальні поранення тощо."
 tech_field_hospital_health_3: "Профілактика захворювань"
 tech_field_hospital_health_3_desc: "Однією з найсерйозніших проблем, з якими стикаються наші збройні сили, є поширеність захворювань. Окрім боротьби з ворогом, хвороби є найпоширенішою причиною смерті серед наших солдатів — чи то через екстремальні погодні умови, відкриті рани, чи просто через необізнаність. Щоб вирішити останню проблему з цього переліку, ми можемо зробити все можливе, щоб навчити наших бійців профілактиці захворювань за допомогою обов’язкових посібників, короткометражних фільмів та будь-яких інших засобів, необхідних для забезпечення належних санітарних умов для наших солдатів."
 tech_field_hospital_health_4: "Антибіотики"
 tech_field_hospital_health_4_desc: "BБактеріальні інфекції становлять постійну загрозу для солдатів на полі бою, оскільки вони дуже заразні й ними легко заразитися. Будь-що — від відкритої рани, недостатньо прожареної їжі до суворих погодних умов — може призвести до того, що хтось із наших бійців захворіє на хворобу, яка виведе його з бою на кілька днів, а то й назавжди. Щоб боротися з цим, ми повинні зробити застосування антибіотиків — ліків, розроблених спеціально для профілактики або знищення бактеріальних інфекцій, — звичним явищем на полі бою."
 tech_field_hospital_health_5: "Переливання крові"
 tech_field_hospital_health_5_desc: "Втрата крові може бути для солдата такою ж небезпечною, як і сама рана. Лікарі, які працюють з пацієнтами, що повертаються з поля бою, завжди мають бути готовими та навченими проводити переливання крові — критично важливу процедуру, під час якої кров здорової людини безпечно забирають і вводять у кровотік пораненого, що втратив кров. Ці процедури існують ще з XIX століття, але останні досягнення зробили їх безпечнішими та ефективнішими."
 tech_field_hospital_health_6: "Основи фармакології"
 tech_field_hospital_health_6_desc: "Фармакологія, або наука про застосування ліків та медикаментів, досліджується ще з XI століття, але через обмеженість технологій того часу вона не вивчалася так широко, як зараз, і зосереджувалася переважно на травах та рослинах. Завдяки новим методам обробки, пристроям та проривам у медицині сучасні дослідження у фармакології, безсумнівно, нададуть нам засоби для боротьби з болем, хворобами та навіть психічними розладами, що потенційно допоможе в подоланні бойового стресу."
 tech_field_hospital_health_7: "Масове виробництво пеніциліну"
 tech_field_hospital_health_7_desc: "У 1928 році Олександр Флемінг відкрив пеніцилін — новий антибіотик, отриманий із плісняви грибка Penicillium. Це відкриття призвело до численних медичних проривів, і вчені й досі відкривають для нього нові сфери застосування. Наразі його використовують для лікування очних інфекцій у новонароджених та стрептококової ангіни — обох захворювань, які раніше вважалися невиліковними."
 tech_field_hospital_psychology_1: "Перший підручник з психології"
 tech_field_hospital_psychology_1_desc: "Психологія, або наука про розум і поведінку, є відносно новою галуззю в сучасну епоху. Оцінка психіки та її мислення корисна як для солдатів, що повертаються з фронту, щоб зрозуміти, чому їхній мозок так реагує на травми, отримані під час війни, так і для використання психологічних досліджень з метою передбачення наступних кроків ворога."
 tech_field_hospital_psychology_2: "Дослідження ПТСР"
 tech_field_hospital_psychology_2_desc: "Хоча згадки про солдатів, які після пережитої серйозної травми відчували неприродний страх поза полем бою, сягають ще часів Ассирії, лише нещодавно ми почали замислюватися над дослідженням або наданням допомоги солдатам, які настільки налякані, що не здатні реінтегруватися у цивільне життя. Під час Першої світової війни ми називали це «артилерійським шоком» і вважали це побічним ефектом слабкого розуму, але тепер ми знаємо, що це невірно."
 tech_field_hospital_psychology_3: "Електрошокова терапія"
 tech_field_hospital_psychology_3_desc: "Використання електричного струму для лікування психічних розладів випробовувалося ще з 1500-х років, і з того часу його популярність та ефективність лише зростали. Завдяки нашій новій технології, яка забезпечує безпечніші умови та більш прямий контакт з електричним струмом, а не зі статичною електрикою — не кажучи вже про численні дослідження, що підтверджують її ефективність, — ми зможемо позбавити хворих від депресії та шизофренії, викликаючи цілеспрямовані судоми за допомогою процедури, відомої як електрошокова терапія."
 tech_field_hospital_psychology_4: "Психіатри"
 tech_field_hospital_psychology_4_desc: "У міру того, як ми продовжуємо досліджувати людський розум і лікувати розлади, з якими наші солдати можуть зіткнутися після війни, нам на кожному кроці будуть потрібні висококваліфіковані фахівці. Цих людей, яких можна вважати справжніми професіоналами у сфері психічного здоров’я, таких як психіатри та психологи, необхідно негайно найняти, щоб вони направляли нас і допомагали численним солдатам, які борються з хворобами, що не обов’язково мають бути постійними."
 tech_field_hospital_psychology_5: "Регулярні контрольні огляди"
 tech_field_hospital_psychology_5_desc: "Одне з найважливіших відкриттів, яке ми отримали від найнятих фахівців з психічного здоров’я, — це важливість встановлення послідовного та незмінного розпорядку дня для пацієнтів, які страждають на різні розлади. Ідея полягає в тому, що забезпечення хворих упорядкованим, рівномірним і стабільним режимом життя покращить їхній психічний стан і, як наслідок, може навіть сприяти формуванню у них більш здорового психічного стану."
 tech_field_hospital_psychology_6: "Групова терапія"
 tech_field_hospital_psychology_6_desc: "Групова терапія — це відносно новий, але не менш цікавий і корисний підхід до подолання травм не лише у військовослужбовців, а й серед широких верств населення. Суть полягає в тому, щоб зібрати групу пацієнтів, які пережили подібні травматичні події, у так звану навчальну групу, де вони ділитимуться своїми історіями та дізнаватимуться одне про одного. Кінцева мета полягає в тому, щоб учасники групи усвідомили, що вони не самотні у своїх труднощах, і завдяки міжособистісній взаємодії покращили свій психічний стан."
 tech_field_hospital_psychology_7: "Реінтеграція в суспільство"
 tech_field_hospital_psychology_7_desc: "У перші роки розвитку психології та лікування психічних захворювань вважалося, що такі люди ніколи не зможуть знову вести нормальне життя. Зазвичай їх утримували в психіатричних закладах аж до смерті, з ними жорстоко поводилися та ізолювали від суспільства. Але тепер це вже не так. Завдяки численним досягненням у галузі психічного здоров’я та відкриттю сучасних методів лікування багатьох захворювань ці бідні душі, можливо, одного дня знайдуть спокій, стабільність і життя поза межами психіатричної лікарні."
 tech_life_wardens: "Рятівники життя"
 tech_life_wardens_desc: "Наші медичні офіцери володіють найсучаснішими знаннями у своїй галузі, а також найкращим обладнанням, доступним на сьогодні. Суворі програми підготовки загартували їхні нерви — достатньо, щоб витягувати вмираючих солдатів із активних зон бойових дій до імпровізованих операційних, де вони проводять операції з порятунку життя, маючи мінімум часу на підготовку."
###### Logistics Company
 tech_logistics_company: "Логістична рота"
 tech_logistics_company2: "Управління лініями постачання"
 tech_logistics_company2_desc: "Ефективне управління лініями постачання гарантує, що підрозділи на передовій завжди отримують паливо, боєприпаси, продовольство та медичні засоби. Основна увага приділяється плануванню ефективних маршрутів транспортування, координації поставок та зменшенню затримок або перебоїв. Оптимізуючи потік ресурсів від складів до зон бойових дій, армія зберігає оперативну динаміку, одночасно зменшуючи ризик дефіциту або перенапруження ресурсів."
 tech_logistics_company3: "Постачання на передову"
 tech_logistics_company3_desc: "ля доставки необхідних товарів на передову потрібно не лише мати запаси; необхідна також гнучка логістика поблизу зони бойових дій. Такий підхід прискорює роботу вузлів постачання та мобільних складів, скорочує час між виникненням потреби та доставкою, а також гарантує, що підрозділи залишаються боєздатними під час операцій, що швидко розвиваються."
 tech_logistics_company4: "Система конвоїв з супроводом"
 tech_logistics_company4_desc: "Щоб зменшити затримки та захистити цінний вантаж, конвої організовуються у групи з супроводом, до складу яких входять призначені супровідники та координатори. Кожен конвой рухається за встановленим графіком, що покращує підзвітність, зменшує втрати та забезпечує стабільний потік поставок на передові позиції."
 tech_logistics_company5: "Система постачання в стаціонарних районах"
 tech_logistics_company5_desc: "Замість того, щоб покладатися виключно на рухомі конвої, поблизу стабільних ліній фронту або гарнізонних районів будуються центри постачання. Ці напівпостійні склади дають змогу здійснювати локалізований розподіл, зменшують навантаження на логістичні підрозділи, пов’язане з перевезеннями, та забезпечують стабільне поповнення запасів у секторах з низькою мобільністю."
 tech_logistics_company6: "Склади постачання в тилу"
 tech_logistics_company6_desc: "За лінією фронту в безпечних місцях облаштовуються великі зони зберігання для накопичення боєприпасів, палива, продовольства та спорядження. Ці склади слугують центральними вузлами в мережі постачання, забезпечуючи передові склади та мобільні конвої, а також гарантуючи, що великі операції можуть тривати навіть у разі тимчасового порушення транспортних шляхів."
 tech_logistics_company7: "Глибока логістична організація"
 tech_logistics_company7_desc: "Багаторівнева та багатошарова логістична структура простягається глибоко в тил збройних сил, об’єднуючи промислові центри, залізничні мережі та фронтові склади в єдину та стійку систему. Чітка ієрархія, делеговані повноваження та визначені маршрути руху дозволяють постачанням переміщатися швидше та надійніше на великі відстані."
 tech_logistics_company8: "Система постачання на нижньому ешелоні"
 tech_logistics_company8_desc: "Армії зменшують свою залежність від вищого командування в питаннях базового поповнення запасів, забезпечуючи передові підрозділи спеціалізованими логістичними підрозділами. Децентралізоване зберігання, спрощені протоколи розподілу та транспорт на рівні підрозділів гарантують швидку доставку критично важливих ресурсів, таких як боєприпаси, продовольство та медичні засоби, навіть під вогнем противника."
 tech_logistics_company9: "Система кругового постачання на передовій"
 tech_logistics_company9_desc: "Модель кругового постачання, на відміну від статичних ліній або прямих маршрутів постачання, забезпечує безперервний потік матеріалів через циклічні контури доставки. Це зменшує затори, знижує ризик перебоїв та гарантує, що матеріали надходять до підрозділів на передовій з різних напрямків. Система добре адаптується до змін лінії фронту, що забезпечує більшу стійкість логістичного ланцюга в умовах динамічних бойових дій."
##### Maintenance Company
 tech_maintenance_company: "Рота техобслуговування"
 tech_maintenance_company2: "Комплексне очищення обладнання"
 tech_maintenance_company2_desc: "Надто часто наші солдати повідомляють, що їхня зброя поламана або заклинила, а потім бригади з технічного обслуговування констатують, що вона просто якимось чином забруднена. За допомогою навчальних брошур та обов’язкових демонстрацій ми навчимо переважну більшість солдатів правильно та ретельно чистити своє спорядження, щоб запобігти таким інцидентам і звільнити їхній час для виконання важливіших завдань."
 tech_maintenance_company3: "Навчання з експлуатації спорядження"
 tech_maintenance_company3_desc: "Навчання солдатів та допоміжного персоналу експлуатації та технічного обслуговування військового спорядження зменшує зношування, кількість аварій та непотрібні простої. Коли персонал розуміє, як працюють інструменти, якими він користується — від гвинтівок до радіостанцій та двигунів, — він краще здатний вчасно виявляти проблеми та виконувати базові польові ремонти. Ці базові знання покращують цикли технічного обслуговування та подовжують термін експлуатації обладнання як на передовій, так і в тилових районах."
 tech_maintenance_company4: "Запаси та зберігання"
 tech_maintenance_company4_desc: "Належне управління запасами та методи зберігання гарантують, що запчастини, інструменти та запасне обладнання будуть під рукою, коли це потрібно. Підрозділи уникають марнотратства, дублювання та критичного дефіциту, організовуючи склади та впроваджуючи базові системи обліку. Ця основа логістичної готовності підтримує поточні операції та сприяє бойовій ефективності, забезпечуючи постійну доступність обладнання."
 tech_maintenance_company5: "Система розподілу робочих завдань"
 tech_maintenance_company5_desc: "Розподіл обов’язків з ремонту та технічного обслуговування за допомогою структурованого процесу розподілу завдань скорочує час простою та усуває плутанину. Завдання розподіляються залежно від їхнього пріоритету та терміновості, що гарантує швидкий ремонт пошкодженої техніки. Ця система підвищує ефективність роботи майстерень, усуває вузькі місця та забезпечує своєчасне технічне обслуговування польових підрозділів."
 tech_maintenance_company6: "Майстерня з ремонту транспортних засобів у тилу"
 tech_maintenance_company6_desc: "Створення спеціалізованих ремонтних об’єктів за лінією фронту дає змогу вилучати пошкоджені транспортні засоби, обслуговувати їх та повертати до ладу, не перевантажуючи ремонтні бригади на передовій. Ці майстерні, укомплектовані кваліфікованими механіками та запасними частинами, подовжують термін експлуатації техніки та забезпечують стабільний потік боєздатних транспортних засобів до бойових підрозділів."
 tech_maintenance_company7: "Організація глибокого ремонту транспортних засобів"
 tech_maintenance_company7_desc: "Багаторівнева мережа ремонту гарантує, що транспортні засоби отримують належний рівень технічного обслуговування відповідно до ступеня пошкодження. Незначні ремонти проводяться поблизу фронту, тоді як більш масштабні капітальні ремонти виконуються у спеціалізованих депо, розташованих глибше в тилу. Така структура скорочує час простою, запобігає накопиченню затримок та забезпечує постійну бойову готовність протягом тривалих військових кампаній."
 tech_maintenance_company8: "Броньовані евакуаційні машини"
 tech_maintenance_company8_desc: "Занадто довго ми втрачали машини на полі бою через механічні несправності, потрапляння в рови або просто внаслідок враження ворогом, після чого ці вороги захоплювали їх, крали нашу технологію, а потім використовували нашу ж зброю проти нас. Щоб вирішити цю проблему, ми мусимо використовувати броньовані евакуаційні машини — великі броньовані машини, побудовані на базі танкових корпусів та інших матеріалів і оснащені кранами для буксирування або ремонту пошкоджених машин, щоб ті могли знову брати участь у боях. Ми можемо навіть буксирувати ворожі машини."
 
 night_vision: "Нічне бачення I"
 night_vision_desc: "Можливість бачити ворога, залишаючись непоміченим, є ключовою для нічних операцій. Завдяки винаходу інфрачервоної технології ми можемо оснастити нашу армію пристроями, які, хоч і громіздкі, роблять це можливим."
 night_vision2: "Нічне бачення II"
 night_vision2_desc: "Ранні інфрачервоні приціли, хоча спочатку й призначалися для снайперів, мали обмежену дальність бачення. У міру покращення як портативності, так і якості зображення ці пристрої можуть використовуватися більшою кількістю військових, що діють уночі."

 
 #### Air Technology #####################################################################################
 fighter: "Винищувач"
 fighter_equipment: "Винищувач"
 fighter_equipment_desc: "Винищувачі — це основа будь-яких повітряних сил. Вони використовуються для забезпечення переваги в повітрі, а також для боротьби з ворожими бомбардувальниками та винищувачами. Це універсальні літаки, здатні виконувати будь-які поставлені перед ними завдання, хоча й не виділяються особливими досягненнями в жодній конкретній сфері."
 
 interceptor: "Винищувачі-бомбардувальники"
 interceptor_equipment_desc: "Винищувачі-бомбардувальники — це винищувачі ближнього радіусу дії, призначені для знищення ворожих бомбардувальників. Вони мають високу швидкість і хорошу маневреність, що робить їх достатньо спритними, щоб ухилятися від кулеметного вогню бомбардувальників, і водночас володіють вогневою потужністю, необхідною для виведення з ладу важкого, броньованого бомбардувальника. Проти ворожих винищувачів вони менш ефективні, проте все одно дають гідний відсіч."
 
 cv_fighter: "Винищувач"
 cv_fighter_equipment: "Авіаносний винищувач"
 cv_fighter_equipment_desc: "Авіаносні літаки — це морська авіація, призначена для дій з авіаносців. Хоча наприкінці Першої світової війни як авіаційна, так і авіаносна технології перебували на відносно ранніх стадіях розвитку, вже розпочалися експерименти з об’єднання цих двох напрямків. Перша посадка на палубу корабля відбулася ще до війни, і з швидким розвитком авіації у військовій справі стала очевидною потреба у спеціалізованих літаках, пристосованих до зльоту та посадки з цих кораблів."

 jet_fighter: "Винищувач"
 jet_fighter_equipment: "Реактивний винищувач"
 jet_fighter_equipment_desc: "Винищувачі — це основа будь-яких повітряних сил. Їх використовують для досягнення переваги в повітрі, а також для боротьби з ворожими бомбардувальниками та винищувачами. Це універсальні літаки, здатні виконувати будь-яке доручене їм завдання, але не виділяються в жодному конкретному напрямку."
 
 nav_bomber: "Морський бомбардувальник"
 nav_bomber_equipment_desc: "Морський бомбардувальник призначений для використання над водою та нанесення точних тактичних ударів по ворожих надводних кораблях за допомогою торпед або бронебійних бомб. Він має обмежені можливості для повітряного бою, що робить його вразливим у разі перехоплення винищувачами."
 
 cv_nav_bomber: "Торпедоносець"
 cv_nav_bomber_equipment_desc: "Торпедоносець — це літак, розроблений незадовго до Першої світової війни з метою перевезення та скидання повітряних торпед, що завдають значної шкоди кораблям будь-якого типу. У пізніших моделях торпеди зазвичай розміщуються під крилами, а в ранніх — під центром літака. Хоча торпеди, що запускаються з бомбардувальника, зазвичай легші за ті, що несуть катери, у великій кількості вони можуть завдати нищівного удару."
 
 tac_bomber: "Тактичний бомбардувальник"
 tac_bomber_equipment_desc: "Тактичні бомбардувальники — це літаки середнього розміру, більші за винищувачі, але менші за стратегічні бомбардувальники, які використовуються переважно для нанесення ударів по наземних підрозділах противника, таких як бронетехніка та піхота. Хоча вони мають обмежені можливості для повітряних боїв, у повітряних сутичках винищувачі легко перевершують їх."
 
 heavy_fighter: "Важкий винищувач"
 heavy_fighter_equipment_desc: "Важкі винищувачі — це винищувачі дальнього радіусу дії, призначені для супроводу бомбардувальників та відбиття атак ворожих перехоплювачів. Вони навчені тактиці виконання цієї місії. У місіях із забезпечення переваги в повітрі вони менш ефективні."
 
 strat_bomber: "Стратегічний бомбардувальник"
 strat_bomber_equipment: "Стратегічний бомбардувальник"
 strat_bomber_equipment_desc: "Стратегічні бомбардувальники — найважчий тип літаків, призначений для доставки великого боєзапасу бомб у ворожі провінції з метою паралізування його промисловості та інфраструктури. Однак, незважаючи на велику дальність польоту, стратегічний бомбардувальник є повільним, що робить його вразливим до атак винищувачів."
 
 transport_plane: "Транспортний літак"
 transport_plane_equipment_desc: "Транспортні літаки призначені для швидкого перевезення особового складу та матеріальних засобів на великі відстані. Десантникам потрібні транспортні літаки для здійснення десантних операцій."
 
 guided_missile: "Ракета"
 guided_missile_desc: "Балістична ракета призначена для доставки вибухового заряду до віддаленої цілі. Її висока швидкість робить її майже неможливою для перехоплення, але це дорогий спосіб знищення ворога за допомогою звичайних вибухових речовин. Щоб надати їй більше, ніж психологічний ефект, потрібна ядерна зброя."

 rocket_interceptor_equipment: "Ракетоперехоплювач"
 rocket_interceptor_equipment_desc: "Літак на ракетному двигуні використовує ракету для руху. Ракетолітаки можуть розвивати набагато вищі швидкості, ніж реактивні літаки аналогічних розмірів, але зазвичай можуть перебувати в режимі активного польоту не більше кількох хвилин, після чого переходять у планерний політ. Оскільки вони не залежать від кисню з атмосфери, вони придатні для польотів на дуже великих висотах. Вони також здатні розвивати набагато більше прискорення та здійснювати зліт з меншої відстані."

 ### Engineering Technology ###################################################################################
 
 
 radar_1: "Радіомовлення"
 radar_1_desc: "Радіо — це відносно новий винахід, перші успішні передачі за допомогою якого відбулися на початку 1900-х років. Хоча сфера його цивільного застосування продовжує розширюватися, саме військовий потенціал радіомовлення вимагає нашої уваги. Забезпечуючи передачу наказів, оновлених розвідувальних даних та стратегічної інформації на великі відстані в режимі реального часу, радіо дозволяє досягти безпрецедентного рівня координації між штабом та підрозділами на полі бою."  
 radar_2: "Дециметровий радар"
 radar_2_desc: "Радарні системи з дециметровими довжинами хвиль мають значно більшу дальність виявлення та надійність, ніж попередні моделі. Ці системи краще підходять для відстеження великих повітряних і морських цілей на великі відстані. Їхня довша довжина хвилі забезпечує кращі характеристики в погану погоду, що робить їх важливою складовою мереж раннього попередження та берегової оборони."  
 radar_3: "Пошуковий радар"
 radar_3_desc: "Пошуковий радар призначений для сканування великих ділянок повітряного простору або відкритих водних просторів, безперервно обертаючись для виявлення наближаючихся загроз на відстані. Він виконує роль «очей» будь-якої системи протиповітряної оборони чи морського екрану, надаючи постійну інформацію про позиції противника та відповідно керуючи силами своїх військ. Його роль є критично важливою для оповіщення командних пунктів та ініціювання відповідних дій."  
 radar_4: "Резонаторний магнетрон"
 radar_4_desc: "Поява резонаторного магнетрона стала переломним моментом у розвитку радіолокаційної техніки. Він дає змогу розробляти компактні та ефективні радіолокаційні комплекси для літаків і кораблів завдяки генерації мікрохвильових частот високої потужності в компактному пристрої. Це вдосконалення забезпечує вищу роздільну здатність, менші розміри антен та ефективніше відстеження й наведення на ціль на різних платформах."  
 radar_5: "Air Radar Application"
 radar_5_desc: "The adaptation of radar for use in aircraft transforms air combat and reconnaissance. Airborne radar allows pilots to detect enemy aircraft, surface vessels, or terrain features beyond visual range and in poor visibility. These systems are critical for night fighting, long-range interception, and battlefield navigation."  
 radar_6: "Monopulse Technique"
 radar_6_desc: "The monopulse radar technique calculates the target's direction with high precision by splitting a single radar pulse across multiple beams. This eliminates the need for scanning delays and significantly improves the ability to track fast-moving or manoeuvring threats. It represents a significant advance in radar accuracy and resistance to electronic countermeasures."  
 radar_7: "Centimetric Radar"
 radar_7_desc: "These radars, which use centimetric wavelengths, can detect smaller targets with greater accuracy. This capability is critical for detecting periscopes, fast boats, and low-flying aircraft that may escape detection by longer-wavelength systems. Their higher frequency output also helps with target definition in cluttered environments."  
 radar_8: "Improved On-Board Application"
 radar_8_desc: "As radar becomes more widely adopted across platforms, onboard integration improves dramatically. Systems are wired directly into combat information centres and fire control suites, allowing for faster decision-making. Improved interfaces and automated processing allow crews to quickly interpret radar data, increasing both survivability and lethality in combat."  

 computing_1: "Automatic Feed Calculator"
 computing_1_desc: "This early mechanical aid automates repetitive calculations by advancing variables through pre-programmed gears and cams. It is commonly used in artillery units and logistical planning to reduce manual workload, improve consistency of results, and speed up firing preparations or inventory assessments."
 computing_2: "Analog Fire Control"
 computing_2_desc: "Analogue fire control systems use mechanical components to convert target data like distance, speed, and bearing into precise firing solutions. These systems are integrated into naval vessels, coastal batteries, and anti-aircraft platforms to improve salvo coordination and timing. Operators manually enter changing conditions, but once configured, the system can quickly calculate continuous updates, giving units an advantage in combat."
 computing_3: "Analytical Engine Computing Unit"
 computing_3_desc: "The analytical engine is a conceptual and partially realised design that draws on early mechanical computation work. It performs complex, multi-stage calculations using punch cards, gear-driven logic, and modular memory units. Despite its size and complexity, it introduces important features such as conditional operations and automated output, making it useful for detailed engineering tasks, cryptographic work, and logistical forecasting."
 computing_4: "Accounting Machine"
 computing_4_desc: "These tabulating devices, which were originally designed for administrative purposes, are now used in the military to process and organise data related to personnel, equipment, and supply movements. They use punch cards and mechanical sorters to quickly compile records and statistical summaries. The accounting machine provides a new level of speed and accuracy in managing the massive bureaucratic demands of modern warfare."
 computing_5: "Basic Computing Machine"
 computing_5_desc: "An early computing platform capable of carrying out general arithmetic and basic logical operations. It runs fixed routines stored on paper tape or hardwired circuitry, with limited memory and speed. Despite its simplicity, it is extremely useful for repetitive technical tasks such as ballistics calculation, code-breaking assistance, and logistical planning."
 computing_6: "Electromechanical Relay Computer"
 computing_6_desc: "These machines use relays to open and close circuits in sequence, allowing them to perform a wide range of logical and mathematical operations. Although slower than electronic counterparts, they are more reliable than purely mechanical systems and can be reconfigured for various tasks. Relay computers are used in codebreaking facilities, technical research labs, and large-scale logistics hubs where consistent computation is required."
 computing_7: "Automatic Digital Computer"
 computing_7_desc: "The switch to vacuum tube-based circuitry enables this generation of computers to operate entirely electronically, significantly increasing their speed and range of functions. These machines can be programmed to simulate battles, decrypt complex cyphers, and process massive amounts of data in hours rather than days."
 computing_8: "Stored-Program Computer"
 computing_8_desc: "This technology allows both instructions and data to be stored in a computer's internal memory, allowing machines to switch tasks or self-modify while operating. It significantly reduces setup time and increases flexibility, allowing computers to support a wide range of military functions, including radar targeting and supply forecasting."
 decryption_encryption_1: "Ciphering Machine"
 decryption_encryption_1_desc: "Mechanical and electromechanical cypher devices generate and decode secure messages through complex arrangements of rotors, plugboards, or electronic circuits. They are critical to protecting communications over land, air, and sea, making it more difficult for adversaries to intercept or decipher sensitive data. Each unit adheres to a synchronised encryption protocol, necessitating both precise operation and constant attention to maintain information superiority."
 decryption_encryption_2: "Teleprinter"
 decryption_encryption_2_desc: "The teleprinter allows for direct, typed communication across long distances by electrically transmitting keystrokes to a paired machine. It is an important tool for military coordination, allowing for quick dispatches between commands without relying on manual Morse code or hand-delivered messages. Its dependability and speed significantly enhance command responsiveness in active theatres."
 encryption_1: "3-Rotor System"
 encryption_1_desc: "To scramble letters into ciphered outputs, a compact encryption device uses a series of three rotating wheels, each with variable internal wiring. Each rotor's position changes with each keystroke, resulting in a constantly shifting code. This system is widely used for its portability and moderate security, and it serves as the foundation for mid-level encrypted military communications."
 encryption_2: "6-Rotor System"
 encryption_2_desc: "This advanced cypher device expands on previous rotor machines by incorporating additional layers of encryption via six rotating rotors. The increased complexity significantly improves security, making codebreaking by adversaries much more difficult without inside knowledge or extensive analysis."
 encryption_3: "5-bit Combinations"
 encryption_3_desc: "A standardised encoding system that represents characters with five binary digits. Despite its limited symbol variety, it is efficient and reliable for military telegraphy, radio teletype, and early cryptographic systems. It is the foundation of simplified data encoding schemes used in communication networks and cypher devices."
 decryption_1: "Cryptographic Mathematical Theory"
 decryption_1_desc: "Mathematical breakthroughs in combinatorics, permutation, and probability have a direct impact on cypher strength and analysis. Applying rigorous theory to encryption and decryption allows for the creation of stronger codes and more systematic approaches to breaking enemy communications. These theories influence how machines are designed to deal with complex cryptographic problems."
 decryption_2: "Computing Machine Support"
 decryption_2_desc: "Integrating early computing machines into codebreaking and data analysis opens up new possibilities in intelligence work. These machines are tasked with simulating cypher wheels, testing key permutations, and detecting repeated patterns in intercepted data."
 decryption_3: "Identification of Parallel Texts"
 decryption_3_desc: "Analysts develop techniques to isolate likely phrases or recurring terms by comparing encrypted messages that appear to be copies or revisions of earlier texts. This method is critical for exploiting enemy communication patterns and serves as an invaluable tool for both manual cryptanalysts and machine-assisted operations."
 train_equipment: "Train"
 train_equipment_short: "Train"
 train_equipment_desc: "Trains transport supplies from the Supply Capital to Supply Hubs connected by rail."
 train_equipment_1: "Civilian Train"
 train_equipment_1_short: "Civilian Train"
 train_equipment_1_desc: "Taken over by the military from regular civilian freight duty, this train engine is well-suited to move a large amount of supplies over long distances. However, its civilian construction makes it vulnerable."
 train_equipment_2: "War Austerity Train"
 train_equipment_2_short: "War Austerity Train"
 train_equipment_2_desc: "A simplified design that ommits many features commonly found on regular freight trains for the sake of cheaper production. It is still every bit as vulnerable as a regular train, but can more easily be replaced."
 train_equipment_3: "Armored Train"
 train_equipment_3_short: "Armored Train"
 train_equipment_3_desc: "A train engine encased in heavy armor to make it less vulnerable to enemy attack. It can carry as much cargo as any other design, but is more expensive to produce."
 railway_gun_equipment: "Railway Artillery"
 railway_gun_equipment_desc: "A heavy cannon mounted on a railway carriage for transportation."
 railway_gun_desc: "Railways offer an opportunity to move heavy guns far inland at a reasonable speed, allowing us to bombard enemy position at great range and with good effect."
 railway_gun_equipment_1: "Railway Gun"

 rocketry_1: "Experimental Rocket Engine"
 rocketry_1_desc: "Advancing the science of rocketry by improving the range and reliability of liquid-fuel rockets will teach us enough about the technology to allow the construction of launch sites for more advanced models."
 rocketry_2: "Rocket Test and Research Facility"
 rocketry_2_desc: "Dedicated facilities are being built to test and improve rocket propulsion systems, guidance mechanisms, and warhead designs. These facilities enable controlled experimentation and long-distance trials, hastening progress in both surface-to-surface missiles and airborne weapons."
 rocketry_3: "Rocket Engine"
 rocketry_3_desc: "Knowledge of rocket propulsion is reaching a point where we can construct flying bombs and rocket-powered aircraft, operating at previously unreachable speeds."
 rocketry_4: "Flying Bomb"
 rocketry_4_desc: "A pilotless aircraft equipped with an explosive payload and a timed or primitive guidance system. These early cruise missiles are launched from ground installations or aircraft and are designed to hit targets without endangering pilots. Despite their limited accuracy, they have a significant psychological and strategic impact, ushering in unmanned strike warfare."
 rocketry_5: "Strategic Rocket"
 rocketry_5_desc: "The first long-range ballistic missiles can be built and made ever more precise, reaching distant enemy cities and even into space."
 rocketry_6: "Ballistic Missle"
 rocketry_6_desc: "The future of rocketry opens up possibilities like intercontinental missiles, the range of which knows few limits while the payloads grow more lethal."
 rocketry_jet_1: "Early Turbo Jet Engine"
 rocketry_jet_1_desc: "This propulsion system introduces the concept of thrust, which is produced by compressing air, mixing it with fuel, and expelling it at high speeds. Early models have reliability issues and require a lot of maintenance, but they can go much faster than piston engines."
 rocketry_jet_2: "Practical Tubo Jet Engine"
 rocketry_jet_2_desc: "Refinements in materials, engineering tolerances, and fuel delivery systems result in a dependable, repeatable turbojet engine suitable for front-line service. These engines enable aircraft to climb quickly and fly at high speeds, outpacing traditional fighters and bombers."
 rocketry_interceptor_1: "Rocket Interceptor"
 rocketry_interceptor_1_desc: "Rocket-powered interceptor aircraft based on gliders can, for short periods of time, move faster than any other plane. While volatility of the fuel puts the planes at risk, they can take off and react to attacks faster than any enemy will expect."
 rocketry_interceptor_2: "Improved Rocket Interceptor"
 rocketry_interceptor_2_desc: "Still considered extremely dangerous to operate, the rocket-powered fighters are now aided by auto-pilots and towing by other aircraft to maximize the use of their extreme speed but short fuel window."

 nuclear_1: "Van De Graaff Generator"
 nuclear_1_desc: "Invented by American physicist Robert J. Van de Graaf, this electrostatic generator uses a moving belt to accumulate electric charge on a hollow metal globe on top of an insulated column, creating very high electric potentials. This generator was developed as an early particle accelerator for physics research, as its high potential can be used to accelerate subatomic particles to great speeds. While primitive, it provides some early insights into the field of nuclear research."
 nuclear_2: "Atomic Research"
 nuclear_2_desc: "In nuclear fission, splitting the atom yields enormous amounts of energy and limitless destructive capability."
 nuclear_3: "Research Laboratories"
 nuclear_3_desc: "While scientists always require a safe and secure environment in which to conduct potentially dangerous experiments, we, as a state, must expect more from them in order to truly charge into the future. As a result, our architects have been tirelessly working on mock-ups for new scientific buildings that will be specifically designed to bring many scientists together with the best equipment and provisions in order to make truly significant breakthroughs."
 nuclear_4: "Nuclear Research"
 nuclear_4_desc: "Scientific research into the properties of atomic nuclei reveals enormous energy potential hidden within matter. Radioactivity, neutron behaviour, and atomic theory are the primary research topics, with applications ranging from energy production to weaponization."
 nuclear_5: "Isotope Separation"
 nuclear_5_desc: "To unlock nuclear energy, specific isotopes, such as uranium-235 or plutonium-239, must be separated from more common forms. This process necessitates advanced techniques such as gaseous diffusion and electromagnetic separation. The technology is costly and complex, but it is required to produce materials suitable for long-term chain reactions."
 nuclear_6: "Controlled Nuclear Chain Reaction"
 nuclear_6_desc: "With proper isotope and neutron moderation, a self-sustaining nuclear chain reaction is possible. This breakthrough demonstrates that nuclear energy can be safely harnessed in a laboratory setting, paving the way for reactor development and, potentially, the creation of compact, high-yield explosives."
 nuclear_7: "Experimental Reactor"
 nuclear_7_desc: "The construction of the first operational nuclear reactor enables hands-on testing of fuel behaviour, neutron flux, and thermal regulation. Though not yet used for large-scale power generation, this facility serves as a testing ground for safe containment, reactor design, and future atomic system operational protocols."
 nuclear_8: "Nuclear Reactor"
 nuclear_8_desc: "As we gain a better understanding of the power of the atom, we must construct facilities to further investigate nuclear capabilities and test fission nuclear chain reactions on a larger, more secure scale. These sites may not only advance our research, but also produce energy for our people and weapons for our military. Indeed, some of our scientists have requested that these sites be used to create the most powerful and destructive weapons possible."
 nukes: "Nuclear Bomb"
 nukes_desc: "A project to construct an atomic bomb will be one of the most secretive and difficult tasks a nation can undertake, but, if successful, may change not only the course of today's wars but of the future of the world."
 nuclear_10: "Nuclear Propulsion"
 nuclear_10_desc: "\n Nuclear marine propulsion is propulsion of a ship or submarine with heat provided by a nuclear power plant. The power plant heats water to produce steam and it is this steam that powers the steam turbines and turbo generators. The power is then transferred to a gearbox that reduces the ratio by around 50 to 1 and this powers the propulsor. Naval nuclear propulsion is used specifically within naval warships such as supercarriers and submarines."

 ### Land Doctrines Technology   ########################################################################
 # WW1 + Interwar Doctrines
 Twentieth_Century_Warfare: "20th Century Warfare"
 Twentieth_Century_Warfare_desc: "With the mobilization of the European powers, fullscale war has descended upon the continent. Around the globe, lessons are being learned about the new warfare of the 20th Century. Brutal, loud and unprincipled, gone are the days of marching in columns and flying the colors. New organizational structures and tactics are required if we wish to gain the advantage in this new era."
 Leading_by_Task: "Leading By Task"
 Leading_by_Task_desc: "The \"Leading by Task\" doctrine emphasises a decentralised command structure in which leaders are assigned specific tasks rather than micromanaging every action. This approach promotes initiative and adaptability in subordinates, allowing for faster responses to changing battlefield conditions. It is based on trust and a clear understanding of the overall objective, allowing units to act independently while working towards the same goal."
 Leading_by_Order: "Leading By Order"
 Leading_by_Order_desc: "The \"Leading by Order\" doctrine emphasises centralised command, in which decisions are made by higher-ranking officers and communicated down the chain of command as explicit orders. This approach ensures strict discipline and control over units, leaving little room for deviation from the plan. Orders are clear and precise, with little room for interpretation by subordinates. While this can improve coordination and reduce the risk of disorganised actions, it also relies heavily on the efficiency and decisiveness of higher command, leaving less flexibility on the battlefield."
 Strongpoint: "Strongpoint"
 Strongpoint_desc: "All along the European plain, trenches stretch across the landscape. Rudimentary at first, these dugouts are allowing staging positions to be set up directly at the battlefield. The concept of strongpoints creates areas where supplies, communications and even artillery lines can be used to invade or fortify local sectors. A new doctrine is emerging along the front, and it’s 10 feet deep."
 Mass_Charge: "Mass Charge"
 Mass_Charge_desc: "While the war started at a breakneck pace, it has slowed to a crawl. In a bid to try and upend enemy positions, many commanders are using outdated mass infantry charges to cross the newly known No Man's Land. While the tactic has provided some limited success, we are bleeding casualties. Therefore, more men are required to bolster our divisions if we are to further this strategy."
 Static_Defence: "Static Defence"
 Static_Defence_desc: "Trench Warfare has now become the default doctrine of this terrible conflict. Day by day, lines are wired, supplies are cached and tunnelers are digging. It is becoming clear that widespread offensives will give nothing but blood and inches. Staying below ground, below the storm of lead, is providing a defense unlike any conflict before. A war of attrition has begun."
 Counterattack: "Counterattack"
 Counterattack_desc: "High Command has learned many lessons over the past months about offensive movements in defensive environments. Tunnelers are creating paths below the lead laden air, officers are finding breaks in the wires and artillery is creating literal walls of ordinance. Combining these tactics with immediate counterattacks is allowing our gains to be counted in miles rather than yards."
 Defence_In_Depth: "Defence In Depth"
 Defence_In_Depth_desc: "A deeper knowledge of fortification tactics is required to keep our armies in the conflict. Trenches are being designed snaking miles behind the battlefield. Pillboxes are deployed, artillery is emplaced and barbed wire is being unwrapped. The literal dirt beneath our feet is being gauged in its defensive properties. It’s no longer a static front, strategic depth is the path for total victory."
 Schwerpunkt: "Schwerpunkt"
 Schwerpunkt_desc: "In this bloody war of attrition, widespread offensives just lead to widespread casualties. All the largest battles drain the manpower of the involved nations. Instead, using a  focus point, or Schwepunkt, will bring tactical success. Every unit, company, officer and general are planning a single point of attack, even if risking other sectors. Concentrated spearheads will plow the enemy trenches."
 Separate_Arms_Force: "Separate Arms Force"
 Separate_Arms_Force_desc: "Technology marches right alongside the armies. A new metal machine, known as a tank, are able to traverse the deadly middleground and breakthrough trenches. Flying vehicles, aircraft, provide hourly reconnaissance. Artillery grows larger in range and caliber. They have found their niche in this conflict, and while tactics are lacking, their individual contributions cannot be ignored."
 Combined_Arms_Effort: "Combined Arms Effort"
 Combined_Arms_Effort_desc: "Aircraft send reports on successful artillery barrages. Infantry hug the tanks closely across No Man’s Land. Slowly but surely, these individual machines of war have become entangled with modern battlefield tactics. While the trenches of old are still the default measure of war, these technologies are once again modifying the doctrine. Metal is replacing dirt as the scenery of combat."
 Specialized_Branch_Tactical_Experience: "Specialized-Branch Tactical Experience"
 Specialized_Branch_Tactical_Experience_desc: "This terrible war is now in its final death throes. We have learned so much in the last few years of the conflict. Our armed forces have become their own fleshed out branches. Ground based infantry, mechanized forces, blue water navies and airborne fleets are now expertly bringing the bloodshed to a conclusion. This doctrine is the future, whether a bright or dark one."
 Cross_Branch_Tactical_Experience: "Cross-Branch Tactical Experience"
 Cross_Branch_Tactical_Experience_desc: "This terrible war is now in its final death throes. We have learned so much in the last few years of the conflict. Our armed forces have integrated heavily between the individual branches. Naval forces work in tandem with our airborne fleets, while ground based infantry ride along or just behind our mechanized machines. This doctrine is the future, whether a bright or dark one."
 Beyond_Trench_Warfare: "Beyond Trench Warfare"
 Beyond_Trench_Warfare_desc: "The Great War has finally concluded. Millions have perished in the largest conflict in human history.  Industrialized, entrenched and explosive, battlefield warfare has been transformed forever. So much has changed, and many have yet to fully understand what the doctrine of war will be beyond the trenches. While the ink is still wet on the treaties, some wonder if this is really an end or just a beginning."
 # Mobility Focus
 Mobility_Focus: "Mobility Focus"
 Mobility_Focus_desc: "Mobility Focus is a tactic that uses speed and manoeuvrability to isolate and disorganise opposing forces. Rather than engaging in long, head-on battles, this strategy uses quick movements to penetrate weak points, bypass strongholds, and encircle enemy units, cutting them off from supplies, reinforcements, and command structures. By staying one step ahead of the opposition, they maintain operational momentum and seize the advantage before the enemy can regroup or react."
 Spearhead: "Spearhead"
 Spearhead_desc: "To break through opposing lines, our armoured forces must focus on a small front and overwhelm their opponents. As they advance, they must have infantry support from behind to protect their vulnerable flanks and cover any counterattacks that may occur. These independent units will provide us with a significant advantage over any infantry force we encounter."
 Armored_Schwerpunkt: "Armored Schwerpunkt"
 Armored_Schwerpunkt_desc: "The term "Schwerpunkt," or "point of main effort," refers to the practice of concentrating tanks, artillery, infantry, and close air support in a single, critical location in order to break through enemy lines. Furthermore, once a breach has occurred, the attackers continue on, enveloping, isolating, or bypassing resistance without becoming bogged down. Strong reserves remain mobile to counterattack wherever needed and provide defensive cover for the armour."
 Combined_Arms_Offensive: "Combined Arms Offensive"
 Combined_Arms_Offensive_desc: "A "combined arms offensive" is defined as the coordinated deployment of multiple combat forces to achieve battlefield superiority. The fundamental goal is to overwhelm the enemy by making them vulnerable to at least one type of force, regardless of how they react. Furthermore, each component of the offence strives to leverage their strengths to compensate for the weaknesses of the others."
 Delay: "Delay"
 Delay_desc: "Ambushes, roadblocks, and hit-and-run operations can all help to slow enemy momentum while allowing for reinforcements and escape. These operations can turn short-term losses into long-term gains by exhausting the opponent or altering the overall battlefield situation. Though they may not defeat the opponent, they can tip the scales in a larger campaign."
 Elastic_Defense: "Elastic Defense"
 Elastic_Defense_desc: "Elastic defence is a dynamic defensive tactic that reduces human casualties by delaying and attriting by giving up space, followed by counterpunches when the attacker is vulnerable. Furthermore, by constructing a "deeper" layer of fortifications, an elastic defence allows the defender more time to respond and launch a counterattack while the attacker is spread out and slowed down. As a result, in order to stress an attacker's logistics, a defender may cede lightly defended territory."
 Kampfgruppe: "Kampfgruppe"
 Kampfgruppe_desc: "The term "Kampfgruppe" refers to a battle formation composed of armour, infantry, and artillery that is tailored to the requirements of a specific mission. It encourages flexibility and local superiority while preserving decentralised command. Another benefit is that it promotes resilience and can facilitate cross-unit collaboration."
 Firebrigades: "Firebrigades"
 Firebrigades_desc: "Fire Brigades are not part of the standard combat plan, but are intended to quickly fill gaps or deal with unexpected obstacles, much like a fire department responds to a fire. As a result, their primary goal is to contain and, if possible, resolve these issues, which means they are prepared with little to no notice."
 Spearhead_HQs: "Spearhead HQs"
 Spearhead_HQs_desc: "Spearhead Headquarters primary responsibility is to establish command and control early, shape the battlefield, and provide situational information to higher-level commanders. Furthermore, they are intended to take immediate command of a joint or combined force, integrating information, logistics, and communications to enable quick, decisive action. They are an important structure in spearhead operations because they provide the necessary organisation for the troops to continue their advance."
 Modern_Blitzkrieg: "Modern Blitzkrieg"
 Modern_Blitzkrieg_desc: "Our efforts to learn from our army's experience have yielded the pinnacle of modern combat, Modern Blitzkrieg. Overwhelming concentrations of armoured infantry and artillery, combined with constant air support, have become our standard mode of combat against any opponent we may encounter. We can defeat any army with swift and decisive battles, delivering a crushing blow before they can fully mobilise."
 # Planning Focus
 Planning_Focus: "Planning Focus"
 Planning_Focus_desc: "Extensive planning and preparation are absolutely required to win any conflict. As a result, if we are to master the art of warfare, our generals and officers must focus on meticulously planning every aspect and detail before engaging in any combat, whether it is an offensive plot or a defensive strategy. Only in this manner can we defeat enemy armies and declare victory."
 Grand_Battle_Plan: "Grand Battle Plan"
 Grand_Battle_Plan_desc: "As witnessed during the Great War, if we want to build impenetrable defences and launch massive offensive manoeuvres, we must collect massive amounts of information to ensure that we do not face unexpected challenges. This will give us a significant strategic advantage over our adversaries, allowing us to conduct large-scale operations smoothly."
 Trench_Warfare: "Trench Warfare"
 Trench_Warfare_desc: "Previous international conflicts have demonstrated that trench warfare is the only strategy for fighting large hostilities. We will improve our fighting strategy to ensure that our troops are always well entrenched and can become so in a timely and efficient manner. Our trenches will become impenetrable, fearsome fortresses."
 Mass_Assault: "Mass Assault"
 Mass_Assault_desc: "Undoubtedly, the only way to overwhelm and conquer enemy defences is to attack them with such an immense number of soldiers that they are forced to surrender or face death. Our forces are to attack any opponent they come across mercilessly and ensure that they achieve their desired goal, no matter the cost. Quantity will always outweigh quality."
 Pre_Planned_Defense: "Pre-Planned Defense"
 Pre_Planned_Defense_desc: "According to studies and statistics, if we prepare our defences well in advance of enemy attacks, we will be able to repel any assault, no matter how large, that may be launched against our forces. All commanders will keep their forces dug in and prepared for any defensive stand that may occur. We will never be the victims of a surprise attack."
 Central_Planning: "Central Planning"
 Central_Planning_desc: "As previously stated, the secret behind any successful offensive operation is extensive planning and adequate cooperation among our intelligence branches. We must ensure that any attack we launch is well-planned and receives all relevant intelligence. Officers from all branches will now work together to organise an operation so that it runs as smoothly as possible."
 Attritional_Containment: "Attritional Containment"
 Attritional_Containment_desc: "If we are unable to launch an offensive to destroy an enemy location, small-scale attacks must be launched on a continuous basis. This will result in casualties and prevent the opponent from launching an attack of their own. Furthermore, the constant attacks will provide a morale hit within the enemy troops, which will be constantly harassed and will be unable to mount any meaningful operation or rest and recover from our previous offensive operations."
 Assault_Breakthrough: "Assault Breakthrough"
 Assault_Breakthrough_desc: "Concentrating the offensive on a single front is often far more effective than launching a massive assault across all fronts. To keep casualties and material loss to a minimum, our commanders will aim for breakthroughs at one or two strategically chosen points. After we make the breakthrough, our troops will flood in and exploit the gap, collapsing enemy lines and inflicting massive losses."
 Operational_Stages: "Operational Stages"
 Operational_Stages_desc: "An attack on the entire front is unlikely to succeed and could cost us a large number of troops and materials. We will conduct our offensive manoeuvres in stages, concentrating our troops on smaller fronts where we are most likely to gain superiority and make significant advances. Using this method, we will be able to overwhelm enemy lines and collapse the entire front."
 Branch_Interoperability: "Branch Interoperability"
 Branch_Interoperability_desc: "Cooperation between branches is essential in any military, whether in defensive or offensive operations. We will work to improve relations between the air force, navy, and army, even if the decision is unpopular. This will provide us with enormous advantages, as cooperation will be critical to outperforming our competitors."
 Assault_Concentration: "Assault Concentration"
 Assault_Concentration_desc: "Prior to an attack, the leading elements are meticulously prepared and deployed in forward positions, allowing maximum force to be applied in the early stages. Furthermore, the attacking force will be composed of infantry and armour divisions, ensuring that our advances are not easily reversed by enemy counterattacks. All offensives that use this technique are almost certain to succeed."
 Light_Mobility: "Light Mobility"
 Light_Mobility_desc: "As technology and warfare advance, mobility becomes increasingly important for offensive operations, as even minor changes in speed can devastate an overwhelming attack. Our generals and officers will begin motorising our armed forces to provide the much-needed mobility for our offensives. The days of attacking with slow infantry are over."
 Combined_Arms: "Combined Arms"
 Combined_Arms_desc: "When infantry, armour, and support units work together, they are far more effective than when used separately. Tanks can break through enemy lines with speed and firepower, whereas infantry and support units can fill gaps and repel enemy counterattacks. When combined into a cohesive instrument, they will form a formidable and adaptable force that every enemy we encounter will fear."
 Infiltration_Assault: "Infiltration Assault"
 Infiltration_Assault_desc: "Infantry must strike the opposing line's weak points in the early stages of an attack to get around and isolate the better-defended areas, which the remaining attacking troops can then destroy. If they are successful in infiltrating enemy lines, the line could collapse and be destroyed by troops. However, these attacks must be executed with caution in order to avoid revealing the surprise."
 Infiltration_in_Depth: "Infiltration in Depth"
 Infiltration_in_Depth_desc: "To deliver a critical blow and make an exploitable breakthrough, we will train our forces to bypass and isolate enemy strongpoints. Our assault troops will only achieve their goal if the enemy is completely cut off from all communication and supply lines. This will cause panic among soldiers and commanders, creating the ideal conditions for the remainder of the troops to launch an offensive and cripple the enemy lines."
 Light_Infantry_Tactics: "Light Infantry Tactics"
 Light_Infantry_Tactics_desc: "These doctrines instruct infantry forces to infiltrate enemy positions under cover of darkness or terrain, striking where defences are vulnerable, rather than relying on overwhelming firepower or mass assaults. By emphasising small-unit leadership and initiative, light infantry formations become more resilient and capable of conducting continuous offensive operations even in challenging conditions. This strategy improves organisation and increases breakthrough potential, allowing our troops to hold for longer and push deeper during attacks."
 # Firepower Focus
 Firepower_Focus: "Firepower Focus"
 Firepower_Focus_desc: "The tragedies of the Great War demonstrated that throwing oneself at the enemy not only fails to win battles, but also wastes manpower, from which we may never recover. Our strategy will now be to focus our efforts on massing massive amounts of artillery capable of blasting and destroying opposing forces without requiring our soldiers to confront them directly. Hopefully, this will reduce the number of casualties while destroying enemy forces without firing a single rifle."
 Superior_Firepower: "Superior Firepower"
 Superior_Firepower_desc: "By emphasising artillery and support weapons, we will be able to maximise the damage dealt to the forces we fight while protecting our troops from suicidal attacks intended to break the enemy's lines. Precision fire and sustained barrages will shatter enemy formations, disrupt command structures, and erode morale long before direct engagements begin. Furthermore, this approach not only saves lives, but it also ensures strategic superiority via tactical discipline and superior weapon integration."
 Delay_2: "Delay"
 Delay_2_desc: "Ambushes, roadblocks, and hit-and-run operations can all help to slow enemy momentum while allowing for reinforcements and escape. These operations can turn short-term losses into long-term gains by exhausting the opponent or altering the overall battlefield situation. Though they may not defeat the opponent, they can tip the scales in a larger campaign."
 Mobile_Defense: "Mobile Defense"
 Mobile_Defense_desc: "Static defence formations can be problematic because reinforcing them takes time and effort. To address this issue, we will emphasise the strategic deployment of mobile troops as a first response when a defensive line is under threat of collapse. This will provide a significant advantage because we will be able to repel attacks more easily and reinforce our troops as needed."
 Stand_Off: "Stand Off"
 Stand_Off_desc: "Improving tactical discipline, communication, and command structure will allow our infantry formations to perform well in combat even under extreme conditions. When troops are better organised, they can hold the line for longer periods of time, regroup faster, and respond more effectively to changing battlefield conditions. Our infantry gains a great deal of resilience, allowing it to carry out long-term operations with greater confidence and stability."
 Integrated_Support: "Integrated Support"
 Integrated_Support_desc: "Support companies are critical to any unit organisation, especially infantry and tank units. If we want them to work efficiently and provide the best possible support to our fighting men, we must fully integrate them into our divisions. Support forces are closely integrated with combat troops, resulting in more offensively capable divisions."
 Regimental_Combat_Teams: "Regimental Combat Teams"
 Regimental_Combat_Teams_desc: "Infantry regiments work closely with supporting units such as artillery, tanks, and reconnaissance components to form regimental combat teams, resulting in a small, self-sufficient unit with greater attacking flexibility. These combined-arms formations are designed to operate autonomously, allowing them to respond quickly to changing tactical conditions without relying on centralised command or higher-level reinforcement."
 Mechanized_Offensive: "Mechanized Offensive"
 Mechanized_Offensive_desc: "Motorised forces have traditionally performed well, but to lead offensives, we require infantrymen who can ride into battle in armoured vehicles capable of carrying and protecting heavy weaponry. Furthermore, while the armour may cause a slight slowdown in general offensives, it will provide critical protection, allowing us to reduce casualties and making mechanised soldiers a formidable foe for opposing armies."
 Combined_Arms_Defense: "Combined Arms Defense"
 Combined_Arms_Defense_desc: "By better coordinating troops, armour, and support forces, we can create a strong front line capable of repelling even the most determined attacks. This new defensive strategy emphasises improved communication, coordinated manoeuvres, and mutual assistance among unit types, allowing them to cover each other's weaknesses. Our frontline battalions will be better organised and able to withstand enemy attacks."
 Airland_Battle: "Airland Battle"
 Airland_Battle_desc: "As previously stated, our offensive and defensive strategies are based on the idea that our troops must be supported and protected before engaging in battle. As such, we will collaborate with the air force to ensure that our soldiers are always protected from the skies. Taking control of the air is more than just an advantage; it's a necessity."
 # Manpower Focus
 Manpower_Focus: "Manpower Focus"
 Manpower_Focus_desc: "We must not squander valuable resources and time by researching and developing complex and sophisticated weapons to arm our troops. Our forces can defeat any enemy, regardless of how advanced their equipment is, if we deploy them in sufficient numbers and with strong morale and discipline. By focusing on developing a large, well-trained, and motivated army, we can ensure victory through human determination and the power of numbers."
 Peoples_Army: "People's Army"
 Peoples_Army_desc: "We prioritise people over weapons, believing that greater motivation compensates for inferior technology, which necessitates widespread citizen support. Furthermore, this army will fight and defeat any adversary in the name of the people. Their encouragement, contributions, and sacrifices form the basis of any national effort that will propel every man to complete victory over any enemy military force."
 Large_Front: "Large Front"
 Large_Front_desc: "To maintain coherent and well-organised fronts, we must improve our soldiers' ability to coordinate across large areas. Furthermore, by using this method, armies can sustain long-term conflicts while outmanoeuvring opponents due to sheer depth, scale, and organisational supremacy. This method emphasises the integration and synchronisation of multiple divisions, corps, or even entire armies to achieve strategic objectives on multiple fronts."
 Large_Formation_SOP: "Large Formation SOP"
 Large_Formation_SOP_desc: "Rather than relying on advanced technology or pinpoint strikes, we will deplete the opponent through constant pressure and depth of numbers.This technique relies heavily on efficient resource utilisation and simplified logistics to keep troops provisioned and ready for long-term engagement, even in harsh conditions. Discipline, determination, and coordinated activity can exhaust any opponent."
 Pocket_Defense: "Pocket Defense"
 Pocket_Defense_desc: "When confronted with an enemy encirclement, our troops must do everything in their power to inflict as many casualties as possible while holding out until the last bullet and man. Every shot fired, every minute spent, and every blow delivered to the enemy must serve a larger purpose: to delay, weaken, and bleed the attacker. Their sacrifice will not be in vain, but will serve as a testament to the spirit of resistance."
 Defense_in_Depth_2: "Defense in Depth"
 Defense_in_Depth_2_desc: "By providing measured, light opposition and briefly yielding ground, we can exchange space for time, bringing opposing forces deeper into our defence. This strategy buys valuable time to regroup, reinforce critical areas, and plan a counterattack. This tactical manoeuvre disrupts their momentum while also strengthening our defensive capabilities, allowing us to reclaim the initiative. When the adversary is exhausted, overworked, and lacks coordination, an opportunity to strike decisively arises."
 Movement_Speed_Offensive: "Swift Offensive Theory"
 Movement_Speed_Offensive_desc: "Swift Offensive Theory significantly reduces organisational loss during movement, ensuring that our units remain coherent and ready for immediate action, even while on the road. With an accelerated reinforcement rate, we ensure that any gaps in our ranks are quickly filled, keeping the attack going. This will also allow us to strike quickly and decisively while remaining adaptable to changes on the battlefield."
 Mechanized_Wave: "Mechanized Wave"
 Mechanized_Wave_desc: "Mechanised troops are best suited for making quick advances to fully exploit breakthroughs, assisting armoured units, and defending the breach's flanks. Once armoured troops have penetrated enemy lines, mechanised infantry can surge forward to support and consolidate advances, preventing the enemy from regrouping or reinforcing their positions."
 Peoples_War: "People's War"
 Peoples_War_desc: "While battles are won by men and bullets, wars are won by people. If we are to achieve complete victory over our enemies, we must ensure that every woman, man, and child contributes in their own unique way to the war effort. This collective effort not only strengthens our resolve, but it also fosters a sense of unity and purpose among the people, which will undoubtedly propel us to victory."
 Rural_Guerilla_Tactics: "Rural Guerrilla Tactics"
 Rural_Guerilla_Tactics_desc: "The enemy must never rest, because every second of strength they exert could result in the death of one of our soldiers. Commanders must now order their forces to harass opposing formations, whether they are fleeing or attacking. Furthermore, if separated from their unit, our men must engage in guerilla tactics to limit the enemy's ability to defend."
 Mobile_Guerilla_Warfare: "Mobile Guerrilla Warfare"
 Mobile_Guerilla_Warfare_desc: "By focusing on quick, unpredictable movements and engagements, our forces remain elusive and adaptable, keeping the enemy on their toes. Furthermore, this approach to combat is based on hit-and-run tactics, allowing our troops to recover and regroup quickly after each skirmish. Whether harassing enemy supply lines or executing surprise strikes, we keep our forces one step ahead, ready to strike when least expected and recover quickly."
 Revolutionary_Base_Areas: "Revolutionary Base Areas"
 Revolutionary_Base_Areas_desc: "Revolutionary Base Areas serve as the foundation for our long-term operations, giving us the flexibility and resilience needed to fight on multiple fronts, regardless of the enemy's attempts to disrupt our supply lines. By focusing on critical resource and shelter supply points, we ensure that our troops are well-supplied even in the most extreme conditions. This ensures that our strength is unwavering, regardless of the challenges we face."
 Revolutionary_Base_Areas_Expansion: "Revolutionary Base Areas Expansion"
 Revolutionary_Base_Areas_Expansion_desc: "Revolutionary Base Area expansions enable us to build even more fortified supply hubs, giving us greater influence and control over critical regions. By increasing the number of critical zones, we not only reduce the likelihood of supply shortages, but also strengthen and maintain our troops' support networks. This extensive network increases flexibility, allowing our forces to operate efficiently across vast territories."
 Asymmetric_Warfare: "Asymmetric Warfare"
 Asymmetric_Warfare_desc: "Regardless of the enemy's strength or vast resources, our troops will fight using every strategy they can think of to repel and defeat them. Whether it is guerrilla warfare or suicide attacks, our soldiers will attack the enemy regardless of the cost or risk. Each battle fought will not only be a step closer to victory, but will also demonstrate our people's resilience and courage."
 Deep_Operations: "Deep Operations"
 Deep_Operations_desc: "By combining specialised tanks with improved organisation and speed, we create an unstoppable force capable of piercing enemy lines with precision. With increased army breakthrough, we ensure that our forces can exploit weaknesses in enemy defences and advance relentlessly. This strategy enables us to maintain momentum and put the opposition on the back foot, all while remaining flexible and autonomous at all levels."

