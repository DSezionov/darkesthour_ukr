#### Special Forces #######################################################################################
 Specialized_Units: "Спеціалізовані підрозділи"
 Specialized_Units_desc: "Ці формування призначені для дій у суворих і складних умовах, де звичайна піхота не може діяти. Будь то десантування за лінією фронту, подолання небезпечної місцевості, штурм укріплених пляжів або проведення таємних ударів у глибині ворожої території — спеціалізовані підрозділи проходять сувору підготовку та оснащуються спеціальним спорядженням. Їхня адаптивність та точність роблять їх ідеальними для виконання місій, успіх яких залежить від швидкості, ефекту несподіванки та досконалого володіння місцевістю."
 Transport_Plane_1926: "Транспортний літак зразка 1926 року"
 Transport_Plane_1926_desc: "Примітивні двопланові транспортні літаки перевозять легкі вантажі та невелику кількість військ на короткі відстані. Вони виготовлені з дерева та тканини й мають обмежену швидкість, дальність польоту та захист. Завантаження відбувається повільно, турбулентність є небезпечною, а погодні умови можуть легко змусити їх залишитися на землі. Проте саме вони поклали початок повітряній логістиці, яка здатна долати непрохідну місцевість і перетинати великі території швидше, ніж будь-який конвой з постачанням."
 Transport_Plane_1934: "Транспортний літак зразка 1934 року"
 Transport_Plane_1934_desc: "З загальним розвитком авіаційної техніки вдосконалилися й транспортні літаки, причому більшість конструкцій перейшла від біпланів до монопланів. Ці моделі мають закриті кабіни, міцніші каркаси та більшу дальність польоту. Тепер ці літаки можуть перевозити більше людей або легке спорядження, а також більші обсяги поставок, таких як продовольство чи паливо, що робить тактичні передислокації більш реальними. Надійність покращується, але для зльоту та посадки все ще потрібні вільні, рівні злітно-посадкові смуги. Ці літаки все ще вразливі, але не настільки крихкі, як їхні попередники."
 Air_Supply: "Повітряне постачання"
 Air_Supply_desc: "Операції з повітряного постачання забезпечують життєво важливе підкріплення для ізольованих підрозділів, дозволяючи оминати ворожу місцевість, лінії фронту та зруйновану інфраструктуру. Вантажні літаки скидають продовольство, боєприпаси, паливо та медичні засоби за допомогою парашутів або скидання з малої висоти. Хоча погода, ворожі винищувачі та зенітний вогонь становлять постійну загрозу, добре організована повітряна підтримка дозволяє оточеним військам продовжувати бій і забезпечує можливість глибшого просування."
 Transport_Plane_1940: "Транспортний літак зразка 1940 року"
 Transport_Plane_1940_desc: "Завдяки впровадженню суцільнометалевих корпусів та двомоторних силових установок стало можливим перевезення важчих вантажів, досягнення вищих швидкостей та поліпшення льотних характеристик на висоті. Перекидання військ тепер стало звичним, а повітряне перевезення техніки стало можливим. Завдяки посиленим вантажним підлогам та бічним дверям ці літаки можуть виконувати великі десантні операції, стратегічні повітряні перевезення та передислокацію обладнання у величезних масштабах, що робить їх набагато придатнішими для військових операцій."
 Glider: "Планер"
 Glider_desc: "Штурмові планери безшумні та не мають двигунів; вони доставляють десантників та легке спорядження глибоко за лінію ворога. Збудовані з легкої деревини та брезенту, їх підіймають у небо моторні літаки, після чого їх відчіплюють, і вони несподівано спускаються вниз. Усередині солдати сидять пліч-о-пліч зі зброєю та припасами, готуючись до жорсткої посадки на полях або дорогах. Місії на планерах є крихкими та небезпечними, стираючи межу між транспортуванням та самогубством, але коли вони вдаються, вони забезпечують ефект несподіванки зі смертоносною силою та доставляють досвідчених солдатів туди, де вони можуть завдати найбільшої шкоди."
 Transport_Plane_1944: "Транспортний літак зразка 1944 року"
 Transport_Plane_1944_desc: "У небі панують конструкції, випробувані в боях, які пройшли випробування під час війни й довели свою міцність, надійність та здатність працювати на складних злітно-посадкових смугах під обстрілом. У вантажному відсіку вміщуються війська, джипи, артилерія та ящики з боєприпасами. Задні рампи прискорюють вивантаження, а бортові радіостанції дають змогу координувати дії під час польоту. Ці транспортні літаки є основою повітряно-десантних операцій та екстреного постачання на різних континентах."
 Static_Line: "Статична лінія"
 Static_Line_desc: "Статичні лінії — це новий винахід, що дозволяє гіпотетично десантувати війська з літаків на землю за лінією фронту противника. Шнур, який розкриває парашут майбутнього солдата, коли той вистрибує з літака. На відміну від того, як солдат вручну розкриває парашут під час падіння на землю, що марнує дорогоцінні секунди, цей процес значно полегшує виконання стрибків з низької висоти. Ці розробки можуть нарешті зробити можливим створення організованих дивізій десантників."
 Airborne_Training_School: "Школа підготовки десантників"
 Airborne_Training_School_desc: "Школи підготовки десантників створюються для навчання піхотних підрозділів проведенню парашутних операцій. Основні теми навчання — техніка стрибків, поводження зі спорядженням, посадка та висадка з літаків, а також скоординовані дії після приземлення. Курсанти відпрацьовують стрибки зі статичною лінією з веж та літаків, причому навчання проводяться як вдень, так і вночі. Програма також включає підготовку з використання легкої зброї, навігації та тактики дій невеликих підрозділів, щоб забезпечити здатність десантників діяти самостійно після розгортання."
 Airborne_Assault: "Десантний штурм"
 Airborne_Assault_desc: "Десантні штурмові операції передбачають швидке розгортання десантників на території противника з метою захоплення ключових об’єктів та зриву дій ворожих сил. Ця тактика базується на ефекті несподіванки: десантники вистрибують з транспортних літаків і негайно вступають у бій. Мета полягає в тому, щоб захопити стратегічно важливі об’єкти, такі як аеродроми, мости або вузли зв’язку, одночасно позбавивши ворога можливості швидко реагувати. Після приземлення війська повинні швидко спланувати та провести атаки з обмеженою підтримкою, покладаючись на швидкість і злагодженість дій, щоб розгромити ізольовані ворожі підрозділи, перш ніж ті встигнуть перегрупуватися."
 Pathfinders: "Розвідники"
 Pathfinders_desc: "Розвідники — це невеликі спеціалізовані підрозділи, які висуваються попереду основних повітряно-десантних сил для позначення зон десантування, збору розвідданих та встановлення початкового контролю над районом висадки. Їх доставляють на парашутах або планерах, і вони діють з мінімальним спорядженням та без негайного підкріплення, покладаючись на скритність, точність та підготовку. Їхня роль є вирішальною для забезпечення точного та ефективного проведення повітряно-десантних атак і часто визначає загальний успіх або провал операції."
 Amphibious_Landing: "Десант амфібій"
 Amphibious_Landing_desc: "Операції з амфібійного десантування передбачають переміщення піхоти, техніки та елементів підтримки з транспортних суден на контрольовані берегові лінії. Зазвичай війська завантажують на невеликі десантні катери з десантних суден, що знаходяться у відкритому морі, часто за кілька кілометрів від пляжу. Потім ці катери наближаються до визначених зон висадки, іноді за допомогою вогню корабельної артилерії та повітряної підтримки. Війська висаджуються безпосередньо у мілководді або на тимчасові причали й просуваються по піску, багнюці або скелястій місцевості, стикаючись із колючим дротом, мінами та укріпленими позиціями противника."
 Amphibious_Operations: "Операції амфібій"
 Amphibious_Operations_desc: "Амфібійні операції — це комплексні військові дії з перекидання сил з моря на сушу, що поєднують морський транспорт, повітряне прикриття та наземні бойові сили. Ці операції вимагають тісної координації між флотами, десантними підрозділами, логістичним персоналом та командним складом. На відміну від простих висадок, повномасштабні амфібійні операції включають попередні обстріли, фінти для дезорієнтації захисників, наступні хвилі механізованої підтримки та швидке налагодження ланцюгів постачання після закріплення плацдарму. Військові повинні бути навчені висаджуватися під вогнем, орієнтуватися на хаотичних берегових лініях та швидко переходити від морського до наземного бою."
 Naval_Landing_Forces: "Морські десантні війська"
 Naval_Landing_Forces_desc: "Морські десантні війська — це спеціалізовані піхотні підрозділи, підготовлені до штурму ворожих берегів під час амфібійних операцій. Ці війська тісно співпрацюють з військово-морським командуванням і готові до унікальних викликів прибережних боїв, таких як прорив пляжної оборони, усунення перешкод та забезпечення початкових периметрів для наступних підрозділів. Вони проходять інтенсивну підготовку з керування малими суднами, швидкого висадження та ведення бою під інтенсивним вогнем артилерії та стрілецької зброї. На відміну від звичайної піхоти, морські десантні сили навчені вести бій з обмеженою підтримкою в непередбачуваних умовах, таких як зміна припливів і відпливів, нерівний рельєф місцевості та миттєві контратаки. Їхня роль полягає у захопленні стратегічно важливих позицій на узбережжі, створенні зон висадки та утриманні їх до прибуття важкої техніки та підкріплення."
 Beachmasters: "Координатори висадки"
 Beachmasters_desc: "Координатори висадки є координаційним ядром амфібійних операцій, відповідаючи за встановлення та підтримання порядку серед хаосу в зоні висадки, за яку точиться боротьба. Вони керують десантними суднами, направляють війська, що висаджуються, та організовують швидкий потік поставок, транспортних засобів і поранених уздовж вузької, вразливої берегової лінії. Під вогнем координатори висадки забезпечують, щоб послідовні хвилі штурмових сил висаджувалися там і тоді, де й коли це передбачено, зменшуючи затори та підвищуючи темп."
 Amtracs: "Амтраки"
 Amtracs_desc: "Амфібійні трактори, або амтраки, — це гусеничні машини, які можуть переміщатися з корабля на берег, а потім углиб суші без необхідності пересідати на наземний транспорт. Завдяки водонепроникним корпусам та здатності плавати вони можуть легко діяти на мілководді та перетинати пляжі. Їхня гусенична конструкція дозволяє їм пересуватися по пересіченій місцевості після висадки на берег, що робить їх корисними для транспортування військ, припасів та легкої техніки під час амфібійних операцій."
 Transport_Boats: "Транспортні катери"
 Transport_Boats_desc: "Транспортні катери забезпечують основне сполучення між кораблями та берегом, перевозячи війська та припаси на короткі відстані. Вони прості, міцні та призначені для багаторазового використання в суворих умовах. Не маючи броні чи рампових систем, їх часто використовують у зонах з низьким рівнем ризику або як підкріплення після закріплення початкового плацдарму. Їхня мала осадка дозволяє дістатися до важкодоступної прибережної місцевості, а можливість швидкого завантаження та розвантаження робить їх корисними для підтримання десантної присутності."
 Landing_Craft: "Десантні катери"
 Landing_Craft_desc: "Десантні катери — це спеціалізовані судна, що транспортують піхоту, техніку та вантажі безпосередньо до ворожих берегів. Зазвичай вони мають посилений корпус, здатний витримувати легкий вогонь та суворі умови на пляжі, а також передні рампи для швидкої висадки. Їх низький профіль ускладнює виявлення з відстані, тоді як плоске дно дозволяє швидко сідати на мілину та відступати. Вони є невід’ємною складовою будь-якого сучасного амфібійного десанту, поєднуючи в собі потужність, міцність та швидкість."
 Assault_Landing_Craft: "Штурмові десантні катери"
 Assault_Landing_Craft_desc: "Штурмові десантні катери — це спеціалізовані версії десантних суден, призначені для атак першої хвилі. Вони часто мають броню, що витримує вогонь зі стрілецької зброї та осколки, а також міцніші рампи, вдосконалені двигуни та посилені корпуси, щоб впоратися з хаотичними умовами висадки. Деякі моделі оснащені оборонними кріпленнями для зброї або димогенераторами. Ці судна ставлять на перше місце живучість та швидкість, щоб доправити десантні війська на берег крізь вогонь противника, перш ніж відступити для чергового заходу."
 Specialized_Support_Craft: "Спеціалізовані судна підтримки"
 Specialized_Support_Craft_desc: "Допоміжні судна, призначені для завдань, відмінних від безпосереднього перевезення військ. До них належать судна, призначені для медичної евакуації, управління та контролю, інженерної підтримки та ремонту обладнання поблизу зон висадки. Багато з них мають на борту засоби зв’язку, крани або склади з припасами, а деякі призначені для пожежогасіння або рятувальних операцій. Вони сприяють безперебійному проведенню операцій під час амфібійних кампаній, заповнюючи логістичні прогалини між берегом і флотом."
 Mountain_Warfare: "Гірська війна"
 Mountain_Warfare_desc: "Гірська війна передбачає ведення боїв у важкодоступній високогірній місцевості, де звичайні операції виявляються неефективними. Військовослужбовці, підготовлені до таких умов, можуть пристосовуватися до крутих схилів, нестабільної місцевості та обмеженої мобільності. Бойові дії в долинах, перевалах та на хребтах вимагають витривалості, акліматизації та тактики невеликих підрозділів. Успіх залежить від досконалого знання місцевості, оскільки погода та рельєф часто становлять більшу небезпеку, ніж ворог."
 Mountain_Warfare_Equipment: "Обладнання для гірської війни"
 Mountain_Warfare_Equipment_desc: "Спорядження, призначене для ведення бойових дій у холодних умовах та на великій висоті. До нього входять утеплений одяг, кішки, льодоруби, альпіністські мотузки та легке спорядження для пересування. Зброя та спорядження розроблені так, щоб витримувати мінусові температури, а також включають спеціалізовані медичні набори та набори для виживання. Кожен предмет створений з урахуванням міцності та практичності в умовах складної місцевості та суворих погодних умов."
 Mountainous_Terrain_Combat_Tactics: "Тактика ведення бою в гірській місцевості"
 Mountainous_Terrain_Combat_Tactics_desc: "Тактика ведення бою в гірській місцевості передбачає використання рельєфу для отримання переваги. Військові використовують височини для спостереження та оборони, рухаючись вузькими перевалами та долинами. Скритність і швидкість є ключовими для уникнення виявлення. Невеликі підрозділи часто діють самостійно, покладаючись на ефект несподіванки та засідки. Рельєф місцевості також вимагає застосування спеціальних технік пересування, при цьому особлива увага приділяється максимальній економії сил та використанню технік скелелазіння й пересування по скелях для подолання перешкод."
 Rock_Climbing: "Скелелазіння"
 Rock_Climbing_desc: "Тренування зі скелелазіння готують солдатів до пересування по вертикальних і крутих схилах. Військових навчають користуватися альпіністськими мотузками, страхувальними ременями та карабінами для забезпечення безпечного та ефективного сходження й спуску. Вони також навчаються долати природні скельні стіни та штучні перешкоди. Це тренування покращує мобільність у гірській місцевості та загальну витривалість, що дозволяє солдатам пересуватися по місцевості, яка в інших умовах була б непрохідною, у бойових сценаріях."
 Ski_Training: "Навчання лижним видам спорту"
 Ski_Training_desc: "Навчання лижним видам спорту готує солдатів до швидкого та ефективного пересування по засніженій місцевості. Воно включає навчання технікам бігових лиж та гірських лиж, що акцентують увагу на витривалості, рівновазі та маневреності. Солдатів навчають пересуватися по снігових полях, лісах та пересіченій місцевості, несучи спорядження. Це навчання покращує мобільність взимку та підвищує здатність діяти в холодних гірських умовах."
 Crampons: "Крампони"
 Crampons_desc: "Спеціальні насадки на взуття, призначені для забезпечення зчеплення на обмерзлій або скелястій місцевості. Солдатів навчають використовувати ці пристрої для сходження та пересування по замерзлій або крутій місцевості. Крампони є незамінними в гірських та арктичних умовах, дозволяючи солдатам безпечно підніматися на льодовики, льодові поля та гострі скельні схили."
 All_Terrain_Support_Vehicles: "Всюдихідний транспорт підтримки"
 All_Terrain_Support_Vehicles_desc: "Всюдихідні транспорти підтримки призначені для надання логістичної та бойової підтримки в різноманітних умовах, включаючи пустелі, ліси, болота та засніжені ландшафти. Ці транспортні засоби оснащені надміцними шинами або гусеницями, що дозволяє їм пересуватися по складному та нерівному рельєфу. Вони використовуються для перевезення військ, припасів та обладнання до місць, недоступних для стандартних транспортних засобів."
 Special_Forces: "Спецпідрозділи"
 Special_Forces_desc: "Спецпідрозділи — це елітні військові підрозділи, які готуються до нетрадиційних бойових дій, розвідки, диверсій та операцій з високим рівнем ризику в тилу ворога. Ці війська комплектуються з найздібніших та найдисциплінованіших солдатів і проходять інтенсивну фізичну та психологічну підготовку, щоб опанувати такі навички, як підривні роботи, проникнення, виживання та використання іноземної зброї."
 Hot_Environment_Training: "Підготовка в умовах спеки"
 Hot_Environment_Training_desc: "Підготовка в умовах спеки готує військових до ефективної діяльності в посушливих, тропічних та пустельних умовах, де екстремальні температури, зневоднення та тепловий удар є постійними небезпеками. Солдати вчаться підтримувати водний баланс, розпізнавати теплові розлади та адаптувати своє спорядження й розпорядок дня до суворих умов. Основна увага приділяється витривалості, раціональному використанню ресурсів та орієнтуванню на місцевості, щоб забезпечити боєготовність підрозділів в умовах безжального сонця та пекучої спеки."
 Cold_Environment_Training: "Підготовка в умовах холоду"
 Cold_Environment_Training_desc: "Підготовка в умовах холоду надає солдатам знання та дисципліну, необхідні для виживання та виконання завдань при мінусових температурах, на засніженій місцевості та під час крижаних вітрів. Військових навчають навичкам виживання в холодну погоду, таким як спорудження укриттів, розпалювання вогню та безпечне пересування по замерзлій місцевості. Навчання також включає використання та обслуговування морозостійкого спорядження, багатошарового одягу та функціонування зброї при мінусових температурах."
 Softer_Requirements: "Пом’якшення вимог"
 Softer_Requirements_desc: "Адаптація стандартів набору та підготовки дозволяє збільшити кількість новобранців, зберігаючи при цьому основну бойову ефективність. Це включає зниження фізичних вимог до допоміжних ролей, підвищення гнучкості щодо освітнього рівня та зміну критеріїв для персоналу, що не перебуває на передовій. Такі зміни збільшують кількість доступних кадрів, зберігаючи при цьому згуртованість підрозділів та логістичну ефективність."
 Light_Clothing: "Легкий одяг"
 Light_Clothing_desc: "Легкий одяг, розроблений для теплішого клімату, покращує комфорт та мобільність військовослужбовців, які діють у спекотних умовах. Її дихаючі матеріали, що відводять вологу, дозволяють солдатам витримувати тривале перебування у високих температурах із меншою втомою."
 Clothes_Insulation: "Утеплення одягу"
 Clothes_Insulation_desc: "Утеплюючі елементи одягу призначені для забезпечення необхідного тепла та комфорту в холодних умовах без обмеження рухів. У таких виробах використовуються сучасні матеріали, такі як вовна, синтетичні волокна або пух, які утримують тепло тіла та регулюють температуру навіть у умовах екстремального холоду. Таке утеплення дозволяє військовим виконувати завдання при мінусових температурах, знижуючи ризик гіпотермії та гарантуючи, що мобільність і витривалість не погіршуються під час тривалих операцій."
 Elite_Forces: "Елітні війська"
 Elite_Forces_desc: "Спеціалізовані військові підрозділи підготовлені до місій з високим рівнем ризику та високою винагородою, які вимагають високої майстерності та виняткової дисципліни. Ці підрозділи проходять всебічну підготовку з різних дисциплін, зокрема ближнього бою, збору розвідданих, таємних операцій та стратегічного планування. Акцент робиться на розвитку як фізичної витривалості, так і психічної стійкості, що дозволяє їм діяти самостійно у ворожих умовах. Ці підрозділи також добре пристосовані до різних умов та місцевостей, таких як пустеля, Арктика та гори, і є майстрами у проведенні операцій за лінією фронту."

