 ### Rockets and Missiles
 guided_missile_equipment: "Керована ракета"
 
 guided_missile_equipment_1: "Літаюча бомба"
 guided_missile_equipment_1_short: "Літаюча бомба"
 guided_missile_equipment_1_desc: "Літаюча бомба — це безпілотний літальний апарат, що приводиться в рух раннім реактивним двигуном і призначений для доставки вибухового заряду до наземної цілі. Вона повільніша за ракету чи керовану ракету, а це означає, що її можуть перехопити та збити ворожі винищувачі."
 
 guided_missile_equipment_2: "Стратегічні ракети"
 guided_missile_equipment_2_short: "Стратегічні ракети"
 guided_missile_equipment_2_desc: "Стратегічні ракети — це безпілотні засоби ураження великої дальності, що працюють на рідинному або твердому паливі. Вони призначені для доставки високовибухового боєзаряду на великі відстані по балістичній траєкторії з високим кутом нахилу. Ці ракети запускаються вертикально, виходять за межі стратосфери і падають на великій швидкості на цілі, що ускладнює їх перехоплення за допомогою звичайних систем протиповітряної оборони."
 
 guided_missile_equipment_3: "Балістичні ракети"
 guided_missile_equipment_3_short: "Балістичні ракети"
 guided_missile_equipment_3_desc: "Балістичні ракети — це сучасні безпілотні системи доставки, здатні вражати цілі на великих відстанях із більшою швидкістю, точністю та гнучкістю щодо корисного навантаження. Ці ракети підтримують суборбітальну траєкторію завдяки використанню більш ефективних рушійних систем, досконалій аеродинаміці та інерційному наведенню. Їхня висока кінцева швидкість та профіль польоту на великій висоті роблять перехоплення надзвичайно складним завданням."
 
 guided_missile_equipment_4: "Міжконтинентальна балістична ракета"
 guided_missile_equipment_4_short: "МКБР"
 guided_missile_equipment_4_desc: "Міжконтинентальні балістичні ракети — це найсучасніший тип безпілотної стратегічної зброї. Створені для ураження цілей на інших континентах, вони використовують багатоступеневі рушійні системи та високоточні системи наведення для доставки боєзарядів на великі відстані. Їхнє швидке розгортання та майже неможлива для перехоплення фаза спуску роблять їх важливим інструментом для проєкції сили. Системи запуску є високоавтоматизованими, що забезпечує швидке реагування у стратегічних сценаріях."
 
