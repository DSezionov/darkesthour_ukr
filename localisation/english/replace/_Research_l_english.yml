 NUCLEAR_PROPULSION: "Ядерна морська силова установка — це система руху корабля або підводного човна, що використовує тепло, яке генерується атомною електростанцією. Ядерна морська силова установка застосовується саме на військових кораблях, таких як суперавіаносці та підводні човни."
