### DH - AI Paths
 COUNTRY_PATH_JAP_CONFLICT_IN_CHINA: "@JAP Sino-Japanese Conflict"
 COUNTRY_PATH_JAP_CONFLICT_IN_CHINA_DEFAULT: "Default"
 COUNTRY_PATH_JAP_CONFLICT_IN_CHINA_DEFAULT_DESC: "The Sino-Japanese War will be as historical as the AI's actions allow."
 COUNTRY_PATH_JAP_CONFLICT_IN_CHINA_ALWAYS_WIN: "Always Win"
 COUNTRY_PATH_JAP_CONFLICT_IN_CHINA_ALWAYS_WIN_DESC: "Japan will have an easier time defeating China."
 COUNTRY_PATH_ALLIES_PATH: "@USA Allies Post WW2 Path"
 COUNTRY_PATH_ALLIES_HISTORICAL_PATH: "Historical Allied Path"
 COUNTRY_PATH_ALLIES_HISTORICAL_PATH_DESC: "After the defeat of the Axis, the Western Allies focus on reconstruction and diplomacy. The United Nations is established to maintain peace, and Europe is rebuilt under American and British guidance. The Cold War simmers in the background as democracy and capitalism seek to contain Soviet influence through aid and alliances rather than open war."
 COUNTRY_PATH_ALLIES_AHISTORICAL_PATH: "Operation Unthinkable"
 COUNTRY_PATH_ALLIES_AHISTORICAL_PATH_DESC: "Fearing the rise of Soviet dominance in Europe, Churchill and the Western Allies decide not to disarm, but to strike first. Under the codename Operation Unthinkable, the Allies prepare a massive offensive against the USSR, hoping to push communism back beyond the Urals. A Third World War will begin."
 COUNTRY_PATH_SOVIET_PATH: "@SOV Soviets Post WW2 Path"
 COUNTRY_PATH_SOVIET_HISTORICAL_PATH: "The Iron Curtain"
 COUNTRY_PATH_SOVIET_HISTORICAL_PATH_DESC: "With the Red Army victorious in Eastern Europe, Stalin consolidates his sphere of influence. Communist regimes are installed across the continent, and a tense standoff begins with the capitalist West. Instead of open war, the struggle for global supremacy turns ideological, economic, and covert - the dawn of the Cold War."
 COUNTRY_PATH_SOVIET_AHISTORICAL_PATH: "Operation Red Dawn"
 COUNTRY_PATH_SOVIET_AHISTORICAL_PATH_DESC: "Emboldened by their victory and immense military power, the Soviet Union will refuse to stop at Berlin. Operation Red Dawn begins as a full-scale offensive into Western Europe aimed at spreading communism by force. The Red Army marches westward once more, determined to bring the revolution to every corner of the world."