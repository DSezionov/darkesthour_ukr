## AT
######################################################################
### Generic
 MANPATS_MANPADS_1936: "MANPATS '39"
 MANPATS_MANPADS_1936_desc: "Man-portable anti-tank systems are small, light weapons that enable infantry to engage and destroy armoured vehicles from a safe distance. These weapons, with their easily portable design, allow soldiers to target enemy tanks and armoured vehicles without the use of heavy artillery or vehicles. They provide a significant advantage in anti-armor capabilities for ground forces, making them an indispensable tool in modern warfare."
 MANPATS_MANPADS_1936_tt: "All Small Arms:\n   Hard Attack: §G1§!\n   Piercing: §G10.4§!\n"
 MANPATS_MANPADS_1936_tt2: "All Heavy Weapons:\n   Hard Attack: §G3§!\n   Piercing: §G10.4§!\n"
 MANPATS_MANPADS_1942: "MANPATS '42"
 MANPATS_MANPADS_1942_desc: "The next generation of MANPATS improves on previous models by increasing the warhead's power, allowing soldiers to better target medium and heavy tanks. These systems remain simple to use and require little training, but advances in ammunition make them more reliable against a broader range of armoured vehicles on the battlefield."
 MANPATS_MANPADS_1942_tt: "All Small Arms:\n   Hard Attack: §G1.1§!\n   Piercing: §G61.4§!\n"
 MANPATS_MANPADS_1942_tt2: "All Heavy Weapons:\n   Hard Attack: §G4.4§!\n   Piercing: §G61.4§!\n"
 MANPATS_MANPADS_1944: "MANPATS '44"
 MANPATS_MANPADS_1944_desc: "New iterations of the MANPATS, bred by years of global war and armour improvements, see increased projectile effectiveness and range. With stronger, more durable rockets, infantry can now engage enemy armour from a greater distance. The design has been refined for greater portability, allowing soldiers to carry these weapons across a wider range of terrain, increasing flexibility and counter-armor capability in a variety of combat scenarios."
 MANPATS_MANPADS_1944_tt: "All Small Arms:\n   Hard Attack: §G1.5§!\n   Piercing: §G82.4§!\n"
 MANPATS_MANPADS_1944_tt2: "All Heavy Weapons:\n   Hard Attack: §G6§!\n   Piercing: §G82.4§!\n"
 MANPATS_MANPADS_1952: "MANPATS '50"
 MANPATS_MANPADS_1952_desc: "The most recent version of the MANPATS system includes an even more powerful warhead designed to penetrate the most heavily armoured vehicles. It remains lightweight and portable, making it an indispensable tool for infantry. The simple design, combined with powerful projectiles, provides average soldiers with a dependable means of dealing with enemy armour, even as tanks advance. MANPATS technology works alongside tank technology, allowing infantry units to continue to effectively destroy tanks."
 MANPATS_MANPADS_1952_tt: "All Small Arms:\n   Hard Attack: §G2§!\n   Piercing: §G130.4§!\n"
 MANPATS_MANPADS_1952_tt2: "All Heavy Weapons:\n   Hard Attack: §G8.1§!\n   Piercing: §G130.4§!\n"

