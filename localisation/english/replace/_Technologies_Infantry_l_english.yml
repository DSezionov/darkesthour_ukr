## Heavy Weapons
######################################################################
### Generic
 Heavy_Weapons_equipment: "Heavy Weapons"
 Heavy_Weapons_equipment_desc: "When his rifle is insufficient, an infantryman requires more powerful weapons to support his attack and defence. Heavy weapons, such as machine guns and automatic cannons, provide infantry units with significantly more firepower, especially for defence and suppression. These weapons are intended to deliver sustained rates of fire and can be mounted on tripods or vehicles to control strategic areas of the battlefield. Though heavy and frequently requiring a crew, their presence significantly improves a unit's ability to hold ground and inflict damage from a distance."
 Heavy_Weapons_equipment_1905: "Heavy Weapons '00"
 Heavy_Weapons_equipment_1905_short: "Heavy Weapons '00"
 Heavy_Weapons_equipment_1905_desc: "In the years preceding the Great War, the introduction of early heavy firepower significantly improves defensive capabilities. These weapons, which include large-caliber machine guns and heavy rifles, are designed to provide continuous fire against enemy infantry and fortifications. Operated by a small crew, they are effective in defensive positions, providing suppressive fire during engagements. While they are large and difficult to transport, they excel in static defence, where mobility is less of an issue. Despite their limited range and precision, their effectiveness in close-quarters combat makes them useful in entrenched warfare, where enemy forces are expected to advance in large numbers."
 Heavy_Weapons_equipment_1916: "Heavy Weapons '16"
 Heavy_Weapons_equipment_1916_short: "Heavy Weapons '16"
 Heavy_Weapons_equipment_1916_desc: "The introduction of more refined machine guns allows for better suppression of infantry, light vehicles, and even fortifications, while the use of flamethrowers in warfare allows for effective trench clearing and defence. Meanwhile, machine guns, which are frequently mounted on tripods or other stable platforms, can now fire continuously for extended periods of time, allowing defensive positions to withstand large assaults. Some systems use higher-caliber rounds designed to penetrate light armour."
 Heavy_Weapons_equipment_1936: "Heavy Weapons '35"
 Heavy_Weapons_equipment_1936_short: "Heavy Weapons '35"
 Heavy_Weapons_equipment_1936_desc: "Heavy weapons have undergone significant development to improve their effectiveness on the battlefield. The emphasis shifts to the improvement of machine guns, which now have faster rates of fire, greater accuracy, and the ability to sustain long engagements. These weapons, when mounted on more robust platforms, can provide effective suppression against infantry and light vehicles. New technologies, such as advanced cooling mechanisms, enable continuous operation even during intense combat scenarios."
 Heavy_Weapons_equipment_1942: "Heavy Weapons '42"
 Heavy_Weapons_equipment_1942_short: "Heavy Weapons '42"
 Heavy_Weapons_equipment_1942_desc: "As global conflict resurfaces and advances, so does killing technology. Heavy weapons have evolved to meet the demands of modern warfare. Machine guns are now more efficient, with larger calibres providing more stopping power and superior effectiveness against infantry and light armoured targets. The design of heavy weaponry focuses on maximizing firepower while balancing mobility and ease of deployment, with new models incorporating better cooling systems to prevent overheating during extended use. These weapons are frequently used in combined arms operations to support infantry advances and counter enemy breakthroughs."
 Heavy_Weapons_equipment_1945: "Heavy Weapons '45"
 Heavy_Weapons_equipment_1945_short: "Heavy Weapons '45"
 Heavy_Weapons_equipment_1945_desc: "Heavy weapons have become essential to combined arms tactics, with improvements in firepower, range, and durability. New designs include more powerful machine guns and automatic cannons that can fire continuously and with greater accuracy. The development of more dependable ammunition, improved recoil systems, and more efficient cooling mechanisms has significantly improved their performance."
 Heavy_Weapons_equipment_1952: "Heavy Weapons '52"
 Heavy_Weapons_equipment_1952_short: "Heavy Weapons '52"
 Heavy_Weapons_equipment_1952_desc: "Heavy weapons have evolved significantly in response to the lessons of global conflict, incorporating more advanced materials and technologies to improve effectiveness. These weapons now have better recoil management, a faster rate of fire, and longer ranges, with many designs optimised for both static defence and mobile combat. The introduction of self-loading mechanisms and improved ammunition enables greater precision and efficiency in fire support roles. Furthermore, lighter and more durable materials, such as alloys and composites, improve mobility and deployment."

