######################################################################
## Uniforms
######################################################################
### Generic
 Infantry_Kit_1914: "Infantry Kit '14"
 Infantry_Kit_1914_desc: "The army kit for the Great War, which began in the summer of 1914. Infantrymen carry bolt-action rifles with fixed bayonets, leather ammunition pouches, and heavy wool uniforms that are frequently adorned with colour and other decorations. Soft caps, primitive metal helmets, and shakos are all examples of headgear. Field gear consists of basic mess tins, bedrolls and haversacks. There is no standard body armour, and soldiers receive little protection from artillery or shrapnel. Gas masks are not issued, and grenades are used sparingly and experimentally."
 Infantry_Kit_1918: "Infantry Kit '18"
 Infantry_Kit_1918_desc: "Four years of grinding trench warfare and lessons learnt in industrialised conflict have resulted in a significant redesign of the soldier's kit. Steel helmets, gas masks and concealment-style khaki or grey service uniforms are standard equipment. Infantry carry bolt-action rifles, submachine guns, shotguns, and grenades. The majority of units receive light machine guns. Personal loadouts consist of entrenching tools, wire cutters, and canvas water canteens. Each soldier receives basic medical pouches as well as improved boots that are better suited to the muddy conditions of the Great War."
 Infantry_Kit_1935: "Infantry Kit '35"
 Infantry_Kit_1935_desc: "Despite their relative obscurity, the lessons of the Great War and various interwar conflicts, as well as the appearance of bright young minds in general staffs and engineering bureaus, continue to drive development of the infantryman's kit. Soldiers carry refined bolt-action rifles or semi-automatic rifles, as well as shotguns, which are supported by submachine guns and light machine guns. Gas protection, ruggedised boots, and improved ammunition pouches are all part of the field equipment. Radios and optical devices are used in some units. Uniforms are more standardised, typically consisting of a helmet, field jacket and a multipurpose belt system."
 Infantry_Kit_1942: "Infantry Kit '42"
 Infantry_Kit_1942_desc: "The resurgence of global conflict, as well as the lessons learnt from modern warfare, drive rapid innovation in infantry armaments and loadouts. Semi-automatic rifles, submachine guns, and man-portable explosives are all part of the standard kit. Helmets are improved to provide better protection, and uniforms are tailored to extreme climates. Soldiers carry personal medical kits, field rations and protective clothing. Radio units and chemical detection tools are more widely distributed, and backpacks have been redesigned for extended operations. Winter camouflage is also becoming more common."
 Infantry_Kit_1945: "Infantry Kit '45"
 Infantry_Kit_1945_desc: "Infantry units begin to receive assault rifles and improved semi-automatic weapons. Load-bearing gear is more modular, with specialised pouches and built-in support for grenades and demolition charges. Helmets and body garments are available in a wider range of colours, including camouflage and cold-weather options, and are also designed to provide better protection against shrapnel and bullets. Radios and portable field equipment are distributed at lower command levels. Rudimentary and experimental body armour is being implemented on a very small scale."
 Infantry_Kit_1952: "Infantry Kit '52"
 Infantry_Kit_1952_desc: "Battle rifles, lightweight machine guns, and early night-vision devices are in widespread use. Some formations issue body armour in addition to updated helmets and reinforced boots. Uniforms are designed for use in all weather conditions, with a focus on quick access to gear. Water purification kits, personal radios, and survival tools are becoming more common in standard infantry loads."
 
