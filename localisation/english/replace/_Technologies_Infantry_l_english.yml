## APCs
######################################################################
### Generic
 Motorized_equipment: "Motorized"
 Motorized_equipment_desc: "The earliest motorized vehicles provide the power to maneuver heavier artillery pieces and more efficiently transfer supplies to the battlefront. Their speed makes them good ambulances. These vehicles lack the reliability for widespread use but the internal combustion engine is a significant boon to the specialist troops."
 Motorized_equipment_1916: "Motorized '16"
 Motorized_equipment_1916_short: "Motorized '16"
 Motorized_equipment_1916_desc: "The earliest motorized vehicles provide the power to maneuver heavier artillery pieces and more efficiently transfer supplies to the battlefront. Their speed makes them good ambulances. These vehicles lack the reliability for widespread use but the internal combustion engine is a significant boon to the specialist troops."
 Motorized_equipment_1932: "Motorized '32"
 Motorized_equipment_1932_short: "Motorized '32"
 Motorized_equipment_1932_desc: "Trucks have become reliable and powerful enough to make the mass movement of troops by vehicle a real possibility. Adapting civilian trucks for military purposes can open up many strategic possibilities for an infantry force that can conduct the flanking and breakthrough operations of the cavalry."
 Motorized_equipment_1938: "Motorized '38"
 Motorized_equipment_1938_short: "Motorized '38"
 Motorized_equipment_1938_desc: "The automotive industry has grown to the point that trucks can be specially built to fill the unique needs of the military. Lessons learned from early motorization efforts have exposed the need for vehicles capable of traversing open terrain and rugged enough to survive battle damage."
 motorized_rocket_equipment: "Motorized Rocket Artillery"
 motorized_rocket_equipment_1: "Motorized Rocket Artillery '40"
 motorized_rocket_equipment_1_desc: "Regular artillery is fine, but sometimes you just need volume over accuracy, delivered from a highly mobile launcher. That's where motorised rocket artillery comes in. It provides mobile, high-volume fire support by mounting rocket launchers on trucks and other vehicles. These weapons can quickly and effectively saturate large areas with explosives. Their mobility allows for quick repositioning following firing, reducing vulnerability to counter-battery fire and providing flexible support for fast-moving operations."
 motorized_rocket_equipment_2: "Motorized Rocket Artillery '43"
 motorized_rocket_equipment_2_desc: "Regular artillery is fine, but sometimes you just need volume over accuracy, delivered from a highly mobile launcher. That's where motorised rocket artillery comes in. It provides mobile, high-volume fire support by mounting rocket launchers on trucks and other vehicles. These weapons can quickly and effectively saturate large areas with explosives. Their mobility allows for quick repositioning following firing, reducing vulnerability to counter-battery fire and providing flexible support for fast-moving operations."
 mechanized_equipment: "Mechanized"
 APC_equipment: "Armored Personel Carrier"
 APC_equipment_desc: "Mechanized infantry is infantry equipped with armored personnel carriers (APCs) or infantry fighting vehicles (IFVs) for transport and combat. Mechanized infantry is distinguished from motorized infantry in that its vehicles provide a degree of protection from hostile fire, as opposed to soft-skinned wheeled vehicles (trucks or jeeps) for motorized infantry."
