### Generic
 anti_air_equipment: "Towed Anti-Air"
 anti_air_equipment_short: "Anti-Air"
 anti_air_equipment_desc: "Anti-air artillery is primarily designed to shoot down hostile planes, although the rapid fire cannons can also be effective against ground targets."
 Anti_Aircraft_Gun_equipment_1914: "Anti-Aircraft Gun '14"
 Anti_Aircraft_Gun_equipment_1914_short: "AA Guns '14"
 Anti_Aircraft_Gun_equipment_1935: "Anti-Aircraft Gun '35"
 Anti_Aircraft_Gun_equipment_1935_short: "AA Guns '35"
 Anti_Aircraft_Gun_equipment_1935_desc: "Anti-air artillery is primarily designed to shoot down hostile planes, although the rapid fire cannons can also be effective against ground targets."
 Anti_Aircraft_Gun_equipment_1940: "Anti-Aircraft Gun '40"
 Anti_Aircraft_Gun_equipment_1940_short: "AA Guns '40"
 Anti_Aircraft_Gun_equipment_1940_desc: "Anti-air guns with longer cartridges and barrels, able to target high-flying aircraft."
 Anti_Aircraft_Gun_equipment_1942: "Anti-Aircraft Gun '42"
 Anti_Aircraft_Gun_equipment_1942_short: "AA Guns '42"
 Anti_Aircraft_Gun_equipment_1942_desc: "An advanced mobile flak gun with greater reach and firing capacity, to combat even the fastest and highest-flying enemy aircraft."
 Anti_Aircraft_Gun_1945: "Anti-Aircraft Gun '45"
 Anti_Aircraft_Gun_1945_short: "AA Guns '45"
 Anti_Aircraft_Gun_1945_desc: "Every year, rotary aircraft improve their engines, armour, and cruising altitude, so our air defence must remain capable of countering this aerial threat. By increasing the calibre of ammunition used in our anti-aircraft system, we will render advances in aircraft armour ineffective. Furthermore, incorporating radar into our anti-aircraft systems will make them more effective at night and against high-altitude targets."
 Anti_Aircraft_Gun_1950: "Anti-Aircraft Gun 50"
 Anti_Aircraft_Gun_1950_short: "AA Guns '50"
 Anti_Aircraft_Gun_1950_desc: "Traditional large-caliber, manually guided anti-aircraft systems cannot match a modern jet's speed. While SAM missile research continues, medium-caliber radar-guided anti-aircraft systems should be adequate for air defence."
 Anti_Aircraft_Gun_1955: "Anti-Aircraft Gun '55"
 Anti_Aircraft_Gun_1955_short: "AA Guns '55"
 Anti_Aircraft_Gun_1955_desc: "Research into SAM technology has revealed that it is the next step in air defence. However, the time and resources required for this step are limited. Retrofitting our most recent ballistic anti-aircraft systems with upgraded radars, autoloaders, and computer systems will give us the time we need for SAM research."


