######################################################################
###  Artillery
######################################################################
### Generic
 artillery_equipment: "Towed Artillery"
 artillery_equipment_short: "Artillery"
 artillery_equipment_desc: "Artillery refers to large-caliber weapons, such as cannons and howitzers that are operated by crews, which can project munitions far beyond the effective range of personal weapons."
 Artillery_equipment_1910: "Artillery '10"
 Artillery_equipment_1910_short: "Artillery '10"
 Artillery_equipment_1916: "Artillery '16"
 Artillery_equipment_1916_short: "Artillery '16"
 Artillery_equipment_1935: "Artillery '35"
 Artillery_equipment_1935_short: "Artillery '35"
 Artillery_equipment_1942: "Artillery '42"
 Artillery_equipment_1942_short: "Artillery '42"

 Artillery_Range_Finding_and_Surveying_Tools: "Artillery Range finding & Surveying Tools"
 Artillery_Range_Finding_and_Surveying_Tools_desc: "Accurate artillery fire requires skill and meticulous planning. The introduction of optical rangefinders, field compasses and improved surveying devices has allowed gun crews to better estimate distances and align their batteries. Though primitive by modern standards, these tools represent a significant step towards better coordinated and successful firefighting."
 High_Explosive_Shells: "High Explosive Shells"
 High_Explosive_Shells_desc: "As we improve our armaments, we must strive to create better and more powerful shells. These new munitions are designed to produce more blast force and fragmentation, allowing them to inflict severe casualties and destroy entrenched positions more efficiently."
 Split_Trail_Carriage: "Split Trail Carriage"
 Split_Trail_Carriage_desc: "Unlike older single-trail models, the split trail carriage has two rear legs that spread apart, providing more stability and allowing the gun to travel over a much wider horizontal arc. As a result, artillery crews can reposition their guns faster and with greater accuracy when engaging moving or dispersed targets."
 Motor_Compatible_Carriage: "Motor-Compatible Carriage"
 Motor_Compatible_Carriage_desc: "As warfare becomes faster and more mobile, artillery must adapt to keep up. The motor-compatible carriage, which has strengthened suspension, pneumatic wheels, and reinforced frames, can withstand the demands of fast travel over uneven terrain. Furthermore, by reducing mechanical failures, this invention increases operational reliability over time."
 Optical_Sighting_Mechanism: "Optical Sighting Mechanism"
 Optical_Sighting_Mechanism_desc: "The creation of precise optical sighting mechanisms represents a significant advance in artillery technology. These systems use specially designed lenses to allow gunners to determine range, elevation, and bearing with greater accuracy, even in difficult battlefield conditions. This innovation reduces reliance on guesswork and boosts crew confidence, particularly during fast-paced or obscured battles."
 Enhanced_Muzzlebreaks_and_Removable_Barrels: "Enhanced Muzzlebreaks & Removable Barrels"
 Enhanced_Muzzlebreaks_and_Removable_Barrels_desc: "Enhanced muzzlebrakes direct propellant gases more effectively, reducing recoil and stabilising the weapon after each shot. Meanwhile, barrels designed for easy removal and replacement enable faster field maintenance, reducing downtime and extending operational lifespan in harsh conditions. These upgrades improve combat readiness and precision, allowing artillery crews to maintain high rates of fire without sacrificing dependability."
 Proximity_Fuzes: "Proximity Fuzes"
 Proximity_Fuzes_desc: "The introduction of proximity fuzes marks one of the most significant advances in munitions technology. Unlike traditional impact or timed fuzes, these devices use miniature radio transmitters to detonate a shell as it approaches its target, removing the need for direct hits."
 Multipurpose_Ammunition: "Multipurpose Ammunition"
 Multipurpose_Ammunition_desc: "Advances in explosive chemistry and shell design have allowed the development of multipurpose ammunition capable of performing a wide range of combat roles. These innovative rounds combine fragmentation, blast, and incendiary effects in a single cartridge, allowing artillery units to engage a variety of targets without changing munitions types."
 Multipurpose_Guns: "Multipurpose Guns"
 Multipurpose_Guns_desc: "In response to increasingly complex combat scenarios, artillery design has shifted towards versatility and standardisation. Multipurpose guns combine the firepower of traditional field artillery with the ability to engage a diverse range of targets. Capable of both direct and indirect fire, they allow units to respond quickly to changing tactical demands."
 Integrated_Artillery_Guidance_Radar: "Integrated Artillery Guidance Radar"
 Integrated_Artillery_Guidance_Radar_desc: "Integration of digital computers and more advanced radars allowed artillery batteries to land shots with even greater accuracy, and rapidly calculate enemy artillery positions by tracking incoming fire via radar and quickly calculating conter-battery fire solutions. "
 Laser_Guided_Artillery_Shells: "Laser Guided Artillery Shells"
 Laser_Guided_Artillery_Shells_desc: "The first laser guided projectiles helped hit precision targets in single strikes to disrupt the enemy chain of command and logistics, taking out critical targets in short, quick strikes. "
 Precision_Anti_Tank_Rounds: "Precision Anti Tank Rounds"
 Precision_Anti_Tank_Rounds_desc: "Development of more advanced ATGM munitions and sensors enabled artillery ammunition to strike armor at long distances, without endangering artillery positions in direct-fire combat. Methods such as traditional tube-launched ATGMs, Top-Down cluster munitions, and even smart homing charges designed to navigate and explode above tanks were adopted to fulfill this role."
 Modern_Digital_Fire_Controls: "Modern Digital Fire Controls"
 Modern_Digital_Fire_Controls_desc: "Miniaturization of digital and computer systems allows for the usage of guidance computers, digital calculators and combat control systems to be used by gun crews themselves to carry out a variety of tasks instantaneously; from simultaneous splashdowns to the acquisition of several targets, powerful, small computer equipment allows crews to carry out such attacks on the fly. "
 Prototype_GPS_Guided_Munitions: "Prototype GPS Guided Munitions"
 Prototype_GPS_Guided_Munitions_desc: "Although still prohibitively expensive, the fitting of GPS sensors in warheads along with guidance fins allows for individual shells to destroy high-value targets without the need for spotters or lasers, further threatening the enemy's control and supply points to influence the course of battle on an operational level."
 Precision_GPS_Strike_Munitions: "Precision GPS Guided Munitions"
 Precision_GPS_Strike_Munitions_desc: "The further development of GPS technology allows for cheaper, more availible GPS guided munitions to use against not only operational targets, but against tactical targets as well- answering tactical requests from combat units in a timely manner, taking out strongpoints to turn the tide of firefights."
 Ramjet_Assisted_Projectiles: "Ramjet Assisted Projectiles"
 Ramjet_Assisted_Projectiles_desc: "The development of small ramjets extends the range of artillery further than before, striking targets well out of reach of hostile fire. "
 Fully_Automated_Gun_Systems: "Fully Automated Gun Systems"
 Fully_Automated_Gun_Systems_desc: "Automation and further integration into C3I systems reduces the crew needed- automated ammunition picking and loading systems allows an artillery crew to sit back as the gun system recieves orders, selects the ammunition and firing strategies, and fires / reloads on its own."

