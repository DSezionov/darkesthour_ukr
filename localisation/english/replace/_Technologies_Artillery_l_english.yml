###  Rocket Artillery
######################################################################
### Generic
 rocket_artillery_equipment: "Rocket Artillery"
 Rocket_Artillery_equipment: "Rocket Artillery"
 Rocket_Artillery_equipment_short: "Rocket Artillery"
 Rocket_Artillery_equipment_desc: "Rocket artillery is less accurate and has a much lower sustained rate of fire than batteries of traditional artillery guns. However, they have the capability of simultaneously hitting a target with multiple rockets with devastating effect."

 Rocket_Artillery_equipment_1940: "Rocket Artillery '40"
 Rocket_Artillery_equipment_1940_short: "Rocket Artillery '40"
 Rocket_Artillery_equipment_1940_desc: "Rocket artillery is less accurate and has a much lower sustained rate of fire than batteries of traditional artillery guns. However, they have the capability of simultaneously hitting a target with multiple rockets with devastating effect."

 Rocket_Artillery_equipment_1942: "Rocket Artillery '42"
 Rocket_Artillery_equipment_1942_short: "Rocket Artillery '42"
 Rocket_Artillery_equipment_1942_desc: "Spin-stabilized rockets, increasing the range of lighter artillery batteries."

 Rocket_Artillery_1945: "Rocket Artillery '45"
 Rocket_Artillery_1945_short: "Rocket Artillery '45"
 Rocket_Artillery_1945_desc: "Further investigation reveals that rocket artillery has a significant impact on the battlefield. However, previous experimental designs and concepts lacked sufficient firepower. Recent advancements, including a refined solid fuel formula, fins, and larger warheads, will enhance our rocket artillery's indirect fire support capabilities."

 Rocket_Artillery_1950: "Rocket Artillery '50"
 Rocket_Artillery_1950_short: "Rocket Artillery '50"
 Rocket_Artillery_1950_desc: "Following the war, researchers became intrigued by the technology used in rocket artillery and its potential applications in other fields. While studying, some people speculated about a rocket's effectiveness against aerial or armoured threats. Meanwhile, ongoing advancements in various aspects of rocket technology have kept our rocket artillery brigades up to date with this new era."

 Rocket_Artillery_1955: "Rocket Artillery '55"
 Rocket_Artillery_1955_short: "Rocket Artillery '55"
 Rocket_Artillery_1955_desc: "Despite the global increase in mobility in doctrines, towed rocket artillery is still a popular choice among generals worldwide. As a result, continued development of these systems has produced results, albeit in stages. Lighter materials used in their launching platforms, advanced fire control methods, and radar integration have kept our rocket artillery ready for an ever-changing battlefield."

