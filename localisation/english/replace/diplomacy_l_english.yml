 PREVENT_ALLIES_CALL_WAR_ON_SOV: "§RBritain and the Allies are unfortunately not willing to fight both the Germans and the Soviet Union. As such, it is not possible to call them into the fight against the Communists. In the east, Poland stands alone.§!"
 PREVENT_ALLIES_JOIN_WAR_ON_SOV: "§RDespite the Germans starting this fight, public opinion is still heavily effected by the Great War. As such, intervening against the Soviets would be politically, and potentially militarily, suicide. We will fight the Huns, but Poland will have to fight alone against the Communists.§!"
 PREVENT_ITALY_JOIN_WAR_ON_FRANCE: "§ROur eagerness to join the war in World War II is overshadowed by the harsh reality of our inadequate military preparedness.\n\nDespite our strong desire for involvement, our limited military capabilities and resources fall significantly short of what is required for active participation in the conflict. §!"
 PREVENT_GERMANY_CALL_WAR_ON_ITA: "§ROur desire to enlist Italy in the war against France and Britain is met with disappointment, as Italy is not adequately prepared to join the conflict.\n\nDespite our urging, Italy's readiness for war falls short, rendering it impossible to involve them in the fight against these Allied nations.§!"
 PREVENT_DEN_JOIN_WAR_ON_GER: "§RThough under German control, we have not been called into the war. Our government has chosen a path of cooperation to avoid unnecessary destruction and preserve what little sovereignty remains.\n\nBecoming an active participant in the conflict would only bring ruin to our country, and so we remain on the sidelines.§!"
 PREVENT_GERMANY_CALL_WAR_ON_DEN: "§RDenmark remains under our control, but calling them into the war is not an option. The Danish government has chosen to cooperate rather than resist, allowing us to maintain order without unnecessary conflict.\nForcing them into the war would only disrupt this stability, making it an impractical course of action.§!"
 DISABLED_GENERATING_WARGOALS_MANUALLY: "§RNotice: Direct war justification option has been suspended. Seek alternate diplomatic routes.§!"
