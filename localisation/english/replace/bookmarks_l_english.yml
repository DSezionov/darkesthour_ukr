l_english:

### Changed Vanilla Entries

### DH Start Dates
 STARTDATE_1933_name: "Буря наближається"
 STARTDATE_1933_desc: "1 січня 1933 року. \nDark clouds gather on the horizon. The Great Depression has torn the politics of many of the world's nations asunder. Less than two years ago, Japan under the control of the Showa Emperor asserted it's supremacy over the Chinese warlords, invading Manchuria and installing their puppet - making its ambitions to take over the rest of China more than clear. In Germany, political instability and strife have been rampant for three years thanks to the economic conditions caused by the Great Depression, and the extreme Nazi NSDAP stands poised to achieve absolute power in the country, putting the Versailles treaty at risk. In Italy, the Birthplace of Fascism, 'Il Duce' Benito Mussolini has ruled with an iron fist for over a decade, rearming and preparing to enforce its territorial ambitions. The former Entente nations still lick their wounds from the Great Depression, unable to do anything but watch as the threat to world peace grows. \n\nAlthough a second Great War seems far off into the horizon, the outlook certainly does not seem good. Can the Old World Order consolidate its power again before it's too late, or will the new forces of the world rise to challenge the established powers?"

### Country Descriptions - 1933
 GER_1933_desc: "У серці Європи занепадаючий Райх стогне під тиском економічної скрути, соціальних потрясінь і нескінченних політичних криз, що загрожують зруйнувати самі підвалини недужої Республіки.\n\nСправді, для багатьох у Німеччині та поза нею Республіка давно зів'яла, а її вихолощена оболонка стала полем битви як для революціонерів, так і для реакціонерів. Усі заявляють права на владу. Усі проголошують себе єдиними вершителями долі Німеччини в час, що цілком може стати її найтемнішою годиною.\n\nАле, можливо, ще не все втрачено. Поки Батьківщина роздирає сама себе, незмінно хитрий рейхсканцлер, генерал піхоти у відставці й міністр оборони Курт фон Шляйхер замислює новий план — такий, що не лише відновить лад у його стражденній країні, а й посіє насіння нової революції: революції національного відродження, яка відтворить Німеччину кайзерів у всій її імперській величі та солдатській дисципліні.\n\nАле Шляйхер не може діяти сам. Для своїх цілей він потребує допомоги руху, що володіє серцями й думками мас. Із цією метою він звертає погляд до Націонал-соціалістичної німецької робітничої партії (НСДАП) та її загадкового вождя Адольфа Гітлера. Безперечно, Шляйхер робить величезний стрибок віри, та в цей переломний момент історії доля всміхнеться тим, хто діє рішуче. Принаймні саме це він повторює собі, обстоюючи свій задум перед старіючим рейхспрезидентом, колишнім фельдмаршалом Паулем фон Гінденбургом.\n\nГітлера можна стримати. Гітлера можна контролювати. Гітлер буде не більше ніж маріонеткою для мас — лялькою на нитках, що танцює під нашу дудку.\n\nШляйхер цілком може дізнатися, що Гітлер танцює лише під власну дудку."

 ITA_1933_desc: "Попри перемогу над австро-угорцями, Італія завершила Велику війну незадоволеною. Уклавши союз із державами Антанти заради здобуття великих територій в Альпах, Далмації та занепадаючій Османській імперії, Італія отримала значно менше за обіцяне, спонукавши багатьох гадати, навіщо їхні сини загинули майже задарма.\n\nУ поєднанні з Великою депресією та провалом парламентської демократії знаменитий «Похід на Рим» 1922 року дав Беніто Муссоліні та його новому фашистському рухові здобути владу. Відтоді він має широку підтримку як мас, так і Великої фашистської ради. Та деякі його обіцянки лишаються невиконаними, і сяйво нового режиму згасає.\n\nХоча Італія Муссоліні — чи то Дуче — пережила економічний обвал неушкодженою, вона потребує модернізації, якщо хоче взяти належне. Чи то колонії, чи узбережжя, чи бавовну — Італії доведеться розбудувати свій флот, армію та промисловість, щоб суперничати з Англією або навіть стати володаркою Середземномор'я.\n\nПопри нинішні переважно теплі стосунки із західними демократіями, Муссоліні знає, що рано чи пізно йому доведеться обирати. Його вибір вирішить, чи фашистський експеримент тріумфуватиме, чи приведе Італію до її найтемнішої години."

 FRA_1933_desc: "Французька Республіка, незаперечний переможець Великої війни, заплатила за свій успіх жахливу ціну. Хоча повернення Ельзасу-Лотарингії та знищення німецької воєнної машини були успіхом, людські втрати Франції виявилися величезними, спричинивши зростання антивоєнних настроїв, що ятряться донині й блокують будь-які воєнні дії без серйозних наслідків.\n\nВелика депресія ще більше погіршила становище — радикальні, проросійські ліві набирають сили, ультраправі ліги сіють заворушення на вулицях Парижа, а через економічний обвал Німеччина не може сплачувати репарації, яких Республіка так відчайдушно потребує.\n\nТим часом Сухопутна армія (Armée de Terre) не розвинулася порівняно з рештою Європи й досі загрузла в багнюці Великої війни. Застаріла й погано споряджена, разом з антивоєнним рухом і спустошеними лавами вона поглиблює й без того тяжке становище до повного відчаю.\n\nЩойно обраний уряд Поля-Бонкура мусить упоратися з усім цим — негайно й водночас. Прем'єрства у Франції були швидкими й хаотичними, і жоден мандат не триває довго. Якщо Республіка хоче лишитися однією з великих держав Європи, комусь доведеться вирівняти корабель, що тоне, — і то швидко."

 ENG_1933_desc: "Сполучене Королівство так і не оговталося по-справжньому від 1918 року. Хоч і переможниця Великої війни, Британія бачить, як квітучі рухи за незалежність, тривала Велика депресія та піднесення фашизму — усе це загрожує її становищу на вершині держав Європи, не кажучи вже про цілий світ.\n\nЕкономічно різноманітні програми жорсткої економії суттєво скоротили державні витрати. Армія недорозвинена й заледве спромагається утримувати велетенську колоніальну імперію, що тріщить по швах. І хоча Королівський флот лишається світовою морською силою, нові уроки сучасної війни засвоюються карколомними темпами, а триматися цих темпів — дорого.\n\nБританські дипломати лишаються відданими миру, укладаючи союзи з італійцями та французами — попри ненависть перших до Лондона й антивоєнні настрої других. З Німеччиною в Європі та Японією в Азії, а всіма британськими колоніями поміж ними, аби втримати свою могутність, острівній державі знадобиться вся її сила.\n\nЗ огляду на те, що і король, і прем'єр-міністр Макдональд недужі, здається, політики та монархія пасують своїй країні. Сполучене Королівство Великої Британії та Північної Ірландії вже певний час хворе й пригнічене, і шлях уперед може привести або до величі, або до їхньої найтемнішої години."

 SOV_1933_desc: "Катастрофічна поразка Росії у Великій війні разом із жорстокою громадянською війною привели до того, що над країною замайорів червоний прапор. Смерть Леніна 1924 року спричинила боротьбу за владу, що поставила Йосипа Сталіна на чолі Радянського Союзу. Його хватка над країною — залізна: політичних опонентів і підозрілих членів уряду усувають із суспільства, а його культ особи вихваляє його як «Сталеву людину».\n\nПоки капіталістичні нації світу хитає від руйнівних наслідків Великої депресії, Союз рветься вперед із швидкою індустріалізацією та масовою колективізацією, визначеними п'ятирічними планами, у надії, що Росія нарешті зможе наздогнати сучасні промислові держави. Своєю ідеєю «соціалізму в одній країні» Сталін прагне самотужки зміцнити й наростити силу Союзу, та як довго протриває ця ізоляція — невідомо.\n\nЗараз ведмідь, можливо, спить, але один незначний поштовх може обрушити червоні хвилі на тих, хто наважиться стати на шляху. Німеччина та Японія прямують до мілітаризму, а стосунки із Заходом — як ніколи низькі. СРСР пильно стежитиме й завзято захищатиме свої комуністичні ідеї та саму Росію!"

 USA_1933_desc: "After years of prosperity under a series of Republican presidents, the American economy has finally burst, almost like a bubble. Although it began four years ago after the stock market collapse, the Great Depression is having a massive effect on American society. Work can't be found, crop failures are normal, and inflation has exploded.\n\nHence, it is no surprise that President Herbert Hoover lost to his Democratic counterpart in November - although yet to be sworn in, Franklin Delano Roosevelt has already announced his policies of a 'New Deal' for the American people and bringing serious change to the economic principles of the United States.\n\nWhile still a very isolationist nation, the United States is being pulled into the international world. Japan's aggressive policies and movements against China rely on American oil, and Europe is slowly becoming a powder-keg, emanating once again from Berlin. The Navy is sizable, but the Army is laughable. It will require a herculean effort to bolster America's armed forces. \n\nRegardless of FDR's success, the world is changing quickly, and the USA is about to be on the front row, whether they want to or not."

 JAP_1933_desc: "The Empire of Japan has seen its power increase exponentially in the last 100 years. Crippling the Russians at Tsushima in 1905, the capture of the German East Asian colonies brought new possessions, while still being cheated out of the lion's share by the rest of Allies.\n\nAs such, the end of close relations with the West has created a dramatic rise in nationalism. Japan's ballot box is fading, quickly. Political radicals openly call for a return to total Imperial authority, assassinating and ousting anyone in their way.\n\nWhile Japan was the least affected by the global economic crises, the effects of the Shōwa Depression still linger on. The Zaibatsu, an industrial conglomerate, dominates the banking and heavy industry sectors.\n\nThe Army and Navy continue to defy each other, vying for the limited resources of the Empire.  The Kantō-gun buckles up for a great adventure into China, and to eventually "unify the eight corners of the world', a physical manifestation of "Hakkō ichiu". The Navy wraps up with the first Maru Keikaku and is already planning to circumvent the Washington Naval Treaty.\n\nRegardless, it seems that the Rising Sun will play the central act when the curtain finally rises over Asia."

 CHI_1933_desc: "China has long been divided, even before the collapse of Qing rule. European powers exploited the weak nation, culminating in the failed Boxer Rebellion in 1900. Many were unsatisfied at the weak attempts to throw the foreigners out, leading to the Xinhai Revolution of 1911, replacing 2000 years of imperial rule with a republic led by Sun Yat-Sen. The Three Principles of the People set out by him - Nationalism, Democracy, and Socialism - are still adhered to by Chiang Kai-shek and his government, although to what extent is often argued, as he is regularly accused of acting as an authoritarian..\n\nTwo major problems face the nationalist government: the remaining divided China, and an ever aggressive Japan. With a state of civil war existing, primarily between the government in Nanjing and the Communists, warlords have risen up in various areas of China, making unification a long road ahead. And with Japan having taken advantage of this weakness to further its imperial ambitions, it is only a matter of time before the Rising Sun strikes to attempt to put the Tiger down once and for all."

 POL_1933_desc: "Like the phoenix itself, Poland rose from the ashes of two dead empires and a war that destroyed Europe. Almost immediately, the young republic was almost overrun, but the “Miracle on the Vistula'' saved it from the claws of Bolsheviks. And yet, even with the guidance of Marshal Pilsudski, the Rzeczpospolita remains on a knife's edge.\n\nThe partitions brought nothing but stagnation. While industrialization began, and the economy picked up pace, any progress was destroyed by the Great Depression. Largely still rural, Poland will require significant investment to bolster it's small industrial core.\n\nMeanwhile, the vultures gather. Germany angers at their nation being split by the “Polish Corridor” and fringe groups call for it's retaking, by force if needed. The Soviets haven't forgotten about the defeat in 1921, and yearn for a chance at revenge. Internally, the large Ukrainian minority finds itself in a foreign country as the flames of an independent Ukraine still burns hot.\n\nDespite alliances with France and Romania, Poland must find a path in a world ready to ignite. But should war come, the Polish people stand united and ready to defend their new nation, whatever the cost may be."

 ETH_1933_desc: "Ethiopia has enjoyed relative peace and stability over the past couple of decades, having remained neutral during the Great War and any other substantial conflicts. Its victory against Italy in 1896 has seen the nation manage to avoid colonization during the “Scramble for Africa”, where so much of the continent was taken by the European powers.\n\nBefore Haile Selassie was crowned emperor in 1930, Menelik II started the process to take Ethiopia into the modern world, with the construction of railways, schools, and hospitals, as well as beginning an electrification campaign. Addis Ababa was proclaimed as the new capital, known as the “New Flower”.\n\nEmperor Selassie is continuing the path of modernization set out by Menelik II, but Ethiopia still lags far behind any of the European nations that surround it, and this poses a major problem. Italy has not forgotten its embarrassing defeat, and Mussolini still eyes conquering Ethiopia to strengthen his support at home. The lion roars, but war could come sooner rather than later, and the nation will need to be just as prepared, more than ever."