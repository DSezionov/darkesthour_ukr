l_english:
 CONTINUOUS_Foreign_Volunteers: "Foreign Volunteers"
 CONTINUOUS_Foreign_Volunteers_desc: "In the face of dwindling manpower, it is critical to ramp up initiatives, inviting skilled individuals from around the world to join our fight against malevolence.\n\nInternational cooperation will strengthen our resolve. We can build a formidable alliance capable of defending our values and promoting a more secure and peaceful world by embracing diversity and pooling resources. It's a call for unity that crosses borders, as we work together to create a safer and brighter future for all."
 CONTINUOUS_Rebuilding_Endeavor: "Rebuilding Endeavor"
 CONTINUOUS_Rebuilding_Endeavor_desc: "The beast that is war devours everything in its path. War is an unavoidable and unstoppable storm. The only way for our country to recover from the trauma of war is to launch a national rebuilding effort that promises to repair our damaged industries and put people back to work.\n\nNot only will this help to repair our economy, but it will also help to mend the deep schism that has split our spirits apart.\n\nIf we are successful in our efforts to rebuild our country, we will be seen as a shining city on a hill for other countries torn apart by this brutal war. In addition, we will establish ourselves as one of the few countries that emerged from war stronger than when we entered it.\n\n"
 CONTINUOUS_Economic_Diversification: "Economic Diversification"
 CONTINUOUS_Economic_Diversification_desc: "As we move towards economic self-sufficiency, expanding our industrial landscape becomes critical. This not only positions us as a global industrial powerhouse, but it also strengthens our economy in the face of uncertainty.\n\nLet us invest in various sectors to foster innovation and prosperity in the spirit of progress. This commitment to economic diversity will stand as a testament to our foresight and dedication as history unfolds, shaping a legacy that will last generations."
 CONTINUOUS_The_Great_Logistical_Endeavour: "The Great Logistical Endeavour"
 CONTINUOUS_The_Great_Logistical_Endeavour_desc: "Since the last war, we've learned that we can't rely on this country's basic infrastructure to transport military equipment and personnel across the country. The time has come to build more railroads and increase our motorised production by any means necessary.\n\nBecause, if war breaks out, we must be prepared to mobilise not only the military but also our people; transportation is the key to victory. Furthermore, once the war is over, we will no longer have to rely on the country's stalled infrastructure projects."
 CONTINUOUS_Operation_X: "Project X"
 CONTINUOUS_Operation_X_desc: "This classified programme will assist us in strengthening our land defences and the defences of our troops on the ground around the world, but it will come at a cost.\n\nWe can avoid the typical testing and bureaucratic time delays that accompany military development projects by utilising commercial industry.\n\nBecause of government back-channelling with the defence industry, the more efficient process of creating land defences will cost us in terms of general distrust from the public and industrial sectors alike."
 CONTINUOUS_Last_Stand: "Last Stand"
 CONTINUOUS_Last_Stand_desc: "The time has come for citizens to bear arms in order to protect every inch of our country. There is no longer any territory to retreat to, nor is there any reinforcement.\n\nThis is where we must put a stop to them; we must not give up another inch of ground to their encroachment! If we falter, our sacrifices will fade into obscurity.\n\nToday, we call for a Last Stand to protect this great nation from the adversary's malevolent threat. In this instance, at this critical juncture in history, we die as heroes!"
 CONTINUOUS_Scientific_Renaissance: "Scientific Renaissance"
 CONTINUOUS_Scientific_Renaissance_desc: "War is the renaissance of the sciences. A renaissance is a period of time when an interest is reignited or reawakened. As the war rages on, we must devise strategies to gain an advantage.\n\nIncreasing funding for scientific research into weapon development could give us the edge we need to defeat the opposition and end the conflict once and for all.\n\nIt's difficult to admit, but because there's less time for R&R during a war, innovation can happen faster. With new weapons and technologies, it's off to the races with the sole goal of winning the war."
 CONTINUOUS_Incentives_to_Military_Industry: "Subsidies for the Military Industry"
 CONTINUOUS_Incentives_to_Military_Industry_desc: "Improving our military may necessitate shifting subsidies to strategically important companies. We foster a competitive industrial environment while strengthening our defence capabilities by providing incentives to firms skilled in producing vital war supplies.\n\nThis strategy ensures a quick response to changing international threats. As a result, it is critical to increase financial support for established organisations while encouraging creativity and adaptability.\n\nBy making strategic investments, we strengthen our country's security infrastructure and position ourselves to deal with the challenges of both current and future conflict situations."
