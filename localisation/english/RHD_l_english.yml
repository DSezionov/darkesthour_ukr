######################################################################
#  Events
######################################################################
 RHD_Politics.1.t: "End of the Moffat Administration"
 RHD_Politics.1.d: "Today, our colonial nation's Premier, Howard Unwin Moffat, resigned completely and handed over the torch to his announced successor, George Mitchell. Moffat has had a relatively successful administration, lasting six years since 1927. Born in Bechuanaland to missionary father John Smith Moffat and Emily Unwin, he attended St. Andrews College in Grahamstown before joining the Bechuanaland Border Police. Following that, he took part in both the 1893 Matabele War and the Second Boer War. Moffat was elected in 1923 and served as Minister of Mines and Works under Charles Coghlan before succeeding him when the latter died.\n\nA conservative who viewed us as on the inevitable course to join the Union of South Africa - a different view from the rest of the Rhodesia Party that he was a member of - Moffat struck a deal worth 2 million pounds for the remainder of the British South Africa Company's resource rights in Southern Rhodesia, and he also passed the 1930 Land Apportionment Act, which established land ownership.\n\nHis successor, 66-year-old George Mitchell, has had a long career in Rhodesian politics after immigrating from Scotland. He is regarded as a reasonable choice, having served in several districts before being appointed to the government as Minister of Mines and Public Works on November 1, 1930, just like Moffat before him. He also served as Minister of Mines and Agriculture from May 19, 1932 to the present. However, it is unclear whether the Mitchell administration will last, with the 1933 general elections in September threatening to remove him from office only a few months after his arrival."
 RHD_Politics.1.A: "Will Mitchell stay Premier?"

 RHD_Election.1.t: "1933 Southern Rhodesian General Election"
 RHD_Election.1.d: "On this fine day in September, it is time to count the votes and select a new - or perhaps not so new - Prime Minister to lead Southern Rhodesia into the future. Only a few months after Howard Unwin Moffat's resignation, which resulted in George Mitchell's cabinet, it is time to reshuffle our government. Moffat is also expected to lose his legislative seat. Moffat's resignation, combined with Mitchell's lack of notable changes during his two months in office has given our opposition, the Reform Party, a minor boost. \n\nThe election is close and it is expected to be won by just a few votes... we may have a government by the Reform Party under Godfrey Martin Huggins, another run for the Rhodesia Party - giving George Mitchell the time he needs to actually do something -... or perhaps, in an astonishing move, the smaller Rhodesia Labour Party could send both packing. Each of these three has its own vision for Southern Rhodesia, the majority of which are consistent with the Empire's overall goals.\n\nObviously, a win for the Rhodesia Party would keep us on the current conservative path. True to their name, the Reform Party has promised a variety of economic reforms and policies that are slightly more liberal - but still in line with the status quo. The Labour Party would represent a radical shift; while they are unlikely to win, the press has previously described them as radically anti-capitalist and anti-government. Regardless, the future of our small country is in the hands of its people. When the results arrived, it was discovered that..."
 RHD_Election.1.A: "The Reform Party's promises won out!"
