 # National Spirits
 ######################################################################
 SPA_La_Guerra_Civil: "¡La Guerra Civil!"
 SPA_La_Guerra_Civil_desc: "Spain is engulfed in a brutal civil war, tearing apart families, communities, and the very fabric of the nation. Every resource is devoted to the struggle—factories converted to produce weapons, fields worked by whoever remains, and entire cities turned into battlegrounds.\n\nMorale rises and falls with each victory or defeat, but for both sides, there is no turning back. The war will not end until one vision of Spain triumphs completely, no matter the cost."
