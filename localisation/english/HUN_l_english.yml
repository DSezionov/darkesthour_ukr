l_english:
######################################################################
#  Decisions
######################################################################
 HUN_Attack_Slovakia: "Adjust the Slovakian Border"
 HUN_Attack_Slovakia_desc: "Our eastern border with Slovakia near Ungvár remains extremely unfavorable, with strategic locations within our territory clearly visible from Slovak positions. Sending in our forces to establish a new border west of Sobrance should do the trick."

 # Threat from the East
 HUN_Threat_from_the_East_category: "Threat from the East"
 HUN_Threat_from_the_East_category_desc: "We have credible intelligence from Berlin that the Soviets are planning a grand flanking manoeuvre into the Balkans to attack Germany. We had a feeling something was going to happen, but now we know for sure. If we are to save our country, we must prepare for the impending hammer blow.\n\nThe Carpathians, the European spine that separates civilised Europe from eastern savagery, will launch the assault. Let us join forces with our new German allies to fortify the mountains and prepare for war. The Soviets intend to destroy our civilization, and we must resist because the only other option is annihilation."
 HUN_Invite_Wehrmacht_Pioniere: "Invite Wehrmacht Pioniere"
 HUN_Invite_Wehrmacht_Pioniere_desc: "The Germans are already building a massive eastern defensive line. Let us extend this line into our own territory. However, if the defence's integrity is to be maintained, we must build them to the exacting standards demanded by the Germans. Some of our more arrogant generals believe that we can build forts just as well as the Germans. They are most likely correct, but we cannot take the risk. Let us swallow our pride and request that Germany send fortification engineers to oversee our construction and ensure that they will stand up to the legions of hell when they come against us."
 HUN_Prepare_the_Southern_Carpathians: "Prepare the Southern Carpathians"
 HUN_Prepare_the_Southern_Carpathians_desc: "The main section of the Carpathian line is well underway, but our recent acquisitions pose additional challenges. If this area is not similarly fortified, the Soviets will have little difficulty getting around our defences and rendering our carefully planned strategy moot. Fortunately, the Carpathian plans are already in place, so it's just a matter of extending the line through the new stretch of mountain we now own."
 HUN_Prepare_the_Carpathian_Line: "Prepare the Carpathian Line"
 HUN_Prepare_the_Carpathian_Line_desc: "If we are to survive the coming onslaught, we cannot rely on the Carpathians' natural hostility to stop a modern army. We must prepare the Carpathians for the most intense fighting they have ever seen. The Carpathian Line will be based on a chain of fortified mountains connected by miles of tunnels leading out into hidden holes from which we will fire on the advancing enemy. Beautiful valleys will fill with blood as the Soviets charge headlong into fields of mines, razorwire, and trenches, all while being watched over by expertly ranged artillery. The fighting will still be the most difficult we've ever faced, but it will be easier than it could have been."
 HUN_Prepare_the_Uzhorod_Line: "Prepare the Uzhorod Line"
 HUN_Prepare_the_Uzhorod_Line_desc: "While we expect the Carpathian Line to last forever, putting all of our eggs in one basket is a recipe for disaster. We will construct a line along the Tisza River as a backup position from which to launch a second tenacious defence if the worst happens and the Carpathians fall to the feared enemy. This new line, located in the vast Hungarian plain, will have advantages such as clearer fields of fire, but it will also lack much of the geographic assistance we received in the Carpathians. Construction should begin immediately, with the goal of never having to use it."

 # Soviets at Our Doorstep
 HUN_Soviets_at_Our_Doorstep_category: "Soviets at Our Doorstep"
 HUN_Soviets_at_Our_Doorstep_category_desc: "Chaos ensues as word reaches Budapest. Germany has informed us that the Soviet savages have grown tired of defiling their own lands and are now seeking to descend on fair Hungary for her wealth and plunder. If even a single barbarian defiles Hungarian land, all of our efforts will be for naught. We must strengthen our eastern defences. The fight for our survival has begun. It may have arrived sooner than we had hoped, but sometimes you do not get to choose the day when your fate is sealed; it is simply thrust upon you."
 HUN_Prepare_the_Carpathian_Line_2: "Prepare the Carpathian Line"
 HUN_Prepare_the_Carpathian_Line_2_desc: "If we are to survive the coming onslaught, we cannot rely on the Carpathians' natural hostility to stop a modern army. We must prepare the Carpathians for the most intense fighting they have ever seen. The Carpathian Line will be based on a chain of fortified mountains connected by miles of tunnels leading out into hidden holes from which we will fire on the advancing enemy. Beautiful valleys will fill with blood as the Soviets charge headlong into fields of mines, razorwire, and trenches, all while being watched over by expertly ranged artillery. The fighting will still be the most difficult we've ever faced, but it will be easier than it could have been."
 HUN_Extend_the_Carpathian_Line: "Extend the Carpathian Line"
 HUN_Extend_the_Carpathian_Line_desc: "Despite the fact that we have begun planning for a line of fortifications through the Carpathians, some argue that we should extend it even further south. Given that we own Northern Transylvania, this creates a significant weakness in our line of defences should the Soviets manage to break through Romania. As a result, the Carpathian Line will be extended all the way south through Northern Transylvania."
 HUN_Prepare_the_Stephen_Line: "Prepare the Stephen Line"
 HUN_Prepare_the_Stephen_Line_desc: "Even though many of our officers and generals are reluctant to admit it, we must prepare for the possibility that the Soviets will breach the Carpathians. If this scenario plays out and the Red Army marches over the Carpathians' mountains and hills, we will be completely exposed with no additional defences. As a result, as a backup plan, we will order the construction of a line of fortifications behind the Carpathians."
 HUN_Rally_Around_Budapest: "Rally Around Budapest"
 HUN_Rally_Around_Budapest_desc: "Should the worst-case scenario occur and the Red Army advances on Budapest, we will require one last line of defence, which will be our last hope of survival if everything else fails. Although this is an extremely unlikely scenario, it is critical to consider. If we do not properly prepare for this and our worst nightmare becomes a reality, we will be unprepared and destroyed in no time."
