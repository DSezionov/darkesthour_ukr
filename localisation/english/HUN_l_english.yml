#  Events
######################################################################

### OPERATION GROZA 
 HUN_Operation_Groza_Defence.1.t: "Berlin Calling!"  #If HUN not in Axi
 HUN_Operation_Groza_Defence.1.d: "Dietrich von Jagow arrived at Horty's residence today with a telegram from Berlin. Jagow wove a terrible tale when Horthy met with him, reluctantly and a little angry at Jagow showing up unannounced so early in the morning. He claims that Germany has proof that the Soviet Union is planning a massive offensive against the West in order to destroy Germany. The Germans are unsure but cannot rule out them entering via the 'Southern Route' through Hungary. Horthy immediately convened an emergency meeting of his government after the initial shock of the news.\n\nThe next steps came easily and quickly. Horthy explained the situation to his government and stated that Hungary would support Germany by this time next week. His ministers, King's men, and ardent anti-communists backed him up. A treaty admitting Hungary to the Axis was drafted and signed quickly. It wasn't until later that a clerk realised the Hungarian translation of the treaty had been done so quickly that it contained several spelling errors, including a misspelling of Hungary from Magyar to Maggar. Horthy was forced to retract the document and have it hastily edited before it was made public."
 HUN_Operation_Groza_Defence.1.A: "Isten irgalmazzon nekünk!"
 HUN_Operation_Groza_Defence.1.B: "This is German propaganda!"
 HUN_Operation_Groza_Defence.2.t: "Berlin Calling!"  #If HUN in Axis
 HUN_Operation_Groza_Defence.2.d: "Dietrich von Jagow arrived at Horty's residence today with a telegram from Berlin. Jagow wove a terrible tale when Horthy met with him, reluctantly and a little angry at Jagow showing up unannounced so early in the morning. He claims that Germany has proof that the Soviet Union is planning a massive offensive against the West in order to destroy Germany. The Germans are unsure but cannot rule out them entering via the 'Southern Route' through Hungary. Horthy immediately convened an emergency meeting of his government after the initial shock of the news.\n\nThe next steps came easily and quickly. Horthy explained the situation to his government and stated that Hungary would support Germany in the upcoming conflict. His ministers, King's men, and ardent anti-communists backed him up."
 HUN_Operation_Groza_Defence.2.A: "Isten irgalmazzon nekünk!"
 HUN_Operation_Groza_Defence.2.B: "This is German propaganda!"

### POLITICS
 HUN_Politics.1.t: "A Nation's Heir, A Father's Loss"
 HUN_Politics.1.d: "Losing a child is something no parent should ever have to go through, but here Horthy was, holding in his hands one of his eldest son István's last letters. According to reports from the eastern front, István had died in a flying accident while supporting the Hungarian Second Army against Soviet forces. Shortly after takeoff from an airfield near Ilovskoye, the other pilot asked István to increase his altitude, and István quickly pulled up. Following this rapid ascent, his aircraft stalled and crashed.\n\nWhile their political and ideological differences created tension, they shared a strong familial bond. István's progressive and anti-Nazi views differed from his more traditional, conservative approach, but he admired his son's intelligence and leadership potential. This tragic loss ended any hope of reconciliation between them or future leadership under István's influence, leaving him heartbroken, deprived of an heir, and the country without their very beloved \"small regent\".\n\nHorthy snapped out of his thoughts and read the letter that has burned into his mind, and that he had read repeatedly since the news of István's death, one last time: \"Another sad topic: the Jewish companies, as I hear, there are 20,000 or 30,000 men, are at the mercy of the sadist's passions, in every regard; the stomach of man aches looking at this; it is abhorrent that this happens to us, too, in the twentieth century. Can we take them home to work there? Otherwise, in the spring, only a few will survive. I'm afraid we'll pay dearly for this once.\""
 HUN_Politics.1.A: "And the price will be paid in blood."
 HUN_Politics.2.t: "Death of Gyula Gömbos"
 HUN_Politics.2.d: "Tragedy has struck the nation. Prime Minister Gyula Gömbös, whose vision sought to forge Hungary into a strong and modern state, has succumbed to testicular cancer after a long and painful battle.\n\nGömbös was a controversial yet determined figure. His dreams of national renewal and closer ties with foreign powers left a deep mark on the course of Hungarian politics. As the black ribbon of mourning drapes the Parliament, the question arises: who shall now succeed him?\n\nAfter careful consideration by Regent Horthy and the cabinet, Kálmán Darányi, a pragmatic and loyal conservative, has been appointed to succeed Gömbös as Prime Minister of the Kingdom of Hungary."
 HUN_Politics.2.A: "The nation grieves."
 HUN_Politics.3.t: "Fall of Kálmán Darányi"
 HUN_Politics.3.d: "The winds of change once again sweep through the corridors of power in Budapest. Prime Minister Kálmán Darányi, who sought to balance Hungary's destiny between tradition and modernization, has seen his political foundations crumble.\n\nHis government's growing sympathy toward Germany and his decision to permit the Arrow Cross Party to participate in the elections have alarmed Regent Miklós Horthy, who fears that Hungary may be sliding into the clutches of radicalism.\n\nFollowing the Anschluss of Austria, German influence now looms larger than ever across the border, and Horthy, determined to preserve Hungary's sovereignty and royalist traditions, has moved decisively.\n\nDarányi has been dismissed, and in his place, the Regent has appointed Béla Imrédy, a younger, ambitious technocrat who promises both loyalty to the Crown and a steady hand in navigating the turbulent European situation."
 HUN_Politics.3.A: "Another one bites the dust."
 HUN_Politics.4.t: "Fall of Béla Imrédy"
 HUN_Politics.4.d: "Political turmoil has once again struck the government in Budapest. Prime Minister Béla Imrédy, who rose to prominence promising a program of national renewal and modernization, has suddenly found himself at the center of scandal.\n\nDuring a heated session of Parliament, opponents of the government revealed that Imrédy had distant Jewish ancestry, a revelation that sent shockwaves through Hungary's conservative and increasingly nationalist political establishment.\n\nThough Imrédy attempted to defend his record and loyalty to the nation, the pressure from Regent Miklós Horthy and German-aligned factions of the government proved overwhelming.\n\nReluctantly, Imrédy tendered his resignation. In his place, Horthy has called upon Count Pál Teleki, a respected scholar and moderate conservative, to lead the government and restore stability in these divisive times."
 HUN_Politics.4.A: "Another one bites the dust."
 HUN_Politics.5.t: "Pál Teleki Commits Suicide"
 HUN_Politics.5.d: "A dark day has fallen upon the Kingdom of Hungary. Prime Minister Count Pál Teleki, the scholar and statesman who strove to steer Hungary along an independent and honorable course, has taken his own life.\n\nFor months, Teleki had struggled with the growing influence of Germany and the pressures of alliance politics. He had hoped to preserve Hungary's sovereignty and maintain a careful balance between national ambition and moral restraint. Yet with Hungary's entry into the Axis camp and the preparations for war against Yugoslavia, Teleki's conscience could bear no more.\n\nThis morning, the Prime Minister was found dead in his residence, having left a final note expressing his despair over Hungary's broken neutrality and the loss of its sovereignty.\n\nRegent Miklós Horthy, shaken by the tragedy, now faces the immense challenge of holding the nation together as Europe descends further into chaos, and has appointed László Bárdossy as Hungary's new Prime Minister."
 HUN_Politics.5.A: "The nation mourns."
 HUN_Politics.6.t: "Fall of László Bárdossy"
 HUN_Politics.6.d: "As the war drags on and the cost to Hungary grows heavier with each passing month, political discontent has begun to stir in Budapest. Prime Minister László Bárdossy, whose government led Hungary into the Axis camp and war against the Soviet Union, has found himself increasingly isolated.\n\nHis unwavering alignment with Germany and the nation's deepening involvement in the conflict have alarmed Regent Miklós Horthy, who now fears that Hungary's fate is slipping beyond its control. The Regent has come to believe that a change in leadership is the only way to preserve the Kingdom's autonomy, and perhaps, in time, to seek a path out of the war.\n\nAfter a tense private meeting at Buda Castle, Horthy demanded Bárdossy's resignation. In his place, he has appointed Miklós Kállay, a cautious conservative and seasoned administrator known for his subtle diplomacy and quiet skepticism toward the Axis alliance.\n\nWith the appointment of Kállay, Hungary stands at a crossroads: outwardly loyal to Germany, yet inwardly searching for a way to survive the storm."
 HUN_Politics.6.A: "Another one bites the dust."

