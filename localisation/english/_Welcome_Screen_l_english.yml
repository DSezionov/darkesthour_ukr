 DH_WELCOME_SCREEN_COUNTRY_TIPS_GENERIC: "There are no tips specific to [This.GetName]. If you are unfamiliar with the §RDarkest Hour§! mod or its new mechanics, you may want to play its tutorial."

 DH_WELCOME_SCREEN_COUNTRY_TIPS_GER: "- New victory spirit when Germany defeats the Soviet Union.\n- Similar to the Soviet’s 5-Year Plan mechanic, Reichsautobahn now alerts the player with events when the decision is completed.\n- Revamped Reichskommissariats (new decision images and revamped effects/names of the subject type).\n- New autonomies.\n- Added a new type of unit “SS Light Infantry”.\n- New global news event if Germany decides to push to the Urals (which will also add debuffs to Germany).\n- Added various alt-history partitions of Germany to the Yalta conference.\n- Operation Weserubung has been converted to a war room operation with new decisions, events.\n- Added Victory Fever national spirit after Germany defeats France to fix PP issues."
