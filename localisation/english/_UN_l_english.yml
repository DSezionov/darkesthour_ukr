  # War Exhaustion
  UN_WAR_EXHAUSTION_EXPLANATION_TT: "The §tWar Exhaustion§! mechanic has been activated for all major countries in the conflict.\n\n§tWar Exhaustion§! will §Ygradually increase§! over time, but the §Yprimary drivers§! are the following:\n\n- For §Yevery 30,000 men lost§! (casualties), §tWar Exhaustion§! increases by §R1%§!\n- §YFailed Mission Objectives§! §Rincrease§! one alliance's §tWar Exhaustion§! as well\n\nAs §tWar Exhaustion§! grows, §YStability§!, §YWar Support§!, and §YFactory Output§! will §Rreduce§!.\n\nAt §R100%§! §tWar Exhaustion§!, a faction is no longer able to keep fighting. As a result the §YWar Effort§! will begin to collapse, which if not stopped, will likely cost one alliance the war, implied that at the same time, the alliance performs poorly on the battlefield."
