  ######################################################################
  #  United Nations Decisions
  ######################################################################
  UN_Filling_the_Vacancy: "Filling the Vacancy"
  UN_Filling_the_Vacancy_desc: "A vacancy has arisen as a result of diplomatic fallout, regime change, or the dissolution of a former member state. It is now critical that the remaining nations collaborate to fill this critical seat and resume full operational status. Choosing the right country to fill this position is more than just a bureaucratic exercise; it is a strategic move that will influence future global decisions. If not filled, the UN risks becoming paralysed, undermining its authority and emboldening belligerent powers. The Security Council, which makes binding decisions on matters of war and peace, cannot function without full membership."
  UN_Join_the_Torch_Group: "Join the Torch Group"
  UN_Join_the_Torch_Group_desc: "Following the establishment of strong economic and technological cooperation within the United Nations, a new vision has emerged: one in which democratic nations around the world collaborate not only on policy and military matters, but also on scientific endeavours. This mission is represented by the \"Torch Group,\" a group of UN-aligned countries committed to a shared future of innovation and progress. Joining the Torch Group will allow us to contribute our most brilliant minds by exchanging information, coordinating accomplishments, and ensuring the free world's ideological and technological superiority."
  UN_United_Nations_Politics_Category: "United Nations"
  UN_Allied_Supreme_Command: "Allied Supreme Command"
  UN_UNSC_Category: "United Nations Security Council"
  UN_Marshall_Plan_Category: "The [THIS.GetMarshallPlanName] Plan"
  UN_Marshall_Plan_Category_desc: "\n\n\n£decision_header_UN_Marshall_Plan\n\n\n\n\n\nThe War has ended, and Europe is in ruins. Cities have been reduced to ashes and rubble, millions have been displaced across the continent, and the entire region's economy is in complete disarray. As the strongest and most prosperous democratic nation left, it is up to us to provide them with a lifeline. The §B[THIS.GetMarshallPlanName] Plan§! is that lifeline. It is likely the most ambitious project in this country's history, with a single goal: §Rrebuilding a continent§!.\n\n§LBillions in economic programs will flow across the Atlantic, allowing Free Europe's economies to recover to a better state than they were before the war.§!"
  UN_Marshall_Plan_Stabilize_Italy: "Stabilize Italy"
  UN_Marshall_Plan_Stabilize_Italy_desc: "Italy emerged from the war with its economy destroyed, infrastructure in ruins, and people in political upheaval. As part of the larger United Nations Marshall Plan for European Recovery, this will allow for immediate financial and logistical support to stabilise Italy. The goal is to rebuild critical infrastructure, restore democratic governance, and keep extremism from spreading in an already fragile region."
  UN_Marshall_Plan_Rush_Emergency_Aid_to_the_Benelux: "Rush Emergency Aid to the Benelux"
  UN_Marshall_Plan_Rush_Emergency_Aid_to_the_Benelux_desc: "The Benelux countries suffered greatly during both the occupation and the liberation. Bridges, ports, cities, and critical industries are all in ruins. Given its proximity to the North Sea and involvement in European trade, the United Nations recognises the region's strategic and economic importance. This will allow for faster delivery of emergency relief, such as food, medical supplies, building materials, and construction workers."
  UN_Marshall_Plan_Recover_From_The_Blitz: "Recover From The Blitz"
  UN_Marshall_Plan_Recover_From_The_Blitz_desc: "The United Kingdom bore the brunt of the German Blitz: endless bombings that destroyed cities, crippled infrastructure, and claimed a high human toll. Despite winning the war, the United Kingdom emerged economically drained and physically scarred. The United Nations will allocate Marshall Plan funds to aid Britain's recovery from the devastation. Funds will be used to rebuild critical infrastructure such as housing, rail networks, power grids, and industrial facilities."
  UN_Marshall_Plan_ReElectrify_the_City_of_Lights: "Re-electrify the City of Lights"
  UN_Marshall_Plan_ReElectrify_the_City_of_Lights_desc: "France, while liberated, is deeply scarred by occupation and political strife. As a result, we will direct UN Marshall Plan funds directly to France's power infrastructure, repairing electrical grids, revitalising industry, and physically restoring light to its cities. A fully functional France is essential not only for European recovery, but also for reviving the spirit of international cooperation."
  UN_Marshall_Plan_Money_1000: "§Y1000§! £money_icon£"
  UN_Marshall_Plan_Money_1000_blocked: "§R1000§! £money_icon£"
  UN_Marshall_Plan_Money_750: "§Y750§! £money_icon£"
  UN_Marshall_Plan_Money_750_blocked: "§R750§! £money_icon£"
  UN_Hoover_Commission_Category: "The Hoover Commission"
  UN_Hoover_Commission_Category_UI_desc: "The Federal Government under FDR has become an unwieldy monster. Dozens of departments have been established, each with overlapping authorities and missions, causing confusion and waste throughout the organisation. Under the newly passed Reorganisation Act, the President has convened the Hoover Commission, led by Former President Hoover, to examine the current state of the US Government and identify ways in which it can be consolidated, streamlined, and improved to tackle the modern era with maximum efficiency."
  UN_Hoover_Commission_Direct_Commission_Funds: "Send Aid to [FROM.GetNameDefCap]"
  UN_Hoover_Commission_Modifier: "Hoover Commission Funds"
  UN_War_Exhaustion: "War Exhaustion"
  War_Exhaustion_Negotiate_Peace: "Negotiate Peace"
  War_Exhaustion_Negotiate_Peace_desc: "[THIS.GetWorldWarThreeName] decimated continents, destroyed entire economies, and brought the world's population to the brink of despair. As the conflict between the United Nations-led coalition and the Soviet Bloc continues, signs of war exhaustion become more visible. Civilian protests, strained logistics, and political divisions have started to erode the resolve of even the most powerful countries. It is time to ask: Have we paid enough in blood?"
  War_Effort_Collapse: "The War Effort Collapses"
  War_Effort_Collapse_desc: "As [THIS.GetWorldWarThreeName] drags on, the weight of total war threatens to destabilise even the most tenacious nations. Stockpiles are depleted, supply routes fail, and the people's will weakens under the strain of constant sacrifice. In the harsh reality of combat, endurance is as important as weapons. When the desire to fight is gone, no amount of preparation will prevent the fall."
  Calm_the_Population: "Calm the Population"
  Calm_the_Population_desc: "Our people had not expected to be thrust into another war, especially not against our former allies. They are understandably tired of the endless bloodshed, and despite previous attempts to persuade them to support the continuation of the war, they are becoming increasingly unruly. Tensions have risen throughout society, from citizens who are now openly protesting to politicians who must now send their sons to die because there is no other man to take their place. We must address this growing discontent. We may be able to calm the population by doubling down on our speeches, putting up posters, and funding new distractions."
  UN_War_Exhaustion_Target_State: "Capture [FROM.GetName]"
  UN_War_Exhaustion_Target_State_desc: "§gMission Objective - Phase [?war_exhaustion_current_tier] of [THIS.GetWorldWarThreeName]§!\n\nThe United Nations command has identified a Soviet-controlled region whose loss could devastate enemy morale and bring the global battle to a close. This critical state has enormous strategic and symbolic importance: winning it would disrupt Soviet logistics, erode internal confidence, and serve as a rallying point for the international community. The path to peace may well lead through this battleground; if we act quickly, the war may end in our favour."
  SOV_War_Exhaustion_Target_State: "Capture [FROM.GetName]"
  SOV_War_Exhaustion_Target_State_desc: "§gMission Objective - Phase [?war_exhaustion_current_tier] of [THIS.GetWorldWarThreeName]§!\n\nMilitary intelligence has discovered a significant Western alliance stronghold; a key territory whose loss would devastate adversary morale and undermine the war effort's foundation. This region represents capitalist unity and logistical power, as it houses critical industry, infrastructure, and command activities. Let red banners fly where they once ruled, and the world will recognise the Soviet people's strength."

  # Allied Supreme Command
  UN_Recognize_the_Polish_Government_in_Exile: "Recognize the Polish Government in Exile"
  UN_Recognize_the_Polish_Government_in_Exile_desc: "Dissatisfied with placating the communists and living under the Red Banner, the Poles refused to return to Warsaw until their country regained independence from foreign powers. When the unthinkable happens, it's best to have the Polish Government in Exile by our side. With enough money, diplomacy, and promises, we could persuade the Poles to fight alongside us to reclaim their homeland."
  UN_Keep_Ahold_of_Vlasov: "Keep Ahold of Vlasov"
  UN_Keep_Ahold_of_Vlasov_desc: "Despite his reputation as a Soviet Red Army officer who defected to the Nazis, Vlasov could be useful if the unthinkable happens. Keeping Vlasov would upset the Soviet Union and its allies, but his inside knowledge of the Soviet Union and its tactics could be useful."
  UN_Contact_the_Organisation_of_Ukrainian_Nationalists: "Contact the Organization of Ukrainian Nationalists"
  UN_Contact_the_Organisation_of_Ukrainian_Nationalists_desc: "Ukraine has always been the Soviet Union's punished child, subjected to unjust famines, political persecution, and oppression. This unfair and harsh treatment by their Soviet Overlord has led to the formation of several underground nationalist cells in Ukraine. With careful backdoor communications and offers of freedom, we can persuade Ukrainian nationalists to disrupt Soviet logistics and supplies if the unthinkable occurs."
  UN_Enlist_the_Spanish_Republicans: "Enlist the Spanish Republicans"
  UN_Enlist_the_Spanish_Republicans_desc: "The Soviet Union openly supported the Republicans who fought the Spanish State during the Civil War. Throughout the war, the Soviet Union provided Republican forces with weapons, vehicles, and equipment. More importantly, Soviet advisors trained Republican officers before their defeat in the Civil War. Getting Republicans to like us, or at least support us, could secure the Iberian Peninsula if Operation Unthinkable occurs."
  UN_Merge_the_Occupation_Zones: "Merge the Occupation Zones"
  UN_Merge_the_Occupation_Zones_desc: "Under United Nations supervision, the American, British, and French occupation zones of Germany will be administratively merged into a single joint zone. This entity, designated as the Trizone (unofficially known as \"Trizonesia\"), will be governed by a unified Allied authority to streamline reconstruction, resource management, and security. Sovereignty remains suspended, and the area continues to function as an occupied territory under international oversight."
  UN_Retrain_the_Wehrmacht: "Retrain the Wehrmacht"
  UN_Retrain_the_Wehrmacht_desc: "Following the war, the Allies disbanded the Wehrmacht and removed its officers. However, to aid the establishment of a West German government, some have proposed that we reorganise and retrain the remnants of the Wehrmacht to patrol and maintain Germany's East-West border while our troops protect NATO's other borders. Training the Wehrmacht will be difficult, and finding the right men to lead the newly reformed Wehrmacht will take time, but it will help our West German administration's legitimacy in the long term."
  UN_Reinstate_the_Commands: "Reinstate the Commands"
  UN_Reinstate_the_Commands_desc: "A reformed and trained Wehrmacht requires officers. With a few legal and political loopholes, we can persuade the officers who the Allies fired after the war to rejoin the West-German Wehrmacht. All of our exiled allies will be outraged by this, as many are reportedly dissatisfied with the Allies' decision to rebuild the Wehrmacht at all."

  UN_Revisit_the_Oder_Neisse_Line: "Revisit the Oder-Neisse Line"
  UN_Revisit_the_Oder_Neisse_Line_desc: "Since gaining UN membership, West Germany has expressed its dissatisfaction with the Oder-Neisse Line. The Oder-Neisse Line was a negotiated border between the Polish Government-In-Exile, the Soviet Union, the United Kingdom, and the United States, albeit loosely. If we are to silence the persistent and obnoxious pressure that West German ambassadors put on us, we must reconsider our position on the Oder-Neisse Line."
  UN_The_Division_of_East_Prussia: "The Division of East Prussia"
  UN_The_Division_of_East_Prussia_desc: "We must carefully consider the fate of East Prussia. It has a majority Polish population because Germans fled the impending Soviet invasion, but it also has historical and cultural significance for Germany as a whole. Handing over the land to Poland could jeopardize relations with a future German state; however, returning the land to Germany may upset the Polish Government in Exile once they regain power."
  UN_A_Seat_at_the_Table: "A Seat at the Table"
  UN_A_Seat_at_the_Table_desc: "With the Soviet Union's departure from the UN Council, their seat is vacant. If we don't fill the seats, we risk becoming like the League of Nations in the years preceding the war. Some have suggested Germany as a strong contender, but those who suffered under German rule during the war are opposed to the idea. We should take their admission seriously."
  UN_The_Question_of_the_Curzon_Line: "The Question of the Curzon Line"
  UN_The_Question_of_the_Curzon_Line_desc: "After annexing Poland's eastern half, the Soviet Union divided the territory between the Belarusian and Ukrainian Soviet Socialist Republics. The London Poles claimed the land was Polish territory and demanded that we reinstate the region's pre-1939 borders. An enclave of Ukrainians in Washington, claiming to be a government in exile, has pledged to maintain its networks if the land remains Ukrainian. Perhaps we should give the Curzon line more thought."
  UN_The_Vilnius_Wilno_Situation: "The Vilnius/Wilno Situation"
  UN_The_Vilnius_Wilno_Situation_desc: "Vilnius remains a land feud that predates the UN by several centuries. Lithuania has a claim dating back to the 1300s, claiming it as their legal land and capital. Meanwhile, Poland has claimed Vilnius since the 1500s, when they formed a commonwealth with Lithuania. They have given us the final say in the matter, pleading with us to put an end to the conflict."
  UN_Define_Ukraine: "Define Ukraine"
  UN_Define_Ukraine_desc: "The Ukrainian identity may be ancient, but centuries of Russian rule and attempted 'Russification' have left the lands considered 'Ukrainian' ambiguous. The future Russian government that we hope to elect regards Belgorod as entirely Russian and integral to the state. However, Ukrainian freedom fighters and separatists argue that the land is essential for a Greater Ukraine. We must make sound decisions because failure to do so could pave the way for future conflicts in Eastern Europe."
  UN_Determine_the_Status_of_Crimea: "Determine the Status of Crimea"
  UN_Determine_the_Status_of_Crimea_desc: "Crimea has a diverse range of ethnicities, making it difficult to determine who will receive the strategic land once our crusade begins. The future Russian government claims that the land is predominantly Russian and that giving it to them will help strengthen a Russian black sea fleet. Ukrainian separatists have claimed that Ukrainians in Crimea are incorrectly described as 'Russian', and that handing over the land to Russia will leave a new Ukrainian state defenseless against any future Russian moves."
  UN_Look_to_White_Russia: "Look to \"White Ruthenia\""
  UN_Look_to_White_Russia_desc: "For centuries, Belarus served as a subject state to various foreign powers. Despite this, the country has its own culture and identity, and those claiming to represent a government-in-exile in Washington have argued that if we truly want to fight for all peoples' freedom, Belarus must be liberated. The Russians, on the other hand, insisted that Belarus remain Russian territory, claiming that its fragile existence would jeopardise any hopes for peace in Eastern Europe's troubled regions."

  # Focus Missions
  UN_Create_the_Hoover_Commission_Mission: "Creating the Hoover Commission"
  UN_Create_the_Hoover_Commission_Mission_desc: "During the isolationist era, the US bureaucracy crumbled, unable to meet the complex demands of domestic and international affairs. To address this, we will issue a decree establishing the Hoover Commission, chaired by Herbert Hoover, to revamp and modernise our executive structures. This would strengthen the United States' position as a global power and demonstrate to the world that we keep our promises."
  UN_Expel_the_Soviet_Union_Mission: "Expulsion of the Soviet Union"
  UN_Expel_the_Soviet_Union_Mission_desc: "With the growing ideological divide between the Soviet Union and the United States, tensions within the United Nations have reached a boiling point. The United States, with the support of the majority of members, has proposed expelling the Soviet Union due to its aggressive foreign policies and refusal to cooperate with other countries. This decision will further isolate the Soviet Union while reaffirming the free world's dominance in international politics."
  UN_Their_Last_Obligation_Mission: "Hearing Their Last Obligation"
  UN_Their_Last_Obligation_Mission_desc: "Colonization is one of the most divisive issues in the world, with colonies yearning for freedom and autonomy. In this era of rising global tensions, we cannot afford to ignore the voices of those seeking decolonisation. However, agreeing to these requests would be a departure from the ideas that once distinguished the empire. While independence movements continue to cause upheaval, we must remind the world that we, too, have a responsibility to protect our strategic and economic advantages."
  UN_Sidestep_the_Issue_Mission: "Sidestepping the Issue"
  UN_Sidestep_the_Issue_Mission_desc: "The large colonial empires of the United Kingdom and France present challenges as well as opportunities. British India requires immediate attention, but the remaining colonies also contribute significantly to the economic and geopolitical interests of their respective masters. Rather than focusing on the complicated issue of decolonization, we believe our resources would be better spent combating the growing threat of global communism. As a result, we will postpone discussions about the deconstruction of colonial empires."
  UN_Abolish_Mandates_and_Protectorates_Mission: "Abolishment of Mandates and Protectorates"
  UN_Abolish_Mandates_and_Protectorates_Mission_desc: "The ongoing conflict over Palestine remains one of the most pressing issues in global diplomacy. Following extensive consideration, the United Nations is advocating for a resolution dividing Palestine into separate Jewish and Arab states. While this approach may lead to peace, it also carries significant risks. Our involvement in the region is now under serious scrutiny, and we must carefully consider Palestine's fate. The decision to accept or oppose partition will have far-reaching consequences for our international standing and relationships with Arab and Jewish states."
  UN_Colonial_Recruitment_Fund_Mission: "Organizing the Colonial Recruitment Fund"
  UN_Colonial_Recruitment_Fund_Mission_desc: "In the face of the Soviet Union's relentless expansion, our military requires a massive influx of troops to maintain momentum and ensure victory. We can quickly restore casualties and strengthen our military by leveraging the vast human resources of our overseas colonies, particularly those in Africa. While the deployment of colonial recruits may reduce combat effectiveness and jeopardize the stability of our African holdings, the critical need for personnel to resist the Soviet threat must not be overlooked."
  UN_United_High_Command_Mission: "Uniting the High Command"
  UN_United_High_Command_Mission_desc: "Following recent conflicts around the world, numerous governments and factions have been displaced and forced into exile. The stakes are high, and balancing rewards for allies and managing foes has never been more difficult. Uniting the Allied High Command not only strengthens our domestic leadership, but it also has the potential to shift the balance of global power in our favor and bring our allies together in response to the Soviet threat."
  UN_Reinforce_the_Stimson_Doctrine_Mission: "Reinforcing the Stimson Doctrine"
  UN_Reinforce_the_Stimson_Doctrine_Mission_desc: "The Stimson Doctrine emphasizes our commitment to international law and opposes the legitimacy of forceful territorial expansion. Reinforcing this doctrine is critical to preserving our international reputation as a defender of peace and stability. By publicly rejecting aggressive territorial expansions, we send a strong message to both allies and adversaries that our country will not tolerate violations of national borders."

