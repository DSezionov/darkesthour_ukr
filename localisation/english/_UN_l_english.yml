l_english:

  ######################################################################
  #  United Nations Events
  ######################################################################

  # News Events
  UN_News.1.t: "The Rise of Humanity"
  UN_News.1.d: "[FROM.GetNewsIcon]After six years of war, hatred, and violence, the world is beginning to return to a peaceful state. Countries are rebuilding their economies and demobilising their armies, as global diplomacy enters a new century.  More recently, Western democratic countries decided to establish a successor to the League of Nations, the United Nations, an organisation designed to maintain a fragile world order rather than spark a new World War.\n\nThe United States and advanced European countries are prepared to collaborate to save the world from another bloodshed. In a week, the young organization's first congress will begin, and the union of humanity will be able to resolve the first major issues and establish the UN's goals. It will be a truly historic moment for the entire world!"
  UN_News.1.A: "Peace and prosperity will finally come."
  UN_News.1.B: "Peace and worldwide revolution shall finally come."
  UN_News.1.C: "This is nothing but a sham."
  UN_News.1.D: "Will peace and prosperity finally come?"

  UN_News.2.t: "United Nations Established; World Peace?"
  UN_News.2.d: "[FROM.GetNewsIcon]More recently, Western democratic countries decided to establish a successor to the League of Nations, the United Nations, an organisation aimed at maintaining a fragile world order and reforming global diplomacy. The leaders are determined not to repeat the League of Nations' mistakes, so any illegal actions against the organisation will be met with an armed response.\n\nAt the first congress, the organisation resolved many issues and adopted several resolutions pertaining to the organization's structure and functions, as well as the limitation of extremist ideology propaganda. The United States gave a speech at the first congress that stunned the entire world. In it, they declared an \"unnamed threat\" that the UN is prepared to address. Will there really be another war?"
  UN_News.2.A: "A beautiful speech."
  UN_News.2.B: "Capitalist tyranny tries to spread again."
  UN_News.2.C: "Empty threats from a gang of thugs!"
  UN_News.2.D: "Another conflict already?"

  UN_News.3.t: "United Nations Established; World Peace!"
  UN_News.3.d: "[FROM.GetNewsIcon]In a world still recovering from years of conflict and division, the world's great powers have joined forces to create a new institution dedicated to maintaining peace and fostering international cooperation. The United Nations Organisation was established today following a conference in San Francisco, a project similar to the League of Nations. This alliance aims not only to resolve disputes, but also to establish a long-term framework for dialogue, diplomacy, and mutual understanding.\n\nFurthermore, discussions covered topics such as the formation of decision-making councils, dispute resolution mechanisms, and strategies for humanitarian aid, economic development, and the protection of fundamental human rights. The United Nations Charter, a treaty draughted earlier this year, was also ratified by the Security Council's permanent members as well as the rest of the organisation.\n\nDespite this hope, there was a palpable sense of unease in the assembly rooms. Power dynamics between large and small countries remain tense, and issues of enforcement and accountability have sparked heated discussion. Observers point out that, while the United Nations offers unprecedented opportunities for collective action, its effectiveness is dependent on its members' willingness to act in good faith."
  UN_News.3.A: "For peace!"
  UN_News.3.B: "For the revolution!"
  UN_News.3.C: "Maybe it is better this way."

  UN_News.4.t: "The Collapse of the Soviet Union"
  UN_News.4.d: "[FROM.GetNewsIcon]Today, shocking news has begun to filter out of the Soviet Union. Repeated battlefield defeats and humiliation on the global stage have enraged the Russian people once again. Tens and hundreds of thousands of angry men, women, and children take to the streets in Leningrad, Moscow, and other major cities across the Union, just as they did in the dark days of 1917. The Moscow government's attempts to suppress these protests quickly spiralled out of control.\n\nWhile the Moscow government proclaims the strength of its national borders, broadcasts from within the Union cast doubt on such bold claims. Rival governments have emerged in Sverdlovsk and Novosibirsk, each claiming to be the legitimate continuation of Lenin's ideals. The Sverdlovsk government, led by Lavrentiy Beria, claims that the Novosibirsk government, led by Georgy Zhukov, is being funded by the West in order to bring down the Socialist Revolution. Meanwhile, Zhukov has issued a statement declaring Beria insane and a usurper, and holding him responsible for Stalin's death. As the two sides bicker and prepare for civil war, cities across the Union descend into anarchy unprecedented since the First Civil War."
  UN_News.4.A: "Nothing to see here!"
  UN_News.4.B: "The bear kills her cubs once more."

  UN_News.5.t: "The Greatest War" # World War 3
  UN_News.5.d.A: "[FROM.GetNewsIcon]It has only been a short time since the Second World War, the deadliest and most destructive war to ever strike the earth, ended, with the democracies of the West and the communists of the East reaching an uneasy agreement. Such a peace allowed families to bury their dead and nations to fully comprehend the horrors that had befallen them, but it appears that we have learnt nothing.\n\nToday, in a move that shocked everyone, United Nations forces crossed the border into Soviet-controlled territory, launching an assault that has plunged the world into war for the third time in a century. As the last of this generation's able-bodied soldiers prepare to die in the trenches, the upcoming battle between the two viciously unyielding ideologies is expected to be the deadliest yet, particularly given the prevalence of nuclear technology.\n\nAlthough riots have broken out in many cities in protest of the war declaration, UN leaders have called for calm and dedication to destroying the communist threat. The Soviet Union is claiming that the world's workers are being attacked but would emerge victorious. Whatever the reason for the war; it is happening, and we are all a far cry from the so-called \"War to End All Wars\" of 1914..."
  UN_News.5.d.B: "[FROM.GetNewsIcon]It has only been a short time since the Second World War, the deadliest and most destructive war to ever strike the earth, ended, with the democracies of the West and the communists of the East reaching an uneasy agreement. Such a peace allowed families to bury their dead and nations to fully comprehend the horrors that had befallen them, but it appears that we have learnt nothing.\n\nIn a speech that shocked the world, the Soviet Union has called for 'the final stage of the global revolution' and for 'the workers of the world from London to Washington to be liberated from capitalist tyranny'. The speech was followed by immediate military action, with Comintern armies crossing the border into United Nations territory and plunging humanity into another World War.\n\nRiots erupted immediately in the Soviet Union, and some military divisions even attempted a brief coup, but all were put down within hours, and martial law was declared. United Nations leaders stated that they were well prepared for the Soviet invasion and promised their people a swift victory over communism, even going so far as to say that the ideology would be eradicated by the end of the war."
  UN_News.5.A: "It is all necessary... surely."
  UN_News.5.B: "The world revolution WILL be established; even if the world is ash!"
  UN_News.5.C: "It seems God's quota for the dead has not been met."
  UN_News.5.D: "We'll fight these communist dogs all the way to Moscow!"
  UN_News.5.E: "Onwards; until we hang the last capitalist from his own rope!"
  UN_News.5.F: "And they said in 1914 it was the war to end all wars."

  # UN Focus Events
  UN_Focus.1.t: "United Nations Resolution No. 11 - The Hoover Commission"
  UN_Focus.1.d: "Our involvement in the war exposed several flaws in our government, which were exacerbated by our isolation during the Great Depression. To address these flaws, President Truman established the Commission on the Organisation of the Executive Branch of Government, with Former President Hoover serving as its chairman. The Hoover Commission has proposed numerous reforms to our federal and state governments. Specifically, we will reduce ' red tape' in our bureaucracy, reform civil services, unify the Department of Defence, and increase foreign aid spending to assist our European allies in rebuilding. Hoover's reforms will be costly and time-consuming to implement, but they will reduce waste and solidify our country's position as a leading superpower."
  UN_Focus.1.A: "Hoover has failed us before. Hopefully, he won't fail us again."
  UN_Focus.1.B: "Hoover has failed us before. Hopefully, he won't fail us again."

  UN_Focus.2.t: "United Nations Resolution No. 14 - Expulsion of the Soviet Union"
  UN_Focus.2.d: "The victorious countries of the war established the United Nations to prevent another global war, much like the League of Nations did after the Great War. However, many have questioned the Soviet Union's position in the UN, claiming that the Soviet Union appeased the Nazis during their invasion of Poland and murdered more people than the Nazis did during their purges, famines, and political persecution. If this resolution passes, the USSR will be expelled from the UN, and the UN will hold it accountable for its actions during the war."
  UN_Focus.2.A: "Following the League of Nations' footsteps."
  UN_Focus.2.B: "Following the League of Nations' footsteps."

  UN_Focus.3.t: "An Elephant in the Room"
  UN_Focus.3.d: "Colonization is a tough issue to tackle. As it is a problem of strategy, power, justice, and economy, there is little a political Colonisation is a difficult issue to address. Because it is a problem of strategy, power, justice, and economics, it is present in almost every political discussion - and we are now at a crossroads in terms of its very existence. The various peoples colonised by our Empire have been enveloped by a yearning for freedom and their own independent states, away from what they call our \"oppression\" - and citizens in other Western nations, such as the United States, have begun to advocate for this decolonisation.\n\nHowever, doing so and allowing our forefathers' expansionary work to fade away would not only disregard hundreds of years of empire building, but could also be interpreted as a sign of weakness. Our opponents, namely the Soviets, may believe that we are no longer equipped with the resources required to maintain our numerous colonies, and they may be correct.\n\nHowever, resources are one reason why we should consider suppressing these rebellious independence movements while remaining true to our imperialism. Our empire's vast material resources benefit us greatly, and the labour force from our territories makes us unstoppable on a global scale. To let go of these things would be a moral and foresightful decision as the desire for colonial freedom grows; however, we would be losing our position as some of the world's most powerful nations."
  UN_Focus.3.A: "Slaying this beast requires sacrifices of our own."
  UN_Focus.3.B: "Independence is out of the question."

  UN_Focus.4.t: "United Nations Resolution No. 15 - Affirmation of Self-Determination"
  UN_Focus.4.d: "The UN Charter states that all humans have the right to self-determination, but this has not been consistently enforced. Now that the Soviet Union has been expelled from the United Nations, there is a call for the organisation to apply its Charter to the remaining African and Asian colonies under foreign control. While the United Kingdom and France have publicly opposed a blanket application, many believe the charter's inconsistent application undermines the UN's global mission of freedom and peace. Despite strong opposition from colonial empires such as the United Kingdom, the resolution is now scheduled for a vote."
  UN_Focus.4.A: "Those who dream of independence will one day be free."
  UN_Focus.4.B: "Those who dream of independence will one day be free."

  UN_Focus.5.t: "UN Resolution No. 19 - Division of the Palestinian Mandate"
  UN_Focus.5.d: "Karel Lisický was jolted out of his reverie by the harsh cling of the typewriter. He took a moment to take off his glasses and rub his eyes; a glance at the clock on the wall only added to his delirium: 4:59 p.m. He quickly put his glasses back on and clasped his hands together, trying to concentrate on the Chairman, Mr. Sandström. Mr. Sandström concluded the conversation, with the Iranian Representative, Mr. Entezam, urging against holding a political debate immediately after the arrival of the Palestinian Committee. Following that, the dispute revolved around travel arrangements for UNSCOP's various representatives and advisors.\n\nAfter brief closing statements and reaffirmations, the meeting was adjourned at 5:15 p.m., and Karel left the assembly, once again consumed by his thoughts. Thoughts of home, the horrors of the war still fresh in his mind, and the looming dread of what lay ahead clogged his mind and made him uneasy, causing him to ruminate on the past. Following several subsequent meetings, assemblies, and committee discussions, the decision to divide Palestine into Jewish and Arab states was made."
  UN_Focus.5.A: "If we forget the horrors of the Holocaust, we are condemned to repeat them."
  UN_Focus.5.B: "If we forget the horrors of the Holocaust, we are condemned to repeat them."

  UN_Focus.6.t: "UN Resolution No. 20 - Colonial Recruitment Fund"
  UN_Focus.6.d: "Oswaldo clapped with the audience at the assembly, smiled for the cameras, and shook hands with officials from the newly formed Palestinian and Israeli states. He kept a firm demeanour for the press and knew that a good smile was all that was required to win over the public. However, something gnawed at the back of his mind. After the handshakes, cameras, and press had passed, Oswaldo exited the assembly with a look of abstract dread. He slumped into the backseat of his government-provided vehicle. A small note tucked neatly into the breast pocket of his jacket read, \"Motor Shop. You know the place.\" It reminded him of his responsibilities.\n\nThe car skidded to a halt outside the store, and Oswaldo looked around for possible witnesses. He then exited the vehicle and walked into the back alley behind the mechanic shop. A man sitting behind the dumpster in the alley looked up at Oswaldo and then down. The homeless man muttered, \"The Eagle never sleeps.\"\n\n\"For the nest needed protection.\" Oswaldo finished.\n\nThe homeless man reached into his coat pocket and handed Oswaldo a folded document. Oswaldo quickly pocketed the document, leaving the homeless man and returning to his car. His heart sank as he read the document while being transported back to the airport. \"Dear God.\" Oswaldo whispered."
  UN_Focus.6.A: "How will a smile justify this?"
  UN_Focus.6.B: "How will a smile justify this?"

  UN_Focus.7.t: "UN Resolution No. 17 - Allied Supreme Command"
  UN_Focus.7.d: "James held his head as he read a document faxed to him by the UN ambassador. It was clear. The UN was preparing for war. James struggled to breathe while reading. He stood up and hurriedly left his office, taking deep breaths. James needed fresh air as he rushed through the stairs and out the door. His breathing was shallow, anxious, and wheezy.  A paper pusher from another department had just returned from their lunch break and gave James a worried look. \"Mr. Forrestal, are you all right?\" the man asked, standing next to James.\n\n\"Yeah... Yeah, I'm fine. I'm fine.\" James repeated in between deep breaths. After a brief moment, the man walked into the Pentagon, leaving James outside. James needed a minute to regain his composure before returning to his office. When he opened his office door, the paper was on his desk, a stark reminder of the situation. He had hoped the fax was just an illusion or hallucination. He sat down in his chair and reread the document.\n\n\"What do they expect me to do with this?\" he grumbled to himself, but only the clock heard him."
  UN_Focus.7.A: "Surely they know this is the end of history."
  UN_Focus.7.B: "Surely they know this is the end of history."

  UN_Focus.8.t: "UN Resolution No. 33 - The Stimson Doctrine"
  UN_Focus.8.d: "Mr. Sandstrom presented the decision to ambassadors and representatives at the UN General Assembly in Paris, attempting to maintain a professional demeanour in front of the cameras and various press members in the audience. Except for the occasional whisper and murmur, the assembly remained silent as Mr. Sandstrom announced the decision. The West German ambassador broke the silence by yelling at Mr. Sandstrom, dumbfounded by his decision.\n\n\"Are you mad?\" Heinrich accused, pointing to Mr. Sandstrom. \"How about those in West Berlin? The Soviets will undoubtedly block transportation to them.\" Heinrich continued, his voice softer. Mr. Sandstrom tried to respond but was unable to find the words. \"We'll find a way.\" Sandstrom replied. \"Outrageous, you're going to get us all killed.\" Heinrich retorted, gathering his papers and storming out of the assembly.\n\nSandstrom's professional demeanour had faltered, and he held his head against his podium. The only sounds in the hall were clicking cameras and scribbling as the assembly fell into an awkward silence."
  UN_Focus.8.A: "Europe is free of the Jackboot. It'll soon be free of the Red Star."
  UN_Focus.8.B: "Europe is free of the Jackboot. It'll soon be free of the Red Star."

  # UN Decolonization Events
  UN_Decolonization.1.t: "The [un_decolonization_effect_eng] of [un_decolonization_target_eng]"
  UN_Decolonization.1.d: "[un_decolonization_description_eng]"
  UN_Decolonization.1.A: "[un_decolonization_response_eng]"
  UN_Decolonization.2.t: "The [un_decolonization_effect_fra] of [un_decolonization_target_fra]"
  UN_Decolonization.2.d: "[un_decolonization_description_fra]"
  UN_Decolonization.2.A: "[un_decolonization_response_fra]"
  un_decolonization_effect_autonomy: "Autonomy"
  un_decolonization_effect_independence: "Independence"
  un_decolonization_target_autonomy_eng: "[ENG.Decolonization_Target_Puppet^0.GetName]"
  un_decolonization_target_independence_eng: "[ENG.Decolonization_Target_Country^0.GetName]"
  un_decolonization_target_autonomy_fra: "[FRA.Decolonization_Target_Puppet^0.GetName]"
  un_decolonization_target_independence_fra: "[FRA.Decolonization_Target_Country^0.GetName]"
  un_decolonization_description_autonomy_eng: "Many nations' first step towards freedom is to become an autonomous state. It is a strange in-between rule, in which a country is technically its own state but is still guided by its previous coloniser, is generally free to establish its new role as a member of the international community, but is still overseen by another, preventing sudden change or drastic action.\n\nThat is precisely how the new country of [ENG.Decolonization_Target_Puppet^0.GetName] appears today. The [ENG.Decolonization_Target_Puppet^0.GetName] is now officially no longer directly administrated by us and is on its way to full independence from the larger Empire, along with its other former colonial subjects. It is unknown what actions it will now take as a member of the global stage; however, over the next few months, we will support and prop them up so that they will remain a democratic people well into their free days, forever disillusioned with the authoritarianism of the past.\n\nIn [ENG.Decolonization_Target_Puppet^0:capital.GetName], hundreds of newly [ENG.Decolonization_Target_Puppet^0.GetAdjectiveCap] citizens have emerged from their homes to celebrate their newly formed country with parades, drinks, and other festivities. This event has truly revealed how many people desired their own autonomy. As [ENG.Decolonization_Target_Puppet^0.GetName] takes its first steps as a more independent country, we look forward to their future with both trepidation and pride, because our colonial rule has brought them up to the Western standard."
  un_decolonization_description_independence_eng: "On this historic day, a new nation will join the world: [ENG.Decolonization_Target_Country^0.GetName]. Now that they are officially free of our control and have abandoned the loose guidance we provided as one of our autonomous states, they will enter global politics largely on their own, choosing their fate. While it was difficult to let them go, with some older figures in our political scene lamenting the loss of geopolitical weight that came with directly administering their strategic territory, the benefits have been felt on the home front. Garrisoned troops who once believed they would be forced to remain in [ENG.Decolonization_Target_Country^0:capital.GetName] indefinitely have returned home, rejoining their families.\n\nIn [ENG.Decolonization_Target_Country^0.GetName], we can clearly see the benefits, as celebrations - much larger than those during the announcement of autonomy months ago - have begun all over the brand new country. The happiness of those new free to do as they wish and not as we say is evident, and some of our younger, more liberal-minded soldiers appear happy to leave and put an end to another piece of colonisation.\n\nIt is unknown whether they will rise or fall, remain true to the democratic values we have attempted to instill, or descend into primitive authoritarianism; however, we can be content that our many years as rulers have brought them at least a little closer to Western standards. With this, we bid farewell to the rule of [ENG.Decolonization_Target_Country^0.GetName]; we can only hope they do well without us."
  un_decolonization_description_autonomy_fra: "Many nations' first step towards freedom is to become an autonomous state. It is a strange in-between rule, in which a country is technically its own state but is still guided by its previous coloniser, is generally free to establish its new role as a member of the international community, but is still overseen by another, preventing sudden change or drastic action.\n\nThat is precisely how the new country of [FRA.Decolonization_Target_Puppet^0.GetName] appears today. The [FRA.Decolonization_Target_Puppet^0.GetName] is now officially no longer directly administrated by us and is on its way to full independence from the larger Empire, along with its other former colonial subjects. It is unknown what actions it will now take as a member of the global stage; however, over the next few months, we will support and prop them up so that they will remain a democratic people well into their free days, forever disillusioned with the authoritarianism of the past.\n\nIn [FRA.Decolonization_Target_Puppet^0:capital.GetName], hundreds of newly [FRA.Decolonization_Target_Puppet^0.GetAdjectiveCap] citizens have emerged from their homes to celebrate their newly formed country with parades, drinks, and other festivities. This event has truly revealed how many people desired their own autonomy. As [FRA.Decolonization_Target_Puppet^0.GetName] takes its first steps as a more independent country, we look forward to their future with both trepidation and pride, because our colonial rule has brought them up to the Western standard."
  un_decolonization_description_independence_fra: "On this historic day, a new nation will join the world: [FRA.Decolonization_Target_Country^0.GetName]. Now that they are officially free of our control and have abandoned the loose guidance we provided as one of our autonomous states, they will enter global politics largely on their own, choosing their fate. While it was difficult to let them go, with some older figures in our political scene lamenting the loss of geopolitical weight that came with directly administering their strategic territory, the benefits have been felt on the home front. Garrisoned troops who once believed they would be forced to remain in [FRA.Decolonization_Target_Country^0:capital.GetName] indefinitely have returned home, rejoining their families.\n\nIn [FRA.Decolonization_Target_Country^0.GetName], we can clearly see the benefits, as celebrations - much larger than those during the announcement of autonomy months ago - have begun all over the brand new country. The happiness of those new free to do as they wish and not as we say is evident, and some of our younger, more liberal-minded soldiers appear happy to leave and put an end to another piece of colonisation.\n\nIt is unknown whether they will rise or fall, remain true to the democratic values we have attempted to instill, or descend into primitive authoritarianism; however, we can be content that our many years as rulers have brought them at least a little closer to Western standards. With this, we bid farewell to the rule of [FRA.Decolonization_Target_Country^0.GetName]; we can only hope they do well without us."
  un_decolonization_response_autonomy: "Good luck without our protection."
  un_decolonization_response_independence: "And if they don't, they can crawl right back!"

  UN_Decolonization.3.t: "Decolonization Ends"
  UN_Decolonization.3.d: "After much effort by colonial and local leaders, the last British and French flags were lowered from their respective empires' final colonies and transported home on ships alongside the soldiers who once garrisoned those lands. The two nations have left a complicated history behind them, and the global reaction to total decolonisation has been mixed.\n\nSome upper-class Parisians and Londoners have lamented the loss of their global dominance, calling their imperialism 'necessary for the spread of modern civilisation'; meanwhile, locals in many of Britain and France's former colonies claim that their cultures were oppressed, and that their people were killed and forced into slavery in all but name.\n\nThe fall of their Empires has created both advantages and disadvantages for both nations, the most notable being that with their arms no longer spread across the entire world, their militaries have undoubtedly grown more centralised and powerful, though the great resource troves they once had unlimited access to in order to build such mighty militaries have now closed."
  UN_Decolonization.3.A: "The sun sets for both Britain and France - but what will tomorrow bring?"

  # UNSC Events
  UN_UNSC.1.t: "The Speech Heard Around the World"
  UN_UNSC.1.d: "A few months ago, the world was engulfed in flames of war, but now everyone is sitting at the same negotiating table in Geneva. The society strives to unite and establish peace as soon as possible, demonstrating the true progress of humanity.\n\nThe United Nations is a very young organisation. Even when the possibility of resuming League of Nations activities through the United Nations was discussed, many countries were sceptical, but their doubts were allayed when they saw international support for the decision. At the first congress in neutral Geneva, many important postwar European decisions were discussed, as well as the outcome of the Nuremberg trials.\n\nHowever, the most contentious issue was the elimination of the \"new threat\". The United States, as the primary initiator and one of the founding members of the United Nations, delivered a speech in which they expressed their deep concern about the difficult situation surrounding the \"common enemy\". Is another conflict on the horizon?"
  UN_UNSC.1.A: "And so the trumpets sound."

  UN_UNSC.2.t: "The Broken Masquerade"
  UN_UNSC.2.d: "There are traitors to the United Nations among its ranks, as those who defend democracy in the West are well aware. Sneaking nations selling our secrets and their loyalty to the communists in Moscow are nothing more than snakes attempting to bite and poison the free world's desire to remain free.\n\nThey believe they are safe and that we are unaware of their treachery, but they are in for a rude awakening. The most recent issue on our United Nations board is the rejection and expulsion of these backstabbers who seek to undermine our noble goals of global peace and security. We will say goodbye to their secrecy and meaningless votes, which stymie our anti-communist movements and progress.\n\nThe process will be lengthy, and the Soviet Union will almost certainly exploit this event for propaganda purposes, but it will be worthwhile. Rooting out these traitors, lapdogs, and followers of an ideology that murders in the name of the people will only strengthen our resolve to promote the values of true democracy around the world."
  UN_UNSC.2.A: "Our allegiance is to democracy! And theirs is not..."
  UN_UNSC.2.B: "This paranoid drivel leaves us no reason to stay in this organization"
  UN_UNSC.2.C: "This was never our buisness."

  UN_UNSC.3.t: "The End of the British Raj"
  UN_UNSC.3.d: "The Jewel in the Crown has been unpolished for a long time. Between the lives lost during the war, particularly in Burma, the Japanese's sponsorship of Azad Hind's provisional free government of India, the famine that struck the Raj, sending millions to their deaths from starvation while we ported the Empire's grain back to Europe to deal with the Reich, and Mohandas Gandhi's peaceful rebellion, it is clear that British rule over the Indian subcontinent is slipping. As a result, we must determine what we can and should do about the deteriorating situation.\n\nOur forces are numerous there, and the Raj's vast minerals, grains, and enormous amount of exploitable manpower is always a reason to simply double down and try to control the situation as best we can. After all, India's economic and strategic loss would weaken us exponentially, so it may be better to clamp down at all costs. Alternatively, we could simply grin and bear the loss, withdrawing our troops so that they could be better used elsewhere, allowing India to undoubtedly become a regional power. We can do this fairly quickly and gracefully, putting a merciful spin on this story as if we left of our own free will. Saving face and simply letting India go with no further attempts to keep her loyal would be a better political and social option.\n\nWhatever we do, this will be a significant and historic occasion for India and the Empire. If we free an entire Dominion that we have fought so hard to maintain, our enemies may interpret this as a sign of ultimate weakness, and it may even inspire other independence activists in Dominions such as Canada or Australia. However, freeing up our resources may prove w||orthwhile in the long run."
  UN_UNSC.3.A: "We cannot cling to the subcontinent..."
  UN_UNSC.3.B: "India is ours!"
  UN_UNSC.3.C: "Grant them independence; and as a sign of goodwill, offer them a seat on the UNSC."

  UN_UNSC.4.t: "The Empty Chair"
  UN_UNSC.4.d: "The United Nations Security Council is one of the United Nations' six main organs, and its mission is to maintain global peace and stability. As one of the five main permanent members of this important part of the UN, we can authorise military intervention, peacekeeping operations, veto motions, and impose sanctions, as well as consider inviting other countries to join us. Perhaps our most important ability, however, is to propose U.N. resolutions to the rest of the organisation, thereby changing the world piece by piece in whatever way is deemed appropriate. Shall new faces join this peacekeeping club?"
  UN_UNSC.4.A: "Invite the Indians into the UNSC."
  UN_UNSC.4.B: "Canada shall join the council."
  UN_UNSC.4.C: "Why would we need more members?"

  UN_UNSC.5.t: "Founding of the Bundesrepublik"
  UN_UNSC.5.d: "Otto knew it would be a wonderful, albeit long, day in Germany. Otto, one of the 70 delegates chosen by the Landtag parliaments, had just arrived in Bonn for a historic meeting to unify the Allied occupation zones into a new nation. Germany would be free again, and hopefully democratic for all time. Yes, the world had not completely forgiven his country for its previous crimes, but they would in time as Germany did its part to ensure global democracy.\n\nAs he walked on, Otto overheard other delegates talking, some of whom were saddened that this was the final nail in the coffin of reunification with the Soviet Occupation Zone. But those voices were mostly from communists, so he ignored them. Germany needed her independence. The proceedings continued and Konrad Adenauer was elected President. A fine choice, he thought. \"Today, a new Germany arises,\" Adenauer told the Council, and Otto couldn't have been happier.\n\nFollowing that, the fundamental principles of the new, decidedly parliamentary Republic were established: human dignity, democracy, welfare, and the defense of those things. The constitution guaranteed checks and balances, rights, and Germany would truly become a beacon of liberty, despite its dark past. After a few other things, the constitution was put to a vote, which passed 53-12, establishing the Federal Republic of Germany. Otto had witnessed the birth of a new nation, as well as the dawning of a new day for his Vaterland."
  UN_UNSC.5.A: "We shall forever hail only to freedom."

  # UN French Events
  UN_French_Events.1.t: "The Last Crusade"
  UN_French_Events.1.d: "Today we received a letter from Washington, written with love. It contained a proposal that, if accepted and fought hard enough, could change the fate of the world and ensure France's eternal glory. The Americans, it appears, have had enough of the USSR's attempts to spread Bolshevism throughout Europe and the world, and are now preparing to go to war alongside our old allies, such as Britain, to stop them. Many of their politicians, like us, are fed up with the ideological debate and want to put a nail in the coffin of communism as soon as possible.\n\nThey have finally asked France to participate in the holiest of wars: a war to save Russian culture, stability, and global capitalism. Acceptance is the obvious - and only - answer. The Soviet Union poses far too serious a threat for us to allow it to continue its pitiful but reluctantly powerful existence; after all, do we want to tell the next generation of French children that we sat down and made peace with the communists? We will join this new American crusade to ensure that France remains on the right side of history."
  UN_French_Events.1.A: "La Menace Rouge must be destroyed once and for all."
  UN_French_Events.1.B: "A deal we can't resist."

  UN_French_Events.2.t: "An Offer You Can't Refuse"
  UN_French_Events.2.d: "Despite the devastation and loss of life in the recent war, both in France and around the world, it appears that some of our old allies are still looking for blood - and they make a compelling case for why we should be as well. In a recent and top-secret communique sent directly from Washington to us, America revealed its latest plan to ensure global freedom: launch another war against the Soviet Union. While this sounds appalling, given the current global mourning and a lack of spirit in the armed forces, the Americans have assured us that it is the only path to long-term peace.\n\n\"The West and all the democracies of the world must band together to tear down the last major dictatorship, and end tyranny once and for all - lest the Soviet Union strike against us and we are caught unprepared ourselves,\" they wrote. Obviously we should decline because we have lost too much, and much of our population and government support socialist, if not communist, ideals. Going against the vanguard of communism would be ridiculous... but there are reasons to think about it.\n\nThe plan, dubbed Operation Unthinkable, suggests that America may return to isolationism once global peace is achieved. The implications are enormous: if America abandons Europe, we will serve as a guide for all other nations on our good continent, as the United States has assured us. Our strength will propel us to the position of a true tutor and leader in Europe, with French dominance guaranteed for all time."
  UN_French_Events.2.A: "European domination for such a small price, of course."
  UN_French_Events.2.B: "France can't enter in a new war right now."
  UN_French_Events.2.C: "We will not betray the Soviet Union!"

  UN_French_Events.3.t: "Creation of Force Ouvrière"
  UN_French_Events.3.d: "Today, a new labor movement has emerged in France: the Force Ouvrière, or Worker's Force. They split from the larger Confédération Générale du Travail due to differences in their similarly leftist ideology: the CGT is entirely communist, whereas the Force Ouvrière is a staunchly socialist group that opposes joining the World Federation of Trade Unions due to its ties to the Soviet Union. Essentially, the CGT can be described as revolutionaries, whereas the new Force Ouvrière is a reformist union.\n\nWhat makes this event interesting is not the split itself, but the international interest and funding that drove it. For example, prominent and trustworthy voices have stated that the American Central Intelligence Agency was ultimately responsible for causing the union schism. They claim that the CIA collaborated with the American Federation of Labor, the Force Ouvrière's main supporter, and provided funds to the new French union under the guise of AFL money. In addition to this semi-scandal, a number of German and Belgian syndicates have been accused of similar methods.\n\nTheir primary reason for suspecting American interference is the aforementioned closeness with the Soviet Union; these high-ranking theorists claim that the CIA's intent is to weaken any ally the USSR has, from the smallest political movements to the largest communist unions. Whatever one believes, the CGT is clearly weakened by this split."
  UN_French_Events.3.A: "For \"unions\" they don't seem so unified..."

  # ASC Events
  UN_Groups.1.t: "In From the Cold"
  UN_Groups.1.d: "Spain should not be allowed anywhere near the United Nations' democratic forces. Since the Spanish Civil War, when the Nationalists seized power with the help of volunteers from both the German Reich and Fascist Italy, Francisco Franco has ruled Spain as a para-fascist dictatorship. At one point, they even returned the favour by sending their own volunteers to Germany under the name 'División Azul' to assist the Reich on the Eastern Front. Under pressure from the Allies, the División Azul was disbanded within two years, but that did not prevent some of their men from joining SS brigades rather than returning home.\n\nCollaboration with these stone-headed fools and perpetrators of a dying ideology would seem to be out of the question, but there is precedent for a temporary alliance with Francoist Spain, if possible. Because the División Azul fought on the Eastern Front, against the USSR, and even during the Siege of Leningrad, Spain clearly has experience fighting Moscow's legions. This intelligence, due to our ideological differences, has obviously been kept from us - but it would be useful during Operation Unthinkable to break through the Red Army and send communism to its grave.\n\nGiven Franco's strong anti-communist stance, it's reasonable to assume he'll put aside our previous and current disagreements to destroy the Soviet Union and its ideology - but there's also the morality of working with a dictator to consider. Furthermore, Spain's current government is not recognised by ours, giving them little global influence. As a bargaining chip, we can promise to authenticate their regime as a legitimate member of the international community if they provide us with their knowledge and manpower."
  UN_Groups.1.A: "It couldn't hurt to see if they're interested... offer them a quid pro quo."
  UN_Groups.1.B: "The ROA has far too many former Nazi collaborators already! Denounce Franco!"

  UN_Groups.2.t: "The Gibraltar Conference"
  UN_Groups.2.d: "Martin-Arajo, the Spanish foreign minister, had no idea what he was getting into when he was asked to meet privately with two British and American envoys, but he certainly did not expect it to be a plan for the Western world to go to war with Russia. He looked up from the plans, which they called Operation Unthinkable. Of course, he despised the USSR; as a devout Catholic, it contradicted everything he stood for - but another World War? And they wanted Spain to join?\n\n\"I take it you aren't pleased?\" The English man spoke with a thick accent. Martin-Arajo remained silent for a while, astounded. \"I guess not. I support your goals of eradicating communism, as I am sure all true Spanish people do... but we are still recovering from the civil war, and I assumed Britain and America were in similar ruins.\"\n\n\"We can't be at peace while the Red menace looms. The world isn't free yet, and we're putting the interior aside until it is. I don't trust Moscow not to strike first,\" the American added. \"Look. We are not asking for this without a reward. We understand that Spain is in desperate need of certain things, which we will provide in exchange for your participation. The offer is that we recognise Francoist Spain internationally. No more talk about Franco being a fascist; the United Nations will recognise you as completely legitimate and work to eliminate any bias against you. Sending another División Azul to us, like you did to Germany, will ensure that you are remembered as democratic allies rather than fascist ones.\" "
  UN_Groups.2.A: "Enjoy your war. Spain will manage without you."
  UN_Groups.2.B: "We can offer you volunteers, I suppose."
  UN_Groups.2.C: "We'll do as much as we can to end the Soviets."

  UN_Groups.3.t: "Spain by the Fireplace"
  UN_Groups.3.d: "Our diplomats in Spain have returned with good news: Spain is interested in destroying the Soviet Union alongside us. They promise, in exchange for our offer of international recognition for the Francoist regime, to send a large number of volunteers to help our cause. While this was our initial hope, some of our government and military officials have privately expressed frustration that Spain was not more willing to assist. They believe that given Spain's ideology and the fact that the Soviets are vehemently opposed to it, the Spanish government should have officially joined the war with its entire army to defend themselves and us against Soviet oppression.\n\nWe have heard from Spanish diplomats, however, that the reason they chose not to fight alongside us in an all-out war, despite the fact that they are extremely grateful for the offers we made to them, is also due to ideological differences. Given that we, too, have previously opposed their government, the Spanish have stated that they simply do not trust us, both in terms of whether we will win and whether we will work to save them in the event of Soviet takeover - citing the Munich conference, they say they are concerned that we will offer them up in the event of a peace treaty being reached.\n\nWhile this is clearly unsettling and does not help our opinions of the Spanish, we are relieved to hear that they have decided to send us our own División Azul to help us out a little. Hopefully, these freedom fighters' upcoming battles will be more lengthy and successful than their earlier fascist counterparts. Clearly, an alliance with the Spanish is a long way off, but at least we'll have more men than we would without them."
  UN_Groups.3.A: "Send our private thanks to Spain anyways."

  UN_Groups.4.t: "Spain by Our Side"
  UN_Groups.4.d: "We received better news than we could have hoped from Madrid! Our initial proposal for Operation Unthinkable was for Spain to only lend us volunteers - a few extra men on the front lines who had previously fought the Soviets and were thus better prepared for the tactics that the Red Army might employ. The Spanish government flatly rejected this initial proposal, preferring to fully support our crusade.\n\nCiting the need to destroy the \"final terroriser of the Spanish people\" and the nation that had meddled in their affairs for far too long, Madrid's leadership claims it would be wrong to give anything less than the full might of the Spanish Army against the USSR. They have already requested that we adjust our plans to account for every able-bodied man they can muster. The Spanish say they have long been concerned about a Soviet strike on Western Europe, particularly against themselves, given Moscow's support for the Spanish Republic during the civil war.\n\nFollowing this initial report, we learnt that the Spanish Army has begun mass training exercises, which have been purposefully hidden to avoid Soviet spying in preparation for the upcoming war. Despite our political differences, it appears that our goals bind us together - if only as allies of convenience. Regardless, we have plenty of new \"friends\" in Madrid who are willing to give their lives for the greater good of democracy, even if they don't realise it."
  UN_Groups.4.A: "Another nail in Bolshevism's coffin."

  UN_Groups.5.t: "Spain Still in the Cold"
  UN_Groups.5.d: "Unfortunate news from our diplomatic team in Spain arrived today: the Spanish have refused to participate in Operation Unthinkable, citing the need to continue on its own path away from East and West and rebuilding after the disastrous civil war that wracked it only a few years ago. At least, that is the 'official' position expressed in the letter they gave to our diplomatic team. However, our men have a very different story. Their own accounts describe a very aggressive Spanish response to our request, with insults and accusations flying.\n\nSuch a response has shaken some of our cabinet members, who now see Spain as a potential issue to address after dealing with the USSR. We clearly underestimated how deeply ingrained Spanish nationalism is, to the point where they are willing to let the rest of the world burn if it means Spain burns last.\n\nPerhaps it was foolish to believe that Franco, a dictator and one of Europe's last, would align with the nations that had deposed his greatest benefactors, but we hoped that his anti-communist beliefs would outweigh his hatred of us. Even if this did not happen and the stubborn Spanish continue to forge their own path, we must not be discouraged; planning for Operation Unthinkable and the hope for a freer world continues, Madrid or no Madrid."
  UN_Groups.5.A: "Unfortunate."

  UN_Groups.6.t: "From Across the Sea"
  UN_Groups.6.d: "A UN delegation arrived in the capital today, bringing news that is interesting at best, horrifying at worst. The United Nations appears to be preparing for a war against the Soviet Union. Headed by the old major Allied powers, namely Britain and America, they have prepared a set of strategies known as Operation Unthinkable to launch a surprise attack, plunge the world into a new war, permanently end communism, and establish peace, democracy, and freedom in all nations. Most alarmingly, beyond the mere prospect of war, they want our direct involvement. They promise to help against Mao if we aid in the destruction of Soviet Russia, claiming that our government has long been a great ally to the West and is threatened by communism at every turn.\n\nOn the one hand, we are desperately in need of more Western assistance in consolidating Kuomintang rule over China and bringing down Mao - even if it means sending aid to our friends in Washington and establishing a small front with the Soviets. On the other hand, there is a chance that the West will lose and be completely outmatched by Mao's militias and the Red Army. Perhaps it is best to take our chances and stay out of this potentially disastrous war.\n\nHowever, a third option remains: the Soviet Union is blissfully unaware of the West's plan to attack them, and perhaps we could strike an even better deal than the one offered by Washington and London: if the Soviets promise to stop assisting Mao and start assisting us, we might just have a very interesting and dangerous piece of information to tell them about their supposed 'allies' in the West. We're sure they'd be very interested to hear about this plan. Who's to say the United Nations won't come for us next?"
  UN_Groups.6.A: "We too wish to see the end of communism. We're in!"
  UN_Groups.6.B: "Even if we wished to, we have nothing we could give. We cannot."
  UN_Groups.6.C: "Tell the liaison we'll think on it, and tell Moscow they should come visit us."

  UN_Groups.7.t: "Operation Boothe: GREENLIT"
  UN_Groups.7.d: "We have received good news from our secret liaison in Nanjing, who we sent to recruit the Republic of China for Operation Boothe and our war against the Soviets. They claim that the Chinese government is ready and eager to send whatever assistance they can in the fight against global communism, as long as we provide enough aid to push Mao's forces back or prevent any further Kuomintang-held territory from falling. After we worked out the finer details of the secret treaty, Nanjing began planning to open a new front with the Soviet Union, as well as a takeover of the Russian Far East if our mutual support resulted in Communist China's unexpected fall.\n\nCalling our goals utterly noble and stating that the destruction of all communist states should be the ultimate goal for any good person of stable mind all over the world, our liaison reports that R.O.C. officials appeared overjoyed at the opportunity to join us - and that with the fall of both the USSR and Communist China, any significant communist threat will finally be eliminated. Western ties with Nanjing are also expected to grow steadily in terms of both trade and diplomacy as they become more closely aligned with us, which has garnered significant support from both parties: the Chinese because it means more Western aid and equipment, and us because it means the Chinese are now more likely than ever to drift towards a truly democratic form of governance."
  UN_Groups.7.A: "Understood."

  UN_Groups.8.t: "Operation Boothe: CANCELLED"
  UN_Groups.8.d: "We have received feedback from the Republic of China regarding our proposed inclusion of them in Operation Unthinkable under the codename Operation Boothe, and it is not positive. While the leadership in Nanjing has thanked us for the opportunity to turn their civil war against Mao into a full-fledged crusade against Communism, expressing their faith and support in our cause, they claim they cannot help us. They would weigh us down, they say, especially since all of their guns and men are currently fighting their civil war, and any assistance we could provide would be insufficient to justify diverting their manpower.\n\nAll of this is expected, but we have also heard privately that they have backed out of supporting us because they are afraid of losing - they are unwilling to risk being crushed by Mao's troops and the Soviet Red Army at the same time if our own European front fails. This, of course, is a damning response to how few countries outside of the UN believe we are strong enough to compete with the USSR.\n\nThis decline of what we thought would be a successful operation to receive one more nation's armies to destroy communism forever - especially in a nation that is already fighting it internally - has emboldened some of the war's naysayers in our administration to speak louder, and while it will not halt progress towards the start of Operation Unthinkable, it has undoubtedly lowered our overall morale."
  UN_Groups.8.A: "After all the West has done for Nanjing..."

  UN_Groups.9.t: "Strike of the Dragon"
  UN_Groups.9.d: "It's time! The East will now march with the West. Today, with a speech directly from Nanjing broadcast across the country, we officially declared war on the Soviet Union. Clearly, neither Moscow nor the PLA expected this, assuming that we were too weak to consider joining the West, but they were greatly mistaken. Western aid is now flowing into the country at a rapid pace, with the goal of liberating the entire country from the yoke of communist oppression. The Chinese people will be truly free, with guns to protect the masses from the villainous opposition. The weapons of Britain and America will crush the PLA and free the traitorous territories!\n\nThen, after Mao and his failed revolution are dead, we will march straight into the Russian Far East and the part of Russia that the USSR believed was untouchable. As Western armies beat down on their West, we will encircle their entire nation and crush them as a single force! Finally, the Republic has the allies and aid it has deserved throughout this struggle, and just in time. With our fellow anti-communists, we will now play an important role in uprooting and destroying this doomed and foolish ideology, and we may even be rewarded by the West after the war.\n\nThe coming years will be difficult, fighting through the PLA and the Red Army, but because we no longer stand alone, the sacrifice will be worthwhile, and no matter how long it takes, we will triumph over them both. No matter how long it takes, we will endure and emerge as Asia's new dominant power, our influence and ties with the West solidified so that we are never questioned by those around us again. The true Chinese dragon will strike and bite down on those who oppose it! To arms!"
  UN_Groups.9.A: "Never any more humiliation, only prosperity!"

  UN_Groups.10.t: "The Western Conspiracy is Revealed!"
  UN_Groups.10.d: "Alarms sound in Moscow, and mobilisation has begun after an unlikely ally informs us that the imperialist Western powers are preparing to attack! According to officials from the Republic of China, United Nations diplomats arrived in Nanjing earlier that week. This liaison informed them that Britain and America had been working together to devise Operation Unthinkable: a surprise attack on our European territories with the ultimate goal of bringing down communism! Worse, the United Nations intends to hold a vote to unite even more nations against us, implying that we will almost certainly have to fight the entire Western world.\n\nThey tell us this after China sent a cryptic message encouraging us to send diplomats to Nanjing, where they promised to share vital information if we agreed to reduce our support for Mao. Clearly, they can be rewarded for this if we so desire, as informing us of such an impending military disaster has done a tremendous service to the proletariat. Workers throughout the Union and its satellites must brace themselves for the onslaught of Western armies attempting to corrupt and destroy our socialist utopia.\n\nThe entire world may try to bring us down, but the Russian bear will stand firm and tear apart its enemies one by one, breaking them even if it has to stand on pillars of capitalist bodies! Nanjing's information reveals another important fact: their preparation is approximately §Y[?operation_progress|2%%]§! complete. Obviously, this gives us a limited amount of time to prepare for the accursed capitalists. Thanks to our unlikely friend Republic of China, we now have to prepare the Red Army for invasion."
  UN_Groups.10.A: "The capitalists have lost their monopoly on common sense."
  SOV_WESTERN_CONSPIRACY_REVEALED_TT: "Much as we have suspected, the fools in the West have chosen an §tunthinkable§! course of action.\n\nAccording to our Czechoslovak contacts, their plans are roughly §Y[?operation_progress|2%%]§! complete."

  UN_Groups.11.t: "Allied Feelers"
  UN_Groups.11.d: "As Adam looked out the window at Prague, thunder crashed. He realised it was a dark and stormy night, and a slight smile appeared on his normally stoic face. It was the ideal time to decide the fate of a nation. Finally, the door behind him opened, and Kazimir Novotny entered. Adam was informed that this low-ranking government official had connections to those in higher positions, including another man who, if the meeting went well, would deliver Adam's message to the Czechoslovakian president.\n\n\"I do not normally come in at this hour,\" Kazimir stated. \"It is almost midnight.\"\n\n\"And the world, my friend, does not normally go to war again so soon,\" Adam replied in practiced Czech. \"What?\" Kazimir enquired. Adam shoved the paper he had previously placed on Kazimir's desk forward. To Adam's astonishment, Kazimir was not surprised when he was done reading; rather, his expression was one of mild anxiety and his brow was slightly wrinkled. \"Comprehensible. Many people believed that this is what would happen. How does this concern me?\" Kazimir finally said after a long pause.\n\n\"Through a mutual friend, we have learnt that you have ties to the President. Czechoslovakia should be included in this proposal. We have plans in place that we would discuss with your president in order to remove the communists from government positions; at the very least, we would swiftly secure the Czech territories.\"\n\nKazimir took the document and nodded. Soon after, Adam departed, and..."
  UN_Groups.11.A: "Dutifully, Kazimir took the document to his friend."
  UN_Groups.11.B: "Kazimir quietly put the plans directly into the trash bin."
  UN_Groups.11.C: "In a twist of fate, Kazimir delivered the paper to one of the communist officials..."

  UN_Groups.12.t: "Operation Roundhouse: GREENLIT"
  UN_Groups.12.d: "We have received good news from Prague: Czechoslovakia will at least attempt to throw their lot in the ring with us. After our plans were successfully delivered to the President, he responded with overwhelming support and is now preparing for his role in the fight against communism. Our alliance against the world's final dictatorships grows stronger with the addition of Czechoslovakia, which will once again fight a good fight against those who seek to repress them.\n\nWhile there are those in Czechoslovakia who support becoming a mere satellite of the USSR, democratic forces continue to outnumber them. The current plan is to cross the Czechoslovakian border with as few casualties as possible while simultaneously launching an all-out assault on the Soviets. We will take control of the border while the President declares martial law and requests that his military stand down.\n\nWe will secure Czech lands alongside Czechoslovakian forces and detain communist sympathizers. The President will order Soviet troops to disarm, and if some do not, he will use this as a justification to declare war on the Soviet Union and join us. It is likely that a Czechoslovakian civil war will break out as communist forces inevitably secure Slovakia, but this is a risk we must accept."
  UN_Groups.12.A: "What a wonderful, infallible scheme!"

  UN_Groups.13.t: "Operation Roundhouse: CANCELLED"
  UN_Groups.13.d: "We have yet to hear from Czechoslovakia about our proposal, despite much waiting. While we don't know if they ever received it or if it was lost in transit, or if they didn't even acknowledge the offer with a response, it's clear we won't have another ally in the fight against Bolshevism.\n\nRegardless, this declination flies in the face of everything we stand for as we work to bring democracy to everyone from Soviet-occupied Europe to Siberia. Some of the more influential men in the war room believe the Czechoslovaks have clearly chosen their side. They have become far too corrupted by Soviet influence to stand as the democratic bastion of Central Europe it once was.\n\nUnfortunately, as communists take over more of the Czechoslovakian government until they inevitably threaten the presidency, we will most likely be forced to march our infallible armies of freedom through both Prague and Moscow. The Czechoslovakians cannot remain neutral in this war; they have to choose between our peace and Soviet tyranny, and they chose the latter. The truth is that a large portion of the Czechoslovakian population remains truly democratic, and even if it takes a fight to liberate them, we will restore their freedom!"
  UN_Groups.13.A: "Are they still mad about that Munich Conference debacle"

  UN_Groups.14.t: "Day of Decision"
  UN_Groups.14.d: "The time has come to ensure our eternal freedom! The plan has now been put into action: to our north, Allied troops have sprung against the Soviet Union's fortifications in Eastern Europe. As planned, columns of U.N. forces crossed into the Sudetenland and disarmed border guards, allowing more to enter and help ensure our independence. The President has declared martial law, and the majority of the military has followed his orders to join with Western troops. Furthermore, communist opposition leaders were quickly detained, with their official sentences to be decided after the war ends.\n\nWe quickly secured Prague, Brno, and many other cities throughout the Czech lands. Simultaneously, Soviet bases engulfed in chaos and confusion were ordered to disarm and surrender. However, just as we had hoped, a few loyal Moscow agents declared that they would defend their bases instead. This prompted the President to deliver a national radio address declaring that the Soviet Union was attempting to illegally occupy Czechoslovakia. Shortly thereafter, an official declaration of war was issued against the USSR.\n\nUnfortunately, we were unable to reach Slovakia in time, and the Soviet Union was able to establish a front. Soviet puppets and national traitors have declared an opposition government based in Bratislava, and we are now fighting not only another world war but also our first civil war."
  UN_Groups.14.A: "We will kick tyranny out of Czechoslovakia once and for all!"

  UN_Groups.15.t: "The Western Conspiracy is Revealed"
  UN_Groups.15.d: "One of our many proletarian allies, a communist government official stationed in the various halls of the Czechoslovak bureaucracy, arrived in Moscow today after informing us of news that could change the course of history. He claims he left abruptly and came here with a set of documents obtained from an insider agent of the Czechoslovak communist movement. The governor explains that another agent from the West contacted that man and informed him of a massive plot against us.\n\nThe plan, known as Operation Unthinkable, is a massive international scheme devised by the bourgeoisie of all of our major adversaries, including some countries we thought were neutral. Its goal is to destroy Bolshevism and reintegrate Soviet workers into the capitalist system. The insider was initially asked to deliver these papers to the President of Czechoslovakia in the hopes that he would mobilise his country against us as well.\n\nAccording to the plans, Operation Unthinkable is approximately §Y[?operation_progress|2%%]§! completed. With this news, we must mobilise all branches of our great military to protect the working class in a final battle against the world, without letting the traitorous West know. It will be a difficult war, but the Soviet Union will prevail, and the greedy rich of Paris, London, and Washington will fail!"
  UN_Groups.15.A: "They chose this fight and they will regret having done so."

  UN_Groups.16.t: "Exile Group Abandons Us"
  UN_Groups.16.d: "After much deliberation, the members of the exile group determined that we must be traitors to their cause and no longer a viable ally in achieving their objectives. This comes after we made several policy changes that favoured many other exile groups over them, including some groups they considered to be directly opposed to their cause, as well as shutting them down when they requested favours.\n\nDespite attempts to rein them in and keep them in our coalition of groups fighting the Soviet menace at the start of Operation Unthinkable, their enraged leaders only berated us for not doing more for them before threatening to leave us and finally stating that they would seek new supporters elsewhere. With exile group no longer supporting us, we have lost a large number of battle-hardened fighters who could have been critical to the upcoming war due to their size and experience.\n\nSo far, we've been able to downplay the situation to the other exile groups, preventing the entire coalition from disintegrating, but in the future, we should be far more cautious in our decisions in order to keep as many groups happy as possible. At the very least, we have been assured that the exile group will not inform the Soviets of our plans to invade them - a silver lining in an otherwise bleak series of events."
  UN_Groups.16.A: "Wait, come back!"

  UN_Groups.17.t: "Rally of the Stateless"
  UN_Groups.17.d: "As the war against the Red Menace intensifies and our armies of freedom face waves of Soviet soldiers, our friends in the exile groups with whom we previously collaborated have finally picked up arms, organised, and informed our high command that they are prepared to fight on the frontlines. They have also contacted secret cells of supporters still in their home countries, bringing more manpower than we expected to face our Eastern enemy.\n\nThe additional manpower will undoubtedly benefit our operational efforts, not to mention the notable experience of these fine men, who have been denied a fair fight since their initial losses so many years ago. They have already organised their own divisions to fight alongside ours, claiming to be fully prepared to prove their worth against the Soviet Union. These exiles will undoubtedly be eager to provide us with a reason to help them with their own missions."
  UN_Groups.17.A: "How much did we agree to pay them for this again?"

  # Creation of the UN Events
  UN_Creation.1.t: "The Surrender of the Russkaya Osvoboditelnaya Armiya"
  UN_Creation.1.d: "By all means, the ROA should be our enemies. Animosity against fascism is high, as it should be, but these traitors may have something to offer. Officers of the Russian Liberation Army secretly surrendered to us this morning, giving up their fight in order to avoid Soviet or German punishment. These men, along with their leader Andrey Vlasov, have betrayed the USSR in order to aid or serve as soldiers for Germany. Indeed, they turned against their country in support of the Nazis, and for the majority of their existence, they served solely under German command.\n\nThe ROA present a compelling case for their safety, one that tells a very different story. First, Vlasov and his men claim that they were attempting to \"liberate\" Russia from communism, but would have aimed for an independent state rather than being a Nazi puppet. He claims that the Germans were the easiest way to depose Stalin, and some of his ideas appear democratic. Second, most of his men claim they only joined Germany because they lost faith in communism. During the early war, the Soviets were losing heavily, and in desperation, they joined Germany. This is supported by their final action before surrender: attacking an SS brigade sent to level Prague and assisting Czech partisans there, thereby helping to save the city.\n\nAbove all, they claim that a war between the Soviets and the West is unavoidable, and that they have served and fought the Soviets, so they understand their weaknesses. They assure us that if we go to war with the Reds, the ROA will come to our aid. With this conflicting information, it is unclear what we should do with these opportunists. Should we hand them over or quietly let them \"escape\" into our territory?"
  UN_Creation.1.A: "Quietly take them in; we might need them."
  UN_Creation.1.B: "Turn these traitors over to the Reds!"

  UN_Creation.2.t: "An Unthinkable Option"
  UN_Creation.2.d: "With the ROA's remnants successfully extracted from Soviet occupation, their violent hatred of Bolshevism has already become apparent. Members have spoken extensively with both our high command and common soldiers about the evils of communism and the imperialism perpetrated by the Soviet Union in the name of the common man. These extensive talks, speeches, and other propagations have taken place across Allied bases, swaying some of our already conservative officers into full-fledged and staunch anti-communists. They no longer see the Soviets as reasonable monsters, but as creatures of the deepest evil who must be eradicated from the world.\n\nWith this sudden surge in anti-Soviet sentiment, a previously thought-to-be impossible plan, Operation Unthinkable, has resurfaced. Operation Unthinkable, a secret scheme originally ordered by Winston Churchill and later developed by the Joint Chiefs of Staff, is a surprise attack on the Soviet Union to bring communism to an end before a Red iron curtain falls over Europe. When it was formed, many of our command members did not believe that losing more lives in a Third World War would be worthwhile but now, with the ROA's stories of communist oppression and genocide against their own Soviet people, we are united in our determination to put an end to their red imperialism.\n\nOf course, we will not be able to do this alone, and it will come at a significant cost to the entire world. A decision must be made: send this plot to Washington and secure the support of the entire United Nations to form a coalition against the Soviet Union, or abandon this ill-fated plot before more lives are lost in the fires of war. Will democracy triumph in a final crusade against dictatorship, or will we quietly forgive and forget Moscow?"
  UN_Creation.2.A: "It couldn't hurt to see what America thinks of this, right?"
  UN_Creation.2.B: "Too many have been lost already! No more world wars!"

  UN_Creation.3.t: "A Quiet Liason"
  UN_Creation.3.d: "\"News\" has arrived from London today, or rather, information that we hope never reaches the media due to its magnitude. The British liaison reports that the ROA soldiers we quietly saved have begun to persuade their high command to take increasingly anti-Soviet positions, going so far as to preach open war against the Soviet Union.\n\nWith such harsh positions taken by one of our closest allies, they have informed us of a strategy devised by Winston Churchill and the British Joint Chiefs of Staff. The plot would plan and carry out a surprise strike against the USSR, hoping to catch the communist forces off guard and allow for mass destruction of their forces, resulting in a quick victory and preventing a prolonged war. The reason the British have informed us of this is that they appear to be seriously considering the scheme. The ROA's tales of oppression and genocide inspired them to secretly call for such a war. Obviously, Britain cannot wage war with Moscow alone, which is why they have turned to us.\n\nIf we accept, the United Kingdom's plan is to rally the entire United Nations to form a coalition against Moscow, effectively enlisting the entire world to isolate and destroy it. It is a plan that may work, however, hesitant voices persist, unwilling to send more men off to die so soon after the war. Starting another would permanently alter the course of history, for better or worse, and many people are unwilling to risk the consequences. Regardless, we are now the final barrier between the peace we have achieved and the next world war. If we decline, an uneasy truce will be declared around the world, and if we choose to proceed, hundreds of thousands will be executed in order to truly free all men."
  UN_Creation.3.A: "Tell London that we're in."
  UN_Creation.3.B: "Tell London that we're out."

  UN_Creation.4.t: "Washington is In!"
  UN_Creation.4.d: "We've received exciting and terrifying news from across the pond. The White House received our liaison's presentation about Operation Unthinkable and has unanimously agreed to the plan. The United States has begun draughting its own strategies behind closed doors, hoping to align with ours. Once again, mobilisation has begun in both of our countries, albeit slowly so as not to draw the Soviet Union's attention. The United States has called a UN meeting for next Thursday, which the USSR has not been informed of or invited to attend - the goal is to form a global coalition to overthrow the communist dictatorship.\n\nThe ROA has received word that we have joined forces with them, and they appear to be very pleased with our decision. They have prepared the remnants of their soldiers for war once more, determined to bring down communism in Russia, believing that this time will be different than the last. There is no turning back now. We are on a predetermined course for war with the Soviet Union. Our armies, exhausted from the war against the Nazis, have been ordered to prepare for a war that will undoubtedly destroy the men of this generation even more than the previous one. As widows bury their husbands and mothers bury their sons, their fortunate friends lie in peace, unaware that they, too, will face grief in due course.\n\nThe threat of the Soviet Union looms over Europe, and the ROA has given us numerous reasons why this has to occur. They claim that the USSR would attack us regardless, and that Soviet policies condemn so many people to death - through starvation, Siberian prisons, political assassinations, and executions, among other things - that this war will actually save lives rather than waste them. We can only hope that they are correct and that we can annihilate the Red Army without hesitation. Because if we fail, democracy will die alongside us."
  UN_Creation.4.A: "Encumbered forever, by desire and ambition..."

  UN_Creation.5.t: "Washington is Out!"
  UN_Creation.5.d: "The White House has finally responded to our plan to attack the Soviet Union and destroy communism once and for all. We expected them to agree to this plot because they are the polar opposite of the USSR and have a high level of anti-communist sentiment among their people, but they have not. No, instead, they have laughed us off, seeing us starting a Third World War as little more than a joke given the impact of the Second, or responded with outright terror that we have even considered such an act.\n\nWe specifically requested that a vote be held on a UN coalition against the Soviets, and the Americans responded with another no, pompously declaring that without American aid, the Soviets would simply crush the rest of war-torn and recovering Europe, as well as 'whatever other sycophant nations would follow you to certain death'. Many in our own circles have been outraged by such harsh words in response to our well-developed attack plan, but some have breathed a quiet sigh of relief, expressing their reluctance to send more men off to die or risk a loss in a war that would doom all of Europe to communist oppression.\n\nThe ROA has instructed any soldiers under American protection to join the circles that are currently residing in our territory, deeming Washington traitors to the anti-communist cause and vowing not to collaborate with them. Despite this, they have made no further effort to promote the war, instead returning to telling stories of Soviet oppression and thanking our government for at least attempting to bring down the communist stronghold. It appears that, as Prime Minister Chamberlain predicted shortly before the invasion of Poland, peace will come in our time."
  UN_Creation.5.A: "... a hunger still unsatisfied."

  # World War 3 Events
  UN_World_War_3.1.t.A: "The Last Crusade"
  UN_World_War_3.1.t.B: "A Greater War"
  UN_World_War_3.1.d.A: "How can one justify this? Attacking our former allies shortly after we defeated the Nazis together. One could argue that they were only allies because they were attacked; if Barbarossa had not occurred, the USSR would have watched contentedly while the Reich divided Europe. Nonetheless, the question of morality remains. Widows, mothers, friends, sons, and daughters have shed tears and buried those who died, bringing an end to the Axis' genocidal reign. Yet now we are the attackers, leading a coalition for a war based on ideology and tales spread by Nazi collaborators.\n\nWe know that on the other side of the lines are young Russians, some of whom do not believe in their system or want to be there; the ROA and Red Army's conscription policy demonstrate this. And, somehow, we are willing to send the last of our fighting-age men to their deaths in order to defeat our last 'enemy', the last major power that does not support Western democracy. Some argue that our invasion for the sake of democracy is, in fact, extremely undemocratic. It is a crusade, a campaign proposed by Europeans into a foreign land to forcibly change the lives of millions, with the hope that the outcome will be positive. Others might call it imperialism or colonialism. We have not listened to any of these pacifist voices.\n\nToday, crossing the border into Soviet territory was an army of thousands ready to die for democracy, to unite the world for true peace through the use of weapons of war. Millions will undoubtedly die, but hopefully no one will ever die as a result of war again. H.G. Wells once referred to the Great War as 'the War to End All Wars'. This will truly be the war that ends all wars. As the dead are buried, the living defenders of democracy, an ideology founded on freedom and peace, march into the fires of another war."
  UN_World_War_3.1.d.B: "The highest political and military leadership of the United Nations has been informed that the Soviet Union and its allies have launched a massive and unprovoked invasion of Western Europe. Their armies, moving with overwhelming force, are advancing across borders with the goal of bringing all of Europe under communist control. This assault is not limited to strategic objectives; it seeks to dismantle free-market institutions, crush civilian morale, and impose complete control over millions of people's lives.\n\nOnce again, the world is on the verge of a great war. According to reports from the front, Soviet forces are advancing across open countryside, through fortified towns, and along vital transportation routes in large numbers, with the majority of them being veterans of the previous war. Tank columns advance, artillery bombards defensive positions, and waves of infantry wreak havoc on settlements. Civilian resistance, when it occurs, is met with ruthless reprisals, as the invaders have already demonstrated their brutality.\n\nOur troops are putting up a desperate defence to repel the Red Hordes, but stopping Moscow's armies will require all of our efforts. The world is witnessing the birth of another great war, the consequences of which will last for generations. Every nation is now being called upon to act, mobilise, and resist the forces that seek to destroy the structures of free society."
  UN_World_War_3.1.A: "[THIS.GetWorldWarThreeEventOptionUnitedNations]"
  un_world_war_3_event_united_nations_1: "Forgiving who we are; for what we stand to gain."
  un_world_war_3_event_united_nations_2: "Together for Victory!"

  UN_World_War_3.2.t.A: "Towards the Triumph of Socialism"
  UN_World_War_3.2.t.B: "The Capitalists Strike Our Homeland!"
  UN_World_War_3.2.d.A: "Finally, after decades of preparation and sacrifice, the moment has arrived. The Red Army, in coordination with allied forces, has crossed the borders of Western Europe on the orders of the Politburo, launching Operation Red Dawn. Across the front, our units advance with overwhelming force, exploiting enemy defence flaws while seizing critical transportation hubs, industrial centres, and strategic positions.\n\nThe Red Army moves as a liberator, not to conquer, but to liberate workers and establish socialism across the continent. Nations that have long been shackled by foreign capitalist interests are now on the verge of liberation, with us serving as both a shield and a guide for European peoples. Red Dawn is the fulfilment of a historical duty: to spread freedom and equality while ensuring the survival of the socialist cause in the face of decades of Western hostility. Soon, all of Europe will be under socialism, and millions of workers will celebrate their liberation."
  UN_World_War_3.2.d.B: "Front-line intelligence confirms the unthinkable: the Western Allies have launched a massive, coordinated invasion of the Eastern Bloc. Codenamed Operation Unthinkable, their forces advance across the borders of our occupied territories in Europe, armed with tanks, mechanised infantry, artillery, and air squadrons, with the goal of crushing the Soviet Union and imposing capitalist dominance over lands liberated at great cost. Entire regions face occupation, and socialism's very existence in Europe is now threatened.\n\nThe Politburo has issued an immediate directive: the Motherland will resist at all costs. Every Red Army unit is being mobilised, strategic reserves are being deployed to vulnerable areas, and fortifications along key routes are being strengthened. Armies and air fleets are on full alert, and factories and industrial centres have been redirected to produce weapons. Civilians across the Union are being asked to help with the defence, from war production to civil defence measures.\n\nThe scale of this assault cannot be overstated. The Western powers seek to undo decades of sacrifice, to destroy the Revolution's gains, and to subjugate millions to foreign rule, but the Soviet people remain steadfast. They have survived famine, invasion, and civil war; they have overcome the horrors of the Great Patriotic War. They will triumph once more over the greatest enemy they have ever faced."
  UN_World_War_3.2.A: "[THIS.GetWorldWarThreeEventOptionSovietUnion]"
  un_world_war_3_event_soviet_union_1: "The parasite that is capitalism shall be eradicated!"
  un_world_war_3_event_soviet_union_2: "Moskva za nami!"

  UN_World_War_3.3.t: "Vladivostok Rocked by Allied Raid"
  UN_World_War_3.3.d: "Harrowing news has arrived from the Far East, where communications were lost earlier today. Finally, after the rapid re-establishment of messaging services we have begun to grasp the situation. The event has been described as a 'terrible strike', another premeditated act of deception by the Western bourgeoisie as part of their mass attack on the proletariat. To be more specific, a massive raid took place in Vladivostok, bringing the ruler of the East to shame.\n\nMassive explosions destroyed much of the city and rendered many important parts of the civilian and military economies inoperable, thanks to a combination of spying and extensive planned bombing. Loss of life has already been reported, but most importantly, a large portion of Vladivostok's naval and air industries - the same shipyards and airports that were producing boats and harbouring planes to keep the Pacific Ocean contested - have been largely destroyed.\n\nExtensive repairs have been ordered to salvage what can be salvaged, but rebuilding these critical industries will take time, possibly longer than usual due to the massive damage to infrastructure. While this has hampered us, the Union will prevail. We will rebuild Vladivostok with the decadence that we take from the West when our armies pass through their treacherous capitalist cities! This will be a minor setback, surely..."
  UN_World_War_3.3.A: "... right?"

  UN_World_War_3.4.t: "Destruction of the Baku Oil Fields"
  UN_World_War_3.4.d: "Reports from the Caucasus have started to arrive, and they contain bad news. Earlier today, all communication channels with Baku went silent. When communication was restored hours later, the scope of the disaster became clear. What officials now describe as a coordinated act of sabotage and aerial terror has struck at the heart of our oil production.\n\nMassive explosions ripped through the city's refineries and storage facilities, igniting vast fuel reserves and sending smoke columns high above the Caspian coast. The scale of destruction overwhelmed firefighters and workers, who saw pipelines burst and entire processing plants reduced to rubble. Initial reports indicate that a combination of infiltrators and a precisely timed bombing raid resulted in maximum damage before any meaningful defence could be deployed.\n\nThe costs are already staggering. A significant portion of our fuel output has been disrupted, and transport networks throughout the region are struggling to keep up. Reconstruction efforts have begun, but much of the industrial zone is burned beyond recognition. Restoring Baku to full capacity will take time and resources."
  UN_World_War_3.4.A: "Another disaster we must somehow endure."

  UN_World_War_3.5.t: "The Final Death of Vladimir Ilyich Ulvanov"
  UN_World_War_3.5.d: "Orya crouched behind a pile of fallen debris, staring at the imposing building down the street. Artillery fire rained down from somewhere nearby, igniting even more buildings in Moscow. She began to sprint - she had to get there. The engineers and Red Army were too preoccupied with the unexpected Western attack to take the same precautions they had with the Nazis, so he was left undefended. She had to step in, or else... who would? He would be abandoned to the capitalist bastards, and she couldn't let that happen.\n\nOrya, who had lived in Moscow her entire life since her birth on New Year's Day, 1933, was a devoted Revolutionary daughter. The very model of the New Soviet Woman as prescribed by the party. She adored the Revolution's leaders above all else, particularly Stalin's strong hand and Lenin's inspirational voice. It just so happened that Orya was currently attempting to save the latter, or rather his body.\n\nEntering Lenin's Mausoleum, which was undefended with the majority of Moscow's army on the front lines, Orya searched and searched without success until she discovered something heartbreaking in a backroom. Lenin's body had been unceremoniously thrown to the stone floor, and above him stood a nonchalant soldier - possibly an American - holding a lit lighter. This random, no-name Westerner was going to burn him? He did not have the right.\n\n\"I knew I heard scuffling inside the building. Leave immediately, young lady,\" said the soldier. Unfortunately, she couldn't understand a word of English.\n\nShe pointed to the body and shook her head quickly.\n\nHe sighed, rolled his eyes, and dropped the lighter, the embalming fluid sparking an instant bonfire. Orya collapsed to her knees, a sobbing wreck, watching the flames consume her idol.\n\n\"Brainwashed commies...\" he muttered, scoffing as he passed her and left."
  UN_World_War_3.5.A: "\"Give me one generation of your youth, and I shall change the world.\""

  # Decisions / ASC Promise Making Events
  UN_Decision.1.t: "Filling the Vacancy"
  UN_Decision.1.d: "With the Soviets abandoning the UN for their own nefarious purposes, the Security Council now has a conspicuous open seat. As of now, the Security Council is in agreement, so having an even number of seats is not an issue; however, if something comes up, we may face the same issues that the League of Nations did, resulting in paralysis and indecision; thus, a fifth member is required. Some have suggested that Germany be allocated that seat. This has quickly become a contentious issue, which we fear could paralyse the council.\n\nBritain and France, which have recently suffered years of German bombardment, have made compelling arguments for another nation, such as Italy, to take the seat. They also argue that Germany has not yet been fully de-nazified, and that a resurgent Germany with Fascist tendencies would plunge the world into another World War. However, America and China make equally valid points about how Germany is already regaining strength. They say it won't be long before Germany is back as a world power, and that will be even more true if the country is reunited."
  UN_Decision.1.A: "Germany is welcomed onto the Security Council."
  UN_Decision.1.B: "They are not ready. Not yet."

  UN_Decision.2.t: "Claims to the East"
  UN_Decision.2.d: "As we prepare for the final battle for Europe, we must consider what will happen afterward. The most important of these plans concerns what will become of Germany. Germany, which is currently divided between us and the Soviet Union, serves as a foundation for a new Europe. Their industry and potential are formidable, as evidenced by the last half-century of war, and if properly harnessed, we will have a powerful force to aid us in this crusade. Of course, the Soviet Occupation Zone will reunite with its Western counterparts, but what about Germany's eastern claims?\n\nThe German government maintains a valid, albeit dormant, claim to much of what is now Western Poland. Many Germans are still deeply affected by the loss of these lands, as well as the forced deportations that followed. Promising to restore Germany's 1937 borders and undo the Soviets' actions would ensure full German support for the war, but it risks alienating the London Poles.\n\nHowever, a compromise has been proposed in which Poland retains parts of Eastern Silesia and Oppen in exchange for returning the remainder to Germany. It is an unsatisfactory conclusion for all parties, but isn't that what makes a compromise effective? Alternatively, we could simply keep the borders as is. It will irritate the Germans, but for many people, this is fine. We just fought a war to prevent them from expanding their borders, so it would be hypocritical to do so for them, especially at Poland's expense."
  UN_Decision.2.A: "Keep the Oder Neisse Line intact! (1)"
  UN_Decision.2.B: "Divide the East! (2)"
  UN_Decision.2.C: "Restore the old Germany! (3)"

  UN_Decision.3.t: "The Fate of the Prussian Main"
  UN_Decision.3.d: "East Prussia is a contentious issue. It was a German outpost in the heart of the Baltics for centuries before becoming isolated from the rest of the country following the Great War. The reunification of East Prussia with Germany was purportedly the reason Nazi armies invaded Poland in the first place. It is now mostly Polish territory, with Königsberg and its surroundings being converted into a Soviet armed camp. The Germans who had lived there for generations all fled ahead of the Red Army's advance during the war or were deported, and the area has been mostly repopulated by Soviets.\n\nSome have suggested simply giving Königsberg, or Kaliningrad as the Soviets call it, to Poland. They got the rest of the area, so giving it to Poland will make everything so much easier. Not to mention, the majority of the area is now Polish. However, some have suggested that we hand over the Kaliningrad base to Germany. Not only would it not infringe on Poland's new borders, but it would also provide a strong ally of ours, Germany, with a regional outpost from which to build our alliance. Alternatively, we can reverse the transfer and return the entire region to Germany. The Germans fled under duress, not by choice and acknowledging the population transfer would be equivalent to legitimising Soviet intentions in Eastern Europe."
  UN_Decision.3.A: "Give the whole area to Poland and be done with it! (1)"
  UN_Decision.3.B: "It shall be splitten! (2)"
  UN_Decision.3.C: "Königsberg will be German once more! (3)"

  UN_Decision.4.t: "Rethinking the Curzon"
  UN_Decision.4.d: "Poland is actually only half a country. After the war ended, the Soviets, greedy and shortsighted as they are, implemented the Curzon Line, which  was proposed after the Great War. They captured Eastern Poland up to the Line and annexed it to the Belarusian and Ukrainian SSRs. When Poland is liberated, the London Poles urge us to reconsider the Eastern Border. They have strongly requested that the pre-1939 Eastern border be restored, with Lviv returned to Polish control. The land is historically Polish, with a Polish majority in much of the region. Despite being recently seized by the Russians, it is still largely governed in a Polish manner and has not been fully integrated into the USSR.\n\nHowever, a community of Ukrainians in Washington claiming to represent a Ukrainian government in exile has made their own request. They argue that Lviv is an essential part of a free Ukraine, and that giving it away without thinking would seriously undermine Ukrainian willingness to support our war effort. The Ukrainians promise that their networks in Ukraine will gladly rise up at our command, but only if we guarantee that no inch of 'Ukrainian soil' will be given to the Poles."
  UN_Decision.4.A: "Lviv is Polish! (1)"
  UN_Decision.4.B: "Split it! (2)"
  UN_Decision.4.C: "Lviv is Ukrainian! (3)"

  UN_Decision.5.t: "To The North"
  UN_Decision.5.d: "Vilnius is an intriguing and, until now, overlooked source of contention. The area, claimed by both Lithuania and Poland, was fought over during the Polish Army's occupation of the city in the 1920s. The Entente recognised it as a core part of Poland in 1923, but Lithuania never acknowledged the situation, declaring Vilnius as their capital despite being in another country, and Kaunas as a temporary capital until Vilnius was reclaimed. Vilnius was returned to Lithuania by the USSR following the Soviet occupation of Eastern Poland in exchange for military bases, which would later serve as the catalyst for the Soviet occupation of the Baltics.\n\nAs we consider the future of Eastern Europe, both the London Poles and the Lithuanian government in exile have staked claim to Vilnius. Lithuania's claim is ancient, dating back to the 1300s, whereas Poland's claim is based on their Commonwealth Period with Lithuania in the 1500s. The centuries-old conflict has now been presented to us for final resolution."
  UN_Decision.5.A: "Poland is too valuable an ally to ignore, Wilno is theirs."
  UN_Decision.5.B: "May Vilnius glitter as the diamond of Lithuania!"

  UN_Decision.6.t: "The Fraternal Situation"
  UN_Decision.6.d: "For centuries, the term \"Ukraine\" has remained ambiguous. While their identity is ancient, centuries of Russian rule and the effects of Russification policies have left the exact boundaries of what is considered 'Ukraine' ill defined. Is it only the borders of the Ukrainian SSR? If so, how about Belgorod? This region of Russia has a sizable Ukrainian minority and is claimed by Ukrainian separatists and freedom fighters who see it as an integral part of 'Greater Ukraine'.\n\nHowever, it has been repeatedly stated that handing over Belgorod to Ukraine would cut the legs out from under any reconstructed Russian government. That is because, of course, Moscow has ruled Belgorod for centuries and the region's population is predominantly Russian. In fact, no Ukrainian state has ever owned the city or the surrounding land.\n\nThe new Russian government we hope to install cites these facts as compelling reasons why Belgorod is Russian now and forever, just as important as Moscow. So we must make a decision. Will we forever ingratiate ourselves with the nascent Ukrainian state, risking any chance of a smooth power transfer in Moscow? Or should we maintain the current borders, ensuring future generations of tensions and potential violence in Eastern Europe?"
  UN_Decision.6.A: "Ensure a fair split taking place!"
  UN_Decision.6.B: "Ukraine deserves Belgorod! Slava Ukraine!"

  UN_Decision.7.t: "Determining the Status of Crimea"
  UN_Decision.7.d: "Crimea is a unique case in the Soviet Union. Following the Crimean War and the rise of the Bolsheviks, Russia was divided into various Soviet Republics to accommodate the new Union's ethnicities. Crimea, home to Tartars, Ukrainians, Germans, and Jews, was deemed too diverse to be incorporated into the nearby Ukrainian SSR. This, among other less publicised strategic concerns, prompted the formation of the Crimean SSR. Since then, Russia and Ukraine have both claimed the peninsula. As our armies prepare for the final Great Crusade, the nascent Ukrainian and Russian governments have renewed their claims.\n\nThe Russians have pointed out that much of the Peninsula is populated by Russians, and that the Ukrainian claim is based on proximity rather than any genuine historical or ethnic claim. They also stated that they would be a much better ally in the Black Sea if any future Russian Black Sea Fleet could be based in Sevastopol rather than Rostov.\n\nUkraine has responded with its own claims that the Russian census data incorrectly claims that ethnic Ukrainians on the Peninsula are Russians. They point out that successive Russian governments have refused to recognise a Ukrainian identity separate from Russians, and the USSR only does so reluctantly. Giving them Crimea, they argue, is equivalent to giving the Reich the Sudetenland. The Ukrainians have expressed similar strategic concerns as the Russians. They argue that giving the Russians an outpost in their south would render their country nearly defenceless and vulnerable if Russia attempted anything in the future."
  UN_Decision.7.A: "In the interest of Ukrainian security, give the Peninsula to them."
  UN_Decision.7.B: "Crimea has been and forever shall be Russian."

  UN_Decision.8.t: "The Issue of ‘White Ruthenia’"
  UN_Decision.8.d: "\"White Ruthenia\", also known as Belarus, is a political minefield on par with anything in Eastern Europe. Belarus has a long and illustrious history of being subject to foreign powers. It began with Kievan Rus, followed by Polotsk, the Commonwealth, and finally Russia. While the native Ruthenians retained their cultural identity throughout, a history of foreign dominance has led many of the country's neighbours to dismiss their desire for independence. As we prepare to rebuild Europe in our image, we must resolve the competing claims to the lands of Ruthenia and determine their fate.\n\nRussia, of course, has the strongest claim to the territory of any foreign power. Belarus was seized by Catherine the Great in 1795 and remained part of the Russian Empire for the next 120 years, during which intense Russification efforts resulted in a patchwork of Russian and Ruthenian peoples. The Ruthenians were finally granted freedom in 1918 with the short-lived Belarusian People's Republic, but the Russians believe that the Republic's quick demise means that Belarus must be returned to Russia for the sake of Eastern European stability.\n\nThe Belarusian Government in Exile in Washington, however, tells a different story. They claim that the \"swift collapse\" was caused by the Bolshevik invasion and subversion. They argue that if we are truly fighting for everyone's freedom from tyranny, condemning the Ruthenians to another century of foreign domination would be hypocritical."
  UN_Decision.8.A: "The torch of freedom once more burns in Minsk. Liberate Belarus. (1)"
  UN_Decision.8.B: "Free Belarus and give them Smolensk as reparation for centuries of Russian rule. (2)"
  UN_Decision.8.C: "Russia is even in the name for god's sake! Give \"Belarus\" to Russia. (3)"

  UN_Decision.9.t: "Every Piece Has Fallen In Place"
  UN_Decision.9.d: "In a dark room beneath an unnamed London building, some of the most powerful men alive gathered. They were not officials, generals, presidents, or prime ministers. No, the men gathered around this table were little more than diplomats and spies, but they were the ones who truly controlled international relations.\n\n\"Good work, gentlemen,\" said the man at the head of the table, a higher-level MI6 official tasked with overseeing Unthinkable's dealmakings. \"Every potential ally we could find has been contacted - Spain, China, Czechoslovakia, all were offered good deals if they committed to the democratic cause - without the Soviets ever catching on. Of course, this does not mean that every nation has responded positively, but you have all carried out your missions to the best of your abilities.\"\n\nQuiet cheers echoed throughout the room as mild-mannered envoys and espionage agents, who were always in the background and forgettable, were forced to express truly positive emotions, unaffected by their often constant combination of stress, paranoia, and quietness. The man continued to speak, a smile on his old, normally stern face.\n\n\"I don't believe it's fully set in exactly what you've done to ensure a free world today. The history books may not know you - for a long time - but the secret deals you've made may have turned the tide of this upcoming war, and even won it. So God bless you all, and now Operation Unthinkable can truly begin.\""
  UN_Decision.9.A: "\"But until such, how about a drink, men? There's a pub nearby.\""

  # War Exhaustion Events
  UN_War_Exhaustion.1.t: "The Ticking Clock"
  UN_War_Exhaustion.1.d: "The great and final battle that will determine the fate of the world has finally begun. West and East, democracy and communism, are at war. Just as mothers and wives were about to hold their dearest loves in their arms again, and the reserves could breathe a sigh of relief, war broke out. Millions of men in tired armies march once more to valiantly defend their ideology and their nations from the onslaught of the opposing side, who were once their brothers in arms.\n\nWhile politicians sit quietly in their offices, convinced that this is absolutely necessary, the public outcry has been overwhelming. Riots have had to be suppressed from Washington to Moscow, and the empty air in our country feels like death and sorrow. As the war goes on, these issues will only worsen. The more damage we suffer or inflict, the more thousands we send to their early graves in this pushing and pulling hell, the more War Exhaustion we will gain - until the war effort collapses and peace must be imposed on us or the entire world will fall into chaos.\n\nAll of this will have to be worthwhile, one would hope, so that we can shine our great and true liberty on the other side of Europe and show the world that our ideology is the true path humanity must take. For equality and union, we will march one last time. This will have to be a quick and decisive win for us. This war cannot last long, especially given the weapons of mass destruction involved..."
  UN_War_Exhaustion.1.A: "We'll be home by Christmas... right?"

  UN_War_Exhaustion.2.t: "The Clock Ticks On"
  un_clock_ticks_on_d_25: "Cities burn to ashes, families go hungry as their food and money are shipped away to feed soldiers who may not see tomorrow, and the air smells of death and gunpowder. All this for what? A few miles gained or lost in an apparently never-ending war. As we stand on the precipice of victory and destruction, toeing the line between what our people consider acceptable and what may incite them to riot or worse, the ideals for which we fought this war appear distant.\n\nWe claim in official statements and propaganda, from the comfort of capital buildings with bunkers and bulletproof glass, that all of this is for union and peace, but how can this be true when our country is divided on its feelings about this war and thousands die every day just for this 'peace'? The uneasy public trust will not last forever; like a stopwatch, it will tick until peace is restored. If such a time comes, the enemy will have free reign to impose terms that benefit them on us, and our ideology may find itself on the verge of collapse.\n\nAs of now, the people are willing to put up with more fighting because we have promised a quick victory. As long as we keep our word and resist enemy attacks while liberating land, we should have plenty of time to fight and defeat our eternal adversary."
  un_clock_ticks_on_d_50: "Cities are ash, and families are starving because their food is being shipped away to feed soldiers who may not see tomorrow. The previously dead air is now tense. All this for what? A few miles gained or lost in a seemingly never-ending war, our soldiers hoping that their enemy's will yields to theirs? As we teeter on the precipice between absolute victory and absolute destruction, toeing the line between what is deemed acceptable for victory in this incomprehensible fight, the ideals for which we entered this war appear to be dead.\n\nWe claim in official statements and propaganda - from the capital buildings with bunkers and bulletproof glass - that all of this is for union and peace, but how can this be true when our country is divided on its feelings about the war and thousands die every day just for this 'peace'? The public's trust is not being maintained; like a stopwatch, it will continue to tick until peace is restored. If such a time comes, the enemy will have free reign to impose terms that benefit them on us, and our ideology may find itself on the verge of collapse.\n\nPeople are beginning to question aspects of the war effort. Minor riots, though under control, have broken out, and there has been a noticeable increase in desertions, most likely due to the massive amount of death our conscripts have witnessed. That promise of a quick victory appears distant, but we may still have time if we act decisively."
  un_clock_ticks_on_d_75: "Ash blankets the sky, and our economy collapses as families starved to death take to the streets. The air is now just oppressive. And all for what? A few miles into a seemingly endless war, our soldiers pleading with their enemy's will to break like their own. As we teeter on the brink of total destruction, blurring the lines of what is morally acceptable in the desperate pursuit of a fleeting victory, the ideals we entered this war to protect appear like ghosts sent to haunt us.\n\nWe tried to claim in statements and propaganda - from our capital buildings with bunkers and bulletproof glass - that all of this killing is for union and peace, but how can this be true when our country is exhausted and our population has been harmed by the hundreds of thousands of deaths on both the frontlines and at home? The public's trust is eroding; like a stopwatch, it will continue to tick until peace is restored. If such a time comes, the enemy will have free reign to impose terms that benefit them on us, and our ideology may find itself on the verge of collapse.\n\nCurrently, the people are exhausted, hungry, and fed up with the war. Major riots have erupted, leaving children crying for fathers who will never return. There have been instances where our soldiers simply gave up or refused orders. If we are to win, it is now or never; at the very least, we should try to reduce the casualty rate."
  UN_War_Exhaustion.2.d: "[THIS.GetClockTicksOnDescription]"
  un_clock_ticks_on_o_25: "Was this sacrifice really worth the price?"
  un_clock_ticks_on_o_50: "Reaching out for clarity, a suit and tie made a promise - and broke it."
  un_clock_ticks_on_o_75: "Heartaches, heartaches; what does it matter how my heart breaks?"
  UN_War_Exhaustion.2.A: "[THIS.GetClockTicksOnOption]"

  UN_War_Exhaustion.3.t: "Time's Up"
  UN_War_Exhaustion.3.d: "Chaos is the only word to describe what is happening at home and on the front lines. The most pressing are the nationwide protests, which have grown so large that the police have either been unable to control them - especially given how understaffed they are with conscriptions - or, in the case of some departments, have permitted or even participated. Every day, these riots move closer to our capitals and government buildings.\n\nThen comes the news from the front lines. Our generals, who were once bright and eager to fight for our ideals and values, have now taken a much more defeatist stance. Our soldiers have attempted mass desertions as a result of the massive casualties we have suffered, and their commanders are too tired to stop them. Truly, it will be impossible to refuse peace if sued for it; we lack the strength, public trust, and stability to continue this war. One shudders to think what the public would do if they were denied the opportunity to finally overcome the exhaustion and pure grief of this war.\n\nIf we want to save any semblance of our society from total collapse, we must end this at any cost, even if it means the enemy wins and our own society falters. The stopwatch has stopped ticking, and for the sake of the people, we must bend the knee soon. They say only the dead witnessed the end of war..."
  UN_War_Exhaustion.3.A: "...and now, many more dead have done so."

  UN_War_Exhaustion.4.t: "The Spent Goliaths"
  UN_War_Exhaustion.4.d: "Our war cannot continue; this is clear to both sides. In this battle between communism and democracy, where we entered to ensure that our path was the only one the world should ever take, all we have to show is full graveyards and sobbing families. Our pride has been lost, and so has our enemy's, as we look across the dark fields. Their faces are hopeless, scarred, and lifeless, like zombies without souls. And when we look in the mirror, we notice that we look remarkably similar.\n\nThere will be no winners in this battle, as our people, from Omsk to Omaha, have taken to the streets to demand an end to the fighting. Our societies are on the verge of collapse, and in order to restore any semblance of normalcy, we must establish peace; otherwise, anarchy will triumph over both our ideologies. This war was clearly a mistake in hindsight. No matter how inspired we were going into this, with our propagandised dreams of annihilating our adversaries, when we look at the costs, our burned cities, our failing governments, and all the corpses, all we see are humans killed before their time - because of us.\n\nMuch like during the Great War, Allied and Soviet armies have begun declaring small truces to aid in the burying of the dead and to share in small displays of humanity following all of this senseless killing - and it is time for us, the politicians, to shake hands as well and declare this over. We may have wished for world peace, but not in this way..."
  UN_War_Exhaustion.4.A: "And it feels like heaven is so far away."

  UN_War_Exhaustion.5.t: "Preparing Our Terms"
  UN_War_Exhaustion.5.d: "It's possible that we've done enough in this war. Perhaps not every objective has been completed yet, or perhaps the enemy is slightly stronger than we expected, but whatever the case we can try to establish peace with the enemy.\n\nOur soldiers die every day, every hour, in an endless slaughter, while families back home can only hope and pray that they will see their brothers, husbands, and sons again - so ending this war will always be a popular decision, at least to avoid further strife and heartbreak. Not to mention that this war has already had a negative impact on our economy; therefore, if this war no longer provides the benefits that we expected, it may be better for everyone involved if a truce is declared and we return to the uneasy peace we had previously.\n\nWhile some warhawks would argue that we could still recover and achieve greater heights, pounding our adversaries into the ground and truly putting the final nail in the coffin of their sickening, oppressive ideology, one could simply turn a blind eye to their furious speeches if one was struck with a sudden burst of humanity. We don't know if our enemies will accept our proposed peace treaty or believe they can defeat us - but we can try. At the moment, the peace agreement is most likely equivalent to a [THIS.GetLastCrusadeOutcome]."
  UN_War_Exhaustion.5.A: "Let us end this senseless slaughter - send the proposal."
  UN_War_Exhaustion.5.B: "We can still do more! No treaties yet! Keep fighting!"

  UN_War_Exhaustion.6.t: "The Enemy Offers Peace"
  UN_War_Exhaustion.6.d: "A surprising message arrived today from our enemy's command centre. While we initially assumed that those brutes would never consider peace until they either destroyed us or we destroyed them, it appears that we misjudged their diplomatic abilities. Indeed, the document we received calls for an immediate cease-fire on all military movements, as well as a meeting to discuss the appropriate terms for bringing this bloody war to an end. It also tells a few heartbreaking stories about soldiers who have been deeply affected by the devastation caused by this war - supposedly the same stories that convinced our adversaries that the war must end.\n\nNow it is entirely up to us to determine whether we are on the same page. Our citizens undoubtedly despise this war and will eventually want it to end, but some of our politicians are concerned that accepting a peace deal will make us appear weak or defeated. Our high command and army are similarly divided between those who remain ideologically zealous and those who simply want to return to their families. Then there's the question of whether now is a good time to accept peace, regardless. Could we achieve more if we stayed in the trenches, or would accepting peace now prevent further territorial loss?"
  UN_War_Exhaustion.6.A: "The war has become untenable. Let us go to the negotiating table."
  UN_War_Exhaustion.6.B: "This would be tantamount to surrender! Fight on!"

  UN_War_Exhaustion.7.A.t: "THE FATE OF THE SOVIET UNION"
  UN_War_Exhaustion.7.B.t: "DEMOCRACY PREVAILS; SOVIET UNION LEFT CRIPPLED"
  UN_War_Exhaustion.7.C.t: "IRON CURTAIN BROKEN; EUROPE FREED"
  UN_War_Exhaustion.7.D.t: "WAR OVER; GERMANY AND AUSTRIA UNDER ALLIED CONTROL"
  UN_War_Exhaustion.7.A.d: "[FROM.GetNewsIcon]Shocking news from Russia today: the Soviet Union appears to have collapsed completely. The recent war took a toll on the Union and its armies as the Front pushed deeper into Western Russia. Cities such as Minsk, Kiev, Stalingrad, Leningrad, and Moscow have all slipped from Soviet control. The Red Army's failure to defend Russia from the West's invasion has sparked anti-Soviet revolts throughout the Union's remaining territories.\n\nIn many Western-controlled sectors, these revolts have received implicit support from Western arms and troops. Many nations that vanished from the map decades ago, such as Ukraine, Belarus, and the Baltic states, appear destined to reappear in the aftermath of the Western invasion. The liberation of so many long-oppressed countries will change the political landscape of Eastern Europe drastically.\n\nWithin Russia, reports appear scattered and contradictory. Stalin appears to have gone silent, with former Field Marshal Gregori Zhukov and Minister of Internal Affairs Lavrentiy Beria claiming to be his successors. Meanwhile, there have been reports of widespread riots throughout the Union in protest of the Bolshevik Party's rule."
  UN_War_Exhaustion.7.B.d: "[FROM.GetNewsIcon]The fighting has stopped. As families mourn once more, and the world's population looks to the future with abject horror or simple desensitisation, we are left to pick up the pieces of a thrice-broken world: the first that brought the age of monarchs to an end, the second that relegated fascism to the depths from which it had emerged, and the third that has left communism dying.\n\nWhen the war began, Western warhawks argued that it was necessary to liberate those oppressed by the Soviet Union, who had been starved and worked themselves to the bone for a slice of bread. The Soviet Union claimed that the West would only reimpose capitalism's chains on its free workers, while they were bringing true freedom to all European workers.\n\nWhatever the truth, the West appears to have won. While the USSR technically exists, many believe it will not survive much longer. The Iron Curtain has fallen, allowing former USSR puppet states to become free and democratic; Ukraine, Belarus, and the Baltic nations have gained independence, costing the Soviets nearly 30% of their population and a sizable portion of their industry. Politicians in Moscow claim that they will eventually recover and reclaim their lost territory; however, even if it can repair its demoralised and broken military, support for communism around the world and even within the USSR appears to be dwindling."
  UN_War_Exhaustion.7.C.d: "[FROM.GetNewsIcon]Once more, peace has returned to Europe. The Iron Curtain, the Soviet Union's wall of puppet states that separated the West from its borders and included Poland, Czechoslovakia, Hungary, and others, has been completely shattered as a result of the war between the Allies and the Soviet Union. Although the treaty has not affected any core Soviet territory, any gains made during the last war have been completely reversed, and the aforementioned nations have become free and democratic states.\n\nSoviet politicians and citizens alike are outraged at the West, with the general consensus being that the Allies' intention was always to leave the USSR with no reward for their sacrifice and participation in the last war. Meanwhile, in the newly liberated states of East Europe, fighting has been kept to a bare minimum; while some communist groups have gone underground or started minor riots, they have been far outweighed by the sheer scale of the celebrations that have broken out. Political prisoners have already been released, exiles and refugees have returned home, and free elections have been announced."
  UN_War_Exhaustion.7.D.d: "[FROM.GetNewsIcon]Today, the guns have fallen silent once more, and the world breathes a sigh of relief, with the hope that Europe has gone to war for the last time in the twentieth century. The fighting between Allied and Soviet troops was intense, and the Allies were only able to gain a slight advantage over the USSR by moving democracies' forces from Western Europe to its centre.\n\nAll of the core territory that belonged to Germany and Austria prior to the end of the last war has been fully annexed into both the American and British occupation zones, with the Soviet zone disbanded and any garrisons returned to the Soviet Union. The Soviet Union's high command has reportedly become agitated, arguing that a new war should be fought to reclaim the portion of Germany that the Soviet Union is owed. However, the Red Army is tired, and no fighting is expected to start anytime soon. Meanwhile, in Berlin, the remaining citizens are celebrating as they cross the former border into a factionally united Germany.\n\nThe general consensus of the world appears to be mostly disappointed, as thousands were sent to the grave for only a minor change - the very last of the able-bodied and patriotic soldiers on either side who had made it through the previous war have had their sacrifice and survival put to the test once more for far less reason and reward, which has sparked public outrage."
  UN_War_Exhaustion.7.A: "[THIS.GetWorldWarThreeUnitedNationsVictoryOption1]"
  UN_War_Exhaustion.7.B: "[THIS.GetWorldWarThreeUnitedNationsVictoryOption2]"
  UN_War_Exhaustion.7.C: "[THIS.GetWorldWarThreeUnitedNationsVictoryOption3]"
  world_war_3_united_nations_total_victory_option_1: "It's like 1917 all over again."
  world_war_3_united_nations_total_victory_option_2: "Mother Russia Bleeds!"
  world_war_3_united_nations_total_victory_option_3: "It's like 1917 all over again."
  world_war_3_united_nations_decisive_victory_option_1: "The light of liberty shall soon reach Moscow."
  world_war_3_united_nations_decisive_victory_option_2: "Surely all is not lost in the Union."
  world_war_3_united_nations_decisive_victory_option_3: "Was this worth it?"
  world_war_3_united_nations_major_victory_option_1: "We freed what we we could."
  world_war_3_united_nations_major_victory_option_2: "They will not cross our borders!"
  world_war_3_united_nations_major_victory_option_3: "Eastern Europe must be be relieved."
  world_war_3_united_nations_minor_victory_option_1: "Germany has been freed!"
  world_war_3_united_nations_minor_victory_option_2: "This slight shall never be forgotten."
  world_war_3_united_nations_minor_victory_option_3: "All this death, for what?"

  UN_War_Exhaustion.8.A.t: "DISSOLUTION OF THE UNITED NATIONS"
  UN_War_Exhaustion.8.B.t: "WAR OVER; USSR MARCHES OVER EUROPE"
  UN_War_Exhaustion.8.C.t: "IRON CURTAIN EXTENDED; FRANCE SPLIT"
  UN_War_Exhaustion.8.D.t: "WAR OVER; GERMANY AND AUSTRIA UNDER SOVIET CONTROL"
  UN_War_Exhaustion.8.A.d: "[FROM.GetNewsIcon]The United Nations General Assembly issued a solemn bulletin today, announcing that the organization's few remaining members had unanimously voted to dissolve it. With the majority of the world under direct or indirect Soviet influence, many countries have begun to ignore or abandon the organisation entirely. They regard it as little more than an arm of the capitalist oppressor class, and its eventual dissolution will bring Marx and Lenin's dream of global Socialist unity closer to reality.\n\nHowever, the remaining nations outside of the Soviet sphere mourn the death of the United Nations. To them, it was a watershed moment in voluntary international cooperation. In the beginning, it was also a deterrent to Soviet aggression, though as the Red Armies marched on, it gradually lost that reputation. They believe the UN's dissolution was a significant step backwards in the pursuit of international peace.\n\nIn any case, the vote served as the final nail in the United Nations' coffin. As the delegates to the once great organisation return home demoralised and defeated, its headquarters stands empty for the first time in decades, a monument to an age now gone.
  UN_War_Exhaustion.8.B.d: "[FROM.GetNewsIcon]It is the dawn of a new era in Europe, as Marx's dream of a united communist world appears to be closer than ever. The war came to an end today with the signing of a peace treaty that deposed almost every current government in Europe and extended what Churchill referred to as the Iron Curtain to the very edges of the Atlantic Ocean. Only the United States and the United Kingdom remain among the former major Allied nations, with the French government having fled to Africa. However, they are severely demoralised and unlikely to accomplish much in the coming years as they recover from their losses.\n\nMeanwhile, in the USSR, mass celebrations have broken out in the streets as Soviet dominance now extends across Europe, with nearly all of the nations that had been so vehemently opposing it now serving as puppets at its command. Every government has been quickly replaced with figureheads in agreement with Moscow's policies - any protests by citizens still loyal to the former governments have been swiftly crushed, and while reports are few and far between, it appears that the terror is not over for many as reactionary elements are hunted down."
  UN_War_Exhaustion.8.C.d: "[FROM.GetNewsIcon]The spread of communism has continued today with the signing of a new peace treaty that has brought the war to an end, finally returning the world to peace - and with both sides exhausted by the endless fighting, it is likely that this peace will last.\n\nThe terms of this new peace fall just short of giving the Soviet Union complete control over Europe, with the Benelux countries becoming puppets and any former colonies becoming independent nations. Already, celebrations have erupted in the Congo and the former East Indies - now Indonesia - as people rejoice at the end of their former colonial rule. Trieste was also given to Yugoslavia as a gesture of goodwill.\n\nHowever, the most concerning aspect for the West is the Soviet Union's current reach, which has split France in two - the old Republic, which fought alongside the United States and the United Kingdom, still exists with Paris and all that is south of it, but Northern and Eastern France have become an occupation zone run by the USSR and headquartered in Saint-Denis, just outside of the opposing capital."
  UN_War_Exhaustion.8.D.d: "[FROM.GetNewsIcon]Today, the guns have fallen silent once more, and the world breathes a sigh of relief, with the hope that Europe has gone to war for the last time in the twentieth century. The fighting between Allied and Soviet troops was intense, and in the end, the Soviets only gained a slight advantage over the West, shifting their dominance from Eastern Europe to its centre.\n\nAll of the core territory that belonged to Germany and Austria prior to the end of the last war has been fully ceded to the Soviet occupation zone, with the American, British, and French occupation zones disbanded and their garrisons returned home. Tensions remain high, with a disappointed West looking at the Soviets with suspicion. Meanwhile, in Moscow, politicians have lauded the liberation of German and Austrian workers from the yoke of capitalism - a contradictory statement, given that the Red Army had to quickly quell protests and riots in some of Germany's most conservative regions.\n\nThe general consensus of the world appears to be mostly disappointed, as thousands were sent to the grave for only a minor change  - the very last of the able-bodied and patriotic soldiers on either side who had made it through the previous war have had their sacrifice and survival put to the test once more for far less reason and reward, which has sparked public outrage."
  UN_War_Exhaustion.8.A: "[THIS.GetWorldWarThreeSovietUnionVictoryOption1]"
  UN_War_Exhaustion.8.B: "[THIS.GetWorldWarThreeSovietUnionVictoryOption2]"
  UN_War_Exhaustion.8.C: "[THIS.GetWorldWarThreeSovietUnionVictoryOption3]"
  world_war_3_soviet_union_total_victory_option_1: "It was good while it lasted."
  world_war_3_soviet_union_total_victory_option_2: "A victory for the proletariat!"
  world_war_3_soviet_union_total_victory_option_3: "Their sacrifice will never be forgotten."
  world_war_3_soviet_union_decisive_victory_option_1: "We will continue the fight."
  world_war_3_soviet_union_decisive_victory_option_2: "The capitalist system is over."
  world_war_3_soviet_union_decisive_victory_option_3: "What will become of Europe?"
  world_war_3_soviet_union_major_victory_option_1: "We will rise like a phoenix!"
  world_war_3_soviet_union_major_victory_option_2: "We will finish the job later."
  world_war_3_soviet_union_major_victory_option_3: "The Soviets in France?"
  world_war_3_soviet_union_minor_victory_option_1: "At least it's only Germany..."
  world_war_3_soviet_union_minor_victory_option_2: "Europe today, the world tomorrow."
  world_war_3_soviet_union_minor_victory_option_3: "Barely anything has changed."

  UN_War_Exhaustion.9.t: "WAR OVER; ENDS IN STALEMATE"
  UN_War_Exhaustion.9.d: "[FROM.GetNewsIcon]Only a few hours ago, the Soviet Union and the United States issued a joint statement declaring the end of the war. With the world watching, about to enter its third period of mass mourning in a century, citizens from San Francisco to Stalingrad waited to hear what those who now lie dead had given their lives for - what would happen after the brutal fighting stopped and the guns fell silent once more. The answer, it appears, is nothing.\n\nIndeed, it has been revealed that there will be no border changes, and that East and West will appear to try to maintain the same shattered veil of peace that existed following the end of the last war. Protests have already broken out around the world, demanding resignations and justice for the soldiers sent to early graves for no reason, and the world has been shaken to its core once more. It is unlikely that any government involved in the fighting will quickly regain its people's trust.\n\nThe death toll is currently unknown, but with modern weapons used in this fight being far more lethal than those used previously estimates are high. At the start of this war, it was assumed that it would result in the collapse of either the capitalist or communist systems. Now it appears that both may be dragged away in the fury of Earth's remaining citizens, and no one believes that any of this was truly worth it."
  UN_War_Exhaustion.9.A: "The free world remains, but the red shadow lingers."
  UN_War_Exhaustion.9.B: "No victory to claim, but the Union endures."
  UN_War_Exhaustion.9.C: "The guns fall silent, yet nothing has changed."

  UN_War_Exhaustion.10.t: "The War Goes On"
  UN_War_Exhaustion.10.d: "Despite our best efforts to make peace with our adversary, the stone-headed buffoons have blocked us at every turn. The enemy has called us 'pitiful cowards looking to cover up a surrender with a peace deal' and has stated that they will 'march on until Europe is freed from our tyranny'. In fact, they immediately released the deal to the press, calling the terms we stated absurd, the stories we told false, and using it as an example of our alleged evil.\n\nWith our best and most fair efforts having failed, this bloody fight must continue - for the time being - until one or both of us has bled dry. Collective groans reverberate from the frontlines to the home front as our army and citizens, who had hoped that this war would end and their families would be reunited, were disappointed once more.\n\nWhile we are clearly disappointed by this missed opportunity, we must not dwell on it; instead, this must be reframed as an energising moment for the entire country. We offered them peace, but the warmongers refused, and they will undoubtedly pay the price. We will drive them from this Earth, along with their oppressive ideology, no matter the sacrifices required, and make them cry for the day they could have simply shook hands with us! If they want to spill more blood in a foolish defence of their 'ideals', we will grant their wish!"
  UN_War_Exhaustion.10.A: "Once more unto the breach, dear friends, once more!"

  UN_War_Exhaustion.11.t: "Phase [?war_exhaustion_current_tier] of [THIS.GetWorldWarThreeOperationName]"
  UN_War_Exhaustion.11.d: "[THIS.GetWarExhaustionUnlockTierDescription]"
  UN_War_Exhaustion.11.A: "[THIS.GetWarExhaustionUnlockTierOption]"
  su_war_exhaustion_unlock_tier_description_1: "Our final struggle to achieve European communism and free the international proletariat from capitalist oppression has begun. However, we must act quickly to prevent the capitalists from unleashing their full industrial and manpower might, as well as from placating our own population, which has been scarred, exhausted, and bruised by war. Thus, each Phase of Red Dawn must be completed within 30 days to avoid the slew of negative consequences that could result from pushing a war-weary public to its limit.\n\nFirst, we must secure Western Germany. Our northern forces must capture the ports of Hamburg and Bremen in order to stymie enemy logistics and maintain control of Northwestern Germany. Frankfurt, Munich, and Stuttgart must be occupied in order to gain control of Southwestern and Central Germany, and our troops must then advance to Cologne and Saarbrücken, providing staging points for an invasion of France. Meanwhile, further south, our soldiers in Yugoslavia must capture Trieste in order to launch an invasion of enemy-occupied Northern Italy."
  su_war_exhaustion_unlock_tier_description_2: "The Red Army has successfully secured Western Germany, and Trieste has been captured, so it is time to launch a full-scale invasion of Benelux, France, and Northern Italy. Our troops must, as before, occupy the allotted cities within the next 30 days.\n\nOur troops pushing from Northwestern Germany must enter the Netherlands, occupying the capital of Amsterdam and the important and historical city of Rotterdam just south of it, which will open the road into Belgium when combined with our forces advancing from Frankfurt. Securing Brussels will open the road into Northern France, allowing us to completely bypass the Maginot Line. A subsequent capture of the cities of Reims and Amiens, the lynchpins of France's defensive line protecting Paris, will be required, followed by a full advance on the French capital.\n\nAt the same time, our forces must capture the city of Rouen, followed by the key port of Le Havre, a staging ground for an invasion of Britain, and then move into Nancy and Strasbourg, eliminating the enemy's presence along the Franco-German border. Meanwhile, further south, our soldiers pushing from Trieste must capture Venice and Milan, securing our hold on Northern Italy, a task made easier by the strong communist support in the region's main cities. Following the capture of these locations, the road to Central and Southern Italy will be open."
  su_war_exhaustion_unlock_tier_description_3: "With Northern France and Italy secured, we must continue our advance with the goal of capturing all of France and Italy. If we succeed, the majority of continental Europe will be united under communism, while the capitalist powers will be driven out, either to their islands or to North America. However, if our current pace of progress does not continue, the public may soon turn against us.\n\nBuilding on our previous gains on the continent, we must seize the key ports of Cherbourg and Brest, which, along with Le Havre, will serve as staging grounds for the invasion of Britannia planned for Phase 4. At the same time, our troops must advance into Central and Southern France, securing Nantes, Bordeaux, Lyon, Tolouse, and the strategic Mediterranean port of Toulon. Meanwhile, in Italy, our soldiers must advance southward from the already-occupied northern part of the peninsula. The occupation of Florence is our primary goal, as it will pave the way to Rome. Following the fall of Rome, we must advance to and seize the port of Naples, securing the majority of the Italian peninsula for ourselves and local communists. "
  su_war_exhaustion_unlock_tier_description_4: "This is it. The last bastion of capitalist tyranny and oppression in Europe is the wretched island of Britannia, which is protected by the Royal Navy. If we successfully invade and occupy it, continental Europe will be largely united under communism. We must, as always, complete our objectives within a month. For, while our intentions may be good and pure, people are unwilling to sacrifice or persevere in the face of adversity.\n\nDuring our invasion of Britain, we must first secure the key ports of Dover, Portsmouth, and Cardiff before capturing London. Following that, a push northwards towards Birmingham, Manchester, and Liverpool should bring the British to heel; it is doubtful that they will be able to hold out for much longer once the entire south of their island has fallen to the Red Army. After that, victory. Victory over this vile capitalist oppressor who has kept our working brothers and sisters in western Europe in servitude for so long and has sought to destroy our flourishing socialist paradise. "
  un_war_exhaustion_unlock_tier_description_1: "With Operation Unthinkable approved, we have established a list of objectives that must be captured within the next month in order to appease our and our allies' war-weary, exhausted publics while also putting the USSR on the back foot. After all, war can only produce so many grieving mothers and widows before domestic issues arise.\n\nTogether with our allies, we must capture Berlin, Germany's symbolic and administrative centre, as well as Rostock and Stettin, critical northern ports for resupply and naval operations. At the same time, Dresden, a major transportation and industrial hub, must be taken control of. Prague and Brno, two major Czech cities and pillars of Central European control, as well as the Soviet defences in Czechoslovakia, must be captured. Finally, Vienna represents a cultural and logistical stronghold that must be captured in order to demoralise the enemy.\n\nIf we do not successfully capture these cities, the Soviet defences will hold, slowing our advance and allowing the USSR to continue rushing reinforcements to the frontline, risking the end of our offensive. At the same time, it will send a signal that bomb-shattered Europe is in for another long war, possibly more devastating than the last."
  un_war_exhaustion_unlock_tier_description_2: "So far, Operation Unthinkable has been a huge success, with phase one completed. We now control the vast majority of Eastern Germany, as well as key points in Czechia and Austria. With the UN forces' sweeping success, the public at home has remained placated. The public opinion is, if not supportive, at least compliant with the fact that we are fighting another major European war so soon after the last one. Now, as we enter phase 2, we must maintain the pace of progress and strip the USSR of more of its holdings on the European continent.\n\nThe primary goal of this phase is clear: to free Slovakia, Hungary, Poland, and Yugoslavia from Soviet control. The cities marked for capture must be taken within the next 30 days. Danzig, Warsaw, Lodz, and Krakow, all important industrial, logistical, and cultural hubs, must be secured to cripple the enemy's logistical and production capabilities. To the south, Budapest and Debrecen are key strongholds in Hungary that, once captured, will anchor our advance and pave the way for larger liberation efforts in Central and Southern Europe. Bratislava serves as Slovakia's gateway and must be secured immediately in order for Czechoslovakia to be fully liberated. Further into the Balkans, Zagreb and Sarajevo are the lynchpins of the USSR's southern defence lines, and must be captured to open the road to the Yugoslav capital of Belgrade."
  un_war_exhaustion_unlock_tier_description_3: "With Czechoslovakia fully liberated and the majority of Hungary, Poland, and Yugoslavia liberated, we must now move eastward. In the north, towards the Soviet-occupied Baltic states and Byelorussia; in the south, towards the newly socialist countries of Bulgaria and Romania, as well as occupied Ukraine. Securing these territories will force the USSR out of most of Southern Europe.\n\nWithin the next 30 days, our troops in the south must capture Sofia, Bucharest, and Iasi, securing the majority of Bulgaria and Romania for the UN while pushing Soviet troops away and towards Ukraine. In the North, we will advance from Poland and capture Vilnius, Minsk, and Lviv, which are the cornerstones of Soviet defences in the Western USSR, as well as important Lithuanian, Byelorussian, and Ukrainian cities.\n\nFrom there, we must advance through the Baltic states, securing the Latvian and Estonian capitals of Riga and Tallin, whose port infrastructure will make resupplying our forces much easier. At the same time, we must advance deeper into Ukraine, liberating the Ukrainian capital of Kyiv as well as seizing control of Kharkiv and Sevastopol - the former serves as a springboard for offensives into Russia, while the latter secures the UN's hold on Crimea."
  un_war_exhaustion_unlock_tier_description_4: "This is it. The final push. If we succeed in this new offensive, the dying Soviet Union will be defeated for good, and communism will be eradicated from the face of the European continent. The Russians will be liberated from their own people, and the remaining SSRs of the Union will finally gain independence as this communist parasite burns around them. The next month will determine Europe's fate.\n\nWithin the next 30 days, we must first capture Smolensk and Rostov, both key Soviet logistical centres and staging grounds for an advance deeper into European Russia and the Caucasus. From there, the Caucasus Front must capture Stalingrad, securing its flanks, before capturing Maikop, which will open the road to Baku. If Baku falls, the USSR will be deprived of critical oil production to fuel its war machine, and the United Nations will seize control of oil resources sufficient to keep the war going for many years. Meanwhile, troops advancing from the Baltics must capture Leningrad, cutting off the USSR's real access to the Baltic Sea, before all troops arrive in Moscow. If Moscow falls, Unthinkable will have been completed in its entirety."
  su_war_exhaustion_unlock_tier_option_1: "The spirit of the Soviet soldier is unbreakable!"
  su_war_exhaustion_unlock_tier_option_2: "We will soon be marching on the Champs-Élysées!"
  su_war_exhaustion_unlock_tier_option_3: "Victory is at hand!"
  su_war_exhaustion_unlock_tier_option_4: "The capitalists will beg for mercy when we take London."
  un_war_exhaustion_unlock_tier_option_1: "Our troops must begin the advance swiftly!"
  un_war_exhaustion_unlock_tier_option_2: "With the help of God, we shall succeed!"
  un_war_exhaustion_unlock_tier_option_3: "We mustn't falter now!"
  un_war_exhaustion_unlock_tier_option_4: "One final push!"

  # Hoover Commission Events
  UN_Hoover_Commission.1: "Hoover's Mission is Completed"
  UN_Hoover_Commission.1.d: "Former President Herbert Hoover landed in Washington, D.C. today to great fanfare and a moderate crowd, mostly of press and diplomats, declaring his mission to restore economic stability to our allies a success. Indeed, wherever he and his Hoover Commission travelled, there appeared to be a great industrial revival shortly after, with water, food, and hygiene finally returning to many of the world's starving, war-torn populations. Those populations would then return to work in factories using brand new, cutting-edge tools and resume their normal lives.\n\nThese economic near-miracles prompted friendly leaders from around the world to sing praises for our once-disgraced President, ecstatic that their countries are once again on track to be bastions of capitalism and pinnacles of sheer human will. With their countries finally out of the woods and rebuilding after the utter devastation wrought by the war, we only have Hoover to thank for repairing our allies, especially in the face of our newer enemies who eye them like hawks.\n\nNobody could be happier with the turnout than Hoover, who thanked the world for graciously accepting his and his team's economic ideas in a speech before that same crowd of diplomats and press. Privately, he has expressed gratitude that he will be remembered for something other than being President during the 1929 stock market crash."
  UN_Hoover_Commission.1.A: "A reputation restored along with our allies."

  UN_Hoover_Commission.2.t: "The Accounts Run Empty"
  UN_Hoover_Commission.2.d: "\"What?\" Oliver roared into the phone. \"Are you kidding?! This is a critical mission; do you realise how many people rely on us to repair their roads, farms, and provide water to their children?!\" Akemi's love rambled on furiously, his Boston accent thickening with each word - she'd never heard him so angry, but it was his desire to help others that had won her over.\n\nThe two had met in Japan a few months ago, when the Hoover Commission, which included Oliver, a talented economist handpicked by the former President, paid a visit to her village, restoring dying farmland, providing modern tools to local industries, and rescuing her family from bankruptcy. As one of the few people there who spoke English, she served as a guide, and given how well their personalities matched, it was only a matter of time before Oliver and her fell in love.\n\nShe begged to accompany him to see the same economic miracles elsewhere, and despite the sneers their relationship elicited from the others, Oliver fought until she got her way. Now, in Paris, the dream was dying. Insolvency had struck the Hoover Commission, which had saved so many lives, including her family's. If the United States government does not sort out their finances soon, they will all be sent packing. Akemi knew firsthand how much the people needed them; however, the mission was likely to fail."
  UN_Hoover_Commission.2.A: "It can't be over."

  UN_Hoover_Commission.3: "At Least You'll See Boston"
  UN_Hoover_Commission.3.d: "Oliver re-entered the hotel room, his eyes drooping so low that Akemi couldn't tell if he was drunk or exhausted - probably both. But he looked like a walking corpse, which told her exactly what she feared. It was 3 a.m., and the moonlight shone through the windows into their suite, but Akemi's stress kept her awake as she waited for him to finish his meeting.\n\n\"... so...?\" She murmured. \"I argued with those Washington fatcats for what, eight hours straight? They won't budge. They claim that the country has no money to give; that attempting to bail us out would result in an unnecessary deficit and exacerbate the situation. They practically laughed at me when I mentioned the families who needed us.\"\n\n\"So it's over, then?\" She sighed disdainfully. He sat at the foot of the bed, head in his hands. \"Yeah. The rest of the guys have already packed.\" Akemi slowly stood up, only to sit next to him and place a hand on his shoulder. \"I understand. But we did our best. It's beyond our control. You saved me, didn't you? And now I'll get to see your Boston alongside you.\""
  UN_Hoover_Commission.3.A: "A lost opportunity."

  UN_Hoover_Commission.4: "Hoover Commission Begins Work"
  UN_Hoover_Commission.4.d: "Former US President Herbert Hoover landed by plane in the capital as part of the Hoover Commission, a group of multinational businessmen and economists tasked with assisting the nation in rebuilding from the horrors inflicted on it during the war. Many of our citizens are looking forward to the expected economic revival brought about by the promise of clean drinking water, hygiene, and modern industrial tools.\n\nThe Commission's team comes from diverse backgrounds and has extensive experience with a wide range of topics. This Commission's knowledge of global economic systems and expertise will undoubtedly allow us more room for industry, a more streamlined and effective economy, and faster economic growth to return to where we were before the war - not to mention reach new heights with the cutting-edge technology that has been unveiled since then.\n\nTheir assistance is critical and much needed; we must be grateful that the United Nations has decided to provide us with their best, but also sad that our circumstances are bad enough to warrant such things in the first place. Our population suffers from a destroyed economy, fields have been burned by bombs, and traumatised young men, who were once soldiers, are now struggling to adjust to civilian life."
  UN_Hoover_Commission.4.A: "Didn't that guy fail to prevent the Depression?"


  ######################################################################
  #  United Nations Focuses
  ######################################################################

  UN_Assemble_the_United_Nations: "Assemble the United Nations"
  UN_Assemble_the_United_Nations_desc: "Due to the state of emergency surrounding the situation with the Soviet Union, we are forced to convene the first UN Assembly in order to ensure Europe's peaceful future and prosperity while also protecting it from the impending Red Threat. The peoples of Europe, recently liberated from Nazism by our valiant troops, are optimistic about their free future, and it is our responsibility as a democratic shield for the entire world to protect them from any threats. We cannot allow Stalin to infect the Old World with communism!"
  UN_Expel_the_Soviet_Union: "Expel the Soviet Union"
  UN_Expel_the_Soviet_Union_desc: "Stalin, who tried to violate the sovereignty of an independent and free Finland before the Soviet Union was expelled from the League of Nations, is now attempting to disrupt peace throughout Europe by spreading communism's influence to Europe's independent peoples. The Soviet Union now poses a greater threat to Europe than it did half a decade ago, and we must expel the Red Monster from the UN. This will be the primary focus of the upcoming resolution before the UN Security Council."
  UN_Create_the_Hoover_Commission: "Create the Hoover Commission"
  UN_Create_the_Hoover_Commission_desc: "It is worth noting that during the war, a slew of problems arose within the United States. During the years of isolation and crises, the United States' bureaucratic and managerial system has weakened, rendering it incapable of effectively conducting both internal and external political affairs. In this regard, the President issued a decree establishing the Commission for the Organisation of the Executive Branch of Government, also known as the Hoover Commission, in honour of Herbert Hoover, who was appointed head of the commission and a good politician and government agency organiser. We must be prepared to implement government reforms in order to demonstrate to other countries that the United States will not abandon its position as a global hegemon!"
  UN_Preparing_the_Sling: "Preparing the Sling"
  UN_Preparing_the_Sling_desc: "The Second World War was mankind's bloodiest conflict. Europe is half in ruins, people beg for food wherever they can, and many cities have begun to eat rats. The Old World has been ravaged by war and is waiting for its redemption. The United States should not remain silent and watch from the sidelines. Our strategic allies must recover quickly from this terrible apocalypse. We must spare no expense in rebuilding Europe's countries and cities. We urgently need to create a plan to provide emergency recovery assistance to European countries!"
  UN_The_Race_to_Rebuild: "The Race to Rebuild"
  UN_The_Race_to_Rebuild_desc: "With our new course aimed at supporting allied countries in Europe in the UN Assembly, we are obligated to provide them with all possible assistance, including financial aid. We have requested that the presidential administration develop a number of plans and financial operations to assist Western European countries in their recovery on a structural basis. We must not spare any US funds to assist our allies, because their recovery is dependent on their ability to withstand the Soviet threat. Furthermore, the fact that they have future economic obligations to us will help keep our European partners in check and within our sphere of influence."
  UN_Our_Continental_Allies: "Our Continental Allies"
  UN_Our_Continental_Allies_desc: "France has always had a close relationship with the United States. They supported us in our wars and provided economic and political assistance in difficult times, just as we did for them. We saved the French during both World Wars. It's their turn to assist us. France should become the United States' main continental ally. It is foolish to deny that there is still some tension between us and the UK, but France has always been very loyal to us. We now need to ensure that they are faithful. We need to send a letter to the French president with an offer that they cannot refuse."
  UN_Combat_the_Rising_Red_Tide: "Combat the Rising Red Tide"
  UN_Combat_the_Rising_Red_Tide_desc: "Despite all of our efforts, the USSR's influence in Europe remains enormous, particularly in France. France has always been an unstable country, but the Presidents of the French Republic's inept and ineffective policies make the situation even more dangerous and susceptible to our influence. It has long been clear that the Soviet secret services have established a presence in France. We cannot allow another revolution in France and the loss of such an important ally. We must secure our rear before the USSR initiates military action against us."
  UN_Rescue_Anglo_French_Finances: "Rescue Anglo-French Finances"
  UN_Rescue_Anglo_French_Finances_desc: "Great Britain and France remain our main continental allies, and we must actively support them politically and financially in order to maintain our influence in these countries. Trade with them provided significant benefits to the United States during the war, and we must strengthen these ties. These two countries are strategically important to us, and we must actively pursue their restoration. We must provide large sums of money to these allies so that they can rebuild their economies as soon as possible, become fully functional members of the United Nations, and regain their political strength while consolidating it with their economic might."
  UN_Apply_the_Bretton_Woods_System: "Apply the Bretton Woods System"
  UN_Apply_the_Bretton_Woods_System_desc: "The United States is entering a new era of economic and political hegemony. We need to strengthen our position as the world's largest economy and currency. Our administration has created a new draft of the Bratton Woods system, which values all currency processes and international trade transfers in relation to the dollar, and the dollar and its price will be determined by the fixed price of gold. This will improve the economic situation of all democratic countries that join this monetary system. This system will also allow us to better allocate our resources to support the European Recovery Programme."
  UN_Enlist_American_Charities: "Enlist American Charities"
  UN_Enlist_American_Charities_desc: "The wealthier a society, the more philanthropy it possesses. This is a normal influence, and the United States was able to establish a large number of charitable organisations during its economic expansion thanks to our brilliant economic policy during the war. These organisations have demonstrated their utility, and we can fully rely on them to help us carry out our plan to rebuild the economies of our European allies. They will be unable to decline our offer of collaboration between their organisations and the US government, and their financial support will greatly assist us in attracting humanitarian and economic assistance to the people of Europe."
  UN_Plant_New_Victory_Gardens: "Plant New Victory Gardens"
  UN_Plant_New_Victory_Gardens_desc: "Our Victory Gardens policy during the Great War, as well as the postwar food supply, proved to be successful. Now, given our other European goals and plans, we can apply the same scheme. This will be an effective propaganda tool, as well as a great way to tie European countries' support to the United States, making them more reliant on us and our policies. We must expand existing victory gardens and establish a number of new ones using new breeding plants to boost food production and crop quality."
  UN_Avert_Despair: "Avert Despair"
  UN_Avert_Despair_desc: "The European population is in despair. People survived the war, but the majority of them have no homes or money to feed themselves or their families. Our task is to assist them. In addition to the economic assistance measures taken for European countries, we must also provide humanitarian aid to Western European residents. This will not only increase our authority in the eyes of the European population, but it will also accelerate economic development and the average income of the European population once the countries' economies resume operations."
  UN_Reignite_the_Ruhr_Industrial_Zone: "Reignite the Ruhr Industrial Zone"
  UN_Reignite_the_Ruhr_Industrial_Zone_desc: "The Ruhr Industrial Zone has been one of the largest and most profitable industrial areas since the Industrial Revolution. Unfortunately, it was partially destroyed by bombing during the war. This is a strategically important area, and we must restore it as soon as possible. We must allocate funds from the state budget and the investment fund for the modernisation and restructuring of this significant industrial complex. Steel from the Ruhr basin will help many European countries overcome material shortages and restore their own production."
  UN_Together_for_Victory: "Together for Victory!"
  UN_Together_for_Victory_desc: "We have emerged as a global hegemon and a beacon of hope for the people of Europe. We helped Europe recover, established the United Nations, and implemented numerous democratic reforms. European nations have once again entered a period of prosperity, and charitable foundations and large industrial corporations in the United States are helping to develop all sectors of the allied countries' economies. We are now a global luminary and a symbol of the people's struggle for democracy and freedom. The United States, along with the rest of the free world, is prepared to enter a new and wonderful world! We have become the spearhead of the democratic world against Bolshevism!"
  UN_Addressing_Our_Own_Sins: "Adressing Our Own Sins"
  UN_Addressing_Our_Own_Sins_desc: "To successfully confront the world's evil, you must first resolve and absolve your own past sins. Colonialism became the primary sin of European countries in the late nineteenth and early twentieth centuries. If we want to create a new, free American world, we must address colonialism once and for all. Colonialism not only destabilises the situation within UN member countries, but it also necessitates significant resource expenditures for the development and maintenance of control over territories in Africa and the Middle East. It is clear to us that the next UN meeting will focus on resolving the issue of colonialism with metropolitan countries such as France and the UK."
  UN_Their_Last_Obligation: "Their Last Obligation"
  UN_Their_Last_Obligation_desc: "Great Britain and France are now defenders of liberty and stand with us. However, if they want to maintain their status, they must accept more responsibility and meet all of their obligations. The last of these is the obligation to decolonise their overseas possessions, specifically the abolition of all protectorate mandates in the Middle East, where Arab peoples have long been oppressed by colonisers."
  UN_Abolish_Mandates_and_Protectorates: "Abolish Mandates and Protectorates"
  UN_Abolish_Mandates_and_Protectorates_desc: "Finally, the Arab world's countries will be treated equally as members of a free civilisation alongside their former European colonisers. By signing a new draft UN resolution, we will finally put an end to European despotism on the Arabian Peninsula and the Middle East. Of course, we will not abandon these lands' resource base, because oil has proven to be critical in twentieth-century military operations. According to secret protocols, the UN countries' monopolist companies must continue mining activities on these lands."
  UN_The_Crown_Jewel: "The Crown Jewel"
  UN_The_Crown_Jewel_desc: "For many years, India suffered under the heel of the British colonialists. An exhausted and impoverished population with no social or financial development institutions, a destroyed industry, and forced participation in two World Wars all demonstrate that the issue of Indian decolonisation must be addressed as soon as possible. There is no doubt that the British Crown must acknowledge the demands for decolonisation. British India demonstrated its maximum instability as a result of exhaustion. The fact that Britain has relied on these lands for so long demonstrates its weakness. During the war with Japan, Azad Hind groups attempted to subjugate all of India, so communist cells could infiltrate India and attempt a coup. It is better to protect yourself by leaving India but keeping some international organisations within it. However, it would be a shame if India shifted to the socialist camp."
  UN_Discuss_Decolonization: "Discuss Decolonization"
  UN_Discuss_Decolonization_desc: "Despite the efforts of the United States and the UN mission to decolonise the former possessions of European metropolises, the African continent remains far from complete liberation. Colonialism has spread too far in African countries. Our goal is to accelerate the continent's liberation from colonial rule. The liberation of African countries must come from above, not below; otherwise, the continent's communist movements and the socialist camp as a whole will be strengthened even further."
  UN_Expanded_Citizenship: "Expanded Citizenship"
  UN_Expanded_Citizenship_desc: "If we force the peoples of colonial possessions to serve for the benefit of their cities and the fight against communism, we must entice them to join the ranks of the UN army. Expanding the opportunities for residents of colonies to obtain UN citizenship and simplifying these processes through preferential services will aid military families' integration into European society. Of course, the metropolises are also interested in expanding their sources of cheap labour in order to rebuild the industry and economy that were destroyed during the war."
  UN_Once_More_Unto_the_Breach: "Once More Unto the Breach"
  UN_Once_More_Unto_the_Breach_desc: "Our policy and position on the colonies has proven to be excellent; we have been able to improve the quality of the UN armed forces, allowing us to continue developing our operations and new doctrine without fear of a lack of natural and human resources for our army. We have maintained our position as the primary defender of freedoms and human rights, and we have been able to wash away the transgressions of our metropolitan allies. Slavery, colonialism, and any form of human rights restriction will be unacceptable in the new world that we will build from the ashes of the old! We're one step closer to mankind's victory over the red devils!"
  UN_Sidestep_the_Issue: "Sidestep the Issue"
  UN_Sidestep_the_Issue_desc: "The possession of overseas territories by the United Kingdom and France brings both a large number of challenges and a large number of benefits. The colonies' human and natural resources are enormous, and we should not underestimate their importance to the economy and the modern state of the metropolises. Of course, some problems, such as those in British India, require immediate attention and cannot be ignored. However, we believe that we can avoid the rest of the issues because the benefits outweigh the costs. All of our resources and efforts must be directed towards combating global communism, so we will postpone the issue of complete decolonisation for the time being."
  UN_Colonial_Recruitment_Fund: "Colonial Recruitment Fund"
  UN_Colonial_Recruitment_Fund_desc: "Overseas colonies can assist United Nations joint forces in replenishing their workforce, logistics, support services, and even ordinary soldiers. This will help us expand our workforce and replenish losses at a rapid pace. Of course, this will have a negative impact on soldiers' combat capabilities and the stability of African colonies, but massive human resources are required to fight the USSR, and we should not pass up the opportunity to replenish cheap recruits from Africa."
  UN_Preparing_the_Rock: "Preparing the Rock"
  UN_Preparing_the_Rock_desc: "The more we deal with the issue of defending Europe from the global evil of communism and studying our adversary in the form of the Soviet Union, the more we realise that a diplomatic solution to this cold war may not ensure world peace and European harmony. It is becoming clear that the United Nations need to prepare for war against the Red Monster. Whether we're defending our lands or attacking the beast's lair, the United Nations Joint Staff must resolutely resist the USSR; for this purpose, a headquarters for free world troops will be established, and work on an operation plan codenamed The Unthinkable will begin."
  UN_United_High_Command: "A United High Command"
  UN_United_High_Command_desc: "Following our recent decision to take all necessary measures to confront the red beast, including the most radical, such as direct military intervention, the organisational issue must be addressed. The free world should present a united front against the USSR; the United States should only become the centre of the world, not the front. We should propose and sign a draft resolution establishing joint bodies within the United Nations to address military issues and future conflict planning. Only by combining the forces of the most experienced Allied generals who have been through all of the difficulties of the war will we be able to develop a reliable operation plan."
  UN_Arms_for_Free_Europe: "Arms for Free Europe"
  UN_Arms_for_Free_Europe_desc: "If we are to confront the USSR, we must ensure that the UN economy is competitive enough to defeat the Soviet Union. The war demonstrated that modern-day wars are economic and industrial conflicts between countries competing to produce as many artillery shells, tanks, and rifles as possible. The US economy can freely compete with the USSR's economy, whereas the economy of war-torn Europe is in disarray. We will not be able to completely restore European countries' production capacities before the start of Operation Unthinkable. We must introduce and integrate European enterprises into our military-industrial complex, increasing weapon production and supply to our allies."
  UN_Unified_Allied_Doctrine: "Unified Allied Doctrine"
  UN_Unified_Allied_Doctrine_desc: "The UN commanders' headquarters should set a standard for the entire world. The invaluable experience gained by American, French, and British commanders during the war should be used to develop a new unified military doctrine. Our army must learn to resist the Red Army's military doctrine. Who knows, maybe the former German and Italian generals will be willing to help us develop a new doctrine against the USSR in exchange for their freedom?"
  UN_Master_the_Jet_Engine: "Master the Jet Engine"
  UN_Master_the_Jet_Engine_desc: "With the advancement of rocket technology at the end of the war, it was clear that jet engines were the future of the entire aviation industry. Jet engines enable unprecedented speed in seconds and the ability to carry more weapons, as well as a significant increase in flight range. It became clear that whoever had the upper hand in the air would also have the upper hand on the ground. We have already demonstrated the potential of our first jet aircraft models in the air, but we must also recognise the importance of assisting other UN countries in modernising their aviation, which will allow us to improve coordination and, as a result, the combat effectiveness of our aviation regiments in the upcoming fight against the USSR. The United States' current mission is to assist European countries in establishing their own jet aircraft engineering schools, with the assistance of our scientific experts."
  UN_The_Torch_Group: "The Torch Group"
  UN_The_Torch_Group_desc: "Following the establishment of our economic and technological cooperation within the United Nations, it became clear that the united mission of democratic nations should bring scientific light to all countries in our alliance. We can now confidently state that the unification of UN member states' research institutes is only a matter of time. We should begin developing such a project in order to include as many countries as possible and to bring together as many European scientific luminaries as possible for a joint fight against the Red Menace!"
  UN_Dust_Off_German_Designs: "Dust Off German Designs"
  UN_Dust_Off_German_Designs_desc: "With the advancement of the aviation industry, there is an opportunity to create a completely new type of equipment: helicopters. We greatly appreciate Sikorsky's cooperation in helping us create the first working single-rotor helicopter and even try to introduce it into the US Army. However, the world is rapidly developing, and progress does not stop. We discovered that the Germans were also developing helicopters, albeit for military purposes. We are extremely fortunate that these drawings and developments did not fall into the hands of the Communists. We must draw on the expertise of German scientists to develop fully combat helicopters for military use."
  UN_Reinforce_the_Stimson_Doctrine: "Reinforce the Stimson Doctrine"
  UN_Reinforce_the_Stimson_Doctrine_desc: "The Stimson doctrine was once a symbol of hope for a free China to assist in their fight against militaristic Japan, and it was the first indication that the United States was emerging from international isolation. Now, this doctrine will serve as evidence that, even two decades later, the United States has not changed its stance towards any country that threatens the independence and freedoms of peaceful peoples around the world, whether it is militaristic Japan, Nazi Germany, or the communist Soviet Union. We must demonstrate that we do not recognise the Soviet Union's territorial expansion in Europe and are prepared to defend the interests of governments in exile."
  UN_Rally_the_Exiles: "Rally the Exiles"
  UN_Rally_the_Exiles_desc: "The Soviet threat concerns people all over the world, and it is not true that all Russians accepted Soviet power; the Russian Liberation Army fought for the Motherland's independence for four years. Of course, they fought alongside the Nazis, but no one is stopping us from giving them amnesty and admitting them to the ranks of the US army. Their expertise will be invaluable to us. Many other organisations and governments in exile are waiting in the wings, and we can take advantage of this by offering them all possible assistance in their fight against the Red Menace."
  UN_Redrawing_the_Maps: "Redrawing the Maps"
  UN_Redrawing_the_Maps_desc: "We must provide not only material but also political support to the governments in exile. The USSR seized vast territories in eastern Europe and established loyal socialist governments that we do not consider legitimate. We must boldly declare our position on any territorial encroachment on the lands of a free Europe, rather than showing weakness in the face of communism. We must reassure the governments in exile that we support the return of their ancestral lands and the fulfilment of their interests."
  UN_Offer_Redemption: "Offer Redemption"
  UN_Offer_Redemption_desc: "Despite the widespread fear and Germanophobia that has gripped European countries since the end of the war, Germans have invaluable experience from the war with the Soviet Union that we can use in our future crusade against communism. Not all Nazi officers were prosecuted, so we must include them in our operation. We can also grant amnesty to those currently in custody. German statehood, if restored under our watchful eye, will be of great assistance. We will have to spend a lot of money to rebuild German government structures and normal life in a destroyed country, but it is well worth it."
  UN_Contain_the_New_Germany: "Contain the New Germany"
  UN_Contain_the_New_Germany_desc: "Chauvinism and Germanophobia, which emerged in society following the war, give us no right as defenders of the democratic world to restore Germany to its former form. However wee cannot destroy the German nation and state; otherwise, the outcome will be identical to that of the Versailles Agreements. We must make efforts to contain and restore Germany's society, as well as to integrate Germany into UN structures, as it will be an important ally in the liberation army that will fight the Soviet Union."
  UN_No_Step_Back: "No Step Back!"
  UN_No_Step_Back_desc: "We have worked hard to coordinate joint bodies for military, economic, political, and technological cooperation. We have demonstrated to the rest of the world that the United States is and will continue to be the global hegemon and beacon of freedom. The United Nations' military and political leaders are better prepared than ever. The world is now closer than ever to resolving the final conflict between superpowers. After coming this far, we will be able to declare a complete victory for democracy around the world. All peoples will live in peace, harmony, and prosperity, even if it means paying an unthinkable price. There's no turning back. The world must finally fight back against the Red Monster, freeing the GULAG country from communism. Let us go on the final crusade against Bolshevism!"

  ######################################################################
  #  United Nations Ideas
  ######################################################################

  # National Spirits
  UN_The_Hoover_Commision: "The Hoover Commission"
  UN_The_Hoover_Commision_desc: "The new Hoover Commission, led by former US President Herbert Hoover and inspired by the previous America-only iteration of the commission, includes Herbert Hoover as well as a team of skilled economists and businessmen with the goal of improving economic health in the countries to which they travel.\n\nThis venture, which is directly funded by the United Nations' leading country, is certain to bring prosperity and better land use to the world's free nations. Hoover's experience, combined with the large sums of money provided by the United Nations, will undoubtedly result in a much better economy for the nations blessed by the Commission. The benefits will be obvious and immediate in every country it expands into, creating new opportunities for industry to grow and thrive.\n\nWith the Great Engineer himself advising on the economies of these many nations, the world will surely never experience another Great Depression."
  UN_Financing_the_Marshall_Plan: "Financing the [THIS.GetMarshallPlanName] Plan"
  UN_Financing_the_Marshall_Plan_desc: "The Marshall Plan, also known as the European Recovery Plan, can be described as a massive care package for Western Europe's ruined nations, put together by America to fund their recovery from Nazi Germany's oppression and bombings. In short, it will help rebuild European regions, modernise their industries, and boost trade, all while preventing communists from infiltrating America's allies.\n\nHowever, such a large-scale economic recovery program requires significant funding. As a result, the Marshall Plan is currently being funded before it can be implemented. Hopefully, when it is completed, this endeavour will be remembered as an important step in bandaging Europe's many scars."
  UN_Titan_of_Europe: "Titan of Europe"
  UN_Titan_of_Europe_desc: "As we fight one last time across the Atlantic with our allies, one thing is clear: this is more than just a battle for democracy; it is a battle to establish ourselves as our continent's true leaders. After the war with the Soviet Union ends, America will return to isolationism and leave Europe's fate in our hands. Indeed, we will have direct control over many of Europe's struggling nations.\n\nWe will be like shepherds, our neighbours like sheep, guiding and herding our continent away from the radical forces of communism and fascism. With directions from Paris, Europe will enter a new era of prosperity. France will be her continent's Titan, an unwavering protector who will prevent our brothers from suffering the same fate as we did."
  UN_Europe_Direct_Rule_from_Paris: "Direct Rule from Paris"
  UN_Europe_Direct_Rule_from_Paris_desc: "With America preparing to withdraw from the world once the war with the Soviets is over, we are left ravaged by the horrors of the previous world war, looking for a guide and protector in an increasingly lonely world. Fortunately, a nation has already volunteered to take America's place and has its support: France.\n\nIndeed, after being war-torn and occupied, France has recovered to become one of Europe's strongest postwar nations, and they have chosen to export their prosperity to us. While some of our population is concerned about the French's influence over us, believing that we have been reduced to little more than a satellite, the benefits far outweigh the drawbacks."
  UN_Europe_Fruits_of_the_Hoover_Commision: "Fruits of the Hoover Commission"
  UN_Europe_Fruits_of_the_Hoover_Commision_desc: "The new United Nations-sponsored Hoover Commission, led by former US President Herbert Hoover and inspired by the earlier America-only commission, includes Hoover as well as a team of skilled economists. They travel to countries devastated by the war with the sole purpose of reviving their economies. This country is currently being helped by the Commission, which will undoubtedly provide it with numerous benefits. Smoother governmental processes, better land management, improved industrial health, exponential industry success, and many other benefits are expected.\n\nThe fruits of the Hoover Commission can already be seen: business is booming like never before, and the country is finally regaining prosperity. People across the country are happier as a result of the faster processes, most notably Hoover, who is far more excited to be remembered for something other than being President when the Great Depression first struck."
  UN_IBRD_Receiving: "IBRD"
  UN_IBRD_Receiving_desc: "The IBRD, or International Bank for Reconstruction and Development, was established alongside its more well-known counterpart, the International Monetary Fund, to assist European nations devastated by the war. Its noble purpose is not without equally noble goals; with enough support, the IBRD may be able to assist developing nations outside of Europe in the formation of new modern countries, and, hopefully, new democratic allies. It would be critical for the growth of infrastructure, industry, and even public health. \n\nThis country is currently receiving financial assistance from the IBRD, which should benefit it in a variety of areas, including infrastructure and electricity, resource management and collection, and even public access to water and hygiene - depending on its specific situation."
  UN_IBRD: "IBRD"
  UN_IBRD_desc: "The IBRD, or International Bank for Reconstruction and Development, was established alongside its more well-known counterpart, the International Monetary Fund, to assist European nations devastated by the war. Its noble purpose is not without equally noble goals; with enough support, the IBRD may be able to assist developing nations outside of Europe in the formation of new modern countries, and, hopefully, new democratic allies. It would be critical for the growth of infrastructure, industry, and even public health. \n\nHowever, in order to provide loans to a world in desperate need, the IBRD must first obtain cash. As a result, members of the United Nations are donating whatever they can to fund and bring this endeavour to fruition, allowing it to fully achieve its objectives."
  UN_Marshall_Plan: "The [THIS.GetMarshallPlanName] Plan"
  UN_Marshall_Plan_desc: "America has decided to assist their allies in Europe in rebuilding to their former prosperity and greatness prior to the war. As a result, the American Congress has organized a new Act based on a speech delivered by General George Marshall. Known by a variety of names, including the Foreign Assistance Act, the European Recovery Program, and, more broadly, the Marshall Plan, it is expected to provide billions of dollars to repair the devastation caused by the Nazis while also preparing Europe's many democracies for potential future invasions.\n\nThe money given has already had a positive impact on the economy and policy of this country. Places that were bombed to near oblivion have begun to recover, trade has begun to flow more freely, workshops and businesses have never been more modern, and, perhaps more secretly, the popularity of various communist parties has dropped dramatically."
  UN_Morgenthau_Plan: "The [THIS.GetMarshallPlanName] Plan"
  UN_Morgenthau_Plan_desc: "Germany and its people must be severely punished for their misdeeds! For the second time in but a few decades, they have brought massive destruction and death to the European continent, and the victims who are still alive yearn for justice. And justice they shall get.\n\nBased on Henry Morgenthau Junior's plan, we will ensure that Germany pays a high price for its misdeeds while also repairing Europe's broken economies. By removing Germany's tools from its workers and shipping its industry out in large numbers to those who suffered the most, we will help their industries rebuild to where they were prior to the Nazi onslaught, all while ensuring that Germany will never, ever rearm again."
  UN_Steel_from_the_Ruhr_1: "Steel from the Ruhr"
  UN_Steel_from_the_Ruhr_1_desc: "One of Germany's most important industrial strengths is located in the west: the Ruhr. The Ruhr is an economic powerhouse in its own right, contributing significantly to much of German industry due to the abundance of resources available. It produces nearly as much steel and coal as the rest of continental Europe combined within its small territory.\n\nDuring the war, the Ruhr greatly aided the Third Reich's arms industry by providing the necessary supplies to manufacture thousands of tanks, guns, and other tyrannical weapons. However, it may now serve a different purpose. Under democratic leadership and in alliance with the rest of its Western European brethren, the Ruhr will now provide Europe's democracies with the steel they need to arm their own legions - this time legions of freedom rather than hate. Whatever it is used for, having the power of the Ruhr's resources is a huge benefit to those who can obtain it."
  UN_Steel_from_the_Ruhr_2: "Steel from the Ruhr"
  UN_Steel_from_the_Ruhr_2_desc: "One of Germany's most important industrial strengths is located in the west: the Ruhr. The Ruhr is an economic powerhouse in its own right, contributing significantly to much of German industry due to the abundance of resources available. It produces nearly as much steel and coal as the rest of continental Europe combined within its small territory.\n\nDuring the war, the Ruhr greatly aided the Third Reich's arms industry by providing the necessary supplies to manufacture thousands of tanks, guns, and other tyrannical weapons. However, it may now serve a different purpose. Under democratic leadership and in alliance with the rest of its Western European brethren, the Ruhr will now provide Europe's democracies with the steel they need to arm their own legions - this time legions of freedom rather than hate. Whatever it is used for, having the power of the Ruhr's resources is a huge benefit to those who can obtain it."
  UN_Together_for_Victory_Spirit: "Together for Victory"
  UN_Together_for_Victory_Spirit_desc: "Our enlisted men and women, like their fathers during Europe's liberation in the war, feel a strong sense of righteousness and destiny in their crusade against the red menace from the East. Our soldiers will march on, as their fathers did during the fall of the Nazi regime in Germany, until the Soviet government collapses inward due to their own corruption and moral bankruptcy. Europe will no longer be under a tyrannical regime. Europeans will never be slaves, and we will see it so."
  UN_Spearhead_of_AntiBolshevism: "Spearhead of Anti-Bolshevism"
  UN_Spearhead_of_AntiBolshevism_desc: "What we face today as citizens of a free and democratic nation is possibly the greatest evil the world has ever seen. A corrupting, sickening ideology that transforms the working man's can-do spirit into a monstrous destroyer, seeking to replace order and peace with dictatorship and starvation - all in the name of 'real freedom'. It undermines citizens of all nations by attempting to brainwash them with false promises, lies about our free society, and hateful rhetoric directed at successful business owners.\n\nThis ideology is none other than Bolshevism, which was followed and exported by the great Eastern menace known as the Soviet Union. To prevent such a fearful, repulsive, and dangerous doctrine of belief from rearing its ugly head here, we must take measures in our political policy to stamp it out wherever it appears, and prepare to go on the offensive against it and its champion. The horrors of the Holodomor and everything else must never occur here!"
  UN_Unity_Leads_to_Strength: "Unity Leads to Strength"
  UN_Unity_Leads_to_Strength_desc: "Some dissenters may wish for our complete freedom and separation from the glorious empire under which we serve - but they overlook one point. Our peoples, working together within this great cultural union, have created and will continue to create an unstoppable force capable of defeating any foe who dares to oppose it. Currently, that foe is the Red Menace and its deplorable ideology, bolshevism. Their belief is that we should be forcibly separated from those who have lifted us up, shared their military, and protected us from external threats, even if we do not want to.\n\nWhen our brothers in the empire finally come to blows with this great evil, we will give our all, standing in line with them to defend the world and each other. Whatever the Soviets perceive as 'oppression', the reality is that our unity with our overlord has only strengthened us. Perhaps one day we will be ready to stand on our own, but today is not that day."
  UN_Unity_in_Strength: "Unity in Strength"
  UN_Unity_in_Strength_desc: "Millions of dutiful servants live throughout our global empire, from right at home, to faraway lands across seas and oceans. What the communists perceive as tyranny is simply our strength. In reality, these devoted millions, regardless of background, are willing to give their lives and manufacture thousands of weapons every day in defence of democracy and freedom, as well as their respective cultures and religions, so that we can continue to teach, improve, and learn from them as if we were a mother with her children.\n\nDespite the daunting task that lay ahead of us, the strength that we wield and share has bound us together to give it our all. Our hands, united, will defeat the Soviet Union as just another enemy in a long list of victories. The empire will never succumb to Bolshevism's true tyranny!"
  UN_United_by_Goals: "United by Goals"
  UN_United_by_Goals_desc: "We have purged the Soviet Union from our organisation of pure liberty, and the veil has now been lifted. It's easy to see how their utter despotism weighed us down now that they're gone, and how they must be regarded as the next great evil that the United Nations must collaborate to eradicate. With the USSR no longer vetoing our bills, opposing every plan we propose, and using their influence within the United Nations to make barely-concealed attempts to promote their bolshevist tyranny, bills and acts are passing with great ease.\n\nThe democratic nations of the world are no longer weighed down, blinded, or caught off guard; we are no longer slow to act or do not act at all, as our previous League of Nations did. When we set a goal for freedom and justice, we come together and achieve it! Now, our noble goal must be to oppose the Soviets in the same way that they have opposed us since their inception... and do whatever it takes."
  UN_Victory_Gardens: "Victory Gardens"
  UN_Victory_Gardens_desc: "Europe, which has been devastated by vicious Nazi attacks, requires massive aid in most sectors, but one thing that is frequently overlooked is that their industry is not the only thing that requires assistance; their people and their needs are also important. The farms of Europe have been largely scorched and rendered unusable, not to mention the farmers who have become soldiers, but arable land exists in Canada, the United States, and many of our non-European friends. It can be easily used - and now will be.\n\nTo prevent or stop mass starvation, we will encourage our population to plant Victory Gardens - a tactic used during both World Wars to maintain food production - which will provide us with an excess of food that we will ship to Europe to ensure that none of our valiant allies go hungry. Furthermore, it will create new job opportunities for our own people. First, we must launch massive fundraising campaigns to raise funds to promote and build these gardens."
  UN_Granary_of_a_New_Europe: "Granary of a New Europe"
  UN_Granary_of_a_New_Europe_desc: "Europe, which has been devastated by vicious Nazi attacks, requires massive aid in most sectors, but one thing that is frequently overlooked is that their industry is not the only thing that requires assistance; their people and their needs are also important. The farms of Europe have been largely scorched and rendered unusable, not to mention the farmers who have become soldiers, but arable land exists in Canada, the United States, and many of our non-European friends. It can be easily used - and now will be.\n\nThese Victory Gardens, which were also used during the war, have so far boosted our citizens' morale while training new farmers, all while producing an incredible amount of grain and vegetables. This food is being promptly shipped to our grateful European friends, likely preventing mass starvation on the continent. As we supply them, their population grows once more, and they can put one more issue behind them, allowing them to focus on a new future - and indeed, a new Europe. Each loaf of bread will save one life!"

