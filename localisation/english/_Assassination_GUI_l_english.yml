 string_special_effect_of_situation_meeting: "Ситуація '§Y[This.GetAssassinationSituationName]§!' має такі особливі характеристики: \n   - Якщо використано метод '§YStab the target§!' ймовірність того, що вбивця буде §Yзатриманий§! у кінці, змінюється на §G-5.00%§!. \n   - Якщо використано метод '§YPlant a bomb§!' і вбивство вдалося, існує §G5.00%§! ймовірність, що загине випадковий генерал країни-цілі."
