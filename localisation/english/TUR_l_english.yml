 TUR_Death_of_Ataturk.1.t: "Death of Atatürk"
 TUR_Death_of_Ataturk.1.d: "A great tragedy has hit the Turkish nation this morning. The beloved founder and President of the Republic of Turkey, Mustafa Kemal Atatürk, has passed away at the Dolmabahçe Palace. Aratürk was already suffering from bad health from a cirrhosis due to his heavy drinking. After a short period of good health result of trying to change his life-style, his condition only worsened. Nine medical professionals signed the death certificate stating hero of Turkish independence has finally collapsed from his illness. Sorrow invaded the hearts of the Turkish citizens when the news reached the public.\n\nToday, the people mourns the man that transformed Turkey into a modern democratic nation. His possessions will be donated to the Republican People's Party with the remaining funds designated to his sister and his adopted children, according to his will. Our officials are already preparing a state funeral to be held in a few days, with no decision made on where Atatürk's body should rest yet. Behind the scenes, there are also preparations on who should succeed him in power with former Prime Minister Ismet İnönü being the most natural choice. But with our beloved leader gone, his replacement will have some big shoes to fill."
 TUR_Death_of_Ataturk.1.A: "Farewell to our Hero..."

 TUR_Death_of_Ataturk.2.t: "Mustafa Kemal Atatürk Dead at 57"
 TUR_Death_of_Ataturk.2.d: "[FROM.GetNewsIcon]Mustafa Kemal Atatürk, President of Turkey and founder of the modern Turkish republic, died this morning at Dolmabahçe Palace after a long illness. He was 57.\n\nAcross Turkey, flags fly at half-mast and crowds gather in silence to mourn the passing of the man who transformed a defeated empire into a modern nation. Atatürk, once the hero of Gallipoli, led the Turkish National Movement to victory in the War of Independence and proclaimed the Republic in 1923.\n\nAs leader, he abolished the sultanate and caliphate, replaced religious law with civil codes, adopted the Latin alphabet, and advanced education and women's rights. His reforms sought to orient Turkey toward secularism and Western modernity, reshaping the social and political fabric of the nation.\n\nReactions abroad have been marked by respect. Statements from London, Paris, Berlin, Moscow, and Washington recognize his achievements in bringing stability to the Near East and charting an independent course between East and West.\n\nWith his death, the world watches Ankara for signs of continuity or change. former Prime Minister İsmet İnönü is expected to assume leadership, but Atatürk's passing leaves an uncertain void in Turkish politics."
 TUR_Death_of_Ataturk.2.A: "Farewell."
 TUR_Death_of_Ataturk.2.B: "We offer our sincere condolences."