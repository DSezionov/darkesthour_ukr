#  Finland Decisions
######################################################################
 FIN_National_Defense_Campaign_decisions: "National Defense Campaign"
 FIN_National_Defense_Campaign_decisions_desc: "\n\n\n£decision_header_FIN_National_Defense_Campaign£\n\n\n\nOur hard-won independence is not guaranteed in the face of Soviet ambitions, and we must be prepared for the worst. Construction on the Mannerheim Line must resume in earnest, strengthening our eastern defences against potential aggression. Meanwhile, efforts are being made to obtain modern air defence systems and military hardware from abroad to supplement our limited arsenal.\n\nIn the forests and snow-covered terrain, our Sissi troops - trained in stealth, endurance, and guerilla tactics - will become the knife in the dark if war breaks out. Every trench dug, every anti-aircraft gun purchased, and every mark spent represents an investment in our sovereignty."
 FIN_Sissi_Troops: "Deploy the Sissis"
 FIN_Sissi_Troops_desc: "Sissi Troops are light infantry trained to manoeuvre around Soviet spearheads and strike their invariably strung-out supply lines. Wearing white to blend in, they strike hard and fast, destroying entire convoys before disappearing into the forest as the Soviets panic. The strikes are dangerous, and if caught, they are typically ripped to shreds. Regardless of the risks, we must use whatever tactics we have to gain the upper hand over our numerically superior adversary."
 FIN_Air_Defense_GER: "Buy German Air Defense Equipment"
 FIN_Air_Defense_GER_desc: "While the Germans have not publicly supported our cause, few people will turn down a quick buck. While some questioned whether they would sell equipment necessary for their expanding army, the Germans accepted our offer. The Flak 30 and 38 platforms have excellent testing statistics, but they lack actual field testing. Especially against an adversary like the Soviets. So, for a small fee, they will ship them to the front in exchange for detailed reports on their performance."
 FIN_Air_Defense_SWE: "Buy Swedish Air Defense Equipment"
 FIN_Air_Defense_SWE_desc: "The Swedes purchased 56 Flak 30 platforms from the Germans a few years ago, along with ample stocks of British Bofors guns of various calibres. Stockholm, a vocal supporter of our cause and greedy as any other, has agreed to sell us some surplus AA guns. It will be easier to transport them across the Baltic than anywhere else. The only snag is that the Swedes only send us a certain amount per order to keep the Germans and Soviets at bay."
 FIN_Air_Defense_HUN: "Buy Hungarian Air Defense Equipment"
 FIN_Air_Defense_HUN_desc: "After hearing that we were looking for anti-aircraft guns, the Kingdom of Hungary offered us a deal. They offer to send us some of their own Bofors guns for a very low price. However, we'll have to figure out how to transport it halfway across Europe on our own, and many of the guns for sale are in poor condition. Despite these significant drawbacks, some Treasury officials encourage us to accept their offer."
 FIN_Air_Defense_ENG: "Buy British Air Defense Equipment"
 FIN_Air_Defense_ENG_desc: "The British have some of the best anti-aircraft platforms available today, with the Bofors becoming a popular addition to many armies. London has offered to sell us some and transport them as far as Narvik. However, after that, transportation becomes our concern. Not only that, but they're charging a premium, which should dispel any Russian or German suspicions that this is overt support for our cause."
 FIN_1932_Bunkers: "The Inkila Bunkers"
 FIN_1932_Bunkers_desc: "The Mannerheim Line has started serious construction. Engineers have flooded the Inkila area to begin laying the bunkers that will serve as the line's anchor points. They will be 15 to 20 metres long and 5 or 6 metres wide. There are six total planned, but due to a lack of funds, construction will only finish one or two a year. This first section will serve as the strong centre of the line, with flanks along the Gulf and Lake Ladoga to follow later."
 FIN_Ink_Bunkers_Lake_Ladoga: "The Lake Ladoga Bunkers"
 FIN_Ink_Bunkers_Lake_Ladoga_desc: "The situation in Europe is dire, with war on the horizon. We must invest everything, including funds and manpower, in extending the Mannerheim Line to Lake Ladoga. Seven new large bunkers are planned, two for accommodation and the rest as fortified machine gun nests. Meanwhile, we've decided to modernise older bunkers, closing loops and making them more suitable for use as accommodation or command bunkers. Some were also given flanking fire capabilities and expanded. After this, the Line will be as complete as we could hope for."
 FIN_Ink_Bunkers_Finland_Gulf: "The Gulf of Finland Bunkers"
 FIN_Ink_Bunkers_Finland_Gulf_desc: "The Mannerheim Line has extended westward to the Gulf of Finland. These bunkers will protect Vyborg, our second largest city, and the road to Helsinki. This area will include two strong points and two smaller fortifications. The fortifications have also been redesigned, with troops staying between the gun chambers to save money on reinforced concrete. We will also shore up the roof with a few meters of soil and rubble. The construction is proceeding apace, and spirits are high even as tensions rise."
 FIN_Ink_Bunkers_Vuoksi_River: "Vuoksi River Finland Bunkers"
 FIN_Ink_Bunkers_Vuoksi_River_desc: "The Mannerheim Line has extended westward to the Gulf of Finland. These bunkers will protect Vyborg, our second largest city, and the road to Helsinki. This area will include two strong points and two smaller fortifications. The fortifications have also been redesigned, with troops staying between the gun chambers to save money on reinforced concrete. We will also shore up the roof with a few meters of soil and rubble. The construction is proceeding apace, and spirits are high even as tensions rise."
 FIN_Continue_the_Mannerheim_Line: "Continue the Mannerheim Line"
 FIN_Continue_the_Mannerheim_Line_desc: "The Mannerheim Line forms the foundation of our eastern defences. Though initially designed to only delay a larger force, its bunkers, trenches, and obstacles can be significantly strengthened with more effort and resources. Reinforcing these key positions improves our chances of holding the line against a numerically superior enemy. Concrete, steel, and Finnish resolve will form a formidable barrier."
 FIN_Continue_the_Mannerheim_Line_2: "Continue the Mannerheim Line"
 FIN_Continue_the_Mannerheim_Line_2_desc: "The Mannerheim Line forms the foundation of our eastern defences. Though initially designed to only delay a larger force, its bunkers, trenches, and obstacles can be significantly strengthened with more effort and resources. Reinforcing these key positions improves our chances of holding the line against a numerically superior enemy. Concrete, steel, and Finnish resolve will form a formidable barrier."
 FIN_Continue_the_Mannerheim_Line_3: "Finish off the Mannerheim Line"
 FIN_Continue_the_Mannerheim_Line_3_desc: "Years of planning, excavation, and construction have come to an end. The Mannerheim Line is now a fully fortified defensive network, demonstrating Finnish determination and engineering. With reinforced bunkers, fully manned strongpoints, and hardened artillery emplacements, this line is prepared to withstand an invasion. Whatever comes from the East, they will not find an easy victory here."