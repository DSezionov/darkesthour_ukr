#  Events
######################################################################
 ### Politics
 FIN_Politics.1.t: "Kyösti Kallio Appointed Prime Minister"
 FIN_Politics.1.d: "Following the resignation of Toivo Mikael Kivimäki, Kyösti Kallio has been appointed Prime Minister of Finland. A long-standing member of the Agrarian League, Kallio is known for his pragmatism and moderate stance, aiming to preserve Finland's stability in the face of growing tensions abroad."
 FIN_Politics.1.A: "A steady hand for Finland."
 FIN_Politics.2.t: "Edwin Linkomies Appointed Prime Minister"
 FIN_Politics.2.d: "In the midst of a challenging war and political turmoil, Edwin Linkomies has been appointed Prime Minister of Finland following the resignation of Johan Wilhelm Rangell. A professor of law and experienced politician, Linkomies is known for his sharp intellect and pragmatic approach. His leadership comes at a critical time as Finland navigates its alliance with Germany while trying to protect national sovereignty and prepare for the post-war era."
 FIN_Politics.2.A: "A competent choice."

 ### Elections
 FIN_Election_1937.1.t: "1937 Finnish Presidential Election"
 FIN_Election_1937.1.d: "Finland approaches the 1937 presidential election, and the nation must choose a leader capable of guiding the country through domestic challenges and growing international tensions. The candidates are Pehr Evind Svinhufvud, the incumbent, a veteran statesman and nationalist dedicated to Finnish independence; Kyösti Kallio, the current Prime Minister advocating moderation, stability, and rural interests; and Kaarlo Juho Ståhlberg, the first President of Finland and a champion of democracy, legal order, and civil rights. Each choice will shape Finland's future, influencing its policies, stability, and position in a Europe moving toward conflict."
 FIN_Election_1937.1.A: "Pehr Evind Svinhufvud (Kok)"
 FIN_Election_1937.1.B: "Kyösti Kallio (ML)"
 FIN_Election_1937.1.C: "Kaalo Juho Ståhlberg (KE)"
 FIN_Election_1940.1.t: "1940 Finnish Presidential Election"
 FIN_Election_1940.1.d: "Finland faces the 1940 presidential election after the Winter War, and the nation must select a leader to guide the country through post-war recovery and continued international uncertainty. The candidates are Risto Ryti, a skilled economist and wartime Prime Minister focused on strong national governance, and Johan Helo of the Social Democratic Party, advocating social reforms and the protection of workers' rights. Ryti is however heavily favored to win in a landslide."
 FIN_Election_1940.1.A: "Risto Ryti (KE)"
 FIN_Election_1940.1.B: "Johan Helo (SDP)"

 ### Winter War

 FIN_Winter_War.1.t: "Soviet Demands Arrive!"
 FIN_Winter_War.1.d: "After much political and diplomatic intrigue, the Soviet demands - in a formal written format have been handed over to Juho Kusti Paasikivi, our representative in Moscow, who has forwarded the same to Helsinki.\n\nThe demands call for the shifting of the frontier between the USSR and Finland on the Karelian Isthmus westward to a point 30 kilometres east of Viipuri, our second-largest city, to the line between Koivisto and Lipola, a very heavy demand indeed.\n\nIn addition, they have requested us to destroy all existing fortifications on the Karelian Isthmus. As per their note we would also cede to them the islands of Suursaari, Tytärsaari, and Koivisto in the Gulf of Finland. In the north, the Soviets have demanded the Kalastajasaarento peninsula. Furthermore, we would also need to \"lease\" the Hanko Peninsula to the Soviets for thirty years, and permit them to establish a military base there.\n\nTo compensate for our territories they have in exchange offered to cede Repola and Porajärvi from Eastern Karelia, an area twice as large as the territories demanded from us.\n\nTheir demands are by far- large and very demanding, despite the lands they offer to us in exchange, we stand to lose a great amount of our prestige and sovereignty. It would take considerable deliberations and discussion for our response to their demands."
 FIN_Winter_War.1.A: " Aah.... mikä ongelma. Accept their demands"
 FIN_Winter_War.1.B: "Aah.... mikä ongelma. Propose a Counteroffer"

 FIN_Winter_War.2.t: "Treaty of Leningrad"
 FIN_Winter_War.2.d: "Peace has been maintained as the latest round of talks between our countries has finally bore fruit. While the Finnish side had been adamant about maintaining its \"territorial integrity\", the Finnish representative Juho Kusti Paasikivi eventually communicated to Moscow that the Finnish government had finally accepted the Soviet demands in the entirety.\n\nAnd in a momentous event yesterday an agreement was signed in Leningrad, with many international journalists attending. Despite the other conflicts raging all over the world, this treaty has caught a lot of international attention. Hans Frederick Arthur Schoenfeld, the American ambassador to Finland communicated his regret to the Finnish government on behalf of the Office of the President of the United States of America, which had termed the whole thing as \"a shameful affair, wherein a democratic country was forced to sign away its territories under the threat of a military action\". But many people, including the diplomats of our 2 countries welcome this development.\n\nThe final agreement that was ratified by the 2 parties contains clauses which facilitates territorial exchanges and other minor exchanges, mainly by Finland to allow for a greater buffer zone between Leningrad and the border along with reciprocal exchanges from the Soviet side to compensate the territorial losses of Finland."
 FIN_Winter_War.2.A: "To a long friendship."

 FIN_Winter_War.3.t: "Treaty of Leningrad Signed"
 FIN_Winter_War.3.d: "[ROOT.GetNewsIcon]\nWhile talks and diplomacy have failed elsewhere in Europe and the World. The Governments of the Republic of Finland and the Union of Soviet Socialist Republics have finally come to an understanding and signed the Treaty of Leningrad.\n\nThe Treaty has facilitated territorial exchanges and other exchanges, mainly by Finland to allow for a greater buffer zone between Leningrad and the border along with reciprocal exchanges from the Soviet side to compensate the territorial losses of Finland.\n\nWhile many have labeled the whole process behind the agreement as a situation in which Finland was held at gunpoint, wherein the government was forced to accept the treaty. With international responses still incoming and divided, if anything is clear, it is that peace has been preserved and any threat of conflict averted."
 FIN_Winter_War.3.A: "Snow storms will rise on both sides of the new border."

 FIN_Winter_War.4.t: "Finnish Delegation Arrives"
 FIN_Winter_War.4.d: "After our initial diplomatic exchanges with the Finnish government, a proper delegation that will be representing their interests has arrived in Moscow. It seems the Finnish have been a bit apprehensive of our initial offer and demands and the delegation has made a counteroffer to us.\n\nThe Delegation, with the necessary approval from their government has rejected our initial offer, but still seems to be receptive to the idea of giving us some land. Their delegation have outright ignored our demands of the islands of Suursaari, Tytärsaari, and Koivisto in the Gulf of Finland, the Kalastajasaarento peninsula and even our request of the \"lease\" of the Hanko Peninsula, and permission to establish a military base there has been rejected. They have even rejected our request for the destruction of all existing fortifications on the Karelian Isthmus, a provocative stubbornness on their part.\n\nBut apart from this, their counteroffer sympathises with our need of land to have a larger buffer between the border and Leningrad, and henceforth have shown their willingness to hand over the municipality of Terijoki in Karelia.\n\nTo summarise their counteroffer: we barely get anything that we demand, and it is obvious they are simply stalling the talks. While they offer us token land, their reserves have been called up for \"additional refresher\" training, a second nature of these fascist snakes indeed, call up the Army for everything. It has now become obvious that we need to use some \"other means\" to enforce our demands."
 FIN_Winter_War.4.A: "Mobilise the Red Army"

 FIN_Winter_War.5.t: "Negotiations Break Down"
 FIN_Winter_War.5.d: "Today the Finnish delegation which had arrived in Moscow, which originally came to discuss a counteroffer in response to our territorial demands hastily departed back to Helsinki, signifying a breakdown of talks.\n\nThe Finnish Delegation, headed by Juho Kusti Paasikivi was adamant in their insistence on their \"territorial integrity\" and their wish to safeguard it. Their counteroffer was a token offer of the transfer of the municipality of Terijoki, a complete inconsideration to our original demands.\n\nBut the Finnish in their arrogant stubbornness have refused to even consider our demands. It is obvious there is no point in shuttling of diplomatic envoys to and from Helsinki.\n\nApart from our issues of territories, the Finnish people are governed by a deceitful administration of fascist scum, who seek to oppress the Finnish workers, and hence their welfare and our aim of furthering the socialist cause must also be considered in our plan of action.\n\nOur future plan of action is to say, \"resolute\" and \"definitive\" in nature which would seek for the liberation of Finnish people as well as securing our territorial interests."
 FIN_Winter_War.5.A: "The white lands of the Finns will soon run red"

 FIN_Winter_War.6.t: "Shelling of Mainila"
 FIN_Winter_War.6.d: "Now it is more than clear enough that our demands to Finland must be enforced. However we are still bound by nonsensical treaties and are also a member state of the League of Nations, and hence any military action from our side must be justified.\n\nAccordingly we have planned out a false flag operation wherein our town of Mainila will be shelled by our own guns, with supposed \"casualties\" as well, all of which we'll portray as an act of Finnish aggression. The whole \"incident\" will provide us with a casus belli, which we'll use to withdraw from our existing non aggression pact with Finland. Thereafter our troops will ready themselves for a full scale invasion of Finland, while the terrain might provide us with some difficulties, our overwhelming superiority in quantity as well as quality will guarantees us a quick victory over the meagre force the Finns might be able to assemble against us.\n\nAs of this moment, with war raging all over Europe, most countries will be preoccupied with their own issues to care what happens in our frigid corner of the world, and hence the present state of international affairs provides us with an opportune moment to stage such an operation.\n\nAs we speak, artillery guns are being aimed towards Mainila, and simply await you final order."
 FIN_Winter_War.6.A: "Fire Away!!!!!"
 
 FIN_Winter_War.66.t: "Shelling of Mainila"
 FIN_Winter_War.66.d: "So the political dance has ended, the Soviets have seemingly shelled their own positions and blamed us for the same. Such a ridiculous claim is physically impossible as we have no guns at such a proximity to the border capable of such an action. Yesterday, our border posts heard seven shots being fired from the Soviet side and detected them landing approximately 800 metres from the border, on the town of Mainila. While there have been \"casualties\" on the Soviet side, our border posts believe that none was affected in anyway.\n\nThe recent happenings have soured our relations with the Soviets. Undoubtedly the whole incident was staged by the Soviets themselves, as earlier the Soviets had conducted border exercises which were contingent on aggression on Mainila.\n\nWhile we have rejected the false accusations, the Soviets are still vehement in their allegations, even rejecting our offer to have a third party to investigate the whole incident. While the future remains uncertain, we must begin preparations to defend our country."
 FIN_Winter_War.66.A: "We very well might need to shell Mainila for real"

 FIN_Winter_War.7.t: "Soviets Withdraw from Non-Aggression Pact"
 FIN_Winter_War.7.d: "Whatever hopes we had of bilateral talks defusing the current situation were proven false yesterday, when the Soviet Union \"irrevocably withdrew from its obligations\" as mentioned in the Soviet–Finnish Non-Aggression Pact of 1932.\n\nThe Soviet–Finnish Non-Aggression Pact was a non-aggression treaty signed in 1932 by our representatives and that of the Soviet Union, wherein both parties guaranteed to respect each other's borders, with an agreement to stay neutral in each other's conflicts and disputes were promised to be solved peacefully and neutrally. The pact was extended to December 31, 1945 on April 7, 1934, with the extension being signed in Moscow by our Foreign Minister Aarno Yrjö-Koskinen and the Soviet Foreign Minister Maxim Litvinov.\n\nThe Soviets have cited the recent \"shelling\" of Mainila as the reason for their unilateral withdrawal from the pact, a absurd allegation. According to Article 5 of the pact, both parties are supposed to call for a joint commission to examine such a happening, despite our repeated pleas, the Soviet Union has refused to allow for the formation of one, much less investigate the \"incident\".\n\nWith their withdrawal from the pact, it seems that conflict is imminent, the Soviet Union for all its propagandist image of having a mighty military will very soon learn just how stubbornly a Finn is willing to fight for his homeland."
 FIN_Winter_War.7.A: "Mobilise the Civil Guard."

 FIN_Winter_War.77.t: "Soviet Invasion of Finland"
 FIN_Winter_War.77.d: "[FROM.GetNewsIcon]Finnish authorities announced earlier today that Soviet troops had crossed the border and invaded the Scandinavian country. Tensions between the two neighbouring countries have been high since the end of the Russian civil war and the subsequent failure of the Finnish revolution. According to unconfirmed reports, negotiations between the two countries broke down over shifting the Finnish border further east to protect the city of Leningrad. These negotiations had failed because neither side was willing to significantly reduce their demands, nor could either party fully trust the other.\n\nThe crisis reached a climax when, following the termination of diplomatic relations, artillery opened fire on the border station of Terjoki. It is unclear whether other countries will become involved in this conflict, but the entire European continent is waiting to see what the consequences of the war are."
 FIN_Winter_War.77.A: "Hack on them, son of the north!"
 FIN_Winter_War.77.B: "The revolution shall prevail over Finland!"
 FIN_Winter_War.77.C: "Soviet tryanny moves further eastward..."

 FIN_Winter_War.8.t: "Bombers over Helsinki!"
 FIN_Winter_War.8.d: "Last night, a large wave of VVS aircraft descended upon our capital of Helsinki. In what was supposed to be a massive \"air raid\" by the Soviets, our Capital was largely unaffected by the bombs. Though large in scale, poor accuracy by the bombers, existing bomb shelters across the city, our relatively accurate anti aircraft gun fire and prompt action by our Civil Guard prevented any significant loss to human life. But the population is still shocked in the aftermath of the thousands of the bombs being dropped on the city, with some unfortunate among the casualties. Though unknown, the Civil Guard first responders estimate only a few hundred were directly affected by the bombings.\n\nWhen asked by international diplomats to not bomb any Finnish cities, the Soviet spokesperson claimed the Tupolev SBs were \"dropping food to the starving Finns\", our countrymen have jokingly dubbed the Soviet bombs as \"Molotov's Breadbaskets\". \n\nWhile the damage is in itself of little concern, the intention and attitude behind the bombings is. The Soviets use of such a force indicates their willingness to escalate their Military operations to such a massive scale, as we speak the Soviets troops that have crossed the border seem to be resolute. But the \"Sisu\", an unparalleled tenacity and determination evident in the Finns will make even the \"Steam Roller\" run out of its \"Steam\"."
 FIN_Winter_War.8.A: "Load up the Bofors AAs!"

 FIN_Winter_War.9.t: "Finland at War!"
 FIN_Winter_War.9.d: "War has finally reached our country, for long did we think that our homeland would be safe from the the chaos and conflict raging across the world, but unfortunately we have been proven wrong. Our deceitful neigbour, the USSR, losing all rationale and sense has attacked us. As we speak thousands of Soviet troops are crossing the border to wage war backed by hundreds of aircraft which have already begun bombing our capital.\n\nIn this moment of desperation, Risto Ryti has stepped up to lead our country, under his guidance we will endure and prevail over the Reds. The Civil Guard is being mobilised, our Army is taking up defensive positions, AA guns and searchlights are being operated and last but not the least, perhaps most crucially-our envoys have been dispatched to international support and aid to pressure the Soviets, as even our strong people cannot indefinitely hold out against an endless horde of attackers.\n\nThe Soviets are using headlong armoured charges to try and breakthrough our defenses, but our brave soldiers are stubbornly standing their ground, resorting to all manners of improvised weapons, using crowbars and logs to jam the wheels of their tanks, and some frontline soldiers have begun using glass bottles filled with flammable liquids and with a simple hand-lit fuse to cover enemy vehicles in fire. Jokingly they are being called \"Molotov Cocktails\", and in the words of a private they are \"a drink to go with Molotov breadbaskets\". This joke goes on to show the morale of our troops, though greatly outnumbered, we will more than make up for them in our fighting spirit."
 FIN_Winter_War.9.A: "This one's for you, Comrade Molotov."

 FIN_Winter_War.10.t: "The League of Nations Expels USSR"
 FIN_Winter_War.10.d: "[ROOT.GetNewsIcon]\nIn an unprecedented move, the League of Nations has officially revoked the membership status of the USSR and expelled it. An unnamed League of Nations official was quoted as saying \"The Soviet Union has exhibited a flagrant violation of the Covenant of the League of Nations\". The said \"violation\" refers to the ongoing Soviet attack on its Arctic neighbour Finland.\n\nThough a very strong response, most diplomats agree this \"expulsion\" is of no consequence, as the Soviet attack goes unchecked. For long the League had been criticised for its inaction in the past, and it seems even its firmest action can do anything but stop such aggressive actions.\n\nMany have declared the whole affair as the \"last nail in the League's coffin\", citing that it has utterly failed in its goals and objectives. It is completely paralysed while conflicts rage all across the world."
 FIN_Winter_War.10.A: "It wasn’t good while it lasted either."

 FIN_Winter_War.11.t: "Establishment of the Finnish Democratic Republic"
 FIN_Winter_War.11.d: "At a formal event held in Helsinki, Marshal Kliment Voroshilov, Commander of the occupational forces in Finland, handed over control of the city to Otto Wille Kuusinen, the Prime Minister of the Finnish Democratic Republic. The symbolic handover of the city was intended to represent the return of national governance to the Finns, or, in reality, the establishment of a new communist administration to replace the previous government, which was dissolved soon after Finland's defeat.\n\nAlthough the Finns initially stood their ground using innovative tactics, their defense and resistance were eventually crushed in the face of our overwhelming military might. Our troops soon swept through the majority of Finnish population centers and cities, establishing firm control over most of the country.\n\nAmong its initial duties, the new government will 'dispose' of traitors and begin repairing the damage caused by the brief but intense war with us, particularly the destruction inflicted on Helsinki during our air raids. Finland has now ceded the Karelian Isthmus, Rybachiy, Hanko and Gogland, but has in return recieved a large, sparsely populated area of Karelian forest. One thing is certain: Leningrad is secure from any possible attack for the foreseeable future, and we have gained a valuable ally in our neighbor."
 FIN_Winter_War.11.A: "A triumph of the socialist cause."

 FIN_Winter_War.12.t: "Loss in the Winter War"
 FIN_Winter_War.12.d: "A catastrophe has occurred. We have been massively humiliated on an international stage and have become Europe's laughingstock. Our forces are nearing exhaustion, and the casualties are high. We have been forced to open negotiations with the Finnish government due to the risk of Franco-British intervention and several months of our Red Army forces being bogged down in the Finnish forest. We contacted the Finnish government and informed it that we were willing to negotiate a peaceful solution.\n\nThis war has been far too expensive, and several government officials have already proposed that we take over Finland later through a revolution. Our delegation will travel to Stockholm for peace talks and the drafting of a peace treaty."
 FIN_Winter_War.12.A: "Bitter peace"
 FIN_Winter_War.12.B: "A humiliating loss"

 FIN_Winter_War.13.t: "The Sausage War"
 FIN_Winter_War.13.d: "Toivo Rantala fled deeper into the forest as the Russians advanced on the supply column behind him. They had been surprised by the enemy, and all of their supplies had fallen into enemy hands. A part of him felt guilty for leaving all of it behind, knowing that capturing it would benefit the Russians at the expense of his fellow countrymen.\n\nHowever, the rest of him was simply trying to survive. He was only a cook! He didn't expect a fight; he was just cooking some meals for the men. Now some of his friends were dead, the rest were fleeing with him and the supplies were gone. He hadn't seen his commander yet; perhaps he was also dead? His question was quickly answered when his commander, Unto Raautio, a former front-line soldier, approached behind him.\n\n\"Turn around you cowards!\" He shouted.\n\n\"The column is lost, sir. There are too many Russians to fight! We were hoping to—\" Toivo spoke, but Unto cut him off.\n\n\"Hush! The column has been lost, but this is to our advantage. I was the last man out, and I saw the Russians. They're too busy looting the kitchens to pay attention. Those poor boys had probably been starving for weeks! Now is the ideal time to strike back.\"\n\nToivo initially didn't believe him, but as he thought about it, his claim became more plausible. The Russians' supply problems are no secret, and if a hungry man sees food, he will eat it before doing anything else. Furthermore, stopping allowed his mind to slow down and regain his courage. The men on the front relied on those supplies; if there was a chance to reclaim them, no matter how remote, they had a responsibility to try. Toivo quickly turned to the men around him and started barking orders. He may not have been a commander, but his tone was unarguable. It wasn't long until a counterattack force was formed."
 FIN_Winter_War.13.A: "The rest is history."

 FIN_Winter_War.14.t1: "Moscow Peace Treaty Signed"
 FIN_Winter_War.14.t2: "Finnish Victory in the Winter War"
 FIN_Winter_War.14.t3: "Soviet Union Establishes Total Control Over Finland"
 FIN_Winter_War.14.d1: "[FROM.GetNewsIcon]Earlier today, the Finnish government formally announced the cessation of hostilities with the Soviet Union following the signing of the Moscow Peace Treaty. The armistice, concluded after weeks of intense negotiation, brings an end to the bitter Winter War.\n\nDespite Finland's fierce and skillful defense against the vastly superior Soviet forces, continuous assaults, mounting casualties, and a severe shortage of ammunition and supplies ultimately forced Helsinki to seek peace. Soviet breakthroughs along the Karelian Isthmus and in Ladoga Karelia proved decisive, as key defensive lines at Summa, Taipale, and Viipuri finally gave way under relentless bombardment.\n\nThe terms of the treaty are harsh. Finland is compelled to cede the entire Karelian Isthmus, including its second-largest city, Viipuri, as well the territories of Salla, Suursaari, and the Rybachy Peninsula. Additionally, the Hanko Peninsula will be leased to the Soviet Union for use as a naval base.\n\nIn total, Finland will lose around 11% of its territory and 30% of its economic capacity, including significant industrial centers and vital fortifications. While Finland retains its independence and government, the outcome has deeply scarred the nation."
 FIN_Winter_War.14.d2: "[FROM.GetNewsIcon]The unthinkable has occurred in the Scandinavian region! Following several humiliating defeats by Finnish forces, Soviet officials publicly approached the Finnish government to offer a conditional surrender.\n\nEveryone expected a quick Soviet victory that would solidify a critical foothold in the Baltic Sea, with the goal of capturing Viipuri, a strategic coastal town. Finland repeatedly defeated Russian offensives, causing heavy casualties among the invaders. Finnish snipers, particularly Simo Hayha, nicknamed \"The White Death\" by his Soviet adversaries, made significant contributions to Finnish victories and boosted morale among civilians and soldiers.\n\nAs part of the peace treaty, Finland demanded the complete withdrawal of Russian troops from its territory, a thirty-year non-aggression agreement, and the complete demilitarisation of the two countries' borders. This is a humiliating defeat for the Red Army and an incredible victory for the Finnish people against an overwhelming and historical enemy."
 FIN_Winter_War.14.d3: "[FROM.GetNewsIcon]Following the fall of Helsinki, the Finnish government declared an unconditional surrender to Soviet authorities. This comes after several Soviet offensives and breakthroughs that have shattered the Finnish army's defensive lines. The conflict began when Finland refused Soviet proposals to extend the border further east to protect the strategic city of Leningrad. However, there was no evidence to support the Soviet Union's claim that it would seize territory beyond what was demanded, and Finnish cease-fire offers were quickly rejected.\n\nAccording to unconfirmed sources, the Soviet Union intends to install a puppet communist administration in Finland to gain control over both domestic and foreign affairs. The former government has fled into exile in Sweden, where they hope that foreign intervention will restore democracy in their country. With this complete victory over the Finns, the Soviet Union solidifies its hold on the Baltic Sea and establishes itself as a prominent figure in Scandinavia."
 FIN_Winter_War.14.Ad1: "We will return stronger!"
 FIN_Winter_War.14.Bd1: "A great victory for the Motherland!"
 FIN_Winter_War.14.Cd1: "The Bear advances northward..."
 FIN_Winter_War.14.Ad2: "Finland will never fall to Russian scum!"
 FIN_Winter_War.14.Bd2: "The Motherland does not concern herself with small defeats."
 FIN_Winter_War.14.Cd2: "A humiliating defeat."
 FIN_Winter_War.14.Ad3: "A great victory for the motherland!"
 FIN_Winter_War.14.Bd3: "The start of Russian imperialism..."

 ### Continuation War
 FIN_Continuation_War.1.t: "The Continuation War"
 FIN_Continuation_War.1.d: "The time has come. After months of careful planning and coordination, our forces stand ready to reclaim the lands unjustly taken from us in Karelia. With the backing of our Axis allies, already having initiated their assault on the Soviet heartlands, the enemy's defenses are stretched thin. Our soldiers, steadfast and resolute, are prepared to cross the front lines and restore Finland's honor and territory. For our homeland, for Karelia, we march!"
 FIN_Continuation_War.1.A: "Karjalan puolesta!"
 FIN_Continuation_War.2.t: "The Continuation War"
 FIN_Continuation_War.2.d: "[FROM.GetNewsIcon]In a dramatic escalation on the Eastern Front, Finland has officially launched military operations aimed at reclaiming the region of Karelia, along with other territories lost to the Soviet Union in the recent Winter War. Finnish forces, long poised along the border, have crossed the front lines in coordinated strikes, signaling the start of what Helsinki describes as a \"restoration of national honor.\"\n\nThe offensive comes with the tacit support of Germany and other Axis powers, who have opened pressure along the Soviet main lines. Analysts suggest that Soviet defenses in the north are currently overstretched, potentially giving Finland the chance to advance quickly and secure strategic positions.\n\nPresident [FIN.GetLeader] has emphasized that the campaign is a defensive effort to recover territory rather than a broader war of conquest. \"Our nation takes up arms not in pursuit of conquest, but to defend and reclaim the territories that were unjustly taken from us.\" he declared, invoking a strong wave of patriotic sentiment across the nation.\n\nThe Western Allies have condemned Finland's alignment with Germany, warning that this campaign will inevitably drag Finland into conflict with Britain, France, and their partners."
 FIN_Continuation_War.2.A: "Suomi voittaa!"
 FIN_Continuation_War.2.B: "We salute our new Northern ally!"
 FIN_Continuation_War.2.C: "Finland sides with the Nazis? Then war it is!"
 FIN_Continuation_War.2.D: "Can they avenge the Winter War?"
 #Operation groza

 #If FIN not in Axis
 FIN_Operation_Groza_Defence.1.t: "Berlin Calling!"
 FIN_Operation_Groza_Defence.1.d: "After the German ambassador, Wipert von Blucher, finished speaking, Mannerheim sighed deeply. He was sitting in on the meeting and had no idea why he was needed. He did now. The Russians were preparing to attack the valiant Suomi once more. We fought last time on our own. The Germans appear to be ready to throw their hat in the ring now that they are under threat. Mannerheim couldn't help but find the hypocrisy amusing. They had nothing but excuses the last time. Now that their country is being dragged to the pyre, they are rushing to assist us.\n\nThe treaty they were drafting was merely ceremonial. A valid rubber stamp. Mannerheim knew this when the first German troops arrived in Turku prior to the treaty's signing. Mannerheim returns to his headquarters and begins to plan as Helsinki panics and the Germans deploy troops to shore up Finnish defences. When the Soviets arrive, Mannerheim is determined that every inch of Finland they seize will be filled with their own dead."
 FIN_Operation_Groza_Defence.1.A: "Jumala pelastakoon heidät meiltä!"
 FIN_Operation_Groza_Defence.1.B: "This is German propaganda!"

 #If FIN in Axis
 FIN_Operation_Groza_Defence.2.t: "Berlin Calling!"
 FIN_Operation_Groza_Defence.2.d: "After the German ambassador, Wipert von Blucher, finished speaking, Mannerheim sighed deeply. He was sitting in on the meeting and had no idea why he was needed. He did now. The Russians were preparing to attack the valiant Suomi once more. We fought last time on our own. The Germans appear to be ready to throw their hat in the ring now that they are under threat. Mannerheim couldn't help but find the hypocrisy amusing. They had nothing but excuses the last time. Now that their country is being dragged to the pyre, they are rushing to assist us.\n\nMannerheim returns to his headquarters and begins to plan as Helsinki panics and the Germans deploy troops to shore up Finnish defences. When the Soviets arrive, Mannerheim is determined that every inch of Finland they seize will be filled with their own dead."
 FIN_Operation_Groza_Defence.2.A: "Jumala pelastakoon heidät meiltä!"
 FIN_Operation_Groza_Defence.2.B: "This is German propaganda!"

 # Global winter of 1939-40
 FIN_Global_Winter.1.t: "Ambush"
 FIN_Global_Winter.1.d: "Elo Tapio and his team struggled to control their shivers. While their clothes were warm, they were old and had been issued at the beginning of the war. The squad's constant battle until their transfer had torn many holes in their clothes, which were hastily covered with shoddily sewn patches. Not to mention that the snow under them had started to melt due to their body heat, soaking their chests and legs. There was also the biting cold, which Elo's mother referred to as 'a rude wind' because it blew directly through you. All in all, they were thoroughly miserable.\n\nElo was accustomed to the cold, but this winter was different. The nights were colder and the days shorter than last year. Sometimes the wind howled like a demon, killing as quickly as a Russian. The snow piled higher than Elo could remember, and it kept coming. He heard that Soviet soldiers were freezing to death in foxholes. Elo was not one to believe rumours, but this one he did.\n\nDespite the seemingly never-ending cold and raggedness of their clothing, they remained focused on their mission. They were positioned on a high ridge overlooking a dirt path. The locals claim that this is a patrol route for some of the Russian occupiers. Elo and his team planned to ambush them. The war here was more sporadic than in Karelia. Elo despised fighting in that damned place and wished to never see it again. Regardless, he despised this more. The worst part was having to wait.\n\nJust as Elo was starting to believe the Reds weren't coming, he heard the trundling of a tank in the distance. This was it. Suddenly, the Russians appeared, cautiously walking down the path, scanning the treeline for his countrymen. As the column approached a predetermined location, Elo leapt to his feet and opened fire."
 FIN_Global_Winter.1.A: "The gunfire drowned out his shout of Eläköön Suomi!"

 FIN_National_Defense_Campaign.1.t: "Funding Boost for the Mannerheim Line"
 FIN_National_Defense_Campaign.1.d: "With tensions in Europe rising and the threat of Soviet aggression becoming increasingly likely, a significant increase in funding and resources has been allocated to the Mannerheim Line, our most critical line of fortifications along the Karelian Isthmus. This enables us to accelerate our construction efforts rapidly.\n\nWe can now build advanced new bunkers and upgrade older emplacements with better fire shelters, ventilation systems and improved observation capabilities. The fortified line has evolved into a hardened wall of steel and concrete, rather than just a theoretical deterrent. While no wall is invincible, we are making it clear that if war breaks out, we will be prepared."
 FIN_National_Defense_Campaign.1.A: "Let's Build!"

 FIN_National_Defense_Campaign.2.t: "The Mannerheim Line Complete!"
 FIN_National_Defense_Campaign.2.d: "The final few tonnes of concrete are poured, and men begin to file into the already settled bunkers. The construction crew, exhausted from a gruelling, frantic construction pace, takes a step back to observe their work. War is on the horizon. Finland is on the front lines of Communist expansionism, and the Soviets across the border are closely watching the construction process. The men in the bunkers thoroughly inspect and clean their weapons. If the Soviets try anything, they will not get very far. The Mannerheim Line is complete, and it serves as the first line of defence against the Soviet threat. If the guards over the border want some action, they'll get more than they bargained for right now."
 FIN_National_Defense_Campaign.2.A: "The Karelian Isthmus slams shut!"

 ### Moscow Armistice
 FIN_Moscow_Armistice.1.t: "Armistice with the Russians?"
 FIN_Moscow_Armistice.1.d: "The tide of war has turned against us. Despite years of struggle alongside Germany, none of our strategic goals have been fulfilled: Karelia remains under Soviet control, our hopes of regaining lost territory have faded, and the Red Army advances toward our borders. Our army is weary, our cities are strained by war, and the people cry out for peace.\n\nNow, our envoys return from Moscow bearing the weight of an ultimatum. The Soviet Union demands an immediate ceasefire and offers Finland a formal armistice—but the conditions are severe.\n\nUnder the proposed terms:\n- Finland must end all hostilities against the USSR immediately, and withdraw from the Axis.\n- All German forces on Finnish soil must be expelled, even if it means fighting our former allies.\n- Post-Winter War territorial concessions will be re-enforced, with the addition of Petsamo and the Porkkala naval base.\n\nSigning the armistice may secure the survival of our nation and prevent further devastation, but it will also put us in the uneasy position of fighting Germany in the north. Refusing it risks full-scale Soviet invasion, potentially catastrophic losses, and a communist puppet regime in Finland."
 FIN_Moscow_Armistice.1.A: "Survival first. We will not sink with Hitler."
 FIN_Moscow_Armistice.1.B: "No talks with the Bolshevikki! For Karelia!"
 
 FIN_Moscow_Armistice.2.t: "Finland Proposes Armistice"
 FIN_Moscow_Armistice.2.d: "The pitiful nation of Finland, battered and humiliated after years of futile resistance, has crawled to the Soviet Union to beg for an armistice. Their envoys offer to end hostilities and withdraw from the Axis, citing exhaustion, territorial losses, and the impossibility of continuing the fight. The armistice would reaffirm our sovereignty over previously ceded territories, as well as the cession of nickel-rich Petsamo and a 50-year lease of the Porkkala naval base.\n\nThe Politburo faces a choice: display magnanimity by accepting Finland's surrender, securing vast territorial concessions and allowing our forces to refocus on the true menace to Europe, the fascist war machine of Germany - or crush this bastion of reactionary forces completely, demanding total and unconditional surrender, eradicating their ability to threaten the our borders ever again."
 FIN_Moscow_Armistice.2.A: "Acknowledged. Let's save Soviet strength for the Germans."
 FIN_Moscow_Armistice.2.B: "Nyet! Finland will be subjugated once and for all!"

 FIN_Moscow_Armistice.3.t: "The Moscow Armistice"
 FIN_Moscow_Armistice.3.d: "[FROM.GetNewsIcon]After years of war alongside Germany in the Continuation War, Finland has signed a formal armistice with the Soviet Union, bringing hostilities to an end. Originally motivated by the desire to reclaim territories lost in the Winter War, Finland has now been forced to again relinquish the vast territories ceded following the Winter War, now in addition to the nickel-rich Petsamo region. The naval base at Porkkala, near Helsinki, has been leased to the Soviet Navy for 50 years, replacing the previous lease of Hanko.\n\nThe armistice was made possible through the appointment of Marshal Carl Gustaf Emil Mannerheim to the Finnish presidency, who voided the previous agreements with the Germans.\n\nThe armistice also casts former allies in a new light: German forces that only days ago fought alongside Finland are now considered occupiers, and Finland, according to the terms of the armistice, is obliged to expel them by force. [GER.GetLeader] has reacted with outrage to the armistice, condemning what Germany sees as a treacherous abandonment of their alliance and a shocking betrayal of the trust and cooperation that recently bound the two nations."
 FIN_Moscow_Armistice.3.A: "It had to be done."
 FIN_Moscow_Armistice.3.B: "Serves them right! Now, to Berlin!"
 FIN_Moscow_Armistice.3.C: "Treachery!"
 FIN_Moscow_Armistice.3.D: "A tough spot to be in."

