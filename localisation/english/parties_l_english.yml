# Subideologies
###########################################
# Fascism
 national_socialism: "National Socialism"
 national_socialism_desc: "§gNational Socialism§!\nNational Socialism, the herald of revolution in the heart of Europe, refers to the ideological precepts established and developed by Adolf Hitler and his comrades as part of the National Socialist German Workers Party programme.\n\nIt incorporates elements of Völkisch theory, such as Pan-Germanism and the need for aggressive territorial expansion to acquire Lebensraum in order to achieve economic self-sufficiency and protect the homeland from destabilizing fluctuations to the global economy, as well as to safeguard and nurture the connection between the Volk and their sacred soil.\n\nIt castigates Liberalism and Parliamentary Democracy as fundamentally un-German systems of government and advocates for the authoritarian, communitarian organization of society under the auspices of an all-powerful Germanic Führer who acts as the first and most formidable exponent of the Volk and their interests.\n\nNational Socialism, like Fascism, seeks to shape a society capable of overcoming the internal contradictions of nineteenth-century Capitalism by synthesizing elements of Capitalism and Socialism to forge a so-called ‘alternative path' that rejects the Marxist concept of class conflict in favor of class collaboration, organized under the aegis of the Volksgemeinschaft or racial community.\n\nHowever, unlike Fascism, it distinguishes itself through the strict enforcement of a racial hierarchy, with race and ethnicity playing a central role in all aspects of life. According to National Socialist theory, the Aryan - the harbinger of civilization and high culture is locked in an eternal racial struggle against the Jew - the omen of racial decay and the perpetrator of an international conspiracy of subjugation waged against the German people. Consequently, anti-Semitism pervades all aspects of National Socialist thought."
 
 strasserism: "Straßerism"
 strasserism_desc: "§gStraßerism§!\nStraßerism is a strand of Nazism that emphasizes anti-capitalist and worker-based socialist policies over Aryan racial supremacy. It emphasizes anti-capitalism as a means of achieving national rebirth, favoring the establishiment of central planning through a guild system over corporatism."

 national_bolshevism: "National Bolshevism"
 national_bolshevism_desc: "§gNational Bolshevism§!\nNational Bolshevism is seen as a compromise between typical National Socialism and Communism, §YNational Bolshevism§! strives to combine Socialist economics with radical Nationalism."
 
 ultranationalism: "Ultranationalism"
 ultranationalism_desc: "§gUltranationalism§! is an ideology that emphasizes extreme loyalty and devotion to the nation, often placing national interests above all else. It promotes a strong, centralized state with a focus on national superiority, cultural purity, and the supremacy of the nation's values. Ultranationalists reject external influences and advocate for the expansion of national power through aggressive means, to secure dominance and protect the nation's identity. This ideology often fosters a sense of militarism and ethnocentrism, viewing other nations and cultures as inferior. "
 
 esoteric_national_socialism: "Esoteric National Socialism"
 esoteric_national_socialism_desc: "§gEsoteric Nazism§!\nEsoteric Nazism is a branch of National Socialism integrating occultist and neopagan beliefs within Nazi ideology. It theorized that the Aryan race is descended from alleged ancient civilizations such as Atlantis and had a different evolutionary lineage from other racial groups, possibly descended from divine beings themselves. Esoteric Nazism wholly rejects Christianity, claiming it to be created by Jewry as a means to weaken the Aryan race"

 fascism: "Fascism"
 fascism_desc: "§gFascism§! is an authoritarian, far-right ideology emphasizing nationalism, militarism, and the supremacy of the state. It rejects liberal democracy, socialism, and communism, advocating for a totalitarian regime led by a strong, centralized leader. Fascism prioritizes the nation over individual rights, viewing society as an organic, unified entity that must be controlled by the state. Fascism glorifies military power, discipline, and order, often combined with revitalization of traditional cultural and social values."

 clerical_fascism: "Clerical fascism"
 clerical_fascism_desc: "§gClerical fascism§! combines authoritarian nationalism with a strong emphasis on Catholicism or other religious doctrines, advocating for the integration of religion and state in a hierarchical, totalitarian system. It rejects liberal democracy, socialism, and communism, aligning itself with conservative religious institutions to uphold traditional values and moral order. Clerical fascism supports a strong, centralized government led by a charismatic leader, and seeks to enforce national unity and social discipline through both political power and religious authority."
 
 metaxism: "Metaxism"
 metaxism_desc: "§gMetaxism§! blends authoritarian nationalism, corporatism, and Greek traditionalism, aiming to establish a strong, centralized state under a single leader. Metaxism rejects liberalism and communism, promoting a totalitarian regime that enforces national unity, discipline, and social harmony through state control over both the economy and political life. It emphasizes the importance of Greek culture, Orthodox Christianity, and militarism, advocating for a society that is both hierarchical and nationalist. Metaxism supports the idea of a corporate state, where different sectors of society, such as labor and business, are integrated into the state framework to avoid class conflict."
 
 rexism: "Rexism"
 rexism_desc: "§gRexism§! combines extreme nationalism, authoritarianism, and Catholicism as the guiding principles for both social and political order. Rexism rejects liberalism, democracy, and communism, advocating for a totalitarian state under a strong, charismatic leader. The movement calls for national unity, social justice, and the establishment of a corporate state, where economic and social life is organized by professional groups rather than class struggles. It also emphasizes anti-Semitism and shares admiration for the fascist regimes of Italy and Germany."

 corporatism: "Corporatism"
 corporatism_desc: "§gCorporatism§!\nCorporatism is the organization of society by corporate groups and guilds based by a person's interests."
 
 integralism: "Integralism"
 integralism_desc: "§gIntegralism§! advocates for a corporate state, where national unity, order, and tradition are prioritized, with a strong emphasis on Catholicism as the guiding moral and cultural force of the nation. Integralism rejects liberalism, communism, and democracy, advocating for a centralized, authoritarian government that enforces social harmony through strict control over politics, the economy, and society. It supports nationalism, militarism, and the preservation of traditional values, with a vision of a society that is both hierarchical and culturally homogenous. Integralists emphasize loyalty to the state and obedience to the leadership, advocating for a unified national identity that rejects external influences and promotes Brazil's distinct cultural and religious heritage."
 
 legionarism: "Legionarism"
 legionarism_desc: "§gLegionarism§! combines elements of ultranationalism, orthodox Christian mysticism, and anti-Semitism, advocating for a totalitarian state rooted in traditional values and spiritual renewal. Legionarism calls for the establishment of a militant, authoritarian regime led by a charismatic leader, with a focus on national unity, moral purity, and the elimination of corrupt influences such as Jews, communists, and liberals. It promotes a vision of a spiritual and nationalist renaissance for Romania, where the state would enforce strict social and religious values, with the ultimate goal of creating a pure, morally upright nation."
 
 salafism: "Salafism"
 salafism_desc: "§gSalafism§!\nSalafism is based on the fundamental ideals of Islam, this form of Nationalism calls for the full implementation of \"Sharia\", or the religious laws set in placce by Muhammed and his Apostles"
 
 falangism: "Falangism"
 falangism_desc: "§gFalangism§! combines elements of ultranationalism, authoritarian corporatism, and Catholic-inspired moral traditionalism, advocating for a totalitarian state under a single, charismatic leader. Falangism emphasizes national unity, social hierarchy, and the subordination of individual interests to the needs of the nation. It calls for strict control over the economy through syndicates, suppression of political opposition such as communists and liberals, and the promotion of a disciplined, militarized society. The ideology envisions a spiritual and nationalist revival for Spain, where the state enforces moral, religious, and social conformity, fostering loyalty to the leader and creating a strong, self-reliant nation capable of projecting power and preserving its cultural heritage."

 revisionist_maximalism: "Revisionist Maximalism"
 revisionist_maximalism_desc: "§gRevisionist Maximalism§!\nRevisionist Maximalism is the Fascist Zionist political movement which wants to create a new integralist nationalism amongst Jews. The movement was a faction in the Zionist Revisionist Movement that wanted to establish Israel on Fascist lines, but eventually lost its popularity to the democratic factions in the Revisionist Movement."

 ilminism: "Ilminism"
 ilminism_desc: "§gIlminism§! is the political ideology of the Republic of Korea under Syngman Rhee. Frequently translated as the One-People Principle, Ilminism seeks to consolidate a united and obedient citizenry around Rhee's strong central leadership. It is based on ultranationalism and ethnic supremacy, emphasizing the primacy of the Korean people and the need for a cohesive, centralized state. Scholars have likened its principles to the Nazi concept of the Herrenvolk, reflecting its focus on national unity, loyalty, and hierarchical social order."

 # Authoritarianism
 authoritarian_conservatism: "Authoritarian Conservatism"
 authoritarian_conservatism_desc: "§gAuthoritarian conservatism§! embraces the use of strong, centralized authority to uphold conservative values and maintain social order when deemed necessary, rather than relying solely on democratic processes. Unlike mainstream conservatism, which emphasizes parliamentary discourse and gradual change, authoritarian conservatism supports the use of a strongman state to enforce its principles. It differs from outright despotism in that its leaders govern based on values and principle rather than personal gain, justifying limited political freedoms as necessary to prevent radical change and preserve stability."
 
 military_dictatorship: "Military Dictatorship"
 military_dictatorship_desc: "§gMilitary dictatorship§! is the form of government where military leaders control a state, often coming to power through a coup d'état or by force. In this system, the military exercises full control over political, social, and economic matters, and leadership is typically concentrated in the hands of a single military ruler or a small group of officers. Military dictatorships prioritize stability, order, and national security, frequently justifying their rule by claiming the need to protect the country from internal instability or external threats."

 theocracy_auth: "Theocracy"
 theocracy_auth_desc: "§gTheocracy§! is a form of government in which political authority is derived from a divine source or religious doctrine. In a theocratic system, religious leaders or institutions hold significant or supreme power, often merging religious and political authority. Laws and policies are typically based on sacred texts or religious principles, and the state's legitimacy is justified through spiritual or theological claims. Theocracy differs from secular governments by subordinating civil authority to religious authority, often limiting political pluralism and enforcing conformity to a specific faith or moral code."
 
 despotism: "Despotism"
 despotism_desc: "§gDespotism§! is characterized by the oppressive exercise of power by a single ruler or a small group. In despotic regimes, authority is typically centralized, unchecked, and maintained through coercion, intimidation, or force. Unlike systems grounded in law or ideology, despotism prioritizes the personal will and interests of the ruler over institutional constraints or popular consent. This concentration of power often leads to the suppression of political freedoms, dissent, and civil rights."
 
 colonial_administration: "Colonial Administration"
 colonial_administration_desc: "A §gColonial Administration§! is a system of government established by an imperial power to directly control and manage a foreign territory. It centralizes authority in appointed officials who enforce the colonizer's policies, often limiting local political rights and prioritizing economic exploitation and social order. This form of governance relies on a combination of bureaucratic management and military force to maintain dominance over indigenous populations and suppress resistance."
 
 integralism_auth: "Integralism"
 integralism_auth_desc: "§gIntegralism§!"

 monarchism: "Monarchism"
 monarchism_desc: "§gMonarchism§! is a system of government in which a ruling monarch, usually a king or emperor, is the head of state and sometimes head of government of a country. Monarchs are usually limited in power in constitutional monarchies, while absolute monarchies grant them absolute power. This is a hereditary office passed down to the eldest child, predominantly the eldest son."

 tridemism: "Tridemism"
 tridemism_desc: "§gTridemism§! is the ideology of the Kuomintang (KMT), based on Sun Yat-sen's Three Principles of the People. It emphasizes nationalism, democracy, and people's livelihood as key components for China's development. Tridemism advocates for a centralized government to unify the country, eliminate warlordism, and counter foreign threats. It calls for economic modernization and social welfare while respecting traditional Chinese values. It seeks to establish a stable, unified state that balances social order, national progress, and the needs of the people, positioning itself as a middle ground between radical ideologies."

# Democracy
 social_conservatism: "Conservatism"
 social_conservatism_desc: "§BConservatism§! emphasizes the preservation of traditional values, institutions, and practices, believing that society should evolve gradually rather than undergo radical change. Conservatives advocate for a limited role of government, favoring personal responsibility. They stress the importance of stability, order, and social cohesion, often prioritizing family values, religious beliefs, and national identity. Conservatives are skeptical of rapid social or political change, viewing it as potentially disruptive to established norms and long-standing traditions."

 social_liberalism: "Social Liberalism"
 social_liberalism_desc: "§BSocial liberalism§! combines a commitment to individual freedoms and social justice with a belief in government intervention to address inequality. It supports democratic governance and civil liberties while advocating for policies that promote economic equality, universal healthcare, education, and workers' rights. Social liberals believe in free markets, but argue that the state has a role in regulating the economy to protect the vulnerable and ensure fair opportunities for all."

 classical_liberalism: "Classical Liberalism"
 classical_liberalism_desc: "§BClassical liberalism§! is the right-leaning branch of liberalism that advocates for the free market, civil liberties under the rule of law, economic freedom and cultural liberalism. They seek to empower the middle class politically and to abolish royal charters, monopolies, and the protectionist policies of mercantilism so as to encourage entrepreneurship and increase productive efficiency. They also expect the free exchange of goods to diminish the frequency of war."

 social_democracy: "Social Democracy"
 social_democracy_desc: "§BSocial democracy§! advocates for a political and economic system blending democratic governance with social and economic equality. It supports capitalism but calls for government intervention to address inequality and ensure basic welfare for all citizens. Social democrats seek to protect individual freedoms, promote social justice, and ensure universal access to healthcare, education, and social security. It emphasizes democratic participation in decision-making, the importance of labor rights, and the belief that economic prosperity should be distributed more equitably."
 
 national_conservatism: "National Conservatism"
 national_conservatism_desc: "§BNational conservatism§! combines traditional conservative values with a strong emphasis on national identity, sovereignty, and patriotism. It advocates for the preservation of national culture, customs, and institutions, often rejecting foreign influence or globalism. National conservatives believe in strong borders, national self-determination, and cultural homogeneity, seeing the state as a defender of national values and traditions."

 democratic_socialism: "Democratic Socialism"
 democratic_socialism_desc: "§BDemocratic socialism§! advocates for a democratic political system combined with a socialist economic framework. It seeks to achieve social and economic equality through democratic means, rather than revolutionary action. Democratic socialists support the public ownership of key industries and services, such as healthcare, education, and transportation, while maintaining democratic control through elected representatives. It emphasizes workers' rights, income redistribution, and the protection of social welfare to reduce inequality."

 league_of_nations_administration: "League of Nations Administration"
 league_of_nations_administration_desc: "This state is administered directly by the §gLeague of Nations§!, with leadership positions being continuously rotated between the League's member states."

 # Socialism
 socialism: "Socialism"
 socialism_desc: "§RSocialism§! is a political and economic theory that the means of production, distribution, and exchange should be owned and regulated by a community as a whole."

 syndicalism: "Syndicalism"
 syndicalism_desc: "§RSyndicalism§! is the belief that the means of production and distribution should be given to a centralized workers' union along with any private property. In syndicalism, workers would be divided into “syndicates” in which all the workers apart of a certain syndicate would make decisions together."
 
 marhaenism: "Marhaenism"
 marhaenism_desc: "§RMarhaenism§! is a political ideology originating in Indonesia to combat capitalism and imperialism. Considered a variant of Marxism, Marhaenism carries socialist and anti-capitalist beliefs."
 
 labor_zionism: "Labor Zionism"
 labor_zionism_desc: "§RLabor Zionism§!, or Socialist Zionism, is the left-wing for the Zionist movement, a movement which supports the re-establishment of a Jewish homeland in the Holy Land. It is the significant tendency among Zionists and Zionist organizations. It believes that a progressive Israel should be built by the labor of the Jewish working class."
 
 arab_socialism: "Arab Socialism"
 arab_socialism_desc: "§RArab Socialism§! is a political ideology based on Pan-Arabism and socialism. It is distinct from socialism by holding more radical beliefs, the more well-known radical belief being nationalism."
 
 anarcho_communism: "Anarcho-Communism"
 anarcho_communism_desc: "§RAnarcho-Communism§! is a form of Communism advocating the abolition of the state, capitalism, private property and wage relations in favour of common ownership of the means of production. It favours direct democracy and networks of worker councils to production and consumption based on the guiding principle based on Marxist principles."

 luxemburgism: "Luxemburgism"
 luxemburgism_desc: "§RLuxemburgism§! is a form of communism developed by Rosa Luxemburg which opposes Leninism. Also known as Council Communism, Luxemburgism opposes many elements of Leninism, including the idea of a proletariat dictatorship. Luxemburgism prefers a less centralized alternative. Luxemburgists felt that a Worker's Council should rule a communist country, not a strong leader."

 # Communism
 trotskyism: "Bolshevik-Leninism"
 trotskyism_desc: "§RBolshevik-Leninism§!\nTrotskyism is the common name given to the beliefs developed by Leon Trotsky. Trotskyism involves mass industrialization, communism in all countries, the “World Revolution”, as Trotsky put it. Trotskyism also supported the Permanent Revolution and the International Revolution. Trotskyists were massive critics of Joseph Stalin's leadership, calling the Soviet Union under Stalin either a “deformed workers state or a form of state capitalism itself."

 marxism_leninism: "Marxism-Leninism"
 marxism_leninism_desc: "§RMarxism-Leninism§! is an authoritarian socialist ideology that combines Karl Marx's theory of class struggle with Vladimir Lenin's ideas on revolutionary leadership. It advocates for the overthrow of capitalism through a proletarian revolution, establishing a dictatorship of the proletariat led by a vanguard party. The goal is to create a socialist state with state ownership of the economy, eventually transitioning to communism. Marxism-Leninism promotes centralized control, planned economies, and international socialist solidarity to abolish class distinctions and imperialism."
 
 stalinism: "Marxism-Leninism (Stalinism)"
 stalinism_desc: "§RMarxism-Leninism (Stalinism)§!\nStalinism is the variant of Marxism-Leninism associated with the policies and practices of Joseph Stalin. It emphasizes centralized control, rapid industrialization, and the establishment of a totalitarian state under a single leader. Stalinism advocates for state ownership of the economy, extensive political repression, and the elimination of political opposition through purges and mass repression. It promotes the use of violence and propaganda to maintain power, with a focus on collectivization in agriculture and strict party discipline. Stalinism also stresses the importance of nationalism within socialist ideology, with an emphasis on self-reliance and militarization to defend against external threats."

 national_communism: "National Communism"
 national_communism_desc: "§RNational Communism§!\n National Communism combines both Marxist-Leninist principles and elements of nationalism. It constitutes a break from Marxist principles of internationalism and argues that Communist countries must be allowed to develop their foreign policies independently from the Soviet Union, and emphasizes the historical past, and the national culture, of the nation as precipitating the development of socialism within the nation."
 
 maoism: "Marxism-Leninism-Maoism"
 maoism_desc: "§RMarxism-Leninism-Maoism§!\nMaoism is the name of the practices developed by Mao Zedong during his rule as Chairman of the People's Republic of China. Maoism involves the idea of a permanent revolution, emphasis on the importance of the peasantry, small-scale industrialization, and agricultural collectivization."

 juche: "Juche"
 juche_desc: "§RJuche§!\nJuche, or “self-reliance”, describes the official state ideology of North Korea. Developed by Kim Il-sung, Juche emphasizes self-reliance and that people should act as the “masters of the revolution and construction.” Juche says that a nation must be strong and self-reliant in order to achieve real socialism."

