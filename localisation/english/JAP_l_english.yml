 JAP_Supremacy_of_Technology: "Supremacy of Technology"
 JAP_Supremacy_of_Technology_desc: "The Empire has long valued the spirit of discipline and valour, but wisdom teaches us that victory does not come solely from courage. As new forms of warfare emerge on land, sea, and air, we have accepted the truth: mastery of modern technology is critical to national survival and triumph. We are currently investing heavily in modern weapons, advanced machinery, and new military techniques.\n\nOur scientists and engineers work tirelessly to provide our soldiers with the tools they need to win. From improved rifles to better tanks, more reliable radios to powerful warships, the Imperial forces will be armed with equipment as powerful as their willpower."
