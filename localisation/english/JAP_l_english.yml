 JAP_Kempeitai: "Kempeitai"
 JAP_Kempeitai_desc: "The Kempeitai are at the forefront of our efforts to eliminate infiltration within the Empire and remove traitors, defeatists, and dissenters - those who would oppose the Emperor's and the government's will.\n\nOperating essentially outside the law and not shying away from kidnapping and torture, they actively seek out and eliminate those who pose a threat to Nippon's stability and security, weeding the beautiful garden that is our nation and eliminating pests.\n\n§RWith eyes and ears in every province, the Empire is fortified not only with armies, but also with complete internal control.§!"

 JAP_Kikakuin_1: "Kikakuin"
 JAP_Kikakuin_1_desc: "The Kikakuin was established to oversee and coordinate Japan's economic and industrial development. It serves as a central government organ for national economic planning. The board is tasked with balancing military needs, civilian production, and resource management. It brings together bureaucrats, technocrats, and business leaders to form a unified wartime economic planning strategy and administer production with the cooperation of major industrial and commercial players, as well as military representatives. Despite being constrained by interservice rivalry and factional interference, the Kikakuin has been successful in streamlining parts of the wartime economy and promoting state-led development in both the Home Islands and occupied territories."

 JAP_Kikakuin_2: "Kikakuin"
 JAP_Kikakuin_2_desc: "The Kikakuin was established to oversee and coordinate Japan's economic and industrial development. It serves as a central government organ for national economic planning. The board is tasked with balancing military needs, civilian production, and resource management. It brings together bureaucrats, technocrats, and business leaders to form a unified wartime economic planning strategy and administer production with the cooperation of major industrial and commercial players, as well as military representatives. Despite being constrained by interservice rivalry and factional interference, the Kikakuin has been successful in streamlining parts of the wartime economy and promoting state-led development in both the Home Islands and occupied territories."

