 JAP_The_Empires_Supply_Lanes_1: "The Empire's Supply Lanes"
 JAP_The_Empires_Supply_Lanes_1_desc: "With our territories and military outposts now spanning Asia and the Pacific, our economy and military rely on lengthy maritime supply chains. Oil, rubber, and bauxite, which our war machine cannot function without, must be transported across thousands of kilometres of occupied land and the Pacific Ocean to feed our factories and fleets. These routes, though necessary, are also vulnerable. Enemy submarines and aircraft threaten the steady flow of supplies, and even minor disruptions can result in severe shortages. These naval supply routes, as well as our defensive perimeter of Pacific Ocean islands, must be protected at all costs, or the Empire will starve."

 JAP_The_Empires_Supply_Lanes_2: "The Empire's Supply Lanes"
 JAP_The_Empires_Supply_Lanes_2_desc: "With our territories and military outposts now spanning Asia and the Pacific, our economy and military rely on lengthy maritime supply chains. Oil, rubber, and bauxite, which our war machine cannot function without, must be transported across thousands of kilometres of occupied land and the Pacific Ocean to feed our factories and fleets. These routes, though necessary, are also vulnerable. Enemy submarines and aircraft threaten the steady flow of supplies, and even minor disruptions can result in severe shortages. These naval supply routes, as well as our defensive perimeter of Pacific Ocean islands, must be protected at all costs, or the Empire will starve."

 #JAP_Strengthen_the_Kanto_gun: "Strengthen the Kwantung Army"
 #JAP_Strengthen_the_Kanto_gun_desc: ""

 #JAP_Disjointed_Intervention_Policy: "Disjointed Intervention Policy"
 #JAP_Disjointed_Intervention_Policy_desc: "With our original choice of intervention being superceded by High Command, it will take time to reorganize and adjust the plans that were already in motion. Expect a decrease in overall effectiveness and orders of battle until the operations and logistical networks can be untangled and refit for our new theatre of war."

 JAP_Technological_Superiority: "Technological Superiority"
 JAP_Technological_Superiority_desc: "Japan is at the forefront of military and industrial innovation in Asia. Decades of focused development, rigorous education, and collaboration among the state, military, and private sectors have resulted in tangible outcomes. Our fighters dominate the skies, our torpedoes strike with deadly precision, and our engineers are constantly improving the performance of both land and naval systems. Though we may face adversaries with larger economies, more manpower, or longer industrial traditions, our command of specialised technologies gives us an advantage in any theatre and, when combined with our unbreakable spirit, ensures our victory."

 JAP_Fanatic_Defense: "Fanatic Defense"
 JAP_Fanatic_Defense_desc: "With enemy forces stepping onto the sacred soil of the Japanese mainland, the country has entered a state of complete and desperate defence. The invasion has shattered any illusion that the war can be won solely through conventional means. Now, every citizen, from factory workers to farmers, is preparing to fight alongside the military. Cities are fortified strongholds, villages are transformed into guerrilla bases, and the traditional distinctions between front line and rear area disappear as the entire homeland becomes a battleground. Soldiers fight with renewed vigour, willing to sacrifice everything, inspired by an unwavering loyalty to the Emperor and a centuries-old warrior ethos, while civilians endure hardship without complaint, supporting the war effort in any way they can."

 JAP_Fuel_the_Imperial_War_Machine: "Fuel the Imperial War Machine"
 JAP_Fuel_the_Imperial_War_Machine_desc: "Our military campaigns are fuelled by the Empire's oilfields, coal mines, and refineries. The Imperial government has given top priority to securing these resources and ensuring their consistent flow to the front lines. Recognising this, factories and railways operate around the clock, workers endure harsh working conditions, and officials ruthlessly distribute supplies where they are most needed. The entire nation is mobilised to keep the Imperial war machine fuelled and moving forward, because without this effort, our campaigns would falter, and the dream of an East Asian Empire dominating the Pacific would slip away."

 JAP_Encourage_Local_Collaboration: "Encourage Local Collaboration"
 JAP_Encourage_Local_Collaboration_desc: "Effective governance of our occupied territories is dependent on the cooperation and goodwill of the local population. To this end, the Imperial government actively encourages collaboration with indigenous elites, businesspeople, and community leaders. We hope to foster loyalty and reduce opposition to Japanese rule by providing them with limited political autonomy, economic opportunities, and a voice in local administration. This not only relieves the burden on Japanese administrators, but also aids in the maintenance of stability across vast and diverse regions, as cooperative local governments help manage resources, recruit labour, and police restive elements, allowing the Empire to focus its military and economic efforts elsewhere."
