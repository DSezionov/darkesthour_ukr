 # Nekka Incident
 JAP_Nekka_Incident.1.t: "All Preparations Complete"
 JAP_Nekka_Incident.1.d: "IMPT:  DOCUMENT IS FOR KWANTUNG ARMY OFFICERS ONLY. UNAUTHORIZED DISTRIBUTION SHALL MERIT DISCIPLINARY ACTION.\n\nTo: Mutō Nobuyoshi, Commander of the Kantō-gun\n\nFrom: Commander of the Shanhaiguan Garrison\n\nSubject: Preliminary Checks Completed, Nekka Sakusen Is Operational\n\nSir, \n\nFirst stage of the operation is now ready to proceed. Our forces have already fabricated the casus belli necessary with flying colours, having been able to create enough tension along the Chinese border for a justified military response. \n\nAs expected, command in Tokyo has not issued a response over the matter, but are not likely to intervene in these state of affairs or be forced to take action, much like in the //REDACTED// Incident, a few years past.\n\nSoldiers on the ground are ready and prepared for the expected Chinese response. We urge your swift issuance of the final ultimatum, so to exert maximum pressure on the adversaries."
 JAP_Nekka_Incident.1.A: "The divine Kwantung Army shall crush the Chinese, send the letter."
 JAP_Nekka_Incident.2.t: "The Kwantung Army's Latest Ultimatum"
 JAP_Nekka_Incident.2.d: "RECIEVED FROM (REDACTED) WITHIN KWANTUNG ARMY DIVISION, EMPLACED ON MANCHURIAN BORDER:\n\nTo whom it may concern,\n\nThe act perpetrated by the Northeastern Army yesterday morning, is an unacceptable act on many fronts. They have violated the national sovereignty of the State of Manchuria without due cause, have harassed, intimidated, and even attacked soldiers of the Imperial Japanese Army without any cause whatsoever, and have caused irreparable damage to the fragile peace in the region. \n\nWe of the Empire of Japan, whose sole duty is the protection of the State of Manchuria's sovereignty, now see the Northeastern Army, and by extension the Republic of China, as fervent warmongerers who have no restraint in violating Manchuria's sovereignty and independence.\n\nAs such, we hereby demand the cessation of hostilities along the Shanhaiguan sector of the Manchurian-ROC border. The Northeastern Army's 626th Regiment and all other troops of the Northeastern Army are to hereby evacuate from the area swiftly and with haste. \n\nFailure to concede to our demands will result in a military response by the Empire of Japan.\n\nDo not test our resolve.\n\nOFFICER STATES LETTER WAS DELIVERED TO CHINESE FORCES ACROSS THE DMZ. KWANTUNG ARMY DIVISIONS HAVE SEIZED CONTROL OF VILLAGES AND TOWNS ALONG THE BORDER."
 JAP_Nekka_Incident.2.A: "Damn the Kwantung fools! \nIt is all up to Nanjing now..."
 JAP_Nekka_Incident.3.t: "The Northeastern Army Retreats!"
 JAP_Nekka_Incident.3.d: "FINAL RESPONSE FROM CHINESE FORCES ACROSS DMZ\n\nWe have received the demands that Japan has unfairly imposed to our nation. While we faithfully protest these ludicrous and outrageous demands, we cannot deny that a direct military conflict will endanger the fragile peace that current exists between our two nations.\n\nAs such, we will comply with the demands, as ludicrous as they are. All RoC troops will be evacuated from Shanhai Pass, including the Northeastern Army, who will withdraw from the border region. We hope that this preserves the peace and calmness remains between our two nations."
 JAP_Nekka_Incident.3.A: "What luck the Kwantung has."
 JAP_Nekka_Incident.4.t: "The Northeastern Army Stands Their Ground!"
 JAP_Nekka_Incident.4.d: "FINAL RESPONSE FROM CHINESE FORCES ACROSS DMZ\n\nWe have received the demands that Japan has asked of our nation, and we have come to the conclusion that these demands are outrageous at best and a grave insult at worst. This is Chinese soil, owned and controlled by the people of China and the Northeastern Army. We needn't listen to a foreign power on how to govern our state of affairs. Better yet, why should a foreign power dictate our very own sovereignty?\n\nAs such, we wholeheartedly refuse the demands imposed to us. We remind you, we are a sovereign nation with international support. It is in the interests of both of our countries that you heed and respect our response, forthright."
 JAP_Nekka_Incident.4.A: "As expected. The Kwantung Army shall not take this lightly..."
 JAP_Nekka_Incident.5.t: "A Report from Shanhaiguan"
 JAP_Nekka_Incident.5.d: "IMPT:  DOCUMENT IS FOR KANTŌ-GUN OFFICERS ONLY. UNAUTHORIZED DISTRIBUTION SHALL MERIT DISCIPLINARY ACTION.\n\nTo: Mutō Nobuyoshi, Commander of the Kwantung Army\n\nSubject: AAR - Shanhai Pass Operations Secured\n\nAfter the immediate refusal by the Chinese, we requested the IJA 8th Division to secure the Shanhai Pass, consisting of armored trains and tanks, along with significant Imperial air support. The IJN's 2nd Fleet bombarded strategic positions along the immediate coastline, to great effect. \n\nThis combined arms approached created an extremely chaotic situation for the garrison of Shanhaiguan, where the Great Wall of China meets the sea. Combined with inferior technological capability and better training in the Kwantung Army, the battle became a bloodbath. NEA commander Shi Shian was forced to abandon the wall itself and evacuate south, only after the slaughter of half of his 40,000 troops.\n\nWith this victory in hand, it is safe to say that the first stage of Nekka Sakusen is a resounding success. At your approval, we can finally initialize the second and final stage of the battleplan - an invasion of Rehe."
 JAP_Nekka_Incident.5.A: "Excellent! Prepare the trains, we will move hastily."
 JAP_Nekka_Incident.6.t: "A Manchurian Rehe"
 JAP_Nekka_Incident.6.d: "IMPT:  DOCUMENT IS FOR KANTŌ-GUN OFFICERS ONLY. UNAUTHORIZED DISTRIBUTION SHALL MERIT DISCIPLINARY ACTION.\n\nRehe is a region that, to the naked eye, seems useless to fight for. Sure, we could say that its one less territory off the Chinese vermin, and another victory for the Toku Heidan. No no, to fully understand it's value, we mustn't look at the pragmatism but on the symbolisms.\n\nRehe has context, a Manchurian context. It was a haven for the gentry and noble, most especially the Manchu Emperors, who stayed every summer in the Mountain Resort palace, a place where the Emperors could escape the political theatre of the Middle Kingdom. Of course, this was during the time when Emperors were revered in China, and not the tainted and misguided ideology of Republicanism that exists today.\n\nRehe now is just one of many territories the Nanjing government \"controls,\" a land of banditry and anarchy with puny governors who are merely just warlords in disguise. As such, it is morally and symbolically right to retake Rehe for the Manchu people. \n\nThere are many ways to approach this. General Tang Yulin - the so-called Chairman of the Rehe Government - could be influenced if we invited him for a meeting. Or as is known, direct military action has served us well."
 JAP_Nekka_Incident.6.A: "Invite the General, he may be useful to our cause, diplomatically."
 JAP_Nekka_Incident.6.B: "Forgo the meeting, seize the border towns. Let us proceed with next steps."
 JAP_Nekka_Incident.7.t: "The Deal with Yulin"
 JAP_Nekka_Incident.7.d: "Tang Yulin - Chairman of the Rehe Government and one of many warlords who rule the region. Originally a general of the Fengtian Clique, he was appointed to govern Rehe, along with the 12th Fengtian Army. Once Chairman Chiang's armies started knocking at his door however, he was able to secure his position - becoming Chairman under the banner of the Kuomintang. \n\nMuch like every warlord, he has had his fair share of corruption and misuse of authority. His frequent usage of extortion and exorbitant taxes have allowed him to rule, much more akin to a Kingpin than a Governor. Not to mention his insatiable lust for the criminal underworld, using it as a conduit for illegal wealth through the Treaty Ports, selling opium, antiques, and other luxury goods and property, to his most favorite clients, the Italians. One would think he would be open to any negotiation. \n\nHowever, despite his criminal nature, it seems General Yulin has a nationalist side. After being offered riches beyond his wildest dreams, and a permanent rule over Rehe, he has refused every offer we have handed to him. An unfortunate setback, but no matter. The General, along with the entire Northeastern Army, will be destroyed and all his riches shall become ours."
 JAP_Nekka_Incident.7.A: "A grave insult, and one that will be punished!"
 JAP_Nekka_Incident.8.t: "The Kwantung Army seeks...approval?"
 JAP_Nekka_Incident.8.d: "\"...upon which the cities of Chaoyang and Kailu shall be taken in the initial stages, with the 4th Cavalry Brigade taking Chifeng and, along with the 1st Special Tank Company, take Chengde. We expect minimal resistance from the local Chinese forces, considering their equipment is inferior in nature, with only a handful of heavy weaponry in hand and with very limited ammunition.\"\n\nThose were the words of the Kwantung Army representative presenting the \"strategic operation\" plan to Hirohito. Seems that our previous protests against the last incursion have brought the Army officials to Toyko, seeking Imperial approval. However, Hirohito knows the military, with their thirst of conquest and their vengeance against the Chinese, will not stop at Rehe. The Emperor knows better - carte blanche to the militarists effectively signs off any hope for civilian rule. Instead, Showa plays his ace.\n\n\"General, the operation is approved.\" \n\n\"There is only one thing I ask of you - do not, under any circumstance, go beyond the Great Wall.\" \n\n\"The destruction of this Chinese symbol will surely guarantee further bloodshed and will paint us as warmongers among international circles. Invade Rehe and finish this needless war, but not a step more.\"\n\nStunned, the officer bowed. \"I will give you every assurance that your request will be honored.\"\n\nThe soldier continues his walk through the gates and outside the Imperial Palace. As he walks down the blocks, and into history, he pulls out a map and begins to draw..."
 JAP_Nekka_Incident.8.A: "Orders can be so easily misunderstood, can't they?"
 JAP_Nekka_Incident.9.t: "The Retreat from Rehe"
 JAP_Nekka_Incident.9.d: "IMPT:  DOCUMENT IS FOR KANTŌ-GUN OFFICERS ONLY. UNAUTHORIZED DISTRIBUTION SHALL MERIT DISCIPLINARY ACTION.\n\nTo: Mutō Nobuyoshi, Commander of the Kantō-gun\n\nSubject: Great Wall of China, subdued.\n\nSir,\n\nImmediately after approval by His Majesty The Emperor, our troops along with the 4th Cavalry Brigade and the 1st Special Tank Company took over and occupied the strategic cities of Chaoyang, Kailu, Chifeng, and Chengde with minimal resistance. Although the Northeastern Army was at a steep disadvantage, they did attempt to combat our forces, with minimal to no success.\n\nIncluded in this package is a picture of the moment our forces breached and captured the Northern Great Wall of China. It is a glorious day to have captured such a symbol as this. Although intelligence states that Generalissimo Chiang Kai-shek will deploy additional forces to the National Revolutionary Army, we have profoundly concluded that they will be unable to dislodge our current defenses.\n\nWith Nekka Sakusen a total success, it is my advice we best start negotiations with the Chinese. While our power is great, failure to negotiate and end the ongoing incident may invite international powers into the conflict, likely to try and gain their own share of China. Furthermore, while stable, our supply lines are long and time is needed to shore up our new territory."
 JAP_Nekka_Incident.9.A: "A great day, General, a great day!"
 JAP_1IMB_tt: "The £tank_icon_1_20x20 §Y1st Independent Mixed Brigade§! will be deployed"
 JAP_Nekka_Incident.10.t: "Kwantung Army Overruns the Great Wall!"
 JAP_Nekka_Incident.10.d: "[FROM.GetNewsIcon]Stunning news just released by the Imperial General Headquarters (IGH) today, as the IJA and the IJN have released details of the seemingly unknown Operation Nekka.\n\nA two-stage plan that involves taking the strategic Manchurian territories of Rehe and the Great Wall, it seems that the operation has been a great success. Minimal losses of life from our own soldiers, while heavy casualties upon the Chinese forces, have only bolstered spirits.\n\nStating the superiority of Japanese weaponry and military doctrine, this is a historical moment in Japan's quest to liberate Asia from the imperial powers and their corrupt and traitorous collaborators. As Japanese soldiers march across the cities of Chengde, Chaoyang, Kailu, and other cities in the territories, they are often greeted by the local Manchu populace, celebrating their liberation and unification with their fellow Manchu brethren in the State of Manchuria.\n\nThis is a glorious day for Japan, one of many that shall come!"
 JAP_Nekka_Incident.10.A: "Tennoheika Banzai!"

 # Tanggu Truce
 JAP_Tanggu_Truce.1.t: "A Meeting in Tianjin"
 JAP_Tanggu_Truce.1.d: "Tianjin, the city that never sleeps. Ever since the days of Unequal Treaties and Gunboat Diplomacy, the city of Tianjin was considered the gateway of Northern China to the outside world. Everything from antiquities, porcelain, even narcotics, all go through cities like Tianjin before they are injected into the Chinese market or the global economy. Of course, we are not blinded by such an opportunity.\n\nMuch like the West, the Empire has set up its own sphere of influence within the city, using it as a means for economic advancement and, if necessary, subverting the Republic from within. The treaty ports have become a haven for both conglomerates, Kempeitai personnel, and mere prospectors looking to gain wealth and influence within greater China. However, today, it serves a different purpose entirely.\n\nOne of the many perks of a Treaty Port is it's inherent neutrality, considering the many stakeholders that are often at odds with one another. With this diplomatic standing, we can easily negotiate with the Chinese, without fearing any form of intervention or unexpected outcomes between both parties. Perhaps it is time that we meet with the Nanjing government, and finally put an end to these trangressions, once and for all."
 JAP_Tanggu_Truce.1.A: "Treaty diplomacy is still our objective."
 JAP_Tanggu_Truce.2.t: "The Issue of Manchuria"
 JAP_Tanggu_Truce.2.d: "Manchuria, the new lifeline of the Empire, and the most contentious subject of negotiations. The blood spilt on foreign lands was all because of this breadbaskest of Northern China, whose economic potential is profound and of great interest for Nippon. Politicians, Bureaucrats, Militarists - all see the great beauty that can be cultivated for Japan, with its vast amounts of raw materials and nearly limitless supply of cheap labor.\n\nAs such, we cannot compromise on this issue. No form of negotiation or alternative option can defeat the great Manchurian issue. Our only and final demand is this - Recognize the sovereignty of the State of Manchuria, and cease all claims within the region. Manchuria is a client state of Japan, and subverting its sovereignty is, in turn, subverting the sovereignty of Nippon...\n\n...and will be treated as such."
 JAP_Tanggu_Truce.2.A: "Finally, these cowards acquiesce to our Manchuria"
 JAP_Tanggu_Truce.3.t: "The Issue of Militarization"
 JAP_Tanggu_Truce.3.d: "While we are unequivocally superior than our Chinese counterparts, hubris has a way to catch us off guard, and it might just our excessive confidence in our superiority might just defeat us on the battlefield. Of course, that is assuming that we are directly bordering them, with their troops stationed at the border, ready to attack should tensions escalate. Remove the troops however, and the border states are free real estate for us.\n\nAs such, another demand shall be presented to the Chinese delegation - a 100 kilometer DMZ extending south of the Great Wall from Beijing to Tianjin, with the Great Wall itself under our control. Japanese aircraft and military units are allowed to enter the area as a form of treaty enforcement, and a law enforcement agency called the \"Demilitarized Zone Peace Preservation Corps\" shall serve as the peacekeepers of the region."
 JAP_Tanggu_Truce.3.A: "The Chinese vermin mustn't be at our doorstep"
 JAP_Tanggu_Truce.4.t: "The Issue of Anti-Japanese Volunteer Armies"
 JAP_Tanggu_Truce.4.d: "Despite our best efforts to liberate lands from the yolks of banditry, savagery, and human corruption, there are still people who cling to their old traditions or simply despise us, seeing us as conquerors who are to enslave their territory. That is the basic definition of the Anti-Japanese Volunteer Armies - men blinded by the past that they cannot look towards a brighter future or people who despise a superior force than they are. These bandits have been a mild annoyance, especially in pacification operations, for they are more armed and slightly better trained than other bandits.\n\nAs such, we shall include a rather secret clause into the agreement - the newly created Peace Preservation Corps must be comprised of personnel not affiliated with the Anti-Japanese Volunteer Armies in any shape or manner. If found to have affiliations, they are to be terminated from their position."
 JAP_Tanggu_Truce.4.A: "Anti Japanese equates to Anti Life"
 JAP_Tanggu_Truce.5.t: "The Tanggu Truce"
 JAP_Tanggu_Truce.5.d: "[FROM.GetNewsIcon]\nAt long last, the people of Nippon have finally secured the jewel that is Manchuria! Our negotiators have finally returned from Tianjin and have proclaimed that the Chinese vermin have finally kowtowed to our demands. Coined by the negotiators as the \"Tanggu Truce\", we have gained ownership of a vast new region with limitless economic opportunities and have finally gained the mandate to civilize these lawless lands and cleanse it of banditry and savagery.\n\nIt is a historic moment for the people of Nippon, for we have shown the world that the Asian Dragon has slipped from its pedestal, with the Rising Sun destined to become the guiding hand that shall make Asia bloom into a paradise for the world! Long Live Nippon! Long Live His Majesty The Emperor!"
 JAP_Tanggu_Truce.5.A: "Tennoheika Banzai!"
 
# The Imperial Assent

 JAP_The_Imperial_Assent.1.t: "The Letter from Manchuria"
 JAP_The_Imperial_Assent.1.d: "The letter was full of gratitude and almost theatrical in tone. Puyi accepted the promotion without hesitation, as expected. He described it as a moment of restoration, a return to dignity. His words were carefully chosen, but the emotion underlying them was clear. The crown of Manchukuo provided the former Qing emperor with some, albeit artificial, relief from the humiliation of the end of his imperial reign in 1912.\n\nThe decision was already made. The Kwantung Army had long advocated for it. Civilian ministries in Tokyo had expressed concerns, but their voices have become quieter in recent years. The army wielded complete power in Manchuria, while Tokyo had little control over the army. Nonetheless, Hirohito had authorised the coronation. To do otherwise would cause domestic strife and disorder in Manchukuo, as well as dissatisfaction among many.\n\nHe folded and set the letter aside. The coronation would take place soon, in Xinjing, under the banners of unity and independence. It would be orderly, ceremonial, and controlled. The international response would be critical, as usual, but Japan had already withdrawn from the League. There was little else the outside world could do except protest."
 JAP_The_Imperial_Assent.1.A: "Puyi can sit upon his throne - we are the true masters."

 JAP_The_Imperial_Assent.2.t: "The Dragon of China"
 JAP_The_Imperial_Assent.2.d: "Kenji Doihara stood near the back of the grand hall in Xinjing, watching Puyi ascend the steps to the throne. The room was quiet and heavy with ceremony. Japanese officers stood stiff in their uniforms along the walls, while invited guests, including Chinese officials, Manchu nobles, and Kwantung Army officers, observed in polite silence. Puyi looked like a monarch, with his robes, crown, and posture.\n\nBut Doihara understood the truth. Puyi ruled nothing without Japan's consent. This coronation gave the appearance of independence, but it was actually a tool. The locals would be more likely to accept Manchukuo if it resembled something familiar, such as an emperor, a court, or a sense of the old Qing monarchy. This would make it easier for Japan to utilise Manchuria for its own purposes.\n\nDoihara stood motionless as Puyi bowed before the audience and delivered his prepared speech. The words had little meaning for him. They had been edited and approved well before today. What mattered was the image: a native emperor standing under the rising sun. Japan would rule from behind the scenes, through advisors and officers. But Puyi would be the face. The ceremony concluded with scattered applause. Puyi sat on the throne, expression fixed, nerves barely concealed beneath his calm. Doihara turned and walked out of the hallway."
 JAP_The_Imperial_Assent.2.A: "There is much work ahead..."

 # The Manchuria Lifeline
 JAP_The_Manchurian_Lifeline.1.t: "Directly Invest into Manchuria's Treasury"
 JAP_The_Manchurian_Lifeline.1.d: "Money runs the world, and the Yen is no exception. Allowing our puppet state to tap into our vast resources will surely only further the gains and material that can be pulled from the state. Note: This event can fire multiple times, and money will be pulled immediately upon selection of amount."
