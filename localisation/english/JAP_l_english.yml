 JAP_Yen_Bloc_0: "Yen Bloc"
 JAP_Yen_Bloc_0_desc: "Seeking economic independence from Western powers and greater integration across its expanding sphere of influence, Japan has launched the Yen Bloc, a self-contained financial system designed to unite East Asia under a single economic framework. By pegging the currencies of occupied and allied nations to the yen, we will be able to stabilise trade, control regional capital flows, and reduce reliance on foreign markets, all while amplifying the role of Japan in Asia. Though still in its early stages, this bloc provides us with a critical tool for consolidating our control over occupied territories and allies, thereby creating a new economic order free of Western powers and aligned with Japanese interests."

 JAP_Yen_Bloc_1: "Yen Bloc"
 JAP_Yen_Bloc_1_desc: "Seeking economic independence from Western powers and greater integration across its expanding sphere of influence, Japan has launched the Yen Bloc, a self-contained financial system designed to unite East Asia under a single economic framework. By pegging the currencies of occupied and allied nations to the yen, we will be able to stabilise trade, control regional capital flows, and reduce reliance on foreign markets, all while amplifying the role of Japan in Asia. Though still in its early stages, this bloc provides us with a critical tool for consolidating our control over occupied territories and allies, thereby creating a new economic order free of Western powers and aligned with Japanese interests."

 JAP_Yen_Bloc_2: "Yen Bloc"
 JAP_Yen_Bloc_2_desc: "Seeking economic independence from Western powers and greater integration across its expanding sphere of influence, Japan has launched the Yen Bloc, a self-contained financial system designed to unite East Asia under a single economic framework. By pegging the currencies of occupied and allied nations to the yen, we will be able to stabilise trade, control regional capital flows, and reduce reliance on foreign markets, all while amplifying the role of Japan in Asia. Though still in its early stages, this bloc provides us with a critical tool for consolidating our control over occupied territories and allies, thereby creating a new economic order free of Western powers and aligned with Japanese interests."

 JAP_Jewish_Settlers_Encouraged: "Jewish Settlers Encouraged"
 JAP_Jewish_Settlers_Encouraged_desc: "Following internal discussions between members of the Kwantung Army and the civilian government, we have decided to quietly encourage Jewish immigration to Manchukuo. The program, framed as a practical initiative rather than a charitable gesture, seeks to attract settlers with financial resources, technical skills, and international connections, all of which are highly valuable qualities for the development of our occupied territories. This policy, while contentious, has gained support from officers and planners who see it as an opportunity to stimulate commerce, populate strategic zones, and subtly counter Western narratives, all while maintaining a firm imperial grip and military supervision."

 JAP_The_Big_5_Continue_to_Exist: "The Big 5 Continue to Exist"
 JAP_The_Big_5_Continue_to_Exist_desc: "In the aftermath of our occupation of Hawaii, rather than dismantling the entrenched oligopoly of sugar barons known collectively as the \"Big Five\", we have chosen to keep their operations running, at least temporarily. These five conglomerates have long had a virtual monopoly on the islands' plantations, ports, shipping networks, and political institutions. By retaining the Big Five, we ensure a functional economic machine that can be redirected to imperial needs with minimal disruption. These companies already have established labour networks, supply chains, and logistical expertise, which we can leverage for military provisioning and economic extraction. In exchange, the conglomerates are granted limited autonomy under the supervision of the Kikakuin, with the explicit understanding that no disloyalty will be tolerated."

 JAP_The_Big_5_have_been_Broken: "The Big 5 have been Broken"
 JAP_The_Big_5_have_been_Broken_desc: "With Hawaii firmly under our control, our authorities have moved quickly to break the stranglehold of the so-called \"Big 5\" - the American sugar conglomerates that once dominated the islands' economies and politics. Their monopolies have been dismantled, their assets seized, and their power has been drained. Hawaii's economy is currently being reorganised to serve the Empire's interests, with the Kikakuin's firm guidance. Japanese officials and planners have replaced foreign capitalists, ensuring that production, trade, and labour are in line with our national priorities."

 JAP_Co_Prosperity_Sphere: "Dai Toa Kyoeiken"
 JAP_Co_Prosperity_Sphere_desc: "With the waves of war affecting Asia, we have decided to support the concept of a new order based on the Greater East Asian Co-Prosperity Sphere. Cooperation with Japan promotes modernisation, industrial prosperity, and the preservation of our sovereignty. Across the country, officials and troops collaborate with our new allies, driven by the hope that this alliance will lead to a better future. Despite doubts and sacrifices, we believe in the promise of a common destiny, hoping that loyalty will allow us to reclaim our rightful place in Asia's rebirth."

 JAP_Superior_Will: "Superior Will"
 JAP_Superior_Will_desc: "Nationalism, militarism, economic growth and military modernization. These factors, when combined, have instilled in our people a sense of national purpose and determination. Individualism has no place in the Japanese social system. This system of obedience and loyalty extends to the community and Japanese life in general; it spreads upward from the family unit through neighbourhood associations, schools, factories, and other larger organisations, until our entire nation is imbued with the spirit of self-sacrifice, obedience, and loyalty to the Emperor himself. The goal of all this intense spiritual training is to imbue our soldiers with a spirit that can withstand and even spur them on to greater endeavours when faced with the hardships of warfare. Our soldiers are distinguished by their blind and unquestioning submission to authority. The will to fight until the end or commit suicide rather than be taken prisoner."
