 # Strike South Doctrine
 JAP_Strike_South_category: "Strike South"
 JAP_Strike_South_category_desc: "\n\n\n£decision_header_JAP_Strike_South_Doctrine£\n\n\n\nThe time has come for us to push southward, seizing the resources and vital lands needed to sustain our expanding empire. Southeast Asia holds the key to our future dominance due to its abundant natural resources and strategic location, which is critical to our military and industrial needs. Western countries, particularly the British, Dutch, and Americans, have long maintained a stranglehold on these lands, preventing our expansion. We must act quickly and decisively to end their colonial presence and seize control of these critical territories."
 JAP_Sue_for_Peace_with_the_West: "Sue for Peace with the West"
 JAP_Sue_for_Peace_with_the_West_desc: "To break the arrogance of the Western powers and force them to the negotiating table, the Empire must seize absolute dominance across the entire Asia-Pacific theatre. The Allies, intoxicated by the industrial power of the United States, will not yield to half-measures, nor will they respect anything short of total Japanese mastery. We must capture every major stronghold that anchors their presence in the region: Manila, Batavia, Hong Kong, Rangoon, Singapore, Delhi, Sydney and finally Hawaii. Only by securing these decisive points, and thus demonstrating that no Western foothold can withstand the Emperor's armies, can we compel the Allies to accept terms befitting the Rising Sun. Once these objectives are achieved, Japan may demand peace with the confidence of undeniable supremacy.\n\n§YIf rejected, another proposal can be sent after 6 months.§!"
 JAP_Pressure_Siam: "Pressure [SIA.GetNonIdeologyNameDEF]"
 JAP_Pressure_Siam_desc: "[SIA.GetNonIdeologyName] is located in an interesting part of Asia. Its location, sandwiched between Indochina and Burma, with Malaya to the south, means that it could be attacked at any time by the western imperialist powers of Britain and France. However, it also implies that it can strike back against them, and with a strong ally and sufficient support, it could be extremely useful in securing the region for us.\n\nWe should approach their government without hesitation, hoping that they will recognise the gravity of the situation and, perhaps, promise them more power and wealth in the world. It should also be noted that they have a large supply of rubber, which will allow us to ensure a consistent supply of the much-needed resource."
 JAP_Prepare_Operation_AI: "Prepare Operation AI"
 JAP_Prepare_Operation_AI_desc: "In the Pacific, our goals have shifted from acquiring resources to eliminating the American threat. The American fleet stationed in Pearl Harbour continues to pose a significant challenge to our authority in the region. To accelerate the implementation of our plans to expand throughout Southeast Asia, we must destroy America's position in the Pacific. With the necessary knowledge and cooperation, we can ensure that the Pacific is free of any forces that would dare to threaten the Rising Sun."
 JAP_Hull_Note_Received: "§YWe have received the Hull Note§!"
 JAP_Operation_M: "Launch Operation M"
 JAP_Operation_M_desc: "The Philippine archipelago stands as a critical forward base for American power projection in Asia. As long as the United States maintains its colonial presence there, our southern flank remains threatened. Operation M aims to neutralize American forces in the Philippines through rapid and decisive strikes. By capturing key islands, airfields, and ports, we will cripple American influence in Asia, sever their strategic reach, and secure a defensive perimeter essential for Japan's long-term dominance in the Pacific."
 JAP_Operation_E: "Launch Operation E"
 JAP_Operation_E_desc: "Malaya is a land of immense strategic importance. The vast natural resources of rubber and tin under British control here are critical to our war machine. The British colonial presence impedes our efforts to obtain critical resources for our military and industrial needs. Operation M will launch a rapid and overwhelming attack on British forces in Malaya, breaking down their resistance and seizing key resource-producing areas."
 JAP_Operation_DE: "Launch Operation DE"
 JAP_Operation_DE_desc: "The Dutch East Indies possess some of the most valuable natural resources in the world—oil, rubber, and minerals essential for sustaining our empire's industrial and military expansion. Dutch colonial rule, backed by Western powers, threatens our ability to secure these lifelines. Operation DE will swiftly strike at the Dutch East Indies, overwhelming their defenses before foreign intervention is possible. By capturing the rich oil fields and securing key islands, we will guarantee Japan's strategic autonomy and secure resources vital for our war effort."
 JAP_Operation_U_Go: "Launch the U Go Offensive"
 JAP_Operation_U_Go_desc: "India is a large and resource-rich country, but it also represents a significant gap in the British Empire's control over the East. Operation U-Go is our strategy for striking at the heart of the British Raj, undermining their authority in the region and forcing them out of Asia entirely. By assisting local insurgent organisations and waging a planned military campaign, we will bring India under our control while denying Britain her crown jewel."
 JAP_Begin_Training_a_Burmese_Independence_Army: "Begin Training a Burmese Independence Army"
 JAP_Begin_Training_a_Burmese_Independence_Army_desc: "Burmese resistance to British control is growing, and we must support local movements to further undermine British authority in the region. By training and arming the Burmese Independence Army, we will create a formidable indigenous force capable of challenging British dominance and weakening their position in Southeast Asia. By assisting the Burmese in their fight for independence, we would pave the way for a unified Southeast Asia under Japanese rule, weakening the British and solidifying our regional dominance."

 JAP_Training_Burmese_Army: "§jThe IJA will secretly train formations of Burmese nationalists.§!\n\n"
 JAP_Prepare_for_Attack_on_USA: "§RWe will start preparing for an attack on Pearl Harbor§!"
 JAP_Pearl_Harbor_var_tt: "This strike will be the opening, and hopefully closing salvo on Japan's battle for survival. Certain choices have the potential to §Gincrease the chances of success§!, albeit with some §Rrisks§!."
 JAP_Pearl_Harbor_var_increased_tt: "§YThis will increase our chances of success§!, §Ralong with our risks§!"
 JAP_Tora_Tora_Tora_tt: "§YOur choices will have an effect on the outcome of this attack.§!"

