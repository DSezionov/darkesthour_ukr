 JAP_Overstretched_Supply_Lines: "Overstretched Supply Lines"
 JAP_Overstretched_Supply_Lines_desc: "The Empire's rapid territorial gains have pushed supply routes far beyond their original capacity. The logistical network now stretches thousands of miles across hostile waters and difficult terrain. Maintaining a consistent and secure flow of vital supplies, such as fuel, food, ammunition, and reinforcements, to forward units is a never-ending challenge. These long supply lines are extremely vulnerable to enemy interdiction. Submarine wolfpacks, air raids, and partisan sabotage regularly disrupt convoys and damage critical infrastructure. Delays and shortages on the front lines require commanders to heavily ration resources, leaving many men without food or ammunition, severely reducing overall combat effectiveness."

