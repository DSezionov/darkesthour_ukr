 # Defending the Empire
 JAP_Defending_the_Empire_category: "Defending the Empire"
 JAP_Defending_the_Empire_category_desc: "\n\n\n£decision_header_JAP_Defense_of_the_Empire\n\n\n\n\nThe Japanese Empire is encircled by enemies. To preserve our empire and protect the fruits of our conquests, we must fortify our defences at every outpost and along every coast. Fortifications, bunkers, and coastal guns will form an iron shield against invasion.\n\n§RJapan shall never bow, and any who dare to challenge our sovereignty will break upon our defences§!."

 JAP_Fortify_Minamitorishima: "Fortify [648.GetName]"
 JAP_Fortify_Minamitorishima_desc: "[648.GetName] may be small, but its location in the far Pacific makes it an important early warning station and staging ground for reconnaissance. By fortifying its defences with coastal batteries and air cover, we ensure that this remote outpost remains a thorn in the side of any advancing fleet."
 JAP_Fortify_Saipan: "Fortify Saipan"
 JAP_Fortify_Saipan_desc: "The Marianas are at the heart of our Pacific perimeter, and Saipan is its most important bastion. If properly fortified, it can prevent the enemy from gaining a foothold and attacking deeper into Imperial territory. Building strong defences here guarantees that any attempt to seize the island will be met with fierce resistance."
 JAP_Fortify_Palau: "Fortify Palau"
 JAP_Fortify_Palau_desc: "Palau controls the southern approaches to our Pacific possessions, which is an important link in the chain that protects our Empire. If we allow this territory to fall, the enemy will gain a foothold for future attacks. Building strong defences here guarantees that any attempt to seize the island will be met with fierce resistance."
 JAP_Fortify_Iwo_Jima: "Fortify Iwo Jima"
 JAP_Fortify_Iwo_Jima_desc: "Iwo Jima, located midway between the Marianas and the Home Islands, is Japan's natural shield. Its airfields and coastal defences must be strengthened to ensure that no fleet or bomber passes undetected. Losing Iwo Jima would mean opening the path to Tokyo, so it must be made impregnable."
 JAP_Fortify_Okinawa: "Fortify Okinawa"
 JAP_Fortify_Okinawa_desc: "Okinawa is the Empire's final line of defence before the Home Islands. As the natural gateway to Kyushu, it will undoubtedly be a target for any invaders. Strengthening its defences will transform the island into a fortress, ensuring that those who attempt to land there pay a high price before ever threatening the homeland."

 JAP_Fortify_the_Amur: "Fortify the Amur"
 JAP_Fortify_the_Amur_desc: "The Amur River forms a vast natural border between Manchukuo and the Soviet Union. By building bunkers, artillery positions, and strongpoints along the river, we can turn the Amur into a formidable barrier that will sap enemy strength before they can advance any further."
 JAP_Fortify_the_Argun: "Fortify the Argun"
 JAP_Fortify_the_Argun_desc: "The Argun River, while smaller than the Amur, remains an important border that separates us from Soviet territory. Fast-moving forces could use this location to launch an unexpected attack on Manchuria. Strengthening its defences ensures that the Argun will act as a first line of defence, deterring any enemy attempts to breach our borders."
 JAP_Fortify_the_Ussuri: "Fortify the Ussuri"
 JAP_Fortify_the_Ussuri_desc: "The Ussuri frontier is a vulnerable flank, located too close to Vladivostok and the Soviet Pacific forces. A Soviet offensive here could cut deep into our northern territories. By building strong fortifications along the Ussuri, we can protect against such incursions and ensure that any Soviet offensive suffers heavily before crossing."
 JAP_Fortify_the_Sungari: "Fortify the Sungari"
 JAP_Fortify_the_Sungari_desc: "The Sungari River runs through the heart of Manchuria, and leaving it undefended would spell disaster. If the Soviets manage to penetrate our forward defences, the Sungari will have to act as a last defence. Fortifying its banks with artillery, bunkers, and strongpoints will transform the river into a protective barrier for the region's interior."
 JAP_Fortify_the_Yalu_and_Tumen: "Fortify the Yalu and Tumen"
 JAP_Fortify_the_Yalu_and_Tumen_desc: "The Yalu and Tumen rivers form the border between Korea, Manchuria, and Soviet influence. Their defence is critical not only to the security of our territories, but also to the protection of the Empire's southern frontier. Strong fortifications will protect both the Korean Peninsula and the Manchurian border from hostile attacks."

 JAP_Volunteer_Fighting_Corps: "Raise the Volunteer Fighting Corps"
 JAP_Volunteer_Fighting_Corps_desc: "In the final hours, every capable soul has to be summoned. The Volunteer Fighting Corps mobilises civilians as a last-ditch militia, with men aged 12 to 65 and women up to 45 pressed into service. They are poorly armed and trained in rudimentary fire fighting techniques and elementary first aid, and they serve as a grim last line of resistance when all else fails."
 JAP_Mutsu_Go: "Prepare Mutsu-Go"
 JAP_Mutsu_Go_desc: "The southern approaches to the Home Islands are vulnerable to enemy ships and bombers. To protect Kyushu, the gateway to the Inland Sea, new coastal artillery batteries, reinforced bunkers, and anti-aircraft emplacements will be built to ensure that no enemy force will set foot on Kyushu without paying a high price."
 JAP_Special_Bombers: "Build 'Special' Bombers"
 JAP_Special_Bombers_desc: "Conventional methods alone may be insufficient to repel a determined enemy assault. By creating 'special' bomber units, we can field aircraft designed for one-way missions with maximum impact. Though the pilots lack the full training of seasoned veterans, their determination and willingness to sacrifice will enable them to strike with devastating force."
 JAP_Destroy_the_Ports: "Destroy the Ports"
 JAP_Destroy_the_Ports_desc: "If the enemy is successful in landing on our shores, they must not be allowed to use our harbours to supply their troops. By developing demolition and sabotage plans for key naval bases, we ensure that any foothold is starved of support. Despite the significant cost to our own infrastructure and future strength, denying the invader immediate access to our ports could prove decisive in the defence of the Home Islands."
 JAP_Fortify_Tokyo_Bay: "Fortify Tokyo Bay"
 JAP_Fortify_Tokyo_Bay_desc: "The heart of the Empire must be impenetrable. Tokyo Bay, the gateway to our capital and the Imperial Palace, cannot be left open to foreign incursions. By strengthening coastal fortifications and defensive emplacements in the Kantō region, we can turn this vital harbour into an iron wall."

 # Formable Puppets
 JAP_State_of_Burma: "Form the State of Burma"
 JAP_State_of_Burma_desc: "The long-oppressed land of Burma has been freed from the chains of British colonial tyranny by the might and benevolence of the Imperial Japanese Army. The time has come to reward the Burmese people's yearning for self-determination and guide them onto the path of true independence—within the enlightened leadership of the Greater East Asia Co-Prosperity Sphere. Dr. Ba Maw, a proud son of Burma and a firm friend of Japan, shall be entrusted with the reins of leadership. A new Burma shall rise—disciplined, united, and loyal—an eastern brother in our righteous struggle against Western imperialism."
 JAP_BIA_tt: "§jThe Burmese Independence Army is deployed to defend the State of Burma.§!"
 JAP_A_Collaborationist_Malaya: "Establish a Collaborationist Malaya"
 JAP_A_Collaborationist_Malaya_desc: "With the Western powers vanquished in the Pacific, the Empire of Japan now holds dominion over Malaya and the former British territories of North Borneo. Within our military and administrative councils, many advocate for direct governance and colonization to secure the rich resources of these lands for the Empire's needs. Yet a smaller faction proposes an alternative: granting nominal control to the local left-wing anti-colonial movement, the Kesatuan Melayu Muda (KMM). This approach would lend an air of legitimacy to our rule among the local populace while ensuring that the Empire retains effective control over the extraction of valuable rubber deposits."
 JAP_Azad_Hind: "Form the Government of Free India"
 JAP_Azad_Hind_desc: "The mighty Indian subcontinent, for centuries shackled by British greed and oppression, now stirs with the fire of revolution. As our victorious forces drive back the imperialists, the time has come to raise the flag of Indian freedom. With the unwavering leadership of the great Subhas Chandra Bose—Netaji, the Lion of Asia—we shall ignite the flame of liberation across the Ganges, Punjab, and beyond. Under the guidance of the Empire of Japan, the Provisional Government of Free India shall rise not as a puppet, but as a proud partner in the sacred mission of freeing Asia from Western domination. Let the Indian people hear the call: Jai Hind!"
 JAP_Republic_of_Indonesia: "Form the Republic of Indonesia"
 JAP_Republic_of_Indonesia_desc: "We have finally liberated the Dutch East Indies from colonialism. The Indonesian people have enthusiastically welcomed our troops, waving the flag of the Rising Sun and shouting in support of us.\n\nThis is undoubtedly a significant victory. Indonesia, due to its position and natural riches, will take an important part in future conquests. From here, the Philippines and Australia are at our fingertips. The region's rubber plantations and, most significantly, oil deposits are enormous. Indonesia will certainly become a substantial part of our war machine.\n\nWhile the Dutch East Indies have been liberated from colonialism, the minds of its people are yet to be. We have already done much to adequately prepare the Indonesians for freedom, for example supporting nationalist organizations. This was already effective, as the people have been very collaborative and have begun cleansing the nation themselves from Europeans. Although their support dropped largely when they learned they now have to work to maintain their freedom. We shall increase nationalist sentiment in Indonesia even more, to make sure it will be a valuable ally to the sphere. We shall also create a Central Advisory Board, headed by nationalist leader Sukarno, to lead the people."
 JAP_Second_Philippine_Republic: "Form the Second Philippine Republic"
 JAP_Second_Philippine_Republic_desc: "With the American colonizers driven from the islands and the Filipino people yearning for stability, the time has come to restore order and self-governance under enlightened guidance. By establishing the Second Philippine Republic, we will empower loyal Filipino leaders to carry out the sacred task of national reconstruction. Under President José P. Laurel—a man of intellect, patriotism, and vision—the Philippines shall rise once more, this time as a proud partner in the Greater East Asia Co-Prosperity Sphere. Through discipline, cooperation, and shared destiny, the Republic will shine as a model of Asian resurgence and loyalty to Japan's liberating mission."
 JAP_Reinstate_the_Kingdom_of_Hawaii: "Reinstate the Kingdom of Hawaii"
 JAP_Reinstate_the_Kingdom_of_Hawaii_desc: "With the successful occupation of Hawaii, the Empire now has the opportunity to restore the Kingdom of Hawaii as a sovereign state under the guidance of the Greater East Asia Co-Prosperity Sphere. Theresa La'anui, rightful heir to the Hawaiian throne, will be reinstated, and the islands will serve as a loyal partner and strategic outpost in the Pacific. Once subjugated and colonized by the United States in the 1890s, Hawaii now finds a protector in Japan, and its people will prosper under our guidance while contributing to the security and unity of the Co-Prosperity Sphere."
 JAP_Execute_Operation_Meigo: "Execute Operation Meigō!"
 JAP_Execute_Operation_Meigo_desc: "In the face of escalating Allied pressure and the imminent threat of invasion, we must assert total control over French Indochina. The French colonial administration, loyal to the Vichy regime, has become increasingly unreliable and susceptible to Allied influence. To safeguard our southern flank and secure vital resources, we will dissolve the existing colonial government and establish three independent puppet states: the Empire of Vietnam, the Kingdom of Kampuchea, and the Kingdom of Luang Prabang. This strategic move will eliminate French authority, bolster our regional dominance, and integrate Indochina into the Greater East Asia Co-Prosperity Sphere."
 JAP_Execute_Operation_Meigo.tt: "The status quo has allowed us to utilize the ports, bases and supply lines of Indochina without risk of Allied or Chinese invasion. If Meigō is executed, the new states of Indochina will fully join the war, potentially putting the region at risk."

 # Maru Keikaku
 JAP_Maru_Keikaku_category: "The Maru Keikaku"
 JAP_Maru_Keikaku_category_desc: "\n\n\n£decision_header_JAP_Circle_Plans£\n\n\n\nThrough the London Naval Treaty, the Westerners have imposed harsh restrictions on the Imperial Navy. However, we have developed ways to either break or bend the contract. We will commence the building of new warships until the pact's absolute limit is reached, and we will invest in new vessels not specifically stated in the treaty.\n\nBy exploiting the loopholes in the treaty, we will strengthen and expand the Imperial Navy, so that Japan can rule the waves in future!"
 JAP_First_Air_Fleet: "Complete the First Air Fleet"
 JAP_First_Air_Fleet_desc: "The IJN has decided to devote significant resources to carrier fleet development, with carrier warfare remaining an important part of IJN doctrine going forward. The primary goal is to complete the First Air Fleet, which consists of aircraft carriers and hundreds of fighter and bomber aircraft designed for rapid deployment to attack enemy fleets and infrastructure from the sky, while also allowing the IJN to conduct extensive long-range reconnaissance. However, if the First Air Fleet does not reach its target number of vessels in a timely manner many in the admiralty will be dissatisfied, and our naval capabilities will suffer. Meanwhile, successful completion will not only provide the navy with pristine new vessels to fight and train on, but it will also be a major propaganda victory."
 JAP_First_Battle_Fleet: "Complete the First Battle Fleet"
 JAP_First_Battle_Fleet_desc: "The IJN aims to build the First Battle Fleet, a formidable surface force composed of battleships, heavy cruisers, and destroyers. This fleet was designed to ensure our dominance in the Pacific, serving as the backbone of the Empire's naval power and decisively orienting the IJN towards a fleet-based doctrine, as well as a more traditional, firepower-based battle methodology. The successful completion of this fleet will significantly improve naval readiness, provide valuable naval experience, and boost the morale of the officers and sailors. However, delays or, worse, failure to complete this fleet will be a source of great embarrassment for both the government and the Imperial Japanese Navy, attracting the ire of many senior naval officers."
 JAP_Second_Maru_Keikaku: "The Second Maru Keikaku"
 JAP_Second_Maru_Keikaku_desc: "The Navy's first major expansion program provided the Empire with a fleet of modern ships, but that was only the beginning. With rival powers expanding their own fleets and extending their reach, the Admiralty has pushed for a second round of planning. The second Maru Keikaku is intended to be larger and more ambitious than the first. It will bring new carriers, cruisers, destroyers, and submarines into service, but more importantly, it will demonstrate to the world that Japan is committed to maintaining a fleet capable of meeting any challenge."
 JAP_Second_Maru_Keikaku_Complete: "Has Completed the §YSecond Maru Keikaku§!"
 JAP_Third_Maru_Keikaku: "The Third Maru Keikaku"
 JAP_Third_Maru_Keikaku_desc: "With the navy and war machine's expanding needs, our naval planners have proposed a third round of IJN expansion. This third Maru Keikaku outlines an ambitious plan to strengthen the Imperial Navy's balance of power and prevent it from being overshadowed by rival fleets from Britain and America. Unlike previous plans, which focused heavily on completing specific types of vessels, this one prioritises overall modernisation and diversification. Nonetheless, as before, the program calls for the construction of a large number of new capital ships, additional carriers, modern cruisers, and dozens of destroyers and submarines, with a focus on expanding production facilities and dockyards to ensure the IJN has all the resources it requires for continued growth."
 JAP_Third_Maru_Keikaku_Complete: "Has Completed the §YThird Maru Keikaku§!"
 JAP_Fourth_Maru_Keikaku: "The Fourth Maru Keikaku"
 JAP_Fourth_Maru_Keikaku_desc: "The Navy Ministry has unveiled a massive new program that far exceeds any naval initiative previously attempted. This Fourth Maru Keikaku is nothing more than a strategy to match, and eventually outpace, the United States' naval power. Unlike previous programs, which emphasised steady growth and balanced forces, this plan calls for dozens of new capital ships, a significant increase in carrier strength, and an unprecedented number of destroyers, escorts, and submarines. America's construction projects are massive, and if left unanswered, our fleet will soon be dwarfed. To maintain the balance, Japan must fully commit to its \"super-expansion.\""

