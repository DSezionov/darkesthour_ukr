 Backslash: "\n\n"
 Operation_Nekka_1: "§RThe Middle Kingdom's \"Great Wall\" shall crumble before their very eyes!§!\n\nThe Kwantung Army will initiate another conflict with §YChina§!, in and around Rehe, with or without the approval of Tokyo. Additional troops can be provided, but the Toku Heidan has plenty of resources, §Rall on their own.§!"
