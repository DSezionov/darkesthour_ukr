 JAP_Pan_Asianism.10.t: "The Beginning of Dai Toa Kyoeiken" #For Japan
 JAP_Pan_Asianism.10.d: "While existing in other forms and different names for several years already, the idea of a “Greater East Asia Co-Prosperity Sphere”, formally announced by the Foreign Minister in a press interview, is a far more immediate and concrete reality.\n\nIn light of the recent and continuous destabilization of the Old Continent, the Western Imperialists, along with their hold over their colonies in East Asia, have been greatly weakened. This has allowed us to take a far bolder and active stance on the subject of Asian liberation and self-determination, even to the point of conflict.\n\nThe oppressed people of Viêt, Indonesia, and countless other Asian lands will finally be able to proudly state their heritage, national identity and fully express their national aspirations.\n\nThe Empire of Japan, as the foremost economic and military power of the region, will obviously lead the free people of Asia towards everlasting glory and prosperity. For that to happen, however, sacrifices must be made. The Sphere must act as the collective for the mutual benefits of all of its Asian members, with the Home Islands deserving the largest "benefits", appropriate to its position in this International framework. Since ours is the only force capable of challenging the Europeans, to us will most of the iron, aluminum, tungsten, and all manners of strategic goods be transported, because only we have the requisite industrial capacity to process and utilise them effectively. Japanese oversight is, then, after all, will be quite indispensable in all military affairs of our Asian "partners".\n\nPerhaps a time will come in the future when they will be capable of determining their own fate, but for now, the Emperor and his loyal subjects will guide the helpless people of East Asia into a new age."
 JAP_Pan_Asianism.10.A: "Eight corners of the world united under one roof."
