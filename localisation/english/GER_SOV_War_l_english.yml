# Events
######################################################################
 GER_SOV_War.0.t: "Barbarossa Thwarted, New Directives are Required."
 GER_SOV_War.0.d: "The initial stages of Unternehmen Barbarossa resulted in significant advances in Russia, while initially impressive, the advances by the Heer have stalled. And with the frigid winter setting in, the Grenadiers and Panzers have had no choice but to dig in. \n\nThe initially stated objectives have not been met successfully, large bodies of Russian troops have been able to escape encirclement. Along with this, major population and industrial centres are still in enemy hands, and we are still a long way in securing the “A-A Line”.\n\nThis makes the resumption of our advances in the East of almost urgency, for the Bolsheviks cannot be allowed respite to regroup. And accordingly, the OKH has decided to continues our operations as soon as the Summer comes. \n\nBut herein lies our predicament, the frontline units are depleted, supplies are running low, partisans run rampant behind the lines, winter clothing and shelter are lacking, troops stuff their stolen Red Army coats with newspapers to attempt to fight off the cold, but we still endure. After assessing our general situation, simply put- it is logistically and physically impossible to resume the operations on a broad front.\n\nWe can only concentrate our forces in a single particular sector and hope we achieve an overwhelming victory there. And attempt to precipitate a large enough crisis in the Soviet lines, which allows us to eventually fold it and push the Reds out of European Russia. We can either launch an offensive in the North to isolate Russia from foreign aid or smash their lines in the Centre and bifurcate their lines or if we want- we can strike into the Caucasus and pluck the rich pickings of the oil fields in Maikop, Grozny, Baku, etc."
 GER_SOV_War.0.A: "In the North We’ll March!"
 GER_SOV_War.0.B: "Smash Their Centre!"
 GER_SOV_War.0.C: "Into the Caucasus!"

 GER_SOV_War.1.t: "German Betrayal"
 GER_SOV_War.1.d.ENG_alive: "\"...followed by the bombing of major cities in our occupied territories in Poland, as well as an artillery barrage on Red Army defences across the front and air raids as far as Kronstadt, Ismail, and Sevastopol. Ribbentrop issued a formal declaration of war shortly after. We estimate roughly three million soldiers of the Wehrmacht, alongside other foreign units. This amount of mobilised manpower for an invasion is unprecedented and exceeds all of our estimates.\", Field Marshal Voroshilov reported grimly, as Stalin sat motionless on his chair, having been roused in the middle of the night.\n\n\"The fact that they would attack this shortly after signing the pact and open up a second front in the east while still fighting the British in the west is insanity. Has Hitler gone mad? Does he think he can win a two-front war? Convene the General Staff and the High Command; I want the High Command and the Red Army extensively reorganised to prepare for this war, as well as plans developed to identify the Wehrmacht's main attack,\" Stalin responded, astounded by Hitler's audacity.\n\nAt noon, the same message echoed through every Soviet radio, carried by the voice of Vyacheslav Molotov: \"Without a declaration of war, German forces fell on our country, attacked our frontiers in many places. The Red Army and the whole nation will wage a victorious Patriotic War for our beloved country, for honour, for liberty. Our cause is just. The enemy will be beaten. Victory will be ours!\""
 GER_SOV_War.1.d.ENG_capped: "\"...followed by the bombing of major cities in our occupied territories in Poland, as well as an artillery barrage on Red Army defences across the front and air raids as far as Kronstadt, Ismail, and Sevastopol. Ribbentrop issued a formal declaration of war shortly after. We estimate roughly three million soldiers of the Wehrmacht, alongside other foreign units. This amount of mobilised manpower for an invasion is unprecedented and exceeds all of our estimates.\", Field Marshal Voroshilov reported grimly, as Stalin sat motionless on his chair, having been roused in the middle of the night.\n\n\"The fact that they would launch an attack so soon after signing the pact is insanity. We all knew it was only a matter of time, but the madman's audacity. His victory in the west has given him an overabundance of confidence. Convene the General Staff and the High Command; I want the Red Army and the High Command extensively reorganised to prepare for this war, as well as plans developed to identify the Wehrmacht's main attack,\" Stalin responded, stunned by Hitler's audacity.\n\nAt noon, the same message echoed through every Soviet radio, carried by the voice of Vyacheslav Molotov: \"Without a declaration of war, German forces fell on our country, attacked our frontiers in many places. The Red Army and the whole nation will wage a victorious Patriotic War for our beloved country, for honour, for liberty. Our cause is just. The enemy will be beaten. Victory will be ours!\""
 GER_SOV_War.1.A: "A war, a Great Patriotic War, has begun today..."

 GER_SOV_War.2.t: "The Great Eastern Crusade"
 GER_SOV_War.2.d: "After years of preparation, finally, our time has come. Like the Teutonic Order, like the Prussian Kingdom, finally, we will launch all our forces into a new, modern crusade for the liberation of all the Germanic people!\n\nAlong the entire border we share with the Soviets, our troops have started to advance into the despicable communist nation. Ready to take Moscow, Leningrad, Stalingrad, our brave and powerful soldiers will not stop until the complete surrender of the Bolsheviks!\n\nJust like twenty years earlier, the Brest-Litovsk treaty will be enforced by our army! Our main objectives are to liberate Ostland, Ukraine, the Caucasus and Moscow. We will also establish Reichskommissariats here, to ensure the beginning of German colonisation of Russia. After the end of the war, the resources of the Reich will be infinite."
 GER_SOV_War.2.A: "How many crusades are there now? Nine? Yeah, this will be the Ninth Crusade!"

 GER_SOV_War.3.t: "Germany Commences Hostilities with the Soviet Union"
 GER_SOV_War.3.d: "[FROM.GetNewsIcon]The Teutonic Order and its endless wars in Northern Europe. The Prussian Kingdom and its militaristic traditions. The German Empire and its bloody conflict against the whole of Europe.\n\nOnce again, Germany has been responsible for a conflict against a major power of the modern world: the Soviet Union. Following both its Prussians legacy and his anti-bolshevism, the Reich has declared war on his gigantic neighbour.\n\nEven though nobody knows how this conflict will end, many specialists think that this war can only end with one of two scenarios: a victory of Germany, like in 1918 with the Treaty of Brest-Litovsk; or a victory of the Soviets, and the destruction of the German army, much like the Great Army of Napoleon in 1812.\n\nThe future of the war is uncertain, but one thing is clear for everyone: it will end with the total destruction of one ideology. Fascism or Communism."
 GER_SOV_War.3.A: "Fascist Germany declaring war on Soviet Russia? How unexpected..."

 GER_SOV_War.4.t: "Stalin flees to his Dacha"
 GER_SOV_War.4.d: "Despite intelligence agencies' repeated warnings about Germany's intentions, we have been caught off guard and are unprepared for this war. The German blitzkrieg tactic is proving to be extremely effective against our forces. Our air force is being destroyed and refugees are flooding into Moscow and its surrounding cities. Germany's Luftwaffe dominates the skies, bombing both civilian and military targets. They are preparing for a second full-fledged assault.\n\nAs a result of this dire and seemingly hopeless situation, plans have been made for the government and Stalin to temporarily evacuate to Stalin's personal residence, the Kuntsevo Dacha, near the town of Kuntsevo, until the situation has stabilised and the war has turned in our favour. The dacha is located in the heart of a densely forested birch forest and is fortified with a double-perimeter fence, camouflaged 30-millimeter antiaircraft guns, and a security force of 300 NKVD special forces.\n\nAlthough this will ensure Stalin's and other important and high-ranking government officials' safety, it has done a lot of damage to the morale of our troops fighting on the frontlines, who are now fighting without a leader or a purpose and feel abandoned."
 GER_SOV_War.4.A: "If Stalin dies, so do our chances of winning this war."

 GER_SOV_War.5.t: "Party Members Meet Stalin"
 GER_SOV_War.5.d: "[Dynamic_GER_SOV_War_5_desc]"
 GER_SOV_War.5_Stalin_Leads.d: "As a melancholy atmosphere filled the office, the air felt ice-cold. Stalin is well aware that the Soviet Union is not yet prepared for a war of this magnitude. He can't help but despair as a seemingly unstoppable tide of German soldiers crashes into his beloved motherland. He was certainly safe in his Dacha. But how long would this safety last if the fascist dogs took over Russia? All of his efforts to industrialise the country and shape it in his image would be futile.\n\nA knock on the door interrupted his racing thoughts. As the doors slowly opened, it was Khrushchev's face that he recognized first. Following him, a number of other high-ranking party members entered the room. He regained his composure so as not to show any signs of weakness in front of them.\n\nTo say the least, the news from the front was concerning. The ordinary soldiers are demoralised, fighting for no one and without purpose. Desertion rates are at an all-time high, and the Germans are making steady progress.\n\nKhrushchev was the first to speak out in favour of Stalin coming out of hiding and serving as a beacon of hope and inspiration for the Red Army once more. The others followed suit and as one after the other finished presenting their arguments and propositions, Stalin's initial despair turned to determination."
 GER_SOV_War_5_Stalin_Removed.d: "As a melancholy atmosphere filled the office, the air felt ice-cold. Stalin is well aware that the Soviet Union is not yet prepared for a war of this magnitude. He can't help but despair as a seemingly unstoppable tide of German soldiers crashes into his beloved motherland. He was certainly safe in his Dacha. But how long would this safety last if the fascist dogs took over Russia? All of his efforts to industrialise the country and shape it in his image would be futile.\n\nA knock on the door interrupted his racing thoughts. As the doors slowly opened, it was Khrushchev's face that he recognized first. Following him, a number of other high-ranking party members entered the room. He regained his composure so as not to show any signs of weakness in front of them.\n\nTo say the least, the news from the front was concerning. The ordinary soldiers are demoralised, fighting for no one and without purpose. Desertion rates are at an all-time high, and the Germans are making steady progress.\n\nKhrushchev was the first to speak out against Stalin coming out of hiding. The others followed suit and as one after the other finished presenting their arguments and propositions.\n\nStalin's reign has come to the end."
 GER_SOV_War.5.A: "The Red Tsar is back."
 GER_SOV_War.5.B: "Stalin remains in his dacha."

 GER_SOV_War.6.t: "The Great Patriotic War"
 GER_SOV_War.6.d: "With the return of our glorious leader, the time has come to turn this war in our favour. This isn't just any ordinary war; it's a fight for survival and the war to end all wars. If we fail, the Soviet Union and all of its citizens will perish. Everything we've accomplished over the last few decades will be destroyed, and the light of communism will be extinguished once and for all. It will be a massive task, but it is not impossible. Russia has been consistently underestimated in the past, and this time will be no exception. The Germans will be pushed back until our red banner flies over Berlin!"
 GER_SOV_War.6.A: "For this would-be Napoleon, it will be a repeat of 1812."

 GER_SOV_War.7.t: "Red Star Rising"
 GER_SOV_War.7.d: "It seems almost an era ago, when the Fascist Scum betrayed all our standing agreements and "friendship" treaties, and began massive incursions all along our border. Within days, the catastrophe was evident, these “incursions” were the spearheads of massive pincers, that encircled large parts of the Red Army. The Luftwaffe grounded the VVS and the Red Navy was bottled up in the major ports.\n\nWe gave ground, but the nation held on, within months the Soviet society was mobilised for war in the most absolute terms. Massive conscription, Tractor factories being retooled to churn out Armoured Legions, Party bosses mobilising cadres to facilitate the war effort, and the likes were commonplace.\n\nDespite this, there were unmitigated disasters in the early days. But for every Division we lost, we learnt, the STAVKA learnt, the Front Commander learnt, the Army Commander learnt, and the Rifleman who escaped..........he also learnt. And most surprisingly, even the dogs learnt, strapped with explosives they did their fare share to teach the fascist scum. The German officers are ageing men, with experience and all no doubt, but the new breed that is emerging from within the rank and file of Red Army is that of young, dynamic and decisive leaders, destined to turn the tide.\n\nAfter such a heavy cost in manpower, land and material we have accumulated unparalleled experience, new raisings receive experience in "quiet sectors" and are blooded and experience to be committed in offensives. Slowly but surely, we have come a long way, our Army is finally standing ground, even pushing the fascists back in some places. Massive Industrial complexes in the Urals churn out endless lines of tanks, planes and guns, their bright furnaces working all day with no rest. It's time to finally take back the fight to the enemy. For it might be a long way to Berlin for us, but even longer for the Fascists to ever reach the Urals."
 GER_SOV_War.7.A: "Onto Berlin!"

 GER_SOV_War.8.t: "First Moscow Conference"
 GER_SOV_War.8.d: "[FROM.GetNewsIcon]The conference in Moscow was a highly anticipated event in the war effort against Nazi Germany. The three leaders who met were [SOV.GetLeader], the leader of the Soviet Union, [ENG.GetLeader], the Prime Minister of the United Kingdom, and [USA.GetLeader], the President of the United States. The meeting was a result of extensive planning and coordination among the Allies to discuss their strategies and to strengthen their cooperation in the fight against Nazi Germany.\n\nThe meeting was held in a highly secure location, and the leaders held several rounds of discussions on different topics. They discussed the current state of the war, the progress that had been made, and the challenges that they faced. They also discussed the potential risks and opportunities of launching a second front in Europe, and agreed that it was a necessary step to bring an end to the war as soon as possible.\n\nThe conference in Moscow was a significant success, as it marked a significant step in the formation of a grand alliance against Nazi German forces. The Allies' united front and determination to fight for a better future for all is a testament to the strength and resilience of the human spirit. The meeting paved the way for greater cooperation and coordination among the Allies and strengthened their resolve to defeat Nazi Germany and bring an end to the Second World War."
 GER_SOV_War.8.A: "Together in victory!"
 GER_SOV_War.8.B: "This changes nothing, you will still lose!"
 GER_SOV_War.8.C: "The East and West, united as one."

 GER_SOV_War.9.t: "Destruction of the Dneprostroi Dam"
 GER_SOV_War.9.d: "[FROM.GetNewsIcon]Today an enormous explosion was heard from the Dnieper River, and more specifically the Dneprostroi Hydroelectric plant in the city of in the city of Zaporizhzhia, which has been destroyed by dynamite and other high explosives. As of this news publication, the lower levels are flooded with a large amount of water.\n\nIt was believed that this was done by the Red Army as an attempt to stall the enemy advance into eastern Ukraine. The Red Army’s move to destroy such a symbol of Soviet pride shows their determination to fight against their enemies, even if it means scorching their own land so the enemy may not capture them.\n\nThe flooding is projected to lead to large number of civilian casualties, and might also cause casualties to military units within the lower regions, stalling the enemy advance."
 GER_SOV_War.9.A: "These Bolsheviks are a menace to their own nation."
 GER_SOV_War.9.B: "Defend the motherland, no matter the cost!"
 GER_SOV_War.9.C: "Another tragic day in the war."

 GER_SOV_War.10.t: "Your Mother's Prayer"
 GER_SOV_War.10.d: "\"The Germans are not humans.\", Nikolai mutters to himself, thinking about the latest letter he had received from his mother, containing a poem he had read so many times, that it had burned into his memories.\n\n\"We shall not get excited. We shall kill.\", he whispers, as he stands amidst the ruins of a bombed school, taking cover behind a collapsed pillar. Not long ago, in a different life, he was in a similar school like this. Back then he hated it, but now he wishes nothing more than to be back.\n\n\"If you have not killed at least one German a day, you have wasted that day.\", he says, bullets whizzing over his head, contemplating his next actions. The Germans had him pinned down from across the street. Looking around, he realizes he is alone. The rest of his unit is either nowhere to be seen or laying dead on the street. If he hadn't sought cover in the school, he would have shared their fate.\n\n\"Kill the German - this is the cry of your Russian earth.\", he finishes reciting the poem, as the gunfire stopped. As he gets up from behind the pillar, prepared to kill whoever was pinning him down, he sees a boy. A young German boy, no older than 16, maybe the same age as him, struggling to reload his gun. For a second Nikolai froze. The boy was probably forced to be here, just like himself. Then the end of the poem shot into his mind: "Do not waver. Do not let up.""
 GER_SOV_War.10.A: "\"Kill.\""

 GER_SOV_War.11.t: "Every Hand Helps"
 GER_SOV_War.11.d: "Yuiry, a young boy, was awakened earlier than usual today by his mother because it was time to dig trenches. He quickly put on his oversized boots, which his older brother Nikolai had left for him after being sent to the frontlines at the start of the war. Like his brother, Yuiry will go to any length to protect his town and the motherland.\n\nYuiry and his mother were exhausted after working long hours digging and moving planks with the locals. They decided to take a break and rest for a while. During their break, a Kazakh unit arrived in town and was greeted with gifts of food and medical supplies. Yuiry, eager to show his appreciation, quickly ran to his house to grab a fresh loaf of bread. He then approached one of the soldiers, offering him the bread as a gesture of thanks. The soldier, who reminded him a lot of Nikolai, gratefully accepted the bread. And, like Nikolai, the soldier was known for his sense of humour and calm demeanour, even in difficult situations.\n\nSuddenly, the air raid sirens began to wail loudly, and parents and their children hid from the German planes, while Yuiry and his mother ran to their house for safety. Yuiry watched as the soldier took up arms with his comrades and took up positions in the trenches."
 GER_SOV_War.11.A: "Defend the Town!"

 GER_SOV_War.12.t: "A Meeting with the Rising Sun?"
 GER_SOV_War.12.d: "It is becoming increasingly clear that our adversaries in the West are preparing for the final conflict. For months, they have been renouncing us on a daily basis, and their armies have piled up on our shared border. While anything is theoretically possible, there can only be one conclusion. We will fight not only for the survival of the Soviet people, but also of the Slavic race, in the coming war. Their victory will inevitably result in the extinction of our people. This is why the upcoming Western Front will necessitate our undivided attention.\n\nHowever, focusing on the West would mean ignoring another potential problem area. For a long time, the Japanese in the Far East have had their sights set on Vladivostok. They were even fighting with our soldiers in Mongolia a few years ago. They've gotten even more dangerous since then. Not only has their military learned from its mistakes, but Japan and Germany have formed an alliance against us.\n\nIt's not a stretch to believe the Germans will try to persuade the Japanese to thrust a dagger into our backs while attacking us from the front. We must take action to counteract this. We can't just invade Manchuria, no matter how badly we want to. Instead, we must bring Japan to the table and forge our own ironclad agreement."
 GER_SOV_War.12.A: "Anything for peace so we may make ready for war."

 GER_SOV_War.13.t: "An Invitation to Moscow"
 GER_SOV_War.13.d: "Today we received word from Moscow. The Soviet Union seeks an agreement with our country in order to improve its international standing and protect Manchukuo's northern border from an invasion. The Soviet Union has proposed a neutrality pact between our two countries, under which we agree not to fight each other in the current global conflict.\n\nIf we choose to accept this pact, we will not have to worry about a possible Soviet invasion of Manchukuo, which will allow us to have enough provisions and capabilities to launch a war against the United States. The agreement would allow us and the Soviet Union to avoid fighting on multiple fronts.\n\nOn the other hand, given past events, some in our government are sceptical of Stalin and the Soviet Union. We don't know what their true intentions are, or whether they intend to keep their end of the bargain or stab us in the back when we least expect it and are preoccupied elsewhere."
 GER_SOV_War.13.A: "Accept the pact."
 GER_SOV_War.13.B: "Refuse the pact."

 GER_SOV_War.14.t: "Soviet–Japanese Neutrality Pact Signed"
 GER_SOV_War.14.d: "[FROM.GetNewsIcon]Today, Japanese Foreign Minister Yosuke Matsuoka and Ambassador Yoshitsugu Tatekawa met in Moscow with Vyacheslav Molotov. A potential neutrality agreement between the Soviet Union and Japan was the reason for the meeting.\n\nThe Soviet Union sought this deal to secure their border with the Japanese puppet state of Manchukuo in the Far East and to narrow their attention to the German Reich's frontier in Europe in case a conflict broke out in the future. The Japanese were keen to sign this deal because they wanted to concentrate on their military campaign against the Chinese United Front and their expansion into South-East Asia.\n\nInternational observers have called this a “surprising turn of events”, considering that these countries recently engaged in border wars in Mongolia with each other. "
 GER_SOV_War.14.A: "Our eastern flank, secured at last."
 GER_SOV_War.14.B: "We can now focus on our main target..."
 GER_SOV_War.14.C: "An uneasy deal between uneasy nations."

 GER_SOV_War.15.t: "Japan Refuses the Pact"
 GER_SOV_War.15.d: "\"Sir, the Japanese have refused to sign a treaty of non-aggression.\"\n\n[SOV.GetLeader]'s hand tightened. Under the strain, the pencil he was holding cracked. As he gazed at the map of [SOV.GetNameDef] before him, one thought dominated his mind: \"What now?\"\n\nBut he knew the answer was straightforward. In the event of war, he'd have to maintain a defensive posture in both the Asian and European theatres. To repel invasion from both directions, he'd have to divide his resources east and west. He'd have to keep looking over his shoulder as he prepared to fight on one side to make sure the other didn't pounce on him.\n\n\"I should've known this was going to happen,\" [SOV.GetLeader] thought to himself. The Japanese government had made no secret of their dislike for [SOV.GetNameDef]. The Japanese had many issues with the Soviets, ranging from recent border clashes in Manchuria to ownership of the Sakhalin Islands. Not to mention that the Russians' disastrous defeat at the hands of the Japanese some 30 years before had not been forgotten by the Russian people.\n\nHe'd assumed there were bigger fish to fry. He assumed Japan was more concerned with China. More interested in Southeast Asia's resource-rich regions. After all, the value of the Siberian tundra pales in comparison to the East Indies' rich oil deposits.\n\nHowever, it was now clear that he was completely incorrect. The Japanese tiger in Manchuria was tightening its claws, preparing to pounce on Siberia and Mongolia. He could see his country's armed forces and resources being depleted by the enormous demand of war on two fronts. He could now see his country being shattered by the Germans and the Japanese...."
 GER_SOV_War.15.A: "We must ensure that they will have nothing but dust and blood."

 GER_SOV_War.100.t: "Our Focus Shifts to the Defensive"
 GER_SOV_War.100.d: "For many years, Stalin has kept the Union out of conflict. If we want to believe in the Global Revolution, we must recognise that it is impossible to achieve in our current situation. However, as the shadows of war draw closer to our borders, high-ranking Party officials and military officers have decided to devote our entire budget to defence. We can't just sit around while politicians squabble amongst themselves until we find ourselves in a major war against foreign aggressors. We must prepare for possible incursions into the Soviet Union in order to destroy anyone who dares to put our capabilities to the test. We will fortify the Soviet Union with bunkers, trenches, minefields, and other fortifications to create an unbreakable bastion of Communism."
 GER_SOV_War.100.A: "No foreign soldier will set foot on Soviet soil."

 GER_SOV_War.101.t: "Our Focus Shifts to the Offensive"
 GER_SOV_War.101.d: "For years now, Stalin has maintained the Union outside of conflicts. If he wants to believe in the Global Revolution, he knows this objective is impossible to accomplish if we look into our current means.\n\nBut, as the shadow of the war kept coming closer to our borders, the Soviet leadership, composed of most of the leaders from the Party, as well as the great names of the Red Army, has taken the decision to now concentrate all our budget into the offensive.\n\nAs this committee argues, we can’t wait to be in a total war against foreign aggressors to prepare ourselves. We need to prepare for the invasion and liberation of border countries. We need to destroy the fascist-capitalist menace once and for all. And to do this, we must plunge a sword into their hearts... before they do it to us."
 GER_SOV_War.101.A: "Comrades, the future of the Soviet Union is not in Europe, nor is he in Asia. Our future is in Eurasia!"

 GER_SOV_War.102.t: "Chosing the second handman"
 GER_SOV_War.102.d: "With Molotov, formerly the second-most powerful man in the Soviet Union, now at the helm and Stalin properly sidelined, we are faced with yet another predicament: selecting Molotov's own second-in-command; the man who will take on the duties he once held himself, if not in name and role, but certainly with the same authority.\n\nThere has already been a minor power struggle between various members of the party's administration and Politburo, and the debate among the bureaucrats has been heated. Stalin, who is still the de facto leader of the Party, has attempted to provide his own insight and advice, but has been ignored by any sane administration member.\n\nThe choices that have risen to the top vary greatly, and each has the potential to shape the Union's foreign policy and conduct as a whole. Some would like to focus on our military, while others would like to return to the old ways - some are popular, while others are unpopular but have their own benefits if they advance through the bureaucracy. Any candidate, however, must be willing to assist Molotov in his leadership of the Union and ensure that his own grip does not fail in the same way that Stalin's did."
 GER_SOV_War.102.A: "Georgy Malenkov"
 GER_SOV_War.102.A_TT: "§YMalenkov§! is a technocrat and reformist who previously led the NKVD. He could strengthen party unity and contribute to the Union's economic development. As a loyal Marxist-Leninist, he would be an excellent, well-rounded choice who would not incite disunity."
 GER_SOV_War.102.A_TT_Alt: "§YMalenkov§! is a technocrat and moderate who favours reform. He could strengthen party unity and contribute to the Union's economic development. As a loyal Marxist-Leninist, he would be an excellent, well-rounded choice who would not incite disunity."
 GER_SOV_War.102.B: "Lavrentiy Beria"
 GER_SOV_War.102.B_TT: "§YBeria§! is despised and known by almost everyone as a person without decency. He is a lightning rod for controversy, especially as a known rapist and predator. Despite this, he is a competent politician capable of wielding power. If chosen, he would undoubtedly remain loyal to Molotov."
 GER_SOV_War.102.C: "Kliment Voroshilov"
 GER_SOV_War.102.C_TT: "§YVoroshilov§!, one of the Soviet Union's Grand Marshals and once second only to Stalin in military affairs, is well-liked by the majority and despised by almost no one. He would undoubtedly be useful in terms of military reform and propaganda, inspiring loyalty to Molotov and making regime change easier."
 GER_SOV_War.102.D: "Lazar Kaganovich"
 GER_SOV_War.102.D_TT: "Nobody expects §YKaganovich§! to be Molotov's choice because he is a hardline Stalinist who will undoubtedly attempt to help Stalin regain power. While he is a dark horse, he has the potential to destroy any opposition through exceptional political manoeuvring and hard work."

 GER_SOV_War.103.t: "Change of Leadership in Soviet Union?"
 GER_SOV_War.103.d: "[FROM.GetNewsIcon]Moscow remains silent for yet another day, with no speeches, no radio broadcasts, and only withering propaganda posters. It appears that the Soviet Union's strongman, Joseph Stalin, has gone missing, or more accurately, has been completely sidelined.\n\nIndeed, an increasing number of orders seem to be coming not from Stalin, but from his former right-hand man, Vyacheslav Molotov, who appears to be in de facto control of the USSR. Stalin's current influence appears to be limited to those who claim to have had their orders authorised by him, who claim to have met with him, or who have used his name as a rallying cry for unity throughout the Soviet Union. Regardless, he does not appear to have any real power anymore.\n\nThis development appears to follow a series of failed promises made by Stalin over the last few years, including a pledge to remove counterrevolutionary forces, as well as Stalin's own growing paranoia, which left him reportedly constantly hiding out at his Dacha, unable to effectively helm the nation or guide it. Molotov and the Politburo have yet to make any official statements about the change, but if Stalin has truly been deposed, they will not be able to keep this a secret for long."
 GER_SOV_War.103.A: "The Union's rotten structure has collapsed!"
 GER_SOV_War.103.B: "It had to be done."
 GER_SOV_War.103.C: "This is probably for the best."

 GER_SOV_War.104.t: "Change of Leadership in Soviet Union"
 GER_SOV_War.104.d: "Nobody expected Stalin to ever lead the Soviet Union. Lenin himself did not want him to, and Trotsky appeared more prepared to take command. But he was astute; out of the warring factions in the aftermath of Lenin's death, he gathered an army of allies for himself, using his strong words, assurances of unity, and buying friendships as he appointed those loyal to him to positions of power. He promised that reactionaries and traitors would be eliminated, and that socialism would be built.\n\nHe has failed on every level, time and time again; while he placed himself on every building to feed his own ego, he allowed a storm of opposition to grow with every broken promise, shrugged off opponent, and broken friendship. It is time for him to reap what he has sown. Regardless of the current state of the Union, smarter leadership is absolutely required, and in a speech before the Politburo, Stalin's right-hand man, Vyacheslav Molotov, usurped him in all military and political affairs.To maintain the visage of unity, Stalin will remain a member of the Politburo, and his face will continue to be used to promote our vision to the people - but his reign will end here, for the sake of the Soviet Union."
 GER_SOV_War.104.A: "Et tu, Vyacheslav?"

