 # French Indochina
 FRI_Colony_Held_Hostage: "Colony Held Hostage"
 FRI_Colony_Held_Hostage_desc: "Following the aftermath of the fall of France, Japan occupies French Indochina to prevent its use by Allied forces. The Vichy-appointed colonial administration remains in place, but under strict Japanese oversight. French authorities retain only nominal control, are forbidden from trading with Japan's enemies, and Japanese forces use Indochina's ports, railways, and airfields for their operations."