 XIJ_Politics.1.t: "Sheng Shicai's Coup"
 XIJ_Politics.1.d: "Amidst the faltering war, the incompetence of Governor Jin Shuren has become unbearable. Our military commanders, frustrated by his poor leadership, have rallied behind Sheng Shicai, known for his pro-Stalin and pro-Soviet allegiances. In a swift and decisive coup d'état, Jin Shuren has been removed from power. Sheng Shicai now takes the helm, promising to turn the tide of the war and bring stability to Xinjiang with the backing of Soviet support. With new leadership, we stand united in our resolve to overcome current challenges and secure a brighter future for our people."
 XIJ_Politics.1.A: "We accept the new leadership."
 
 XIJ_Sino_Japanese_War_Chinese_Defeat.1.t: "Soviet Troops Cross the Border!"
 XIJ_Sino_Japanese_War_Chinese_Defeat.1.d: ""
 XIJ_Sino_Japanese_War_Chinese_Defeat.1.A: "All units, hold fire and stand down."
 XIJ_Sino_Japanese_War_Chinese_Defeat.1.B: "All units, open fire!"
 
