 DEI_Governor_Generals.1.t: "Governor-General Stachouwer Assumes Office"
 DEI_Governor_Generals.1.d: "Following the resignation of Governor-General Bonifacius Cornelis de Jonge, Alidius Tjarda van Starkenborgh Stachouwer has officially taken office as the new Governor-General of the Dutch East Indies. Stachouwer, a career colonial administrator, inherits a colony facing economic difficulties caused by the lingering effects of the Great Depression, as well as increasing political activity among nationalist movements.\n\nThe Dutch government hopes that Stachouwer's measured and experienced leadership will stabilize the administration and maintain order throughout the archipelago. Local populations and colonial officials alike are watching closely to see how he will balance reform with maintaining the authority of the Crown."
 DEI_Governor_Generals.1.A: "Welcome!"