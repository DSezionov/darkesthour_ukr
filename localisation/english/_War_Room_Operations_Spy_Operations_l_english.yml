l_english:
 # Agency Upgrades:
 upgrade_war_room_operations_form_department: "War Room Department"
 upgrade_war_room_operations_form_department_desc: "§LExpands our agency by adding a section dedicated to gathering intelligence on hostile War Room operations, providing greater insight into their strategic plans.§!"
 upgrade_war_room_operations_defensive: "War Room Counter Intelligence"
 upgrade_war_room_operations_defensive_desc: "§LImproves our defences against foreign War Room espionage, lowering the risk that hostile nations will discover our operational plans.§!"
 upgrade_war_room_operations_offensive: "War Room Intelligence"
 upgrade_war_room_operations_offensive_desc: "§LIncreases our ability to collect and decrypt information on foreign War Room activities, providing better insight into enemy strategic planning.§!"

 upgrade_war_room_operations_form_department_tt: "§YEnables spy operations to gather intel about other countries' war room operations.§!"

 # Spy Operations:
 spy_operation_investigate_active_war_room_operations: "Infiltrate General Staff"
 spy_operation_investigate_active_war_room_operations_desc: "Deploy agents to infiltrate the enemy's military leadership. By obtaining internal documents, command routines, and strategic procedures, we can gain a better understanding of their strategy and exploit weaknesses in their chain of command."
 spy_operation_investigate_active_war_room_operations_tt: "We may find out what operation §Y[From.GetNameWithFlag]§! is currently planning in their war room, if they are planning any.\n"
 spy_operation_investigate_active_war_room_operations_effect_tt_no_intel: "Our spies were not able to gather any valuable intel about whether §Y[From.GetNameWithFlag]§! is currently planning any operation in their war room.\n"
 spy_operation_investigate_active_war_room_operations_effect_tt_small_intel: "§Y[From.GetNameWithFlag]§! is currently planning at least one operation in their war room. Our spies were not able to get more detailed intel, so we may want to try again.\n"
 spy_operation_investigate_active_war_room_operations_effect_tt_intel_operation: "§Y[From.GetNameWithFlag]§! is currently planning the following operation in their war room: §Y[This.GetWarRoomOperationNameLongOtherContext]§!. \nThis may not be the only one.\n"
 spy_operation_investigate_active_war_room_operations_effect_tt_intel_no_operation: "§Y[From.GetNameWithFlag]§! is currently not planning any operation in their war room or we already know about all operations they are planning.\n"

 spy_operation_investigate_specific_active_war_room_operation: "Infiltrate War Room Operation"
 spy_operation_investigate_specific_active_war_room_operation_desc: "Charge our operatives with gaining access to the enemy's War Room network. Monitoring their operational preparations will allow us to keep track of current plans, predict future actions, and undermine their strategic coordination."
 spy_operation_investigate_specific_active_war_room_operation_tt: "We may find intel about one of the operations §Y[From.GetNameWithFlag]§! is currently planning in their war room. We will be able to choose the specific war room operation when this operation gets commenced.\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_selected: "We may find intel about §Y[This.GetWarRoomOperationNameLongOtherContext]§!, which §Y[From.GetNameWithFlag]§! is currently planning in their war room.\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_no_intel: "Our spies were not able to gather any valuable intel about §Y[This.GetWarRoomOperationNameLongOtherContext]§!.\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_success: "Our spies were able to gather the following intel about §Y[This.GetWarRoomOperationNameLongOtherContext]§!:\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_progress: "We now know their current planning progress.\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_goal: "We now know the objective of the operation.\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_launch_effect: "We now know the effects that will happen once the operation gets launched.\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_min_progress: "We now know the minimum planning progress required to launch the operation.\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_success_end: "\nWe can see a full overview of all gathered intel about §Y[This.GetWarRoomOperationNameLongOtherContext]§! as well as exact numbers in the effect section of this operation before it was finished or in the §YWar Room Intel§! window, which can be opened via the §YIntelligence Agency§! window.\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_success_end_no_dlc: "\nWe can see a full overview of all gathered intel about §Y[This.GetWarRoomOperationNameLongOtherContext]§! as well as exact numbers in the effect section of this operation before it was finished or in the §YWar Room Intel§! window, which can be opened via the §YDiplomacy§! window (when no country is selected).\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_has_launched: "§OThe operation has already been launched!§!"
 spy_operation_investigate_specific_active_war_room_operation_tt_all_intel: "\nAt the moment we have the following intel about §Y[This.GetWarRoomOperationNameLongOtherContext]§!:\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_all_intel_none: "- None"
 spy_operation_investigate_specific_active_war_room_operation_tt_all_intel_goal: "- We know what the objective of the operation is: \n[This.GetWarRoomOperationGoalOtherContext]"
 spy_operation_investigate_specific_active_war_room_operation_tt_all_intel_min_progress: "- We know that the minimum required planning progress to launch the operation is §Y[?amount|2%%]§!.\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_all_intel_progress: "- We know that the planning progress at the time of our infiltration was at §Y[?operation_progress|2%%]§!.\n"
 spy_operation_investigate_specific_active_war_room_operation_tt_all_intel_launch_effect: "- We know what will happen once [From.GetNameDef] launches the operation: \n[This.GetWarRoomOperationLaunchEffectOtherContext]"

 # GUIs:
 ## Diplomatic Actions:
 SHARE_WAR_ROOM_INTEL_WITH_ALLY_ACTION_SEND_GUI_DESC: "Select the operations that you have intel of that you want to share with §Y[This.GetNameWithFlag]§!. The list is grouped by countries that you know are planning operations. \nAt least one operation has to be selected in order to be able to send the action."
 SHARE_WAR_ROOM_INTEL_WITH_ALLY_ACTION_SEND_SELECT_BUTTON_TT: "§GClick§! to select §Y[This.GetWarRoomOperationNameLong]§! to share your intel about the operation with §Y[From.From.GetName]§!."
 SHARE_WAR_ROOM_INTEL_WITH_ALLY_ACTION_SEND_DESELECT_BUTTON_TT: "§GClick§! to deselect §Y[This.GetWarRoomOperationNameLong]§! to not share your intel about the operation with §Y[From.From.GetName]§!."

