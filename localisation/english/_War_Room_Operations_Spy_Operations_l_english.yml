 War_Room_Operations_Diplomatic_Actions_events.EVTNAME1: "War Room Intel Shared"
 War_Room_Operations_Diplomatic_Actions_events.EVTDESC1: "Our ally [sender_target.GetName] has shared some intel about other countries' war room operations with us."
 War_Room_Operations_Diplomatic_Actions_events1.EVTOPT1: "Interesting."
 War_Room_Operations_Diplomatic_Actions_events.EVTNAME4: "General Staff Infiltration Results"
 War_Room_Operations_Diplomatic_Actions_events.EVTDESC4: "We have infiltrated the General Staff of [From.GetName] in order to find out what they are planning in their War Room. Our spies have now returned from their mission."
 War_Room_Operations_Diplomatic_Actions_events4.EVTOPT1: "Let's see..."
 War_Room_Operations_Diplomatic_Actions_events.EVTNAME6: "War Room Operation Infiltration Results"
 War_Room_Operations_Diplomatic_Actions_events.EVTDESC6: "We have infiltrated a War Room Operation of [From.GetName] in order to find out more details about a specific operation they are currently planning. Our spies have now returned from their mission."
 War_Room_Operations_Diplomatic_Actions_events6.EVTOPT1: "Let's see..."
 War_Room_Operations_Diplomatic_Actions_events.EVTNAME7: "Spies discovered"
