l_english:
 # Cities
 terrain_berlin: "Berlin\n§gBerlin stands as a testament to centuries of European history. Originally two medieval trading towns, Berlin and Cölln, the city unified in 1307 and grew into a major urban center. As the seat of Prussian power from 1701, Berlin flourished culturally and economically.\n\nThe city played a pivotal role in the unification of Germany in 1871, becoming the capital of the German Empire. Following World War I and the abolition of the monarchy, Berlin entered a new era as the heart of the Weimar Republic.\n\nBerlin is a sprawling metropolis of over 4 million inhabitants. It serves as a center of industry, science, and the arts, boasting world-renowned universities, museums, and cultural institutions. The city's diverse architecture reflects its long history, from medieval churches to grand Prussian palaces and modern urban developments.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_tangier: "Tangier\n§gTangier, situated where the Mediterranean meets the Atlantic, boasts a history stretching back to ancient times. Founded as a Phoenician trading post in the 5th century BCE, it has been ruled by various powers including Carthaginians, Romans, and Islamic dynasties. Its strategic location made it a prized possession and a melting pot of cultures.\n\nThe city briefly came under English control in the 17th century before becoming a diplomatic hub. In 1923, it was designated an International Zone, cementing its cosmopolitan character. Tangier's medina and port reflect its rich heritage, while its unique status has long attracted artists and adventurers from around the world.\n\nFrom ancient citadels to bustling markets, Tangier embodies a fascinating blend of European, African, and Middle Eastern influences, serving as a vital link between continents for millennia.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_paris: "Paris\n§gParis, nestled along the Seine, boasts a rich history spanning nearly two millennia. Founded by the Parisii, a Celtic tribe, around 250 BCE, it was later conquered by Romans who called it Lutetia. The Middle Ages saw Paris become the seat of French royal power, with landmarks like Notre-Dame Cathedral and the Sorbonne establishing it as a religious and intellectual center.\n\nDespite facing numerous challenges, including wars and plagues, Paris flourished through the Renaissance and Enlightenment. The 17th and 18th centuries brought grand architectural projects, while the 19th century saw Haussmann's redesign, creating the iconic boulevards and facades.\n\nA crucible of art, literature, and science, Paris has long been at the forefront of cultural movements. From Gothic cathedrals to the Eiffel Tower, the city embodies centuries of human achievement, standing as a testament to its enduring influence on European history.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_rome: "Rome\n§gRome, the Eternal City, boasts a history spanning over 2,500 years. Founded in 753 BCE, it grew from a small village to the heart of a vast empire. As a republic and later an empire, Rome shaped Western civilization through its art, architecture, law, and governance.\n\nDespite the fall of the Western Roman Empire in 476 CE, the city remained significant as the center of the Catholic Church. The Renaissance and Baroque periods brought renewed splendor, with masters like Michelangelo leaving their mark.\n\nFrom the Colosseum to St. Peter's Basilica, Rome's landscape is a palimpsest of its storied past. Ancient ruins stand alongside medieval churches and Renaissance palaces, embodying centuries of cultural and political influence.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_beijing: "Beijing\n§gBeijing, a city of imperial grandeur, has been at the heart of Chinese history for millennia. Originally known as Ji, it became the capital of the State of Yan during the Warring States period (475-221 BCE). Its strategic location near the Great Wall made it a vital military and trading post.\n\nThe city rose to prominence as the capital of the Mongol-led Yuan Dynasty in 1271, renamed as Dadu. Under the Ming Dynasty, it was rebuilt and christened Beijing (\"Northern Capital\") in 1421. The iconic Forbidden City, an enduring symbol of imperial power, was constructed during this period.\n\nThroughout subsequent dynasties, Beijing remained a center of politics and culture. Its hutongs, traditional alleyways, and grand palaces reflect layers of history. From the Temple of Heaven to the Summer Palace, Beijing's landmarks embody centuries of Chinese architectural and artistic achievement.\n\nDespite periods of turmoil, Beijing has continually reinvented itself, blending ancient traditions with modern ambitions.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_vienna: "Vienna\n§gVienna, the grand city on the Danube, boasts a rich history spanning millennia. Founded as a Celtic settlement, it became the Roman military camp Vindobona in the 1st century CE. The city gained prominence in 1156 when it became the seat of the Babenberg dynasty and later the Habsburg Empire.\n\nAs the imperial capital, Vienna flourished as a center of arts, music, and science. The reign of Empress Maria Theresa in the 18th century saw significant urban development, including the construction of Schönbrunn Palace. The Congress of Vienna in 1814-15 cemented the city's diplomatic importance.\n\nFrom Gothic St. Stephen's Cathedral to the Baroque splendor of Belvedere, Vienna's architecture reflects its historical significance. The city's coffeehouses, music halls, and museums embody its cultural legacy, having nurtured luminaries like Mozart, Beethoven, and Freud.\n\nDespite the fall of the Habsburg Empire, Vienna remains a testament to imperial grandeur and artistic innovation.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_madrid: "Madrid\n§gMadrid, Spain's central capital, has a history dating back to the 9th century when the Moors built a fortress on the Manzanares River. Originally named Mayrit, it remained a small town until 1561, when Philip II moved the royal court from Toledo, establishing Madrid as the capital of the Spanish Empire.\n\nThe city expanded rapidly, with landmarks like the Plaza Mayor and the Royal Palace reflecting its growing importance. The 17th century Golden Age saw Madrid flourish as a center of arts and literature, nurturing talents like Velázquez and Cervantes.\n\nDespite facing challenges such as the Napoleonic occupation and the Spanish Civil War, Madrid continued to evolve. The 19th and 20th centuries brought modernization, with grand boulevards like Gran Vía and cultural institutions like the Prado Museum enhancing the city's prestige.\n\nFrom its medieval core to its Bourbon-era elegance, Madrid embodies Spain's rich history while serving as a vibrant, modern European capital.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_belgrade: "Belgrade\n§gBelgrade, straddling the confluence of the Sava and Danube rivers, has been a strategic crossroads for millennia. Founded as Singidunum by Celtic tribes in the 3rd century BCE, it later became a Roman frontier post. The city's name \"Belgrade\" (\"White City\") first appeared in the 9th century, referring to its limestone ridge.\n\nDue to its crucial location, Belgrade changed hands numerous times between Byzantine, Bulgarian, Hungarian, and Serbian rulers. It became the capital of Serbia in 1405 and played a pivotal role in resisting Ottoman expansion, earning the moniker \"House of War.\"\n\nDespite frequent conflicts, including Habsburg and Ottoman sieges, Belgrade persevered. The 19th century saw it emerge as the center of an independent Serbia, spurring rapid modernization and cultural growth. Landmarks like the Kalemegdan Fortress reflect its tumultuous past.\n\nAs a nexus between East and West, Belgrade embodies a unique blend of cultures and a resilient spirit forged by centuries of struggle and rebirth.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_athens: "Athens\n§gAthens, cradle of Western civilization, boasts a history spanning over 3,400 years. Named after the goddess Athena, it rose to prominence in the 5th century BCE as the heart of Ancient Greece's Golden Age. Under Pericles' leadership, Athens flourished as a center of philosophy, art, and democracy, producing luminaries like Socrates, Plato, and Sophocles.\n\nThe city's influence waned after the Peloponnesian War, but it remained a cultural beacon through Roman and Byzantine eras. Following centuries of Ottoman rule, Athens became the capital of independent Greece in 1834, sparking a period of revival and modernization.\n\nThroughout its long history, Athens has faced numerous challenges but has continually reinvented itself. The Acropolis, crowned by the Parthenon, stands as an enduring symbol of the city's classical heritage, while modern Athens pulses with Mediterranean vitality.\n\nFrom ancient agoras to neoclassical architecture, Athens embodies the intersection of millennia-old traditions and contemporary Greek life.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_istanbul: "Istanbul\n§gIstanbul, straddling Europe and Asia across the Bosphorus Strait, boasts a history spanning nearly three millennia. Founded as Byzantium by Greek colonists in 660 BCE, it became Constantinople in 330 CE when Roman Emperor Constantine I made it his capital. The city flourished as the heart of the Byzantine Empire for over a thousand years.\n\nIn 1453, Ottoman Sultan Mehmed II conquered the city, transforming it into Istanbul, the capital of his empire. Under Ottoman rule, it became a melting pot of cultures, with landmarks like the Hagia Sophia and Blue Mosque defining its skyline.\n\nThe city's strategic location made it a crucial center for trade between East and West. Its bustling bazaars, ornate palaces, and diverse neighborhoods reflect centuries of cosmopolitan history.\n\nFrom its ancient walls to its Ottoman-era mosques, Istanbul embodies the legacy of empires and the convergence of civilizations, serving as a bridge between continents and cultures.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_sofia: "Sofia\n§gSofia, nestled at the foot of Vitosha Mountain, is one of Europe's oldest cities with a history spanning over 7,000 years. Originally a Thracian settlement named Serdica, it became an important Roman city in the 1st century CE, with Emperor Constantine calling it \"my Rome.\"\n\nThe city flourished under Byzantine rule before being incorporated into the First Bulgarian Empire in the 9th century. It was named Sofia in the 14th century, possibly after the Church of St. Sophia. Ottoman conquest in 1382 led to nearly five centuries of Turkish rule.\n\nFollowing Bulgaria's liberation in 1878, Sofia became the capital in 1879, spurring rapid modernization and growth. The city's architecture reflects its layered history, from Roman ruins to Ottoman mosques and Neo-Byzantine structures.\n\nFrom its ancient mineral springs to its grand National Assembly building, Sofia embodies Bulgaria's rich cultural heritage and its journey towards modernization.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_budapest: "Budapest\n§gBudapest, straddling the Danube River, was born from the unification of three cities: Buda, Óbuda, and Pest in 1873. The area's history stretches back to Roman times when it was the frontier outpost of Aquincum. After the Magyar conquest in the 9th century, Buda became a royal seat under King Béla IV in the 13th century.\n\nThe city flourished during the Renaissance under King Matthias Corvinus but fell to Ottoman rule in 1541. Liberated by the Habsburgs in 1686, it entered a new era of growth. The 19th century saw rapid industrialization and the construction of iconic landmarks like the Chain Bridge and the Parliament building.\n\nAs the co-capital of Austria-Hungary from 1867, Budapest became a center of culture and innovation. Its grand boulevards, thermal baths, and coffee houses reflect its imperial past and vibrant spirit.\n\nFrom Castle Hill to Heroes' Square, Budapest embodies the legacy of empires and revolutions that have shaped Central Europe.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_bucharest: "Bucharest\n§gBucharest, situated on the banks of the Dambovita River, has a history dating back to the 14th century. Legend attributes its founding to a shepherd named Bucur, though it first appears in historical records in 1459 under Vlad the Impaler.\n\nThe city became the capital of Wallachia in 1659 and grew rapidly as a center of trade between the Ottoman Empire and Western Europe. Despite periods of foreign occupation and natural disasters, Bucharest continued to expand and modernize.\n\nIn the 19th century, after Wallachia's unification with Moldavia to form Romania, Bucharest was chosen as the national capital. This period saw significant urban development, earning it the nickname \"Little Paris\" for its elegant architecture and cosmopolitan atmosphere.\n\nFrom the medieval Old Princely Court to the grand buildings along Victory Avenue, Bucharest reflects Romania's journey from principality to modern nation-state, blending Balkan, Ottoman, and French influences.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_warsaw: "Warsaw\n§gWarsaw, straddling the Vistula River, has a history dating back to the 12th century. Originally a small fishing village, it rose to prominence when it became the capital of the Masovian Duchy in the early 14th century. In 1596, King Sigismund III Vasa moved the Polish capital from Kraków to Warsaw, cementing its status as the nation's political center.\n\nThe city flourished during the Polish-Lithuanian Commonwealth, becoming a melting pot of cultures. Despite facing numerous invasions and partitions of Poland, Warsaw remained a vital center of Polish culture and resistance.\n\nThe 19th century saw rapid industrialization and growth under Russian rule. After Poland regained independence in 1918, Warsaw experienced a cultural and economic renaissance as the capital of the Second Polish Republic.\n\nFrom the medieval Old Town to the Saxon Gardens, Warsaw's landscape reflects its tumultuous history, embodying Poland's resilience and cultural richness.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_prague: "Prague\n§gPrague, straddling the Vltava River, boasts a history spanning over a millennium. Founded in the 9th century, it became the seat of Bohemian kings and a flourishing trade center. Under Charles IV in the 14th century, Prague grew into one of Europe's largest cities, with the founding of Charles University and construction of the iconic Charles Bridge.\n\nThe city played a pivotal role in European history, from the Hussite wars to serving as the capital of the Holy Roman Empire under Rudolf II. Prague's skyline, dominated by baroque churches and medieval towers, reflects its rich architectural heritage.\n\nIn the 19th century, Prague became an industrial powerhouse and a center of Czech national revival. Following the dissolution of Austria-Hungary in 1918, it was chosen as the capital of newly independent Czechoslovakia.\n\nFrom the ancient Prague Castle to the Art Nouveau Municipal House, the city embodies centuries of Bohemian culture and Central European history.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_oslo: "Oslo\n§gOslo, nestled at the head of the Oslofjord, has a history dating back to the Viking Age. Founded around 1040 by King Harald Hardrada, it became an important center of trade and religion. The city was named Christiania in 1624 when King Christian IV rebuilt it after a devastating fire, a name it kept until reverting to Oslo in 1925.\n\nAs Norway's capital since 1814, Oslo played a crucial role in the country's independence from Sweden in 1905. The 19th century saw rapid industrialization and population growth, transforming the city into a modern urban center.\n\nOslo's architecture reflects its evolution, from medieval ruins to 17th-century fortifications and 19th-century neoclassical buildings. The Royal Palace, completed in 1849, stands as a symbol of Norway's constitutional monarchy.\n\nFrom the Viking Ship Museum to the Oslo Opera House, the city embodies Norway's maritime heritage and its journey from medieval kingdom to modern Scandinavian nation.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_copenhagen: "Copenhagen\n§gCopenhagen, straddling the islands of Zealand and Amager, traces its origins to a 12th-century fishing village. Its name, meaning \"Merchants' Harbor,\" reflects its long-standing importance as a trading center. The city gained prominence when Bishop Absalon built a fortress on Slotsholmen islet in 1167.\n\nAs the capital of Denmark since the 15th century, Copenhagen has played a crucial role in Scandinavian history. Under King Christian IV in the 17th century, the city saw significant expansion and the construction of many landmark buildings, including the Rosenborg Castle and the Round Tower.\n\nCopenhagen flourished as a center of culture and science during the Danish Golden Age in the 19th century. The city's defenses, including the star-shaped Kastellet fortress, reflect its strategic importance in the Baltic region.\n\nFrom the colorful Nyhavn waterfront to the Amalienborg Palace, Copenhagen embodies Denmark's royal heritage and its evolution into a modern, progressive capital.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_stockholm: "Stockholm\n§gStockholm, a jewel of the Nordic world, stands as a testament to centuries of Swedish history and culture. Founded in the 13th century by Birger Jarl, the city grew from a strategic fortress on Stadsholmen island to become a vital center of politics and commerce. Its name transliterates to \"log islet\", referring to the wooden fortifications that once protected the nascent settlement.\n\nOver the centuries, Stockholm expanded across fourteen islands, connected by bridges and surrounded by the waters of Lake Mälaren and the Baltic Sea. The city's strategic location made it a crucial hub for trade, attracting merchants from across Northern Europe and beyond. The Old Town, \"Gamla Stan\", with its narrow cobblestone streets and colorful buildings, preserves much of the medieval charm that has defined Stockholm for generations.\n\nSince the 16th century, Stockholm has been the seat of Swedish monarchs, placing it at the heart of the nation's political and cultural life. The city has weathered wars, fires, and plagues, emerging each time with renewed vigor. Its shipyards and industries have long been crucial to Sweden's economy, while its universities and academies have fostered innovation and intellectual growth§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_helsinki: "Helsinki\n§gHelsinki, situated on a peninsula in the Gulf of Finland, was founded in 1550 by King Gustav I of Sweden as a rival to the Hanseatic city of Reval (modern-day Tallinn). Initially a small fishing town, it gained prominence when Tsar Alexander I of Russia moved the capital of the Grand Duchy of Finland from Turku to Helsinki in 1812.\n\nUnder Russian rule, Helsinki underwent a major transformation. The city was rebuilt in a neoclassical style, exemplified by the iconic Senate Square and Helsinki Cathedral, designed by Carl Ludvig Engel. This period also saw the establishment of the University of Helsinki, fostering intellectual and cultural growth.\n\nHelsinki became the capital of independent Finland in 1917. The early 20th century brought further development, with architects like Eliel Saarinen shaping the city's Art Nouveau and early modernist landscape.\n\nFrom the Suomenlinna sea fortress to the functionalist Helsinki Olympic Stadium, the city embodies Finland's journey from Swedish and Russian rule to independent nationhood.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_tirana: "Tirana\n§gTirana, nestled between the Dajti Mountain and the coastal plains, is a relatively young capital with a history dating back to 1614. Founded by Sulejman Pasha Bargjini, it began as a small settlement around a mosque and Turkish baths.\n\nThe city remained a minor Ottoman town until 1920, when it was chosen as the capital of newly independent Albania. This decision sparked rapid growth and development under King Zog I in the 1920s. Italian architects, led by Armando Brasini, reshaped the city center with wide boulevards and monumental government buildings.\n\nTirana's eclectic architecture reflects its tumultuous history, blending Ottoman, Italian, and Communist influences. The Et'hem Bey Mosque and the Clock Tower stand as reminders of its Ottoman past, while Skanderbeg Square, named after Albania's national hero, forms the heart of the modern city.\n\nFrom its modest beginnings to its rapid 20th-century transformation, Tirana embodies Albania's struggle for independence and national identity.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_tokyo: "Tokyo\n§gTokyo, originally a small fishing village named Edo, rose to prominence in 1603 when Tokugawa Ieyasu established his shogunate there. As the center of political power in Japan, Edo grew into one of the world's largest cities by the 18th century.\n\nIn 1868, Emperor Meiji moved the imperial capital from Kyoto to Edo, renaming it Tokyo (\"Eastern Capital\"). This marked the beginning of Japan's rapid modernization. The city quickly adopted Western technology and architecture while maintaining its traditional culture.\n\nThe Great Kanto Earthquake of 1923 devastated Tokyo, but it was swiftly rebuilt with modern urban planning. By the 1930s, Tokyo had become a major industrial center and the heart of Japan's expanding empire.\n\nFrom the historic Imperial Palace to the bustling Ginza district, Tokyo embodies Japan's unique blend of ancient traditions and cutting-edge modernity, serving as a symbol of the nation's rise as a global power.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_washington: "Washington\n§gWashington D.C., purposely created to serve as the United States capital, was founded in 1790 as a compromise between Alexander Hamilton and Thomas Jefferson. Named after George Washington, the city was designed by French architect Pierre Charles L'Enfant, who envisioned a grand capital with wide avenues and impressive public spaces.\n\nConstruction began in 1791, with the government relocating from Philadelphia in 1800. The young capital faced early challenges, including the burning of many public buildings by British forces in 1814 during the War of 1812. However, the city rebounded, with the iconic Washington Monument and the Capitol Building's distinctive dome added in the 19th century.\n\nThe city's growth accelerated during the Civil War and continued through the early 20th century. The National Mall, lined with museums and monuments, became a symbol of American democracy and history.\n\nFrom the neoclassical White House to the columned Supreme Court, Washington D.C. embodies the ideals and aspirations of the American republic, serving as both the seat of government and a testament to the nation's evolving identity.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_london: "London\n§gLondon, straddling the River Thames, boasts a history spanning two millennia. Founded by the Romans as Londinium in 43 CE, it grew into a vital trading center. After the Norman Conquest in 1066, William the Conqueror built the Tower of London, establishing the city's political importance.\n\nAs the capital of England since the 12th century, London expanded rapidly, surviving plagues, fires, and civil wars. The Great Fire of 1666 led to significant rebuilding, shaping much of the city's architecture. The 18th and 19th centuries saw London become the heart of the British Empire and the world's largest city.\n\nThe Industrial Revolution transformed London into a global financial and cultural hub. Iconic landmarks like the Houses of Parliament, Tower Bridge, and Buckingham Palace reflect its status as a royal, political, and commercial center.\n\nFrom the medieval Guild Hall to the bustling Piccadilly Circus, London embodies centuries of British history, serving as a microcosm of the nation's journey from ancient settlement to global metropolis.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_amsterdam: "Amsterdam\n§gAmsterdam, originating as a small fishing village in the late 12th century, gained city rights around 1300. Its name derives from Amstelredamme, referring to its origin as a dam on the river Amstel. The city's strategic location at the mouth of the Amstel contributed to its rapid growth as a trading port.\n\nThe 17th century marked Amsterdam's Golden Age, when it became one of the wealthiest cities in the world. As a center of the Dutch East India Company, it was a key player in global trade. This period saw the construction of its famous canal ring.\n\nAmsterdam's liberal policies attracted intellectuals and artists, fostering a rich cultural scene. The city became known for its religious tolerance, welcoming diverse communities including Huguenots and Jews.\n\nFrom the medieval Oude Kerk to the grand Royal Palace on Dam Square, Amsterdam embodies the Netherlands' journey from a maritime trading nation to a center of art, culture, and commerce in Europe.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_brussels: "Brussels\n§gBrussels, situated on the Senne River, traces its origins to a 6th-century chapel founded by Saint Gaugericus. The city gained prominence in the 10th century when Charles, Duke of Lower Lorraine, built a fortress on Saint-Gery Island. Its name likely derives from the Old Dutch \"Broeksel,\" meaning \"home in the marsh.\"\n\nAs the capital of the Duchy of Brabant from the 12th century, Brussels flourished as a center of trade and culture. The magnificent Grand Place reflects the city's medieval prosperity. Under Burgundian and Habsburg rule, Brussels became an important political center.\n\nThe 19th century saw Brussels emerge as the capital of newly independent Belgium in 1830. The city expanded rapidly, with the construction of grand boulevards and the iconic Palais de Justice. Art Nouveau architecture flourished, exemplified by the works of Victor Horta.\n\nFrom the Gothic Town Hall to the modernist Atomium, Brussels embodies Belgium's evolution from medieval duchy to the heart of European diplomacy.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_dublin: "Dublin\n§gDublin, straddling the River Liffey, has a history dating back to the 9th century when Viking settlers established a settlement. Its name derives from the Irish \"Dubh Linn,\" meaning \"black pool.\" The arrival of Anglo-Normans in the 12th century marked the beginning of Dublin's status as the center of English power in Ireland.\n\nUnder British rule, Dublin grew into a significant port city. The 18th century brought a period of architectural splendor, with the construction of Georgian squares and grand public buildings. Dublin Castle, once the seat of British administration, symbolizes this era.\n\nThe 19th century saw Dublin play a crucial role in Ireland's struggle for independence. The Easter Rising of 1916, centered in Dublin, was a pivotal moment in this journey. Following Ireland's independence in 1922, Dublin became the capital of the new Irish Free State.\n\nFrom the medieval Christ Church Cathedral to the neoclassical Custom House, Dublin embodies Ireland's rich cultural heritage and its path from Viking settlement to capital of an independent nation.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_tallinn: "Tallinn\n§gTallinn, nestled on the southern coast of the Gulf of Finland, boasts a history dating back to the 13th century. Originally named Reval, it was founded by the Danes in 1219 and quickly became a significant member of the Hanseatic League, thriving as a major trade hub between Russia and Western Europe.\n\nThe city's well-preserved medieval Old Town reflects its prosperous past. Tallinn's skyline, dominated by the Gothic spire of St. Olaf's Church and the fortress walls, embodies its rich architectural heritage.\n\nControl of Tallinn shifted between various powers, including Sweden and Russia, each leaving its mark on the city's culture and architecture. The 19th century saw rapid industrialization under Russian rule, with the port and railway expanding the city's economic importance.\n\nFrom the medieval Toompea Castle to the baroque Kadriorg Palace, Tallinn embodies Estonia's complex history, blending Nordic, German, and Russian influences while maintaining its distinct Estonian character.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"
 
 terrain_riga: "Riga\n§gRiga, situated at the mouth of the Daugava River, was founded in 1201 by German bishop Albert of Buxhoeveden. Its strategic location quickly established it as a key trading center between East and West, joining the Hanseatic League in the 13th century.\n\nThe city's skyline, dominated by church spires, reflects its rich architectural heritage. Riga's Old Town showcases a blend of architectural styles, from Gothic to Art Nouveau, with the latter being particularly prominent and earning Riga the moniker \"the capital of Art Nouveau.\"\n\nControl of Riga shifted between various powers, including Poland-Lithuania, Sweden, and Russia, each leaving its mark on the city's culture. The 19th century saw rapid industrialization under Russian rule, with Riga becoming one of the Russian Empire's most important ports.\n\nFrom the medieval House of the Blackheads to the Freedom Monument, Riga embodies Latvia's complex history, serving as a crossroads of Northern European and Russian influences while maintaining its distinct Latvian identity.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_kaunas: "Kaunas\n§gKaunas, situated at the confluence of the Nemunas and Neris rivers, has a history dating back to the 13th century. First mentioned in written sources in 1361, it received Magdeburg rights in 1408, signifying its importance as a trading center.\n\nThe city's strategic location made it a frequent target of Teutonic Knights' raids, leading to the construction of Kaunas Castle in the 14th century. Under Polish-Lithuanian rule, Kaunas flourished as a river port and administrative center.\n\nThe 19th century brought both challenges and growth under Russian Imperial rule. The construction of the Kaunas Fortress, one of the largest defensive structures in Eastern Europe, transformed the city's landscape.\n\nThe city is seeing the emergence of a distinctive \"Kaunas Modernism\" architecture, reflecting Lithuania's ambitions as a newly independent state.\n\nFrom the Gothic Kaunas Castle to the ongoing construction of modern edifices, Kaunas embodies Lithuania's journey from medieval duchy to an emerging European nation.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_ankara: "Ankara\n§gAnkara, situated in central Anatolia, boasts a history stretching back to the Hittite civilization. Known as Ancyra in ancient times, it served as an important crossroads for traders and a strategic military post for various empires including the Phrygians, Lydians, Persians, Greeks, and Romans.\n\nDuring the Byzantine era, Ankara remained a vital fortress city. It later came under Seljuk rule in the 11th century and was incorporated into the Ottoman Empire in the 15th century, serving as the capital of the Anatolia province.\n\nThe city gained new significance during the Turkish War of Independence (1919-1923), when Mustafa Kemal Atatürk chose it as the headquarters for the resistance movement. Following the establishment of the Republic of Turkey in 1923, Ankara was declared the new capital, replacing Istanbul.\n\n\n\nAs the nation's capital, Ankara is undergoing rapid modernization. New government buildings, boulevards, and cultural institutions are transforming the ancient city into a symbol of the young republic's aspirations. From the ancient Temple of Augustus to the newly constructed government quarters, Ankara embodies Turkey's transition from empire to modern nation-state.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_lisbon: "Lisbon\n§gLisbon, perched on the Tagus estuary, has a history stretching back to pre-Roman times. After periods of Roman, Visigothic, and Moorish rule, it became Portugal's capital in 1255.\n\nThe 15th and 16th centuries marked Lisbon's golden age as the starting point for Portugal's voyages of discovery. It grew into one of Europe's most prosperous cities, with colonial wealth funding grand architectural projects.\n\nDespite setbacks like the 1755 earthquake, Lisbon rebuilt and modernized. From the medieval São Jorge Castle to the elegant Baixa district, Lisbon embodies Portugal's rich maritime history and its role as the heart of a once-vast colonial empire.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_moscow: "Moscow\n§gMoscow, founded in the 12th century, rose to prominence as the seat of the Grand Princes of Muscovy and the Russian Orthodox Church. Under Ivan the Great and his successors, it became the capital of the growing Russian state, symbolized by the iconic Kremlin.\n\nDespite briefly losing capital status to St. Petersburg, Moscow remained Russia's spiritual and cultural heart. Following the Russian Revolution, it became the capital of the Soviet Union. The city is undergoing significant changes with socialist urban planning.\n\nFrom the onion domes of St. Basil's Cathedral to the emerging constructivist architecture, Moscow embodies Russia's journey from medieval principality to the center of a vast communist state.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_sarajevo: "Sarajevo\n§gSarajevo, nestled in the Miljacka River valley, grew from an Ottoman fortress in the 15th century into a multicultural center known as the \"Jerusalem of Europe.\" Under Ottoman rule, it flourished with diverse religious buildings coexisting peacefully.\n\nAustria-Hungary's occupation in 1878 brought modernization, blending Ottoman and Austro-Hungarian architectural styles. The city gained global attention in 1914 when Archduke Franz Ferdinand's assassination here sparked World War I.\n\nFrom the Ottoman-era Baščaršija bazaar to the Austro-Hungarian National Library, Sarajevo embodies the complex history of the Balkans, serving as a crossroads of Eastern and Western cultures.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_birmingham: "Birmingham\n§gBirmingham, located in central England, evolved from a small Anglo-Saxon farming village into a major industrial center. It gained significance in the 12th century as a market town and wool trade hub.\n\nThe Industrial Revolution transformed Birmingham into \"the first manufacturing town in the world\" earning it the nickname \"City of a Thousand Trades.\" Known for metalworking, particularly in jewelry and guns, the city's growth was facilitated by its extensive canal network.\n\nThe 19th century brought rapid expansion and civic improvements under leaders like Joseph Chamberlain. From the medieval Bull Ring market to the grand Victoria Square, Birmingham embodies England's evolution from an agricultural society to an industrial powerhouse.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

 terrain_ottawa: "Ottawa\n§gOttawa, straddling the Ottawa River, began as a meeting place for Indigenous peoples before European settlement in the early 19th century. Originally named Bytown after Colonel John By, it grew rapidly with the construction of the Rideau Canal in the 1820s and 1830s.\n\nIn 1855, the town was incorporated as the City of Ottawa. Queen Victoria chose it as the capital of the Province of Canada in 1857, and it became the capital of the Dominion of Canada following Confederation in 1867.\n\nThe city's landscape is dominated by the Parliament Buildings on Parliament Hill, blending Gothic Revival and Victorian High Gothic styles. From the historic Byward Market to the grand Château Laurier, Ottawa embodies Canada's evolution from a colonial outpost to the heart of a growing nation.§!\n$terrain_urban_effects$\n\n§YCapital City§!\n§YUnit effects:§!"

