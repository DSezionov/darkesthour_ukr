######################################################################
#  Ideas
######################################################################
 SHX_The_Model_Province: "The Model Province"
 SHX_The_Model_Province_desc: "Shanxi has been hailed as the \"Model Province\" of China, where order and modernization are meant to flourish under the watchful eye of Yan Xishan. Schools, reforms, and industry serve as shining examples of progress in a fractured nation. Yet beneath the veneer of harmony lies a province braced for war, every improvement ultimately bent toward survival."
 
 SHX_Taiyuan_Arsenal_Guns: "Taiyuan Arsenal Guns"
 SHX_Taiyuan_Arsenal_Guns_desc: "The Taiyuan Arsenal, one of the most advanced armories in China, provides the backbone of Shanxi’s fighting strength. Though limited in scale compared to foreign giants, its workshops churn out rifles, machine guns, and ammunition vital to the defense of the province. Each weapon is a promise that the men of Shanxi will not go unarmed into battle."

 SHX_Fortress_Shanxi: "Fortress Shanxi"
 SHX_Fortress_Shanxi_desc: "Ringed by mountains and hardened by years of preparation, Shanxi stands as a fortress in the north of China. Its people know the land, and its soldiers are ready to bleed for every inch of it. Should invasion come, the province will transform into a bastion of resistance, where every valley is a trench and every city a stronghold."
