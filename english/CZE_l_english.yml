######################################################################
#  National Spirits
######################################################################
 CZE_French_Bunker_Expertise: "French Bunker Expertise"
 CZE_French_Bunker_Expertise_desc: "France was the first to recognise Czechoslovakia's independence in 1918, and we have maintained good relations ever since. As a gesture of goodwill, the French have shared their technical expertise in the construction of forts and bunkers, allowing us to better defend ourselves against the rising expansionist threats around us. The 'Beneš Line', named after our statesman Edvard Beneš, is being built based on the Maginot Line model. The line is smaller and simpler than France's, but it is just as effective. With our collective engineering experience and widespread support for arming the forts among the Czechoslovakian population, the Sudety will not be taken lightly by any attacker; not to mention, we may be able to use this knowledge again in the future if necessary."

 CZE_Sudeten_Crisis: "Sudeten Crisis"
 CZE_Sudeten_Crisis_desc: "Since Czechoslovakia's independence from Austria-Hungary, we have been plagued by unfortunate issues. The majority of these have been in response to various minority groups across our country lobbying for increased representation or support under our regime. Some of these movements are unstable at best and downright dangerous at worst. In the Sudety, groups of Sudeten Germans are actively advocating for the region to leave Czechoslovakia and join Germany. Coupled with rising German nationalism and hardships caused by the Great Depression, the youth have become highly radicalised and anti-government. Despite our best efforts to persuade them to join us, it appears that their separatism is unlikely to subside any time soon."

 CZE_Slovak_Problem: "Slovak Problem"
 CZE_Slovak_Problem_desc: "Before our independence, the Czechs and Slovaks were united in one goal: to break free from our chains and form a free state together. We shared a history of oppression, so it only made sense that we would band together to form a single nation. We now have the independence, but what truly united us has vanished. What remains are our differences: our levels of industrialisation are vastly different, our cultures are far from similar, and our leaders frequently disagree on everything. With such disputes occurring so frequently, we must do everything we can to bridge the gap between Czechia and Slovakia, lest rising nationalist sentiments tear us apart and forever destroy the bastion of democracy that we fought together to establish."

 CZE_Extremism_on_Rise: "Extremism on Rise"
 CZE_Extremism_on_Rise_desc: "Czechoslovakia was founded by freedom fighters seeking independence from the Austria-Hungarian Empire, but monarchist sympathisers continue to spread their ideology wherever possible. Things are far worse in the Sudetenland, where radicalised Nazi youth are advocating for the region's secession and integration into Germany. In the 1929 parliamentary election, the Communist Party received more than 10% of the vote. These ideologies, whether they agree or disagree, all work towards the same goal: the destruction of democracy and freedom in our great country. We must stop the rising forces of terror from taking root here, or we will pay a high price."

