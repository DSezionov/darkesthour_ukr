### War Plans
 USA_War_Plans_Category: "The War Plans Division"
 USA_War_Plans_Category_desc: "\n\n\n£decision_header_USA_War_Plans£\n\n\n\nAs global tensions rise and the balance of power shifts, we cannot rely solely on oceans and diplomacy to ensure our security. Decades of strategic planning have resulted in a library of contingency operations, each color-coded and meticulously designed to combat global threats. While many of these war plans were developed in a different era, the fundamental concepts remain the same: protect American interests, deter aggression, and prepare for any geopolitical eventuality. These conclusions are not declarations of intent, but rather recognitions of potential. By implementing and improving these strategies, we ensure that if diplomacy fails, our response will be strategic and overwhelming."
 USA_War_Plan_Black: "Enact War Plan Black"
 USA_War_Plan_Black_desc: "War Plan Black is the contingency plan for conflict with Germany, developed in the early twentieth century when a renewed German threat loomed over Europe. Though relations have shifted, the plan remains focused on eliminating German militarism and preventing European dominance. Naval supremacy in the Atlantic is prioritised, as is the security of shipping channels and major ports. If diplomacy fails, War Plan Black authorises expeditionary deployments to support European allies or open a new front in Western Europe."
 USA_War_Plan_Red: "Enact War Plan Red"
 USA_War_Plan_Red_desc: "War Plan Red was developed to prepare for an unlikely but tactically challenging scenario: a war with the British Empire. While current relations with Britain are primarily cooperative, early twentieth-century tensions over trade, imperial competition, and border conflicts compelled military planners to consider the worst-case scenarios. The plan focusses on an immediate invasion of Canada, the seizure of British naval ports in the Atlantic, and the disruption of marine commerce in order to undermine the Royal Navy's ability to project power. War Plan Red also calls for preemptive strikes on infrastructure, airfields, and industries critical to Britain's warmaking capability."
 USA_War_Plan_Gold: "Enact War Plan Gold"
 USA_War_Plan_Gold_desc: "War Plan Gold was created in response to the possibility of France falling into hostile or unstable hands. While France has traditionally been an ally of the United States, its global network of colonies and role in European power dynamics necessitate ongoing monitoring. Gold describes how the United States would respond if ideological radicalism, civil strife, or foreign influence took hold in France or its colonial possessions. The strategy focuses on quickly occupying French colonies in the Caribbean, West Africa, and the Mediterranean. In the most extreme case, it allows for limited landings in metropolitan France to protect key ports and strategic areas."
 USA_War_Plan_Green: "Enact War Plan Green"
 USA_War_Plan_Green_desc: "War Plan Green was created in response to growing instability or antagonism in Mexico. The strategy includes mobilizing along the southern border, seizing key Mexican cities and transportation hubs, and occupying oil fields and strategic territory. The Plan calls for a quick response to either internal collapse or a foreign-backed assault, with the goal of stabilizing the region and avoiding a larger continental conflict. It also goes over long-term military governance strategies and collaboration with local institutions to reduce resistance."
 USA_War_Plan_Tan: "Enact War Plan Tan"
 USA_War_Plan_Tan_desc: "The Western Hemisphere's defense relies on maintaining control of the Caribbean and Central America, particularly Cuba. War Plan Tan envisions a coordinated military response to regional instability or foreign meddling. This includes pre-positioning naval units, increasing Marine expeditionary forces, and securing supply routes through the Panama Canal Zone. The military strategy will prioritize light infantry formations, amphibious landing boats, and improved naval patrol capabilities."
 USA_War_Plan_Crimson: "Enact War Plan Crimson"
 USA_War_Plan_Crimson_desc: "The northern frontier remains exposed and potentially vulnerable in the event of a conflict with the British Empire or its dominions. War Plan Crimson outlines a focused strategy for securing the US-Canada border and quickly eliminating any threat from the north before it escalates into a long-term conflict. Early operations would focus on seizing railways, airfields, and industrial hubs in Ontario and Quebec, supported by mobile infantry and mechanized divisions. To support these offensives, military production must shift toward trucks, small arms, and engineering equipment."
 USA_War_Plan_Gray: "Enact War Plan Gray"
 USA_War_Plan_Gray_desc: "Although Spain is no longer a major world power, its remaining assets in the Atlantic and North Africa pose a risk to US strategic objectives. War Plan Gray is a limited engagement strategy intended to counter Spanish influence if it aligns with enemy nations. Operations would include conquering overseas colonies, establishing naval blockades, and, if necessary, conducting limited strikes against the Iberian Peninsula. To maintain air and sea superiority, naval forces will need to increase their production of destroyers, troop transports, and carrier-based aircraft."
 USA_War_Plan_Purple: "Enact War Plan Purple"
 USA_War_Plan_Purple_desc: "Regional balance in South America remains critical to long-term American security. War Plan Purple outlines a strategic response to a potential threat posed by Brazil or a hostile bloc in the Southern Cone. Military planning prioritizes the rapid disruption of enemy naval capabilities, landings along the Brazilian coast, and the occupation of key economic centers. To effectively carry out these operations, we must increase production of landing craft, escort ships, and tropical-weather infantry gear. This strategy is intended to ensure that no rival power gains dominance over South American markets or territory."
 USA_War_Plan_Orange: "Enact War Plan Orange"
 USA_War_Plan_Orange_desc: "A future conflict with Japan would necessitate long-term naval operations in the Pacific, as well as continued pressure on island garrisons and fortified areas. War Plan Orange outlines a comprehensive strategy for such a campaign, which includes the defense of American colonies and, ultimately, offensive operations against the Japanese home islands. Naval construction will be prioritized, especially for aircraft carriers, battleships, and submarines."
 USA_War_Plan_Yellow: "Enact War Plan Yellow"
 USA_War_Plan_Yellow_desc: "China's size, internal volatility, and geographical location make it a potential flashpoint for American interests in East Asia. War Plan Yellow describes invasion plans for China. Rather than pursuing a decisive conflict, the plan prioritizes strategic posture, containment of adversary influence, and protection of American economic interests. Investments in diplomatic leverage, port access, and regional intelligence will be critical for maintaining a consistent presence and avoiding long-term involvement in a difficult theater."
 USA_War_Plan_Scarlet: "Enact War Plan Scarlet"
 USA_War_Plan_Scarlet_desc: "War Plan Scarlet depicts a conflict scenario involving Australia, either as part of a larger Commonwealth conflict or as an isolated strategic foe in the Pacific. While unusual, such a scenario requires the ability to project force across vast oceanic distances. The strategy emphasizes long-range naval operations, amphibious landings along the Australian coast, and control of critical maritime chokepoints such as the Coral Sea and the Timor Gap. Success depends on superior naval logistics, carrier-based air support, and hardened marine infantry forces capable of operating in desert, remote, and heavily fortified terrain."
 USA_War_Plan_Ruby: "Enact War Plan Ruby"
 USA_War_Plan_Ruby_desc: "War Plan Ruby discusses potential conflict with India, noting the subcontinent's massive manpower, economic capacity, and expanding geopolitical reach. An unfriendly India, whether allied with a hostile country or acting independently, would pose a significant threat in the Indian Ocean and the wider Asia-Pacific. Military strategy emphasizes naval superiority in the Bay of Bengal and Arabian Sea, as well as expeditionary landings in key port cities such as Mumbai, Chennai, and Kolkata."

