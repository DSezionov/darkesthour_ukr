 ## War Plan Branch
 USA_War_Plans_Division: "War Plans Division"
 USA_War_Plans_Division_desc: "The world and its geopolitics are ever changing, contingencies and plans need to be prepared for every and any unforseen scenario. In a special meeting of the Joint Army and Navy Board, a number of plans were brought out and discussed. It is in the interests of America and accordingly, it has been decided to further these initial deliberations and conduct organized studies and properly record the so formed plans. The studies would include color coded plans, specifc to the numerous points of friction throughout the world and in regards to various possible theaters of conflicts which may emerge throughout the world. And in the rarest case, the US maybe inadvertently pulled into one of them and hence pre planning is of essence."

 USA_American_Theater: "The American Theater"
 USA_American_Theater_desc: "The next war we might have to fight is in our own backyard. Fascist and communist movements, as well as civil wars, are open to be proxies and even launch points of foreign aggressors. We must move in and establish regimes friendly to us so we can safeguard our borders and interests, particularly the Panama Canal."

 USA_European_Theater: "The European Theater"
 USA_European_Theater_desc: "We have fought there before, and perhaps yet again, we will have to intervene. Hitlers' National Socialism and its horrors are told to us by many Jewish refugees, particularly the intelligentsia working for us. Not only that, but the Soviet Union is also conspiring to go on a crusade against our values of liberty, perhaps an invasion of Alaska, or a strike towards Britain and France after eating up Eastern Europe. We will have to reconsider our posture on being neutral."

 USA_Pacific_Theater: "The Pacific Theater"
 USA_Pacific_Theater_desc: "The Empire of Japan is a large, expansionist, and militarized naval power. Its armies lay waste to China, and may be looking forward to destroying us next. The embargos will get a reaction out of them. If not the Japanese, then we will have to worry about China and its warlords, and their position with the concessions. We cannot allow them to break the concessions so easily, as many Americans work there, and it is our first priority to ensure the security of US citizens both at home and abroad."

 USA_Rainbow_Plans: "The Rainbow Plans"
 USA_Rainbow_Plans_desc: "The world is coming closer to a conflict that will surpass Europe's boundaries, and will ignite strife in our Hemisphere. This is why the Joint Planning Committee has outlined, the aptly named, Rainbow Plans after retiring the older ones. There are five:\n\nRainbow 1: A defensive war, which we will fight by ourselves without any assistance, which extends all the way south to 10 degrees latitude, which would be Brazil, Peru and Bolivia.\n\nRainbow 2: The same course as Rainbow 1, but assuming we either have France, the United Kingdom or both, as allies.\n\nRainbow 3: A Repetition of War Plan Orange (A war with the Japanese Empire), but an emphasis on hemisphere defense first and foremost.\n\nRainbow 4: This plan would extend to the defense of the entire Western hemisphere, including around Cape Horn.\n\nRainbow 5: It is the most extensive plan, not just allowing for defense, but also offensive actions in the European and African continents, provided we have access through allies, like the aforementioned French and British nations.\n\nWe have a choice to make, we fight together, or alone. This decision will decide how we fight the future war."

 USA_Reafirm_Monroe_Doctrine: "Reaffirm the Monroe Doctrine"
 USA_Reafirm_Monroe_Doctrine_desc: "We have been too relaxed with our sphere of influence, and so, we have decided that the Monroe Doctrine shall be activated to its full potential. The Old World colonial powers will be asked to leave their colonies with a completely independent state, and if not, we will have to do the work for them with decolonization efforts and arms deals."

 USA_Leave_Them_to_their_Device: "Leave Them to Their Devices"
 USA_Leave_Them_to_their_Device_desc: "There is too much focus on the Southern continent, and it has been going on for long enough. The reality is the logistics down there are horrible, and even if a foreign force landed, we can easily repel it, or even intercept the convoys heading there. None of the countries there are able to attack us, and they certainly wouldn't even think about that idea in the first place. We shall leave Latin America to their own devices."

 ## USACE Branch
 USA_Expand_the_USACE: "Expand the USACE"
 USA_Expand_the_USACE_desc: "The United States Army Corps of Engineers is the overall parent organization of the engineering assets of the United States Army, and are primarily involved in military construction and occassionaly civillian works as well. The combat engineers are an invaluabe asset to the army, but in the current peacetime are mainly involved in construction and maintenance of military facilities. To better put them to use, it has been decided to utilize this highly trained and skilled work force to aid in governmental construction projects, and finish them up considerably faster."

 USA_Begin_Manhattan_Project: "Begin the Manhattan Project"
 USA_Begin_Manhattan_Project_desc: "We have received a letter of concern, drafted by Hungarian scientists and signed by Einstein himself, that a potential new weapon is being investigated by the Nazi regime, urging us to acquire stockpiles of uranium and help Enrico Fermi with his research. The President has talked with the Advisory Committee on Uranium on the matter, which led to a meeting which confirmed that with uranium, it was possible to make a bomb of that magnitude of destruction yet unknown to us. We are beginning to compile materials to make the first nuclear reactors to gain the fissile material possible to get the prototype weapon we achieve to acquire before our future adversaries do."

 USA_Military_Construction_Program: "The Military Construction Program"
 USA_Military_Construction_Program_desc: "With the modernization and huge financial boost to the military industrial complex, we will take that money and place down contracts with criteria for the many companies, be it gunsmiths or airplane manufacturers, to design, build and produce a candidate for the use in our armed forces, and to top it all off, include some benefits like more factory space to be allocated for their production."

 USA_a_Unified_High_Command: "A Unified High Command"
 USA_a_Unified_High_Command_desc: "To create better interservice cooperation,  Admiral William D. Leahy has proposed a \"unified high command\", inspired by similar supreme planning commands of other countries. This command body would be called as the \"Joint Chiefs of Staff\", and would assume overall coordinating, and commanding authorities of the American wartime effort from the military estabilishment. The JCS would comprise of all four star generals who are the respective head of their branches, including the the United States Army Air Forces, and an overall Chief of Staff to the Commander in Chief of the Army and Navy, who would directly report to and act as the principal military advisor to the President of the nation."

 USA_Form_the_OSS: "Form the OSS"
 USA_Form_the_OSS_desc: "Split between the War, Navy, Treasury and State departments, America's Intelligence program is, in a word, chaotic. Leaderless and uncoordinated, our attempts at espionage look like children's play, especially when compared with British MI6 and Churchill's Special Operations Executive. As such, the President is prepared to issue an executive military order to create the Office of Strategic Services, an intelligence network that will directly help the Joint Chiefs in preparation and planning. While it's doubtful the Army and Navy will be totally onboard, it is a step in centralizing our espionage operations"

 USA_X-2_Branch: "The X-2 Branch"
 USA_X-2_Branch_desc: "With the beginning of World War II, the Office of the Coordinator of Information, headed by William Donovan, was split and the Office of Strategic Services (OSS) created on 13 June 1942. The Office, despite being the largest name in the intelligence community, has dealt with limitations from the military branches, and couldn't even operate in the Western Hemisphere thanks to the limitations of the FBI and the OCIAA.\n\nWith the creation of an independent counter-espionage branch outside the limitations, X-2 shall receive the intercepted Axis Agent transmissions and work alongside British intelligence and as a separate unit."

 USA_Sow_Distrust_Among_the_Enemy: "Sow Distrust Among the Enemy"
 USA_Sow_Distrust_Among_the_Enemy_desc: "Having infiltrated the enemies' command, be it with seductresses or those within the command itself, we will support propaganda drops, sow distrust among peers with false paperwork that would cause issues with movement of divisions, squadrons and flotillas, and much more. A disintegrated enemy high command, and down to the morale level of the enlisted men themselves, is imperative for a quick victory."

 USA_Use_Terror_Propaganda_At_Home: "Use Terror Propaganda at Home"
 USA_Use_Terror_Propaganda_At_Home_desc: "We must remind people back home that the enemy is also among us, that they are listening to everything they say that might jeopardize operational and national security. We must use counter-espionage propaganda efforts to educate the American citizen to be mindful of what they say, as the saying goes: “Loose Lips Sink Ships.”"

 USA_Establish_Advanced_OSS_Training_Camps: "Establish Advanced OSS Training Camps"
 USA_Establish_Advanced_OSS_Training_Camps_desc: "The OSS requires space with both infrastructure and convenience. Instructors needed facilities with water, electricity, shelter from the elements, and space for live fire exercises. Agency managers needed a place within a day's travel of Washington, D.C.  In a few hours' time, they could easily check on training and implement new lessons learned. Isolated property, already in the federal inventory, would be an ideal location.\n\nPrince William Forest Park, then known as Chopawamsic Recreational Demonstration Area, and Catoctin Mountain Park met all selection criteria.  Civilian Conservation Corps-built cabin camps in both parks provided shelter and administrative offices for operations and training. This would allow for more practical training in mapping skills, training in armed assaults on abandoned barn houses, learning how to evade capture with sensitive enemy intel, and practicing night time parachute ingress. This will be useful in placing more experienced agents into the field."

 USA_Train_Resistance_Movements: "Train Resistance Movements"
 USA_Train_Resistance_Movements_desc: "With enough infantry equipment to spare, and rather innovative and concealable firearms and explosive devices, we will coordinate resistance members both here and other safehouses abroad to learn about raiding tactics, proper use of firearms and explosives, sabotage of enemy infrastructure, and exfiltration. This will allow for more effective resistance movements as they go back with this training."

 USA_National_Security_Act: "National Security Act"
 USA_National_Security_Act_desc: "The President has thought out a radical change in the structure of the United States Armed Forces. The Office of the Secretary of Defense will be activated, alongside forming the Department of Defense, and evolving the OSS into the new CIA. The final act, albeit accidental, has enabled the establishment of the JCS, the Joint Chiefs of Staff, to advise the President on military strategy and planning."

 ## USAF Branch
 USA_the_US_Air_Corps: "§SThe US Army Air Corps§!"
 USA_the_US_Air_Corps_desc: "Throughout history, it has been demonstrated that if a country does not adapt to the current state of warfare, it will become weak and collapse. Following the Great War, the use of aircraft as conventional weapons demonstrated to produce results on the battlefield. With the rest of the world experimenting with and expanding on this fantastic tool, why shouldn't we? The generals have proposed that we begin to advance the development of the US Army Air Service. The generals even suggested a new name for the proposed new branch: The United States Army Air Corps."
 USA_Establish_General_Headquarters: "Establish General Headquarters Air Force"
 USA_Establish_General_Headquarters_desc: "The US Army Air Corps has recently demonstrated its popularity and strength in the following years, so much so that our army general staff is struggling to control both the US Army Air Corps and the US Army. We must address this issue and establish an Air Force General Headquarters. The Army proposed the idea and asked that we activate the Headquarters to help with coordinating and planning our air operations so that they are capable of competing on the battlefield."
 USA_Call_for_Increased_Plane_Production: "Call for Increased Plane Production"
 USA_Call_for_Increased_Plane_Production_desc: "The United States Army Air Corps is a pitiful thing. Its main purpose until now has been mail delivery, so it only has a few dozen planes, the majority of which are civilian craft. While flying has provided our pilots with valuable training, they remain untested in battle alongside their planes. The president recently called for the USAAC to be expanded to \"up to 3000 planes\" and has already begun a campaign to raise the necessary funds.\n\nAir dominance would be a distant fantasy if war broke out right now. An expansion is not only necessary, but also critical if we are to complete our mission of protecting the air over the battlefield."
 USA_Air_War_Plans_Division: "Air War Plans Division"
 USA_Air_War_Plans_Division_desc: "To coordinate the planning efforts of the Air Staff and the War Plans Division of the War Department, we will establish the Air War Plans Division to develop long-term war plans. Previously, the War Plans Division was in charge of planning all aspects of Army and Army Air Corps expansion; however, the Air War Plans Division, led by Harold L. George, will now be tasked with providing the President with the overall production requirements required to defeat our potential adversaries as well as developing plans that will hopefully prove useful in defeating any adversaries. The AWPD will focus on providing a comprehensive air plan, known as AWPD-1, designed to defeat the Axis powers."
 USA_Limit_the_Corps_Autonomy: "Limit the Corps Autonomy"
 USA_Limit_the_Corps_Autonomy_desc: "The United States Army Air Corps was established as an extension of the Army. However, some, such as General Arnold, have begun a campaign to establish the Air Corps as a separate branch. This is completely ridiculous. The Air Force is merely an extension of the Army. If the planes fly deep behind enemy lines, not only will the planes and pilots be lost forever if shot down, but the Army will be left without adequate cover. Our adversaries will have no trouble decimating our men from above.\n\nNo, by integrating their command into ours, we will permanently bind the Air Corps to the Army. The Air Corps will be forced to remain a useful arm of the land forces in the absence of an independent command. Of course, they will have some autonomy, but it will be more akin to the Army Medical Corps than the Marine Corps. Arnold may not like it, but he is too attached to his flyboys to quit."
 USA_Listen_to_the_Old_Leatherface: "Listen to the Old Leatherface"
 USA_Listen_to_the_Old_Leatherface_desc: "Clair Chennault has seen more combat than anyone else in the Air Force today, however limited that experience is. While serving with the Flying Tigers in China, he engaged in aerial combat with the Japanese and sent back interesting after action reports outlining his own theories on air warfare. He has stressed the significance of commanding the airspace over a battlefield. With total air dominance, not only would our men be safe from aerial attacks, but we would have an easy time launching our own strikes on our enemies.\n\nThis line of thought has piqued the interest of the Army High Command, who has decided to pursue it. That means we'll have more fighters than the Japanese could throw at us. We will soon have complete control of not only the land and sea, but also the air, in what some commanders refer to as Three Dimensional Warfare."
 USA_Prove_the_Use_of_the_Figher_Once_More: "Prove the Use of the Fighter Once More"
 USA_Prove_the_Use_of_the_Figher_Once_More_desc: "Bombers, dive bombers, naval torpedo bombers, fighter bombers, recon planes, transports, and other aircraft are available. There are now dozens of different types of planes. All of this variety appears to have obscured the significance of the classic fighter. Planes, it appears, can no longer do just one thing. Chennault, on the other hand, has a soft spot for fighters. He has decided to reinstate them as the primary organ of the Air Corps. While those other types are still being developed, America will concentrate on developing the best fighter the world has ever seen.\n\nChennault believes that with this new fighter, America's airspace will become its sole domain. Our enemies will be aware of our unrivalled power wherever the Red, White, and Blue roundel and star flies. Our adversaries will be wary of us as we clear the skies of their own forces and project power like no other time in history."
 USA_Kenneys_Ground_and_Air_Cooperation: "Kenney's Ground and Air Cooperation"
 USA_Kenneys_Ground_and_Air_Cooperation_desc: "As assistant air attaché to France, General George Kenney has played a critical role. He has witnessed firsthand the groundbreaking theories developed by Europe's great minds, such as Ernst Udet. He's seen the infamous Stuka and has returned home preaching the gospel of dive bombing. He believes that dive bombers have the potential to be a devastating weapon. The psychological impact of these iron hawks screaming from the sky, dropping hundreds of pounds of death and destruction, and roaring off to do it again cannot be overstated.\n\nThe Army High Command has recognised the merits of this argument after much deliberation. Kenney has been given his due and the opportunity to put his theories into action. Kenney, for one, is determined not to let this opportunity pass him by. He has not only arranged tests on land targets, but he has also sent proposals for testing on seaborne targets in order to make even better use of the carriers that the Navy has grown to love."
 USA_a_Supporting_Role: "A Supporting Role"
 USA_a_Supporting_Role_desc: "Dive bombers are not aggressive weapons. They are not intended to strike at enemy industrial centres far behind enemy lines, as their larger and heavier bomber cousins do, nor are they intended to strike far and fast, as fighter cousins do. Dive bombers are built and trained to help the Army clear the enemy ahead of them. When armour is unavailable and hard points stall the advance, we attack like birds of prey, striking from the last angle many expect to defend. There will be no defence we cannot breach with our ground forces pounding them from the ground and us from the air.\n\nOf course this means further subordination to the Army. We'll need to better integrate our planning divisions so we know where to bomb and the GIs can call us in to help them out. This requires us to surrender some of our already limited autonomy. Kenney, on the other hand, is adamant that we will earn it back in spades by demonstrating our effectiveness on future battlefields."
 USA_New_Pursuit_Strategies: "New Pursuit Strategies"
 USA_New_Pursuit_Strategies_desc: "Our pursuit doctrines are horribly out of date. Using ideas from the previous war, they account for flaws that many modern planes no longer have. They mandate planes can only chase the enemy so far, can only fly in pairs or trios and enforce stringent and unbending rules on fuel usage. As our arsenal evolves, we must also evolve our doctrine. We will sweep away the last vestiges of the old and usher in the new, creating a truly modern force in terms of both equipment and doctrine. This will give us yet another advantage over our adversaries."
 USA_the_A36_Modification: "The A-36 Modification"
 USA_the_A36_Modification_desc: "The P-51 Mustang is an incredible plane. It's quick, tough, and manoeuvrable. It is, however, very expensive. As our force has grown by leaps and bounds, we have quickly depleted our budget. However, we would prefer to avoid cancelling all orders. If we keep the factories running, we not only keep men employed, but the men on the job improve. So, until we have more money to buy more Mustangs, the boys in the lab have devised a low-cost modification to transform the Mustang into a fighter bomber known as the A-36.\n\nDespite some concerning accident rates, the plane has performed admirably in testing. An order has already been issued to have them rushed to the front as soon as possible. While dive bombers are not a primary focus of our force, having a few gives us the option of using them. It's better to have them and not need them than the other way around."
 USA_Further_Develop_the_Thatch_Weave: "Further Develop the Thach Weave"
 USA_Further_Develop_the_Thatch_Weave_desc: "It appears that innovation can come from the most unexpected places. When and if our boys come up against something better than them, a naval airman named John Thach has developed a deadly effective flying tactic that levels the playing field. When under attack, the \"Thach Weave\" has a flight weave in and out of each other's flight paths, luring the enemy to focus on one plane and allowing wingmen to get on the enemy's tail. Our commanders recommend that we make this a textbook flight tactic for all future pilots, despite the fact that it was developed primarily for Wildcat pilots. While it is not a perfect solution to our inadequate stockpile, it is a good stopgap until our tools improve."
 USA_a_More_Independent_Air_Force: "A More Independent Air Force"
 USA_a_More_Independent_Air_Force_desc: "The world has passed us by. Military leaders in Germany, France, the United Kingdom, and even the Soviet Union have recognised that an independent air force is the best use of air power. Unfortunately for us, the Army has been hesitant to release us until now. They appear terrified of an air attack, so they want us to sit over their heads like an umbrella all the time.\n\nUnfortunately for them, it appears that things have started to change. Under pressure from the Joint Board, Army High Command has agreed to grant us branch independence. We will have our own command structure, free of Army interference, and will be able to build our new Force as necessity dictates, ready for the future rather than stuck in the past."
 USA_HL_Georges_Bomber_Mafia: "HL George's Bomber Mafia"
 USA_HL_Georges_Bomber_Mafia_desc: "Billy Mitchell, the Force's founder, believed that an army does not need to be beaten in the field to be beaten at all. Instead, he believed that long-range bombers could and would be sufficient to strike enemy industrial infrastructure. With their factories and shipyards in ruins, the enemy will have no choice but to surrender or face total annihilation. This will save thousands of people from an unnecessary death far from home.\n\nMitchell's protégé at ACTS, Harold George, has carried on this idea. George, who leads a group known as the 'Bomber Mafia' by its opponents, has recognised his opportunity. With our force still in its infancy, he has pushed his vision hard. He appears to have been heard, as his tactics have been adopted by command. America will destroy its adversaries without firing a single shot."
 USA_a_Massive_Bomber_Fleet: "A Massive Bomber Fleet"
 USA_a_Massive_Bomber_Fleet_desc: "Warfighting has distinct functions. One of them is to eliminate enemy warfighting capabilities. The quickest way to accomplish this is to destroy the factories and shipyards that enable the production of war materials. However, given the size of even the most developed industrial economies, we would have to destroy a massive amount of industry to make a significant impact.\n\nTo do so, however, a large number of bombs and bombers will be required. That is why George has ordered tens of thousands of them from every aircraft manufacturer capable of producing them. He is confident that when thousands of American bombers blot out the sun and the soot and ash from millions of bombs choke the Earth, our adversaries will beg for mercy. Unfortunately for them, we don't have any."
 USA_Hap_Arnolds_Compromise: "Hap Arnold's Compromise"
 USA_Hap_Arnolds_Compromise_desc: "Henry Arnold is as closely associated with flying as Billy Mitchell was. Henry is one of the world's first military pilots and one of the first three rated pilots in the United States. He was taught to fly by the Wright Brothers. He is as much a part of the Air Force as anyone else. Because of his history in the Force, we owe it to him to hear his thoughts on how to use the planes he adores.\n\nHap Arnold represents a middle ground approach. He recognises the 'Bomber Mafia's' influence as well as their points. He does, however, point out that bombers are not very good at defending themselves. As an olive branch to the rest of the force, he has begun to urge fighter production to equal, if not exceed, that of bombers."
 USA_Lift_the_Doctrines_Restriction_on_Fighters: "Lift the Doctrine's Restriction on Fighters"
 USA_Lift_the_Doctrines_Restriction_on_Fighters_desc: "Our current air doctrine is quite clear about the sole purpose of fighters, which is to engage and destroy enemy air power. While fighters are technically designed for that purpose, using them solely for that purpose is a terrible waste. Instead, let us future-proof our fighters' use. We don't know how fighters will be used in the next war, or any subsequent wars. By forcing them into an air dominance role, we stifle any remaining innovation in their use. Instead, we will allow our fighters to be used for whatever their commanders require."
 USA_Flying_Fortresses: "Flying Fortresses"
 USA_Flying_Fortresses_desc: "As our bomber fleet grows, we are always looking for newer and better models to add to the mix. Boeing's latest model is one such example. After failing the initial contract, they returned with improvements and presented us with the B-17 Flying Fortress. The Fortress appears to be everything we wanted: long range, fast, and with enough guns to outshoot a Texan. Not only will we be able to strike deeper into enemy territory, but the bombers will also be able to defend themselves to some extent. Command has ordered 500 of them and anticipates ordering many, many more."
 USA_Expand_and_Redesignate_the_School_of_Applied_Tactics: "Expand and Redesignate the School of Applied Tactics"
 USA_Expand_and_Redesignate_the_School_of_Applied_Tactics_desc: "So far, the School of Applied Tactics has done its job. Its headquarters are in Orlando, and it has trained and prepared thousands of pilots in the most recent tactical thinking in order to prepare them for combat overseas. However, as our force grows exponentially, the SAT has become overburdened, necessitating an expansion.\n\nThe facility will be expanded with larger and more buildings for in-class training, as well as a larger detachment of planes to allow for more concurrent in-flight training. With increased training, we will be able to rapidly expand our force to match and then surpass the size of our adversaries."
 USA_Crush_the_Enemys_Industrial_Web: "Crush the Enemy's Industrial Web"
 USA_Crush_the_Enemys_Industrial_Web_desc: "If you only cut one string in a spider's web, the entire web would survive. To destroy a spider's web, many strings must be snapped simultaneously so that the weight is not redistributed. The simplest method is to simply throw a rock at it. The same basic principle applies to modern economies of scale.\n\nIf we strike one factory, production will simply shift to another. To truly devastate an economy, something large and heavy must be thrown at it. That big and heavy thing is going to be us. We will fill the sky with bombers and simultaneously destroy dozens of factories, mines, shipyards, and infrastructure. Then, with so many parts failing at the same time, the entire economy collapses, and they come crawling to us for peace."
 USA_Fund_The_NACA: "Fund the NACA"
 USA_Fund_The_NACA_desc: "Few in the Air Force disagree that the National Advisory Committee For Aeronautics is \"The Force Behind Our Air Supremacy.\" It is NACA that leads our R&D arm, constantly pushing the boundaries of science to give man the ability to fly and fight at the same time. We would still be flying biplanes and buying anything more advanced than the Wright Flyer if it weren't for them.\n\nHowever, its budget has been running dry in recent years. As America reduced its military spending, it also reduced its military research. However, with another war on the horizon, we have persuaded the White House to start pouring money back into their pockets. NACA will not only be able to return to the forefront of aeronautics research, but it will also attract the best talent from around the world to ensure our ultimate victory."
 USA_Commission_New_Carrier_Based_Aircraft_Designs: "Commission New Carrier-Based Aircraft Designs"
 USA_Commission_New_Carrier_Based_Aircraft_Designs_desc: "Designing a plane to take off from an airport and one to take off from a new 'aircraft carrier' are two entirely different things. In fact, some would argue that designing a land-based plane is easier. At sea, there are numerous emergency situations. To maximise the use of space in the carrier's limited hangars, the plane must be naturally small or, in some extreme cases, fold up.\n\nThey must be able to withstand high sea winds, the force of the catapults when launching and landing without shearing off the landing gear, and they must be quickly loaded and unloaded. All of this presents our arial designers with new challenges. We are confident, however, that they will find novel solutions to any problems that may arise."
 USA_The_Mustang: "The Mustang"
 USA_The_Mustang_desc: "The P-51 Mustang is everything you could want in a fighter. It's fast, has a long range, six machine guns, and, most importantly, it's cheap per unit. This means that they will not only last longer in the air, but we will be able to order more on our ever-shrinking budget.\n\nEarly combat tests have revealed that these are some of the best planes we've ever produced, far exceeding all expectations. The plane has quickly become an icon due to its sleek design and sheer quantity produced. It is already planned for use in every theatre and for almost any job we can give it. Arnold and the officers are confident that with this plane in the air, we will be unrivalled."
 USA_Enlarge_the_JPSL_Budget: "Enlarge the JPSL Budget"
 USA_Enlarge_the_JPSL_Budget_desc: "The Jet Propulsion Static Laboratory plays a minor but critical role in ensuring our continued air dominance. For decades, the feasibility of a 'jet' powered aircraft has been discussed in laboratories all over the world. As we race to catch up to our adversaries in the air, developing the first mass-produced jet aircraft could provide us with the competitive advantage we require. Being able to dart across the skies at speeds that prop planes can only dream of will give us a significant advantage in battle.\n\nThere are additional proposals for the use of jet engines. Some people have started working on the 'rocket' project. Based on information obtained from German scientists fleeing persecution, this team intends to use jets on a delivery vehicle topped by a warhead. It would then be fired at a target, causing untold damage while posing no risk to our soldiers. Some have even begun to consider civilian applications, primarily in space travel. Such ideas, however, are far from the main effort."
 USA_The_Convair_Peacemaker: "The Convair Peacemaker"
 USA_The_Convair_Peacemaker_desc: "A 230-foot wingspan, four piston engines, a range of 10,000 miles, and a payload of 87,200 pounds. All of this adds up to make the Peacemaker the largest prop engine plane ever built. It's a brand-new bomber for a brand-new era of warfare. It will be capable of striking deep into enemy territory and raining death anywhere on the planet. Nowhere can America's enemies hide and feel safe from the righteous rage of the torchbearers of liberty.\n\nAnother advantage is that the Peacemaker can transport our gravity nuclear bombs. Until now, the most significant barrier to the continued use of nuclear weapons in warfare has been range. We can deliver a nuclear payload anywhere in enemy territory by flying the peacemaker high and deep into enemy territory."
 USA_The_Lockheed_Shooting_Star: "The Lockheed Shooting Star"
 USA_The_Lockheed_Shooting_Star_desc: "When considering the future of air warfare, jets are the obvious choice. Lockheed recognises this as well, and has proposed a new jet fighter for production. The 'Shooting Star' will have a range of nearly 1,000 miles and a top speed of nearly 600 mph thanks to its turbojet engine. This would make it the most advanced plane we've ever built.\n\nWe've already ordered a few for testing, but our hopes are high. Lockheed Martin is a well-known and respected manufacturer. With the Shooting Star soon to be completed, we will have a noticeable advantage over everyone else. American air dominance is secure for the foreseeable future."
 
 #Ideas
 USA_General_Headquarters_Airforce: "General Headquarters Air Force"
 USA_General_Headquarters_Airforce_desc: "The GHQAF is the highest military command for our expanding air forces, which reports only to the Army Chief of Staff, and is primarily responsible for coordinating all of our disparate combat formations in place of the corps areas under which we previously operated. As of now, approximately 40% of the Corps is under the GHQAF, with more expected to be folded in shortly.\n\nThe GHQAF serves as a dual authority alongside the Corps and local commanders, with base commanders reporting to up to four different commanders. This does not address overlapping spheres of command with the Air Corps, tensions with the Navy and Army, or disagreements between the GHQAF Commander and the Air Corps over fundamental doctrinal issues. All of these issues, as well as others, must be addressed if the GHQAF is to be used effectively."
 USA_General_Headquarters_Airforce_1: "General Headquarters Air Force"
 USA_General_Headquarters_Airforce_1_desc: "The GHQAF is the highest military command for our expanding air forces, which reports only to the Army Chief of Staff, and is primarily responsible for coordinating all of our disparate combat formations in place of the corps areas under which we previously operated. As of now, approximately 40% of the Corps is under the GHQAF, with more expected to be folded in shortly.\n\nThe GHQAF serves as a dual authority alongside the Corps and local commanders, with base commanders reporting to up to four different commanders. This does not address overlapping spheres of command with the Air Corps, tensions with the Navy and Army, or disagreements between the GHQAF Commander and the Air Corps over fundamental doctrinal issues. All of these issues, as well as others, must be addressed if the GHQAF is to be used effectively."
