 ### Filipino Situation
 USA_PHI_Situation_Category: "The Filipino Situation"
 USA_PHI_Situation_Category_desc: "\n\n\n£decision_header_USA_Filipino_Situation£\n\n\n\nEven though the majority of Filipinos recognize that the Philippine Islands rightfully belong to the United States, some continue to oppose their incorporation into our great nation. While these nationalistic elements appear to be scattered across the country, there is still the possibility that they will form a large network and one day overthrow the legitimate Filipino government.\n\nTo prevent the Philippines from devolving into anarchy and tyranny, we will root out these nationalists, destroy their networks, and crack down on so-called \"independence\" movements."
 USA_Reexamine_Dorr_V_USA: "Re-examine Dorr vs. United States"
 USA_Reexamine_Dorr_V_USA_desc: "Dorr v. United States established that the US Constitution does not automatically apply to its overseas territories. In the Philippines, this precedent has shaped governance, limiting certain political and civil rights for the islands' residents. As the archipelago develops its own political institutions and demonstrates the ability to govern itself, many officials and legal scholars argue that these restrictions should be reconsidered. Re-examining Dorr would spark debate, but it may be a necessary step for the Philippines' future, as well as to ensure peace and good relations between Filipinos and Americans."
 USA_Reexamine_Dorr_V_USA_tt: "§YThis is but the first step in reversing the Insular Status of the Philippine Islands.§!"
 USA_Repeal_Tariffs_on_Filipino_Trade: "Repeal Tariffs on Filipino Trade"
 USA_Repeal_Tariffs_on_Filipino_Trade_desc: "Trade between the United States and the Philippines has long been hampered by tariffs and restrictive duties, limiting the flow of goods, impeding economic growth in the islands, and preventing the Philippines from fully participating in the global economy. Tariff repeals would allow Philippine exports to enter American markets and vice versa, while also encouraging investment in local industries ranging from sugar and hemp to textiles and processed goods. While the decision will reduce the Treasury's immediate revenue, it promises long-term economic benefits such as stronger trade ties, increased prosperity for Filipino producers, and a more integrated relationship between the islands and the mainland."
 USA_Destroy_Nationalist_Parties: "Destroy Nationalist Parties"
 USA_Destroy_Nationalist_Parties_desc: "Nationalist movements in the Philippines have become more vocal, advocating for increased autonomy or even complete independence. These parties have gained support among urban elites, intellectuals, and labor organizations, endangering the stability of American rule in the islands. By targeting nationalist parties with legal restrictions, political pressure, and administrative oversight, we will weaken opposition, maintain control over the archipelago, and ensure that governance follows American priorities."
 USA_Extend_American_Citizenship: "Extend American Citizenship"
 USA_Extend_American_Citizenship_desc: "Filipinos' status under American rule has long been debated. While they are protected and governed by the United States, they do not have many of the same citizenship rights and privileges as those on the mainland. Extending citizenship would give Filipinos legal recognition, political rights, and protection under the Constitution. It would strengthen ties between the archipelago and the mainland, instill loyalty, and promote participation in governance. Some argue that granting citizenship to Filipinos is a moral obligation on the part of the US government, and that those governed by us must also be protected by our laws."
 USA_Incorporate_the_Philippine_Islands: "Incorporate the Philippine Islands"
 USA_Incorporate_the_Philippine_Islands_desc: "The Philippine Islands have long been an insular territory under American control, with limited self-government and a distinct legal status. While the archipelago has developed its own institutions and local leadership, the conditions are now ideal for the United States to formalize full integration and transform the Philippines into a US-incorporated territory. Incorporating the Philippines would mean fully annexing the islands to the Union, subject to direct federal law and governance. This step would standardize administration, extend full American legal protections, and enable a more uniform approach to defense, trade, and infrastructure, all while crushing any hopes for Philippine independence."
 USA_Police_Action_in_327: "Police Action in Southern Luzon"
 USA_Police_Action_in_327_desc: "Following the complete incorporation of the Philippine Islands, pockets of resistance and unrest emerged in several provinces. While many locals have accepted the new administration, others continue to defy federal authority, sometimes violently. A targeted police operation can dismantle organized opposition, restore order, and strengthen control over critical areas. Military and law enforcement units will work together to dismantle insurgent networks, protect critical infrastructure, and secure population centers."
 USA_Police_Action_in_623: "Police Action in Northern Luzon"
 USA_Police_Action_in_623_desc: "Following the complete incorporation of the Philippine Islands, pockets of resistance and unrest emerged in several provinces. While many locals have accepted the new administration, others continue to defy federal authority, sometimes violently. A targeted police operation can dismantle organized opposition, restore order, and strengthen control over critical areas. Military and law enforcement units will work together to dismantle insurgent networks, protect critical infrastructure, and secure population centers."
