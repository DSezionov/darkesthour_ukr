### Rainbow Plans
 USA_The_Rainbow_Plans_Category: "The Rainbow Plans"
 USA_The_Rainbow_Plans_Category_desc: "\n\n\n£decision_header_USA_War_Plans£\n\n\n\nWhen events in Europe and Asia came to a head, our war planners realized that the United States might have to fight on multiple fronts across continents. The color-coded War Plans were ineffective in this regard because they were primarily focused on a single nation. As a result, they devised the so-called \"Rainbow Plans\", which foresaw and prepared for hemispheric warfare.\n\nNow that these scenarios have played out, we can use the invaluable information provided by these plans to strike our adversaries and ensure an American victory!"
 USA_Rainbow_1: "Enact Rainbow 1"
 USA_Rainbow_1_desc: "The evolving global scenario necessitates that we prepare for potential conflict outside our borders. Rainbow Plan 1 envisions a defensive posture designed to protect the Western Hemisphere, ensuring that no hostile force threatens the Americas or disrupts critical trade routes. To keep up with Europe's militarization, we will combine naval and industrial readiness across the US and our possessions and prioritize relaunching our military industry. Its implementation would pave the way for future military expansion, if necessary."
 USA_Rainbow_2: "Enact Rainbow 2"
 USA_Rainbow_2_desc: "As tensions in the Atlantic and Pacific rise even further, we must devise a strategy that includes cooperation with friendly states to secure transoceanic supply routes. Rainbow Plan 2 outlines steps for collaborating with allied nations to defend the Western Hemisphere, such as industrial planning and coordinated resource allocation. The strategy calls for a rapid increase in production and transportation capacity to ensure that American soldiers can continue their long-term overseas commitments for as long as necessary."
 USA_Rainbow_3: "Enact Rainbow 3"
 USA_Rainbow_3_desc: "The Japanese Empire's aggression poses an immediate threat to our interests in the Pacific. Rainbow Plan 3 focuses on preparing for a potential conflict with the Co-Prosperity Sphere, emphasizing early defense of the Philippines, Guam, and other critical areas. We must focus on developing a strong marine and aviation strategy to contain and counter enemy advances, while also collaborating closely with regional partners such as Australia and New Zealand."
 USA_Rainbow_4: "Enact Rainbow 4"
 USA_Rainbow_4_desc: "As global instability approaches a tipping point, Rainbow Plan 4 calls for coordinated operations across multiple theaters, with the United States leading the way among democratic nations in the fight against totalitarian invasions. This approach prioritizes not only military readiness, but also the industrial transformation required to sustain a modern war effort. The plan aims to establish a long-term military-industrial foundation capable of supporting global commitments throughout the Western Hemisphere by expanding production networks, streamlining logistics, and strengthening strategic bases."
 USA_Rainbow_5: "Enact Rainbow 5"
 USA_Rainbow_5_desc: "With war now almost certain, we have no choice but to prepare for full-fledged warfare alongside key allies in Europe and Asia. Rainbow Plan 5 represents the culmination of previous strategic doctrines, combining continental defense, transatlantic cooperation, and Pacific security into a single, comprehensive doctrine. The country is now transforming into a democratic arsenal, a massive industrial and military powerhouse capable of influencing the outcome of a global struggle for liberty and security."
 USA_Rainbow_Plan_Selected: "Already selected a plan"

### Air War Plans
 USA_Air_War_Plans_Division_Category: "Air War Plans Division"
 USA_Air_War_Plans_Division_Category_desc: "\n\n\n£decision_header_USA_Air_War_Plans_Division£\n\n\n\n\"Air superiority is the ultimate expression of military power\", Prime Minister Churchill once said. It was crystal clear that control of the skies was required to achieve military victory, and as such, strengthening our aerial forces was required to ensure the USA's survival and victory.\n\nWith this in mind, an Air War Plans Division was established, and they have now developed various plans to ensure US air superiority in the various theatres of the war. These plans, which cover everything from production figures to details about offensive operations across continents, call for a complete overhaul of the US Air Force. If we stick to these plans, there is no doubt that we will win and that liberty will triumph in this fight against tyranny!"
