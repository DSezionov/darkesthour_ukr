 ### Dynamic Modifiers
 USA_Eisenhowers_Command: "Eisenhower's Command"
 USA_Eisenhowers_Command_desc: "Dwight D. Eisenhower has been promoted to command of the US Army. For a man of his advanced age, Ike has taken to the job quickly and begun a massive reorganization of the Armed Forces. His ideas are not a complete departure from the past, but rather a reimagining of old tactics in a new war. His strategy, known as the 'Broad Front,' appears straightforward. It calls for a simple advance along the entire front, preventing the enemy from concentrating forces on a single spearhead. Facilitating such a broad advance is far from simple. As our army grows, so do the problems of logistics, coordination, and command. However, Ike has devised detailed and meticulous plans to supply and reinforce the front as it advances."
 USA_Marshalls_Command: "Marshall's Command"
 USA_Marshalls_Command_desc: "George Marshall has been appointed to lead the United States Army. Marshall, a veteran officer from the Great War, has learned and applied the lessons of the previous war. He has witnessed and continues to promote the importance of hitting the enemy hard. He has started planning a reorientation of the Army along those lines. Units will be built to quickly capitalize on breakthroughs made by masses of newer and larger artillery guns."
 USA_Pattons_Command: "Patton's Command"
 USA_Pattons_Command_desc: "George C. Patton, a brazen and unconventional general, has been promoted to command the US Army. Patton, an early convert to the 'Cult of Armor' from the previous war, has seized the opportunity to put his armored warfare theories into practice. Patton views tanks as the foundation of any modern army. Infantry fights to support armored spearheads and break enemy lines. Once sufficiently destroyed, the tanks strike deep behind enemy lines, causing chaos as the infantry shores up their flanks.  At the same time, Patton has started his own program to train our tankers in the most recent German strategies."

