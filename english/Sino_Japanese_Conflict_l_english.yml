 CHI_Sino_Japanese_War: "The Second Sino-Japanese War"
 CHI_Sino_Japanese_War_desc: "War has broken out on the continent. Chinese forces resist our efforts, but their weakness is clear. To restore order and stability to China's devastated landscape, the Empire must act with strength and resolve. Resources from China are critical to Japan's survival. Coal, steel, and manpower must be secured to power our economy and military. The Chinese people will accept our leadership as we dismantle their fractured rule and replace it with order and unity, rooted in the harmony and prosperity of the Greater East Asian Co-Prosperity Sphere."
