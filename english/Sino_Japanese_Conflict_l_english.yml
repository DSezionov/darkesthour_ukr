 JAP_Establish_the_Provisional_Government_of_ROC: "Establish the Provisional Government of the Republic of China"
 JAP_Establish_the_Provisional_Government_of_ROC_desc: "With Beijing and the northern provinces secured, we can install the §RProvisional Government of China§! under §YWang Kemin§! to administer North China, claiming authority over Hebei, Shandong, Shanxi, and surrounding regions. Though nominally independent, it will function entirely under Japanese military oversight, serving as a tool for maintaining order and facilitating resource extraction."
 JAP_Establish_the_Provisional_Government_of_ROC_tt: "Controls §YHebei§!, §YShandong§! §g(region)§! and §YBeijing§!"
 JAP_Establish_the_Provisional_Government_of_ROC_tt_2: "Becomes a core of §RProvisional Government of China§!"
 JAP_Establish_the_Reformed_Government_of_ROC: "Establish the Reformed Government of the Republic of China"
 JAP_Establish_the_Reformed_Government_of_ROC_desc: "Control of Nanjing and the Lower Yangtze allows us to form the §RReformed Government of China§! under §YLiang Hongzhi§!, a loyal administrator claiming sovereignty over Central and Eastern China, including Jiangsu, Zhejiang, and Anhui. This government will support Japanese interests by offering a civil façade in strategic urban centers, aiding in propaganda, policing, and economic stability."
 JAP_Establish_the_Reformed_Government_of_ROC_tt: "Controls §YNanjing§! and §YShanghai§!"
 JAP_Establish_the_Reorganized_Government_of_ROC: "Establish the Reorganized Government of the Republic of China"
 JAP_Establish_the_Reorganized_Government_of_ROC_desc: "§YWang Jingwei§! from the Kuomintang has contacted us and is willing to defect to create a rival, pro-Japanese branch of the KMT. By merging the northern and central puppet regimes under his leadership in Nanjing, we can form the §RReorganized National Government of China§!—an ostensibly unified authority claiming all of China. Though fractured internally and heavily dependent on Japanese support, this regime strengthens our legitimacy, increases collaboration, and undermines Chiang Kai-shek's hold on Chinese nationalism."
 
 # Victory in China
 JAP_Victory_In_China_category: "Victory in China"
 JAP_Victory_In_China_category_desc: "\n\n\n£decision_header_JAP_Victory_In_China\n\n\n\n\nWith the Empire's campaigns in China having yielded decisive results, the focus has shifted from open combat to the stabilisation and consolidation of newly acquired territories. Our forces control vast tracts of land, but these areas remain politically fragmented. Local warlords, provisional administrations, and puppet governments established during the fighting show varying degrees of loyalty, and cooperation is far from guaranteed.\n\nWith the spoils in hand, we must now decide how to divide them while maintaining the Rising Sun's influence in these areas. Puppet regimes must be strengthened, key provinces placed under direct imperial control and military and civilian authorities reorganised."
 JAP_Tackle_The_Remnants: "Tackle the §BRemnants§!"
 JAP_Tackle_The_Remnants_desc: "The Ma Family's warlords maintain power in the far west. They have long resisted outside control, both from the KMT and now from us. With Nanjing's authority gone, they now rule their territory as an independent state. Despite their distance from the larger population, their continued independence provides a rallying point for fugitives, bandits, and remnants of the former Kuomintang and Communists. If left unchecked, they could become a staging ground for our old enemies to resurface and thunder back westwards. We will march west and crush the Ma Family once and for all, bringing their territories under our control."
 JAP_Tackle_The_Remnants_tt: "§RThe Soviets might be willing to defend the dying Republic, and we must tread carefully.§!"
 JAP_Tackle_The_Mas: "Tackle the §1Ma Clique§!"
 JAP_Tackle_The_Mas_desc: "The war in China has broken the power of the Kuomintang and scattered the Communists, but not all opposition has been eliminated. In the far far west of Qinghai and Ningxia, the warlords of the Ma Family still hold power. Fiercely independent, well-entrenched in the mountains and deserts, bound by clan ties, and supported by the local Muslim population, they have long resisted outside control, both from the KMT and now from us. With the authority of Nanjing gone, they now rule their territory as a state unto themselves.\n\nTheir existence threatens the stability of our new order. Though distant from the great population, their continued independence offers a rallying point for fugitives, bandits, and elements of the former Kuomintang and Communists. Left unchecked, they may become a nuisance, and a staging ground for our old enemies to rear their heads once more and come thundering back westwards. The Army General Headquarters, at the behest of the Kwantung Army, thus proposes to draw up a final campaign, one which would march west and crush the Ma Family once and for all, bringing their territories under the control of us and the Wang Jingwei regime."
 JAP_Tackle_Xikang: "Tackle §1Xikang§!"
 JAP_Tackle_Xikang_desc: "Among the most unruly and isolated corners of China lies Xikang, a frontier of mountains, river valleys, and rugged tribes. It has never been fully tamed, not by the Qing, not by the Republic, and certainly not by us. With the collapse of central authority, the warlord Liu Wenhui has entrenched himself as master of the province, ruling through a mixture of force, patronage, and local alliances. From his base in Kangding, he commands a personal army, determined to resist any who would strip away his domain.\n\nHis continued independence represents more than an irritant: it is a potential bastion for fugitives, rebels, and foreign intrigue. If allowed to endure, Liu Wenhui's regime will remain a thorn in our side and an open wound in the territorial unity of our new Chinese order. The Army General Headquarters argues that this wilderness must be subdued once and for all, even if it means braving its treacherous terrain and the dogged resistance of its mountain fighters. The conquest will be arduous, but its reward will be the final consolidation of China's southwest under Japanese guidance."
 JAP_Ultimatum_to_Yunnan: "Ultimatum to §7Yunnan§!"
 JAP_Ultimatum_to_Yunnan_desc: "The Yunnan Clique, led by Long Yun, continues to rule Yunnan and has done so for decades. While nominally aligned with the KMT and a member of the defeated Chinese Republic, Yunnan operates as an independent warlord state, with Long Yun himself a vocal critic of Chiang Kai-shek. A formal offer or ultimatum can be sent to Long Yun, proposing submission to Japanese authority while retaining the current leadership. Acceptance would secure the province without the need for a costly military campaign, increasing our influence over the southwestern frontier while denying the KMT any additional men or territory. However, if Yun refuses our generous offer, a military expedition to bring Yunnan under control may be required."
 JAP_Ultimatum_to_Guangxi: "Ultimatum to §6Guangxi§!"
 JAP_Ultimatum_to_Guangxi_desc: "The Guangxi Clique, under the leadership of Li Zongren and Bai Chongxi, has long been one of the most powerful militarist factions in China. Though their armies once marched under the banner of the Nationalists, they have never hidden their disdain for Chiang Kai-shek, nor their eagerness to carve out an autonomous power base in the south. Now, with the Kuomintang broken and a new government installed in Nanjing, Guangxi alone continues to act as though it stands apart from the new order.\n\nWe must make it clear to Li and Bai that their independence is finished. An ultimatum will be issued, demanding that the Guangxi Clique pledge loyalty to Nanjing, accepting its place as a subordinate within the Greater East Asia Co-Prosperity Sphere. Should they comply, their armies and resources will be turned to our cause. Should they defy us, we will march south and crush them, as we did their former master in Chongqing."
 JAP_Ultimatum_to_Shanxi: "Ultimatum to §BShanxi§!"
 JAP_Ultimatum_to_Shanxi_desc: "For decades Yan Xishan, the so-called \"Model Governor,\" has ruled Shanxi as his personal domain, surviving warlord conflicts, Japanese incursions, and the rise of both the Nationalists and Communists. Cautious, pragmatic, and opportunistic, Yan has always sought to preserve his power above all else. Even as our forces swept aside the Kuomintang's main armies and brought the central plains under control, Shanxi somehow managed to hold on, its mountains and militia shielding it from complete collapse.\n\nThis precarious independence cannot be tolerated. Yan will receive an ultimatum demanding that he accept the authority of the Reorganized National Government under Wang Jingwei, just as he once pledged loyalty to Chiang Kai-shek while maintaining de facto autonomy. Should he comply, Shanxi will be brought into the fold without further bloodshed. Should he refuse, then the Army will storm the Taihang Mountains and shatter his petty regime once and for all."
 JAP_Ultimatum_to_Xinjiang: "Ultimatum to §LXinjiang§!"
 JAP_Ultimatum_to_Xinjiang_desc: "Far to the northwest lies Xinjiang, a land formally ruled as a private domain by the local warlords of the Xinjiang Clique and the various Turkic ethnic groups who live there. Neither the Kuomintang nor the Communists wielded real power there, and the regime we have installed in Nanjing does not either. Their independence undermine our vision of a united and prosperous Asia. Furthermore, the region's vast mineral wealth and strategic location on the Soviet frontier make it far too important to leave in the hands of petty generals from the former KMT. By declaring our intention to take control of Xinjiang, we can legitimise an armed campaign to depose its rulers and expand our influence into Central Asia, particularly towards the Soviet border."
 JAP_Woo_Tibet: "Woo §MTibet§!"
 JAP_Woo_Tibet_desc: "Tibet, remote and surrounded by mountains, has for centuries followed its own path, loosely tied to Chinese governments, both imperial and republican. For decades, the country was a quiet backwater; no longer. Tibet's isolation cannot continue indefinitely. Our victory over China has brought us to the Himalayas' gates, exposing this mountainous theocracy. Its rulers must choose between desperately clinging to independence or adapting to the continent's new power balance. We can offer them terms that include recognition of their autonomy and the preservation of their traditional hierarchy in exchange for submission to our authority."
 JAP_Woo_Tibet.tt: "All core states of [TIB.GetNameWithFlag] in §YYunnan§!, §YXikang§!, §YSichuan§! and §YQinghai§! are owned by Japanese subjects."

