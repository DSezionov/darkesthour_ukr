 # Foreign Aid
 CHI_Foreign_Aid: "Foreign Aid"
 CHI_Foreign_Aid_desc: "\n\n\n£decision_header_CHI_Foreign_Aid£\n\n\n\nChina's disease of the skin has begun spreading, infecting, and harming the external organs. While our will is strong, we possess limited abilities to resist the unprovoked aggression of the Japanese- we must look for assistance elsewhere.\n\nForeign help, especially from the West, can provide us with the tools which our factories cannot produce, but which are essential to give us the ability to strike the rising sun back down into the sea.\n\nWhen the foreign powers see our resolve and determination to fight, they will know it is in their interest for China to survive and for Japan's warmongering to cease."
