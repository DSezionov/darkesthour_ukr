 Second_Sino_Japanese_War.1.t: "Non-Aggression Pact with the Soviets"
 Second_Sino_Japanese_War.1.d: ""
 Second_Sino_Japanese_War.1.A: ""

 Second_Sino_Japanese_War.2.t: "Non-Aggression Pact with China"
 Second_Sino_Japanese_War.2.d: "When the Chinese Civil War began in 1927, the USSR initially maintained a non-interference policy. At the very least, some minor assistance was sent to the Communists. However, Stalin was mostly content to let the Nationalists and Communists fight it out on their own. The situation has changed dramatically since Japan's invasion of China. Since the Soviet Union's founding, the Soviet Union and Japan have fought for supremacy in the Far East. Stalin realizes that if he allows Japan to conquer China, Japan will become the undisputed hegemon of Asia, posing a threat to the security of the Soviet Far East.\n\nTherefore, in order to counter Japan's growing power, Stalin agreed to a Non-Aggression Pact with Chiang Kai-Shek. Some consider this a betrayal of the Revolution because Chiang is an arch reactionary and military strongman actively fighting a Communist Revolution. They beg us to assist Mao and his rebels in their fight against Chiang and Japan. Stalin, on the other hand, sees the situation clearly. He understands that Mao and his Communist guerrillas are incapable of repelling Japan on their own. If he backs Mao, Mao may turn against Chiang, and both Chinese leaders will fall to Japan. Instead, Chiang will receive our assistance for the betterment of the Revolution."
 Second_Sino_Japanese_War.2.A: "Anything to stop Japan!"

 CHI_NAP_with_Soviets_tt: "§LDecisions to Request Soviet Support will be Unlocked!§!"

 Second_Sino_Japanese_War.3.t: "The Republic of China asks for Money"
 Second_Sino_Japanese_War.3.d: "Today, we have met in the Kremlin with the Chinese ambassador at Nanjing's request. They wanted to see if they could acquire our help regarding the tensions between them and Japan. They want us to give them money, and some of the reasons they cite include their struggling economy, which would be devastated should conflict break out between them and Japan, as well as that lending them money would give them a better chance at repelling any attacks that come from Japan, saying that they threaten our interests as well as Chinese security.\n\nWhile it is no secret that we do not get along with the Japanese, are the Chinese the right state to fund? Some within the Central Committee argue that our money is best spent elsewhere and that we keep ourselves out of foreign affairs. Whatever our choice is, Nanjing eagerly awaits our response."
 Second_Sino_Japanese_War.3.A: "This could help keep the Japanese at bay. (500 £money_icon£)"
 Second_Sino_Japanese_War.3.B: "This could help keep the Japanese at bay. (600 £money_icon£)"
 Second_Sino_Japanese_War.3.C: "This could help keep the Japanese at bay. (700 £money_icon£)"
 Second_Sino_Japanese_War.3.D: "No deal with reactionary nations!"

 Second_Sino_Japanese_War.4.t: "The Marco-Polo Bridge Incident"
 Second_Sino_Japanese_War.4.d: "Unbelievable. The treacherous Japanese have skirmished with a small garrison of ours near the Marco Polo Bridge, killing 96 of our soldiers! The reasons for this are unclear, but it is believed to have started because of supposed Japanese military exercises, which soldiers mistook as an attack and opened fire. The Japanese escalated this further by returning fire, causing chaos and confusion.\n\nAfter the firefight ended, the Japanese rudely pushed their way into the nearby town to search for a soldier that had gone missing. As this was clearly an infringement on our sovereign territory, more gunfire was exchanged, and we drove them away. It was only later when the main skirmish took place, with enemy tanks and artillery striking our positions, that control of the bridge slipped from our hands.\n\nHigh command is deeply embarrassed that the situation spiraled out of control, although this is clearly the fault of the Japanese, and it will not go unpunished."
 Second_Sino_Japanese_War.4.A: "Another victory for the Japanese Army!"
 Second_Sino_Japanese_War.4.B: "The Japanese should apologize for this incident!"

 Second_Sino_Japanese_War.5.t: "The Chinese Government Demands"
 Second_Sino_Japanese_War.5.d: "A message has been given to us today from the Chinese Government in Nanjing in relation to the recent skirmish on the Marco Polo bridge. After our small, but significant victory there, we moved into the Beijing area, securing it in the name of the emperor.\n\nThis has led to a small, but an angry list of demands being sent to us by officials in Nanjing, stating the following:\n\n1. Our forces must be immediately withdrawn from the Beijing area.\n\n2. Compensation must be paid in response to the damages caused to the local area during the fighting.\n\nThe Chinese say that failure to meet any of these demands could result in a further escalation of tensions. While tensions are at an all-time high between our two nations, this could be a valuable opportunity to seek de-escalation, although this could give off a look of weakness on the global stage. Many within the government and the military suggest we ignore this however and respond in full force to this insolence."
 Second_Sino_Japanese_War.5.A: "We shall accept their demands"
 Second_Sino_Japanese_War.5.B: "The Imperial Japanese Army will not take such an insult lightly"

 Second_Sino_Japanese_War.6.t: "The Marco-Polo Bridge Incident"
 Second_Sino_Japanese_War.6.d: "Disaster. What started out as a simple training exercise near the Marco Polo Bridge escalated into a small skirmish, which has unexpectedly resulted in our defeat! The foolish Chinese garrison stationed in the nearby town mistook our military exercises as an attack on them and opened fire on our soldiers, who rightfully returned fire.\n\nWhen the chaos had died down, one of our soldiers was missing, and so the nearby town was searched. The Chinese unnecessarily opened fire on us, and once more, shots were fired from both sides. By this point, we had sent a small detachment to reinforce the area, but alas, the Chinese had sent more, and our attempt to take the bridge ended in disaster, with an unknown amount of our soldiers being killed.\n\nWe cannot allow the Chinese to get away with this war-like behaviour, and an ultimatum will be sent to see if they are willing to repent for their ignorance. We will call on the local Chinese General to withdraw from the Beijing area and behind the Yongding River within 24 hours."
 Second_Sino_Japanese_War.6.A: "China must pay for this!"
 Second_Sino_Japanese_War.6.B: "The Japanese should apologize for this incident!"

 Second_Sino_Japanese_War.7.t: "An Ultimatum?"
 Second_Sino_Japanese_War.7.d: "Today, at around noon, we received a message from the Japanese ambassador in Nanjing, although not an apology for the recent Marco Polo Bridge Incident.\nInstead, it is an ultimatum. \n\nIn the short message, the Japanese give us two options. The first is for us to accept responsibility for the incident, withdraw from the Beijing area, and pay compensation for the damages caused, despite the skirmish taking place on our territory. The second option is one we have been trying to avoid for years: war with the Japanese. They state that should we fail to reply to this ultimatum in a sufficient manner, then it will be taken as a full breakdown in diplomacy and leave them with no other choice but to make us pay with our blood.\n\nWhile of course, we could submit to their demands as we are not ready to fight them yet, tensions have been brewing between our two nations for years, and it seems that the inevitable moment has come that we must finally take a stand against this imperialist menace."
 Second_Sino_Japanese_War.7.A: "We have reached the breaking point, never!"

 Second_Sino_Japanese_War.8.t: "China Comes Under Further Attack"
 Second_Sino_Japanese_War.8.d: "Like a cat Japan advanced and took Korea. They sought to humiliate us with their twenty-one demands, they occupy Manchuria and now they advance again. Well, no more, China will fight to her last to be free. In a speech to the people, [Root.GetLeader] appealed to all [Root.GetAdjective], that they stand together or face certain doom alone."
 Second_Sino_Japanese_War.8.A: "For China!"

 Second_Sino_Japanese_War.88.t: "Japanese Win Marco Polo Bridge - Chinese Routed"
 Second_Sino_Japanese_War.88.d: "[FROM.GetNewsIcon]Today Japan's mechanized army, led by over fifty tanks and supported by heavy artillery, broke down the last resistance of the Chinese Kuomintang's much-vaunted 37th Division and marched virtually unopposed into the the city of Changsintien, a strategic railway center twenty miles southwest of Peiping. This comes after many hours of fierce skirmishing following an altercation between Japanese and Chinese forces in the outskirts of the city.\n\nJapanese sources claim that forces belonging to the Chinese National Revolutionary Army abducted or killed Japanese Private Shimura Kikujiro, and proceeded to fire upon search parties attempting to locate the missing soldier. However, many outside observers as well as Chinese sources maintain that this was likely a staged incident much like that of Mukden some years ago.\n\nAlthough what exactly sparked such a conflict remains unclear - the consequences are anything but. Already the Imperial Japanese Army has begun to engage Chinese units up and down the line with more and more units on both sides joining the fray. As each hour ticks by, the odds of a peaceful resolution plummet, with full-scale conflict between Japan and China rapidly becoming inevitable."
 Second_Sino_Japanese_War.88.A: "The Army did WHAT now?!"
 Second_Sino_Japanese_War.88.B: "We have reached the breaking point!"
 Second_Sino_Japanese_War.88.C: "The Dragon and the Samurai finally face off."

 Second_Sino_Japanese_War.9.t: "China Is Under Attack"
 Second_Sino_Japanese_War.9.d: "It is time we stand together against our common foe, the Japanese. Let us lay aside petty squabbles and fight as a strong, united China!"
 Second_Sino_Japanese_War.9.A: "United we are strong!"
 
######################################################################
#  Victory in the Second Sino-Japanese War
######################################################################

 SJW_Japanese_Victory.1.t: "Sunrise in Chongqing"
 SJW_Japanese_Victory.1.d: "Wang Jingwei experienced something he had never felt before. Vindication. Years of struggle, bloodshed, and devastation, all for this single moment. China was at peace once more. Chiang, the madman, was either dead or had fled, and now China can focus on rebuilding. However, it will not be alone or at the mercy of the treacherous Western colonialists. It will go hand in hand with their Asian counterparts in Tokyo.\n\nThe victory, however, had a hollow feel to it. Wang, for all his bluster and bombast on the radio of a new 'Chinese Century', could see the writing on the wall. There were as many Japanese troops in China as Chinese, and the fact that he was installed by Japanese weapons was not lost on anyone. For the time being, China had a debt to repay to Japan. With Japan at peace, they would devote all of their efforts to recouping this debt through treasure and resources. Wang feared that he had traded one master for another.\n\nWang shook off the worries that had plagued him. Throwing off the new Japanese pressure could happen later, when China is whole and strong again. For the time being, they must rebuild both their homes and their souls in order to stand up to their enemies. Then, as China rises, Japan may be forced to recognise them as equals, ushering Asia into a new era of prosperity as the Asian continent's big brothers!"
 SJW_Japanese_Victory.1.d.2: "Wang sighed, looking over the papers on his desk. He was sitting in the Generalissimo's former chair; he had won after decades of struggle and unnecessary bloodshed, but the victory felt hollow right away. Japan had always discounted him and his government; it was difficult to gain recognition in Tokyo, let alone the rest of the world. Now that he had recognition and power, he realised he didn't want it.\n\nJapan and the Americans were still fighting to the death in the Pacific. America is a much larger and more industrious country than Japan, and it has required sacrifices from everyone. It appears that such sacrifices must also come from China. The papers on his desk were a collection of maps of China. Large areas were circled and labelled 'Areas of Resource Development'. Tokyo has 'strongly suggested' that he prioritise securing these areas first. Undoubtedly, the zaibatsu want to plunder the land for its resources. Wang wanted to speak out against this suggestion, but he knew deep down that he couldn't.\n\nJapan still had millions of troops in China, and there were not-so-subtle threats against his continued administration if he did not submit to Japan's demands. As Wang began to mentally plan a new offensive into these rugged areas, a thought persisted in the back of his mind. Maybe Chiang was correct. Perhaps he had just switched from a white master to an Asian one."
 SJW_Japanese_Victory.1.A: "A new sun rises over China!"
 SJW_Japanese_Victory.1.tt: "§RTo the victor go the spoils.§!"

 SJW_Japanese_Victory.2.t: "[FROM.GetLeader] Submits!"
 SJW_Japanese_Victory.2.d: "The leader of [FROM.GetNameDef] has chosen to recognize the authority of the Reorganized National Government and submit to Japanese guidance. Their armies and administration will now be incorporated into our system, securing their territory without further bloodshed."
 SJW_Japanese_Victory.2.A: "A wise province."

 SJW_Japanese_Victory.3.t: "[FROM.GetLeader] Resists!"
 SJW_Japanese_Victory.3.d: "The leader of [FROM.GetNameDef] refuses to acknowledge the Reorganized National Government. Their defiance will not go unanswered, and our forces must prepare to march to enforce compliance and bring the region under control by force."
 SJW_Japanese_Victory.3.A: "Launch the invasion!"

 SJW_Japanese_Victory.4.t: "Telegram from Japan"
 SJW_Japanese_Victory.4.d: "From: Imperial Japanese Army General Headquarters\n\n\nThis message is to inform you, Governor [ROOT.GetLeader], that the Reorganized National Government under the leadership of Wang Jingwei now represents the legitimate authority of China. Your continued claim to independent rule is unacceptable and a direct challenge to the new order we are establishing.\n\nYou are hereby given 72 hours to formally submit to the authority of Nanjing and recognize the leadership of the Reorganized National Government. Compliance will ensure that your position and forces are integrated into the new system and that your province will retain a measure of autonomy under our guidance. Refusal, however, will be considered rebellion, and our armies will march into [ROOT.Capital.GetName] to bring your territory under control by force.\n\nConsider well the fate of those who resist the tide of history. Japan's forces are numerous, disciplined, and determined. The time for negotiation is short; the time for defiance will bring ruin."
 
# SJW_Japanese_Victory.x.t: "A Yunnanese Lapdog" 
# SJW_Japanese_Victory.x.d: "If we want to effectively rule China, we cannot allow it to unite. A China united against us could pose a serious threat to our continued hegemony. That is why we decided to help our Yunnan friends. Yunnan was a constant thorn in Beijing's side during China's power struggle prior to our intervention. Long Yun fought off and on with Chiang for control of the Southwest. Chiang eventually won, but now that Chiang and Long Yun are gone, the situation has resurfaced.\n\nOur friend in Yunnan has requested that we transfer some lands bordering his clique to his control. This would provide him with much-needed protection against any potential Chinese adventurism. While initially ignored, with China subdued, we sought ways to weaken them and maintain our rule. This would be a simple way to kill two birds with one stone. We could endear ourselves to Kunming while weakening Beijing simultaneously. With that in mind, the Foreign Ministry approved Yunnan's request.\n\nYunnanese troops launched a lightning offensive across the border. Chinese troops moved into position to fight back, but they were stopped by Japanese forces in the area. A strongly worded inquiry from Beijing yielded a succinct response: Japan was returning 'rightful territory' to the Kunming administration. Beijing expressed outrage, but not much more. Given the current situation, Beijing has no choice but to accept."
# SJW_Japanese_Victory.3.A: "Another reorganization in China."
 
# SJW_Japanese_Victory.x.t: "Long Yun Defiant!"
# SJW_Japanese_Victory.x.d: "The fall of China was assumed to encompass all of China. That assumption, however, has proven incorrect. Long Yun, commander of the Yunnan Clique in South-West China, has rejected the treaty of surrender signed by Chiang. He has declared it a national humiliation that he cannot accept, and has taken on the role of 'President of the Republic' during Chiang's 'absence'. This means he has officially claimed the mantle of the Chinese Republic that we defeated.\n\nIn Tokyo, the news has sparked rage and frustration. While the military is outraged by Long Yun's refusal to accept reality, they also understand what must happen next. This news essentially forces us to invade the region, which many people wanted to avoid. Yunnan is a region of mountains and valleys surrounded by dense forests. Any fight there would undoubtedly favour the defender. After devoting so much time and resources to subduing China, many people believe that committing even more to such a campaign in Yunnan will result in another decade-long campaign.\n\nMeanwhile, in Yunnan, Long Yun has rallied the people to resist us. Bolstered by die-hard Republicans fleeing China, he has begun to heavily fortify the mountains and valleys. With their backs against the metaphorical wall, there is expected to be fierce resistance unprecedented since the final days of the Chinese campaign. While few expect us to lose the upcoming war, everyone expects long casualty lists."
# SJW_Japanese_Victory.4.A: "Another pointless war in the jungle."
 
# SJW_Japanese_Victory.x.t: "Victory in Yunnan"
# SJW_Japanese_Victory.x.d: "The jungle is on fire, the mountains are dotted with artillery-borne craters, and the once-pristine rivers have turned blood red. As our troops begin garrison duties throughout Yunnan, the campaign's devastation becomes clear. The final stand of Chinese Republicanism was fierce, with every nook and cranny transformed into a fortress. The war quickly became one of extermination, as our troops were forced to methodically clear out every strongpoint for fear of being used to attack our rear echelons.\n\nThe cities fared little better. Kunming, Dayan, and Dali City have become national symbols as slaughterhouses where the dead were piled in mountains. Not only did the soldiers fight like madmen, but civilians also fought. It quickly became impossible to tell who was an enemy and who wasn't, resulting in numerous massacres. Suchexcesses were unavoidable, but the perpetrators have been retired, and the units disciplined. Still, this has harmed our relations with the Yunnanese people.\n\nWe are pleased to have found a local collaborator to run the area in our absence. Guerrilla operations have already been reported against remote bases. We may need to stay in the region for some time to completely eliminate such parasites before they destroy the new regime, but with the assistance of the newly formed Yunnanese Army, these operations may be less deadly than previous ones."
# SJW_Japanese_Victory.5.A: "Moving on..."
 
# SJW_Japanese_Victory.x.t: "A French Yunnan"
# SJW_Japanese_Victory.x.d: "A most unexpected situation has arisen in Yunnan. As Japanese troops prepared to overrun the province, French soldiers followed suit. With lightning speed, the French invaded Yunnan from Indochina and seized the entire province. They designated it as the Zone de développement des ressources du sud-ouest de la Chine and merged its administration with Indochina. This has sparked outrage in Tokyo and smugness in Hanoi.\n\nDemands to hand over the province have been ignored, and the warlords in the Cabinet have begun to call for blood. However, the Emperor intervened and calmed them down. Using whatever influence he still has, he has persuaded the government to give in to this one injustice for the time being. However, this does not imply that Yunnan will always be a French colony; it simply means that it is for the time being. There are more important things to do than get ourselves into a war with France.\n\nMeanwhile, in Yunnan, things are quickly changing. French bureaucrats and colonists followed the French troops closely. They have begun to flood Yunnan's cities, finding them wanting. They are far from the decadence and splendour of Paris, Marseilles, and even Saigon, so they will be rebuilt by these new masters. They quickly became determined to 'uplift' the Yunnanese, just as they did the Vietnamese in Indochina. They are confident that in a few short years, Kunming will be as French as Paris."
# SJW_Japanese_Victory.6.A: "Excuse me, what?"
 
 SJW_Japanese_Victory.7.t: "Tibet Accepts!"
 SJW_Japanese_Victory.7.d: "We received word from afar, Lhasa, Tibet's capital. They have agreed to our demand that they assist us in liberating Asia from European dominance. Many members of the military and government have expressed relief. Few people want to manage a war so far from home in such a harsh environment as the Tibetan plateau. Such concerns are alleviated by Tibet's peaceful bow. In addition, we now have a base near India.\n\nAs Japanese troops begin their long journey west to take up garrison duties and training missions, our agents in Tibet report growing concern. Our war in China was deeply unpopular, and the Dali Lama spoke out against us several times. Their acceptance of our demands was motivated more by fear of retaliation than by love for our mission. This has resulted in a growing public outcry against the government's actions. It is not a serious threat, but we should expect resistance.\n\nFortunately, the rest of the world has largely ignored this development. The only real reaction we received was from the United Kingdom, which condemned the move. There is no doubt that they see this as a threat to the Raj, which it is. With an ally just over the Himalayas, we have a staging point few would dare to attack. While the range itself eliminates many potential entries, the few that remain are now under threat, forcing the British to spread themselves thin to defend them."
 SJW_Japanese_Victory.7.A: "A new bulwark against Western Imperialism!"
 
 SJW_Japanese_Victory.8.t: "Tibet Declines"
 SJW_Japanese_Victory.8.d: "There is bad news from Tibet. In a speech delivered yesterday, the Tibetan government flatly refused our invitation to join the GEACPS. This was not entirely unexpected, but it is deeply regrettable. Nobody in the military or government seriously wants to fight a war so far from home, but a growing faction believes it is now unavoidable. Reluctantly, the General Staff has begun to draft invasion plans, which they estimate will result in heavy casualties if implemented.\n\nOur agents in Tibet report that the news has fuelled nationalist sentiment. Massive rallies have erupted across the plateau, celebrating Tibetan independence and supporting the government. Meanwhile, the Tibetan Army is on high alert, no doubt expecting retaliation. They are encouraged by growing recruitment lists of men eager to fight for their country. Our military planners do not expect them to hold out indefinitely, but they have an incredible defensive advantage that will require time and bodies to overcome.\n\nFortunately, the world has paid little attention to the developing crisis, with the exception of the United Kingdom. London has congratulated Tibet on its resistance to Japanese pressure and, while not publicly stated, is undoubtedly sending them military aid. London clearly cannot withstand Japanese troops on the McMahon Line. If we want to postpone war with the United Kingdom until we are ready, we must tread carefully in the coming crisis, lest we rush into a war we may be unable to win."
 SJW_Japanese_Victory.8.A: "Storm clouds brew in the far West."
 
 SJW_Japanese_Victory.9.t: "The End of Mao"
 SJW_Japanese_Victory.9.d: "As Heicho Goto Kondo dashed down the hallway, gunfire erupted around him. His squad was still battling their way through the compound, to be joined by a few hundred more soldiers waiting outside. The last compound of the CCP was already theirs; the damned Reds just didn't realise it. Goto had noticed the door ahead from the corner of his eye. He needed to investigate and ensure that there was no ambush planned. Behind him, one of his squadmates followed. When the pair arrived at the door, Kondo kicked it after taking a deep breath.\n\nThe room was tiny and sparsely furnished. There was only one chair, a desk with a typewriter, and a small candle. The man sitting at the desk, an elderly man with a lean face, sneered at Kondo.\n\n \"Qù sǐ ba, nǐmen zhèxiē fàxīsī rén zhā!\" he yelled as he stood up. Suddenly, he was holding a pistol and aiming it directly at Kondo. Kondo responded instinctively by firing his rifle first. The Chinese man gasped as the bullet slammed into his heart, knocking him back to the ground. Kondo's squadmate dashed in after him, glancing at the body on the ground.\n\n \"You killed Mao!\"I thought Socho Mituzaki wanted him alive?\"\n\n\"He had a gun; one of us was going to die here, and it wouldn't be me. Now go help the others clear out the rest of the rats.\" Kondo placed an order.\n\nThe man looked at Mao's corpse one more time before fleeing. Kondo spat at the former leader as he turned to follow."
 SJW_Japanese_Victory.9.A: "The only good Communist is a dead one."
 
 SJW_Japanese_Victory.10.t: "Telegram from Moscow"
 SJW_Japanese_Victory.10.d: "From: General Secretary of the Communist Party of the Soviet Union\n\n\nThis telegram is to inform you and your government that the Republic of China has signed a treaty of mutual assistance with our Union. Any further aggression by the Empire of Japan against China will be regarded as an attack on the Soviet Union itself. You have been given a fair warning and have 72 hours to declare that hostilities with China have ended. Failure to do so will result in the Soviet Union declaring war on the Empire of Japan, with all the death that may entail.\n\nAlready, the Union's massive armies are preparing for the long journey East to conduct operations across the potential theatre. As our armies demonstrated at Khalkhin Gol, you lack the ability to stop us. Your armies will be destroyed, your cities will be burned, and your beloved Emperor will appear before the tribunal he has rightfully earned. You may feel safe on your islands, but be aware that the worker's blade is long and will pierce the hearts of any imperialist oppressors who dare to oppose it."
 SJW_Japanese_Victory.10.A: "Death to the Communist filth!"
 
 SJW_Japanese_Victory.11.t: "The Death of Chiang's Republic"
 SJW_Japanese_Victory.11.d: "Sun Fo sat in an uncomfortable chair, watching the Japanese delegate, Mamoru Shigemitsu, sign the document. He himself had just signed it but sat in disbelief. China was defeated, possibly forever, before her new Asian masters in Tokyo. Fo noticed Wang Jingwei, a Japanese lapdog, standing off to the side. The two locked eyes for a brief moment before Wang averted his gaze. Just looking at him made Fo sick.\n\n'You are making the right choice.' Shigemitsu's words shocked Fo back to reality.\n\n'China wants peace, but it must be on its terms. In your country's quest for dominance, you have forever poisoned relations between our two Asian giants.' Fo responded.\n\n'Ah, I am sure to cooperate with our benevolent allies.' Wang suddenly intervened.\n\n'Quiet, dog. China will not stand for it. You may bask in the 'rising sun' for a while, but you must always live in fear. China will rebuild, and we will return with vengeance in a few decades after dealing with the gutter trash you installed in Beijing!' Fo rumbled. Shigemitsu didn't seem bothered.\n\n'Dr Fo's presence is no longer required. You may leave.' Shigemitsu spoke dryly. Sun sank back into his chair as all of the wind left his sails. Despite his bluster, China had been defeated and would continue to be Japan's lapdog for the foreseeable future."
 SJW_Japanese_Victory.11.A: "The end of a thousand years of history."
 
 SJW_Japanese_Victory.12.t: "Japanese Enter Chongqing, Kuomintang Collapse!"
 SJW_Japanese_Victory.12.d: "[FROM.GetNewsIcon]Today, terrible news has emerged from Chongqing, the ancient Chinese capital. It was once the capital of the Chinese resistance to the Japanese invasion, but it is now nothing more than a ruin. After annihilating the demoralised and undersupplied Chinese defenders outside the city, Japanese troops have spread out across the once-capital in search of high-value targets and plunder.\n\nGeneralissimo Chaing Kai-Shek, leader of the Kuomintang Party and head of the Chinese United Front, is, of course, the most valuable target. Despite using barbaric violence and extreme force, their search has yielded no results. According to Allied sources, Chiang has fled the city at the first sign of trouble. He left behind his home, his family, his staff, and the Chinese state's ruins. There has been no word on where he may have gone.\n\nThe loss of their new capital and charismatic leader has dealt a fatal blow to the Nationalist Chinese resistance movement. There are already reports that a dozen generals have declared themselves the new President of the Republic and have begun to clash. Meanwhile, the Japanese have scoured the countryside for any resistance they can find. While valiant Communist and Nationalist guerillas may continue to fight for years, the War in China is clearly over."
 SJW_Japanese_Victory.12.A: "There goes the neighborhood..."
 SJW_Japanese_Victory.12.B: "The unification of Asia has only just begun!"
 
 SJW_Japanese_Victory.13.t: "A Late Riser"
 SJW_Japanese_Victory.13.d: "Akira Kinmochi has been stationed in Chunking for quite a few months now, but he is still adjusting to the new sleep schedule. He was allowed to wake up at a reasonable time while stationed in Harbin, fighting Manchu partisans. In Chunking, however, Akira and his comrades are expected to report for duty no later than 4:45 a.m.\n\nAkira has always been a heavy sleeper, so naturally, he was late once again, waking up at 5:15. Warrant Officer Hatayama, his commanding officer, glared at him as he walked towards the roll call, which was nearing the end.\n\n\"KINMOCHI!\" Hatayama yipped. Akira was terrified by this point, but he had a much more pressing issue: an incoming mortar shell. While he never saw the shell that killed him, Warrant Officer Hatayama, and the rest of his platoon, he did hear it for the last second of his life.\n\nPartisans supporting Mao Zedong and the Chinese Soviet Republic fired the mortar shell. While the CSR, which was previously based in Yan'an, has long since surrendered to our forces, thousands of communists continue to fight in China's countryside. If we manage to conquer China, we will not be able to maintain control of it without facing fierce resistance from these forces."
 SJW_Japanese_Victory.13.A: "No rest for the wicked."

 SJW_Japanese_Victory.14.t: "Mao Zedong Killed in Final Assault on Stronghold"
 SJW_Japanese_Victory.14.d: "[FROM.GetNewsIcon]Japanese military authorities report that Mao Zedong, leader of the Chinese Communist Party, was killed today during the storming of what is believed to be the CCP's last operational command compound. According to field reports, Japanese infantry breached the building after heavy fighting. Inside a small office, Mao allegedly drew a concealed pistol and opened fire on the advancing troops. A Japanese soldier returned fire, fatally wounding him.\n\nMilitary officials stated that Mao had been wanted alive but insisted the shooting was unavoidable. Documents and equipment seized inside the compound suggest the Communist command structure had nearly collapsed. Remaining fighters are said to be resisting in isolated pockets.\n\nThe news has sent shockwaves across the world, as Communist sympathizers react with confusion and grief. International observers say Mao's death delivers a major symbolic blow to the Communist movement, though what's left of the CPC is now reportedly under the control of [PRC.GetLeader], whose location is unknown.\n\nTokyo officials hailed the operation as a decisive victory, announcing that mop-up actions around the compound are ongoing and that full control of the area is expected shortly."
 SJW_Japanese_Victory.14.A: "Mao was a hero and died a hero's death!"
 SJW_Japanese_Victory.14.B: "The rat got what he deserved!"
 SJW_Japanese_Victory.14.C: "A brave man indeed."

 ENG_Sino_Japanese_War_Chinese_Defeat.1.t: "The Status of Tibet"
 ENG_Sino_Japanese_War_Chinese_Defeat.1.d: "Today, our diplomats met with the Japanese to discuss Tibet's ultimate fate. Japan never truly conquered the region, but now that the rest of China has fallen to their forces, they believe they are entitled to it. Our diplomats went to the conference expecting little in terms of victories.\n\nThat's why they were surprised when Japan expressed an interest in negotiating with Tibet. Following some on-the-ground investigation, it appears that their efforts to persuade Tibetans to join their cause have failed. In fact, every attempt they made only increased opposition to their proposed rule. Because Tokyo is more interested in securing the more populous eastern regions of China, they believe they can use Tibet as a bargaining chip to gain our acceptance of their conquests.\n\nAfter some back and forth, an agreement has been reached. Tibet will retain some degree of autonomy, with its own government and laws. They'll serve as a buffer between us. However, Japan and our empire reserve the right to intervene in Tibet if the country leans too far in one direction or another. The treaty states that such interventions will restore the status quo and leave Tibet as it is. Japan appears relieved that troops will not have to be stationed on such a remote frontier and we are content that Japanese troops will not be combing the Himalayas."
 ENG_Sino_Japanese_War_Chinese_Defeat.1.A: "A victory stolen from the jaws of defeat."

 TIB_Sino_Japanese_War_Chinese_Defeat.1.t: "An Offer from Japan"
 TIB_Sino_Japanese_War_Chinese_Defeat.1.d: ""
 TIB_Sino_Japanese_War_Chinese_Defeat.1.A: "Of course we accept!"
 TIB_Sino_Japanese_War_Chinese_Defeat.1.B: "We wish to remain neutral."

######################################################################
# Chinese Victory
######################################################################
 SJW_Chinese_Victory.1.t: "Victory in the War of Resistance!"
 SJW_Chinese_Victory.1.d: "When this conflict first started all those years ago, many people thought we would lose. They undoubtedly had good reason to. Our country was plagued by corruption, mismanagement, and even a civil war, which made managing any international crisis challenging. All those foreigners' predictions initially appeared to be accurate as our soldiers withdrew hundreds of miles within our own borders. In international talks, our submission to the reviled invader became a question of when rather than if.\n\nHowever, we never gave up on winning. We have accomplished what many of our overseas \"friends\" thought was impossible via a lot of work, tons of blood, and mountains of bodies. Both the Lost Province of Manchuria and the former vassal state of Choson during the Qing dynasty are currently occupied by Chinese forces. We not only defeated the Japanese, but we completely destroyed them. The once invincible Kwantung Army now rots in prison camps across China, humbled and beaten like the dogs they are, to beg for peace.\n\nCelebrations have erupted all throughout the nation as our ambassadors prepare to send this peace on paper in Osaka. As columns of Chinese soldiers paraded by [Root.GetLeader] while marching through Beijing, the city rejoiced for several days. There were not just celebrations but also reprisals against Japanese residents of China who arrived there, some even before the war. A well-known local businessman was murdered in the street and his shorefront was set on fire in Shanghai.\n\nAs the official Japanese envoy left his embassy in Nanjing to travel back to Japan, he was stoned. When the violence was limited to Japanese people, [Root.GetLeader] was happy to let it go, but when it started to affect collaborators and \"suspected collaborators,\" he had to put his foot down. However, the incident did not dampen the people's happy disposition, and the government has taken on the role of China's valiant protectors. Should the Civil War resume, this reputation will be advantageous."
 SJW_Chinese_Victory.1.A: "Glory to Zhongguo!"

 SJW_Chinese_Victory.2.t: "Ohaji"
 SJW_Chinese_Victory.2.d: "The government's initial response to the news of the Korean Kwantung Army's capitulation was astonishment and anguish. For centuries, neither a foreign army nor even the Chinese had ever forced the Japanese Army to submit. There had been a coup against the government when word reached the Home Army from irate officers. Even though the coup was short-lived, the public's doubts regarding the war were increased by its occurrence. Since the fall of Mukden, they had been kept in the dark about the war and its failures. We can no longer hide as their fathers and sons serving in Manchuria are no longer writing letters, and coup plotters are once again informing the public about the failures in Asia. The Emperor is to give a statement and the nation will go into mourning for its losses. Those heroic men who we sent to do the impossible will never be forgotten.\n\nBut there is still a rift in the government. Many people in the government want to fight the war all the way to victory. They acknowledge that there have been some setbacks but continue to believe that if we just keep fighting, we will prevail. A growing peace faction led by Prince Chichibu, who narrowly escaped the combat in Korea and believes the war is lost, opposes them. The Emperor's involvement led to the conclusion that peace was the only choice remaining after a long meeting of the so-called \"Big Six\" that lasted all day and all night. We can only hope that it won't be too severe."
 SJW_Chinese_Victory.2.A: "Will the shame ever go away?"

 SJW_Chinese_Victory.3.t: "The Japanese Empire Signs Peace with China"
 SJW_Chinese_Victory.3.d: "[FROM.GetNewsIcon]The Empire of Japan has reportedly contacted China to discuss a peace deal, according to a recent announcement. Some overseas analysts claim that this astounding development, which recently emerged from Tokyo, was inevitable. Despite China's poor start to the war, recent victories in Korea and Manchuria have helped them turn the tide. The recent capitulation of the Kwantung Army in Korea only cemented Japan's demise. It appears that Japan has finally chosen to do something it has never done before in its lengthy history — surrender — after a botched Army takeover and a protracted government conference.\n\nAs one of the deadliest and most devastating wars in history draws to an end, the news has caused a riot of joy in China. To negotiate a settlement over the upcoming months, the two sides will meet in Osaka. The details of the peace agreement are obviously still being worked out, but with Chinese forces stationed in both Korea and Manchuria, whatever form this new Asia takes, it will be the form China desires."
 SJW_Chinese_Victory.3.A: "Peace at last."
 SJW_Chinese_Victory.3.B: "A humiliation!"

 SJW_Chinese_Victory.4.t: "The Question of Taiwan"
 SJW_Chinese_Victory.4.d: "The conference in Osaka was proceeding smoothly. That is, until lately, when the Taiwan issue came up. Since it was taken from us during the War of Jiawu, our diplomats requested the area.\n\nBut in response, the Japanese have stated that they are still in complete control of the region and that many of its residents are Japanese. Of course, they failed to note that many Taiwanese are Japanese as a result of Japanese efforts to relocate its citizens there. In any event, the conference has been halted due to this problem, and our diplomats have recommended two fixes after extensive discussion with the Beijing administration.\n\nThe first is requesting Taiwan from the Japanese in exchange for leaving Korea alone. In order to offer us a platform from which to monitor Japan, our occupation troops are getting ready to install a friendly government on the Peninsula that will be supported by a revitalized Chinese Army. We will leave Korea and let the Koreans settle the leadership if they grant us Taiwan. If we want to project power into the Pacific, Taiwan is absolutely essential, while Korea is only truly useful against Japan. We reclaim our land, and Japan is no longer concerned about Chinese troops stationed nearby. Everyone is satisfied."
 SJW_Chinese_Victory.4.A: "Taiwan is Chinese! Make the proposal!"
 SJW_Chinese_Victory.4.B: "Korea is more valuable than an island, lets keep it."

 SJW_Chinese_Victory.5.t: "A Deal with the Devil"
 SJW_Chinese_Victory.5.d: "The Chinese have approached us with a proposal to end the impasse after their unreasonable demand for Taiwan brought the Conference in Osaka to a standstill. They will leave Korea alone in exchange for Taiwan. The administration is interested in this proposition, without a doubt. Since the Imjin War, Chinese forces in Korea have been a nightmare for Japanese leaders. The Home Isles may be reached from Korea in about an hour by boat. Taiwan, however, is particularly important to the Japanese government. It served as the cornerstone of our Southward push and one of our earliest colonial triumphs. Although such ambitions have been abandoned temporarily as a result of our loss, losing Taiwan would permanently close that door to further expansion. A sizable element of the government, including the military, finds this unacceptable. What will we say in response to the Chinese?"
 SJW_Chinese_Victory.5.A: "Give them the damned island."
 SJW_Chinese_Victory.5.B: "Taiwan is as Japanese as Hokkaido!"

 SJW_Chinese_Victory.6.t: "Japan Accepts"
 SJW_Chinese_Victory.6.d: "Our offer has been accepted by the Japanese after significant internal debate. The words for Taiwan are as follows after the finer points are covered: In three weeks, Japan will withdraw all of its military equipment from Taiwan. China will take any equipment that is still there after that. To assist in the transition of the Japanese administration into a Chinese one, Japanese officials will be left on the island for three months. Chinese administration will arrive on the island at once to start the integration process, and for three weeks, no Chinese military personnel are allowed to set foot on the island.\n\nAll Chinese armed forces and administrative personnel stationed in Korea are required to leave within three weeks as compensation for Taiwan's concession. Any Chinese equipment left behind after those three weeks are to be taken by the nascent Korean state. After those three weeks, any Chinese equipment is to be taken by the fledgling Korean state. Both Japan and China are required to protect the boundaries of the Korean state, and no country is permitted to send soldiers there without the consent of both Korea and the other party.\n\nWith both parties in agreement, the Conference may go on now that its biggest obstacle has been overcome."
 SJW_Chinese_Victory.6.A: "Another victory for China!"

 SJW_Chinese_Victory.7.t: "Japan Refuses"
 SJW_Chinese_Victory.7.d: "Our most generous offer has been rejected by the Japanese after significant internal debate.\n\nThey continue to insist that since we renounced our claim in the Treaty of Maguan, we do not possess Taiwan and, therefore, have no claim to the province. This has just sparked further debate at the Conference, which is now moving again — albeit with a great deal more intensity than before. The formation of the new Republic of Korea has already started in the Korean peninsula. A new leader has been chosen from among the exiled Koreans in China, and an administration resembling our own has started to take shape. Chinese troops are establishing new outposts around the southern coast of the Peninsula in the meantime.\n\nTheir objective has now changed from invasion to occupation and close observation of Japan. They will be poised to slit Japan's neck. This new spearhead of the Chinese tiger will attack their home islands and bring the battle home to the Japanese so China will never again experience the miseries of war. Should they ever challenge our sovereignty once more. While China will continue to lament the loss of Taiwan for many generations to come, gaining control of Korea would help to significantly heal the country's pain."
 SJW_Chinese_Victory.7.A: "A double edged sword."

 ### COLLABORATORS
 # Events for Reorganized / Reformed / Provisional China and similar states
 SJW_RNG.1.t: "Wang Jingwei Defects to Japan; Forms Rival KMT"
 SJW_RNG.1.d: "[FROM.GetNewsIcon]After years of marginalization within Chiang Kai-shek's Nationalist government, Wang Jingwei, head of the KMT's leftist clique, has formally defected to Imperial Japan, establishing the \"Reorganized National Government of China\" in Nanjing and declaring a rival, Japanese-aligned KMT - the Nanjing branch. Many of his closest supporters have joined him, including Chen Gongbo and Zhou Fohai, taking key positions within the new administration.\n\nThis new collaborationist government consolidates administration over Japanese-occupied territories in China by uniting the Provisional Government of China, led by Wang Kemin, and the Reformed Government of China, led by Liang Hongzhi, as well as partially integrating Inner Mongolia, creating a single, unified rival Chinese administration under Wang's leadership. Wang presents this government as a pragmatic path to long-desired peace and stability for China. In practice, it merely serves as an instrument of the Japanese military occupation.\n\nChiang Kai-shek and the mainstream Kuomintang have denounced Wang as a national traitor, vowing to bring him to justice by any means necessary. Japanese propaganda hails the event as proof that collaboration can secure peace and prosperity, hailing the new government as the newest member of the so-called \"Greater East Asia Co-Prosperity Sphere\"."
 SJW_RNG.1.A: "A glorious addition to the Co-Prosperity Sphere!"
 SJW_RNG.1.B: "We must slaughter this traitor!"
 SJW_RNG.1.C: "A scathing betrayal for Chiang."
 SJW_RNG.2.t: "Death of Wang Jingwei"
 SJW_RNG.2.d: "The Reorganized National Government mourns the passing of its founder and longtime leader, Wang Jingwei, who died today in Nagoya, Japan, after years of suffering from complications related to an untreated bullet wound sustained during an assassination attempt in 1939. Chronic pain and declining health, exacerbated by the pressures of administering our government under Japanese supervision, finally claimed the life of China's controversial collaborator.\n\nFollowing internal consultations and the endorsement of our key ministers, Chen Gongbo, the mayor of Shanghai, has assumed the presidency of the Reorganized National Government. Known for his administrative skill and steadfast loyalty to Wang's policies, Gongbo inherits the delicate task of continuing the Nanjing government's cooperation with Japan while maintaining order across our territories."
 SJW_RNG.2.A: "We will honor Wang Jingwei's legacy!"

