 # Actions:
 SUBJECT_MANAGER_ACTION_1_NAME: "Bolster Ideology"
 SUBJECT_MANAGER_ACTION_1_DESC: "Use whatever means necessary to bring our subject into ideological alignment with us."
 SUBJECT_MANAGER_ACTION_2_NAME: "War Propaganda"
 SUBJECT_MANAGER_ACTION_2_DESC: "Anti-war sentiment is high. Let's crush it to make them more committed to the war effort."
 SUBJECT_MANAGER_ACTION_3_NAME: "Increase Compliance"
 SUBJECT_MANAGER_ACTION_3_DESC: "A fist is broken by a thousand small cuts. End the resistance and reclaim our dominion."
 SUBJECT_MANAGER_ACTION_4_NAME: "Send Infantry Equipment"
 SUBJECT_MANAGER_ACTION_4_DESC: "They are struggling to arm their men for the fight, so we must send what we have. The older ones go first."
 SUBJECT_MANAGER_ACTION_5_NAME: "Send Military Instructors"
 SUBJECT_MANAGER_ACTION_5_DESC: "Our greatest military minds will equip them with the tools they need to fight more effectively."
 SUBJECT_MANAGER_ACTION_6_NAME: "Train New Divisions"
 SUBJECT_MANAGER_ACTION_6_DESC: "Their army is pitiful. We must aid them in rapidly militarising."
 SUBJECT_MANAGER_ACTION_7_NAME: "Conduct Army Training"
 SUBJECT_MANAGER_ACTION_7_DESC: "Their soldiers barely know how to handle a firearm. Send them to our boot camps and make them a greater threat to the enemy."
 SUBJECT_MANAGER_ACTION_8_NAME: "Conduct Air Force Training"
 SUBJECT_MANAGER_ACTION_8_DESC: "None of them can fly a plane. A few months at our airfields will sort this out."
 SUBJECT_MANAGER_ACTION_9_NAME: "Prepare for War"
 SUBJECT_MANAGER_ACTION_9_DESC: "As the drums of war resume their beat, ploughshares are transformed into swords."
 SUBJECT_MANAGER_ACTION_10_NAME: "Prioritize Civilian Factory Building"
 SUBJECT_MANAGER_ACTION_10_DESC: "More toasters for the home front will prevent the proles from recognising their true masters."
 SUBJECT_MANAGER_ACTION_11_NAME: "Prioritize Military Factory Building"
 SUBJECT_MANAGER_ACTION_11_DESC: "More guns for the Army will help them help us help them. A win-win-win."
 SUBJECT_MANAGER_ACTION_12_NAME: "Promote Building of Civilian Factories"
 SUBJECT_MANAGER_ACTION_12_DESC: "Our front companies will support their civilian industry and appease the ever-rebellious masses."
 SUBJECT_MANAGER_ACTION_13_NAME: "Promote Building of Military Factories"
 SUBJECT_MANAGER_ACTION_13_DESC: "A well-greased palm is significantly less expensive than building an entire factory on your own."
 SUBJECT_MANAGER_ACTION_14_NAME: "Expand Civilian Industry"
 SUBJECT_MANAGER_ACTION_14_DESC: "A few new tractors will prevent the public from peering too closely behind the curtain."
 SUBJECT_MANAGER_ACTION_15_NAME: "Expand Military Industry"
 SUBJECT_MANAGER_ACTION_15_DESC: "Sometimes when you need something done you have to do it yourself."
 SUBJECT_MANAGER_ACTION_16_NAME: "Expand Building Space"
 SUBJECT_MANAGER_ACTION_16_DESC: "Who put that forest there? No problem, burn it and make the space useful for once."
 SUBJECT_MANAGER_ACTION_17_NAME: "Build Defenses"
 SUBJECT_MANAGER_ACTION_17_DESC: "Hunker down and mind your manners; the enemy is overhead!"
 SUBJECT_MANAGER_ACTION_18_NAME: "Expand Anti-Air"
 SUBJECT_MANAGER_ACTION_18_DESC: "We don't need planes to control the skies above our subjects. Put some AA in the cities and move on to something more important."
 SUBJECT_MANAGER_ACTION_19_NAME: "War Recovery Program"
 SUBJECT_MANAGER_ACTION_19_DESC: "From the ruins of war, a new nation will emerge. A stronger, more compliant nation aimed for our collective good."
 SUBJECT_MANAGER_ACTION_20_NAME: "Focus on Small Arms"
 SUBJECT_MANAGER_ACTION_20_DESC: "Never carry a knife to a gunfight. A few thousand new pistols will solve the issue."
 SUBJECT_MANAGER_ACTION_21_NAME: "Focus on Heavy Weapons"
 SUBJECT_MANAGER_ACTION_21_DESC: "Why use a smaller boom when a larger boom is equally effective and produces a larger boom?"
 SUBJECT_MANAGER_ACTION_22_NAME: "Focus on Support Equipment"
 SUBJECT_MANAGER_ACTION_22_DESC: "Bullets, beans, and bandages win wars. Let's make some for now."
 SUBJECT_MANAGER_ACTION_23_NAME: "Focus on Artillery"
 SUBJECT_MANAGER_ACTION_23_DESC: "The Queen of the Battlefield has been noticeably silent. Let's fix that by shattering a few windows a dozen miles from the front."
 SUBJECT_MANAGER_ACTION_24_NAME: "Focus on Anti-Air"
 SUBJECT_MANAGER_ACTION_24_DESC: "Planes strike us without fear of retaliation. Let us give them a rude awakening next time."
 SUBJECT_MANAGER_ACTION_25_NAME: "Focus on Anti-Tank"
 SUBJECT_MANAGER_ACTION_25_DESC: "What was once a terror on the battlefield is now just another bug to be squashed by a more powerful weapon."
 SUBJECT_MANAGER_ACTION_26_NAME: "Focus on Fighters"
 SUBJECT_MANAGER_ACTION_26_DESC: "Control of the skies implies control of the ground as well. A few hundred fighters will ensure this."
 SUBJECT_MANAGER_ACTION_27_NAME: "Focus on Attack Aircraft"
 SUBJECT_MANAGER_ACTION_27_DESC: "They dive from the air like hawks and strike the enemy from above, unexpectedly and undetected until it's too late."
 SUBJECT_MANAGER_ACTION_28_NAME: "Focus on Strategic Bombers"
 SUBJECT_MANAGER_ACTION_28_DESC: "You cannot fight a war on an empty stomach. Let's make some bombers to keep those stomachs empty."
 SUBJECT_MANAGER_ACTION_29_NAME: "Focus on Naval Bombers"
 SUBJECT_MANAGER_ACTION_29_DESC: "Let's not bother with the naval game. A few hundred of these will help us forget about it."
 SUBJECT_MANAGER_ACTION_30_NAME: "Focus on Transport Planes"
 SUBJECT_MANAGER_ACTION_30_DESC: "Over the last millennium, logistics has advanced significantly. Let us expand their air fleet so that we can supply our men from any location."
 SUBJECT_MANAGER_ACTION_31_NAME: "Focus on Convoys"
 SUBJECT_MANAGER_ACTION_31_DESC: "We must concentrate on convoys. A healthy merchant fleet is critical to the war effort."
 SUBJECT_MANAGER_ACTION_32_NAME: "Focus on Trucks"
 SUBJECT_MANAGER_ACTION_32_DESC: "We must concentrate on building more trucks to help simplify overland logistics."
 SUBJECT_MANAGER_ACTION_33_NAME: "Focus on Mechanized Equipment"
 SUBJECT_MANAGER_ACTION_33_DESC: "We must assist our allies in increasing the size of their mechanised forces in order to improve their fighting capabilities."
 SUBJECT_MANAGER_ACTION_34_NAME: "Focus on Trains"
 SUBJECT_MANAGER_ACTION_34_DESC: "Trains are and will always be the most cost-effective way to transport goods long distances. More trains means more goods."
 SUBJECT_MANAGER_ACTION_35_NAME: "Focus on Light Tanks"
 SUBJECT_MANAGER_ACTION_35_DESC: "They may not be able to produce heavy tanks, but light tanks have their uses."
 SUBJECT_MANAGER_ACTION_36_NAME: "Focus on Medium Tanks"
 SUBJECT_MANAGER_ACTION_36_DESC: "They must concentrate on building better tanks. War has become mechanical, with tanks capable of running over other tanks."
 SUBJECT_MANAGER_ACTION_37_NAME: "Focus on Defense"
 SUBJECT_MANAGER_ACTION_37_DESC: "It is much more effective to defend than to attack. Cheaper, too. They must step back and let us do all the work."
 SUBJECT_MANAGER_ACTION_38_NAME: "Focus of Offense"
 SUBJECT_MANAGER_ACTION_38_DESC: "We need all the help we can get on the front lines. They must join us in the attack!"
 SUBJECT_MANAGER_ACTION_39_NAME: "Garrison Own Territory"
 SUBJECT_MANAGER_ACTION_39_DESC: "While potentially useful, we don't really need them right now. They can stay at home and watch the homefront for us."
 SUBJECT_MANAGER_ACTION_40_NAME: "Protect Allies"
 SUBJECT_MANAGER_ACTION_40_DESC: "With our full attention on the front, we require someone to watch our back."
 SUBJECT_MANAGER_ACTION_41_NAME: "Launch a Naval Invasion"
 SUBJECT_MANAGER_ACTION_41_DESC: "Let's not waste 24 units by failing to take a port again. Throw away the expendable units."
 SUBJECT_MANAGER_ACTION_42_NAME: "Move Troops to Border"
 SUBJECT_MANAGER_ACTION_42_DESC: "War is on the horizon, and our ally will join us at the front. They must prepare."
 SUBJECT_MANAGER_ACTION_43_NAME: "Support Country"
 SUBJECT_MANAGER_ACTION_43_DESC: "We require assistance if we are to achieve our objectives. They must be our support."
 SUBJECT_MANAGER_ACTION_44_NAME: "Send Armor Equipment"
 SUBJECT_MANAGER_ACTION_44_DESC: "Their country lacks the greatest innovation of modern warfare: the Tank. We must aid them with Medium Armor, so they can perform better on the battlefield. The older ones go first."

