l_english:

### FORMABLE NATIONS
# This category contains decisions to form entirely new nations or variants of your nation through cosmetic tags - as well as for smaller constituents to reform starting unions like Czechoslovakia/Yugoslavia if they cease to exist mid-game.

# Category
 formable_nations_category: "Formable Nations"
 formable_nations_category_desc: "For thousands of years, nations have risen and fallen, their borders etched and erased upon the maps of history. Yet the dream of unity, of empire, of rebirth, has never faded. From the ashes of old realms and the ambitions of new leaders, the idea of a greater nation can once again take shape. The world may see you one state today - but destiny whispers of something far greater. Whether by sword, by diplomacy, or by sheer will, the time has come to raise banners that have not flown for generations.. and carve your name into history once more."

# Decisions
 Formable_GGR: "Form the §YGreater German Reich§!"
 Formable_GGR_desc: "The German people have endured centuries of fragmentation, with lands and communities divided by borders drawn by others. It is the destiny of our nation to reclaim these territories and bring all Germans under one banner. Only through this unity can the German people assert their strength, secure their future, and face the challenges of a hostile world as one nation, indivisible and sovereign."
 Formable_PRC: "Form the §YPeople's Republic of China§!"
 Formable_PRC_desc: "For decades, the Chinese people have labored under inequality, corruption, and the weight of fragmented authority. The Communist Party has grown as a force of organization, education, and revolution, inspiring peasants, workers, and soldiers to imagine a society built on equality, shared prosperity, and popular rule\n\nControl of Beijing, the political and cultural heart of the nation, marks the moment when revolutionary dreams can become reality. By proclaiming the People's Republic of China, we unite the country under communist ideals, consolidating our authority and setting the foundation for a new era in which the people themselves shape their destiny. This is not merely the establishment of a state, but the triumph of an ideology, a vision of a China remade by and for its people."
 Formable_YUG: "Reform §YYugoslavia§!"
 Formable_YUG_desc: "Not long ago, our nation was part of the great union of Yugoslavia, a federation of South Slavic peoples bound by history, culture, and the dream of common destiny. The tragic events that led to our separation fractured this once-unified land, leaving memories of shared struggle and prosperity. Yet even amid division, the hope of reunification endures. Shall we seek to restore the bonds of our forebears and rebuild the federation that once symbolized the unity of our people?"
 Formable_CSL: "Reform §YCzechoslovakia§!"
 Formable_CSL_desc: "After the conclusion of the First World War and the Treaty of Versailles in 1919, Czechs and Slovaks joined together to form the Czechoslovak Republic, a beacon of self-determination in Central Europe. Though this union ultimately fell to the tides of history, its legacy of shared identity and cooperation lives on. Might the time have come to rekindle that union, to bring our nations together once more under a common banner?"
 Formable_TRC: "Form §YTranscaucasia§!"
 Formable_TRC_desc: "During the turbulence of the Russian Revolution, the peoples of the Caucasus — Armenians, Azerbaijanis, and Georgians — briefly united under the Transcaucasian Democratic Federative Republic. That fragile state collapsed under external pressure, particularly from Ottoman advances, and later, the Soviet Union absorbed its territories. Yet the dream of a unified Transcaucasia persists in memory and aspiration. Could this be the moment to revive a federation that honors our shared history and strengthens our position in a volatile region?"
 Formable_SCN: "Form §YScandinavia§!"
 Formable_SCN_desc: "Centuries ago, the kingdoms of Denmark, Norway, and Sweden were united under a single crown through the Kalmar Union, lasting 126 years and shaping the course of Northern Europe. Though political realities have since divided the Scandinavian peoples, their shared language, culture, and traditions endure. Perhaps now is the time to rekindle that unity, to bring the nations of Scandinavia together once more in pursuit of strength and common purpose."
 Formable_BLT: "Form the §YUnited Baltic Nations§!"
 Formable_BLT_desc: "Estonia, Latvia, and Lithuania share not only geographic proximity but centuries of intertwined history and cultural ties. Independent yet vulnerable to pressures from East and West, the three Baltic nations face challenges that may be best met together. Uniting as the United Baltic Nations would solidify our sovereignty, reinforce our shared heritage, and allow us to stand as a single, resilient entity in a dangerous world."
 Formable_PRB: "Form the §YPeru-Bolivian Confederation§!"
 Formable_PRB_desc: "From 1836 to 1839, Peru and Bolivia were united under a single confederation, a brief but significant chapter in the history of our nations. Our peoples share language, culture, and economic interests, and history reminds us of the potential benefits of unity. Might this be the moment to revive the confederation, forging stronger ties and presenting a united front in the modern era?"
 Formable_CLT: "Form the §YCeltic Union§!"
 Formable_CLT_desc: "The Celtic peoples of Ireland, Scotland, Wales, the Isle of Man, Cornwall, and Brittany share a heritage that spans millennia, defined by language, mythology, and enduring cultural traditions. Though separated by borders and centuries of foreign domination, the call of a united Celtic identity remains. By joining together, we honor our past, strengthen our nations, and ensure that the Celtic spirit thrives once more."
 Formable_CAT: "Form §YCatalonia§!"
 Formable_CAT_desc: "Though the Catalan people span regions beyond our borders, as the nation of Andorra we are uniquely positioned to claim the legacy of Catalonia. Our shared language, culture, and historical ties make this a natural step toward asserting Catalan identity. By forming Catalonia, we not only embrace our heritage but also stake a claim in the broader story of the Catalan people, uniting their spirit under one banner where we have the opportunity to lead."

# Events
 FormableEvents.1.t: "People's Republic of China Proclaimed in Beijing"
 FormableEvents.1.d: "[FROM.GetNewsIcon]In a historic proclamation, [PRC.GetLeader] has formally declared the establishment of the People's Republic of China, marking a decisive moment in the Communist Party of China's long ideological struggle. Control of the capital has allowed the Party to consolidate authority and begin organizing a functioning government across its territories.\n\nFor decades, China has been marked by competing authorities and fragmented governance. The Communist Party has steadily grown as a revolutionary movement, organizing peasants, workers, and soldiers around principles of equality, land reform and Marxism-Leninism. With Beijing now under its control, the CCP asserts itself as a legitimate government in China, working to unify the nation and establish institutions capable of administering its vast territories.\n\nThe new government has now started implementing centralized control over political and administrative structures, reorganizing local and regional governance, and directing economic and social reforms, including land redistribution and agricultural collectivization."
 FormableEvents.1.A: "Glory to the People's Revolution!"
 FormableEvents.1.B: "We applaud our revolutionary comrades!"
 FormableEvents.1.C: "Should we worry?"