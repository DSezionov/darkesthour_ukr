 PHI_Politics.1.t: "Death of President Quezon"
 PHI_Politics.1.d: "President Manuel L. Quezon, the first President of the Commonwealth of the Philippines, has passed away following a prolonged illness. A passionate advocate for Filipino self-governance, Quezon led the nation through the formative years of the Commonwealth with vision, dignity, and unwavering resolve. His legacy includes the establishment of democratic institutions and the assertion of a national identity on the world stage.\n\nWith his passing, the mantle of leadership now falls to Vice President Sergio Osmeña, a seasoned statesman and close ally of Quezon. Osmeña's succession ensures continuity in governance during this critical period. As the nation mourns the loss of its founding president, it must also rally behind its new leader and press onward toward the realization of Quezon's dream — a free and sovereign Philippines."
 PHI_Politics.1.A: "The nation grieves."