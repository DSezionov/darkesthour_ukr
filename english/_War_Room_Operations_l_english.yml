 ## Unthinkable
 UN_Operation_Unthinkable_1: "Operation Unthinkable"
 UN_Operation_Unthinkable_1_desc: "The United Nations, led by the [?global.un_leader_variable.GetName] and the British Empire, which represent the free world in their ideals, has determined that the only possible course of action for the future is the destruction of the Soviet Union. In order for our children, grandchildren, and their children to live in freedom, we must use any and all military means available to end the communist threat and bring freedom and democracy to Europe, with Winston Churchill's proposed Operation \"Unthinkable\" serving as the primary means. Preparations for the operation are underway, and it will feature the final bitter battle between freedom and tyranny, in which the former will undoubtedly triumph."
 UN_Operation_Unthinkable_2: "Operation Unthinkable"
 UN_Operation_Unthinkable_2_desc: "The United Nations, led by the [?global.un_leader_variable.GetName] and the British Empire, which represent the free world in their ideals, has determined that the only possible course of action for the future is the destruction of the Soviet Union. In order for our children, grandchildren, and their children to live in freedom, we must use any and all military means available to end the communist threat and bring freedom and democracy to Europe, with Winston Churchill's proposed Operation \"Unthinkable\" serving as the primary means. Preparations for the operation are underway, and it will feature the final bitter battle between freedom and tyranny, in which the former will undoubtedly triumph."
 UN_Operation_Unthinkable_3: "Operation Unthinkable"
 UN_Operation_Unthinkable_3_desc: "The United Nations, led by the [?global.un_leader_variable.GetName] and the British Empire, which represent the free world in their ideals, has determined that the only possible course of action for the future is the destruction of the Soviet Union. In order for our children, grandchildren, and their children to live in freedom, we must use any and all military means available to end the communist threat and bring freedom and democracy to Europe, with Winston Churchill's proposed Operation \"Unthinkable\" serving as the primary means. Preparations for the operation are underway, and it will feature the final bitter battle between freedom and tyranny, in which the former will undoubtedly triumph."
 UN_Operation_Unthinkable_Completed: "Operation Unthinkable Completed"
 UN_Operation_Unthinkable_Completed_desc: "It is finished. The nations of the free world have triumphed over the rotten corpse of Bolshevik tyranny and can now work towards a free and democratic future. Following the deaths of thousands of men and a cloud of destruction that covered Europe, the road to recovery can now be taken. Many men have given their lives for this cause, so that their children can live in a world free of evil, and the struggle is over. The United Nations is now the primary body of a united, Western, and democratic world order that no nation dares to challenge, and which crushes all opponents of liberty and democracy in order to maintain peace and freedom."
 UN_Armored_Synthesis_1: "[This.GetWarRoomArmoredSpelling] Synthesis"
 UN_Armored_Synthesis_1_desc: "The allied nations that plan to participate in Operation Unthinkable have agreed to share tank and vehicle technologies as well as synchronise their armoured forces' command and doctrine. This is a huge benefit to the upcoming war effort because it means that more armoured troops can be concentrated in one area at any given time, while also having unified and streamlined command and doctrine, as well as the ability to develop better armoured technology much faster than usual. The Soviets may have many tanks, but through unity will we win!"
