 SOV_Open_New_Industrial_Jobs_3_2_desc: "As millions of men receive orders and depart for new assignments, the Soviet industrial machine churns at an increasing rate. Tens of thousands of guns are being manufactured, as are tanks, planes, ships, trucks, and other pieces of equipment. Our front-line troops have nothing to complain about and an abundance of supplies."
 SOV_Soviet_War_Machine_1: "Industry, Reforged"
 SOV_Soviet_War_Machine_1_desc: "It's been a herculean effort, one that rivals, if not exceeds, the Collectivization in scope and effort, but it's done. We have overhauled every aspect of our manufacturing process in order to increase output and reduce waste. Corrupt bosses are now working on the front lines, grateful for their lives as they strive to redeem their failures. As government agencies remove barriers to establishing new factories, red tape has become a thing of the past, and anyone with two hands now has a job. As bullets, beans, and bandages pour off the assembly lines in unprecedented quantities in Russian history, our men rejoice. Never before have they been so well fed and supplied. With these new weapons, their faith in our cause has become unshakeable."
 SOV_Soviet_War_Machine_2: "Industry, Reforged"
 SOV_Soviet_War_Machine_2_desc: "It's been a herculean effort, one that rivals, if not exceeds, the Collectivization in scope and effort, but it's done. We have overhauled every aspect of our manufacturing process in order to increase output and reduce waste. Corrupt bosses are now working on the front lines, grateful for their lives as they strive to redeem their failures. As government agencies remove barriers to establishing new factories, red tape has become a thing of the past, and anyone with two hands now has a job. As bullets, beans, and bandages pour off the assembly lines in unprecedented quantities in Russian history, our men rejoice. Never before have they been so well fed and supplied. With these new weapons, their faith in our cause has become unshakeable."
 SOV_Operation_Groza_Draft_Mobilization: "The Second Revolutionary Draft of [GetYear]"
 SOV_Operation_Groza_Draft_Mobilization_desc: "In 1917, as the Revolution was under attack from all sides and on the verge of total collapse, Lenin instituted the Revolutionary Draft. Back then, the influx of new comrades was critical in ensuring our victory. Another draft has been called as the Revolution is once again under threat. A million men have already received their orders to fight for the Revolution, and another million are no doubt eagerly awaiting their turn. As zealous Party members and citizens alike flock to the colours, the Army swells with youthful vigour and pride, ready and eager to see the glorious People's War end in victory."
 SOV_Operation_Groza_Airports_to_Connect_the_World: "Airports to Connect the World"
 SOV_Operation_Groza_Airports_to_Connect_the_World_desc: "We have temporarily shifted our focus to the construction of air bases near the frontlines in order to be able to store and deploy all of the newly produced aircrafts, ensuring that our Air Force is ready to match the Germans."
 SOV_Soviet_Advisors: "Soviet Advisors"
 SOV_Soviet_Advisors_desc: "The Soviet Union has sent military advisors to Helsinki. These advisors are not only helping our High Command organise the Armed Forces and develop military strategies and tactics, but they also assist us in the recruitment and training of new recruits, making the process more effective."
 SOV_Soviet_Advisors_2: "Soviet Advisors"
 SOV_Soviet_Advisors_2_desc: "The Soviet Union has sent military advisors to Helsinki. These advisors are not only helping our High Command organise the Armed Forces and develop military strategies and tactics, but they also assist us in the recruitment and training of new recruits, making the process more effective."
 SOV_Soviet_Advisors_3: "Soviet Advisors"
 SOV_Soviet_Advisors_3_desc: "The Soviet Union has sent military advisors to Helsinki. These advisors are not only helping our High Command organise the Armed Forces and develop military strategies and tactics, but they also assist us in the recruitment and training of new recruits, making the process more effective."
 SOV_Soviet_Advisors_4: "Soviet Advisors"
 SOV_Soviet_Advisors_4_desc: "The Soviet Union has sent military advisors to Helsinki. These advisors are not only helping our High Command organise the Armed Forces and develop military strategies and tactics, but they also assist us in the recruitment and training of new recruits, making the process more effective."

 ## Red Dawn:
 SOV_Red_Dawn_1: "Red Dawn"
 SOV_Red_Dawn_1_desc: "We prevailed over the German eagle and gained complete control of Central and Eastern Europe. But the revolution cannot wait. The capitalist pigs have taken our grandeur and are undoubtedly waiting for the right opportunity to attack and destroy our country and beliefs. As a result, in complete secrecy, our top generals and officers devised a complex strategy to eradicate the bourgeoisie plague that has afflicted the world for centuries. This invasion will liberate all workers throughout Europe and beyond. The Army, Air Force, and Navy are all ready for the final victory. Towards triumph, comrades!"
 SOV_Red_Dawn_2: "Red Dawn"
 SOV_Red_Dawn_2_desc: "We prevailed over the German eagle and gained complete control of Central and Eastern Europe. But the revolution cannot wait. The capitalist pigs have taken our grandeur and are undoubtedly waiting for the right opportunity to attack and destroy our country and beliefs. As a result, in complete secrecy, our top generals and officers devised a complex strategy to eradicate the bourgeoisie plague that has afflicted the world for centuries. This invasion will liberate all workers throughout Europe and beyond. The Army, Air Force, and Navy are all ready for the final victory. Towards triumph, comrades!"
 SOV_Red_Dawn_3: "Red Dawn"
 SOV_Red_Dawn_3_desc: "We prevailed over the German eagle and gained complete control of Central and Eastern Europe. But the revolution cannot wait. The capitalist pigs have taken our grandeur and are undoubtedly waiting for the right opportunity to attack and destroy our country and beliefs. As a result, in complete secrecy, our top generals and officers devised a complex strategy to eradicate the bourgeoisie plague that has afflicted the world for centuries. This invasion will liberate all workers throughout Europe and beyond. The Army, Air Force, and Navy are all ready for the final victory. Towards triumph, comrades!"
 SOV_Bolshevik_Guard: "Bolshevik Guard"
 SOV_Bolshevik_Guard_desc: "When our Red Army advances through Europe, it will serve as the vanguard of the proletarian revolution, uniting the workers of the capitalist West in a collective struggle to overthrow the oppressors and live in freedom, unity, and prosperity under the Soviet Union and its allies. As a result, our army is more than just a fighting or occupying force; it is a liberating force, the spear of the working class that unites all workers in the collective struggle against capitalism."
 SOV_Rapid_Modernization: "Rapid Modernization"
 SOV_Rapid_Modernization_desc: "The war has left our country scarred, but it has also provided an opportunity to rebuild the Soviet economy into something stronger than it has ever been. Engineers and planners have been ordered to abandon outdated practices in favour of a rapid industrial renewal program. As production quotas reach previously unheard-of heights, factories hum continuously. Entire industries are being rebuilt from the ground up, utilising new machinery, electrified systems, and modern assembly methods. Inefficiency is punished, while results are demanded. While such haste strains the workforce and diverts resources away from consumer needs, the benefits are undeniable: increased productivity, faster construction, and the resurgence of Soviet industry."
 SOV_Incremental_Improvements: "Incremental Improvements"
 SOV_Incremental_Improvements_desc: "he war has left our country scarred, but it has also provided an opportunity to rebuild the Soviet economy into something stronger than it has ever been.  In the aftermath, many voices within the Party have advocated for restraint, careful rebuilding, and strengthening the Union's foundation. Instead of imposing impossible quotas or risking collapse through overextension, we have taken a methodical approach. Old machinery is repaired and upgraded, workers are retrained, and supply chains are gradually restored. This approach may lack the spectacle of grand five-year miracles, but it guarantees endurance. By focussing on steady progress and worker well-being, we are rebuilding not only our factories but also the people's faith in the socialist cause."
 SOV_Red_Dawn_Economy: "Red Dawn Economy"
 SOV_Red_Dawn_Economy_desc: "We are essentially preparing for a third great war, which will undoubtedly devastate Europe in the short term while liberating it and ensuring prosperity for its people in the long term. However, such a goal will be difficult to achieve, and it will necessitate the efforts of every working man and woman to devote themselves to military production in order to successfully arm the Red Army, Navy, and Air Force to combat the capitalists. As a result, our economy is remodelled to keep up with the war's production needs - domestic and consumer production is put on hold in favour of weapons and materials."
 SOV_Shifting_Production_1: "Shifting Production"
 SOV_Shifting_Production_2: "Shifting Production"
 SOV_Rival_the_Americans: "Rival the Americans"
 SOV_Rival_the_Americans_desc: "We have no illusions about capitalist military strength, particularly at sea. Our Red Navy is powerful, but it is dwarfed by the size, technology, and firepower of Western navies, which can dominate the Pacific, Baltic, and Black Seas. As a result, it is experiencing a rapid and massive rearmament. Every day, our shipyards operate at full capacity, delivering new metal beasts to our Soviet Fleets in order to bring them to full and significantly expanded strength, with complements of ships and men on a scale never seen in Russia's history. The Red Banner will triumph over the Star Spangled Banner, sinking it to the bottom of the ocean."
 SOV_Far_East_Fleet_Report_1: "Remembrance of the Tsarist Navy"
 SOV_Far_East_Fleet_Report_2: "Invest into Morskaya Pekhota"
 SOV_Yadernoye_Oruzhiye: "Yadernoye Oruzhiye"
 SOV_Yadernoye_Oruzhiye_desc: "Through tremendous effort and scientific determination, we have unlocked the destructive power of the atom, matching the West. However, possession is not enough. The Americans continue to improve their designs, increase their stockpiles, and incorporate nuclear weapons into their overall war strategy. Our task now is clear: increase production, improve reliability, and keep the balance of terror firmly in our favour. Reactors must be expanded and scientists given more resources. We cannot allow nuclear superiority to slip from our grasp. The enemy should never believe they have an advantage."
 SOV_Nasha_Bronya: "Nasha Bronya"
 SOV_Nasha_Bronya_desc: "Northern Germany is the only place in central Europe that lies on the European plain, making it ideal terrain for armoured and mechanised units. As a result, our main thrust will pass through there. A massive armoured spearhead will smash through the allied defensive lines in Germany and race towards the French border and the Benelux, causing a chaotic and disorganised retreat and allowing our infantry to wreak havoc. The workers will cheer as our spearheads overrun Germany and the enemies of the workers are crushed beneath the treads of our powerful tanks!"
 SOV_Thunderous_Arsenal: "Thunderous Arsenal"
 SOV_Thunderous_Arsenal_desc: "The combined forces of the Western powers are formidable, and we intend to match them with our own firepower. There is no better firepower than artillery, whether towed, self-propelled, or even operated by rail. Massive artillery barrages, on a scale never seen before and far larger than those of the Great War, will pulverise enemy defences and allow for breakthroughs across the line, sending the shattered and demoralised Western forces reeling."
 SOV_Political_Pressure_On_CZE: "$WAR_ROOM_EVENT_23_OPTION_1_NAME$"
 SOV_Novaya_Krasnaya_Armiya: "Novaya Krasnaya Armiya"
 SOV_Novaya_Krasnaya_Armiya_desc: "Today's Red Army is not the same as it was a few years ago. What was once a massive but weak, ill-equipped, and ragged force has evolved into one of the best armies on the planet, with millions of trained, well-equipped men and thousands of tanks and aircraft, including many of the newest and best models, with battle-hardened crews. Our decision to strengthen the Red Army has only pushed it to new heights, expanding its arsenal, increasing its technological edge, and positioning its men and officers among the best in the world. The Red Army is now prepared to face any enemy or challenge and emerge victorious."
 SOV_Novy_Krasniy_Flot: "Novy Krasniy Flot"
 SOV_Novy_Krasniy_Flot_desc: "The Red Navy had long been the most neglected and underfunded branch of the Soviet armed forces. Despite having a large number of warships and aircraft, many of them were quite old, dating back to the Tsar's navy, and more modern ones, such as minesweepers, were of only light calibre, with crews that were often poorly trained. Not anymore.\n\nThe four Red Fleets have been re-forged into a formidable weapon of war, with an increased complement of competent and experienced seamen and officers, an expanded flotilla of new and modern warships, and improved naval aviation, complete with well-trained air crews and pilots. While the Navy may still not be fully competitive with the combined American and British navies, it can certainly hold its own and, unlike in the past, score decisive victories."
 SOV_Novaye_Voyenno_Vozdushnaye_Voysko: "Novaye Voyenno Vozdushnaye Voysko"
 SOV_Novaye_Voyenno_Vozdushnaye_Voysko_desc: "Although formidable in numbers, the Red Air Force, also known as \"Stalin's Falcons\", has previously demonstrated incompetence and inferiority to the Luftwaffe or British and American air units, with many planes destroyed before even taking off during the initial phases of the fascist invasion, and most pilots being too inexperienced to compete with the Luftwaffe. That's no longer the case.\n\nThe Red Air Force, battered by the war with Germany and bolstered by Soviet government funding, has undergone a transformation, with Stalin's Falcons presenting themselves as experienced and formidable pilots while flying the skies in the newest and most advanced aircraft. The West believes it is superior to the USSR in all aspects of air power, but they will be proven wrong."
 SOV_Inspire_Resistance: "Inspire Resistance"
 SOV_Inspire_Resistance_desc: "The struggle against fascism may be over, but the struggle against oppression continues. Across Europe, countless resistance fighters who once fought for freedom now find themselves under the yoke of capitalist masters in the ruins of so-called \"liberated\" nations. These are not the liberated - they are the betrayed. We'll remind them of their true enemy. Agents of the NKVD, Cominform operatives, and sympathetic veterans form a resistance network beneath the complacent surface of Western democracies. Propaganda stirs the hearts of workers, and whispers of injustice become calls to revolt."
 SOV_Red_Dawn_Failed: "Operation Red Dawn Failed"
 SOV_Red_Dawn_Failed_desc: "Our hopes for conquest and European communism have been dashed. What began as a grand invasion of the West has devolved into a bloody debacle, exposing the failures of our Red Army. With many thousands killed and much equipment destroyed, our plans for Western Germany, France, and other nations have been abandoned, and we must now focus on the defence of our Union and allies, as well as weathering the storm of capitalist troops pouring into our territory. Maybe one day we'll be back pushing into the West, but that day is far on the horizon; a horizon which we may never reach."
 SOV_Soviet_Defeatism: "Soviet Defeatism"
 SOV_Soviet_Defeatism_desc: "With our forces being pushed further eastwards by the day, the Red Army and the population as a whole have fallen into a state of defeatism. The communist leadership has promised the people and its soldiers sweeping victories - a hard but victorious fight that will result in the liberation of workers throughout Europe and the solidification of the Soviet Union as the world's dominant, if not the only, superpower. Now, all that remains to demonstrate those promises are overflowing graveyards of young men in uniform, the tears of grieving mothers, and American tanks rolling eastward, welcomed with open arms by many. Perhaps the Soviet experiment is not to be."
