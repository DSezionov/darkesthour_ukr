 ## Weserübung
 GER_Unternehmen_Weserubung_1: "Unternehmen Weserübung"
 GER_Unternehmen_Weserubung_1_desc: "To ensure our continued supply of precious iron ore from Sweden, the High Command of the Armed Forces has devised a plan that includes an invasion of Norway and Denmark. First, our forces will cross the border with the neighbouring kingdom and occupy all naval and military bases in order to prepare for a naval invasion of the Scandinavian peninsula. Second, if everything goes as planned, the Navy will launch an amphibious assault that will undoubtedly crush all resistance and secure German dominance in Scandinavia for good. Unternehmen Weserübung is essential if we are to continue operating in Europe."
 GER_Unternehmen_Weserubung_2: "Unternehmen Weserübung"
 GER_Unternehmen_Weserubung_2_desc: "To ensure our continued supply of precious iron ore from Sweden, the High Command of the Armed Forces has devised a plan that includes an invasion of Norway and Denmark. First, our forces will cross the border with the neighbouring kingdom and occupy all naval and military bases in order to prepare for a naval invasion of the Scandinavian peninsula. Second, if everything goes as planned, the Navy will launch an amphibious assault that will undoubtedly crush all resistance and secure German dominance in Scandinavia for good. Unternehmen Weserübung is essential if we are to continue operating in Europe."
 GER_Unternehmen_Weserubung_3: "Unternehmen Weserübung"
 GER_Unternehmen_Weserubung_3_desc: "To ensure our continued supply of precious iron ore from Sweden, the High Command of the Armed Forces has devised a plan that includes an invasion of Norway and Denmark. First, our forces will cross the border with the neighbouring kingdom and occupy all naval and military bases in order to prepare for a naval invasion of the Scandinavian peninsula. Second, if everything goes as planned, the Navy will launch an amphibious assault that will undoubtedly crush all resistance and secure German dominance in Scandinavia for good. Unternehmen Weserübung is essential if we are to continue operating in Europe."
 GER_Sonderstabes_Gruppe_XXI: "Sonderstabes Gruppe XXI"
 GER_Sonderstabes_Gruppe_XXI_desc: "Orders have been routed through telegraph lines across Germany. The XXI Corps, which is supposed to carry out the invasion, currently does not exist. It was cut down and widely dispersed after Poland. Its constituent parts are now being called back into service. Old comrades reunite at newly constructed training camps in the Alps and northern Germany. The men are not sure why they are being called back to their old units, but they will find out soon. Even sooner, they will be marching with their comrades through the streets of Oslo, Copenhagen, and Narvik!"
 GER_Case_Study_North: "Case Study North"
 GER_Case_Study_North_desc: "Headquarters' planning is progressing well. Falkenhausen's Baedeker Guide, which he picked up on his way to his hotel room, proved to be an invaluable resource for our generals. We have compiled a more complete picture of the battle zone's geography after carefully studying this guide and gathering additional intelligence in recent weeks. This has provided our generals with a unique perspective on how to conduct the campaign, as well as some inspired suggestions on how to capitalise on the hostile landscape."
 GER_Knavish_Diplomacy: "Knavish Diplomacy"
 GER_Knavish_Diplomacy_desc: "Attempts to sabotage our relationship with Norway are progressing well. Herr von Ribbentrop has made contact with Norwegian Nazis under Quisling and encouraged him to cause trouble, even though we are loath to have him in power. Meanwhile, the Foreign Ministry has started fabricating diplomatic incidents to keep tensions high following the Altmark debacle. Norway, like the terrified weaklings it is, continues on its desperate quest to avoid what comes next. Unfortunately, their fate was sealed long ago by forces greater than themselves."
 GER_Unified_Taskforce_Formation: "Unified Taskforce Formation"
 GER_Unified_Taskforce_Formation_desc: "As von Falkenhorst prepares his headquarters in Hamburg, the men of Army Corps XXI gather in temporary barracks throughout Northern Germany. Orders will be draughted and distributed closer to the invasion, but the soldiers are not stupid. They recall their training and, with their recent deployments, have put two and two together. The prospect of imminent battle has reignited their desire for battle, which had faded during long months of garrison duty. They now eagerly await the opportunity to fight and kill for the Führer and the Reich."
 GER_Direct_Engagement: "Direct Engagement"
 GER_Direct_Engagement_desc: "Hitler's order to fight the Royal Navy has set fire to the Kriegsmarine. The surface fleet, which was previously limited to hit-and-run convoy raiding operations, is now gathering in Kiel and Wilhelmshaven for a new grand campaign. Their orders are simple, but deceptively complex. They are to clear the North Sea of any British attempts to disrupt our occupation of Norway. Many sailors see this as their final opportunity to prove their superiority over the aloof British. For many officers, however, the risk is enormous. One decisive defeat and the Kriegsmarine could be rendered ineffective for years, if not the entire war. While the fleet prepares for a decisive battle on the high seas, Dönitz hopes to avoid a repeat of Jutland."
 GER_The_Hidden_Arm: "The Hidden Arm"
 GER_The_Hidden_Arm_desc: "The ports of Kiel and Wilhelmshaven were once thriving activity centres. Submarines and surface raiders left and returned at all hours, and the bars and brothels were packed with men washing away months of loneliness at sea. Those days are now over. On the Führer's orders, the Kriegsmarine returned to port and stood down. Sailors have been reassigned to shore duties, and only skeleton crews operate the silent grey behemoths gently bobbing in the docks. Even submarine operations have been scaled back. The Kriegsmarine has been condemned to sit out the upcoming invasion, apparently fearing that the navy will be crippled by British forces."

 ## Overlord
 ENG_Operation_Overlord_1: "Operation Overlord"
 ENG_Operation_Overlord_1_desc: "Operation Overlord has begun, kicking off a renewed campaign in Western Europe with the ultimate goal of liberating France and the surrounding countries from German occupation. Tens of thousands of allied troops are being sent to Europe, and the allied powers' entire military might will be directed at Germany in order to defeat its army in the field and bring the war to an end."
 ENG_Operation_Overlord_2: "Operation Overlord"
 ENG_Operation_Overlord_2_desc: "Operation Overlord has begun, kicking off a renewed campaign in Western Europe with the ultimate goal of liberating France and the surrounding countries from German occupation. Tens of thousands of allied troops are being sent to Europe, and the allied powers' entire military might will be directed at Germany in order to defeat its army in the field and bring the war to an end."
 ENG_Operation_Overlord_3: "Operation Overlord"
 ENG_Operation_Overlord_3_desc: "Operation Overlord has begun, kicking off a renewed campaign in Western Europe with the ultimate goal of liberating France and the surrounding countries from German occupation. Tens of thousands of allied troops are being sent to Europe, and the allied powers' entire military might will be directed at Germany in order to defeat its army in the field and bring the war to an end."
 ENG_The_Liberation_of_France: "The Liberation of France"
 ENG_The_Liberation_of_France_desc: "The long-awaited liberation of France is now underway. Cities, towns, and villages that were once under Axis control are now flying the blue-white-red Tricolour again. Bridges are rebuilt, rail lines are reconnected, and critical ports reopened to Allied shipping. Victory has invigorated both soldiers and civilians. Coordination with the French Resistance grows stronger by the day, assisting in the security of routes and the elimination of any remaining pockets of enemy resistance. Meanwhile, the Free French forces were able to establish administration in the occupied territories and recruit volunteers for the war effort."
 ENG_Operation_Bodyguard: "Operation Bodyguard"
 ENG_Operation_Bodyguard_desc: "With the liberation of Western Europe well underway, the Allied high command has authorised Operation Bodyguard, a coordinated deception campaign designed to mislead German intelligence about the location and timing of the upcoming invasion. Dummy armies, false radio traffic, and double agents are used to confuse German planners and keep their forces dispersed. Fake landing craft are stationed in British ports, and phantom divisions appear to be gathering in Scotland and Southeastern England. The goal is straightforward but critical: ensure that the Germans are looking the wrong way when the real blow comes."
 ENG_Operation_Neptune_Preparations: "Operation Neptune Preparations"
 ENG_Operation_Neptune_Preparations_desc: "Operation Neptune represents the naval assault phase of the Allied landings in France. Planning has progressed from the drawing board to the assembly yards and training fields. Ships are being assembled in southern England. The troops are drilling for beach landings. Engineers are constructing landing craft, repairing airstrips, and setting up supply depots. Naval officers are finalising routes across the Channel. Military police are controlling the flow of convoys, while air units prepare to strike German positions ahead of the landings."
 ENG_Mulberry_Harbour: "Mulberry Harbour"
 ENG_Mulberry_Harbour_desc: "The Allies cannot sustain their invasion of France by capturing intact ports. German demolitions and coastal defences make such a scenario unlikely. In response, British engineers and planners proposed an ambitious solution: portable artificial harbours known as Mulberries, which can be built off the coast of the landing sites. Construction has already begun in British shipyards. Massive concrete caissons will be sunk to create breakwaters, while floating roadways will connect piers to the shore. The entire structure must be towed across the Channel and anchored in place, with the capacity to unload thousands of tonnes of supplies per day, even in rough waters."
 ENG_Naval_Force_Allocation: "Naval Force Allocation"
 ENG_Naval_Force_Allocation_desc: "With the invasion of France imminent, the Allied command must finalise the distribution of naval forces to support the landings. Every ship, from minesweepers to floating hospitals, must be assigned a specific role, such as bombardment, escort duty, transport protection, anti-submarine patrols, and so on. The allied navies will work together in a joint command structure to ensure continuous coverage of the Channel and fire support for ground forces once the landings begin."
 ENG_Neptune_Naval_Task_Force_1: "Neptune Naval Task Force"
 ENG_Neptune_Naval_Task_Force_1_desc: "Operation Neptune is the naval component of Operation Overlord, which involves the landing of Allied forces on the coast of France. It is the largest seaborne invasion in history, necessitating close coordination among warships, landing craft, support vessels, and supply convoys. The Neptune Naval Task Force is in charge of transporting tens of thousands of troops across the English Channel, landing them on enemy-controlled beaches, and ensuring their reinforcement and supply."
 ENG_Neptune_Naval_Task_Force_2: "Neptune Naval Task Force"
 ENG_Neptune_Naval_Task_Force_2_desc: "Operation Neptune is the naval component of Operation Overlord, which involves the landing of Allied forces on the coast of France. It is the largest seaborne invasion in history, necessitating close coordination among warships, landing craft, support vessels, and supply convoys. The Neptune Naval Task Force is in charge of transporting tens of thousands of troops across the English Channel, landing them on enemy-controlled beaches, and ensuring their reinforcement and supply."
 ENG_Neptune_Naval_Task_Force_3: "Neptune Naval Task Force"
 ENG_Neptune_Naval_Task_Force_3_desc: "Operation Neptune is the naval component of Operation Overlord, which involves the landing of Allied forces on the coast of France. It is the largest seaborne invasion in history, necessitating close coordination among warships, landing craft, support vessels, and supply convoys. The Neptune Naval Task Force is in charge of transporting tens of thousands of troops across the English Channel, landing them on enemy-controlled beaches, and ensuring their reinforcement and supply."
 ENG_Mass_Bombing_Operations: "Mass Bombing Operations"
 ENG_Mass_Bombing_Operations_desc: "The time has come to unleash the full force of Allied air power on the cities of occupied Europe. As the invasion approaches, entire urban areas under Axis control are being targeted for sustained, overwhelming bombing campaigns. This is not about precision strikes; it's about devastation. Rail yards, military depots, barracks, bridges, city centres, ports, and industrial districts will all be destroyed in an attempt to cripple enemy logistics and paralyse German garrisons. The human cost is not ignored; rather, it is deemed a price worth paying."

 ## R4
 ENG_Plan_R4_1: "Plan R4"
 ENG_Plan_R4_1_desc: "Plan R4 is the codename for our detailed strategy to intervene directly in Scandinavia, denying Germany access to vital Swedish iron ore shipments via Norwegian ports. According to the plan, we intend to launch rapid amphibious assaults on key Norwegian ports and, depending on the strategic situation, push into Sweden or even Finland. If we succeed in our operations, we will be able to completely cut off Germany's access to Swedish iron ore, starving its steel industry and, by extension, its military production."
 ENG_Plan_R4_2: "Plan R4"
 ENG_Plan_R4_2_desc: "Plan R4 is the codename for our detailed strategy to intervene directly in Scandinavia, denying Germany access to vital Swedish iron ore shipments via Norwegian ports. According to the plan, we intend to launch rapid amphibious assaults on key Norwegian ports and, depending on the strategic situation, push into Sweden or even Finland. If we succeed in our operations, we will be able to completely cut off Germany's access to Swedish iron ore, starving its steel industry and, by extension, its military production."
 ENG_Plan_R4_3: "Plan R4"
 ENG_Plan_R4_3_desc: "Plan R4 is the codename for our detailed strategy to intervene directly in Scandinavia, denying Germany access to vital Swedish iron ore shipments via Norwegian ports. According to the plan, we intend to launch rapid amphibious assaults on key Norwegian ports and, depending on the strategic situation, push into Sweden or even Finland. If we succeed in our operations, we will be able to completely cut off Germany's access to Swedish iron ore, starving its steel industry and, by extension, its military production."
 ENG_Plan_R4_Completed: "Plan R4 Completed"
 ENG_Plan_R4_Completed_desc: "With the successful completion of Operation R4, we demonstrated our resilience and strategic expertise. The coordination between our military branches has never been better, and the intelligence gathered during the operation has provided valuable insights into the enemy's vulnerabilities. Now, Norway's and Sweden's iron ore deposits are safe from German attack, and we have successfully halted German expansion into northern Europe."
 ENG_Plan_R4_Failed: "Plan R4 Failed"
 ENG_Plan_R4_Failed_desc: "The failure of Operation R4 is a significant setback for our military efforts. Despite meticulous planning, unexpected complexities and strong opposition from our adversaries led to a disastrous outcome. Key components of the operation did not go as planned, and tactical errors compounded our problems. Germany is currently free to control Norway and Sweden's strategically important iron ore reserves, which will be critical to their war effort."
 ENG_War_Cabinet_Opinion_Very_Bad: "War Cabinet Opinion - Very Bad"
 ENG_War_Cabinet_Opinion_Very_Bad_desc: "The War Cabinet is in disarray over the situation in Scandinavia. Our troops have suffered significant setbacks, and their morale is dangerously low. The cabinet is debating whether to withdraw entirely or significantly reduce involvement before the situation spirals out of control. Ministers are concerned that if no immediate corrective action is taken, we could face a catastrophic defeat that would harm Britain's global standing and severely weaken our position in the larger war. The majority of the cabinet is calling for an end to our operations, or at least a significant withdrawal of resources from Scandinavia."
 ENG_War_Cabinet_Opinion_Bad: "War Cabinet Opinion - Bad"
 ENG_War_Cabinet_Opinion_Bad_desc: "The War Cabinet is increasingly concerned about our Scandinavian situation. Several planned operations have stalled or failed to produce decisive results, putting pressure on both military leadership and the civilian government. There is growing concern that continuing on this path will deplete resources needed elsewhere and undermine public support for the war. Some cabinet members are already openly discussing partial withdrawals or negotiating a reduced presence in the region to avoid further disasters."
 ENG_War_Cabinet_Opinion_Neutral: "War Cabinet Opinion - Neutral"
 ENG_War_Cabinet_Opinion_Neutral_desc: "The War Cabinet has a cautious, measured assessment of the current situation in Scandinavia. While some early objectives have been met, ongoing challenges and mixed battlefield outcomes have prompted ministers to take a wait-and-see approach. There is no strong motivation to escalate or withdraw completely. For the time being, the cabinet believes that maintaining a stable presence, consolidating positions, and focusing on defensive measures will be sufficient until the situation clears. Caution and flexibility are the order of the day, with decisions made incrementally rather than in bold leaps."
 ENG_War_Cabinet_Opinion_Good: "War Cabinet Opinion - Good"
 ENG_War_Cabinet_Opinion_Good_desc: "The War Cabinet is unanimously supportive of our current strategy in Scandinavia. Recent successes have exceeded expectations; our positions are secure, and morale is high. Cabinet members believe we have the initiative and can dictate the next steps without fear of significant setbacks. Supplies and reinforcements are flowing steadily, and coordination between naval, air, and ground forces is excellent."
 ENG_Our_Minelaying_Efforts_1: "Our Minelaying Efforts"
 ENG_Our_Minelaying_Efforts_1_desc: "To obstruct German access to Swedish iron ore and coastal supply routes, we have begun laying extensive minefields in Norwegian waters. Specially trained Royal Navy minelayers have been deployed to the fjords and along major convoy routes near Narvik and other strategic ports. These operations aim to divert German merchant and naval traffic away from sheltered Norwegian routes and into open sea lanes, where our navy and air patrols can more easily intercept and destroy it. By closing these safe passages, we weaken German imports and make their logistics much more dangerous and expensive."
 ENG_Our_Minelaying_Efforts_2: "Our Minelaying Efforts"
 ENG_Our_Minelaying_Efforts_2_desc: "To obstruct German access to Swedish iron ore and coastal supply routes, we have begun laying extensive minefields in Norwegian waters. Specially trained Royal Navy minelayers have been deployed to the fjords and along major convoy routes near Narvik and other strategic ports. These operations aim to divert German merchant and naval traffic away from sheltered Norwegian routes and into open sea lanes, where our navy and air patrols can more easily intercept and destroy it. By closing these safe passages, we weaken German imports and make their logistics much more dangerous and expensive."
 ENG_Scandinavian_Special_Forces: "Scandinavian Special Forces"
 ENG_Scandinavian_Special_Forces_desc: "Plan R-4 emphasises the rapid securing of ports, airports, and other strategic areas, all of which necessitate effective amphibious landings and operations in Scandinavia's mountainous and wooded terrain. Regular Tommies are, of course, unsuitable for operations in such harsh conditions or for such specialised operations, but special contingents, namely the Royal Marines and specialised mountaineer commandos, are trained specifically for such tasks and will be right at home in Scandinavia, necessitating their extensive deployment."
 ENG_Oxford_Meteorologists: "Oxford Meteorologists"
 ENG_Oxford_Meteorologists_desc: "We have begun employing meteorologists from the University of Oxford in a military capacity, utilising their expertise and the university's resources to assist us in tracking and predicting weather patterns in the North Sea and Scandinavia, allowing our forces, which would otherwise be hampered by harsh weather and stormy conditions, a much greater ease of operations in the region, as well as more predictability for mother nature's tempers."

 # Technologies:
 United_Nations_Enhanced_Artillery: "Enhanced Artillery"
 United_Nations_Enhanced_Artillery_desc: "A minor boost to the artilleries of the United Nations' members."
 Unthinkable_Focus_Forests: "Advanced Forest Warfare"
 Unthinkable_Focus_Forests_desc: "Adapting armored and mechanized tactics to dense forests improves ambush potential and concealment. However, vehicle mobility suffers due to rough terrain and limited paths."
 Unthinkable_Focus_Lowlands: "Advanced Plains Warfare"
 Unthinkable_Focus_Lowlands_desc: "Perfect for fast armored thrusts and mechanized advances. Open terrain allows for high mobility, but lack of natural cover makes units vulnerable to air attacks and artillery."
 Unthinkable_Focus_Hills: "Advanced Hills Warfare"
 Unthinkable_Focus_Hills_desc: "Mechanized units gain better positioning and defensive advantages in hilly regions. Armor effectiveness drops slightly due to uneven terrain and limited maneuverability."
 Red_Dawn_Nasha_Bronya: "Nasha Bronya"
 Red_Dawn_Nasha_Bronya_desc: "The flat plains of Northern Germany provide ideal conditions for the deployment of tanks in large armoured spearheads to punch through allied lines, causing chaos in their advance while also creating gaps and allowing infantry to flood in. It is proposed that we simply overwhelm the enemy with the sheer power and size of our tank forces, smashing his lines and driving towards France and the Benelux. At the same time, we may work on improving the fuel efficiency of our tanks and developing a logistics plan to efficiently distribute supplies among our armoured forces, so that they do not become stuck and overrun in a counterattack."
 Red_Dawn_Thunderous_Arsenal: "Thunderous Arsenal"
 Red_Dawn_Thunderous_Arsenal_desc: "A tank assault is potentially too risky and resource intensive. After all, the enemy is likely to expect us to use massive armoured spearheads and will have amassed large amounts of anti-tank weaponry and defences in his territories. We must attack them with overwhelming firepower, rather than running them over. We will work to build a truly massive artillery arsenal, with the goal of annihilating enemy lines with massed bombardments from a distance."
 R4_Scandinavian_Special_Forces_1: "Scandinavian Special Forces"
 R4_Scandinavian_Special_Forces_1_desc: "Plan R-4 emphasises the rapid securing of ports, airports, and other strategic areas, all of which necessitate effective amphibious landings and operations in Scandinavia's mountainous and wooded terrain. Regular Tommies are, of course, unsuitable for operations in such harsh conditions or for such specialised operations, but special contingents, namely the Royal Marines and specialised mountaineer commandos, are trained specifically for such tasks and will be right at home in Scandinavia, necessitating their extensive deployment."
