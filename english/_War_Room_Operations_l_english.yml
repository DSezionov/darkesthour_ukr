 ## Groza:
 SOV_Operation_Groza_1: "Operation Groza"
 SOV_Operation_Groza_1_desc: "We have spent years preparing for an impending threat from Germany. We can no longer wait. Our most experienced and intelligent generals have devised a cunning plan dubbed \"Operation Groza.\" If successful, a massive land and air assault on Germany's heartland will cripple any potential threat to the country for hundreds of years. Of course, no plan is risk-free. It's unlikely that everything will go according to plan, but we must seize the opportunity. Operation Groza must succeed, and we will demonstrate to the world that we have outmatched the eagle."
 SOV_Operation_Groza_2: "Operation Groza"
 SOV_Operation_Groza_2_desc: "We have spent years preparing for an impending threat from Germany. We can no longer wait. Our most experienced and intelligent generals have devised a cunning plan dubbed \"Operation Groza.\" If successful, a massive land and air assault on Germany's heartland will cripple any potential threat to the country for hundreds of years. Of course, no plan is risk-free. It's unlikely that everything will go according to plan, but we must seize the opportunity. Operation Groza must succeed, and we will demonstrate to the world that we have outmatched the eagle."
