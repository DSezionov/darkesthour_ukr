 # Operation Decisions:
 ## Groza
 operation_groza_decision_launch_operation: "Launch $WAR_ROOM_OPERATION_1_PREFIX$ $WAR_ROOM_OPERATION_1_NAME$"
 operation_groza_decision_launch_operation_desc: "It's finally here. After much planning, all of the pieces are in place. Our economy is booming, and our military is ready and motivated. All of our efforts have culminated in this moment, and it is now up to us to ensure that they were not in vain. We will drive the Germans back, and then we will celebrate in Berlin, having finally put down the fascist threat and the madmen in Berlin. The Red Army is well-prepared and unbeatable. The tide of communism will sweep over Europe, freeing the people from the jackboot of the fascist dogs."
 operation_groza_decision_evaluate_the_stavka: "Reform the High Command"
 operation_groza_decision_evaluate_the_stavka_desc: "To avoid being paralysed by unforeseen events or strategic setbacks, we will need to extensively reorganise High Command in order to put it on the necessary war footing and enable it to make good and swift strategic decisions under pressure and in the face of adversity."
 operation_groza_decision_introduce_new_construction_projects: "Introduce New Construction Projects"
 operation_groza_decision_introduce_new_construction_projects_desc: "We will draft up a number of new potential construction projects in preparation for Operation Groza, such as improving infrastructure, fortifying borders, increasing production, and bolstering our naval forces. These new construction projects will be the operation's backbone, so we should prioritize and complete as many of them as possible before the war."
 operation_groza_decision_all_roads_lead_to_berlin: "All Roads Lead to Berlin"
 operation_groza_decision_all_roads_lead_to_berlin_desc: "Our Eastern road network needs a major overhaul if we are to fight the war on the grand scale that reality requires. We must work hard to make the journey from the Urals to the border as simple and quick as possible. The economic benefits are also very important. However, due to time constraints, we can only concentrate on one area."
 operation_groza_decision_red_forts: "Red Forts"
 operation_groza_decision_red_forts_desc: "The preparation for our eventual war with Germany should not only focus on the offensive capabilities of the Red Army, but also on the defence of our borders. Building more forts on the front lines would greatly improve our defensive capabilities in the event of a major German offensive against us."
 operation_groza_decision_supply_issues: "Supply Issues"
 operation_groza_decision_supply_issues_desc: "Supplying all of these millions of men is becoming a problem as our men gather on the eastern border. Our ageing rail system is failing, and an upgrade is long overdue. We will lay miles of new rail and ensure that the existing railways operate at peak efficiency! However, such a massive undertaking necessitates concentration. It's up to STAVKA to determine where our focus will lie."
 operation_groza_decision_open_new_industrial_jobs: "Open New Industrial Jobs"
 operation_groza_decision_open_new_industrial_jobs_desc: "More resources are required if we are to win this war. Millions of volunteers have already signed up for the \"Strike the Earth Initiative\", and millions more can be drafted as needed. These valiant patriots are eager to assist our valiant soldiers in reversing Capitalist oppression. All we need to know is where to send them."
 operation_groza_decision_industry_projects: "Industry Projects"
 operation_groza_decision_industry_projects_desc: "For at least a decade, Soviet industry has not had to support a war. The tranquillity has allowed rust and complacency to set in. If we are to launch this new and grand offensive, we must simultaneously implement a slew of far-reaching reforms. We must motivate workers to achieve new levels of output while also expanding factories to produce more of the weapons required to liberate Europe's proletariat."
 operation_groza_decision_soviet_war_machine: "Soviet War Machine"
 operation_groza_decision_soviet_war_machine_desc: "Soviet factories are notorious for their inefficiency. Our factories are among the least productive in Europe, if not the world, due to red tape, unrealistic quotas, and ambitious bosses. We must put in a lot of effort to overcome this obstacle. If we are to defeat the Germans, the War Machine must be fully operational. We will be the most productive people this world has ever seen by the time we finish!"
 operation_groza_decision_the_worker_spirit: "The Worker Spirit"
 operation_groza_decision_the_worker_spirit_desc: "While the Red Army valiantly fights the enemy on the frontlines, we must ensure that they are constantly supplied with equipment and resources. As much as we must prepare our military, we must also prepare and motivate our workers to work in factories and produce this critical equipment. We will launch a large-scale propaganda campaign to ensure that workers understand why they are working and how important their contribution is to the motherland."
 operation_groza_decision_draft_mobilization_order_41: "Draft Mobilization Order"
 operation_groza_decision_draft_mobilization_order_41_desc: "We need men, lots of men, if we are to win this war. That's why Stalin issued the Draft Mobilization Order [GetYear]. It calls for a million men to be drafted into the army and deployed to fight the fascists. No nation will be able to withstand the infamous \"Soviet Steamroller.\" An unprecedented bureaucratic task is being undertaken, and everyone is determined that all of this effort will be worthwhile in the end."
 operation_groza_decision_prepare_stalin_vanguard: "Prepare Stalin's Vanguard"
 operation_groza_decision_prepare_stalin_vanguard_desc: "Every Army requires a face for the cameras and news reporters to use as an example of the greater military's heroism. Fortunately, the Soviet Army has no shortage of heroes. It's just a matter of who we choose to focus on. The men we select will be the darlings of the Soviet, and possibly even global media. Not to mention the favoritism bestowed upon the units by command. That is why we must exercise caution when making this selection."
 operation_groza_decision_fighting_on_their_territory: "Fighting on their Territory"
 operation_groza_decision_fighting_on_their_territory_desc: "Our generals must be able to navigate all types of terrain efficiently and outmanoeuvre the enemy in order to advance quickly. We'll have to decide which terrain we want our generals to master in order to ensure a quick victory."
 operation_groza_decision_prepare_the_military_marine_fleet: "Prepare the Military Marine Fleet"
 operation_groza_decision_prepare_the_military_marine_fleet_desc: "Preparing the Red Navy to be capable of fighting off the Germans and their potential allies in the upcoming confrontation with Germany is one of our top priorities in our war preparations. We must take action to better prepare the Red Navy for this potential war on the sea."
 operation_groza_decision_birds_nest: "Bird's Nest"
 operation_groza_decision_birds_nest_desc: "The Soviet Air Force is not yet at the level of readiness required to win a war. Our aircraft production has increased dramatically in preparation for Operation Groza, but we now lack the necessary air bases to store and deploy these new planes. This, combined with a lack of experienced pilots and ground support crews, is an issue that must be addressed as soon as possible."
 operation_groza_decision_strategy_for_finland: "Strategy for Finland"
 operation_groza_decision_strategy_for_finland_desc: "With our victory in the winter war and the establishment of the Finnish Democratic Republic, we now have more options for involving Finland in Operation Groza. We must coordinate and prepare Finland for Operation Groza, as well as devise an effective strategy that will provide us with additional advantages in the upcoming war."

 ## Red Dawn
 operation_red_dawn_decision_launch_operation: "Launch $WAR_ROOM_OPERATION_2_PREFIX$ $WAR_ROOM_OPERATION_2_NAME$"
 operation_red_dawn_decision_launch_operation_desc: "All preparations are complete. Our mighty proletarian army, navy, and air force are prepared, with millions of soldiers and thousands of tanks, artillery pieces, and other armoured vehicles. This century will be determined by us, the Soviet Union. This century will be the communist century. Workers around the world will watch with pride and envy as we crush the West with the steel of our tanks and the bayonets of our soldiers. Operation \"Red Dawn\" starts today. The time is now! Forwards, Comrades! To victory!"
 operation_red_dawn_decision_towards_the_liberation_of_europe: "Towards the Liberation of Europe"
 operation_red_dawn_decision_towards_the_liberation_of_europe_desc: "Although we defeated the German fascists and their allies and liberated Eastern Europe, a new threat has emerged: the West. Our eternal capitalist adversary, a resurgent former ally who has grown stronger than ever before. Our strategy is clear: the Red Army will march into Western Europe and end capitalist oppression. In 1919, the capitalists attempted to snuff out the revolution, and now the fire of Western 'democracies' will be extinguished. There is only room for one power: the Soviet Union, which must dominate Europe. A red dawn is on the horizon."
 operation_red_dawn_decision_rebuilding_the_union: "Rebuilding the Union"
 operation_red_dawn_decision_rebuilding_the_union_desc: "Although we have triumphed over our fascist adversaries, our Union is a wounded beast. The war has completely destroyed the Western USSR, killing millions and levelling entire cities or depopulating them. Inside, the country is a shell of what it was before the war. As a result, our primary goal, particularly if we are to engage in a war with the West, should be to rebuild our Union. Reconstruct and repopulate cities, bring back and rebuild factories, and increase production. We must quickly rebuild our industry to pre-war levels or higher, lest the combined industrial might of the West outperform us."
 operation_red_dawn_decision_shifting_production: "Shifting Production"
 operation_red_dawn_decision_shifting_production_desc: "Although our union is powerful, we must admit that we cannot fully outmatch our allies in all sectors. As a result, we must allocate a significant portion of our military production to either planes or tanks. If we invest heavily in the Red Air Force and aircraft production, we could create a behemoth capable of challenging American air dominance, raining hell from above. Otherwise, we may invest in tank production, devoting the majority of our military factories to this sector and assembling a massive tank army capable of crushing the West on the ground."
 operation_red_dawn_decision_voyenno_morskoy_flot: "Allocate funds to Voyenno Morskoy Flot"
 operation_red_dawn_decision_voyenno_morskoy_flot_desc: "The Soviet Pacific Fleet is the weakest naval force in the union. After the Japanese dealt the Tsar's navy a crushing defeat in 1905, the Pacific Fleet never fully recovered, serving primarily as a backwater assignment and dumping ground for officers who fell out of favour with Moscow. It saw almost no action during the war, and more than 140,000 of its sailors were assigned to rifle brigades. \n\nAs a result, our Pacific Fleet is unprepared to fight the vast and well-equipped American Fleet and must be quickly brought up to combat readiness. The Stavka has decided to prioritise it among our naval forces, allocating additional funding for expansion and authorising the transfer of some ships from the Baltic and Black Sea Fleets. We must be able to compete with the British and Americans in the Pacific, or we risk losing the Far East."
 operation_red_dawn_decision_yadernoye_oruzhiye: "Yadernoye Oruzhiye"
 operation_red_dawn_decision_yadernoye_oruzhiye_desc: "The allied powers hold within their hands a weapon of great force: an atom-splitting bomb capable of annihilating entire cities on its own, and which could be dropped on Kiev or Leningrad as easily as any other major city on Earth. Fortunately, our intelligence services are strong and vigilant. We have recovered details from the so-called \"Manhattan Project\" thanks to the efforts of our brave spies, and we now have the opportunity to seek such a weapon ourselves. The Americans are in for a surprise..."
 operation_red_dawn_decision_the_northern_plains_of_europe: "The Northern Plains of Europe"
 operation_red_dawn_decision_the_northern_plains_of_europe_desc: "In a future invasion of the capitalist west, our main thrust would undoubtedly be through Northern Germany, on the European plain, allowing us to best deploy our armoured and motorised units. Of course, the allies are not stupid, no matter how much we wish they were, and they will have undoubtedly concentrated their best forces in that area, hoping to avoid a blitz. Stavka must now devise a strategy to breach the allied defences, either by piercing them with armour or destroying them with artillery."
 operation_red_dawn_decision_the_southern_flank: "The Southern Flank"
 operation_red_dawn_decision_the_southern_flank_desc: "Czechoslovakia has suffered greatly in recent years due to the Germans' brutal occupation. But now the country has been restored. Our troops march through Prague while the flags of the Soviet Union and independent Czechoslovakia fly together. However, the country is not as willing to accept Soviet friendship. Although the restored Communist Party of Czechoslovakia is strong, it does not control the government, and President Edvard Beneš is not a close friend of ours. \n\nIf we are to fully integrate Czechoslovakia into our sphere and have it on our side during the war with the West, the communists must increase their internal influence. As a result, we will instruct Interior Minister Václav Nosek, a loyal communist party member, to begin reorganising the National Security Corps, filling their leadership positions with Czechoslovak Communist Party supporters and members, and transforming them into a de facto party asset, and thus, by extension, our asset."
 operation_red_dawn_decision_the_eve_to_a_new_era: "The Eve to a new Era"
 operation_red_dawn_decision_the_eve_to_a_new_era_desc: "The world's militaries before and after the Great Patriotic War are radically different, with better training, better arms, and modern technology never seen or even dreamed of before. Nonetheless, they are used for a foolish purpose: the preservation of the old world. The capitalist-dominated world of several decades ago is no more, and we will be the ones to put the final nail in its coffin. A communist era will rule the Earth thanks to the efforts of the Red Army and Navy, which must immediately divert valuable resources and ensure their victory over the capitalists."
 operation_red_dawn_decision_establish_connections_in_the_west: "Establish Connections in the West"
 operation_red_dawn_decision_establish_connections_in_the_west_desc: "Although Western Europe and America are currently under capitalist oppression, this does not mean that the people who live there are willing to sit silently and accept it. Many communist and socialist parties, as well as sympathetic trade unions and even armed resistance movements, are still following Marx's teachings today and would be delighted to assist us when Operation Red Dawn is launched. These assets will be invaluable to a future communist regime ruling the West."
 operation_red_dawn_decision_inspire_resistance: "Inspire Resistance"
 operation_red_dawn_decision_inspire_resistance_desc: "Many of the armed resistance fighters in Western Europe who have fought fascists in recent years are staunch supporters of Marxist, Leninist, and communist principles. And now, despite being \"liberated\" from the fascists, the ruling bodies in power are no better, keeping workers under capitalist oppression and profiting from their suffering. We will reach out to these men and women who have suffered so much and whose rage is boiling. They have fought oppressors before, and now they will have the opportunity to do so again, realising the dreams of European communism, in which all workers can live in paradise."

 ## Unthinkable
 operation_unthinkable_decision_launch_operation: "Launch $WAR_ROOM_OPERATION_3_PREFIX$ $WAR_ROOM_OPERATION_3_NAME$"
 operation_unthinkable_decision_launch_operation_desc: "All preparations are now complete. Our allies have been mustered, and our forces have been assembled. We have detailed intelligence on the red enemy. The time has come. Today, with a few phone calls and pen strokes, the world will be forever changed. If we, the free world, emerge victorious from this great conflict, the East will know freedom, and the tyranny of the Soviet bear will no longer reign over Europe. The Soviets will not be around to see their empire rise for much longer. We will destroy it, and may God assist us with this endeavour."
 operation_unthinkable_decision_scout_soviet_defenses_in_europe: "Scout Soviet Defenses in Europe"
 operation_unthinkable_decision_scout_soviet_defenses_in_europe_desc: "As we prepare to confront the bear that threatens Europe, we must understand what we are up against. The Joint Chiefs of Staff have thus tasked the OSS with conducting extensive reconnaissance and intelligence gathering operations within Soviet territory. We must understand everything that the communists do and the forces that make up their organisation. What their defences look like, their troop compositions, the quality of their men and equipment, and when their officers use the lavatory."
 operation_unthinkable_decision_inter_allied_intelligence_sharing: "Inter-Allied Intelligence Sharing"
 operation_unthinkable_decision_inter_allied_intelligence_sharing_desc: ""
 operation_unthinkable_decision_lessons_of_the_ostfront: "Lessons of the Ostfront"
 operation_unthinkable_decision_lessons_of_the_ostfront_desc: "Where the Nazis failed and eventually brought about their own demise, we will triumph and bring about the death of the USSR. But if we want to be smart and avoid repeating the mistakes made by the Wehrmacht when they marched into Russia, we must first learn and analyse them. We will thoroughly examine what happened on the Ostfront, as well as the successes and failures of the Nazi War Machine in Russia, and will hear firsthand accounts from those who led it. After all, many former Wehrmacht generals are willing to work with us to escape the Siberian gulag. And some are certainly looking forward to a rematch with the Bolsheviks."
 operation_unthinkable_decision_aiming_the_blow: "Aiming the Blow"
 operation_unthinkable_decision_aiming_the_blow_desc: "If we are to gain an early advantage over the Soviets during our offensive, our first and main surprise attack must be meticulously planned, timed, and carried out. We will, of course, use our vast armour stockpiles to quickly punch through and hammer the Soviet defensive lines, but we must be cautious about where we do so, lest we become trapped in unfavourable terrain and have our tanks completely destroyed. If we catch the Bolsheviks off guard in an unexpected location, the rewards could be enormous; however, if we miss our first blow, our war effort will suffer greatly."
 operation_unthinkable_decision_prepare_weapons_of_mass_destruction: "Prepare Weapons of Mass Destruction"
 operation_unthinkable_decision_prepare_weapons_of_mass_destruction_desc: "The atomic bomb is unquestionably one of our most significant advantages over the USSR. These are weapons that can flatten entire cities in one hit or wipe out entire Soviet tank divisions with the work of a single bomber, and they will not be overlooked. America will stockpile such bombs and prepare to use them to target the Soviet Union and its major cities. If we have to flatten everything from Erfurt to the Urals and leave Russia in a pile of irradiated ash, so be it. That is the price that must be paid to liberate the world from Bolshevik oppression."
 operation_unthinkable_decision_prepare_for_a_red_dawn: "Prepare for a Red Dawn"
 operation_unthinkable_decision_prepare_for_a_red_dawn_desc: "It is entirely possible that the Soviets will launch an attack on free Europe before we launch our own operation to liberate the Soviet-occupied territories. The OSS and MI6 have obtained credible intelligence that the USSR is planning an invasion of Western Europe, which the Allied Command Staff refers to as 'Operation Red Dawn'. As such, we must be prepared for the possibility that the Soviets will launch the first strike, pushing us away from the Soviet Zone before we can regroup and launch a counterattack."
 operation_unthinkable_decision_the_harris_lemay_plan: "The Harris-Lemay Plan"
 operation_unthinkable_decision_the_harris_lemay_plan_desc: "British General Arthur Harris and US Army Air Forces Major General Curtis LeMay collaborated on a plan for an extensive bombing campaign of Soviet-controlled Europe after Operation Unthinkable begins. Both have drawn on their wartime experience, with the former commanding many of the massive bombing operations against Germany and the latter directing fire bombings against Japan, to detail and outline a possible air campaign that would result in the utter destruction of cities in Soviet-occupied Europe and the Soviet Union, hampered Soviet industry, morale, and the Soviet war machine."
 operation_unthinkable_decision_coordinate_with_sympathetic_czechs: "Co-Ordinate with Sympathetic Czechs"
 operation_unthinkable_decision_coordinate_with_sympathetic_czechs_desc: "Following the redrawing of maps and political power in postwar Europe, Czechoslovakia, perhaps the most bullied and strong-armed nation in Europe, has fallen under the boot of the Bolshevik hordes, with its government becoming communist and a puppet of Moscow. Of course, many of its residents are dissatisfied with the arrangement, having endured years of direct German occupation only to be subjected to an indirect Bolshevik occupation. If we reach out to such people and their resistance networks, we may be able to gain an advantage once we enter their country."
 operation_unthinkable_decision_knock_out_vladivostok: "Knock Out Vladivostok"
 operation_unthinkable_decision_knock_out_vladivostok_desc: "Vladivostok is Russia's largest Pacific port and, as demonstrated during the Russian civil war, the gateway to the Far East. The capture of this port city would allow for quick offensives northward towards Kamchatka and Yakutia, as well as along the Trans-Siberian Railway, while also denying a permanent naval presence in the Sea of Japan. As such, it is an essential goal in the early stages of our offensive strategy. If we succeed in capturing Vladivostok, they will open up the Russian Far East and eventually remove any Soviet presence in the Pacific."
 operation_unthinkable_decision_cut_the_baku_lifeline: "Cut the Baku Lifeline"
 operation_unthinkable_decision_cut_the_baku_lifeline_desc: "If the USSR were to lose control of the Baku Oil Fields, it would result in significant fuel shortages for the Soviet military and additional obstacles to their war effort, as well as, if we chose to, a redirection of Baku Oil towards our areas of control and thus the Free World. We could simply destroy the oil wells, refineries, and fuel storage plants with strategic aviation. A more difficult course of action would be to move British and French forces through Persia and into Azerbaijan, with the goal of seizing control of the oil fields. Of course, if those forces move too slowly, the Soviet forces could simply destroy the oil wells as they retreat, or they could completely stop our offensive, leaving Baku in their hands."
 war_room_operations_word_spelling_armoured: "Armoured"
 war_room_operations_word_spelling_armored: "Armored"

 ## Weserübung
 operation_weserubung_decision_launch_operation: "Launch $WAR_ROOM_OPERATION_4_PREFIX$ $WAR_ROOM_OPERATION_4_NAME$"
 operation_weserubung_decision_launch_operation_desc: "The time has come! Our hurried preparations are finally complete! We must strike north and seize Norway before the Allies do! With this distraction out of the way, we can concentrate on the real prizes in Eastern and Western Europe."
 operation_weserubung_decision_appoint_the_sonderstabes_gruppe_xxi: "Appoint the Sonderstabes Gruppe XXI"
 operation_weserubung_decision_appoint_the_sonderstabes_gruppe_xxi_desc: "The XXI Army Group demonstrated its mettle in Poland, fighting valiantly at Lomza. However, since Poland's fall, the OKW has held them as a reserve. Now we need to commit them to fighting in the North. These seasoned warriors will make quick work of the Norwegians."
 operation_weserubung_decision_prepare_case_study_north: "Prepare Case Study North"
 operation_weserubung_decision_prepare_case_study_north_desc: "Norway was the last place we expected or wanted to fight. If we are to invade, we must have some knowledge of the terrain. We must send our generals out to gather as much information about Norway's geography as possible. Even if the information is from a tourist brochure."
 operation_weserubung_decision_brief_the_diplomats: "Brief the Diplomats"
 operation_weserubung_decision_brief_the_diplomats_desc: "Until now, we have had relatively friendly diplomatic relations with Norway. This cannot continue if we attack them. We need to bring in von Ribbentrop and give him the order to destroy our relationship with Norway. We cannot be seen fighting with our friends."
 operation_weserubung_decision_establish_the_hoheres_kommando: "Establish the Höheres Kommando z.b.V. XXXI"
 operation_weserubung_decision_establish_the_hoheres_kommando_desc: "We need to separate our troops in Denmark from those in other commands. They will be far enough away from other fronts that commanding them, as well as our eventual invasions, may put our generals under too much strain. With the HK z.b.V XXXI established, they can concentrate on the upcoming real wars."
 operation_weserubung_decision_wehrmacht_combined_operations_trials: "Wehrmacht Combined Operations Trials"
 operation_weserubung_decision_wehrmacht_combined_operations_trials_desc: "Some generals are concerned that our soldiers' months of idleness may have caused them to become 'rusty'. Let us conduct a series of drills to prepare them for the trials of Northern combat."
 operation_weserubung_decision_our_soldiers_in_the_north: "Our Soldiers in the North"
 operation_weserubung_decision_our_soldiers_in_the_north_desc: ""
 operation_weserubung_decision_consolidate_the_x_fliegerkorps: "Consolidate the X. Fliegerkorps"
 operation_weserubung_decision_consolidate_the_x_fliegerkorps_desc: "If we want to control the land, we also need to control the air. Gather the X Fliegerkorps and prepare them to the highest level! Let no Allied planes harass us while we occupy Norway!"
 operation_weserubung_decision_reorganize_marinegruppenkommando_west: "Reorganize Marinegruppenkommando West"
 operation_weserubung_decision_reorganize_marinegruppenkommando_west_desc: ""
 operation_weserubung_decision_organize_the_taskforces: "Organize the Taskforces"
 operation_weserubung_decision_organize_the_taskforces_desc: "As preparations continue, it is time to establish the invasion's battle plan. For far too long, troops have wandered aimlessly through their temporary holding camps, waiting for orders."
 operation_weserubung_decision_reassess_fuel_priorities: "Reassess Fuel Priorities"
 operation_weserubung_decision_reassess_fuel_priorities_desc: "With the gathering of so much material in the North, much of the region's fuel supplies have quickly depleted. It pains us to do so, but we must act quickly to divert fuel from the Western and Eastern borders to this new theatre of war."
 FALL_WESERUEBUNG_COMPLETE_TT: "§Y[GER.GetName]§! controls or has established puppet regimes in §Y[NOR.GetName]§! and §Y[DEN.GetName]§!."

 ## Overlord
 operation_overlord_decision_launch_operation: "Launch $WAR_ROOM_OPERATION_5_PREFIX$ $WAR_ROOM_OPERATION_5_NAME$"
 operation_overlord_decision_launch_operation_desc: "Everything is ready. The allied forces have been assembled, and battle plans have been finalised. We are preparing to launch perhaps one of the most daring operations of the war: an invasion of Nazi-occupied Western Europe via Normandy. We will liberate these occupied territories, drive the Germans back into their own country, and, as has been our goal throughout the war, preserve our civilisation while freeing a suffering humanity."
 operation_overlord_decision_coordinate_with_the_ffi: "Coordinate with the FFI"
 operation_overlord_decision_coordinate_with_the_ffi_desc: "As preparations for the liberation of Western Europe continue, better coordination with the French Forces of the Interior is required. These resistance fighters have grown into a well-organised and determined force during their country's occupation, carrying out sabotage, gathering intelligence, and tying down German units. By providing arms, training, and open lines of communication, we can make the FFI a stronger partner during Operation Overlord and the subsequent campaign, resulting in a much smoother landing."
 operation_overlord_decision_operation_bodyguard: "Operation Bodyguard"
 operation_overlord_decision_operation_bodyguard_desc: "To ensure the success of our planned invasion of Western Europe, the enemy must be misled about the timing and location of our landings, which Operation Bodyguard aims to accomplish. This operation will involve the use of dummy military formations, double agents, and fake radio traffic. By creating the illusion of invasions in places like Norway or the Pas-de-Calais, we can divert German forces away from the true point of attack, making the Normandy landings far more likely to succeed and with fewer casualties."
 operation_overlord_decision_operation_jubilee: "Operation Jubilee"
 operation_overlord_decision_operation_jubilee_desc: "Before we make any serious attempts at landfall in France, we must first assess the German defences. The Atlantic Wall has been hailed as one of the most formidable fortification systems ever built in Europe, and it will be the primary obstacle to a successful landing. Vice-Admiral Lord Louis Mountbatten has proposed a daring raid around the port town of Dieppe with a force of several thousand Canadian and British soldiers, primarily as a \"trial run\" for the actual landings in France. If everything goes well, we will know that the German defences can be easily breached. If it ends in disaster, we may have to rethink our entire operational plan."
 operation_overlord_decision_prepare_operation_neptune: "Prepare Operation Neptune"
 operation_overlord_decision_prepare_operation_neptune_desc: "Operation Neptune is the naval component of our upcoming cross-Channel invasion, tasked with transporting, landing, and supplying Allied forces on France's beaches. This operation will require hundreds of landing craft, warships, and support vessels from across the Allied navies. Southern England must prepare port facilities, staging areas, and logistical depots, as well as allocate the necessary resources and plan for shore bombardment, naval support, and the elimination of Axis convoys and naval capabilities."
 operation_overlord_decision_build_floating_harbours: "Build Floating Harbours"
 operation_overlord_decision_build_floating_harbours_desc: "To sustain a large invasion force on the beaches of France, we cannot rely on capturing intact port facilities, as German demolitions and heavy fortifications make this nearly impossible. The solution is to build floating, prefabricated harbours known as Mulberries that can be towed across the Channel and assembled off the coast after the landings. These artificial harbours will feature floating roadways, breakwaters, piers, and docking platforms capable of handling hundreds of tonnes of supplies per day. Work must begin immediately, relying on thousands of tonnes of concrete and steel and requiring coordination among engineers, naval planners, and dock workers."
 operation_overlord_decision_allied_warship_coordination: "Allied Warship Coordination"
 operation_overlord_decision_allied_warship_coordination_desc: "The success of any cross-Channel operation is dependent not only on the soldiers landing on the beaches, but also on the warships that clear the way for them. To suppress enemy defences, secure sea lanes, and protect our transports, naval coordination is required, from destroyer screens to battleship bombardment and minesweeping operations. We will formalise joint operational planning among the Allied navies, establishing common rules of engagement, radio protocols, and fire-support coordination. We will also assign roles across national fleets, ensuring that British, Canadian, and American ships and escort groups operate in close coordination."
 operation_overlord_decision_mobilise_the_airborne_divisions: "Mobilise the Airborne Divisions"
 operation_overlord_decision_mobilise_the_airborne_divisions_desc: "A major component of the upcoming landings will be a large-scale airborne operation that will insert allied paratroopers behind enemy lines in order to secure critical areas before the arrival of the main forces via seaborne landing, sabotage enemy defences, and cause general chaos. Such an operation is, of course, extremely risky, but it is required for the overall success of Operation Overlord and will demonstrate the effectiveness of parachutists in combat. Several airborne divisions have already arrived in England, and training is intensifying as D-Day approaches."
 operation_overlord_decision_prepare_for_mass_bombing: "Prepare for Mass Bombing"
 operation_overlord_decision_prepare_for_mass_bombing_desc: "We must unleash the full force of Allied bomber commands on the Wehrmacht and the territories it controls. Although it will result in many civilian deaths, it is an unavoidable fact of life that we must use all available resources to weaken the Wehrmacht and destroy the infrastructure it uses, primarily through large bombing raids coordinated by the various bomber commands of the Allied nations. The destruction of entire towns and cities will occur for the greater good of regionally eliminating the Wehrmacht's fighting strength."
 ENG_Secure_a_Beachhead: "Secure a Beachhead"
 ENG_Secure_a_Beachhead_desc: "Operation Overlord is underway. Planners have designated five landing sites on the western Normandy coast: Utah, Omaha, Juno, Gold and Sword. These objectives must be seized and cleared within the established operational window; failure to meet that window cannot be permitted, as the operation's forward movement depends on it. Following clearance, the advance into France will begin."
 ENG_CONTROLS_NORMANDY: "§BAllies§! control §YUtah, Omaha, Gold, Juno and Sword§!"
 ENG_BEACHHEAD_SECURED_TT: "§tA beachhead has been secured.§!\n§Y$WAR_ROOM_OPERATION_5_PREFIX$ $WAR_ROOM_OPERATION_5_NAME$§! §Gwas successful.§!"
 ENG_BEACHHEAD_FAILED_TT: "§tWe have been pushed back to the sea.§!\n§Y$WAR_ROOM_OPERATION_5_PREFIX$ $WAR_ROOM_OPERATION_5_NAME$§! §Rfailed.§!"
 ENG_OPERATION_JUBILEE_UNLOCK_TT: "Unlock Decision: §YOperation Jubilee§! in the £war_room_operation_texticon §Y$WAR_ROOM_OPERATION_5_PREFIX$ $WAR_ROOM_OPERATION_5_NAME$§! War Room Operation."
 ENG_OPERATION_JUBILEE_GOAL_TT: "We will start a §RRaid§! on the German-occupied city of §YDieppe§!."
 ENG_OPERATION_JUBILEE_SUCCESS_TT: "The §RRaid§! on Dieppe ends in a §Gsuccess§!."
