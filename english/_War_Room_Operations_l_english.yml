 UN_Operation_Mage_Hands_1: "Operation Mage Hands"
 UN_Operation_Mage_Hands_1_desc: "In our quest to destroy the USSR and liberate and bring democracy to the peoples it oppresses, we have authorised the use of some of our generation's most destructive weapons, such as the allied Atom Bomb and the German V-2 rocket. At the same time, German physicists and scientists are eager to assist us in further developing these weapons, undoubtedly anticipating a rematch with the USSR, while America expands its nuclear arsenal, building reserves and cementing its monopoly. These weapons will undoubtedly kill many Soviet military personnel and greatly aid the United Nations' advances, but at what cost...?"
 UN_Operation_Mage_Hands_2: "Operation Mage Hands"
 UN_Operation_Mage_Hands_2_desc: "In our quest to destroy the USSR and liberate and bring democracy to the peoples it oppresses, we have authorised the use of some of our generation's most destructive weapons, such as the allied Atom Bomb and the German V-2 rocket. At the same time, German physicists and scientists are eager to assist us in further developing these weapons, undoubtedly anticipating a rematch with the USSR, while America expands its nuclear arsenal, building reserves and cementing its monopoly. These weapons will undoubtedly kill many Soviet military personnel and greatly aid the United Nations' advances, but at what cost...?"
 UN_Operation_Roundhouse: "Operation Roundhouse"
 UN_Operation_Roundhouse_desc: "Czechoslovakia, once a beacon of democracy in Eastern Europe, has fallen under Soviet rule. It also serves as the gateway into Soviet-occupied Southern Europe and Poland, as well as the southern flank of Operation Unthinkable's war planning. As a result, there is no doubt that our troops will enter the country, and their task will be greatly aided by local anti-communist forces, to whom we have reached out and are actively supporting, and who are eager to take political and military action against communist and Red Army elements in the country. Czechoslovakia will be liberated, and it will proudly reclaim its position as one of Europe's beacons of democracy."
