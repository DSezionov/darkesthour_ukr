 ## R-4
 ENG_Occupy_the_Swedish_Iron_Mines: "Occupy the Swedish Iron Mines"
 ENG_Occupy_the_Swedish_Iron_Mines_desc: "A key component of our military strategy is to directly cut off German iron ore supplies at their source in Northern Sweden. After landing in Norway, our forces must move in and occupy Sweden's north, seizing control of the country's mines and preventing exports to Germany while also redirecting iron ore output to Britain and the allied powers. An occupation of their northern territories would hopefully bring Sweden to heel and put an end to their friendly relations with Germany. However, none of this will happen unless our troops reach the mines and break the Swedish resistance."
 ENG_Seize_Narvik: "Seize Narvik"
 ENG_Seize_Narvik_desc: "With the start of our R-4 plan, we must immediately take control of the Port of Narvik, which is the foundation of our operational planning and is critical to supplying our forces in Scandinavia, as well as use it as a jumping off point to secure the region's Arctic areas. The Norwegian defence for this key arctic port is expected to be fierce; however, if we fail here, our entire plan will unravel. Narvik must be taken no matter what."
 plan_r4_decision_launch_operation: "Launch $WAR_ROOM_OPERATION_6_PREFIX$ $WAR_ROOM_OPERATION_6_NAME$"
 plan_r4_decision_launch_operation_desc: "With war threatening Europe once more, we must strike decisively and quickly if we are to defeat the Huns. The majority of Germany's iron comes from Scandinavia, so we'll start there. To deny the Germans the iron they crave, we must occupy critical points in Norway, Finland, and even Sweden. If everything goes as planned, we might be able to complete the task without firing a single shot."
 plan_r4_decision_choosing_the_goal_of_campaign: "Choosing the Goal of Campaign"
 plan_r4_decision_choosing_the_goal_of_campaign_desc: "Now that the plans are finally set, we can start making the important decisions. First, we must determine the scope of the mission in Scandinavia. How deeply do we want to sink into the impending quagmire? The High Command has a number of plans of varying complexity, ranging from advancing as far as Finland in search of the highly sought-after iron ore mines."
 plan_r4_decision_ultimatum_to_target: "Send the Ultimatum" # Ultimatum to [?english_scandinavian_target.GetName]
 plan_r4_decision_ultimatum_to_target_desc: "[THIS.GetR4UltimatiumTargetDescription]"
 plan_r4_decision_ultimatum_to_target_desc_norway: "To get our plans off the ground, we must first gain a foothold in Scandinavia, which will be in Norway. We must have the northern ports, from which so much valuable iron flows. We have prepared an ultimatum to send to Oslo, allowing for the peaceful occupation of the aforementioned ports on very generous terms. Of course, if they don't see sense and side with the Germans, war will be inevitable."
 plan_r4_decision_ultimatum_to_target_desc_sweden: "Sweden, the bosom from which the highly desired iron flows. Their mines in Gallivare and Kiruna are some of the largest and most productive in Europe, and their port in Lulea means it's shipped straight to Germany. If we are to cut off the Germans' supply of iron, we must seize the mines and Lulea. Of course, we have a draft of an ultimatum ready for immediate delivery to Stockholm. If they refuse, we will have to take the mines by force, albeit with regret."
 plan_r4_decision_layout_the_plans_with_war_cabinet: "Lay Out Plans with the War Cabinet"
 plan_r4_decision_layout_the_plans_with_war_cabinet_desc: "The War Cabinet must be fully informed about Plan R-4, the contingency for military action in Norway. We must bring together senior political and military leaders to present the strategic rationale for the operation, assess logistical feasibility, and gauge political appetite for direct intervention.  While some ministers are still hesitant to commit to a preemptive move in neutral territory, we must emphasise the importance of denying Germany access to Swedish iron and securing vital shipping lanes, in the hopes of convincing these peacemakers of the need for direct action."
 plan_r4_decision_first_minelaying_plans: "First Minelaying Plans"
 plan_r4_decision_first_minelaying_plans_desc: "We need to decide where to begin minelaying operations. There are several options available to us, each with advantages and disadvantages. Operation Wilfred will quickly disrupt Sweden's highly sought-after ore shipments, while Operation Royal Marine will disrupt Rhine River traffic. However, due to time constraints, limited availability of naval mines, and the unique nature of the mines intended for the Rhine, only one plan can be carried out at a time."
 plan_r4_decision_second_minelaying_plans: "Second Minelaying Plans"
 plan_r4_decision_second_minelaying_plans_desc: "With the top mining priority addressed, the second mining plan has gained prominence. While the wait has cost mines some tactical advantage, they remain fundamentally weapons. Even if we lay these new mines and they do not achieve the desired result, they will remain until removed. Who says they won't be useful later?"
 plan_r4_decision_try_to_communicate_with_scandinavians: "Try to Communicate with Scandinavians"
 plan_r4_decision_try_to_communicate_with_scandinavians_desc: "There is a chance that Norwegians and Swedes will let our men enter their countries to oversee shipments without the need for 'occupations' or 'ultimatums'. The probability is low, but it is greater than zero. We will exhaust all peaceful options before resorting to more brutal methods. We will prepare diplomatic requests for military access and send them to Oslo and Stockholm. If they accept, R-4 can be safely discarded."
 plan_r4_decision_try_to_persuade_the_french: "Try to Persuade the French"
 plan_r4_decision_try_to_persuade_the_french_desc: "So far, the French have been stubborn and, frankly, cowardly. They continue to refuse to participate in Operation Royal Marine, or even allow us to use their rivers for it, fearing German retaliation. Nonetheless, the French High Command is adamant that mining Western Germany's rivers would result in severe retaliation from Germany, with the Luftwaffe bombing raids on major cities being the most serious concern. However, perhaps they can still be reasoned with. We will appeal to them once more and see if they can be persuaded that the benefits of the operation outweigh the potential risks."
 plan_r4_decision_our_special_forces: "Our Special Forces"
 plan_r4_decision_our_special_forces_desc: "It is clear that, in order to conduct effective military operations in Norway's harsh landscape, we will need to deploy a significant contingent of special forces as a core component of the regular troops that will be deployed after these \"elites\" arrive. After all, it is preferable to send a man who has spent the majority of his adult life in the better contingents army, training for these types of operations, to secure initial areas and landing zones than a regular Tommy."
 plan_r4_decision_hire_oxford_meteorologists: "Hire Oxford Meteorologists"
 plan_r4_decision_hire_oxford_meteorologists_desc: "The North Sea is known for its cold temperatures, stormy weather, and large waves. Similarly, Scandinavia's weather is harsh, with frequent snowstorms and other unfavourable weather conditions, in addition to consistently low temperatures. This certainly complicates any type of landing, prolonged fighting, or occupational operations, and adds a significant risk to any mission carried out by soldiers. However, we are not helpless in this situation; the University of Oxford has some of the world's best meteorologists, whom we can hire, at least temporarily, to analyse and predict weather patterns on which to base our military plans."
