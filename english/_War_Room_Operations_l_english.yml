l_english:
 # Operations:
 WAR_ROOM_OPERATION_1_NAME: "Groza"
 WAR_ROOM_OPERATION_1_GUI_NAME: "Groza"
 WAR_ROOM_OPERATION_1_PREFIX: "Operation"
 WAR_ROOM_OPERATION_1_DESC: "Operation Groza is the hammer that will shatter the old world. A military campaign against rising fascist consolidation, it outlines the mobilisation of forces for a large-scale offensive in Western Europe to defend socialism. The Workers Revolution will be carried forward to the West.\n\nIdeological differences and German ambitions make lasting peace unlikely. If war is to occur again, it must be on our terms. The time has come to liberate the workers of Europe and ignite the flame of socialism. The revolution does not ask - it demands."
 WAR_ROOM_OPERATION_1_GOAL_TEXT: "Defeat §YNazi Germany§!"
 WAR_ROOM_OPERATION_1_LAUNCH_EFFECT_TEXT: "§Y[SOV.GetNameDefCap]§! declares war on §Y[GER.GetNameDef]§!"

 WAR_ROOM_OPERATION_2_NAME: "Red Dawn"
 WAR_ROOM_OPERATION_2_GUI_NAME: "Red\nDawn"
 WAR_ROOM_OPERATION_2_PREFIX: "Operation"
 WAR_ROOM_OPERATION_2_DESC: "The Soviet experiment's goal has always been world communism and the destruction of the decadent capitalist West that oppresses its working classes. Now that the fascist enemy has been defeated, the Worker's Revolution must spread to Western Germany, the Low Countries, France, and all of Western and Southern Europe. The Soviet leadership has agreed that the Red Army, Navy, and Air Force will lead a conquest against the West and carry the workers' torch, bringing all of Europe together under the prosperity of socialism."
 WAR_ROOM_OPERATION_2_GOAL_TEXT: "Spread communism over Western Europe§!"
 WAR_ROOM_OPERATION_2_LAUNCH_EFFECT_TEXT: "§Y[SOV.GetNameDefCap]§! declares war on §Y[FRA.GetNameDef]§! and §Y[ENG.GetNameDef]§!"

 WAR_ROOM_OPERATION_3_NAME: "Unthinkable"
 WAR_ROOM_OPERATION_3_GUI_NAME: "Un-\nthinkable"
 WAR_ROOM_OPERATION_3_PREFIX: "Operation"
 WAR_ROOM_OPERATION_3_DESC: "Following the war, another oppressive regime emerged in the East. The Soviet Union, a Communist-Marxist state, imposed its ideology on Eastern Europe, erecting an iron curtain across the region. Given the strength of the Soviet military-industrial complex, if given enough time to mobilise, a quick, decisive blow to Russia and rapid occupation to the point where resistance is impossible are critical.\n\nAlthough Europe has only recently witnessed the end of one world war, another may be required to ensure that our grandchildren are born into a world free of evil."
 WAR_ROOM_OPERATION_3_GOAL_TEXT: "Defeat the [SOV.GetFlag] §YSoviet Union§!"
 WAR_ROOM_OPERATION_3_LAUNCH_EFFECT_TEXT: "§Y[?global.un_leader_variable.GetNameDefCap]§! declares war on §Y[SOV.GetNameDef]§!§!"

 WAR_ROOM_OPERATION_4_NAME: "Weserübung"
 WAR_ROOM_OPERATION_4_GUI_NAME: "Weser-\nübung"
 WAR_ROOM_OPERATION_4_PREFIX: "Unternehmen"
 WAR_ROOM_OPERATION_4_DESC: "Allied provocations against Scandinavia have become too great to ignore. Should the inevitable take place before we are prepared, and the Allies gain a foothold in the region, the vital iron ore shipments our war machine relies upon will be lost to us.\n\nTherefore, our planning must center on an ambitious proposal to occupy Norway and secure our supply of iron ore before the Anglo-French alliance has a chance to enact their own schemes."
 WAR_ROOM_OPERATION_4_GOAL_TEXT: "Conquer §Y[?DEN.GetNameDef] and §Y[?NOR.GetNameDef]§!."
 WAR_ROOM_OPERATION_4_LAUNCH_EFFECT_TEXT: "§Y[?GER.GetNameDefCap]§! declares war on §Y[DEN.GetNameDef]§! and §Y[NOR.GetNameDef]§!§!"

 WAR_ROOM_OPERATION_5_NAME: "Overlord"
 WAR_ROOM_OPERATION_5_GUI_NAME: "Overlord"
 WAR_ROOM_OPERATION_5_PREFIX: "Operation"
 WAR_ROOM_OPERATION_5_DESC: "Western Europe may be under Nazi control right now, but it will soon be liberated. The Germans will not be able to maintain their hold on France and the Low Countries, and allied soldiers will return triumphantly to those lands after driving the invaders out. However, liberation will be difficult due to the Germans' strength. Thus, the Allied command proposes an audacious plan: landings in Normandy. The largest amphibious operation ever known to man, deploying tens of thousands of allied soldiers in France and quickly securing a beachhead, allowing a massive allied army to be shipped across, marking the start of a Western European campaign."
 WAR_ROOM_OPERATION_5_GOAL_TEXT: "Liberate the Metropolitan France§!"
 WAR_ROOM_OPERATION_5_LAUNCH_EFFECT_TEXT: "The §YInvasion of Normandy§! takes place."

 WAR_ROOM_OPERATION_6_NAME: "R-4"
 WAR_ROOM_OPERATION_6_GUI_NAME: "R-4"
 WAR_ROOM_OPERATION_6_PREFIX: "Plan"
 WAR_ROOM_OPERATION_6_DESC: "Our planners have devised a daring plan to invade Scandinavia under the guise of assisting Finland in its fight against the Soviet Union. The true reason is to harm the Nazi war machine, which imports much of its iron ore from Sweden.\n\nSuch an invasion is a hotly debated topic, particularly because Norway and Sweden are neutral in the current war with Germany, implying that any attack would result in an international incident. However, eliminating much of Germany's iron ore supply is certainly worth the reputational risk."
 WAR_ROOM_OPERATION_6_GOAL_TEXT: "Securing §YScandinavian resources§! before the Germans."
 WAR_ROOM_OPERATION_6_LAUNCH_EFFECT_TEXT: "§Y[ENG.GetNameDefCap]§! declares war on §Ythe target country§!."

 WAR_ROOM_OPERATION_7_NAME: "Downfall"
 WAR_ROOM_OPERATION_7_GUI_NAME: "Downfall"
 WAR_ROOM_OPERATION_7_PREFIX: "Operation"
 WAR_ROOM_OPERATION_7_DESC: ""
 WAR_ROOM_OPERATION_7_GOAL_TEXT: "Defeat §Y[JAP.GetNameDef]§!."
 WAR_ROOM_OPERATION_7_LAUNCH_EFFECT_TEXT: "§Y[USA.GetNameDefCap]§! declares war on §Y[JAP.GetNameDef]§!§!"

