 SOV_Operation_Groza_Stavka: "Reformed High Command"
 SOV_Operation_Groza_Stavka_desc: "Our High Command has been transformed into an effective planning and decision-making body, even in the face of adversity and under severe pressure, thanks to extensive reorganisation and reform. Contingency plans for unforeseen setbacks are already being developed, and worst-case scenarios are being examined."
 SOV_Operation_Groza_Completed: "Operation Groza Completed"
 SOV_Open_New_Industrial_Jobs_1_1: "Opening of New Industrial Jobs"
 SOV_Open_New_Industrial_Jobs_1_1_desc: "As millions of men receive orders and depart for new assignments, the Soviet industrial machine churns at an increasing rate. Tens of thousands of guns are being manufactured, as are tanks, planes, ships, trucks, and other pieces of equipment. Our front-line troops have nothing to complain about and an abundance of supplies."
