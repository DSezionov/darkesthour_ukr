######################################################################
#  Moroccan Spirits
######################################################################
MOR_Atlas_Rebellion: "The Atlas Rebellion"
MOR_Atlas_Rebellion_desc: "Since the late 1900s, the French Empire has used whatever means possible to pacify and subjugate Morocco. Over the course of two and a half decades of fighting, thousands of soldiers were dedicated to putting an end to resistance to French colonisation. These endeavours have since become known as the Morocco Campaign, and have finally reached their conclusion. Following the Rif War, French forces were largely successful in annihilating Moroccan resistance and preventing them from fleeing to fight elsewhere.\n\nWith the French concerned about Germany's recent movements, they have set out to deal with the last major opposition groups hiding in the Atlas Mountains of Morocco's east before relocating their units to guard the mainland. These units were successful in the Middle Atlas rebellion and are now preparing to purge the remaining fighters in the High Atlas to the south."