# Events
######################################################################

 ### Operation Groza
 #If ROM not in Axis
 ROM_Operation_Groza_Defence.1.t: "Berlin Calling!"
 ROM_Operation_Groza_Defence.1.d: "When German ambassador Manfred von Killinger requested an urgent meeting with the Prime Minister, many assumed it was another attempt by Hitler to woo them for Romanian oil. However, what Killinger said stunned the government to its core. The Soviets appeared to be planning an offensive into Romania as a way to attack Germany. This was not as surprising as some might have thought, however, everyone was concerned that they would resort to all-out war.\n\nA hurried meeting with the King, who was still recovering from the night before's party, was essentially an afterthought. Carol, head pounding, heard little and cared little. He shooed his government away, dismissively applauding whatever they were up in arms about. When he awoke the next day, his rage at their actions had given way to terror and acceptance of their reasons. The resulting \"Treaty of Peace and Friendship between Germany and Romania\" was scribbled on a serviette and typed up in about 30 minutes. Two hours later, it was signed. When Romanians went to bed that night, every man and woman in the country cast a fearful eye to the East, terrified of the impending thunder."
 ROM_Operation_Groza_Defence.1.A: "Doamne, ai milă de noi!"
 ROM_Operation_Groza_Defence.1.B: "This is German propaganda!"

 #If ROM in Axis
