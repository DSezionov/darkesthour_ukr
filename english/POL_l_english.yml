l_english:
######################################################################
#  Polish Events
######################################################################
 POL_Death_of_Pilsudski.1.t: "Jozef Piłsudski, Marshal of Poland, dead at 67"
 POL_Death_of_Pilsudski.1.d: "[FROM.GetNewsIcon]Amidst the political tension in Europe, Marshal Józef Piłsudski has suddenly passed away today from previously unknown health issues. The entire country of Poland has entered an immediate period of mourning as the nation recounts him as the liberator of Poland, victor of the Polish-Soviet War and a visionary amidst an unstable period in the nation's history. His cult-like status ascends him as a national hero amongst Poland's people, with even pope Pius XI calling himself \"a friend of Piłsudski\" and shortly after holding a ceremony in his honor at the League of Nations headquarters in Geneva.\n\nHowever, some who opposed him were less than sympathetic, such as the Polish Communist Party and some of the democratic opposition, who have come to go on a full campaign of denouncement, calling him vehemently a fascist dictator with no regards for liberty. The rest of the opposition, while directly seeing Piłsudski as a rival, have shown their condolences in spite of conflict.\n\nAlas, the future of the nation's political scene and it's ruling Sanation party lays unknown as the power vacuum of Piłsudski's reign calls for a successor amongst his many past political allies."
 POL_Death_of_Pilsudski.1.POL: "Powodzenia, Marszałku."
 POL_Death_of_Pilsudski.1.SOV: "A worthy rival."
 POL_Death_of_Pilsudski.1.GER: "A truly respectable hero."
 POL_Death_of_Pilsudski.1.ITA: "He spilled his blood for his people."
 POL_Death_of_Pilsudski.1.JAP: "May his legacy carry Poland forward."
 POL_Death_of_Pilsudski.1.FRA: "He stood his ground against all odds."
 POL_Death_of_Pilsudski.1.ENG: "A man of his people."
 POL_Death_of_Pilsudski.1.AUS: "He truly fought for his nation's freedom."
 POL_Death_of_Pilsudski.1.A: "Memento Mori."

 POL_Front_Morges.1.t: "The Foundation of Front Morges"
 POL_Front_Morges.1.d: "[FROM.GetNewsIcon]While there has been little thought given to the democratic opposition since the full domination of the Sanation party even after it's fracturing, the centrist parties of the '20s are still active, albeit smaller today. In Switzerland in the village of Morges, a political alliance dubbed the Front Morges was signed by the leaders of the Christian Democrat and National Workers parties, the veteran organization called the Union of Hallerians, former prime minister Ignacy Paderewski and general Władysław Sikorski. \n\nThe main idea behind this rather uncharacteristic alliance was to form a united front against the Sanation party by means of forming a new democratic government with Paderewski as president and Wincenty Witos as a prime minister. Yet in spite of the major figures involved in such an alliance, the party has gained little publicity and even less support amongst the people back in Poland, further pushing it to the edges of obscurity, even with the confidence of some of its more prominent members."
 POL_Front_Morges.1.A: "They can only do little by this point" 

 POL_Sanation.1.t: "The Sanation Party Fractures"
 POL_Sanation.1.d: "After several weeks of meetings, talks inside the Bezpartyjny Blok Współpracy z Rzadem have devolved into walk outs and shouting matches. The collapse of the party has sent ripples across Polish society, with many losing all confidence in the government after the death of our charismatic leader. While the opposition outside of the Sanation Movement has continued to show low approval in public and in the Sejm, the situation in Europe demands a stable government.Inside the party, Walery Sławek, the former prime minister from 1930 and a good friend of the Marshal, has renounced his loyalty for the rest of Sanation and announced his intention to become president of the republic under a left wing reformist faction known as ‘The Colonels,’ most of their leaders being Piłsudski’s closest army officers. Our current president, assigned by Piłsudski himself, Ignacy Mościcki, has reaffirmed the public that he will stay in power as wished by ‘his dear friend himself’, with political observers labeling his side as a status-quo Sanation Center, or ‘Castle’ faction, after the fact that the man resides in Warsaw's foreboding castle. Finally, Commander-in-chief Edward Rydż-Smigły has also thrown his hat into the ring and announced his bid for leadership under his own right wing political thought, known as ‘OZON’, despite his low domestic support but high army popularity.In the public realm, the conflict between the three giants is seemingly down to only two men - Sławek and Mościcki. However, Rydz-Śmigły’s control of the armed forces cannot be ignored, as many in Europe have found out. Until one man can claim victory, the battle lines threaten to pull Poland apart."
 POL_Sanation.1.A: "This is like 1927 all over again!" 

 POL_Sanation.2.t: "The Foundation of Front Morges"
 POL_Sanation.2.d: "Since the total domination of the Sanation Movement, there has been little thought given to the democratic opposition in the Sejm but the centrist parties of the 20's are still very much active. While they are much smaller in size and not well known, the fracturing of the former BBWR party has provided a narrow window of opportunity for a return to domestic politics.\nIn the village of Morges along the banks of Lake Geneva in Switzerland, a political alliance dubbed the Front Morges was signed by the several leaders of fringe democratic parties and movements. The Christian Democrats and National Workers parties, along with the veteran based Union of Hallerians association, united behind former Prime Minister Ignacy Paderewski and General Władysław Sikorski. The main idea behind this rather uncharacteristic alliance was to form a united coalition front against the authoritarian Sanation by means of a new democratic government with Paderewski as president and ‘Polish People’s Party’ leader, Wincenty Witos, as a prime minister, with Sikorski taking command of the armed forces.\nDespite the impressive lineup of the major political figures involved in such an alliance, Polish trust in true democracy is the lowest in the history of the ‘Republic.’ The party has gained little publicity in Europe abroad and even less support amongst the citizens back in Poland. They would have a long difficult road ahead, but perhaps under certain circumstances, could find themselves at the helm of a true polish democracy."
 POL_Sanation.2.A: "Less like a coalition, more like a cluster" 

 POL_Sanation.3.t: "The Path of the Second Republic"
 POL_Sanation.3.d: "Ever since the Death of Marshal Piłsudski, Poland has teetered on the brink of political chaos. The Sanation movement fractured almost immediately upon his death, divided into three groups\n\nA definitive mid-runner, the Sanation left under PM Walery Slawek seeks to reform the governmental system into a ‘live and let live’ format with the parties that have been mostly excluded from executive politics since the May Coup - planning on repealing the mosauthoritarian factors of the government. A good option for sure, albeit a semi-unlikely one - Slawek has proven himself to be capable in a crisis before, and he could do it again.The collective centre of the Sanation movement holds their loyalty with President Ignacy Moscicki.\n\nSupporters of the previously held status quo established by the April Constitution ratified by the Sejm, they back a man who never deviated from the Marshal’s will - with everyone knowing of his loyalty, he is the frontrunner in the race for power.Generał Rydz-Śmigły. The black sheep of the three candidates, not too well known in the political sphere. A lynchpin in the 1926 Coup, Rydz was rewarded by being appointed Marshal Piłsudski’s deputy.\n\nHis military background and preference by the Marshal have given Rydz the potential to stake his claim for Poland’s leadership.One last option remains. Rallying around Wladyslaw Sikorski, a large group of centrist parties have formed a democratic united front, the Front Morges - dedicated to restoring Polish democracy. These are unstable times - if the Sanation movement does not find a solution to its power struggle, then perhaps this alternative is the only way for Poland to persist.\n\nFour Kings make their move and Poland hangs in the balance. When Piłsudski's funeral toll silences, what will the nation awake to"
 POL_Sanation.3.A: "Change is the law of life. All for Slawek!"
 POL_Sanation.3.B: "The Castle’s walls hold - Moscicki holds firm!"
 POL_Sanation.3.C: "Pen and Sword in alliance - Rydz victorious!"
 POL_Sanation.3.D: "The Sanation is in pieces - no more tyrants!"

 POL_Sanation.4.t: "Poland's Second Great Leader"
 POL_Sanation.4.d: "They say that great men lead to good times - and weak men follow soon after. Yet, behold! For Poland is not privy to such a weakness. The Second Man in the State, Rydz-Śmigły, has spent the time since Marshal Piłsudski’s death as what was once considered an underdog. Now, however, he is what Piłsudski once was - the lynchpin that holds Poland together.\nThe new Marshal has walked through the streets of Lwow, Bialystok, Gdansk and Warsaw and seen how his work has been accomplished. No longer do the ethnicities clash in the streets as they once did - the Ukrainian, Jew, Pole, Lithuanian - they all coexist under the Polish banner. Perhaps not as utopian hand-holding friends, but they all coexist out of loyalty to Piłsudski, Piłsudski’s ideals and Piłsudski’s one true successor.\nThe streets are no longer destitute, filled with the hungry and the homeless, those put out of work thanks to economic instability maintained by an inept government too stuck up with their own pride to be pragmatic. Now they are filled with workers going on with their lives, average citizens that can afford to live and be proud of what they have. Poland’s streets are clean, its social policies beneficial for all - all thanks to the new Marshal’s state reforms, changing what once was a bureaucratic nightmare into an efficient machine, making changes when it suits the material conditions of the Polish people.\nOur new Marshal - the hero who held the line at Warsaw threw back the Russians in 1920, a hero who helped make Poland the nation what it is today alongside the former Marshal Piłsudski - one who does, and god willing, will continue to make Poland proud under his leadership."
 POL_Sanation.4.A: "All for Marshal Rydz-Śmigły, all for Poland!"

 POL_1933_Election.1.t: "The Sejm Reelects Moscicki to the Presidency"
 POL_1933_Election.1.d: "Ratified with thunderous applause, Ignacy Mościcki was re-elected as President of Poland by the state Sejm earlier this morning. Moscicki's first term lasted seven years, and his election in 1926 came at a turbulent time in the Republic. The May Coup earlier that year, had removed both the President and Prime Minister from office. Marshall Piłsudski had won the presidency in an immediate election after the coup but upon realizing that the office had little executive power, he declined to take the role. \n\nInstead, he called for a new election and pushed a politically unknown Moscicki, a chemist at Warsaw Polytechnical, to run for the position. While he was a member of Piłsudski's Polish Socialist Party, he had no prior experience in government or politics, meaning that most of the real power would remain with Piłsudski, while Ignacy built repertoire and maintained his loyalty to the Marshall.\n\nBut that was then, and this is now. \n\nWith their joint BBWR party remaining solidly in power, commanding most of the votes in the Sejm, Ignacy Moscicki was elected to his position with 332 votes out of the 343 members present, the only candidate with enough support to be nominated, since most of the opposition parties boycotted the vote entirely. With a previous seven years of knowledge under his belt, he shall continue to guide the Republic with prowess, dignity, and most of all, the Marshall's guidance."
 POL_1933_Election.1.A: "A republic in name, but for the good of all Poland"
 
 POL_1933_Election.2.t: "New Prison Camp in Bereza Kartuska"
 POL_1933_Election.2.d: "Communists, terrorists, Ukrainian and Belarusian separatists, and other political subversives remain a constant threat to security, peace, and social order. The assassination of Minister of Internal Affairs Bronisław Pieracki by a Ukrainian Nationalist is proof enough that we need to contain these dangerous individuals. The government has decided to establish an institution where these criminals will remain as far away from society as possible. The main objective of the Bereza Kartuska prison is to isolate people whose activities could threaten public security. In this regard, we will focus on those troublemakers that could be potential dangers to our authority, specially sympathizers for Germany or National Socialism. The management of the institution based around an old Tsarist prison will fall under the authority of the Ministry of Internal Affairs and the Department's Nationalities Section. Exceptional circumstances require radical solutions to protect the country from potential internal enemies."
 POL_1933_Election.2.A: "The end justifies the means."
 
 POL_1933_Election.3.t: "The Westerplatte Incident"
 POL_1933_Election.3.d: "Earlier this morning, an entire marine battalion was landed along the docks of the Westerplatte Peninsula, while crowds of civilians looked on with curiosity. The harbor was in an area of tension between us, the Germans, and the Danziger's. With the Danzig government trying to subsidize control over our dually led harbor police force, and the German politicians calling for border adjustments in the region, we had little choice but to deploy more men to the outpost as a show of force.\nThe German and Danzig governments had much to say about our move, seeing it as an act of aggression, and for the Danziger's, a nail in the coffin for their plan to seize control over the harbor police force. With rising pressures from Germany, the Free City, and the League of Nations, we managed to broker a deal. In exchange for the Free Cities' withdrawal of their objections to our prior dual control agreement of the harbors police force, our troops would withdraw from the outpost to ease tensions."
 POL_1933_Election.3.A: "Yet another thing the Germans can hate us for."

 POL_1933_Election.4.t: "Out of Many, One"
 POL_1933_Election.4.d: "Belarusians, Ukrainians, Germans, Lithuanians, Slovaks and Jews; Poland has always been a land of many ethnicities, and now is no different. Poland and its’ Lithuanian brethren occupied vast swathes of land in the power vacuum that followed the collapse of the Mongols in the 13th Century. It has experience with dealing with runaway ethnicities - however, for the past century, it is the Polish people who have become the runaway ethnicity - a thorn in the sides of multiple empires, vying and fighting for independence. \n\nNow independent, the brand of nationalism that sweeps Poland today serves as the bane of its own stability, unifying Poles but leaving many others within our borders unsatisfied. Ukranians, in particular, cry out for a state of their own, being crushed under Soviet bootheel only a decade earlier. Between the Ukranian National Democratic Alliance or UNDO in the Sejm, and the much more radical Organization of Ukrainian Nationalists or OUN dispersed in the eastern provinces, all Polish Ukranians remember the raids and arrest campaigns that swept Galicia in 1930, only adding to fury, bubbling beneath the marshes. \n\nUnder Józef Piłsudski - the breaker of the Bolsheviks, bringer of Polish independence - many Poles and Ukranians alike understand that Communism is the true danger, only across the border. The Marshal strives to maintain the newly found unity of Poland, without inflaming tensions in the East. But with Nationalism burning all over Europe hotter than ever, whether he can continue that herculean effort, remains to be seen."
 POL_1933_Election.4.A: "Iron out, Iron in."

 POL_1933_Election.5.t: "Safeguarding the Rzeczpospolita"
 POL_1933_Election.5.d: "Piłsudski exited his automobile once again outside the Sejm, his ears filling with the usual chorus of cheers from the people who come to see him go about his business everyday. He can’t help but smile; he knows that he is the lynchpin of politics and stability in this nation and as he walks into the Sejm and sees the eyes of its members look at him with a mix of awe and fear he knows they understand it too.\nHe takes his seat, brushing a hand back through his hair. One year ago, these glorified bureaucrats dragged their heels in over small decisions that shouldn’t have taken more than a few minutes to read over and sign - instead taking hours. Such was democracy, Piłsudski thought - but no longer. A bit of force and a new constitution, and now Poland is no longer held back by the weakness of the democratic process.\nHe hears the cheers outside and the members of the Sejm look at him like lost puppies seeking guidance. Poland truly was a fledgling nation, its government members childlike in experience; if it was up to him to guide them then so be it. He got to his feet with an internal chuckle, walked up to the presidential podium and began his address with his usual gruff demeanor."
 POL_1933_Election.5.A: "Józef Piłsudski, a gracious dictator."

 POL_1933_Election.6.t: "Ratification of the April Constitution"
 POL_1933_Election.6.d: "After months of preparation and political manoeuvring by the Sanation regime, President Ignacy Mościcki formally ratified and signed the April 1935 Constitution. The new constitution fundamentally restructures the Polish state, replacing the parliamentary democracy established in 1921 with a presidential system that gives the head of state extraordinary powers.\n\nThe Sejm is now subject to presidential authority. The President has the authority to appoint and dismiss ministers at will, dissolve the legislature, and issue legally binding decrees. While elections will technically continue, suffrage has been reduced, and future contests will be manipulated to benefit the ruling Sanation bloc. The President is no longer elected by the people, but by a special assembly dominated by the executive.\n\nMarshal Józef Piłsudski's political legacy culminated in the April Constitution, which enshrines his belief in strong, centralised leadership as the only means of defending Poland's sovereignty. Meanwhile, the public's reaction is divided. Celebrations erupt in Warsaw and among the officer corps as supporters welcome the end of the partisan deadlock. In rural areas and among the left, however, the reaction is muted or openly hostile.\n\nThe Polish Socialist Party , the Peasant Party, and other opposition groups have condemned the constitution as a betrayal of the republic and a step towards dictatorship. Tensions rise as student protests erupt in Kraków and Lwów, and underground printing presses start printing anti-Sanation leaflets."
 POL_1933_Election.6.A: "Piłsudski would be proud!"

 POL_Colonel_Government.1.t: "Rydz-Smigly Assumes the Marshalship"
 POL_Colonel_Government.1.d: "Prior to the death of Marshal Piłsudski, Edward Rydz-Smigly, the General Inspector of the Armed Forces, was slowly growing in power, but now, in an effort to fill the vacuum that Piłsudski left behind, his reach and influence have grown rapidly, much to the disgruntlement of some men. This ascent has culminated in his promotion to Marshal of Poland, formally succeeding Józef Piłsudski.\nThe road to becoming the “Second Man in the State after the President”, however, wasn’t easy, as the infighting between himself, President Ignacy Moscicki and Prime Minister Walery Slawek could’ve easily resulted in another man standing in his shoes. Thankfully for Rydz-Symgly, Moscicki saw sense and engaged in an alliance, allowing for Slawek to be comfortably cast aside, into political oblivion."
 POL_Colonel_Government.1.A: "A New Marshal, A New Era."

 POL_Colonel_Government.2.t: "Establish the OZON Movement"
 POL_Colonel_Government.2.d: "Edward Rydz-Śmigły's rise to power left most within our government shocked at how fast he seemed to fly up the ranks. His appearance turned into one of a political juggernaut, especially with his promotion to the Marshal of Poland. The formation of the OZON movement, or the Camp of National Unity, further reinforced Rydz-Śmigły's power over the country. The OZON movement portrayed him as the next in line to lead the country, the Heir to the Second Polish Republic. The official announcement of the formation of the OZON movement came from the mouth of Adam Koc, and its aims were largely pro-military.\nAfter the death of Józef Piłsudski two years ago, Edward had attempted to unite a multitude of government factions underneath his foot, and although it failed, his supporters grew in number. A large part of these supporters he attempted to unite were the leftovers from the BBWR party, which had been clinging onto what little power they had left after the death of Józef Piłsudski. The BBWR party could no longer maintain itself and was dissolved and consequently, its remnants were absorbed by the OZON party. With this, both the OZON movement and Edward continued to grow in power."
 POL_Colonel_Government.2.A: "The lie of the Republic continues."

 POL_Colonel_Government.3.t: "Union of Young Poland"
 POL_Colonel_Government.3.d: "The OZON movement's foundation gave rise to a highly militaristic and nationalistic right-wing party in our government, backing the takeover of the nation by the authoritarian strong-arm Edward Rydz-Śmigły, the current Marshal of Poland. The OZON's influence with the people is noticeable throughout Polish society, especially among the children. A sense of nationalism is common in one's country, but when mixed with militarism it creates a society where military service is valued as social normalcy. The OZON movement considers children as one of the tools for reshaping our society into one for a better Poland, as well as nurturing a new pure Polish Spirit.\nThe OZON seeks to praise the idea of the militarization of schools to provide the Republic with a steady stream of nationalistic children who would proudly serve and die for us. The use of this sort of indoctrination cements a mindset of the state being greater than one's self, and that one's nationalism should be backed up with loyalty to one's country, a rather mindless, zombie-like fanaticism. Strict militarization propaganda has led to such indoctrination taking place."
 POL_Colonel_Government.3.A: "Oh, but think of the children!"

 POL_Colonel_Government.4.t: "Reevaluate the National Defense Fund"
 POL_Colonel_Government.4.d: "War is coming sooner rather than later. Whether our enemies come from the East or the West is irrelevant, as the result will be just as catastrophic either way. Our army is criminally underfunded, obsolete and will provide next to no challenge for the warmongers that are sure to come our way.\nThankfully, the Marshal has seen the deficiencies in our armed forces and has made moves to rectify the situation, but he has been held back severely by the lack of room in the budget. To prevent our rearmament efforts from stagnating, we should establish a National Defense Fund immediately.\nMade up from many sources, the money in the fund should hopefully be enough to cover the costs of rearmament and provide us with a fighting chance in the battles that are sure to come."
 POL_Colonel_Government.4.A: "We will be ready."

 POL_Colonel_Government.5.t: "The Death of the Marshall"
 POL_Colonel_Government.5.d: "In the midst of a particularly tense time on the Continent, our beloved Marshal, Józef Piłsudski, has suddenly passed away this morning in Warsaw's Belweder Palace from a previously unannounced health issue. Our entire nation and peoples have entered an immediate period of mourning, recounting him as a world-renowned general and a powerful statesman. After saving the state at the Miracle on the Vistula, his title as Liberator of Poland and victor of the Polish-Soviet War shows a national savior amidst an unstable period in our history. His death may leave a lasting effect on Polish society, as his cult-like political status ascends him as a hero amongst the many citizens and nationalities of the Rzeczpospolita. Numerous condolences and services by world leaders, including the likes of [SOV.GetLeader] and [GER.GetLeader], show a level of respect, above all political differences. Even Pope Pius XI called himself \"a friend of Piłsudski\" and shortly held a ceremony in his honor a few days later at the League of Nations headquarters in Geneva.\nAlas, the future of the nation's political scene and status quo, lies unknown. Piłsudski's reign and supreme governmental command accidentally created a great power vacuum. While he called for a successor amongst his many past political allies, these requests seem to be falling on deaf ears. His Bezpartyjny Blok Współpracy z Rzadem is absolutely leaderless and the Sanation Movement it is based on, is quickly fracturing on ideological lines. With a rumored democratic coalition rising from the lower parties, once the grief subsides, Poland will once again be thrust into political upheaval."
 POL_Colonel_Government.5.A: "Żegnaj, nasz wieczny przywódco"

 POL_Colonel_Government.6.t: "The Agrarian Shift"
 POL_Colonel_Government.6.d: "Poland is not an industrialised country. The Germans and Russians were afraid of giving anything to our people in case we used it to revolt. That means that much of our country is dependent on large family farms, with most of our industry concentrated in cities. This cannot continue. We must undergo extensive economic reforms if we are to be a power capable of defending itself against all enemies.\n\nHowever, where this should lead is debatable. Some argue that Poland follows a corporatist model, with industries organised under a series of 'National Corporations' that will oversee the operation of industries such as agriculture, manufacturing, and so on. While giving us more say in how these corporations are led, it would also leave us extremely vulnerable should one of these corporations 'go rogue' as it is. In the pursuit of short-term profits, they have the potential to cause enormous damage in a short period of time.\n\nAnother option is potentially easier, but more dangerous. We could steer our country towards a mixed economy in which the government and the people share ownership. This system has been extremely successfully in countries such as the United States, however, the dangers of this system have also been demonstrated in these same places. The economy would go through a boom-bust cycle. The boom times may be fantastic, but the busts may be disastrous, and maybe even revolutionary."
 POL_Colonel_Government.6.A: "Give the people a say in the economy."
 POL_Colonel_Government.6.B: "National corporations for national defense!"

 POL_Mid_Politics.1.t: "Nationalization stabilizes the Zloty"
 POL_Mid_Politics.1.d: "With Poland's rebirth comes the creation of a new currency, the Zloty. However, New Poland's new currency is volatile. International finance is concerned about our country's long-term viability, and the instability of our economy as we find our footing appears to have exacerbated these concerns. A solid foundation must be built upon a solid currency if we are to build an economy and a state that will stand the test of time.\n\nLeading economists in our country have suggested that we shore up the Zloty by sweeping nationalisation of enemy assets still in Poland. With the value of these assets backing the currency, trust in the currency may be restored. As our bureaucrats spread across the country to seize assets held by foreign governments or hostile agents, it's already had a noticeable effect on the zloty’s value."
 POL_Mid_Politics.1.A: "What's yours is mine."

 POL_Economic.1.t: "United Factories of Nitrogen Compounds"
 POL_Economic.1.d: "Before this time, he was known as one of Poland’s greatest chemists, for his multiple patents on synthesizing Nitrous Oxide. He was praised by the renown physicist Albert Einstein for his revolutionary work in Chemistry. He was even a professor of the prestigious Warsaw University of Technology. Yet, when his nation called him, he left it all behind, to serve the people.\n\nIgnacy Moscicki, the newly re-elected President of Poland, is a scientist at heart. Pulled into the strings of public politics, he left his position of professor to join Piłsudski’s government in 1927. Now at the reigns once again, Moscicki is looking to use his previous experience with his renewed power. What better way to jumpstart a new economic policy, than by using what Poland already has? Chemicals. The long history of the upstart polish chemical sector goes back to precede the founding of the Second Republic, but it is a storied one: The Institute of Scientific and Technical Research, conducting experiments on Methane, the Przemysł Chemiczny Company and the magnanimous State Nitrogen Compounds Factory in Chorzow. The observation and reorganization of these industries, along with others, will allow us to expand and expedite chemical manufacturing in the Rzeczpospolita, and further restore pride to a revived national identity.\n\nWhile Ignacy must focus on the many problems facing the nation as a whole, this project is near and dear to his calling. His personal involvement hails to fonder times, when science was a passion, and when many people only knew him by his prominent nickname: The King of Nitrogen."
 POL_Economic.1.A: "Hail to the King, baby"

 POL_Economic.2.t: "Cross City Railway Opens For Passengers"
 POL_Economic.2.d: "Although Warsaw stands as one of the more developed cities in the country, there was a considerable problem with its infrastructure. The Vistula river runs through it, making the Western and Eastern halves of Warsaw highly inconvenient to reach, as citizens who wished to see the other side would have to walk on foot. This same issue makes the inland transportation difficult as well, as if someone wanted to take a train from Poznań to Lwów, he’d be required to switch trains in Warsaw. A major step in linking the East and West of Warsaw, and by the extension, the country, has been taken today.\n\nThe Cross-City Railway, previously available only to important military and industrial transports has been fully electrified, with the trains fully possible to ride through Warsaw without stopping or taking a detour. These passenger rides are to be handled by electric locomotives, which despite the use of underground tunnels, can be fully driven to the other half of our capital."
 POL_Economic.2.A: "An express ticket to Lwów, please!"

 POL_Economic.3.t: "Our Economy Aflame"
 POL_Economic.3.d: "Things began to fall apart just as we were starting to make progress in restoring our country's wealth. Initially, our government made significant progress towards repairing our economy. In 1928, we successfully addressed a number of issues, including inflation, deteriorating infrastructure, and overall monetary malaise. All of these issues were resolved quickly, a practical miracle given the devastation caused by the Great War and the integration of the lands gained as a result. Our people were finally happy, and they spent a few years enjoying life in Poland.\n\nThen came the Wall Street Crash of 1929. When the Great Depression hit, our progress was washed away in a flood, destroyed, and set back further than when we began before 1928. Banks across the country have gone bankrupt, and families are unable to afford food. Our authorities have been paralysed by this state of affairs, unable to respond due to the sheer number of problems and unsure where to begin. Peasants, reduced to feudal and positively mediaeval modes of 'life, have begun to fight the police over this appalling situation. The fighting has only exacerbated the violence and destruction, creating a never-ending cycle that worsens by the day. Some smaller villages do not have access to water or electricity.\n\nWe must act now in the face of collapsing businesses, slow production, and rabid unrest among the unemployed and impoverished. We've never seen anything like this before, but just like in 1928, we'll face each problem head on and extinguish the fires that are consuming our economy - sometimes literally. Our current state may appear hopeless, but with reforms, new ideas, and more jobs, we may be able to turn this terrible situation around once more.'"
 POL_Economic.3.A: "Let's get to work! Unlike our citizens..."

 POL_Economic_Four_Years_Plan.1.t: "H. Cegielski Manufacturing Company"
 POL_Economic_Four_Years_Plan.1.d: "With our country securing its independence through open conflicts and uprisings, many areas of Poland, especially the ruined cities and small towns, required massive modernisation, specifically in the public transport sector. With major population centers having factories in separate districts far from the worker housing units, public transport systems, ranging from buses, to taxis and trams, needed to be established and supplied. This business has been very profitable for the H. Cegielski Manufacturing Company, which since the end of the Polish-Soviet War, has grown in size and market worth, with only the Great Depression putting a halt to its progress.\n\nHowever, recently H. Cegielski has decided to open its manufacturing capabilities not only to the cities, but also the military complexes of the Polish army. This new company branch in Rzeszów has been built specifically for supplying our armed forces with whatever heavy guns we request to be produced. In addition to the artillery, the new H. Cegielski factory is also able to produce the various tools needed for am army, ranging from ammunition crates to pocket canteens and machine tools.\n\nThe company will further supply our army should we make a proper contract with them, and with their expertise and large manufacturing capabilities, we should seriously take them into consideration."
 POL_Economic_Four_Years_Plan.1.A: "Can someone get me a pen, a piece of paper, and the finance minister?"

 POL_Economic_Four_Years_Plan.2.t: "Consolidate the Centralny Okreg Przemyslowy"
 POL_Economic_Four_Years_Plan.2.d: "The Great Depression has shocked the globe into an economic decay like the world has never seen, and our Republic is not an exception. People walk the streets hungry and jobless, wasting away while our industrial sector decays with them. The Centralny Okręg Przemysłowy could remedy two problems at once, expanding our industrial regions in central Poland, as well as providing new jobs for the hundreds of thousands of people without work. Its distance from hostile borders will allow us to establish a solid base far from the front lines in the possibility of war, especially with Germany and our previous overlords, Russia.\n\nThe central regions in Poland are the most prime targets for industrial expansion, and we plan to turn them into the industrial heart of the nation, a heart forged from sweat and iron. New steel mills, mines, granaries, weapons factories, and tank plants will sprout up like blades of grass, everywhere you look will be a new factory. Railroads will snake their way through the plains and along the mountains, carrying precious materials and goods all across the country. Although the plan will take quite some time to complete, we expect it to bring outstanding results and further cement our position against external threats, a nation can only hope to grow more powerful through industrial might."
 POL_Economic_Four_Years_Plan.2.A: "That factory wasn't there yesterday, was it?"

 POL_Economic_Four_Years_Plan.3.t: "Polish Chemical Contracts"
 POL_Economic_Four_Years_Plan.3.d: "A country can export a variety of valuable goods. Manufactured goods, raw materials, minerals, and even labour are all examples of manufactured goods. However, Poland lacks many of these resources. Our industry is not performing at a level that allows us to provide for ourselves while also supporting a healthy, and more importantly profitable, large-scale export sector. That is why we will investigate a new field of study, chemistry. We are well positioned for a thriving chemicals industry thanks to agreements with the West and already established science. With the right bidder, our coffers will always be full!"
 POL_Economic_Four_Years_Plan.3.A: "Poland will be the chemical capital of the world!"

 POL_Economic_Mid.1.t: "The Pride of Polish Armaments"
 POL_Economic_Mid.1.d: "Our small armament industry has slowly been nurtured ever since its birth, and now it stands before us like a roaring industrial lion, sharpening the fangs of our nation every passing day. Although we still can't hope to compete with the Western world or the Russian bear in the east, we make up for our slack by producing the highest quality weapons of war we can.\n\nOur planes reach heights never seen before in the age of polish aviation history and prove themselves worthy to serve the pilots of our expanding air force. Our excess fighters are fought over greedily in the markets with only the most worthy buyer claiming victory, everyone wants just a little taste of Polish Engineering. Our rifles fire with accuracy and precision and can stand the test of time just as the polish spirit has, and they remain just as durable as the hearts of iron every polish man and woman has.\n\nThe factories will roar to life and continue to provide, as long as we provide for them."
 POL_Economic_Mid.1.A: "Such a reliable rifle, wouldn't you say?"

 POL_Military.1.t: "Selling Republican Lands"
 POL_Military.1.d: "When Poland gained independence, the new Polish government took control of all land within its borders held by the German, Russian, and Austrian governments, as well as those abandoned by citizens of those nations who fled to their homelands. As a result, the government now owns a sizable portion of the country directly. These lands are simply too large for us to manage, and they will almost certainly be squandered in the years it will take to organise all of this new land into a more efficient system.\n\nAs a result, it has been decided that a large portion of this land will be sold to the general public. We don't care what they do with it as long as it's out of our hands. We will place advertisements in all major newspapers showcasing local plots, hold massive auctions, and send salesmen out to sell directly. Isn't land the simplest way to build an individual's wealth? So, let's make a few more Poles wealthy."
 POL_Military.1.A: "What's ours is theirs."

 POL_Military.2.t: "A Pledge from the People"
 POL_Military.2.d: "Poland is an idea that lives on in the hearts of all of her people, including those from other countries. Now that the concept has resurfaced on the map, it must be defended. However, with enemies on all sides, the government cannot do it alone. That is why the government will try to channel the fervent patriotism that burns within every Pole. To handle the expected outpouring of public support, the National Defence Fund has been established.\n\nThe government has gone on a tour, informing people about the FON and soliciting donations. The international community has reacted negatively to this. They argue that this will never work, that the FON will become just another bank account for the government or its employees, or that it is a disgrace for a country to ask its own citizens to contribute to its defence.\n\nThey, on the other hand, fail to recognise the uniqueness of the Polish spirit. Every Pole, from the smallest child to the oldest man, would rather be a pauper than live under the boot of a non-Polish government that would inevitably try to extinguish the very concept of Polish nationhood. Now that Poland has regained its independence, it's only a matter of time before every one of her children rises to defend her against her many undeserved enemies."
 POL_Military.2.A: "For Poland I will give everything!"

 POL_Military.3.t: "A Nation Responds"
 POL_Military.3.d: "Government ministers expressed reservations about the formation of the National Defence Fund. We knew that our people are patriotic, but many questioned Marshal Pilsudski's claim that they would give up what little they had in defence of the country. Their concerns, however, have been decisively dispelled. The Fund has already grown to a billion zlotys, with the majority of that coming from land sales and government investment.\n\nHowever, nearly 40 million zlotys have been raised by Poles eager to ensure that Poland is never again erased from the map. People have spent their savings, children have spent their allowances, and some have even donated plates, jewellery, precious coins, and other valuable items. Many corporations are also contributing large sums of money, demonstrating their patriotism. Some famous Poles who may not be able or want to donate directly for various reasons have contributed to the programme by lending their name recognition."
 POL_Military.3.A: "Together we will keep Poland safe!"

 POL_Plan_East.1.t: "Plan East"
 POL_Plan_East.1.d: "To our east and west, we are surrounded by enemies. While our adversary to the west is not to be dismissed lightly, our adversary to the east, the Soviet Union, is of primary concern. Russia has been Poland's adversary in all of its forms. They have been beating us like dogs for over a century in order to break us. Instead, as their Empire crumbled in 1918, we rose from the ashes, as strong and powerful as ever. The Soviets' attempts to conquer us in 1920 were a colossal failure, with our victories at Warsaw and on the Vistula being studied around the world. All lessons, however, can be forgotten over time.\n\nThe madman in Moscow appears to have forgotten the lesson. He is still angry about the failure of the invasion, his rhetoric against us has remained venomous, and his hatred of the idea of an independent Polish state is well known and documented. When he inevitably sends his armies against us, we must fortify our eastern border, prepare our armies for the onslaught, and prepare the hearts of our people for the long war ahead."
 POL_Plan_East.1.A: "The final struggle is inevitable!"

 POL_Plan_East.2.t: "Enemy at the Gates"
 POL_Plan_East.2.d: "The war that everyone predicted has finally arrived. Stalin, no longer satisfied with his Empire stretching from the Baltic to the Pacific, has decided to expand it. Even now, Soviet soldiers pour across our border, burying one another in mountains of their own flesh. Every Soviet soldier killed brings us closer together. This should not, however, cloud our judgement. Victory is unavoidable, but it is a long way off.\n\nWe must prepare our people for the long war that awaits them. Rationing has already begun, and air raid sirens have been activated across the country. Draught cards are being distributed as we speak, and our industry is quickly transitioning to war production. Poland may not have started this war, but we will see it through to the end, all the way to Moscow."
 POL_Plan_East.2.A: "We took Moscow once, lets do it again!"

 POL_Plan_East.3.t: "Retreat Is an Option"
 POL_Plan_East.3.d: "Most countries consider retreat to be a last resort. They'd rather waste a hundred men defending every square inch of land, men who could be better used defending something of actual value. Do not mistake our reverence for Poland for carelessness. However, our military has reached the same conclusion that the great Roman statesman Fabian did against Hannibal. We've realised that defending all of our borders is a futile exercise. We will be stretched thin, cut off, and destroyed in detail for land with little practical or defensive value.\n\nInstead, we will temporarily give up this land, allowing our men to retreat to better prepared defensive lines along more naturally defendable terrain, such as rivers. Then, when the enemy is deep within our country and overextended, we will strike back and destroy them."
 POL_Plan_East.3.A: "We will draw them into a trap!"

 POL_Plan_East.4.t: "The Korpus Ochrony Pogranicza"
 POL_Plan_East.4_tt: "\n§rDepending on which plan we've chosen, proper border guard unit will spawn.§!\n\n"
 POL_Plan_East.4.d: "Our eastern border is nearly uncontrollable. It is too long and too flat to be effectively patrolled by local police, stretching from Lithuania in the north to Romania and the River Stult in the south. Soviet saboteurs cross over on a regular basis, leaving local police overwhelmed, prompting us to receive begging messages from them pleading with the Army to take over. However, because the Army is waiting for the police to formally relinquish control of the border, nothing is being done. This cannot be allowed to continue if our borders are to be protected from outside interference. As a result, the Korpus Ochrony Pogranicza, or Border Protection Corps, was formed as a fusion of military and police administrations on the border.\n\nThe KOP is made up of 12 regiments, each named after the area of the border they are tasked with defending. These divisions will be subdivided into smaller battalions to guard specific forts within the regiment's assigned territory. These battalions will be subdivided further into smaller units to guard bunkers and strongholds located between the forts. With a second line of mobile reserves, this setup is almost certain to work wonders in putting an end to the constant threat of Soviet incursion.\n\nTo deter the KOP from any subversive infiltration, these men, chosen from the most skilled men in the West, will patrol the border actively and strike first at those attempting to probe our defences. These men will be on the front lines of the struggle for Poland's survival until war returns."
 POL_Plan_East.4.A: "The eastern storm is calmed."

 POL_Plan_West.1.t: "Plan West"
 POL_Plan_West.1.d: "While many of our military planners are looking east with nervous certainty, the Hitlerite hordes to our west must not be overlooked. As our country gained independence from Russia, the victorious Allies bestowed lands on us. Many of these lands, such as those in Silesia and Pomerania, were taken by force from Germany after they refused to abide by the treaty. These offences, along with our more peaceful but equally outrageous actions, have not gone unnoticed in Germany. Despite their venomous words, we got along just fine with our Western neighbour. But that was until recently.\n\nHitler has always had ambitions in the East. He has taken a hard line against us now that he is in power. His officials have gone on record as saying how 'barbaric' we are, and his propaganda slinger Goebbels has called us a historical mistake. All of this can only lead to one conclusion: war. While we cannot shift our focus entirely away from the Soviets, the situation requires that we begin to focus our new defences on the West. To better combat the rapidly expanding Wehrmacht, new fortifications will be built, old plans will be updated, and our armies will be modernised."
 POL_Plan_West.1.A: "We shall not go quietly into that good night!"

 POL_Plan_West.2.t: "The Eternal Defense"
 POL_Plan_West.2.d: "As our adversary attacks our lines on a daily basis, the calls for a counteroffensive have become almost deafening. We've held on, they say, and now it's time to strike back. What they fail to recognise is that our state has reached its breaking point. Guns and bullets are literally sent straight to the front, and some tank factories have their tanks roll off the assembly lines into active battlefields. An offensive now would squander what little strategic reserve we have in men and guns for what would almost certainly be marginal gains.\n\nInstead, we'll concentrate on defence. Our adversary may be vast, but nothing is infinite. It may take years, and hundreds of thousands, if not millions, of deaths, but our adversary will eventually tyre of squabbling with a brick wall. Then, and only then, will we see peace. Sure, the victory will be far from glorious or valiant, but it is all we can hope for."
 POL_Plan_West.2.A: "What if we run out of land on which to bury our enemies?"

 POL_Plan_West.3.t: "Maczek's Mobile Battalions"
 POL_Plan_West.3.d: "Poland cannot afford to be left in the dust as the world adopts mechanisation of warfare. The 10th Motorised Cavalry Brigade was formed to test the concept of a new Polish mechanised corps. Its primary mission is to serve as a reserve because it is currently our only motorised brigade. It will monitor our movements, attack enemy armour and motorised units, and close gaps in the line as needed. Our officer corps, primarily cavalry officers, are sceptical of the ability of such a unit, so we brought in a new face to prove its viability.\n\nStanislaw Maczek is a soldier at heart. He fought for Austria-Hungary in the Great War before joining the fledgling Polish Republic after the Empire fell apart. He has served with distinction and valour in every conflict since. He rose to prominence as the commander of a 'flying battalion' during the Polish Soviet War. He moved his unit quickly from front to front, bolstering frail defences and acting as a 'firefighter' of sorts. This man, who has already demonstrated his ability to move quickly, will now command the Army's fastest unit. If anyone can demonstrate their worth, it is him."
 POL_Plan_West.3.A: "Three cheers for the Invincible Black Brigade!"

 POL_Plan_West.4.t: "The Wz. 75 Anti-material Rifle"
 POL_Plan_West.4.d: "One of Poland's most closely guarded military secrets is sitting in various pieces among a variety of crates in Warsaw, apparently destined for Uruguay. What is labelled as'surveillance equipment' on a plethora of manifests is actually a cutting-edge weapon, designed from the ground up to give us an advantage over the vastly superior tank fleets that surround us. Traditional anti-tank weapons are cumbersome and time-consuming to manufacture.\n\nTo compete with the quality of the Germans or the quantity of the Soviets, we must level the playing field. Its users have been sworn to secrecy and are required to transport the weapon in a crate that must not be opened unless absolutely necessary. Should capture or death appear to be unavoidable, the guns will be destroyed.\n\nAll of this to keep the wz75 Anti-Material Rifle's secret safe. With a 7.92 mm round, it can fire up to 10 rounds per minute (though a typical clip only contains four rounds). The gun was designed specifically to kill tanks. The gun's weight of around 10 kg or 20 pounds would normally imply an equally heavy recoil. However, the kick is no more than that of a standard Mauser rifle due to the muzzle break. All of this combines to make it an ideal tank killer. As our enemies close in, the pinnacle of Polish science may be able to save our souls."
 POL_Plan_West.4.A: "Our salvation."

 POL_Plan_West.5.t: "Our own Polish Tank?"
 POL_Plan_West.5.d: "Until now, Poland's fledgling tank force has been entirely comprised of Western imports, primarily the British Vickers 6 Tonne Mk E. If we are to achieve true independence, we must also have an independent tank force free of foreign influence. This prompted the creation of the first Polish-built tank, the 7 Tonne Polish, or 7TP. Although it is based on the British Vickers that we have used in the past, the 7TP can be considered an upgrade to the British design.\n\nWe added a more reliable diesel engine, making the tank the second diesel-powered tank after the Japanese, a 37 mm anti-tank gun that can open almost any German tank like a can opener, more armour on the front, giving us 17mm of protection instead of the original 13mm, reworked the ventilation, installed the revolutionary Mk IV periscope designed in Poland, and added a radio.\n\nAll of these enhancements combine to make the 7TP a significant upgrade over our previous tank fleet. The 7TP is not only more powerful than the Mk E, but it can also more easily counter German panzers due to its light tank nature, while maintaining the mobility required for modern warfare. The foreign market appears to agree, as Romania has expressed interest in the tank and has sent a commission to possibly purchase our tanks for their fleet."
 POL_Plan_West.5.A: "The Steel Hussars have arrived!"

 POL_Plan_West.6.t: "Employment in the National Defense"
 POL_Plan_West.6.d: "National defense is a simple concept that has been replicated all over the world. It will enable reservists and the unemployed to continue serving their country in reserve battalions. These brave men will give their lives in defence of Poland, freeing up more professional troops for more difficult fronts. Similar organisations, such as the National Guard in the United States and the Home Guard in the United Kingdom, have had great success. Our military high command anticipates that the National Defence will achieve similar results.\n\nThese men, however, will be little more than cannon fodder. Their training will be part-time, as will their service during peacetime. Their weapons will be relics from the Great War or earlier, and they will be led into danger by men with little more training than they do. It's unavoidable that many of these men will perish. Poland, on the other hand, will live on and honour their memories as a result of their sacrifice."
 POL_Plan_West.6.A: "National defense demands sacrifice."

 POL_Plan_Completed.1.t: "Poland on the Brink"
 POL_Plan_Completed.1.d: "The unthinkable has become a reality. German forces crossed our western border early this morning, launching a full-scale invasion. According to reports from the front lines, the German Wehrmacht has launched a quick and coordinated assault, with tanks punching through our lines while the Luftwaffe continues to bomb our fortifications. Our brave soldiers are gallantly resisting, but the situation is dire.\n\nThe President's cabinet and the General Staff held emergency meetings to address this existential threat. Prime Minister Felicjan Sławoj Składkowski and President Ignacy Mościcki have assured the nation that the government and armed forces will defend Polish sovereignty to the last man. Mobilisation orders have been issued, and citizens are being called to arms to repel the invaders.\n\nThe Polish Armed Forces are prepared to defend every inch of our homeland. We have urged the international community to respond to this unprovoked aggression and to assist Poland in its time of need. Our country's fate is on the line, but we will not back down. Poland will endure."
 POL_Plan_Completed.1.A: "Jeszcze Polska nie zginęła!"

 POL_Plan_Completed.2.t: "The Great Siege"
 POL_Plan_Completed.2.d: "Poland is still alive! Poland's enemies have risen once more against us! Once again, as has happened countless times throughout our long and illustrious history, Polish men must give their lives in defence of a nation fighting for its very existence against history itself. While some have argued that offence is the best defence, Poland has no desire for conquests. It simply wishes to be alone.\n\nThat means we'll have to wait out our adversaries. They will charge our lines, and thousands will perish. As caskets flood our enemy cities, we will carry on as usual. Their offensives will break, as will their spirit, and given enough time, they will make peace. This war will undoubtedly be bloody, but the peace we will achieve will make every sacrifice worthwhile."
 POL_Plan_Completed.2.A: "Let them die on our bayonets!"

 POL_Airforce.1.t: "Warsaw Okęcie Opens for Business"
 POL_Airforce.1.d: "As urban development began to impede the use of Pole Mokotow, an aerodrome in Warsaw's Mokotow Field, it was decided that a new purpose-built airport was required in 1924. After much thought, the Ministry of Railways, which oversees Polish air travel, purchased a plot of land near the village of Okecie. The complex was completed after a decade of construction on a budget of nearly ten million zlotys. It was designed in the Modernist style, with three hangars, garages, and a large terminal building. As a modern European capital, Warsaw finally got the airport it deserved. Following its completion in 1934, the complex was expanded with a Polish Air Force base, a branch of the Institute of Aviation, and a plane-building plant run by PZL, Poland's leading aircraft designer. It would take in 10,750 passengers in its first year, and this figure would only grow over time."
 POL_Airforce.1.A: "The beginning of a new age of Polish aviation!"

 POL_Airforce.2.t: "Investing in Civil Aviation"
 POL_Airforce.2.d: "While much emphasis has been placed on the military applications of planes, equal emphasis must be placed on the plane's civilian applications. The reasoning is straightforward: commercial aviation is rapidly becoming a major industry. Flying from one end of the country to the other in hours where it used to take a week or more is creating bridges where none previously existed. A businessman in Zbaszyn can now quickly connect with contacts in Rovno to capitalise on economic opportunities, resulting in faster growth. Meanwhile, air tourism and leisure have exploded; if we can harness it, we will be able to generate yet another revenue stream for our ever-depleted treasury."
 POL_Airforce.2.A: "An investment in the future."
 POL_Airforce.2.B: "Let's not get dragged away."

 POL_Airforce.3.t: "Rayski resigns in frustration"
 POL_Airforce.3.d: "General of Brigade Ludomił Rayski, the Commander of the Polish Air Force, has resigned after being stymied by members of the General Staff in his plans for modernising and expanding the force, as well as being denied government funding. Rayiski claims that war with Germany is clearly imminent, and that the government's refusal to accept the role of a strong air force in modern warfare, as well as the constant scheming against him by members of the General Staff and the sinking of his modernisation projects due to a lack of funds, have reached unacceptable levels, forcing him to resign.\n\nAt the same time, Rayiski has urged the Minister of Military Affairs to finally begin mobilising and properly modernising the Polish Air Force, while also releasing all funds for it. This plea is clearly intended as an ultimatum, with Rayiski stating that if his plans are approved, he will reconsider resigning. We could still consider simply refusing his resignation and not accepting his demands. After all, he is an experienced military officer with over a decade of service and may be considered the father of the current Polish Air Force. Losing him to political squabbles would be a bitter blow.\n\nOtherwise, we may accept his resignation and appoint Józef Zając, the Commander of Air Defence and a strong proponent of the air superiority doctrine, supporting a strong force of fighter aircraft. This is a direct counter to Rayski's power projection force, which favours a bomber-centered force. After Rayiski's departure, Zając can develop the air force based on his views and budgetary constraints."
 POL_Airforce.3.A: "Refuse his Resignation"
 POL_Airforce.3.B: "Appoint Józef Zając"
 POL_Keep_Ludomil_Rayski_Choice_tt: "Unlocks '§YKeep Ludomił Rayski§!' national focus."
 POL_Appoint_Joseph_Zajac_Choice_tt: "Unlocks '§YAppoint Józef Zajac§!' national focus."

 POL_Airforce.4.t: "Poland's Own Medium Bomber"
 POL_Airforce.4.d: "Zygmunt Pulawski, Poland's chief air designer, has completed months of work. The first operational PZL.37 Los, or Moose, rolled out of its hangar to the delight of aviation enthusiasts and foreign attachés. They are even more impressed as the plane is demonstrated and its features are explained. Poland has accomplished an incredible feat, as the Moose is now the most advanced medium bomber on the market.\n\nIt can carry more bombs than any other bomber on the market and is quick and easy to control. Furthermore, because of its double-wheeled landing gear, it can operate from fields and meadows as well as aerodromes. We've already received a dozen export orders, including one from Germany."
 POL_Airforce.4.A: "A triumph of Polish design!"

 POL_Airforce.5.t: "The PZL.23 Karaś"
 POL_Airforce.5.d: "While heavier bombers are fine, Poland requires something more manoeuvrable and lighter. Not only will easier production allow us to produce more, but when the Teutons arrive, we will be able to overwhelm them and blow their forces apart from the skies. The PZL 23 Karas is the answer to that need.\n\nWhile not a perfect plane, its undercarriage prevents it from flying from some of our rougher airfields, it is more than adequate. It's an all-metal, low-wing cantilever plane with three crew members, including a bombardier who can fire a machine gun from his underside gondola. It can deal death with a maximum load of 700kg, just like any other bomber. It has already begun production and will be ready when our adversaries arrive."
 POL_Airforce.5.A: "The new terror of the skies!"

 POL_Airforce.6.t: "Pulawski's Gull-wing Design"
 POL_Airforce.6.d: "Lieutenant Andrzej Nowak sat in the cockpit of his PZL P.11c, which he had flown on numerous missions over the years. He had seen its limitations and flaws. He knew the old designs couldn't keep up with the advances made by Germany's Luftwaffe and the Red Air Force. As he walked past the hangars at the airfield, he noticed a prototype of the latest Polish fighter, the PZL P.50 Jastrząb, which features the new gull-wing design by Zygmunt Puławski.\n\nAndrzej, like many of the other older pilots, was initially sceptical. What's wrong with the wings we know? they had enquired. Why fix what's not broken? However, the rumours were true—this new design had already shown improvements in early tests. The wings, which lowered near the fuselage before rising at the tips, were said to allow for tighter turns, faster speeds, and higher climb rates. If this is true, it has the potential to change everything by providing Poland with an aerial saviour capable of standing up to the might of Germany's Messerschmitts or the USSR's I-16s and holding its own in combat."
 POL_Airforce.6.A: "The Polish Air Force shall prove itself worthy to fly!"

 POL_Navy.1.t: "A New Passenger Port for the Republic!"
 POL_Navy.1.d: "Gdansk has been returned to Polish hands through luck, guile, boldness, and even plain old violence. It was stolen from us at Versailles, given independence it did not deserve as a final slap in the face by the world. It was a Baltic diamond. We would be leagues more powerful on the open ocean if we owned it, and our navy would be better able to defend our interests abroad. That doesn't even take into account the thousands of ethnic Poles who are trapped within the city. One more cruel joke from a world that despises the concept of a Free Poland.\n\nWe were compelled by international law to stand by and watch as the damned Teutons seized control of the city government. They oppressed the native Poles in Poland, just as they did in Germany. We received mountains of pleas from these destitute souls pleading with us to come and help them. Yes, we made inroads into the city, but they were minor chips in the League of Nations' fortress.\n\nAll of that, however, is now in the past. The Germans may now feel what they have been dishing out as Polish troops march down the streets of the city and Poles come out in droves to welcome their saviours. The German population has been assigned the task of rebuilding the city and removing the stains of Germanic taint that continue to pollute the city's once-pristine Polish skyline. The government has already been informed that thousands of Poles are eager to settle in the city. What was once ours is now ours once more, and not even the Lord our God can take Gdansk from us."
 POL_Navy.1.A: "Nec temere, nec timide."

 POL_Navy.2.t: "Marine Deployment Strategy"
 POL_Navy.2.d: "While our Navy is primarily focused on the Baltics, this does not mean that we can ignore marine warfare. It may seem absurd, but Polish troops could be called to storm enemy shores far from home, such as Sweden or Denmark, or even further afield. If and when we have to send our boys overseas, they must do so in the safest possible way. Every Pole is valuable. Weakening our marine technology now will only lead to disaster in the future which means we must step up our efforts. Marines from Poland will be among the best on the planet!"
 POL_Navy.2.A: "Rozpocznij program kosmicznych marines"

 POL_Navy.3.t: "Approach the Western Powers"
 POL_Navy.3.d: "While Poland has enough industry to build and support a navy, it is missing one critical component: designs. For centuries, Poland has been without a coast, if not an existence. This has made our naval thinkers scarce, and those who remain are limited to the few torpedo boats we were able to wrest from the Germans at Versailles. Torpedo boats alone cannot protect our coasts; we require larger ships.\n\nFortunately, our Western neighbours have long and storied naval traditions of their own, and each has offered their own perspective on what the Polish Navy should focus on based on their own unique specialties. Polish industry, despite its size, can only support one proposal, so which will it be?"
 POL_Navy.3.A: "Seek French shipbuildiers for destroyers."
 POL_Navy.3.B: "Additionally, include Dutch merchant designers."
 POL_Navy.3.C: "Seek British heavy cruisers too."
 POL_Navy.3.D: "The navy is secondary, shelve the plans for later."

 POL_Navy.4.t: "Continued growth at the Gdynia Port"
 POL_Navy.4.d: "Our investment in Gdynia is yielding excellent results. The port's commandant has already begun dredging operations to deepen and widen the port to accommodate more and larger ships. At the same time, he has begun to fortify the defences of this new pillar of our Navy. Where once was a sleepy hamlet of homes clustered around a respectable harbour, there is now a militarised port.\n\nAlong with regular civilian traffic flowing in and out of the civilian half of the facility, high fences topped with barbed wire keep any would-be saboteurs or spies away from the newly constructed military shipwrights. Along with the fencing and defences, a military airport is being built. Because the land is mostly flat and we already have it, the new airport will be an important base for aircraft to support our sailors at sea. Of course, the airport comes with plenty of anti-air defence. While we currently control the air, this may not always be the case."
 POL_Navy.4.A: "Build for the future!"

 POL_Navy.5.t: "Expanding the Polska Marynarka Handlowa"
 POL_Navy.5.d: "An emotional ceremony was held in 1920 after our valiant soldiers seized the lands around Gdansk. General Józefowi Hallerowi arrived in Puck, near Gdansk, and wed Poland to the Baltic Sea. Hallerowi was presented with two platinum rings made by prominent Poles in Gdansk. The rings were then delivered to Puck, where he mounted a horse and presided over a holy ceremony in which the Polish flag was blessed by a priest.\n\nThe flag was then passed on to be raised on a ship in the harbour, symbolically handing over the defence of Polish shores to the newly formed Navy. Then he took one of his rings and threw it into the Baltic after locals cut a hole in the frozen bay, declaring, 'In the name of the Holy Republic of Poland, I, General Jozef Haller, am taking control of this ancient Slavic Baltic Sea shore.'\n\nDuring a celebration of the event today in Rewa, the Polish flag was raised over ten docked barges. These ten modest ships, which were only recently built for our fledgling nation, now form the foundation of the new Polish Navy. With them sail centuries of history, and each mile they sail now adds to our volumes of naval tradition. This is not the end of our quest to master the sea, but rather the start."
 POL_Navy.5.A: "Dla boga i chwały!"

 POL_Navy.6.t: "Golden Port of the Republic"
 POL_Navy.6.d: "Poland is not only free after centuries of Russian oppression and years of warfare, but it also has access to the global market. Gdansk's port is that outlet. The Germans can complain about how the new 'Polish Corridor' isolates East Prussia from the rest of the country, but we will rejoice. Without Gdansk and the Corridor, we would be completely reliant on Germany for imports and exports. That will give the despised Teutons enormous leverage over us, leverage they will undoubtedly use to reduce us to the status of vassals once more!\n\nDespite these advantages, our naval planners see Gdansk's current state as the beginning, not the end, of the port's development. With generous funding, construction on a massive expansion of the docks has begun, allowing for more trade but also a larger naval presence, giving us a greater say in what happens in the Baltic and another check on German power."
 POL_Navy.6.A: "To the port!"

 POL_Navy.7.t: "Gdansk returns to Poland"
 POL_Navy.7.d: "The Free City is no more. The Nazi party's banners lie in the street, discarded by Polish police officers and local Poles. The streets reverberate with the rumble of trucks, the cheering of some and cursing of others, and the ever-lasting national anthem of Poland playing over the speakers. The crowd in the main square cheered enthusiastically as they watched the Free City flag be lowered and Poland's white and red bicolour raised.\n\nThe city, which had been stolen by the Prussians in the 18th century, was returning to its homeland, righting another wrong and delivering another piece of Poland's disfigured homeland. It is true that the city is as Polish as any other, and this is evident even within the first hours of its reunification with the republic - Polish flags flying everywhere, demonstrations of proud poles across the city, and crowds of horrified Germans, their expressions pale with shock."
 POL_Navy.7.A: "Piece by Piece, the Homeland is Reunited!"

 POL_Navy.8.t: "Direction of the Marynarka"
 POL_Navy.8.d: "As the Marynarka continues to grow, we have encountered an unfortunate schism regarding the path of our navy. While we hoped that all of our officers would move in unison, evolving and agreeing on one doctrine, whatever that doctrine was, this did not happen. At the same time, it has become necessary to select an official leader to lead the Marynarka into a new era, firmly establishing its future course. During the doctrine debate, Jerzy Świrski and Józef Unrug emerged as the leaders of the two camps.\n\nŚwirski proposes expanding the Marynarka's heavy ship count to create a more powerful navy, similar to Imperial Germany's High Seas Fleet during the Great War. While this would compete with our neighbor's fleets, the cost of such a project would be enormous, requiring far more time and money than we have.\n\nUnrug recognises these issues and proposes that we continue to focus on light ships, particularly submarines. He believes that we should rely on the skills of the officers and captains aboard each vessel rather than the vessel's own strength. However, Unrug's patience and 'Indirect Warfare' tactics may not yield the same long-term results as Świrski's.\n\nThe decision is critical because a growing navy like ours requires direction, particularly if we hope to compete with the Kriegsmarine and Red Navy. Either man has a long naval history, and both will undoubtedly improve the Marynarka, but the chosen path may have a significant impact on Poland's future, should conflict break out..."
 POL_Navy.8.A: "Polska will rule the waves, costs be damned! Świrski!"
 POL_Navy.8.B: "We must be smart in the upcoming conflicts, and Unrug is the man for that."

 POL_Innovative.1.t: "Restoring Polish Pride and Culture"
 POL_Innovative.1.d: "Threatened as they are, the damned Teutons and barbaric Russians worked hard to erase our proud culture. The Germans accomplished this by stealing our children from their loving mothers' breasts and stuffing them in schools designed specifically to Germanize them. Meanwhile, German heroes were glorified, while Polish heroes were vilified. The Russians were more outspoken in their cruelty. They simply deported Poles who fought against Russification and tried to beat the Polish spirit out of us through 'education' and repression. However, both of these monsters have decisively failed.\n\nWith a Polish state returning to European soil, there is an urgent need to reverse these Germanization and Russification trends. Every Pole contains a patriotic inferno just waiting to be ignited. We can reverse the cruel tide of history and restore Poland to its rightful place among nations by emphasising independent Polish history, subsidising our fledgeling cultural scene, and exacting vengeance on the Teutonic and Russian barbarians."
 POL_Innovative.1.A: "Warsaw will be the cultural capital of the East!"

 POL_Innovative.2.t: "Deep in the Kabaty Woods"
 POL_Innovative.2.d: "Poland is surrounded by enemies on all sides. To our west, Hitlerite hordes salivate at the prospect of seizing the Gdansk Corridor. Meanwhile, to our east, the Russian Communist demons attempted to destroy our proud nation once before, but their arrogance led to their annihilation on the Vistula River. While our three nations have maintained peace, we are not so naive as to believe it will last forever. That is why our Cypher Bureau has been constantly working to break our enemies' codes.\n\nThey have recently begun to make significant progress in breaking the German Enigma codes in their new facility in the Kabaty Woods. As far as we can tell, the Germans are not only unaware of our emerging advantage, but we are also significantly closer to cracking the code than the West. We will gain a significant advantage if we do so."
 POL_Innovative.2.A: "Finally, our golden goose!"

 POL_Innovative.3.t: "The Cipher Bureau and ENIGMA"
 POL_Innovative.3.d: "The use of code breaking in warfare is a relatively new phenomenon. For most of history, orders were given in person, and messengers were more frequently killed than captured. However, the advancement of radio technology has resulted in orders being issued over them, and radio messages can be intercepted. Intercepting these messages can provide us with a significant advantage in predicting our adversaries' next move. We discovered this when the Cypher Section decoded Soviet messages and assisted us in performing the 'Miracle on the Vistula.' With codebreaking being so important to our country's formation, it's only natural that we pursue it further.\n\nThis has resulted in the establishment of the Cypher Bureau, a separate agency solely dedicated to decoding our potential adversaries. One of these adversaries is Germany, which employs the ENIGMA code, which is said to be the most secure in the world. We were fortunate to have received an early warning. The Germans appear to have sent us a commercial variant of the ENIGMA machine by mistake. While it is of little use in decrypting military ENIGMA, the machine has piqued the Bureau's interest. They believe that given enough time, they will be able to crack ENIGMA."
 POL_Innovative.3.A: "What saved us once will do so again."


######################################################################
#  Polish Focuses
######################################################################
 #Economy & Politic
 POL_Economy: "The Polish Economy"
 POL_Economy_desc: "The Polish economy is not in a great state. Compared to our neighbours, our industry is small, and what economic gains we were making have been set back by the Wall Street Crash in 1929 and the ensuing Great Depression, which we are yet to make any significant recovery from. However, with the recent re-election of Moscicki, and the political stability it will bring, we can now begin to make some meaningful changes and improvements to our economy to get the nation back on track.\n\nWith various economic plans ready to be put into action, as well as projects that will connect and upgrade our nation, we are finally beginning to see a silver lining to the horrible mess we find ourselves in."
 POL_Economy_tt: "The new economy recovery §Yplans§! will be set in motion."

 POL_1933_Election: "1933 Presidential Election"
 POL_1933_Election_desc: "Ignacy Moscicki has been re-elected as leader of our young republic. Since he came to power in 1926, he has helped to steer us through the many challenges which come with a nation sitting between a rock and a hard place, as well as the Great Depression that has left a massive dent in our economic stability.\n\nFortunately, the President was the only candidate available for selection by the Sejm, with most of the opposition parties having boycotted the vote altogether. However, this does show that there is still much to be done in securing the republic from enemies both within and outside of the state, and all this shall be done under the watchful eye of Marshall Piłsudski."
 POL_POL_1933_Election_tt: "Moscicki Smigly won §Y1933 election§! that takes place on §Y8th of May, 1933§!."

 POL_Finish_Off_Opposition: "Finish off the Opposition"
 POL_Finish_Off_Opposition_desc: "Opposition to our rule comes in various forms, such as political and ethnic resistance. In terms of politics, radicals such as the communists have always posed a big threat to us, as they have been funded by the wretched Soviets in the east since they lost in 1921. The Germans are not much better, supporting small National Socialist groups in the west of our nation. All these radicals have a small amount of influence, but at any given time they could disrupt the orderliness of our nation. Meanwhile, some Belarusian and Ukrainian separatists are trying to gather enough strength to declare breakaway nations, although we have kept this under control for now.\n\nIf we are to deal with these traitors, we will need to get our hands dirty, and that must include the construction of new prison camps to hold all of these criminals in."

 POL_State_Sponsored_Assimilation: "State Sponsored Assimilation"
 POL_State_Sponsored_Assimilation_desc: "The Polish government has long sought to shift large ethnic minority populations away from their native cultures, a process known as polonization. However, this policy has been a colossal failure, encouraging minority groups to resist and rebel against Polish rule. The Ukrainian population in Lwow, for example, has formed partisan groups that carry out bombings and assassinations against Polish officials and military forces. Polonization's failure in Lwow has only fueled resentment and strengthened the Ukrainian resistance."
 
 POL_Strenghten_Watterplate_Garnison: "Strengthen the Westerplatte Garrison"
 POL_Strenghten_Watterplate_Garnison_desc: "Ever since the end of the Great War, the Germans have always complained about the “Polish Corridor”, which splits East Prussia from the rest of Germany. It has been the source of great tension over the years, and has recently ramped up due to the changing political landscape in our Western neighbours. To make sure the Germans don’t get any ideas, we shall reinforce the small garrison we have in Danzig that is protecting a small depot that we rightfully own. There is of course, the slight possibility that the Germans do not take kindly to this, so we hope that nothing escalates out of what we see as a sensible movement of soldiers."
 
 POL_Charismatic_Authoritarianism: "Charismatic Authoritarianism"
 POL_Charismatic_Authoritarianism_desc: "Poland had not existed for over 150 years, and Pisudski's vision and determination were instrumental in re-establishing Poland as a sovereign state. His military genius and political acumen enabled him to unite various Polish factions, resulting in a strong and unified nation. He expertly concealed the fact that the Republic of Poland is in fact not a republic.\n\nWhile Pisudski's methods were not always democratic, he fought tirelessly for Polish independence against the Russian Empire. Despite this, he remained popular among Poles due to his role in establishing the modern Polish state from nothing, and his actions were always motivated by his love for his country and desire to protect it."
 
 POL_Ratify_April_Constitution: "Ratify the April Constitution"
 POL_Ratify_April_Constitution_desc: "Following the Great War, Poland struggled to establish a stable political system capable of withstanding internal and external pressures. Despite several attempts at writing a constitution, the country has been plagued by political infighting, social unrest, and foreign intervention. To address these challenges and secure Poland's future, our government has proposed The April Constitution. \n\nThe April Constitution, which was drafted by an expert committee and approved by the National Assembly, is a comprehensive document that outlines the structure and functions of the government, the rights and duties of citizens, and the principles of justice, equality, and freedom, and it reflects our national aspirations, democratic values, and historical legacy."
 POL_Ratify_April_Constitution_tt: "Completed '§YRatification of the April Constitution§!' event that takes place on §Y22nd of April, 1935§!."
 
 POL_Sanation_Left: "The Sanation Left"
 
 POL_Chase_True_Enemy: "Chase the True Enemy"
 
 POL_Cooperate_with_Sosnowski: "Cooperate with Sosnowski"
 
 POL_Legion_of_Merit: "The Legion of Merit"
 
 POL_Doctrine_of_Defense: "The Doctrine of Defense"
 
 POL_Castle_over_Varsaw: "The Castle over Warsaw"
 
 POL_Budgetary_Reform: "Budgetary Reform"
 
 POL_Consolidate_Elite_Support: "Consolidate Elite Support"
 
 POL_Policy_Neutrality: "A Policy of Neutrality"
 
 POL_Ressurect_Galician_Oil: "Ressurect the Galician Oil Industry"
 
 POL_Crush_Army_Influence: "Crush the Army's Influence"
 
 POL_Heir_Of_Marshal: "The Heir of the Marshal"
 
 POL_Power_Sharing_Agreement: "The Power-Sharing Agreement"
 POL_Power_Sharing_Agreement_desc: "President Ignacy Moscicki and Marshal Edward Rydz-migy have agreed to a power-sharing agreement that will bring Poland stability and progress. The agreement entails the sharing of responsibilities between the two leaders, who have agreed to collaborate to address the country's pressing issues.\n\nMoscicki will continue to serve as President of the Polish Republic, overseeing the country's foreign relations, economic policies, and cultural initiatives, according to the agreement. Meanwhile, as Marshal of Poland, Rydz-migy will be responsible for strengthening the country's military capabilities, overseeing national defense, and maintaining law and order."
 
 POL_Stregthen_Zloty: "Strenghten the Złoty"
 POL_Stregthen_Zloty_desc: "President Moscicki has launched a concerted effort to strengthen Poland's national currency, the Zloty, in the face of economic challenges. This initiative aims to stabilise the Polish economy, attract foreign investment, and provide financial stability to Poles.\n\nMoscicki has formed a special task force to oversee the Zloty's strengthening. The task force will concentrate on implementing policies aimed at lowering inflation, increasing foreign investment in Poland, and improving the country's export capabilities. Moscicki is committed to carrying out these policies in a coordinated and effective manner, collaborating closely with the private sector and other stakeholders to achieve its objectives."
 
 POL_Continue_Public_Nationalizations: "Continue Public Nationalizations"
 POL_Continue_Public_Nationalizations_desc: "Despite numerous obstacles, Poland has made significant strides towards establishing a modern, prosperous economy. The government's policy of public ownership, which has helped to create jobs, improve productivity, and reduce inequality, has been a key driver of this progress. In recognition of these accomplishments, the government has announced a new programme to expand and continue public nationalisation in the coming decade.\n\nThe government will acquire stakes in strategic industries such as energy, transportation, and telecommunications through this programme. These industries will be modernised and expanded in order to meet the growing demands of the Polish economy and provide better public services. This will not only create new jobs, but will also keep critical infrastructure in public hands, ensuring the country's economic security.\n\nContinuing public nationalisation is a daring and ambitious attempt to build a stronger, more prosperous Poland. We can create an economy that works for all Poles, not just a few, by expanding public ownership."
 
 POL_Deepen_Trust_Financial_Institutions: "Deepen Trust in Financial Institutions"
 POL_Deepen_Trust_Financial_Institutions_desc: "It is critical that the government take steps to restore trust in Poland's financial institutions. Economic growth and stability will be impossible to achieve without trust in these institutionswhich is why we must launch a comprehensive programme aimed at adressing this issue. This initiative will improve the regulatory framework, raise financial literacy, and encourage investment. By putting these measures in place, we will create a financial system that is both stable and transparent, laying the groundwork for a prosperous and secure Poland."
 
 POL_Issue_New_Banknote_Denominations: "Issue New Banknote Denominations"
 POL_Issue_New_Banknote_Denominations_desc: "Because the zloty's insecurity remains a pressing concern, the government has proposed a monetary reform programme that will introduce new denominations and strengthen the value of our national currency. They proposed issuing new banknotes in denominations of 10, 20, 50, 100, 200, and 500 zlotys, which would replace existing currency and be backed by gold reserves to ensure stability. This will not only restore trust in the currency, but will also aid in the fight against inflation by reducing the supply of money in circulation.\n\nIn addition to banknotes, the government will issue new coins in denominations of one, two, and five zlotys. These coins will be made of high-quality materials such as nickel and bronze, and will include the most recent anti-counterfeiting measures.\n\nA new central bank will be in charge of managing monetary policy and regulating the banking system. This will ensure the new currency's stability and the economy's ability to grow and develop. We can ensure that Poland continues on its path to prosperity and growth by implementing this reform programme."
 
 POL_Colonel_Government: "The Colonel's Government"
 POL_Colonel_Government_desc: "The death of Marshal Józef Pisudski, the Polish state's founder and leader, has left a void in our country's leadership and created a power vacuum that threatens our stability and security. To ensure a smooth transition of power and our independence, our government has appointed Marshal Edward Rydz-migy as Pisudski's successor and charged him with carrying on his legacy.\n\nMarshal Rydz-migy, Pisudski's close ally and protégé, is a respected military commander and political leader who has proven his loyalty and commitment to our country's interests. He was instrumental in many of our country's military campaigns, including the Polish-Soviet War.\n\nThe Marshal inherits a legacy of strong leadership and visionary thinking, which he must maintain and expand upon. He must continue to promote our country's interests and defend our sovereignty against external threats, while also dealing with internal issues such as social unrest, economic inequality, and political polarisation."
 
 POL_Consolidate_Nationalist_Wing: "Consolidate the Nationalist Wing"
 POL_Consolidate_Nationalist_Wing_desc: "As the Marshal assumes command of the country, he recognises the need for a united nationalist front in Poland, both militarily and politically. With the threat of external aggression looming, Poland must present a strong and united front to the world. To that end, Rydz Smigly declared his intention to strengthen Poland's nationalist wing.\n\nThe army will be reorganised and streamlined as the first step in this process, with a focus on modernization and efficiency. All nationalist military organisations will be integrated into a single, cohesive unit. Next, he will reach out to nationalist groups and parties throughout Poland in an attempt to bring them into a united coalition under his leadership. This coalition will be based on Polish nationalism principles, with a focus on preserving Poland's sovereignty and independence. All with the Marshal at the helm.\n\nThe Marshal believes that Poland will be able to confront any external threat with strength and determination. Working together, the Polish people can ensure their independence and sovereignty while also paving the way for a brighter future for themselves and their country."
 
 POL_Fund_Military_Modernization: "Fund Military Modernization"
 POL_Fund_Military_Modernization_desc: "The Marshal has recognised the critical need to modernise Poland's military. He proposes a comprehensive plan to fund and modernise Poland's military infrastructure and equipment to achieve this goal. By directing resources towards the establishment of a new military-industrial complex, it will allow the country to manufacture its own weapons, ammunition, and vehicles, reducing the country's reliance on foreign suppliers.\n\nFurthermore, the plan emphasises the importance of modernising Poland's existing military equipment through the purchase of new tanks, artillery, and aircraft while also upgrading existing ones. It is also planned to build a modern air defence system to protect the country from enemy attacks.\n\nRydz-migy advocates for increased military spending and the creation of a special fund for modernization, believing that with adequate funding, Poland can achieve a modern and efficient military capable of defending the country against any potential threat."
 POL_Fund_Military_Modernization_tt: "Unlocks '§YThe Polish Prestige§!' national focus in the event chain."
 
 POL_Reform_Statist_Model: "Reform the Statist Model"
 POL_Reform_Statist_Model_desc: "Poland's statist economic model has been in place since the end of the Great War, but it has not kept pace with the changing global economy. The government has recognised that reform is required to boost economic competitiveness and growth in the country. We will lay out a strategy for reforming the statist economic model and transition to a more modern, market-based system. Reform methods will include reducing state ownership of businesses, increasing private investment, and encouraging entrepreneurship.\n\nThe ability of the government to effectively implement these reforms and manage the transition to a new economic model will determine the plan's success. Poland, on the other hand, can position itself for long-term economic growth and prosperity by embracing change and encouraging innovation."
 POL_Reform_Statist_Model_tt: "\n§MAfter 180 days§! the economy will change to §LMixed Economy§! and all other economic laws §Rwill remain locked§!"
 
 POL_Form_the_OZN: "Form the OZN"
 POL_Form_the_OZN_desc: "In the post-Great War era, Poland faces numerous challenges, including political divisions and economic struggles. In order to address these issues and promote national unity, the Marshal has decided to establish the OZN, or Camp of National Unity, which will be a coalition of political parties and social groups committed to rebuilding Poland and improving the lives of its citizens.\n\nThe OZN's success will be determined by the government's ability to effectively manage the coalition and address Poland's challenges. The OZN, on the other hand, has the potential to be a powerful force for positive change in Poland by working together and promoting national unity."
 
 POL_Cult_of_the_Marshal: "Cult of the Marshal"
 POL_Cult_of_the_Marshal_desc: "The Marshal, as one of Poland's most prominent military and political figures, has long been a contentious figure in our country's history. Marshal Rydz-migy, widely admired for his leadership during the Polish-Soviet War and efforts to modernise the Polish army, wields enormous power and influence over our country's political and social life. As the commander-in-chief of the Polish Armed Forces, he will use his position to promote his own image as a national hero and saviour.\n\nThe Marshal has used a variety of tactics, including erecting statues and monuments in his honor, publicising his accomplishments in the media, and suppressing any criticism or dissent directed at him. He has also built a network of devoted followers and supporters who will defend him at any cost. These efforts have effectively portrayed him as a symbol of Poland's resilience and strength in the face of adversity."
 
 POL_Warsaw_Cross_City_Line: "Open the Warsaw Cross City Line"
 POL_Warsaw_Cross_City_Line_desc: "The capital of our nation, Warsaw, is a sprawling and beautiful place, as well as a vast one, and its location means that the city is split in half due to the Vistula river. This has meant that travelling across the city can be inconvenient, as there are very few methods of transportation to take citizens across, and those that exist are usually extremely busy.\n\nTo ease the situation, as well as to improve the productivity and happiness of those living within Warsaw, the new cross city line shall be opened. This will see trains running regularly to help keep the flow of busy people moving smoothly, and is sure to help boost the economic recovery as well."
 
 POL_Factory_Nitrogen_Coumpond: "United Factories of Nitrogen Compounds"
 POL_Factory_Nitrogen_Coumpond_desc: "We have a unique opportunity to utilise a resource that has been neglected since the founding of our nation: chemicals. Expanding and enriching the chemical industry will allow us to propel ourselves onto the global stage as a reliable producer of various chemicals that are needed by many nations across the world. It would also be of great help to our domestic industries as well, as they would not need to import as much as they do currently. Initialising special research projects into chemical production should be a priority of our government."
 
 POL_Keynesian_Economics: "Keynesian Economics"
 
 POL_Expand_Silesian_Mining: "Expand Silesian Mining"
 
 POL_Attract_Western_Investement: "Attract Western Investment"
 
 POL_Reinforce_Banking_Sector: "Reinforce the Banking Sector"
 
 POL_Continue_Rural_Education: "Continue Rural Education"
 
 POL_Enrich_the_East: "Enrich the East"
 
 POL_Finish_Warsaw_Station: "Finish the Warsaw Station"
 
 POL_Extend_Public_Works: "Extend Public Works"
 
 POL_Investment_Frenzy: "Investment Frenzy"
 
 POL_Polish_Academy_Litterature: "Open the Polish Academy of Litterature"
 
 POL_Cooperate_Lwow_School_Mathematics: "Cooperate with the Lwów School of Mathematics"
 POL_Cooperate_Lwow_School_Mathematics_desc: "Poland is falling behind in R&D as the German Reich appears to be rapidly militarising.To address this concerning issue, the government has chosen to collaborate with the Lwow School of Mathematics. This school, renowned for its productivity and extensive contributions to subjects such as point-set topology, set theory, and functional analysis, will be a valuable asset in our efforts to counter the German intelligence threat."
 
 POL_Continue_Four_Years_Plan: "Continue the 4 Years Plan"
 POL_Continue_Four_Years_Plan_desc: "Even by Eastern European standards, our glorious Poland is extremely poor. The majority of our industry comes from lands gained by Germany in Versailles, such as Upper Silesia, while the rest of the country is extremely underdeveloped and suffers from high unemployment. The Great Depression only exacerbated the situation. However, our Deputy Prime Minister Eugeniusz Kwiatkowsi, has devised an ingenious solution. \n\nThe Four Year Plan, as he refers to it, will begin with the Central Industrial Zone, where various projects will be undertaken to lay a solid foundation for future industrial development, safe from the prying eyes of our enemies. He has also advocated for the construction of several rail lines connecting 'Poland A', the industrialised and urbanised west, and 'Poland B', the rural and underdeveloped east. The plan is ambitious and carries significant risk. However, Poland has never shied away from such things."
 POL_Four_Years_Plan_Power_Sharing_Agreement_tt: "Completed '§YThe Path of the Second Republic§!' event from the event chain after the death of §YPolish “Iron Man”§!."
 POL_Continue_Four_Years_Plan_tt: "Continuation of our §Yindustrialisation plans§! will begin."
 
 POL_Finish_the_Coal_Trunk_Line: "Finish the Coal Trunk Line"
 POL_Finish_the_Coal_Trunk_Line_desc: "Following Versailles, we were able to take Upper Silesia from Germany, along with its valuable coal mines. However, the critical junctions of Kreuzburg and Vossowska remained out of reach. As key railway hubs, Germany's continued ownership and refusal of transit rights effectively stalled the region's coal output. However, a grand new railway line aims to change that.\n\nThe Coal Trunk Line, which runs from Upper Silesia to our port of Gdynia on the Baltic Sea, will provide a direct link between coal in Silesia and ships wishing to export it at the Giginya dock. The line will be the most significant single investment we have ever made, running the entire length of Poland from south to north. If we are to make use of our hard-earned natural resources, we must create this new line, the future spine of the national economy."
 
 POL_Promote_Chemical_Industry: "Promote the Chemical Industry"
 POL_Promote_Chemical_Industry_desc: "If Poland is to become a global superpower, it must have thriving trade, with large sums of money flowing in from exports and taxes on goods entering Poland. Unfortunately, the Polish state lacks a large number of natural resources that could be viable exports, so unlike the Bolsheviks to the east, it cannot simply flood the world market with every type of natural resource imaginable and profit from it. Our country, however, has enormous potential in the production of synthetic materials, industrial chemicals, and plastics, all of which are in high demand in the West. We must simply invest in this sector of our industry before selling it to the highest Western bidder and profiting."
 
 POL_Subsidise_Arms_Exporter: "Subsidise Arms Exporter"
 POL_Subsidise_Arms_Exporter_desc: "Tensions in Europe continue to rise, which means that the continent's nations, particularly smaller ones that are in grave danger from Germany's, Italy's, or the USSR's territorial ambitions, are rapidly rearming and seeking as many weapons as they can find. This presents a lucrative opportunity to make a quick złoty by matching supply to demand. Our country has numerous companies that manufacture various types of weapons and ammunition, ranging from rifles to aeroplanes. If the government provided subsidies to these firms, production and thus exports of weapons could skyrocket, resulting in a quick profit for us and arming nations that are likely to face aggression in the future."
 
 POL_Subsidise_Stalowa_Wola: "Subsidise Stalowa Woła"
 POL_Subsidise_Stalowa_Wola_desc: "Deep in the forests of central Poland, the spirits of industry have risen. A grouping of heavy industrial foundries has been built and organized into Hula Stalowa Wola. The company is already expanding rapidly and appears to be on track to become one of the country's largest domestic arms dealers. As this industrial beast's chain begins to slip, it's time to pour more oil on the fire, as the factories are currently struggling with their workforce.\n\nLet us construct a whole new city to accommodate them! Are foundries quickly running out of money for employees and materials? Generous subsidies will keep them afloat until they can support themselves! Some may argue that this is reckless and will only foster an industry reliant on handouts. They have no idea that these dealers in death and carnage will never run out of business."
 
 POL_Found_the_SEPEWE_Syndicate: "Found the SEPEWE Syndicate"
 POL_Found_the_SEPEWE_Syndicate_desc: "As we have encouraged the expansion of our arms industry, it has become necessary to bring the entire group back into line. These businesses are spiralling out of control, needlessly competing and attempting to destroy one another. While in peacetime, this type of market competition is normal, but as war approaches, we will require all of their expertise. That is why we formed the SEPEWE Syndicate, which includes 19 different arms companies from across Poland.\n\nThis new organisation will assist them in coordinating sales of old weapons seized from the Germans after Versailles and from the Russians after Riga, giving our arms industry a competitive advantage over the glut of excess weaponry on the market. The Syndicate will also assist them in more effectively using and distributing funds among their members, preventing them from going bankrupt if the peace lasts too long."
 
 POL_Increase_Arms_Exports: "Increase Arms Exports"
 POL_Increase_Arms_Exports_desc: "SEPEWE, an arms syndicate that specialises in exporting Polish weapons abroad, has long been successful in generating revenue from both vintage and new weapons surplus by selling them to foreign powers, with the weapons ranging from pistols to bombers. As our military industry grows and our weapons modernise, we find ourselves with increasing surpluses of obsolete weaponry and surplus modern weaponry produced by our military-industrial complex.\n\nOn the global stage, there are always countries looking to strengthen their militaries. A small country with an aggressive neighbour here, a country embroiled in a brutal war there, and a despot dictator attempting to secure his position all the way over there. It would be simple to sell larger quantities of weapons to the highest bidder and help fund our government and country."
 
 POL_Continue_Urban_Buildip: "Continue the Urban Buildup"
 POL_Continue_Urban_Buildip_desc: "Industrialization is synonymous with urbanisation. Small towns and villages simply cannot support the sheer power of industry that an industrialised nation requires. As we continue to build our nation by leaps and bounds, urbanisation has taken root. Unemployed workers have begun to flood into cities like a mighty river, chasing the dream of steady, well-paying employment that factories offer. This has presented us with a new issue.\n\nJobs are becoming scarce as a result of the city's rapid population growth. We used to struggle with unemployment, but now we face an equally pernicious threat: overemployment. Fortunately, overemployment is easily fixed. Let us rethink our industrial construction plans and build even more factories for our people. Let no man who wants a job be denied one due to a lack thereof!"
 
 POL_Delop_Encrypted_Radio_Com: "Develop Encrypted Radio Communications"
 POL_Delop_Encrypted_Radio_Com_desc: "Although the delivery of orders and general communication in the military was once as simple as handing a piece of paper to a man on a motorbike or a runner and hoping he didn't get killed along the way, that is no longer the case. Within two decades, signal communication technology has advanced dramatically, and the radio now serves as the primary military communication tool, allowing for much faster and more efficient coordination at the expense of being easily interceptable by the enemy, who may use radio signals to pick up and listen in or read what is said.\n\nSeveral countries have begun to use advanced cypher machines to encrypt their communications, preventing easy reading by the enemy without requiring a time-consuming process of decoding. We will, of course, do the same, augmenting our signal companies with said encryption technology and ensuring that our intelligence remains secret."
 
 POL_Expand_Warsaw_Industrial_Region: "Expand the Warsaw Industrial Region"
 POL_Expand_Warsaw_Industrial_Region_desc: "Much of our industrial capital, such as it is, is currently dispersed across the country, primarily in the West on lands acquired from the former German Empire. These factories are dangerously close to the German border, so if the Germans strike, they will be the first to fall. We must establish our new industrial heartland far from any adversaries. Unfortunately, this limits our options.\n\nThis has almost by default resulted in the implementation of the Central Industrial Region Plan. According to this ambitious industrial plan, the majority of future industrial construction will take place in the country's centre, primarily in the Lubelskie, Lwowskie, Kieleckskie, and Krakowskie oblasts. All of these regions are away from prying Russian and German eyes, making them easier to defend if the worst happens and Poland is attacked again."
 
 POL_Rural_Eletrification_Drive: "Rural Electrification Drive"
 POL_Rural_Eletrification_Drive_desc: "Poland has always been a predominantly agricultural country, whether in the last century or today. The majority of its population were and are landowners or landless peasants, its primary products have always been grain and timber, and its common culture has always been strongly rural, with village and country life serving as the foundation for Polish cultural heritage.\n\nHowever, while we can be proud of our agrarian heritage and the strength of our agricultural economy, we must also acknowledge that Poles living in villages have a significantly lower quality of life than those in cities, particularly in terms of basic amenities such as electricity and running water. Whereas every city in the country has a stable power grid, most villages have none at all, with residents relying on oil lamps and candlelight, essentially stuck in a 19th century way of life that Western nations have long abandoned. We must ensure that all Poles have equal access to basic amenities and launch a massive effort to bring electricity to rural areas."
 
 POL_Push_Higher_Education: "Push for Higher Education"
 POL_Push_Higher_Education_desc: "If Poland is to remain free and at the top of the world, we must educate the next generation. A generation of geniuses will make Poland the envy of the world, keeping our country at the cutting edge of science for the foreseeable future. To accomplish this, we will increase the education budget, improving every school in the country, from the most rural preschools to the most prestigious universities. No aspect of education and learning will be left untouched.\n\nNew textbooks, better teachers, the incorporation of technology into the classroom, and an emphasis on practical subjects such as science, maths, and engineering are just a few of the reforms on the agenda. We are, however, aware that this will be a generational issue to pursue. One cannot simply flip a switch and the entire nation's education system becomes 'better'. Our efforts will take years, if not decades, but we will be able to rest assured that they will be worthwhile."
 
 POL_Modernize_Starachowize: "Modernise the Starachowice Works"
 POL_Modernize_Starachowize_desc: "The military must be included in our industrial project. Artillery is a critical component of any modern military, and it requires shells. Poland has a few shell factories scattered throughout the country, but none that can meet the demands of modern warfare. That is why we have decided to assist in the search for a new artillery manufacturer. The Starachowice Works, one of the larger artillery factories, appears to be a suitable foundation for our new artillery production.\n\nWe have already signed a large contract, which will be extended and expanded from just shells to the actual guns. Meanwhile, we'll help the factory upgrade its equipment by purchasing cutting-edge technology from friendly Western nations. Finally, to support the factory, the town of Starachowice Gorne was established specifically to house the legions of factory workers who now operate the foundries and forges."
 
 POL_Create_Central_Industrial_Region: "Create the Central Industrial Region"
 POL_Create_Central_Industrial_Region_desc: "Our deputy prime minister and treasury minister, Eugeniusz Kwiatkowski, has previously proposed that Poland finance the creation of a large industrial region between the voivodeships of Lubelskie, Kielecke, Krakowskie, and Lwowskie, in order to greatly reduce unemployment in rural central Poland, give a massive boost to Polish heavy, light, and military industry, and increase urbanisation in the so-called 'triangle' of voivodeships that will be taking part in the plan. We will finally approve the proposed plan for the 'Central Industrial Region' and begin to provide the billions of zlotys required for it."
 
 POL_Prepare_Fifteen_Years_Plan: "Prepare for the Fifteen Years Plan"
 POL_Prepare_Fifteen_Years_Plan_desc: "In the coming years, we intend to launch the fifteen-year plan, which will be a massive effort to transform Poland into a global infrastructure, industrial, agricultural, and military powerhouse. The plan will be divided into five three-year segments, each focusing on a specific aspect of it, such as infrastructure, industry, agriculture, education, or the military. As the planned start date approaches, we must begin to prepare ourselves and our economy for the massive investments required to carry out the plan, as well as the economic expansion that will result from it."
 
 POL_Increase_Arms_Export: "Increase Arms Export"
 
 POL_Branch_Out_Cegielski: "Branch out H. Cegielski"
 POL_Branch_Out_Cegielski_desc: "The H. Cegielski Stock Company in Poznań, also known as H. Cegielski - Poznań S.A, is one of the oldest and most well-known manufacturing firms in Poland, founded in 1848.  Currently, it manufactures and repairs agricultural and mechanical tools, as well as vehicles, most notably steam locomotives and railway cars, which are used by numerous companies throughout Poland. Despite being forced to downsize due to the crash and depression, the company still has significant manufacturing potential for Poland, particularly the Polish military. With a government cash injection, the company could be expanded to produce top-of-the-line artillery guns and anti-aircraft searchlights for the military, which, with the Teuton and Bolshevik hordes lurking on our border, will be critical for strengthening the Polish Army."
 
 POL_Danzig_Gambit: "The Danzig Gambit"
 
 POL_The_Polish_Prestige: "§aThe Polish Prestige§!"
 POL_The_Polish_Prestige_desc: "The Polish Army represents the pride and prestige of the Polish people. They have repeatedly defeated her enemies and defended Poland's rightful lands. When the Bolshevik hordes marched on Warsaw, the Polish army's men destroyed them in the Miracle on the Vistula. When the Lithuanians attempted to seize Wilno, a legitimate Polish city, the army foiled their plans to ethnically cleanse the Polish population.\n\nWhen Belarusians and Ukrainians attempted to steal rightfully Polish territory in order to form their own illegitimate and illegal states, the Polish army crushed their rebellion. Our army and military personnel in general are Polish heroes, protecting Poland's borders from any threat, whether in the air, on land, or at sea, from the east, north, or west."
 POL_The_Polish_Prestige_tt: "Completed '§YSelling Republican Lands§!' event from the '§YFund Military Modernization§!' focus's event chain."
 POL_Military_1_Unlock_Focus_tt: "Unlocks '§YThe Polish Prestige§!' national focus."
 
 POL_A_Nation_Responds: "A Nation Responds"
 POL_A_Nation_Responds_desc: "The government has called on all citizens to participate in the nation's defence and established the Fund for National Defence, strongly encouraging everyone to donate to help improve the military. The people and the country as a whole have responded..."
 POL_A_Nation_Responds_tt: "Completed by '§YA Pledge from the People§!' event from the '§YFund Military Modernization§!' focus's event chain."
 
 POL_Plan_Wschod: "Plan Wschód"
 POL_Plan_Wschod_desc: "The Bolshevik hordes to our east circle us like wolves, looking for weaknesses or illnesses in their prey. In their previous Imperial Form, they had subjugated us, beaten us down like dogs, deported and murdered hundreds of thousands of our people. After attempting to destroy the new Polish state in 1920 but being annihilated near Warsaw, they have never abandoned their desire to subjugate our homeland. All possible attack routes and plans will be considered, and defensive lines will be established to the east. When they come for us, we will be prepared."
 
 POL_Enemies_at_the_Gates: "[Dynamic_POL_Enemy_at_the_Gates]"
 POL_Enemies_at_the_Gates_desc: "[Dynamic_POL_Enemy_at_the_Gates_desc]"
 POL_Enemy_at_the_Gates: "Enemies at the Gates"
 POL_Enemy_at_the_Gates_desc: "Enemies at the Gates Description"
 POL_Germany_at_the_Gates: "Germans at the Gates"
 POL_Germany_at_the_Gates_desc: "The Teutons to our west, possessed by their Hitlerite overlords, look hungrily at our nation, which they regard as ripe for conquest. That short-mustachioed lunatic in Berlin rails against our people and our country, claiming Gdansk as his city. We have no doubt that the Hitlerites intend to invade our country soon, and we will be prepared to face them. We will build defensive lines along our main German border and the border with East Prussia. When they arrive, we will meet them with bullets, steel, and concrete. Poland will prevail!"
 POL_Soviets_at_the_Gates: "Soviets at the Gates"
 POL_Soviets_at_the_Gates_desc: "The Bolshevik hordes lurk in Russia to our east, just beyond the border. They are still dissatisfied with their defeat at the Vistula in 1920, as well as their failure to eradicate Polish nationality and culture while Russia was still an imperial power. They're now circling like vultures, waiting for an opportunity to strike. We will not give them one. In preparation for the inevitable invasion, we will fortify defensive lines near Tarnopol and other border areas in Belarus and Western Ukraine, as well as actively mobilise the Border Protection Corps and divisions in the east. They'll break their fangs against our steel."
 POL_Enemies_at_the_Gates_tt: "\n§rWe will focus our fortifications on the borders.§!"
 
 POL_The_Internal_Defense: "The Internal Defense"
 POL_The_Internal_Defense_desc: "Description"
 POL_The_Internal_Defense_Germans: "The Internal Defense from Germans"
 POL_The_Internal_Defense_Germans_desc: "The Hitlerites have awoken like a mighty beast from slumber. In the blink of an eye, Germany went from a flagging, weak country to a military and industrial powerhouse. The Madman in Berlin's calls and threats to strike our homeland, as well as his belief that Gdansk belongs to the Hitlerites, continue to threaten us. We must be prepared for an upcoming attack. Our border with the German mainland and East Prussia is mostly flat and poorly defendable. To protect our troops, we will build fortified defensive lines inland and along the Vistula, where they will withdraw and defend. Poland is vast, and it is resilient. All we have to do is retreat and hold prepared positions until the enemy has bled out."
 POL_The_Internal_Defense_Soviets: "The Internal Defense from Soviets"
 POL_The_Internal_Defense_Soviets_desc: "The Great Enemy to the East regards us as a weak nation, ripe for conquest. He believes that his armies of peasant conscripts and paper tanks are sufficient to crush our fledgling nation and place it under his boot. Clearly, he did not learn his lesson. We will crush the Bolsheviks again, just as we did in 1920, but this time without retreating to the Vistula. New fortifications will be built on both sides of the Bug River and the northern part of the Neman River, forcing the enemy to throw his men into bloody river crossings and prepared concrete pillboxes, machine gun positions, minefields, trenches, and other fortifications. The Bolsheviks will falter and flee."
 POL_The_Internal_Defense_tt: "\n§rWe will focus our fortifications in the heart of Poland.§!"
 
 POL_Establish_Defensive_Protocols: "Establish Defensive Protocols"
 POL_Establish_Defensive_Protocols_desc: "With Germany to the west and the Bolsheviks to the east, our borders span hundreds of miles of mostly flat countryside dotted with industrial and urban centres. A less wise general may order the defence of the entire border, at any cost, in order to protect Poland. However, this is essentially a waste of men. To prepare for a proper defence of the Polish nation, we will establish a special defensive protocol requiring Polish troops to retreat from border areas further inland, along better prepared defensive lines by major rivers, or on rougher terrain."
 POL_Expand_the_Border_Protection_Corps: "Expand the Border Protection Corps"
 POL_Expand_the_Border_Protection_Corps_desc: "The great Bolshevik enemy to the East is constantly seeking to infiltrate our lands and sow discord among our people before unleashing his great beasts of war and attempting to subjugate our homeland. Unfortunately, the enemy has been very successful in getting through our flat and massive Eastern border with his saboteurs, as the current border forces are unable to properly police it. To counter the Bolshevik enemy's threats and infiltrators, we will form a 12 regiment force of military-style police dedicated to guarding the Eastern frontier and preventing enemy agents from entering our sacred soil."
 
 POL_Modernize_the_Warsaw_Fortress: "Modernize the Warsaw Fortress"
 POL_Modernize_the_Warsaw_Fortress_desc: "In the mid-nineteenth century, a cutting-edge system of fortresses had been constructed in and around Warsaw, manned by thousands of troops and virtually impenetrable to armies of the time. However, as the decades passed, the great Warsaw Fortress became less and less useful, and some forts were dismantled, until hasty strengthening efforts were made in 1915 to counter the Germans approaching Warsaw.\n\nFollowing independence, many of the forts were dismantled or converted into storage and armoury facilities. With Poland under attack from the Teuton and Bolshevik hordes, we must immediately begin repairing and modernising the Warsaw Fortress so that it can stand and defend the city in the event of an enemy attack."
 
 POL_Plan_Zachod: "Plan Zachód"
 POL_Plan_Zachod_desc: "It is no secret to anyone living in Poland, particularly those living in the regions we acquired with Versailles, that the Germans are not pleased that we now own land that some of them believe is rightfully theirs. This is an insane notion; they lost the Great War, but the nationalists to our West would take any opportunity to strike at us.\n\nUnfortunately, as they rebuild their armies and their technology appears to be frighteningly powerful again, this time may be approaching quickly. We must strengthen our defences and prepare for the inevitable strike from our Western neighbours. It will take hard work and courage to build the necessary forts and make the difficult decisions to defend the Polish nation from its would-be destroyers, but Poland will never be lost, and we will ensure that!"
 
 POL_Preparing_the_Obrona_Narodowa: "Preparing the Obrona Narodowa"
 POL_Preparing_the_Obrona_Narodowa_desc: "To fully defend Poland, every man must do his share. When the enemy attempts to seize our hard-earned independence, the Polish Army cannot be expected to cover all fronts. Rather than sending our skilled troops to die in every battle, we will save them for the most important ones. Establishing a 'Nation Defence' allows us to conscript non-professional soldiers and send them into smaller battles with less training. These men will be nothing more than cannon fodder, and the battles they lose will be insignificant. We must choose our battles carefully, regardless of how difficult it is to send Poland's sons as cannon fodder. In the end, this may be the only way to ensure that an independent Poland survives to honor these brave souls' memory."

 
 POL_Powstanie_Batalion_Pancerny: "Powołanie Batalionu Pancernego"
 POL_Powstanie_Batalion_Pancerny_desc: "Poland cannot afford to fall behind in any capacity during these trying times ahead. As the rest of the world develops increasingly dangerous weapons of war and instruments of destruction, we must keep up with those who seek to bring us down. At the moment, our primary focus must be on tank production. The Germans have already begun mass-producing these nearly impenetrable metallic beasts for their blitzkrieg. If we are caught off guard without our own tanks to repel them, the Polish national dream may be crushed beneath the weight of steel and 3.7 centimetre cannons.\n\nFor this reason, we have decided to change the quotas of our tank factories, ensuring that they produce far more parts per day, resulting in far more tanks for the Army. As a result, we will not be caught short on the quality or quantity of armoured divisions. All we need is approval for this plan."
 
 POL_Project_Uruguay: "Project Uruguay"
 POL_Project_Uruguay_desc: "Poland's enemies surround it with weapons of war and manpower that we cannot hope to match - but this does not mean that because we are smaller, we are helpless. No, this fact means we must rise above and develop modern solutions to our modern problems, with tanks at the top of our list. To deal with the hordes of steel beasts our enemies intend to run over and destroy us with, we have created a brand new weapon to thwart the machinations of the moving metal's commanders.\n\nThe Wz. 75 Anti-material rifle, codenamed Project Uruguay because the crates that conceal them say they are surveillance equipment bound for Uruguay, is our response to their tanks. When it is put into service, it may just save Poland from the horrors of our adversaries' armoured warfare."
 
 POL_Overwhelming_Force: "Overwhelming Force"
 
 POL_Siedmiotonowy_Polski: "Siedmiotonowy Polski ; The 7TP"
 POL_Siedmiotonowy_Polski_desc: "Poland's true evolution into a modern state requires modern equipment and divisions. As long as we continue to buy our armoured units from countries such as Britain and France, we will never have a truly Polish tank division, nor will Poland ever become a great and influential power like them. Or at least, that was the case until a few days ago. Finally, our finest in military and armoured warfare have proposed a design plan for our first independently designed tank, built by Polish hands in our own country.\n\nWe will no longer have to rely on substandard scraps of moving metal to claim that our troops are armoured divisions! With the production of the '7 Tonne Polish,' as we've dubbed it, we'll be able to retire our old Vickers and face the German Panzers with confidence, thanks to our own armoured division made entirely of Polish tanks."
 POL_Powstanie_Batalion_Pancerny_tt: "\n§YNote§!: Wait for June of 1938 to get the 1939 model early."
 POL_UNLOCK_LIGHT_TANK_TECHNOLOGY_TT: "Unlock the §Y[?light_tank_year] Light Tank§! technology."

 POL_All_is_Not_Yet_Lost: "All is Not Yet Lost"
 POL_All_is_Not_Yet_Lost_desc: "Our adversary has attacked us! His planes bomb our cities, while his armies and machinery storm our border posts, overwhelming our troops with numbers and firepower. The naysayers and pessimists in our country and on the international stage declare our struggle doomed to fail. We will prove them wrong. Our military industry has grown significantly in recent years. We have three options for conducting an emergency expansion, which will allow our troops to fight the enemy more effectively.\n\nFirst, we can quickly reorganise and streamline our infantry weapon and equipment production, allowing more divisions to be armed and deployed to the front lines. Second, we may increase our artillery production in an attempt to overcome or neutralise the enemy's firepower advantage. Third, we may increase tank quotas in order to deploy more tank brigades and combat the enemy's tank hordes. Jeszcze Polska nie zginęła!"

 POL_All_is_Not_Yet_Lost_tt: "Completed '§YPoland on the Brink§!' event which triggers after §YGermany§! declares §Rwar§! on §Yus§!."
 
 POL_24_Hour_Artillery_Production: "24 Hour Artillery Production"
 POL_24_Hour_Artillery_Production_desc: "As the enemy pours over our borders, we realise that, while we can hold back his infantry and tanks, we are completely outmatched in artillery. The enemy's guns simply destroy our positions, forcing us to retreat, before his troops, tanks, and aircraft overrun and slaughter our retreating soldiers. We must aim to outperform the enemy's artillery advantage.\n\nWith a central government injection of funds to support this effort, artillery factories will be expanded, and artillery pieces and ammunition will be produced 24 hours a day, seven days a week. The Polish worker will sacrifice for the Polish soldier, and the Polish soldier will sacrifice for his country, and together they will keep her safe from the enemy."
 
 POL_Streamline_Weapon_Manufacturing: "Streamline Weapon Manufacturing"
 POL_Streamline_Weapon_Manufacturing_desc: "With the enemy at our door, we discover that our vast stockpiles lack proper, modern infantry equipment and weaponry. If we are to defeat the invader, we must be able to rapidly arm infantry divisions with modern weapons and deploy them to the front lines. Currently, our rifle production is inefficient, so we will streamline it with emergency funds and decrees. Some companies will be merged, and new rules and oversights will be implemented in order to rapidly produce more infantry equipment and repel the enemy."
 
 POL_Approve_New_Tank_Quotas: "Approve New Tank Quotas"
 POL_Approve_New_Tank_Quotas_desc: "Poland cannot afford to fall behind in any capacity during these trying times ahead. As the rest of the world develops increasingly dangerous weapons of war and instruments of destruction, we must keep up with those who seek to bring us down. At the moment, our primary focus must be on tank production. The Germans have already begun mass-producing these nearly impenetrable metallic beasts for their blitzkrieg. If we are caught off guard without our own tanks to repel them, the Polish national dream may be crushed beneath the weight of steel and 3.7 centimetre cannons.\n\nFor this reason, we have decided to change the quotas of our tank factories, ensuring that they produce far more parts per day, resulting in far more tanks for the Army. As a result, we will not be caught short on the quality or quantity of armoured divisions. All we need is approval for this plan."
 
 POL_The_Emergency: "The Emergency"
 POL_The_Emergency_desc: "Poland's very survival is at stake, and its chances appear to be slim. The enemy's might is overwhelming against us, and his tanks and aircraft pierce our lines like a needle through cloth. The country is in a state of panic as our soldiers rush to the frontlines, but every day the enemy inches closer to his objectives in the frontier and the cities and towns of our heartland.\n\nDesperate emergency measures have been implemented, including mobilising civilians to erect barricades in towns and cities to provide cover and defence for our troops while also blocking enemy armour paths. Simultaneously, large amounts of farm equipment, particularly tractors, have been requested, as well as a massive mobilisation of able-bodied men and paramilitary forces. Jeszcze Polska nie zginęła!"
 
 POL_Build_the_Resistance: "Build the Resistance"
 POL_Build_the_Resistance_desc: "Yes, Poland is currently under occupation by our enemies, who intend to destroy our identity - but this is not yet the case! Poland is not lost, and will never be, as long as there are good people fighting for our freedom away from the hawkish gaze of our current rulers.  Within the territories we have temporarily lost, there are resistance fighters willing to die for the revival of a free and strong Polish nation.\n\nWe will break free from these chains once more thanks to their sacrifice, intellect, and strength; however, they require direction, equipment, and additional men. We will devote our time to providing these resources to these rebel heroes, so that we can be united, whole, and victorious once more! With our partisans working hard for their country, Poland will undoubtedly be born again - and soon."
 
 POL_The_Great_Siege: "The Great Siege"
 POL_The_Great_Siege_desc: "Poland is once again being attacked by those who seek to divide us. We have done nothing, as usual, to provoke such an attack, but we find ourselves in the unfortunate position of having to work hard just to prove to the world that we have the right to exist as a nation. As our enemies attempt to break down our walls, forts, cities, and people - everything that Poland is and has the potential to be - we must remain strong. We lack the resources to go on the offensive and seize our vicious enemies' lands, and even if we could, we would prefer not to, so we must simply let them die on our unbreakable defences.\n\nIt will be a waste of blood for our eternal adversaries in the west and east, and they will eventually realise that we cannot be defeated - Poland is undefeated and will remain so. We will force them to make peace and leave in shame, having fought for our survival and won. The Great Siege has begun, and Poland will prevail!"
 
 POR_Radar_Dev_British: "Radar Development with the British"
 
 POL_Between_the_seas_concept: "The Between the Seas Concept"
 
 POL_Promethean_Project: "The Promethean Project"
 
 POL_Solidarity_Ruthenians: "Solidarity with the Ruthenians"
 
 POL_Deal_With_Huns: "Deal with the Huns"
 
 POL_San_Narew_Line: "San-Narew Line"
 
 POL_Open_Krakow_National_Museum: "Open the Krakow National Museum"
 POL_Open_Krakow_National_Museum_desc: "The Krakow National Museum, which has been under construction for quite some time, is almost finished! This structure will house Poland's largest museum as well as the country's main branch of national museums. It will include 11 galleries, 2 libraries, and 12 conservation workshops divided into 21 departments based on art period. It contains approximately 780,000 art objects, with a focus on Polish painting.\n\nThe collection includes masterpieces by artists such as Konrad Krzyanowski, Olga Boznaska, and Wadysaw Lewiski from the Young Poland movement. The Main Building houses a vast collection of militaria dating from the 12th to the 20th centuries, including 16th and 17th century Polish armor, sabers, saddles, and caparisons."
 
 POL_Finalise_Recovery_Anti_Polonism: "Finalise the Recovery from Anti-Polonism"
 
 #Navy
 POL_Finish_Gdynia_Passenger_Port: "§3Finish the Gdynia Passenger Port§!"
 POL_Finish_Gdynia_Passenger_Port_desc: "Versailles' injustice has been undone: Gdansk, formerly the Free City of Danzig, is now ours. The Germans had made their claims, and it was long past time for us to make some of our own, strengthening our necessary influence on the Baltic Sea and demonstrating to the world that the Polish state can quickly catch up to any nation in any area.\n\nFor a long time, we were completely cut off from the sea, unable to establish a strong trade influence or a strong navy - and then the city that would have given us this power was taken away from us in a treaty that strengthened the colonial powers of Western Europe. Even after that, the Nazis began to brutally oppress our people when they came into power! But no more. Our people will no longer scream for help under the League of Nations' unjust mandate, or suffer at the hands of German national socialists. Gdansk is ours, and it will remain so, as we build the greatest port city in the Baltic, if not the world!"

 POL_The_Danzig_Gambit: "The Danzig Gambit"
 POL_The_Danzig_Gambit_desc: "While none of the world's major powers would prefer it, the fact remains that Gdansk is as Polish as Warsaw or Krakow. This so-called 'Free City' has been nothing more than a puppet for the Berlin government, impeding the growth of the Polish people. Every day that it remains free, we lose control of our own destiny. We will take immediate action to correct the error. We will implement a plan to return Gdansk to its Polish roots through political strategy and manoeuvring. Gdansk residents will once again have the protection of their Polish government!"

 POL_Swirskis_High_Fleet: "Świrski's High Fleet"
 POL_Swirskis_High_Fleet_desc: "While the dream and goal of having a real large flotilla of ships in our navy - not meager destroyers and submarines, but battleships and cruisers, seems like an unattainable vision, Jerzy Świrski - naval commander for the Russian Empire, the Ukrainian People's Republic and Hetmanate, and most recently our Chief of Marine Operations - advocates for this exactly. While the construction of such a fleet, modelled after the German Empire's High Seas Fleet, would be prohibitively expensive, the Red Navy and Kriegsmarine provide ample evidence that this dream must be realised.\n\nBoth the hawkish states of the East and West stare us down, and war seems more likely by the day. If we don't have a strong, well-armed navy to defend ourselves and intimidate our enemies, we might as well give up fighting them altogether. Swirski's plans will only propel Poland to greatness as a naval power alongside the Germans and British!"
 POL_Swirskis_High_Fleet_tt: "Completed event '§YDirection of the Marynarka§!' that triggers on §Y28th of February, 1934§!."

 POL_High_Fleet: "Selected §BSwirski's High Fleet§!"


 POL_Deploy_the_Polish_Marines: "Deploy the Polish Marines"
 POL_Deploy_the_Polish_Marines_desc: "The Polish have been steadily rising, but now more than ever, we must ready our marines. We must ready the military for any type of war, and one with multiple landings is one of the many wars we’ll have to fight. We must be ready for any type of circumstances the world might throw onto us. In order to do this, we must deploy the Polish marines, to conquer lands far away to keep the enemy at bay. The marines will protect our ships at sea as well. The first and second Polish marine rifle regiments are now able to be deployed and fully supplied at the same time."
 POL_Expedite_Destroyer_Squadrons: "Expedite Destroyer Squadrons"
 POL_Expedite_Destroyer_Squadrons_desc: "In our current efforts to expand the Polish Navy, speed is critical. We need to get as many vessels out as possible in the shortest amount of time. Due to our limited dockyard capacity, larger ships, such as battlecruisers, are not currently an option. However, hope is not entirely lost. Destroyers are large enough to significantly increase naval power while remaining small enough to be mass produced. We will use our dockyards to construct more destroyers, resulting in a destroyer fleet that will be the envy of nations around the globe!"
 POL_Push_for_Cruiser_Development: "Push for Cruiser Development"
 POL_Push_for_Cruiser_Development_desc: "In a world where established naval powers boast massive battleships and industrial powerhouses pour resources into endless submarines, we are woefully unprepared to ensure maritime security. We lack the resources to build a massive fleet comparable to the great colonial empires, as well as the industrial capacity to establish an enormous submarine fleet.\n\nInstead, Poland will take the middle path. We will focus on developing our cruisers. Large enough to pose a threat to those who oppose us, but small enough for our developing coastal facilities to produce in sufficient quantities. Indeed, cruisers are the most effective way to ensure our nation's security in the Baltic Sea and beyond!"
 POL_Offshore_Ship_Construction: "Offshore Ship Construction"
 POL_Offshore_Ship_Construction_desc: "Poland's independence has been far too brief and turbulent for us to pay close attention to naval affairs, and developing our own naval doctrine would necessitate extensive naval experience. However, this should not prevent us from beginning the process of establishing our own fleet. The Western powers have long naval traditions, and each has a naval doctrine that is as unique as its history. So we will seek assistance from our Western allies in developing a grand vision for Poland's fleet, which will one day be among the world's leading navies!"
 POL_Embrace_the_Maritime_and_Colonial_League: "Embrace the Maritime and Colonial League"
 POL_Embrace_the_Maritime_and_Colonial_League_desc: "So far, our understanding of the world has been severely limited. Almost every politician and minister has been preoccupied with developing Eastern Poland, industrialising Western Poland, or maintaining diplomatic relations with our neighbours, but no one has looked far enough beyond our borders.\n\nIndeed, Poland's future as a dominant power begins at home, but does not end there. It is time to abandon our Eurocentric worldview and embrace the ideals of the Maritime and Colonial League. They have long advocated for expanding the Polish Navy and establishing colonies around the world. Now is the time to turn their dreams into reality and ensure our country's future as a colonial great power!"

 POL_Urbanisation_of_Gdynia: "Urbanisation of Gdynia"
 POL_Urbanisation_of_Gdynia_desc: "With the Free City of Danzig gaining limited autonomy over their city and nearby towns, blocking access to the Baltic Sea, the small city of Gdynia is now our largest city on the coast. To ensure the port city does not fail, its urbanization process is vital to the utmost degree. We must expand the industry of the area, as well as the population.\n\nIf we are to withstand and hold against modern threats of the time, we must militarize, and the urbanization of this port will be the way we protect our nation at sea."

 POL_Expand_the_Merchant_Flotilla: "Expand the Merchant Flotilla"
 POL_Expand_the_Merchant_Flotilla_desc: "Since the end of the Great War, the harsh reality has been that our lands have not grown enough to feed our people. Unfortunately, despite our significant efforts to become self-sufficient, the Earth does not provide consistent resources everywhere. As a result, our reliance on global trade will never be fully alleviated. To facilitate increased trade, we need a larger merchant fleet.\n\nWhile we envision a large fleet of ships transporting goods to and from Poland, we must start with small steps. We'll start by assembling a small fleet and putting it to sea."

 POL_Unrugs_Indirect_Warfare: "Unrug's Indirect Warfare"
 POL_Unrugs_Indirect_Warfare_desc: "While his rival, Jerzy Świrski, wants the Marynarka to become a heavy ship-based fleet, Józef Unrug recognises this as an unrealistic goal. Poland lacks the resources and funds to maintain such a navy; if we cannot rely on the strength of our fleet, we must rely on the intelligence and skill of our officers. This is why Unrug should lead our navy. A bright man who has captained many submarines as a Polish and Imperial German naval commander, he is well-versed in the latest naval technology, which he would gladly impart to any aspiring Polish navy sailor if he were in a position of authority.\n\nAdvocating a strong emphasis on strategy and patience, Unrug will not only increase the number of submarines we have so that we can at least try to match the Reich's U-boat fleets, but will also have a level-headed and bright plan in place for every scenario. Unrug's appointment can only save lives, so we'll promote him immediately!"
 POL_Indirect_Warfare_tt: "Completed event '§YDirection of the Marynarka§!' that triggers on §Y28th of February, 1934§!."

 POL_Indirect_Warfare: "Selected §BUnrug's Indirect Warfare§!"

 POL_Land_Coastal_Defences: "Land Coastal Defences"
 POL_Land_Coastal_Defences_desc: "The threat of an invasion by sea is now a real one. In a upcoming war, if we get invaded by sea, we have little to no defenses to protect ourselves from a naval invasion.\n\nOur port city of Gydnia is vulnerable after recent urbanization, and is a key place to protect, for it is our only access to the sea. We now have the industry to do so, we must act accordingly to ensure Polish prosperity."

 POL_Form_Submarine_Flotillas: "Form Submarine Flotillas"
 POL_Form_Submarine_Flotillas_desc: "With the treaty of Versailles and the end of the First World War, the Polish people have recently become independent from the late Russian Empire, gaining more of our territory following Germany's defeat in that conflict. Now, the port of Gdynia, our only access to the sea, must be protected. We must prioritize expanding the navy's submarines now and focus on other parts later.\n\nThe Polish people will be protected-we shall protect them, and if we stay idle now, our future enemies will crush us. It is the will of the Polish peoples that these submarines will be one of many additions to our growing military. It seems that war is inevitable, so we must build a military to rival our dangerous neighbours."

 POL_Develop_the_Worek_Plan: "Develop the Worek Plan"
 POL_Develop_the_Worek_Plan_desc: "The Polish Corridor is a critical lifeline for our economy. Too much of our trade goes through it for us to give it up without a fight. The goods that pass through Gdansk and Gdynia essentially feed Poland, so they must be fully defended. However, when compared to our aggressive neighbours, the Polish Navy lags behind significantly. We must devise strategies for making the best use of our small navy to defend the Baltic coast. By improving minelaying and adopting a defensive posture, we can prevent an enemy from landing on our shores and destroying our ports.\n\nGdansk will be defended until the end!"
 POL_The_Twin_of_Gdansk: "The Twin of Gdańsk"
 POL_The_Twin_of_Gdansk_desc: "With the end of the Great War, our country gained not only freedom but also an independent link to the global market via the Polish Corridor. It came as a huge relief at a time when our country was still struggling to find its place in postwar Europe, and it has proven to be a significant contributor to the our economy.\n\nNothing demonstrates the Corridor's importance more than the massive amount of traffic that passes through the ports of Gdansk and its twin city, Gdynia. If the Polish nation is to prosper and grow, we must prioritise the expansion and modernization of these cities' port facilities. Our Baltic coast is small, but we are confident that with proper development, it will revitalise the Polish economy and bring prosperity to our people!"
 #Airforce
 POL_Warsaw_Airport: "§SWarsaw Okęcie Airport§!"
 POL_Warsaw_Airport_desc: "When urban growth around Warsaw's aerodrome at Mokotów Field began to impede aviation travel, the Ministry of Railways purchased land near the town of Okcie in order to build a new airfield in 1924.\n\nThis brand-new, cutting-edge complex now has three hangars, exhibition space, garages, and, of course, a sizable, cutting-edge terminal building with a concrete taxiway complete with stands for multiple aircraft and the capacity to accommodate up to 10.000 passengers. Of course, the airport can be used as an airbase for the air force, helping to improve Warsaw's air defence.\n\nThe cost was around ten million zlotes, but Poland now has an airport worthy of any European capital city!"
 
 POL_Open_PZL_Factory: "Open the PZL WP-1 Factory"
 POL_Open_PZL_Factory_desc: "It is no secret that Poland must catch up with the rest of the world, especially Europe. As a free nation, we must modernise our armies, navies, and planes, as the role of aircraft in warfare expands. The Państwowe Zakłady Lotnicze has been producing unique Polish designs for a decade, providing a clear solution to modernising our air force.\n\nWith investments in this reputable company, we will be able to meet Poland's future enemies in the skies and outperform them in terms of quality and quantity. With beautiful Polish planes like the PZL.23 Karas, a light, fast, and easily produced bomber designed recently by the company, we will quickly reach world standards!"
 
 POL_Modernise_Civil_Aviation: "Modernise Civil Aviation"
 POL_Modernise_Civil_Aviation_desc: "Every nation on the planet is making a concerted effort to seize control of the skies, just as they did of the seas. Aircraft, both civilian and military, are paving the way for a more modern, interconnected world. They represent the future of transportation. So far, our focus has been on military aircraft. While military aircraft are critical on the battlefield, civilian aircraft play an equal, if not greater, role in the economy. To stimulate national growth, we must seize this new opportunity and modernise our civil aviation sector. As a result, we will work to build new airports and improve existing ones so that our civilian planes can boost the economy and keep it growing for years to come!"
 
 POL_Keep_Ludomil_Rayski: "Keep Ludomił Rayski"
 POL_Keep_Ludomil_Rayski_desc: "Since 1926, Ludomil Rayski has served as Chief of the Polish Air Force, greatly influencing how the air force is formalised and the direction of its future technology. Since his appointment as Chief, he has submitted numerous plans to the government for expanding the Air Force, based on the formalisation of the Luftwaffe and Giulio Douhet's theories. Rayski has had a long and distinguished career, joining the Ottoman Air Force in 1915 and participating in the Battle of Gallipoli. After serving in the armies and air forces of many countries, his experience and decisions have been invaluable in bringing Poland up to par with the rest of the world.\n\nAfter years of successful service, it would be foolish to let him go now. While his initial reform ideas may be disrupted or altered, no one could possibly replace him; despite the fact that his plans are large and frequently overly expensive, he is the only option for the Polish Air Force's future."
 POL_Keep_Ludomil_Rayski_tt: "Completed event that triggers on §Y28th of February, 1938§!."
 POL_Keep_Ludomil_Rayski_Effect_tt: "§YLudomił Rayski§! continues being a Chief of Air Force."
 
 POL_Appoint_Joseph_Zajac: "Appoint Józef Zajac"
 POL_Appoint_Joseph_Zajac_desc: "It is now clear that tensions with our neighbours have risen far too high, and we must choose the right path to defend Poland from the skies when the war inevitably breaks out. Józef Zając has a plan to meet their fleets flying over Poland with our own. Unlike his soon-to-be predecessor, Ludomil Rayski, who prioritises the production of bombers over fighters, Józef understands the importance of keeping their planes away from us before we pursue them.\n\nWhile we acknowledge that he may not be able to carry out all of his plans to overhaul the Air Force in time for it to be fully prepared for the onslaught of German and Soviet planes, isn't it better to have begun a reform and not finished it than to have not tried at all?"
 POL_Appoint_Joseph_Zajac_tt: "Completed event that triggers on §Y28th of February, 1938§!."
 
 POL_Support_from_the_Skies: "Support from the Skies"
 POL_Support_from_the_Skies_desc: "Since the Great War, aviation technology has made significant advances. Planes are now used in every aspect of warfare, and the skies have become as important a battlefield as the land and seas. Providing adequate aerial support to our ground troops is critical to their continued success on the battlefield. No good offence can be carried out if the enemy fires on our troops from above, and no good defence can be organised if the enemy bombs our fortifications. As a result, we will prioritise improving our aerial doctrine in order to better support our brave troops on the ground. Poland will defeat its enemies both on land and in the air, thanks to our skilled pilots and brave soldiers!"
 
 POL_Greater_Payloads: "Greater Payloads"
 POL_Greater_Payloads_desc: "Wars in the past have demonstrated the importance of destroying enemy targets with aerial machines. Our chief air designer, Zygmunt Pulawski, has been working on a highly advanced design for a medium bomber. The idea has become increasingly impressive as more work has been put into it and the aircraft is now nearing completion. We can confidently state that Poland will not be without powerful machines capable of bombing its enemies."
 
 POL_Increase_Reconnaissance_Flights: "Increase Reconnaissance Flights"
 POL_Increase_Reconnaissance_Flights_desc: "Reconnaissance is one of the most important factors influencing wartime outcomes. Knowing your adversary is critical in determining the type of war we may face. The most effective method of reconnaissance is through spy aircraft. We will increase the number of flights to scout our enemies. Our republic will be prepared for whatever the enemies throw at us. We'll be aware of their moves and prepared to take advantage of them."
 
 POL_The_Karas: "The Karaś"
 POL_The_Karas_desc: "To dominate the skies is one thing; to capitalise on it is another. Examining foreign designs for light bombers, we will construct our own aircraft, the PZL.23 Karaś. Allowing us to rain death from above while maintaining mobility and increasing production costs. This design represents a significant milestone for the Polish aviation industry, demonstrating our ability to confront foreign powers' projects head on."
 
 POL_Improving_the_Specifications: "Improving the Specifications"
 POL_Improving_the_Specifications_desc: "While our air force is not in disarray and can field a sizable number of aircraft, we are gradually falling behind technologically when compared to other countries. We must improve the specifications of our planes in order to demonstrate to the rest of the world that we are able to stand strong in the air. Poland will not give up its airspace without a fight in the event of war. Our adversaries will meet aircraft and tactics as advanced as the world's other powers."
 
 POL_An_International_Interest: "An International Interest"
 POL_An_International_Interest_desc: "Looking outward at what our allies and enemies are doing, our military aviation engineers discovered a new type of warplane. Our neighbours have begun to modernise and mass produce a variety of designs known as attack aircraft. Originally used during the Great War, the role of the attack aircraft is to provide close air support to ground troops by bombing, shooting, and generally disrupting the enemy while ground troops move in, making it both critical to modern land offensives and the next step in aerial research.\n\nWhile it was previously not widely used and was generally more dangerous to be in a plane than on the ground, the modern designs we've seen recently indicate that things have changed. We must begin producing our own attack aircraft or risk being left behind, and we must do so quickly in order to keep up with the rest of the world! Poland will not be outdone - must not be outdone - so we will have our own, whether through deals or engineers!"
 
 POL_Better_Reversing_Guns: "Better Reversing Guns"
 
 POL_Aerial_Combat_Maneuvers: "Aerial Combat Maneuvers"
 POL_Aerial_Combat_Maneuvers_desc: "Since the end of the Great War, aerial combat manoeuvres, also known as dogfighting, have been the act of a pilot performing specific tricks or movements with their plane in order to intercept and fight enemy aircraft at close range. As planes around the world become more advanced, with larger guns, faster speeds, and thicker metal, air warfare will become far more reliant on the skill of the pilots themselves - which is why we must train them to be the best they can be.\n\nTraining the next generation of Polish pilots in aerial combat manoeuvres will undoubtedly result in many of our men becoming flying aces! The Polish Air Force will be known worldwide as having the best and most skilled pilots. Our enemies in the skies will have no idea what hit them when their untrained pilots, relying on their fancy planes, collide with ours, sending them to their deaths with only our skills and minds!"
 
 POL_The_Pulawski_Wing: "The Puławski Wing"
 POL_The_Pulawski_Wing_desc: "Zygmunt Pulawski, an excellent aviation designer, has developed a line of aircraft with a new wing configuration known as the 'Gull Wing'. With this new design, he has significantly reduced drag and given our pilots a much larger field of view. The Pulawski Wing, when combined with other cutting-edge features like an all-metal structure and a metal exterior, has the potential to significantly improve the effectiveness of our warplanes. By incorporating his designs into our aircraft models, we can propel Poland to the forefront of aviation technology while also ensuring our nation's air defence!"
 
 POL_The_New_Aerial_Doctrine: "The New Aerial Doctrine"
 POL_The_New_Aerial_Doctrine_desc: "Wars cannot be won in the air by simply sending out planes and hoping for the best. We must develop our air doctrine for our pilots to use. Conflicts in the past have provided examples of aerial tactics. We will learn from other countries' mistakes in order to devise strategies that will allow us to contest the air prepared. Poland will not defend its airspace solely by launching wave after wave of aircraft. We will demonstrate that our pilots are capable of performing incredible manoeuvres and tactics to defeat their opponents."
 
 POL_The_Skies_are_Filled: "The Skies are Filled"
 POL_The_Skies_are_Filled_desc: "Our young republic is facing its darkest hour. Poland has entered a state of war, and our independence is once again threatened. Our skies are currently filled with fights between our brave pilots and the opposing side of the conflict. The outcome of this war is heavily dependent on who takes advantage of their aerial superiority. During times of emergency like these, we will increase the speed of our aircraft production.\n\nOur Air Force will fight to the best of its abilities. Whether it is to maintain air superiority, bomb our adversaries with CAS planes, or cause havoc with massive bomber machines in the skies."
 
 POL_Further_CAS_Production_Rates: "Further CAS Production Rates"
 POL_Further_CAS_Production_Rates_desc: "Having the designs for close air support aircraft is insufficient for modern warfare. We will increase production, even if this means building other types of planes at a slower pace. We will build as many CAS planes as possible, our factories working day and night. Our adversaries will be terrified of any plane that flies above them! We will destroy them before our troops notice the slightest hint of their approach."
 
 POL_Tactical_Superiority_over_Poland: "Tactical Superiority over Poland"
 POL_Tactical_Superiority_over_Poland_desc: "As war broke out in our Republic, the importance of tactical bombardment grew exponentially. We will increase production of tactical bombers even if it reduces the efficiency of other aircraft production. We will unleash hell on every military target that the enemies control. We will cripple them before they can engage our forces, whether by destroying their industries, railways, or even the troops themselves. Our adversaries will be sorry they crossed our path when they see our tactical bombers flying overhead."
 
 POL_Emergency_Fighter_Buildup: "Emergency Fighter Buildup"
 POL_Emergency_Fighter_Buildup_desc: "The sudden shift in global events forces us to confront reality. To win, we need to dominate the skies. Our factories will work day and night to produce as many fighter aircraft as possible. At the expense of slowing down production of various types of aircraft. We will engage our enemies in the air with as many machines as possible. If we can kick them out of the sky, we will be able to do the same on the ground. Our situation necessitates emergency measures, and we will do everything possible to defeat our opponents."
 
 POL_Off_the_Line_On_the_Runway: "Off the Line On the Runway"
 POL_Off_the_Line_On_the_Runway_desc: "We urgently need more planes. Poland's defence is dependent on it. Our current situation is as simple as that. We must focus our efforts on increasing the efficiency of our aircraft production, both in terms of time and cost. We can conserve resources and increase production by making our planes less expensive to manufacture while maintaining high-quality standards. After all, no plane is too many in the battle for our nation's survival. They are made to be perfect from tail to bow, and they are ready to hit the runway!"
 POL_Off_the_Line_On_the_Runway_tt: "Adds an §Oadditional§! §G-10%§! §OProduction Cost§! to the §Yselected Aircraft Type.§!"
 #Innovative
 POL_Polish_Innovative_Revival: "The Polish Innovative Revival"
 POL_Polish_Innovative_Revival_desc: "The Great Depression had a severe impact on our country, and the government chose to reduce funding for scientific research and education in order to mitigate the effects of the economic downturn. As a result, in the absence of government intervention, the number of brilliant minds in all sectors has plummeted, with no signs of ever increasing. To address this looming issue, our government has decided to increase all research and education funding. Hopefully, Poland will continue to produce revolutionary and innovative minds that will aid the development of our country and the entire world."

 POL_Cipher_Bureau: "Completed event '§YThe Cipher Bureau & ENIGMA§!' that triggers on §Y4h of February, 1933§!."
 POL_Cipher_Bureau_tt: "§BUnlocks the National Focus: 'The Polish Innovative Revival'§!"

 POL_Polish_Academy_Literature: "Polish Academy of Literature"
 POL_Polish_Academy_Literature_desc: "After years of forcible suppression of Polish education, language, and religion under Prussian rule, and outright Russification in Tsarist-occupied territories, Stefan Zeromvski, dubbed the  'conscience of Polish literature,' has proposed the establishment of an Academy of Literature to combat this problem.\n\nThe mission of the Academy is to improve the quality of publishing in Poland by collaborating with government and non-governmental organisations dedicated to the advancement of Polish culture and art in general. It will have 15 life members, with seven chosen by the Minister of Religion and Public Education. Members of the first group proposed the remaining eight. Hopefully, Poland will be able to expand its culture and literature in this manner, reversing years of oppression at the hands of foreign powers."

 POL_Open_the_Krakow_National_Museum: "Open the Krakow National Museum"
 POL_Open_the_Krakow_National_Museum_desc: "The Krakow National Museum, which has been under construction for quite some time, is almost finished! This structure will house Poland's largest museum as well as the country's main branch of national museums. It will include 11 galleries, 2 libraries, and 12 conservation workshops divided into 21 departments based on art period. It contains approximately 780,000 art objects, with a focus on Polish painting.\n\nThe collection includes masterpieces by artists such as Konrad Krzyanowski, Olga Boznaska, and Wadysaw Lewiski from the Young Poland movement. The Main Building houses a vast collection of militaria dating from the 12th to the 20th centuries, including 16th and 17th century Polish armor, sabers, saddles, and caparisons."

 POL_Finalise_the_Recovery_from_Anti_Polonism: "Finalise the Recovery from Anti-Polonism"
 POL_Finalise_the_Recovery_from_Anti_Polonism_desc: "The Polish people and culture have previously suffered for many years at the hands of Russian barbarians and Teutonic hordes. The Russians deported tens of thousands of Poles to Siberia, while the Teutons attempted to eradicate any sense of Polishness and Polish culture within our country.\n\nNow, with Poland resurgent in Europe, we must finally recover from our enemies' attempts to destroy us. Promote Polish language and culture in school curricula, erect new monuments to Polish heroes, create Polish patriotic films, and so on. Only then can our culture truly flourish."

 POL_Develop_Encrypted_Radio_Communications: "Develop Encrypted Radio Communications"
 POL_Develop_Encrypted_Radio_Communications_desc: "Although the delivery of orders and general communication in the military was once as simple as handing a piece of paper to a man on a motorbike or a runner and hoping he didn't get killed along the way, that is no longer the case. Within two decades, signal communication technology has advanced dramatically, and the radio now serves as the primary military communication tool, allowing for much faster and more efficient coordination at the expense of being easily interceptable by the enemy, who may use radio signals to pick up and listen in or read what is said.\n\nSeveral countries have begun to use advanced cypher machines to encrypt their communications, preventing easy reading by the enemy without requiring a time-consuming process of decoding. We will, of course, do the same, augmenting our signal companies with said encryption technology and ensuring that our intelligence remains secret."

 POL_Nationwide_Radio_Coverage: "Nationwide Radio Coverage"
 POL_Nationwide_Radio_Coverage_desc: "To the West, the Hitlerites pioneered many innovations in the expansion of German radio and public access to it. As we watch the Teuton government completely control their population through radio and their 'loudspeaker in every home' strategy, we become increasingly concerned about our own Polskie Radio and its limited coverage of Poland, particularly in rural areas where many people do not even own a radio. \n\nWith a zloty investment from the government, we can begin establishing new radio transmitters and local radio stations, as well as manufacturing radios more cheaply so that even the poorest of peasants can have one in their home and listen to Polskie Radio programmes, all of which are approved by us."

 POL_Radar_Development_with_the_British: "Radar Development with the British"
 POL_Radar_Development_with_the_British_desc: "The British Empire, a long-time Polish ally and backer who supported us in our wars against the Bolsheviks, Ukrainians, Lithuanians, and Belarusians to secure our rightful territory, has recently been developing a new technology known as radar, which allows for specialised ground units and aircraft to spot incoming aircraft, both military and non-military, without the aircraft being in range of sight by the naked eye or binocular, thus serving as an early warning for air raids.\n\nWith Hitlerite beasts eyeing us from the west and Bolshevik hordes lurking in the east, we must immediately contact our long-time partners to discuss possible cooperation in the installation of radar in Poland. Some economic incentives will almost certainly sweeten the offer."

