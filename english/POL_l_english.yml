 POL_Nowela_Sierpniowa: "August Amendment"
 POL_Nowela_Sierpniowa_desc: "Amendment of 2 August 1926 to the March Constitution, which strengthened the executive power in Poland. The August amendment allowed the president to dissolve the parliament and issue decrees and ordinances with the force of law. The government has the right to introduce its own budget if the parliament has not adopted it within the set deadline, and a motion of censure on the government could not be put to the vote on the day of such a motion. The amendment was adopted by a large majority of Members. It did not change the political system of the state, but significantly improved the governments."
 
 POL_May_Coup: "The May Coup"
 POL_May_Coup_desc: "On May 12, 1926, General Józef Piłsudski launched a military coup against democratically elected leaders President Stanisław Wojciechowski and Prime Minister Wincenty Witos, which lasted two days. The coup was motivated by low popular support for the government and Piłsudski's concern that shifting power in the Sejm between political parties was destabilising the nation.\n\nPiłsudski saw rising forces as a threat to Polish independence, emphasising the need for Poland to strengthen its position. Piłsudski's Sanation government took power after a violent coup that resulted in over 1,000 deaths. Despite this, the coup was widely popular with both the military and the Polish population, and Piłsudski remains influential in political affairs despite not having de facto rule over the nation."
 
 POL_Embers_of_Industry: "Embers of Industry"
 POL_Embers_of_Industry_desc: "Today, Polish industry is an unfortunate oxymoron. Years of being a satellite of the Russian Empire, with our eastern brothers directly oppressed and our western territories controlled by the evil German Empire, has resulted in appalling conditions in our beautiful country. The country is disorganised, still reeling from the sudden acquisition of territory following the Great War. Our roads are unconnected, our factories are either burned or struggling, and the Great Depression destroyed the economy before it could even start to grow.\n\nPrior to Piłsudski's May Coup, the government had shifted too much to take action. As it stands, we are far behind the other great powers of Europe, with military and civilian tools that are sometimes decades old, and local businesses struggling to survive in the harsh financial conditions. Saving the Polish economy will be a monumental task, but it must be undertaken urgently."
 POL_Economy_Laws_Locked_tt: "§RWhile Embers of Industry is active, changing economic laws is not possible§!"

