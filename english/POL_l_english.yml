 POL_Pulawskis_Gull_wing_Design: "Pulawski's Gull-wing Design"
 POL_Pulawskis_Gull_wing_Design_desc: "Lieutenant Andrzej Nowak sat in the cockpit of his PZL P.11c, which he had flown on numerous missions over the years. He had seen its limitations and flaws. He knew the old designs couldn't keep up with the advances made by Germany's Luftwaffe and the Red Air Force. As he walked past the hangars at the airfield, he noticed a prototype of the latest Polish fighter, the PZL P.50 Jastrząb, which features the new gull-wing design by Zygmunt Puławski.\n\nAndrzej, like many of the other older pilots, was initially sceptical. \"What's wrong with the wings we know?\" they had enquired. \"Why fix what's not broken?\" However, the rumours were true—this new design had already shown improvements in early tests. The wings, which lowered near the fuselage before rising at the tips, were said to allow for tighter turns, faster speeds, and higher climb rates. If this is true, it has the potential to change everything by providing Poland with an aerial saviour capable of standing up to the might of Germany's Messerschmitts or the USSR's I-16s and holding its own in combat."

