 # ENG
 RESERVES_Territorial_Army_First_Line: "Territorial Army"
 RESERVES_Territorial_Army_First_Line_desc: "The Territorial Army was formed from the former Territorial Force, which was reinstated in 1921. The Territorial Army is made up of many well-equipped light divisions, and new divisions and battalions are constantly formed and added. All members of the Territorial Army must fulfil the 'general service obligation'. This ensures that this army can be quickly deployed to support our expeditionary force overseas.\n§W--------------\nYou can see available reserves in the Recruiting & Deployment tab.\n--------------\nShortcut: £u §!"
 RESERVES_Territorial_Army_First_Line_tt: "Modified due to:\n  £helmet_icon_1_20x20 First Line (Manpower: §Y184700§! (§R-15%§!))"
 RESERVES_Territorial_Army_First_Line_Mechanized: "Territorial Army"
 RESERVES_Territorial_Army_First_Line_Mechanized_desc: "The first line of many Territorial Army divisions is now mechanised. While men continue to march as they have for centuries, an increasing number of them travel by truck or motorcycle. This has increased the speed and manoeuvrability of these divisions, but it has also reduced their firepower. Not only that, but trucks and motorcycles are only lightly armoured. If these men ran into anything heavier than a tankette, they would undoubtedly be mauled.\n§W--------------\nYou can see available reserves in the Recruiting & Deployment tab.\n--------------\nShortcut: £u §!"
 RESERVES_Territorial_Army_First_Line_Mechanized_tt: "Modified due to:\n  £helmet_icon_1_20x20 First Line (Motorised) (Manpower: §Y184700§! (§R-15%§!))"
 RESERVES_Territorial_Army_Second_Line: "Territorial Army"
 RESERVES_Territorial_Army_Second_Line_desc: "The Territorial Army has more or less completed its planned expansion. It has grown in size to an extent not seen since Flanders, and the frame is creaking. However, the foundation remains, and more men than ever before can raise their heads and proudly proclaim themselves as British Empire soldiers. The influx of recruits has resulted in the formation of Second Line divisions, which serve as reserves for deployment if necessary.\n§W--------------\nYou can see available reserves in the Recruiting & Deployment tab.\n--------------\nShortcut: £u §!"
 RESERVES_Territorial_Army_Second_Line_tt: "Modified due to:\n  £helmet_icon_1_20x20 First Line (Motorised) (Manpower: §Y184700§! (§R-15%§!))\n  £helmet_icon_1_20x20 Second Line (Motorised) (Manpower: §Y177600§! (§R-14%§!))"

 # POL
 RESERVES_Polish_Border_Defense: "Korpus Ochrony Pogranicza"
 RESERVES_Polish_Border_Defense_desc: "In peacetime, the Border Protection Corps is a militarised force that protects Poland's eastern border from Soviet agents, terrorists, and sabotage teams. However, with Poland now at war, the Corps' role will shift, with its border guard function ending and its units being transferred to the frontline to reinforce the divisions of the regular Polish army until hostilities end.\n§W--------------\nYou can see available reserves in the Recruiting & Deployment tab.\n--------------\nShortcut: £u §!"
 RESERVES_Polish_Border_Defense_tt: "Modified due to:\n  £helmet_icon_1_20x20 KOP (Manpower: §Y57160§! (§R-9%§!))"

# Events
 SYSTEM_Reserves_and_Militias.0.t: "Failed to Deploy Units"
 SYSTEM_Reserves_and_Militias.0.d: "The front lines have shifted, and so has our control over strategic territories. One of our designated deployment zones for reserve divisions was captured by the enemy before the units could be fully assembled and armed. Now stranded or scattered, these units are either retreating, being apprehended, or attempting to regroup behind safer lines. We must act quickly to relocate future deployments and ensure that our training infrastructure is not exposed again."
 SYSTEM_Reserves_and_Militias.0.A: "Reroute the survivors to the nearest friendly HQ!"  
 SYSTEM_Reserves_and_Militias_0_tt: "Adds £helmet_icon_1_20x20 '§Y[This.GetReserveOrMilitiaNameOtherContext]'§! unit back to the reserve pool.\n"
 SYSTEM_Reserves_and_Militias.41.t: "Operation Ketsu-Go; Mass Mobilization of Men, Women and Children"
 SYSTEM_Reserves_and_Militias.41.d: "[FROM.GetNewsIcon]Intelligence reports confirm that the Japanese High Command has initiated the final phases of Operation Ketsu-Go, aimed at countering the [FROM.GetAdjective]-led Operation Downfall. In a total mobilization of the populace, the Imperial Diet has passed the Volunteer Military Service Law, formally activating the Kokumin Giyu Sentotai (National Volunteer Combat Corps).\n\nThe distinction between civilian and soldier has effectively vanished. Under the slogan 'Ichioku Gyokusai' (\"The Shattering of the Hundred Million like a Jewel\"), all men aged 15 to 60 and women aged 17 to 40 not already in the armed forces are being drafted into militia units.\n\nThe equipment of these units reveals the dire state of Japanese industry. While some units are issued antiquated Murata rifles or simple black-powder firearms, the vast majority are armed with sharpened bamboo spears (takeyari), awls, and satchel charges meant for suicide attacks against enemy armor.\n\nReports from the front lines are harrowing. [FROM.GetAdjective] troops describe psychological unease at engaging these formations, often comprised of teenagers and the elderly charging into machine-gun fire with primitive weapons. Their deployment signals that Japan intends to inflict maximum casualties through sheer attrition, regardless of the cost in human life."
 SYSTEM_Reserves_and_Militias.41.A: "Banzai!"  
 SYSTEM_Reserves_and_Militias.41.B: "We give our full admiration and support!"  
 SYSTEM_Reserves_and_Militias.41.C: "The Empire will choke on the blood of its most vulnerable."
 SYSTEM_Reserves_and_Militias.41.D: "A desperate nation using desperate measures."  