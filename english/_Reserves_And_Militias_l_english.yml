 # Country specific spirits

 # FRA
 RESERVES_Reserves_Francaises_Full: "Réserves Françaises"
 RESERVES_Reserves_Francaises_Full_desc: "The Série A Réserve represents our most capable reserve army. If our reserve forces must be mobilised, the Série A Réserve will be the first to deploy to support the active army. Unlike the Série A Réserve, the Série B Réserve is primarily composed of reservists, with only about 20% of its fighting strength coming from active units. Série B Réserve should be deployed cautiously and only when our borders are directly threatened.\n§W--------------\nYou can see available reserves in the Recruiting & Deployment tab.\n--------------\nShortcut: £u §!"
 RESERVES_Reserves_Francaises_A_Reserve: "Réserves Françaises"
 RESERVES_Reserves_Francaises_A_Reserve_desc: "The Série A Réserve represents our most capable reserve army. If our reserve forces must be mobilised, the Série A Réserve will be the first to deploy to support the active army. The units are made up of roughly two-thirds well-trained active soldiers, with the remainder consisting of less experienced reservists. The Série A Réserve is a well-rounded and capable army that should be deployed immediately.\n§W--------------\nYou can see available reserves in the Recruiting & Deployment tab.\n--------------\nShortcut: £u §!"
 RESERVES_Reserves_Francaises_B_Reserve: "Réserves Françaises"
 RESERVES_Reserves_Francaises_B_Reserve_desc: "Unlike the Série A Réserve, the Série B Réserve is primarily composed of reservists, with only about 20% of its fighting strength coming from active units. As a result, this force has less combat experience, capability, equipment, and readiness. Série B Réserve should be deployed cautiously and only when our borders are directly threatened. However, the Série B Réserve remains a force capable of maintaining defensive lines.\n§W--------------\nYou can see available reserves in the Recruiting & Deployment tab.\n--------------\nShortcut: £u §!"
 RESERVES_French_Full_tt: "Modified due to:\n  £helmet_icon_1_20x20 Série A Réserve (Manpower: §Y366890§! (§R-24%§!))\n  £helmet_icon_1_20x20 Série B Réserve (Manpower: §Y266930§! (§R-18%§!))"
 RESERVES_French_A_Reserve_tt: "Modified due to:\n  £helmet_icon_1_20x20 Série A Réserve (Manpower: §Y366890§! (§R-24%§!))"
