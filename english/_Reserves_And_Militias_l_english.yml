 # BEL
 RESERVES_Reserves_Belges_Full: "Réserves Belges"
 RESERVES_Reserves_Belges_Full_desc: "Following the Great War, we saw the harsh consequences of having a small military with little reserve force. To ensure that our sovereignty and borders are not violated again, we began building a strong reserve army with our young and inexperienced recruits. These young men are well-equipped and capable of holding the frontline, but they are an inexperienced force that should not be deployed en masse unless necessary.\n§W--------------\nYou can see available reserves in the Recruiting & Deployment tab.\n--------------\nShortcut: £u §!"
