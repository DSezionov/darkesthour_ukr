l_english:
 # GUIs:
 DH_RESERVES_AND_MILITIAS_TITLE: "Additional Units"
 DH_RESERVES_AND_MILITIAS_NONE_AVAILABLE_TEXT: "§gWe currently do not have access to any additional units.§!"
 DH_RESERVES_AND_MILITIAS_ENTRY_NAME: "[This.GetReserveOrMilitiaName]"
 DH_RESERVES_AND_MILITIAS_ENTRY_TT: "§Y[This.GetReserveOrMilitiaName]§! \n§L[This.GetReserveOrMilitiaDesc]§!"
 DH_RESERVES_AND_MILITIAS_ENTRY_TT_DELAYED: "§YRequirements:§! \n[!entry_button_click_enabled] \n§YEffects:§! \n[!entry_button_click]"

 # Scripted Triggers:
 HAS_ACCESS_TO_ANY_RESERVE_OR_MILITIAS_TRIGGER_TT: "Has access to at least §Y1§! additional unit"
 HAS_ACCESS_TO_RESERVE_OR_MILITIA_TRIGGER_TT: "Has access to the additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]'§!"
 HAS_NOT_ACCESS_TO_RESERVE_OR_MILITIA_TRIGGER_TT: "Does not have access to the additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]'§!"
 IS_PART_OF_RESERVE_OR_MILITIA_GROUP_PROFESSIONAL_MILITARY_RESERVES_TT: "The additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]' belongs to the group '§YProfessional Military Reserves§!'"
 IS_PART_OF_RESERVE_OR_MILITIA_GROUP_INTERNAL_SECURITY_TROOPS_TT: "The additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]' belongs to the group '§YInternal Security Troops§!'"
 IS_PART_OF_RESERVE_OR_MILITIA_GROUP_BORDER_DEFENSE_FORCES_TT: "The additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]' belongs to the group '§YBorder Defense Forces§!'"
 IS_PART_OF_RESERVE_OR_MILITIA_GROUP_TRAINED_OR_ORGANIZED_MILITIAS_TT: "The additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]' belongs to the group '§YTrained and Organized Militias§!'"
 IS_PART_OF_RESERVE_OR_MILITIA_GROUP_AIR_FORCE_TROOPS_TT: "The additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]' belongs to the group '§YAir Force Troops§!'"
 IS_PART_OF_RESERVE_OR_MILITIA_GROUP_NAVY_SAILOR_UNITS_TT: "The additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]' belongs to the group '§YNavy Sailor Units§!'"
 IS_PART_OF_RESERVE_OR_MILITIA_GROUP_ARMORED_TRAINING_SCHOOLS_TT: "The additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]' belongs to the group '§YArmored Training Schools§!'"
 IS_PART_OF_RESERVE_OR_MILITIA_GROUP_ALL_TRAINING_CADRES_TT: "The additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]' belongs to the group '§YAll Training Cadres§!'"
 IS_PART_OF_RESERVE_OR_MILITIA_GROUP_MILITARY_DISTRICTS_ADMINISTRATIVE_AND_STAFF_TT: "The additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]' belongs to the group '§YMilitary Districts Administrative and Staff§!'"
 IS_PART_OF_RESERVE_OR_MILITIA_GROUP_GENERAL_MILITIAS_TT: "The additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]' belongs to the group '§YGeneral Militias§!'"
 IS_PART_OF_RESERVE_OR_MILITIA_GROUP_FACTORY_AND_WORKERS_MILITIAS_TT: "The additional unit '§Y[This.GetReserveOrMilitiaNameOtherContext]' belongs to the group '§YFactory and Worker Militias§!'"

 # Scripted Effects:
 ADD_POSSIBLE_RESERVE_OR_MILITIA_EFFECT_TT: "Gain access to the additional unit £helmet_icon_1_20x20 '§Y[This.GetReserveOrMilitiaNameOtherContext]'§!.\n"
 REMOVE_POSSIBLE_RESERVE_OR_MILITIA_EFFECT_TT: "Remove access to the additional unit £helmet_icon_1_20x20 '§Y[This.GetReserveOrMilitiaNameOtherContext]'§!.\n"

 # Reserves & Militias:
 RESERVE_OR_MILITIA_1_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YVolkssturm Alarm Units§! in §Y60§! days and unlocks next wave.\n\n"
 RESERVE_OR_MILITIA_1_NAME: "Volkssturm Alarm Units (wave 1)"
 RESERVE_OR_MILITIA_1_DESC: "We must take desperate measures to fill our ranks, such as forming a people's militia in which every man capable of holding a gun will serve. This concept is known as the Volkssturm. The initial formations are to be as high-quality as a militia can be, with Gauleiters looking for older Hitler Youth members, younger Great War veterans, and men with 'essential' civilian jobs. These formations will be positioned for urban defence."
 RESERVE_OR_MILITIA_2_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YVolkssturm Militia§! units in §Y60§! days.\n\n"
 RESERVE_OR_MILITIA_2_NAME: "Volkssturm Militia (wave 2)"
 RESERVE_OR_MILITIA_2_DESC: "The Volkssturm will be greatly expanded from its initial formations, with recruitment open to Hitler Youth as young as 14 and 15, men as old as 80, and men with injuries and illnesses. Any spare weapons, wherever they may be, will be distributed to these new ragtag formations, and any training they may have will have to be completed at or near the front lines."
 RESERVE_OR_MILITIA_3_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YTraining Divisions§! in §Y20§! days.\n\n"
 RESERVE_OR_MILITIA_3_NAME: "Training Divisions"
 RESERVE_OR_MILITIA_3_DESC: "The Replacement Army's training units are brimming with experienced instructors and fresh-faced recruits who are conducting or undergoing training. Although our training units play an important role in replenishing losses, we require immediate front-line reinforcements. As a result, we will merge many of the Replacement Army's training battalions, forming several frontline infantry divisions comprised of both experienced veterans and new recruits."
 RESERVE_OR_MILITIA_4_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YLandespolizei§! units in §Y30§! days.\n\n"
 RESERVE_OR_MILITIA_4_NAME: "Landespolizei"
 RESERVE_OR_MILITIA_4_DESC: "When we took power, we quickly centralised all German police forces under the Ordnungspolizei and abolished the powers of the states. This meant that the Landespolizei, which enforced the law in each state, was directly controlled by Berlin and the Orpo. However, with manpower demands increasing, we may decide to re-establish the Landespolizei as ad hoc military police and rear-line units raised from each state."
 RESERVE_OR_MILITIA_5_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YLandwehr§! units in §Y30§! days\n\n."
 RESERVE_OR_MILITIA_5_NAME: "Landwehr"
 RESERVE_OR_MILITIA_5_DESC: "The Landwehr has long been used as a military reserve, consisting primarily of older reservists aged 35 to 45 who, while capable of fighting, are unable to serve in the regular army. The Landwehr was abolished during the Weimar period, but with our pressing manpower needs and ongoing rearmament, we will re-establish the Landwehr, calling up older men and Great War veterans into reserve units."
 RESERVE_OR_MILITIA_6_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YLuftwaffe Field Divisions§! in §Y40§! days.\n\n"
 RESERVE_OR_MILITIA_6_NAME: "Luftwaffe Field Divisions"
 RESERVE_OR_MILITIA_6_DESC: "With more men needed for frontline service in the army, we must consider recruiting soldiers from the Luftwaffe. The Luftwaffe has a large pool of potential recruits, particularly among ground personnel. We may reduce its administrative and logistics staff, as well as anti-aircraft and airfield maintenance crews, arming and forming the surplus men into frontline infantry units."
 RESERVE_OR_MILITIA_7_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YNaval Infantry§! units in §Y20§! days.\n\n"
 RESERVE_OR_MILITIA_7_NAME: "Naval Infantry"
 RESERVE_OR_MILITIA_7_DESC: "With our manpower needs critical, we must consider recruiting men from the Kriegsmarine and forming them into frontline infantry units. By organising, arming, and training surplus sailors, coastal artillery crews, and crews of damaged or decommissioned vessels into infantry, we may partially reinforce the army, easing the strain on our manpower reserves, at the expense of weakening the navy."
 RESERVE_OR_MILITIA_8_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YPanzer Lehr§! units in §Y20§! days."
 RESERVE_OR_MILITIA_8_NAME: "Panzer Lehr"
 RESERVE_OR_MILITIA_8_DESC: "With an ever-increasing demand for tank forces and a general shortage of experienced tank crews, OKH has proposed that we combine men and machines from various tank schools in Germany to form an elite Wehrmacht Panzer division. We may be able to build a strong backbone for the division by recruiting men from various training and demonstration units, as well as consolidate machines from tank schools, reserve storage, and smaller units."
 RESERVE_OR_MILITIA_9_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YRAD Divisions§! in §Y15§! days.\n\n"
 RESERVE_OR_MILITIA_9_NAME: "RAD Divisions"
 RESERVE_OR_MILITIA_9_DESC: "The Reich Labour Service is Germany's primary auxiliary labour force, indoctrinating young men prior to military service and addressing unemployment issues by employing men in manual labour roles. Men from the RAD have previously been deployed as replacements for frontline infantry, but with manpower shortages critical, we must consider expanding the RAD's role by conscripting men from the organisation to form separate infantry divisions."
 RESERVE_OR_MILITIA_10_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YSA Militia§! units in §Y14§! days.\n\n"
 RESERVE_OR_MILITIA_10_NAME: "SA Militia"
 RESERVE_OR_MILITIA_10_DESC: "The Sturmabteilung was the NSDAP's original paramilitary force, designed to intimidate political opponents. Although it is now almost irrelevant in policymaking and enforcement it still has a loyal army of hundreds of thousands of men who can be mobilised for war efforts. By arming and organising SA members into large militia formations, we may be able to supplement our understaffed armed forces."
 RESERVE_OR_MILITIA_11_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YSS Militia§! units in §Y90§! days.\n\n"
 RESERVE_OR_MILITIA_11_NAME: "SS Militia"
 RESERVE_OR_MILITIA_11_DESC: "With our regular army short on manpower, Himmler has proposed that we expand the Waffen-SS with a small number of large, well-equipped militia formations drawn from civilians, Hitler Youth, and the Allgemeine SS and SD. These units would not be subject to the same SS recruitment regulations, resulting in a larger manpower pool; they would lack any semblance of combat experience, but would be better equipped than other such ad-hoc formations and fanatically loyal."
 RESERVE_OR_MILITIA_12_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YStandschützen§! units in §Y30§! days.\n\n"
 RESERVE_OR_MILITIA_12_NAME: "Standschützen"
 RESERVE_OR_MILITIA_12_DESC: "The Standschützen were historically a Tyrolean militia, dating back to rifle club traditions that emerged for the defence of Tyrol during the Napoleonic Wars, and Austria-Hungary used them to great effect during the Great War to defend the Tyrolean front from Italy. With Austria now absorbed into the Reich we must seek to revive these formations by mobilising Tyrolean men and training them for Alpine operations."
 RESERVE_OR_MILITIA_13_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YFrontmiliz§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_13_NAME: "Frontmiliz"
 RESERVE_OR_MILITIA_13_DESC: "The Frontmiliz is a confederation of paramilitary formations of men aged 18 to 60, led by the Fatherland Front, that includes everything from infantry to its own air force. With our country now at war, these militia units must be mobilised for frontline service, organised into divisional level formations, and any spare heavier weaponry distributed to them before being deployed to the frontlines to fight alongside the regular army."
 RESERVE_OR_MILITIA_14_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YCounties Divisions§! in §Y30§! days.\n\n"
 RESERVE_OR_MILITIA_14_NAME: "Counties Divisions"
 RESERVE_OR_MILITIA_14_DESC: "With the looming threat of an invasion of the home islands, we are now planning to organise our independent home defence brigades into divisions based on their home counties. These new divisions will command an organised defence of our threatened coastline. If deployed, however, a significant number of officers will be assigned to command these new divisions. As a result, county divisions should only be organised when necessary."
 RESERVE_OR_MILITIA_15_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YHome Guard§! units in §Y15§! days.\n\n"
 RESERVE_OR_MILITIA_15_NAME: "Home Guard"
 RESERVE_OR_MILITIA_15_DESC: "Since the start of the war, the local defence volunteers have seen such staggering growth from men unfit for overseas service that we can now comfortably deploy a sizable static home defence force. Despite the fact that all Home Guard men are exempt from military service due to their age, they continue to volunteer to give their lives for the empire should the enemy set foot on the home islands."
 RESERVE_OR_MILITIA_16_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YKaitseliit§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_16_NAME: "Kaitseliit"
 RESERVE_OR_MILITIA_16_DESC: "The Kaitseliit is Estonia's national paramilitary organisation, dedicated to instilling patriotism and national values in the Estonian people, maintaining public order, and training civilians in marksmanship, tactics, and military readiness. It defended Estonia during the 1918 war of independence, and now that the country is once again under threat, the Kaitseliit is called upon to defend it."
 RESERVE_OR_MILITIA_17_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YLocal Defence Force§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_17_NAME: "Local Defence Force"
 RESERVE_OR_MILITIA_17_DESC: "As the war in Europe rages on, we have organised a part-time collection of militia units, each assigned to an urban area in Ireland. These units are intended to support our traditional army in the event that war comes to our shores. Although we remain neutral in this conflict, the threat of Germany seizing the British Isles exists, and we must be prepared."
 RESERVE_OR_MILITIA_18_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YBlackshirt Militia§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_18_NAME: "Blackshirt Militia"
 RESERVE_OR_MILITIA_18_DESC: "The Blackshirts, the fascist party's paramilitary force of several hundred thousand men, are made up of fanatically loyal and fit men eager to serve on the front lines. We will form several blackshirt divisions, arm them with spare weapons and provide them with basic military training. The loyalty and aggression of these units will make them suitable for both offensive and defensive operations to some extent."
 RESERVE_OR_MILITIA_19_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YAizsargi§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_19_NAME: "Aizsargi"
 RESERVE_OR_MILITIA_19_DESC: "The Aiszargi is Latvia's leading paramilitary force, with a wide range of responsibilities and a large membership across the country. It began as a volunteer militia in 1919 and now promotes Latvian nationalism, trains civilians in marksmanship and military tactics, acts as an internal security force and has its own aerial and naval units. With the country once again under threat, these men and women are called to serve on the front lines."
 RESERVE_OR_MILITIA_20_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YŠaulių Sąjunga§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_20_NAME: "Šaulių Sąjunga"
 RESERVE_OR_MILITIA_20_DESC: "The Lithuanian Riflemen's Union is the country's national paramilitary organisation, teaching men and women marksmanship, first aid, and self-defence, as well as military tactics and patriotic education. It saw combat in 1923, being the primary orchestrators of the Klaipėda Revolt and must now once again go into the forests and fight the enemy."
 RESERVE_OR_MILITIA_21_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YHome Guard Militia§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_21_NAME: "Home Guard Militia"
 RESERVE_OR_MILITIA_21_DESC: "Just as Britain is threatened by invasion from Germany, we face a potential threat in the Pacific. With our armies deployed elsewhere, we require a home defence force. Thus, we have begun to organise our own Home Guard based on the same principles as the British Home Guard. However, our volunteer numbers are insufficient, so we will have to implement some form of mandatory home guard service for older adults."
 RESERVE_OR_MILITIA_22_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YObrona Narodowa§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_22_NAME: "Obrona Narodowa"
 RESERVE_OR_MILITIA_22_DESC: "The Obrona Narodowa is a lightly armed territorial defence force made up of unemployed men, reservists, and those exempt from conscription who have received military training and leftover weapons. Their role is to conduct short defensive operations in coordination with regular army units. We will issue orders to mobilise the Obrona Narodowa battalions and send them directly to the front lines."
 RESERVE_OR_MILITIA_23_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YDefence Rifles Association§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_23_NAME: "Defence Rifles Association"
 RESERVE_OR_MILITIA_23_DESC: "South Africa has several rifle associations that are prestigious hunters. They have a distinct set of skills, similar to those of a commando. Thus, we can use these associations in military operations in the same way that we would a traditional commando force. Although highly effective hunting forces, they are unsuitable for traditional front-line service due to both doctrine and size."
 RESERVE_OR_MILITIA_24_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YMilitia Units§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_24_NAME: "Militia Units"
 RESERVE_OR_MILITIA_24_DESC: "States have been permitted to field militia units tasked with home guard duties within their respective states since the National Guard was nationalized and Congress amended the National Defense Act of 1916. These militias are certainly not equipped for frontline combat or even large-scale operations. Thus, deploying these militias under federal command should only be done when absolutely necessary."
 RESERVE_OR_MILITIA_25_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YNational Guard§! units in §Y30§! days.\n\n"
 RESERVE_OR_MILITIA_25_NAME: "National Guard (defensive only)"
 RESERVE_OR_MILITIA_25_DESC: "Following the National Defense Act of 1933, the United States Army took control of our historic National Guard's long-standing divisions and units. We now have the ability to rapidly expand the size of our active army as the National Guard can be deployed as active formations at a moments notice. Their deployment should be greenlit in anticipation of war, as more than doubling the size of our army will cost resources and money."
 RESERVE_OR_MILITIA_26_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YDestroyer Divisions§! in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_26_NAME: "Destroyer Divisions"
 RESERVE_OR_MILITIA_26_DESC: "The enemy's armoured, mechanised, and motorised forces are formidable, necessitating a more powerful anti-tank capability on our part. As a result, we may form rudimentary infantry divisions of conscripted civilians solely for the purpose of destroying the enemy's armour by whatever means necessary. Any spare anti-tank weapons we have, ranging from anti-tank artillery and AT rifles to simple hand grenades and satchel charges, will be distributed to them, and they will be dispatched to destroy the enemy's metal beasts, even if it means losing their lives."
 RESERVE_OR_MILITIA_27_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YPeople's Militia§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_27_NAME: "People's Militia"
 RESERVE_OR_MILITIA_27_DESC: "The enemy has arrived, and everyone must contribute to the war effort. The Red Army, fighting valiantly on the front lines, is desperate for manpower. The Politburo has thus ordered the formation of so-called 'People's Militias' in the Union's major cities, consisting of conscripted or volunteer civilians who are given scrappy weaponry and whatever quick training they can get before being sent to the frontlines."
 RESERVE_OR_MILITIA_28_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §Y1ère Réserve§! units in §Y7§! days.\n\n"
 RESERVE_OR_MILITIA_28_NAME: "1ère Réserve"
 RESERVE_OR_MILITIA_28_DESC: "Following the Great War, we saw the harsh consequences of having a small military with little reserve force. To ensure that our sovereignty and borders are not violated again, we began building a strong reserve army with our young and inexperienced recruits. These young men are well-equipped and capable of holding the frontline, but they are an inexperienced force that should not be deployed en masse unless necessary."
 RESERVE_OR_MILITIA_29_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §Y2e Réserve§! units in §Y30§! days.\n\n"
 RESERVE_OR_MILITIA_29_NAME: "2e Réserve"
 RESERVE_OR_MILITIA_29_DESC: "Germany has once again emerged as a global military superpower. Their annexation and invasions of their neighbours have led us to believe that we are in their crosshairs. Our rapid remobilization and enlistment of new young recruits for a secondary reserve force has been largely successful; however the secondary reserve army is experiencing significant equipment shortages. Thus, they should only be deployed if necessary."
 RESERVE_OR_MILITIA_30_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YNon-Permanent Active Militia§! units in §Y90§! days.\n\n"
 RESERVE_OR_MILITIA_30_NAME: "Non-Permanent Active Militia"
 RESERVE_OR_MILITIA_30_DESC: "Following the Great War, the Otter Commission reorganised the Non-Permanent Active Militia into two forces: a Permanent Active Militia composed of five regiments, with the remaining regiments organised into Non-Permanent Active Militia divisions. However, both forces have faced severe manpower shortages, and many question whether Canada could field an effective standing army alongside the Non-Permanent Active Militia."
 RESERVE_OR_MILITIA_31_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YTerritorial Army§! units in §Y90§! days.\n\n"
 RESERVE_OR_MILITIA_31_NAME: "Territorial Army"
 RESERVE_OR_MILITIA_31_DESC: "The Territorial Army was formed from the former Territorial Force, which was reinstated in 1921. The Territorial Army is made up of many well-equipped light divisions, and new divisions and battalions are constantly formed and added. All members of the Territorial Army must fulfil the 'general service obligation'. This ensures that this army can be quickly deployed to support our expeditionary force overseas."
 RESERVE_OR_MILITIA_32_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YSérie A Réserve§! units in §Y7§! days.\n\n"
 RESERVE_OR_MILITIA_32_NAME: "Série A Réserve"
 RESERVE_OR_MILITIA_32_DESC: "The Série A Réserve represents our most capable reserve army. If our reserve forces must be mobilised, the Série A Réserve will be the first to deploy to support the active army. The units are made up of roughly two-thirds well-trained active soldiers, with the remainder consisting of less experienced reservists. The Série A Réserve is a well-rounded and capable army that should be deployed immediately."
 RESERVE_OR_MILITIA_33_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YSérie B Réserve§! units in §Y30§! days.\n\n"
 RESERVE_OR_MILITIA_33_NAME: "Série B Réserve"
 RESERVE_OR_MILITIA_33_DESC: "Unlike the Série A Réserve, the Série B Réserve is primarily composed of reservists, with only about 20% of its fighting strength coming from active units. As a result, this force has less combat experience, capability, equipment, and readiness. Série B Réserve should be deployed cautiously and only when our borders are directly threatened. However, the Série B Réserve remains a force capable of maintaining defensive lines."
 RESERVE_OR_MILITIA_34_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YSchattendivisionen der Reichswehr§! units in §Y7§! days.\n\n"
 RESERVE_OR_MILITIA_34_NAME: "Schattendivisionen der Reichswehr"
 RESERVE_OR_MILITIA_34_DESC: "As many of our frontline divisions suffer heavy losses or are completely decimated, we may form so-called 'Shadow Divisions' - skeleton or on-paper formations of an existing or destroyed unit formed from the army reserve, designed to serve as the basis for reconstitution and reinforcement, as well as to deceive enemy intelligence by making our frontline strength appear to be greater than it is."
 RESERVE_OR_MILITIA_35_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YKorpus Ochrony Pogranicza§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_35_NAME: "Korpus Ochrony Pogranicza"
 RESERVE_OR_MILITIA_35_DESC: "In peacetime, the Border Protection Corps is a militarised force that protects Poland's eastern border from Soviet agents, terrorists, and sabotage teams. However, with Poland now at war, the Corps' role will shift, with its border guard function ending and its units being transferred to the frontline to reinforce the divisions of the regular Polish army until hostilities end."
 RESERVE_OR_MILITIA_36_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YOGPU Border Guards§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_36_NAME: "OGPU Border Guards"
 RESERVE_OR_MILITIA_36_DESC: "The United State Political Directorate is in charge of protecting our land border, with the directorate maintaining an extensive network of border posts on our western and eastern borders, as well as two small flotillas for maritime border protection. With us now at war, the border guards' role becomes secondary, and their manpower and military training are required for the front."
 RESERVE_OR_MILITIA_37_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YNKVD Border Troops§! units in §Y1§! day.\n\n"
 RESERVE_OR_MILITIA_37_NAME: "NKVD Border Troops"
 RESERVE_OR_MILITIA_37_DESC: "The NKVD maintains an extensive network of border posts along the USSR's western and eastern borders, as well as a force of naval vessels and aircraft. With the USSR at war, the border guards' role becomes secondary, and their manpower and military training are required for the front. As a result, border guard units along the enemy's border will be converted into rifle divisions and deployed to the front lines."
 RESERVE_OR_MILITIA_38_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YNKVD Internal Security Troops§! units in §Y7§! days.\n\n"
 RESERVE_OR_MILITIA_38_NAME: "NKVD Internal Security Troops"
 RESERVE_OR_MILITIA_38_DESC: "The NKVD's Internal Troops play an important role in maintaining law and order, protecting critical infrastructure, and carrying out deportations and purges in the Soviet Union. Because of their dual role as law enforcement and military personnel, Internal Troops members are well-armed and trained. With the Union under attack, we will form several rifle divisions from the NKVD for deployment to the frontlines."
 RESERVE_OR_MILITIA_39_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YNational Guard§! units in §Y30§! days.\n\n"
 RESERVE_OR_MILITIA_39_NAME: "National Guard"
 RESERVE_OR_MILITIA_39_DESC: "Following the National Defense Act of 1933, the United States Army took control of our historic National Guard's long-standing divisions and units. We now have the ability to rapidly expand the size of our active army as the National Guard can be deployed as active formations at a moments notice. Their deployment should be greenlit in anticipation of war, as more than doubling the size of our army will cost resources and money."
 RESERVE_OR_MILITIA_40_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YHome Replacement§! units in §Y20§! days.\n\n"
 RESERVE_OR_MILITIA_40_NAME: "Home Replacement Divisions"
 RESERVE_OR_MILITIA_40_DESC: "As the demands on our frontline troops increase, we will make efforts to form new formations from our available pool of reservists and replacement personnel. Home Replacement Divisions will be established to increase manpower and flexibility. Simultaneously, existing training and field replacement units will be reorganised into fully operational divisions that can be deployed to reinforce critical sectors across the front."
 RESERVE_OR_MILITIA_41_EFFECT_TT: "Spawns £helmet_icon_1_20x20 §YVolunteer Fighting Corps§! units.\n\n"
 RESERVE_OR_MILITIA_41_NAME: "Volunteer Fighting Corps"
 RESERVE_OR_MILITIA_41_DESC: "In the final hours, every capable soul has to be summoned. The Volunteer Fighting Corps mobilises civilians as a last-ditch militia, with men aged 12 to 65 and women up to 45 pressed into service. They are poorly armed and trained in rudimentary fire fighting techniques and elementary first aid, and they serve as a grim last line of resistance when all else fails."

