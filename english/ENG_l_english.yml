 ENG_Defence_of_the_Isles: "The Defence of the Isles"
 ENG_Defence_of_the_Isles_desc: "\n\n\n£decision_header_ENG_The_Defence_of_the_Isles£\n\n\n\nThe threat of invasion grows by the day, and the Empire's fate now depends on defending our homeland. The seas that once carried the Empire's lifeblood may soon transport enemy fleets, and our skies may darken with hostile bombers. Every village, field and city needs to be prepared. Coastal defences must be strengthened, anti-aircraft networks expanded, and the Home Guard readied for combat. From the cliffs of Dover to Glasgow's shipyards, Britain will be fully armed. If the enemy arrives, they will not find an island to conquer, but a fortress."
 ENG_Raise_the_Home_Guard: "Raise the Home Guard"
 ENG_Raise_the_Home_Guard_desc: "In the event of an invasion, every man capable of bearing arms must be prepared to defend his homeland. The Home Guard, a citizen militia composed of volunteers who are too young, too old, or otherwise unfit for regular service, serves as our last line of defence against anyone who would dare to set foot on our shores. With rifles and improvised weapons, these men will guard airfields, bridges, and supply routes, ensuring that no enemy advances unopposed."
 ENG_Raise_the_Home_Guard_tt: "\n\nModify §YBritannia Defiant§! by \nArmy Attack on Core Territory: §G+10.00%§!\nArmy Defence on Core Territory: §G+10.00%§!"
 ENG_Independent_Commonwealth_Divisions: "Independent Commonwealth Divisions"
 ENG_Independent_Commonwealth_Divisions_desc: "Despite their geographical distance, the Commonwealth nations are linked to Britain by a shared history and loyalty to the Crown. As the threat of invasion looms, divisions from across the Empire have pledged their forces to defend the Isles. These divisions, which operate independently but fight alongside British forces, contribute valuable manpower and experience to our cause."
 ENG_Build_the_GHQ_Line: "Build the GHQ Line"
 ENG_Build_the_GHQ_Line_desc: "The GHQ Line, which stretches across southern England, serves as the final line of defence against a German invasion. A vast network of defensive positions, anti-tank ditches, and fortified strongpoints will protect the industrial heartland and London itself if the coastal defences fail. Engineers, labourers, and soldiers will work day and night to fortify the line, turning farmland into fortresses. It may not completely stop the enemy, but it will buy us enough time to launch a counterattack."
 ENG_Build_the_Taunton_Line: "Build the Taunton Line"
 ENG_Build_the_Taunton_Line_desc: "In the event of coastal losses, it is critical to prepare organised defensive belts; the Taunton Line will be one such prepared defence. This line runs across the west of England, connecting natural barriers with engineered obstacles, reinforced positions and pre-planned demolition points to slow any enemy advance inland. Troops will be stationed at strategic points, local militia will be trained to delay actions, and supply caches will be established to ensure long-term defence. The Taunton Line is not a replacement for the navy or coastal troops, but a organised fallback designed to halt momentum, impose attrition on an invader, and buy time for reinforcements to arrive."
 ENG_Makeshift_Bombers: "Makeshift Bombers"
 ENG_Makeshift_Bombers_desc: "When modern aircraft are scarce and factories are overburdened, improvisation becomes necessary. The Makeshift Bomber program uses converted civilian airframes, outdated military types, and hastily modified designs to create makeshift bombing squadrons. These aircraft will be used for local defence and harassment missions such as attacking enemy transport, striking forward concentrations, and assisting coastal defences. Though these aircraft lack the range, armour, and payload of frontline bombers, their presence expands our reach and complicates enemy logistical operations. In desperate times, quantity can take the place of quality, and disrupting every bit of enemy supply helps to protect the Isles."
 ENG_Destroy_the_Ports: "Destroy the Ports"
 ENG_Destroy_the_Ports_desc: "If the enemy lands, their ability to continue operations will be dependent on harbour facilities. As a result, major ports will have pre-arranged demolition plans in place, ready to be destroyed at any time. The cost is high as valuable infrastructure will be damaged and trade disrupted, but denial of port capacity can choke an invading foothold before it can be reinforced. It is preferable to sacrifice ports and warehouses than to have the homeland used as a beachhead for occupation."
 ENG_Flood_the_Romney_Marsh: "Flood the Romney Marsh"
 ENG_Flood_the_Romney_Marsh_desc: "The Romney Marshes, which lie low along the Kentish coast, present both vulnerability and opportunity. In the face of an impending invasion, engineers have proposed deliberately flooding the area, transforming the flat fields into an impassable morass.  This would destroy local farmland and communities, but it could turn the marsh into a natural barrier, drowning roads, clogging tanks, and cutting off key inland routes. If the enemy lands at Dover or Hythe, they will find mud and saltwater waiting to consume them rather than open countryside."
 ENG_Plan_Daedalus: "Plan Daedalus"
 ENG_Plan_Daedalus_desc: "As the threat of invasion grows, we will launch the Daedalus Plan, an emergency initiative to centralise and streamline the country's construction efforts. Civilian labour, private contractors, and engineering firms will be subject to direct government supervision, ensuring that every man, machine, and material contributes to the defence of the nation. Fortifications, anti-aircraft networks, and repair projects can be completed at unprecedented speeds by coordinating regional resources and reducing bureaucratic delays."
 ENG_Daedalus_Plan: "Daedalus Plan"
 ENG_Daedalus_Plan_desc: "As the threat of invasion grows, we will launch the Daedalus Plan, an emergency initiative to centralise and streamline the country's construction efforts. Civilian labour, private contractors, and engineering firms will be subject to direct government supervision, ensuring that every man, machine, and material contributes to the defence of the nation. Fortifications, anti-aircraft networks, and repair projects can be completed at unprecedented speeds by coordinating regional resources and reducing bureaucratic delays."
 ENG_Build_Fortress_on_123: "Build Fortress on South West England"
 ENG_Build_Fortress_on_123_desc: "South West England's rugged hills and narrow valleys create natural choke points that are ideal for defence. By transforming this region into a fortress zone, we can protect critical naval facilities in Plymouth and Falmouth while also securing the approaches to Wales and the Midlands. If the enemy breaches the Channel coast, the South West will serve as a stronghold of British resistance, from which counterattacks could reclaim the south."
 ENG_Build_Fortress_on_127: "Build Fortress on South East England"
 ENG_Build_Fortress_on_127_desc: "The South East is Britain's invasion shield, with the coastline being the most vulnerable to German attacks. The front line of any enemy assault runs from Dover to Brighton. Massive fortifications will be built along the coast and in the countryside. The people of Kent, Sussex, and Essex will be under constant threat, but their cooperation is essential. If the enemy dares to cross the Channel, they will find walls rather than beaches."
 ENG_Build_Fortress_on_126: "Build Fortress on Greater London"
 ENG_Build_Fortress_on_126_desc: "London serves as the Empire's command centre, symbol, and soul. Should an invasion occur, it must be defended street by street, block by block. Fortifying the capital entails preparing for the unthinkable. The Thames bridges will be wired for demolition to deny the enemy easy access. Underground stations will serve as shelters and command posts. It is a difficult but necessary task, because if London survives, so does Britain."
 ENG_Build_Fortress_on_125: "Build Fortress on East of England"
 ENG_Build_Fortress_on_125_desc: "The flat lands of the East of England, which stretch from Norfolk to Suffolk, have no mountains or cliffs to deter an invader, only wide fields and clear skies. However, their openness makes them critical for defence: they are close to London, home to numerous airfields, and the heart of Britain's agricultural supply. Villages will be prepared as strongholds, with roads and bridges ready for destruction. If the enemy lands on these shores, he will discover that even open country can become a harsh and costly battlefield."
 ENG_Build_Fortress_on_129: "Build Fortress on East Midlands"
 ENG_Build_Fortress_on_129_desc: "The East Midlands is central England's industrial spine, consisting of factories, foundries, and railways that are critical to war efforts. If the southern defences fail, the Midlands must serve as the last line of defence for the north and the heart of the nation's production. The people of Leicester, Nottingham, and Derby are accustomed to the harsh environment of industry; now, that discipline will be used to defend their homeland. Every machine, every man, and every wall will form part of the fortress we build here."
 ENG_Build_Fortress_on_130: "Build Fortress on Yorkshire and the Humber"
 ENG_Build_Fortress_on_130_desc: "Yorkshire and the Humber region are extremely strategic, from the rugged moors to the industrial ports of Hull and Sheffield. The region controls critical shipping routes, steel production, and access to northern England. Fortifying its coastline and cities will ensure that, even if an invasion occurs this far north, the enemy will encounter a landscape prepared to resist. Yorkshire people have long been known for their tenacity and perseverance; now, those qualities will be used to defend the nation."
 ENG_Build_Fortress_on_131: "Build Fortress on North East England"
 ENG_Build_Fortress_on_131_desc: "The North East, with its shipyards, steelworks, and industrial towns, serves as Britain's northern gateway to the North Sea. From Newcastle's docks to the coasts of Durham, its defences must be strengthened against both air and sea attacks. Fortifications will rise along the coast to protect vital harbours and approaches, while inland strongpoints will secure the road and rail links that connect the region to the rest of the country."
 ENG_Build_Fortress_on_121: "Build Fortress on Scottish Lowlands"
 ENG_Build_Fortress_on_121_desc: "The Scottish Lowlands, which serve as a link between England and the Highlands, are Scotland's final defensive line before reaching the heart of the country. If the enemy breaches the southern coasts, this region must stand firm. New fortifications will protect the approaches to Edinburgh and Glasgow, and roads and railways will be reinforced, transforming every bridge and valley into a potential bottleneck. The Scots will be ready once more to defend their homeland from invasion."

 ENG_Flood_the_Romney_Marsh_Modifier: "Flooded the Romney Marsh"
