 decision_category_minelaying_tooltip: "§BNaval Mines§! (£minelaying_texticon §Y[?ENG_Mines_Count]§!) represent the number of naval mines we currently have in the stockpile. Mines are used for all mining operations.\n\nWe can increase the number by taking the \"§YProduce More Naval Mines§!\" decision.\n\n§BDocked Minelayers§!(£navy_anchor_texticon §Y[?ENG_Minelayers_Count]§!) represent the number of minelayers we currently have docked. Docked minelayers are used as a starting condition for all mining operations. When an operation is started, the number of docked minelayers is decreased.\n\nWe can increase the number by taking the \"§YForm the First Minelaying Squadron§!\" as well as the \"§YProduce More Minelayers§!\" decision.\n\n§BActive Minelayers§! (£ship_transport_icon_small §Y[?ENG_Minelayers_Active_Count]§!) represent the number of minelayers we are currently using for operations. After an operation is done, active minelayers will return to their docks, increasing the number of docked minelayers."

