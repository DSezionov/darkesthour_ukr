 ENG_Minelaying_Operations_Category: "Royal Navy Minelaying Operations"
 ENG_MINELAYING_OPERATIONS_TEXT: "The war requires us to take decisive action in the seas surrounding the enemy coasts, lest our adversaries break out of their ports into the Atlantic, endangering not only our naval supremacy but also the convoys that serve as a vital lifeline of trade with the US. The Admiralty and the War Cabinet have thus agreed to rely on a massive minelaying operation in the North and Norwegian Seas, among other places, to prevent enemy capital ships and submarines from freely patrolling our coasts and entering the Atlantic."
 ENG_MINELAYING_OPERATIONS_NAVAL_MINES: "Naval Mines"
 ENG_MINELAYING_OPERATIONS_NAVAL_MINES_COUNT: "[?ENG_Mines_Count]"
 ENG_MINELAYING_OPERATIONS_DOCKED_MINELAYERS: "Docked Minelayers"
 ENG_MINELAYING_OPERATIONS_DOCKED_MINELAYERS_COUNT: "[?ENG_Minelayers_Count]"
 ENG_MINELAYING_OPERATIONS_ACTIVE_MINELAYERS: "Active Minelayers"
 ENG_MINELAYING_OPERATIONS_ACTIVE_MINELAYERS_COUNT: "[?ENG_Minelayers_Active_Count]"
 ENG_Produce_100_Naval_Mines_tt: "Add £minelaying_texticon §Y100§! Naval Mines to the stockpile.\n"
 ENG_Produce_350_Naval_Mines_tt: "Add £minelaying_texticon §Y350§! Naval Mines to the stockpile.\n"
 ENG_Convert_5_Ships_tt: "Add £ship_transport_icon_small §Y5§! Minelayers to the stockpile.\n"
 ENG_Defensive_Minelaying_tt: "£minelaying_texticon  Naval Mines: §R-350§!\n"
 ENG_Produce_More_Naval_Mines: "Produce More Naval Mines"
 ENG_Produce_More_Naval_Mines_desc: "Our widespread minelaying operations necessitate a steady stream of naval mines laid by the Royal Navy. And naval mines do not appear out of nowhere; they must be ordered by the Navy and manufactured in our factories before being deployed and used to sink some Jerry shipping. As a result, we have authorised the production of a new batch of mines for the navy's future operations against the Kriegsmarine and German merchant shipping."
 ENG_Convert_Civilian_Ships_First: "Form the First Minelaying Squadron"
 ENG_Convert_Civilian_Ships_First_desc: "If we are to halt the German war machine and reduce the threat that the Kriegsmarine poses in the North Sea, Norwegian waters, and the Atlantic, we must take decisive action to impede German shipping and naval operations. The Board of Admiralty has thus devised a strategy for proactive minelaying in the North and Norwegian Seas, with the primary goal of limiting Kriegsmarine access to the Atlantic. As such, a new unit has been proposed as an addition to the Royal Navy - the First Minelaying Squadron.\n\nThe squadron will be based in Kyle of Lochalsh and will be made up of quick cargo liners that have been requisitioned from civilian service and converted into Auxiliary minelayers."
 ENG_Convert_Civilian_Ships_Second: "Form a Minelaying Squadron"
 ENG_Convert_Civilian_Ships_Second_desc: "Generic decision for producing minelayers."
 ENG_Defensive_Minelaying_Northern_Barrage_1: "The Northern Barrage - Scottish Sea"
 ENG_Defensive_Minelaying_Northern_Barrage_1_desc: "\n\n\n\n\n£picture_ENG_Northern_Barrage_Operation_Map\n\n\n\n\n\n\nWhile the English Channel is tightly secured, there is still a massive gap in our waterborne defences. The North Sea, which stretches from the Faroe Islands to Iceland, is open to enemy infiltration. We must begin the most audacious minelaying operation of the war, laying a line from Scotland to Greenland. It will take a significant amount of time and effort, but we cannot allow the Kriegsmarine unrestricted access to the Atlantic and the critical supply routes that cross it. Let us begin in the waters off Scotland to establish a foundation for the construction of the Great Northern Barrage."
 ENG_Minelayers_Minus_One_tt: "Remove £ship_transport_icon_small §R1§! Minelayers from the stockpile.\n"
 ENG_Defensive_Minelaying_Northern_Barrage_2: "The Northern Barrage - Iceland Basin"
 ENG_Defensive_Minelaying_Northern_Barrage_2_desc: "\n\n\n\n\n£picture_ENG_Northern_Barrage_Operation_Map\n\n\n\n\n\n\nThe first stage of the barrage has been laid, but more work remains to be done. The mines gradually fade as you approach Iceland, and our minefield currently serves no purpose other than to lengthen the route to the Atlantic. Our next project will be mining throughout Iceland. This will enrage Icelanders and other neutral nations, given that Iceland is still neutral. However, the Navy and War Cabinet are in agreement. If we are to accomplish this and seal off the Atlantic from German raiders, we must go the distance."
 ENG_Defensive_Minelaying_Northern_Barrage_3: "The Northern Barrage - Dennmark Strait"
 ENG_Defensive_Minelaying_Northern_Barrage_3_desc: "\n\n\n\n\n£picture_ENG_Northern_Barrage_Operation_Map\n\n\n\n\n\n\nThe Northern Barrage is almost completed. After mining the seas around Scotland and Iceland, the only thing left to do is mine the Denmark Strait, which separates Iceland and Greenland. This tests the logistical capabilities of our minelayers, but the Navy assures us that it is possible. The field may not be as dense as other areas, but it would still be a dangerous run for the enemy. We have already received complaints about our actions in Iceland, and the Foreign Ministry believes that pushing further into the Strait will only exacerbate this anger. However, we must remain steadfast."
 ENG_Defensive_Minelaying_Northern_Barrage_4: "The Northern Barrage - Further Mining"
 ENG_Defensive_Minelaying_Northern_Barrage_4_desc: "\n\n\n\n\n£picture_ENG_Northern_Barrage_Operation_Map\n\n\n\n\n\n\nWith the Barrage in place, we can now focus on filling in the gaps. In some places, particularly around Iceland and Greenland, we have a sorry excuse for a minefield. A few dozen scattered across each mile. If the seal is to hold, we must perform additional minelaying operations to fill out the field along its entire length."
 ENG_Defensive_Minelaying_Northern_Barrage_5: "The Northern Barrage - Final Mining Operation"
 ENG_Defensive_Minelaying_Northern_Barrage_5_desc: "\n\n\n\n\n£picture_ENG_Northern_Barrage_Operation_Map\n\n\n\n\n\n\nThe task is nearly completed. From Scotland to Greenland, a vast minefield stretches hundreds of miles across the open ocean. Enemy merchant raiders, who had previously relied on this northern approach to break into the Atlantic, have suffered heavy losses while attempting to pass through the area. While the exact impact on the war will be unknown, the Navy has some very optimistic predictions. Meanwhile, the minelayers set out one last time to drop the final few hundred mines, capping off the greatest minelaying operation of the war, if not all of human history."

 ENG_Defensive_Minelaying_East_Coast_1: "The Eastern Coast - Dummy Mines"
 ENG_Defensive_Minelaying_East_Coast_1_desc: "\n\n\n\n\n£picture_ENG_Eastern_Coast_Operation_Map\n\n\n\n\n\n\nThe war continues, and mines are becoming an increasingly important tool for our victory. As our enemy Navy prowls our Eastern coast, we've discovered that the mines that lie unseen just beneath the ocean's surface are almost as terrifying to them as the Senior Service. Unfortunately, with so much coast to mine, we have been unable to adequately saturate the area. To keep them scared until we can finish minelaying operations with real mines, let's fill the sea with dummy mines and buy ourselves some time."
 ENG_Defensive_Minelaying_East_Coast_2: "The Eastern Coast - Thames Estuary"
 ENG_Defensive_Minelaying_East_Coast_2_desc: "\n\n\n\n\n£picture_ENG_Eastern_Coast_Operation_Map\n\n\n\n\n\n\nThe war continues, and mines are becoming an increasingly important tool for our victory. As our enemy Navy prowls our Eastern coast, we've discovered that the mines that lie unseen just beneath the ocean's surface are almost as terrifying to them as the Senior Service. Unfortunately, with so much coast to mine, we have been unable to adequately saturate the area. To keep them scared until we can finish minelaying operations with real mines, let's fill the sea with dummy mines and buy ourselves some time."
 ENG_Defensive_Minelaying_East_Coast_3: "The Eastern Coast - Final Operation"
 ENG_Defensive_Minelaying_East_Coast_3_desc: "\n\n\n\n\n£picture_ENG_Eastern_Coast_Operation_Map\n\n\n\n\n\n\nThe war continues, and mines are becoming an increasingly important tool for our victory. As our enemy Navy prowls our Eastern coast, we've discovered that the mines that lie unseen just beneath the ocean's surface are almost as terrifying to them as the Senior Service. Unfortunately, with so much coast to mine, we have been unable to adequately saturate the area. To keep them scared until we can finish minelaying operations with real mines, let's fill the sea with dummy mines and buy ourselves some time."

 ENG_Defensive_Minelaying_Shoeburyness_Boom_1: "Thames Boom - Closing the Gates"
 ENG_Defensive_Minelaying_Shoeburyness_Boom_1_desc: "\n\n\n\n\n£picture_ENG_Shoeburyness_Boom_Operation_Map\n\n\n\n\n\n\nThe Thames Boom, which stretches from Shoeburyness in Essex to Sheerness in Kent, is a critical component of our naval defence strategy. While the Boom is little more than a shallow net in shallower areas closer to shore, when it reaches deep water, it transforms into an anti-submarine net manned by barges equipped with searchlights and anti-aircraft guns. These are supported by Maunsell Sea Forts and coastal batteries. This boom will keep enemy submarines out of the Thames and deny the Germans prime landing zones, effectively sealing off our islands from invasion or attack."

 ENG_Defensive_Minelaying_Western_Approaches_1: "Western Approaches - Cornwall"
 ENG_Defensive_Minelaying_Western_Approaches_1_desc: "\n\n\n\n\n£picture_ENG_Shoeburyness_Western_Approaches_Map\n\n\n\n\n\n\nThe distance between the tip of Cornwall and the southern coast of Ireland is only about 275 kilometres, making it an ideal choke point. The Irish Sea is home to some of our most important ports, including Liverpool, Bristol, and Ulster, as well as numerous smaller ones. Until now, the Germans have been sneaking into the sea to disrupt the Anglo-Irish trade and drop off agents in Ireland. By mining the Cornish approaches, we can protect this vital area from German harassment and avoid opening another front in the naval war."
 ENG_Defensive_Minelaying_Western_Approaches_2: "Western Approaches - Coast of Eire"
 ENG_Defensive_Minelaying_Western_Approaches_2_desc: "\n\n\n\n\n£picture_ENG_Shoeburyness_Western_Approaches_Map\n\n\n\n\n\n\nThe distance between the tip of Cornwall and the southern coast of Ireland is only about 275 kilometres, making it an ideal choke point. The Irish Sea is home to some of our most important ports, including Liverpool, Bristol, and Ulster, as well as numerous smaller ones. Until now, the Germans have been sneaking into the sea to disrupt the Anglo-Irish trade and drop off agents in Ireland. By mining the Cornish approaches, we can protect this vital area from German harassment and avoid opening another front in the naval war."
 ENG_Defensive_Minelaying_Western_Approaches_3: "Western Approaches - Rathlin Islands"
 ENG_Defensive_Minelaying_Western_Approaches_3_desc: "\n\n\n\n\n£picture_ENG_Shoeburyness_Rathlin_Map\n\n\n\n\n\n\nThe Irish Sea is an ideal shooting range for German U-Boats. Shipping between our Western ports and the Irish Eastern ports feels safe, so they let down their guard, which can lead to disaster. Things have gotten so bad that some in the War Cabinet have proposed diverting ships from other theatres of war to patrol the sea. To prevent further thinning of the Navy, we must seal off the Sea. Part of that is a thick mine layer stretching from Belfast to Scotland."

 ENG_Minelaying_Mission_Bonus: "Minelaying Plans - Our Coast and Trade Routes"
 ENG_Minelaying_Mission_Bonus_desc: "The command has given us time to do all necessary minelaying operations around our home island, including protecting the crucial trade routes in the north. The Government is investing big money into this project so we better not disappoint!"

 dismantle_coastal_mines: "Dismantle the Coastal Mines"
 dismantle_coastal_mines_desc: "We can send out a call for pyrotechnicians across the country to dismantle the coastal mines."

 ENG_Minelaying_Mission_Start_Extra_Bonus: "Assure High-command for Early Success"
 ENG_Minelaying_Mission_Start_Extra_Bonus_desc: "The current timeframe set by the high-command to finish the project is too high. We shall contact the high-command and assure them that we can get the work done earlier than expected. This will allow us to concentrate our work somewhere else."
 ENG_Minelaying_Mission_Start_Extra_Bonus_tt: "\nUpdates the Mission §YMinelaying Plans - Our Coast and Trade Routes§! with:\n\nAdd to all mainland coastal provinces: §YLandmined Beaches§!\n    Division Defense on core territory: §G+10.0%§!\n    Divisions speed: §G+5.00%§!\n    Enemy Divisions speed: §G-5.00%§!\n    Enemy Division Attrition: §G+10.0%§!\n    Enemy Supply Truck Attrition: §G+10%§!"

 ENG_Ready_Operation_Wilfred: "Ready Operation Wilfred"
 ENG_Ready_Operation_Wilfred_desc: "If we want to seriously harm the German war effort, we must cut off the natural resources used to feed their military industry. And for German arms manufacturers, nothing is more valuable than Swedish iron ore transported through Norway and into Germany. The Royal Navy has thus proposed a risky and ambitious - but also highly rewarding - plan to cut off Swedish shipments. If mines were to be deployed in the channels connecting mainland Norway and its offshore islands, which serve as primary shipping lanes for Swedish ores, no merchant ship would dare to sail for the risk of death. Of course, this would violate Norway's neutrality and territorial sovereignty."
 ENG_Launch_Operation_Wilfred: "Launch Operation Wilfred"
 ENG_Launch_Operation_Wilfred_desc: "With all of the planning completed and the green light given, we are ready to launch Operation Wilfred, which will involve deploying our minelaying vessels into Norwegian territorial waters to place naval mines in the numerous channels that connect mainland Norway to its offshore islands, preventing Swedish iron ore shipments through Norway. Of course, we have prepared additional naval support in case the Norwegians refuse to allow us to commit what is effectively a grave violation of their neutrality and territorial sovereignty."
 
 ENG_Ready_Operation_Royal_Marine: "Ready Operation Royal Marine"
 ENG_Ready_Operation_Royal_Marine_desc: "To disrupt German river traffic on the Rhine and other major rivers, the War Cabinet has proposed placing several thousand naval mines in them over time, severely disrupting barge and ferry traffic and causing bridge infrastructure damage. The mines, specially designed for the operation, would arrive in Western Germany by being floated downstream from France through the rivers that flow into the country. A portion of the operation also envisages the Royal Air Force dropping mines into West German rivers during moonlit raids. Of course, the French are concerned about this plan, fearing German retaliation, but we are confident that they will soon be won over."
 ENG_Launch_Operation_Royal_Marine: "Launch Operation Royal Marine"
 ENG_Launch_Operation_Royal_Marine_desc: "With the resources now allocated and in place, and the French High Command finally swayed we can launch Operation Royal Marine, which will deploy thousands of naval mines into Western Germany's rivers, including the Rhine. With this deployment, German barge and ferry traffic on the rivers is expected to be severely disrupted, if not completely halted, as German vessels are unlikely to risk sinking and death just to deliver some cargo."
 ENG_OPERATION_ROYAL_MARINE_EFFECT_TT: "All provinces around the §YRhine§!, §YMoselle§! and §YMeuse§! rivers:\n Add modifier §YAllied Naval Mines§! (§Y60 days§!):\n £attacker_speed_texticon  River crossing speed penalty: §R+7.00%§!\n £supply_consumption_texticon  Local Supply Impact: §R-5.00%§!\n £attacker_speed_texticon  Divisions speed: §R-5.00%§!"
##############################################
## British Ideas
##############################################
## Special Ideas
 ENG_our_finest_hour: "Our Finest Hour"
 ENG_our_finest_hour_desc: "With France defeated most people figured that Britain wouldn't last another 6 weeks. They underestimated the spirit of the British people and their government. They bore themselves that if the British Empire and its Commonwealth lasted for a thousands years, men would still say this was their finest hour."

 ENG_end_of_beginning: "The End of the Beginning"
 ENG_end_of_beginning_desc: "We have seen many battles and though the war is not yet won, Now this is not the end. It is not even the beginning of the end. But it is, perhaps, the end of the beginning."

 ENG_Pax_Britannica: "Pax Britannica"
 ENG_Pax_Britannica_desc: "'War would end if the dead could return'\n\nEver since the last guns fell silent on the French and Belgian fields almost two decades ago the Empire has seen itself in a state of tranquility. While the fires of the revolutions tore Central and Eastern Europe asunder the Empire could happily rest on its laurels knowing that the greatest war mankind had ever seen was over and they were the winners. Perhaps not everything was fine within the Empire itself, the usual Westminster squabbles resonated within the chambers of the Commons and the Lords and from the other sides of the sea the Dominions might cry out.\nBut every man, woman, and child in Britain can rest easy knowing that tomorrow there will be no more bloodshed, and that time will heal the wounds wrought by the past as long as the sun has not yet set on the Empire."

 ENG_The_Great_Depression: "The Great Depression"
 ENG_The_Great_Depression_desc: "The great rumbling that shook the foundations of the Earth has reached the great land of Albion as well. With the crash of the American stock market, a domino effect was ignited that swept the entire world market eventually making its way to England as well.\nWhile the austere and timid growth during the interwar period resulted in the effects not being perceived as badly as in America they nonetheless were quite severe if not catastrophic, with over 3 million men unemployed all over the national territories while our export struggles to be competitive.\n\nSuch a disaster is unprecedented in our history and as the hapless politicians scramble to draw emergency plans for this great calamity the people continue to endure. But endure they must, because that is the way of the English, through perseverance and pride we shall stand, for it is the burden of the Englishman to stand alone as the noble lion stands watch over his territory whether in times or bad."
 ENG_The_Great_Depression2: "The Great Depression"
 ENG_The_Great_Depression2_desc: "The great rumbling that shook the foundations of the Earth has reached the great land of Albion as well. With the crash of the American stock market, a domino effect was ignited that swept the entire world market eventually making its way to England as well.\nWhile the austere and timid growth during the interwar period resulted in the effects not being perceived as badly as in America they nonetheless were quite severe if not catastrophic, with over 3 million men unemployed all over the national territories while our export struggles to be competitive.\n\nSuch a disaster is unprecedented in our history and as the hapless politicians scramble to draw emergency plans for this great calamity the people continue to endure. But endure they must, because that is the way of the English, through perseverance and pride we shall stand, for it is the burden of the Englishman to stand alone as the noble lion stands watch over his territory whether in times or bad."
