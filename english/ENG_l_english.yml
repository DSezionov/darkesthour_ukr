 ENG_British_Indian_Army_Category: "The British Indian Army"
 ENG_British_Indian_Army_Category_desc: "\n\n\n£decision_header_ENG_The_British_Indian_Army£\n\n\n\nFor years now, the British army in India has been made up of a mix of British and Indian officers, all trained at the Royal Military College. But now, as war is looming on the horizon, the minister of war and the governor of India have both suggested that we exploit the gigantic manpower of the Raj into the army for the greater good. We should build it from the ground up, and start to expand the new Indian Military Academy."
 ENG_Introduce_Armour_to_the_Indian_Army: "Introduce Armour to the Indian Army"
 ENG_Send_Auchinleck_to_India: "Send Auchinleck to India"
 ENG_Aid_the_Indian_Modernisation_Programmes: "Aid the Indian Modernisation Programmes"

 ENG_Imperial_Defence_Shakeup_Category: "Imperial Defence Shakeup"
 ENG_Imperial_Defence_Shakeup_Category_desc: "\n\n\n£decision_header_ENG_Imperial_Defence_Shakeup£\n\n\n\nThe Empire is vast, and its defences are at adequate at best. We need to develop the defences of various regions, such as Malta, the undefended African territories, Gibraltar, and everywhere we can afford to. We should invest in anti-aircraft defences, coastal forts, and even, if we have the funds, land forts. Every piece of land should be protected from any foreign threats."
 ENG_Establish_Maltese_Defences: "Establish Maltese Defences"
 ENG_Establish_Maltese_Defences_desc: "Malta is the Empire's critical bastion in the central Mediterranean, a symbol of British strength between Europe and Africa. However, its current fortifications are woefully inadequate against modern threats. By constructing additional fortifications and anti-aircraft batteries, we can ensure that Malta becomes a stronghold and base from which our aircraft and ships can dominate the surrounding waters. When properly defended, the island will serve as a key to control over the Mediterranean."
 ENG_Established_Maltese_Defences: "§YHas established Maltese defences§!"
 ENG_An_Unsinkable_Aircraft_Carrier: "An Unsinkable Aircraft Carrier"
 ENG_An_Unsinkable_Aircraft_Carrier_desc: "Malta's strategic importance cannot be overstated, despite its small size. Located at the crossroads of the Mediterranean, the island has the potential to serve as an \"unsinkable aircraft carrier\", a floating fortress of steel and concrete from which our forces can command both the sky and the sea. We can make Malta an impenetrable aviation and naval base by expanding runways, radar stations, and maintenance facilities, as well as ensuring that every approach is protected by anti-aircraft and coastal artillery. From here, our bombers can attack convoys, our fighters can intercept invaders, and our ships can operate with our protection."
 ENG_Fortify_El_Alamein: "Fortify El Alamein"
 ENG_Fortify_El_Alamein_desc: "Egypt's dunes serve as the Suez Canal's entry point, and El Alamein is the last line of defence before our vital imperial artery. To prevent invaders from passing through the sands, we can build fortifications and entrenched positions. These defences will serve not only as static walls, but also as the foundation of a larger strategy to defend North Africa against overwhelming odds. A fortified El Alamein ensures that we retain control of the lifeline to India."
 ENG_Reinforce_the_Imperial_Lifeline: "Reinforce the Imperial Lifeline"
 ENG_Reinforce_the_Imperial_Lifeline_desc: "The Imperial Lifeline, which connects Britain and India via the Suez Canal and beyond, is the artery that carries the Empire's strength. Its removal would stifle communication, trade, and reinforcements alike. We must strengthen this chain by establishing a network of bases, ports, and airfields capable of withstanding land, air, and sea attacks. Anti-aircraft emplacements, radar systems, and supply caches will be built in the Suez and surrounding Egyptian areas to ensure that our convoys travel safely through hostile waters."
 ENG_Solidify_the_Rocks_Fortifications: "Solidify the Rock's Fortifications"
 ENG_Solidify_the_Rocks_Fortifications_desc: "Gibraltar, the staunch defender of the Mediterranean, has long served as our impassable gate. However, the Rock's defences must evolve with the times. To combat new air threats, we need to upgrade its cannons, expand its underground barracks, and install advanced communication and radar systems. The stronghold must be able to withstand siege, with a well-supplied garrison ready to fight back against any aggressor."
 ENG_Solidified_the_Rock: "§YHas solidified the Rock's fortifications§!"
 ENG_Establish_Further_Gibraltarian_Defences: "Establish Further Gibraltarian Defences"
 ENG_Establish_Further_Gibraltarian_Defences_desc: "Gibraltar's strength is built not only on its cannons, but also on its constant readiness. To rely on historical fortifications would be to invite disaster. To meet modern demands, the fortress' tunnels must be deepened, the artillery reinforced, and the airfields expanded. Subterranean facilities will house supplies, command centres, and medical stations, allowing Gibraltar to remain self-sufficient even during an attack."
 ENG_Established_Further_Gibraltarian_Defences: "§YHas established further Gibraltian defences§!"
 ENG_Create_An_Impenetrable_Fortress: "Create an Impenetrable Fortress"
 ENG_Create_An_Impenetrable_Fortress_desc: "With all previous improvements completed, Gibraltar is on its way to becoming the world's most powerful stronghold. The lessons from previous fortifications will guide the Rock's final transformation into a citadel capable of withstanding any siege or assault. Deep beneath the limestone, new chambers and tunnels will house command centres, ammunition depots, and food and fuel stores, ensuring complete self-sufficiency in the event of an invasion. Above, enhanced anti-aircraft networks, reinforced coastal batteries, and fortified observation posts will form a fire wall across the strait."
 ENG_Form_Alexandrian_Outposts: "Form Alexandrian Outposts"
 ENG_Form_Alexandrian_Outposts_desc: "The port of Alexandria, a key component of imperial operations in North Africa, is vulnerable to surprise land, sea, and air attacks. To protect it, we need to establish a network of outposts along the nearby coastline and desert approaches. These outposts will serve as both shields and swords, scouting, reporting, and striking as necessary. By developing them, we expand our reach and ensure that any enemy assault on Alexandria fails long before it reaches the harbor's gates."
 ENG_Formed_Alexandrian_Outposts: "§YHas formed Alexandrian outposts§!"
 ENG_Construct_Alexandrian_Coastal_Defences: "Construct Alexandrian Coastal Defences"
 ENG_Construct_Alexandrian_Coastal_Defences_desc: "With our outposts established throughout Alexandria, it is time to finish the city's transformation into a fortress worthy of its historical significance. The first network of observation posts increased our awareness; now we must empower them. Massive coastal artillery batteries will dominate the approaches to the harbour, while concrete bunkers and anti-aircraft towers will defend the docks and fleet anchorage against attack."
 ENG_Expand_Trincomalee: "Expand Trincomalee"
 ENG_Expand_Trincomalee_desc: "Trincomalee, one of the world's best natural harbours, is hidden among Ceylon's beaches. It has enormous potential as a naval base, which has yet to be realised. By expanding its docks, fuel supplies, and repair yards, we can transform it into a vital hub for the Royal Navy's eastern operations. The surrounding fortifications, air defences, and radar installations will keep it safe from air raids and enemy landings. From Trincomalee, we can project naval power across the Indian Ocean, secure trade routes, and respond quickly to emerging threats."
 ENG_Expanded_Trincomalee: "§YHas expanded Trincomalee§!"
 ENG_Ceylon_Wide_Defensive_Fortifications: "Ceylon-Wide Defensive Fortifications"
 ENG_Ceylon_Wide_Defensive_Fortifications_desc: "Ceylon is an important island in the Indian Ocean that connects Africa, the Middle East, and Asia. Its demise would open the waters to the enemy and cut off our communication lines. Every inch of the territory must be prepared for battle. We'll construct tiered defences along the coastline, airfields inland, and radar stations in the hills. Every harbour and approach should be fortified. These defences will not only deter attacks, but will also turn Ceylon into a fortress to protect our eastern trade and naval power."
 ENG_Invest_in_the_Singapore_Strategy: "Invest in the Singapore Strategy"
 ENG_Invest_in_the_Singapore_Strategy_desc: "The Singapore Strategy was developed decades ago as the foundation of British defence in the Far East. It envisioned a powerful naval base to deter any attack on the Empire's Asian territories. Despite this, the plan has long been stalled due to a lack of funds. We must now take decisive action to bring it to fruition. By expanding dockyards, renovating airfields, and strengthening navy repair yards, we will transform Singapore into a true imperial powerhouse."
 ENG_Invested_in_Singapore_Strategy: "§YHas invested in the Singapore strategy§!"
 ENG_Construct_Further_Air_and_Coastal_Fortifications: "Construct Further Air and Coastal Fortifications"
 ENG_Construct_Further_Air_and_Coastal_Fortifications_desc: "With the naval base established, we must now concentrate on its defence. Singapore's strength is not only its fleet, but also its ability to resist attacks from all sides. New coastal artillery will guard the straits, radar stations will monitor the skies, and concrete bunkers will protect our defenders from bombing. These fortifications will secure the base and its critical infrastructure, transforming Singapore from a port into a fortress."
 ENG_Constructed_Further_Fortifications: "§YHas constructed further fortifications§!"
 ENG_Rectify_the_Northern_Weakness: "Rectify the Northern Weakness"
 ENG_Rectify_the_Northern_Weakness_desc: "Though Singapore's southern shore is armed, its northern frontier remains dangerously exposed, with beaches and jungles that could serve as landing zones for a daring attacker. Engineers and garrisons will fortify each approach with trenches, anti-tank barriers, and strongholds hidden in the terrain. Airfields inland will be reinforced, allowing our defenders to respond quickly to any incursion."
 ENG_Rectified_Northern_Weakness: "§YHas rectified the northern weakness§!"
 ENG_A_True_Gibraltar_of_the_East: "A True Gibraltar of the East"
 ENG_A_True_Gibraltar_of_the_East_desc: "The Singapore Strategy is in its final stages. Singapore is now ready for the ultimate change, with its naval base upgraded, coasts fortified, and northern defences secured. We will connect every battery, airfield, and command post to form a unified defence grid powered by massive underground complexes designed to withstand prolonged siege. If the Empire is invaded, Singapore will stand strong as a symbol of British power in the Far East. When completed, this fortress will rival Gibraltar and serve as a stronghold for the Empire in the Pacific and Indian Oceans."

