 ENG_Shadow_Scheme_Category: "Shadow Scheme"
 ENG_Shadow_Scheme_Category_desc: "Despite rising tensions in Europe and Asia, rearmament is still incredibly unpopular among the British public. The Peace Ballot has shown that the people prefer economic sanctions and diplomatic action through the League of Nations over armed conflict. The Labour-led opposition and its leader, Clement Atlee, also strongly oppose any effort to expand the armed forces.\n\nThe Royal Air Force, in particular, has fallen behind its continental counterparts; intelligence suggests the German Luftwaffe will soon be superior to the RAF both in numbers and in aircraft production capacity. Despite its unpopularity, at least limited rearmament is necessary for the nation's defense.\n\nThe Air Ministry suggests building aircraft manufacturing facilities 'in the shadow' of existing automobile factories, allowing them to draw on existing engineering expertise. Additionally, should the worst come to pass, automobile production lines can be converted to build aircraft instead."
 ENG_Begin_Work_on_a_New_Shadow_Factory: "Begin Work on a New Shadow Factory"
 ENG_Begin_Work_on_a_New_Shadow_Factory_desc: "The growing threat of war in Europe has forced us to face the stark reality of our underprepared industrial base. Our peacetime factories have long served domestic needs, but they are unsuited to the demands of modern, large-scale warfare. As a result, we will begin construction on Shadow Factories in order to keep up with our continental rivals. This ambitious initiative, both in scope and secrecy, is a critical step towards ensuring our country's defensive capabilities."
 ENG_Approach_Automobile_Manufacturers: "Approach Automobile Manufacturers"
 ENG_Approach_Automobile_Manufacturers_desc: "With the prospect of another great war looming large, the need to rapidly expand our industrial capacity has become critical. We now turn to automobile manufacturers, such as Rolls-Royce and Daimler and hope to leverage their expertise, infrastructure, and skilled labour for the production of aircraft and other critical war materiel. Cooperation will not be without challenges; we must carefully manage concerns about cost, secrecy, and disruption to civilian output."
 ENG_Expand_Existing_Industrial_Facilities: "Expand Existing Industrial Facilities"
 ENG_Expand_Existing_Industrial_Facilities_desc: "While Shadow Factories offer long-term security, immediate gains must be made elsewhere. To that end, our government is working to expand and modernise existing industrial facilities throughout the country. This initiative will necessitate close collaboration between industry leaders and government planners, as well as prudent use of limited resources. We can quickly increase output by upgrading machinery, expanding production lines, and increasing shifts without having to wait for foundations to be laid. However, if implemented quickly, it will result in a surge in production that we desperately require."
 ENG_Open_the_Factories: "Open the Factories"
 ENG_Open_the_Factories_desc: "The Shadow Factories, which were long hidden from public view and meticulously built, are now ready to serve their purpose. With the foundations laid and the equipment installed, it is time to open these clandestine industrial facilities and transform them into the formidable war machines that we so desperately need. This represents the transition from covert planning and construction to full-scale production, as these factories begin to manufacture the weapons, vehicles, and machinery needed for the upcoming battle. The facilities will operate below radar, providing fuel to the war effort while avoiding hostile detection."
 ENG_Construction_of_the_Shadow_Factories: "Construction of the Shadow Factories"
 ENG_Construction_of_the_Shadow_Factories_desc: "The time has come to make our Shadow Factories a reality. After extensive planning and obtaining the necessary funding, we can now begin the critical process of building these covert facilities. These factories will be the backbone of Britain's wartime production, built discreetly to keep our industrial base safe from potential threats. Once completed, these Shadow Factories will be a valuable asset, allowing us to ramp up production and arm our country against the growing threats of global conflict."
