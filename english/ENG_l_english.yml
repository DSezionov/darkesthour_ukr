 ENG_Defence_Pacts_Category: "Defence Pacts"
 ENG_Defence_Pacts_Category_desc: "From the Low Countries to the Balkans, many people now look to London for protection against aggression. We will deter potential aggressors and maintain the balance of power that is necessary for continental stability through a series of defence treaties and guarantees. Each pledge carries risk - a promise that, if broken, could permanently damage our credibility, and if kept, could drag us into a larger war. However, if we fail to stand by our allies, there may not be anyone left to stand by us."
 ENG_Anglo_Polish_Defence_Pact: "Anglo-Polish Defence Pact"
 ENG_Anglo_Polish_Defence_Pact_desc: "With German expansion showing no signs of stopping, we will ensure Poland's independence. Though distant, Poland now serves as the eastern bulwark of European liberty, and its fall would expose the continent to unchecked tyranny. The Anglo-Polish Defence Pact promises mutual assistance in the event of aggression, sending a clear message that further German ambitions will not go unchallenged. Some members of Parliament warn that this guarantee risks war for a cause that we cannot directly defend, while others see it as a moral imperative. Should Germany march east, we must be prepared to keep our word."
 ENG_Pledge_to_Protect_Greek_Sovereignty: "Pledge to Protect Greek Sovereignty"
 ENG_Pledge_to_Protect_Greek_Sovereignty_desc: "In the eastern Mediterranean, Greece is caught between competing ambitions. The growing influence of Italy in the Balkans, combined with the looming threat of German intervention, has put the Greek government in a difficult position. Our pledge to uphold Greek sovereignty reaffirms our role as a protector of the Hellenic state and Mediterranean stability. This guarantee not only extends a friendly hand, but also serves as a warning to those who may threaten Athens."
 ENG_Pledge_to_Protect_Romanian_Sovereignty: "Pledge to Protect Romanian Sovereignty"
 ENG_Pledge_to_Protect_Romanian_Sovereignty_desc: "Romania's vast oil reserves and strategic location between Central Europe and the Black Sea make it an important player in the balance of power. However, the country is now under pressure from all sides, with Soviet claims from the east, Hungarian revisionism from the west, and German economic dominance creeping deeper into its industries. By promising to defend Romanian sovereignty, we could secure a friendly, independent nation in southeastern Europe and keep its resources from fuelling other war machines."
 ENG_Pledge_to_Protect_Yugoslavian_Sovereignty: "Pledge to Protect Yugoslavian Sovereignty"
 ENG_Pledge_to_Protect_Yugoslavian_Sovereignty_desc: "Yugoslavia is a fragile federation, surrounded by ambitious neighbours. To the north, Germany is looking for trade routes; to the south, Italy wants the Adriatic coast; and to the east, the Balkans are fraught with tension. Our pledge to defend Yugoslavian sovereignty serves as both a warning and a reassurance, indicating that the region's independence will not be determined by foreign powers. By extending diplomatic and military guarantees, we could strengthen Belgrade's moderates and keep Yugoslavia from falling under foreign control."
 ENG_Pledge_to_Protect_Belgian_Sovereignty: "Pledge to Protect Belgian Sovereignty"
 ENG_Pledge_to_Protect_Belgian_Sovereignty_desc: "The memory of 1914 is still vivid in British minds. Belgium is once again caught between larger powers, its neutrality threatened by Germany's growing ambitions. By reaffirming our commitment to defend Belgian sovereignty, we honour the same principle that drew Britain into the Great War. The Low Countries remain the gateway to France and the Western Front, and their independence is critical to Europe's defence. This guarantee is both symbolic and practical, as any attack on Belgium will be interpreted as an attack on Britain itself."
 ENG_Pledge_to_Protect_Dutch_Sovereignty: "Pledge to Protect Dutch Sovereignty"
 ENG_Pledge_to_Protect_Dutch_Sovereignty_desc: "The Netherlands, with its tradition of neutrality, is now facing a growing threat of German aggression. Its ports, airfields, and proximity to the North Sea make it too tempting for expansionists to pass up. Our pledge to uphold Dutch sovereignty serves as deterrence, promising that any violation of the Low Countries will result in immediate consequences. The Dutch may wish to avoid the impending storm, but their fate is inextricably linked to Europe's. Should the Reich's armies cross their borders, British guns will be close behind."
 ENG_Pledge_to_Protect_Swedish_Sovereignty: "Pledge to Protect Swedish Sovereignty"
 ENG_Pledge_to_Protect_Swedish_Sovereignty_desc: "Sweden's neutrality and industrial capacity make it a key component of northern Europe's stability. Its iron ore shipments are critical to the continental balance, and everyone recognises their strategic importance. Though Stockholm may prefer to remain neutral, defending its borders indirectly protects the North Sea and Arctic convoys that supply Britain's war effort. By defending Sweden's freedom, we preserve an important buffer zone between the Reich and the northern seas."
 ENG_Pledge_to_Protect_Norwegian_Sovereignty: "Pledge to Protect Norwegian Sovereignty"
 ENG_Pledge_to_Protect_Norwegian_Sovereignty_desc: "Norway's long coastline, deep fjords, and proximity to the North Atlantic make it a valuable strategic asset for any major power. If Germany seizes Norway, it will gain access to vital naval bases, threatening our northern approaches as well as the Atlantic convoys' lifeline. By promising to defend Norwegian sovereignty, we will declare that the defence of Scandinavia is linked to the defence of the Isles themselves. Our fleets will patrol the Norwegian Sea, our airmen will monitor its skies, and our diplomats will remind Oslo that Britain is ready to assist in its defence."

