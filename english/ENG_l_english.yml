 ENG_Emergency_Rearmament: "Emergency Rearmament"
 ENG_Emergency_Rearmament_desc: "We have long hoped for a peaceful solution to mainland Europe's mounting problems, and they are now in a major war for the second time in a century. But there's a problem: as we recount our factories and the armies we supply, we discover that they are severely lacking. Nobody expected such a dramatic turn of events, so our weapons stockpiles are nearly nonexistent - and as a result, we have announced an emergency rearmament policy to address this. New military factories and weapons will be built across the Empire at a rapid pace, and the British Lion will show that it will not be outmatched."

 ENG_Fledgling_MI5_Programme: "Fledgling MI5 Programme"
 ENG_Fledgling_MI5_Programme_desc: "The United Kingdom's history of unified spy agencies is still relatively recent, dating back only to 1873, when the War Office established the Intelligence Branch. Since then, we have significantly increased our efforts in this field. Military Intelligence Section 5, is one of our newer offices, which grew exponentially during the Great War, expanding beyond their advertised powers of locating enemy spies to take on a variety of other responsibilities. However, their budget was cut after Versailles, and they have remained a shell of their wartime prowess ever since.\n\nWith the great radical powers returning to war and hostility, this counter-intelligence force may find a new purpose.  We've started expanding the agency again in the hopes it'll have as much luck and skill fighting the Führer's spies as it did fighting the Kaiser's."

 ENG_MI5: "MI5"
 ENG_MI5_desc: "The Security Service, also known as MI5, is our primary deterrent to espionage, subversion, and domestic threats to national security. Its mission is to protect the realm from enemy agents and saboteurs, which it accomplishes through an extensive network of informants, cryptographers, and counter-intelligence personnel who work tirelessly to uncover hostile plots before they take shape. Its close collaboration with other branches of government ensures that critical intelligence is shared quickly, allowing us to respond decisively in times of crisis."

 ENG_Sterling_Area: "The Sterling Area"

## Normal Ideas
 ENG_SAS: "Special Air Service"
 ENG_SAS_desc: "The Special Air Service, formed by a cadre of Britain's most daring volunteers, represents a new type of warfare that results in swift, silent, and ruthless operations. This department operates deep behind enemy lines, destroying airfields, ambushing convoys, and disappearing before the alarm can be raised. Their missions are secretly planned and meticulously carried out, with the goal of sowing uncertainty and panic long after the initial impact. Wherever the adversary least expects them, Special Air Service wings are already in the skies, descending to shatter the illusion of security and warn all who oppose us that there is no place safe from British control."
 ENG_TORPEX: "TORPEX"
 ENG_TORPEX_desc: "The TORPEX, developed in secret by Britain's top scientists, is a revolutionary explosive that outperforms TNT in terms of both power and efficiency. It is intended for both naval and aerial applications, delivering devastating underwater shockwaves as well as crushing force from above. Each detonation increases the range of our bombers and torpedoes, resulting in unparalleled precision and ferocity. Our crews use the TORPEX to transform every attack into a demonstration of British ingenuity and determination to dominate the seas and skies."
