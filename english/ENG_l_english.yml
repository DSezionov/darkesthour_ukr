 ENG_The_Kings_Presence: "The [ENG.leader_title_two]'s Presence"
 ENG_The_Kings_Presence_desc: ""
 
 ENG_Adress_Commonwealth_Leaders: "Address Commonwealth Leaders"
 ENG_Adress_Commonwealth_Leaders_desc: ""
 
 ENG_Donation_From_the_Commonwealth: "Donation From the Commonwealth"
 ENG_Donation_From_the_Commonwealth_desc: ""
 
 ENG_Reduction_of_Colonial_Autonomy: "Reduction of Colonial Autonomy"
 ENG_Reduction_of_Colonial_Autonomy_desc: ""
 
 ENG_Speech_Against_Fascism: "Speech Against Fascism"
 ENG_Speech_Against_Fascism_desc: "Fascism - an evil that looms ominously over our beautiful British hills, threatening a regime of oppression, tyranny, and evil. It is time to make a public acknowledgment of our resolve against it.\n\nOur Prime Minister, Stanley Baldwin, will stand and make a speech, outlining the terrible effects of a fascist dictatorship, and targeting Italy as a primary example. Mussolini's seizure of power in Italy is only an early demonstration of its violent properties, with foes to his iron fist eliminated without question. Italy has become a dangerous place to live.\n\nNow, larger groups of fascist radicals gather in nations like the Spain, Austria, and Germany. Should the British Empire stand passive against this threat, there will be destructive consequences. Baldwin's speech will serve well in informing the general populace of this evil that cannot be ignored."
 
 ENG_Baldwins_Rearmament: "Baldwin's Re-Armament"
 ENG_Baldwins_Rearmament_desc: "Despite rising tensions in Europe and Asia, rearmament is still incredibly unpopular among the British public. The Peace Ballot has shown that the people prefer economic sanctions and diplomatic action through the League of Nations over armed conflict. The Labour-led opposition and its leader, Clement Atlee, also strongly oppose any effort to expand the armed forces.\n\nThe Royal Air Force, in particular, has fallen behind its continental counterparts; intelligence suggests the German Luftwaffe will soon be superior to the RAF both in numbers and in aircraft production capacity. Despite its unpopularity, at least limited rearmament is necessary for the nation's defense.\n\nThe Air Ministry suggests building aircraft manufacturing facilities 'in the shadow' of existing automobile factories, allowing them to draw on existing engineering expertise. Additionally, should the worst come to pass, automobile production lines can be converted to build aircraft instead."
 
 ENG_WW1_Debt_Relief: "Great War Debt Relief"
 ENG_WW1_Debt_Relief_desc: "During the Great War, the British government borrowed vast sums of money, at first from American banks and later from the American government itself to finance our war effort. From 1914 to 1919, the national debt increased a hundredfold, and by the 1920s, HM Treasury was spending more on repaying the Americans than funding our armed forces. Despite this somewhat embarrassing state of affairs, we were slowly repaying our loans, and it seemed we would eventually square our debt with the Americans.\n\nUnfortunately, the Wall Street Crash of 1929 and the Great Depression that followed made continued payments impossible. Recognizing this, President Hoover granted a one-year suspension of all war loan payments in 1931, but it wasn't enough for us to get back on our feet.\n\nLike so many debtors, we will have to ask for more time. HM Treasury suggests that we ask the Americans for another suspension of payment until the economy recovers."
 
 ENG_Resignation_of_Baldwin: "Resignation of Baldwin"
 ENG_Resignation_of_Baldwin_desc: ""
 
 ENG_Home_Defence: "Home Defense"
 ENG_Home_Defence_desc: "The Home Isles are the base of power within our global empire, and the home to millions of British people, our people. We as a government have an obligation to prevent a foreign invader from taking one step on British soil, and a duty to protect our people's home and culture from destruction. In line with this responsibility to our people and our empire, we shall turn our island into a fortress, using the most modern radar, anti-air, coastal fortifications and strategies to prevent the dreaded nightmare that is the enemy on our streets."
 
 ENG_Peace_in_our_Time: "Peace in our Time"
 ENG_Peace_in_our_Time_desc: "An entire generation of our youth was destroyed in the Great War. We were victorious in nothing but name. Britain cannot last without its children. An army cannot last without its soldiers.\n\nWhat must follow are steps to ensure that a war does not break out. We are hard-pressed on all sides by wolves and sharks, preying on the weakness that came after the Great War. Thousands of years of culture and heritage on this steadfast island must stand.\n\nEven if it means we have to play as the 'coward' for once in the vast history of this empire. Members of the current government believe the horrors enacted on Germany by the Treaty of Versailles were overly harsh, and suggest we sit back and watch as the Reich recovers. From there, we can see their true intentions. The doctrine of appeasement is being contemplated as our new foreign policy to the enemies that plague us. Victory must come over pride. Without victory, there is no survival.\n\nPerhaps it would be wise to wait cautiously, for now, preserving the status quo. If we must fight war, it will not be today. Today, we celebrate Peace in Our Time!"
 
 ENG_Peace_in_our_Time_2: "Peace in our Time?"
 ENG_Peace_in_our_Time_2_desc: "The British people have never relished war, and the terrible losses of the Great War have made the prospect of armed conflict even more unpopular. The public responds to even the slightest rearmament with charges of warmongering and rampant jingoism- they demand that we placate the tiger with a bowl of milk.\n\nWar is to be avoided, yes- but not at any cost. Someday, the price of peace may be too high; and when that day comes, we must be ready to fight for it. Britain will not give up all she bled for with the stroke of a diplomat's pen.\n\nWhile we will spare no effort to find a peaceful solution to the crises that threaten the international order we built in Paris, none shall forget Britain paid for that order in blood. Should it be necessary, we will fight once more to protect the peace."
 
 ENG_Allow_for_Full_Rearmament: "Allow for Full Re-Armament"
 ENG_Allow_for_Full_Rearmament_desc: "Ever since the Great War, rearmament has always been a divisive issue, but considering the current events on the world stage, we must begin to fully rearm. These efforts will not be to wage war but to act as a safety net in case our attempts at a diplomatic solution do not succeed. Our empire is vast, and the full rearmament of our armed forces will require much time, but with the massive amount of resources at our disposal, and proper coordination, we can surely prepare [ENG.address_leader_two]'s Armed Forces in time for the potential major conflict on the horizon."
 
 ENG_Starve_the_Germans: "Starve the Germans"
 ENG_Starve_the_Germans_desc: "Our victory in the Great War was not easily earned, for every day presented crucial decisions for the British Military High Command to make. One particular strategy was undeniably effective. The North Sea Blockade brought the war a milestone closer to its end, one missing shipment for Germany at a time. We starved the German populace into surrender.\n\nNow that tensions with Germany are arising once more, we may need to starve them again. Most crucial to the completion of this mission is to choke out the sources of their resources. Namely, Sweden and Romania. These two nations pose a grave threat to us should they trade with Germany during a prospective conflict. Sweden can provide essential tungsten to fund the German war economy, while Romania hosts vast oilfields in Ploiești that may fuel German mobile units and aircraft. Securing their loyalty to the British Empire, and only the British Empire, will be enough of a guarantee of their proper neutrality.\n\nWhatever actions must be taken to preserve this glorious empire will be carried out. If the Germans dare challenge us, we will starve them of their resources!"
 
 ENG_Prepare_for_the_Inevitable: "Prepare for the Inevitable"
 ENG_Prepare_for_the_Inevitable_desc: "Tensions have been rising throughout the world in recent times, with Europe being the main hotspot. We have attempted to maintain the peace through our diplomatic approach, but as war is becoming an ever likelier prospect, we must awaken to the harsh reality that it simply hasn't worked. We must now make the necessary preparations, both at home in the Isles and abroad in our imperial holdings to ensure that we can produce enough of the equipment that our armed forces need in time, allowing them to be as prepared as they can be for the battle that is on the horizon."
 
 ENG_British_Stoicism: "British Stoicism"
 ENG_British_Stoicism_desc: "The tenets of stoicism - self-control, perseverance, and reason - have long been part of the British spirit, and it was on these virtues that we built our nation and empire.\n\nThe ideal of the British gentleman - educated at Oxford and Cambridge, utterly unflappable and dedicated in his duty to [ENG.leader_title_two] and country - has percolated through all layers of British society, inspiring them to keep a stiff upper lip.\n\nNo matter what calamity may befall this rainy island, the British people will keep calm and carry on: for they know no other way."
 
 ENG_War_Selters: "War Shelters"
 ENG_War_Selters_desc: ""
 
 ENG_Military_Training_Act: "Military Training Act"
 ENG_Military_Training_Act_desc: "Some have said that hard times make strong men- but the Great War showed us that hard times also break them. Young men have grown up seeing the horrors of war in the eyes of their fathers, uncles, and brothers, and have no desire to experience those same hardships themselves.\n\nUnfortunately, it seems they may have no choice.\n\nAs the international situation continues to deteriorate, our armed forces are face a severe shortage of personnel and are woefully unprepared for another European war. While voters would never accept peacetime conscription, mandating that men aged 20 to 21 years old undergo six months of basic military training will at least shorten the time needed to integrate them into our reserves, should the need arise."
 
 ENG_The_Kings_Speech: "The [ENG.leader_title_two]'s Speech"
 ENG_The_Kings_Speech_desc: ""
 
 ENG_Request_US_Aid: "Request US Aid"
 ENG_Request_US_Aid_desc: ""
 
 ENG_Blood_Toil_Tears_and_Sweat: "Blood, Toil, Tears and Sweat"
 ENG_Blood_Toil_Tears_and_Sweat_desc: "Loyalty, wisdom, toughness. All characteristics of Winston Churchill. War calls for these characteristics, those who do not have loyalty, betray their country at the loss of countless lives. Those, who do not have wisdom, made rash decisions. Those who do not have toughness, give up easily.\n\nNeville Chamberlain, a diplomatic coward, was a man to hope things all worked out. He was scared of everything, and thus he agreed on anything the Germans wanted. The British soon saw what Chamberlain really was – a weakling. Churchill has promised to be a better and stronger Prime Minister, and so far, has lived up to it. Instead of hoping war wouldn't demolish Britain,  like Chamberlain, he makes sure that it doesn't happen. Churchill has proven to be a strong man. While some people may chicken out like Chamberlain, Churchill stands up for his people. While Chamberlain signs treaties with Germany, Churchill fights back for the right things. This is a man that Britain always needed. Now, he has arrived. A saviour to admire, a man to praise."
 
 ENG_Global_Intervention: "Global Intervention"
 ENG_Global_Intervention_desc: ""
 
 ENG_Global_Defense_Shakeup: "Global Defense Shakeup"
 ENG_Global_Defense_Shakeup_desc: ""
 
 ENG_Defense_of_the_Suez: "Defense of the Suez"
 ENG_Defense_of_the_Suez_desc: ""
 
 ENG_Safeguard_Asian_Trade: "Safeguard Asian Trade"
 ENG_Safeguard_Asian_Trade_desc: ""
 
 ENG_Alexandrian_Naval_Bases: "Alexandrian Naval Bases"
 ENG_Alexandrian_Naval_Bases_desc: ""
 
 ENG_Sub_Saharan_Investment: "Sub-Saharan Investment"
 ENG_Sub_Saharan_Investment_desc: "While Canada, India and Australia take up the majority of our focus when it comes to developing our imperial territories, Africa has been to a degree, left neglected. This is a foolish mistake. Our holdings on the continent, with their abundant resources have the potential to become just as useful to the empire as our other, more established colonies. We have already begun laying the foundations of exploiting this potential by constructing the infrastructure necessary for further expansion.\n\nThe monetary cost of making these investments in Sub-Saharan Africa will be considerable, but being able to fulfill the potential for industrial growth in these rather untapped regions will more than make up for it in the long run."
 
 ENG_Nigerian_Oil_Exploration: "Nigerian Oil Exploration"
 ENG_Nigerian_Oil_Exploration_desc: "Ever since the Great War, oil has become just as important as coal for civilian, industrial and military life. Regions such as the Middle East and the East indies possess oil in great abundance, and its occupants are making a fortune. Despite having access to some of the world's oil reserves we need to secure more for our growing industries and military. Thankfully, on the night prior to the war, we discovered some of this ‘black gold' in Nigeria. It is a shame that we haven't gotten around to it yet, but investing in this area could provide us with enough oil to satisfy our growing appetite."
 
 ENG_Commonwealth_Divisions: "Commonwealth Divisions"
 ENG_Commonwealth_Divisions_desc: "The tide of nations that seek to destroy Britannia grows ever stronger. Their armies stand ready to surge forward and destroy our brave boys from London to Lothian. Whilst our boys may be tough and determined, there aren't enough of them. That is why we shall announce the forming of Commonwealth divisions. These divisions shall form the backbone of the Commonwealth contribution to the war, with young men from South Africa and New Zealand standing with their friends across the waves, along with countless others. Our dominions can and will support us in any way we can, and what better way to support the mother country with five divisions worth of soldiers?"
 
 ENG_Indian_Railways: "Indian Railways"
 ENG_Indian_Railways_desc: "India is referred to as a subcontinent. And as that name suggests, the size of India is vast. It is also safe to say that railroads in India, while existing, have been behind the times compared to the railways on Albion. This is, frankly, unacceptable. The resources and manpower of India require a great amount of movement and infrastructure, if we ever need to mobilize in times of emergency and harness it's great power.\n\nTherefore to make sure we can supply any troops in the Indian region, as well as move any troops around the vast sub-continent, we need to invest time into building both new and better railway lines. Without this, the resources of India will be un-used in this most vital time."
 
 ENG_The_Burma_Road: "The Burma Road"
 ENG_The_Burma_Road_desc: ""
 
 ENG_The_Singapore_Strategy: "The Singapore Strategy"
 ENG_The_Singapore_Strategy_desc: "The Japanese Empire, fresh from its recent conquests in Asia, now look hungrily at the European colonies in South East Asia, ripe with resources and poorly defended. Our colony of Malaya is as vulnerable as the Dutch East Indies, and loss of our bastion of Singapore, the Gibraltar of the East, would be a deadly blow, both to morale and to Australia. Our Antipodean dominions would be open to attack from the Japanese menace, and this simply cannot be allowed to occur. Singapore must be fortified and reinforced to the best of our ability. Fresh divisions shall be loaded onto transports bound for the Far East, squadrons of Hurricanes shall be sent to Singapore, and the mighty Royal Navy, aided by our valiant Australian allies, shall defend the seaward approaches to the island fortress to the death."
 
 ENG_Oriental_Bulwark: "Oriental Bulwark"
 ENG_Oriental_Bulwark_desc: "Singapore is an extremely important port and city for the British, being a linchpin for our holdings in the Pacific. To reflect this, the Empire built forts around the island, making the city almost impregnable. Yet there was a recent suggestion put forth in a cabinet meeting, insinuating that the fortifications only point seawards and therefore Singapore is very much open to attack from Malaysia proper.\n\nOf course this suggestion was met with open laughter. As if there are any threats from the land. But as time has gone on, many of the cabinet have started to come around to this idea, and perhaps it would be wise to set up some fortifications on land and attempt to protect Singapore to the North. It may be a waste of time and effort, but perhaps being able to sleep safer knowing we did our bit, just to be sure, might make it worth it."
 
 ENG_British_Saharan_Minerals_Company: "British Saharan Minerals Company"
 ENG_British_Saharan_Minerals_Company_desc: "One thing we have learnt from our global empire is just how difficult and dangerous some lands can be. None more so than the Saharan Desert. The French may have most of this vast desert under their control but Britain has her own stake in this land. Yet, we have also learnt that in lands of great danger come great reward. To call the Sahara ‘a wasteland' would be a grave mistake and an ignorant one.\n\nSome early findings suggest that there are vast quantities of metal within the desert sands. We should explore this more, as we can never have enough materials. We do not believe that the cost would be too great, but we do expect it to take some time to complete the prospecting as well setting up all the necessary infrastructure for such an undertaking as proposed."

 ENG_Backroom_Reconciliation: "Backroom Reconciliation"
 ENG_Backroom_Reconciliation_desc: "Ramsay MacDonald, our Prime Minister, was expelled from the Labour Party in 1931, following the formation of the National Government. It was alleged that he betrayed the party's ideals by agreeing to lead a coalition government in which the conservative party held the majority. However, as his health deteriorates and his ability to perform his duties as Prime Minister worsens, it may be best for him to quietly reconcile with the Labour Party.\n\nFor a time, he delegated many important tasks to the Lord President of the Privy Council, Stanley Baldwin, but Baldwin's growing influence may eventually lead to him becoming Prime Minister and a fully conservative government returning to power. We'll agree to let MacDonald return to Labour and begin increasing Labour's influence in national government, lest Baldwin take over the entire thing."

 ENG_Continue_Delegating_to_Baldwin: "Continue Delegating to Baldwin"
 ENG_Continue_Delegating_to_Baldwin_desc: "On the 12th of October 1933, Prime Minister Ramsay MacDonald will celebrate his 67th birthday. Unfortunately, his work continues to grow while his health declines in the opposite direction. The only idea we can submit to help MacDonald reduce his stress is to delegate some duties to other cabinet members. The Prime Minister has many duties, from nominating other ministers to assist in international conferences, to attending to the national politics of our nations. And even if some choices, like the nomination of ministers, can be refused or disputed by [ENG.address_leader_two] [ENG.leader_name_two], most of the time he finds a way to get the job done.\n\nFollowing the idea of sharing his charges, the aging PM submitted the names of two ministers he trusts: the Lord President of the Council, Stanley Baldwin, and the Chancellor of the Exchequer, Neville Chamberlain."

 ENG_Monitor_Mosley: "Monitor Mosley"
 ENG_Monitor_Mosley_desc: "Mr. Oswald Mosley: The man that continues to be a thorn in our side with his fascist ideals and his ever-growing \"British Union of Fascists.\" While it would be nice to ignore such a man, it's clear we can't push him to the side like normal. His fringe fascist party is growing larger, his marches are becoming more violent, and his speeches are increasingly bold. We could outright arrest him, but such a drastic measure too early could be problematic. Instead, MI5 has informed us that they could monitor Mosely closely through listening devices and spies in the BUF, making sure he isn't plotting anything dangerous against the government or the country. Doing this will keep him in check, and provide evidence if we are pushed to make a conviction. In other words, let him dig his own grave."

 ENG_Detain_Mosley: "Detain Mosley"
 ENG_Detain_Mosley_desc: "Mr. Oswald Mosley: the man that continues to be a thorn in our side with his fascist ideals and his ever-growing \"British Union of Fascists.\" While it would be nice to ignore such a man, it's clear we can't push him to the side like normal. His fringe fascist party is growing larger, his marches are becoming more violent, and his speeches are increasingly bold. The people should not have to listen to this buffoon any longer, especially before he becomes more politically prominent. The MI5 has suggested we take a passive form of action with listening devices, but it's clear we should tell the MI5 to plan to outright detain this fascist, whether or not there are aftershocks. England is for democracy, not a Mussolini want-to-be."

 ENG_Urgent_Unemployment_Relief: "Urgent Unemployment Relief"
 ENG_Urgent_Unemployment_Relief_desc: "One of the greatest ailments of the Great Depression continues to weaken the British people: unemployment. We have tried to make improvements in the past few years, but it still hasn't been enough. Three million workers are still unemployed, a record high in our island's history, and in some areas, the unemployment rates have hit 70%. We have to issue urgent relief to the jobless to keep them on their feet, and hopefully, we can keep the worst of the depression at bay. It's the least we can do to help those struggling to eat another day."

 ENG_Start_Up_the_National_Grid: "Start Up the National Grid"
 ENG_Start_Up_the_National_Grid_desc: "Intended to link all of Great Britain in one integrated power system, the National Grid has, at present, fallen short of these lofty goals. Where the Central Electricity Board envisioned a single grid serving the entire nation,  a series of regional grids exist with little interconnectivity between them. \n\nFortunately, bringing the project in line with its original objectives will be a relatively simple matter of constructing additional pylons and retooling existing connections during low-usage hours. Unifying the National Grid will allow more homes and businesses access to electricity and all the modern conveniences it brings, making the Kingdom a bit more United."

 ENG_Rescue_the_North: "Rescue the North"
 ENG_Rescue_the_North_desc: "If the depression hit the hardest anywhere in the United Kingdom, it would have to be North England. The biggest industries, such as shipbuilding and textile factories, have rapidly been closing and slowing production. In effect, hundreds of thousands have lost their jobs, homelessness rates are skyrocketing, slums are forming in the big cities, and thousands are going hungry. We need to issue drastic relief measures to help the people, and reignite the once-booming industry to get people working again."

 ENG_Construct_New_Motorways: "Construct New Motorways"
 ENG_Construct_New_Motorways_desc: "Motor Vehicles. What was thought to be a luxury item is now, more than ever, an item almost anyone in the middle class can now afford. The new mass-production methods in car factories have made building cars easier than ever before. But, as more cars hit the roads, there isn't much road travel. To fix this, we believe it's best to construct new motorways in high-density areas. And better yet, we will employ those previously jobless due to the economic depression to build them. This way, we can knock down unemployment, and strengthen our motor infrastructure."

 ENG_Stimulate_Southern_Growth: "Stimulate Southern Growth"
 ENG_Stimulate_Southern_Growth_desc: "Oddly enough, the South of England currently has been much better off compared to the North of England and Scotland economically. When the depression first hit, unemployment hit as high as 13.5%, but after the abandoning of the gold standard in 1931, interest rates plummeted, and a new housing boom has started in London and the surrounding areas. Around 200,000 houses are being built every year, and this has welcomed new industries into the area. Electrical companies are producing large amounts of electricity for the new houses, mass production methods have brought new products for the middle class, and the motor industry has boomed with the growing population. This potential has now been realized, and we should continue to stimulate new growth."

 ENG_Keep_Textiles_Afloat: "Keep Textiles Afloat"
 ENG_Keep_Textiles_Afloat_desc: "Since the Industrial Revolution in Britain, the textile industry has been an important player in the British economy. Textile production has led to industrial and scientific advancements in the coal and iron industries, which boosted raw material imports and improved transportation. These combined made Britain a global leader in trade, science, and industry. However, the demand for textiles has plummeted since the Great Depression, leading to a complete halt in the industry. To keep our economy growing, and jobs opening, we need to assist the textile industry through subsidies, mainly in Lancashire and Manchester, where textile factories are most prominent. This way, textile companies can profit more and continue to stay open."

 ENG_Relief_for_Coal_and_Steel: "Relief for Coal and Steel"
 ENG_Relief_for_Coal_and_Steel_desc: "Coal and steel have been a trademark of heavy British industry since the Industrial Revolution. From the times of the Roman Empire to the smoggy smoke stacks of London, coal has played an essential role in building the British economy for centuries. Steel, while relatively a newer product compared to coal, has built up our grand cities, inventions, and the many homes our families live in today. But not even these two super giants of the industry could be saved from the depression's wrath. British shipbuilding, which uses coal and steel extensively, ground to a halt due to limited demand and funds, and as the ports slowed, the mines and factories closed as well due to a drop in demand. To stop this chain reaction, we'll provide coal and steel companies with subsidies and loans to make sure they stay open."

 ENG_Investigate_Range_and_Direction_Finding: "Investigate Range and Direction Finding"
 ENG_Investigate_Range_and_Direction_Finding_desc: "What if there was a way for radio to alert the military that bombers or fighters were approaching? What might sound like something from a science fiction book has recently become reality, and is known as Radio Direction Finding. The Royal Air Force first experimented with the idea to create a so-called electromagnetic “death ray” to destroy enemy bombers. While the National Physical Laboratory's Radio Department has proven this to be impractical due to its energy requirements, scientist Watson Watt has pointed out that it could be possible to detect them with EMF radiation. Our RAF commanders have convinced the Air Ministry to O.K. the development of new RDF radio towers, but they have one condition: it can't interfere with grouse hunting. Our government should support this new technology, as it could be vital in wartime."

 ENG_Capitalise_On_the_Housing_Boom: "Capitalise on the Housing Boom"
 ENG_Capitalise_On_the_Housing_Boom_desc: "Something strange is happening in London. While the rest of the world is still reeling from the impacts of the Great Depression, a new housing boom has started in London, and the economy is flourishing there as a result. Why? Since 1931, after we dropped the gold standard, interest rates plummeted, resulting in high demand for more housing. The London population has soared, and new industries are popping up to meet their needs. To help bring Britain out of the Great Depression, we should capitalize on this housing boom to create more income."

 ENG_Foster_the_Electrical_Industry: "Foster the Electrical Industry"
 ENG_Foster_the_Electrical_Industry_desc: "As a result of the housing boom in London, a new resource is in high demand: electricity. As housing and factories continue to be built, the need for electricity grows. Not only do they have the potential to make a profit off the new buildings, but also electronics, with mass production methods allowing the electrical industry to start producing household electronics, such as radios and cooking appliances, at a fair price. If we are to truly take the electronic industry to the national stage, we need to foster it until it can stand on its own"

 ENG_British_Shipbuilding_Loans: "British Shipbuilding Loans"
 ENG_British_Shipbuilding_Loans_desc: "Britannia rules the waves... but without ships being built, the phrase is more of an empty promise. Shipbuilding across the North of England has slowed dramatically due to lower demands from the Great Depression, and as the ship-building sector falters, so do the coal and steel sectors. Without ships being built, there's no need for coal to run them, and there's no need for steel to build them, creating a chain reaction that's plummeting both industries into the ground. To fix this, we need to stimulate the ports once more through loans. This way, ships are being built, demand for coal and steel goes up, and people get their jobs back."

 ENG_Bring_Up_Indian_Autonomy: "Bring Up Indian Autonomy"
 ENG_Bring_Up_Indian_Autonomy_desc: "The Indians have increasingly been demanding a larger say in the British Raj. Since the Great War, in which the Indian people participated vigorously in, the Indians believe that they have sacrificed much of their blood for the Commonwealth, and rightfully deserve to have more autonomy. Now is the time to bring up the issue of Indian Autonomy to Parliament by drafting a white paper on how an autonomous India might look like. While we don't expect it to go anywhere pass a draft, we can at least address the issue, and remember what the Indian people have sacrificed for us."

 ENG_Raise_Tariffs_on_Imports: "Raise Tariffs on Imports"
 ENG_Raise_Tariffs_on_Imports_desc: "Drastic times call for drastic measures. While tariffs have always had a bad tune associated with them, the economics are simple: imported goods will cost more, and our goods will cost less. In theory, this will boost our economy and promote manufacturing in our country, rather than somewhere else. It can be a dice roll, however. Sometimes businesses will decrease trading altogether when tariffs are raised, resulting in even lower profits than before. But Britain's trade economy, while wounded right now, is vital to many countries around the globe, and it won't hurt to raise the normal tariff prices a little higher to generate more income. In the end, the faster England gets back on her feet, the better for everyone."

 ENG_Invest_in_Greater_London: "Invest in Greater London"
 ENG_Invest_in_Greater_London_desc: "Even in the midst of the Great Depression, London still manages to thrive. With the new housing boom, the middle class is growing, more industries are coming in, and joblessness is falling. Greater London is where many of these new houses are being built. The counties Greater London is made up of, named “Home Counties,” are a great opportunity to help strengthen the British economy, and by investing in Greater London, we can help guarantee continued growth, more jobs, and more homes. In return, more industries will settle in London, and the economy will grow exponentially."

 ENG_Resignation_of_Ramsay: "Resignation of Ramsay"
 ENG_Resignation_of_Ramsay_desc: "The day that everyone knew would come is now here. Ramsay MacDonald's health has been rapidly declining since 1933, both mentally and physically. Members of parliament now have no idea what he will say during parliament speeches as his words have become incoherent enough that no one can understand him. It's clear to the government and the people that Macdonald can't administer his duties as Prime Minister. MacDonald himself is no exception. He and The Lord President of the Council, Stanley Baldwin, have enacted a timetable to switch places after King George's Silver Jubilee. Macdonald will resign and become President of the Council, then Baldwin will become Prime Minister. Baldwin has already been delegating many of MacDonald's duties at this point, but with the creator of the National Government now gone, Baldwin steadies a ship into uncharted waters."

 ### Stanley Baldwin's National Government 1935
 ENG_Uncle_Stanley: "Uncle Stanley"
 ENG_Uncle_Stanley_desc: "Ramsay MacDonald has chosen Stanley Balwin to be his successor in the National Government. Baldwin, a Conservative Party member, will undoubtedly do things differently than his predecessor, but he is committed to steering the ship as European politics enter uncertain waters.\n\nBaldwin already has a lot on his plate, such as continuing to help Britain recover from the Great Depression and attempting to maintain the fragile peace that has existed since the end of World War I. When the going gets tough, the tough get going, and Stanley Baldwin is the man we need to get us back on track."

 ENG_Balancing_the_Scales: "Balancing the Scales"
 ENG_Balancing_the_Scales_desc: "Prior to the Great War, we were engaged in a naval arms race with the German Empire, which we eventually won. We learned a lot from it, one of which is that something like that should never happen again. Expansion of an already large navy is not only an expensive endeavour, but it also does nothing to reduce global tensions. That is why we have been locked in talks with the Germans in the hopes of reaching an agreement to sign a new treaty.\n\nThe Germans want a new and powerful navy because their previous one was largely dismantled after World War I, which they see as a stain on their national reputation. While we certainly do not want another potential adversary to build a large navy, perhaps we can reach an agreement to ensure that we both respect each other's wishes."

 ENG_The_Conservative_Grandee: "The Conservative Grandee"
 ENG_The_Conservative_Grandee_desc: "Stanley Baldwin, MP for Bewdley and current prime minister of the United Kingdom, has been a dominant force in British politics since the end of the Great War. Having served as their PM on two previous occasions, Baldwin has enjoyed significant influence over the Conservative party since the 1920s- but it was during his time as leader of the opposition that he began the process of reshaping and reforming the party.\n\nFrom 1929 to 1931, Baldwin massively overhauled party structure and policy, professionalizing the ranks of party functionaries and embracing the utility of modern mass media such as film, radio, and television. Under Baldwin's leadership, the Tories have shifted slightly to the left, accepting the welfare state and entering a coalition with Ramsay MacDonald's Labour government. Despite this, the party has maintained its historical ties to industry, the aristocracy, and armed forces, granting them considerable political capital."

 ENG_The_Commitment_to_Peace: "The Commitment to Peace"
 ENG_The_Commitment_to_Peace_desc: "The Great War was a tragedy to both Britain and its people, a tragedy which shook our Empire to the core and left many scars and traumas, which to this day still haven't healed. As a government, we must ensure that Britain, must stay committed to Peace in Europe and the World, lest we lose another generation in a conflict summoned by more hawkish nations.\nWhile the recent upheaval in the World will certainly makes this a difficult task, we will stay on the right track, never giving up on our quest to steer Europe away from another catastrophe. And even if we fail, let the history books say that it was not for a lack of trying!"

 ENG_Renew_the_National_Mandate: "Renew the National Mandate"
 ENG_Renew_the_National_Mandate_desc: "The last election was four years ago, and a lot has changed in that time. The National Government was formed in 1931 to unite our nation's political parties in the hope that we could all work together to fix this terrible mess we're in. Now that we are in a much better political and economic position, we can begin to consider what steps we should take as a nation.\n\nThe Great Depression continues to loom over the United Kingdom, so perhaps it is best to ask what the British people expect from us and whether they believe the National Government is working for them. Allow the campaigning to begin!"

 ENG_Special_Areas_Investment: "Special Areas Investment"
 ENG_Special_Areas_Investment_desc: "The Special Areas Act of 1934 enabled us to identify high-unemployment areas across the country that urgently require additional funding. The south of Scotland, as well as the north of England and Wales, are among these locations.\n\nWe should not waste time in directing more funding to these areas, and perhaps some can also go to deprived areas of the capital. The more we invest in these areas, the faster people will be able to find new jobs, which will not only reward us with a stronger economy, but may even result in their vote in the next election."

 ENG_An_Unfair_Treaty: "An Unfair Treaty"
 ENG_An_Unfair_Treaty_desc: "The Treaty of Versailles remains perhaps the harshest treaty ever inflicted upon a nation. Germany was our enemy in the Great War, yes, but the Austro-Hungarian Empire were the true initiators of that deadly conflict. However, in the end, it is the Germans who suffer untold amounts from this treaty.\nThe German populace now secretly seethes with anger at this unfair treaty. Their desperation to get it abolished leads them to turn and follow radical parties, who promise salvation, without logical reason. The full hatred of the German Reich targets France and the British Empire. It is our responsibility to reach out to Germany and discuss the future of this treaty.\nOur delegation will meet with German representatives in Berlin. A public acknowledgment of the cruelties of this treaty will help the Germans understand our stance on the situation, if only subtly. The German leadership will understand that we will be lenient regarding the requirements of the treaty.\nWe will be closer to the end of the Versailles Treaty. One step closer to maintaining the peace."

 ENG_Prolong_the_Construction_Boom: "Prolong the Construction Boom"
 ENG_Prolong_the_Construction_Boom_desc: "As a result of our efforts to restore and grow the economy to pre-depression levels, the construction industry is busier than ever, with new houses, factories, and roads being built on a daily basis. This benefits both our country and the small man, who desperately needs a job in these difficult times. As a result, by promoting this wave of construction across the country, we can hopefully extend it and strengthen our economy even further.\n\nEvery man requires a job in order to feed himself and his family. It's a no-brainer if we're going to get out of the Great Depression."

 ENG_Faith_In_the_Publics_Civility: "Faith in the Public's Civility"
 ENG_Faith_In_the_Publics_Civility_desc: "While some would like to impose draconian measures through the proposed \"Public Order Act\", we should not lower ourselves to the dictatorial standards that poison mainland Europe. Civil liberties may be restricted as a result of such an act, all because someone does not share our ideology. Britain is a nation of open debate and fairness, and it must remain so.\n\nWe trust the British public to discuss their political views in an orderly and respectful manner, and this must continue if we are to protect our precious democracy, even if some people do have... interesting views."

 ENG_Public_Order_Act: "Public Order Act"
 ENG_Public_Order_Act_desc: "Our democracy is under threat of violence, of violence by the fascist and nationalist forcing their agenda. We are a democracy, and we shall never let something like the political violence Germany suffered during the last decade happen here.\nTo prevent this we shall prohibit organizing, training, or equipping military wings of political parties as well the use of political uniforms, obligating the parties to get police consent for marches and prohibit any form of political agenda violence based advancement.\nThis will safeguard our homeland from becoming an internal battleground and improve public security."

 ENG_No_Great_Armaments: "No \"Great\" Armaments"
 ENG_No_Great_Armaments_desc: "We don't want war, and neither do the British people, who bear the scars of the Great War in their flesh and blood. However, it would be naive to believe that things will not turn sour, and as a result, we must be prepared for any developing situation around the world. As a result, we will ensure that we are producing enough weapons to keep our current army satisfied while not going overboard and appearing to be preparing for all-out war.\n\nThis will ensure that we keep up with the times while also providing jobs, lowering unemployment and boosting our economy. It's a win-win situation for everyone!"

 ENG_Subsidise_Industrial_Development: "Subsidise Industrial Development"
 ENG_Subsidise_Industrial_Development_desc: "Industry in the United Kingdom has done an outstanding job of slowly rebuilding and recovering from the devastation of 1929, but there is still much work to be done. With money being scarce for not only new start-ups but also existing ones that have weathered the storm, it is critical that we demonstrate to them that we are right behind them, supporting them all the way.\n\nAs a result, a new plan has been presented to the Chancellor in the hope of encouraging stronger and faster growth, as well as opening up the possibility for thousands more people to finally get a job and turn those red numbers green."

 ENG_Cut_the_Debt_Interest: "Cut the Debt Interest"
 ENG_Cut_the_Debt_Interest_desc: "One of our objectives at the London Economic Conference in 1933 was to negotiate our debt with the Americans. We bought many weapons and supplies from them during the Great War, and we've been trying to repay them ever since. However, the Great Depression was a slap in the face to our efforts, resulting in a small reduction in our debt because we barely had any money left.\n\nOur negotiators have been hard at work since 1933, and they have finally found a solution. By lowering the debt interest rate, we will be able to pay back a slightly lower amount than before, which will not only strengthen our economic ties with the United States, but will also be extremely beneficial to our own economic struggles."

 ENG_In_the_Shadows: "In the Shadows"
 ENG_In_the_Shadows_desc: "While we have publicly stated that \"no great armaments\" will be used, many in our government are deeply concerned about the possibility of war breaking out on the continent. It's an understandable concern, and we should do a lot more to modernise and refresh our defence industry and armed forces.\n\nThe so-called \"Shadow Scheme\" has been devised to help conduct this in secret, away from the eyes of the public. This will allow us to ramp up the industry and technology required to defend ourselves and the empire from enemy threats. It's not ideal, but we need to get this started as soon as possible. All done in the shadows, of course."

 ENG_Expand_British_Agriculture: "Expand British Agriculture"
 ENG_Expand_British_Agriculture_desc: "Our industrial base, which was the hardest hit of all sectors, has received much of our economic recovery attention. However, we must not overlook the critical role that our farmers play in ensuring the nation's food security. After all, you can't work if you're hungry. With other countries imposing tariffs to protect their own economies, exports from our agriculture sector fell precipitously, with many farms ceasing to exist entirely.\n\nWe hope that by directing some of our attention and money toward British agriculture, we will see a revival of it, and with it, bountiful harvests of Great Britain products once more! These green fields will only get greener!"

 ENG_Honest_Stans_Honest_Successor: "Honest Stan's Honest Successor"
 ENG_Honest_Stans_Honest_Successor_desc: "Following the abdication crisis, Stanley Baldwin has decided to resign. The king, on Baldwin's recommendation, has appointed conservative Neville Chamberlain as Prime Minister. At 68, he is the second-oldest person in the twentieth century to become prime minister for the first time, and he is widely regarded as a caretaker who will lead the Conservative Party until the next election before stepping down in favour of a younger man.\n\nLittle is known about Chamberlain's personality, but he has made annual budget broadcasts for six years in which he appears relaxed and modern, with the ability to speak directly to the camera. Chamberlain has few friends among his parliamentary colleagues, and attempts to socialise with them frequently result in embarrassing silence. Nonetheless, his appointment is expected to restore much-needed stability following the recent crisis and successfully guide the Conservative Party to the next election."
 ENG_Baldwin_Has_Resigned_tt: "§YBaldwin Has Resigned§!"
 ENG_Honest_Stans_Honest_Successor_tt: "§YNeville Chamberlain Will Become Prime Minister and Form a New Cabinet§!"

 ENG_A_Reformist_Reputation: "A Reformist Reputation"
 ENG_A_Reformist_Reputation_desc: "Chamberlain has proposed a series of social reforms aimed at expanding the welfare state. These planned reforms will be announced publicly in an upcoming broadcast, with the hope that they will earn him popular support. Already, he has directed his ministers to develop two-year policy plans. These reports will be integrated with the goal of coordinating the passage of legislation through the current Parliament. Chamberlain's elevation to the premiership will be the pinnacle of his career as a domestic reformer, allowing him to leave his legacy in history."

 ENG_Aim_for_A_Stable_Europe: "Aim For A Stable Europe"
 ENG_Aim_for_A_Stable_Europe_desc: "Chamberlain, like many other Europeans who witnessed the horrors of the Great War and its aftermath, is committed to peace. Chamberlain's theory is that dictatorships emerge when people have grievances and that removing the source of those grievances will make a dictatorship less aggressive. The Treaty of Versailles is the root cause of Adolf Hitler's grievances. We will try to deal with Germany through diplomatic channels and quell any internal dissent, particularly from Churchill, in a new approach dubbed the \"general policy of appeasement\" by Chamberlain himself. With this new approach, we will reconcile Germany and make it a stable partner in a stable Europe. It is common sense that Germany will almost certainly be satisfied with the restoration of some of its colonies."

 ENG_Incentivise_Slum_Clearance: "Incentivise Slum Clearance"
 ENG_Incentivise_Slum_Clearance_desc: "The rapid expansion of housing has been a major success story in recent years, standing in stark contrast to the United States, where new housing construction virtually ceased after 1929. From being the most urbanised country in the world at the end of the Great War, we have seen unprecedented suburban growth, with nearly 4 million new suburban homes built. In light of this, Chamberlain has proposed the Housing Act of 1938, which aims to encourage slum clearance while maintaining rent control. It will require local governments to conduct a housing needs assessment and begin building houses to replace slums, with the treasury subsidising low rents."

 ENG_The_Betterment_of_Factory_Life: "The Betterment of Factory Life"
 ENG_The_Betterment_of_Factory_Life_desc: "Prime Minister Chamberlain has introduced the Factories Act of 1937. This Act aims to improve working conditions in factories and limit the working hours of women and children. The Factories Act of 1937 consolidates and amends the Factory and Workshop Acts of 1901 to 1929, which raised the minimum working age to 12 and established legislation governing children's education, meal times, and fire escapes.\n\nThe regulatory system, which began with the protection of a small class of pauper apprentices in textile mills, now encompasses all manual workers in every manufacturing industry. From working hours and sanitation, the law has expanded to include the age of employment, accident protection, mealtimes and holidays, remuneration methods, and wage rates themselves. The scope of Factory Legislation has expanded to encompass the conditions of industrial employment. No class of manual-working wage earners, no item in the wage contract, no age, no gender, no trade or occupation is now outside its purview. Furthermore, plans for another major law, aimed at giving workers a week off with pay, are already being developed."

 ENG_Continue_Cautious_Rearmament: "Continue Cautious Rearmament "
 ENG_Continue_Cautious_Rearmament_desc: "Following recent events, Chamberlain has decided to continue with a cautious rearmament policy. It would be foolish for the country to stop rearming until we are certain that other countries will behave similarly. For the time being, we should spare no effort until our deficiencies have been addressed. We must be cautious, however, because putting our industry on a war footing will undoubtedly antagonise Hitler and derail all of our previous diplomatic efforts. An agreement with Hitler is essential as it will undoubtedly lead to a general settlement of European disputes."

 ENG_Extend_British_Defence_Capabilities: "Extend British Defence Capabilities"
 ENG_Extend_British_Defence_Capabilities_desc: "Still hoping for reconciliation with Germany, Chamberlain will deliver a major speech in Birmingham expressing his desire for international peace, with an advance copy sent to Hitler in Berchtesgaden. Additionally, Chamberlain believes that improvements in British defence will finally bring the dictator to the negotiating table. Chamberlain will introduce the strategic doctrine of limited liability, which will allow us to avoid the mistakes of the Great War by focusing our efforts on sea and air combat rather than a large ground force commitment in France. Under the doctrine, the British Army will face massive cuts, while the Royal Navy and particularly the RAF, will see massive expansion."

 ENG_Encourage_Coal_Deposit_Nationalisation: "Encourage Coal Deposit Nationalisation"
 ENG_Encourage_Coal_Deposit_Nationalisation_desc: "As one of his final domestic reforms, Chamberlain has decided to push for the Coal Act of 1938, which would allow for the nationalisation of coal deposits and coal mining royalties. The primary goal of the Act is to establish a Coal Commission comprised of five individuals appointed by the Board of Trade. The commission is required to obey all Board of Trade requests that are in the national interest, placing it directly under the control of the government. The Commission is tasked with managing unworked coal seams and coal mines in order to improve efficiency and organisation in the coal mining industry.\n\nThe Commission is expressly prohibited from engaging in coal mining, and as a result, it will own coal but not be permitted to deal with it. The Act provides for compensation of £66.5 million to mine and coal seam owners. While some critics refer to the Act as \"socialist legislation passed by a Conservative government,\" it undoubtedly represents an important step towards coal mine nationalisation."

 ENG_Limited_Peacetime_Conscription: "Limited Peacetime Conscription"
 ENG_Limited_Peacetime_Conscription_desc: "All of our previous diplomatic efforts appear to have been futile, as Hitler remains hellbent on war and refuses to create a stable Europe. With each passing day, war appears to become more imminent and unavoidable. As a result, in addition to doubling the size of the Territorial Army and establishing a Ministry of Supply to expedite the delivery of equipment to the armed forces, we will implement a limited peacetime conscription. Peacetime conscription will be ordered for the first time in British history, with the first conscripts being called up in a matter of months. After all other measures have failed, Chamberlain has reluctantly accepted the continental commitment, effectively ending the previously established limited liability doctrine."

 ENG_Discuss_Interlocking_Defence_Pacts: "Discuss Interlocking Defence Pacts"
 ENG_Discuss_Interlocking_Defence_Pacts_desc: "Chamberlain has set out to create an interlocking series of defence treaties among the remaining European countries as a last resort to deterring Hitler from war. Chamberlain intends to seek and successfully negotiate an agreement among Britain, France, the USSR, and Poland under which the first three will assist Poland if its independence is threatened. Ideally, this four-way alliance will contain Germany and prevent further aggressive actions. Although Chamberlain was initially hesitant to pursue a military alliance with the Soviet Union because he distrusts Joseph Stalin ideologically and believes there is little to gain, given the recent massive purges in the Red Army, much of our Cabinet now supports such an alliance."

 ### Colonial Tree
 ENG_Steady_As_She_Goes: "Steady As She Goes"
 ENG_Steady_As_She_Goes_desc: "The British Empire spans nearly a quarter of the world, with our colonies found in all continents, holding people of many different backgrounds and ethnicities. Since the end of the Great War, we have sought to maintain our power, although this has become increasingly difficult for a number of reasons, such as the poor state of our economy, and growing independence movements that seem to gain more traction every year.\n\nIt would be unwise of us to make any bold and rash moves in any direction for our empire. Trying to expand it will result in more unhappy natives and could even lead to a wider conflict that would involve nations much stronger than ourselves. Decolonisation however could leave us weaker should there be any stirrings in mainland Europe, which is growing more wild by the day. Therefore, we shall maintain the path we are on, and ensure that this ship we call the British Empire stays afloat."

 ENG_Lifeblood_of_the_Empire: "Lifeblood of the Empire"
 ENG_Lifeblood_of_the_Empire_desc: "Since we first stepped onto the shores of the New World, and raised the flag of the United Kingdom over Australia, the only way we have been able to supply our conquests and colonies has been over the sea. The ocean, and control of it, is vital to keeping control over the waves and the empire. Convoys carry economic opportunity, and investing more into these is a brilliant way of controlling the flow of cash across the waves, into our pockets. Britannia can only rule the waves if we can control the shipping that actively supports Britannia."

 ENG_Through_the_Empire_and_Back: "Through the Empire and Back"
 ENG_Through_the_Empire_and_Back_desc: "While maintaining a global empire isn't the easiest task for a country to do, it sure is worth it, especially with all the resources, manpower, and industry we can get from our colonial possessions. Connected by the seas of the world, a proper navy is needed to safeguard trade routes and military convoys.\n\nNew dockyards to boost naval output will allow us to have a greater presence in regions where it is most needed, as well as being able to make sure that what starts in one part of the empire, such as here in the UK, can also end up back here as well, even after going around the world and through the empire."

 ENG_Fostering_Imperial_Development: "Fostering Imperial Development"
 ENG_Fostering_Imperial_Development_desc: "Our colonies are the driving force of our empire, and although the Great Depression has forced us to prioritize the home isles for the time being, as war looms over Europe's horizon, without proper development they won't be ready to stand by us, should the need come. By shifting funds into our colonies, yet again, we can shape them up to support [ENG.leader_title_two] and Country, one last time."

 ENG_Imperial_Defence_Shakeup: "Imperial Defence Shakeup"
 ENG_Imperial_Defence_Shakeup_desc: "Defending the empire is no easy task, but we are lucky that there have been few threats since the end of the Great War to challenge our presence. This is quickly changing however, mainly due to the rise of aggressive states and governments across the world, and in places where we might struggle to respond swiftly and effectively.\n\nThe garrisons we have deployed across important points in the empire are the first, thin line of defence against any aggressors. To make sure they can stand a better chance and put up a proper fight, we should begin to fortify them with pillboxes, anti-tank and anti-air defences, and coastal forts where necessary. It will be no easy project, and will cost hundreds of thousands, if not millions of pounds, but the cost of losing the empire far outweighs that of defending it."

 ENG_Imperial_Preference: "Imperial Preference"
 ENG_Imperial_Preference_desc: "There is an old saying in our empire, that goes back a few hundred years: Perfidious Albion. It means Britain and the empire first, the world second. This eloquent phrase has become ever more important lately, with the rising tensions in Europe and Asia. It encompasses us, our colonies, and of course, our ever loyal dominions, who deserve more interest and more attention than we have shown them. A great way to start this process is trade. The empire and the dominions deserve more attention, and buying their resources and investing in their country is the best way to do it. "

 ENG_Meaningful_Colonial_Investment: "Meaningful Colonial Investment"
 ENG_Meaningful_Colonial_Investment_desc: "While we try to take good care of our empire, we often find that funds directed to certain parts of it can be spent on useless and pointless ventures. Some governors may want to open up a new building named after themselves, or perhaps build a statue of them to show how brilliant they have been. This is all well and good, but if we want to see better growth, we will need to make sure that the investments are going towards better things, such as factories, roads, hospitals, and houses.\n\nNot only does this improve the local economy, but it will keep the natives happy as well, and they will see that we are not as bad as some like to paint us as."

 ENG_African_Sun: "African Sun"
 ENG_African_Sun_desc: "Africa is one of the richest continents in the world and is providing us with many raw resources at a reasonably low cost, but frankly the situation is terrible and pathetic. The old Victorian infrastructure is falling apart, making the transport of both men and material harder for us. That is why we will (In the name of [ENG.address_leader_two]) initiate a grand and ambitious plan to restructure and expand the roads and rails of our African colonial regions. This will directly impact them by allowing further economic growth and, in turn, exploitation of our part of the dark continent."

 ENG_Invest_in_our_Dominions: "Invest in our Dominions"
 ENG_Invest_in_our_Dominions_desc: "The people of Britain are a proud people, and a source of much of that pride is our global empire - the largest and most wide-reaching the world has ever seen. However, like most of the world in the aftermath of the Great Depression, it has lost its shine. From North America to Oceania, the economies of our dominions have been dealt blow after blow, and effects that it has had on our commonwealth of nations has been nothing short of disastrous.\n\nThough as we push forward through these tough times, it is our duty and obligation to drag our subjects with us, so we must begin directing significant investments towards them. Making these investments will not only provide a boost to the economies of the dominions in the short-term, allowing them to take advantage of their abundant resources, but in the long-term, the British Empire's ability to sustain and defend itself will increase drastically, which is evermore important with the rapidly changing political situation in the world."

 ENG_India_and_Beyond: "India and Beyond"
 ENG_India_and_Beyond_desc: "The true jewel of the British Empire is India, the subcontinent contains millions of people who called the Raj their home, and the goods that come from India have helped fund the Empire's way of life. Surrounded India are other vital colonial holdings such as Hong Kong and Malaya. While we have great pride in our eastern Empire, even we have to admit, the jewels are starting to look a little flawed and do not shine as well as they should. \n\nTherefore it would be wise to spend some time and effort improving these holdings. Vitalizing industry within India and other Eastern holdings will only come to reflect well on us, and if Europe was to break out in war again, then the industrial capacity of these lands could be retooled to help bolster their own defenses and contribute to the continuation of the Empire."

 ENG_A_Manufacturing_Extension: "A Manufacturing Extension"
 ENG_A_Manufacturing_Extension_desc: "There is a huge opportunity in Africa to expand our manufacturing capabilities. With a population desperate for work, and new funds available to be put into the continent, only a fool would pass up on something like this.\n\nWe have already identified several areas which are ready for us to set our plans in motion. Strengthening and reinvigorating the industries in this area can hopefully mean greater exports, helping to stimulate trade within the empire."

 ENG_Fuel_for_the_Imperial_Machine: "Fuel for the Imperial Machine"
 ENG_Fuel_for_the_Imperial_Machine_desc: "With the progress of modern technology, more and more sectors of our economy and our army are relying on fuel. While we could import from other nations such as the USA, this can be costly, especially at a time when we need to be wary of what we spend. To help solve the issue of fuel, while also improving the economy of the empire, one of our advisors has suggested to us that we should direct investment into several areas in Africa that can be exploited for fuel.\n\nSetting up the right extraction equipment, as well as the refineries to turn the oil into fuel that can be used by us will be crucial in ensuring that the empire keeps moving."

 ENG_Bastions_of_Imperial_Defence: "Bastions of Imperial Defence"
 ENG_Bastions_of_Imperial_Defence_desc: "Our dominions find themselves on the front lines of imperial defence, as they have been since the Great War. Australia and New Zealand are preparing for the Empire of Japan to become even more aggressive than they already are. Canada proved its power and usefulness by sending over thousands of highly trained and skillful soldiers, becoming some of the most feared warriors on the battlefields of Northern France and Belgium.\n\nBy bolstering defensive arrangements and troop training, we will be able to ensure that they Dominions can defend themselves from any major threat, hopefully long enough until more support can arrive to relieve them and push back the enemy who threaten them."

 ENG_The_Workshops_of_the_Commonwealth: "The Workshops of the Commonwealth"
 ENG_The_Workshops_of_the_Commonwealth_desc: "Our dominions all had growing economies, with industries that looked promising to investors. That was all changed by the Wall Street Crash of course, and many factories lie silent, with many more having closed down for good. This cannot be allowed to stand, and we will not be idle and watch as our friends around the world suffer.\n\nFunds and subsidies must be granted to the dominions to help them get the gears of industry stirring again. Only then can we be sure that we will be able to walk hand in hand with them into a new age of peace and prosperity."

 ENG_Cut_and_Polish_the_Jewel: "Cut and Polish the Jewel"
 ENG_Cut_and_Polish_the_Jewel_desc: "The British Raj is the jewel in the crown of the British Empire, and has been since the age of Queen Victoria. The nation is home to a large population, and while it may be lacking sorely in industry, it has ample room for growth if we take the right approach to it.\n\nRather than rushing into things, we must be cautious and calculated in the progress of the Raj. Too much at once could lead to a mismanagement of resources, as well as the risk of an angry population. Like a good jeweller with his gems, we must cut, refine and polish the Raj to suit the needs of itself and the empire."

 ENG_A_Few_Scratches_Wont_Hurt: "A Few Scratches Won't Hurt"
 ENG_A_Few_Scratches_Wont_Hurt_desc: "The British Raj is the jewel in the crown of the British Empire, and has been since the age of Queen Victoria. The nation is home to a large population, and while it may be lacking sorely in industry, it has ample room for growth if we take the right approach to it.\n\nBecause of its small industry and large potential, we should waste no time in getting down to business in turning it into the industrial heart of the empire. Mines will be built along with the roads and infrastructure to transport it, and new factories shall be raised to turn them into materials ready for export across the empire. Sure, the Raj may take some bumps and scratches along the way, but it will be worth it in the end, right?"

 ENG_Subsidise_the_Suez_Canal_Company: "Subsidise the Suez Canal Company"
 ENG_Subsidise_the_Suez_Canal_Company_desc: "The Suez Canal is a vital link between us here in the West and our colonies in the East, such as the British Raj and Australia. Without it, we would struggle to keep the supply lines flowing  should a war in the east break out. Behind our control of it is the Suez Canal Company, which oversees its operation, as well as the regulation of which ships can and cannot go through.\n\nWe have recently been approached by some high ranking members of the Suez Canal Company, who have asked for more subsidies to be granted. They argue that with this, they would be able to expand the operational capacity of the canal, which will boost trade and the Egyptian economy. This should be a priority if we are to keep our links with the East strong."

 ENG_Empire_Air_Training_Scheme: "Empire Air Training Scheme"
 ENG_Empire_Air_Training_Scheme_desc: "Protecting the skies of the Commonwealth will be no easy task. The right fighter planes need to be produced, anti-air emplacements will need to be installed, and most important of all will be the training of the right pilots to fly and engage the enemy. This will require a massive empire-wide effort to be able to keep up with some of the most dominant air forces in the world, such as the Luftwaffe.\n\nBy launching an air training scheme that will be open to all members of the Commonwealth, we will be able to provide the necessary education and pilot programmes with our close friends, and it will also help to stimulate greater cooperation between the national air forces of each nation. The sooner we get to this, the safer our skies - and our futures - will be."

 ENG_Develop_the_British_Indian_Army: "Develop the British Indian Army"
 ENG_Develop_the_British_Indian_Army_desc: "The army of the Raj has played an important part in the history of our empire. From when the subcontinent was unified under British control, to more recent events such as the Great War, we have been able to rely on them for a source of great manpower and fighting spirit. However, we have been lazy in recent years, with the state of the British Indian army falling well below imperial standards.\n\nWe must bring the army into the modern age, changing the way of fighting and thinking within the ranks of all soldiers, as well as helping to provide them with the latest technology to mechanise and modernise the equipment used by them. A fully prepared and equipped Indian army can only be beneficial for the protection of the region and the empire."

 ENG_Continental_Industrialisation_Projects: "Continental Industrialisation Projects"
 ENG_Continental_Industrialisation_Projects_desc: "Since expanding our manufacturing capabilities in Africa, new opportunities have arisen to begin industrialisation projects. It is no secret that Africa lacks in industry, and mostly relies on farming exports to bring money into it. Not only does this affect the locals, but it also affects our ability to improve the region and our imperial economy as a whole.\n\nNew factories should be constructed, starting in already populous regions, and then perhaps expanding out to new areas to attract more investors. With people in jobs, any discontent is sure to be silenced, and with an improved economy, it's a win-win for us."

 ENG_Mines_Mills_and_Plantations: "Mines, Mills and Plantations"
 ENG_Mines_Mills_and_Plantations_desc: "Africa has a large pool of untapped resources, and many of them happen to fall within our borders. We should waste no time in getting down to business and harvesting these to ship across our empire. Iron shall be mined and turned to steel, crops shall be grown to feed the millions across our lands, and factories shall be built to process all of this.\n\nIt would be a waste to let all of this go unnoticed, and there is more than a fortune to be made if we play our cards right."

 ENG_The_Production_Lines_of_the_Empire: "The Production Lines of the Empire"
 ENG_The_Production_Lines_of_the_Empire_desc: "Every army requires guns, and to produce those guns, we need more factories that are capable of doing so. A lack of investment into new armaments since the end of the Great War has led the overall military strength of the Commonwealth to decrease to dangerously low levels, which requires immediate intervention if we are to maintain our presence in the world, as well as defend our homes.\n\nNew production lines of tanks, guns and planes must be opened at once, across all four corners of the empire. It is our duty as the British Government to help our Commonwealth allies in expanding their military industry in the necessary ways to fulfil our goals."

 ENG_Exploit_the_Undoubted_Potential: "Exploit the Undoubted Potential"
 ENG_Exploit_the_Undoubted_Potential_desc: "It is no secret that the many dominions under our control have a large pool of resources that provide much to the economic stability of the empire. However, an even larger amount of those resources have not been exploited to their full potential, and as a result, we are missing out on materials that can be turned into more goods, or even used to help fuel a war machine should we require it in the future.\n\nWe have made the effort to contact influential businessmen and companies to try and arrange new contracts to begin the extraction of resources such as iron, oil and rubber, in the hopes that we can get more of them on the market. More goods means more money, and after all, money makes the world go round!"

 ENG_Investments_of_Every_Kind: "Investments of Every Kind"
 ENG_Investments_of_Every_Kind_desc: "It is no good just focusing on one aspect of the economy of the Raj when the whole thing lies in disarray and backwardness. From the roads that are used to transport the millions of people who live there, to the tools and machinery used on the farms, and even the factories themselves, all of this is outdated, and at times can feel like living in a time before the Industrial Revolution.\n\nA broad range of areas to invest in has been drawn up by ministers in the Raj, which includes infrastructure, factories, ports and farms. Anything that can be invested in will be invested in, and it is about time that we provided the Raj with the help and support it needs to secure its place in the empire."

 ENG_Continue_the_Gold_Imports: "Continue the Gold Imports"
 ENG_Continue_the_Gold_Imports_desc: "For as long as we can remember, we have been importing gold from the Raj, as its large quantities present us a great opportunity on the global market. Recent advancements in the industrial capacity of the Raj has allowed us to go further and faster with the mining and processing of gold. Not only is it shiny, but it is also worth quite a bit too!\n\nThe Raj is our rightful trophy, and it is only right that we take full advantage of the countless opportunities that it presents us."

 ENG_Finance_South_African_Development: "Finance South African Development"
 ENG_Finance_South_African_Development_desc: "South Africa has had a troubled history within the British Empire. The Boer War saw us take full control of the region, but the problems go beyond that. Their agricultural and industrial base has been hit hard by the Great Depression, and their policies of segregation do nothing to help their dire situation. However, they proved loyal during the Great War, and it is only right that we reward this with some much needed assistance.\n\nWeak points in the economy have been identified, and it is now up to us to provide the necessary funding and tools that they require to get themselves up to standard. Perhaps one day they will have a change of heart over segregation too."

 ENG_The_Old_Lion_Defies_his_Foes: "The Old Lion Defies his Foes"
 ENG_The_Old_Lion_Defies_his_Foes_desc: "And so the time has come once again. The mighty British lion, standing on its isolated rock, has been surrounded yet again by the nations that demand its capitulation, its cowardly surrender. They claim Britain is alone, and shall fall before their mighty armies. However, it is they who are alone in their crusade against democracy. They do not have Canada's courage, Australia's determination, South Africa's honour and New Zealand's grit. They do not have the fierce little lion cubs, standing defiantly with their mother Britannia once again, as the forces of evil and death encircle us once more. But we shall not flag or fail. We shall never surrender."

 ENG_Aid_Malayan_Industries: "Aid Malayan Industries"
 ENG_Aid_Malayan_Industries_desc: "Malaya isn't known for much within the empire, apart from its abundance of rubber and tungsten. While that is all very useful, it is unable to boast about a strong industrial and economic presence in South-East Asia, something which we must begin to rectify. It is even being outdone by the Dutch, and we can't have that happening!\n\nSuffering from the same economic crisis as everyone else, it is time to give Malayan industry some much needed help. Subsidies and direct investment in growing sectors will help to turn around the fortunes of the Malayan people, which will hopefully lead them to becoming a crucial part of the empire in the Far East."

 ENG_Locking_Down_the_Med: "Locking Down the Med"
 ENG_Locking_Down_the_Med_desc: "The Italians have always posed a threat to us, mainly due to their naval presence in the Mediterranean Sea, where we own the crucial outposts of Malta, Gibraltar, and Cyprus. Should we find ourselves at war with the Italians, and if these points were to fall, our holdings in Northern Africa, such as the Suez Canal, would be in grave danger of attack, which would cut us off from the rest of the empire.\n\nLocking down our Mediterranean possessions with new defences is vital if we are to maintain the link between us in the west and our other colonies in the east."

 ENG_A_Watchful_Eye_Eastwards: "A Watchful Eye Eastwards"
 ENG_A_Watchful_Eye_Eastwards_desc: "We are not idiots, and we have been keeping a close eye on what the Japanese are up to in the east. Like us, they want a vast empire, and are keen to expand in the Pacific. Unfortunately for them, we have several major colonial possessions and Commonwealth members in Asia, such as the Raj and Malaysia, as well as the treaty port of Hong Kong. However, we would be left helpless if the Japanese were to strike without warning at these areas.\n\nWhile some have suggested it would be wise to focus on the Mediterranean instead, there is no point fighting over the Suez and Malta if there is nothing left to defend in Asia. Several weak points have been overlooked by us in recent years, and it is time to put this right by constructing defences in the east that so many of our governors have been calling out for."

 ENG_Fortify_the_Rock: "Fortify the Rock"
 ENG_Fortify_the_Rock_desc: "The importance of Gibraltar, also known as “The Rock”, cannot be overstated. Its size may be small, but it plays a huge role in keeping the door open for British ships to sail in and out of the Mediterranean, whatever their purpose may be. This comes at a price, as it can be threatened from both land and sea, with the Italians seeing it as part of their claims to a new empire, and the Spanish wishing to reclaim it for the good of their nation.\n\nAttention to both angles of attack must be looked upon with great detail, with the Gibraltar garrison in dire need of new landward fortifications to stop a Spanish advance, while also being able to stop Italian marines from landing and raising their flag on top of the Rock of Gibraltar."

 ENG_Mediterranean_Bastion: "Mediterranean Bastion"
 ENG_Mediterranean_Bastion_desc: "Malta sits in a dangerous position in the Mediterranean Sea. With mainland Italy to the north, and its holdings in Libya to the south, a naval invasion from any direction is a grave threat to our control over it. With this being said, it can also be used to strike these areas, and with the necessary infrastructure, it could become an important staging ground for operations to strike at a future Italian enemy.\n\nWe will turn Malta into the fortress it has always meant to have been, which is sure to send a warning to the Italians that we are ready to face them should they dare."

 ENG_El_Alamein_Strategy: "El-Alamein Strategy"
 ENG_El_Alamein_Strategy_desc: "The town of El-Alamein in Northern Egypt is a crucial chokepoint that, should it become controlled by an enemy force, would open the path for the Suez Canal to be under severe threat from a land invasion. It goes without saying that we need to ensure that the right defences are in place to halt the invaders in their tracks.\n\nThe choice to fortify El-Alamein or not could prove decisive in war, one that could seal the fate of the empire, so we should not waste time if we are to get our plans underway."

 ENG_Expand_Trincomalee_Harbour: "Expand Trincomalee Harbour"
 ENG_Expand_Trincomalee_Harbour_desc: "Trincomalee on Ceylon houses a major harbour that is an important checkpoint between our holdings in the east, and the final journey to the Suez Canal. It also acts as a supply hub for our forces in the east, with its ability to be able to manage large quantities of ships and troops at one time, making it an invaluable part of our defence plans in Asia.\n\nBy upgrading the dockyards and naval infrastructure in Trincomalee Harbour, we will not only be providing more breathing space for our naval forces, but we will also be increasing its capacity for trade in peacetime, which can only yield positive results."

 ENG_Invest_in_Alexandria: "Invest In Alexandria"
 ENG_Invest_in_Alexandria_desc: "Alexandria is a major port city in Northern Egypt, and along with the Suez Canal, is vital for our power in the Mediterranean. However, the city itself isn't in a great state, and with Egyptian colony still trying to recover from the Great Depression, we should step in and help them out a bit with their investments.\n\nExpanding Alexandria port, as well as the defences it possesses will secure our rule in Egypt, as well as furthering our goal of ensuring that every inch of Mediterranean holdings are protected to the utmost."

 ENG_Fortify_the_Suez_Canal: "Fortify the Suez Canal"
 ENG_Fortify_the_Suez_Canal_desc: "Some within the government have expressed surprise that we have not already invested more into the defence of the Suez Canal, mainly due to the fact that it is the thread that connects our empire together. The truth is that we have not had the spare funds to direct towards it, until now that is.\n\nFrom land forts to coastal defences and anti-air guns, we shall spare nothing in our efforts of protecting the Suez Canal. We have come this far, and we will not let it slip away because of a lack of time and concentration towards an important task."

 ENG_Commit_to_the_Singapore_Strategy: "Commit To the Singapore Strategy"
 ENG_Commit_to_the_Singapore_Strategy_desc: "The Singapore Strategy has been in place since the end of the Great War as a way to protect ourselves against the rising naval power of the Japanese. They know as well as we do that we must split our vast navy across several theatres of interest, whereas they have the luxury of just being able to concentrate in the Pacific and other parts of Asia.\n\nThe plan puts Singapore front and centre (hence the name), and allows for the Royal Navy to use the city as a base, as it can provide for it much better than other places within the region can. Committing to the plan will not only allow for a greater focus to be placed on Singapore, but will also show the Japanese that we are not afraid of their aggressive moves!"

 ENG_Safeguard_Imperial_Trade: "Safeguard Imperial Trade"
 ENG_Safeguard_Imperial_Trade_desc: "Trade is the blood of every empire throughout history, from the Romans to Imperial China, and of course the British Empire as well. While the old saying of “Britannia Rules the Waves” is still very much true, there are many nations who wish to drag us off our pedestal and assert themselves as the leader in naval prowess.\n\nNew technology has been developed to attack convoys, mainly the submarine, so we will need to combat this with everything we have. Destroyers are nimble, but can also pack a punch against submarines, so are the perfect ship to send alongside our convoys to protect them. Abandoning our trade routes means abandoning our empire altogether, and we cannot and wil not let that happen. Britons shall never be slaves!"

 ### Military Tree
 ENG_A_Starving_Lion: "A Starving Lion"
 ENG_A_Starving_Lion_desc: "The British military was not to be underestimated. Our Navy was and continues to be the best in the world, ruling the seas. Our army was small but well-trained, capable of defeating armies many times their size in a fair fight and bringing civilization to countries that would not have known it otherwise. Meanwhile, our Air Force was a trailblazer, a haven for daredevils and freethinkers eager to test the limits of warfare's new frontier. 'Was' being the key word throughout all of this.\n\nThe British military of today is not the British military of 1914 or any previous year. Many thought the Great War would be a nightmare from which we would never awaken. For little monetary gain, millions of men and boys died in holes in the ground far from home. When peace was finally restored after four bloody years, everyone exclaimed, \"Never Again!\"\n\nPart of 'never again' was disarmament, and few in Europe have led the way like we have. Our military is the smallest it has ever been. While our Navy has largely avoided major cuts, the Army and Air Force have not. However, war is looming, and powerful voices in our government are pushing for rearmament. After ignoring them for so long, the writing is on the wall. Europe is rearming; we cannot afford to be left behind if we are to have a chance in the next war. Let's throw a bone to the lion."

 # Air Branch

 ENG_Royal_Airforce: "§SThe Royal Air Force§!"
 ENG_Royal_Airforce_desc: "The recent rise in our rival's air forces has started to put our military commanders into a bit of a scare. Many have considered that we divert some research and industry to ensure the victory of the Royal Air Force. Though Britain easily has one of the strongest fleets in the world, our ships cannot defend the streets of London from bombs. We must revitalize the Royal Air Force and make sure that we are not bested by our rivals."

 ENG_Reorganize_Air_Defences: "Reorganize the Air Defences"
 ENG_Reorganize_Air_Defences_desc: "The air defenses across the southern UK are scattered and disorganized, not to mention few in number. By reorganizing them with regular distances between Anti-Aircraft guns, we can create interlocking cross-sections of fire, drastically improving efficiency and protecting the British skies more effectively than ever."

 ENG_Fighter_Command: "Form Fighter Command"
 ENG_Fighter_Command_desc: "The RAF Fighter Command was formed in 1936 to allow more specialized control of fighter aircraft. However, with a war looming over the horizon, we must update our Fighter Command in order to match that of the other rising powers In Europe. With a strong sense of control and coordination, we can beat anyone in the air war!"

 ENG_The_Hawker_Hurricane: "The Hawker Hurricane"
 ENG_The_Hawker_Hurricane_desc: "Despite some stubbornness of some older officers, most of the RAF officer corps have come to ask of us of a modern monoplane aircraft to replace their wood and fabric biplanes to update the reserves and squadrons for an advancement in military aviation. Hawker, a company that has been with us since Sopwith declared bankruptcy, has given us their design proposal. After issues with the Goshawk power plant, the Rolls Royce Merlin will power up the new up and coming prototype, which among other modernities, like retractable landing gear, also includes eight .303 machine guns for better target neutralisation in a dogfight. This aircraft has potential to be defending the skies over Britain, her Colonies and her Allies."

 ENG_Bomber_Command: "Bomber Command"
 ENG_Bomber_Command_desc: "In this new age of warfare, the attack must come from the skies as it does from the ground. Secluded as we are on our home islands, the ideal strategy, should we have no allies on the continent, is to strike our enemies where it hurts most. Strategic bombers will pound our enemy to bits, dropping countless bombs over the home front as the Germans did back in the Great War, as we sit contentedly at home. However, we need to coordinate these attacks and put in place a system to organize the whole operation. A centralized, independent Bomber Command will provide the rigidity and structure we need to continue the fight in the air."

 ENG_Dowding_System: "Complete the Dowding System"
 ENG_Dowding_System_desc: "We may have established RADAR towers to detect our enemy, but we are finding it very difficult to relay that information to the RAF in time. Hugh Dowding, the Air Member for Supply and Research, has proposed an elegant solution; a large, dedicated land-line network covering our southern airspace, communicating directly with both the operators of CH and the RAF's many hangars. This should aid in developing a much faster response time and ensure that not a single bomber makes its way to striking distance."

 ENG_Spitfire: "Refine the Spitfire"
 ENG_Spitfire_desc: "Ever since the end of the Great War our Air Force lacked a capable, fast, modern fighter. That is why the Air Ministry engaged multiple British aircraft manufactures in 1931 for its development. One of them, Supermarine, has created a very fast one-seated fighter which meets all requirements. Although the first prototypes we're inconclusive, the last version nicknamed \"Spitfire\" is said to have the answers to the previous problems. Of course the defense minister is still septic and has dispatch a team to test the aircraft. All we need now is to wait."

 ENG_Refine_Vic_Formation: "Stick with the Vic"
 ENG_Refine_Vic_Formation_desc: ""

 ENG_The_Vickers_Wellington: "The Vickers Wellington"
 ENG_The_Vickers_Wellington_desc: "We require a new twin-engine bomber, and after much thought, politics, and investment, we have found a winner for our bomber contract: The Vickers Wellington.\n\nThe Air Ministry has slightly revised its specifications, increasing B.9/32 to B.9/36. This aircraft will have a 1,000-pound bomb load, a range of 1159 kilometres, and a geodetic structural concept developed by Barnes Wallis. The Vickers B.9/32 prototype had exceeded this specification until it unfortunately crashed due to elevator overbalance in a dive.\n\nIt would have a slightly more angular fuselage, revised tail control surfaces and structure, and hydraulically operated Vickers nose, ventral, and tail turrets under the new specification, B.9/36. This will improve the bomber's defensive capabilities and aerodynamics, as well as its performance, albeit slightly.\n\nThis will result in the first orders of Vickers Wellington MK I airframes, one of many that will serve the RAF, with variants expected to increase performance and possibly even new roles over time."

 ENG_De_Havilland_Jet_Engine: "De Havilland Jet Engine Pursuits"
 ENG_De_Havilland_Jet_Engine_desc: "Engineers and designers over in De Havilland have designed a new type of aircraft engine. A revolutionary engine that has potential to become a replacement for traditional propeller engine. Even in early development, the first prototypes are almost on par with its best propeller counterpart. They're called \"jet\" engines and as time goes by, it will become significantly better and faster. When the time comes, so called \"Jet\" aircraft will take over the skies."

 ENG_The_Special_Air_Service: "The Special Air Service"
 ENG_The_Special_Air_Service_desc: "As the war in Africa devolves into a long and atrocious stalemate, some officers have approached us with different ideas and solutions to resolve the war in the theatre. One of them Lieutenant David Stirling proposed a plan that consists of parachuting soldiers behind enemy lines, operating to gain intelligence, destroy enemy aircraft, and attack their supply and reinforcement routes. Of course such a dangerous and unorthodox idea will never be endorsed by the Army's High Command..."

 ENG_Development_of_Avro_Bombers: "Develop Avro Bombers"
 ENG_Development_of_Avro_Bombers_desc: "The United States and the Soviet Union have recently made some intriguing bomber development moves. These manoeuvres are made with four engine bombers. The additional engines would allow for more power, larger fuselages, and overall better performance than our current two engine configuration. Already, the RAF has placed an order for a four-engine design suitable for \"global use.\"\n\nThe Avro Lancaster, a four-engine bomber capable of flying anywhere with a devastating payload, is the most promising design proposed for this use. It is a clear improvement over our current two-engine fleet and has gained significant traction within the Air Ministry. Avro, so certain of the Lancaster's acceptance, has already informed us of their future project, codenamed the Lincoln."

 ENG_Ensure_Dominance_Over_the_Skies: "Ensure Dominance Over the Skies"
 ENG_Ensure_Dominance_Over_the_Skies_desc: "The main lesson of previous conflicts was the importance of air superiority. If we are perpetually fighting for control of our own skies, any foray into Europe will be doomed to failure. To win this war, we must control not only our own skies, but also the skies of our adversaries. Marshal William Sholto Douglas employs a strategy known as \"Big Wing\" to accomplish this.\n\nBig Wing is simple and self-explanatory; a few different fighter squadrons, typically three to five, would band together and meet the enemy head on. We can easily rip enemy formations to shreds with such a massive concentration of firepower descending on them before they can threaten our shores. On offence, they can bowl over any counter-attacks that come up to meet us, however piecemeal they may be."

 ENG_A_Meteoric_Rise: "A Meteoric Rise"
 ENG_A_Meteoric_Rise_desc: "Since 1936, the Gloster Aircraft Company, among others, has experimented with 'turbojet' engines to replace the international standard propeller planes. Until recently, these turbojet planes were purely theoretical, with only a few cautious test flights to prove their worth. However, as the RAF seeks to seize control of Europe's skies, it has begun to seek any advantage it can gain.\n\nGloster Aircraft Company appears to have that advantage. Their Meteor prototype turbojet aircraft is looking very promising. It is agile, faster than anything we have deployed so far, and can fly farther than any other fighter currently in production. While far from perfect, the Air Ministry has come to believe that with a little more money and time, the Meteor could win the war in the air."

 ENG_A_Raging_Tempest: "A Raging Tempest"
 ENG_A_Raging_Tempest_desc: "The Typhoon, our force's workhorse, has one major flaw. That is, its effectiveness decreases as it ascends. As enemy fighters and bombers fly higher and higher, this becomes a serious issue that needs to be addressed. We attempted to address this with a new Typhoon model, the Typhoon II. However, it appears that the boys in R&D got carried away and created an entirely new plane called the Tempest.\n\nThis plane, on the other hand, outperforms the Typhoon in nearly every way. In field tests, it proved to be as fast as the wind and an effective ground attack and interceptor aircraft. While its ceiling may not be as high as some would like, its versatility more than compensates."

 ENG_Commit_to_Strategic_Bombing_Campaigns: "Commit to Strategic Bombing Campaigns"
 ENG_Commit_to_Strategic_Bombing_Campaigns_desc: "Allowing the enemy to approach us unmolested at home will make the air war a sisyphean task. The enemy will simply produce more planes to replace those we destroy. To truly defeat them, we must pound their factories and cities into dust. Marshal Arthur Harris has devised a strategy to accomplish this. Harris has identified dozens of key factories and production plants critical to Germany's war effort using flyovers and spy reports.\n\nHe has testified before the Air Ministry and the entire Cabinet that these targets must be destroyed if the war is to be won. His arguments are persuasive, and the desire to 'punish' the enemies for their devastation weighs heavily on London's mind. Harris will have his way, and our adversaries will "reap the whirlwind," as he puts it."

 ENG_Retain_Area_Bombing_Strategies: "Retain Area Bombing Strategies"
 ENG_Retain_Area_Bombing_Strategies_desc: "As British bombs began to fall in large numbers on German cities, many of our more squeamish countrymen and women became uneasy with our tactics. They find our air force flattening cities on TV \"unseemly\", and have begun to advocate for \"precision bombing.\" Unfortunately, that is an oxymoron. Dropping a bomb from a safe height causes it to fall a long distance, which causes it to drift off target.\n\nBombing is not an exact science. That is why we must stick to our current plan. We will destroy not only the factory but also the 12 city blocks surrounding it to ensure that we have it. While it may be a savage way to conduct war due to the large and unavoidable civilian casualties, war is savage. Harris put it best: \"They summoned the thunder. They will now reap the whirlwind.\""

 ENG_Bombing_With_Precision: "Bombing with Precision"
 ENG_Bombing_With_Precision_desc: "Our conflict is not with the people, but with the government. If we continue to flatten entire cities in the name of a single building, we will not only kill unnecessarily thousands of people, but we will also incite resentment both at home and abroad. This war has been documented more than any other. For the first time, the British and international publics can see with their own eyes what our and their militaries are up to.\n\nDespite our best efforts, footage of firestorms tearing through German cities and their grisly and tragic aftermath has been plastered on television screens around the world. To keep the people on our side, and to avoid wasting so many valuable bombs on ineffective targets, we must refine our bombing strategies. It will be more dangerous, but planes will have to fly lower, slower, and more precisely to ensure that as many bombs as possible hit the target."

 ENG_Blocking_Out_The_Sun: "Blocking Out the Sun"
 ENG_Blocking_Out_The_Sun_desc: "Many would-be masters vie for control of the air. The Red Air Force, Luftwaffe, USAAF, and IJAAS/IJNAF. All of these have attempted true dominance, but it has taken a lot of sweat, toil, and resources for us to achieve what no one else has. Our fighters compete on an equal footing with the enemy across three continents. They annihilate the enemy fighters and clear the way for our bomber fleet. Our bombers of all sizes and shapes fly wherever destruction is required.\n\nThe enemy soldier understands that not only is the RAF Bomber Command a threat to them, but so are their friends and family back home. As they sit in their trenches in France or shelters in Berlin as the sun sets and the air fills with the drone of propellers, they will have plenty of time to reflect on whether this war is truly worth it. Our RAF will eventually reach a reasonable conclusion if they put in enough effort."

 ENG_The_Chiefs_of_Staff_Committee: "The Chiefs of Staff Committee"
 ENG_The_Chiefs_of_Staff_Committee_desc: "The Chiefs of Staff Committee is an organisation made up of the highest-ranking officers in all branches of the British military. It was founded in 1923 as a subcommittee of the Committee of Imperial Defence to help with strategy research. The First Sea Lord, Chief of the Imperial General Staff, and Chief of the Air Staff all meet to decide and advise the rest of the armed forces, as well as some members of government, on the tactics, preparations, probabilities, and other military matters pertaining to various operations that will be carried out. It is one of the many critical components of our offensive and defensive planning, and it will undoubtedly play an important role in ensuring British victory in any war, regional or global."

 ENG_Disband_Territorial_Army: "Disband Territorial Army"
 ENG_Disband_Territorial_Army_desc: "Our new appeasement policy to avoid another Great War has been working satisfactorily up to this point. We believe we can disband the Territorial Army and retrain those troops as full-time workers to help our economy recover from the Great Depression. Although this is a risky decision because we lose the ability to rapidly deploy a fully trained standing army at a moment's notice in the event of a disaster, the new age of 'peace, not war' is sufficient to comfortably disband our Territorial Army."
 ENG_Disband_Territorial_Army_tt: "§YThe future of our Territorial Army will be decided§!."
 ENG_Disband_Territorial_Army_Rhineland_tt: "Germany hasn't remiliterized §YRhineland§!."

 # Navy Branch

 ENG_Royal_Navy: "§3The Royal Navy§!"
 ENG_Royal_Navy_desc: "The modern Royal Navy is only about 400 years old. However, our island's maritime history dates back much further, with fleets operating on an as-needed basis for centuries. In its centuries of existence, the Royal Navy quickly rose to prominence among the world's navies and is now unrivalled in size or seamanship. Every sailor worth their salt, however, knows that that reputation was built on a foundation of stupid mistakes.\n\nHowever, no one has ever been brave enough to openly challenge the Senior Service since Trafalgar. The Krauts were the first to challenge us during the Great War, but they were defeated so badly that they never tried again. This complacency, however, has resulted in a certain amount of rust. It goes without saying that centuries of tradition are a double-edged sword. When it occurs, innovation within the Service is rare and slow. Meanwhile, Japan's surface fleet has grown rapidly, and the Axis submarine fleet dwarfs ours. More extensive reforms are required if Brittania is to rule the waves for the next century."

 ENG_Maritime_Minefield: "Maritime Minefield"
 ENG_Maritime_Minefield_desc: "With the conversion of merchant ships to mine laying, plans for defensive minefields along the shallow waters of the Dover River Straits and offensive minefields in the Heligoland Bight Bay area, as well as others in the areas surrounding the Isles, have been developed. Mining the Dover Straits in collaboration with the French Navy will disrupt submarines passing through the English Channel towards the Atlantic Ocean, while in Heligoland, it will make our adversaries reconsider committing naval forces to the area.\n\nDespite minor setbacks with our cruisers and the use of dummy mines to create the illusion of numbers, intelligence reports have given us confidence to continue these operations. His Majesty's Navy rules the waves, so it is fitting that it should now rule Poseidon's realm."

 ENG_Fleet_Air_Arm: "The Fleet Air Arm"
 ENG_Fleet_Air_Arm_desc: "The Fleet Air Arm is the Royal Navy's aviation wing, and it includes the planes and aircraft that support the various armadas' operations, as well as the planes that take off from carriers. They have proven to be an extremely effective tool in the fight against our adversaries, giving our grand fleets the advantage they require to sink, capture, and destroy as many opposing ships as possible. They are truly some of the unsung heroes of the United Kingdom, deployed in any fight and on any terrain, and we should provide them with better tools to do their jobs.\n\nA focus on these noble airmen will undoubtedly result in additional research into naval aircraft, providing the Fleet Air Arm with new innovations and plane models to carry on their noble work. The effects of this focus may even propel us further ahead in aerial research than resurgent powers like Germany and rapidly growing ones like the United States. Britannia has always ruled the waves, but now it's time to modernise and upgrade the Fleet Air Arm so we can rule the skies alongside our great Royal Navy!"

 ENG_Modernise_the_Escort_Ships: "Modernise the Escort Ships"
 ENG_Modernise_the_Escort_Ships_desc: "A carrier or battleship does not constitute a fleet; a diverse fleet is required to cover all eventualities. While a battleship or a carrier can compete with their equals on the other side, they are not designed to fight all types of enemies. To combat smaller ships such as destroyers and cruisers, destroyers and cruisers are required. Our escorts have remained largely unchanged since the Great War, with only minor modernizations to keep them on par with more modern ships fielded by the United States, Germany, and Japan. However, piecemeal modernization of old ships can only get us so far.\n\nNew models are required if we are to maintain control of the seas and effectively protect our many fleets around the world. We've already spent a lot of money on new destroyer and light cruiser designs. It's past time to provide them with the resources they require to begin construction."

 ENG_ASW_Drills: "Anti-Submarine Warfare Drills"
 ENG_ASW_Drills_desc: "Because England is a densely populated island, it is almost uniquely vulnerable to the ravages of submarine warfare. We import the majority of our food and materials from other countries, and a coordinated and effective submarine campaign could easily cut those lifelines. The Germans tried during the last war, but we were able to contain their fleet before things got out of hand.\n\nThe Kriegsmarine of today, however, is not the same as the fleet of 1914. They have made significant investments in submarines, even at the expense of their surface fleet. The Italians have also made significant investments in submarines, and they now have Europe's largest submarine fleet. As the next war becomes more likely, we must devise effective countermeasures to keep our supply and communication lines open around the world."

 ENG_The_Royal_Marines: "Royal Marines"
 ENG_The_Royal_Marines_desc: "The Royal Marines are just as important to our military efforts as the Navy. We can't fight our enemies on the Continent or elsewhere; the Marines are essential in establishing a beachhead. Regular soldiers have enough to worry about without being taught the complexities of beach landings under fire. Dedicated Marines, on the other hand, are a new concept, which means there is plenty of room for creativity.\n\nWe already have a lot of experience in the field from the formation of our Empire, probably more than anyone except Japan or the Americans. We must capitalise on this experience and establish ourselves as masters of marine warfare to ensure that we can not only land anywhere we damn well please, but also resist any landing. We can easily counter the enemy's tactics if we know what they are."
 ENG_The_Royal_Marines_tt: "§5Unlocks the Royal Marine Division template.§!"

 ENG_Coastal_Command: "Form Coastal Command"
 ENG_Coastal_Command_desc: "To assure our people that no hostile nation will ever successfully invade the British Isles, we will have to fortify our beaches and our coastal cities. Men will be trained to defend their homes, fighters and naval bombers will be brought on nearby airfields and our citizens will know what to do, if the enemy come near us. Nothing can defeat us. Their pilots, their navy and their soldiers shall be nothing when compared to the will and determination of the British people."

 ENG_Shutting_Down_the_Shipping_Lanes: "Shutting Down the Shipping Lanes"
 ENG_Shutting_Down_the_Shipping_Lanes_desc: "During the Great War, German U-boats wreaked havoc on our and our allies' shipping lanes. They appeared out of nowhere and wiped out entire convoys carrying critical supplies. Not to mention our own blockade, which has done much to weaken Germany. We learned a lot from the experience. Not only should we do everything possible to prevent this type of warfare from being used against us in the future, but it also gives us firsthand knowledge of its effectiveness. Submarines and surface raiders must be used to disrupt our adversary's overseas supply lines. Our near-complete naval dominance will make such a campaign easier, but not trivial."

 ENG_Invest_in_the_Silent_Service: "Invest in the Silent Service"
 ENG_Invest_in_the_Silent_Service_desc: "As our adversaries on the Continent and elsewhere prepare for the next war, we must do the same. One method is to increase the size of our submarine force, known as the Silent Service. We were not the first to use submarines, and the Admiralty has been hesitant to embrace them until recently.\n\nHowever, their victories in the previous war eventually swayed the old guard. It may be 'ungentlemanly,' but so is war, and if we do not build up our submarine fleet, we will pay the price when war returns. So, in addition to investing in top-of-the-line submarines, we will begin research into these newly popular weapons of war so that our men always have the best of the best available to them."

 ENG_Freshen_Up_the_Training_Bases: "Freshen Up the Training Bases"
 ENG_Freshen_Up_the_Training_Bases_desc: "The Royal Navy has a global network of bases, so no matter where our fleet sails, it will not be far from resupply, greatly extending our range. However, some of these bases also serve as training grounds for aspiring sailors to gain sea legs. While this reduces the effectiveness of the base to some extent because many of its workers are green, it more than compensates by ensuring that said bases are always fully staffed.\n\nHowever, our training regimen has become somewhat out of date. The majority of it is focused on servicing and operating battleships and cruisers, with little emphasis on newer weapons like submarines and no emphasis on carriers. The nature of naval warfare is changing, and once-feared battleships are being supplanted by submarines and carriers. We need to shake up this increasingly outmoded training system and prepare our sailors for a new era."

 ENG_Assault_Landing_Crafts: "Assault Landing Crafts"
 ENG_Assault_Landing_Crafts_desc: "The British Army is no stranger to naval landings. Naval landings have been perfected for as long as Britain has been at war on foreign shores, dating back to Quebec in 1759 and even earlier. However, war has changed dramatically since 1759, and bloody lessons have been learned. Back in Gallipoli, we rowed our men ashore in rowboats, as has been done for generations, but modern warfare made this a difficult strategy. Men are heavier and carry heavier weapons, not to mention the numerous roles played by the men in a platoon. Rowboats, as they are typically constructed, are too weak to carry all of the men of a platoon, even when fully loaded in kit.\n\nAs a result, we will develop a specially designed landing craft known as the Assault Landing Crafts. Built to carry an entire platoon plus five support troops, it is light enough to be carried by civilian davits and has a shallow draught that allows it to drop its load in as little as 18 inches of water. When we have all of that, we will have a significant advantage over the enemy, no matter who it is."

 ENG_Torpex: "Torpex"
 ENG_Torpex_desc: "The torpedo explosive, or, for short, Torpex, was designed at the Royal Gun Factory of Waltham Abbey in 1899. Although a lot more powerful and more stable than its counter part, dynamite, it wasn't put into service, since the cost of production was too great at the time. But now, with modern technology, we can easily produce it and use its enormous potential to hunt down submarines and warships alike."

 ENG_Fund_the_Repair_Yards: "Fund the Repair Yards"
 ENG_Fund_the_Repair_Yards_desc: "There are shipyards all over the empire, and each one has drydocks for new ships as well as repair yards. These docks allow our Navy to continue building new ships while keeping our older ones in fighting shape, effectively multitasking assignments that many navies have proven unable or unwilling to do. Budget cuts, on the other hand, have undeniably harmed these vital institutions. Crew cuts, outdated equipment, and a lack of maintenance have all taken their toll, and recent reports have begun to raise alarm bells. If we are to solve these issues, we must be willing to increase their budget. Every pound spent now will be repaid with men saved down the line."

 ENG_Fund_the_Anti_Submarine_Training_School: "Fund the Anti-Submarine Training School"
 ENG_Fund_the_Anti_Submarine_Training_School_desc: "With German U-boats and Italian submarines posing one of the most direct threats if and when war breaks out, it is only natural that we begin training our men to counter them. This has resulted in the establishment of the Anti Submarine Training School on the Scottish Hebridean island of Mull. It is safe enough from German attack that we can train undisturbed without having to keep an eye out for enemies.\n\nThe school will be led by Gilbert Stephenson, the only logical choice. During the last war, the sixty-something Londoner trailblazer pioneered anti-submarine tactics. With war on the horizon, the man has volunteered to return to service. He will be the first headmaster of the Anti-Submarine Training School, and he will be instrumental in winning this war."

 ENG_The_Defenders_of_Imperial_Trade: "The Defenders of Imperial Trade"
 ENG_The_Defenders_of_Imperial_Trade_desc: "While submarines are a formidable foe on the high seas, they are not the only threat to our trade. Our Royal Navy cannot constantly patrol the entire coast. That means enemy surface ships can and will spread out into the world's oceans to prey on our convoys. A heavy ship like the Bismarck or the Togo doing that would be a disaster, capable of blowing anything we have out of the water. To compensate for the smaller ships, we will increase the deployment of light cruisers. These ships will be large enough to chase away the majority of what will be preying on our convoys, but not so large that it will take years to build a single one."

 ENG_Stick_With_the_Big_Guns: "Stick With the Big Guns"
 ENG_Stick_With_the_Big_Guns_desc: "One truism has been held since the beginning of naval history. Through countless centuries and numerous advancements, it has remained an unmistakable fact that Neptune favours the fleet with the most powerful weapons. People have recently attempted to change this. These 'aircraft carriers' are expected to revolutionise naval warfare and make battleships obsolete. However, some in the Admiralty, led primarily by John Tovey, disagree with this assessment.\n\nAircraft carriers are, in fact, more vulnerable. With the few guns they have being peashooters in comparison to many of our standard calibres, they won't stand a chance if we can just close the distance. Of course, the aircraft launched by those carriers may pose a problem. However, with enough defences in place, even this minor issue will be insignificant. Let us stick to what has worked in the past and will continue to work in the future, while others play with what are clearly dead ends."

 ENG_Projection_of_Power: "Projection of Power"
 ENG_Projection_of_Power_desc: "Naval warfare is a field that has always been open to new ideas. From the caravel to the battleship, humanity has not paused in its quest to master the vast blue sea that surrounds us all. As an island, our country was designed to be a naval power, and it has naturally controlled all of the world's oceans for the past hundred years. To maintain our dominance, we must continue to innovate. The aircraft carrier championed by Baron Bruce Fraser appears to be the most recent innovation. A massive flattop designed specifically as a sailing airport.\n\nWhile untested in combat, initial results show promise. A swarm of specially designed planes, such as naval bombers and torpedo bombers, could overwhelm even the most formidable battleship defences while attacking from angles previously unthinkable in naval strategy. Not to mention the ability to strike targets from the air that are out of range of home airports. Of course, the carriers are extremely vulnerable, as the majority of their weapons and defences are provided by the planes. However, as the nucleus of a fleet, it will be adequately protected to be useful."

 ENG_Vanguard_Fast_Battleship: "The Vanguard"
 ENG_Vanguard_Fast_Battleship_desc: "Germany and Japan are likely to be Britain's next adversaries in the next war. This presents a bit of an issue. Both Germany and Japan are building battleships to compete with our fleet, and while this isn't a big deal individually, the two can build more ships faster than we can. We, of course, are not taking this lying down and have already begun the construction of adequate countermeasures; however, building a new battleship takes time, which brings us back to the crux of the problem.\n\nThat is why the Navy has proposed a sort of stopgap measure. We can make something that does what we need it to do by slapping some bigger guns we have in storage onto a modified Lion class ship, at least until the real battleships sail out of the harbour."

 ENG_The_Superb_Class: "The Superb Class"
 ENG_The_Superb_Class_desc: "The world is changing at a breakneck pace. The old order and its rules are rapidly disintegrating, most notably the Washington and London Naval Treaties. If we follow the rules while our opponents openly break them, we will be left in the dust. As a result, the Navy has revealed the new Superb Class Super Heavy Battleship. The Superb, the Empire's flagship, will be able to go anywhere and sink anything because it is the heaviest and most armed ship the Empire has ever sent to sea. Nothing will stand in its way, nor will the threat posed by Germany and Japan."

 ENG_Woolworth_Carriers: "Woolworth Carriers"
 ENG_Woolworth_Carriers_desc: "With carrier technology improving tremendously, it is becoming harder and more expensive to produce them. So, in order to keep up to date in our numbers, we must start building “Woolworth Carriers”, otherwise known as Escort Carriers, which are smaller then normal fleet carriers, carry less planes, and are less armored. However, their cheap production cost will allow us to produce them quickly enough to maintain and secure our naval superiority."

 ENG_Audacious_Fleet_Carriers: "Audacious Fleet Carriers"
 ENG_Audacious_Fleet_Carriers_desc: "As aircraft carriers have become increasingly important in naval warfare, our designers have sought new ways to maximise their aircraft complement. Most countries do so by making their carriers larger or their planes smaller. Our top men have devised a new, truly revolutionary solution. They have proposed developing a new class of carrier with double decker hangers. It will undoubtedly make the carriers larger, but we will be able to fit twice as many planes on them. This will allow us to save space, avoid spending years expanding shipyards to accommodate larger ships, and effectively utilise every metre of space."

 ENG_Britannia_Rule_the_Waves: "Britannia Rules the Waves!"
 ENG_Britannia_Rule_the_Waves_desc: "'Rule Britannia! Britannia Rules the Waves!' A decade ago, that sounded like hollow boasting from an ageing power waiting for the latest threat to destabilise it. However, after years of sweat, blood, and tears, we have changed our situation. The Navy has just gone through its most radical transformation in history. We will no longer 'make do' with older ships, patching them up in the hope that their upgrades will be adequate for the latest designs.\n\nOur shipyards and repair yards will no longer have to make do with failing equipment and limited manpower. Our brave sailors and Marines will no longer have to make do with subpar equipment and training. Our navy is now and always will be at the top of its class, capable of meeting and defeating any who dare to challenge her dominance. And as we watch our enemies sink beneath the waves, surrounded by fire and smoke, we will know that the Britons will never be slaves!"

 ENG_Prepare_Bletchley_Park: "Prepare Bletchley Park"
 ENG_Prepare_Bletchley_Park_desc: "With the invention of radios and their incorporation into warfare, it has become necessary to encode orders in order to prevent your enemies from learning what you intend to do before your troops do. Many countries have already established or are planning to establish their own cryptology bureaus. We will not be any different. Bletchley Park, an ancient estate just outside of Northampton, has been designated as the ideal location for this new bureau.\n\nIts geographic centrality, close proximity to numerous major communication arteries such as railroads and roads, makes this location almost tailor-made for intercepting encoded messages. Working under the SIS, Bletchley Park shall be dedicated solely to gathering and combining Allied knowledge of enemy military codes, cracking said codes, and decoding enemy transmissions. It's safe to say that if Admiral Sinclair's pet project succeeds, it will have a huge impact on the upcoming war."

 ENG_British_Army: "§aThe British Army§!"
 ENG_British_Army_desc: "While our Navy is rightfully proud of its capabilities, the British Army has never been dismissed. We demonstrated this repeatedly at battles such as Waterloo, Agincourt, and, most recently, Passchendele. While never as large as Continental armies, our Army makes up for it in professionalism forged in the crucible of war and steeped in centuries of tradition. However, things have recently changed for the British Army.\n\nDisgusted by the senseless slaughter of the Great War much of Europe scaled back military spending in its aftermath. We were no exception. The British Army, while still formidable and far from small, operates on a shoestring budget. It's no secret that our generals complain in their officer's halls about the British Army being the smallest in centuries. However, with authoritarians and expansionists on the rise throughout Europe, our government, while still working for peace, must face facts. War is on its way, and we must prepare."

 ENG_Continue_Conservative_Casualty_Avoidance: "Continue Conservative Casualty Avoidance"
 ENG_Continue_Conservative_Casualty_Avoidance_desc: "For much of British history, our Army drew a large portion of its strength from the British Isles. As a result of our Army's limited manpower pool, it has always been small. Unlike the titans of America, Russia, and, to a lesser extent, France and Germany, we simply cannot afford to put our men through meat grinders. With a British Army, Verdun would be impossible to conquer. Not only do we lack manpower, but we also lack willpower in large numbers. Our people will almost certainly not tolerate another Ypres.\n\nSo, to the best of our ability, the British Army has followed a casualty-avoidance doctrine. We can save our men's lives while also achieving the best results for those who are unavoidably lost by taking calculated risks and exercising as much caution as is reasonable."

 ENG_Expand_Liddell_Harts_Influence: "Expand Liddell Hart's Influence"
 ENG_Expand_Liddell_Harts_Influence_desc: "Everyone who lived through the last war was scarred, especially those who suffered in the trenches. Basil Liddell Hart was one of those who suffered greatly. He looked for alternatives after being disgusted by the senseless waste of lives exemplified by the numerous frontal assaults.\n\nSince 1917, Hart has been an active and vocal supporter of what he refers to as a \"indirect approach.\" He has advocated for striking where the enemy least expects it in order to keep them off balance and, possibly, topple them entirely with a series of unexpected yet decisive strikes. This strategy may be more effective than even Hart realises with the new tank technology. Until now, however, his theory has been marginalised, but if we are to remain competitive, new ideas must be welcomed."

 ENG_Expand_the_Royal_Artillery: "Expand the Royal Artillery"
 ENG_Expand_the_Royal_Artillery_desc: "The British Army has used artillery since the mid-14th century, and artillery regiments were among the few year-round regiments in the British Army prior to the establishment of the regular army, stationed at forts throughout the Kingdom. The Royal Artillery Regiments, on the other hand, were formed in the early 18th century. Since then, it has grown as needed, such as during the Great War. However, the core of two Regular Army companies has not changed. This cannot go on. The last war demonstrated the superiority of artillery on the battlefield.\n\nWe cannot waste time training volunteers if we are to develop an experienced and effective artillery command. We must modernise the Royal Artillery so that it can meet the challenges of a modern battlefield. The Army has proposed two more formations and expanded all four to regimental size. Future plans call for six fully manned regiments, but this may be delayed."

 ENG_Modernise_the_Rifle_Regiments: "Modernise the Rifle Regiments"
 ENG_Modernise_the_Rifle_Regiments_desc: "Infantry are the foundation of any army. That is a simple fact that is barely worth mentioning. You can't fight a war if you don't have anyone to take objectives. However, the British Army, which is already underfunded in peacetime, has lagged behind in some ways. Our Rifle Regiments are the most visible example. As the backbone of our Army, they make up the majority of our force but have to make do with weapons that are years out of date.\n\nMeanwhile, our adversaries are making constant and extreme advances in infantry weapons and equipment. If our boys are to stand, man for man, against the rising tide of evil, we must quickly arm them with the best weapons we can produce. We may have to import some guns from other countries, but this is just a band-aid for bigger problems."

 ENG_Mobility_Over_Firepower: "Mobility over Firepower"
 ENG_Mobility_Over_Firepower_desc: "Many military doctrines do not differ fundamentally from one another. Most provide various opportunities to smash your opponents with as much ordinance as possible. This game of 'bigger hammer' is and endless cycle; it will never end! We, on the other hand, have discovered a completely new path. While every country has embraced it to some extent, few have done so as wholeheartedly as we have. Old Boney demonstrated the benefits of a sufficiently quick march; now we will take his ideas and push them to their logical conclusion.\n\nBecause of widespread vehicle adoption, British units will become the fastest in the world. As our adversary advances to the front, we will manoeuvre around their flanks and exploit gaps. As an added bonus, mobility will keep us from becoming mired in another attritional trench war. The Germans call themselves masters of this type of warfare; we will demonstrate how a true master employs his tools."

 ENG_Invest_In_the_Royal_Armoured_Corps: "Invest in the Royal Armoured Corps"
 ENG_Invest_In_the_Royal_Armoured_Corps_desc: "We invented the tank. They were created by our genius, and they were first used by our military at Arras. However, as admitted visionaries like Rommel advanced the field, we fell behind. Our designs are not completely obsolete, but if the rumours coming out of Germany are true, we may soon be completely outclassed. Not to mention that we've never really mastered how to use them. If we are to reclaim our position as the world's leading tank power, we must invest heavily not only in new designs but also in education. We need to find our own strategic visionaries and support those we already have, such as JFC Fuller."

 ENG_The_Indirect_Approach: "Develop the Indirect Approach"
 ENG_The_Indirect_Approach_desc: "The only way for victory to truly be assured for the nation without bringing massive cost to our nation is to employ an adapted form of what led to our victory in the first war. Our stranglehold on the world economy guarantees that should we wish, we could economically break any nation over a long period of time in a drawn out defensive war. Following the inevitable physical and psychological breakdown of the opposing nation's soldiers, as seen in the Great War, we can utilise our new technologies of mechanised and light armor to force their lines back and bring their nation to the negotiating table, without too much blood being spilt. Enough was drained from Europe in the Great War, we need not have another Lost Generation - and this style of war ensures it shall not come to pass again."

 ENG_Tank_Marines: "Tank Marines"
 ENG_Tank_Marines_desc: "A Marine will tell you that the Navy is the world's most expensive taxi service. Liddel Hart essentially wants to make that joke true for footmen. It is self-evident that unaided infantry cannot keep up with tanks. They would stifle the attacks and invalidate the fundamental principle of Hart's entire strategy. That is why he has advocated for 'tank Marines,' as he refers to them.\n\nThese are tanks, trucks, and APCs designed specifically to assist infantry in keeping up with the fast armoured spearhead. As the tanks approach something they can't crack on their own, the infantry dismounts, reduces whatever is in the way of the armour, and then reloads for faster advances. It's a simple concept, but Hart believes it will be a positive force multiplier for the armoured force."

 ENG_The_Churchill_Tank: "The Churchill Tank"
 ENG_The_Churchill_Tank_desc: "There are several types of tanks available through our service. The Churchill tanks are one of the more well-known models, named after their greatest political champion: Winston Churchill. That or the Duke of Marlborough, John Churchill. Nobody can tell a coherent story. These tanks are being designed with the next war in mind. It will almost certainly be fought in conditions similar to the last war. This means that our tanks must learn from their predecessors. Infantry tanks evolved from the rhomboid male and female behemoths that trudged through Flanders.\n\nThese tanks are ideal for their assigned role to assist infantry attacks, due to their heavy armour, large tracks, and powerful gun. Men marching at a slower pace than vehicles has allowed these behemoths to become practical. They do lose most of their utility after a breakthrough as the infantry rushes ahead. However, when we come across another hard point or defensive line, these beauties will be there to help us break it open."

 ENG_Focus_on_the_Cruisers: "Focus on the Cruisers"
 ENG_Focus_on_the_Cruisers_desc: "Tanks have evolved into a new role as they have become more refined. After thousands of years, they have begun to render the ancient cavalry unit obsolete. However, there is little to compensate for the gap that cavalry filled. Trucks are not and cannot be assigned to each and every infantryman; it is simply not feasible. We must be able to exploit breakthroughs with fast-moving but long-lasting weapons. This is where cruiser tanks come into play. While less armoured than their infantry tank counterparts, cruisers play a more important role. When infantry break through a line, these fast-moving tanks will burst through the gap and truly exploit openings."

 ENG_The_Universal_Carrier: "The Universal Carrier"
 ENG_The_Universal_Carrier_desc: "It's fine to have infantry advance on foot or in a truck, but it could be better. An infantryman on foot will tire, while a squad in a truck will be vulnerable. As a result, we have unveiled a new tracked light carrier design. The Universal Carrier is a small, light vehicle with a three-person crew. It is simple to make, powerful enough to pull a small gun, armoured, and armed with a Bren gun for defence. It will be useful for scouting and dragging our smaller calibres around the battlefield while protecting the men on the inside. All that remains is to begin production."

 ENG_The_Path_of_Least_Resistance: "The Path of Least Resistance"
 ENG_The_Path_of_Least_Resistance_desc: "Hart's doctrine has a very specific focus, and that is infantry supported by fast but powerful light tanks. He hopes to keep the opponent on the back foot with these quick jabs before the knockout blow. Some have suggested using heavier tanks, but both the High Command and Hart are sceptical. Hart is sceptical that a large enough tank could overcome any obstacle.\n\nHe has remained firm in his belief that infantry should be carried alongside tanks to assist them in breaking through the hard points that the tanks cannot overcome on their own. Tanks, with infantry support, can then push through the lines, throwing the enemy off guard and preventing the war from stalling, as it did in 1914. To keep the tanks moving as quickly as possible, they must be lighter. Hart believes that, with the infantry on their side, the risk to the tanks is negligible."

 ENG_The_Fuller_Compromise: "The Fuller Compromise"
 ENG_The_Fuller_Compromise_desc: "After months of deliberation, Liddel Hart and JFC Fuller have agreed on a new strategy. Hart has come around to Fuller's insistence on tanks playing a larger role in this new Army. Tanks that are both well armoured and fast will not only be able to keep up with the infantry, but will also be able to overcome whatever the enemy throws at them. The infantry can then hold what the tanks take. It's a high-level compromise; Fuller is upset that he won't have his lauded \"tank army\", and Hart is unsure about putting less emphasis on infantry.\n\nBecause both parties are dissatisfied, this could work. The 'quick jabs' that Hart mentions can lead to knockout blows on their own. Of course, this will necessitate the development of newer, heavier tanks, as much of the fleet is lighter than necessary. However, because the two men meet almost every day, the General Staff is excited about the possibility. Jerry refers to this method of warfare as \"maneuver warfare\", and it will be Britain's future with Hart and Fuller at the helm."

 ENG_Empire_Wide_Defence_Planning: "Empire-Wide Defence Planning"
 ENG_Empire_Wide_Defence_Planning_desc: "Our Empire is unique in its scope. There is no part of the world where the King does not rule, and no continent is immune to our influence. However, this makes defence particularly difficult. The British Army, or Home Army, is rather small, and most of the Empire's far-flung reaches are guarded by garrisons, usually recruited from locals.\n\nWe have previously focused on defending the Home Islands from attack, and this will continue to be the primary goal of our defensive plans. However, as war threatens to engulf the entire world, we must work with our colonial garrisons to defend our borders. Hopefully, no British citizen will ever have to endure the humiliation of occupation!"

 ENG_The_Recce_Corps: "The Recce Corps"
 ENG_The_Recce_Corps_desc: "Many British units were previously responsible for their own reconnaissance. This is inefficient because it necessitates more training for the men and reduces a unit's strength because a detachment is forced to go out ahead of the rest of the unit. The Reconnaissance Corps, or Recce Corps as it is known among the men, is the simple solution. These men have received special training in observing and sneaking around enemy lines.\n\nThis squad will be more effective than regular soldiers because it will be entirely dedicated to reconnaissance. More importantly, it will not divide our units' missions. Our fighting men will concentrate on fighting, and with the Recce Corps spreading out ahead of them, they will do so with as much information on our adversary as we can provide."

 ENG_Entrench_the_Empire: "Entrench the Empire"
 ENG_Entrench_the_Empire_desc: "Our Empire is the largest in the world, and possibly in history. While its bounty provides us with numerous benefits, it also exposes an easily exploitable weakness. We have nearly limitless borders, much of which is shared with our soon-to-be adversaries. Even the most powerful armies would struggle to actively defend every mile of a board as long as ours. Instead, we will do what all nations would do in our situation: we will dig in.\n\nWe will fortify our borders to repel any enemy advance and provide weapons to our local garrisons to buy time until regular Army soldiers arrive. It's not a glamorous strategy, and if any particular sector bogs down too much, we risk invalidating our casualty avoidance strategy, but we have no choice."

 ENG_Enlarge_the_Royal_Army_Ordnance_Corps: "Enlarge the Royal Army Ordnance Corps"
 ENG_Enlarge_the_Royal_Army_Ordnance_Corps_desc: "Experts study logistics, while amateurs study strategy. If this is the case, the Royal Army Ordnance Corps has one of the most important roles in the Army. They are in charge of transporting and repairing military equipment to and from the Front. They may have been around longer than any other corps in the British military today, descended from the old Ordnance Board and, by extension, the various craftsmen who used to make weapons of war during the age of sword and steel. However, the constant evolution of warfare has forced constant adaptation, so their age has not left them rusty. However, as the Army grows, it risks dwarfing the RAOC's current capabilities. Let us ensure that they can keep up with a massive increase in their ranks now and in the future."

 ENG_A_Buildup_of_Mobile_Artillery: "A Buildup of Mobile Artillery"
 ENG_A_Buildup_of_Mobile_Artillery_desc: "Artillery in the Great War was enlarged versions of Napoleonic cannons. They were, however, less mobile due to their weight. While leaving a gun in a hole for four years worked when the front didn't move much, now that fluidity is expected to return to the battlefield, that strategy can't be used.\n\nThankfully, tank innovation has once again come through to provide a solution to our problem. We can field'mobile artillery' capable of keeping up with even the most rapid advances by slapping an artillery gun onto a modified tank chassis. They are not only fast, but they can be quickly deployed in almost any situation, giving even the smallest skirmish the power of a 155mm howitzer."

 ENG_Learn_from_the_Experimental_Mechanised_Force: "Learn from the Experimental Mechanised Force"
 ENG_Learn_from_the_Experimental_Mechanised_Force_desc: "Our experiments with the 'Mechanised Battalion' are bearing fruit. We've devised a rough formula for the composition of these new battalions, as well as a reliable strategy for employing them. It has also aided in the advancement of various tank and truck research avenues as our factories work to make tanks faster and stronger, and our trucks up to match their speed. A recent communique from the General Staff to the War Department about a recent demonstration of these new tactics summed up the Army's feelings on the new tactics quite well, using the phrase \"simply revolutionary\"."

 ENG_Fund_the_Medical_Corps: "Fund the Medical Corps"
 ENG_Fund_the_Medical_Corps_desc: "Regardless of how careful we are in avoiding casualties, some unfortunate soul will be hit by a bullet. If the bullet doesn't kill them, they'll be taken care of by the Medical Corps. This talented corps of surgeons, veterinarians, and doctors work behind the lines, far from danger, but are just as important in winning the war as any Tommy. They make certain that our boys return home safely, even after being hit.\n\nAs the war approaches and the Army grows, it has been agreed that the Corps must be expanded. More doctors, better equipment, more hospitals, better training—everything to ensure that those who put their lives on the line for King and Country receive the best care possible, both during and after their harrowing stay on the Front."

 ENG_Expand_the_Royal_Corps_of_Signals: "Expand the Royal Corps of Signals"
 ENG_Expand_the_Royal_Corps_of_Signals_desc: "The Royal Corps of Signals is as important as any other Army corps, if not more so. They are in charge of maintaining communication between individual units and their commanders, as well as among themselves. Without their expertise, our growing Army would quickly devolve into an unorganised mob and be crushed. That is why their request for simply more has been given such weight. They require more radio operators, radios, and training. They will have everything they desire and more in order for us to have the best possible view of the battlefield, wherever it may be."

 ENG_The_Universal_Tank: "The Universal Tank"
 ENG_The_Universal_Tank_desc: "Until recently, most tank forces had a variety of models for a variety of purposes. Light tanks were designed to hit quickly and hard while the enemy struggled to catch you. Heavy tanks are sledgehammers designed to take massive amounts of damage and deal even more, atomize whatever stands in their way, and trundle on until they come across another impassable obstacle to obliterate. Medium tanks are the closest thing to a perfect marriage of the two. They have the speed to strike the enemy quickly and the power to strike hard.\n\nThey are not as fast as light tanks and do not have as powerful a gun as heavy tanks. Despite these disadvantages, many generals, Montgomery foremost among them, have developed a novel new idea as an evolution of the medium tank concept. They claim that with a little more tinkering, medium tanks can evolve into a sort of 'Universal Tank' capable of doing whatever job is required of it. They've even presented a design codenamed Centurion. While some members of the General Staff may dismiss the idea, the Government has not. The Centurion will be funded, and Britain will be the tank design powerhouse of the future!"

 ### Wartime Tree
 ENG_A_Clear_Conscience: "A Clear Conscience"
 ENG_A_Clear_Conscience_desc: "The recent invasion of Czechoslovakia by Nazi Germany revealed the true intentions of our eastern neighbour. Hitler's regime is clearly not content to simply redraw the map of Europe; they are bent on dominance and conquest, and no nation is safe from their aggressive ambitions.\n\nAs a country, we cannot sit back and let this threat pass unnoticed. We must act to counter the German threat and protect our own and our allies' interests. This act of aggression served as a wake-up call to the rest of the world. It is time for us to rise to the occasion and confront the German threat with all of our available resources. Together, we can ensure that freedom and democracy triumph over tyranny."

 ENG_Issue_Gasmasks: "Issue Gasmasks"
 ENG_Issue_Gasmasks_desc: "Modern technologies promise us a war unmatched in its brutality.\n\nWith long-range bombers and poison gas, the enemy can make the bustling streets of London look like the smoggy, corpse-filled trenches at Ypres. While the RAF will do everything possible to keep Britain's familiar grey fog from turning green, the Committee of Imperial Defense has already taken steps to protect our people from a successful gas attack on British soil.\n\nThe Air Raid Precautions service will immediately begin distributing gas masks to the civilian population, as well as training specialist teams to decontaminate affected areas. While we pray neither will ever be needed, it is better to be safe than sorry."

 ENG_Western_Trade_Treaties: "Western Trade Allies"
 ENG_Western_Trade_Treaties_desc: "One of the immediate effects of the Wall Street Crash was a sharp decline in international commerce. Foreign markets proved unwilling to pay ever-increasing tariffs for foreign goods, and the Atlantic shipping sector ground to a halt. The northern industrial cities of Manchester, Liverpool, Leeds, Sheffield, and Bradford- their economies centered on the production of textiles, steel, coal, and ships for export- were particularly devastated by the near-collapse of global trade that followed the 1929 crash.\n\nThe Foreign Office has proposed a series of trade treaties with the United States and France, intended to deepen ties with our old allies and restart the British export economy. Should our prospective partners accept, this could be a critical step toward recovery for all parties."

 ENG_Food_Rations: "Food Rations"
 ENG_Food_Rations_desc: "With the war in full swing and the threat of German invasion looming, we are facing a critical food shortage. As a result, the government has implemented a food rationing system to ensure that everyone in the country receives an equitable share of available supplies.\n\nOur attention must now be directed towards the effective implementation of this rationing system. Even if some may disagree with our decision, we can ensure that our people are well-fed and ready to face whatever challenges lie ahead by carefully managing our limited resources. We can ensure that our people have the food they need to fight tyranny and oppression if we take a proactive approach to the challenges of food rationing. We can overcome these adversities and emerge stronger than ever before if we work together."

 ENG_Speed_Up_Rearmament: "Speed Up Rearmament"
 ENG_Speed_Up_Rearmament_desc: "As the war with Germany rages on, it is clear that we must act quickly and decisively to prepare for the impending conflict. The horrors of modern warfare were on display in the recent Spanish Civil War, and we must be prepared to meet the enemy on equal terms. As a result, we will launch a rearmament blitz to accelerate the development and testing of new weapons and equipment for our armed forces. This will entail increasing our industrial capacity and streamlining our production processes in order to meet the increasing demand for military hardware.\n\nFinally, we want to build a military force capable of defending Britain and its allies against any threat, no matter how formidable. We can ensure that our armed forces are prepared for modern battlefield challenges by accelerating our rearmament efforts and investing in cutting-edge technology. The clock is ticking, and the war with Germany is becoming more dangerous by the day. But, with determination and resolve, we can meet the challenge and ensure a brighter future for our country and people."

 ENG_The_Internment_of_Enemy_Aliens: "The Internment of Enemy Aliens"
 ENG_The_Internment_of_Enemy_Aliens_desc: "German refugees have poured into our country, causing an uproar among our civilian population. They face discrimination and harassment from British citizens, and some of them are suspected of working as Nazi spies.\n\nWe can house German refugees and citizens on the Isle of Man, where an internment camp used during the Great War is still in operation. If it fills up, there are other options, such as incomplete housing estates scattered across the country. This effort will be made for these German citizens in order for them to be \"safe\", because if we simply let our people do whatever they want, we are no better than our Nazi adversaries."

 ENG_We_Shall_Never_Surrender: "We Shall Never Surrender"
 ENG_We_Shall_Never_Surrender_desc: "We have arrived at our lowest point. The enemy has taken over much of Europe and is now preparing to attack our shores. But, in the face of this overwhelming threat, we must remain steadfast in our determination to defend our country and way of life. To that end, our Prime Minister, Winston Churchill, will issue a rallying cry to the British people. He will inspire us to band together against a common foe and fight with all our might to protect our liberty and independence.\n\nChurchill reminds us of the challenges we face and the sacrifices that will be required to overcome them in his famous speech. He exhorts us to persevere in the face of adversity, declaring that we will never surrender or give up the fight. Churchill's speech is a stirring call to action, galvanising the British people and inspiring us to stand united against tyranny and oppression. We can face the darkest hours with his leadership and emerge victorious on the other side."

 ENG_The_Defenders_of_Democracy: "The Defenders of Democracy"
 ENG_The_Defenders_of_Democracy_desc: "We recognise that establishing a united democratic front against the Nazi regime is the only way to ensure our collective security and defend our shared values. To that end, we will launch a concerted effort to form a coalition of like-minded nations and develop a coordinated strategy for defeating the Nazi threat.\n\nTo begin, we will seek out and communicate with other countries that share our commitment to democracy, human rights, and the rule of law. We will conduct diplomatic outreach, seeking common ground with other nations and encouraging them to join us in the fight against Nazi aggression.\n\nOur goal is to form a unified democratic front capable of effectively resisting Nazi aggression, defending our shared values, and constructing a better future for all. We can ensure that the light of democracy and freedom continues to shine brightly in a world threatened by darkness and tyranny through our concerted efforts and unwavering commitment to our shared values."
 ENG_The_Defenders_of_Democracy_tt: "Modify §YBritannia Defiant§! by \nDaily Democracy Support: §G+0.05§!"

 ENG_Tizard_Mission: "Tizard Mission"
 ENG_Tizard_Mission_desc: "The British Technical and Scientific Mission also known as the Tizard mission (Named after it's instigator Henry Tizard) is believed to be a risky gamble by many higher ups in the empire including our Prime Minister. Fortunately, Tizard has managed to convince them to start with a program of technological sharing between our countries so we can use the industrial power of the United States to produce these new technologies since we barely have the capacity for new ones."

 ENG_Home_of_the_Exiled: "Home of the Exiled"
 ENG_Home_of_the_Exiled_desc: "As the Nazi regime continues its conquest of Europe, many countries find themselves occupied and oppressed. In these dark days, Britain will be a beacon of hope and a safe haven for those fleeing Nazi tyranny. We will welcome exiled nations and peoples, providing them with shelter, support, and a place to rebuild their lives. We will provide food, clothing, and medical care to those in need, as well as work to ensure their dignity and freedom.\n\nWe intend to build a world in which all nations and peoples are free to live in peace and prosperity, free from oppression and tyranny. We will play a leading role in the fight against Nazi Germany and the creation of a new, better world for all as a safe haven for exiled nations."
 ENG_Home_of_the_Exiled_tt: "Every allied country with more than §Y90% capitulation§! will gain §G+25§! opinion of §Ythe United Kingdom§!"

 ENG_Continue_with_Tube_Alloys: "Continue with Tube Alloys"
 ENG_Continue_with_Tube_Alloys_desc: "As the war continues and the threat of Nazi Germany grows, Britain must do everything possible to develop new technologies and weapons that will give us an advantage on the battlefield. The Tube Alloys project, which is dedicated to the development of nuclear weapons, is one of our most important research programmes.\n\nDespite the challenges and risks, we recognise that the Tube Alloys programme is an important part of our war effort. If we can successfully develop nuclear weapons, we will have a powerful new weapon at our disposal that could help us end the war quickly and decisively.\n\nWe believe that the Tube Alloys programme is our best chance of winning this war. We can help to ensure that Britain remains at the forefront of technological innovation and has the tools and capabilities needed to defeat the Nazi threat and secure a brighter future for all by continuing to invest in this critical research programme."

 ENG_Assist_Manhattan_Project: "Assist the Manhattan Project"
 ENG_Assist_Manhattan_Project_desc: "Across the Atlantic, the Americans have called our attention towards a little project of theirs. The so called \"Manhattan Project\", from what the Americans tell us, could be the breakthrough we have been looking for to turn the tide of the war. The weapon is said to be the most powerful thing humanity has been able to produce: A bomb capable of destroying an entire city if built correctly. Such a tool could end the war within the matter of days, saving millions of lives in the process. Britain's help with such an achievement could very well be our salvation."

 ENG_The_Continuation_of_Governments: "The Continuation of Governments"
 ENG_The_Continuation_of_Governments_desc: "Many legitimate governments are exiled, cut off from their home countries and unable to exercise their legitimate authority. In these trying times, Britain must be a champion of democracy and freedom, working to support and defend these exiled governments and assisting them in reclaiming their rightful place in the world.\n\nTo that end, we will provide exiled governments with political, diplomatic, and material support, working to ensure that they are recognised as the legitimate representatives of their people. We will also work to mobilise international support for these governments, forming alliances and partnerships to help them strengthen their position and resist Nazi aggression.\n\nAiding exiled governments in reclaiming their rightful place at the forefront of the fight for freedom and democracy ensures that the light of democracy remains lit. We can help ensure that the values of liberty, justice, and human rights triumph over the forces of Nazi tyranny by standing with these governments and working to support and defend them."
 ENG_The_Continuation_of_Governments_tt: "Every allied country that has §Rcapitulated§! will gain §G+10§! legitimacy"

 ENG_A_Special_Relationship: "A Special Relationship"
 ENG_A_Special_Relationship_desc: "The importance of forging strong alliances and partnerships to ensure our mutual defence and a brighter future for all cannot be overstated. In that spirit, we will work to strengthen our ties with the United States, our long-standing ally and partner in the fight for liberty and democracy.\n\nWe will sign the Atlantic Charter, a joint declaration of principles outlining our shared vision for a more peaceful, prosperous, and just world, to cement our alliance and signal our commitment to shared goals and values. We will send a strong message to the world by signing this historic document that Britain and the United States are united in our commitment to freedom, democracy, and the rule of law.\n\nWe want to work with the US to build a stronger, more resilient alliance that can withstand today's challenges and help shape a better future for future generations. We can take a critical step towards achieving this goal and securing our shared values and interests in the years ahead by deepening our partnership with the United States and signing the Atlantic Charter."

 ENG_A_Force_Against_Occupation: "A Force Against Occupation"
 ENG_A_Force_Against_Occupation_desc: "Supporting resistance and exiled forces fighting against the regime is critical if we are to defeat the Nazi forces. To that end, we will launch a comprehensive effort to strengthen exiled countries' armies and provide assistance to resistance cells operating within their home countries.\n\nWe will work closely with resistance groups and exiled military forces to identify and establish relationships with them, providing them with training, equipment, and logistical support to help them resist Nazi occupation and defend their people. We will also work with other Allied powers to coordinate our efforts, sharing intelligence and resources to maximise our impact on the ground.\n\nResistance and exiled forces must strengthen themselves in order to reclaim their countries and liberate their people from Nazi oppression. We can achieve a brighter future for all and secure our shared values and interests for future generations by working together and standing united against our common foe."
 ENG_A_Force_Against_Occupation_tt: "Every allied country that has §Rcapitulated§! will gain §Gcombat bonuses§! in the fight against §RGermany and Italy§!"

 ENG_The_Homefront: "The Homefront"
 ENG_The_Homefront_desc: "The fate of the British Isles is in doubt, as the threat of invasion by Nazi Germany looms large. The British government must take bold and decisive action to defend its homeland and ensure the nation's survival. To that end, we must mobilise our armed forces, increase production, and fortify our defences by securing our sea lanes and preventing the enemy from landing troops on our shores, as well as building forts along the coast and mobilising the home guard.\n\nIf the worst happens, destroying our ports will prevent supplies from arriving in the event that the Nazis land on our shores. Flooding certain areas of the country can also help to slow down invading armies. This is a time of great danger for our country, but also of great opportunity. We can defend our homeland and win this battle for our very survival by banding together and taking bold action."

 ENG_The_Last_Vestige_of_Appeasement: "The Last Vestige of Appeasement"
 ENG_The_Last_Vestige_of_Appeasement_desc: "Appeasement policy has been disastrous for our country. Previously, we attempted to avoid conflict with Nazi Germany by caving to their demands and hoping for the best. However, this approach has only resulted in war and destruction. We must learn from our errors and abandon appeasement as a failed strategy. Instead, we must stand firm against aggression and expansionism, both at home and abroad."

 ENG_The_Womens_Land_Army: "The Women's Land Army"
 ENG_The_Womens_Land_Army_desc: "As the war against Nazi Germany becomes more intense, our country must mobilise all of its resources to ensure victory. Nonetheless, one critical resource remains untapped: our women's potential. It is past time to acknowledge the significant contributions that women can make to the war effort. Women have already proven to be an important part of the war effort, from factory work to nursing, communications to transportation. But we can go further.\n\nWith that, we will implement a policy of female conscription. This will necessitate the registration of all able-bodied women for service in the armed forces or other critical war-related roles. This will significantly increase our manpower pool, allowing us to sustain the ongoing conflict and face any future challenges."
 ENG_The_Womens_Land_Army_tt: "Modify §YBritannia Defiant§! by \nRecruitable Population: §G+5.00%§!"

 ENG_The_Double_Cross_System: "The Double-Cross System"
 ENG_The_Double_Cross_System_desc: "There has never been a greater need for effective intelligence and counter-espionage operations. As a result, we will set up the Double-Cross System, a sophisticated network of agents and informants designed to deceive and mislead the enemy. The Double-Cross System, led by MI5, will be tasked with identifying and recruiting double agents, who will then be used to feed false information to the enemy. We can throw off the enemy's plans and sow confusion and disarray within their ranks by carefully orchestrating a web of deception.\n\nTo ensure the success of the Double-Cross System, we will provide our intelligence operatives with the necessary resources and training. We will also work to establish secure communication channels and to develop new espionage and counter-espionage technologies and techniques."

 ENG_The_British_War_Machine: "The British War Machine"
 ENG_The_British_War_Machine_desc: "As the war against Nazi Germany intensifies, our country must do everything possible to increase production and supply our armed forces with the resources they require to succeed. To accomplish this, we will launch a massive industrial mobilisation programme. We will collaborate with industry leaders to identify critical areas where production can be increased, and we will invest in new technologies and techniques to accelerate the manufacturing process by offering incentives to businesses and individuals who develop new and more efficient methods of producing war materials.\n\nWe will also work to ensure that our workforce is properly utilised and supported. We will launch recruitment campaigns to attract new workers, particularly women and minorities, and we will provide training and education to assist workers in developing the skills required to be effective in their roles. This will be a massive undertaking, but it is absolutely necessary if we are to defeat Nazi Germany. We can increase production, provide our troops with the resources they require, and secure victory for our country with a coordinated and focused effort."

 ENG_A_Symbol_of_Determination: "A Symbol of Determination"
 ENG_A_Symbol_of_Determination_desc: "It is critical that we maintain our spirits and resolve if we are to see this conflict through to a successful conclusion. As a result, Churchill announced a national campaign to promote the V for Victory symbol and its message of hope and resilience.\n\nChurchill encourages all citizens to wear the V for Victory symbol to show their support for the war effort. We will publicise the symbol through posters, advertisements, and public events, and we will use it as a rallying cry to motivate both our troops and citizens."

 ENG_Expand_the_Emergency_Hospital_Service: "Expand the Emergency Hospital Service"
 ENG_Expand_the_Emergency_Hospital_Service_desc: "There has never been a greater need for effective medical care and treatment, so we will expand and strengthen our Emergency Hospital Service (EHS), providing critical care to those who have been wounded or injured in the conflict. We will work to increase the number of hospitals and clinics, as well as doctors and nurses, available to our wounded soldiers by expanding the EHS. We will also invest in new medical technologies and equipment, giving our doctors and nurses the tools they need to provide the best care possible.\n\nWe can ensure that our troops receive the medical care they require by expanding and strengthening our Emergency Hospital Service. This will be a crucial tool in our fight against Nazi Germany, and we must pursue it with urgency and zeal."

 ENG_British_Quality_In_Quantity: "British Quality In Quantity"
 ENG_British_Quality_In_Quantity_desc: "We would have a formidable army to defend and attack the Nazi terror in Europe if our armed forces were both numerous and highly skilled. As a result, we will pursue a strategy of balancing quantity and quality, ensuring that we have a large and well-trained military force capable of meeting the conflict's challenges.\n\nWe will work to increase the overall size of our armed forces through recruiting new soldiers and training them to be effective in their roles under this programme. In addition, we will invest in new technologies and equipment to provide our troops with the tools they need to succeed on the battlefield."
 ENG_British_Quality_In_Quantity_tt: "Modify §YBritannia Defiant§! by \nMilitary Factory Output: §G+10.00%§!"

 ENG_The_Post_War_Consensus: "The Post-War Consensus"
 ENG_The_Post_War_Consensus_desc: "With the defeat of Nazi Germany and the end of the war, our country can finally exhale a sigh of relief. While we rejoice in our victory, we must also prepare for the difficult work of rebuilding and recovery. We can emerge from the aftermath of victory stronger and more united than ever before if we work together. While the road ahead will be difficult and long, we are confident that with the right approach, we can create a better future for ourselves and future generations."

 ENG_Mobilising_the_Commonwealth: "Mobilising the Commonwealth"
 ENG_Mobilising_the_Commonwealth_desc: "As the war rages on and the Axis powers threaten our empire's very existence, we cannot afford to sit back and watch our enemies gain ground. It is time to mobilise our colonies' and territories' resources to aid in the fight for liberty and democracy.\n\nWith these efforts, we will ensure that our empire is fully mobilised to fight the Axis Powers and defend the liberties and values we cherish. Let us demonstrate to the world the British Commonwealth's strength and the determination of its people in the face of adversity."

 ENG_Establish_the_Sterling_Area: "Establish the Sterling Area"
 ENG_Establish_the_Sterling_Area_desc: "We are standing firm against Nazi aggression in Europe, but we must also secure our economic future. The establishment of the Sterling Area, a group of countries that use the British pound as their primary currency, is a critical component of this. This will not only strengthen our economic ties with our allies, but will also result in the formation of a powerful economic bloc capable of repelling Axis aggression."

 ENG_Extensive_Borrowing_and_Purchasing: "Extensive Borrowing and Purchasing"
 ENG_Extensive_Borrowing_and_Purchasing_desc: "It has become clear that having access to critical resources is critical to victory. To that end, the government has launched a multi-pronged effort to purchase and procure resources from within our commonwealth. With these safeguards in place, we can be confident that it has the resources necessary to fight the Axis powers successfully. We can ensure that it has the raw materials and other critical resources it needs to sustain its war effort and triumph in the fight for liberty and democracy."

 ENG_The_Nucleus_of_the_War_Effort: "The Nucleus of the War Effort"
 ENG_The_Nucleus_of_the_War_Effort_desc: "The nucleus is the centre of an atom and the fundamental unit of mass. The civilian population, and their ability to build, construct, and repair on the home front, are the foundation of our war effort, just as this cluster of neutrons and protons is the base of an atom.\n\nAccording to this principle, the War Cabinet has launched a new campaign encouraging women, old men, and children to help the nation by forming volunteer units and participating individually in infrastructure repairs on parts of our country damaged by the Blitz, as well as encouraging the donation of old objects and materials for recycling into objects that can be used in the war effort."
 ENG_The_Nucleus_of_the_War_Effort_tt: "Modify §YBritannia Defiant§! by \nFactory Repair Factor: §G+10.00%§!"

 ENG_Harsh_Colonial_Conscription: "Harsh Colonial Conscription"
 ENG_Harsh_Colonial_Conscription_desc: "Our colonies have been extremely helpful in providing resources and raw materials for our war effort, but one resource in our African colonies remains untapped: manpower. However, because of our continued harsh treatment of our colonial subjects in Africa, they are hesitant to join our armed forces. However, with a little \"motivation\", we can easily obtain the manpower that we require. This may cause uproar, and resistance efforts will be made."

 ENG_Independent_Commonwealth_Divisions: "Independent Commonwealth Divisions"
 ENG_Independent_Commonwealth_Divisions_desc: "As our war effort continues, it is clear that our country's military resources will be stretched thin very soon. To meet the demands of the war, we have decided to seek additional assistance from our Commonwealth allies, and the Commonwealth has agreed to establish its own military divisions to aid in the war effort.\n\nWith the formation of Commonwealth divisions, we can be confident that we have the military resources required to fight the Axis powers successfully. Working with our Commonwealth allies, we can ensure that it has the manpower, equipment, and logistical support it needs to win and secure a better future for all of our citizens."
 ENG_INDEPENDENT_COMMONWEALTH_DIVISIONS_TT: "Get one unit composed of §Y9 Infantry battalions§!."

 ENG_Commitment_Across_Continents: "Commitment Across Continents"
 ENG_Commitment_Across_Continents_desc: "As we continue to fight the Axis powers, it is clear that this is a global conflict that requires a united effort, so Britain reaffirms its commitment to its Commonwealth colonies across the continents and pledges to collaborate towards a common goal of victory.\n\nWith this commitment across continents, we can be confident that it will receive the support it requires to defeat the Axis powers. We can overcome the challenges of this global conflict and secure a brighter future for all of its citizens by collaborating with our Commonwealth allies."

 ENG_The_Prime_Ministers_Conference: "The Prime Ministers' Conference"
 ENG_The_Prime_Ministers_Conference_desc: "It has become clear that the war between us and Germany is a battle between two opposing ideologies: democracy and tyranny. We will organise a conference of like-minded nations to boost the morale of our democratic allies and rally support for the war effort.\n\nThis conference will bring together representatives from democratic nations all over the world to discuss strategies for defeating the Axis powers and promoting freedom and democracy. The conference will also provide an opportunity for us to persuade our allies that victory is possible and that the war effort will result in a victory for the free world.\n\nWe can demonstrate our leadership in the fight for freedom and democracy through this conference. Working with our allies, we can galvanise support for the war effort and ensure that the values of liberty and democracy triumph over the forces of tyranny and oppression."

