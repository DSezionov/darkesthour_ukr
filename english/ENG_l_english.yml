 ENG_Mined_Coastline_Static_Modifier: "Landmined Beaches"
 ENG_Mined_Coastline_Static_Modifier_desc: "Operation Sea Watch represents Britain's vigilant coastal defense, laying mines along its shores to thwart enemy advances and secure the homeland. A vital deterrent, these mines guard against naval incursions, echoing the wartime resolve to defend every inch of the coastline."
 ENG_Mined_Coastline_Static_Modifier_No_DLC: "Landmined Beaches"
 ENG_Mined_Coastline_Static_Modifier_No_DLC_desc: "Operation Sea Watch represents Britain's vigilant coastal defense, laying mines along its shores to thwart enemy advances and secure the homeland. A vital deterrent, these mines guard against naval incursions, echoing the wartime resolve to defend every inch of the coastline."
