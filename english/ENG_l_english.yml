 ENG_Getting_Out_of_the_Slump: "Getting Out of the Slump"
 ENG_Getting_Out_of_the_Slump_desc: "\n\n\n£decision_header_ENG_Getting_Out_of_the_Slump£\n\n\n\n\nThe time has come to use our resources to combat unemployment, which is the most serious threat to the British people. We must intervene and take the initiative to eradicate this destructive evil from our lands, because the British people can only rise above their current level of unemployment with government assistance and stimulus. We have developed some measures that, if implemented, will help to alleviate the widespread unemployment among our youth."
 ENG_Getting_Out_of_the_Slump_cost: "§Y[?amount_of_money_to_check|0]§! £money_icon£"
 ENG_Getting_Out_of_the_Slump_cost_blocked: "§R[?amount_of_money_to_check|0]§! £money_icon£"
 ENG_Set_Up_the_Unemployed_Assistance_Board: "Set Up the Unemployed Assistance Board"
 ENG_Set_Up_the_Unemployed_Assistance_Board_desc: "To address our youth's high levels of poverty and unemployment, as well as to assist those who are able and willing to work but unable to find work, we must establish a special body that will monitor such individuals and provide them with benefits if they are eligible. While establishing such a body may take some time and effort, the benefits will almost certainly outweigh the costs in the near future. It's time to get Britain's youth back to work."
 ENG_Relief_to_the_Special_Areas: "Relief to the Special Areas"
 ENG_Relief_to_the_Special_Areas_desc: "While the effects of the Great Depression can be felt across the country, some areas were hit harder than others by the evils of poverty, unemployment, and homelessness. We must work to provide relief to these areas so that the residents can begin the process of economic recovery and become as productive as the rest of Britain."
 ENG_Finance_the_Growing_Motor_Industry: "Finance the Growing Motor Industry"
 ENG_Finance_the_Growing_Motor_Industry_desc: "Automobiles have revolutionised engineering. They not only help to unite the country, but they also make significant contributions to the transportation industry. Investing in this burgeoning industry will not only improve the quality and quantity of material produced, but will also create a growing demand for workers, which can then be filled by British youth, lowering unemployment and boosting the economy simultaneously."
 ENG_Subsidise_Textile_Companies: "Subsidise Textile Companies"
 ENG_Subsidise_Textile_Companies_desc: "The textile industry, which was once a pillar of the British economy, has suffered significantly in recent years. With rising unemployment and widespread financial insecurity, it is time to intervene and revitalise this sector. By providing subsidies to textile companies, we can stimulate job creation and restore stability to one of our country's most iconic industries. These policies will assist textile manufacturers in expanding, modernising, and hiring new employees.This initiative is a direct response to the economic downturn and lays the groundwork for long-term growth."
 ENG_Support_Manchester_and_Lancashire_Based_Textile_Production: "Support Manchester and Lancashire-Based Textile Production"
 ENG_Support_Manchester_and_Lancashire_Based_Textile_Production_desc: "Manchester and Lancashire have long been the heart of Britain's textile industry, but the current economic downturn has had a significant impact on these regions. To restore the area's industrial prowess, we must prioritise support for local textile producers. By providing targeted incentives, we can help to modernise outdated equipment, improve working conditions, and increase production capacity."
 ENG_Encourage_Modernised_Steel_Manufacturing_Processes: "Encourage Modernised Steel Manufacturing Processes"
 ENG_Encourage_Modernised_Steel_Manufacturing_Processes_desc: "The steel industry, a cornerstone of our military and industrial capacity, is under threat due to outdated production methods and inefficiencies. Our steelworks, which were once the envy of the world, must be modernised to meet the needs of national defence and heavy industry. We must take steps to encourage widespread adoption of modern steel manufacturing processes, which will improve production speeds, quality, and output. Redirecting resources towards technological upgrades and new equipment will increase our steel sector's ability to meet both domestic and global demands."
 ENG_Subsidise_Steward_and_Lloyds_Expansion: "Subsidise Steward and Lloyd's Expansion"
 ENG_Subsidise_Steward_and_Lloyds_Expansion_desc: "Steward and Lloyd's, a major player in our heavy engineering sector, is critical to our continued industrial success. However, in order to meet the growing needs of both civilian and military industries, the company will need to expand its resources and modernise its production facilities. We must authorise direct government subsidies to help the company expand its operations, allowing it to hire more people. By redirecting financial support to these efforts, we will ensure that Steward and Lloyd's continue to provide critical machinery and infrastructure."
 ENG_Prop_Up_the_Coal_Companies: "Prop Up the Coal Companies"
 ENG_Prop_Up_the_Coal_Companies_desc: "The coal industry, a long-standing pillar of our economy, is on the verge of collapse due to the ongoing economic downturn. Thousands of workers are facing unemployment, and the very foundation of our energy supply is jeopardised. We must take immediate action to keep coal companies from failing. We can stabilise the industry, protect jobs, and ensure a steady supply of coal to power our industries and homes by intervening directly. This initiative will include significant financial support to ensure that these businesses can weather the current storm, as well as assistance in modernising outdated infrastructure."
 ENG_Facilitate_Mining_Productivity: "Facilitate Mining Productivity"
 ENG_Facilitate_Mining_Productivity_desc: "The mining sector is in desperate need of revitalisation, especially given our high unemployment rate. Our mines are underperforming, and inefficient practices have resulted in a drop in coal production, exacerbating the energy crisis. To combat this, we must invest heavily in technological advancements and streamlined operations that will boost productivity while lowering operating costs. By introducing modern machinery and improving miners' working conditions, we can ensure that the industry becomes more efficient, less reliant on outdated methods, and better able to meet the growing demand for resources."
 ENG_Loans_to_the_North-Eastern_Shipyards: "Loans to the North-Eastern Shipyards"
 ENG_Loans_to_the_North-Eastern_Shipyards_desc: "For over a century, the North-Eastern Shipyards have been critical to our maritime dominance. During the height of the British Empire, the region was the centre of the shipbuilding industry, with shipyards such as Swan Hunter and Vickers building the world's most formidable fleets. With the global economy still reeling from the effects of the Great Depression, several shipyards are facing bankruptcy, displacing thousands of skilled workers. The government must provide low-interest loans to these shipyards in order to keep them operational and protect this critical economic capability."
 ENG_Keep_the_Glaswegian_Shipyards_Open: "Keep the Glaswegian Shipyards Open"
 ENG_Keep_the_Glaswegian_Shipyards_Open_desc: "Since the nineteenth century, Glaswegian shipyards have played an important role in Britain's industrial landscape. However, since the Great War, the region's shipbuilding industry has struggled due to competition from lower-cost foreign labour, a lack of modernisation, and the long-term effects of industrial decline. The Glasgow Shipyards, which are currently struggling with mounting debt, are on the verge of closing, putting thousands of jobs at risk. If these shipyards were to close, Glasgow would suffer significant economic losses while also jeopardising our ability to maintain naval supremacy. To protect this essential sector, we must intervene and provide subsidies."
 ENG_Enable_the_Purchase_of_Land: "Enable the Purchase of Land"
 ENG_Enable_the_Purchase_of_Land_desc: "Land prices have skyrocketed, preventing many people from investing in real estate or agriculture. This issue has been particularly acute for young people, many of whom have few opportunities for advancement. To address this, we must facilitate land acquisitions by providing favourable loans and subsidies, making property ownership more accessible to the general public. The purchase of land will help to revitalise rural areas and provide opportunities for young people to enter productive jobs, benefiting both local economies and the national recovery."
 ENG_Subsidise_Kier's_Concrete_Engineering: "Subsidise Kier's Concrete Engineering"
 ENG_Subsidise_Kier's_Concrete_Engineering_desc: "Kier's Concrete Engineering has played an important role in the development of British infrastructure, including housing projects and large-scale public works. With a large percentage of its employees facing layoffs and several projects in jeopardy, we must act to protect the future of this vital industry. By providing subsidies to Kier's Concrete Engineering, we can help to keep the company running, protect jobs, and ensure that critical infrastructure projects continue. These subsidies will allow the company to continue producing, modernising, and providing the concrete goods needed to repair the country's infrastructure."
 ENG_Provide_Council_House_Alternatives: "Provide Council House Alternatives"
 ENG_Provide_Council_House_Alternatives_desc: "For decades, council housing has been the primary source of housing for working-class families. However, the high demand for low-cost housing, combined with a lack of investment, has trapped many people in overcrowded, substandard living conditions. While council housing has its uses, it is clear that the solution lies in providing a variety of options to ensure that everyone has access to adequate and affordable living arrangements. By offering financial incentives and government-backed loans to private developers and cooperatives, we can encourage the construction of new affordable homes."
 ENG_Refine_the_Mass_Production_of_Consumer_Electronics: "Refine the Mass Production of Consumer Electronics"
 ENG_Refine_the_Mass_Production_of_Consumer_Electronics_desc: "The consumer electronics market is rapidly expanding, but Britain's mass production capabilities in this sector remain underdeveloped. To compete on a global scale, we must refine our manufacturing processes and increase the quality and affordability of British-made consumer electronics. By investing in advanced manufacturing techniques, we can lower production costs and make electronics more affordable. This decision will not only increase British exports, but will also create jobs in manufacturing and design."
 ENG_Finance_the_General_Electric_Company's_Research: "Finance the General Electric Company's Research"
 ENG_Finance_the_General_Electric_Company's_Research_desc: "General Electric has consistently been at the forefront of electrical engineering and industrial innovation. However, in order to stay ahead of global competitors and meet the demands of a rapidly changing technological world, we must ensure that GE has the resources it needs to continue its groundbreaking research. Financing GE's research divisions will allow for the development of new technologies in energy production, communication, and consumer electronics, ensuring that we benefit from cutting-edge advances."
 ENG_Begin_the_New_Works_Programme: "Begin the New Works Programme"
 ENG_Begin_the_New_Works_Programme_desc: "The New Works Programme is a nationwide initiative aimed at revitalising critical infrastructure such as transport networks, housing, and energy generation. By investing in large-scale public works projects, we can improve the nation's infrastructure while also creating thousands of jobs, addressing high unemployment rates in many industrial districts. This program will provide immediate relief to affected areas while laying the groundwork for long-term economic development."
 ENG_A_Localised_Housing_Boom: "A Localised Housing Boom"
 ENG_A_Localised_Housing_Boom_desc: "To address the ongoing housing shortage, particularly in urban areas, we must encourage local development booms. This program will offer financial incentives and assistance to local governments and developers in order to construct affordable housing in strategic locations. The goal is to reduce urban overpopulation and provide working-class housing options. Localised home building will also create jobs, boost local economies, and build long-term infrastructure that will improve future generations' living standards."
 ENG_Expand_Londons_Light_Industries: "Expand London's Light Industries"
 ENG_Expand_Londons_Light_Industries_desc: "London has long been at the heart of the British economy, but its industrial base has weakened in recent decades. To boost the economy, we must prioritise light industries such as textiles, consumer goods, and electronics. We can encourage businesses to establish manufacturing operations in the city by providing tax breaks and infrastructure support, resulting in the creation of thousands of new jobs. This expansion will not only diversify London's economy and reduce its reliance on financial services, but it will also ensure that the city remains a major industrial hub."

 ENG_Economic_Warfare_Category: "Economic Warfare"
 ENG_Economic_Warfare_Category_desc: "\n\n\n£decision_header_ENG_Economic_Warfare£\n\n\n\nEconomic warfare policies are necessary to deprive our adversaries' economies of critical resources. Certain neutral countries continue to trade with both sides, with the Royal Navy being unable to prevent land trade. This means we'll have to make another push to halt sales of critical minerals like tungsten, chromium, mercury, and iron ore from countries like Sweden, Portugal, Turkey, Yugoslavia, the Netherlands, and others. We should be able to persuade these countries to abandon their economic neutrality and increase their trade with us rather than our adversaries if we apply diplomatic pressure."
 ENG_Economic_Pressure_Netherlands: "Pressure [?HOL.GetName]"
 ENG_Economic_Pressure_Sweden: "Pressure [?SWE.GetName]"
