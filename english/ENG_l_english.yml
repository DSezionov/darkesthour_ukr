 ENG_Lifeblood_of_the_Empire_Idea: "Lifeblood of the Empire"
 ENG_Lifeblood_of_the_Empire_Idea_desc: "While we are undeniably one of the world's strongest nations, the resources on the British Isles are limited. With the exception of the steel quantities that sparked the Second Industrial Revolution, we rely on trade with the rest of the world, particularly our resource-rich colonies like South Africa, to meet our economic needs. Because the United Kingdom is an island, obtaining these resources and transporting them back requires convoys. These trading ships and their brave sailors travel to far-flung lands and return with the vital materials required to keep the military industry and civilian economy running smoothly, making them the lifeblood of the entire British Empire. In order to survive in the coming turbulent times, we will require an increasing number of these convoys."
 ENG_Britannia_Rules_the_Waves: "Britannia Rules the Waves!"
 ENG_Britannia_Rules_the_Waves_desc: "Since the dawn of sail, the Royal Navy has served as Britain's empire's shield and sword, carrying our influence to every ocean while protecting the lifelines of trade and communication that connect our country to the rest of the world. Today, that noble heritage lives on with renewed vigour. Shipyards are bustling with activity as new vessels are built, and fleets patrol the vast expanses of sea that connect our dominions and allies. From the murky waters of the North Atlantic to the warm waves of the Indian Ocean, British warships stand as perpetual sentinels against those who would jeopardise maritime freedom. Britannia Rules the Waves!"
 ENG_Special_Areas_Act_1: "Special Areas Act"
 ENG_Special_Areas_Act_2: "Special Areas Act"
 ENG_Special_Areas_Act_3: "Special Areas Act"
 ENG_Chiefs_of_Staff_Committee: "Chiefs of Staff Committee"
 ENG_Chiefs_of_Staff_Committee_desc: "The Chiefs of Staff Committee is primarily responsible for coordinating Britain's military strategy. Its mission is to ensure that all branches of the military work towards the same goal, and it is made up of Army, Navy, and Air Force leaders. Frequent meetings are held to resolve inter-service priorities, balance resources, and coordinate operational strategies. By encouraging open communication and cooperation, the Committee speeds up decision-making, improves preparedness, and maintains unity across Britain's global obligations."
 ENG_RAF_Aerial_Dominance: "The RAF - Aerial Dominance"
 ENG_RAF_Aerial_Dominance_desc: "Our strategy is based on fighter wings trained to seize and hold the skies, with a focus on airspace control so that our forces can operate confidently. Pilots conduct tight patrols, hone their interception skills, and perfect tactics that deny enemy aircraft freedom of movement. Ground crews and radar stations work together to provide squadrons with fuel, ammunition, and timely intelligence. The RAF is now an air force that aggressively and consistently contests the skies, making it more difficult for adversaries to launch effective air operations against our ships, convoys, or ground formations."
 ENG_RAF_Armys_Best_Friend: "The RAF - The Army's Best Friend"
 ENG_RAF_Armys_Best_Friend_desc: "The RAF now prioritises close collaboration between air and ground forces, providing immediate, on-call support to troops in contact. Squadrons practise low-altitude strikes, short-notice redeployments, and close coordination with front-line observers to defeat enemy defences and break stalemates. Aircraft and ground troops collaborate to optimise timing, target selection, and battlefield communication, ensuring that armies advance with dependable aerial weaponry to watch their flanks and clear their path."
 ENG_RAF_Unconditional_Destruction: "The RAF - Unconditional Destruction"
 ENG_RAF_Unconditional_Destruction_desc: "Our doctrine views relentless aerial pressure as a decisive tool, assigning squadrons to maintain constant pressure on enemy formations, depots, and lines of movement until their fighting ability is significantly reduced. Crews are trained to operate in high-tempo cycles, accepting sustained operations and quick turnarounds so that sorties can be completed with minimal delay. Intelligence, reconnaissance, and logistics work together to identify concentrations and vulnerabilities, while strike packages are designed to deny the enemy safe recovery or resupply. This tactic gradually changes the battlefield by depleting reserves, disrupting reinforcement plans, and making it increasingly difficult for the enemy to sustain coordinated offensives."
 ENG_RAF_Targeted_Obliteration: "The RAF - Targeted Obliteration"
 ENG_RAF_Targeted_Obliteration_desc: "This strategy focusses on the deliberate selection and destruction of the enemy's most valuable assets. Instead of broad-area bombardment, operations are designed to precisely disrupt command networks, cripple critical factories, and close critical transportation routes that support the opposing war effort. Planning emphasises dependable intelligence, precise timing, and the integration of specialised planes and bombs to achieve effects with minimal collateral damage. Crews practise strategic attack profiles and adaptive routing to ensure that hits land in the most operationally valuable locations."
 ENG_colonial_knowledge: "Colonial Knowledge"
 ENG_Anglo_Irish_Trade_War: "The Economic War"
 ENG_Anglo_Irish_Trade_War_desc: "Since 1932, we have been fighting a trade war with our former colony Ireland.  Éamon de Valera's new government enacted numerous protectionist policies and began imposing tariffs. They claim it was to reduce our influence over them, recover from the Great Depression, and boost their industry. However, they refused to repay us for the loans we had made to Irish tenant farmers in the 1880s which de Valera considered to be part of the debts from which Ireland was exempt under the 1925 London Agreement.\n\nWhile it is debatable whether this is true, one final nail in the coffin was delivered during talks in October 1932 when de Valera requested that we repay 430 million pounds to Ireland for alleged over-taxation while they were a colony. Since then, the conflict has only gotten worse, harming our economies and tarnishing our relationships. If we ever want to resume trade with the Irish, we must quickly find a solution that works for both of us.."
 ENG_Fighting_For_Home: "Fighting For Home!"
 ENG_Fighting_For_Home_desc: "With an impending invasion and enemy aircraft darkening the skies, Britain bands together to fight for its own survival. Soldiers fortify coastlines, airmen scan the skies, and sailors keep watch over storm-tossed seas, all knowing that the line they hold protects their families and way of life. The spirit of resistance extends from the highest command to the most humble workshop, demonstrating the unwavering determination to defend liberty at all costs. We fights not for empire or glory, but for home, and this dedication transforms ordinary citizens into unstoppable forces."
 ENG_Britannia_Defiant: "Britannia Defiant"
 ENG_Britannia_Defiant_desc: "Our mentality, born of adversity and nourished by unity, embodies the determination that no setback will deter Great Britain's will to fight. Despite exhaustion, loss, and constant pressure, the military adapts, regroups, and responds with greater precision and confidence. Training, discipline, and experience have resulted in a battle-hardened army that can face any foe on equal footing. Each campaign waged and defence maintained reinforces the belief that perseverance is a weapon unto itself. As long as determination exists in the ranks, our country will remain unbroken and ready to retake the initiative."
 ENG_Increased_Mining_Productivity: "Increased Mining Productivity"
 ENG_Increased_Mining_Productivity_desc: "With the war requiring ever-increasing supplies of steel, coal, and critical minerals, our mining industry has undergone reform to meet the demand. Modern equipment, improved working conditions, and more efficient supply networks have boosted output in key industrial areas. Miners and engineers collaborate closely with transportation and industrial planners to ensure a steady supply of raw materials for the war effort. This increase in production benefits both the national economy and its long-term viability."
 ENG_A_Stiff_Upper_Lip: "A Stiff Upper Lip"
 ENG_A_Stiff_Upper_Lip_desc: "We have always been associated with stoicism and heavy resistance in the face of seemingly unrelenting force, hence the phrase that has encompassed this fearless personality. It describes how the monarch and their people are fearless and how the people's loyalty to the crown has made them resilient - a trait that even the most powerful enemies have yet to break. We have built the world's largest colonial empire not by avoiding danger, but by confronting its foes united and with a stiff upper lip."
