######################################################################
#  British Oxford Election Events
######################################################################
 ENG_Oxford_Election.1.t: "Simon's Way Out"
 ENG_Oxford_Election.1.d: "\"There is no gambling like politics.\"\n\nThese are the words of Benjamin Disraeli, one of our finest Prime Ministers.\n\nWhen an opportunity presents itself in the world of politics, one must decide whether to gamble, or to restrain their urges, and hope for a better, more rewarding option down the line. Such a decision has fallen upon our embattled Foreign Secretary, John Simon, whose failure to denounce Japan's blatant expansionism in 1932, and inability to achieve anything of substance in the World Disarmament Conference has damaged his reputation in parliamentary politics severely.\n\nThe nature of this decision is simple. The recent death of Viscount Grey, a former Foreign Secretary himself, has created an opening as the Chancellor of Oxford University. Considering Simon's long-held desire for the role and his weak political standing, it may be prudent for him to pursue a dignified end to his career and seek election for Oxford's Chancellorship. However, taking into account the difficulties he will face getting elected, he may look to turn his fortunes around at the National Government, and achieve a lasting legacy at the Foreign Office.\n\nShould he look to pursue this opportunity, however, his replacement is likely to be a fellow National Liberal in the form of Walter Runciman, the current President of the Board of Trade, as the Prime Minister, Ramsay MacDonald, wishes to prevent a member of the Conservative Party from occupying its office. Replacing Runciman, however, will be a trickier task, due to the National Liberals' lack of numbers, and will likely result in a less influential Conservative joining the cabinet.\n\nSimon will need to make his decision soon, however, as the elections are coming up fast, and he will have to make up a lot of ground on Lord Irwin, the favourite to succeed Viscount Grey as Chancellor."
 ENG_Oxford_Election.1.A: "He's not done just yet."
 ENG_Oxford_Election.1.B: "A dignified end is the best he can hope for."
 
 ENG_Oxford_Election.2.t: "The Necessary Prerequisite"
 ENG_Oxford_Election.2.d: "Foreign Secretary John Simon has decided to resign in order to run for Chancellor of Oxford University and avoid criticism for his previous failures. His replacement, and the new Foreign Secretary, is National Liberal MP Walter Runciman, the former President of the Board of Trade, with many predicting him as the most obvious choice.\n\nSimon has now fully committed to becoming the new Chancellor of Oxford University, and despite his deep unpopularity, he must do everything in his power to beat the current favourite Lord Irwin for the position.\n\nNow that Walter Runciman has taken over as Foreign Secretary, a new President of the Board of Trade must be found. And we already have the perfect candidate in mind."
 ENG_Oxford_Election.2.A: "Make sure to bring your best cigars."
 
 ENG_Oxford_Election.3.t: "Churchill's Return from the Wilderness"
 ENG_Oxford_Election.3.d: "Politicians have been defeated before. It is hardly unusual that every day some aspiring future leader of our nation is crushed in the wake of his foes and disappears from the political realm. It is just rare that one can recover from such depths - as Winston Churchill is about to do.\n\nAn influential and charismatic Liberal Member of Parliament when the Great War began, Churchill was made the First Lord of the Admiralty, tasked with overseeing Britain's naval effort. However, his downfall came swift - and in the form of the Gallipoli Campaign. A quick attack designed to knock the Ottomans out of the war spiralled into a stalemate, and as Allied forces were ordered to retreat, criticism rained down on Churchill. Holding numerous other cabinet offices since then, culminating in a short, but ultimately disastrous stint as the Conservative Chancellor of the Exchequer, his downward spiral reached its rock bottom conclusion in 1929 when Labour won the general election. The Conservatives were out - along with Churchill, who barely managed to hold his Epping seat. In the years since then, he has been roaming the political wilderness, with his calls for greater efforts to rearm the nation furthering his condemnation into political isolation.\n\nOnly now has he been presented with a chance to serve the country once again and rehabilitate his image. As the replacement for Walter Runciman, the Presidency of the Board of Trade will afford Churchill the chance to show off his political skill and experience, but most importantly, allow him to form a loyal base of support throughout the Conservative Party, one that will vigorously back his calls for national rearmament and a strong, unyielding presence on the global stage.\n\nIt can only be onwards and upwards from here for Churchill. This could be his last chance."
 ENG_Oxford_Election.3.A: "Had a nice trip, Winston?"
 
 ENG_Oxford_Election.4.t: "Simon's Folly"
 ENG_Oxford_Election.4.d: "Failure. Lord Irwin will replace Viscount Grey as Chancellor of Oxford University. Simon should have seen this coming, as Lord Irwin had been the favourite candidate from the start, and he still has his disastrous past and deep unpopularity hanging over his head.\n\nLord Irwin, senior Conservative politician, former Viceroy of India, firm protégé of Stanley Baldwin, former President of the Board of Education and Master of the Middleton Hunt, and now Chancellor of Oxford University, has emerged on top.\n\nSimon is now left with nothing. He had given up his position as Foreign Secretary to become Chancellor of Oxford University, only to fail miserably and lose everything. He hoped to escape his past, but it appears that it will follow him until the end. Simon's future is uncertain, so it's time for him to look for a new occupation. Perhaps he could once again run for the position and succeed Lord Irwin sometime in the future."
 ENG_Oxford_Election.4.A: "The past haunts us all."
 
 ENG_Oxford_Election.5.t: "A Worthwhile Endeavour"
 ENG_Oxford_Election.5.d: "Success! Viscount Grey will be succeeded as Chancellor of Oxford University by John Simon. He thought he was doomed to lose the position to Lord Irwin because of his past and because Lord Irwin has been the favourite from the start with an excellent reputation, the polar opposite of his own, but he has successfully managed to beat Lord Irwin.\n\nNow, as Chancellor of Oxford University, Simon has the opportunity to break free from his past and start over. He will redeem himself, creating a new image and reputation that he will not allow himself to destroy this time.\n\nHis dedication paid off, and he may now be remembered as a Chancellor of Oxford University rather than a failed Foreign Secretary."
 ENG_Oxford_Election.5.A: "A chance at redemption."

######################################################################
#  British Military Tree Events
######################################################################
 ENG_Military_Tree.1.t: "A Waning Power"
 ENG_Military_Tree.1.d: "For too long now, the British Army has been underfunded and undertrained. Years of almost unbroken peace has led to the poor state of the army, and it is now a shadow of what it once was.\n\nBut, after many governments unwilling to increase funds that are necessary for its survival and maintenance, it is time to give it the resources it needs to lift it out of its dire situation. A few experts have succeeded in learning how to improve the situation in the Army, and we must learn from them if we are to stop its decay.\n\nNow, the decision to refund, retrain, and modernise our army is under the hands of our Prime Minister and our War Cabinet, both ready to lead us to the future."
 ENG_Military_Tree.1.A: "If the sun never sets on the empire, it makes sense that it never sets on the army either."
 
 ENG_Military_Tree.2.t: "The Legacy of the Great War"
 ENG_Military_Tree.2.d: "The public's yearning for peace is growing, but our military's quality is deteriorating as a result of the sacrifices made by our best troops and generals in the past decades. The public now can advocate that either the military be reformed, or that we never rearm.\nThe Great War, which forced us to lose control of our colonies, had a significant impact on our economy. Even Irish independence dealt us a heavy blow at the same time.\nThe government is also in jeopardy. Fascists, communists, and even the bloody Labour Party want to enter into politics. These politicians are skillful at inciting public support before grabbing power.\nAs a result, we can only take advantage of opportunities for peaceful development when we try to avoid conflict.\nWe will not join  another war under any circumstances; we need peace and stability!"
 ENG_Military_Tree.2.A: "Ideally, we will never have a Great War again."
 
 ENG_Military_Tree.3.t: "The New Defenders of Albion"
 ENG_Military_Tree.3.d: "During the Great War, a new sort of warfare emerged. The fights in the skies, formerly reserved to the old Celtic and Nordic Gods, have now also been conquered by their human successors.\n\nTo fight the Germans during the last war, we formed the Royal Air Force, or RAF, which is the flagship of British aviation, as well as a proud example of British engineering and military prowess.\n\nNow, as war approaches the British lands again, it is time for the government to fund our branch, thus to give us the abilities to protect not only our soldiers on the battlefront, but also our homes in the isles. It is time to warm up the engines again."
 ENG_Military_Tree.3.A: "Let our flying shields accomplish their destiny! The Red Baron won't rise again!"
 
 ENG_Military_Tree.4.t: "Embracing Modern Warfare"
 ENG_Military_Tree.4.d: "In the lost fields of the Great War, Britain led the way in more than one domain. In fact, some of the first tank engines were created and driven by British soldiers and engineers!\n\nHowever, since then, tank development hasn't seen as much funding as it should've, and some of our tanks corps drive outdated models. On the other hand, the Germans have been developing and refining a new doctrine based around tank warfare calling it “Blitzkrieg”, or the Lightning War in our language.\n\nNow, it is time for the British Crown to give some love again to its steel child, before sending it to fight for Britain in battlefields all around the world. The wars of tomorrow will be won by the choices we make today, especially in the field of tank warfare."
 ENG_Military_Tree.4.A: "What's better than a man in armour? Thousands of men in indestructible armour, with immense firepower!"
 
 ENG_Military_Tree.5.t: "Our Weakening Rule"
 ENG_Military_Tree.5.d: "With the question of the modernisation of our armies comes the question of what we should do when that goal is achieved. Yes, the real opponents in the European front are major powers and their allied nations, but in the future, who can say that this situation will not evolve? If a power like Germany can rearm and modernise herself in less than twenty years, then it is pretty clear that Britain needs a powerful upgrade of its own capacities, a project that should start as soon as possible!\n\nIt is inevitable that if the major powers are modernising, so too will our colonies. But this also means that if the colonies modernise themselves, so too will the rebels. We can't allow this to happen. We need to protect every jewel of the Crown, now and forever!\n\nThe British Empire will protect its subjects across the world, from the icy lands of Canada, to the arid lands of Australia, the multicultural lands of South Africa, and the multi-religious lands of the Raj!"
 ENG_Military_Tree.5.A: "The sun will never set on the British Empire. We won't allow it."
 
 ENG_Military_Tree.6.t: "Hart's Doctrinal Purity"
 ENG_Military_Tree.6.d: "Today, JFC Fuller, a vocal supporter of heavier tank development, received word that he has been named military attaché to Afghanistan. Over the last few weeks, most of his closest allies have received similar letters. Fuller and his cronies have long anticipated their exile, however, they may have wished for a more habitable location. While there is no real animosity between Hart and Fuller, the General Staff has been concerned about a respected General being so vocal in his opposition to the Army's current course.\n\nSo, with Hart unmoved by Fuller's arguments and editorials calling the unity of command into question, a decision had to be made. Hart has followed his instincts and stayed with what he knows. Infantry is and will always be the foundation for all future planning. Tanks will be present, but only to provide support, not to make the Tommies' jobs easier. As Fuller packs his belongings and prepares to spend the rest of his career in obscurity, a famous quote of his comes to mind."
 ENG_Military_Tree.6.A: "Adherence to dogmas has destroyed more armies than anything else."
 
 ENG_Military_Tree.7.t: "A New Expeditionary Force"
 ENG_Military_Tree.7.d: "Years ago, the British Expeditionary Force, or BEF, were the first British soldiers sent into Europe after the beginning of the Great War. Despite their greatness and the feats they have accomplished across history, time was not been kind to them, and they were dissolved a few years after the war, as another one was deemed unfathomable.\n\nBut now, with conflict looming over the continent, some think that it is time to form a new British Expeditionary Force. We should fund this project, and show to our allies that we will never let them fight alone!\n\nThe advantage of reforming a group dissolved years ago is that you can bring two things: young, fresh troops, and a complete modernisation of the force. If in the last war they were considered as the elites of our army, today, they will be at best considered soldiers. Therefore, it is crucial that we equip them, train them, and, of course, familiarise them with the new tactics of war."
 ENG_Military_Tree.7.A: "Call Field Marshall Vereker, we have an important mission for him."
 
 ENG_Military_Tree.8.t: "A Storm of Lightning and Thunder"
 ENG_Military_Tree.8.d: "From a circling plane, Hart and Fuller observe the mixed formation below them as they practise their new strategy. This type of maneuver warfare, first attempted tentatively at Arras in 1917, never really caught on. With Hart's emphasis on the enemy's weak point and Fuller's emphasis on well-armored and armed tanks, this type of warfare is the only logical conclusion. The pair uses binoculars to observe the tanks overrun the enemy positions and rush past them, firing blanks into bunkers and pillboxes as they go.\n\nThe infantry then arrives in force a short time later, enters the trenches, and seizes them without much difficulty. The men have responded favourably to this strategy, and few are surprised. With tanks destroying hard points before they become a problem, more men will be able to return home. As the plane touches down, the two shake hands, knowing that this is only the beginning of a new era of British military greatness."
 ENG_Military_Tree.8.A: "We might actually be home by Christmas!"

 ENG_Military_Tree.9.t: "Maritime Minefield"
 ENG_Military_Tree.9.d: "Before the Great War, British mines used long levers that rotated when struck by a ship and detonated. Later, using captured Kriegsmarine mines, we adopted the Hertz Horn trigger mechanisms. These \"horns\" protruded from the top half of the mine and, when struck, released sulphuric acid into the mine's battery, causing an explosion. We currently use Mark XVII mines, which do not use the Hertz detonation system but instead rely on switch horn triggers.\n\nInstead of releasing sulphuric acid, these switches, which were placed throughout the mine, would detonate when they came into contact with something. While we were making these switch horns, we were also experimenting with Hertz mines, which eventually merged into a single project that resulted in this current design. They will soon be able to demonstrate their value as our operations begin, but it will become the standard for the foreseeable future."
 ENG_Military_Tree.9.A: "Poseidon shall witness the prowess of our Majesty's fleet!"
######################################################################
#  Royal Navy Minelaying Operations Events
######################################################################
 ENG_Mining_Operations.1.t: "New Banch of Naval Mines Have Been Produced!"
 ENG_Mining_Operations.1.d: "Following an order from the Royal Navy for a new batch of naval mines, our factories have been working overtime to get them manufactured and delivered to the navy as soon as possible, so that they can be deployed against the Germans. Thankfully, the navy has just announced that their 100 mine batch arrived safely and on time at its intended destinations, and is now ready for deployment. Our increased stockpile gives us a wider range of opportunities for minelaying in the seas and causing damage to the German navy."
 ENG_Mining_Operations.1.A: "The workers have the Admiralty's gratitude."

 ENG_Mining_Operations.2.t: "The First Minelaying Squadron has Formed!"
 ENG_Mining_Operations.2.d: "Today is a historic day for our country and the war effort, even if no one will be aware of its significance for several years. The first of many Minelaying Squadrons gathered today at Kyle of Lochaish, also known as Port ZA. This squadron, comprised of five requisitioned cargo liners, serves a solemn but extremely secret mission. They will be the first squadron of minelayers to set out and begin mining the Northern Barrage.\n\nMore suitable ships designed specifically for minelaying are being built, but with time running out, expediency takes precedence. Until the new minelayers are deployed, these ships will serve as the first line of static seaborne defences for our great nation. This squadron's sailors have been informed that they have a significant responsibility. We can only hope that this slapdash solution will suffice until then."
 ENG_Mining_Operations.2.A: "The secret sailors do their duty!"

 ENG_Mining_Operations.3.t: "A Minelaying Squadron has Formed!"
 ENG_Mining_Operations.3.d: "Another minelaying squadron has gathered today and is ready to go. Informed of their mission and eager to get started, they embark on the most secretive but critical of all military operations: minelaying. They will cast out unguarded and unknown into the dangerous oceans to ply their deadly trade, knowing their families will never know why they died if they do not return.\n\nIt's thankless work in the freezing and rough seas around our fair Isle, but it's just as important as any other position in the Senior Service. When and if they return, they can rest assured that their efforts will make their homes safer from the enemy's threat; and, one day, when the enemy is finally defeated and our boys return home for the last time, they will be thanked as all heroes should be."
 ENG_Mining_Operations.3.A: "They set sail into history!"

 ENG_Mining_Operations.4.t: "HMS Port Napier Exploads!"
 ENG_Mining_Operations.4.d: "HMS Port Napier, a civilian vessel from Port Line that had been armed and converted into an auxiliary minelayer, had proven to be an excellent vessel with a superb crew while serving with the Royal Navy and the First Minelaying Squadron. Thus, it was with great sadness that the Admiralty learnt of her sinking at the squadron's base at Kyle of Lochalsh as a result of an engine room fire and explosion. She caught fire while refuelling and, despite the crew's best efforts to extinguish the flames, could not be saved. The crew then abandoned the ship before it exploded due to a mix of fuel and naval mines on board, tearing itself apart and sending pieces of herself onto the shore and back into the water.\n\nThis is a significant loss for the First Minelaying Squadron, particularly given how recently it was established. And, while the public is unlikely to pay much attention to this incident, it is a major embarrassment for the Royal Navy, and similar incidents must be avoided in the future."
 ENG_Mining_Operations.4.A: "Bollocks!"

 ENG_Mining_Operations.5.t: "The QP 13 Convoy Disaster"
 ENG_Mining_Operations.5.d: "Unfortunately, we must report a serious accident involving one of our Arctic Convoys, specifically Convoy QP 13. After sailing back from Arkhangelsk, it was headed for Iceland. Despite being detected by German air reconnaissance, neither the Luftwaffe nor the Kriegsmarine took any action against it, and it quickly moved out of range of German aviation, leaving its escort of three Hunt-Class destroyers behind. Unfortunately, a thick fog rolled in, and the minesweeper HMS Niger mistook an iceberg in the Denmark Strait for Iceland's Northwestern Cape. It then led six merchant ships into a minefield recently laid by the Royal Navy near the entrance to the Denmark Strait.\n\nAll ships detonated mines, and only the Panamanian merchant ship Exterminator was salvaged. This was a major blunder for the Royal Navy, and it tarnished the Northern Barrage in the eyes of both the public and naval command. We have been thoroughly embarrassed, and more than a hundred men have died as a result of a captain's error and the placement of a minefield. If the Arctic convoys are to continue smoothly, we must ensure that such incidents never occur again."
 ENG_Mining_Operations.5.A: "A devastating mistake!"
 ENG_Mining_Operations.5_tt: "The disaster prompts a §Rserious§! reconsideration of the value of the Northern Barrage and impact of the future convoy routes.\n\n"
 ENG_Mining_Operations.5.B: "A devastating mistake!"
 ENG_Mining_Operations.5.C: "A devastating mistake!"
######################################################################
#  Tizard's Research Events
######################################################################
 ENG_Tizards_Research.1.t: "Tizard's Experimental Research"
 ENG_Tizards_Research.1.d: "Scientist Henry Tizard, a former second lieutenant in the Great War known for his unusual training methods, has requested government funding and assistance to aid in the research of new methods of spotting aircraft.\n\nTizard has been researching and developing new methods for identifying aircraft, but unlike some other experts, his research has a lot of potential. Some government officials believe that funding Tizard's research would be a waste of money, while others believe that the government should invest heavily in his work.\n\nIf the government funds Tizard's research and the work is extensive, a new era in aeroplane detection technology will undoubtedly emerge."
 ENG_Tizards_Research.1.A: "No funding or assistance from the government!"
 ENG_Tizards_Research.1.B: "Only a tiny bit of funding from the government"
 ENG_Tizards_Research.1.C: "A significant amount of funding from the government"

 ENG_Tizards_Research.2.t: "Tizard's Showcase"
 ENG_Tizards_Research.2.d: "Unsurprisingly, Tizard didn't do much to further his research after the government opted not to fund it.\n\nTizard was devastated and furious when he learned that the government had decided not to fund his research, but that was the decision, and it couldn't be changed. Tizard made an effort to advance his research further, but he was unable to do so due to a lack of funds and motivation.\n\nHowever, Tizard's research has only moderately helped. Although some government officials are currently having second thoughts, there is now nothing they can do."
 ENG_Tizards_Research.2.A: "Well at least these prototypes can help a bit."
 
 ENG_Tizards_Research.3.t: "A Potential Advantage"
 ENG_Tizards_Research.3.d: "When Tizard learned that the government had agreed to fund his research, he was overjoyed and eager to get started. Tizard was equally disappointed however. when he learned that the government had only provided a small amount of funding for his research.\n\nTizard ignored his displeasure, thanked the government for at least contributing a small amount to his research, and then went about his business. Tizard's work and research have clearly benefited the government so far, and there is little doubt that his research will be useful in the future, but it may have been better if the government had invested more."
 ENG_Tizards_Research.3.A: "We should've invested more."

 ENG_Tizards_Research.4.t: "The Fruits of Foresight"
 ENG_Tizards_Research.4.d: "When Tizard learned that the government had agreed to fund his research and assist him in any way they could, he was overjoyed and determined to get started right away. He started researching immediately, not wasting any time so that he could make good progress towards his goals. So far, his research and work have been excellent, and many politicians who had previously criticized Tizard have now gone silent as a result of Tizard's excellent work.\n\nTizard's incredible achievement will undoubtedly usher in a new era of aircraft detection and aid us in war."
 ENG_Tizards_Research.4.A: "Amazing work."

######################################################################
#  Indian Government Reform
######################################################################
 ENG_Indian_Reform.1.t: "Indian Governmental Reform"
 ENG_Indian_Reform.1.d: "The British Raj, a nation that many consider the jewel of our waning empire, is in a tricky situation. Ever since the end of the Great War, calls for greater autonomy have spread throughout the region, echoing right back here in Westminster. To act on this before things can get out of hand, a white paper has been published today outlining a new Act that should be brought before Parliament in the coming years, titled the “Government of India Act”. In the white paper, it proposes that major territorial changes be made, including the separation of Burma from the Raj and the establishment of Aden as a crown colony.\n\nOther talking points include the granting of more autonomy to provinces within the Raj and the creation of direct elections to further increase the voting franchise from 7 million to 35 million. However, while the Act has covered many areas to try and please as many as possible, other Members of Parliament argue that the Act should be split into smaller ones as it is too big for MP's to make the right decision on this many matters at once. They propose that when the bill is brought forward in 1935, anything related to issues around Burma would be solved with the Government of Burma Act. This way, MP's can digest the matters more easily, as making decisions on behalf of hundreds of millions of people is a daunting task."
 ENG_Indian_Reform.1.A: "Is India's future certain now?"
 ENG_Indian_Reform_Details: "In 2 years, §YAden§! will become a directly ruled §YCrown Colony§!, and §YBurma Province (British India)§! will become the separate §YColony of Burma§!.\n\n"

 ENG_Indian_Reform.2.t: "Finalisation of the Government of India Act"
 ENG_Indian_Reform.2.d: "Today, Parliament has begun proceedings to finalize and pass through the Government of India Act, something that will bring about major change to the Indian subcontinent. Along with internal government changes and the extension of the voting franchise, most attention has been given to the major territorial changes that are being made through the Act, which is being passed alongside the Government of Burma Act. The Government of India Act will see the creation of the crown colony of Aden while the Government of Burma Act will create a separate Burmese colony. This will allow for better administration of the region, while the government of the Raj being able to concentrate on other affairs more closely.\n\nWhile there has been praise from many MP's for the bills, there has also been strong condemnation from those who both support Indian self-determination and those who are against it. Jawaharlal Nehru has called it a “charter of slavery” and “a machine with strong brakes but no engine”. Meanwhile, Winston Churchill, who has constantly campaigned against Indian self-governance, has said that the Act is “a gigantic quilt of jumbled crochet work, a monstrous monument of shame built by pygmies.\n\n“Whatever the reception may be, one thing is for certain: there is no turning back from here.”"
 ENG_Indian_Reform.2.A: "A breeze of change across the empire..."

 ENG_Indian_Reform.3.t: "The Jewel of the Empire"
 ENG_Indian_Reform.3.d: "India has long been the jewel in the British crown. However, its administration is a slapdash amalgamation of over a century of rule, with one reform piling on top of another to form a precarious tower of bureaucracy that is constantly on the verge of collapse. The Indians are outraged by the difficulty of doing anything in their own country. Anything that requires government approval is so time-consuming that it is almost not worth the effort.\n\nMeanwhile, bureaucrats complain about ever-increasing paperwork. This cannot continue, and the viceroy concurs. That is why we have implemented a massive bureaucratic reform program. Offices have been significantly reduced, merged, and reassigned in order to reduce red tape. Any entrenched bureaucracy, such as ours, can only be changed with great effort; however, we are nearing the end of the road, both literally and metaphorically.\n\nIndia's government has been streamlined, and the people can breathe freely now that they are not burdened by mountains of paperwork. A new road has been opened to symbolise the new regulations, or lack thereof. While the road is not as important as traffic, which appears to be an ongoing issue, it does serve as an example of the new system's efficiency. What would normally take months or years to approve took only a few weeks. Construction went smoothly, and it even finished ahead of schedule."
 ENG_Indian_Reform.3.A: "An old jewel, polished to a new shine!"

######################################################################
#  Irish Trade War
######################################################################
 ENG_Irish_Trade_War.1.t: "A Willingness to Back Down"
 ENG_Irish_Trade_War.1.d: "A delegation from the Irish Free State arrived in London today to express the Irish government's willingness to soften its aggressive stance in our trade dispute in exchange for relief, as their fledgling economy cannot withstand our 20% import tax on their goods, specifically their livestock. The Irish Free State, according to the delegation, is willing to negotiate a mutually beneficial agreement to reduce tensions between our two countries. While the Irish economic conflict has far less of an impact than it does on them, having an upset Ireland to our west may cause complications in the future."
 ENG_Irish_Trade_War.1.A: "De-escalating the situation would be mutually beneficial"
 ENG_Irish_Trade_War.1.B: "We must maintain the economic pressure"

 ENG_Irish_Trade_War.2.t: "The Coal-Cattle Pact is Signed"
 ENG_Irish_Trade_War.2.d: "[FROM.GetNewsIcon]With the decision to sign the Coal-Cattle Pact, tensions between the United Kingdom as well as the Irish Free State have begun to alleviate. Due to an enormous surplus of livestock that had accumulated, Irish farmers were becoming compelled to slaughter their cattle, and the dilemma was beginning to spiral out of control. With the declaration of this pact, all tax duties levied on British coal and Irish cattle have been eliminated, enormously benefiting the Free State's economy.\n\nThe Free Irish State appears to be more willing to soften their aggressive stance on the trade war, and there are rumours of ongoing discussions between both countries' leaders concerning further cooperation to end the conflict. With the German Reich's announcement of the Luftwaffe and Italy's growing forces in the Horn of Africa, Europe's political situation is becoming strained, and Neville Chamberlain is eager to shift the focus of the United Kingdom to more pressing issues."
 ENG_Irish_Trade_War.2.A: "Let us hope this signals the end of the trade war."
 ENG_Irish_Trade_War.2.B: "Let us hope this signals the end of the trade war."
 ENG_Irish_Trade_War.2.C: "Let us hope this signals the end of the trade war."

 ENG_Irish_Trade_War.3.t: "A Return to the Table"
 ENG_Irish_Trade_War.3.d: "The Irish Free State has expressed its intention to continue introducing negotiations to end the trade war conclusively since the decision to sign the Coal-Cattle pact. With the recent concerning political developments in both the German Reich and Italy becoming more tense by the month, a resolution to this dispute would allow our ministers to concentrate on more pressing matters. While the Irish negotiators are likely to be abrasive in their demands, our diplomats are confident that if we choose to commence talks, we will be able to establish a firm foothold. Should [IRE.GetLeader] be welcomed to London?"
 ENG_Irish_Trade_War.3.A: "Further de-escalation is necessary"
 ENG_Irish_Trade_War.3.B: "Deny them any concessions"

 ENG_Irish_Trade_War.4.t: "The Irish Crawl Back"
 ENG_Irish_Trade_War.4.d: "Following our refusal to negotiate a closure to the Anglo-Irish Trade Conflict with the Irish Free State, the Irish delegation has returned, this time accompanied by James Ryan, the Irish Minister of Agriculture. James Ryan delivered a relatively short speech highlighting the significant negative effects of the trade war on the agricultural industries of the Irish economy, which itself was followed by a delegation declaration announcing the Free State's willingness to negotiate extended concessions in exchange for a decrease of our pressure. They concluded with a reading of a letter addressed to [ENG.GetLeader] from [IRE.GetLeader] himself, reiterating the economic disruption done to Ireland."
 ENG_Irish_Trade_War.4.A: "Some relief may be what's needed"
 ENG_Irish_Trade_War.4.B: "Deny them any concessions whatsoever"

 ENG_Irish_Trade_War.5.t: "The Financial, Trade and Defence Terms"
 ENG_Irish_Trade_War.5.d: "Several terms and agreements have been discussed today during a series of negotiations with [IRE.GetLeader], who brought Seán Lemass and James Ryan to assist and support with the discussions. The focus has centred on the financial, trade, and defence sectors. A draft agreement has been written, which states that all tax duties imposed during the previous five years will be lifted, with [IRE.GetLeader] consenting to a one-time compensation of £10 million while retaining the authority to impose tariffs on our imports to safeguard their newly established industries. A free-trade agreement will also be included to strengthen our relationship with the Free State. The surrender of the treaty ports of Berehaven, Spike Island, and Lough Swilly, which we retained in 1921, is perhaps one of, if not the, most notable feature of the terms. Should we agree to this deal?"
 ENG_Irish_Trade_War.5.A: "These terms are acceptable"
 ENG_Irish_Trade_War.5.B: "We cannot accept these alterations to defence policy"

 ENG_Irish_Trade_War.6.t: "The Irish Financial and Trade Terms"
 ENG_Irish_Trade_War.6.d: "Following the Irish Free State's sentimental, but somewhat hustled, efforts to bring the Anglo-Irish Trade War to an end, we have convened to negotiate predefined terms with [IRE.GetLeader] to start reducing tensions between our two countries. We have agreed to remove our tariffs on Irish exports to our nation in return for the Irish relinquishing their claims on the Treaty Ports of Berehaven, Spike Island, and Lough Swilly. Furthermore, the Irish Free State will make a one-time compensation of £8 million to accommodate land annuity liabilities. While these aren't the greatest conditions we could have obtained, they do enable us to concentrate our efforts on Europe's growing unease."
 ENG_Irish_Trade_War.6.A: "We'll certainly agree to this!"

 ENG_Irish_Trade_War.7.t: "The Anglo-Irish Agreements"
 ENG_Irish_Trade_War.7.d: "[FROM.GetNewsIcon]Following a series of negotiations between authorities from the United Kingdom and Ireland, numerous terms and arrangements have been attained. The primary focus has centred on the financial, trade, and defence segments. All tax duties imposed in the previous five years have been raised, with [IRE.GetLeader] consenting to a one-time compensation of £10 million to the UK while retaining the authority to impose tariffs on British imports to safeguard their recently established industries.\n\nA free-trade agreement has also been reached, which vastly strengthens the ties between the United Kingdom and the Free State. The surrender of the treaty ports, which the UK retained in 1921, is perhaps one of the most notable features of the terms. As a result, as officially confirmed by the British Prime Minister, Berehaven, Spike Island, and Lough Swilly will be transferred to Ireland immediately as an expression of trust and goodwill."
 ENG_Irish_Trade_War.7.A: "A toast to better times ahead!"
 ENG_Irish_Trade_War.7.B: "A toast to better times ahead!"
 ENG_Irish_Trade_War.7.C: "The British and the Irish agreeing on something?!"

 ENG_Irish_Trade_War.8.t: "The Dual Anglo-Irish Agreements"
 ENG_Irish_Trade_War.8.d: "[FROM.GetNewsIcon]Following [ENG.GetLeader]'s initial stoicism in bargaining mutually beneficial terms to cease the Anglo-Irish Trade War, an Irish delegation returned to London with a revived willingness to make additional concessions. [ENG.GetLeader] decided to make the executive decision, after careful consideration, to welcome [IRE.GetLeader] to London to begin talks. After several months of perceptibly deliberate stalling by British negotiators, the following terms have been agreed upon and signed into effect:\n\nThe Irish Free State has agreed to relinquish all claims to the Treaty Ports in Ireland that are currently under British administration.  Moreover, the Free State will make a one-time instalment of £8 million to accommodate land annuity liabilities. Moreover, all tariffs on British and Irish exports will be eliminated. The Anglo-Irish Trade Conflict has been declared concluded with these terms. In the words of [ENG.GetLeader], British ministers are now \"free to focus their efforts to more critical matters on the continent.\""
 ENG_Irish_Trade_War.8.A: "At last, and end to the trade war!"
 ENG_Irish_Trade_War.8.B: "At last, and end to the trade war!"
 ENG_Irish_Trade_War.8.C: "They finally came to their senses."

 ENG_Irish_Trade_War.9.t: "A Desperate Irish Attempt"
 ENG_Irish_Trade_War.9.d: "With our continued obstinacy and outright refusal to negotiate further on the issue of reducing tensions caused by the Anglo-Irish Trade Conflict, Irish delegations have left London disappointed and frustrated, unable to meet our demands. Given that the trade war has little impact on British daily life and the overall economy, this has little impact on us, while the Irish Free State's economy continues to deteriorate.\n\nHowever, the Irish are determined to get something out of their efforts, and have returned, hoping to use an unstable Europe as a stabilizing factor to put an end to the ongoing destruction of their new industries. While a decision has been reached, the terms are not necessarily advantageous to either party. Tariffs are to be reduced on both ends, significantly relieving the Free State; however, they must pay a one-time payment of £6 million as compensation for land annuity liabilities. The Anglo-Irish Trade War is finally over, and our ministers can refocus their efforts on a more lethal conflict."
 ENG_Irish_Trade_War.9.A: "The issue of the trade war can be settled at last."

 ENG_Irish_Trade_War.10.t: "The Anglo-Irish Agreement"
 ENG_Irish_Trade_War.10.d: "[FROM.GetNewsIcon]The Anglo-Irish Trade War has been brought to an end! With Europe becoming more unstable, and with the UK wanting to shore up its economy, the Irish delegation returned to London accompanied by [IRE.GetLeader], with high expectations of reaching the conclusion of the Trade Conflict. Irish industries are collapsing, the citizenry is impoverished, and the economy is in complete disarray, unable to re-establish itself against British tariffs on its exports. After tense but brief negotiations, an agreement was finally reached and signed into effect. The following are the terms:\n\nTariffs on Irish and British goods are to be removed immediately, allowing free commerce between the two countries to begin and, hopefully, permitting the Irish Free State's economy to gain some momentum. The Free State will make a one-time payment of £6 million to compensate for land annuity liabilities.\n\nWith the closure of the Anglo-Irish Trade War, the British and their Commonwealth can shift their focus to a far more threatening conflict that has the possibility of bringing Britain to her knees for the first time in many centuries..."
 ENG_Irish_Trade_War.10.A: "This should help our economic situation."
 ENG_Irish_Trade_War.10.B: "This should help our economic situation."
 ENG_Irish_Trade_War.10.C: "At last, the trade war is over."

######################################################################
#  Ramsay Events
######################################################################

 ENG_Ramsay_Events.1.t: "Baldwin's Evergrowing Responsibilities"
 ENG_Ramsay_Events.1.d: "“Lord Baldwin, Mr. Chamberlain, can I talk with both of you for a moment?”\n\nThe call, sent with a strong but fading voice, came from the office of the Prime Minister, Ramsay MacDonald.\n\nRight away, the two men, who were waiting at the door, entered the office. Stanley Baldwin, the Lord President of the Council, had come here several times recently, but for Neville Chamberlain, Chancellor of the Exchequer, the occasions that he came here had reduced recently.\n\n“Thank you for coming so quickly gentlemen. I will not lie to you; my health has known better days. And I think you will have the same opinion to me that a good Prime Minister is one who is in good health.”\n\n“If I can contradict you, I think the faith in his ideals and his charisma are also the main qualities of a good leader!”\n\n“I agree with you Neville, but when old age arrives, it becomes very difficult to keep up strong charisma, and in turn, to defend his ideals. And because of my ailing condition, that is why I have called both of you.”\n\nHe opened a drawer in his desk, taking a folder and placing it in front of them.\n\n“In this folder are many key responsibilities which I want you to undertake when I cannot. That is if you accept of course. For example, I ask you, Lord Baldwin, to assist at the Geneva Disarmament Conference in November 1934.”\n\n“It will be an honour to help you Prime Minister.”\n\n“Glad to see we are on the same side gentlemen! There are some other things in this folder I ask you to take charge of, and I'm sure both of you will accomplish this tasks without any problems. Now, I must be leaving, as my tasks continue to grow despite sharing them.”\n\nAfter some last words, Chamberlain and Baldwin left the office of MacDonald.\n\n“Lord Baldwin, are you thinking the same thing as me?”\n\n“About the health of our MacDonald?”\n\n“Yes. Do you think he can stay here a long time despite this?”\n\nBaldwin took a few moments before responding to Chamberlain.\n\n“I think he will stay a few months, but for how long, who knows?”"
 ENG_Ramsay_Events.1.A: "The health of the Prime Minister is very worrying"

 ENG_Ramsay_Events.2.t: "A Rogue Element"
 ENG_Ramsay_Events.2.d: "With the rise of Adolf Hitler in Germany and Benito Mussolini in Italy, Oswald Mosley, the leader of the British Union of Fascists, poses a threat to the United Kingdom's political and internal security. His persuasive oratory skills could jeopardise the stability and unity of the United Kingdom and its Empire around the world. Worryingly, he has been seen with Edward the VIII and his mistress Wallis Simpson, as well as other important royal figures.\n\nThe MI5 has proposed that he be monitored more closely by listening in on his conversations with party members in order to keep an eye on him and his organisation.\n\nHopefully we can prevent the BUF from expanding further in this manner."
 ENG_Ramsay_Events.2.A: "Let's hope the King doesn't have such radical thoughts..."

 ENG_Ramsay_Events.3.t: "Preventing A Future Headache"
 ENG_Ramsay_Events.3.d: "The British Union of Fascists has gained up to 50,000 members in recent years, mainly thanks to Oswald Mosley and his notable oratory skills that have helped to convince the public to provide financial support to the BUF, enabling it to challenge the political establishment. We must convince MI5 to launch a sting operation in cooperation with the London Metropolitan Police to arrest Mosley and other members of his organization. Thankfully they have already infiltrated his organization and we have plenty of evidence against him and his acolytes.\n\nBy detaining him, we will ensure that his organization and any other fascist movements that have appeared in our nation are shut down once and for all to ensure political stability within the United Kingdom and our Empire overseas. There can be no place in our nation for such radical and destructive views that threaten democracy itself!"
 ENG_Ramsay_Events.3.A: "A great success!"

 ENG_Ramsay_Events.4.t: "A Dying Heartland"
 ENG_Ramsay_Events.4.d: "It's grim up North.\n\nFrom Preston to Newcastle, the Great Depression has turned the backbone of England into a shadow of its former self. While the North has been struggling to maintain its economy since the Great War, the stock market crash only fuelled the fire. Demand for textiles, ship building, coal, and steel has plummeted. The ports have turned quiet, the factories have shuttered, and the mines have closed. As the orders fell, unemployment rose into the double digits, and the once thriving Victorian streets have turned into slums for the jobless and poverty-stricken population, and it's bound to get worse. The once fierce industry of the North is gone, now replaced with a grey cloud of despair and hopelessness. Nevertheless, we can still pass new measures to save England's dying heartland before it's too late."
 ENG_Ramsay_Events.4.A: "May the powerhouse be fired up once more."

 ENG_Ramsay_Events.5.t: "A Reason for Hope"
 ENG_Ramsay_Events.5.d: "David Porter wandered the streets of Kent once more, as he had done for years. He'd lost his job at the start of the Depression and had struggled to make ends meet until now. The country was slowly emerging from the Great Depression, but not David. He was out of work and back to begging. It was humiliating, but a man has to live. As he walked down the road, he noticed a grocery store he had never seen before. The owner appeared before he could walk on. He looked familiar.\n\n\"David?\" the owner inquired after inspecting him. \"It depends on who's asking.\" David replied.\n\n\"This is Perry Evans! In primary school, we were lads!\" Perry said this with a smile on his face. David remembered him after a brief moment of confusion. They were best friends in elementary school, but Perry moved to London. David hadn't seen him in more than three decades. The two friends caught up for a few moments. Perry gave him another look after a brief silence.\n\n\"Lost your job?\" he inquired. \"Oh, it was just bad luck. I'll make it through\" David stated. For a brief moment, the two were deafeningly silent. Perry spoke up just as David was about to excuse himself.\n\n\"You know, running this store almost entirely by myself is a pain. I had a few employees, but they all left for the city. Would you mind assisting me with my grocery order?\" For a brief moment, David was taken aback, but then a wave of embarrassment washed over him: \"Ah Perry, you don't have to do that.\"\n\n\"Don't be daft; I'm serious! I can't do it with just two hands. I'll pay you a living wage plus bonuses. It is even possible to live above the store. I have no idea what to do with the attic anyway. Do you want to work or not?\" Perry insisted.\n\nDavid thought for a moment before smiling."
 ENG_Ramsay_Events.5.A: "Recovery, one step at a time."

######################################################################
#  London Economic Conference Events
######################################################################
 ENG_London_Economic_Conference_Events.1.t: "The Need for a Conference"
 ENG_London_Economic_Conference_Events.1.d: "The Wall Street Crash in 1929 and the Great Depression that followed it has hit nearly all nations of the world severely, including us here in the UK. While the initial shock wave was nearly four years ago, many are still jobless across the globe, and the need for the international community to come together is stronger than ever. Therefore, we have decided that an economic conference should be held here, in our glorious capital of London.\n\nBy having a meeting of various world nations, we will be able to coordinate the best possible way forward for, not only each individual country's economy, but the global economy as well. There will be much to discuss during the conference, with topics such as the exchange rate and the stabilisation of foreign currencies. One area that is of great interest to us and the rest of Europe is the issue of debts to America from the Great War. We believe that by negotiating terms where the US government will be able to forgive our debts, it would help massively help in stimulating our economies, and, in turn, stimulating the recovery around the world. However, there is no guarantee they will agree to this, with one US Senator saying that “the troubles of the world are really due to the War, and to the persistence of Europe in keeping great armaments”.\n\nThe success of this conference will be key in speeding up the recovery of the world's economy, as well as deciding if ordinary people will have to go longer without a job or food on the table. Failure is a possibility, but one we very much hope to avoid."
 ENG_London_Economic_Conference_Events.1.A: "Send out the Invitations!"

 ENG_London_Economic_Conference_Events.2.t: "An Invitation to the Geological Museum"
 ENG_London_Economic_Conference_Events.2.d: "We have received an invitation from the government of the UK asking if we would be able to attend The London Economic Conference. Many other nations have been invited to meet and help to try and find a way out of the devastating economic crisis that has shocked most nations of the world, ruining economies, and causing unemployment to skyrocket.\n\nThe conference will be held at the Geological Museum in London, with the aims of the meeting including agreements on the best way to fight the Great Depression, stabilise currency exchange rates, and to revive international trade, which has taken a severe beating as individual countries have sought to protectionist means to help their ailing economies.\n\nOur invitation to this conference is greatly appreciated, not least because our economy is in recession, and coming together with the international community to find a way forward is our best hope of having a strong recovery from the crisis. "
 ENG_London_Economic_Conference_Events.2.A: "Pack the bags, we're off to London!"

 ENG_London_Economic_Conference_Events.3.t: "The Beginning of the Conference"
 ENG_London_Economic_Conference_Events.3.d: "The day has arrived and all the delegations are here, 66 in total. Before any of the major discussions started, King George V gave a short speech, officially opening the London Economic Conference at the Geological Museum. An order of events was also read out, including the issue of European war debts to the USA, talks on currency stabilisation, and the revival of international trade.\n\nWhile none of the big issues were discussed today, there was a grand banquet in the evening, with the representatives of each country getting the chance to give small speeches and talk to each other. The mood seems jovial, but only for now, as there are bound to be disagreements between the nations, which includes us as well. \n\nAs the opening day comes to a close, we must hope that this conference brings about much needed cooperation to help the world climb out of the dark hole that is the Great Depression."
 ENG_London_Economic_Conference_Events.3.A: "We need this to succeed."

 ENG_London_Economic_Conference_Events.4.t: "The Issue of the Great War Debt"
 ENG_London_Economic_Conference_Events.4.d: "The Great War had a massive toll on our country. The cost was too heavy, in both lives and money. We spent a lot on borrowing money to purchase weapons and supplies for our forces, and most of it came from the USA. This meant that we acquired a huge debt that is still yet to be fully paid back to them.\n\nWhile we had no problem at first, the Great Depression meant that we have had to decrease the amount we have been paying them each year, as we cannot afford to pay our debts and keep our economy running. The London Economic Conference now presents an opportunity to try and ask America if the debt can be forgiven, thus ceasing the need for repayments. Not only will this benefit us, as we can redirect money to our economic recovery, but we believe it will also benefit the USA, as a strong recovery here in the UK will help to revitalise and stimulate trade between our two nations.\n\nThere is no guarantee they will accept however, but we are close partners, and a good recovery in one nation is sure to help another."
 ENG_London_Economic_Conference_Events.4.A: "Surely they will accept?"

 ENG_London_Economic_Conference_Events.5.t: "The British Want Us to Forgive Their Debt"
 ENG_London_Economic_Conference_Events.5.d: "We have been approached today by the British delegation at the economic conference regarding the issue of their unpaid debts from the Great War, as during the conflict, they borrowed large amounts of money to finance their efforts in the war. While the Great Depression has hit many nations hard, the British are struggling, as they are having to balance economic recovery with debt payment.\n\nThis has led to the UK representatives to begin discussions regarding the possibility of us forgiving the remainder of what they must pay. Their reasoning for this is that they will be able to spend more money on helping their economy, arguing that it would benefit us as well, as a strong recovery in the UK will revitalise trade between our nations, helping us in the long run.\n\nWhile it seems like a reasonable request, their direct payments of the debts owed to us means the money can go straight into our economy, giving quicker benefits for us, instead of having to wait for their economy to grow. Overall, it might be better to refuse their offer and make sure they continue with their payments, but then again, a speedy recovery in Europe could mean a speedy recovery here in the USA."
 ENG_London_Economic_Conference_Events.5.A: "Forgiveness will help us all."
 ENG_London_Economic_Conference_Events.5.B: "The debts must be paid in full." 

 ENG_London_Economic_Conference_Events.6.t: "The Americans Forgive the Debt"
 ENG_London_Economic_Conference_Events.6.d: "Success! Our discussions with the US representatives in relation to our debts have ended with them agreeing to forgive them. This means that we can redirect much needed funds from paying our war debts into our battered and bruised economy. This will hopefully be the start of many more agreements at the conference, which could lead to greater cooperation between all the nations of the world.\n\nIt was thought that the Americans would refuse to forgive our debts, but luck is on our side, and we do not have to pay a penny more. The result of this decision could affect even those who are poorest in our society, as more money for the economy means more jobs for the people."
 ENG_London_Economic_Conference_Events.6.A: "The perfect result."

 ENG_London_Economic_Conference_Events.7.t: "The Americans Refuse to Forgive Our Debt"
 ENG_London_Economic_Conference_Events.7.d: "Despite our best diplomatic efforts, the Americans have refused to forgive the debts we have to pay, demanding we continue to fulfil the necessary instalments. The reasons they cite for this decision include wanting to spend the money they get back on projects set out by Roosevelt's New Deal, saying that it will help the US economy recover faster than if they were to forgive our debts.\n\nThis is disappointing, especially as the conference was called in hopes of a unified global response to the Depression, where countries would help each other out. While this will not stop other agreements being made, it does affect the plans we had made for our recovery from the crisis, and we must find other ways of helping the people of our nation." 
 ENG_London_Economic_Conference_Events.7.A: "An unfortunate response."

 ENG_London_Economic_Conference_Events.8.t: "Currency Stabilisation Talks"
 ENG_London_Economic_Conference_Events.8.d: "Today, discussion has begun between Britain, France, and the USA, on the topic of currency stabilisation. President Roosevelt was sceptical of the idea of the talks at first but has instructed his delegation to continue with it anyway.\n\nThe plans are still being drawn up, but the British and the French have assured the US representatives at the meeting that any measures that are implemented will only be temporary, so that may bring the Americans around to the idea of currency stabilisation. The British and the French argue that the dollar should be stabilised by fixing it at a somewhat high value, while the Americans are in favour of devaluation of the dollar, as they say it would help improve their trading position.\n\nShould this succeed, it could help our all our economies recover quicker and stronger."
 ENG_London_Economic_Conference_Events.8.A: "An important and pressing matter."

 ENG_London_Economic_Conference_Events.9.t: "The Plans Are Leaked"
 ENG_London_Economic_Conference_Events.9.d: "Multiple newspapers have confirmed that they have a hold of leaks confirming the recent negotiations between us and the United States. This wouldn't have been too much of a big deal if it were war reparations or loan debts, but of all things, it had to be the currency stabilization talks. Roosevelt confirmed publicly he wouldn't be involved in fixing currency prices, but with the possibility the president was considering a different plan, the US markets are bound for trouble. With the markets soon to be against him, our advisers are warning he'll try to pull out as fast as possible. However, we can still try to persuade him to stay in while we have the chance."
 ENG_London_Economic_Conference_Events.9.A: "He needs to see the bigger picture."

 ENG_London_Economic_Conference_Events.10.t: "Our Talks Have Been Revealed"
 ENG_London_Economic_Conference_Events.10.d: "The Oval Office was flooded with the warm June light, as the sun began to rise over the city. Roosevelt basked in the bit of peace he had, waiting for the tidal wave of paperwork about to wash up on his desk. Well, this time it wasn't just paperwork on his desk, but a copy of The Washington Herald.\n\n“There's been a leak, Mr. President, about our currency stabilization talks...”\n\nThe aid slowly pushed the print towards him. With doubt in his eyes, the president slowly sat up and looked down on the paper on his desk. To his dismay, in the top left corner, there was the headline in bold letters, ROOSEVELT CONSIDERING CURRENCY STABILIZATION.  His stomach turned, only wishing the market didn't think too much of it. Those hopes were dashed right as he turned the paper over to the front page to see tanking stock numbers. After a deep breath, he let out an apologetic, “How?”\n\nThe aide shrugged. “But we don't have much time for that, Mr. President, It's out there.”\nRoosevelt tapped his fingers back and forth in a repetitive motion on his desk, before letting out a sigh. ‘There's no way we can consider going through with the talks now, there'll be too much push back from the market and export traders. All we can do now is damage control.” The president pointed towards his black phone."
 ENG_London_Economic_Conference_Events.10.A: "Get me Hull on the line."

 ENG_London_Economic_Conference_Events.11.t: "Roosevelt Backs Out!"
 ENG_London_Economic_Conference_Events.11.d: "As we expected, Roosevelt backed out of negotiations right as the news of a leak hit the front page, even after attempts of filling the plan with escape clauses and temporary adjustments to try to keep him from doing so. Not only will he not agree to anything, but he also went as far as to state he won't talk about the subject anymore, probably to save himself from more stock market humiliation. Apart from the economic depression affecting every corner of the globe, the US was one of the main focuses of the entire conference, and with Roosevelt out of the picture, we can only hope we'll be able to salvage what's left."
 ENG_London_Economic_Conference_Events.11.A: "He'll regret this."

 ENG_London_Economic_Conference_Events.12.t: "Roosevelt Condemns Currency Stabilisation"
 ENG_London_Economic_Conference_Events.12.d: "[FROM.GetNewsIcon]The idea of a planned currency stabilization initiative in Europe and the Americas took a fatal blow this week after US President Franklin D. Roosevelt condemned the idea In a message to the ongoing London Economic Conference. In the message, the President explained how \"broader problems\" exist and are far more important than a nation's currency rate. This comes after months of the President hinting he may have been more open to the idea, but he quickly changed his tone when papers were leaked from the conference showing Roosevelt was considering supporting such a plan.\n\nBritish Prime Minister Ramsay MacDonald and rapporteur of the French Monetary Commission Georges Bonnet are reportedly outraged, with MacDonald commenting \"Roosevelt's actions would destroy the Conference\", and Bonnet being the most furious at the president after said to have \"exploded\" in anger. With the US officially backing out, many of the diplomats attending see little to no potential for more to come out of the conference."
 ENG_London_Economic_Conference_Events.12.A: "Economics can be tricky."

 ENG_London_Economic_Conference_Events.13.t: "The Plan Has Been Drawn Up"
 ENG_London_Economic_Conference_Events.13.d: "Behind closed doors, our diplomats and advisers have come up with a new currency stabilization plan, creativity titled the Temporary Stabilization Measures. Many have already expressed their full support for it, but the real test is what Roosevelt will think of it. Luckily, both economic experts sent from America, Oliver Sprague and James Warburg, have agreed to our proposal, making it fairly likely the president will agree to the plan if nothing derails it. Not to mention both the Banks of France and England are fully behind it as well. Secretary of State Cordell Hull is thought to be briefing the president right now on the plan, and we should hear from him soon."
 ENG_London_Economic_Conference_Events.13.A: "Fingers crossed!"

 ENG_London_Economic_Conference_Events.14.t: "An Acceptable Proposal"
 ENG_London_Economic_Conference_Events.14.d: "The Oval Office was flooded with the warm June light, as the sun began to rise over the city. Roosevelt basked in the bit of peace he had, waiting for the tidal wave of paperwork about to wash up on his desk. Soon enough, the peace fled as the desk phone ringed its ear-piercing tune.\n\nHis secretary yelled from the switchboard room, \"It's Hull, Mr. President, should I put him through?\"\n\n\"Yes yes, put him on.\"\n\nHe put the phone up to his ear. \"What's the news, did you guys come to an agreement?\" Hull answered happily through the fuzzy static. \"I'm proud to say we did. The plan is to apply temporary currency stabilization measures based on the US dollar to help our fellow European allies. This will surely boost both of our economies in the long run...but in the short term, we might receive some pushback. Luckily, they agreed we can let the public know in our way to mitigate any damage to the polls. In other words, It's nothing we can't handle.\"\n\nRoosevelt smiled and let out a sigh of relief, \"Well, that sounds like an acceptable proposal, tell them we're fully on board.\" After a quick goodbye, the president stared at the papers on his desk and wondered, would this actually do any good?"
 ENG_London_Economic_Conference_Events.14.A: "Better to try than not at all."

 ENG_London_Economic_Conference_Events.15.t: "Roosevelt Agrees to the Plan!"
 ENG_London_Economic_Conference_Events.15.d: "Although it looked like the president would be stubborn to the very end on the topic of currency, our plan seemed to have pleased Roosevelt just enough, as Hull gave the plan a green light! With America's support behind the plan, all we really need to do is finalize the print and announce it to the people involved. However, due to Roosevelt's worry about what the public will think of it, we'll have to go along with how he wants it to be presented to the cameras. But this shouldn't be too much of an issue, so we can proceed as planned."
 ENG_London_Economic_Conference_Events.15.A: "Schedule a press conference in the museum!"

 ENG_London_Economic_Conference_Events.16.t: "The Announcement of Temporary Measures"
 ENG_London_Economic_Conference_Events.16.d: "[FROM.GetNewsIcon]Gathered in a large room at the Geological Museum in London, US President Franklin Roosevelt, British Prime Minister Ramsay MacDonald, and rapporteur of the French Monetary Commission George Bonnet stood in front of rows upon rows of diplomats, advisers, and secretaries to finally announce the long-waited Temporary Measures plan. In a short speech, MacDonald announced; \"After weeks of planning and negotiating, we are proud to announce our plan of stabilizing the rate of currency between the US dollar and the currencies of Europe to counteract the effects of the current recession.\"\n\nThe end of his speech was met with a standing ovation, as many attending saw it as the main objective of the conference was finally complete. Even the US, which was fiercely against currency stabilization in the past, responded warmly to the proposal after Roosevelt gave a radio broadcast expanding the plan. With new measures in place, financial advisers see it as a coming end to the economic depression."
 ENG_London_Economic_Conference_Events.16.A: "The future looks a bit brighter."

 ENG_London_Economic_Conference_Events.17.t: "The Hugenberg Proposal"
 ENG_London_Economic_Conference_Events.17.d: "As the London Economic Conference started to wrap up, a fairly surprising proposal was put onto the floor by Germany's Minister of Economics, Alfred Hugenberg. In an almost laughable attempt at getting Germany's colonial empire back, Hugenberg gave a speech proposing a program of German colonial expansion in Africa and Eastern Europe as a cure for Europe's current economic depression. Many advisers and diplomats thought he was joking at first, but when they realized he wasn't, outrage filled the room. Hugenberg and many German diplomats were made laughing stocks for the rest of the day as the press rushed to get every bit of info of his plan on the front page. Soon after the meeting, both the governments of the French and the Soviet Union submitted formal notes of protest.\n\nThe German government has formally said Hugenberg was only stating his personal economic views, and not those of the government. However, Hugenberg has stated the opposite, saying he was speaking on behalf of the government, causing further ridicule from the west. Either way, Hugenberg's proposal was clearly rejected."
 ENG_London_Economic_Conference_Events.17.A: "Quite embarrassing."

 ENG_London_Economic_Conference_Events.18.t: "Hugenberg's Fate"
 ENG_London_Economic_Conference_Events.18.d: "Sending Hugenberg to the London Conference has proved to be a complete disaster. During a speech, the man proposed a program of German colonization in Africa and Eastern Europe to solve the world economic crisis. Even though that's what our great nation deserves, it was ridiculous and embarrassing as every German diplomat attending became a laughing stock at the conference after they realized he was serious. When other members of the cabinet tried to control the damage he caused by suggesting it was his own personal beliefs, he still refused to go back on his plan, saying \"It was on behalf of the German Government\" even though it clearly wasn't. Besides the humiliation, France and the USSR have submitted formal complaints about Hugenberg's \"proposal\", and we're left with the two options: Sacking him out of the cabinet or keeping him for the time being."
 ENG_London_Economic_Conference_Events.18.A: "Sack the idiot."
 ENG_London_Economic_Conference_Events.18.B: "It doesn't really matter."

 ENG_London_Economic_Conference_Events.19.t: "An Unsuccessful Conference"
 ENG_London_Economic_Conference_Events.19.d: "[FROM.GetNewsIcon]The last officials have left the Geological Museum in London, marking the end of the months-long London Economic Conference. With a focus on the financial crisis, which is still at full force, many major nations attended to find a solution to the global problem. Even Germany presented an idea of re-colonization.\n\nHowever, it ultimately ended with no progress made. War debts and international trade were some of the topics focused on, but all eyes were upon a new plan of currency stabilization. After the US left the gold standard, many nations felt the exchange rate between the US dollar would be too volatile. To fix this, drafts of currency stabilization were made but were soon halted after President Roosevelt torpedoed the idea by condemning it in a letter.\n\nMany financial advisers have seen this as a sign that global cooperation in the depression will now be unlikely, using the conference as the reason why international intervention is too complicated to get anywhere. It seems the nations of the world will have to solve the crisis to their accord."
 ENG_London_Economic_Conference_Events.19.A: "We're on our own."

 ENG_London_Economic_Conference_Events.20.t: "A Successful Conference"
 ENG_London_Economic_Conference_Events.20.d: "[FROM.GetNewsIcon]As the last car pulled away from the curve of the Geographic Museum in London, a mark of accomplishment had been left behind. Although the conference is officially over, its effects will be long-lasting. War debts and international trade were some of the main topics focused on, and even German colonization in Europe and Africa was discussed. But, all eyes fell upon a plan for currency stabilization, which was still hotly debated at the time.\n\nHowever, through weeks of perseverance and negotiations, Roosevelt, MacDonald, and Bonnet presented a plan that fitted everyone's needs. By providing a stable currency rate, the plan will counteract some of the effects the recession has on the market. It might seem small, and some don't agree with what was drafted, but a feeling of hope has replaced the darkness the depression was holding for many years. "
 ENG_London_Economic_Conference_Events.20.A: "A victory for all!"

######################################################################
#  Wartime Events
######################################################################

 ENG_Wartime_Tree.1.t: "His Majesty's Most Loyal Enemy Aliens"
 ENG_Wartime_Tree.1.d: "An enemy alien is any native, citizen, denizen, or subject of a foreign country or government with which a domestic country or government is at war. Typically, nations have declared war on one another by this time.\n\nPeople who had fled Nazi persecution, particularly Jews and political refugees, have found refuge in our country since the beginning of the war against the German Reich and the Axis powers. The majority of them were relocated to the Isle of Man, where we also housed Enemy Aliens during the Great War. At the start of the war, approximately 70,000 German and Austrian residents of the United Kingdom were designated as enemy aliens.\n\nInitially, they were used by the Pioneer Corps to aid in fortification and military construction. These men, dubbed \"The King's Most Loyal Enemy Aliens\" later served in fighting units and saw active combat. Some were recruited as secret agents by the Special Operations Executive (S.O.E.)."
 ENG_Wartime_Tree.1.A: "Alle waffen gegen Hitler!"

 ENG_Wartime_Tree.2.t: "Our Darkest Hour"
 ENG_Wartime_Tree.2.d: "A wave of evil has swept across Europe. Norway, Denmark, the Netherlands, and Belgium are currently under German occupation. France is clearly not going to last much longer, and Britain and its Empire will be the only ones standing against the war machine. It's clear we've entered our darkest hour.\n\nThe House of Commons reflected this attitude. With Britain soon to be alone in the fight, a sense of hopelessness has gripped the country. Peace talks have been proposed, and the war appeared to be unwinnable at this point.\n\nAs Churchill approached the house table, the Commons fell silent. And, for the second time, he gave a speech about the war. One that is more electrifying, humbling, and powerful than ever before...\n\n“Even though large tracts of Europe and many old and famous States have fallen or may fall into the grip of the Gestapo and all the odious apparatus of Nazi rule, we shall not flag or fail. We shall go on to the end. We shall fight in France, we shall fight on the seas and oceans, we shall fight with growing confidence and growing strength in the air, we shall defend our island, whatever the cost may be. We shall fight on the beaches, we shall fight on the landing grounds, we shall fight in the fields and in the streets, we shall fight in the hills; we shall never surrender!”\n\nThe Commons broke out into several cheers.\n\n“And if, which I do not for a moment believe, this island or a large part of it were subjugated and starving, then our Empire beyond the seas, armed and guarded by the British Fleet, would carry on the struggle, until, in God's good time, the New World, with all its power and might, steps forth to the rescue and the liberation of the old!”\n\nThe commons proceeded to explode into excitement. Several Labour MP's cried, and Conservatives cheered louder than ever before. Churchill turned to a colleague and muttered, “And we'll fight them with the butt ends of broken beer bottles because that's bloody well all we've got!”"
 ENG_Wartime_Tree.2.A: "We shall never surrender!"
 ENG_Wartime_Tree.2_tt: "Add §YBritannia Defiant§! which grants: \nWeekly War Support: §G+0.01§!\nSurrender Limit: §G+5.00%§!"

 ENG_Wartime_Tree.4.t: "The Tizard Mission"
 ENG_Wartime_Tree.4.d: "The British government have sent us a scientific delegation led by Henry Tizard with an interesting proposal. The British are willing to pool their research efforts with ours in several key areas as they do not have the industrial capacity to produce their inventions in great enough numbers."
 ENG_Wartime_Tree.4.A: "An excellent proposal!"
 ENG_Wartime_Tree.4.b: "No, the British are on their own."
 ENG_Wartime_Tree.4.c: "We should aim for a more long term cooperation."

 ENG_Wartime_Tree.5.t: "Tizard Successful"
 ENG_Wartime_Tree.5.d: "The Tizard Mission has been completed after a few months of waiting! The delegation did not return empty-handed: after lengthy negotiations, they obtained plans for RADAR technology, which should now aid us in the current war.\n\nEven if the collaborations with the American behemoth were not as fruitful as some would have liked, the RADAR is a significant step forward. Military industries have already installed them on planes and ships to improve visibility in Europe's seas and skies."
 ENG_Wartime_Tree.5.A: "Jolly good!"

 ENG_Wartime_Tree.6.t: "Tizard Rejected"
 ENG_Wartime_Tree.6.d: "Despite spending months in the USA, our delegation will return to London tomorrow without any new technology from the Americans. Congress has completely rejected our proposal for cooperation, viewing their intervention in our research as a threat to the stability of the policy of isolation.\n\nThe government has dramatically stated that it has been the worst diplomatic failure in the world since the declaration of the Franco-Prussian war in 1870, also saying that “much is at stake because of this”. The expedition's leader, Henry Tizard, is disappointed, but he assures the government that he will continue to develop the technology required to win the war, even if it means killing himself at work.\n\nThe government has quickly reassigned him to a new mission, developing our own RADAR technology, and, if he believes he is capable, the development of our own nuclear program. At the same time, the rejection of our proposition by the Americans has launched a cooling of our mutual relations. We will never have the same relationship with the US as no one is quite sure what the future of our diplomacy will look like with them."
 ENG_Wartime_Tree.6.A: "A failure for the Allies, or a benefit for British science?"

 ENG_Wartime_Tree.7.t: "Tizard Triumphant!"
 ENG_Wartime_Tree.7.d: "The Tizard delegation has good news! After months of back-and-forth negotiations, the Americans have finally decided to assist us! And, contrary to popular belief, they will not only provide us with assistance, but will also assist us in the development of our RADAR plans, as well as in its installation for use in a variety of areas. Some of their scientists also seem to have been impressed by our research on the atom, and they have indicated their willingness to work on this with us in the future.\n\nThis is a huge success for our government, and military industrialists have already begun to develop RADAR-equipped planes and submarines. The Americans, on the other hand, are very impressed by the British delegation's effectiveness and have asked Professor Tizard to stay in America with the American delegates for some time.\n\nIn the Prime Minister's cabinet, everyone has agreed on the fact this operation is the biggest achievement of the century for the British services, and we think it can, in the long run, lead to the end of American isolationism."
 ENG_Wartime_Tree.7.A: "After months of dark storms, the skies of Europe finally see the sun appear!"

 ENG_Wartime_Tree.8.t: "The Atlantic Charter"
 ENG_Wartime_Tree.8.d: "[FROM.GetNewsIcon]Yesterday, the President of the United States [USA.GetLeader] and the Prime Minister met to discuss their post-war goals and visions. After hours of deliberation, both leaders signed a charter outlining their respective visions.\n\nThis agreement, dubbed the \"Atlantic Charter\" by experts, has made it clear that the United States supports the Allies in the war. It contains eight clauses ranging from limiting territorial expansion to ensuring increased global trade.\n\nThe Charter's reception has been mixed. While the clauses concerning freedom of the seas and increased global trade have received widespread support, the third clause, which states: \"All people have the right to self-determination,\" has sparked controversy.\n\nWhile colonial powers such as ourselves and the Netherlands argue that the clause should not apply to their own colonies, the colonies themselves appear to have seen the Charter as a ray of hope.\n\nThe Charter has also heightened tensions between the Western Allies and the Soviet Union because it does not specify whether the people of the Baltic nations, Eastern Poland, and Ukraine also have the right to self-determination. While the Soviets appear determined to maintain their stranglehold on Eastern Europe, the response of the Western Allies remains to be seen."
 ENG_Wartime_Tree.8.A: "One step closer - together."

 ENG_Wartime_Tree.9.t: "The Death of Appeasement"
 ENG_Wartime_Tree.9.d: "\"Well, Sam...\" asked James, pointing to the headline: WAR IN EUROPE. \"What do you think of appeasement now, eh?\"\n\"It was a noble attempt to safeguard peace.\" said Samuel, calmly sipping his tea.\n\"Noble attempt? Are you out of your bloody mind? This was the stupidest idea of them all. Instead of defending European liberty, we stood by like idiots. And now, thousands will pay for it with their lives!\" James yelled. Samuel could feel the anger bubbling up.\n\n\"You don't know what you're talking about, James. Leave it.\" he said, tightening his grip on his cup.\n\"Oh, I bloody well do! You old men are pussies, is what. They wanna hide in their houses because of some old war that happened years ago. Me? I'm not like that. If my country wants me to, I won't even think twice before picking up a gun to shoot the fascists!\" James retaliated. Samuel saw red. He stood up, dropping the cup of tea to the ground. It shattered to pieces, spilling tea all over.\n\n\"Do you have any idea what its like in the trenches, you silly boy? Have you ever seen all your comrades die beside you as you shared a hole in the ground with rats and disease? Have you ever felt a ringing in your ear from artillery exploding next to you? Have you ever seen someone's brains drip out their ears?\" he screamed, \"No you haven't! So don't tell me you know what war is, and for God's sake, don't even think you'll survive a day out there!\" he stormed out of the café.\n\nAs Samuel walked back back home, he felt dreadful. Despite his protests, there was no denying that appeasement had failed. There was no denying that European peace had been shattered, just like his tea cup. There was no denying that, like his tea, the blood of thousands, if not millions, of people would be spilled all over....."
 ENG_Wartime_Tree.9.A: "We have thrown down the gauntlet."
 ENG_Wartime_Tree.9.A_tt: "We will stop this tyrant or §Rdie§! trying"

 ENG_Wartime_Tree.10.t: "The Heart of Industry Roars Again!"
 ENG_Wartime_Tree.10.d: "England is the hub of industry. It was in Merrie England that iron was first smelted and textiles were woven on a large, industrial scale. Not long ago, we were considered one of the most formidable industrial powers. Despite our enormous economic benefits from the Empire, the centre of global industry has shifted elsewhere. Because of the Depression, factories in the United States, Soviet Union, and Germany now lead the world in terms of productivity and efficiency.\n\nHowever, times are changing. Our economic recovery, combined with rising tensions, has brought our industrial sector back to life. Industrialists, concerned about the future, have begun to pour money into our ailing industrial sector. Long-abandoned factories have reopened as men queue for secure, well-paying jobs. These industrialists not only manufacture new weapons of war for our growing military, but also everything from toasters to bullets.\n\nThis second Industrial Revolution has finally led to a near-complete recovery from the Great Depression. People can now spend more money because there are so many well-paying jobs available. As a result, money is now in the pockets of the service sector, which has always been hit hardest during recessions. While we celebrate this victory, we are aware that, with war on the horizon, it could be the last bloodless victory in a long time."
 ENG_Wartime_Tree.10.A: "Not Even Time for Tea?"

 ENG_Wartime_Tree.11.t: "V is for Victory!"
 ENG_Wartime_Tree.11.d: "As the Allies fight against the forces of tyranny, every victory is celebrated, and no opportunity to boost morale is missed. The most recent development occurred somewhat unexpectedly. Everyone has started flashing the V for Victory sign, first in Belgium, then in France, and finally in the United Kingdom. Extending the pointer and middle fingers has quickly become a simple but powerful symbol of defiance that is widely accepted throughout Europe.\n\nIn Dutch it stands for peace and liberty, in French it stands for Victoire, and in the Empire it has taken on a similar meaning. The Prime Minister has been photographed giving the symbol in many pictures, while the BBC has begun broadcasting the Morse code for V to Occupied Europe. It has truly become a cultural phenomenon across the Free World. Even the Americans have begun to get in on it."
 ENG_Wartime_Tree.11.A: "V for Victory!"
 ENG_Wartime_Tree.11_tt: "Modify §YBritannia Defiant§! by \nSurrender Limit: §G+5.00%§!"

 ENG_Wartime_Tree.12.t: "After the End"
 ENG_Wartime_Tree.12.d: "Europe's guns have once again fallen silent. Once more, British armies return from Europe's battlefields decimated but victorious. The spectre of German militarism has plunged Europe into the hellfire of world war twice in the last four decades, yet the Second World War has turned out to be more total than the first. The soldiers' fathers disembarking from their troopships left Germany battered but not destroyed.\n\nTheir sons have finished what their father began, having paid the price in blood and bodies. The German people were now at the mercy of the Allies. The vengeful Soviets will reap their sorrowful harvest over the German people in the east, but only time will tell how the British occupation will be. In any case, that is a future question. Today, Britain has the opportunity to do something it has not done in many years. Britain can now relax.\n\nWhile the British people pick up the pieces of their lives that have been inevitably shattered by the War, the government has acted quickly to hasten that rebuilding. The first of many steps has been taken, as food rationing is set to end soon, according to official sources. The despised but necessary system has been the bedrock of most British lives for the past six long, arduous years. However, that keystone will be removed soon, and in its place, a new life or, if possible, a return to an old life will be built. In any case, Britain has begun the long and difficult process of rebuilding itself."
 ENG_Wartime_Tree.12.A: "Glad to be rid of the National Loaf!"

 ENG_Wartime_Tree.13.t: "My dear Jiyah,"
 ENG_Wartime_Tree.13.d: "I only want to come home. I have met the enemy in battle numerous times and have already lost friends and compatriots. Rakesh was shot at the border, and Krishna stepped on a mine while attempting to use the lavatory during the march. Our commander, Robinson, is a good man, but as an Angrez, he is shortsighted. He sees the war as a war against European tyranny, a war for liberty, while ignoring what his countrymen do in our homeland.\n\nI remember when the war was declared. When I told you I wanted to serve, you urged me not to. You referred to The Mahatma's words and advised me to stay at home.  You said that if I had to fight, I should join Netaji and the Azad Hind. However, I do not wish to exchange one colonial master for another. Bose is misguided. If he is victorious, we will be the subject of Tokyo, not London. I'm not sure which would be worse, but I guarantee it won't be any better.\n\nThat is not to say that I fully support the Angrez. Even now, fighting and dying alongside them, I can't help but notice the patronising looks and tones they gave me. When they talk about the Raj, they are praising it. They are unaware of the repression and violence that we face every day under their yoke. I mention Jallianwala Bagh, and they give me blank stares. Yet, in my heart, I know I must fight with them now. Maybe if we prove ourselves, we'll be able to breathe freely after the war. I can only hope. I'll write again soon."
 ENG_Wartime_Tree.13.A: "Your Fearless Warrior, Rohit."
 ENG_Wartime_Tree.13_tt: "Modify §YBritannia Defiant§! by \nCold Acclimatization Gain: §G+10.00%§!\nArmy Hot Acclimatization Gain: §G+10.00%§!"

 ENG_Wartime_Tree.14.t: "The Saint James's Palace Declaration"
 ENG_Wartime_Tree.14.d: "Since the war began so long ago, the Allies have fought with no clear stated objectives. There were estimates and assumptions, but no clear picture of what the Allies hoped to achieve. That has now changed following a meeting at St. James' Palace. After only one day of deliberation, the United Kingdom, France, and a number of other exile governments have announced their preliminary goals.\n\nWhile a rough draft with a more concrete and extensive list is expected later, this declaration remains effective. The document, signed by all present governments, declares that no nation will enter into a separate peace treaty with Germany. This means that the Germans' plans to divide and conquer our alliance are no longer viable. The document also includes a vague promise to pursue peace based on 'a willing cooperation of free peoples,' which many have interpreted as meaning that the war will not end until previous conquests are reversed.\n\nWhile this document was ignored in Germany, it inspired hope among the Allies. The Allies have pledged themselves and their combined forces to liberate Europe. not switch from one occupation to another. Resistance movements across Europe have lost their initial weariness, as they no longer have to guess their benefactors' true intentions. Some may still doubt our ability to enforce the terms of the previous pledge, but simply making it is a significant step forward."
 ENG_Wartime_Tree.14.A: "All for one and one for all!"

######################################################################
#  Wartime Decision Events
######################################################################
 ENG_Wartime_Decisions.1.t: "Across the Pond Duty"
 ENG_Wartime_Decisions.1.d: "The British government approached us today about the possibility of taking over the defense of the Kingdom of Iceland, a de-jure Danish protectorate.\n\nWhen Denmark fell to the German invasion, British forces moved quickly to secure Iceland, preventing the fascists from using it as a base to further disrupt the war effort in the UK, as well as a potential invasion point into the British Isles. While this was a wise decision at the time, the occupation of this territory requires a large number of soldiers and equipment, which the British claim can be used elsewhere in the war to combat the Axis.\n\nWe would gain effective control of Iceland under this agreement, but we would have to send troops to protect it. Another issue is that Iceland is technically still ruled by the King of Denmark, and proceeding with the plan could be interpreted as a violation of Danish sovereignty."
 ENG_Wartime_Decisions.1.A: "Our forces would be happy to take over."
 ENG_Wartime_Decisions.1.B: "We aren't willing to take control at this time."

 ENG_Wartime_Decisions.2.t: "America Takes Control of Iceland"
 ENG_Wartime_Decisions.2.d: "The US government has given us good news about our potential deal regarding Iceland. They have informed us that they are willing to proceed with the transfer of the territory's protection from British to American troops!\n\nThis is good news for us, as it means we can now start withdrawing the garrisons stationed there and relocating them to the frontlines, where they will be much more useful in our fight against the Axis. It also helps to relieve administrative strain, which is already at breaking point as a result of the war.\n\nWe are confident that the United States will do an excellent job of protecting Iceland, and we hope that when the war is over, we will be able to ensure that the rightful Danish government receives their land back."
 ENG_Wartime_Decisions.2.A: "We give thanks to the Yanks!"

 ENG_Wartime_Decisions.3.t: "No Deal in Reykjavik"
 ENG_Wartime_Decisions.3.d: "The US government has given us some unfortunate news about our potential deal regarding Iceland. They have informed us that they are not willing to proceed with the transfer of the territory from British to American control!\n\nThis is bad news for us, as it means we must leave the garrisons stationed there to ensure their protection, and we won't be able to move them to the frontlines where they would've been much more useful in our fight against the Axis. It also puts extra administrative strain on a system which is already at breaking point as a result of the war.\n\nThe US stated that it was not in their national interest to take control of Iceland, also adding that it would be a violation of Danish sovereignty. While we will protect them for now, we hope to be able to return them to the rightful Danish government soon."
 ENG_Wartime_Decisions.3.A: "Ah, piss!"

 ENG_Wartime_Decisions.4.t: "Destroyers for Bases"
 ENG_Wartime_Decisions.4.d: "With the war in Europe turning heavily against Britain and an invasion of the island appearing imminent, some members of our government have proposed that we offer the British a unique deal that could circumvent the neutrality acts. In exchange for transferring destroyers to the British and Canadian Royal Navies, we may receive 99-year rent-free land rights for naval and air bases in the British West Indies and Newfoundland. Diplomatic probes through the British embassy in Washington have yielded results, and it appears that the British are likely to agree to our proposal, especially given their need for as many vessels as possible to contest the waters around their home island and in the Atlantic.\n\nBecause these destroyers are surplus, they are not subject to neutrality laws and can be transferred to other countries as we see fit. A large portion of our cabinet supports this deal, because it would not only help fight fascism without costing any American lives, but it would also spread US power projection in North America. However, there is a significant amount of opposition. After all, European affairs are not our responsibility. And those destroyers are required to reinforce the US Navy; we cannot simply give away dozens of them at will."
 ENG_Wartime_Decisions.4.A: "Anything to combat the Nazi menace!"
 ENG_Wartime_Decisions.4.B: "We need those destroyers for ourselves."

 ENG_Wartime_Decisions.5.t: "[USA.GetLeader] Refuses!"
 ENG_Wartime_Decisions.5.d: "Our appeal to the United States for naval assistance has been formally rejected. Despite emphasizing the growing threat to the Atlantic lifeline and the urgent need for modern destroyers to counter mounting U-boat attacks, Washington has declined to enter the proposed exchange of ships for basing rights.\n\nOfficials at the Foreign Office warn that this decision leaves our convoy routes dangerously exposed at a moment when losses are rising and the Royal Navy is stretched across multiple fronts. Without American vessels to fill the gaps, the burden of protecting the empire's sea lanes will fall entirely upon our already overextended escort forces.\n\nThe refusal also dampens hopes that the United States might be willing to assume a more active role in the defense of the Western Hemisphere and the Atlantic as the crisis deepens. For now, Britain must brace for the continued strain on its naval resources and search for alternative means of strengthening its escort fleet."
 ENG_Wartime_Decisions.5.A: "Oh dear."

 ENG_Wartime_Decisions.6.t: "[USA.GetLeader] Accepts!"
 ENG_Wartime_Decisions.6.d: "Word has arrived from Washington: the United States has agreed to our proposal. In exchange for granting long-term basing rights across key Atlantic and Caribbean territories, the U.S. will transfer a number of urgently needed destroyers to the Royal Navy.\n\nThough the arrangement represents a significant concession of imperial infrastructure, the Admiralty stresses that the ships will bolster our ability to protect convoys at a critical moment in the Battle of the Atlantic. American naval analysts have already begun coordinating with our officers to expedite the handover and integrate the vessels into escort service as quickly as possible.\n\nWhile some within government view the agreement as a reluctant acknowledgment of Britain's strained position, the prevailing sentiment is one of relief. The additional destroyers may well mean the difference between holding our supply routes open and watching them collapse under enemy pressure."
 ENG_Wartime_Decisions.6.A: "A desperate move, but a necessary one."

 ENG_Wartime_Decisions.7.t: "The Hamilton Handover"
 ENG_Wartime_Decisions.7.d: "With the United Kingdom now under direct attack by advancing German forces, the British government has sought to secure what remains of its overseas territories from the threat of Axis expansion. Following the framework established by the earlier Destroyers for Bases Agreement, British representatives in Hamilton have formally approached our delegation with a request: that the United States assume immediate control of Britain's Caribbean possessions, Bermuda, and British Guiana.\n\nBritish naval and administrative authorities in the region report that, with the Home Isles under siege, they can no longer guarantee the defense or neutrality of these territories. To prevent them from falling into hostile hands, or becoming staging grounds for Axis operations in the Western Hemisphere, they have agreed to transfer administrative authority, garrison responsibility, and strategic oversight to U.S. command.\n\nOur forces, already established in these areas under the previous basing arrangements, are preparing to take full operational control as local British officials evacuate or integrate into American command as advisors. The handover marks a significant shift in regional security, ensuring that these territories remain firmly aligned with the defense of the hemisphere while Britain focuses its remaining strength on resisting invasion."
 ENG_Wartime_Decisions.7.A: "And with a simple salute, 300 years of British rule came to an end."

 ENG_Wartime_Decisions.8.t: "Destroyers for Bases"
 ENG_Wartime_Decisions.8.d: "[FROM.GetNewsIcon]In a significant development for the Atlantic theater, the United States and the United Kingdom have reached an agreement allowing the transfer of fifty U.S. Navy destroyers to British control in exchange for long-term rights to establish military bases on key British territories.\n\nUnder the arrangement, the United States will gain access to bases in Newfoundland, Bermuda, and the British Caribbean territories, including Jamaica, Antigua, and Trinidad. British authorities stressed that these measures are intended to enhance the defense of the Western Hemisphere and the North Atlantic, while ensuring the continued security of vital shipping lanes.\n\nThe fifty destroyers, transferred to the Royal Navy and Royal Canadian Navy, will bolster escort forces protecting convoys from submarine attacks. U.S. officials emphasized that the agreement does not involve formal entry into the ongoing European conflict but represents a strategic partnership designed to safeguard shared interests in the Atlantic and the Caribbean.\n\nThe first of the destroyers are expected to be delivered to British ports within weeks, while construction of U.S. bases on the leased territories is set to begin immediately."
 ENG_Wartime_Decisions.8.A: "Democracies support each other!"
 ENG_Wartime_Decisions.8.B: "We will sink their destroyers and burn their bases."
 ENG_Wartime_Decisions.8.C: "A fair deal."

 ENG_Wartime_Decisions.9.t: "The Hamilton Handover"
 ENG_Wartime_Decisions.9.d: "[FROM.GetNewsIcon]In a historic shift in Atlantic and Caribbean geopolitics, the United States has formally taken administrative and military control of several former British possessions, including Bermuda, British Guiana, Newfoundland, and key Caribbean islands. The transfer follows the ongoing German invasion of the British Isles, which has rendered Britain unable to maintain authority over its overseas territories.\n\nBritish officials in Hamilton, capital of Bermuda, coordinated the handover with American military authorities. U.S. forces, previously stationed under the Destroyers for Bases Agreement, have now assumed full operational command of territories where, only days ago, they were mere guests. Local British administrators either evacuated or remain in advisory roles under U.S. authority.\n\nU.S officials emphasize that the transfer is merely intended to prevent these strategically vital territories from falling under enemy control. However, observers note that the shift raises questions about the long-term status of these territories, as American authorities now possess both the infrastructure and administrative authority to potentially retain them beyond the immediate crisis."
 ENG_Wartime_Decisions.9.A: "They will be kept safe by Uncle Sam."
 ENG_Wartime_Decisions.9.B: "We will seize them regardless."
 ENG_Wartime_Decisions.9.C: "As was expected."

######################################################################
#  Baldwin Events
######################################################################
 ENG_Baldwin_Events.1.t: "Continuing the Anglo-German Naval Negotiations"
 ENG_Baldwin_Events.1.d: "Germany presented their own demand at the World Disarmament Conference, known as \"Gleichberechtigung\", or the repeal of Part V of the Treaty of Versailles. Germany was eventually allowed to partially rearm its own nation after several discussions and agreements.\n\nGermany's diplomatic stance has gradually shifted since then. It is gradually seeing Britain as a potential ally and communicating with it amicably. During the official negotiations of the British-German naval treaty, however, the British envoy Simon and the German diplomat Ribbentrop disagreed.\n\nBecause Baldwin's administration wished to avoid an armaments race with Germany, the British cabinet voted in favour of a motion to continue talks. They informed Ribbentrop and his delegation that the British side agreed that the Kriegsmarine's total tonnage would be 35% of the Royal Navy's total tonnage on a permanent basis.\n\nThe negotiations went on smoothly. Britain's new foreign secretary believes it is the start of an Anglo-German alliance."
 ENG_Baldwin_Events.1.A: "Let us hope for a good deal!"

 ENG_Baldwin_Events.2.t: "A New Governmental Mandate"
 ENG_Baldwin_Events.2.d: "Recently, Prime Minister Stanley Baldwin has called a General Election to be held soon. This decision was followed by weeks of campaigning by both major political parties, each trying to win key constituencies that could tilt the balance of Parliament in their favour.\n\nThe principal subject of the aforementioned elections was about important matters: should we pursue a more aggressive rearmament or should we continue for peaceful politics? It is an important question that needs to be answered during the General Election.\n\nWhat policy decision we choose is best to get behind could determine the fate of the National Government, so we must be careful, and with the British voters poised to head to the polls, they will be watching what we say ever more closely."
 ENG_Baldwin_Events.2.A: "We should opt for an appeasement policy: there is no need to anger Germany..."

 ENG_Baldwin_Events.3.t: "Chamberlain's Counsel"
 ENG_Baldwin_Events.3.d: "Neville Chamberlain arrived today to meet with Prime Minister Stanley Baldwin. Contrary to appearances, his visit was not coincidental, and the chancellor of the exchequer has clearly advised him to support the rearmament against Germany on the campaign trail. Chamberlain believes that this would be a good way to show Europe that the UK would be ready for any escalation in tensions across the continent.\n\nDespite this, Baldwin maintained his positions, claiming that despite his good intentions against any European threat, this policy will never gain enough support in the population, let alone within the government."
 ENG_Baldwin_Events.3.A: "We must promise no great armaments"

 ENG_Baldwin_Events.4.t: "A Pacifistic Focus"
 ENG_Baldwin_Events.4.d: "Despite recent advice from friends and colleagues, Stanley Baldwin has chosen the focal point of his current campaign. He wants to focus on the League of Nations, modernising British defences, and, of course, housing the homeless, putting the unemployed to work, and thus ending the effects of the Great Depression in the United Kingdom.\n\nDespite the protestations of a minority, the campaign should be won without much resistance."
 ENG_Baldwin_Events.4.A: "The march toward peace has begun."

 ENG_Baldwin_Events.5.t: "A Large But Weakening Majority"
 ENG_Baldwin_Events.5.d: "Despite the election's significant results, it appears that British public opinion is as volatile as the wind. In fact, despite having a large majority, Stanley Baldwin appears to have lost some support two weeks after his last announcement.\n\nThe election has revealed that while still possessing a healthy majority in Parliament, the National Government has certainly been weakened, whether that be due to its reaction to the Great Depression, or for being weak on foreign policy. With that however, comes for a chance for Baldwin to reflect on the campaign and to forge ahead with the plans that he seeks to put forward."
 ENG_Baldwin_Events.5.A: "A win is still a win, right?"

 ENG_Baldwin_Events.6.t: "Taking Advantage"
 ENG_Baldwin_Events.6.d: "The Great Depression has clearly taken its toll on the British family. Many families lack a proper place to live where they will not be forced to leave on short notice. If the husband is lucky enough to have a job to go to in the morning, he is frequently forced to travel on the dilapidated British road network, which is completely unfit to handle the volumes and strains placed on it by modern society. Should he survive the perilous journey across town, he may be greeted with a pink slip and an apology as his struggling factory closes its doors for the final time.\n\nWith the funds from the National Government's drive to resuscitate the floundering economy, we have the opportunity to begin hammering away at this cornucopia of economic woes. But because our coin purse is not infinite, we must be prudent in where we invest the limited resources we have at our disposal. What should we start with, Mr. Prime Minister?"
 ENG_Baldwin_Events.6.A: "The working man needs a home to come back to!"
 ENG_Baldwin_Events.6.B: "The working man needs safe and efficient roads!"
 ENG_Baldwin_Events.6.C: "The working man needs to be able to put bread on the table!"

 ENG_Baldwin_Events.7.t: "Continuing the Southern Housing Boom"
 ENG_Baldwin_Events.7.d: "We have managed to propel the nascent housing boom in Southern England as a result of our wise investment in the vital housing sector. New housing developments are springing up left, right, and centre in towns ranging from Dover to Bristol. With the increase in affordable housing, fewer and fewer people are forced to live in squalid \"homes\" or, worse, with their dreaded in-laws.\n\nWith this, our housing construction campaign has been declared a great success, and the government has begun to turn its attention to other more pressing matters. While only a small dent in the overall effects of the Great Depression, we can sleep well tonight knowing that our relief funds were wisely invested."
 ENG_Baldwin_Events.7.A: "I hope they rest easy in their beds, too."

 ENG_Baldwin_Events.8.t: "For Miles and Miles"
 ENG_Baldwin_Events.8.d: "Even in the best of times, much of the existing network was underdeveloped, and it was never really ready to handle the advent of the automobile, and it then suffered increasing neglect as economic hardship meant fewer funds available for road maintenance. However, as a result of recent investment in our road network and government attention to British roads, many critical roads have been built and expanded across the country, spanning for miles and miles.\n\nWith this, our road expansion campaign has been declared a huge success, and the government has begun to shift its focus to more pressing issues. While only a small dent in the overall effects of the Great Depression, we can sleep well tonight knowing that our relief funds were wisely invested."
 ENG_Baldwin_Events.8.A: "Would anyone fancy a drive out in the country?"

 ENG_Baldwin_Events.9.t: "Honouring Our Industrial Legacy"
 ENG_Baldwin_Events.9.d: "If one were to study a history textbook in one of Britain's many underfunded schools, they would be surprised to learn that the Industrial Revolution was actually born in England, given the depressing state of our domestic industry in previous years. Since the Great Depression rocked the economy, many once productive factories have been forced to close their doors and cease operations, creating a tidal wave of unemployed industrial workers. However, with our recent investment into the industrial sector the number of closures has cratered, and in some regions has even reversed course, providing jobs to thousands of workers looking to put bread on the table.\n\nWith this, our industrial preservation campaign has been declared a great success, and the government has begun to turn its attention to other more pressing matters. While only a small dent into the overall effects of the Great Depression, we may rest easy tonight knowing that we invested our relief funds wisely."
 ENG_Baldwin_Events.9.A: "I've never been happier to see industrial smog!"

######################################################################
#  Chamberlain Events
######################################################################
 ENG_Chamberlain_Events.1.t: "The Irish Constitution"
 ENG_Chamberlain_Events.1.d: "Since the end of the Irish War of Independence in 1921, the creation of an Irish constitution has been a top priority. The Irish Constituent Assembly adopted the Irish Free State Constitution in 1922, but it still needs to be revised because Ireland's freedom is not fully realised.\n\nAs a result, despite constituting only 38% of the electorate, 56% of Irish residents supported the formation of the Irish constitution in the referendum on July 1, 1937.\n\nAccording to the Irish Constitution, Ireland is a sovereign autonomous state, not a vassal state or a territory of another government. Citizens in Ireland are free to make their own choices, and only a referendum can change the constitution.\n\nIreland has a bicameral legislative system, a separation of powers system, and judicial review. The constitution is based on a representative democracy, which requires the president to be elected as the head of state."
 ENG_Chamberlain_Events.1.A: "Let's hope this brings stability."

 ENG_Chamberlain_Events.2.t: "Britannia at War"
 ENG_Chamberlain_Events.2.d: "The Great War cost us the best of a generation, and our citizens hope that there will never be another war, allowing us to advance in peace and stability.\n\nHowever, the German declaration of war quickly dashed these hopes. Since Germany declared war on the European continent, our Prime Minister Chamberlain has advocated for an appeasement strategy. He even used the phrase \"a generation of peace\" to describe the shaky peace treaty he signed with Germany.\n\nIn retrospect, Chamberlain waving his paper and seeing the misery of our European brethren, which eventually resulted in the war that Germany began coming to our UK, appears farcical.\n\nNow that we are involved in another war, we must think carefully about the future of our country and nation, and we must not allow the proud empire on which the sun never sets to be dismembered by other countries."
 ENG_Chamberlain_Events.2.A: "We shall never surrender!"

######################################################################
#  Reserve (territorial army) events
######################################################################
 ENG_Reserves.1.t: "Transforming the 'break-in' into a 'break-through'"
 ENG_Reserves.1.d: "Infantry divisions are the foundation of all modern armies. They are composed of hardy men whose mission is to destroy the enemy and break their front lines. This break has traditionally been exploited by faster cavalry divisions. The development of the tank, however, has rendered such ideas obsolete. After much thought, we have developed a new fundamental military doctrine. The infantry divisions will continue their mission of destroying the enemy.\n\nFollowing them will be new weapons of war, automobiles, and fast-moving motorcycles. These new 'mobile divisions' will function as modern cavalry, charging deep behind enemy lines and wreaking havoc. These units will be lean and fast, able to maintain momentum as our boys pursue them, securing their flanks and supply routes. The Germans have reportedly been investigating warfare in much the same way, which suggests we may be onto something.\n\nThe Army has decided to form six motor divisions immediately, with the first three coming from the Territorials. However, some have objected to removing a brigade from our new divisions, arguing that they may be too weak to fight effectively."
 ENG_Reserves.1.A: "Sign the directive."
 ENG_Reserves.1.B: "Don't sign."
 ENG_Reserves.1_tt: "We will upgrade our £helmet_icon_1_20x20 '§YTerritorial Army§!' with '§Y3§!' Motorized Divisons."

 ENG_Reserves.2.t: "Leslie's Territorial Army Expansion Plan"
 ENG_Reserves.2.d: "Today, Secretary of State for War Leslie Hore-Belisha presented the government with an ambitious new Army reform plan. He intends to nearly triple the size of the Territorial Army, increasing its strength from 130,000 to nearly 350,000. To encourage recruitment, he intends to lower promotion standards, raise base soldier pay, increase rations, and build better barracks. Existing TA regiments would be allowed to expand their rosters to form a second-line division.\n\nThis has been met with immediate pushback. The plan is expected to be extremely expensive and take many years to complete. Ministers have objected on both counts. They regard it as irresponsible to spend millions of pounds on a non-essential military buildup while millions of citizens live in poverty. Meanwhile, those who are less budget-conscious continue to object to the overall timetable. If our enemies march while we are still halfway through a reform, the outcome could be disastrous.\n\nLeslie has pointed out that the British Army is falling far behind its potential continental and international rivals. While professionalism has helped the Army go far, sheer numbers now carry a lot of weight on their own. While he does not advocate for mass conscription as in Russia or Germany, he believes that his plan is the best way to adapt the British way of war to the new era."
 ENG_Reserves.2.A: "Rearmament is regrettable, but required."
 ENG_Reserves.2.B: "The penny pinchers win out!"
 ENG_Reserves.2_tt: "We will upgrade our £helmet_icon_1_20x20 '§YTerritorial Army§!' with '§Y9§!' Infantry Divisions and '§Y3§!' Motorized Divisions."

#########################################################################
# War Room: Operation Overlord
#########################################################################
 ENG_Operation_Overlord.1.t: "Operation Jubilee"
 ENG_Operation_Overlord.1.d.A: "As the sun rises over the shores of Nova Scotia, the newspapers, which had given the Canadian people little to celebrate during the first few years of the war, proudly highlight the raid on Dieppe.\n\nOur forces have been preparing to repeat our actions in The Great War and solidify our reputation as offensive-leading \"Shock Troopers\" since the British Expeditionary Force was thrown off the beaches of France and returned to the home islands. The British had yet to grant us that opportunity. However, our commanders persisted, and yesterday, our boys crossed the English Channel to lead a daring raid on Hitler's Atlantic Wall. We fought our way up the steep cliffs, where coastal batteries and radars sat, and destroyed them, leaving Jerry's defences nothing more than a smoky pile of rubble.\n\nOur main force landed right on Dieppe's gravel beaches, overcoming countless beach defences and tank traps to temporarily liberate the city by mid-afternoon. After assuring the citizens of Dieppe that we would return, our soldiers returned to their landing craft. Our reputation has been cemented, and our boys will be remembered as an elite fighting force."
 ENG_Operation_Overlord.1.d.B: "As reports from across the Atlantic arrive, it appears that there are no reports of success, and it is believed that the raid on the coastal city of Dieppe was ineffective. Since the fall of France, our soldiers and army commanders have been preparing to confront Jerry. Despite the fact that fighting is going on elsewhere, British command has been reluctant to give us that opportunity. However, we were given the opportunity to secure the French coastal city of Dieppe and destroy the surrounding defences and strategic military targets, which proved to be an extremely difficult task.\n\nOur boys led the raid with tremendous courage and bravery, but they were not adequately prepared for a naval raid on the heavily fortified Atlantic Wall. Despite destroying some strategic defences and radars, our boys were unable to secure Dieppe because the supporting tanks became bogged down on the gravel beaches. We lost many men yesterday; it is clear that retaking Europe will be a difficult task, and we will need to train more forces and act more independently of the British once an invasion of Western Europe begins."
 ENG_Operation_Overlord.1.d.C: "It's a dark day as grim reports emerge of an attempted raid on Dieppe by mostly our own soldiers that ended in complete disaster. Casualties are still being counted, but the numbers look bad.\n\nOur commanders begged British commanders to send our troops into action to gain experience fighting in this new era of warfare. Instead of a traditional ground battle the British command chose to send one of our divisions with no combat experience as the primary raid force on Hitler's Atlantic Wall. It appears to have gone as badly as anyone could have predicted. Our soldiers piled up on the seawall just outside of Dieppe as the supporting tanks became bogged down by the gravel beaches and were destroyed by German anti-tank guns. To make matters worse, the smoke screen in front of the landing flotilla prevented the field commander, who happened to be British, from sending more Canadian battalions into the depths of hell because he couldn't see the situation on the beach.\n\nOur forces were cut down by the cliffs that flanked the beach, as well as the numerous defensive positions on Dieppe's edge. Even in retreat, there was no escaping the rain of lead and shrapnel as our forces were slaughtered while attempting to return to the landing craft. The raid was a disaster, and some speculate that the British used our boys as cannon fodder to prevent the British public from protesting the suicidal raid."
 ENG_Operation_Overlord.1.d.D: "Today brings exciting news, with reports of objectives completed or destroyed across all sectors at Dieppe. Our convoy across the channel and the RAF Costal Command patrols that preceded it were met with little resistance, demonstrating our control over the English Channel. As our flotilla and landing craft with their escorts made their way to Dieppe's shores, the minesweepers continued the initial patrols, clearing the channel of mines. At sunrise, our fighters maintained air superiority over the channel and combat zones.\n\nThe initial landings at daybreak were met with stiff resistance, as expected, but the preliminary bombardments and coordinated landings on the blindspots of key artillery battery locations and machine gun posts, aided by extensive aerial and ground recon from both the RAF and the French resistance, proved extremely effective. Both Commando forces tasked with securing the flanks and destroying the remaining artillery batteries completed their tasks quickly and moved on to their secondary objectives.\n\nThe Canadian infantry, assisted by RAF fighter-bombers, were able to push on into Dieppe and secure the city by mid-afternoon. With the exception of larger-than-expected equipment losses and minor manpower losses, the raid was a complete success, and our naval invasion strategy will prevail."
 ENG_Operation_Overlord.1.d.E: "There is a general sense of unease in the high command offices today as reports from Dieppe indicate a total failure. Although RAF Costal Command's overnight patrols of the English Channel were somewhat successful everything went south at daybreak. The two Commando groups were able to reach and complete their initial objectives with minimal resistance, but the same could not be said for the main landings. With the exception of the successful sabotage of a radar station the Canadian landings were a failure. The preliminary bombardment was ineffective against Dieppe's strong coastal defences and artillery emplacements. The tanks and infantry both landed at the same time, but the majority of the tanks became bogged down on the gravel beaches.\n\nThe infantry and remaining tanks managed to get past the seawall, but the tanks were unable to penetrate the anti-tank defences. Reserve infantry battalions were sent to assist the infantry in their advances into Dieppe itself, but the infantry were unable to reach their objectives and were forced to retreat. The equipment could not be recovered, but the majority of the infantry were able to withdraw, with the exception of one commando group and about a quarter of the Canadian infantry, who were cut off in Dieppe before they could escape. No one in high command believes we are ready for a full-scale invasion."
 ENG_Operation_Overlord.1.d.F: "You could hear a pin drop as the final reports from Operation Jubilee arrived today. It began badly, with RAF Costal Command's overnight patrols of the English Channel proving ineffective. The situation worsened at first light. Miscommunications occurred almost immediately; one of our commando groups was unaware of a German coastal patrol convoy and was engaged by them. To add insult to injury, our flotilla noticed the engagement but assumed they were under fire from a shore battery instead. This left our commandos severely understaffed, and they were unable to complete their missions.\n\nThe main landings were disastrous. The tank units that were supposed to land with the infantry arrived late, leaving the Canadian infantry without armour support in the face of relentless machine gun and artillery fire. The scene was chaotic and confusing as the canucks were cut down from the cliffs and piled up on the sea wall. When the tanks finally arrived, they became bogged down on the gravel beach or were unable to pass through anti-tank defences and traps, forcing them to retreat back to the water to provide cover fire for the retreating infantry. Because of the smoke screen used to conceal the naval forces' positions, the field commander was unable to see the situation on the beach and dispatched reserve battalions into hell itself. This was, in every sense, a disaster."
 ENG_Operation_Overlord.1.A: "We will soon return to France as liberators!"
 ENG_Operation_Overlord.1.B: "It may take time, but we will return to France as liberators."
 ENG_Operation_Overlord.1.C: "Lambs to the slaughter. We need a full-sized army of our own."
 ENG_Operation_Overlord.1.D: "It is nearly time for the liberation of the old world!"
 ENG_Operation_Overlord.1.E: "We have to rethink our strategies."
 ENG_Operation_Overlord.1.F: "Ts is so ahh."

 ENG_Operation_Overlord.2.t: "The Dieppe Raid"
 ENG_Operation_Overlord.2.d.A: "The Allied forces have successfully launched an amphibious assault on the port city of Dieppe. Canadian and British troops landed before dawn, supported by tanks and naval gunfire, and advanced into the city and surrounding defences. The beaches, once thought impenetrable due to the Atlantic Wall, were breached with coordinated assaults. Machine gun nests were silenced and pillboxes were quickly captured in close quarters combat, with British and Canadian soldiers taking numerous propaganda photos of the captured defences.\n\nOur defenders were taken aback by the speed and aggression of the landings. Attempts to counterattack were thwarted, and several key gun batteries were destroyed or disabled, further limiting our fire control over the beaches, before the allies withdrew, taking several prisoners as well as large amounts of captured weaponry and other trophies. The operation revealed serious flaws in our coastal defence plan along the Channel. Weak coordination between defending forces, a lack of preparation of the fortified defences themselves, and a general lack of preparedness for such landings mean that the part of the Atlantic Wall in the Dieppe-Calais sector, once thought to be the most fortified of all sectors, is much weaker than previously thought, and an allied landing in continental Europe is now confirmed to be possible."
 ENG_Operation_Overlord.2.d.B: "In the early morning, Allied forces, primarily Canadian infantry supported by British commandos and tanks, launched an amphibious raid on Dieppe. Their apparent goal was to test our coastal defences and gather intelligence, potentially for a future landing in Europe.\n\nThe landings were met with fierce resistance. The Royal Regiment of Canada came under heavy machine-gun fire from fortified cliff positions. Many people were killed or captured before reaching the seawall. Wehrmacht units, supported by well-placed artillery and mortars, quickly cut down advancing waves. Commandos on the flanks had limited success, destroying a few coastal batteries but failing to achieve much more.\n\nAfter hours of brutal fighting, the allies finally retreated, with our own casualties being relatively low. It is clear that our Atlantic Wall defences are strong and will continue to hold. The Allies will not attempt a European landing anytime soon, that much is certain."
 ENG_Operation_Overlord.2.d.C: "The beaches of Dieppe are now littered with the remains of one of the Allies' most disastrous operations since the war began. Several thousand allied forces landed in an attempted and daring raid, only to face disaster.\n\nThe Wehrmacht's coastal defences detected the naval approach well in advance. Before the landing craft reached the shore, searchlights and pre-sighted artillery zeroed in on them. Heavy machine gun nests, barbed wire entanglements, and interlocking firefields transformed every beach sector into a death trap. Attackers were pinned against steep cliffs after disembarking amid a hail of fire. Tanks from the first wave were destroyed or immobilised before they could support the infantry, while Wehrmacht mortar teams engaged advancing groups.\n\nThousands of allied troops have been taken prisoner, many of whom have been wounded, and the remainder have been confirmed to have died in action. Our own losses were minimal. Even the defenders were taken aback by the magnitude of the Allied defeat. Throughout the night, our men were heard celebrating, posing for photographs with destroyed British tanks, and looting trophies. OKW has also praised the troops' performance, describing the defence as a model for future seaborne attacks."
 ENG_Operation_Overlord.2.A: "Reinforce the wall! And have the officers in that sector fired!"
 ENG_Operation_Overlord.2.B: "Splendid! Give awards to our men and officers!"
 ENG_Operation_Overlord.2.C: "The Führer shall personally award the bravest of the defenders!"

 ENG_Operation_Overlord.3.t: "Britain Prepares for the Liberation of France"
 ENG_Operation_Overlord.3.d: "The British government is making final preparations for a large-scale invasion of Western Europe. Troops from across the Commonwealth and Allied nations have gathered in southern England. Training camps are full, ports are congested with ships, and roads are clogged with supply trucks heading to staging areas. The goal is to land a powerful force on the coast of France and begin the liberation of occupied Europe.\n\nAirfields are busy throughout the day and night. Bombers test new flight paths. Paratroopers practise night drops. New landing craft designed specifically for beach assaults are being tested along the Channel coast. Military engineers are building artificial harbours and preparing to land thousands of tonnes of equipment in the first few days. The British high command, in consultation with Allied leaders, is also collaborating closely with the French resistance. Intelligence is coming in from occupied territory, and sabotage operations are planned to support the upcoming assault.\n\nThe invasion won't be easy. German forces are well entrenched, and the stakes are high. But morale is strong, and the sense of purpose is clear. The Allies are ready to return the fight to the continent, and we will support them every step of the way."
 ENG_Operation_Overlord.3.A: "United against evil!"

 ENG_Operation_Overlord.4.t: "Fall of France"
 ENG_Operation_Overlord.4.d: "The impossible has occurred. German troops patrol the streets of Paris, and the French government is requesting peace from Berlin. The French Army, which fought the Huns for four years during the Great War, has been nearly destroyed. This has left us alone in our fight against the Fascist menace, and we are Europe's last bastion of freedom against tyranny. It's an unenviable position, to be sure, but we can't let the Germans destroy us like they did the rest of Europe.\n\nOur Expeditionary Forces return to our island, equally battered and broken. Despite our government's bluster, we fared little better than the French in this regard. In their panicked retreat, they are disarmed and demoralised; anyone can see that rebuilding our army will take a long time and a lot of effort. But rebuild we must, and we will. The enemy is a mere skip across the channel from our shores. Dark days are ahead, and the dawn appears far away.\n\nDespite the doom and gloom that has swept the country, and despite the spineless cowards who call for peace, the beat of resistance continues to drum in the hearts of all true Britons. They swear, inspired by Churchill's unwavering words, that the war will not end until the Union Jack flies over the Reichstag! There will be no peace until the last German soldier surrenders his arms and the stain of fascism is eradicated from the face of the Earth!"
 ENG_Operation_Overlord.4.A: "We will fight them with beer bottles if we have to!"

 ENG_Operation_Overlord.5.t: "Britain Prepares for the Liberation of France"
 ENG_Operation_Overlord.5.d: "The first sirens sounded shortly before dusk. As the sky filled with engine noise, the boy ran to the cellar with his mother and younger sister. Then came the bombs, one after the other. For hours on end, the ground shook with the force of what appeared to be nothing less than an angry God. Indeed, it felt as if the entire world was collapsing around him, with the only thing he couldn't hear being the screams of the dying, which were obscured by bomb blasts, the falling of destroyed houses, and the roar of bomber engines.\n\nWhen he awoke the next morning, the city was gone. Streets he had walked every day were buried under rubble. The old market was a blackened shell. Only half of the church remained standing. Their house was cracked open like an egg, the walls scorched, and the rooms littered with dust and broken wood. The living area had vanished, leaving only a crater filled with debris. Fires were still burning, and the odour of smoke and ash hung heavy. People wandered, calling out names, crying. He noticed a man pulling a cart with a blanket covering something. No one understood why this had occurred. After all, as his mother said, weren't the allies coming to free france?"
 ENG_Operation_Overlord.5.A: "Why must there be war?"

#########################################################################
# War Room: Plan R4 and D-Day
#########################################################################

 ENG_Plan_R4.1.t: "Ultimatum from United Kingdom!"
 ENG_Plan_R4.1.d: "Today, the British Ambassador, Laurence Collier, issued an ultimatum to the Prime Minister. He informed us that the British government is 'strongly requesting' that we grant their soldiers transit rights through our territory. He claims that they will land in Narvik and Tromso before travelling to Finland to aid in the fight against the Soviets.\n\nThe pessimists in our administration insist that we reject the British ultimatum. They argue that allowing British troops to land in Norway would simply invite a German invasion. They have serious doubts about the British intentions. It's no secret that London has been eager to halt the flow of Swedish iron ore to Germany. Narvik and Tromso are major ports for exporting iron from the Gallivare mines in northern Sweden. If British troops enter Norway, they will not leave, let alone defend Finland.\n\nThe optimists have a completely different perspective. They argue that the British wanting to help Finland is beneficial to Norwegian security because it prevents the Soviets from reaching Finnmark. Meanwhile, with British troops in Narvik and Tromso, they could quickly assist us in the impending German invasion, which these men believe is unavoidable with or without British troops in Norway."
 ENG_Plan_R4.1.A: "What choice do we have?"
 ENG_Plan_R4.1.B: "Turn the ships around, Collier!"

 ENG_Plan_R4.2.t: "Norway Accepts our Deal!"
 ENG_Plan_R4.2.d: "Wonderful news has reached London. After several tense hours of debate, the Norwegian government has decided that it will not, and most likely cannot, refuse our ultimatum. They have stated that British troops will be allowed to pass through Norway. At the moment, soldiers are boarding ships to travel to their landing areas. They have strict orders to seize port facilities before pursuing their secondary goals.\n\nSome people continue to be outraged by the operation's duplicity. They argue that it is still possible to salvage some honour from Norway's unjust invasion. They recommend that the planners stick to their publicly stated goal and move quickly to the Finnish front. However, despite their anti-Soviet rhetoric, they are determined to avoid direct conflict between Soviet and British forces at all costs.\n\nFinland has been designated as yet another 'designated victim', doomed to succumb to the plans of authoritarians just like Austria, Czechoslovakia, and Poland. While everyone in London finds the whole situation difficult to swallow, pragmatism must take precedence during wartime. Germany cannot have unfettered access to Scandinavian iron ore. When the war is over, perhaps something can be done about Finland."
 ENG_Plan_R4.2.A: "Once more into the breach!"
 ENG_Plan_R4.2.B: "Another job done."
 
 ENG_Plan_R4.3.t: "Norway Refuses our Deal!"
 ENG_Plan_R4.3.d: "The news has reached London that Norway has refused our ultimatum. Citing their much flaunted neutrality the Norwegians have decided that we are no better than the Nazis. They have declared that any ship that enters their waters with hostile intentions will be fired upon. The declaration is a slap in the face of the government and has elicited condemnation from several ministers. Some even question Norway's neutrality and have asked that the Kingdom be classified as an 'Axis-affiliated' state.\n\nWhile the Foreign Department has refrained from going that far, it has issued harsh criticisms of the Norwegian government. Meanwhile, the War Department has distributed maps of the areas surrounding Narvik and Tromso to soldiers about to embark. The landings will be contested, and the ultimatum will undoubtedly give the Norwegians some idea of where we plan to land, but the War Department is confident in its victory. Once the port cities are secured, the soldiers will, if possible, move on to secondary objectives in Sweden and Finland. Few generals want to fight in such mountainous terrain, but they are certain that there is no alternative."
 ENG_Plan_R4.3.A: "Another day, another enemy."
 ENG_Plan_R4.3.B: "Scrap the whole farce!"
 
 ENG_Plan_R4.4.t: "Norwegian Embargo!"
 ENG_Plan_R4.4.d: "Today we learnt that Norway will no longer trade with our country. The message was abrupt and direct, but ultimately unsurprising. Our intelligence service had been predicting a British move against Norway for months, and they were correct. Whatever deal was reached in those backrooms of London and Oslo, it appears that an embargo on us was one of the conditions. The news of British troops landing in Norwegian ports to enforce the embargo was equally unwelcome.\n\nThe news is a devastating blow to our war-making capabilities. For years, the lucrative Swedish iron mines have provided a major source of iron for our war machine, with much of that iron exported via Norway. With that route closed, Swedes will have to use less developed roads to ship iron to the smaller port of Lulea, or ship it south to one of the Skane or Stockholm ports. In either case, shipments will be smaller and dispatched later."
 ENG_Plan_R4.4.A: "A new front opens..."
 
 ENG_Plan_R4.5.t: "Phase 1 of R-4 a Success!"
 ENG_Plan_R4.5.d: "We received word from our troops in Norway that they have achieved their objectives. Narvik and Tromso are fully under our control, and iron ore shipments from Norway and Sweden are being held up. Meanwhile, another force has deployed to Northern Sweden to protect the iron mines. This is a major setback for the Germans and the Soviets, both of whom rely to varying degrees on iron mines in the area. The Norwegians are dissatisfied with our presence in the North, but with more troops arriving by the day, they have few options other than to continue diplomatic protests.\n\nWith phase one of the operation completed, some have suggested that we proceed to the optional second objective, seizing the northern Finnish mines. Many considered seizing those mines to be a pipe dream, but given the wild success of the first stage of our operation, the second appears to be within reach. With one more push, we could have a monopoly on European iron reserves, starving our enemies of critical war material."
 ENG_Plan_R4.5.A: "Another day, another banger."
 ENG_Plan_R4.5.B: "Onto Finland, gents!"
 
 ENG_Plan_R4.6.t: "The Finnish Operation is Successful!"
 ENG_Plan_R4.6.d: "Our operation in Northern Finland has exceeded all of our expectations. With the Finns so focused on the Soviets, they only had a token border force to confront our men. They didn't even fight us, and we made it to the mines without firing a single shot. Finnish iron ore is now transported from British-controlled mines to British-controlled ports, then onto British ships and to British forges. Suddenly, we have more iron than we could possibly need. There is only one minor issue. The Finns demand an explanation.\n\nThey want to know why British troops invaded Finland and seized its iron mines. Fortunately, the Foreign Department has a deal ready to send to Helsinki. They've offered to keep the iron mines safe from potential Soviet interference for 15 years. In exchange, the iron would be sold to Finland for pennies per pound. If Soviet troops get within a few miles of the mines, our forces will immediately hand over guardianship to Finland."
 ENG_Plan_R4.6.A: "Make the offer."
 
 ENG_Plan_R4.7.t: "The Northern Emergency"
 ENG_Plan_R4.7.d: "We have received bad news from our northern iron mines. The British invaded our country, seized the mines, and refused to leave. They claim they are defending them against Soviet sabotage. They even have the gall to offer us a deal in which they gain control of the mines for 15 years in exchange for selling us our iron at a discount. The only possible silver lining is that our northern border guards surrendered without firing a single shot, preventing war from breaking out.\n\nThe hawks in our cabinet have denounced the British and this agreement as a clear declaration of war. The 'deal' from London is little more than a formality, and no true statesman would ever expect it to be accepted. They demand war as a matter of national honour, claiming that it would be hypocritical to fiercely defend our country against one invader only to surrender to another. With such a small force isolated from all assistance, it would be simple to destroy them. However, it would result in a war that we could not afford.\n\nThe pragmatists argue that the deal should be accepted because it is a fait accompli. Sure, we could destroy this British force, but the ensuing war would be an unnecessary distraction. They urge us to swallow our pride, accept the agreement, and concentrate on our true adversary in Moscow. Some have even suggested that we send a small Soviet force into the hinterlands to force the British to withdraw without fighting."
 ENG_Plan_R4.7.A: "We have no choice..."
 ENG_Plan_R4.7.B: "Perfidious Albion!"
 
 ENG_Plan_R4.8.t: "The Finns See Sense"
 ENG_Plan_R4.8.d: "We have received word from Helsinki, and the Finnish government is seeing sense. They accepted our terms, and the Finnish troops opposing us have begun to retreat to Karelia. Meanwhile, the task force has resumed allowing civilians back into the mines, and trucks have begun transporting ore to our ports in Norway. Overall, the operation has been a huge success, even more so than Norway or Sweden. The public celebrates as the war scare fades.\n\nThe long-term occupation of the mines has begun. More supplies are on their way, including additional rations for a stockpile and fortification tools. The iron field will quickly become a fortress in the middle of the Finnish wilderness, protecting against advancing Soviets and Finnish saboteurs. Reinforcements are also on their way to help seal the perimeter."
 ENG_Plan_R4.8.A: "We do what we must, because we can."
 
 ENG_Plan_R4.9.t: "Failure in Finland"
 ENG_Plan_R4.9.d: "The news from Helsinki has not been good. The Finnish government not only flatly rejected our deal, but also demanded that we leave within 48 hours or face war. Meanwhile, reports from Northern Finland indicate that Finnish army units are rapidly converging on the outskirts of the mines. Fighting has not yet broken out, but it is likely to do so unless we comply with the Finns' demands.\n\nFollowing an emergency meeting, it became clear that we had no choice but to comply with the Finnish demands. While we could fight our way through Finland and seize the mines by force, it would consume so much of Finland's already limited resources that Stalin could walk into Helsinki without firing a shot. A telegram to that effect is already being typed and will be sent to Finland immediately. In its wake, a sombre mood emerges.\n\nThe Prime Minister is humiliated and denounced in Parliament for warmongering. His party narrowly avoided a no-confidence vote last night. Meanwhile, the word on the street is apoplectic. The Times slammed our administration as 'Moseleyist,' and the Telegraph demanded the Prime Minister's resignation. The palace has remained neutral, but it is clear that the King views his Prime Minister in a new, more cynical light. "
 ENG_Plan_R4.9.A: "Goddamnit!"
 
 ENG_Plan_R4.10.t: "Allies Secure Finnish Mines"
 ENG_Plan_R4.10.d: "Subject: Allied Seizure of Finnish Northern Mines\n\nI report with grave concern that British forces landed in northern Finland and seized control of the region's most valuable mining sites before our units could intervene, preventing us from capturing valuable minerals. The Allies have now secured the Petsamo nickel mines near the Arctic coast. They also took over the iron ore mines in Kolari and Pajala, as well as the copper and gold operations near Sodankylä and Kittilä. Smaller platinum and rare mineral extraction facilities scattered throughout Lapland are still under Finnish control, but it is unclear what the British will do if left unchecked.\n\nOur intelligence underestimated the speed and determination of this manoeuvre. The Allies now control critical transport routes to Sweden and Norway, making future military advances in the north extremely difficult. This loss has a direct impact on our military production. I recommend launching a strong propaganda campaign to highlight the occupation's aggressive and imperialistic nature, as well as diplomatically protesting this blatant interference. To offset these losses, we must accelerate efforts to develop domestic mining projects. However, direct military intervention would be inappropriate at this time.\n\nRespectfully,"
 ENG_Plan_R4.10.A: "Marshal of the Soviet Union, Kliment Yefremovich Voroshilov."
 
 ENG_Plan_R4.11.t: "The Swedish Operation"
 ENG_Plan_R4.11.d: "After our troops in Norway secured the beachhead, our generals are urging us to move on to the next phase of the plan. They have already prepared plans to seize the Gallivare and Kiruna iron mines. Then our men will move on to seize the port of Lulea, forcing any iron that still flows to Germany to take the long route through southern Swedish ports. The plan is ambitious, and few doubt that we will succeed. However, there is a vocal minority that criticises its backhandedness.\n\nPacifists could barely stomach our operation in Norway, but this is simply unconscionable. They have a valid reason to. Not only is it deceptive, but it has the potential to fail. If our men are unable to secure the iron mines, Sweden will officially join the Axis. If that happens, all of Sweden's iron will go to Germany, leaving us worse off than when the operation began. All of this is without considering the logistical challenges of supplying and coordinating a push across Sweden.\n\nHowever, the General Staff dismisses their concerns, claiming that success is almost guaranteed. The Swedish army could not hope to compete with our modern, professional soldiers. They almost guarantee that if war breaks out, the mines will be secure within a few days."
 ENG_Plan_R4.11.A: "We came this far, we can't stop now."
 ENG_Plan_R4.11.B: "We cannot endanger everything now."
 
 ENG_Plan_R4.12.t: "John Bull Comes Knocking"
 ENG_Plan_R4.12.d: "Today, the British ambassador issued what amounts to an ultimatum. He has demanded that we allow British soldiers to seize the iron mines surrounding Kiruna and Gallivare, as well as the port of Lulea. The British argue that this is a preventative measure against a planned Nazi sabotage operation. We understand that this is a naked grab for our iron resources to prevent us from trading with Germany. What they couldn't accomplish diplomatically, they now try with force.\n\nSome in our administration have suggested that we accept the ultimatum. They argue that we can't fight the Allies, especially since they have a beachhead in Norway. Allowing them to take the iron mines would prevent unnecessary bloodshed. We would also maintain good relations with London, making it easier to negotiate a British departure.\n\nMeanwhile, hawks have demanded war. They urge us to fight any British incursion as a matter of national honour and to impose a complete embargo on the UK. They claim that rolling over would result in a national catastrophe unprecedented since Poltava and the demise of this government. Even though some have expressed minor doubts about our chances against the UK, they still urge us to fight. Their sympathy for the Germans appears to be coincidental."
 ENG_Plan_R4.12.A: "Why fight a war we can't win?"
 ENG_Plan_R4.12.B: "Victory or death!"
 
 ENG_Plan_R4.13.t: "The Swedes Roll Over! "
 ENG_Plan_R4.13.d: "The news has spread across the North Sea that the Stockholm government will allow us to occupy the northern iron mines. They do not officially accept the ultimatum as delivered, but they have indicated that they will not contest our occupation. The task force has already crossed the border and expects to arrive in Lulea within a day or two. Meanwhile, Swedish soldiers have been seen tracking their every move while remaining just far enough away to not pose a threat.\n\nOverall, the operation was a success. The generals have received their medals, and everyone is pleased with what this means for the war effort. The Germans and Soviets will no longer receive Swedish iron. The Germans have undoubtedly begun retaliation plans, but the Swedes will bear the brunt of it until we finish them off and earn the Swedes' gratitude."
 ENG_Plan_R4.13.A: "Another job well done!"
 
 ENG_Plan_R4.14.t: "The Swedes Choose War!"
 ENG_Plan_R4.14.d: "Word has arrived from Stockholm. The ultimatum has been rejected on all counts, and the Prime Minister recently vowed to defend 'every inch' of Swedish soil. Our task force was fired upon as they approached the border, resulting in some minor casualties. The general staff has begun to quickly devise plans to invade Sweden and take the mines and Lulea by force.\n\nPeace can be achieved once our objectives have been met. With their armies decimated and the Germans undoubtedly on their doorstep, they would have no choice but to accept. Initial draft invasion plans completed the entire operation in just a few weeks, with minimal loss of life and property. Regardless of their German sympathies, the Swedes must understand that we do not intend to raise the Union Jack over Stockholm. In time, the Swedes will thank us for this. We are preventing them from falling prey to foreign powers and ensuring their future against German predation."
 ENG_Plan_R4.14.A: "They will pay for this!"
 ENG_Plan_R4.14.B: "We cannot waste our resources on this war."
 
 ENG_Plan_R4.15.t: "Swedish Embargo!"
 ENG_Plan_R4.15.d: "Faced with pressure from the significant British military presence in their country, the Swedish government has declared an export embargo on iron ore to us, cutting off a critical resource lifeline for our military industry. Our steel mills rely on Swedish ore to produce various steel products, which are then consumed by our military industry to manufacture vehicles, aircraft, ships, and artillery, implying that this embargo will result in a significant decrease in our steel output. We must immediately seek alternative sources of iron, with Spain and France's Briey Basin being prime candidates; however, their output, both in quantity and quality, is insufficient to compensate for the Swedish ore."
 ENG_Plan_R4.15.A: "The British have outplayed us!"
 
 ENG_Plan_R4.16.t: "A Meeting Regarding Scandinavia"
 ENG_Plan_R4.16.d: "Today, the Prime Minister met with the Cabinet to have an open discussion about Scandinavia's future. Norway, Sweden, and Finland account for a significant portion of the European iron market. Swedish and Finnish mines use Norwegian ports to connect to the outside world, while Germany takes as much as it can. If we want to win this war, we must cut off the iron at the source.\n\nOur first move will be against Norway, seizing its valuable northern ports, from which the majority of the iron is exported. Following that, hopefully peacefully, the second and third phases of the operation will be carried out. The second phase, known as the Swedish phase, would involve occupying the Gallivare and Kiruna mines, as well as the port of Lulea. Again, this would ideally be done peacefully, but plans for an invasion are being developed in case the Swedes refuse.\n\nThe third and final phase is the Finnish phase. This phase is more of a contingency and is not expected to be completed. However, the operation includes the occupation of northern Finnish iron mines to keep Finnish iron out of Soviet hands. The Finns, hopefully, will be too focused on the Soviets to resist, but if they do, Finland will be abandoned to its fate. We have far too many issues to deal with in Germany to risk a war with Russia. After finishing his outline, the War Cabinet erupted in a blaze of fury."
 ENG_Plan_R4.16.A: "We must convince them!"
 ENG_Plan_R4.16.B: "What are Brits up to?"
 
 ENG_Plan_R4.17.t: "Our Mining Strategy"
 ENG_Plan_R4.17.d: "As part of the upcoming Scandinavian Campaign, the Prime Minister has called the Cabinet together to discuss minelaying strategy. Two plans have been seriously discussed. The first is Operation Wilfred, which involves mining the channels between Norway and its offshore islands. This could make travel through those channels too dangerous to attempt, effectively halting Swedish iron ore shipments out of Norway. Of course, mining a neutral nation's waters is distasteful.\n\nThe second and more ambitious plan is Operation Royal Marine. This would entail dropping mines from the Maginot Line to disrupt river traffic and destroy bridges along the Rhine as far as Karlsruhe. Before floating into the Dutch or Belgian portions of the river, the mines would become inert. More mines would be dropped further south on the Rhine, near Koblenz.\n\nBoth plans have their advantages and disadvantages. Wilfred portrays us as little better than the Germans and hypocrites. The Prime Minister has been vocal in condemning Germans for breaking the rules of war, so doing it ourselves would be completely hypocritical. However, if we do, we may not need the Scandinavian plans at all. Operation Royal Marine could halt the inevitable German offensive in the West and hit the Hun where it hurts."
 ENG_Plan_R4.17.A: "The iron ore is key! Ready Operation Wilfred!"
 ENG_Plan_R4.17.B: "Hit the Hun! Ready Operation Royal Marine!"
 
 ENG_Plan_R4.18.t: "Wilfred"
 ENG_Plan_R4.18.d: "As the war drags on and German industry continues to thrive on imported resources, our planners have turned their attention north, specifically to Norway and Narvik. Each winter Sweden exports a critical flow of iron ore through the ice-free Norwegian port, and that iron, destined primarily for Germany, is a key enabler of the Nazi war machine. To disrupt this trade without direct confrontation, the Royal Navy has devised Operation Wilfred, a covert plan to place mines inside Norwegian territorial waters, forcing ore shipments into open seas where the British fleet can intercept them under international law. It is strategically elegant, but politically perilous.\n\nNorway remains neutral, and its government has repeatedly expressed a desire to stay out of the conflict. Laying mines in its waters would be a direct violation of its neutrality, and voices of caution are growing among the War Cabinet. Many ministers warn of alienating Scandinavia, inciting protests or even conflict with Norway, and undermining Britain's moral standing on the international stage. A minority argue that neutrality is a luxury the world can no longer afford, and that Germany is already taking advantage of Norway's inaction."
 ENG_Plan_R4.18.A: "We must seek another solution to the ore question."
 ENG_Plan_R4.18.B: "Damn the naysayers! Proceed with Wilfred!"
 
 ENG_Plan_R4.19.t: "The British Have an Idea"
 ENG_Plan_R4.19.d: "We received a British delegation with a 'bold new plan'. They want to float mines down the Rhine River! Our military leaders have criticised their plans as childish and poorly thought-out. The mines may blow up some German river barges and ports, as the British claim, but they may also float into the Low Countries and cause damage there. This would jeopardise relations with those countries, whose cooperation is critical to our defence plans in the event of a German invasion. Of course, the British claim the mines will deactivate long before they reach a more friendly country's territory, but even the slightest chance is too great of a risk to take.\n\nNot only that, but doing so would result in a German response. The Germans have sat on their side of the border for a while now, and fighting between our forces has been limited. Our general staff wishes to maintain this stance until we are fully prepared for the attritional warfare that will follow. For all of these reasons, the General Staff has asked that we reject the British plan and allow them to continue on their Scandinavian adventure as planned."
 ENG_Plan_R4.19.A: "We cannot risk provoking the Germans."
 ENG_Plan_R4.19.B: "He who dares, wins!"
 
 ENG_Plan_R4.20.t: "The French Reject Royal Marine!"
 ENG_Plan_R4.20.d: "Our delegation from France returns with bad news. The French have completely rejected Operation Royal Marine. They claim it is unfeasible and would elicit a response from Germany. In any case, the delegation did not paint a bleak picture. They insist that we send them back to Paris soon for another round of negotiations. The delegates believe that with more time, they can persuade the French to accept the plan.\n\nThe government is more pessimistic. They have urged us to abandon the entire operation, as it will not succeed without French assistance. While we could spend more months slowly persuading Paris to fight the current war, the entire process would waste valuable time. That is, assuming the French can be persuaded. They insist that we return our full attention to Scandinavia and the future of the war."
 ENG_Plan_R4.20.A: "They are making a mistake! Send the delegates back!"
 ENG_Plan_R4.20.B: "Damn these French, they know nothing of waging a war!"
 
 ENG_Plan_R4.21.t: "The Allied War Cabinet Accepts"
 ENG_Plan_R4.21.d: "Following weeks of tense discussions and diplomatic manoeuvring, the Anglo-French Supreme War Cabinet has finally agreed to authorise Operation Royal Marine. This plan, proposed by our naval leadership and strongly supported by Prime Minister Churchill, calls for mining the Rhine and other West German rivers in order to disrupt Germany's inland shipping routes and choke its war economy at the source.\n\nThe French initially opposed the proposal, citing concerns about possible German reprisals against French border regions and civilian targets. Many French leaders feared that such an escalation would result in a full-fledged German attack before the Allies were fully prepared to respond. However, as Germany's economic and military buildup continued unabated, pressure to act decisively increased.\n\nFaced with the reality of Germany's strengthening position, and under strong diplomatic and military pressure from London, France reluctantly agreed to support the operation. French logistical networks will be made available to assist British forces in the operation, and mines will be floated downstream into Germany from French rivers, signalling a significant moment in Allied cooperation."
 ENG_Plan_R4.21.A: "Our alliance stands firm!"
 
 ENG_Plan_R4.22.t.A: "A Diplomatic Letter"
 ENG_Plan_R4.22.t.B: "A \"Small\" Request from London"
 ENG_Plan_R4.22.d.A: "We received a diplomatic request from the United Kingdom. The British Prime Minister has contacted us and requested that we allow British troops to land in Norway. The ultimate goal of this operation is unknown, but the request ensures that British soldiers will not deploy south of Trondheim.\n\nMost of our ministers have strongly urged us to reject the request. They correctly point out that allowing British soldiers to land at our ports would force us to join the Allies by association, effectively ending our valued neutrality. Even if we don't join the Allies, Berlin will assume we did and will almost certainly invade. Not only that, but they question whether the British soldiers will ever leave if we allow them to land on our shores.\n\nA few Allied-friendly ministers have, predictably, asked us to comply with the request. Joining the Allies was essentially a formality, as all European nations would eventually be forced to choose a side, and there was little chance wwe would side with the Germans of our own volition. The Royal Navy would close the Danish Strait, while British troops would protect our most valuable assets from German attack."
 ENG_Plan_R4.22.d.B: "We received a letter from London. The British have requested that we allow British troops to deploy within our borders, either from British ships in the Baltic Sea or, more likely, Norway. The British letter is frustratingly ambiguous about what these British troops will be doing in our country, as there are no active war zones in Sweden. Suggestions that they will travel to Finland to fight the Soviets have been dismissed as unrealistic.\n\nThe majority of the government's theory is that these troops will be assigned to 'temporary' positions suspiciously close to our mines in Gallivare and Kiruna. Then some would happen to land in Lulea and be held up indefinitely. All of this would result in British soldiers determining when and where we export our iron. Not to mention that the Germans would assume we were joining the Allies and could invade. The iron is equally valuable to Berlin as it is to us.\n\nWe are in a no-win situation. If we deny the British, we risk invasion if they decide to force the issue, which would push us closer to the Axis and alienate our population. If we accept the British offer, Hitler will undoubtedly assume that we will soon join the Allies, which will prompt him to invade our country."
 ENG_Plan_R4.22.A: "[THIS.GetR4MilitaryAccessEventOption1]"
 ENG_Plan_R4.22.B: "[THIS.GetR4MilitaryAccessEventOption2]"
 plan_r4_military_access_option_1_norway: "We cannot give up our neutrality."
 plan_r4_military_access_option_2_norway: "Accept the inevitable."
 plan_r4_military_access_option_1_sweden: "We stayed out of the last war; let's stay out of this one."
 plan_r4_military_access_option_2_sweden: "Between a rock and a hard place, we choose the rock."
 
 ENG_Plan_R4.23.t: "[FROM.GetName] to Give Us Military Access!"
 ENG_Plan_R4.23.d: "Following extensive negotiations, [FROM.GetName] have officially agreed to grant us military access. With these permissions in place, we can now move troops and supplies through Scandinavian territory and into key ports, particularly Narvik, directly blocking vital shipments of Swedish iron ore that keep the German war industry running. By cutting off this flow, we can severely limit Germany's ability to sustain its war effort and impede its production of vehicles and guns.\n\nOur military planners are already preparing expeditionary forces to move north, with British and allied troops collaborating to secure transport routes, ports, and airfields, preventing a quick German response, which is becoming increasingly likely. Control of Scandinavia will also allow us to protect vital sea lanes and strengthen our position in the North Atlantic, giving the Royal Navy a much broader and safer range of operations at sea."
 ENG_Plan_R4.23.A: "Splendid!"

 ENG_Plan_R4.24.t: "[FROM.GetName] Refuse to Give Military Access!"
 ENG_Plan_R4.24.d: "Unfortunately, [FROM.GetNameDef] have flatly refused our request for the deployment of British forces on their territory. Their governments remain steadfast in their misguided policy of strict neutrality, fearing that granting us passage would result in immediate German retaliation, despite the fact that a German invasion of Scandinavia is precisely the threat we are attempting to protect them from.\n\n[FROM.GetAdjective] officials emphasised their desire to remain out of the affairs of great powers, while they also expressed serious concerns for the security of [FROM.GetAdjective] borders and the risks of occupation or bombardment by the Wehrmacht. This diplomatic failure is a significant setback to our northern strategy. Without our access to Scandinavian territory, Germany can continue to receive iron ore indefinitely, increasing its ability to sustain the war effort."
 ENG_Plan_R4.24.A: "We may just have to force them into line..."
 
 ENG_Plan_R4.25.t: "Britain Occupies Swedish Iron Mines!"
 ENG_Plan_R4.25.d: "[FROM.GetNewsIcon]Today, British troops occupied Sweden's valuable iron mines and the northern port of Lulea. Following their arrival in Norway, many analysts predicted that Sweden would be next on their list, and their predictions have been confirmed. The occupation was carried out with little bloodshed, and while locals are said to be wary of their new British occupiers, there have been no reports of open resistance. Sweden has emphasised the temporary nature of the occupation.\n\nThe effect has been immediate, with British trucks now transporting Swedish ore to their own controlled ports in Norway rather than Swedish ports. Northern Sweden's iron mines accounted for the majority of German iron imports, as well as a smaller but still significant amount of Soviet imports. The loss of these imports could have a significant impact on these countries' ability to wage war."
 ENG_Plan_R4.25.A: "A Jolly Good Show!"
 ENG_Plan_R4.25.B: "Draw up invasion plans now!"
 ENG_Plan_R4.25.C: "What the hell is going on over there?"
 
 ENG_Plan_R4.26.t: "The British Have Returned"
 ENG_Plan_R4.26.d: "Despite our firm rejection of their ridiculous plan, the British appear to have missed, or are deliberately ignoring, the point. The British delegation has returned, this time with a letter from their Prime Minister urging us to reconsider. They, of course, encourage us to mine the Rhine, believing that this will derail any German offensive plans in the West. Of course, this sounds reasonable to a country safe from German retaliation.\n\nHowever, things have changed since their last suggestion a few weeks ago. The Germans continue to agitate along the border, threatening their long-promised westward invasion. Belgium and even the Netherlands are becoming concerned about these provocations and have begun making discreet requests for assistance in the event of such an invasion. Even if the British mining plan does not deter the German attack, as London anticipates, it will sabotage critical supply lines during the invasion.\n\nFollowing further consideration, our high command has proposed an amendment to the plan that will be submitted to the British. Royal Marine will not be activated immediately upon acceptance. Instead, it should be used as an offensive weapon to help us counter the German attack. Blowing up river barges and bridges will disrupt their supplies, potentially giving our forces a significant advantage over the German armies."
 ENG_Plan_R4.26.A: "The plan wouldn't have worked weeks ago, and still won't work now!"
 ENG_Plan_R4.26.B: "Suggest the amendments to the British."
 
 ENG_Plan_R4.27.t: "The French Agree to Royal Marine... with Conditions"
 ENG_Plan_R4.27.d: "The delegation from Paris returned today in high spirits. In their debriefing, they stated that the French have finally accepted Operation Royal Marine. They are rushing to get things ready on their end to start mining the Rhine. They have made it clear, however, that their diplomatic mission became extremely difficult almost immediately.\n\nThe French Prime Minister was receptive, but his Cabinet and the High Command were not. After some more prodding and raising more concerns about the border, the rest of them agreed to the plan. They still held out on one more condition. The operation will only begin once the German offensive in the Low Countries begins. Recognising that this is the best result we could have hoped for, we must plan as if it will be launched tomorrow. We've started using the on-the-ground planning system for the operation. Higher-level officers have received orders regarding their revised mission, and the first mine shipments are on their way to the designated dumping points."
 ENG_Plan_R4.27.A: "A jolly good show!"
 ENG_Plan_R4.27.B: "Damn the cowards in Paris!"
 
 ENG_Plan_R4.28.t: "1914 All Over Again"
 ENG_Plan_R4.28.d: "It's begun. German armies have crossed into the Low Countries on their way to Paris. Early battles are not looking promising, and without immediate assistance, the Low Countries are expected to collapse within a few weeks. Despite this grim outlook, the High Command remains optimistic. They believe that this is playing out similarly to 1914, and given that we won that war, there is little reason to believe that we will not win this one. They request that we implement Plan E immediately.\n\nBy rushing into Belgium right away, we can catch the Germans off guard and out of position. If the war ends, it will do so not on the Marne or the Aisne, but on the Scheldt and outside of France. Indeed, some generals appear to have been carried away by their anticipated victories. They have suggested that the Royal Marine, our trump card against the Germans, is unnecessary.\n\nThat assessment, however, could be premature. The war has only recently begun. Even if initial assessments appear promising, a single disaster can quickly wipe out everything. Some more sceptical generals have requested that the Royal Marine still go ahead. Not only would it disrupt the German advance, but it would also persuade the British to stop breathing down our necks about the situation."
 ENG_Plan_R4.28.A: "Let the British have their fun."
 ENG_Plan_R4.28.B: "We don't need Royal Marine after all."
 
 ENG_Plan_R4.29.t: "The French Give us the Green Light!"
 ENG_Plan_R4.29.d: "We've received frightening news from the continent. The Germans are invading Belgium once more and have dragged the Netherlands into the war. The French, as expected, are panicking and predicting that it will all be like 1914 again. While the situation is undoubtedly fluid, and the Low Countries are struggling, all is not lost. We have a trump card against the Germans, which the French have finally asked us to play.\n\nOperation Royal Marine has finally received the green light. Stockpiled mines are being unloaded, orders at the bottom of desks are being dusted off, and a new source of stress has descended on London. Not only is the War Department fighting a new World War, but it is also hoping that plans made months ago remain valid. While Royal Marine will no longer win the war, as the opportunity vanished the moment the French demanded that it be postponed, it could still provide a significant advantage.\n\nThe plan has also undergone minor changes. In addition to physically dropping mines into the Rhine, the RAF has launched a mission to drop mines by plane into the river. The drops will occur north of Koblenz during daring night flights. The potential for a significant increase in the number of mines clogging the vital river is exciting. We can only hope that this isn't too little, too late."
 ENG_Plan_R4.29.A: "Finally!"

 ENG_Plan_R4.30.t: "United Kingdom Announces the Mining of Northern Norwegian Sea"
 ENG_Plan_R4.30.d: "[FROM.GetNewsIcon]The United Kingdom has officially announced the start of large-scale mining operations in the northern Norwegian Sea. The British government stated that these operations are specifically designed to halt the vital flow of Swedish iron ore, a critical resource that has sustained German armament factories and passes through the Norwegian port of Narvik before being shipped to Germany.\n\nThe Royal Navy has deployed a large number of minelayers, destroyers, and support vessels to lay extensive minefields along Norway's coastline. This operation, codenamed \"Operation Wilfred,\" aims to force neutral shipping into open waters where it can be inspected or intercepted, making it far more difficult and dangerous for Germany to maintain its critical supply chains."
 ENG_Plan_R4.30.A: "We shall do whatever it takes to stop Germany!"
 ENG_Plan_R4.30.B: "We are just protecting their ships!"
 ENG_Plan_R4.30.C: "Perhaps the Brits have a point."
 ENG_Plan_R4.30.D: "What are the Brits up to?"
 
 ENG_Plan_R4.31.t: "Norway Issues Protests!"
 ENG_Plan_R4.31.d: "We received a note from the Norwegian Ambassador in London protesting the start of Operation Wilfred and the placement of mines in the Northern Norwegian Sea. According to them, this is an unacceptable violation of Norway's sovereignty and neutrality in the ongoing European conflict. At the same time, mining off the coast of Norway, particularly in the channels surrounding the port of Narvik, endangers civilians and innocent shipping vessels.\n\nNow, we have two choices. Either be satisfied with the few mines we have laid and stop our operation to avoid enraging the Norwegians and causing a major international incident, or continue the operation despite the Norwegian protests. However, we can expect a harsher Norwegian response, should we continue."
 ENG_Plan_R4.31.A: "We do not want to anger them."
 ENG_Plan_R4.31.B: "We are just protecting their ships!"
 
 ENG_Plan_R4.32.t: "United Kingdom Stops Minelaying Operations"
 ENG_Plan_R4.32.d: "We received a communique from London announcing that, in order to avoid a major international incident, the British will suspend their minelaying operations. A victory, to say the least. After all, with the current war in Europe, the British don't want to get involved in fighting us and appear to be imperialist war-mongers - after all, they consider the Germans to be exactly that.\n\nOf course, we can expect some future attempts to undermine our neutrality from both Britain and Germany. However, we have scared off His Majesty's navy this time with strong words alone, and our diplomats believe they will not return anytime soon. Only one task remains: remove the mines that the British planted in our waters so that civilian vessels or our own naval ships do not strike them."
 ENG_Plan_R4.32.A: "As expected."
 
 ENG_Plan_R4.33.t: "British Refuse to Listen to our Protests"
 ENG_Plan_R4.33.d: "Despite our formal diplomatic protest calling for an immediate halt to British mining operations in Norwegian waters, London has flatly refused to reconsider its actions. The Royal Navy continues to lay mines in northern sea lanes, infringing on our sovereignty and endangering the safety of civilian and commercial shipping. Our government has long attempted to maintain strict neutrality, avoiding involvement in the growing conflict between the great powers; however, the British decision to mine our waters without our consent is a clear violation of that neutrality and has sparked outrage among our parliament and naval leadership.\n\nOur navy, while small in comparison to the British fleet, remains a symbol of our sovereignty. We could issue a show of force, sending our warships to confront and pressure the British to withdraw, posing a direct, confrontational challenge to their minelaying operations. On the other hand, we could choose to stand down, hoping to keep the peace and avoid a dangerous escalation that could lead to disaster on our coasts, allowing the minelayers to do whatever they want within our waters. However, this would essentially result in international humiliation."
 ENG_Plan_R4.33.A: "Send in the navy!"
 ENG_Plan_R4.33.B: "Let them continue."
 
 ENG_Plan_R4.34.t: "Norway Sends in the Navy and Threatens to Use it!"
 ENG_Plan_R4.34.d: "According to the command of the Home Fleet, Norway has not backed down from their demand that we cease minelaying operations in their waters. In fact, they are threatening to kick us out, with a task force from the Royal Norwegian Navy, consisting of coastal defence vessels, torpedo boats, and several destroyers, approaching our minelayers and their escorts near Narvik. According to Admiral Forbes, the Norwegian navy issued explicit demands to the Home Fleet's minelayers around Narvik to cease minelaying operations and withdraw from Norwegian territorial waters, or else be fired upon.\n\nThis leaves us with the question of what to do next. The Norwegians could be bluffing; after all, their navy is small and would be completely destroyed in the event of a full-scale war with Britain. It is unlikely that they will actually dare to fire on our ships. Nonetheless, if they do, we could be on the verge of a full-scale war with Norway, with enormous propaganda value for our adversaries. It might be a good idea to cut our losses and end this operation before we get too involved. Nonetheless, our strategy of cutting Germany's iron ore will fail if we do not continuously place mines in Norwegian waters."
 ENG_Plan_R4.34.A: "The Norwegians are bluffing."
 ENG_Plan_R4.34.B: "We shall back down this time."
 
 ENG_Plan_R4.35.t: "Norwegian Navy Opens Fire at our Ships!"
 ENG_Plan_R4.35.d: "From: Adm. of the Fleet Sir Charles Forbes, Commander of the Home Fleet\n\nI regret to inform you that our minelaying operations off the Norwegian coast have met unexpected and fierce resistance from the Royal Norwegian Navy. Earlier today, as our vessels continued to secure the northern sea lanes, a group of Norwegian ships approached with clear hostile intent. Despite previous diplomatic exchanges and our assumption that Norway would avoid direct confrontation, the Norwegian flotilla opened fire unexpectedly. The engagement escalated quickly. Our minelayers and escorting destroyers returned fire to defend the fleet. The battle was intense, with both sides manoeuvring through the narrow coastal waters and exchanging heavy gunfire at close range.\n\nAccording to reports, one of our escort destroyers was severely damaged and was forced to return to Scapa Flow for immediate repairs. Meanwhile, at least one Norwegian destroyer was severely damaged and is thought to have suffered significant casualties. Several other ships on both sides sustained moderate damage before the fleets disengaged. Following the inconclusive battle, both sides retreated from the immediate area to regroup and assess their losses. The operation has been temporarily suspended."
 ENG_Plan_R4.35.A: "This is an act of war!"
 ENG_Plan_R4.35.B: "We shall back down."
 
 ENG_Plan_R4.36.t: "The Narvik Incident"
 ENG_Plan_R4.36.d: "[FROM.GetNewsIcon]A major naval clash has broken out off the coast of Narvik, shaking the already fragile situation in Scandinavia. The Norwegian Navy opened fire on British minelayers and destroyers patrolling near Norwegian territorial waters. The British had been conducting minelaying operations to disrupt German supply lines and obstruct iron ore shipments. Despite repeated calls from Norway for an immediate halt to these operations, Britain chose to continue. Determined to maintain their neutrality, the Norwegians sent in their navy to confront the British force.\n\nWhen warnings failed, the Norwegian ships fired first, resulting in a fierce exchange. The battle was brief but intense, with both sides suffering damage. One British destroyer was severely damaged and forced to withdraw under tow, while at least one Norwegian destroyer suffered significant damage before returning to port. Following several exchanges, both sides withdrew from the area, leaving no clear winner. The clash has stunned Europe, as Norway had previously avoided direct confrontation despite concerns about its neutrality."
 ENG_Plan_R4.36.A: "An intolerable act of aggression!"
 ENG_Plan_R4.36.B: "We're simply defending our sovereignty!"
 ENG_Plan_R4.36.C: "Will this lead to war?"
 
 ENG_Plan_R4.37.t: "Norway Pulls Off Their Navy"
 ENG_Plan_R4.37.d: "Admiral Forbes, in command of the Home Fleet carrying out Operation Wilfred, reports that the Royal Norwegian Navy has stopped blocking and threatening the British minelayers and their escorts in Norwegian waters, which can only mean one thing: the Norwegian government has ordered the withdrawal of its ships, allowing our operations to proceed unhindered. This essentially signals the Norwegians' submission to our wishes, and while they may continue to protest through diplomatic channels, it is expected that their naval forces will not attempt to harm our vessels during minelaying operations. Operation Wilfred will continue as before, and cutting Germany off from Swedish iron ore may soon become a reality."
 ENG_Plan_R4.37.A: "Victory?"
 
 ENG_Plan_R4.38.t: "Our Role in the Winter War"
 ENG_Plan_R4.38.d: "The Soviet Union's unexpected attack on Finland shocked Europe and elicited widespread sympathy from the British public and Parliament. Despite the overwhelming odds, Finnish forces have mounted a brave and skillful defence. The beginning of this war also provides us with a number of geopolitical opportunities.\n\nWhile sending direct military aid to Finland is logistically difficult, the crisis presents an opportunity for more widespread action in Scandinavia. By framing any intervention as support for Finland, we could deploy forces into Norway and Sweden, secure key ports, and deny Germany access to critical Swedish iron ore shipments passing through Narvik. As a result, our military has begun developing Plan R-4, an operation that envisions landings in Norway, occupation of key transportation hubs, and possible advances into Sweden or Finland to directly occupy mines if necessary.\n\nBoth Norway and Sweden are officially neutral, and any incursion into their territory risks diplomatic repercussions and possible German intervention. However, public opinion in Britain strongly favours assisting Finland, presenting us with a golden opportunity to hit the Germans where it hurts while securing valuable resources."
 ENG_Plan_R4.38.A: "Let's see where we can go with this..."
 
 ENG_Plan_R4.39.t: "Britain Occupies Northern Sweden"
 ENG_Plan_R4.39.d: "[FROM.GetNewsIcon]In a significant escalation of the Scandinavian conflict, British forces have advanced from occupied Norway into northern Sweden, launching an unexpected offensive. After fierce battles with Swedish forces, British troops have seized control of key mining towns and transport routes throughout the region. The Norrbotten region is vital to Sweden's economy and Germany's war effort because it contains some of Europe's richest iron ore deposits. By occupying these mines, Britain intends to completely cut off German access to high-quality Swedish iron, severely limiting German military production.\n\nSwedish forces resisted fiercely, defending their country from what they described as an unprovoked and illegal invasion. Despite their determination, the better-equipped British expeditionary forces, backed up by strong naval and air forces, were able to push them back and secure their critical positions in the region. The British government claims that this action is necessary to weaken Germany's military capabilities and to protect Allied interests in northern Europe. However, Sweden has strongly condemned the attack, calling it a grave violation of its neutrality and national sovereignty."
 ENG_Plan_R4.39.A: "They will come to their senses when their army is gone."
 ENG_Plan_R4.39.B: "Death to the invaders!"
 ENG_Plan_R4.39.C: "British imperialism knows no bounds..."
 ENG_Plan_R4.39.D: "A strategic move, but will Britain succeed?"
 
 ENG_Plan_R4.40.t: "Iron and Blood"
 ENG_Plan_R4.40.d: "The war has ended, and we have lost. British troops have defeated our northern armies, seized Norrbotten, the iron mines, and threatened Lulea. Our armies cannot stop them, and there is little to prevent them from driving down the main roads all the way to Stockholm. As our government prepared for the worst, a futile resistance to the British advance, we received a message from London. The British government claims it has what it wants and offers us peace.\n\nThe majority of our government is begging us to accept. The people appear to demand peace overwhelmingly. The British terms are more than generous in this situation, requiring only that they be allowed to keep what they originally demanded, namely the iron mines and Lulea. They also argue that our fight demonstrates to the Germans our desire to remain neutral, which may persuade them not to attack us.\n\nHowever, the minority demands that we continue to fight. While we have lost in the north, retreating and regrouping may allow us to fight back. Furthermore, the north is rugged terrain that favours defence. The British do not want this war, and bleeding them out in the forests of Northern Sweden may force London to sue for peace."
 ENG_Plan_R4.40.A: "Send a message to London. We surrender."
 ENG_Plan_R4.40.B: "No peace until all of Sweden is liberated!"

 ENG_Plan_R4.41.t: "The Lion Kneels"
 ENG_Plan_R4.41.d: "Today, the Swedish emissary delivered us a notice of surrender from the Swedish government on our terms. The Swedes have agreed to allow a significant British garrison in Northern Sweden. All Swedish iron will now be shipped to our ports in Norway, where the Swedes will purchase it at open market prices. The loss is a humiliation for Stockholm, and it was avoidable.\n\nThe Prime Minister accepted the notice without comment, as everyone in the government believes they won a pointless war. So many lives were lost on both sides, all for nothing and the fighting has nearly destroyed the mines. Meanwhile, it is expected that the entire shameful affair will bring Sweden closer to Germany. Throughout the crisis, the Germans had already sided with Sweden. Overall, this affair has left a bad taste in the mouths of all of His Majesty's Government. However, we must press on to the next stages of R-4 and beyond. Germany must be defeated, and if it takes a few dead Swedes to accomplish this, we must be willing to pay the price."
 ENG_Plan_R4.41.A: "Why did they make us do that?"
 
 ENG_Plan_R4.42.t: "British Invasion of Narvik"
 ENG_Plan_R4.42.d: "[FROM.GetNewsIcon]British forces have invaded Norway, landing in Narvik, a vital port city. Following heavy fighting with Norwegian defenders, British troops secured the city and established a foothold in northern Norway, forcing the Norwegians to retreat. Narvik has long been an important link in Germany's supply chain, serving as the primary export port for Swedish iron ore, a resource vital to German armament production. By seizing the port, Britain appears to be hoping to cut off this vital flow and deal a major blow to Germany's war industry and economy.\n\nNorwegian forces resisted valiantly, but were eventually defeated by a combination of British naval firepower and well-coordinated ground assaults. British units moved quickly to secure the harbour facilities, railway lines, and surrounding high ground to prevent an immediate counterattack. The British government has framed the invasion as a necessary step to protect Allied security and prevent German dominance over Norway and the wider Scandinavian region. The Norwegian government, on the other hand, condemned the attack as a blatant violation of its sovereignty and a direct assault on its declared neutrality."
 ENG_Plan_R4.42.A: "We didn't want to escalate, but we had to!"
 ENG_Plan_R4.42.B: "Throw them out of Narvik!"
 ENG_Plan_R4.42.C: "We must divert our attention northwards."
 ENG_Plan_R4.42.D: "And Britain shows her fangs..."
 
 ENG_Plan_R4.43.t: "Blood Upon the Snow"
 ENG_Plan_R4.43.d: "Our worst fears came true. British forces have landed on Norwegian soil, engaging and defeating our army in battle and occupying our port of Narvik, with the clear goal of preventing any Swedish ore shipments from reaching the port. This is, of course, an intolerable act of aggression against our sovereignty and neutrality. However, many in our government have questioned whether we are strong enough to resist. The Royal Navy is the most powerful in the world, the British Expeditionary Force is well-equipped and trained, and the Royal Air Force has a large number of aircraft that can be deployed to support combat operations on Norwegian soil.\n\nSeveral members of the government have called on us to sign an armistice. Overall, the British terms are not the worst, with them seeking to occupy the ports of Narvik and Tromsø, deploy British troops on the Norwegian-Finnish border, and have us embargo both Germany and the USSR. The other option is to continue the war, which, if we lose, may result in significantly harsher terms for us. However, the hardliners in our cabinet are calling for resistance. The homeland must be defended at any cost. They demand vengeance, as does the rest of Norway. The invaders must be expelled from our home territory, no matter the cost."
 ENG_Plan_R4.43.A: "Sign the armistice. Too much blood has been spilt."
 ENG_Plan_R4.43.B: "We will fight until the very end!"
 
 ENG_Plan_R4.44.t: "Norway Yields"
 ENG_Plan_R4.44.d: "Following the successful capture of Narvik and our rapid advance into the north, the Norwegian government has agreed to an armistice. Faced with overwhelming military pressure and unwilling to risk further devastation, Norway has chosen to negotiate with us rather than continue the fight.\n\nUnder this agreement, we have full military transit rights across Norwegian territory. Our forces can now move and operate freely throughout Norway, providing us with unprecedented access to the Scandinavian interior and significantly improving our ability to respond to German or Soviet threats in the region. We have gained control of the critical northern ports of Narvik and Tromsø. With these ports under our control, we can secure supply lines to support our operations in Scandinavia, strengthen Arctic shipping routes, and significantly disrupt German access to Swedish iron ore.\n\nFurthermore, Norway has agreed to allow us to station troops along the Norwegian-Finnish border, giving us leverage over the Finnish situation and acting as a deterrent to future Soviet advances. Most significantly, Norway has pledged to impose an embargo on both Germany and the Soviet Union. By cutting off trade and denying access to Norwegian ports and resources, Norway has effectively joined our efforts to weaken the Axis and limit Soviet influence, effectively terminating its neutral status."
 ENG_Plan_R4.44.A: "Victory in Norway!"

 ENG_Plan_R4.45.t: "Britain Occupies Narvik"
 ENG_Plan_R4.45.d: "Following their initial landings, the British forced Norway to negotiate and sign an armistice. By seizing Narvik and securing military transit rights across Norway, Britain gained control of a critical supply line for Swedish iron ore.\n\nThe British now control Narvik and Tromsø, and have troops stationed along the Norwegian-Finnish border. Norway has also agreed to impose an embargo on both us and the Soviet Union, further isolating us and threatening to disrupt key material imports required for armaments production. This aggressive British move directly challenges our strategic interests in Scandinavia, the Baltics, and the North Atlantic. If left unchecked, British control over Norway - and potentially Sweden - could severely impede our ability to maintain war production and secure northern sea lanes, significantly undermining our war effort and chances of victory.\n\nWe now need to decide how to respond. We can launch an immediate military intervention to drive the British out and re-establish access to critical resources, triggering our contingency plan, Unternehmen Weserübung. This would entail committing forces to a new front in the north, directly occupying Norway and Denmark to serve as a jumping off point into our target areas. Alternatively, we may choose to avoid direct confrontation for the time being, focusing on consolidating our current positions elsewhere and preparing for future opportunities. However, leaving Norway and Narvik in British hands would result in a significant loss of iron resources and the possible starvation of our industry."
 ENG_Plan_R4.45.A: "We have to intervene!"
 ENG_Plan_R4.45.B: "Let them freeze out there."

 ENG_Plan_R4.46.t: "Norway Continues to Resist"
 ENG_Plan_R4.46.d: "Despite our rapid capture of Narvik and early successes in northern Norway, the Norwegian government has refused to negotiate an armistice. Instead of surrendering, they have mobilised their armed forces and urged the public to defend their country against what they see as an unprovoked foreign invasion. Norwegian troops have withdrawn to strong defensive positions. Coastal defences have been reinforced, and local militias have joined regular army units, indicating a long-term campaign rather than an immediate surrender.\n\nWe hoped that a limited show of force would compel Norway to grant us military access and allow us to control strategic ports without causing long-term conflict. However, with the Norwegian decision to continue fighting, our presence in Narvik has become isolated and increasingly vulnerable in the absence of secure supply lines and supporting positions further south. We now face a critical decision. We can choose to withdraw and back down, preserving our forces and avoiding a larger Scandinavian war, but at the expense of giving up strategic gains and allowing Germany to exploit Norwegian ports once more.\n\nAlternatively, we can choose to go ahead with a full-scale military campaign to take control of Norway by force. While this would secure positions in the north and deny Germany a vital resource, it would also result in heavy fighting, diplomatic fallout, and significant troop casualties, all of which we had hoped to avoid."
 ENG_Plan_R4.46.A: "We should back down."
 ENG_Plan_R4.46.B: "We cannot pull out now!"

 ENG_Plan_R4.47.t: "Failed British Invasion of Narvik"
 ENG_Plan_R4.47.d: "The British effort to seize Narvik has resulted in an unexpected retreat. After briefly occupying the city and threatening our iron ore lifeline, British forces were faced with a number of challenges. Norway has now fully regained control of Narvik and remains officially neutral.\n\nThis outcome has saved us from an immediate crisis in Scandinavia, but it has also revealed a significant vulnerability. Because Narvik is the primary port for Swedish ore exports to us, even a brief loss of the city would cripple steel production and undermine the entire war effort. The British withdrawal has now created a window of opportunity. With Norway still neutral but clearly incapable of effectively defending itself, we have the option of acting now to permanently secure our northern flank.\n\nLaunching Unternehmen Weserübung, our pre-planned invasion of Norway and Denmark, would enable us to occupy the Norwegian coast, seize key ports, and ensure continuous access to Swedish resources. This would also give us control of the North Sea's sea lanes, protecting the Reich from further Allied incursions. However, this risks inciting Britain and France to open a new front in Scandinavia, thereby stretching our forces thin. On the other hand, we can choose to leave Norway neutral, hoping that the recent British failure will deter future Allied attempts."
 ENG_Plan_R4.47.A: "We have to secure our iron!"
 ENG_Plan_R4.47.B: "Invading Norway would be a waste of resources."

 ENG_Plan_R4.48.t: "The Northern Threat" # Renamed from "Britain At War With Norway"
 ENG_Plan_R4.48.d: "The situation in Scandinavia has escalated into a full-fledged war. After seizing Narvik, British forces demanded Norwegian cooperation, but Norway refused to surrender and instead chose to fight. Instead of withdrawing, Britain has expanded its military campaign, pushing deeper into Norwegian territory. Norwegian cities and ports are under attack, and the Norwegian government is requesting international assistance to repel the British invasion. This conflict now directly threatens our northern supply lines, particularly iron ore shipments from Sweden via Narvik.\n\nThe collapse of Norwegian neutrality forces us to make a critical decision on how to protect our strategic interests in the north. We have three choices: We can seize the initiative and start preparing for invasions of Norway and Denmark immediately. Occupying Norway would give us complete control over the Norwegian coast and uninterrupted access to Swedish iron ore. It would also deny the Allies a foothold in Scandinavia. However, this necessitates an immediate commitment of forces, risks opening a new front, and strains our resources thin.\n\nAlternatively, we can try to directly support Norway and bring them into our sphere as an ally. By sending military aid, equipment, and even expeditionary forces, we might persuade Norway to join us. This could preserve Norwegian independence while also protecting our supply lines without a full-scale invasion. However, Norway may decline our offer, or the aid may arrive too late to halt the British advance. Finally, for the time being, we can choose not to get involved directly. This saves immediate military costs, but it forces Norway to face Britain alone, almost certainly leading to complete British control of Narvik and the rest of the coast."
 ENG_Plan_R4.48.A: "We have to intervene!"
 ENG_Plan_R4.48.B: "We should offer them assistance."
 ENG_Plan_R4.48.C: "Let them freeze out there."

 ENG_Plan_R4.49.t: "A Deal with the Devil"
 ENG_Plan_R4.49.d: "As British forces advance deeper into Norwegian territory, the situation becomes increasingly desperate. Ports and major coastal cities are under threat, and the fall of Narvik has significantly weakened our northern position.\n\nIn this time of crisis, Germany has provided a surprising lifeline. Germany, alarmed by Britain's move into Scandinavia and eager to protect its vital supply of Swedish iron ore, has proposed a formal military alliance. The offer promises immediate assistance, including shipments of weapons and ammunition, supplies for our exhausted troops, and even the deployment of German expeditionary forces to help repel the British advance. In exchange, Germany demands that we join them, allow German troops free movement within our borders, and coordinate our military efforts under their strategic command.\n\nAccepting this agreement could help us stave off British occupation and possibly save our government from collapse. But it comes at a high cost: we would give up our neutrality and independence, effectively linking Norway's fate to Germany's larger war plans. Our sovereignty would be severely jeopardised, and we would be perceived around the world as collaborators with a foreign power that many view with deep suspicion and hostility. Refusing the offer, however, means that we must fight alone. Our army and people would face overwhelming odds if no major allies agreed to intervene directly. The threat of complete occupation, loss of our government, and crushing peace terms is always looming over us."
 ENG_Plan_R4.49.A: "We need their help."
 ENG_Plan_R4.49.b: "We will not take sides."

 ENG_Plan_R4.50.t: "Norway Accepts Our Offer"
 ENG_Plan_R4.50.d: "Norway has agreed to our offer of alliance and military assistance. Faced with a British invasion and the threat of total occupation, the Norwegian government has decided to fight alongside us rather than give in to British demands. This decision allows us immediate access to Norwegian territory and ports. Our troops can now freely enter Norway to help repel the British advance and secure critical positions along the coast. Most importantly, control over Swedish iron ore shipments is now more firmly established, ensuring that our war industry remains supplied.\n\nThis alliance alters the strategic landscape in Scandinavia overnight. We now have a dependable partner in the north, a strong foothold on the Atlantic coast, and the ability to prevent any future British operations in Norway. At the same time, it sends a signal to the world that Germany is prepared and capable of defending its interests anywhere, including the harsh Arctic north."
 ENG_Plan_R4.50.A: "Splendid!"

 ENG_Plan_R4.51.t: "Norway Refuses an Alliance"
 ENG_Plan_R4.51.d: "Our offer to Norway has been firmly rejected. Despite the threat of a full-scale British invasion and occupation, Norway's government has refused to join us or accept German military assistance. Instead, they have decided to continue fighting on their own, insisting on defending their independence without foreign intervention. Norway's decision jeopardises our northern strategy. British forces continue to pose a significant threat to Narvik's security. By refusing our assistance, Norway has jeopardised its own survival while also exposing our northern flank to future Allied operations. We now need to decide how to respond.\n\nWe can choose to leave Norway to its fate, avoiding an immediate escalation and focusing our resources on other issues. This prevents a new conflict in Scandinavia, but it exposes the iron ore supply and risks allowing Britain to further entrench itself in Norway. Alternatively, we can prepare for Operation Weserübung, the planned invasion of Norway and Denmark. By acting decisively, we can seize the Norwegian ports, secure the iron ore supply, and deny Britain a foothold in the north. This would ensure control of the entire Scandinavian coastline, but it necessitates committing forces and accepting the political and military costs of another major campaign."
 ENG_Plan_R4.51.A: "Then it is war."
 ENG_Plan_R4.51.B: "Let them die alone."

 ENG_Plan_R4.52.t: "Britain Declares War on Norway"
 ENG_Plan_R4.52.d: "[FROM.GetNewsIcon]Following the Narvik incident, in which the Norwegian Navy opened fire on British minelayers in the waters surrounding Narvik, Britain launched a full-scale invasion of Norway. British forces have landed at the strategic port of Narvik with the goal of securing key harbours and supply routes in the north, thereby not only cutting off Swedish iron ore exports but also forcing Norway into cooperation with Britain. Norwegian troops have mounted a strong resistance, engaging British Expeditionary Force soldiers in and around Narvik and other strategic locations.\n\nThe invasion marks a significant escalation in Europe's already high tensions. Britain's actions are intended to prevent German consolidation in Scandinavia, but they risk plunging the region into deeper conflict. Shipping along the Norwegian coast has been severely disrupted, making the North Atlantic an even more dangerous environment."
 ENG_Plan_R4.52.A: "The Norwegians left us with no choice."
 ENG_Plan_R4.52.B: "We will punish the invaders!]"
 ENG_Plan_R4.52.C: "Britain is muscling in on our ore..."
 ENG_Plan_R4.52.D: "War comes to Scandinavia."

 ENG_Plan_R4.53.t: "Britain Declares War on Sweden"
 ENG_Plan_R4.53.d: "[FROM.GetNewsIcon]British forces have now expanded their Scandinavian military operations into Sweden, deploying troops to the Norrbotten region as part of the ongoing northern campaign. The invasion follows successes in Norway, as the British government seeks to secure critical logistics hubs and Swedish iron ore mines in order to strengthen its position and stymie Germany's war effort.\n\nSwedish forces are reported to be putting up organised resistance, attempting to slow the British advance by fortifying towns and laying ambushes in the difficult terrain where the fighting is taking place. Combat has erupted in several key towns and transportation hubs, with initial reports of skirmishes along rail lines and near major mining centres. The British military emphasises that the operation aims to secure strategic supply routes and maintain regional stability in the face of rising German influence. Sweden, which had previously remained neutral, has vowed to defend its sovereignty and territorial integrity, mobilising its forces and aiming to repel the British invasion force."
 ENG_Plan_R4.53.A: "We must capture the iron at its source!"
 ENG_Plan_R4.53.B: "We will protect our homeland!"
 ENG_Plan_R4.53.C: "Our industry is at risk!"
 ENG_Plan_R4.53.D: "The war knows no bounds..."

 ENG_Plan_R4.54.t.A: "Norway Grants Britain Military Access"
 ENG_Plan_R4.54.t.B: "Sweden Grants Britain Military Access"
 ENG_Plan_R4.54.t.C: "Norway and Sweden Grant Military Access to British Troops"
 ENG_Plan_R4.54.d.A: "[FROM.GetNewsIcon]The Norwegian government has formally granted military access to the United Kingdom in a recent diplomatic agreement, marking one of the most significant developments in Northern Europe in recent months. The accord allows British forces to use Norwegian territory and railways for transit, supply, and defensive purposes in coordination with Oslo. For Norway, the decision reflects growing concern about Europe's deteriorating security situation, as well as growing fears that total neutrality may not be sufficient to protect against invasion, with the British presence serving as a deterrent to potential attacks by Germany or the Soviet Union.\n\nIn London, the agreement has been hailed as a strategic success. British planners have long regarded Norway's coastline and northern ports as critical to maintaining control of the North Atlantic and securing Arctic supply routes, granting the Royal Navy an even more stable base of operations at sea while also allowing for the relative ease of transporting materiel and volunteers to Finland through Norway. Germany has condemned the agreement as one imposed by Britain on Norway in violation of Norway's neutrality, and there are growing fears that Germany intends to intervene militarily to drive the British out of Scandinavia."
 ENG_Plan_R4.54.d.B: "[FROM.GetNewsIcon]The Kingdom of Sweden has signed an agreement giving the United Kingdom military access to its territories. The agreement allows British troops and supply convoys to use Swedish ports, airfields, and road and railway networks for defensive purposes. The agreement comes amid rising tensions in Scandinavia and the Baltic region. With the events of the Winter War, Sweden has sought to ensure the security of its vital northern resources, namely the iron ore mines of Gällivare and Kiruna, which are the backbone of Swedish industry, while Britain seeks to prevent them from falling into the hands of either Germany or the Soviet Union in the event of a future invasion.\n\nWhile Sweden has not explicitly abandoned its long-standing neutrality, the presence of British personnel and equipment has undoubtedly shifted Sweden's position towards Britain and away from Germany, and many fear that British troops stationed in Northern Sweden will allow London to hold Swedish iron ore hostage in an emergency. Fears have also grown that Germany will respond to this new agreement by using military force to invade Sweden and drive out British forces, worried that a stronger British presence in Scandinavia will be detrimental to its own economic and military interests."
 ENG_Plan_R4.54.d.C: "[FROM.GetNewsIcon]Both Norway and Sweden have signed agreements granting the United Kingdom military access to their territories. The accords allow British troops, air units, and supply convoys to operate on and use Scandinavian transport networks, from the Norwegian coast to the Swedish interior, while working closely with local governments. Officials in all three capitals describe the arrangements as strictly defensive, designed to protect Northern Europe from the growing threats that surround it, and insist that their countries remain neutral in global affairs.\n\nFor the Norwegians, the decision reflects an urgent desire to strengthen national defences amid fears of a larger war, as well as to help secure critical coastal routes and mountain passes. In Sweden, the motivation is to protect its northern iron ore fields and key industrial regions, which would be prime strategic targets in the event of an invasion.\n\nThe United Kingdom now has the ability to transport troops and supplies across much of Scandinavia, forming a continuous corridor from the North Sea to the Finnish border. This new access significantly strengthens Britain's ability to defend trade lanes, secure northern iron routes, and consolidate dominance in both the North Atlantic and the Scandinavian mainland."
 ENG_Plan_R4.54.A: "A job well done!"
 ENG_Plan_R4.54.B: "A necessary step to protect our independence."
 ENG_Plan_R4.54.C: "Damn the British!"
 ENG_Plan_R4.54.D: "Is Scandinavian neutrality coming to an end?"

 ENG_Operation_Overlord.6.t: "D-Day"
 ENG_Operation_Overlord.6.d: "[FROM.GetNewsIcon]In the early hours of the morning, the long-awaited Allied invasion of Western Europe, codenamed Operation Neptune or D-Day, began. Under cover of darkness, a large fighting force landed on the beaches of Normandy, France. The assault targeted five key sectors: Utah, Omaha, Gold, Juno, and Sword beaches. After a brutal and costly battle, Allied troops succeeded in securing the beaches, though heavy casualties were suffered. Waves of landing craft continued to pour men and machines onto the coast, while naval guns boomed from the sea and planes darkened the skies. The Germans, caught off guard but not defeated, rushed reinforcements to the front in a desperate attempt to repel the invasion.\n\nAlong the coast, scattered reports describe fierce fighting for each village and bridge. Local resistance movements have risen in coordinated acts of sabotage, such as cutting rail lines and targeting German supply convoys. With the beaches now held, the Allies face the next phase of their campaign: completing \"Operation Overlord\" - capturing the rest of Normandy. Although the situation remains fluid, the attack represents a new phase in the war. After years of occupation, a foothold, albeit fragile, has been carved into Fortress Europe. However, for every soldier who made it to the sand alive, many more lie quietly beneath it. It is unclear whether this is a defining moment in the war or simply another costly assault."
 ENG_Operation_Overlord.6.A: "This is the beginning of Europe's liberation!"
 ENG_Operation_Overlord.6.B: "Drive them back into the sea!"
 ENG_Operation_Overlord.6.C: "Is this the beginning of the end?"

