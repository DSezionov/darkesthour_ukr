 ENG_Invest_in_South_African_Industries: "Invest in South African Industries"

 ENG_Fate_of_Africa_Italiana_category: "Fate of Africa Italiana"
 ENG_Fate_of_Africa_Italiana_category_desc: "\n\n\n£decision_header_ENG_The_African_Sun£\n\n\n\nWith the final collapse of Italian colonial authority, the destiny of Africa Italiana now lies in our hands. From the deserts of Libya to the highlands of Abyssinia, our military administration has imposed order upon lands scarred by war and empire. Yet this arrangement cannot endure forever. We must now decide the future of these territories: Libya, Eritrea, Ethiopia, and Somaliland, balancing local ambitions, international expectations, and the preservation of British influence across the continent.\n\n§YThese decisions will trigger multi-choice events in a future update. Currently, they simply advance the historical territorial progression.§!"
 ENG_Withdraw_from_Ogaden: "Withdraw from Ogaden"
 ENG_Withdraw_from_Ogaden_desc: "During the collapse of East Africa, we established a British military occupation in the wild Ogaden frontier to maintain order and prevent tribal clashes or Somali incursions while Ethiopia recovered from war. We now deem Ethiopia prepared to resume control of the region, and it is time for our forces to withdraw and formally return the Ogaden to Ethiopian administration."
 ENG_Fate_of_Italian_Eritrea: "Fate of Italian Eritrea"
 ENG_Fate_of_Italian_Eritrea_desc: "Eritrea's future remains uncertain following the defeat of the Italian colonial forces. One path is to grant full independence, an ambitious but risky course, as the territory lacks both resources and national precedent. The alternative is federation with Ethiopia, ensuring greater regional stability but risking unrest among Eritrean nationalists who resent subordination to Addis Ababa."
 ENG_Fate_of_Italian_Somaliland: "Fate of Italian Somaliland"
 ENG_Fate_of_Italian_Somaliland_desc: "The future of the Somali territories must now be settled. One option is to unite British and Italian Somaliland into a single independent Somali nation, realizing the aspirations of pan-Somali leaders. The other is to restore Italy's authority under a United Nations trusteeship, allowing them to administer the region until it is ready for self-governance while maintaining an international framework for stability."
 ENG_Emirate_of_Cyrenaica: "Establish the Emirate of Cyrenaica"
 ENG_Emirate_of_Cyrenaica_desc: "With Italian authority dismantled, the future of Libya remains uncertain. To maintain stability in the east, we have decided to recognize a provisional administration under Emir Idris al-Senussi, leader of the powerful Senussi order. The Emirate of Cyrenaica will serve as a testing ground for self-government and a means to cultivate a friendly native leadership while preparations continue for a wider Libyan settlement."
 ENG_Unification_of_Libya: "Unification of Libya"
 ENG_Unification_of_Libya_desc: "The experiments in Cyrenaica have shown promise, and the time has come to unite Libya's disparate provinces. The French authorities, who currently occupy Fezzan, have recognized our primacy in the matter and agreed to transfer the region to a unified Libyan administration. By federating Cyrenaica, Tripolitania, and Fezzan under King Idris, we can establish the independent Kingdom of Libya, fulfilling our international commitments while ensuring the new state remains firmly aligned with British interests in North Africa."

