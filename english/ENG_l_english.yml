 ENG_African_Sun_Category: "The African Sun"
 ENG_African_Sun_Category_desc: "\n\n\n£decision_header_ENG_The_African_Sun£\n\n\n\nWhile the African lands hold plenty of riches and natural wonders, its infrastructure level is catastrophic. We need to invest in the local infrastructures to ease the situation before their total disintegration. To carry out this project, we will entirely restructure the old roads and rails of colonial Africa, allowing for further economic growth, and, in the long term, a better exploitation of our territories in the dark continent."
