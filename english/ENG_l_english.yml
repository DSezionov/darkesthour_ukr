 ENG_Britannia_Endentured: "Britannia Endentured"
 ENG_Maritime_Minefield_idea: "Mark XVII Contact Mines"
 ENG_Maritime_Minefield_idea_desc: "Mining operations on and around the islands have begun in collaboration with the French La Royale. With this, we have started using the new Mark XVII contact mines, which should allow us to inflict heavy casualties on enemy ships that dare to enter our waters. The Great War taught us a valuable lesson about the use of offensive minelaying in areas like Heligoland if only to serve as a friendly reminder to our adversaries of the consequences of challenging His Majesty's rightful shores. This knowledge, combined with the planting of small minefields along the paths of minelaying U-boats, will significantly reduce their ability to damage our industry and the Navy."
 ENG_Maritime_Minefield_idea_2: "Mark XVII Contact Mines"
 ENG_Maritime_Minefield_idea_2_desc: "Mining operations on and around the islands have begun in collaboration with the French La Royale. With this, we have started using the new Mark XVII contact mines, which should allow us to inflict heavy casualties on enemy ships that dare to enter our waters. The Great War taught us a valuable lesson about the use of offensive minelaying in areas like Heligoland if only to serve as a friendly reminder to our adversaries of the consequences of challenging His Majesty's rightful shores. This knowledge, combined with the planting of small minefields along the paths of minelaying U-boats, will significantly reduce their ability to damage our industry and the Navy."
 ENG_Northern_Barrage_Blunder_idea: "Northern Barrage Blunder"
 ENG_Northern_Barrage_Blunder_idea_desc: "The QP 13 disaster has deeply embarrassed both the Admiralty and the government. Compensation has been paid to the families of those who died, and apologies have been issued, but the damage has already been done. The public doubts the effectiveness or necessity of the Northern Barrage, and some newspapers are even calling for the Prime Minister's resignation. We've been assured that those in Parliament who share those views are a minority, but the impact is still significant. It will take some time for this entire situation to blow over."
 ENG_Mines_Secured_by_Allies: "Mines Secured by Allies"
 ENG_Workers_not_Soldiers: "Workers, not Soldiers"
 ENG_Workers_not_Soldiers_desc: "With our Territorial Army disbanded, those part-time soldiers are now full-time employees. This provides us with a massive influx of workers, which should help accelerate our economic recovery. Given that these soldiers are typically not highly educated, they will help our factory production and civil construction projects."

