 ENG_Seize_the_Danish_Possessions: "Seize the Danish Possessions"
 ENG_Transfer_Iceland_to_the_US: "Transfer Iceland to the United States"
 ENG_Transfer_Iceland_to_the_US_desc: "With our forces heavily committed across Europe and North Africa, we cannot spare sufficient troops to continue defending Iceland. To ensure the North Atlantic remains secure, our diplomats have made a suggestion -  arranging for the United States to take responsibility for garrisoning the island, allowing British forces to concentrate on the fight against the Axis."
 ENG_Secure_American_Destroyers: "Secure American Destroyers"
 ENG_Operation_Catapult: "Operation Catapult"
 ENG_The_Cherchell_Conference: "The Cherchell Conference"
 ENG_The_Cherchell_Conference_desc: "In the midst of growing uncertainty over the future of Vichy-held French North Africa, British and American diplomats have made secret contact with sympathetic officers in Algeria. The meeting, held in the coastal town of Cherchell, aims to secure the cooperation of Vichy-aligned French forces should the Allies land in North Africa."
 ENG_Operation_Torch: "Operation Torch"
 ENG_Operation_Torch_desc: "The time has come to strike at the Axis from the south. Allied forces, drawn from across the Empire and the United States, will launch a daring amphibious assault on French North Africa. The objective is clear: secure Algiers, Oran, and Casablanca, then press eastward to link up with the Eighth Army in Tunisia. The landings must be swift, decisive, and coordinated. Success here could open the door to Europe itself - failure would hand the Axis control of the Mediterranean."
 ENG_Operation_Torch.tt.update: "§R1.1 \"Strategic Command\" does not feature on-map combat for Operation Torch. Await a future update.\n\nIn 8 days, Free France will gain control of all Vichy colonies!§!"
