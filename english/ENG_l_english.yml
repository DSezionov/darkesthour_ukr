######################################################################
#  British Mers El Kebir Events
######################################################################
 ENG_Raid_On_Mers_El_Kebir.1.t: "Somerville's Ultimatum"
 ENG_Raid_On_Mers_El_Kebir.1.d: "The commander of a British Carrier, Captain Cedric Holland, has just contacted us. He has issued an ultimatum on behalf of British Admiral James Somerville, the terms of which contradict the German-French armistice. We must surrender our most powerful fleet of warships at Mers-el-Kébir in French Algeria immediately, sail to British ports with a reduced crew, and join the fight against the German Reich. If this demand is not met, we will sail to the French West Indies to be demilitarised. If this deadline is not met, the British will launch an attack in six hours.\n\nAdmiral Marcel-Bruno Gensoul has been given three options for responding:\n\nThe first option is to comply with their demands and hand over our warships to the British. Some believe that a British attack would be disastrous for us and that we would have no chance of repelling it. This would significantly strengthen the British fleet while harming the Axis naval power.\n\nThe second and most popular option is to flatly refuse the demands and prepare for an attack by the British. This is our most powerful warship fleet, and it will easily dispatch the British hounds. If we succeed, the British will be humiliated, and our allegiance to the Axis will be cemented.\n\nThe third and most contentious option would be to sink the entire fleet. That way, even if things look hopeless for us, we won't give the British the satisfaction of capturing us and bolstering their fleet. This would not help the British or the Axis, but it would safeguard our honour in an otherwise hopeless situation."
 ENG_Raid_On_Mers_El_Kebir.1.A: "Vive la France libre!"
 ENG_Raid_On_Mers_El_Kebir.1.B: "We can't give them our ships, but they will not aid the Hun"
 ENG_Raid_On_Mers_El_Kebir.1.C: "We have no choice but to refuse their obscene demands"
 ENG_French_Fleet_Transferred_tt: "§Y4 Battleships and 5 Destroyers will be transferred to the British§!"

 ENG_Raid_On_Mers_El_Kebir.2.t: "The French Fleet Defects"
 ENG_Raid_On_Mers_El_Kebir.2.d: "Wonderful news! The French fleet of warships at Mers-el-Kébir in French Algeria has fully agreed to our demands and is on its way to British ports to fight the German Reich. This latest addition to our already formidable fleet will fortify the Allies and increase our chances of total naval superiority and dominance over the Axis powers. The Axis, on the other hand, have suffered a catastrophic loss today that they will not be able to recover from anytime soon. Now that we have control of such a powerful group of warships, it is time to take to the seas and show the Axis just how much they lost on this day!"
 ENG_Raid_On_Mers_El_Kebir.2.A: "We may still hang out that washing yet"

 ENG_Raid_On_Mers_El_Kebir.3.t: "The French Scuttle Their Fleet"
 ENG_Raid_On_Mers_El_Kebir.3.d: "The French sank their fleet instead of handing it over to the us.\n\nAfter our ultimatum, the French fleet of warships at Mers-el-Kébir in French Algeria was completely sunk, which surprised almost everyone. According to reports, the French sank them in order to avoid being captured by us. While this saves us the trouble of attacking and destroying them ourselves, we would have preferred if they had instead surrendered the fleet. Nonetheless the Axis powers have suffered a severe loss that they will not be able to recover from anytime soon now that this fleet has been destroyed."
 ENG_Raid_On_Mers_El_Kebir.3.A: "What Cowards..."

 ENG_Raid_On_Mers_El_Kebir.4.t: "The French Refuse"
 ENG_Raid_On_Mers_El_Kebir.4.d: "As expected, the French fleet of warships at Mers-el-Kébir in French Algeria has refused all of our demands and are determined to fight until the bitter end. Now that we've given them a chance to surrender, which they foolishly refused, it's time to demonstrate the Royal Navy's might. If we can't have these ships, the Axis can't be allowed to use them either. Because this was the expected response, we have already prepared everything for the attack, and we will strike within 6 hours. Sinking this fleet will serve as a show of strength to the rest of the Axis powers, as well as an example that defying the Allied fleet is unwise."
 ENG_Raid_On_Mers_El_Kebir.4.A: "If they aren't with us..."

 ENG_Raid_On_Mers_El_Kebir.5.t: "The French Navy Defects to the British!"
 ENG_Raid_On_Mers_El_Kebir.5.d: "[FROM.GetNewsIcon]The Allies celebrated today as the entire French fleet at Mers-el-Kébir in French Algeria, including the French navy's most powerful warships under Admiral Marcel-Bruno Gensoul's command, arrived in British ports with reduced crews to surrender control in response to the United Kingdom's ultimatum. The French navy has joined the Allies in their fight against the Germans.\n\nRecognizing British naval superiority and knowing they had no chance of repelling a British attack, the Admiral agreed to all demands. This, in turn, represents a massive increase in naval power for the United Kingdom and the Allies, while the Axis and their naval power suffer a massive loss. Will this new fleet of powerful warships be able to successfully end the battle for the seas?"
 ENG_Raid_On_Mers_El_Kebir.5.A: "Welcome old friends!"
 ENG_Raid_On_Mers_El_Kebir.5.B: "Traitors!"
 ENG_Raid_On_Mers_El_Kebir.5.C: "The French switch sides... again?"

 ENG_Raid_On_Mers_El_Kebir.6.t: "French Fleet Scuttled at Mers El Kebir!"
 ENG_Raid_On_Mers_El_Kebir.6.d: "[FROM.GetNewsIcon]Following the United Kingdom's ultimatum to the French, the French fleet at Mers-el-Kébir in French Algeria, which included the French navy's most powerful warships, was completely and utterly destroyed, down to the last ship. According to early reports, it was not the Allies, the Axis, or any other foreign power that sank the fleet, but rather Admiral Marcel-Bruno Gensoul and his naval staff.\n\nWhile the exact reasons for this are unknown, one thing is certain: no one wins in this situation. These ships can no longer be used in the battle for naval supremacy by either the Allies or the Axis. It's bad for the Allies, but it's even worse for the Axis. It remains to be seen how far this incident will have an impact in the future, but for the time being, the battle for the seas continues."
 ENG_Raid_On_Mers_El_Kebir.6.A: "Are they insane?"
 ENG_Raid_On_Mers_El_Kebir.6.B: "The French play to no one."

 ENG_Raid_On_Mers_El_Kebir.7.t: "The British Attack at Mers El Kebir"
 ENG_Raid_On_Mers_El_Kebir.7.d: "[FROM.GetNewsIcon]The British Royal Navy has just attacked a French naval base at Mers-el-Kébir in French Algeria, in what will undoubtedly go down in history as one of the strangest events of the war. The British attacked their former ally's flotilla with the stated goal of sinking as many ships as possible in the harbor to prevent them from falling into Axis hands. After France rejected a British ultimatum to hand over their fleet, the British commander gave the order for his naval force to fire on the French ships.\n\nFollowing the French surrender, the French agreed to keep their navy neutral in exchange for the Germans granting relative autonomy in the zone libre, the free southern part of France. However, both Hitler and Churchill were dissatisfied with this arrangement. Hitler feared that the French would eventually join the British in their fight against Germany, whereas Churchill feared that the French navy would be swallowed up by the Italian and German Navies.\n\nThis has been viewed as a complete and utter betrayal by French civilians, who are already suffering a humiliating defeat at the hands of the Germans. Philippe Pétain, the French President, has responded to the attacks by severing diplomatic ties with the United Kingdom. Others, on the other hand, interpret it as evidence that the unwavering British resolve to win this war has not yet been overcome."
 ENG_Raid_On_Mers_El_Kebir.7.A: "The Fleet must not never fall into enemy hands."
 ENG_Raid_On_Mers_El_Kebir.7.B: "We will not forget this treachery!"
 ENG_Raid_On_Mers_El_Kebir.7.C: "Even allies are not safe in this war."

######################################################################
#  British Abdication Crisis Events
######################################################################
 ENG_Abdication_Crisis.1.t: "The Death of King George V"
 ENG_Abdication_Crisis.1.d: "[FROM.GetNewsIcon]His Majesty King George V of Windsor has passed, succumbing to his illness just before midnight yesterday. The King will lie in state at Westminster Hall until the funeral, where thousands of the crown's loyal subjects will pay their respects.\n\nGeorge V ruled the United Kingdom through a time of unprecedented strife, leading the people of Britain and the Commonwealth through the Great War and the worst of the depression. The King had suffered from various respiratory issues and had spent the last year confined to Sandringham House.\n\nDevoted to and well-loved by the citizens of the Empire, the King's moderating influence will be missed by many, especially considering his heir's authoritarian inclinations and history of womanizing.\n\nThe Prince of Wales will ascend to the throne as King Edward VIII in Westminster Abbey tomorrow."
 ENG_Abdication_Crisis.1.A: "The King is dead, long live the King!"
 ENG_Abdication_Crisis.1.B: "The King is dead, long live the King!"
 ENG_Abdication_Crisis.1.C: "The King is dead, long live the King!"
 ENG_Abdication_Crisis.1.D: "Another phoney monarch bites the dust."
 ENG_Abdication_Crisis.1.E: "We send our condolences."
 
 ENG_Abdication_Crisis.2.t: "The King and.. His Friend?"
 ENG_Abdication_Crisis.2.d: "The warm, bright water of the Mediterranean caressed the yacht, tracing its sleek contours like a lover. It reminded Edward of one particularly... debauched night in Paris. The King leaned back in his deck chair, smiling at the memory but unable to remember the woman's face. Oh well. Those days were behind him anyway.\n\nThe love of his life sat down beside him, and he pictured her in a crown. In his mind, pillars rose, branching out and intertwining to form the vaulted ceiling of Westminster Abbey. Bright light streamed through stained glass windows, painting the pair in a saintly aura- a mighty King, with his Queen beside him. Majestic.\n\nHe saw in Wallis what the throne lacked- strength. Forcefulness. Vitality. The things that drew him to her and seized him like no woman ever had. The politicians back home hated his future wife- she was too ambitious, too American, too divorced. But why did that matter? He loved her, and that was the only important thing. Wallis noticed his distress and frowned in concern. If the crown was contingent on giving up love, he knew which one he'd choose."
 ENG_Abdication_Crisis.2.A: "Who are they to rule the King's heart?"

 ENG_Abdication_Crisis.3.t: "Rumours of Intent"
 ENG_Abdication_Crisis.3.d: "Rumours have been circulating that King Edward VIII is planning a wedding in the coming months after secretly dating a married woman for several years. The Church has formally rejected these rumours, stating that he cannot marry a woman who has been divorced twice and that doing so would be detrimental to the Kingdom's reputation. The problem extends beyond the fact that she has remarried. The main reason, according to the Church of England, is that both of her ex-partners are still alive.\n\nThe King's deviant behavior has been reported to Stanley Baldwin's government. As a constitutional monarchy, the UK government cannot allow something like this to occur. "
 ENG_Abdication_Crisis.3.A: "God save the King!"
 
 ENG_Abdication_Crisis.5.t: "The King's Desire"
 ENG_Abdication_Crisis.5.d: "\"Are you certain, Your Majesty?\" \"The Archbishops and the majority of the clergy have already voiced their opposition, as well as the head of the church, you should consider...\"  Stanley Baldwin responded.\n\n\"I know\" Edward responded in a tired voice. \"Think about how this marriage would affect the entire United Kingdom and beyond.\" I'm tired of all these mumblings, and all I want is a love marriage.\"\n\nBaldwin sighed. \"You know the Cabinet would be furious about this, and the Governors of the colonies have already issued their opposition to this marriage, first and foremost the Governor of Australia, and they will not recognize this marriage in any form.\"\n\n\"And how many people live in Australia?\" Edward resisted. \"Since when do I need them to give them my opinion on my marriage?\" Stanley, my mind is made up; I'm not going to end my marriage over a squabble.\"\n\n\"As you wish, your Majesty.\" Baldwin stood up and said, \"I will convey your decision to the Cabinet and Parliament, though I cannot guarantee their response.\" Baldwin exited the room, leaving Edward alone in his room, sighing in his seat as he pondering his decisions."
 ENG_Abdication_Crisis.5.A: "\"Why won't they understand?\""

 ENG_Abdication_Crisis.6.t: "Pushing for Abdication"
 ENG_Abdication_Crisis.6.d: "While King Edward VIII's planned marriage to American socialite Wallis Simpson has gained popular support, those in the political circles of the United Kingdom and her dominions are outraged that the King would even consider such a marriage.\n\nSome members of Parliament have expressed grave concerns about the King's moral responsibilities to the nation and to the Church of England. Many members of Parliament are even opposed to the king marrying his twice-divorced mistress in a morganatic marriage. Britain's dominions too have stated that no compromise is possible, and whispers of a general government resignation have begun to circulate in the House of Commons.\n\nEven the newspapers have begun to question the King's loyalty to the crown and the people, spinning speculative stories about how the King's judgment on other matters may be clouded based on how this issue is resolved.\n\nIt remains to be seen whether the King listens to his critics and abdicates, but if he pursues his own desires, the consequences could be detrimental..."
 ENG_Abdication_Crisis.6.A: "The kingdom is in crisis."

 ENG_Abdication_Crisis.7.t: "Addressing Commonwealth Leaders"
 ENG_Abdication_Crisis.7.d: "Today's speech before the Commonwealth of Nations was attended by representatives from all of our world's dominions.  This time, however, it was on the matters of the King and his proposed marriage.  The royal family and the majority of British politicians have been opposed to him marrying American socialite Wallis Warfield Simpson, so he communicated his desire and sought the support of the dominions. He proposed a morganatic marriage in which Wallis would have no rights to rank or property, as he had done to the other parties, in the hope that the dominions would see sense and side with him when everyone else was against him.\n\nHowever, it turned out to be exactly what Edward feared: rejection. While there were a few faces that appeared to be open to the idea, the majority reacted with skepticism, if not outright anger. Most people thought an American woman who had been divorced twice as a potential British queen was unsuitable. With everyone seemingly against him and nowhere to turn, Edward left the building to contemplate."
 ENG_Abdication_Crisis.7.A: "Alone against the world."

 ENG_Abdication_Crisis.8.t: "Censoring the King"
 ENG_Abdication_Crisis.8.d: "\"Of course, Your Majesty, me and my newspaper will be honored to help you!\" replied Lord Kemsley, owner of the Daily Telegraph.\n\"That's fantastic news, Lord Kemsley; you have no idea how many times I've had this conversation in the last week!\"\n\"I'll try to get it published tomorrow morning.\"\n\"You have my deepest gratitude.\"\n\nThat was no ordinary man on the phone, but nonother than King Edward. For months, the government had been working against him. How were all these men and industrialists able to attack their king? But now Edward was certain: the declaration he wished to make public will explain his motivations. They adore him, and they are his best chance of victory in this battle. The next morning, everywhere in London, the headline of the Daily Telegraph proclaimed:\n\n\"The Dangerous Dance of King Edward\"\n\nThere was no mention of the reasons for the King's marriage to Wallis Simpson in the article. In fact, the article chastised him for his support for far-right and fascist leaders. Notable examples included Mrs. Simpson's relationship with the Nazis, the king's reaction to the Italo-Ethiopian war, and even the support he received from Mosley's blackshirts. \"Who does the King truly serve, the United Kingdom and the Empire, or the fascist new order?\" asked the article's final line.\n\n\"Those backstabbers!\" Edward immediately dialed his last hope into his phone: the BBC. When the line was connected, however, the manager refused to speak with him. He knew exactly who was responsible for this. The king stormed into Baldwin's office, demanding to know why the BBC refused to speak to him.\n\"I'm sorry, Your Grace, but it looks like the people aren't interested in hearing your lies.\"\n\"Baldwin, how dare you? I must explain to the people how the government is attempting to depose their King!\"\n\"You will not!\"\nSilence followed until Baldwin firmly beckoned the king to leave.\n\"I apologize, My King.\"\nSlowly raising his gaze to Baldwin, Edward declared with royal authority:\""
 ENG_Abdication_Crisis.8.A: "\"May the people forgive you, because there is no place for men like you in the future.\""

 ENG_Abdication_Crisis.9.t: "The Threat of Resignation"
 ENG_Abdication_Crisis.9.d: "Edward sat back and enjoyed the steaming tea in front of him. This tea was grown specifically for royal consumption on a specially chartered plantation in India. A little more difficult to cultivate, but naturally fresher, with a flavor described as a floral Jasmine and Ceylon combination with the malty character of Yunnan. The arose steam had a flavor and scent that never failed to bring the king to a state of calm.\n\nThe king's attention shifted as he heard a knock at the door, followed by the entrance of Prime Minister Baldwin. He had been informed of his impending arrival; clearly, the visit was to discuss some important cabinet news. The king got a headache just thinking about those bureaucrats, and Baldwin was the worst of them all. There had been no end to the pain they had inflicted on him because of his marital choices. Edward motioned for the Prime Minister to sit, but the Prime Minister shook his head and stood.\n\n“Your Majesty, I'm afraid this meeting won't be long. If you go ahead with your marriage to Ms. Simpson, the cabinet has threatened to resign. If you proceed, I have decided to stand with them and resign as well.\" Edward felt blinding rage at the news in an instant. His own government, abandoning him in this manner? The arrogance! The king suppressed his rage. It would be pointless for him to express his emotions here. The king spoke after a brief moment of thought.\n\"If that's all, please leave to think about this information.\"\n\n“Very well Sir”, replied Baldwin.\n\nAs Baldwin left the room, Edward's mind began racing with thoughts.  Where could this plot could have originated?  What could be the ramifications of this insane idea? And finally... how he was to react.  After a few minutes of deliberation, the king arrived at the only resolution he could accept. Taking a sip of his now-cold tea, Edward noticed that it was more bitter than usual."
 ENG_Abdication_Crisis.9.A: "Abdication is the only solution."

 ENG_Abdication_Crisis.10.t: "The Abdication of Edward VIII"
 ENG_Abdication_Crisis.10.d: "[FROM.GetNewsIcon]King Edward VIII of the United Kingdom has formally and voluntarily announced his abdication from the throne of the United Kingdom. \n\nToday, on the evening of December 11, King Edward VIII announced his abdication from the throne to the people of the United Kingdom over the radio, after ruling for less than a year. This came after the Church of England, the British government, and the general public all condemned his decision to marry divorced American Wallis Warfield Simpson. He explained, \"I have found it impossible to carry on the heavy burden of responsibility and discharge the duties of king, as I would wish to do, without the help and support of the woman I love.\"  King Edward had signed the instruments of abdication at Fort Belvedere the day before, in the presence of his younger brothers, Prince Albert, Duke of York, Prince Henry, Duke of Gloucester, and Prince George, Duke of Kent. King Edward is the first monarch in the history of the British Royal Family to voluntarily abdicate from the throne, which has shocked the British people, as well as the government.\n\nRegardless, Edward intends to marry Wallis"
 ENG_Abdication_Crisis.10.A: "Love truly knows no bounds."
 ENG_Abdication_Crisis.10.B: "Love truly knows no bounds."
 ENG_Abdication_Crisis.10.C: "Love truly knows no bounds."
 ENG_Abdication_Crisis.10.D: "Love truly knows no bounds."
 ENG_Abdication_Crisis.10.E: "Love truly knows no bounds."

 ENG_Abdication_Crisis.11.t: "The Coronation of George VI"
 ENG_Abdication_Crisis.11.d: "[FROM.GetNewsIcon]Today, across the United Kingdom and the British Empire, celebrations have begun after the coronation of Prince Albert of the House of Windsor, now King George VI, has finished. The younger brother of the tumultuous Prince of Wales, Edward, George was not expected to ascend to the throne, however after Edward abdicated his throne because of the American widow Wallace Simpson, George had no choice but to take up the mantle and lead the country.\n\nKing George is a fine example of a monarch and of a man, and, having served in the Royal Navy during the Great War, knows how dangerous the troubles of conflict are. There is no doubt that his kind, guiding hand shall lead us through these dark times to the light at the end of the tunnel."
 ENG_Abdication_Crisis.11.A: "God Save the King! God Save George VI!"
 ENG_Abdication_Crisis.11.B: "What about his brother?"
 ENG_Abdication_Crisis.11.C: "New king, same problems."
 ENG_Abdication_Crisis.11.D: "Send our congratulations."
 ENG_Abdication_Crisis.11.E: "That was unexpected."

 ENG_Abdication_Crisis.12.t: "The King Relents"
 ENG_Abdication_Crisis.12.d: "King Edward has announced today, in front of the British cabinet and representatives from the other Dominion governments, that he will abandon his plans to marry Wallis Simpson. Seeing how his plans had received almost no support from either the government or the general public, Edward realised that he could not prioritise his own needs and desires over the needs and desires of the country. He understands that if he marries against the advice of his ministers, the government will resign, resulting in a constitutional crisis.\n\nThe announcement stunned the entire room, eliciting roaring applause and relief from nearly every cabinet member, and has greatly improved King Edward's standing and reputation among both the British cabinet and the general public."
 ENG_Abdication_Crisis.12.A: "A woman is not as important as the Kingdom."

 ENG_Abdication_Crisis.13.t: "The Coronation of Edward VIII" # No wedding, Wallis abandoned
 ENG_Abdication_Crisis.13.d: "[FROM.GetNewsIcon]After months of tension that threatened a possible constitutional crisis, Edward VIII was crowned today as King of the United Kingdom and the Dominions of the British Commonwealth.\n\nFor several months prior to the coronation, the King and the British government were at odds. Soon after taking over for his father, Edward proposed to American socialite Wallis Simpson, who was going through a divorce at the time. The Church of England, which forbade divorced people from marrying, rejected the idea, but the King persisted and proposed a morganatic union instead. However, the British government and the dominions either flatly rejected or were skeptical of his marriage proposal. After the government threatened to resign if he went ahead with the marriage, Edward caved in and ended his relationship with Simpson.\n\nTens of thousands of people attended the planned coronation when Edward VIII took the oath and assumed the crown. Memorabilia were sold out rapidly as the British people wanted something to remember for the historic and controversial coronation. Several observers noted that the new monarch appeared unhappy during the proceedings, glancing repeatedly to his side as though someone ought to be standing with him."
 ENG_Abdication_Crisis.13.A: "May God be with him."
 ENG_Abdication_Crisis.13.B: "May God be with him."
 ENG_Abdication_Crisis.13.C: "May God be with him."
 ENG_Abdication_Crisis.13.D: "May God be with him."
 ENG_Abdication_Crisis.13.E: "May God be with him."

 ENG_Abdication_Crisis.14.t: "A Favour from a Friend"
 ENG_Abdication_Crisis.14.d: "“Ah, Prime Minister! Please, come in!”\n\nChurchill walked into the Chinese dining room, soon impressed by the room's lavish décor.\n\n‘It's funny, but I don't think I have ever been in this part of the palace, your majesty; it's an honour.”\n\n“Really? I thought an old man like you would know this place like the back of your hand by now! But anyways, please take a seat, let's chat.”\n\nAgogged, Churchill sat down in the chair adjacent to the King, and poured himself a cup of champagne. “So, what is it that requires my attention? I'm assuming it has to do with this lady of yours, correct?”\n\nEdward thumbled with the tea cup in front of him, “Yes... in fact, I have come to a decision on the matter... I'm going to marry her.”\n\n\"What?!\" Churchill nearly spit out his drink. “With all due respect, your majesty, forcing such a marriage with a divorced American woman would split the bloody country in half! While I support you in your endeavour, neither of us has the political capital to pursue such a royal marriage; Parliament would tear us apart and-\"\n\nEdward abruptly stood up, “I'm sorry Prime Minister, but I love this woman! Why should I fall in line with what the government wants?”\n\nAn awkward silence filled the room, then the king plumped back into his chair. “There is another way I could see the marriage through... a morganatic marriage. I marry her, but she doesn't gain any royal titles. Since much of the push back is along those lines, you could rally enough political support in parliament to see it happen... What do you say?”\n\nChurchill sighed, and took one last sip of his drink before answering,"
 ENG_Abdication_Crisis.14.A: "I'm sorry, but we just can't afford the political capital on this, morganatic or not."
 ENG_Abdication_Crisis.14.B: "A morganatic marriage could prove a wise compromise, I can see what I can do."

 ENG_Abdication_Crisis.15.t: "The Bulldog's Bark"
 ENG_Abdication_Crisis.15.d: "“A morganatic wedding between the King and Ms. Simpson is the most reasonable solution!”\n“A marriage of any kind will break the very foundation the royal family was built on, this shall not happen! And I'm going to make sure you bloody idiots don't let it!”\n\nRichard Denman sighed as he struggled to keep up with writing the arguments for both sides, but the House of Commons devolved into yelling and arguing, as it does whenever they had to debate a problem. The problem of the day, on the other hand, was one-of-a-kind: the King's proposal for a morganatic wedding. Previously, the issue appeared to be a no-brainer, but without the issue of royal titles, parliament appeared to be divided. Denman scribbled down the three parties' opinions:\n\nLABOUR: MIXED                    CONSERVATIVES: MIXED                  LIBERAL: FOR\n\nDue to Archibald Sinclair's friendship with Churchill, most of the Liberals were on board for the marriage, but the strongholds of both the major parties seemed harder to convince. Then, the MP next to him whispered under his breath with embarrassment,\n\n“Oh God, here comes Churchill.”\n\nSure enough, the Prime Minister approached the table amongst the yelling. Somehow, he was able to whip parliament back into shape, and quieted everyone down. He then made a stirring speech to the house. Denman could see the opinion of parliament change with every word that came out of his mouth, and even he felt a little inspired from it. Denman then proceeded to write underneath the date in big, bold letters:"
 ENG_Abdication_Crisis.15.A: "THE BULLDOG BARKS"

 ENG_Abdication_Crisis.16.t: "Whipping the Commonwealth"
 ENG_Abdication_Crisis.16.d: "“Your government's support for the marriage, er, morganatic marriage, would go a long way of convincing the British people and the Commonwealth-... no it's more symbolic, understand she is not going to be a queen, she won't be considered royalty... yes-... okay, see what you can do and get back to me as soon as possible, thank you.”\n\nChurchill slapped the phone down, then rubbed his face back and forth in frustration and exhaustion. “So far, only South Africa, which only happened because of Jan Smut's help to convince Hertzog, and New Zealand fully approved of the marriage. Ireland seems rather apathetic to the whole matter, only as long as the British people accepted the arrangement. As for Canada, the government is in support, but the Canadian people are still largely sceptical of the idea but-”\n\nA voice from his secretary down the hall then broke his chain of thought: “Uh Mr. Churchill, Australia's Prime Minister is next on the line, do you want me to put him through, or do you want to take a break?”\n\n\"If I can just get a few more Commonwealth nations on board, our chances of getting the marriage through will be much better,\" Churchill sighed. \"Just a few more.\""
 ENG_Abdication_Crisis.16.A: "“Better now than never my dear, put him through.”"

 ENG_Abdication_Crisis.17.t: "Straight to the People"
 ENG_Abdication_Crisis.17.d: "“This will be our final push, a push from the British people themselves. Once Edward speaks personally to the people across the nation, and convinces those on the fence, surely, it'll force the hands of anyone denying his marriage” \n\nThe BBC manager shrugged. “If you say so, but remember, you owe me a huge favour after this, got it?”\n\nChurchill smiled and patted his back, “Of course, let's just focus on getting the King the air first, then we talk afterwards.”\n\nThe King sat in front of them, re-reading his personally typed speech as radio operators prepared the microphone and cables. After a few final plugins, they stepped back and watched the clock. “You're on in three, two, one...” A small red light appeared on the microphone, and the King made his final plea, to convince every British man and woman that he had the right to marry the woman he loved.\n\n“Hello and good evening, this is your humble King, Edward VIII...”"
 ENG_Abdication_Crisis.17.A: "...at long last I am able to say a few words of my own.”"

 ENG_Abdication_Crisis.18.t: "Minor Inconveniences"
 ENG_Abdication_Crisis.18.d: "\"Just look at the news this morning, Prime Minister, the speech was well received!\"\n\nChurchill's secretary approached his desk and handed him the morning paper, which featured the king's \"Brave, Heart-warming, and Delicate Speech\" in bold letters on the front page, with reviews praising it left to right. He put down his cigarette and rushed over the words.\n\n“Good god it worked! The people are on our side! W-what about parliament? Did anyone really resign like they said they would? I don't expect they did with this much support for the king, ha!”\n\n\"No one of major concern, the word is a few MP's submitted their resignation in protest, but Baldwin and McDonald have both announced they would support the government regarding the marriage\", his secretary smiled.\n\n\"So just a few minor inconveniences then? No matter, their protests are worth less than a pothole! Now, if you can get the king on the phone, I'll tell him that his marriage is not only going to happen, but that the government is in line to support him too!\""
 ENG_Abdication_Crisis.18.A: "Right away sir, I'm sure he'll be ecstatic as well!"

 ENG_Abdication_Crisis.20.t: "A Less-Than-Smooth Ride"
 ENG_Abdication_Crisis.20.d: "Some may call it a less-than-smooth ride.\n\nOthers are calling it a car crash.\n\nWhat should've been a way to shore up support for the King's marriage has turned into a political crisis that is gripping the very heart of the United Kingdom. When Edward made the speech on radio to the nation a few days ago, he could not have imagined the damage it would do to the stability of a country now in complete shock at what is unfolding in Parliament.\n\nNot only are many MP's from both major parties unconvinced, but many who are part of the government have begun to resign in droves, including both Stanley Baldwin and Ramsay MacDonald. This has left the leadership of our nation in a state of paralysis, one which will surely not be resolved in the foreseeable future.\n\nWhat will happen next is anyone's guess, but the pressure of Edward is mounting at a rapid rate, and only time will tell if he can survive it."
 ENG_Abdication_Crisis.20.A: "A disaster for our nation!"

 ENG_Abdication_Crisis.22.t: "The Coronation of Edward VIII" # Morganatic Marriage
 ENG_Abdication_Crisis.22.d: "[FROM.GetNewsIcon]Despite initial strong opposition from his ministers and advisors, King Edward VIII has decided to marry American socialite Wallis Simpson in a morganatic marriage. He will remain king in this marriage, but Simpson will not become queen consort. Instead, she will be given a lesser title, and any children they have will not inherit the throne.\n\nThe views of the other governments were sought in accordance with the Statute of Westminster 1931, which stated that \"any change in the law touching the Succession to the Throne or the Royal Style and Titles shall hereafter require the assent of the Parliaments of all the Dominions as well as the Parliament of the United Kingdom.\" The Prime Minister of Australia, among some others, stated his opposition to the king marrying a divorcee.\n\nWhen confronted with this opposition, Edward responded that there are \"not many people in Australia\" and their opinion does not matter. Some ministers are already resigning, raising the question: Is the United Kingdom on the verge of a constitutional crisis, or will the government hold?"
 ENG_Abdication_Crisis.22.A: "Was it the right decision?"
 ENG_Abdication_Crisis.22.B: "Was it the right decision?"
 ENG_Abdication_Crisis.22.C: "Was it the right decision?"
 ENG_Abdication_Crisis.22.D: "Was it the right decision?"
 ENG_Abdication_Crisis.22.E: "If faith can move mountains, love can move the world."

######################################################################
# Elizabeth
######################################################################
 ENG_Elizabeth.1.t: "Long Live the Queen"
 ENG_Elizabeth.1.d: "\"A most splendid morning, Ma'am,\" an attendant said as Princess Elizabeth and Prince Philip stepped onto the terrace of the Treetops Lodge. Below them, the sounds of wildlife stirred through the Kenyan forest. It was the first stop on their tour, and the princess had risen early, eager to see the sunrise from the famous treetop platform.\n\nElizabeth smiled, lifting her binoculars as she scanned the distant hills. Everything seemed peaceful, almost enchanted in the soft morning light. The princess was unaware that inside the lodge, aides had begun to move with unusual urgency, whispering among themselves as a radio operator hurriedly folded a message into Philip's hand.\n\nPhilip read the paper once, then again, his jaw tightening. He walked back outside, the call of birds echoing overhead. \"Lilibet,\" he began, steadying his voice, \"I'm afraid you must come inside. There is news from [ENG.Capital.GetName].\"\n\nElizabeth lowered her binoculars, puzzled. Inside, Philip dismissed the attendants with a glance, then turned to her. \"It's your father… King George has passed away.\"\n\nElizabeth blinked, silent for a long moment. Out of the corner of her eye she noticed the staff standing rigidly, watching her with a mix of sympathy and apprehension. She inhaled slowly. \"I see,\" she said quietly.\n\nWithin minutes, the tranquil lodge became a center of coordinated activity. Officials moved about preparing the royal party's rapid return to Britain. Elizabeth, now seated near the radio set, listened carefully to the details sent from [ENG.Capital.GetName]. A single framed portrait of her father hung on the wall, illuminated by a shaft of sunlight filtering through the timber boards.\n\nPhilip placed a hand on her shoulder. Elizabeth nodded, composed. “We must prepare,” she said. “There is much to be done.”\n\nAs she rose to leave for the flight home, one of the aides bowed deeply. She had arrived in Kenya as a princess. She would depart as the new sovereign."
 ENG_Elizabeth.1.A: "Long live Queen Elizabeth II!"
 ENG_Elizabeth.2.t: "Long Live The Queen"
 ENG_Elizabeth.2.d: "[FROM.GetNewsIcon]Princess Elizabeth became Queen Elizabeth II today following the sudden death of her father, King George VI, who passed away in his sleep at Sandringham at the age of 56. The monarch, long troubled by ill health, was discovered early this morning by staff.\n\nThe new Queen was informed while in Kenya on a Commonwealth tour with the Duke of Edinburgh. Witnesses report she received the news calmly before preparations were made for her immediate return to London. She is expected to meet Prime Minister [ENG.GetLeader] and the Privy Council upon arrival, after which formal proclamations will be issued.\n\nKing George VI, who ascended the throne in 1936, is widely remembered for his wartime leadership and the steady guidance he provided during Britain's postwar recovery. Leaders around the world, including President [USA.GetLeader] and officials from across the Commonwealth, sent messages praising his devotion to duty and offering support to the young Queen.\n\nElizabeth II, 25, had only recently begun her overseas tour. Her accession is viewed with confidence by many in the international community. Details on the King's funeral and the Queen's coronation will be announced later.."
 ENG_Elizabeth.2.A: "Long live Queen Elizabeth II!"
 ENG_Elizabeth.4.t: "Elizabeth"
 ENG_Elizabeth.4.d: "Princess Elizabeth, daughter of King George VI and heir presumptive to the British throne, is making an appearance on the BBC's Children's Hour. At just fourteen years old, her voice is clear and steady, reaching children across Britain who are growing up in the midst of war. Sitting beside her younger sister Margaret, she speaks with warmth and compassion:\n\n\"In wishing you all good evening, I feel that I am speaking to friends and companions who have shared with my sister and myself many a happy Children's Hour.\"\n\n\"Thousands of you in this country have had to leave your homes and be separated from your fathers and mothers. My sister Margaret Rose and I feel so much for you, as we know from experience what it means to be away from those we love most of all.\"\n\n\"Before I finish I can truthfully say to you all that we children at home are full of cheerfulness and courage. We are trying to do all we can to help our gallant sailors, soldiers and airmen, and we are trying, too, to bear our own share of the danger and sadness of war.\" \n\n\"We know, every one of us, that in the end all will be well; for God will care for us and give us victory and peace.\"\n\nThe broadcast is brief, but already it is leaving a lasting impression. Children across the nation are hearing her words of comfort and hope, and the young princess shows poise and grace beyond her years."
 ENG_Elizabeth.4.A: "A promising future monarch."

