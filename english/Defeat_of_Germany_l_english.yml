l_english:
######################################################################
#  Events
######################################################################

### Yalta Conference
 Yalta_Conference.1.t: "The Soviets Invite Us to Yalta"
 Yalta_Conference.1.d: "Respected President [USA.GetLeader],\n\nFirst and foremost, please accept my heartfelt gratitude on behalf of the Soviet people for your efforts in combating Nazi Germany's tyranny. We understand and appreciate your support, and we hope that this collaboration will last long after this bloody war is over.\n\nSecond, in light of the current European war situation, with the German war machine gradually crumbling and the tide of the war turning in our favour, I would like to personally invite you to a conference in the lovely Soviet city of Yalta. We hope to discuss the fate of postwar Europe at this conference. \n\nThird, I would like to assure you that the Soviet Government intends to maintain friendly relations with the Western Powers even after the war. Many rumours of Soviet hostility are circulating, and I would like to ensure that these false accusations do not taint the conference discussions.\n\nI sincerely hope that you will choose to attend the conference so that we can ensure that Europe once again enjoys peace and stability.\n\nVery truly yours,\n[SOV.GetLeader]."
 Yalta_Conference.1.A: "Of course! We will attend this conference!"
 
 Yalta_Conference.2.t: "The Soviets Invite Us to Yalta"
 Yalta_Conference.2.d: "Respected Prime Minister [ENG.GetLeader],\n\nFirst, let me congratulate you on your outstanding leadership of your country during this period of conflict with the German fascists. Such leadership was desperately needed for your country, and you have ensured that your country emerges from this war in a better position than it was before.\n\nSecond, in light of the current European war situation, with the German war machine gradually crumbling and the tide of the war turning in our favour, I would like to personally invite you to a conference in the lovely Soviet city of Yalta. We hope to discuss the fate of postwar Europe at this conference.\n\nThird, I would like to assure you that the Soviet Government intends to maintain friendly relations with the Western Powers even after the war. Many rumours of Soviet hostility are circulating, and I would like to ensure that these false accusations do not taint the conference discussions.\n\nI sincerely hope that you will choose to attend the conference so that we can ensure that Europe once again enjoys peace and stability.\n\nVery truly yours,\n[SOV.GetLeader]."
 Yalta_Conference.2.A: "Of course! We will attend this conference!"
 
 Yalta_Conference.3.t: "The Question of the French"
 Yalta_Conference.3.d: "One final, but critical, decision must be made before the Yalta conference. That decision is whether to invite France to the conference in addition to the United Kingdom and the United States.\n\nMany of our top diplomats and government officials urge us not to invite them because they do not see France as an equal or a country capable of ensuring world peace and stability in the postwar world, having been occupied by fascists for the majority of the war and lacking any military capabilities in comparison to the Soviet Union, the United Kingdom, or the United States.\n\nHowever, the French have suffered and bled a great deal under the fascist jackboot, but they have continued their fight in exile without losing hope or succumbing to despair. A few voices argue that they have more than earned a seat at the conference and the right to help build a stable postwar Europe."
 Yalta_Conference.3.A: "They are not important"
 Yalta_Conference.3.B: "Send the invitation."
 
 Yalta_Conference.4.t: "The Soviets Deny Us a Seat at Yalta"
 Yalta_Conference.4.d: "After years of suffering under the fascist jackboot, having our home ripped from us, our nation disgraced, and our people terrorised, our own allies have stabbed us in the back. While the United Kingdom, the United States, and the Soviet Union meet in Yalta to shape postwar Europe and re-establish Europe's nations, we have been sidelined and excluded. Even after all of our sacrifices, resistance, and losses against the fascists, it appears that our own allies do not regard us as trustworthy or important enough to have a seat at the table.\n\nApart from expressing our displeasure in a diplomatic statement, there is little we can do to combat this oppression. They can be certain, however, that the French people will remember this injustice and the fact that France has been denied a voice."
 Yalta_Conference.4.A: "Silenced by our own allies."

 Yalta_Conference.5.t: "The Soviets Invite Us to Yalta"
 Yalta_Conference.5.d: "We have finally been freed from the fascist threat that has plagued our country and its citizens for so long, but the time for rest is not yet here. The Soviet Union has invited us, along with the United Kingdom and the United States, to a conference in Yalta to ensure long-term postwar stability and peace. We will soon travel to Yalta to shape a postwar peace that represents a collective security order and to discuss the re-establishment of war-torn Europe's nations in order to give liberated peoples of Europe self-determination. With the defeat of fascism in Europe, we can finally start planning Germany's and Europe's postwar reorganisation."
 Yalta_Conference.5.A: "Pack your bags, we're off to Yalta!"

 Yalta_Conference.6.t: "The Yalta Conference Begins"
 Yalta_Conference.6.d: "[FROM.GetNewsIcon]President [USA.GetLeader] and Prime Minister [ENG.GetLeader] have decided to attend a conference in the Soviet city of Yalta, following a personal invitation from [SOV.GetLeader].\n\nAlthough official details of the conference have yet to be revealed, sources within the Allied Governments have hinted that it may decide the fate of post-war Europe. If these rumours are true, it would imply that the Allied leaders are confident of defeating Nazism and intend to reshape Europe in their image.\n\nThe news of the Conference's start has elicited a range of reactions from around the world. While some have labelled the Western powers \"hypocrites\" for \"striking a deal with one tyrant in order to defeat another\", others have referred to the conference as \"the first step toward re-establishing a peaceful and stable Europe\"\n\nIt is no secret that many people in the Western and Soviet governments despise each other. While the war with [GER.GetLeader] has brought both sides together for the time being, it remains to be seen whether this so-called friendship will last, and whether this conference will truly lead to a better future for Europeans..."
 Yalta_Conference.6.A: "Another blow to Nazi tyranny!"
 Yalta_Conference.6.B: "Who do they think they are to decide the fate of a continent?"
 Yalta_Conference.6.C: "Surely a historic moment."
 
 Yalta_Conference.7.t: "Proposing the Division"
 Yalta_Conference.7.d: "We have been given the opportunity to be the first of the nations to present our postwar plans for Europe, and especially for Germany.\n\nThe first plan, and the one that has received the most approval and support from our top diplomats, is to divide Germany into three postwar occupation zones: the US zone, the UK zone, and the Soviet zone. France will also be given an occupation zone carved out of the zones of the US and the UK.\n\nThe Morgenthau Plan calls for the abolition of Germany's arms industry, as well as the abolition or destruction of other key industries critical to military strength. Germany will be divided into two autonomous, independent states: South Germany, which will include Bavaria, Württemberg and Baden, and North Germany, which will include Prussia, Saxony and Thuringia. Finally, the Ruhr Area, the heart of German industrial power, will be transformed into an international zone governed by an international security organisation established by the United Nations, and all residents and their families with special skills or technical training will be encouraged to migrate permanently from the area.\n\nFinally, the Roosevelt Proposal includes the Balkanisation of Germany, which means that Germany will be divided into many smaller autonomous, independent regions and states in order to permanently eliminate the German threat to the world."
 Yalta_Conference.7.A: "Split Germany into occupation zones."
 Yalta_Conference.7.B: "The Morgenthau Plan."
 Yalta_Conference.7.C: "The Roosevelt Proposal."
 Yalta_Conference_WW3.tt: "§RThis option is not optimized for our WW3 mechanic. Choose at your own risk.§!"
 
 Yalta_Conference.8.t: "The American Proposal"
 Yalta_Conference.8.d.historical: "The time was nearing midnight. Prime Minister [ENG.GetLeader] was just settling into his Yalta residence when his aide informed him that the American President was waiting for him in the study. He couldn't see why the President would want to meet him at this hour. Nonetheless, he was intrigued.\n\n\"It's great to see you again, President [USA.GetLeader].\" As he sat beside the President, he smiled graciously. \"It's also good to see you, Prime Minister\" The smile was returned by the President.\n\"Given that it's nearly midnight, and given that we have to attend the conference tomorrow morning, I suppose we should skip the small talk and get right to the point\" [ENG.GetLeader] lit a cigarette.\n\"Of course. What do you make of the Soviet demands so far? I assume you're aware of the current situation in Eastern Europe\"\n\"Absolutely\"\n\"Germany will be the next item on their agenda. And I believe I have a solution to resolve this conflict peacefully\"\n\"Tell me\"\n\"We divide Germany in half. The Soviets get the east, and we get the rest\"\n\n[ENG.GetLeader]'s cigarette fell from his mouth. \"Are you suggesting, Mr. President, that we tear Germany apart?\"\n\"I... am,\" the President said, his voice heavy. \"It is the only way to meet Soviet demands without completely upsetting Europe's power balance\"\n\"But what about the German people? Surely they will not appreciate us destroying their country in this manner\"\n\"Well, they lost the war, Prime Minister, and they can't expect to be treated well after what they did\"\n\nAs terrible as the suggestion seemed, the President seemed to be making a point. Perhaps it really was the only way..."
 Yalta_Conference.8.d.morgenthau: "The Americans have presented their proposal for German reorganisation in front of the conference, and it is now up to us to decide whether we agree with it or want to present our own plan instead.\n\nThe American proposal calls for the abolition of Germany's arms industry, as well as the abolition or destruction of other key industries critical to military strength. Germany will be divided into two autonomous, independent states: South Germany, which will include Bavaria, Württemberg and Baden, and North Germany, which will include Prussia, Saxony and Thuringia. Finally, the Ruhr Area, the heart of German industrial power, will be transformed into an international zone governed by an international security organisation established by the United Nations, and all residents and their families with special skills or technical training will be encouraged to migrate permanently from the area.\n\nIf we agree on this proposal, the Soviets will get the chance to approve or deny this plan. Should they choose to accept it, the plan will be put into motion. If we object, we will have the opportunity to present our own plan for Germany's reorganisation."
 Yalta_Conference.8.d.roosevelt: "The Americans have presented their proposal for German reorganisation in front of the conference, and it is now up to us to decide whether we agree with it or want to present our own plan instead.\n\nThe American proposal calls for the the Balkanisation of Germany, which means that Germany will be divided into many smaller autonomous, independent regions and states in order to permanently eliminate the German threat to the world.\n\nIf we agree on this proposal, the Soviets will get the chance to approve or deny this plan. Should they choose to accept it, the plan will be put into motion. If we object, we will have the opportunity to present our own plan for Germany's reorganisation." 
 Yalta_Conference.8.A: "\"With a heavy heart, I shall support this proposal.\""
 Yalta_Conference.8.B: "Object and present our own plan."

 Yalta_Conference.9.t: "An Idea of Our Own"
 Yalta_Conference.9.d: "After objecting to the American proposal, it is now our turn to present to the conference a plan for reorganising Germany.\n\nThe first plan, and the one that has received the most approval and support from our top diplomats, is to divide Germany into three postwar occupation zones: the US zone, the UK zone, and the Soviet zone. France will also be given an occupation zone carved out of the zones of the US and the UK.\n\nChurchill's proposal calls for the formation of a Danube Confederation. The Confederation, also named Danubia or \"Churchill-Germany,\" would encompass all of southern Germany, including Bavaria, Baden, and Württemberg, as well as all of Austria and Hungary, and even Carpatho-Ukraine in the far east. The plan is to prevent Soviet encroachment on Central Europe by tying Hungary and Austria to the southern part of Germany, thereby creating a state large and western enough to limit Stalin's influence on its affairs.\n\nFinally, a variant of Churchill's proposal has gained some traction among diplomats, with the main difference being that Hungary will not join the Danube Confederation."
 Yalta_Conference.9.A: "Split Germany into occupation zones."
 Yalta_Conference.9.B: "The Churchill Plan"
 Yalta_Conference.9.C: "The Revised Churchill Plan"

 Yalta_Conference.10.t: "[ENG.GetLeader] Offers a Rebuttal"
 Yalta_Conference.10.d.historical: "After objecting to our proposal, the British have presented their own in front of the conference, and it is now up to us to decide whether we agree with it or not.\n\nThe British plan proposes to divide Germany into three postwar occupation zones: the US zone, the UK zone, and the Soviet zone. France will also be given an occupation zone carved out of the zones of the US and the UK.\n\nIf we agree on this proposal, the Soviets will get the chance to approve or deny this plan. Should they choose to accept it, the plan will be put into motion. If we object and no other plans are proposed, it appears that this conference is unable to reach a compromise."
 Yalta_Conference.10.d.churchill: "After objecting to our proposal, the British have presented their own in front of the conference, and it is now up to us to decide whether we agree with it or not.\n\nThe British plan proposes the formation of a Danube Confederation. The Confederation would encompass all of southern Germany, including Bavaria, Baden, and Württemberg, as well as all of Austria and Hungary, and even Carpatho-Ukraine in the far east. The plan is to prevent Soviet encroachment on Central Europe by tying Hungary and Austria to the southern part of Germany, thereby creating a state large and western enough to limit Stalin's influence on its affairs.\n\nIf we agree on this proposal, the Soviets will get the chance to approve or deny this plan. Should they choose to accept it, the plan will be put into motion. If we object and no other plans are proposed, it appears that this conference is unable to reach a compromise."
 Yalta_Conference.10.d.churchill_revised: "After objecting to our proposal, the British have presented their own in front of the conference, and it is now up to us to decide whether we agree with it or not.\n\nThe British plan proposes the formation of a Danube Confederation. The Confederation would encompass all of southern Germany, including Bavaria, Baden, and Württemberg, as well as all of Austria. The plan is to prevent Soviet encroachment on Central Europe by tying Austria to the southern part of Germany, thereby creating a state large and western enough to limit Stalin's influence on its affairs.\n\nIf we agree on this proposal, the Soviets will get the chance to approve or deny this plan. Should they choose to accept it, the plan will be put into motion. If we object and no other plans are proposed, it appears that this conference is unable to reach a compromise."
 Yalta_Conference.10.A: "Agree to the British proposal"
 Yalta_Conference.10.B: "Object to the proposal."

 Yalta_Conference.11.t: "Our Turn at the Table"
 Yalta_Conference.11.d: "After failed proposals from both the Americans and the British, it is finally our turn to present our vision for reorganising postwar Germany.\n\nThe first plan, and the one that has received the most approval and support from our top diplomats, is to divide Germany into three postwar occupation zones: the US zone, the UK zone, and the Soviet zone. France will also be given an occupation zone carved out of the zones of the US and the UK.\n\nThe Morgenthau Plan calls for the abolition of Germany's arms industry, as well as the abolition or destruction of other key industries critical to military strength. Germany will be divided into two autonomous, independent states: South Germany, which will include Bavaria, Württemberg and Baden, and North Germany, which will include Prussia, Saxony and Thuringia. Finally, the Ruhr Area, the heart of German industrial power, will be transformed into an international zone governed by an international security organisation established by the United Nations, and all residents and their families with special skills or technical training will be encouraged to migrate permanently from the area.\n\nFinally, the Monnet Plan proposes transferring control of the majority of Germany's civilian industry to France. France will occupy the Ruhr and Saar, and Austria will regain its independence, restoring its pre-war borders. Last but not least, Prussia will be divided between Poland and the Soviet Union."
 Yalta_Conference.11.A: "Split Germany into occupation zones."
 Yalta_Conference.11.B: "The Morgenthau Plan."
 Yalta_Conference.11.C: "The Monnet Plan."

 Yalta_Conference.12.t: "The French Revenge"
 Yalta_Conference.12.d.historical: "After both our and the British proposals failed to gain traction among conference attendees, the French have finally presented their own, and it is now up to us to decide whether we agree with it or not.\n\nThe French plan proposes to divide Germany into three postwar occupation zones: the US zone, the UK zone, and the Soviet zone. France will also be given an occupation zone carved out of the zones of the US and the UK.\n\nIf we agree on this proposal, the Soviets will get the chance to approve or deny this plan. Should they choose to accept it, the plan will be put into motion. If we object and no other plans are proposed, it appears that this conference is unable to reach a compromise."
 Yalta_Conference.12.d.morgenthau: "After both our and the British proposals failed to gain traction among conference attendees, the French have finally presented their own, and it is now up to us to decide whether we agree with it or not.\n\nThe French plan calls for the abolition of Germany's arms industry, as well as the abolition or destruction of other key industries critical to military strength. Germany will be divided into two autonomous, independent states: South Germany, which will include Bavaria, Württemberg and Baden, and North Germany, which will include Prussia, Saxony and Thuringia. Finally, the Ruhr Area, the heart of German industrial power, will be transformed into an international zone governed by an international security organisation established by the United Nations, and all residents and their families with special skills or technical training will be encouraged to migrate permanently from the area.\n\nIf we agree on this proposal, the Soviets will get the chance to approve or deny this plan. Should they choose to accept it, the plan will be put into motion. If we object and no other plans are proposed, it appears that this conference is unable to reach a compromise."
 Yalta_Conference.12.d.monnet: "After both our and the British proposals failed to gain traction among conference attendees, the French have finally presented their own, and it is now up to us to decide whether we agree with it or not.\n\nThe French plan proposes transferring control of the majority of Germany's civilian industry to France. France will occupy the Ruhr and Saar, and Austria will regain its independence, restoring its pre-war borders. Lastly, Prussia will be divided between Poland and the Soviet Union.\n\nIf we agree on this proposal, the Soviets will get the chance to approve or deny this plan. Should they choose to accept it, the plan will be put into motion. If we object and no other plans are proposed, it appears that this conference is unable to reach a compromise."
 Yalta_Conference.12.A: "Agree to the French proposal."
 Yalta_Conference.12.B: "Object to the proposal"
 
 Yalta_Conference.13.t: "The Western Proposal"
 Yalta_Conference.13.d.historical: "[SOV.GetLeader] tried his hardest to smile while waiting for the British and American anthems to end. After what seemed like an eternity, the dignitaries were allowed to take their seats at the negotiation table and begin the talks.\n\n[SOV.GetLeader] was well aware that the Westerners would reject his claims. He desired vengeance on the Germans and had made it clear to Western Powers' representatives that he would not accept any negotiations unless Germany was crushed to the ground. However, he had come to reconsider his position over time. Maybe he was too harsh. He'd understand if they thought it was outrageous.\n\nBut he had to stand firm in his assertions. If he conceded any ground, the capitalists would undoubtedly push him further back. In any case, his country had fared far worse than theirs. He had the body count to prove it. He took a deep breath as he saw President [USA.GetLeader] and Prime Minister [ENG.GetLeader] nod solemnly to each other.\n\n\"Premier [SOV.GetLeader], after considerable debate, Prime Minister [ENG.GetLeader] and I have decided to accept your claims\" the American President said with a deep sigh. He gave him a signed document. [SOV.GetLeader]'s shoulders relaxed. He couldn't believe it. He decided to look over the document.\n\nAs he read through it, it became clear that the Westerners had, indeed, conceded. All the document required now was his signature and the fate of Germany would be sealed.\n\nBut maybe he could push for more. He could argue that these concessions weren't good enough for the casualties his nation had taken. Maybe he could push for more.... or maybe he should be satisfied with what he had."
 Yalta_Conference.13.d.morgenthau: "After much deliberation and bickering, the Western powers have finally reached an agreement on Germany's postwar reorganisation plan, which has now been presented to us.\n\nThe Western Plan calls for the abolition of Germany's arms industry, as well as the abolition or destruction of other key industries critical to military strength. Germany will be divided into two autonomous, independent states: South Germany, which will include Bavaria, Württemberg and Baden, and North Germany, which will include Prussia, Saxony and Thuringia. Finally, the Ruhr Area, the heart of German industrial power, will be transformed into an international zone governed by an international security organisation established by the United Nations, and all residents and their families with special skills or technical training will be encouraged to migrate permanently from the area.\n\nIf we agree on this proposal, the plan will have received unanimous approval from the conference attendees and will be implemented as soon as possible. If we object, this conference appears to have failed to reach a compromise."
 Yalta_Conference.13.d.roosevelt: "After much deliberation and bickering, the Western powers have finally reached an agreement on Germany's postwar reorganisation plan, which has now been presented to us.\n\nThe Western Plan calls for the Balkanisation of Germany, which means that Germany will be divided into many smaller autonomous, independent regions and states in order to permanently eliminate the German threat to the world.\n\nIf we agree on this proposal, the plan will have received unanimous approval from the conference attendees and will be implemented as soon as possible. If we object, this conference appears to have failed to reach a compromise."
 Yalta_Conference.13.d.churchill: "After much deliberation and bickering, the Western powers have finally reached an agreement on Germany's postwar reorganisation plan, which has now been presented to us.\n\nThe Western Plan calls for the the formation of a Danube Confederation. The Confederation would encompass all of southern Germany, including Bavaria, Baden, and Württemberg, as well as all of Austria and Hungary, and even Carpatho-Ukraine in the far east.\n\nIf we agree on this proposal, the plan will have received unanimous approval from the conference attendees and will be implemented as soon as possible. If we object, this conference appears to have failed to reach a compromise."
 Yalta_Conference.13.d.churchill_revised: "After much deliberation and bickering, the Western powers have finally reached an agreement on Germany's postwar reorganisation plan, which has now been presented to us.\n\nThe Western Plan calls for the formation of a Danube Confederation. The Confederation would encompass all of southern Germany, including Bavaria, Baden, and Württemberg, as well as all of Austria.\n\nIf we agree on this proposal, the plan will have received unanimous approval from the conference attendees and will be implemented as soon as possible. If we object, this conference appears to have failed to reach a compromise."
 Yalta_Conference.13.d.monnet: "After much deliberation and bickering, the Western powers have finally reached an agreement on Germany's postwar reorganisation plan, which has now been presented to us.\n\nThe Western Plan proposes transferring control of the majority of Germany's civilian industry to France. France will occupy the Ruhr and Saar, and Austria will regain its independence, restoring its pre-war borders. Lastly, Prussia will be divided between Poland and the Soviet Union.\n\nIf we agree on this proposal, the plan will have received unanimous approval from the conference attendees and will be implemented as soon as possible. If we object, this conference appears to have failed to reach a compromise."
 Yalta_Conference.13.A: "Sign the agreement."
 Yalta_Conference.13.B: "The lost Soviet lives are worth more than this!"
 
 Yalta_Conference.14.t: "The Soviets Accept"
 Yalta_Conference.14.d: "American President [USA.GetLeader] could see the corners of Premier [SOV.GetLeader]'s mouth curl into a slight smile as he read the document they presented. He smiled as the Soviet leader read through every line of the file. He recognised that he was being paranoid.\n\nThe President, on the other hand, knew there was no reason to be concerned. The document contained statements signed by himself and Prime Minister [ENG.GetLeader] that gave [SOV.GetLeader] everything he desired and more. After much deliberation, they concluded that future Soviet cooperation and postwar peace in Europe were far more important than any petty territorial disputes. The President felt at ease, knowing that with [SOV.GetLeader] signing the document, most of Europe's potential conflicts would be resolved.\n\nThe British Prime Minister [ENG.GetLeader], on the other hand, was not so relieved. He was out of breath as he watched the Soviet leader read the document. No matter how hard he tried, his fingers kept fidgeting. The American President had coerced him into a deal that gave the Soviets unprecedented control over Eastern Europe, and he was now having second thoughts. Even though he knew there was no other way to keep European peace, he was uneasy about the proposal. Something deep within him hoped the Soviets would reject the proposal and demand more.\n\n"This is fantastic, honourable delegates. I will gladly sign the agreement on behalf of the Union of Soviet Socialist Republics." The words of [SOV.GetLeader] shattered any remaining hope in him. "And there it is..." he reflected."
 Yalta_Conference.14.A: "\"The fate of Europe has been sealed.\""
 
 Yalta_Conference.15.t: "The Yalta Conference Is a Success"
 Yalta_Conference.15.d: "[FROM.GetNewsIcon]In a historic moment, delegates from [ENG.GetNameDef], [USA.GetNameDef], and [SOV.GetNameDef] have concluded negotiations in Yalta and agreed on a concrete vision for Europe's future.\n\nWhen asked about the agreement, President [USA.GetLeader] stated, \"This agreement ensures European peace and stability for many years to come. It will serve as the foundation for rebuilding Europe after this heinous war\"\n\n\"We are very glad to have reached an agreement with the Soviets, and we look forward to cooperating with them for mutual development in the future\" said the British Prime Minister.\n\n\"After these years of brutal war, it will be greatly beneficial for the peoples of Europe to finally focus on redevelopment and growth, rather than destruction and conquest\", said Soviet Foreign Minister Vyacheslav Molotov.\n\nWhile the agreement's exact terms have not yet been made public, sources within the delegations claim that it grants the Soviet Union unrivalled control over Eastern Europe. It remains to be seen how the agreement will be implemented."
 Yalta_Conference.15.A: "Finally we will have world peace!"
 Yalta_Conference.15.B: "Nothing but a farce!"
 
 Yalta_Conference.16.t: "The Soviets Decline"
 Yalta_Conference.16.d: "As he watched Premier [SOV.GetLeader] read the document, President [USA.GetLeader] rubbed his hands under the table. More than the biting cold of the Yalta wind, the President was chilled by the Soviet leaders' reaction to the proposal. The Premier made no attempt to hide his dissatisfaction with the proposal. He rubbed his moustache, shook his head, and murmured, \"This won't do,\" throughout the reading.\n\n\"Respected delegates\" Premier [SOV.GetLeader] said after a while. \"The Soviet people do not believe that this settlement is fair in comparison to the suffering they endured and the efforts they made to defeat Germany. As a result, as their representative at this table, I must decline this offer.\"\n\nThe President responded, \"Premier [SOV.GetLeader], we have given you unprecedented control over Eastern Europe and Germany. Are you saying that half of Europe isn't enough for you\"\n\n\"Indeed,\" [SOV.GetLeader] said.\n\n\"Well, it appears that the negotiations have failed. We'll have to come back to this later\", said the British Prime Minister. He never had much faith in the debate in the first place, and he was opposed to giving the Soviets half of Europe as well.\n\nAs he stood up to leave the negotiating table, the President appeared defeated. He had no leverage with the Soviets relentlessly pursuing more control over Europe and his only ally at the table leaving. It was pointless to continue the negotiations."
 Yalta_Conference.16.A: "We will have to get back to this some other time."
 
 Yalta_Conference.17.t: "The Yalta Conference Is Inconclusive"
 Yalta_Conference.17.d: "[FROM.GetNewsIcon]After days of intense negotiations in Yalta, it appears that delegates from [ENG.GetNameDef], [USA.GetNameDef], and [SOV.GetNameDef] were unable to reach an agreement on the fate of postwar Europe.\n\nPresident [USA.GetLeader] of the United States stated, \"This was a tremendous effort to maintain peace and stability in postwar Europe. However, no such peace can be achieved as long as the Soviets refuse to compromise on their expansionist ideals\"\n\nAccording to Prime Minister [ENG.GetLeader], \"The Soviet leadership has repeatedly thwarted our attempts at peace. They will need to rethink their positions on certain issues and return to the negotiating table with a more open mind.\"\n\nVyacheslav Molotov, Soviet Foreign Minister, stated, \"The Soviet leadership felt that the offer was insufficient in comparison to the suffering we endured during the war. We have the right to ask for more. Millions of Soviet lives were lost in the war, and we will seek restitution\"\n\nWhile the West and the Soviets are locked in an ideological standoff, Nazi Germany is shrinking by the day. It is hoped that the Great Powers will reach an agreement before the war ends. In any case, for now, the fate of Europe remains to be seen."
 Yalta_Conference.17.A: "They have to put their differences aside."
 Yalta_Conference.17.B: "They cannot agree to save their own skins!"
 
 ### Capitulation
 GER_Capitulation.1.t: "Germany Surrenders Unconditionally"
 GER_Capitulation.1.d: "Today's joyful news came from the heart of tyranny. A battered German diplomat has arrived after multiple harsh rounds of peace talks, bringing word that [GER.GetLeader] has finally agreed to Germany's complete and unconditional surrender. It appears that our great efforts to rid the European continent of the greatest evil it has ever seen have paid off. Each man, woman, and child who died in this atrocious war has finally received justice today thanks to our strength of will. Our armies are currently stamping out the last Nazi resistance while we work to get this information to the press.\n\nThe mindless, soulless hordes of German soldiers whose sole purpose was to destroy have been destroyed themselves, and now we must face the reality of what we have left behind. Families have been torn apart, rural and urban communities are hurting more than ever before, and the world mourns. While the celebration will provide much-needed closure and morale to the families of all those who suffered under Nazi rule, we must never forget what we lost.\n\nWe are still trying to grasp the sheer number of deaths in Europe, but experts have already estimated that it is in the millions, potentially double the amount lost in the Great War. While today will be remembered as a great day for liberty and democracy, and a cause for celebration, the consequences of Germany's attacks will linger for decades."
 GER_Capitulation.1.A: "Another generation lost to the trenches."
 
 GER_Capitulation.2.t: "End of the War in Europe"
 GER_Capitulation.2.d: "[FROM.GetNewsIcon]Today, victorious Allied troops march through defeated Germany, bringing an end to the Second World War in Europe. Nazi soldiers have laid down their weapons and surrendered or fled the garrisons that now occupy every German city. The human cost of the war is almost unbearable in scale to behold, and the casualties are almost certainly higher than in the Great War. The atrocities committed against so many people are still being discovered, but reports of mass genocide and slave labour are common - but today, the European continent can finally breathe and grieve.\n\nFollowing a series of successful attacks on both fronts of the war, the German war machine collapsed; and while attempts were made to defend against Allied assaults and sign a peace treaty that did not require total surrender, the Allies would accept nothing less. For the time being, the old Reich's lands have been divided into occupation zones, and there is no word on Germany's official future plans. Regardless, massive celebrations have erupted across the continent, marking the end of Nazi rule. While undoubtedly mourning will ensue, Europe's worst appears to be behind it."
 GER_Capitulation.2.A: "Beyond the embers of bridges glowing behind us..."

 ### Operation Valkyrie
 GER_Operation_Valkyrie.1.t: "Stirrings in the Wehrmacht"
 GER_Operation_Valkyrie.1.d: "Everyone can see the insanity and madness of this war. No, not everyone, that's right. Only the entire Wehrmacht, the German Heer, a portion of the Kriegsmarine, and the vast majority of the millions of young soldiers sent to their deaths on the eastern front. Nobody in the inner circle, not Himmler and his SS, not Goering and his Luftwaffe, and certainly not the little corpor... Sorry, \"Führer of the Not-So-Great Germanic Reich\". No one in this entire corrupted and rotten government has even considered Germany's impending defeat.\n\nHowever, in response to this madness, the voices of some army heroes, war veterans, and other opponents of the NSDAP began to be heard. Notably, graf Claus von Stauffenberg and Oberleutnant Werner Karl von Haeften have expressed their displeasure with the regime in meetings with other old and new opponents of the Hitler regime... Only time will tell if their whispers will turn into screams."
 GER_Operation_Valkyrie.1.A: "Remind the Generals of their place."

 GER_Operation_Valkyrie.2.t: "The Conference"
 GER_Operation_Valkyrie.2.d: "\"I want to keep this meeting brief. Benito Mussolini is coming today, and I have to meet him to... assure him of our eternal friendship.\" These sarcastic words are delivered by none other than the Führer himself.\n\nAs he prepared to begin the conference, the mutilated Claus von Stauffenberg, the young graf and war hero, asked permission to leave for a few moments to answer an important call. Hitler notices after he leaves that he forgot his briefcase, which was misplaced under the meeting table. \"A great hero, and a mutilated son of the Reich, but scattered all the same. He should better organise his affairs. The German of the future is not a messy person,\" he thought, smiling slightly.\n\n\"I said it would be brief, so can you, Generalleutnant Heusinger...\""
 GER_Operation_Valkyrie.2.A: "Ja, mein Führ-\n§RBoom§!"

 GER_Operation_Valkyrie.3.t: "Valkyrie"
 GER_Operation_Valkyrie.3.d: "The Führer is no longer alive! Plotters have finally begun to move in some major cities. In the camps, the government is beginning to issue arrest warrants for the inner circle. They have even start calling for our forces on the Eastern Front to stop the fighting and, more importantly, to stop the butchery in Poland.\n\nBut, as the hours passed, a problem began to emerge in the eyes of the plot's high command: clearly, something bad had occurred. After a few calls, the officers have stopped to answer politely, arguing that they will only talk with \"the Führer or a high name of the government\".\n\nFinally, the truth is revealed: the little Austrian survived the explosion. This is also true for the vast majority of the men in the conference. Operation Walküre failed miserably due to poor organisation, incredible bad luck, and a reluctance to seize power.\n\nMay God assist us in the coming days..."
 GER_Operation_Valkyrie.3.A: "Verräter!"

 GER_Operation_Valkyrie.4.t: "Hitler Injured In Failed Coup; Operation Valkyrie Falls Flat"
 GER_Operation_Valkyrie.4.d: "[FROM.GetNewsIcon]A high-level conspiracy within the German military appears to have launched a bold attempt to assassinate Adolf Hitler and seize control of the government as enemy forces reach German territory. The conspirators called for an immediate armistice with the Western Allies, seeking to redirect the nation's remaining strength against the Red Army.\nThe plot, led by senior Wehrmacht officers including Colonel Claus von Stauffenberg and Generals Friedrich Olbricht, Erwin von Witzleben, and Ludwig Beck, involved a bomb placed at the Führer's Eastern Front headquarters. The device exploded, killing several officers, but Hitler survived with minor injuries.\n\nFollowing the detonation, the conspirators successfully activated \"Operation Valkyrie\", mobilizing reserve army units and taking control of key government offices in Berlin. Initial reports indicate that the coup briefly appeared to succeed, with the city under the control of the plotters and orders circulating to neutralize Nazi loyalists. However, once it became clear that Hitler had survived, the coup collapsed within hours.\n\nAll leading figures of the operation were arrested and executed. Scores of other officials involved were similarly tried and executed. While the attempt failed to remove the Führer, it demonstrates that opposition to the regime has now reached the highest ranks of the Wehrmacht."
 GER_Operation_Valkyrie.4.A: "Long live the Führer!"
 GER_Operation_Valkyrie.4.B: "A heroic attempt by honorable men."
 GER_Operation_Valkyrie.4.C: "Is this Hitler's \"Great Purge\"?"

 ### Der Untergang
 GER_Der_Untergang.1.t: "Enemy at the Gates"
 GER_Der_Untergang.1.d: "The war is over. They knew it when they began plotting against the insane Austrian. A failed artist. The German destroyer. Our country is now being invaded from all sides, by allies in the West, the Soviet Union in the East, and even by our own citizens in some cities, who now side with the enemies over the government.\n\nEveryone understands that the Reich is coming to an end. The conclusion of German history. Adolf Hitler and his last supporters, a few officers and Goebbels, have taken refuge in his bunker in the heart of the capital and begun to plan an escape. Fearing that Hitler will be killed when troops enter the capital, Goebbels has suggested fleeing to a friendly regime, perhaps Argentina.\n\nHitler, on the other hand, has always stated that he would prefer to die in Germany rather than flee it like a rat. As the sounds of battles, guns, and tanks approach the capital, we must make a decision quickly, or we will never have another chance."
 GER_Der_Untergang.1.A: "Goebbels is right. As long as we live, the war is not over."
 GER_Der_Untergang.1.B: "The war is lost. I fall with the Reich."

 GER_Der_Untergang.2.t: "Takeoff and Landing"
 GER_Der_Untergang.2.d: "\"We'll be ready in a few minutes, Mein Führer!\" The pilot is in his early twenties, far too young to be here. How did he avoid being mobilised on the eastern front? In any case, he's the only pilot we were able to find in the few hours we have had, the only one insane enough to fly in the direction of the Allied offensive.\n\nThey took off in the direction of Stuttgart before flying to Spain, the only accessible land at the time. Hitler and Goebbels have agreed, and they will greeted by sympathizers. Perhaps the old generals and soldiers will join them in exile in a few months or years? And, if Spain isn't enough, the exiles will spread in every direction, to Argentina, Turkey, and Brazil, wherever they can find allies!\n\n\"Gott! They're aiming at us...\" The impact of a shell, precisely fired at the heart of the left engine, shakes the entire plane. The few passengers, all from the Wehrmacht's inner circle and high ranks, all heard the characteristic sound of crushed metal under impact."
 GER_Der_Untergang.2.A: "As the Führer looked up, the earth came to meet him."

 GER_Der_Untergang.3.t: "A Prison of Flesh"
 GER_Der_Untergang.3.d: "\"Tim, I believe I've discovered something here!\" Timothy responds quickly to Jimmy's call. \"What did you discover, Jim? \"Would you like to add another Iron Cross to your collection?\" \"Look at it for yourself, brother.\" Those sounds... They communicate in English. As he begins to awaken, he attempts to locate his gun! He takes a look around. Nobody survived the crash among the five passengers. It has to have been the pilot. He should have had him arrested the moment he saw him. A young man conveniently not mobilized and at the right place in the right time? He was obviously a part of the plot, which was orchestrated by-\n\n\"Hey, Jim, it appears that they are all dead here.\" \"My God, this one looks like their propaganda minister!\" \"Goebbels?\" Do they realise he's here? It does not appear so. He must take the gun; it is preferable to kill himself with a bullet than to be arrested by some Judeo-Capitalist Americans. But as the sound of their voices approached his seat, the horrible truth began to dawn on him."
 GER_Der_Untergang.3.A: "Prisoner of his own flesh, Adolf Hitler howls with rage."

 GER_Der_Untergang.4.t: "Hitler Captured Alive!"
 GER_Der_Untergang.4.d: "[FROM.GetNewsIcon]A few hours ago, two American soldiers inspecting a crashed German plane discovered a wounded but alive Hitler inside, attempting to flee Germany. The Führer's plane was shot down near Stuttgart, killing the few passengers, all of whom were members of the inner circle or SS.\n\nThe crash appears to have severely harmed Europe's conqueror. His neck is paralysed, he can't move his right arms, and he appears to have lost his mind, stuttering and rambling about nonsensical things and being unresponsive when talked to. The allied and Soviet powers have all agreed that this will have no effect on his case. Hitler and other high German officials will be tried and sentenced very soon.\n\nThis marks the end of Europe's conqueror, and maybe even the end of the Reich itself."
 GER_Der_Untergang.4.A: "He's lucky we didn't catch him!"
 GER_Der_Untergang.4.B: "A trial will show the world the truth."
 GER_Der_Untergang.4.C: "This changes nothing. We will never surrender!"
 GER_Der_Untergang.4.D: "We are losing the war, and we are losing it fast!"
 GER_Der_Untergang.4.E: "The end of the war, or the seeds for another one?"

 GER_Der_Untergang.5.t: "Das Ende"
 GER_Der_Untergang.5.d: "It's the end of the Reich. The armies of the enemy nations have surrounded the capital. The last members of the German government have no way out. Despite his achievements, he believes he could have won the war. After all, they are Germans, the superior race, aren't they?\n\nEvery minute, every second of his brief nights, he was awakened by the roar of cannons and firearms. He now has only one way out. As the end of Germany approached, he thought to himself, \"After all, why not?\" and decided to marry Eva Braun in a final ceremony. The last woman he stayed with.\n\nIt is now time for the wedding meal. At the very least, this last one will be fantastic. He grabs Goebbels' arm before sitting down to eat. He expresses gratitude for his years of devotion. The doctor, overcome by emotion, shed a few tears. After dinner, he draws his gun and inserts a cyanide capsule deep into his jaw."
 GER_Der_Untergang.5.A: "Auf Wiedersehen Eva, meine geliebte Frau."

 GER_Der_Untergang.6.t: "The Death of Hitler"
 GER_Der_Untergang.6.d: "[FROM.GetNewsIcon]News agencies today relay a broadcast from German radio announcing the death of Adolf Hitler. According to the statement, delivered from Hamburg, the Führer remained in Berlin until the end and \"fell at his command post, fighting to his last breath against Bolshevism.\" The announcement further declared that Hitler had appointed Grand Admiral Karl Dönitz as his successor, entrusting him with the leadership of the Reich.\n\nThe broadcast offered no evidence, and many observers note that the claim appears intended to portray Hitler as a fallen hero. With no independent confirmation of his fate, speculation ranges from suicide to escape toward Bavaria or even abroad. In Berlin, heavy fighting has continued around the ruins of the city, though scattered reports suggest that German resistance is faltering rapidly.\n\nIn Flensburg, Reichspräsident Dönitz has announced the formation of a new government, with Joseph Goebbels slated to assume the role of Reichskanzler. Yet its authority is doubtful, limited to scattered holdouts and a few surviving military units. Analysts believe the regime may attempt to negotiate with the Western Allies while prolonging resistance against the Soviets, though few expect it to endure long."
 GER_Der_Untergang.6.A: "As long as we keep fighting, the war is not over."
 GER_Der_Untergang.6.B: "We will destroy every last fascist, purging Germany forever!"
 GER_Der_Untergang.6.C: "He may have escaped his trial, but the others will be judged!"
 GER_Der_Untergang.6.D: "Their downfall will not affect our pursuit of the new order."
 GER_Der_Untergang.6.E: "Is this finally the war to end all wars?"

 GER_Der_Untergang.7.t: "Der Letzte Schritt"
 GER_Der_Untergang.7.d: "The silence after the Führer's death weighs heavily. Goebbels, the ever-loyal servant, knows there is nothing left to fight for, nothing left to believe in. He walks the dark corridors with Magda at his side, her face pale but resolved. The walls echo with the distant thunder of artillery, like a funeral march for the Reich itself.\n\nTheir children sleep soundly, unaware of the decision already made for them. Magda cannot bear the thought of them growing up in a world without National Socialism, without their \"Uncle Adolf.\" One by one, she administers the poison, whispering soothing words as their small hands go limp.\n\nThe minister stands for a long time at the foot of the bed, tears running silently down his face. Then, with the deed done, he clasps Magda's hand. Together they walk to the garden, the same place their Führer left this world the day before. He looks back only once, muttering a final prayer of loyalty.\n\nThere is no hesitation. The cyanide capsule shatters, and in an instant the last voice of the Reich is silenced forever."
 GER_Der_Untergang.7.A: "The loyal servant follows his master into death."

 ### Denazification
 GER_Denazification.1.t: "Denazification"
 GER_Denazification.1.d: "[FROM.GetNewsIcon]In the offices where once portraits of the Führer hung, new seals are being pressed onto fresh paper. The walls are bare now, the old emblems stripped away, the slogans painted over. Men in plain suits sit where uniforms once dominated, speaking not of destiny, but of rationing, housing, and rebuilding.\n\nAcross the land, the old order is quietly dismantled. Teachers begin new lessons under watchful eyes, factories reopen under new names, and those who once served the Party now keep their heads low or disappear into the countryside. In the marketplaces, people speak cautiously again, not of victory or vengeance, but of surviving another winter.\n\nNo one speaks of the Reich anymore. The word itself has grown heavy, like a stone best left unturned. New officials, some chosen, some appointed, sign decrees that renounce what was lost: the borders, the ambitions, the myths. Germany, as it once was, no longer exists, and yet, in this uncertain dawn, something different begins to take its place.\n\nA clerk folds the new documents, stamps them with an unfamiliar emblem, and sets them aside. Outside, church bells ring across a ruined city. The world moves on."
 GER_Denazification.1.A: "A dark chapter closed."

 # Other
 Victory_In_Europe_Day: "The war has been won in §YEurope§!."
 Victory_Over_Japan_Day: "The war has been won in §YAsia§!."