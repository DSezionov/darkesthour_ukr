 FRA_1936_Election.1.t: "SFIO and PCF Protest against the Fascists!"
 FRA_1936_Election.1.d: "[FROM.GetNewsIcon]Paris is in uproar again, less than a week after Daladier's resignation, with thousands of people taking to the streets, and police officers are desperately trying to keep the peace. However, the crowds are not the same as they were a few days ago, as red banners and three-arrow flags flail in the wind outside the Chamber of Deputies. Anarchists, communists, and socialists have joined forces in a massive protest in Paris, united in their opposition to the fascist leagues that had rallied there just days before, and general strikes are being called by labour unions. Communists and socialists are more united than ever in their opposition to fascism.\n\nMany protesters were seen holding signs calling for leftist unity and chanting anti-fascist slogans, with some even throwing rocks at alleged pro-fascist officials and bystanders, referring to them as brownshirts and thugs. A large group of protestors began singing L'Internationale on one occasion.\n\nMany on the left see these counter protests as noble, but they are not without violence: nine people have been killed in clashes with police so far. Since the Stavisky affair, the mood in the country has become increasingly polarised, but tensions have boiled over in the last week. Some people even believe that civil war or another revolution is a real possibility."
 FRA_1936_Election.1.A: "Ils ne passeront pas!"

 FRA_1936_Election.2.t: "Thorez Calls for Left-Wing Unity!"
 FRA_1936_Election.2.d: "[FROM.GetNewsIcon]In the aftermath of the February 6th crisis, Maurice Thorez, the leader of the Parti Communiste Français, issued a call for unity to all left-wing parties and organisations. The French left is notoriously divided between various factions, but Thorez hopes to change that.\n\nThere have long been efforts and desires in France to unite the left, particularly since the country was hit by the Great Depression several years ago. With the rise of right-wing authoritarian governments in Austria, Italy, and, most recently, Germany, many Frenchmen on the left are becoming increasingly concerned that their own country will descend into fascism. The February 6th riots appear to have been the final straw, as support for a coalition of leftist parties has since risen. If Léon Blum agrees, the SFIO and PCF will likely merge in the coming weeks."
 FRA_1936_Election.2.A: "À bas le fascisme!"

 FRA_1936_Election.3.t: "Blum forms an alliance with Thorez!"
 FRA_1936_Election.3.d: "[FROM.GetNewsIcon]Léon Blum, the leader of the SFIO, has formally announced a merger between the SFIO and the PCF, uniting socialists and communists in France in opposition to fascism. The merger comes after a tumultuous few weeks in French politics, which saw multiple riots on both the left and right wings, over a dozen deaths, and fears of a pro-fascist coup d'etat.\n\nThe Front Populaire, a literal popular front against the conservative heavyweights, will be the identity of the new party. The Front Populaire currently controls slightly more than a third of the national assembly, but various other left-wing and liberal parties are considering joining. Opinions from Action Française and other right-wing parties are split, ranging from the proclamation that the other parties are conspiring against the French people, to pointing out this merger as so-called proof that parliamentarianism is deeply flawed.\n\nRegardless, the coalition now stands as the largest political party in France, and will likely grow in the coming weeks"
 FRA_1936_Election.3.A: "Tout est possible!"

 FRA_1936_Election.4.t: "RAD joins the Rassemblement Populaire!"
 FRA_1936_Election.4.d: "[FROM.GetNewsIcon]After years of internal conflict and electoral decline, the Radical Party has taken a decisive turn. The RAD's leadership, after years of balancing left and right, has finally moved towards a formal alliance with the SFIO's socialists and, by extension, the PCF's communists via the Rassemblement Populaire.\n\nFor years, Édouard Herriot defied Daladier and the reformist Jeunes Turcs, who urged the party to be revitalised through collaboration with the left. However, the experience of the Union Nationale, in which the RAD was marginalised and frequently humiliated by conservative forces, left a bad taste. The 1935 municipal elections demonstrated a clear lesson: working with the SFIO produced electoral results. The old balancing act had failed, and the party can not afford further stagnation.\n\nNow that the RAD has formally joined the Rassemblement Populaire, the alliance has gained significant political clout. The inclusion of the Radicals provides the left with a broad republican front and a plausible path to national power. What began as a temporary electoral pact has evolved into a unified political force known as the Front Populaire."
 FRA_1936_Election.4.A: "The left will be victorious!"

 FRA_1936_Election.5.t: "Peaceful Demonstration of the Front Populaire"
 FRA_1936_Election.5.d: "[FROM.GetNewsIcon]On July 14, thousands of people took to the streets across France in a peaceful but powerful demonstration of unity. For the first time, members and supporters of the three major left-wing parties, the Radicals, the SFIO, and the Communists, marched together for a common cause. The date was not chosen on accident. On the anniversary of the French Revolution, the Front Populaire wanted to demonstrate that their alliance shares the same values: liberty, equality, and solidarity. People carried red flags and sang republican songs.\n\nAfter years of division and struggle, it appears that the left has finally found unity. Spirits are high, and especially in working-class neighbourhoods, there is a strong sense that things will finally improve. The Front Populaire has demonstrated that it can bring people together."
 FRA_1936_Election.5.A: "And such demonstrations will continue!"



 FRA_1936_Election_Results.1.t: "Election Day!" #Front Populaire won
 FRA_1936_Election_Results.1.d: "[FROM.GetNewsIcon]The members of the Popular Front coalition, walks into the camber of deputies with a grin on their faces, paralleled by the crabbed faces of the National Bloc coalition members.\n\nThe Election was a great success for the Popular front as a whole, they now occupy a majority seats within the camber of deputies, much to the dissatisfaction of the National Bloc, with many of the members of the right claim the election result signifies a degenerative trend of France, and that the Popular Front is a secret scheme by the Soviet Union to infiltrate French society. Yet the fact stands: the Popular Front has received more votes than the National Bloc.\n\nDespite the outlook of a Popular front success, its coalition’s composition has demonstrated an increase of popular votes toward the Communist Party from workers in French cities, which has lead to them gaining a significant amount of seats within the Chamber of Deputies."
 FRA_1936_Election_Results.1.A: "Democracy in motion? Or a slide towards communism?"

 FRA_1936_Election_Results.3.t: "Formation of the Government"
 FRA_1936_Election_Results.3.d: "As the Popular Front settles into its new headquarters in Paris, a new and rather large question has arisen. We've been asked if we plan to bring the Communist Party of France into government. From its inception in 1920 until very recently, the PCF has denounced the reformist platform of the majority of the French Left and labelled us as social fascists. However, it appears that the rise of Germany and the fall of Moscow-backed communist parties around the world has finally woken them up to reality.\n\nToday they are a member of the Popular Front and there are several reasons why certain government officials advocate for us to invite them into the government. They are genuinely popular among the radical left, as befits a revolutionary leftist party, and Moscow's support gives them, and us, if we side with them, a path into negotiations to box in Germany. They are, at least officially, on the same political path as we are. By appealing to them, the government could gain a sizable base of support.\n\nHowever, allowing the Communists in would pose additional risks. The Communists remain extremely radical, and allowing them into government would push our government even further to the left. We were elected with a majority in France, but not a supermajority. There are fears that if we allow them to drag us too far to the left, the right will use parliamentary or extralegal means to overthrow us. Not only that, but the PCF, as a Moscow organ, is subject to their whims."
 FRA_1936_Election_Results.3.A: "Invite the PCF into the Government"
 FRA_1936_Election_Results.3.B: "The PCF will only remain a support for the government"

 FRA_1936_Election_Results.4.t: "Formation of the government"
 FRA_1936_Election_Results.4.d: ""
 FRA_1936_Election_Results.4.A: "The ON will only remain a support for the government"
 FRA_1936_Election_Results.4.B: "Invite the ON into the government"

