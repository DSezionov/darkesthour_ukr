 Treaty_of_Danzig.1.t: "The Treaty of Danzig"
 Treaty_of_Danzig.1.d: "When we first got news of the coup in Berlin we were amazed, but also fearful about what this new government would want. We were again caught off guard when we received an urgent notice from the Germans looking for peace terms. The war everybody had expected to go on for years, was now over in a fraction of the time. Of course we agreed to talk at once. The Germans are hosting the talks in Danzig, the sight of the issue that started this whole war in the first place. As Allied leaders pat each other on the back for winning a war they never really had to fight, their delegates converge on Danzig to get the actual work of peace done.\n\nThere are many issues to decide. What to do with the Nazis, what to do about the lands already seized by Hitler like Austria and Czechoslovakia and Poland, and what would the Allies want to do with Germany itself since it is in serious breach of the Treaty of Versailles. The Oster government wants leniency but many delegates, particularly the French delegation, want Germany to pay for their flagrant disregard for international law. The British on the other hand want peace above all else and are willing to go easy on Germany if it maintains peace on the Continent."
 Treaty_of_Danzig.1.A: "Back to where it all began"

 Treaty_of_Danzig.2.t: "The Fate of Austria"
 Treaty_of_Danzig.2.d: "Austria was the first country that Hitler conquered. The Nazis were able to orchestrate a referendum that validated an already-in-progress takeover by a combination of coercion, intimidation, and deceit. Since then, the Nazis have intimidated the public and implemented their heinous racial laws in Austria, doing all in their power to destroy the concept of Austria as a state. Austria was always seen by the Nazis as a creation of Versailles, destined to be an essential component of any German state. Because of this, the Treaty specifically forbade them from uniting.\n\nWe have the option of making the Germans split off Austria once more now that they are seated at the negotiating table. Some contend that since they were the first victims of fascism, it's only logical that we should. However, prior to Anschluss, unity was favoured in Austria. In the final free election held prior to the Austro-fascist takeover, pro-unification parties received more than 60% of the vote. However, some people continue to object to Austria remaining a part of Germany. As a compromise, these individuals have proposed that Austria become a part of a South German state rather than the entirety of Germany."
 Treaty_of_Danzig.2.A: "They have suffered enough under Berlin’s jackboot."
 Treaty_of_Danzig.2.B: "Austria is German, whether we like it or not."

 Treaty_of_Danzig.3.t: "The Treaty of Danzig"
 Treaty_of_Danzig.3.d: "[FROM.GetNewsIcon]The Treaty of Danzig was officially ratified today in Danzig, according to a joint statement from the German and Allied governments. The conflict is essentially finished, even if the signing ceremony won't take place for another month while copies are manufactured, the ceremony is arranged, and the delegations get ready.\n\nDemobilization instructions are already being drafted by France and Germany as ecstatic Allies get set to return home, grateful to be alive. German troops are also content since, although being as eager as anybody to march to glory, private grumblings inside the ranks were what ultimately inspired the coup that brought about the current peace. Of course, there have been some qualms because some problems haven't been settled.\n\nHowever, there is little concern that a new conflict is imminent because the current treaty's ink hasn't even dried yet. The world is eager to put an end to the War of [Root.GetYear] as Europe resumes its pre-war routine of calm."
 Treaty_of_Danzig.3.A: "Peace has returned"

 Treaty_of_Munich.1.t: "The Treaty of Munich"
 Treaty_of_Munich.1.d: "Today is a momentous day. For the second time in three decades the Germans came at us. They marched their horrid legions over the border and raped and pillaged our lands. They sought domination not only over us, but over all of Europe. In the last war we rose to the challenge and through oceans of blood, sweat and tears we threw back the dastardly Hun. However, the cowards threw in the towel before we could truly bring to them the horrors of war. That left us unable to exact our long overdue vengeance upon them.\n\nNow however, our soldiers march through the Brandenburg Gate. The Nazi leadership is dead, on the run, or in prison cells. Germania, which has caused our kind so much hardship for millennia, now lays broken and defeated under our feet. Some urge caution, they say that vengeance will only bring about more bloodshed down the line. What they fail to realize is that now that we have the Germans in our grasp we will make sure that Germany will never again be able to threaten us or Europe as a whole. Those who make war shall finally suffer the consequences."
 Treaty_of_Munich.1.A: "Germania delenda est"

 Treaty_of_Munich.2.t: "German Unity"
 Treaty_of_Munich.2.d: "The most pressing question facing us now is what to do with Germany. One camp says we should keep them united. They point out that while Germany is a beast, its a beaten one. We have destroyed it so thoroughly that to beat it some more would not only be cruel, but actively dangerous. In the ruins of war, only Communism thrives. These men say that should we break up Germany it's inevitable that the Bolshevik poison would spread its tendrils into Central Europe until its right on our doorstep. They figure a beaten democratic Germany would be more able to resist these pressures than a dozen smaller states would.\n\nOn the other hand, its keenly pointed out that a united Germany has been nothing but a destabilizing influence on European order. Not only did Germany unify through warfare and bloodshed, but intentionally did so. They say, and not without reason, that leaving Germany united would only bring about a new war once they rebuild. This view has been criticized for speculation but their point does ring home to some people. To leave Germany in one piece could be political suicide."
 Treaty_of_Munich.2.A: "Germany will be split in two, with a North and South German Confederation "
 Treaty_of_Munich.2.B: "Germany will stay united"

 Treaty_of_Munich.3.t: "The Fate of Austria"
 Treaty_of_Munich.3.d: "Austria was the first country that Hitler conquered. The Nazis were able to orchestrate a referendum that validated an already-in-progress takeover by a combination of coercion, intimidation, and deceit. Since then, the Nazis have intimidated the public and implemented their heinous racial laws in Austria, doing all in their power to destroy the concept of Austria as a state. Austria was always seen by the Nazis as a creation of Versailles, destined to be an essential component of any German state. Because of this, the Treaty specifically forbade them from uniting.\n\nWe have the option of making the Germans split off Austria once more now that they are seated at the negotiating table. *There is no way for the Germans to resist us with our soldiers on their soil.* Some contend that since they were the first victims of fascism, it's only logical that we should. However, prior to Anschluss, unity was favoured in Austria. In the final free election held prior to the Austro-fascist takeover, pro-unification parties received more than 60% of the vote.\n\nHowever, some people continue to object to Austria remaining a part of Germany. They claim its being too nice to a conquered foe. As a compromise, these individuals have proposed that Austria become a part of a South German state rather than the entirety of Germany."
 Treaty_of_Munich.3.A: "They have suffered enough under Berlin’s jackboot."
 Treaty_of_Munich.3.B: "Austria will be part of the South German Confederation"
 Treaty_of_Munich.3.C: "Austria is German, whether we like it or not."

 Treaty_of_Munich.4.t: "The Treaty of Munich"
 Treaty_of_Munich.4.d: "[FROM.GetNewsIcon]The German delegation grudgingly signed a deal with the Allies today in Munich. The German-initiated conflict has once more resulted in their loss. But unlike the previous conflict, this one ended in catastrophe as well as loss. While the Kaiser managed to prevent an invasion, the Nazis were less fortunate; as a result, Allied soldiers are now parading through German cities, and Allied diplomats are free to treat the defeated country however they choose. The nation has been defeated, and their ruling class is imprisoned. Many high ranking Nazis who didn't commit suicide or run away are being incarcerated by the Allies for crimes against peace, among a variety of other offenses. According to the Allies, their legal destiny will be decided by the courts at a later time in a different trial.\n\nMany in the Allied camp desired that Germany pay for its transgressions. To teach the Germans a lesson they won't soon forget, they requested a complete, thorough dismantlement. Despite the Treaty's clauses being kept a secret, it is now obvious whose side they supported. Now its up to the Germans to rebuild, if they even can."
 Treaty_of_Munich.4.A: "Will Germany ever recover from this?"

