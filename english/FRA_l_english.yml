 FRA_The_Third_Republic: "The Third Republic"
 FRA_The_Third_Republic_desc: "It is no secret that the third republic is on the brink of collapse.\nYears of political instability, the constant bickering in the parliament and the rise of extremist, anti-democratic ideologies like Fascism and Communism, have deeply shaken the trust of the general populace in the democratic values on which the Republic was founded. This combined with the recent economic crisis has led to an unprecedented amount of Frenchmen being pushed towards extremism. While the situation so far is still stable, with only an occasional strike or riot disturbing the peace.\nThe pressure inside France is increasing and it's almost a certainty that the Republic will not survive unless something is done to fix the problems plaguing France."

 FRA_The_Third_Republic_2: "The Third Republic"
 FRA_The_Third_Republic_2_desc: "It is no secret that the third republic is on the brink of collapse.\nYears of political instability, the constant bickering in the parliament and the rise of extremist, anti-democratic ideologies like Fascism and Communism, have deeply shaken the trust of the general populace in the democratic values on which the Republic was founded. This combined with the recent economic crisis has led to an unprecedented amount of Frenchmen being pushed towards extremism. While the situation so far is still stable, with only an occasional strike or riot disturbing the peace.\nThe pressure inside France is increasing and it's almost a certainty that the Republic will not survive unless something is done to fix the problems plaguing France."

 FRA_Renaissance_Republicaine: "Republican Revival"
 FRA_Renaissance_Republicaine_desc: "With Gaston Doumergue's determined efforts to restore order and meaningfully reform the government, the French Republic has undergone a much-needed transformation. Doumergue has stabilised the state apparatus by consolidating parliamentary factions, promoting capable technocrats, and reaffirming republican principles without the chaos of endless coalition politics. As a result, the people now have faith in the Republic's future, and the government operates with renewed confidence and clarity. Though challenges persist, France is no longer paralysed by indecision and political bureaucracy; she is once again a republic worth defending."

 FRA_Renaissance_Republicaine_2: "Republican Revival"
 FRA_Renaissance_Republicaine_2_desc: "With Gaston Doumergue's determined efforts to restore order and meaningfully reform the government, the French Republic has undergone a much-needed transformation. Doumergue has stabilised the state apparatus by consolidating parliamentary factions, promoting capable technocrats, and reaffirming republican principles without the chaos of endless coalition politics. As a result, the people now have faith in the Republic's future, and the government operates with renewed confidence and clarity. Though challenges persist, France is no longer paralysed by indecision and political bureaucracy; she is once again a republic worth defending."

 FRA_Renaissance_Republicaine_3: "Republican Revival"
 FRA_Renaissance_Republicaine_3_desc: "With Gaston Doumergue's determined efforts to restore order and meaningfully reform the government, the French Republic has undergone a much-needed transformation. Doumergue has stabilised the state apparatus by consolidating parliamentary factions, promoting capable technocrats, and reaffirming republican principles without the chaos of endless coalition politics. As a result, the people now have faith in the Republic's future, and the government operates with renewed confidence and clarity. Though challenges persist, France is no longer paralysed by indecision and political bureaucracy; she is once again a republic worth defending."

 FRA_Scars_of_the_Great_War: "Scars of the Great War "
 FRA_Scars_of_the_Great_War_desc: "Hardly any feeling has been so prevalent throughout French society in the wake of the November 1918 armistice as the desire to resume pre-war life. This, however, was doomed to prove illusory, so massive was the death toll of the conflict.\n\nThe human cost of the Great War proved particularly high for France. While military mobilisation resulted in the raising of more than 8 million men, casualties totaled 1.4 million, about 3.5% of the pre-war population, with the population further weakened by missing births. This proportion, unrivalled among West-European belligerents, explains the ghostly presence of the war that pervades French society nowadays.\n\nBut even these grimly impressive figures fail to capture the numerical significance of the bereaved. Taking into account those who are mourning a son, a brother, or a member of their close relationship circle, it is the case that French society as a whole is a mourning society."

 FRA_Full_Economic_Power: "Full Economic Power"
 FRA_Full_Economic_Power_desc: "Under the Third Republic, the President of France has broad decree powers, particularly in matters of the national economy and government intervention or projects in it. This means that, with a clear economic vision, the President does not need to go through parliament to pass new economic laws, and his projects will not be stymied by legislative opposition or parliamentary bureaucracy. This allows for much more efficient economic planning, particularly during times of global economic depression, because the President and his cabinet can pass and enact most economic laws almost immediately."

 FRA_Les_5_Glorieuses: "Les Cinq Glorieuses"
 FRA_Les_5_Glorieuses_desc: "France is now experiencing renewed prosperity following the Great Depression. The country has managed to pull itself back from the brink of ruin thanks to quick economic planning and major government reforms: the state is now more efficient than ever, unemployment is very low, and the state is no longer running a massive deficit. Indeed, the people must rejoice: prosperity has followed the depression, enhancing the lives of all French men and women."

 FRA_Milices_Fascistes: "Fascist Militias"
 FRA_Milices_Fascistes_desc: "The growing popularity of fascism and far-right ideologies in the country has led many adherents to those ideals to form their own militias, conducting parades, street brawls, demonstrations, and general political disorder, while calling for the end of France's parliamentary system and the dissolution of leftist parties within parliament. These gangs have been largely reduced in popularity, activity, and exposure, but they remain a threat to national stability, and their size could grow exponentially if something drives more people to the far right."

 FRA_Defender_of_the_Republic: "Defender of the Republic"
 FRA_Defender_of_the_Republic_desc: "The French left, from all ends, is now united under SFIO, the French Section of the Workers' International. The differences between the leftist parties have been bridged, with competing goals temporarily set aside for the sake of the country. The leftist political chaos that has gripped France for so long appears to be coming to an end, and with a united front, these parties present themselves as the protectors of French democracy - the true defenders of the Republic and the ideals for which it stands against both internal and external threats. The left is now a stronger political force than before, with the potential to completely dominate government and parliament if elections go their way."

 FRA_The_Era_of_Aces: "The Era of Aces"
 FRA_The_Era_of_Aces_desc: "France has always been at the forefront of aviation progress, with many famous pioneers, which has led to early interest in aircraft by the military. At the start of the Great War, France led the world in terms of aircraft design. Following massive expansion and aerial successes throughout the Great War, the Aéronautique Militaire had some 3,222 front-line combat aircraft on the Western Front, making it the world's largest air force. France today stands at the forefront of military aviation and has many skilled pilots and aces to show for it.\n\nIn March 1910, the Établissement Militaire d'Aviation was created to conduct experiments with aircraft and in October 1910 the Aéronautique Militaire was formed as a branch of the Army. Since then, prominent and leading figures in the aviation scene have called for the establishment of a new, independent branch of the armed forces for the air force."
 
 FRA_The_Armee_de_lAir: "L'Armee de l'Air"
 FRA_The_Armee_de_lAir_desc: "France has always been at the forefront of aviation progress, with many famous pioneers, which has led to early interest in aircraft by the military. At the start of the Great War, France led the world in terms of aircraft design. Following massive expansion and aerial successes throughout the Great War, the Aéronautique Militaire had some 3,222 front-line combat aircraft on the Western Front, making it the world's largest air force. France today stands at the forefront of military aviation and has many skilled pilots and aces to show for it."

 FRA_On_ne_Passe_Pas_Idea: "On Ne Passe Pas!"
 FRA_On_ne_Passe_Pas_Idea_desc: "During the 1920s, the nature of fixed defences was debated, with supporters of offensive fortifications, deep or shallow defences, and centralised and decentralised designs. The Pétain system of large and elaborately fortified defences from Metz to Thionville and Longwy, at Lauter and Belfort on the north-east frontier, with covered infantry positions between the main fortifications was adopted and named the Maginot Line. Furthermore, our military leaders developed a doctrine that emphasises firepower, defence strength, and methodical battle.\n\nThe majority of the French General Staff agrees that France's defence should be based on a static defence along the Franco-German border, reinforced by the Maginot Line. Most people dismiss the idea of leading an attack into Germany, and some call it insanity. After all, everyone wants to avoid a repeat of the Great War's calamity."

 FRA_Static_Warfare: "Static Warfare"
 FRA_Static_Warfare_desc: "Our support for and adoption of Maurice Gamelin's ideas for war planning and military organisation has resulted in the adoption of a rigid defensive warfare doctrine, relying on the Maginot line and attritional warfare to wear down the enemy. This is consistent with our old Great War doctrine, which successfully repelled the Germans and is supported by much of the older general staff."

 FRA_Static_Warfare_2: "Static Warfare"
 FRA_Static_Warfare_2_desc: "Our support for and adoption of Maurice Gamelin's ideas for war planning and military organisation has resulted in the adoption of a rigid defensive warfare doctrine, relying on the Maginot line and attritional warfare to wear down the enemy. This is consistent with our old Great War doctrine, which successfully repelled the Germans and is supported by much of the older general staff."

 FRA_Static_Warfare_3: "Static Warfare"
 FRA_Static_Warfare_3_desc: "Our support for and adoption of Maurice Gamelin's ideas for war planning and military organisation has resulted in the adoption of a rigid defensive warfare doctrine, relying on the Maginot line and attritional warfare to wear down the enemy. This is consistent with our old Great War doctrine, which successfully repelled the Germans and is supported by much of the older general staff."

 FRA_Gamelin_Strategy: "Gamelin's Strategy"
 FRA_Gamelin_Strategy_desc: ""

 FRA_Gamelin_Strategy_2: "Gamelin's Strategy"
 FRA_Gamelin_Strategy_2_desc: ""

 FRA_Spirit_of_Verdun: "Spirit of Verdun"
 FRA_Spirit_of_Verdun_desc: ""

 FRA_Old_Guard_Opposition: "Old Guard Opposition"
 FRA_Old_Guard_Opposition_desc: "Our decision to abandon the army's traditional static defensive doctrine in favour of a more mobile and offensively focused military force has sparked strong opposition from traditionalist members of the general staff. It is not uncommon for this Old Guard to stymie or outright block modernisation and military reforms, thwarting our efforts at comprehensive military reform and full implementation of our desired doctrine."

 FRA_Armee_de_Metier: "Armee de Metier"
 FRA_Armee_de_Metier_desc: "Under Charles de Gaulle's leadership, the French Army is being reorganised from a massive, conscript-based, infantry-reliant force to a smaller, professional, and mechanised army. As part of this reform, de Gaulle reduced the role of conscription and the number of conscripts drawn annually in favour of increasing volunteer recruitment and the pool of career soldiers, resulting in a reduction in the armed forces."

 FRA_Armee_de_Metier_2: "Armee de Metier"
 FRA_Armee_de_Metier_2_desc: "Under Charles de Gaulle's leadership, the French Army is being reorganised from a massive, conscript-based, infantry-reliant force to a smaller, professional, and mechanised army. As part of this reform, de Gaulle reduced the role of conscription and the number of conscripts drawn annually in favour of increasing volunteer recruitment and the pool of career soldiers, resulting in a reduction in the armed forces."

 FRA_Armee_de_Metier_3: "Armee de Metier"
 FRA_Armee_de_Metier_3_desc: "Under Charles de Gaulle's leadership, the French Army is being reorganised from a massive, conscript-based, infantry-reliant force to a smaller, professional, and mechanised army. As part of this reform, de Gaulle reduced the role of conscription and the number of conscripts drawn annually in favour of increasing volunteer recruitment and the pool of career soldiers, resulting in a reduction in the armed forces."

 FRA_lighting_war_theory: "Guerre Eclair Theory"
 FRA_lighting_war_theory_desc: "The Guerre Eclair theory, advocated by Charles de Gaulle, calls for the concentration of large amounts of armour and aircraft to launch a series of rapid surprise attacks to overwhelm and demoralise the enemy, allowing for the piercing of his lines and the opening of large gaps. This theory, while new, appears promising, and the French Army, under de Gaulle's supervision, has begun to be remodelled in its image, with a focus on greater development and concentration of tanks and aircraft, shifting away from the reliance on the vast, conscript-infantry-based force of the Great War."

 FRA_lighting_war_theory_2: "Guerre Eclair Theory"
 FRA_lighting_war_theory_2_desc: "The Guerre Eclair theory, advocated by Charles de Gaulle, calls for the concentration of large amounts of armour and aircraft to launch a series of rapid surprise attacks to overwhelm and demoralise the enemy, allowing for the piercing of his lines and the opening of large gaps. This theory, while new, appears promising, and the French Army, under de Gaulle's supervision, has begun to be remodelled in its image, with a focus on greater development and concentration of tanks and aircraft, shifting away from the reliance on the vast, conscript-infantry-based force of the Great War."

 FRA_lighting_war_theory_3: "Guerre Eclair Theory"
 FRA_lighting_war_theory_3_desc: "The Guerre Eclair theory, advocated by Charles de Gaulle, calls for the concentration of large amounts of armour and aircraft to launch a series of rapid surprise attacks to overwhelm and demoralise the enemy, allowing for the piercing of his lines and the opening of large gaps. This theory, while new, appears promising, and the French Army, under de Gaulle's supervision, has begun to be remodelled in its image, with a focus on greater development and concentration of tanks and aircraft, shifting away from the reliance on the vast, conscript-infantry-based force of the Great War."

 FRA_Army_Modernization: "Army Modernization"
 FRA_Army_Modernization_desc: "Following the Great War, the French Army had deteriorated and softened in peacetime. It fell far behind the rest of Europe in modernising and upgrading its military, particularly communications technology. No more. A number of reforms have been implemented to modernise various aspects of the military, including the transition to radios as the primary mode of communication in order to phase out messengers, as well as ongoing efforts to modernise and upgrade logistics and soldier and officer training."

 FRA_Haute_Instit_Strategy: "Haut Institut à la Stratégie Militaire"
 FRA_Haute_Instit_Strategy_desc: "France has established a new higher officer school, led by Henri Mordacq, to teach aspiring generals strategy and tactics, as well as to contribute to the development of French military doctrine. The 'High Institute for Military Strategy' is staffed with France's brightest military minds, teaching a new generation of general officers who will inherit command of the army and will serve as a testament to France's fine soldiering traditions, as well as be able to effectively command large units in times of war, while also developing new military tactics, theories, and doctrines."

 FRA_Citoyen_Soldat: "Citizen-Soldier"
 FRA_Citoyen_Soldat_desc: "The Great War demonstrated the importance of having large manpower reserves - millions of men trained to fight and defend the homeland against invaders. However, these men only received training and combat experience after being conscripted. If France is to win its next survival struggle, it needs a citizenry that is fully prepared to fight: French men will serve as both citizens and soldiers. The average Frenchman is now better prepared for war than ever before, thanks to a massive expansion of paramilitary formations and training, as well as an increase in conscription. Even though he has not served in the military, he understands how to shoot and fight."

 FRA_Citoyen_Soldat_2: "Citizen-Soldier"
 FRA_Citoyen_Soldat_2_desc: "The Great War demonstrated the importance of having large manpower reserves - millions of men trained to fight and defend the homeland against invaders. However, these men only received training and combat experience after being conscripted. If France is to win its next survival struggle, it needs a citizenry that is fully prepared to fight: French men will serve as both citizens and soldiers. The average Frenchman is now better prepared for war than ever before, thanks to a massive expansion of paramilitary formations and training, as well as an increase in conscription. Even though he has not served in the military, he understands how to shoot and fight."

 FRA_Total_War_Tenet: "War of Annihilation"
 FRA_Total_War_Tenet_desc: "The resurgent German state poses a significant threat to France, raising the prospect of a second great war - another invasion and years of slaughter. To defeat the enemy, there should be no restrictions on the use of weaponry or warfare tactics. Poison gas, unrestricted submarine warfare, destruction of civilian targets, and elimination of enemy noncombatants and wounded are all legitimate ways to win the war for France. We must not limit our ability to cause maximum damage to the enemy because of some fanciful notions of civilised warfare. War exists to annihilate: until one side is completely broken and shattered, by any means necessary, there will be no peace."

 FRA_Total_War_Tenet_2: "Guerre Total"
 FRA_Total_War_Tenet_2_desc: "Henri Mordacq advocates Total War, a theory that would take the effort to win a war to a new level. In the event of a war, conscription will be increased to almost unimaginable levels, all resources will be dedicated to the war effort and the supply of the army and military industry, military operations will take place all over the world, and enemy non-combatants and their property will be considered fully legitimate targets. The entire nation must be mobilised to wage war across the globe, with the goal of shattering, breaking, and defeating the enemy to the point where he can no longer resist, both on his own territory and elsewhere."

 FRA_Production_Step_Up: "Production Step Up"
 FRA_Production_Step_Up_desc: ""

 FRA_Redirected_Military_Budget: "Redirected Military Budget"
 FRA_Redirected_Military_Budget_desc: "Germany's current rearmament program, which clearly violates the Treaty of Versailles, poses a significant threat to France, particularly with an angry dictator spewing anti-allied rhetoric in Berlin. In the years of peace that have followed the Great War, France's army has become rather lax: its weapons, tanks, aircraft, and training standards are not up to par with more modern forces. We have thus begun immediate investment in our weapons development, with the goal of outperforming the Germans and maintaining dominance on land, air, and sea, thereby preventing other nations from gaining technological superiority."

 FRA_Rearmament_Program_1: "Rearmament Program - Low Effort"
 FRA_Rearmament_Program_1_desc: "Germany's current rearmament program, which clearly violates the Treaty of Versailles, poses a significant threat to France, particularly with an angry dictator spewing anti-allied rhetoric in Berlin. In the years of peace that have followed the Great War, France's army has become rather lax: its weapons, tanks, aircraft, and training standards are not up to par with more modern forces. We have thus begun immediate investment in our weapons development, with the goal of outperforming the Germans and maintaining dominance on land, air, and sea, thereby preventing other nations from gaining technological superiority."

 FRA_Rearmament_Program_2: "Rearmament Program - Medium Effort"
 FRA_Rearmament_Program_2_desc: "Germany's current rearmament program, which clearly violates the Treaty of Versailles, poses a significant threat to France, particularly with an angry dictator spewing anti-allied rhetoric in Berlin. In the years of peace that have followed the Great War, France's army has become rather lax: its weapons, tanks, aircraft, and training standards are not up to par with more modern forces. We have thus begun immediate investment in our weapons development, with the goal of outperforming the Germans and maintaining dominance on land, air, and sea, thereby preventing other nations from gaining technological superiority."

 FRA_Rearmament_Program_3: "Rearmament Program - High Effort"
 FRA_Rearmament_Program_3_desc: "Germany's current rearmament program, which clearly violates the Treaty of Versailles, poses a significant threat to France, particularly with an angry dictator spewing anti-allied rhetoric in Berlin. In the years of peace that have followed the Great War, France's army has become rather lax: its weapons, tanks, aircraft, and training standards are not up to par with more modern forces. We have thus begun immediate investment in our weapons development, with the goal of outperforming the Germans and maintaining dominance on land, air, and sea, thereby preventing other nations from gaining technological superiority."

 FRA_La_Republique_Autoritaire: "The Authoritarian Republic"
 FRA_La_Republique_Autoritaire_desc: "Due to rising global tensions, with war seemingly on the horizon, and the deteriorating economic situation, the Chamber of Deputies has reluctantly granted Prime Minister Édouard Daladier widely expanded decree powers, allowing him to bypass parliament and expedite the implementation of a wide range of policies. This has pushed France closer to authoritarianism, ending parliamentary supremacy and significantly strengthening the Prime Minister's office. Although critics argue that this policy hampers democracy, the Prime Minister can quickly implement large and far-reaching economic reforms and policy changes, allowing for a faster response to crises and greater stability."

 FRA_La_France_au_Travail: "La France au Travail"
 FRA_La_France_au_Travail_desc: "The former Popular Front government implemented numerous policies that increased workers' welfare, benefits, and rights, such as instituting a 40-hour workweek. Although they have made the lower classes happy, they come at an exorbitant price. Business costs are skyrocketing, exacerbated by difficult economic times, workers are becoming sluggish, and the German menace prepares to strike in the east. France must be put back to work and socialist policies repealed. The economy will only be fixed if the burden on business is reduced rather than increased, and there will be no economy if the German jackboot marches through Paris."

 FRA_French_Internment_Camps: "French Internment Camps"
 FRA_French_Internment_Camps_desc: "Faced with internal instability, a fascist threat in Spain, and growing concern about German infiltration, the French government has established a system of internment camps to detain individuals deemed potential threats to national security. While the system purports to target enemy agents and political extremists, it disproportionately affects Spanish Republican refugees, German émigrés, suspected communists, and foreign nationals without a clear legal process. Many camps are overcrowded, and escape attempts are common. Many, particularly on the left, claim that it restricts civil liberties, while others argue that it is an absolute necessity in dangerous times like these."

 FRA_Repeupler_la_France: "Repopulate France"

 FRA_La_Coloniale: "La Coloniale"
 FRA_La_Coloniale_desc: "We have a vast colonial empire at our disposal, which not only provides us with resources, but also with additional men to fight our wars. The Armée coloniale offers us potentially millions of soldiers to conscript into our army. As a result, despite having a smaller population than Germany, we can raise an army greater and larger than Germany could ever muster."
 FRA_La_Coloniale_2: "La Coloniale"
 FRA_La_Coloniale_2_desc: "We have a vast colonial empire at our disposal, which not only provides us with resources, but also with additional men to fight our wars. The Armée coloniale offers us potentially millions of soldiers to conscript into our army. As a result, despite having a smaller population than Germany, we can raise an army greater and larger than Germany could ever muster."

 FRA_Strikes: "Strikes"
 FRA_Strikes_desc: "Following economic stagnation and rising political tensions, France has experienced a nationwide wave of worker strikes. Millions of industrial and service workers have gone on strike, demanding wage increases, better working conditions, job security, and recognition of their collective voice. Many strikes take the form of sit-ins and factory occupations, posing a threat to the organization's growth. The strike wave is not centrally coordinated, but rather spreads quickly through local union networks, fuelled by decades of frustration and emboldened by the growing power of leftist political forces."

 FRA_Strikes_2: "Crippling Strikes"
 FRA_Strikes_2_desc: "Following economic stagnation and rising political tensions, France has experienced a nationwide wave of worker strikes. Millions of industrial and service workers have gone on strike, demanding wage increases, better working conditions, job security, and recognition of their collective voice. Many strikes take the form of sit-ins and factory occupations, posing a threat to the organization's growth. The strike wave is not centrally coordinated, but rather spreads quickly through local union networks, fuelled by decades of frustration and emboldened by the growing power of leftist political forces."

 FRA_Matignon_Accord: "Matignon's Accord"
 FRA_Matignon_Accord_desc: "In response to the 1936 mass strike wave, negotiations between French employers, union leaders, and government representatives resulted in the signing of the Matignon Agreement, which grants significant concessions to striking workers and establishes many worker rights. Employers must now negotiate with unions about wages and working conditions. Workers are given the freedom to organise without fear of repercussions. Furthermore, the implementation of a 40-hour workweek, paid holidays, and wage increases in major industries are guaranteed. Although the strikes have ended and workers' rights have progressed significantly, the burden on businesses and industries has increased."

 FRA_La_Nouvelle_Armee: "The New Army"
 FRA_La_Nouvelle_Armee_desc: "France has taken the next step in military modernisation by establishing a separate air force, l'Armée de l'Air. This new branch fits well into France's modernisation doctrine and, according to many, represents a significant step towards an independent air force.  This institutional shift has sparked excitement among young officers and engineers eager to challenge outdated doctrines and try out bold new tactics. Air academies, aviation schools, and research bureaus have begun to gain influence and ambition, laying the groundwork for a future based on speed, altitude, and air superiority."

 FRA_Aviation_dAttaque: "Aviation d'Attaque"
 FRA_Aviation_dAttaque_desc: "With the separation of air command from the land army, France has adopted a doctrine centred on the independent and offensive use of air power. The air force is no longer limited to reconnaissance and battlefield support; it now plans and executes its own strategic operations, striking deep behind enemy lines to cripple supply lines, disrupt mobilisation, and demoralise the enemy before their infantry can arrive. This concept has energised military reformers and accelerated the development of specialised ground-attack aircraft and precision bombing techniques. However, conservative army commanders have objected to this evolution, citing the diminished role of traditional artillery and ground coordination."

 FRA_Aviation_dAttaque_2: "Aviation d'Attaque"
 FRA_Aviation_dAttaque_2_desc: "With the separation of air command from the land army, France has adopted a doctrine centred on the independent and offensive use of air power. The air force is no longer limited to reconnaissance and battlefield support; it now plans and executes its own strategic operations, striking deep behind enemy lines to cripple supply lines, disrupt mobilisation, and demoralise the enemy before their infantry can arrive. This concept has energised military reformers and accelerated the development of specialised ground-attack aircraft and precision bombing techniques. However, conservative army commanders have objected to this evolution, citing the diminished role of traditional artillery and ground coordination."

 FRA_Aviation_de_Cooperation: "Aviation de Coopération"
 FRA_Aviation_de_Cooperation_desc: "We have decided on a doctrine of cooperation between the air force and the land army. This doctrine, championed by conservative General Staff members, maintains the air force's firmly integrated position within the command structure of the land army, emphasising close cooperation and direct support for ground operations over independent strategic action. The Aviation de Coopération specialises in reconnaissance, battlefield air cover, and close air support missions that improve infantry and artillery effectiveness. This approach promotes command unity and tactical cohesion, ensuring that air assets are closely coordinated with ground forces' movements. However, it restricts the air force's autonomy and strategic potential, frequently relegating it to reactive roles and more defensive doctrine rather than bold offensive missions."

 FRA_Aviation_de_Cooperation_2: "Aviation de Coopération"
 FRA_Aviation_de_Cooperation_2_desc: "We have decided on a doctrine of cooperation between the air force and the land army. This doctrine, championed by conservative General Staff members, maintains the air force's firmly integrated position within the command structure of the land army, emphasising close cooperation and direct support for ground operations over independent strategic action. The Aviation de Coopération specialises in reconnaissance, battlefield air cover, and close air support missions that improve infantry and artillery effectiveness. This approach promotes command unity and tactical cohesion, ensuring that air assets are closely coordinated with ground forces' movements. However, it restricts the air force's autonomy and strategic potential, frequently relegating it to reactive roles and more defensive doctrine rather than bold offensive missions."

 FRA_Le_CIP: "Le CIP"
 FRA_Le_CIP_desc: "The Centre d'Instruction au Parachutisme is the first school in France, if not the world, responsible for training military paratroopers from the four components of the French army. Elite forces and seasoned Generals alike will be educated and trained in the effective deployment and coordination of airborne divisions. These new elite airborne divisions will be deployed into combat zones, establish an airhead to bring in larger forces and provide logistical support for operational areas. This will allow a sizeable amount of our forces to appear behind enemy lines without having to break through them."

 FRA_idea_Urgent_Equipment_growth_plan: "Urgent Equipment Growth Plan"
 FRA_idea_Urgent_Equipment_growth_plan_desc: "Alarmed by Germany's rapid military buildup and the prospect of another continental war, we have launched an emergency program to dramatically increase aircraft production and modernise our aerial arsenal. The Plan d'Expansion Matérielle Urgente is a last-ditch effort that includes government subsidies, redirected industrial output, and collaboration with private aviation firms to increase output at any cost. This initiative has boosted factory output, created new airframe contracts, and invested heavily in modern fighters and bombers."

 FRA_Multitude_of_Aircraft_Manufacturers: "Multitude of Aircraft Manufacturers"
 FRA_Multitude_of_Aircraft_Manufacturers_desc: "Designing and manufacturing aircraft in France presents two challenges. On the one hand, engineers are accustomed to designing high-performance aircraft without regard for manufacturing conditions. On the other hand, it is common for a model to undergo potential changes in its design and manufacturing conditions between the time it was designed and the time it left the factory and afterwards.\n\nSmall changes are tested in this trial-and-error design before they are possibly adopted. Due to the rapid evolution of aeronautical technology, a high-performance aircraft may be downgraded or even become obsolete by the time it is put into service, as the process typically takes 4 to 7 years. This means that engineers must deal with changing military demands, technological advancement, and mass production requirements.\n\nThis outdated process results in a scarcity of high-performance aircraft, and it must be overhauled or replaced as soon as possible with a modern and fast alternative."

 FRA_Strike_in_the_aeronautical_sector: "Strike in the aeronautical sector"
 
 FRA_Beast_of_the_Ocean: "Beast of the Ocean"
 FRA_La_Jeune_Ecole: "The Young School"
 FRA_La_Jeune_Ecole_desc: "The Jeune École is a strategic naval concept developed by French naval theorists in the nineteenth century. It advocates the use of small, heavily armed ships to combat larger battleships, as well as the use of commerce raiders to cripple the rival nation's trade. Originally developed to counter the larger British Royal Navy's strength, this concept has gained widespread acceptance as it has been further developed and experimented with."
 FRA_La_Royale: "La Royale"
 FRA_La_Royale_desc: "Despite the limitations imposed by the 1922 Washington Naval Treaty, the Navy has significantly modernised and expanded since the Great War. The heavy and fast Fantasque class "super-destroyers," the Richelieu-class battleships, and "Surcouf", the largest and most powerful submarine of its day were all new additions. Today, it appears that our glory days have passed us by. While we still have a formidable naval force, technological advancements in other countries such as the United Kingdom and Italy have left us in the dust."
 FRA_Revolutionary_Naval_Development: "Revolutionary Naval Development"

 FRA_La_Der_des_Ders: "La Der des Ders"
 FRA_La_Der_des_Ders_desc: "In a democracy, a government does not wage war against the will of its people. On both sides of the political spectrum, the public opinion is deeply pacifist. The right have become pacifists by hatred and fear of communism. The left is anti-fascist but remains marked by the horrors of war. Our people regard the prospect of the return of the unbearable sufferings they have experienced in the trenches with horror. Our veterans have not forgotten what they saw and experienced in the Great War.\n\nThe Third Republic is exhausted. We are isolated, public opinion is passionately anti-war and our military leaders are alarmist. Should France find itself in an offensive war, the consequences could be disastrous."
 FRA_La_Der_des_Ders_2: "La Der des Ders"
 FRA_La_Der_des_Ders_2_desc: "In a democracy, a government does not wage war against the will of its people. On both sides of the political spectrum, the public opinion is deeply pacifist. The right have become pacifists by hatred and fear of communism. The left is anti-fascist but remains marked by the horrors of war. Our people regard the prospect of the return of the unbearable sufferings they have experienced in the trenches with horror. Our veterans have not forgotten what they saw and experienced in the Great War.\n\nThe Third Republic is exhausted. We are isolated, public opinion is passionately anti-war and our military leaders are alarmist. Should France find itself in an offensive war, the consequences could be disastrous."
 FRA_La_Der_des_Ders_3: "La Der des Ders"
 FRA_La_Der_des_Ders_3_desc: "In a democracy, a government does not wage war against the will of its people. On both sides of the political spectrum, the public opinion is deeply pacifist. The right have become pacifists by hatred and fear of communism. The left is anti-fascist but remains marked by the horrors of war. Our people regard the prospect of the return of the unbearable sufferings they have experienced in the trenches with horror. Our veterans have not forgotten what they saw and experienced in the Great War.\n\nThe Third Republic is exhausted. We are isolated, public opinion is passionately anti-war and our military leaders are alarmist. Should France find itself in an offensive war, the consequences could be disastrous."

 FRA_The_Saar_Offensive_spirit: "The Saar Offensive"
 FRA_The_Saar_Offensive_spirit_desc: "Although the high command is hesitant to launch a direct invasion of Germany in order to avoid repeating the bloodbath of the Great War, French troops have been ordered to move into the Saarland as a show of commitment to our allies, a warning to the Germans, and a way to test the Siegfried Line's defences and the possibility of a larger campaign into the Rhineland. Some consider this offensive a folly, while others see it as a stepping stone to a larger invasion."

 FRA_The_Phoney_War: "The Phoney War"
 FRA_The_Phoney_War_desc: "With French forces withdrawing from the Saarland following an ineffective offensive, Western Europe has returned to relative calm. French divisions have been rushed to the Maginot line, which has been heavily reinforced, but we have made no offensive attempts against Germany, and the Germans have not yet attempted to move against us, with the majority of military action on either side consisting of sporadic shelling or minor bombing. The French Army will now be solely responsible for manning defences along the Maginot Line and entering and protecting Belgium in the event of a German invasion."

 FRA_La_Debacle: "La Débacle"
 FRA_La_Debacle_desc: "Following the devastating breakthrough in the north, the German Army has ripped through our defences with astonishing speed. Entire divisions have been encircled or disintegrated, refugees clog the roads alongside retreating soldiers, command structures are collapsing, ammunition is running low, and communications are down. What was once unthinkable is now inevitable: France is collapsing. This is La Débâcle, not just defeat, but disintegration. Morale is at rock bottom, troops desert or surrender in despair, and cities fall without a fight. Political leaders debate in bunkers and rail cars as the Wehrmacht closes in on Paris."

 FRA_La_Patrie_en_Danger_idea: "La Patrie en Danger"
 FRA_La_Patrie_en_Danger_idea_desc: "La Patrie en Danger, first declared during the Revolution of 1792, urged all citizens to rise in defence of the French Republic against Europe's monarchs. The cry 'the homeland is in danger' has echoed through France's bloodiest moments: the trenches of the Great War, the ruins of Verdun, and now, as the country faces annihilation by a foreign invader. It is a rallying cry etched in the national soul. It proclaims that France must fight not just to survive, but also to uphold her ideals of liberty, equality, and unity. In the darkest hours, when the enemy is at the gates and defeat seems inevitable, French citizens must give their all to save their homeland."
 FRA_La_Patrie_en_Danger_2: "La Patrie en Danger"
 FRA_La_Patrie_en_Danger_2_desc: "La Patrie en Danger, first declared during the Revolution of 1792, urged all citizens to rise in defence of the French Republic against Europe's monarchs. The cry 'the homeland is in danger' has echoed through France's bloodiest moments: the trenches of the Great War, the ruins of Verdun, and now, as the country faces annihilation by a foreign invader. It is a rallying cry etched in the national soul. It proclaims that France must fight not just to survive, but also to uphold her ideals of liberty, equality, and unity. In the darkest hours, when the enemy is at the gates and defeat seems inevitable, French citizens must give their all to save their homeland."
 FRA_La_Patrie_en_Danger_3: "La Patrie en Danger"
 FRA_La_Patrie_en_Danger_3_desc: "La Patrie en Danger, first declared during the Revolution of 1792, urged all citizens to rise in defence of the French Republic against Europe's monarchs. The cry 'the homeland is in danger' has echoed through France's bloodiest moments: the trenches of the Great War, the ruins of Verdun, and now, as the country faces annihilation by a foreign invader. It is a rallying cry etched in the national soul. It proclaims that France must fight not just to survive, but also to uphold her ideals of liberty, equality, and unity. In the darkest hours, when the enemy is at the gates and defeat seems inevitable, French citizens must give their all to save their homeland."
 FRA_La_Patrie_en_Danger_4: "La Patrie en Danger"
 FRA_La_Patrie_en_Danger_4_desc: "La Patrie en Danger, first declared during the Revolution of 1792, urged all citizens to rise in defence of the French Republic against Europe's monarchs. The cry 'the homeland is in danger' has echoed through France's bloodiest moments: the trenches of the Great War, the ruins of Verdun, and now, as the country faces annihilation by a foreign invader. It is a rallying cry etched in the national soul. It proclaims that France must fight not just to survive, but also to uphold her ideals of liberty, equality, and unity. In the darkest hours, when the enemy is at the gates and defeat seems inevitable, French citizens must give their all to save their homeland."

 FRA_Plan_Mandel_idea: "Plan Mandel"
 FRA_Plan_Mandel_idea_desc: "Georges Mandel spearheads the Plan Mandel, which aims to bring hundreds of thousands of skilled and unskilled workers from France's colonial territories to help with the war effort against the enemy. The sheer number of these workers enables repairs and construction on a scale never seen before, with railroads, bridges, factories, and other infrastructure seemingly revitalised in an instant. There are some disadvantages, however, as many of France's more prejudiced citizens do not favour or trust the new colonial arrivals, and working conditions are far from ideal."

 FRA_IAAC: "The IAAC"
 FRA_IAAC_desc: "Recognising the critical role airpower plays in modern warfare, the Allied powers established the Inter-Allied Air Command, a centralised command structure that unifies planning, logistics, and operations across national air forces. The IAAC enables coordinated strategic bombing campaigns, shared reconnaissance, and streamlined supply chains between airbases in Britain, North Africa, and even Asia. This command, which includes representatives from all participating air forces, ensures that no theatre is left unsupported, that air missions are carried out with precision and cohesion, and that intelligence sharing and logistical cooperation are maintained."

 FRA_Inter_Allied_Production_Support: "Inter-Allied Production Support"
 FRA_Inter_Allied_Production_Support_desc: "To prepare for the possibility of large-scale continental warfare, Allied planners have begun to consolidate industrial resources into a single production effort. At the heart of this initiative is the French Hotchkiss H39, a dependable light tank chosen as the standard platform for joint manufacturing across Allied nations. By sharing blueprints, tooling expertise, and production capacity, the Allies hope to mass-produce the H39 in multiple factories across friendly countries. The end result is a more efficient supply chain, simpler logistics, and a ready-made armoured force for future coordinated offensives."

 FRA_National_Office_of_Industry_idea: "The National Office of Industry"
 FRA_National_Office_of_Industry_idea_desc: "The National Office of Industry was established to modernise and coordinate France's fragmented industrial base, and it now serves as the central planning authority for wartime economic mobilisation. This institution maps the entire national economy, directs labour allocation, and ensures that key industries receive resources based on strategic priorities. The office hopes to avoid bottlenecks, eliminate redundancy, and dramatically increase output during crises by organising sectors ranging from armaments to transport under a single planning framework."

 FRA_The_GQG_2: "The GQG"
 FRA_The_GQG_2_desc: "The Grand Quartier Général is the French Army's high command, in charge of coordinating strategic operations, logistics, and defence planning. The GQG remains the nerve centre of the French military machine, in charge of army group deployment, front-line intelligence, and long-term defence posture. The GQG is divided into two cliques: older, more conservative officers who favour rigid defence and improvements to the Maginot Line, and younger, more reformist officers who want to experiment with manoeuvre warfare, combined-arms doctrine, and implement broad changes. Nonetheless, regardless of which faction is in control, all military matters pass through the GQG."


##########################################
## Return of Hatay
##########################################
 FRA_Hatay_Issue.1.t: "The Hatay Issue"
 FRA_Hatay_Issue.1.d: "For some time now, Turkey has been attempting to gain control over the province of Hatay, which has been owned by our mandate in Syria, and have also been lobbying the League of Nations. While there has been much discussion and deliberation with Turkish officials about what to do with the region, we have finally come to an agreement over what to do with the province.\n\nThe province of Hatay will be officially attached to Turkey through an agreement entitled “The Arrangement for the Final Settlement of Territorial Questions between Turkey and Syria”, with many calling it by its shorter name, the “Franco-Turkish Agreement”. This will benefit both us and the Turkish; they will be content with the fact that Hatay has returned to their control, while we will hopefully be able to guarantee their neutrality and keep them from entering the German sphere. We will also be entering into a non-aggression pact with the Turkish as well, which can only yield positive results for both nations."
 FRA_Hatay_Issue.1.A: "The issue of Hatay can be considered closed." 

##########################################
## Case Anton
##########################################
 FRA_Case_Anton.1.t: "Case Anton; Germany Invades Vichy France"
 FRA_Case_Anton.1.d: "[FROM.GetNewsIcon]German forces have launched \"Case Anton\", entering the previously unoccupied zone of Vichy France in a rapid and coordinated advance. The invasion comes in response to the the accelerating success of Allied operations, which some German sources claim could have caused the defection of the Vichy regime to the Allied side.\n\nArmored divisions and mechanized infantry advanced from northern France, quickly occupying key cities including Marseille, Lyon, and Nice. Resistance from Vichy forces was minimal: the Armistice Army has been disbanded, and French military units have been disarmed, leaving the Vichy government intact but effectively reduced to a German puppet regime.\n\nGerman attempts to seize the French fleet in Toulon were thwarted when the ships were scuttled by their crews, preventing their capture. German authorities have assumed control over transportation networks, communications, and industrial centers, consolidating authority while maintaining the Vichy administration as a nominal governing body.\n\nAnalysts note that the occupation means the near-total loss of autonomy in Metropolitan France, though [VIC.GetLeader]'s regime continues to administer civil affairs in the region under German supervision."
 FRA_Case_Anton.1.A: "A wise choice!"
 FRA_Case_Anton.1.B: "An outrageous aggression!"
 FRA_Case_Anton.1.C: "A swift move."

##########################################
## French Decisions
###########################################

 ### Economy
 FRA_Budget_Austerity: "Budget Austerity"
 FRA_Budget_Austerity_desc: "The effort to reduce government spending will result in widespread cuts in a variety of areas, with the goal of addressing budgetary concerns and restoring national budget balance. These policies, which affect everything from public services to wages, aim to keep the economy stable in the face of rising debt. However, the social and political ramifications are considerable. While economic austerity may have long-term benefits, the immediate impact on public trust and political stability can be severe, potentially undermining support for the current administration and its future plans."
 FRA_Invest_in_Great_Works: "Invest in Great Works"
 FRA_Invest_in_Great_Works_desc: "In order to recover from the Great Depression and address the ongoing unemployment problem, we must repair our deteriorating public infrastructure. A new round of \"Grands Travaux\" will be launched to rebuild trust in the Republic and revitalise the economy. These efforts will be directed towards improving transportation infrastructure, revitalising deteriorating metropolitan neighbourhoods, and funding cultural landmarks."
 FRA_Devalue_the_Franc: "Devalue the Franc"
 FRA_Devalue_the_Franc_desc: "With the economy stagnant and capital flight increasing, the pressure to abandon our tight commitment to the gold standard has become too great to ignore. Devaluing the franc may increase exports and restore market confidence, but it risks alienating both the industrial right, which sees it as a reckless violation of budgetary restraint, and the reformist left, which sees it as a step back from promised social development. The political consequences will be severe, but continuing on our current path risks exacerbating the crisis and undermining public confidence in the government's ability to act decisively."
 FRA_Creation_of_the_Compagnie_Nationale_du_Rhone: "Creation of the Compagnie Nationale du Rhône"
 FRA_Creation_of_the_Compagnie_Nationale_du_Rhone_desc: "The establishment of the Compagnie Nationale du Rhône represents a significant step towards realising the Rhône River's full potential. By upgrading this critical infrastructure, we can improve navigation, generate hydroelectric power, and stimulate regional economic activity. However, this ambitious project will incur enormous costs and pose risks, particularly in terms of environmental impact and local opposition."
 FRA_Continue_construction_of_Autoroutes: "The Plan Prost"
 FRA_Continue_construction_of_Autoroutes_desc: "This initiative, proposed by urban planner Henri Prost, aims to lay the groundwork for long-term growth in several industrialised and densely populated areas of northern France. The plan calls for major infrastructure development in the Île-de-France, Picardie, Somme, and Pas-de-Calais regions. By improving these logistical arteries, we hope to better connect rural and urban areas and increase access to critical services. While having a significant impact on our infrastructure, we will also contribute to addressing the ongoing unemployment issue."
 FRA_Stabilize_the_Economy: "Stabilize the Economy"
 FRA_Stabilize_the_Economy_desc: "France's economy is vulnerable, but with determined action, we can steer it back towards recovery. We can restore stability and begin the growth process by implementing targeted reforms and investing in critical areas. These initiatives will help to reduce unemployment, rebuild public trust, and lay the groundwork for long-term success.  If we succeed, the French people will be able to look forward to a better tomorrow."

 ### Colony
 FRA_Colonial_Empire_category: "France and the Empire"
 FRA_Anti_Atlas_Campaign: "Anti-Atlas Campaign"
 FRA_Anti_Atlas_Campaign_desc: "The Atlas Rebellion rages in the steep mountains of southern Morocco, fuelled by local discontent and tribal hostility towards our protectorate's rule. It is time for a decisive campaign to restore order. French and colonial soldiers will be sent in force to Agadir and Beni Mellal-Khenifra, where rebel forces are still entrenched. Our political officers will accompany the expedition to ensure native loyalty and pacification efforts. Though the campaign will test our resources and morale, success will eliminate a threat to our imperial status in North Africa."
 FRA_Start_prospecting_for_Oil: "Start prospecting for Oil"
 FRA_Start_prospecting_for_Oil_desc: "Rumours of oil beneath the dunes of southern Algeria have been circulating for years, but we only now have the resources to investigate them fully. The formation of the \"Bureau de Recherche de Pétrole\" allows us to finally send surveyors and engineers to the remote Tamanrasset region. The task ahead is neither easy nor quick: extreme heat, remoteness, and a lack of infrastructure all pose difficulties. However, if oil is discovered, Algeria could become a valuable asset to the Republic while also providing us with a useful domestic source of fuel."
 FRA_Blum_Violette_Project: "Blum-Violette Project"
 FRA_Blum_Violette_Project_desc: "As anger grows in Algeria, the Blum-Violette Proposal provides a potential avenue for Muslims to obtain civil rights. Extending voting rights and legal equality may strengthen ties and help Algeria fully integrate into the French Empire, but it is unlikely to be without complications. Conservative forces in France, as well as Algerian settler populations, may regard this as a risky capitulation, whereas the left may see it as a significant step towards social progress. While the political consequences may be severe, failing to act could increase alienation and conflict in Algeria, making it more difficult to maintain peace in the long run."

