#Common

 FRA_Parliament.1.t: "The Parliament Opposed the Law"
 FRA_Parliament.1.d: "Our efforts to address the country's economic challenges have been futile because parliament has rejected our deflationary legislation. The proposal was met with fierce opposition, resulting in a significant weakening of our position and a drop in public confidence.\n\nDeliberations in the parliamentary chambers raged about the potential impact of the proposed deflationary measures. Members of parliament from various political parties voiced strong opposition, claiming that deflation would exacerbate the economic crisis by increasing unemployment and burdening the working class even more. The opposition took advantage of this opportunity to question our competence.\n\nAs the parliamentary sessions progressed, our confidence was shaken even further by the tenacious opposition. The open rejection of their proposed law has weakened our position and raised concerns about our ability to effectively navigate the economic crisis. The news of this parliamentary opposition spread quickly, eroding public trust in our ability to address the current challenges."
 FRA_Parliament.1.A: "This is bad news."

 FRA_Government_Collapse.1.t: "Fall of the President of the Council [This.GetLeader]"
 FRA_Government_Collapse.1.d: "In a turn of events that has surprised nobody, [This.GetLeader] announced today in a speech that he will resign as President of the Council effective immediately. He stands alone in the absence of parliamentary or public support. The government is powerless and has been abandoned by the rest of the nation, being deeply unpopular among both ordinary French citizens and fellow government officials.\n\nNow it is time to look towards the future, where preparations for a new government and a new President of the Council are already underway."
 FRA_Government_Collapse.1.A: "Who will be our next President du Conseil ?"

 FRA_Government_Collapse.2.t: "Lebrun's Choice"
 FRA_Government_Collapse.2.d: "Following the resignation of the previous President of the Council, President Albert Lebrun must now select a worthy successor. Faced with pressure from both government officials and the general public, Lebrun must make a quick decision on who will fill the shoes of the previous head of government and correct their previous failures and mistakes in order to successfully navigate France through this political and economic crisis.\n\nLebrun has considered a number of well-known Radical Party figures. Despite being from the same party, their opinions and views on many issues differ, and whichever one he chooses will undoubtedly have a significant impact on France's future and policies in the future."
 FRA_Government_Collapse.2.A: "Édouard Daladier, Minister of War."
 FRA_Government_Collapse.2.B: "Albert Sarraut, Minister of the Colonies."
 FRA_Government_Collapse.2.C: "Camille Chautemps, President of the Council of Ministers."

 FRA_PRS_Collapse.1.t: "Parti Républicain-Socialiste Collapse"
 FRA_PRS_Collapse.1.d: "[FROM.GetNewsIcon]Founded by non-Marxist socialists who refused to join the SFIO after its foundation in 1905, and by independent Radicals who refused to join the Radical-Socialist Party, the PRS has been a reformist socialist party located between the SFIO and the Radical Socialist Party.\n\nThe PRS has been weakened in recent years by an ideological conflict between socialism and reformism, resulting in a deep political divide within the party. Two distinct Republican-Socialist parties have emerged as a result of this schism. However, neither has managed to truly exist, and this political current has only been consistent through its parliamentary group. Furthermore, it suffered from an organisational split between those who preferred a united and structured party like the SFIO and those who preferred an independent party with independent personalities.\n\nThe current state of affairs for the party, as expected, was not sustainable, and the party was officially dissolved today."
 FRA_PRS_Collapse.1.A: "The struggle for unity continues."

 FRA_Events.15.t: "Charles Maurras' Sentence"
 FRA_Events.15.d: "[FROM.GetNewsIcon]It is not the first time that the infamous poet and writer, Charles-Marie-Photius Maurras, has been put in jail for his off-handed comments and threats to French politicians. More than a decade ago, during the Cartel des Gauches' advances against the right-wing leagues, Maurras called for the assassination of Abraham Schrameck, at the time Interior Minister, leaving him a whole year behind bars. And yet again, as the Popular Front's program continues, his threats against Léon Blum, it's figurehead, have earned him another eight months in jail. Charles Maurras' movement moves on, still, as the printing of the Action Française, and its movement, seems unfazed."
 FRA_Events.15.A: "The old Semitic camel strikes again."

 FRA_Events.38.t: "Unemployment Increase"
 FRA_Events.38.d: "In the quaint town of Colmar, a wave of economic hardship swept through the lives of its inhabitants. Among them was Henri, who found himself caught in the relentless clutches of unemployment.\n\nHis heart weighed heavy with anxiety. The world outside his modest home appeared bleak and desolate, mirroring the state of his own livelihood. Only yesterday, he had bid farewell to the bustling textile factory that had been his second home for years. The once-majestic chimneys now stood idle, belching out nothing but despair into the smoky sky.\n\nHe buttoned up his worn-out jacket, his hands trembling with uncertainty, and stepped out into the world that had suddenly turned hostile. The streets, once alive with vibrant commerce, were now filled with the echoes of desperation. Shop windows stood devoid of life, displaying only remnants of a prosperous past. Desperate faces wandered aimlessly, their eyes clouded with fear and disillusionment.\n\nHis journey took him from one empty office to another, where employers sighed with resignation, regretfully admitting that there was no room for him. The weight of rejection grew heavier with every closed door, crushing his spirit, and testing his resolve."
 FRA_Events.38.A: "Prosperity is a distant illusion."

 FRA_Events.39.t: "Unemployment Increase"
 FRA_Events.39.d: "In the sprawling city of Paris, an era of economic upheaval was brought forth, that left many in its wake. Among them was Marie, who had recently found herself stripped of her job due to the country's turbulent financial climate.\n\nHer footsteps carried her through a maze of uncertainty. With each passing day, the world around her seemed to grow dimmer, its vibrancy eclipsed by a cloud of economic despair. Once-thriving shops now stood as hollow shells, their display windows devoid of the wares that once beckoned passersby.\n\nHer heart weighed heavy with the weight of her newfound unemployment. She had bid farewell to the typewriter and the familiar hum of the office, the loss leaving a void in her life that filled her with existential dread. As she ventured forth, she found herself surrounded by countless others caught in the same web of uncertainty. The streets were teeming with faces etched with worry and a shared sense of helplessness. Together, they became a tapestry of stories, each thread a tale of dashed hopes and shattered dreams.\n\nWith steadfast determination, she navigated the labyrinthine path of job hunting. However, her days were filled with countless interviews, where employers offered sympathetic smiles but little in the way of opportunities."
 FRA_Events.39.A: "The rhythm of rejection had become a depressing symphony."

 FRA_Events.41.t: "Foundation of Air France"
 FRA_Events.41.d: "[FROM.GetNewsIcon]A consortium of five airlines issued a statement today announcing the formation of Air France. After years of rivalry, these five airlines have discovered that the French air market is too small to accommodate so many separate and competing companies. With profits plummeting and international air travel consolidating, there was a real risk that an outside company would eventually buy them all out, leaving the French air market in foreign hands, which is why these businesses have merged.\n\nThe new airliner offers direct flights across France and her North African colonies, as well as a network of connecting flights to Indochina and remote departments in the Pacific and South America. The mighty French Republic is more united than it has ever been thanks to a single, thriving air carrier. A Frenchman from Brittany can fly to the most remote parts of the globe in a matter of hours or days and truly appreciate the benefits of French civilization."
 FRA_Events.41.A: "Tying the Republic together like never before!"

 FRA_Events.43.t: "Les Beautés de Bordeaux"
 FRA_Events.43.d: "Franck Bouhier is a simple man living a simple life. He usually wakes up early, gets a drink of coffee and a tartine from the cafe below his apartment, reads the morning paper, and heads off to work. It takes him a good 20-25 minutes to get to work when walking at a fast pace. However, it's hard for his back as he is in his mid-50s and works as a janitor to stand most of the day. Though he enjoys his walks to work seeing the city streets.\n\nThough this morning is different as the construction in the road that he has seen progress through his window has finally been completed. It is a brand new tram line with a stop right outside his apartment with cars imported from Paris. This new tram line has been touted by the mayor of Bordeaux Adrian Marquet for a few weeks now and thanks to the recently enacted national plan that paid for new infrastructure all around France. Franck does not think much about politics or the government. Still, he does enjoy the mayor's initiation for this new tram line as his back will no longer hurt on the way to work."
 FRA_Events.43.A: "An Easier Way to Work Indeed"

