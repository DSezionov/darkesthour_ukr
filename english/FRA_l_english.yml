 ### Operation Torch
 FFL_Operation_Torch.1.t: "The Cherchell Conference"
 FFL_Operation_Torch.1.d: "American Major General Mark Clark finally arrived in Cherchell, French Algeria, a few days ago. Arriving in the city's port during the night of October 21-22, the major arrived with a submarine, an unusual but functional choice. The goal of this manoeuvre is straightforward: he was sent here to meet with a Vichy French commander named Charles Mast.\n\nMast was chosen for a simple reason. He was arrested and detained because he was suspected of being an opponent of the Vichy Regime, and thus an opponent of Pétain, Hitler, or even Mussolini. His release was facilitated by a friend, colonel Numata, a Japanese military attaché in the Vichy regime. Mast has only been a chief of staff in North Africa since those events.\n\nDuring their discussions, Mast agreed not to intervene against the Allies when they begin landing in North Africa, and he also promised that his troops would not intervene. The two men parted at sunrise, both pleased with the new turn of events."
 FFL_Operation_Torch.1.A: "A new victory for the free world!"
 Cherchell_Conference: "Completed §YThe Cherchell Conference§!"

 FFL_Operation_Torch.2.t: "Operation Torch; Allies Invade French North Africa"
 FFL_Operation_Torch.2.d: "[FROM.GetNewsIcon]In a major strategic development, Allied forces comprising units from the United States, Great Britain, and the Free French have begun a large-scale amphibious landing along the Vichy-held North African coast. The operation, which began early this morning under the cover of naval bombardment and air support, marks the first coordinated Anglo-American invasion of the war.\n\nReports from the field indicate that initial landings are taking place near the key ports of Algiers, Oran, and Casablanca. Naval forces provide heavy bombardment to suppress enemy fortifications prior to the troop landings, and Allied aircraft have been observed operating extensively over the beaches.\n\nSources close to the Free French command suggest that negotiations are underway with several Vichy commanders who may be willing to defect or stand down, including Admiral François Darlan, whose stance could prove decisive for the outcome of the campaign.\n\nThe landings represent a significant escalation of Allied operations in the Mediterranean theatre, aimed at securing North Africa as a springboard for future offensives against Axis-held Europe."
 FFL_Operation_Torch.2.A: "Afrique libre!"
 FFL_Operation_Torch.2.B: "Another British violation of our sovereignty!"
 FFL_Operation_Torch.2.C: "Vichy has this under control... right?"
 FFL_Operation_Torch.2.D: "Is the tide of war finally turning?"

 FFL_Operation_Torch.3.t: "Allies Defeated in French North Africa"
 FFL_Operation_Torch.3.d: "[FROM.GetNewsIcon]The Allied invasion of French North Africa, launched earlier this week under the codename Operation Torch, has met with unexpectedly fierce resistance and suffered heavy reverses along the Moroccan and Algerian coasts. Reports from the front indicate that several beachheads have been abandoned after intense counterattacks by Vichy French forces, supported by local garrisons and coastal artillery batteries that proved far more formidable than anticipated.\n\nDespite initial successes at sea and in the air, disorganization among the landing forces and adverse weather hampered coordination. Attempts to secure the ports of Oran and Casablanca were repelled after prolonged fighting in the harbor districts, resulting in substantial Allied casualties and the withdrawal of surviving units to their ships.\n\nIn Algiers, an uprising by elements sympathetic to the Free French failed to gain traction before being swiftly suppressed by Vichy security forces. The anticipated defection of senior commanders, including Admiral Darlan, did not materialize; instead, Vichy authorities have declared full allegiance to Marshal Pétain's government and requested German \"technical assistance\" to defend the region."
 FFL_Operation_Torch.3.A: "Like Gallipoli all over again..."
 FFL_Operation_Torch.3.B: "Stay away, and don't come back!"
 FFL_Operation_Torch.3.C: "An embarrassing blunder."

 FFL_Operation_Torch.4.t: "Operation Torch Successful"
 FFL_Operation_Torch.4.d: "[FROM.GetNewsIcon]After several days of fierce fighting, Allied forces have successfully completed Operation Torch. Coordinated landings at Casablanca, Oran, and Algiers have resulted in the capture of all major coastal objectives, bringing the region under Allied control.\n\nThe combined American, British, and Free French forces encountered determined resistance from Vichy French units, particularly in Morocco and around the approaches to Tunis. However, sustained air and naval operations rapidly undermined enemy morale and cohesion. In several key cities, local resistance groups rose against Vichy authorities, seizing administrative buildings and aiding the advancing Allied troops.\n\nThe situation in Tunisia remains complex. Vichy authorities there have reportedly handed control of the protectorate to German forces, who are now reinforcing the area to prevent further Allied advances. Axis aircraft have begun arriving in Tunis and Bizerte, signaling that a new front in the Mediterranean campaign may soon open.\n\nDespite these challenges, the success of Operation Torch represents a major strategic victory for the Allies. The landings have secured vital supply lines across the Atlantic, opened the door to operations against Axis positions in Tunisia and Libya, and strengthened Free French influence in North Africa. The campaign is being hailed as the first major step toward the eventual liberation of Europe."
 FFL_Operation_Torch.4.A: "We bear the torch of liberty!"
 FFL_Operation_Torch.4.B: "Hopefully this won't upset the Germans!"
 FFL_Operation_Torch.4.C: "It's time to end the worthless Vichy experiment."
 FFL_Operation_Torch.4.D: "One step closer to liberating our home."
 FFL_Operation_Torch.4.E: "An impressive operation!"

 FFL_Operation_Torch.6.t: "Petain Signs the Pact of Steel"
 FFL_Operation_Torch.6.d: "[FROM.GetNewsIcon]Today, dark clouds appeared in Europe's sky. Following the failure of Operation Torch, the French leader, Philippe Pétain, initiated a new rapprochement with the German Reich. He has officially asked the German chancellor to join the Axis, claiming that Vichy France has clearly demonstrated his military capabilities by rejecting Allies troops right in the sea.\n\nThe Reich quickly accepted the offer, and a few hours later, Hitler and Pétain made a public declaration in Paris, informing the French people that the French State was now a partner in the conflict with Germany and Italy.\n\nFollowing the declaration, most collaborationist leaders, including Milice leader Joseph Darnand, RNP leader Marcel Déat, and PPF leader Jacques Doriot, celebrated the new cooperation with military parades in the streets of Paris, Bordeaux, Marseille, and Vichy.\n\nEven Pétain's second in command, Pierre Laval, has endorsed the situation, claiming that \"after such a defeat, our enemies will think twice before launching another attack against France!\""
 FFL_Operation_Torch.6.A: "France sinks further into darkness..."
 FFL_Operation_Torch.6.B: "Congratulations to our new allies!"
 FFL_Operation_Torch.6.C: "A sour realization for the Allies."

 FFL_Operation_Torch.7.t: "Romance of the Three Nations"
 FFL_Operation_Torch.7.d: "It's been a long time since France has been so divided. Even during the Paris Commune of 1870-1871, we were not as divided as we are today.\n\nFollowing years of division in French society, tens of movements have emerged, gradually fracturing the country. The worst was in 1934, when the leagues attempted to permanently demolish the government. And, based on the situation today, it appears that some of them have finally gotten what they want.\n\nFollowing the fall of France, Maréchal Phillipe Pétain obtained full powers and, rather than using them to push back the Germans, began peace talks with them. After a few hours, Hitler declared the occupation of North France, and the Vichy Regime took control of the south.\n\nAt the same time, the young General Charles de Gaulles decided not to resign, and a few days after the declaration, he issued a call from London to the French to resist the Germans and join Free France in fighting fascism and collaborators.\n\nFinally, in North Africa, Admiral François Darlan attempts to consolidate control in his French Civil and Military High Command, and no one knows to whom he will pledge allegiance for the time being."
 FFL_Operation_Torch.7.A: "Who will win in the end? Collaborationists or the Resistance? Fascists or Republicans?"

# archived events for later
 #FFL_Operation_Torch.8.t: "Reuniting France"
 #FFL_Operation_Torch.8.d: "When our government returned to France following the successful invasion, we took over from a fascist regime in shambles. Meanwhile, resistance movements against the French state are gaining strength and significance as large numbers of young men flee to the hills and open country to avoid the country's forced labour laws. These citizens remain hopeful, praying for our intervention and timely liberation from the horrors that this false government has exposed them to while living as outlaws in the countryside and aided by the country people.\n\nWith the liberation of Paris, it is now time to declare this de facto authority calling itself the \"government of the French state\" abolished, along with all of its laws, and bring to justice the traitorous collaborators who have disgraced France and sold it into slavery. After we have reunited with our brothers and sisters who are toiling under the Nazi boot, a thorough judicial and extrajudicial purge of Vichy government collaborators and executives will take place, ridding our country of this cancer once and for all."
 #FFL_Operation_Torch.8.A: "Soon we will be reunited."
 #FFL_Operation_Torch.8.B: "But not today."

 #FFL_Operation_Torch.9.t: "The Liberation of Vichy France"
 #FFL_Operation_Torch.9.d: "Against all odds, we triumphed and successfully conquered Germany, bringing us one step closer to eradicating fascism in Europe and winning the war. We now control the majority of Europe, including Northern France and Paris. However, in Southern France, an illegitimate government known as the French State still exists, which in reality is nothing more than a German puppet state slaving away for their fascist overlords. In spite of this, they have adopted a facade of neutrality in an attempt to turn the French away from the resistance, even stating that they are not in the war.\n\nHowever, we know better than anyone that all sparks of fascism in Europe have to be stomped out and any associations or sympathies towards this perverse ideology can no longer be allowed to exist. Our denazification efforts extend to this small state as well, and by occupying it, we will be able to reunite the French people and better control and administer the region, while also gaining sympathies from the French people, who will see us as their liberator and savior, doing what their own government could not."
 #FFL_Operation_Torch.9.A: "The dawn of a new France."
 #FFL_Operation_Torch.9.B: "The Red Army must be brought in position first."

### Ideas
 FFL_Code_Indigenat: "Code de l'Indigénat"
 FFL_Code_Indigenat_desc: "The Native Code, which was created to keep order and discipline in the colonies, is a cornerstone of our civilising mission. In these far-flung places, where loyalty to the Republic is not always assumed, it ensures that authority is respected and that the gains of French prosperity are not jeopardised by unrest. However, the line between justice and dominance has become increasingly thin, and whispers of rage are heard among those who live beneath it in the colonies. Some in the metropole question whether the ideas of 1789 can coexist with the realities of the twentieth century, but the Code de l'Indigénat remains an unsettling reminder that our desire to enlighten the world may come at the expense of our own ideals."