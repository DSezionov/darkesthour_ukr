 # Colony
 FRA_End_the_Pacification_of_Morocco: "End the Pacification of Morocco"
 FRA_End_the_Pacification_of_Morocco_desc: "Perhaps it is exaggerating to say that Morocco is now almost completely pacified. This may be true in the plains, and there is now railway communication with Algeria; however, in the Middle Atlas Mountains and their surrounding areas, there are still important tribes, or sections of tribes, that have not submitted to our government. Nonetheless, significant progress has been made toward complete pacification.\n\nUnder the protectorate, French civil servants join forces with French colonists and their supporters in France to prevent any moves toward Moroccan autonomy. As the pacification process progressed, we encouraged economic development, particularly the exploitation of Morocco's mineral wealth, the development of a modern transportation system, and the growth of a modern agriculture sector geared to our market. Tens of thousands of colonists entered Morocco and purchased vast tracts of fertile agricultural land.\n\nAs the "pacification" campaign nears its end, it transitions, as Daniel Rivet puts it, "from a war against Moroccans to a war among Moroccans.""

 FRA_Expand_the_Moroccan_Mining_Industry: "Expand the Moroccan Mining Industry"
 FRA_Expand_the_Moroccan_Mining_Industry_desc: "The vast majority of Moroccan mines have been privately owned since the establishment of the Protectorate, with the majority of the investors being French.\n\nThe Office Chérifien des Phosphates, a public company with a monopoly on Moroccan phosphate exploration and exploitation, was established in 1921. In 1928, the Bureau de Recherches et de Participations Minières was established, a public body that acquired one-third of Morocco's sole coal mine and later obtained shares in several mines and directs Moroccan oil exploration. We were increasingly concerned in the twenties about the growing influence of foreign investors and the slow rate of development of the Moroccan mining industry. As a result, because French interests could not be directly favoured due to the open-door regime, the only solution was to strengthen the State's power.\n\nNowadays, French investors are in a dominant position and no longer require government intervention to protect them. As a result, the Bureau de Recherches et de Participations Minières' role will be reduced to that of a public fund that only invests in sectors deemed unprofitable by private investors."
 
 FRA_Algiers_Industrial_Build_Up: "Develop Algerian Heavy Industries"
 FRA_Algiers_Industrial_Build_Up_desc: "The grands colons control the majority of Algeria's wealth in manufacturing, mining, agriculture, and trade. The European-owned and managed economy is centred on small industry and a highly developed export trade, which is designed to provide us with food and raw materials in exchange for capital and consumer goods. Europeans own roughly 30% of total arable land, including the majority of the most fertile land and the majority of the irrigated areas. By 1900, Europeans had produced more than two-thirds of agricultural output and nearly all agricultural exports.\n\nThe European sector operates on a commercial basis and complements our market system by supplying wine, citrus, olives, and vegetables. By 1914, vineyards accounted for nearly half of the value of European-owned real estate. Subsistence cereal production, supplemented by olive, fig, and date growing and stock raising, forms the foundation of the traditional sector, but cropping land is scarce even for cereals under current traditional cultivation practices."
 
 FRA_The_New_Granary: "The New 'Granary of Rome'"
 FRA_The_New_Granary_desc: "Learning from Algeria, where imprudent land appropriation reduced much of the native peasantry to a rootless proletariat, Lyautey sought a select group of 692 "gentlemen-farmers"—rather than the "riff-raff" of southern Europe—capable of serving as "examples" to les indigènes and imparting French influence in Morocco's rural colonization from 1917 to 1925.\n\nThe goal was to secure a consistent supply of grain for Metropolitan France and to re-create Morocco as the "granary of Rome" by planting cereals primarily in the drought-prone regions of Chaouia, Gharb, and Hawz.\n\nFollowing a period of low profits and a massive locust swarm in 1930, agricultural production will shift toward irrigated, higher-value crops such as citrus fruits and vegetables."

 FRA_Trans_Sahara: "Build the Trans-Sahara"
 FRA_Trans_Sahara_desc: "The Trans-Saharan Railway is a project to build a rail line from Algeria to Sub-Saharan Africa in the south. Its intended use is to connect coal mines and boost trade throughout North Africa, to tie together the French Empire, and to connect North Africa to Sub-Saharan Africa by connecting French Algeria's existing rail system to those of French West Africa. The rail line plan was first proposed in 1879. The large plan was created by an engineer, Monsieur A. Duponchel; in 1900, the paper Le Matin announced that it would proceed on private initiative following a long campaign in its favour by Pierre Paul Leroy-Beaulieu.\n\nThere are numerous proposed benefits for the railway. It will provide a quick connection to Sudan and allow us to access Sudan's resources. Furthermore, the railway will transform the region, transforming it into a leading producer of cotton and agricultural goods. The cattle population and rice production will skyrocket, benefiting society."

 FRA_Invest_in_Dakar: "Invest in Dakar"
 FRA_Invest_in_Dakar_desc: "Dakar is one of the major cities of our colonial holdings, comparable to Hanoi or Beirut. French trading firms have set up shop there, and industrial investments such as mills, breweries, refineries, and canneries are drawn in by the port and rail infrastructure. It is also strategically important to us because we have an important naval base and coaling station in its harbour and it was one of our first air force and airmail circuits. A second major railroad, the Dakar-Niger, built from 1906 to 1923, connects Dakar to Bamako, securing Dakar's position at the apex of France's West African empire.\n\nDakar has become a more exclusive administrative, commercial, and residential district for Europeans, serving as a model for similar exclusionary administrative enclaves in French Africa's other colonial capitals such as Bamako, Conakry, Abidjan, and Brazzaville."
 
 FRA_Create_the_Bureau: "Create the Bureau de Recherche de Pétrole"
 FRA_Create_the_Bureau_desc: "With the vast colonial empire, research on oil will be focused on Africa. Indeed, the search for oil in the Sahara began in 1877, with no conclusive results until the years 1921-1932. The vastness of the Sahara desert discouraged international companies from exploring this inhospitable land. However, some experts, including Conrad Kilian, were convinced that black gold reserves existed in the Saharan subsoil. Indeed, he reported geological structures in the northern Hoggar and central Sahara that could contain oil twice, in 1922 and again in 1927-1928.\n\nThe Bureau de recherches de pétrole (BRP) will be established in response to the need for research and exploration not only in France but also in its colonial empire. Its mission is to establish a national petroleum research program with the goal of creating a vertically integrated industry from exploration to service stations.\n\nThe Bureau de Recherche de Pétrole (BRP) is a national public institution in France that coordinates petroleum research and contributes to its funding via budgetary subsidies. The BRP will focus on oil exploration in Hassi Messaoud in particular."

 FRA_Fix_Tunisian_Economy: "Fix the Tunisian Economy"
 FRA_Fix_Tunisian_Economy_desc: "Tunisia was ruled by Bey Muhammad III and his powerful Prime Minister, Mustapha Khaznadar, in 1859. He pursued reformist policies to promote economic development, with a focus on infrastructure, communication, and the armed forces. However, the Tunisian economy did not generate enough revenue to sustain these reforms. Furthermore, central administration was lacking. Tax collectors were delegated, and only one-fifth of the revenues ever made it to the national treasury. Economic conditions deteriorated throughout the nineteenth century as foreign fleets curtailed corsairs and droughts decimated cereal and olive production. Overseas manufactured products, primarily textiles, flooded Tunisia, gradually destroying local artisan industries.\n\nThe Tunisian government's budget will be cleaned up, allowing for the launch of multiple infrastructure construction programs that will completely transform the country, primarily for the benefit of the growing number of settlers. A comprehensive land legislation will be enacted, allowing the acquisition or confiscation of land in order to create a large number of colonization resold to French colonists."

 FRA_Ban_the_Neo_Destour: "Ban the Neo-Destour"
 FRA_Ban_the_Neo_Destour_desc: "The New Constitutional Liberal Party, also known as Neo Destour, is a Tunisian political party founded in 1934 by a group of Tunisian nationalist politicians in Dar Ayed, the home of independence activist Ahmed Ayed. It is the result of a schism with the Destour party.\n\nPrior to the split, a younger generation of Destour members alarmed the party's elders by appealing directly to the populace via their more radical newspaper L'Action Tunisienne. The younger group, many of whom were from the provinces, appeared to be more in tune with a broader spectrum of Tunisians, whereas the party elders represented a more established constituency in the capital city of Tunis; however, both groups were proponents of change, either autonomy or independence. The schism occurred during the 1934 Destour party congress.\n\nSome government officials have urged us to outlaw this dangerous party, which many see as nothing more than fascists and Nazi sympathizers."

 FRA_Protect_Tunisia: "Protect Tunisia"
 FRA_Protect_Tunisia_desc: "We originally intended to seize control of Tunisia, which bordered our existing colony of Algeria, in order to counteract Italian and British influence there. At the Berlin Congress in 1878, a diplomatic agreement was reached for us to take over Tunisia while the British took control of Cyprus from the Ottomans. As a result, the use of Tunisian territory as a safe haven by rebel Khroumir bands provided a pretext for military intervention.\n\nAgriculture, mining, urban sanitation, business and commerce, banking and finance, state administration, manufacturing and technology, and education are among the areas of study that have advanced and are sought for their practical value in Tunisia. In addition, social infrastructure has been improved, as has the construction of public buildings for meetings and performances. In Tunis, civic improvements included the installation of new clean water sources and the construction of public sanitation facilities.\n\nTunisia has grown into a valuable colony that deserves to be protected, so we will invest in fortifications to make it easier to defend."

 FRA_Toulon_of_the_South: "The Algerian Toulon"
 FRA_Toulon_of_the_South_desc: "The military port of Toulon, located in the city of Toulon, is the main base of the French Navy and the Mediterranean's largest naval base. It is home to the majority of our naval force, accounting for over 60% of our Navy's tonnage, as well as thousands of military and civilian personnel.\n\nTo secure our position and naval power in North Africa and the southern Mediterranean, we plan to build a port similar to Toulon. Mers el-Kebir port has been identified as the ideal location for a counterpart to Toulon port.\n\nWith global tensions rising and new technological breakthroughs in naval technologies, we will expand and build up the port in Mers el-Kebir so that it, like Toulon, can house the majority of our naval force, broadening our naval capacities. This will allow us to better compete for naval superiority in the Mediterranean Sea and defend North Africa."

### Army Focus ###
 FRA_Armee_de_Terre: "§aArmee de Terre§!"
 FRA_Armee_de_Terre_desc: "The French Army, also known as the Land Army, is the largest and most land-based component of the French Armed Forces. Along with the other components of the Armed Forces, it reports to the French government.\n\nDuring the Great War, we were able to hold the Western front and counterattack on the Eastern front and in the colonies until the Central Powers and their allies were defeated. Following major conflicts, we proved to be a cohesive fighting force capable of counterattacking and defeating the Germans at the Second Battle of the Marne, the first in a series of Allied victories that brought the war to an end. During the Great War, we suffered massive military, civilian, and material losses. We suffered the second highest Allied losses, after Russia, with over 1.3 million military fatalities and over 4.6 million wounded.\n\nMarshal Ferdinand Foch once described the Versailles Treaty as "not a peace, but a twenty-year armistice." The majority of Frenchmen recognise the harsh reality that Germany will never accept defeat. As a result, it is time to begin modernising our land forces in order to be prepared for inevitable conflicts."

 FRA_The_Maginot_Line: "Continue the Maginot Line"
 FRA_The_Maginot_Line_desc: "We have been constructing the Maginot Line since the end of the Great War, based on our experience with trench warfare during the war. The Maginot Line is a vast, cutting-edge defensive system far superior to any previous trench system: a network of massive concrete, iron, and steel fortresses, bunkers, retractable turrets, outposts, obstacles, and sunken artillery emplacements linked by tunnel networks. It is 20-25 kilometres wide and runs the length of the Franco-German border. It has numerous underground barracks, shelters, ammunition dumps, and depots, as well as its own telephone network and narrow gauge railways with armoured locomotives backed up by heavy rail artillery.\n\nAccording to our military experts, the line will deter German aggression because any invasion force will be halted long enough for our forces to mobilise and counterattack. The line will also force the Germans to invade Belgium. This allows any future conflict to take place outside of French territory. By avoiding the Maginot Line and fighting the Belgian Army, our military will be able to move its best formations to counter."

 FRA_Gamelin_Static_Warfare: "Gamelin's "Guerre Statique""
 FRA_Gamelin_Static_Warfare_desc: "As a General of the French Army, Maurice Gustave Gamelin is regarded as a man of exceptional intellect. Even in Germany, he is respected for his intelligence and "subtle mind," though some German generals regard him as stiff and predictable. Gamelin's defence vision for France is based on a static defence along the Franco-German border, reinforced by the Maginot Line.\n\nThe Maginot Line is intended to block the main German blow, if it should come via eastern France, and to divert the main blow through Belgium, where French forces will meet and stop the Germans. The Germans are expected to fight costly offensives that will sap their strength, whereas we will fight a total war, mobilising our resources, empire, and allies."

 FRA_Prepare_The_Second_Trench_Warfare: "Prepare the Second Trench Warfare"
 FRA_Prepare_The_Second_Trench_Warfare_desc: "French war planning has always assumed that the war will be "la guerre de longue durée," or "the war of long duration," in which our and our allies' superior economic resources will gradually grind the Germans down. Germany lacks many of the raw materials required for a modern industrial economy, leaving it vulnerable to a blockade and unable to feed its people. The guerre de longue durée strategy calls for us to halt the expected German offensive aimed at giving Germany a quick victory, followed by an attrition battle. Once the Germans are exhausted, we will launch an offensive to win the war."
 FRA_Prepare_The_Second_Trench_Warfare_tt: "Max Entrenchment: §G+2§!"

 FRA_Develop_the_Genie: "Develop the Genie"
 FRA_Develop_the_Genie_desc: "The Engineering Arm, or l'Arme du Génie, is the French Army's military engineering arm. \"Parfois détruire, souvent construire, toujours servir!\" is the Arm's motto, which translates as \"Sometimes to destroy, often to build, always to serve!\"\n\nMilitary engineering is loosely defined as the art, science, and practise of designing and building military works as well as maintaining military transport and communication lines. Military engineers are also in charge of the logistics that support military tactics. Military engineering has recently expanded to include other engineering disciplines such as mechanical and electrical engineering techniques.\n\nThe Engineering Arm is comprised of three major services: The Defence Infrastructure Service's Land Component performs traditional engineering roles for the French military and Ministry of Defence. This includes the Buildings, Fortifications, and Works Technical Service. The second service is the French Army's Combat Engineering Regiments, and the third service is fire and rescue."

 FRA_Grande_Batterie: "Les Grandes Batteries"
 FRA_Grande_Batterie_desc: "Our military doctrine is founded on two major ideas: firepower supremacy and the Methodical Battle. The French Army believes in the "fire kills" dictum and employs more firepower, making the battlefield even more lethal. We rule out the possibility of using artillery to provide immediate support to smaller units. Instead, artillery provides massive fire support to advancing or defending infantry.\n\nOf course, such a doctrine has its limitations. It is difficult to conduct rapid manoeuvres, which limits our manoeuvrability while massing fires and controlling large units. The effective range of the artillery unit supporting the infantry limits the attacking force's advance. This doctrine, which is based on the centralised use of massive artillery fire, necessitates highly centralised battle synchronisation."

 FRA_Tactic_over_strategy: "Promote Tactics Over Strategy"
 FRA_Tactic_over_strategy_desc: "Our Generals learned more about how to lead a battle than a large-scale war during the Great War, and Gamelin, despite his significant intellectual ability, possesses a weak capacity to lead men as well as organise them, as well as a general lack of charisma. As a result, when it comes to war, we have generally poor organisation at the highest level of the army, characterised by a dilution of responsibilities. Our generals, on the other hand, understand and excel at winning battles, and we can take advantage of this fact and their skill. We will focus our efforts on crushing the enemy on the battlefield. Even if we fall short in terms of developing strategies and proper organisation, we will still dominate the battlefield."
 FRA_Tactic_over_strategy_tt: "§YStatic Warfare§! will be modified by \nBreakthrough: §G+10,0%§! \nCoordination: §R-10,0%§! \nArmy Experience Gain: §G+5,0%§!"

 FRA_Supreme_Role_OF_Machinegun: "The Supreme Role of Machine-Guns"
 FRA_Supreme_Role_OF_Machinegun_desc: "The combination of wire and firepower is responsible for the majority of failed attacks and extremely high casualties in trench warfare during the Great War. A single machine gun nest can theoretically take out hundreds of enemies charging through no man's land. When placed behind multiple lines of barbed wire to slow any advancing enemy, their potential is greatly increased.\n\nDuring the Great War, Gamelin witnessed first-hand the potential and danger that machine guns pose. According to him, the invention and use of machine guns changed warfare forever. There is no point attacking frontlines if they are armed with machine guns, which kill more people than any other weapon. Machine guns are ideal weapons, capable of killing hundreds of men while also defending against overwhelming odds. As a result, the use of machineguns in the army will be heavily promoted."
 FRA_Supreme_Role_OF_Machinegun_tt: "§YStatic Warfare§! will be modified by \nDivision Defense: §G+5,0%§! \nInfantry Attack: §G+5,0%§!"

 FRA_Division_Cuirrase: "The Division Cuirasse"
 FRA_Division_Cuirrase_desc: "The massive use of tanks by the Triple Entente armies during their successful offensive on the Hindenburg Line demonstrated the need for various types of tank units. The slower and heavier Mark V tanks were able to breach the German defensive line, but the opportunities they created were brilliantly exploited by the lighter Whippets and armoured cars.\n\nTo fully exploit their capabilities, we will form four new armoured divisions known as the Division cuirassée, highly specialised offensive units equipped with one of our most feared tanks: the Char B1. The Char B1 is a specialised breakthrough vehicle that can also serve as a Char de Bataille, or "battle tank" against enemy armour. Its development and production were repeatedly postponed beginning in the early 1920s, resulting in a vehicle that is both technologically complex and expensive. The type is one of the most powerfully armed and armoured tanks of its day, and it is very effective in direct combat with enemy armour."
 FRA_Division_Cuirrase_tt: "§LArmoured Units§! £tank_icon_1_20x20  will be deployed in §YMourmelon§!\n"

 FRA_Rain_of_Steel: "A Rain of Steel"
 FRA_Rain_of_Steel_desc: "Artillery is estimated to have accounted for up to 50% of battlefield casualties between the middle of the eighteenth and middle of the nineteenth centuries. This figure was probably as low as 10% in the sixty years preceding 1914. The remaining 90% fell to small arms, whose range and accuracy had surpassed that of artillery. With over one million men, the British Royal Artillery grew to be larger than the Royal Navy.\n\nWe will continue to invest heavily in artillery, just as the British have previously. To avoid the massive casualties of the Great War, the Methodical Battle concept emphasises the use of maximum firepower and tight control over all troop movement. The Army War College initially taught offensive operations, but with the development of the Methodical Battle concept, it has shifted to teaching existing concepts and artillery tactics."
 FRA_Rain_of_Steel_tt: "§YStatic Warfare§! will be modified by \nDivision Defense: §G+5,0%§! \nArtillery Attack: §G+10,0%§!"

 FRA_La_Voie_Sacree: "La Voie Sacree"
 FRA_La_Voie_Sacree_desc: "The Voie Sacrée is a road connecting Bar-le-Duc and Verdun. It was named after the crucial role it played during the Battle of Verdun during the Great War. Since 1915, the road has been recognised as the only reliable vehicular road that has survived to safely supply Verdun. In late 1914, German forces had already cut off all standard gauge railway lines that could reach Verdun. To compensate for this perilous situation, the road was widened to 23 feet in 1915, allowing for the continuous up and down flow of two lines of truck traffic. This proactive roadway improvement in 1915, combined with success in organising the road transport system, saved Verdun in 1916.\n\nWe intend to use trucks to provide the same supply system to the entire army. We will widen and expand the road even more to allow for a continuous flow of multiple lines of truck traffic transporting supplies and equipment over a longer distance. In addition, we will expand the railway that runs parallel to the road in order to transport even more supplies by train."
 FRA_La_Voie_Sacree_tt: "§YStatic Warfare§! will be modified by \nSupply Consumption: §G-10,0%§! \nDivision Recovery Rate: §G+5,0%§!"


 FRA_On_ne_Passe_Pas: "On Ne Passe Pas!"
 FRA_On_ne_Passe_Pas_desc: "We've built an impenetrable cutting-edge defensive system that outperforms any previous trench system. We have prioritised the use of machine guns in the army, which will allow us to slaughter hundreds of enemies at once while also defending against overwhelming odds. Our artillery will rain down destruction and chaos on the enemy frontlines.\n\nWe are more than prepared for the war of long duration, and just like in the Battle of Verdun in 1916, "They shall not pass!". Just as this phrase will be reintroduced into the public consciousness, our soldiers will not allow the Germans to pass through and desecrate French soil."
 FRA_On_ne_Passe_Pas_tt: "§YStatic Warfare§! will be modified by \nMax Entrenchment: §G+1§!"

 FRA_Abandon_the_Delusion: "Abandon the Delusion"
 FRA_Abandon_the_Delusion_desc: "We will not be saved by the Maginot Line. Hunkering down and hoping our defences hold out for a long enough period of time will not save us. Gamelin's doctrine of trench warfare and "the long war" is obsolete and even dangerous. His antiquated views on the use of aviation, tanks, motorised elements, artillery, and fortifications demonstrate his disregard for modern developments.\n\nInstead, we'll look at some more modern concepts of warfare. Both Generals Charles de Gaulle and Henri Mordacq envision bringing the French army into the modern era with new and modern doctrines. Unfortunately, many in the government and most officers follow Gamelin's conservative doctrine, which means we will face stiff opposition from the Old Guard and must tread carefully."

 FRA_DeGaulle_Armee_de_metier: "De Gaulle's "Armee de Metier""
 FRA_DeGaulle_Armee_de_metier_desc: "Unlike Pétain, de Gaulle believes in the use of tanks and rapid maneuvers rather than trench warfare. De Gaulle became a disciple of Émile Mayer, a retired lieutenant-colonel and military thinker.He thinks that although wars are still bound to happen, it is "obsolete" for civilised countries to threaten or wage war on one another as they had in previous centuries. He has a low opinion of the quality of French generals, and is a critic of the Maginot Line and a proponent of mechanised warfare. Mayer focused de Gaulle's thoughts away from his obsession with the mystique of the strong leader and back to loyalty to Republican institutions and military reform."
 FRA_FRA_Has_de_Gaulle_CoArmy_tt: "§YCharles de Gaulle§! is §YChief of Army§!"

 FRA_Professional_Army: "A Professional Army"
 FRA_Professional_Army_desc: "Very recently de Gaulle wrote a book titled Vers l'Armée de Métier, or "Towards a Professional Army". He proposes mechanisation of the infantry, with an emphasis on an elite force of only a small amount of men and tanks. The book imagines tanks driving around the country like cavalry. An army of this size would compensate for France's population shortage while also being an effective tool for enforcing international law, particularly the Treaty of Versailles, which prohibits Germany from rearming. He also thinks it would be a precursor to a deeper national reorganisation, and wrote that "a master has to make his appearance, whose orders cannot be challenged - a man upheld by public opinion".\n\nApart from the hard left, who are committed to the Republican ideal of a citizen army, the book receives praise from across the political spectrum. A small but professional army, with de Gaulle as Head of the Army, will be our primary focus from now on, as it may be the only thing that can save our country from any looming conflict."

 FRA_Primaute_des_Officiers: "Primacy of the Officiers"
 FRA_Primaute_des_Officiers_desc: "The development of leadership and initiative in officers must be prioritised. Once these principles have been properly instilled, all officers, from the highest to the lowest echelons, will feel free to carry out their missions or respond to changes in situations with as little interference from higher commanders as possible. Our tactics rely heavily on initiative, flexibility, and mobility.\n\nDe Gaulle proposes a doctrine in which formal rules can be selectively suspended in order to deal with unexpected events. Misplaced communications and enemy successes will cause problems. It is the officer's responsibility, not the general's, to do everything possible to overcome them. While in command, this doctrine encourages officers to show initiative, flexibility, and improvisation. It does not allow an officer to disobey orders, but it allows and even requires him to consider an order no longer binding if it would not have been given in the changed circumstances."

 FRA_Lighting_War_Strategy: "The "Guerre Eclair" Strategy"
 FRA_Lighting_War_Strategy_desc: "De Gaulle proposes "Guerre Eclaire", a somewhat novel strategy. Guerre Eclaire is a surprise attack that uses a rapid, overwhelming force concentration of armoured and motorised or mechanised infantry formations, together with close air support, with the intent of breaking through the opponent's lines of defence, dislocating the defenders, unbalancing the enemy by making it difficult to respond to the constantly changing front, and defeating them in a decisive battle of annihilation. Guerre Eclaire operations rely on surprise penetrations, general enemy unreadiness, and the enemy's inability to match the attack's speed.\n\nThe generals Charles Mangin and Marie-Eugène Debeney launched the first French Guerre Eclaire offensives in 1918. However, since the end of the Great War, French doctrine has shifted towards defence. It is time to reintroduce this strategy into our army now that we have decided to abandon our defensive doctrine in favour of a more offensive one."
 
 FRA_Cavalerie_Motorisee: "Motorised Cavalry"
 FRA_Cavalerie_Motorisee_desc: "De Gaulle prefers to concentrate armour and planes. He concludes that France cannot sustain the massive armies of conscripts and reservists that fought in the Great War, and he seeks to use tanks, mechanised forces, and aircraft to allow a smaller number of highly trained soldiers to have a greater impact in battle. We will paralyse the opponent's ability to react by using motorised mobility. Mobile forces that move quickly will seize the initiative, exploit weaknesses, and act before opposing forces can respond. Mobile forces can act faster than opposing forces due to superior mobility and faster decision-making cycles."

 FRA_Improve_D2_Tank: "Improve the Char D2"
 FRA_Improve_D2_Tank_desc: "The Char D2 is a relatively new French medium tank that has the potential to replace the heavier Char B1 as a battle tank. In the event of war, the Char B1 type can only raise a limited number of armoured divisions for the Infantry Arm; the Char D2 type allows for this to be increased.\n\nDe Gaulle is particularly interested in the Char D2 type, seeing a lot of potential in it. As France's foremost armour specialist, he uses the type to test his ideas about tank tactics, particularly in the field of radio communication. Through his testing, he has come to the conclusion that, while the new material is clearly superior to the Char D1, it has flaws. It is unreliable — the engine, transmission, steering, and cooling are all inadequate — and quickly wears out, necessitating extensive maintenance. As a result of de Gaulle's feedback, we will further improve the Char D2, making it the ideal medium tank."

 FRA_Tactique_de_Char_de_Bataille: "Char de Bataille Tactics"
 FRA_Tactique_de_Char_de_Bataille_desc: "De Gaulle proposes the Tactique de Char de Bataille, a new offensive military tactic. An offensive formation of armoured vehicles, mostly battle tanks, is used in this tactic. The tanks are arranged in a wedge shape, with the tanks at the tip being the most heavily armoured and armed. The advantage of this tactic is that the depth of the offensive formation forces anti-tank defences to constantly adjust their range. Furthermore, the heavily armoured tanks will attract the majority of anti-tank fire, shielding more vulnerable tanks from enemy fire. This new strategy will allow us to breach even the most sophisticated defences."

 FRA_Formation_Interarmee: "Inter-Armies Formation"
 FRA_Formation_Interarmee_desc: "De Gaulle emphasises the value of combining land and air units. Close air support will be provided to assist the airborne focal point of attack. Our success will be closely related to our ability to control the air war in future conflicts. Our air force must be adaptable and capable of carrying out both operational-tactical and strategic bombing missions.\n\nOur air force will be built to support our ground forces, have liaison officers with mobile formations, and fly more sorties per aircraft. Furthermore, our air superiority will allow unrestricted movement of ground forces, unhindered formation of concentrated attack formations, aerial reconnaissance, aerial resupply of fast moving formations, and close air support at the point of attack."

 FRA_Modernize_Armee_Terre: "Modernise the Armee de Terre"
 FRA_Modernize_Armee_Terre_desc: "It is critical that we recognise the major changes in warfare, most notably the involvement of motorised and mechanised units in combat and improved communications. We will create a new and modern army that will take months to organise and train, as well as new mechanised formations and modern equipment that will require proper testing, evaluation, and training. We will invest in several motorised divisions and conduct extensive research on motorised warfare. Once this modernization is complete, we will have one of the most modern armies in the world, mobile and capable of breaking through enemy lines with ease."

 FRA_Generalize_Radio_Usage: "Generalise Radio Usage"
 FRA_Generalize_Radio_Usage_desc: "Drums, horns, flags, and horseback riders are still used by our military to send messages over long distances. However, a new technology has recently come to dominate the field of military communication: radio. Allowing almost instant information transmission over long distances without the need for personal travel has revolutionised military communications and will forever change modern communications. This new technology will enable us to issue orders and respond to battlefield developments in real time.\n\nUnfortunately, many people do not recognise its potential because they still cling to old-fashioned methods of sending messages by horse. It is past time to introduce radios at every level of the army and train our soldiers on their importance, potential, and best use. This will be critical in future battles where we can take advantage of the organisational advantage radio communication provides us over our enemies."

 FRA_Char_Futur: "The Char Futur"
 FRA_Char_Futur_desc: "Our tanks, in general, are well-armoured, innovative vehicles that owe little to foreign designs. The light tanks, on the other hand, lack firepower, are slow, and almost all of our tanks are weakened by their one-man turrets. The Renault FT light tank, which set the general layout for future tank designs and is used or redesigned by various military forces, was the most significant French tank development during the Great War.\n\nDe Gaulle envisions a new and modern tank that, like the Renault FT, will be one of the most revolutionary and influential tank designs in history. "Char Futur," or "Future," is what he calls it. A tank unlike any other seen thus far, one that will strike fear into the hearts of enemies just at the sight of it and will easily dominate the battlefield, outclassing all other tanks."

 FRA_Get_Rid_Old_officiers: "Get Rid of the Old Officiers"
 FRA_Get_Rid_Old_officiers_desc: "Many Old Guard officers are sceptical of Mordacq. They cling to their antiquated defensive doctrine of trench warfare, oblivious to the fact that doing so will ensure France's annihilation. We cannot allow them to prevent us from successfully preparing for total war, whether they accept it or continue to live in ignorance. The old guard's factionalism and opposition will come to an end. Any officer who refuses to follow this new doctrine and Mordacq's orders will be fired immediately. It is time to reorganise the entire army and command structure, because if we are to survive the coming war, we must all believe in Mordacq and his total war doctrine."

 FRA_Mordacq_Lecon_de_14: "Mordacq's "Leçons de 14""
 FRA_Mordacq_Lecon_de_14_desc: "Henri Mordacq is a French general who served as a captain and sabre champion of the French Army's officer corps in his early years. During the Great War, he was a frontline commander of the famous 159th Regiment of Alpine Infantry, where he was responsible for halting German advances, allowing the front to be stabilised and trench warfare to begin.\n\nAs a visionary, he predicted the length of the Great War, the incapacity of French offensive plans, technical and logistical shortcomings, a lack of tactical and strategic training for officers, and the risk of a new war if the Treaty of Versailles clauses were not followed. In the event of war, Mordacq predicts that Germany will invade France via Belgium in order to avoid the French fortifications in Lorraine.\n\nHe recently published a book titled "The Lessons of 1914 and the Next War," in which he advocates for France to prepare for a "Total War," arguing that the next war will be even larger and more devastating than the last one, as well as any other war the world has seen thus far."
 FRA_Has_Henri_Mordacq_CoArmy_tt: "§YHenri Mordacq§! is §YChief of Army§!"

 FRA_SI_VIS_PACEM: "Si Vis Pacem Para Bellum"
 FRA_SI_VIS_PACEM_desc: "It took Hitler's arrival and his constant calls for Deutschland über alles to finally open the French eyes. The time has come to remind them that war is very likely and that, as a result, it is necessary, to use the Germans' euphemism, to prepare for it. As a result, it will take Germany several years to put its former lenders to rest and restore confidence. This is not war preparation, but rather a kind of insurance against the madness, the calamity that it represents, and which, unfortunately, can occur from one day to the next if we do not take the necessary precautions. Are true pacifists those who devote themselves to this task or those who are content to bleat peace?"

 FRA_Haute_Instit_Strat: "The "Haut Institut à la Stratégie Militaire""
 FRA_Haute_Instit_Strat_desc: "According to Mordacq, the army's modernization must be accompanied by a rejuvenation of the army's senior staff. He considers that a large number of army or corps generals, divisional officers and brigadiers are too worn out or unsuitable to pursue a war of manoeuvre and strategy in keeping with the confidence placed in them by the government.\n\nEvery divisional officer, brigadier, and colonel who has reached a certain age and lacks the physical and intellectual vigour required by the circumstances is to be re-educated. Thus, initiatives to modernise the army, revitalise cadres, and prioritise combat and military training will go hand in hand with education measures. We will establish the High Institute for Military Strategy to educate high command in large-scale strategy, particularly when it comes to global war planning."

 FRA_Prepare_Devision_Reserve: "Prepare the Division de Reserve"
 FRA_Prepare_Devision_Reserve_desc: "We will need every able-bodied man to pick up a rifle and fight for his country in the coming war. All active units must be brought up to full strength with designated reserve units during mobilisation. With trained personnel, our military reserves will quickly increase available manpower and many of them are combat veterans who will increase the size and quality of our force.\n\nWe will be able to avoid the political and financial costs of new recruits or conscripts if we have a large reserve pool, because reservists are called up as needed, so they are more cost effective than regular troops. Reservists also have training in professions other than the military, as well as skills in a variety of professions that are useful in the military. Preparations for a call-up will demonstrate our determination in winning the coming conflict."
 FRA_Prepare_Devision_Reserve_Update_Full_tt: "Adds §Y8§! more units to £helmet_icon_1_20x20 §YSérie A Réserve§!.\nAdds §Y8§! more units to £helmet_icon_1_20x20 §YSérie B Réserve§!."
 FRA_Prepare_Devision_Reserve_Update_A_tt: "Adds §Y8§! more units to £helmet_icon_1_20x20 §YSérie A Réserve§!."
 FRA_Prepare_Devision_Reserve_Update_B_tt: "Adds §Y8§! more units to £helmet_icon_1_20x20 §YSérie B Réserve§!."

 FRA_Flandre_Maneuvers: "The Flandre Maneuvers"
 FRA_Flandre_Maneuvers_desc: "Mordacq intends to organise war manoeuvres in the Flanders region to test the army's ability to internalise and execute the new strategies and doctrine Mordacq has developed and implemented, as well as to see what aspects need to be worked on and improved and to be ready for any possible situation. We will need to be prepared for anything if war breaks out, and these manoeuvres will be a good exercise for both our soldiers and our officers, generals, and military high command, as Mordacq's doctrine will be seen and tested in the field. Reserve divisions will also be prepared for the next war."

 FRA_War_of_Annilation: "War of Annihilation"
 FRA_War_of_Annilation_desc: "Our north-eastern border is no longer covered by the Belgian army. The Germans, who are methodical and prudent, will not make the strategic mistake of attacking the current Maginot Line or our fortifications in Lorraine. There is no doubt that they would extend their right wing to the sea this time in the north. There should be no mention of Dutch or Belgian resistance. At the moment, it is difficult to believe. If war broke out tomorrow, it would be even worse than the previous one. We must not be deceived: total war means using every conceivable means to defeat the adversary, including the use of asphyxiating gas, unrestricted submarine warfare, and the massacre of non-combatants using bombs or even simple gunfire."

 FRA_Restart_Yperit: "Restart Production of Ypérit"
 FRA_Restart_Yperit_desc: "There will be no rules or regulations in the upcoming war. The enemy will use everything at their disposal against us in order to destroy us at any cost. We will have to do the same in order to survive. We will restart production of Yperite, or mustard gas, which proved effective during the Great War. Although it is rarely lethal, it is particularly effective incapacitating agent. With all known countermeasures against mustard agent currently being relatively ineffective, this is guaranteed to give us an edge in any coming battles."

 FRA_Guerre_Total: "The "Guerre Totale" Tenet"
 FRA_Guerre_Total_desc: "Total goals, total methods, total mobilisation, total control, and total transformation. These are the five dimensions of Mordacq's total war doctrine. The level of national mobilisation of resources will be unprecedented, the battlespace will be the entire world, the scale of the armies, navies, and air forces raised through conscription will be unimaginable, active targeting of non-combatants and non-combatant property will be a necessary evil, general disregard for collateral damage, and the belligerents' unrestricted aims will mark the coming war on an unprecedented and unrivalled scale."
 FRA_Guerre_totale_merge_tt: "National spirits §YCitizen-Soldier§! and §YWar of Annihilation§! will be merged into:"

 #Air Army
 FRA_Armee_de_lAir: "Armée de l'Air"
 FRA_Armee_de_lAir_desc: "In the first days of flight, France was at the forefront of aviation technology. The best and the brightest in this field called our country home. La Patrie even gave birth to the first fighter pilot ever. However, after the devastation of the Great War, less and less industry was allocated to making new planes. We need to nationalise the aircraft industry and build the once-proud Armée de l’Air back to its glory. The Germans have simply ignored the restrictions on their aircraft, building new, better planes that outmatch our antiquated ones. This cannot be allowed. After these reforms have finished, the enemy will fear the sound of French aircraft."

 FRA_The_Black_Cruse: "§SThe Black Cruise§!"
 FRA_The_Black_Cruse_desc: "Although the wars end brought peace to France, the country and its infrastructure had been ravaged by four years of fighting, and the scars left behind were not only physical. As a result, the industry took some time to recover. Unsurprisingly, orders for military planes fell after the Armistice, resulting in squadron strength reductions.\n\nInspired by the great raid led by Italian General Balbo on the North Atlantic, air minister Pierre Cot has tasked General Vuillemin, a figurehead of the bombardment during the Great War, experienced raid pilot, and high profile personality rank of military aviation, with organising a squadron raid in French Africa dubbed the Black Cruise. The goal of this company is to demonstrate the Air Force's ability to operate in large formations over long distances and to contribute to its public image of an independent air force in the context of a quest for greatness through aviation."
 
 FRA_Adopt_Fequants_Ideas: "Adopt Féquant's Ideas"
 FRA_Adopt_Fequants_Ideas_desc: "Albeit age has already come to him, Philippe Féquant's leadership of the Lafayette Escadrille during the Great War has yielded the man a great deal of knowledge regarding the use of planes in a support role for the men fighting below. By gathering his memoirs, and conducting careful examination of his role leading the American volunteers, we can make a push to improve our air force, and thus or troops."

 FRA_Legacy_of_Lafayettes: "Legacy Of The Lafayettes"
 FRA_Legacy_of_Lafayettes_desc: "During the Great War, the American volunteer fighter squadron known as the \"Lafayette Escadrille\", managed to sustain little losses but also ended the war with eleven aces in total. With the Escadrille disbanded, even though French planes back then were still primitive when compared to the more recent designs, their tactics to aid our troops and protect them from aerial attacks might not only prove useful but needed in the years to come."

 FRA_Keep_Vuillemin_in_Charge: "Keep Vuillemin In Charge"
 FRA_Keep_Vuillemin_in_Charge_desc: "The Great War ace and current Inspector General of Home Air Defence Joseph Vuillemin has been serving us well for quite some time now, and although his ideas have come under heavy criticism by both civilian and military authorities, his approach towards a safe, no-nonsense air doctrine might serve us well in the battles France is sure to face. A promotion should be considered."

 FRA_An_Independent_Army: "An Independent Air Force"
 FRA_An_Independent_Army_desc: "Observers and participants of the last few wars around the globe base their CAS strategies on their experience of the conflict. However, Aviators who want institutional independence from the Army, are pushing for a view of air-power centred around interdiction, which will relieve them of the necessity of integrating with ground forces and allow them to operate as an independent military arm. They see close air support as both the most difficult and most inefficient use of aerial assets.\n\nLaurent Eynac wishes to pursue a policy of complete independence for the Armée de l'Air from the Armée de Terre. This process will necessitate a thorough modernization of the air force, including the installation of communication wires between all military air bases. The Centre d'Instruction à la Chasse, or Hunting instruction centre, will be established as part of this modernization to train our pilots on how to use fighter planes in combat. Finally, the Commandement des Forces Aériennes, or Air Force Command, will be established, bringing the Air Force under a single command separate from the Armée de Terre."
 
 FRA_Tactique_de_Concentration: "Tactique de Concentration"
 FRA_Tactique_de_Concentration_desc: "During the Great War, the Central Powers found themselves increasingly unable to match the Allied Powers in terms of total number of fighter aircraft. To compensate for this shortcoming, the Germans concentrated their fighters into large mobile Jagdgeschwader formations, the most famous of which was Manfred von Richthofen's Flying Circus, that could be moved quickly and unexpectedly to different points along the front. This enabled them to achieve local superiority in numbers, allowing them to achieve air supremacy in a local area in support of ground operations or simply destroy Allied fighters as part of an overall attrition strategy.\n\nTo achieve air superiority, we will use a force concentration strategy similar to that used by Germany during the Great War."
 
 FRA_Feu_et_Acier: "Feu et Acier"
 FRA_Feu_et_Acier_desc: "One of the goals of war is to demoralise the enemy; facing constant death and destruction may make peace or surrender more appealing. Since the Great War, supporters of strategic bombing have predicted that direct attacks on an enemy country's cities by strategic bombers will result in a rapid collapse of civilian morale, resulting in political pressure to sue for peace.\n\nStrategic bombing is a planned and executed aerial attack that can use strategic bombers or long- or medium-range missiles to attack targets deemed critical to the enemy's war-making capability. We will use this strategy to our advantage, raining fire and steel on our adversaries."
 
 FRA_Cooperated_with_the_Armee_de_Terre: "Cooperate with the Armée de Terre"
 FRA_Cooperated_with_the_Armee_de_Terre_desc: "The use of aircraft in close air support of ground forces dates back to World War I, the first conflict in which aerial forces were used in a significant military capacity. Air warfare, and indeed aviation itself, were still in their infancy - and while the direct effect of rifle calibre machine guns and light bombs on Great War aircraft was very limited compared to the power of an average fighter bomber today, CAS aircraft were still able to achieve a powerful psychological impact. Unlike artillery, the aircraft is a visible and personal enemy, posing a personal threat to enemy troops while assuring friendly forces that their superiors were concerned about their situation.\n\nBy organically integrating the airforce into the army, the Armée de l'Air will act more like a support company, assisting our ground forces with reconnaissance and adjusting artillery fire. We will demoralise the enemy while also strengthening the morale of our own troops if we work closely with our ground forces."
 
 FRA_Learn_from_the_Croisiere_Noir: "Learn from the Croisière Noir"
 FRA_Learn_from_the_Croisiere_Noir_desc: "Aviation appears to some as a means of believing in the future, of providing a model of life for youth. Our people are inspired by the exploits of pilots such as Guillaumet and Mermoz, and they applaud the performance of Costes and Bellonte, who were the first to connect Paris and New York in 1930.\n\nWith the successful squadron raid in French Africa, the Black Cruise, the formation of an independent air force occurred in the context of a quest for greatness through aviation. We will analyse this raid and the tactics and strategies used, study reports, and learn from those involved, including General Vuillemin, so that we can learn and use our previous success to our advantage in future battles."
 
 FRA_Create_the_Centre_dInstruction_au_Parachutisme: "Create the Centre d'Instruction au Parachutisme"
 FRA_Create_the_Centre_dInstruction_au_Parachutisme_desc: "The history of French military parachuting began during the interwar period, when the French army formed specialised parachute units. They were originally from the Air Force and were quickly integrated into the Army before being distributed to all components of the army.\n\nThe School of Airborne Troops is in charge of training military paratroopers from the French Army's four branches: the Army, the Navy, the Gendarmerie, and the Air Force. It is the culmination of the various reorganisations of French airborne troops. This school is dependent on the Air Force but is in charge of training paratroopers from all three armies, land, air, and sea."
 
 FRA_Politique_des_Prototypes: "The Prototype Policy"
 FRA_Politique_des_Prototypes_desc: "Western militaries have adopted the concept of "prototype warfare" in recent years to accelerate the experimental development, acquisition, and deployment of emerging technologies in warfare. Building on scholarship at the intersection of Science and Technology Studies and International Relations that investigates the broader discursive and material infrastructures that underpin contemporary logics of war, and with a particular interest in the relationship between science, technology, and war, the experimental way of warfare emerges.\n\nWhile warfare has always been defined by experimental activity, what is unique in the current context is how experimentation is extending across an increasingly broad range of military practises, based on a highly speculative understanding of experimentation that embraces failure as a productive force."


 #Navy
 FRA_Marine_National: "§3Marine National§!"
 FRA_Marine_National_desc: "Many think that British naval supremacy is a fact of life. They believe that no one ever challenged the Royal Navy and succeeded. They are wrong. There was once a time when French ships ruled the waves, unopposed. Unfortunately, that time is long gone. But it does not need to be gone forever. we need to build up our fleet and modernise its doctrines so that the Marine Nationale will once again be feared. The French Tricolore will sail the seas, and every sailor will once more be proud to serve in the Marine Nationale. But before we can even dream of returning to such glory we have work to do. It's time to rearm the Navy."

 FRA_Break_the_Treaty_of_London: "Break the Treaty of London"
 FRA_Break_the_Treaty_of_London_desc: "The London Naval Treaty, officially the Treaty for the Limitation and Reduction of Naval Armament, was signed on April 22, 1930, by the United Kingdom, Japan, France, Italy, and the United States. The new agreement regulates submarine warfare, further controls cruisers and destroyers, and limits naval shipbuilding in order to address issues not addressed by the 1922 Washington Naval Treaty, which established tonnage limits for each nation's surface warships. Ratifications were exchanged in London on October 27, 1930, and the treaty went into effect the same day, but it has been largely ineffective since then.\n\nWe cannot allow our navy to be severely limited as the London Treaty proposes if we ever want to be a major naval power again, rivalling that of the United Kingdom. To gain an advantage over other competing seafaring nations and reclaim control of the waves, we will disregard the treaty and begin building new ships immediately."
 
 FRA_Broke_London_Treaty: "Withdrew from the Treaty of London"

 FRA_Renewal_of_the_Jeune_Ecole: "Renewal of the Jeune Ecole"
 FRA_Renewal_of_the_Jeune_Ecole_desc: "The Jeune École, or "Young School," is a strategic naval concept that emerged in the nineteenth century. It advocates the use of small, heavily armed ships to combat larger battleships, as well as the use of commerce raiders to cripple the rival nation's trade. The concept was developed by French naval theorists because our government had the second largest navy in the world at the time, and the theorists wanted to counteract the strength of the larger British Royal Navy.\n\nWe have also been very active in the development of a submarine fleet, attempting to compensate for the British numerical superiority in battleships through technological development. We were unquestionably the first navy to have an effective submarine force by the turn of the twentieth century."
 
 FRA_Darlans_Doctrine: "Darlan's Doctrine"
 FRA_Darlans_Doctrine_desc: "Vice Admiral François Darlan is a political figure. Darlan, who was born in Nérac, graduated from the École navale in 1902 and rose quickly through the ranks after serving in the Great War. During the First World War, he commanded an artillery battery at the Battle of Verdun. Darlan commanded the training ships Jeanne d'Arc and Edgar Quinet after the war, rising to the rank of frigate captain in 1920 and captain in 1926. In 1929, he was promoted to rear admiral, and in 1932, to vice admiral.\n\nDarlan has his own vision and ideas about what naval strategies and tactics we should use, as well as the ideal naval composition. In most naval matters, we will seek his advice and counsel."
 FRA_Darlans_Doctrine_tt: "Modify §YLa Royale§! by \nAttack when in combat alongside the §YPride of the Fleet§!: §G+15.0%§!"

 FRA_Estevas_Experience: "Esteva's Experience"
 FRA_Estevas_Experience_desc: "Jean-Pierre Esteva was a naval officer during the Great War. Esteva enrolled in the École Navale, the Naval School, in 1898 and left to work as a ship's teacher in 1900. He served in the Great War as a Lieutenant. Assigned to the Mediterranean squadron, he participated in, among other operations, the Battle of the Dardanelles, during which he distinguished himself. In 1920, he was a professor at Toulon's École supérieure de la Marine; in 1927, captain Esteva decided to pursue a pioneering path in the fledgling naval aviation, an unusual choice for an officer of this rank. He was promoted to Rear Admiral in 1929 and served as Director of Maritime Aviation before becoming Deputy Chief of the Air Staff in 1930.\n\nWhen it comes to naval strategies and tactics, Esteva has a wealth of experience and knowledge. We will seek his advice and counsel on most naval matters."
 FRA_Estevas_Experience_tt: "Modify §YLa Royale§! by \nSortie efficiency: §G+15.0%§!"


 FRA_Auphans_Innovation: "Auphan's Innovation"
 FRA_Auphans_Innovation_desc: "During the Great War Gabriel Paul Auphan was second in command of submarine Le Verrier in September 1917, where he participated in campaigns in the Adriatic until the end of the war. In January 1919, he was sent to Rijeka to serve in the intelligence service, then in Egypt and Lebanon. Lieutenant de Vaisseau in June 1919, he commanded the submarine Le Verrier in the Mediterranean, and wrote studies of analysis on the role of torpilleurs during the Battle of Jutland and the employment of tactical submarines engaged in chases by groups.\n\nWhile Auphan may not have that much experience or knowledge in the naval fields, he makes up for it with his unusual and innovative naval strategies and tactics centred around submarines, causing him to be called a genius by some and a fool by others. However, we have decided to give Auphan's ideas a chance and will start to adopt some of his strategies."
 FRA_Auphans_Innovation_tt: "Modify §YLa Royale§! by \nConvoy Raiding Efficiency: §G+10.0%§!"

 FRA_Escorts_for_La_Marchande: "Escorts for La Marchande"
 FRA_Escorts_for_La_Marchande_desc: "During the Great War, the French Navy played an important role in countering Germany's U-boat campaign by patrolling the seas and escorting convoys on a regular basis. To fulfil the task of naval escorts in the immediate aftermath of the war, the French Navy was limited to a fleet of destroyers and a number of avisos. Later, they were joined by several naval ships of German and Italian origin awarded as war reparations, as well as several escort vessels from the United Kingdom and the United States, all with different designations.\n\nA new term, Escorteur, or Escort Ship, has recently appeared to designate a medium or light displacement warship whose mission is to protect ocean convoys and naval squadrons from submarine attacks. This function is typically performed by a destroyer escort, a Hunt-class destroyer, or even a River class. To better protect our convoys from enemy submarines, we will begin investing more in Escorteur research."
 FRA_Escorts_for_La_Marchande_tt: "Modify §YLa Royale§! by \nEscort efficiency: §G+10.0%§!"
 
 FRA_A_Force_to_Be_Reckoned_With: "A Force to Be Reckoned With"
 FRA_A_Force_to_Be_Reckoned_With_desc: "The \"Napoléon\" became the first purpose-built steam-powered battleship in 1850. The pre-dreadnought battleship resurrected with surprising vigour and new protections against torpedoes and mines in the early 1890s, and torpedo boats proved inadequate for open ocean navigation.\n\nThe Navy's development slowed in the early twentieth century, and as a result, it was outnumbered by the German and US Navies. It was too late to introduce new dreadnought battleships and light cruisers, and we entered the Great War with a small number of modern ships.\n\nWe will not repeat the same error. Our navy will now play an important role in future conflicts, and it will once again be a force to be reckoned with, as it once was."
 FRA_A_Force_to_Be_Reckoned_With_tt: "Modify §YLa Royale§! by \nFleet Coordination: §G+5.0%§! \nCapital Ship Attack: §G+10.0%§!"
 
 FRA_Naval_Aviation: "Naval Aviation"
 FRA_Naval_Aviation_desc: "With the establishment of the Service Aeronautique and the first flight training schools in 1910, we established a naval aviation capability. Surcouf, a large submarine that also carried a floatplane, was built by the French Navy but was ineffective in combat. The Aéronavale is the French Navy's naval air arm. The full official name is Force maritime de l'aéronautique navale. The Aéronavale was founded in 1912 as a merger of aircraft carrier squadrons and the naval patrol air force. The force is led by a flag officer with the official title of Admiral of Naval Aviation, who is based at the Toulon naval base.\n\nWe will not be discouraged by previous failures in the field of naval aviation, but will instead invest more in the research of these new technologies, which, if used correctly, have the potential to forever change naval combat and strategies, as well as the way we have to approach them."
 FRA_Naval_Aviation_tt: "Modify §YLa Royale§! by \nNaval Air Attacks from Carriers : §G+10.0%§!"

 FRA_Moving_Airfields: "Moving Airfields"
 FRA_Moving_Airfields_desc: "A warship that serves as a seagoing airbase and has a full-length flight deck as well as facilities for carrying, arming, deploying, and recovering aircraft is known as an aircraft carrier. It enables a naval force to project air power around the world without relying on local bases to stage aircraft operations. If used correctly, this experimental technology has the potential to be a centrepiece of our fleet due to its diplomatic and tactical power, mobility, autonomy, and variety of means. Tactically or strategically, it could even replace the battleship as the fleet's flagship. One of its major advantages is that it shortens aircraft transit times and distances, allowing them to spend more time on the battlefield.\n\nWe will immediately begin investigating this new and experimental technology in order to rule and dominate both the seas and the skies in the future."
 FRA_Moving_Airfields_tt: "Modify §YLa Royale§! by \nNaval max range: §G+20.0%§! \nCarrier overcrowding: §G-30.0%§!"
 
 FRA_Attentisme: "Attentisme"
 FRA_Attentisme_desc: "Our navy's history of commerce-raiding dates all the way back to the end of the 18th century, when captains like Jean Bart, Claude de Forbin, and René Duguay-Trouin turned to commerce-raiding rather than large fleet actions with great success.\n\nThe Jeune École theory has revitalised this strategy. Apart from submarine tactics, the other component of the Jeune École concept is planning to raid the enemy's commercial ships in order to disrupt its trade and economy, a tactic designed specifically against the United Kingdom. Raiding ships, such as the Dupuy de Lôme, were built specifically for this purpose. The armoured cruiser Dupuy de Lôme, built in 1888, was capable of 23 knots and was designed to raid enemy commerce ships during extended forays afloat.\n\nWe will expand on this aspect of the Jeune École theory, which emphasises the use of small, inexpensive torpedo boats to destroy expensive battleships, in conjunction with long-range commerce raiders to attack an opponent's merchant fleet."
 FRA_Attentisme_tt: "Modify §YLa Royale§! by \nTorpedo reveal chance : §G-15.0%§!"

 
 FRA_Tactical_Usage_of_Submarines: "Tactical Usage of Submarines"
 FRA_Tactical_Usage_of_Submarines_desc: "Military submarines first made an impact during the Great War. Germany's U-boats saw action in the First Battle of the Atlantic, and were responsible for sinking the RMS Lusitania as a result of unrestricted submarine warfare. The ability of the U-boats to function as practical war machines was dependent on new tactics, their numbers, and submarine technologies developed in the preceding years, such as the combination diesel-electric power system. U-boats were more submersibles than true submarines, operating primarily on the surface with regular engines and occasionally submerging to attack under battery power.\n\nSince then, many navies, including our own, have experimented with submarines, attempting to determine their best uses and tactics. Auphan has some unusual and innovative naval strategies and tactics centred on submarines that we will investigate further and develop."
 FRA_Tactical_Usage_of_Submarines_tt: "Modify §YLa Royale§! by \nTorpedo hit chance: §G+10.0%§! \nSubmarine Attack: §G+15.00%§!"

 FRA_The_Maritime_Zones: "The Maritime Zones"
 FRA_The_Maritime_Zones_desc: "The military port of Toulon, located in the city of Toulon, is the main base of our Navy and the largest naval base in the Mediterranean. It houses the majority of our naval action force. The base houses more than 60% of our Navy's tonnage, and it employs thousands of military and civilian personnel.\n\nThe port of Toulon, as well as the Brest Arsenal, a collection of naval and military buildings located on the banks of the Penfeld River in Brest, will be expanded even further to meet the ever-increasing demands for our rapidly expanding naval forces and to cement our naval strength in these regions."

 FRA_Modernize_the_Fleet: "Modernise the Fleet"
 FRA_Modernize_the_Fleet_desc: "Coming home as a naval officer in November 1918 was a depressing experience. The fleet had been ruined by neglect rather than combat, as the French navy had missed almost all of the major battles of the war. Only the army counted in the Great War for the average Frenchman, and for navy men, this oblivion was all the more painful because it marked the end of at least fifty romantic years of colonial life in which the navy had been the centre of life and an institution of social prestige. The naval elite's attitudes were governed by economic hardship and the conviction that the navy would remain a military stepchild in the eyes of the government as they prepared for the major struggle of rebuilding their fleet.\n\nHowever, instead of a struggle, the exact opposite occurred. Despite the limitations imposed by the 1922 Washington Naval Treaty, our Navy has been significantly modernised and expanded since the end of the Great War and we'll even take it a step further: We will spend unprecedented sums of money to completely renovate the navy."
 
 FRA_The_Fusiliers_Marins: "The Fusiliers Marins"
 FRA_The_Fusiliers_Marins_desc: "The Fusiliers marins are a type of naval infantry trained for land and coastal combat. The Fusiliers marins are in charge of protecting naval vessels and key French Navy land sites. They are tasked with participating in land operations from the sea, special operations, protecting Navy sensitive sites, and reinforcing protection duties provided by Naval forces.\n\nThe Fusiliers marins have always been an important part of the French Navy. An Imperial decree dated 5 June 1856 established the Fusiliers marins, which were formed and trained by a battalion stationed in Lorient, Brittany. This specialised corps was placed under the command of the captains and sergeants-at-arms of the French fleet's various naval vessels.\n\nSince then, the Fusiliers have been involved in a number of conflicts, including military colonial campaigns at the end of the nineteenth century, expeditions to China, Cochinchina, Tonkin, and Madagascar, and European conflicts like the Franco-Prussian War and the Great War."

 # Wartime Tree
 FRA_General_Mobilization: "General Mobilization"
 FRA_General_Mobilization_desc: "The worst-case scenario has played out. We are officially in a state of war as a result of a brutal and unjustified invasion. It is now time to arm every able-bodied man and send him to fight for his country. We have a large conscript army with the capacity to mobilise 6.7 million men from France and our colonies. To begin, five million men will be mobilised. Our army is one of the strongest in the world, more than capable of competing with our adversaries, and our soldiers are more than willing to die defending French soil from foreign invaders."
 FRA_General_Mobilization_tt: "§RFrance will mobilise for war§!"

 FRA_Form_War_Gouvernment: "Form a War Government"
 FRA_Form_War_Gouvernment_desc: "Many people still refuse to accept the reality of a new world war so soon after the Great War. Our current cabinet is unfit for war, as many members lack the necessary experience for a situation like this. We will reshuffle our cabinet and appoint Raoul Dautry, a French engineer, business leader, and politician, as our new Armaments Minister in order to have a stable and competent government in times of war like these. We hope to be prepared for a war of this scale and length with Dautry at the helm of a position that is now more important than ever."

 FRA_Ban_the_PCF: "Ban the PCF"
 FRA_Ban_the_PCF_desc: "We will take additional measures against the French Communist Party, as this organisation is very likely to betray us at the first opportunity. While the communist press has already been declared illegal by a previous decree prohibiting the publication of L'Humanité, it is now time to put the final nail in the coffin of the communist threat. We will dissolve the French Communist Party and declare them illegal. Furthermore, any elected Communists will have their mandates revoked by decree-law. It is more important than ever to eliminate any internal threats so that we can devote our full attention to the war."

 FRA_The_Anti_Fascist_Front: "The Anti-Fascist Front"
 FRA_The_Anti_Fascist_Front_desc: "The Popular Front, led by Léon Blum, is a strong and proud bulwark against fascism. It demonstrates the success of socialist leftist policies as well as the significance of their values and principles. We have successfully prevented fascism from taking root in our country and will continue to do so, especially during times of war. Every member of our government and every citizen of our country believes is a stout believer of anti-fascism. It is time to demonstrate to our enemies the values of liberty, democracy, and socialism."

 FRA_A_National_Union_to_Save_France: "A National Union to Save France"
 FRA_A_National_Union_to_Save_France_desc: "The French right is divided about the war, believing that the Soviets, not Nazi Germany, pose the greater long-term threat. The current government, on the other hand, considers the war with Germany to be of greater importance and refuses to send aid to the Finns. Flandin and Pierre Laval held secret sessions of the legislature to condemn our actions, leaving us no choice but to resign and form a new government. France's new Prime Minister will be Paul Reynaud. Reynaud is becoming increasingly popular, with strong support from the left, particularly the French Section of the Workers' International party, but he faces stiff opposition from many right-wing parties, including even his own party."

 FRA_La_Patrie_en_Danger: "La Patrie en Danger"
 FRA_La_Patrie_en_Danger_desc: "One thing has become more and more clear. It is that our enemy seeks to establish a domination over the world completely different from any known in history. We took up arms against aggression. We shall not put them down until we have guarantees for a real peace and security, a security which is not threatened every six months. For us, there is more to do than merely win the war. We shall win it, but we must also win a victory far greater than that of arms. In this world of masters and slaves, which those madmen are seeking to forge, we must also save liberty and human dignity. The trial of strength turns to our advantage. It is only necessary to hold, hold, hold!"

 FRA_Remove_the_Defeatist: "Remove the Defeatists"
 FRA_Remove_the_Defeatist_desc: "The domination at which our foes aim is not limited to the displacement of the balance of power and the imposition of supremacy of one nation. It seeks the systematic and total destruction of those conquered by them, and it does not treaty with the nations which they have subdued. They destroy them. They take from them their whole political and economic existence and seeks even to deprive them of their history and their culture. They wish to consider them only as vital space and a vacant territory over which they have every right.\n\nWe must face reality and accept that if we lose this war, our culture, history, economy, and people will perish. There is no room for pacifism or defeatism anymore; it is a battle for survival. This is something that Deputy Prime Minister Marshal Pétain and Commander-in-Chief General Weygand appear to be oblivious to, as they continue to demand an armistice and refuse to listen to reason. We will sack Petain and Weygand, removing them from any position of power, on the advice of De Gaulle."

 FRA_The_GQG: "The GQG"
 FRA_The_GQG_desc: "The Grand Quartier Général is the French Army's general headquarters. The GQG, which was founded in 1911, will be re-established following the outbreak of the war. During the Great War, the original GQG operated from 1914 to 1919. Since then, the GQG's activation plans have evolved significantly, with the formation gradually shifting westward from an offensive-oriented position near the German border at Metz in the 1920s. Now its planned base is at the Château de Vincennes in the Paris suburbs, from which it will conduct a defensive war. We will activate the GQG in conjunction with the mobilisation of the Army."

 FRA_Mobilize_the_Colonies: "Mobilise the Colonies"
 FRA_Mobilize_the_Colonies_desc: "In desperate times, desperate measures are required, and the energetic Colonial Minister Georges Mandel has encouraged us to mobilise our vast colonial empire in order to gain an advantage over our adversaries and throw everything we have at them. Although the mobilisation of our colonies will be unpopular with the natives, and resistance and unrest are to be expected, it will provide us with much-needed additional manpower to defend our soil. We don't have nearly enough men to fight our enemies, so this is our best and only option for increasing our numbers and turning the war around."

 FRA_The_Supreme_War_Council: "The Supreme War Council"
 FRA_The_Supreme_War_Council_desc: "To oversee France and the United Kingdom's joint military strategy, the Anglo-French Supreme War Council will be established. Officials from both sides will try to find ways to improve relations between the English and the French. The Anglo-French Purchasing Committee and the Anglo-French Co-ordinating Committee are associated bodies. Jean Monnet chairs the latter, which is in charge of joint economic planning and overseeing ten executive committees. One of the first acts will be the signing of a declaration with British Prime Minister David Cameron that neither of our two countries will sign a separate peace treaty."

 FRA_Project_Gerboise: "Project Gerboise"
 FRA_Project_Gerboise_desc: "Frédéric Joliot Curie's work is credited with giving birth to nuclear physics. He demonstrated the production of radioactive phosphorus, an isotope of natural phosphorus, at the end of 1933 by bombarding a sheet of aluminium with a polonium source. He deduced that it was possible to create radioactive elements with the same properties as natural elements. A few years after, four men, including Joliot, published an article that was critical to the continuation of events, demonstrating that the fission of the uranium nucleus was accompanied by the emission of 3.5 neutrons, which could then fragment other nuclei, and so on, via a 'chain reaction' phenomenon.\n\nThey applied for three patents: the first two concerned the production of energy from uranium, and the third, which was kept secret, concerned the improvement of explosive charges. These three researchers are now working as part of a team led by Joliot at the Collège de France. Joliot, convinced of the future importance of civilian and military applications of atomic energy, will meet with Raoul Dautry, Minister of Armaments, first for explosives development and, second, for energy production."

 FRA_Plan_Mandel: "Plan Mandel"
 FRA_Plan_Mandel_desc: "Mandel has been preparing the French Colonial Empire for war since a few years ago. He has established armament factories in French Indochina to supply the French garrisons there to deter Japan from invading, increased the number of colonial "coloured" divisions from 6 to 12, built defensive works in Tunisia to deter an Italian invasion from Libya and organised the colonial economies for a "total war". Mandel argued that the French Army should fight an offensive war after the war began. Mandel, as an anglophile, opposes any armistice. Some on the right have accused Mandel of being a warmonger and putting his Jewish ancestry ahead of France's interests, but it is clear that we must collaborate with him if we are to survive."

 FRA_Inter_Allied_Air_Command: "Inter-Allied Air Command"
 FRA_Inter_Allied_Air_Command_desc: "The French aviation industry has produced a significant number of aircraft, but a chronic lack of spare parts has rendered our fleet inoperable. Despite its flaws, the Armée de l'Air has outperformed expectations, destroying numerous enemy aircraft in air-to-air combat. However, as the air situation worsens, we will establish an Inter-Allied Air Command to coordinate air operations and tactics with our allies in order to achieve air superiority and dominate the skies, and in the process give our ground forces a signifcant advantage on the battlefield."

 FRA_Hundred_Million_Bayonets: "110 Million Bayonets"
 FRA_Hundred_Million_Bayonets_desc: "In France, Mandel has launched a propaganda campaign under the slogan "110 million strong, France can stand up to any foe," referring to the fact that France's population is 40 million, with the additional 70 million attributed to France being the population of its colonies. This propaganda campaign has had some success, and our people remain optimistic that we will win this war. With the situation becoming more dire by the day, this propaganda campaign may one day even become a reality."

 FRA_Mass_Produce_H_Thirty_Nine: "Mass Produce the H39"
 FRA_Mass_Produce_H_Thirty_Nine_desc: "The Hotchkiss H35, also known as the Char léger modèle 1935 H, is a pre-war French cavalry tank. Despite being designed in 1933 as a relatively slow but well-armored light infantry support tank, the type was initially rejected by the French Infantry because it proved difficult to steer while driving cross-country, and was instead adopted by the French Cavalry arm in 1936. Since 1938, an improved version with a more powerful engine has been produced, known as the Char léger modèle 1935 H modifié 39, which is also equipped with a longer, more powerful 37 mm gun. We intend to make this improved variant the standard light tank, producing at least 4,000 to equip new armoured divisions of both the Cavalry and Infantry arms."

 FRA_Frances_Darkest_Hour: "France's Darkest Hour"
 FRA_Frances_Darkest_Hour_desc: "The Germans have breached our initial line of defence, focusing all their attention on an attack from the west. Their military doctrines and tactics are wreaking havoc on our defences. The Wehrmacht has gotten around the Maginot Line, and more German reinforcements are on their way. We have lost tens of thousands of men in a short period of fierce fighting, and the number of casualties is steadily increasing by the day. Our initial strategy clearly failed, and now we must do everything in our power to keep them at bay until reinforcements from our allies arrive."
 FRA_Frances_Darkest_Hour_tt: "§ROur defences have been penetrated by the enemy, desperate times are upon us...§!"

 FRA_Desperate_Defence: "Desperate Defence"
 FRA_Desperate_Defence_desc: "All that remains for us to do is hold the line. We have no chance of defeating or pushing back the Germans on our own. We just need to hold them off long enough for more Allied reinforcements to arrive in France. Meanwhile, we will not give up a single inch of land without a fight, and we will make the Germans pay in blood for every step they take on our soil. With the defeatist traitors Petain and Weygand gone, the military high command is prepared to fight to the death to defend their homeland. We still have a chance to turn this war around if we can hold out long enough."

 FRA_In_Every_City_and_Village: "In Every City and Village"
 FRA_In_Every_City_and_Village_desc: "We will equip every remaining city and village that is not yet in German hands with machineguns and artillery. Especially major cities, such as Paris, will face significant conflict. While this will not halt the German advance, it will hopefully slow it down enough for us to reorganise our forces. The Germans will face significant resistance everywhere they go, even in the smallest villages, straining their logistics and hopefully causing enough attrition to significantly delay their advances, forcing them to spread out their superior attacking force to pacify a large area, buying us time and causing them additional casualties."

 FRA_The_Mediterranean_Retreat: "The Mediterranean Retreat"
 FRA_The_Mediterranean_Retreat_desc: "France is lost. The Germans are overrunning our defences, and all attempts to halt them have failed. Our forces are being depleted faster than we can replenish them, and our military high command, as well as our population, are rapidly losing any remaining hope of victory. We will order a full retreat to the south of France immediately in the hopes of saving as many of our remaining forces as possible from death or imprisonment at the hands of the Germans. We will rally our remaining troops and the government at our major ports like Marseille and Toulon in order to make an escape. It appears that France as we know it is coming to an end."

 FRA_With_Every_Man: "With Every Man"
 FRA_With_Every_Man_desc: "It is time to mobilise all of the men who are still alive and able to fight. Every man, young and old, trained or untrained, will be required to take up arms in the fight against the Germans. Even if they are largely untrained and under-equipped, we require all the manpower we can muster on the frontlines until more Allied reinforcements arrive. Every Frenchman will have the opportunity to demonstrate their bravery and loyalty to their country, and each one will be remembered by history as a hero."

 FRA_Behind_Every_River: "Behind Every River"
 FRA_Behind_Every_River_desc: "We will fall back to a succession of prepared positions so that we may extract a high price from the advancing Germans while our forces themselves avoid the danger of being overrun or outflanked. Delaying the Germans advance will mitigate their advantage of surprise and allows us time to move defending units to make a defence. Successive layers of defence will allow us to use different technologies against various targets and also maximise the defensive possibilities of natural terrain like rivers.\n\nWe will concentrate our remaining forces on the Loire and Rhone to provide a final impediment to the enemy's advance. The rivers will be defended to prevent the Reich's armies from advancing towards the south of France. Given their length and breadth, the Loire and Rhone will pose significant challenges to our adversaries."

 FRA_The_Reduit_Breton: "The Reduit Breton"
 FRA_The_Reduit_Breton_desc: "Reynaud envisions the Reduit Breton as a political and military project to continue the fight on French territory. The goal of this project is to concentrate fighting forces and the government in Brittany, which will serve as a last entrenchment, and to facilitate a possible seaborne escape. Brittany's peninsular shape aids in its defence and it also includes several ports, including Brest, one of the largest military ports, Saint-Malo, and Lorient. In the face of the German advance, these ports will also make it easier to flee to England. We will start implementing this plan with a few requisitions."

 FRA_Keep_Fighting_in_Africa: "Keep Fighting in Africa"
 FRA_Keep_Fighting_in_Africa_desc: "We have done all we can for now. France may be lost, but we will keep fighting. We will make a retreat to Algeria from our few remaining ports in the south to set up a government in exile in our colonies. Our forces are united behind Reynaud and our spirits are not yet broken. France is not alone. We possesss a vast empire and will be able to continue the struggly by forming a bloc with the British Empire that controls the sea. Like England, we will be able to tap into the United States' seemingly limited industrial resources. One day we will return to our home, but in the meantime we are powerless to do anything but to gather our strength and watch as the Germans desecrate our home."

