#Armistice

 FRA_Capitulation_of_France.1.t: "Defeat"
 FRA_Capitulation_of_France.1.d: "The battle is lost. Paris has fallen into German hands, and it is only a matter of time before the rest of the country is occupied. We must now think to the future. Elements within the government want an armistice with Germany, but many officers wish to continue the struggle from Britain.\n\nCertain members of the British War Cabinet have suggested another option - a merger of France and Great Britain into a single nation, which will fight on until all of France has been liberated."
 FRA_Capitulation_of_France.1.A: "We must collaborate with the Germans."
 FRA_Capitulation_of_France.1.B: "The fight goes on!"
 FRA_Capitulation_of_France.10.A_tt: "§RPlay as Vichy France if Germany grants armistice§!\n"
 FRA_Capitulation_of_France.10.B_tt: "§RPlay as Free France if Germany grants armistice§!\n"

 FRA_Capitulation_of_France.2.t: "Triumph in France"
 FRA_Capitulation_of_France.2.d: "FROM: Generaloberst Wilhelm Keitel, Chief of the OKW\n\nMein Führer, following the rapid and decisive collapse of French resistance, the French government has formally requested an armistice! German forces now occupy northern and western France, including Paris, all major ports, and critical industrial centers. The remainder of the country, the southern zone, remains outside immediate military control, providing an opportunity to define its administration.\n\nOperational assessments indicate two approaches. One, to permit the establishment of a nominal French government in Vichy, which would oversee civil administration in the unoccupied south. This ensures some degree of internal order, reduces the need for extensive German garrison forces in that region, and damages the legitimacy of any pro-Allied exile authority abroad.\n\nAlternatively, the armistice may be rejected, and the entire country placed under direct German administration. This would grant complete control over all territory and infrastructure but requires substantial manpower and administrative resources to maintain order and suppress resistance."
 FRA_Capitulation_of_France.2.A: "We will allow the establishment of Vichy France."
 FRA_Capitulation_of_France.2.B: "We reject the armistice!"

 FRA_Capitulation_of_France.3.t: "The Second Armistice at Compiègne"
 FRA_Capitulation_of_France.3.d: "[FROM.GetNewsIcon]Today, an armistice between the German Reich and the French Third Republic was formally signed at Compiègne, in the very railway carriage where Germany surrendered in 1918, symbolically reversing the humiliation of World War I. The agreement marks a devastating defeat for France after weeks of rapid German advances during the Blitzkrieg that swept through the Ardennes and shattered the French defenses.\n\nUnder the terms of the armistice, a new French government led by [VIC.GetLeader] will be established in Vichy, administering the so-called \"Free Zone\" of southern France. Meanwhile, northern and western France, including Paris, will fall under direct German military occupation. The French fleet will be largely demobilized, and strict limitations will be placed on the French army and air force.\n\nWhile some French military leaders and politicians vow to continue the fight from abroad, rallying in London and Equatorial Africa, the armistice effectively ends large-scale combat on French soil for the foreseeable future. The humiliation of defeat and the dismemberment of the nation have sent shockwaves through Europe, signaling Germany's overwhelming dominance on the continent and a grim new chapter in French history."
 FRA_Capitulation_of_France.3.A: "Disturbing"
 FRA_Capitulation_of_France.3.B: "Excellent!"
 FRA_Capitulation_of_France.3.C: "The fight continues!"

 FRA_Capitulation_of_France.4.t: "Germany Refuses Armistice!"
 FRA_Capitulation_of_France.4.d: "The shadow of occupation looms over France.\n\nThanks to their stunning advances and decisive victories on the battlefield, the Germans have arrived at the gates of Paris. Faced with the impossibility of a military victory over the Germans and immense political turmoil, it was decided to seek peace with the Germans. They had made no secret of their intention to seek retaliation for the Treaty of Versailles. We were willing to accept humiliating terms in order to achieve peace and relieve the burdens of war on our people. However, our hopes appear to have been dashed.\n\nIn an astonishing display of ruthlessness and hatred, the Germans have rejected our request for an armistice. In response to our proposal, the German High Command stated that \"a complete military victory over the French was required to wash away the stains of the humiliation imposed on Germany at the end of the Great War,\" and that \"the German people believe that the French must be brought to their knees by the Reich's mighty war machine.\"\n\nAs a result of this derogatory response, the government has become even more polarised. While everyone recognises that France's freedom and survival are at stake, their solutions differ. Some argue that we should immediately surrender our arms and allow France to be completely occupied. They argue that by doing so, the Germans will at the very least demonstrate their respect and friendship for the French people. Others argue that this occupation will be hell on Earth for our people and that the only way to end it is to fight until the end.\n\nOne thing is certain, however: the Germans have defeated us. The only question now is how badly they have done so."
 FRA_Capitulation_of_France.4.A: "May God help us all..."

