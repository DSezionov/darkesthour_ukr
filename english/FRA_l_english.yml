#Army

 FRA_Army.1.t: "Gamelin inspects the Maginot line"
 FRA_Army.1.d: "On an unassuming day in Eastern France, Maurice Gamelin - commander in chief of the French Army - has arrived at the French-German border in order to make sure that our main line of defence against an invasion from the Reich, the Maginot Line, is well-prepared and ready to serve it's purpose against attack from our dangerous eastern neighbour.\n\n20,000 troops, tanks, and other mechanized units patrolled down the avenue in Alsace, parading in front of Gamelin and other high-ranking French military officials, giving mutual salutes and playing our finest military music as the Parisian watched from a nearby sidewalk.\n\nFrench and also a few British newscasters recorded the event, though it was a mostly private visit. One commentator mentioned how sizeable and in order the French army seemed to be - a testament to our advancements in military capability these last few years.\n\nThe atmosphere surrounding the Maginot was one of determination and pride, and Gamelin seemed to be happy with the results of the inspection on the fort. Pride soon turned to panic, however, as towards the end of the survey, Gamelin happened to be standing under a loose brick whilst viewing one of the forts on the farther out edges of the line. In what seemed to be an almost destined chance encounter, the brick struck the commander, who was unable to move out of the way in time. In the end..."
 FRA_Army.1.A: "...Gamelin died upon impact as the brick struck his forehead!"
 FRA_Army.1.B: "...against all odds, a nearby medical team was able to save him!"

 FRA_Army.2.t: "State Funeral of Maurice Gamelin"
 FRA_Army.2.d: "[FROM.GetNewsIcon]The state funeral for former French Army Commander-in-Chief Maurice Gamelin was held today in Paris in front of a large crowd of diplomats, military personnel, and ordinary citizens all hoping to pay their respects to the old General. The Great War veteran died in a freak accident while inspecting the Maginot Line. A brick struck him in the head, instantly killing the 65-year-old.\n\nGamelin was well-respected for his actions during the war to end all wars, particularly as the man who devised a way to win the First Battle of the Marne with a French counterattack in 1914, and he received praise from fellow Frenchmen and from people all over the world for his military prowess. Diplomats and military men from all over the world attended the funeral, and some of the more interesting remarks were captured by our media.\n\n"With the loss of such a good man, Republican values wane," a French politician stated solemnly. "Who could defend us better than he?" Even a German official was seen at the event, and while he seemed wary of saying or doing anything in public in front of the paparazzi, he was caught muttering mild praises to the old General. Despite the fact that the event was kind and respectful, there was a sense of dread in the French public after all was said and done. A terrible, recurring question eventually began to fill their minds."
 FRA_Army.2.A: "Who, in the face of fascist aggression, will save us now?"

 FRA_Army.3.t: "An Empty Seat"
 FRA_Army.3.d: "With our Army's commander now laid to rest, it is time to select a replacement for the late General Gamelin. While these power shifts are normally less tense, the Germans are putting pressure on us, and we desperately need a new Commander-in-Chief. However, there are many capable army leaders to choose from, each with their own ideas about how to lead our men. Fortunately, we have narrowed it down to three - but we must choose quickly and carefully. One can only imagine the horrors that would befall us if the role were given to someone unworthy of it.\n\nThe three proposed leaders are as follows:\n\nMaxime Weygand, who promises to uphold and improve on the defensive ideals established by Gamelin. Weygand is a royalist, which could be dangerous, given that having a monarchist as the head of the army is dubious at best. He does, however, have the support of Philippe Petain, the Lion of Verdun.\n\nTo counter the Germans, Charles De Gaulle wishes to usher in a new era of warfare centred on armoured divisions. Despite the fact that his military strategies have been fairly successful, he is disliked for his ego, and many people have not yet adapted to a mechanised army. However, he is supported by politician Paul Reynaud.\n\nFinally, Henri Mordacq is regarded as a level-headed mediator between the other two criteria. He advocates for a focus on infantry and infantry reforms, and has had an unusually diverse career, having previously served in a similar capacity during Clemenceau's 1917 administration - though he is now a writer and retired from the army.\n\nThis decision should be carefully considered because it may determine the course of France in the coming years."
 FRA_Army.3.A: "Gamelin will not be forgotten! Weygand!"
 FRA_Army.3.B: "Tanks are the future - De Gaulle!"
 FRA_Army.3.C: "Mordacq will keep our people happy and safe!"
 
 FRA_Army.4.t: "The Flandre Maneuvers"
 FRA_Army.4.d: "Many had no idea what was going to happen on this quiet day in Northern France - there had been whispers of a plan from the newly appointed Commander-In-Chief of the Army, Henri Mordacq, but none had quite believed the size of the alleged plan, until it happened. As shocked civilians realised what was going on, thousands of French soldiers descended on the small towns, marching to designated fields. It was a training excercise, and it was absolutely enormous. It was part of Mordacq's new infantry reform plans and was dubbed 'The Flandres Maneuvers' after the event itself and because it was held in the Flandres region of France.\n\nAllies and enemies of the French Republic were stunned by these developments, having had no idea of the capabilities of the reforming French Army, particularly Germany and Belgium, which appeared to be in a rush to implement their own reforms in order to demonstrate their own military strength and cohesion. According to reports, the President will meet this weekend to formally acknowledge and congratulate Mordacq on this successful occasion, having apparently already praised him to other close advisors and being as awestruck by the exercise's sheer glorious size as any French citizen who actually witnessed the event.\n\nOfficial responses from neighbouring countries other than Belgium and Germany have yet to be recorded, but are expected as word of the exercise spreads."
 FRA_Army.4.A: "Look upon the new French Army and despair!"

 FRA_Air.1.t: "Aeronautical factories go on strike"
 FRA_Air.1.d: "According to reports, our aeronautic factories are producing little because nearly all workers are on strike in protest of their nationalisation. Negotiations have been attempted with the protestors, but initial proposals have been rejected - as one worker said from the window of a Bordeaux factory, \"We're not going home or wasting a drop of sweat until that law is repealed.\"\n\nAlmost all plane production in the country has ceased, which naturally drew the attention of local news, whose articles have already made headlines. High-ranking officials have been seen uneasy, and many are concerned that the rebellious spirit will spread to other arms facilities, in anticipation of their workplaces being nationalised as well.\n\nToday, a political commentator delivered an ominous message to a local courier: "No work - no aeroplanes." There is no airforce if there are no planes. Without an air force, there is no defence against bombers. And no defence means no France," they said shakily, clearly implying the German Luftwaffe, which appears to be becoming a bigger threat by the day.\n\nWhat appeared to be a minor incident has grown into a major issue, as police surround the rebellious factories and deals are halted. We can only hope that production resumes before this threatens the nation's safety."
 FRA_Air.1.A: "Get back to work already!"

 FRA_Air.2.t: "Chief of Air Force Resigns"
 FRA_Air.2.d: "Today brings sad news from our military's air branch, as our Chief of the Air Force, Philippe Feyquant, has resigned due to heart problems just months before his 55th birthday. Feyquant, a highly respected man with a long career, joined the military at the age of 20, having trained at Saint-Cyr military school and becoming interested in aviation after being deployed in Tonkin as part of the Colonial Infantry. He then served heroically in many large raids at the start of the Great War, going wherever France needed him, such as Ludwigshafen, Karlsruhe, Sarrebruck, and Treves, despite receiving a shell fragment to his arm.\n\nHe received high praise from American airmen after serving with them on several occasions, most notably during the battle of Verdun, where he took command of the Escadrille N. 65 and met pilots from the US' volunteer air force, the Escadrille Americaine. We have a choice between two runner-up replacements now that Feyquant has retired.\n\nFirst, there's Laurent Eynac, who wants to carry on Feyquant's legacy by completely separating the Air Force from the Army - a programme he started with reforms just before his heart forced him to retire. He would prioritise fighters and close air support.\n\nOur other option, Joseph Vuillemin, goes against Philippe's ideals. A supporter of keeping the Air Force close to the Army rather than splitting it into two branches - as a support group to them, his focus would be on bombers.\n\nWhile our decision is not critical, it does determine the direction of the French Air Force in the coming years."
 FRA_Air.2.A: "Eynac will keep the skies clear!"
 FRA_Air.2.B: "Rain hell upon them, Vuillemin."

 FRA_Navy.1.t: "A Change in Course?"
 FRA_Navy.1.d: "As France moves closer to the future than ever before, the need for innovation has become almost overwhelming. On land, the art of war has advanced dramatically and continues to do so year after year. The entire field of air warfare is a monumental and historic innovation, with each invention being revolutionary. The Navy is... unusual. For much of its history, seafaring innovation was slow. Roughly controlled rafts evolved into small boats, then trimeans, and so on.\n\nHowever, the Navy has seen two notable innovations in recent years. Submarines are fighting beneath the waves. While not a novel concept, their recent advancement in warfare has made their widespread use a reality. During the Great War, the Boche demonstrated this. The aircraft carrier, the second, is a hybrid of old and new. Some foresighted admirals have recognised the value of aircraft in naval warfare. The aircraft carrier is said to be the greatest naval innovation since the sail!\n\nThe French Navy is divided between the three points of view. The submariners are led by Admiral Gabriel Auphan. He envisions a navy comprised primarily of light and manoeuvrable surface raiders supported by a robust submarine fleet. Then there's Jean Pierre Esteva's visionaries. They regard the aircraft carrier as an incomparably valuable resource for France. They want all future fleets to be built around them, much like the old battleships. Then there's the old guard, led by Admiral Francois Darlan. They believe the fleet is adequate as it is. We can still have an effective fighting force without relying too heavily on unproven theories by redesigning existing classes and conducting additional research."
 FRA_Navy.1.A: "Darlan has proven competent, we shall follow his lead."
 FRA_Navy.1.B: "Esteva might be onto something with his planes."
 FRA_Navy.1.C: "Auphan's focus on submarine warfare is the right path."
 
 FRA_Navy.2.t: "Darlan's Navy"
 FRA_Navy.2.d: "In order for France to exert its influence on the sea, Admiral François Darlan believes that a navy composed primarily of heavy cruisers and battleships should be built. These behemoths of the sea will be a force to reckon with, transporting heavy fire power right up to the shores of our enemies and beyond.\n\nThis plan has now begun to  materialise as a result of significant government investment into helping him create the navy he has imagined, with many of France’s finest dockyards at his disposal. With Darlan's doctrine, our ships, with strengthened hulls and impressive guns, can leave port knowing that they will be the might of the seas,  while our enemies will be forced to put up massive efforts to counter our fleet, which could be beyond their capabilities.\n\nWhile staying in port, our fleet will keep growing, to a point where enemies will be forced to keep up their own naval forces if they are to stand any chance against our \"fleet in being\". Darlan wants to create a navy like this for this reason: to project our power across the waters."
 FRA_Navy.2.A: "Beasts made of steel"
 
 FRA_Navy.3.t: "Esteva's Navy"
 FRA_Navy.3.d: "While Darlan has his influence and Auphan has his youth to propel their respective careers, Jean-Pierre Esteva has built his career on ability and unconventional thinking. He performed admirably in the Great War, particularly during the Dardanelles campaign. He then taught at a naval academy until 1927, when he was called back into active, shipbound service. Around this time, Esteva joined an increasing number of international voices calling for the use of new 'aircraft carriers' as the foundation of future fleets.\n\nBy the mid-1930s, when he left for the Far East, he had risen to the rank of rear admiral as a result of his meritorious service. He has been observed visiting the British ports of Singapore and Hong Kong on a regular basis. There, he gathered intelligence on the rising Japanese, but he also took a keen interest in the British carriers.\n\nAfter years of advocating for his ideas, it appears that his efforts have finally paid off. Admiral Esteva arrived in France after a gruelling 18-hour flight and was immediately ushered into a long series of meetings with himself, the Prime Minister, and the Admiralty. Esteva has finally received his due after nearly a week of near-constant meetings. The French Navy has agreed to design and construct a new class of aircraft carrier based on the designs of Esteva. These carriers will serve as the foundation for future fleets. While some sceptics remain a loud and influential stumbling block, Esteva has nothing to fear with both the Admiralty and the government on his side."
 FRA_Navy.3.A: "The future of the sea is in the skies!"
 
 FRA_Navy.4.t: "Auphan's Navy"
 FRA_Navy.4.d: "Gabriel Auphan is the quick-thinking submarine ace France requires. He joined the Navy in 1914 and served in naval intelligence and the growing submarine fleet. He steadily ascended the ranks until he was appointed second in command of the naval academy in 1933. After commanding a variety of submarines and studying their effectiveness, he concluded that a modern navy comprised primarily of submarines and light destroyers can outperform any modern navy with a more traditional composition. Such thoughts have won him few friends. Despite his unpopularity with the Admiralty establishment, he has gained allies above their heads.\n\nRecently, as the government sought newer and more revolutionary naval doctrines for their new future naval reforms, their attention was drawn to Auphan and his ideas. Admiral Auphan has been able to make his case in a series of meetings over the last few weeks, free of the interjections of his adversaries in the Admiralty. These arguments appear to have won over the Prime Minister, who has appointed Auphan to oversee the naval reconstruction plans. While the admirals Auphan once had to answer to grumbled, they have now begun to cooperate with Auphan as loyal sailors."
 FRA_Navy.4.A: "The future of the sea is underwater!"
 
 FRA_Navy.5.t: "Revolutionary Technologies"
 FRA_Navy.5.d: "While the French Navy is rapidly expanding, it is technologically behind other world superpowers. To avoid dropping further, we must incorporate new revolutionary technologies into our ships. The only question is which technologies will be used. So far, our British ambassador has written a letter requesting our friend across the channel to help with naval research. Their fleet is one of the largest in the world, and any support from them will be greatly appreciated. We could, on the other hand, continue to develop French Naval technology and achieve our own advances. In either case, the quality of our fleet will considerably improve. What are your thoughts?"
 FRA_Navy.5.A: "The British know ships like the back of their hands, send the letter."
 FRA_Navy.5.B: "Our scientists know what they're doing, let’s focus on our own research."
 
 FRA_Navy.6.t: "A French Request"
 FRA_Navy.6.d: "We received a letter from the French government requesting research collaboration and assistance with their fleet. It's good to see that the Royal Navy's presence still carries enough prestige for the French to desire our navy's technologies. Accepting their request would undoubtedly benefit their fleet while also strengthening our relations. However, we must consider how much assistance we should provide to the French. If we don't consider France as a current or future ally, we should surely refuse their proposal to protect our armed forces. How should we react?"
 FRA_Navy.6.A: "They would make an excellent ally; send the good news, along with a few researchers!"
 FRA_Navy.6.B: "It’s in our best interest if we keep our research to ourselves. Deny their request."
 
 FRA_Navy.7.t: "The English Accept!"
 FRA_Navy.7.d: "Wonderful news! According to our British ambassador, the British government has just agreed to our request! A ship carrying numerous researchers and construction managers left Dover an hour ago, and they will have our desired blueprints and schematics in hand, as per our arrangement. We should be grateful because so few countries understand what makes the renowned Royal Navy so powerful. Their research should help us get our fleet up to speed while also strengthening our connections with the United Kingdom!"
 FRA_Navy.7.A: "Send them our sincere appreciation!"
 
 FRA_Navy.8.t: "The English Refuse"
 FRA_Navy.8.d: "Perhaps our ties with the British were not as strong as we hoped. Our ambassador has just informed us that our request for navy research collaboration has been denied. This was most likely created by mistrust between our two countries. Simply put, the British do not consider us as a potential ally, let alone an enemy. Or they simply do not want to disclose their secrets quite yet. We can speculate all day about why they declined, but we should return to our own navy research, as it is evident that we are alone on this matter."
 FRA_Navy.8.A: "Fine, but they’ll regret this someday!"
 
 FRA_Navy.9.t: "Revolutionary Naval Research Yields Results!"
 FRA_Navy.9.d: "After months of tireless work in the laboratories of Toulon and Brest, French naval researchers have made a stunning discovery. Pioneering efforts in hull design, radar integration, and propulsion systems have paid off, resulting in what many in the Ministry of the Navy call a revolution in maritime strategy.\n\nAt the heart of this advancement is a collaborative effort by forward-thinking engineers, naval officers, and the École Navale to rethink the role of capital ships and light escorts in modern conflict. The integration of advanced fire-control systems and early radar detection capabilities has been a primary focus, providing our vessels with a decisive advantage in both detection and gunnery precision.\n\nFurthermore, experimental work on hull streamlining and turbine efficiency has resulted in faster, more manoeuvrable ships without sacrificing armour or range. Submarine warfare doctrines have also received renewed attention, with newer models designed to operate more quietly and avoid detection through magnetic anomaly detection and enhanced sonar countermeasures."
 FRA_Navy.9.A: "Blessed be our engineers!"

 FRA_Naval_Radar_tt: "Modify §YLa Royale§! by \nNaval Detection: §G+30.0%§!"
 
 FRA_Navy.10.t: "Darlan's Staff"
 FRA_Navy.10.d: "With France now at war, its military command has gone into overdrive, organising units and deployments, logistics, and ongoing or planned operations, and Admiral François Darlan is the best for the job. Darlan and his high command have swiftly implemented war protocols, building on years of meticulous preparation and staff planning. From Toulon to Brest, naval bases are bustling with activity as task forces are assembled, convoy routes are secured, and offensive operations are planned. Under Darlan and his staff officers, the navy operates like a well-oiled machine, ready to face any challenges and engagements from the enemy, not only protecting France's shores but also actively fighting the enemy at sea and near his own."
 FRA_Navy.10.A: "A skilled officer Darlan is! Send our thanks to him."
 
