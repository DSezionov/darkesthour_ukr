 ### Parliament
 FRA_Appease_the_PCF: "Appease the PCF"
 FRA_Appease_the_PCF_desc: "The Communist Party's growing influence cannot be ignored. As pressure from labour unions and leftist movements grows, limited concessions may be required to secure their cooperation and prevent unrest. While this will strain relations with more moderate or conservative factions, temporary alignment may help to maintain unity in the short term."
 FRA_Concessions_to_the_SFIO: "Appease the SFIO"
 FRA_Concessions_to_the_SFIO_desc: "The Socialist Party wields significant power over both parliament and the working class. Engaging with their platform and making policy compromises can help maintain social harmony and gain support in the Chamber. However, doing so may alienate traditional Republican allies. Finally, encouraging dialogue and collaboration can lead to better governance and a more coordinated approach to addressing the country's challenges."
 FRA_Concessions_to_the_FR: "Appease the FR"
 FRA_Concessions_to_the_FR_desc: "The Republican Federation remains a cornerstone of the conservative establishment. Appeasing their demands can help to preserve the Republic's traditional values and maintain order. However, leaning too far towards their agenda risks upsetting left-leaning members of the government."
 FRA_Concessions_to_the_RAD: "Appease the RAD"
 FRA_Concessions_to_the_RAD_desc: "The RAD is one of the most powerful groups in the French Parliament. Without their support, any coalition would collapse under the weight of opposition. Giving them more power could help to consolidate and sustain the current administration, but their demands may strain relations with other coalition partners. While appeasing the RAD may save the administration, it may also incite more extreme forces."
 FRA_Concessions_to_the_AD: "Appease the AD"
 FRA_Concessions_to_the_AD_desc: "The Democratic Alliance is a powerful centrist force on the political scene. Giving them more importance could help to stabilise the administration and increase votes, but the coalition's more progressive allies may react sceptically, potentially leading to instability."
 FRA_Discipline_the_Majority: "Discipline the Majority"
 FRA_Discipline_the_Majority_desc: "To push our legislation forward and avoid unrest in the government, we must maintain a high level of discipline within the party. By asserting control over dissenting voices, we can consolidate support and maintain stability in the chamber. This move will strengthen our hand in guiding France through these turbulent times while also ensuring that our legislative agenda is not hampered by internal dissent."
 FRA_Defende_our_Government: "Defend our Government"
 FRA_Defende_our_Government_desc: "The foundations of the French Republic are under increasing strain. With extremist factions gaining ground and political fragmentation deepening, we must strengthen the moderate democratic coalition that sustains our government. Only so can we ensure that our future is safe and remind the people that we must remain united to preserve our democratic and republican values."
 #FRA_Bribe_the_Opposition: "Bribe the Opposition"
 #FRA_Bribe_the_Opposition_tt: "§gEvery Party in the Opposition§! will get §G10% Support§! but this may §RHave Consequences§!"

 ### Pacifism
 FRA_Pacifism_category: "Guerre et Paix"
 FRA_Pacifism_category_desc: "\n\n\n£decision_header_FRA_Pacifism£\n\n\n\nBesides economic issues, the people are in a constant debate about how the military should be armed. Pacifists believe we should stay as disarmed and isolated from foreign affairs as possible, with the most militant one arguing we should be disarmed but try to keep the peace. On the other hand, militarists believe we should arm ourselves for anything, whenever. The Popular Front has come to a crossroads on who to support, but current polling has shown militant pacifists are the most popular of the three. The choice is to either support them further or reduce their influence and go from there.\n\n\n§LCurrent Militant Pacifism§!: [This.Dynamic_FRA_Pacifism_Level]"

