# Saar Offensive
 FRA_Saar_Offensive.1.t: "French Troops Enter the Saar"
 FRA_Saar_Offensive.1.d: "[FROM.GetNewsIcon]French military forces have advanced into the Saar Basin as part of a larger offensive aimed at breaching German defensive positions west of the Rhine. The operation, led by the Second Army Group, has already resulted in the capture of several border villages and key terrain.\n\nFrench units crossed the border with little resistance, occupying various cities and villages as well as the Warndt Forest. The 42nd Infantry Division engaged German forces near Kleinblittersdorf and secured the area following a brief skirmish. Further north, elements of the 4th Army faced light opposition near Saarbrücken, where German forces appear to be consolidating around their fortified positions.\n\nThe offensive's primary goal appears to be to breach the Siegfried Line, a network of defensive fortifications built by Germany along its western border, allowing France to launch an offensive across the Rhine and into Germany's heart. Artillery bombardments have been reported along key sectors of the line, but progress is slow as French forces prepare for future engagements and German reinforcements arrive on the frontline."
 FRA_Saar_Offensive.1.A: "We'll show the Germans the might of French guns!"
 FRA_Saar_Offensive.1.B: "What is OKH doing? Get more men down there immediately!"
 FRA_Saar_Offensive.1.C: "Let's see how well the French do..."
 FRA_Saar_Offensive.1.A_tt: "§RYou will have 40 days to reach the Rhine§!"

 FRA_Saar_Offensive.2.t: "French Troops Retreats"
 FRA_Saar_Offensive.2.d: "[FROM.GetNewsIcon]The French Army has withdrawn from German territory after an offensive into the Saar Basin was abruptly called off before reaching the Siegfried Line. The Second Army Group launched the operation, which saw initial success as French forces advanced into German territory but eventually failed to establish a decisive foothold.\n\nFrench troops occupied several villages, including the strategic Warndt Forest, with little resistance as German forces retreated to pre-prepared defensive positions. However, as French units approached Saarbrücken, reconnaissance revealed that German troops had established strong defensive positions approximately 8 kilometres ahead, with artillery and machine-gun emplacements preventing further advance.\n\nDespite close engagements, French forces did not launch a large-scale assault on the Siegfried Line. Instead, the French High Command called a halt, citing concerns about the possibility of heavy casualties. The operation was effectively halted, and a controlled withdrawal to French defensive positions was carried out. German forces remained behind their fortifications, with the exception of a brief counterattack by the 17th Infantry Regiment, which was quickly repulsed.\n\nFrench officials stated that the country is still committed to the war effort, but will instead prioritise defensive operations and the protection of neutral states."
 FRA_Saar_Offensive.2.A: "What would this offensive have achieved anyway?"
 FRA_Saar_Offensive.2.B: "What cowards! We barely even had to fight them!"
 FRA_Saar_Offensive.2.C: "France is being quite cautious it seems..."

 FRA_Saar_Offensive.3.t: "Success of the Saar Offensive"
 FRA_Saar_Offensive.3.d: "Field Report: Successful French Offensive into the Saar and Rhineland\n\n\nTo: Grand Quartier Général\n\nThe Second Army Group led a coordinated offensive into the Saar Basin, breaching the Siegfried Line and advancing deep into the Rhineland. The Warndt Forest and border villages were quickly secured, and French forces overcame stiff resistance to capture Saarbrücken following fierce fighting. The breakthrough enabled continued rapid advances, forcing enemy units into disorganised retreat.\n\nFollowing the fall of Saarbrücken, our forces advanced, engaging and defeating German defenders in Trier, Kaiserslautern, Ludwigshafen, Mainz, and, eventually, Koblenz. As our troops maintained momentum, the enemy's resistance gradually crumbled in subsequent engagements. German counterattacks were unsuccessful due to a lack of coordination. The Siegfried Line has been completely breached along our sector, removing the final major obstacle west of the Rhine.\n\nCasualties were higher than expected, but moderate given the size of the operation. Our supply lines are still intact, and morale is high following this string of victories. Preparations are currently underway for a continued advance towards Köln and Aachen, with the ultimate goal of securing the Ruhr Area, Germany's industrial heart. The Second Army Group is ready for additional operations, but reinforcements are required to replenish current losses and rotate some units out.\n\n\nSigné,\nGénéral d’Armée André-Gaston Prételat\nCommandant du Groupe d'Armées n°2"
 FRA_Saar_Offensive.3.A: "Splendid News! Keep pushing!"

 FRA_Saar_Offensive.4.t: "Failure of the Saar Offensive"
 FRA_Saar_Offensive.4.d: "Field Report: Aborted Offensive Operation into the Saar Basin\n\n\nTo: Grand Quartier Général\n\nThe Second Army Group advanced into the Saar Basin, capturing the Warndt Forest and 12 border villages, with little resistance from the German 1st Army as it withdrew behind fortified positions. Initial progress was almost unopposed, but as forces approached Saarbrücken resistance stiffened. Following the complete capture of the Warndt Forest, offensive operations were halted due to high casualties, and our troops took defensive positions in the Warndt Forest and along a frontline stretching from the Saar River to the French border near the German town of Hornbach. Several minor skirmishes occurred until movement orders were received.\n\nThe Generalissime ordered a withdrawal of our forces back to the Maginot Line, which was carried out orderly and without incident, with the exception of a German counterattack by the 17th Infantry Regiment between Bischmisheim and Ommersheim, which was quickly repelled by our forces. Our casualties totalled a few thousand killed, wounded, sick, or missing. The Second Army Group is now positioned to conduct defensive operations along the Maginot Line.\n\n\nSigné,\nGénéral d’Armée André-Gaston Prételat\nCommandant du Groupe d'Armées n°2"
 FRA_Saar_Offensive.4.A: "That whole thing was a folly anyway..."

#WW2
 FRA_Wartime_Tree.0.t: "France Mobilises!"
 FRA_Wartime_Tree.0.d: "[FROM.GetNewsIcon]France has once more risen to the task as conflict has once more scarred the face of Europe. France has begun mobilising against "the threat posed by the Hitlerite cult", according to a statement released today. This action will surely cause worry in Berlin because it involves the biggest army in Europe — outside of the Soviet Union.\n\nA new resolve has permeated the country as millions of men and boys show up at mobilisation locations across the country. Now that war has arrived, the weariness that Frenchmen and women formerly had toward war and their unwillingness to "die for Danzig" has suddenly vanished. A new surge of the traditional French animosity toward Germany has replaced it. At the same time, the nation has experienced a resurgence of patriotism.\n\nIt's only a matter of time before France's lion bites Germany once more, as if awakening from a protracted slumber."
 FRA_Wartime_Tree.0.A: "Aux Armes Citoyens!"
 FRA_Wartime_Tree.0.B: "Worrisome"

 FRA_Wartime_Tree.1.t: "Banishment of the PCF"
 FRA_Wartime_Tree.1.d: "Since its founding more than ten years ago, the Parti Communiste Francais has been a pain in the government's side. Its leaders receive direct commands from Moscow and have occasionally aggressively challenged the government, to the point where some may even call it treason, upon Stalin's orders. But regardless of their allegiances, their argument is strong. Since its foundation, they have received close to a million votes in every election. But for some time now, the administration has been trying to find a method to do rid of them. Timing has never been more crucial than it is now when war has broken out.\n\nThe PCF is on the side of the enemy since it is a stooge of the Soviet Union. Since the Soviets shook hands with Hitler in 1939, they share equal responsibility for the current War. The PCF is currently designated as an enemy organization and outlawed in an effort to thwart this enemy subversion and in compliance with recent legislation. We're hoping to apprehend their leaders before they leave the nation."
 FRA_Wartime_Tree.1.A: "There can be no room for traitors of the nation!"

 FRA_Wartime_Tree.2.t: "Maurice Thorez Flees to the Soviet Union"
 FRA_Wartime_Tree.2.d: "Maurice Thorez, the former leader of the now-outlawed French Communist Party, has fled to the Soviet Union. With the government's decisive actions against communist agitation in full swing, Thorez appears to have chosen exile over facing the consequences of his party's subversive activities. While his departure removes a key figure from the domestic political landscape, the communist movement's activities continue.\n\Now in Moscow, Thorez will undoubtedly continue his political work, condemning the government and encouraging his supporters to resist from abroad. His presence in the Soviet Union is more than a symbolic gesture; it could serve as a rallying point for communist sympathisers still active in France. Some underground networks remain intact, despite our efforts to dismantle them, and there is concern that his exile will embolden them even more."
 FRA_Wartime_Tree.2.A: "Damn the bastard!"

 FRA_Wartime_Tree.3.t: "[This.GetLeader] Government is Overthrown"
 FRA_Wartime_Tree.3.d: "France appears to be on the verge of collapse. Following the recent crisis, many French people believe that their country's current government has failed them. This sense of betrayal and rage has evolved into outright revolt, with both government officials and the general public openly attacking the Prime Minister. To calm the situation, [This.GetLeader] was forced to resign by his own party, and a new Prime Minister, along with a new government, will step forward, hopefully successfully navigating France through this crisis."
 FRA_Wartime_Tree.3.A: "Sacre bleu!"

 FRA_Wartime_Tree.4.t: "The Old Lion"
 FRA_Wartime_Tree.4.d: "The War has not been going well. While France is yet far from defeated, victory is still far from our grasp. This has left many French citizens angry at the government. The French administration, which has always been on shaky ground, has plunged into an active crisis as a result. They demand a change in policy, or at change in government. So, rather than abdicating our responsibility and allowing our government to implode like so many others, we have made the proactive decision to fight to win back the trust of the populace.\n\nThe oldest soldier still serving in France at this time is Philippe Petain. Nobody is more revered than him, particularly in military affairs, as a result of his decisive deeds at Verdun during the First War, which made him a national hero. Because of this, he has been invited to join the government as a gesture of goodwill toward the hawks who want to invade Germany and to  those who are critical of our fight in general. Some have expressed concern over his seeming support for appeasement and his sympathy for the far right, but both Petain and the government have reassured these doubters that he is more determined than ever to bring the war through to a successful end."
 FRA_Wartime_Tree.4.A: "The Lion roars once more"
 FRA_Wartime_Tree.4.A_tt: "§RIf nothing is done to stop the defeatists, France will lose at 70% capitulation§!"

 FRA_Wartime_Tree.5.t: "The Nordling Proposal"
 FRA_Wartime_Tree.5.d: "As German armies thrust ever deeper into France it has become increasingly likely that France may face defeat. While the thought of it is hard to stomach, in the interest of the people of France the government has begun to prepare for such an outcome. It seems the Germans are preparing as well. The French government was approached by Roul Nordling, a respected Swedish businessman and diplomat in Paris, with an alleged offer of peace straight from Reichsmarshall Goering himself.\n\nAccording to the proposal France would be given an ‘honourable’ peace if they would give in right now. What this honourable peace would entail is impossible to say since it comes with no elaboration. Due to this and other considerations, the Prime Minister put off responding to the communique. In fact, by the time surrender had actually come the proposal still lay unanswered."
 FRA_Wartime_Tree.5.A: "Jamais!"

 FRA_Wartime_Tree.6.t: "A Last Ditch Effort"
 FRA_Wartime_Tree.6.d: "The extinction of France is imminent. The Maginot succeeded while the French Army failed. German troops pour into the countryside, and the broken and beaten French Army is unable to stop them. Prime Minister Paul Raynaud convened an emergency meeting of the Council of Ministers in Bordeaux to discuss what to do. The mood in the room was oppressive despite the night-time coolness outdoors. The discussion lasted all night, and the desperate and absurd proposals were floated. The suggestions included a covert insurgency, emigration to Algeria, a scorched earth policy, and even surrender. The most absurd of all the proposals was then phoned in not from the Ministers, but from London.\n\nA really daring suggestion to unite the French and British nations came directly from Winston Churchill, the Prime Minister of the UK, to Captain Charles de Gaulle, who was in London at the time. The silence that followed was as loud as the previous noise. Chaos ensued after that. While half the government supported the proposal, the other half led by Petain did not and were loud in their condemnation. Raynaud's standing as prime minister was ruined by Petain's perception of it as a British plot to seize control of France. The only thing the Prime Minister could do was sag back in his chair and lament the destiny of his nation while the Council switched from condemning Raynaud for his treason to yelling at one another on what to do about the Germans.\n\nStill, the option is his alone to make. Should France bow to its historical enemy to fend off a new one?"
 FRA_Wartime_Tree.6.A: "We will not die for Britain!"
 FRA_Wartime_Tree.6.B: "Only in unity can resistance continue."

 FRA_Wartime_Tree.7.t: "Reynaud Resigns"
 FRA_Wartime_Tree.7.d: "Even though Albert Lebrun anticipated this day, he was nevertheless taken aback by its presence. A clean, white envelope from Prime Minister Raynaud, or at least the former Prime Minister, was on his desk. Lebrun hadn't opened it yet, but given the government's state of paralysis, there was only one thing it could contain: his resignation. But now that the position of Prime Minister was open, it was up to him to name a replacement.\n\nLebrun, however, did not see much of a cause to do so in private or in the most dismal corners of his heart. All indications pointed to France's impending loss since the BEF was more focused on defending Calais than Paris and the French Army was exhausted. Germans will undoubtedly want a hefty payment for the War as well as for the humiliation in the previous War, which the Nazis are always keen to bring up. He had a part of him that sorely wanted to continue the struggle, but he understood that it was too late; his only true choice was to carry out his job and name a new Prime Minister.\n\nHe already knew the person Reynaud would have suggested because everyone in government was talking about him as the obvious successor. From the start, Field Marshal Philippe Petain was a proponent of peaceful coexistence. Since no one in power paid attention, like the arrogant morons they were, thousands of Frenchmen were now dead, and France was speeding toward disaster. His stance has only gotten stronger since the invasion. There is no doubt that, if he were to be selected, he would work to bring about peace with Germany. Sure, France and Britain made a pact promising not to negotiate a separate peace, but that was under the previous administration. Petain did not sign such a contract."
 FRA_Wartime_Tree.7.A: "Marshal Pétain is our last hope to save France"

 FRA_Wartime_Tree.8.t: "Pétain Calls for an End to the Fighting"
 FRA_Wartime_Tree.8.d: "A note sent by Foreign Minister Baoudouin to the Spanish calling for peace on France's behalf served as the first sign of the new administration's intentions. When newly-elected Prime Minister Philippe Petain addressed the nation on the radio at 12:30, these concerns were confirmed. The brief speech allayed any unanswered questions. France was negotiating with Germany. The feeling in France appears to be one of relief, while the response from the rest of the world has varied depending on whose side of the Front they are on. Even though the invasion lasted only a few short weeks, it left the people in a state of crushing defeatism.\n\nMany people desire nothing more than to end the situation after witnessing tragedy after disaster and the deaths of thousands of their sons and fathers. This defeatism is supported by a long history of utterances made by their new prime minister, who has been so aggressively seeking peace with Germany that he has been nearly gasping for air. Now that he is in charge of the country and France has been militarily vanquished, his earlier predictions look nearly prescient."
 FRA_Wartime_Tree.8.A: "C'est le coeur serré"

 FRA_Wartime_Tree.10.t: "Nomination of the Generalissime"
 FRA_Wartime_Tree.10.d.A: "During times of war and national emergency, the Generalissime is the overall military head of the French Armed Forces, with all branches of the armed forces reporting to him and in charge of doctrine and planning for the entire armed forces, as well as coordination between the French and allied militaries. Obviously, such a position is extremely powerful, and the man appointed to this position by the President will be able to shape the doctrine and strategy of the French armed forces as well as the armed forces of our allies to his will, and the French military's overall capabilities will be dependent on his competency.\n\nCurrently, the best candidate, at least according to our government's previous plans for the armed forces and much of the general staff, is General Maurice Gamelin, France's premier defensive strategist and one of the most renowned generals in the army, reportedly respected by the Germans. Although some may criticise his strict adherence to defensive doctrine and faith in the Maginot Line, it is currently exactly what France requires: to hold the line and grind down the enemy into dust until nothing remains of them. It worked in the last war, and it will undoubtedly work now."
 FRA_Wartime_Tree.10.d.B: "During times of war and national emergency, the Generalissime is the overall military head of the French Armed Forces, with all branches of the armed forces reporting to him and in charge of doctrine and planning for the entire armed forces, as well as coordination between the French and allied militaries. Obviously, such a position is extremely powerful, and the man appointed to this position by the President will be able to shape the doctrine and strategy of the French armed forces as well as the armed forces of our allies to his will, and the French military's overall capabilities will be dependent on his competency.\n\nDespite being an unconventional choice, we believe Henri Mordacq is the best fit for this position. His military doctrine ideas combine De Gaulle's manoeuvre warfare and Gamelin's rigid defence, emphasising army motorisation alongside elastic defence. At the same time, he advocates for "Total War" ideas, claiming that the new war will be even deadlier and more destructive than the last, so the army must be thoroughly reformed, made more professional, and better equipped than ever before, while a massive mobilisation of men and resources on an almost unimaginable scale must take place for the war effort, and fighting against the enemy must take place in all areas of the world."
 FRA_Wartime_Tree.10.d.C: "During times of war and national emergency, the Generalissime is the overall military head of the French Armed Forces, with all branches of the armed forces reporting to him and in charge of doctrine and planning for the entire armed forces, as well as coordination between the French and allied militaries. Obviously, such a position is extremely powerful, and the man appointed to this position by the President will be able to shape the doctrine and strategy of the French armed forces as well as the armed forces of our allies to his will, and the French military's overall capabilities will be dependent on his competency.\n\nCurrently, only one genuine candidate stands out: the young and energetic Charles de Gaulle, whose ideas our government has accepted on numerous occasions. He is at the forefront of a campaign to modernise and mechanise the French Army, developing it in accordance with a manoeuvre warfare doctrine that emphasises manoeuvrability, speed, armour, and motorised infantry. This contradicts the late Maurice Gamelin's doctrine, which, despite his death, continues to be imposed on a large number of general staff officers, with many advocating his defensive doctrine and heavy reliance on the Maginot Line.However, if we are to triumph and conquer, we cannot simply sit in forts and trenches and let the enemy come at us; we must strike hard and demonstrate the power of our weapons!"
 FRA_Wartime_Tree.10.d.D: "During times of war and national emergency, the Generalissime is the overall military head of the French Armed Forces, with all branches of the armed forces reporting to him and in charge of doctrine and planning for the entire armed forces, as well as coordination between the French and allied militaries. Obviously, such a position is extremely powerful, and the man appointed to this position by the President will be able to shape the doctrine and strategy of the French armed forces as well as the armed forces of our allies to his will, and the French military's overall capabilities will be dependent on his competency.\n\nOnly Maxime Weygand, one of the senior commanders still active, commands the necessary authority and respect. Weygand, a veteran of the Great War and a firm believer in the defensive principles championed by the late Maurice Gamelin, advocates a cautious, methodical approach to war. He believes in fortified lines, prepared positions, and deliberate operational planning, which is widely supported by the older general staff. Unlike proponents of mechanised manoeuvre warfare, Weygand believes that we should avoid reckless offensives and instead force the enemy to break down against our defences. Discipline and careful planning are the keys to saving the country in its hour of need."
 FRA_Wartime_Tree.10.A: "Gamelin it is, then."
 FRA_Wartime_Tree.10.B: "We will fight the enemy with everything, and everywhere!"
 FRA_Wartime_Tree.10.C: "De Gaulle will lead us to victory!"
 FRA_Wartime_Tree.10.D: "Weygand will safeguard the nation."

 FRA_Wartime_Tree.11.t: "Allied Military Government Organised"
 FRA_Wartime_Tree.11.d: "The implementation of ad hoc military authority has proven to be more trouble than it is worth as Allied troops move deeper into Germany. Partisans and German Army stragglers are robbing the countryside of law and order while being protected by the inhabitants. Not to mention the unfriendly treatment our gallant warriors received from the German people. They are turning away from us when they are not firing directly at us.\n\nThe Allied Military Government of Germany has been established to address this problem. Maintaining order behind the lines in a fiercely hostile foreign country is pretty much its only task. Thankfully, we were able to save some elements from the 1919 plans for the first invasion of Germany. With some updating and some polishing the plans proved a very robust framework to build off of.\n\nFinding collaborators to fill the vacant ranks has proven to be more challenging than anticipated. Finding former Nazis we can showcase as conversions to the actual torch of freedom has been more challenging than reaching out to individuals who were once hated by the dictatorship, such as Jews, Roma, and Communists, among others. We now know that Allied intelligence was incorrect when they said that the German people would overthrow the Hitlerite government as soon as our forces set foot on German territory. Although these pathetic acts of resistance won't stop us, they do lessen the impact of our liberation message. How can you free a people that aren't interested in freedom?"
 FRA_Wartime_Tree.11.A: "Freedom is non-negotiable."

 FRA_Wartime_Tree.12.t: "Approval of the Government Sky-High"
 FRA_Wartime_Tree.12.d: "With our declaration of war against Germany and subsequent successful offensive through the Saarland, the nation has experienced a surge of patriotism and unity. The government's competent management of the war effort, combined with relatively light German resistance west of the Rhine, has resulted in an enormous increase in approval ratings for the government, with recent polls showing that more than 70% of the population backs us. Of course, it is natural to expect that our popularity will decline as the war progresses, especially if it lasts a long time and heavy losses, or, God forbid, successful German offensives, occur.But now we can enjoy the fruits of our military's victories, and all we have to do to keep going is move deeper into Germany. The more successes our army achieves, the more united and patriotic our people become, which, aside from approval ratings, will result in a slew of other benefits."
 FRA_Wartime_Tree.12.A: "Vive la France!"

 FRA_Wartime_Tree.13.t: "Enlistments Rise"
 FRA_Wartime_Tree.13.d: "As our troops advance deeper into Germany and beyond the Rhine, the patriotism that characterised the early days of the war has not faded. Indeed, it has only grown, as French men and women are eager to contribute to the war effort, serve and help their country in any way they can. The Grand Quartier Général frequently delivers jubilant reports about continuously rising enlistment rates, and queues around the block for enlistment offices are a common sight in French cities. There is no shortage of fighting age people and there is no doubt that as long as our troops continue to see success on the front lines and capture major targets, we will see more positive effects from French citizens."
 FRA_Wartime_Tree.13.A: "Aux armes, citoyens, Formez vos bataillons!"

 FRA_Wartime_Tree.14.t: "Support for the War Rises"
 FRA_Wartime_Tree.14.d: "Our troops are now deep on German soil, capturing territory in Central and Eastern Germany, and public support for the war effort has grown exponentially. When we declared war, there were plenty of vocal doubters and pacifists. But now that our army has achieved great success, occupied rich lands, and inflicted casualties, those doubters have gone silent. Indeed, some have begun to support the war effort! Polls show that the vast majority of the population supports the war and our government's actions in it."
 FRA_Wartime_Tree.14.A: "Invaders Will be Crushed!"

 FRA_Wartime_Tree.15.t: "Allied Victory Parade"
 FRA_Wartime_Tree.15.d: ""
 FRA_Wartime_Tree.15.A: ""

 FRA_Wartime_Tree.16.t: "The Sickle Cut"
 FRA_Wartime_Tree.16.d: "It was impossible, they claimed. They claimed that the Ardennes was too forested to support the deployment of armour in large numbers. Any troop larger than at least a division would have a great deal of difficulty there because it was so rugged and forested. We relied on these forecasts to give us the peace of mind necessary to dedicate our full force to protecting the Lowlands.\n\nThe Germans, however, have now accomplished the impossible. According to reports coming from outside Sedan, German infantry and armour are flooding through the Ardennes Forest and have already destroyed the B Grade divisions that were sent in opposition to them. Flights over the woodland reveal a severe gridlock as it appears at least three Panzer corps are moving through the forest on the same route. The troops standing between them and Sedan are second rate at their best and can in no way be expected to fend off these most elite of formations for any significant amount of time.\n\nThe news has stunned the Allied High Command. They had purposely sent their weaker forces there because they didn't anticipate any significant offensive actions from the area. However, shock was rapidly replaced by action. Immediately, troops were ordered to be dispatched to the area to bolster fortifications by the Ninth Army. They were unaware that German spearheads were swiftly reaching the Meuse, though. They would be in a great position to hastily travel to Paris or, more likely, the Channel Ports if they could take Sedan and cross the Meuse. In any case, the Western Front enters a new, even riskier phase as the entirety of France and the globe hold their breath."
 FRA_Wartime_Tree.16.A: "They did what?!"

 FRA_Wartime_Tree.17.t: "The Fate of Gamelin"
 FRA_Wartime_Tree.17.d: "The entire campaign has been a failure. We were caught off guard by the Germans, and they have been pummelling us ever since. German rule over all of France is now a threat as defeats have piled up almost as high as the dead. The administration is looking for someone to assign blame to as the populace becomes more incensed over the Army's shortcomings. Maurice Gamelin, the commander in chief of the Allies and the man in charge of orchestrating the war, is the person in question. It was believed that serving with Joffre during the First War and continuing to serve after it would have improved his critical abilities, but that belief has been sadly refuted.\n\nGamelin was deliberate and slow when we needed quickness and fast reaction. Although it may have been successful in the First War, it simply brought us to the verge of catastrophe in this one. Many have called for his resignation due to his incompetence. But if he were to go, it would only require the appointment of a replacement. Maxime Waygand, Gamelin's deputy and a passionate supporter of defence, is the only credible candidate put forward. His predetermined plans included retreating to a new defensive position, stopping the Germans, and eventually driving them back. This strategy has been dubbed outdated, a rehash of World War I, and unworkable. Do we have a choice now that Gamelin's offensive strategies have failed?"
 FRA_Wartime_Tree.17.A: "Weygand will show us the way"
 FRA_Wartime_Tree.17.B: "For all his failures, you cant change horses halfway through a race"

 FRA_Wartime_Tree.18.t: "The Government Flees Paris"
 FRA_Wartime_Tree.18.d: "Things are now quite bad. The French Army has failed to establish a solid defensive line between the German spearheads and the City of Lights as they swiftly approach Paris. The city will eventually fall, that much is certain. The Government has made the decision, after much deliberation, to follow the citizens out as they clog the highways with automobiles crammed with furniture and artwork, traveling south and west to locations other than here. Staying in Paris would invite German capture and bring the War to a conclusion. While some people, like Petain, would find that preferable, others would find it to be embarrassing. In Bordeaux, a new office has already been chosen.\n\nThe Government would be able to function without the monkey on their back of an impending German onslaught because it is far from the Front and safe from German threats, save from bombers. That's at least the idea. Few in Bordeaux anticipate the government to actually accomplish much. The British are preparing to cross the English Channel, and the Germans are in undefended territory, so it appears that France will soon fall. So, with Paris an open city to hopefully spare it from the ravages of War the government takes its leave of the city, and prays to God for forgiveness."
 FRA_Wartime_Tree.18.A: "To Bordeaux"

