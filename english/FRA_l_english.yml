 ### Plan Marquet
 FRA_Plan_Marquet_category: "Plan Marquet"
 FRA_Plan_Marquet_category_desc: "\n\n\n£decision_header_FRA_Plan_Marquet£\n\n\n\nFrench railways have always been a great way of transporting goods throughout the state, but recently our train system has been lacking. So, why not fix this, and fight unemployment at the same time? A huge infrastructure plan has been drawn up to develop railways across the county. It could fix our railway problem and open up more jobs to the people."

 FRA_Electrifying_the_Paris_Man_line: "Electrifying the Paris-Le Mans Line"
 FRA_Electrifying_the_Paris_Man_line_desc: "The Paris-Le Mans railway line connects the capital with western France's industrial and agricultural heartlands. Under the Plan Marquet, we can start renovating this corridor by electrifying it, reducing reliance on coal and steam locomotives, increasing efficiency, and preparing for future military and economic needs. Electrification will also standardise infrastructure across national routes, allowing for more efficient deployment of resources and personnel."
 FRA_Connect_Le_Man_to_Le_Havre: "Connect Le Mans to Le Havre"
 FRA_Connect_Le_Man_to_Le_Havre_desc: "Northern France's ports, particularly Le Havre, are underutilised in terms of internal trade and strategic logistics capacity. By extending a direct railway connection from Le Mans to Le Havre, we can open up a vital trade corridor between inland industrial hubs and Atlantic shipping routes. The project promises to improve both wartime mobility and peacetime commerce, as well as boost employment and heavy industry."
 FRA_Producing_locomotives_in_France: "Producing Locomotives in France"
 FRA_Producing_locomotives_in_France_desc: "We cannot rely on foreign countries to meet our industrial demands, especially in critical sectors like locomotive manufacturing. Our plan includes the necessary funding and state guidance to restore domestic locomotive production capabilities. This includes retooling workplaces, securing steel and electrical component supply chains, and hiring skilled workers from our underutilised workforce."
 FRA_Modernize_the_Orleans_line: "Modernise the Orléans Line"
 FRA_Modernize_the_Orleans_line_desc: "The Orléans railway line is antiquated and inefficient as a result of previous economic inactivity. Under Marquet's proposal, we now have the opportunity to upgrade this critical road that connects Paris to the country's center-west. We will significantly increase cargo throughput and passenger traffic by renewing, electrifying, and upgrading tracks and stations. Orléans benefits as an important inland hub, while the surrounding regions gain access to improved agricultural and manufacturing infrastructure."
 FRA_Modernize_Aquitaine_infrastructure: "Modernise Aquitaine's Infrastructure"
 FRA_Modernize_Aquitaine_infrastructure_desc: "Aquitaine is a region with tremendous potential but a long history of neglect.  With its agricultural wealth and expanding businesses, the time has come to fully integrate it into France's modern economic structure.  We will use Plan Marquet funds to make significant repairs, such as improving roads, bridges, electrical grids, and water transportation systems.  This will reduce rural isolation and connect local businesses with national markets."
 FRA_Modernize_Nante_infrastructure: "Modernise Nantes' Infrastructure"
 FRA_Modernize_Nante_infrastructure_desc: "Nantes, a historic centre of business and shipbuilding, faces stagnation unless significant infrastructure redevelopment occurs.  We will use the Plan Marquet procedures to direct funding towards modernising the harbour infrastructure, improving road and rail connections, and electrifying key routes into the city.  These renovations will revitalise industrial activity and solidify Nantes' position as a gateway to the Atlantic and beyond."
 FRA_Develop_Bordeau: "Develop Bordeaux"
 FRA_Develop_Bordeau_desc: "Bordeaux serves as an example of what state-directed development can achieve. Adrien Marquet's political base, the city has already benefited from strategic early investments. However, with full support from the Plan Marquet, Bordeaux can be transformed into a regional powerhouse. Southwest France will benefit from port expansion, rail terminal upgrades, and the construction of new public facilities, all of which will create jobs and increase strategic economic depth."

