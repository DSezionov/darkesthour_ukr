 FRA_Assassination_of_Alexander_I.1.t: "The Drive of the Royal Car"
 FRA_Assassination_of_Alexander_I.1.d: "King Alexander I of Yugoslavia, one of the most influential proponents of France's \"Little Entente,\" arrived in the beautiful Mediterranean French city of Marseille to sign an even more binding Franco-Yugoslav agreement, further tying the two nations together. There to greet his royal highness's arrival was French Foreign Minister Louis Barthou and a large and pompous escort. As the duo slowly drove through the streets of the ancient city, throngs of adoring citizens blanketed the route, hoping to catch a glimpse of living royalty with their own eyes.\n\nSuddenly, out of the crowd, a man dashed at the car. The man leapt up onto the running board of the car and, to the great relief of those in the car, waved around a bouquet of flowers chanting \"Vive le roi!\" However, that relief was soon extinguished as the man revealed the Mauser C96 semi-automatic pistol he had been hiding in the flowers. The gun, now pointed directly at the inhabitants of the car, let out a loud volley..."
 FRA_Assassination_of_Alexander_I.1.A: "The horror! Is everyone all right?!"

 FRA_Assassination_of_Alexander_I.5.t: "Sovereign of Yugoslavia and French FM Killed"
 FRA_Assassination_of_Alexander_I.5.d: "[FROM.GetNewsIcon]Bleak news from France today as both the King of Yugoslavia, Alexander I, and French Foreign Minister, Louis Barthou, have been assassinated by a renegade Bulgarian terrorist.\n\nWhile driving through the streets of Marseille, the infamous Bulgarian assassin Vlado Chernozemski opened fire on the passing motorcade carrying both Alexander and Louis. Alexander was shot twice, killing him within minutes, while Louis was shot by a French policeman amidst the chaos, severing a vital artery in his arm, leading to his death by blood loss. During his attempted escape, the assassin was brutally beaten by an enraged crowd.\n\nThe assassination came after failed French attempts to secure both Italy and Yugoslavia into a continental bloc (including other Balkan nations, the Soviet Union and the Baltic states) due to territorial disputes along the Dalmatian coast. Two terrorist organisations responsible for this, the Ustaše and IMRO are indirectly supported by Italy, raising suspicions of Italian involvement.\n\nThe future remains uncertain; the assassination of Louis Barthou and King Alexander has effectively ended all French efforts in the Balkans, while only emboldening the nationalist front as it awaits the regency of the young new King, Peter II."
 FRA_Assassination_of_Alexander_I.5.A: "So the bastard is finally dead!"
 FRA_Assassination_of_Alexander_I.5.B: "A dark time for our nation."
 FRA_Assassination_of_Alexander_I.5.C: "A horrible end for a powerful man."

 FRA_Assassination_of_Alexander_I.6.t: "Assassination of King Alexander of Yugoslavia"
 FRA_Assassination_of_Alexander_I.6.d: "[FROM.GetNewsIcon]While on a royal visit to the coastal town of Marseille with the French Foreign Minister Louis Barthou, King Alexander of Yugoslavia was shot dead! The attacker is Vlado Chernozemski, a member of the IMRO and an instructor for the Ustaše. The attacker was cut down by the sword of a French policeman and then beaten by the crowd, and he eventually died in police custody. Thankfully the Foreign Minister of France survived the attack and is safe and well!\n\nThe motive of the attack is suspected to have been Alexander’s attempt to try to restore a parliamentary form of government and further demand to return to a democratic form of government.\n\nAfter this tragic death of the King, the relations between France and Yugoslavia might sour even more than they were before. What will the future bring to this young nation and how will this affect the whole Balkan peninsula?"
 FRA_Assassination_of_Alexander_I.6.A: "A horrible end for a powerful man."

 FRA_Assassination_of_Alexander_I.7.t: "Foiled Assassination Attempt on Lives of King Alexander and Louis Barthou"
 FRA_Assassination_of_Alexander_I.7.d: "[FROM.GetNewsIcon]A potentially disastrous incident for the country has occurred! French Minister Barthou and Yugoslav King Alexander narrowly escaped an assassination attempt.\n\nWhile the King and the Minister were slowly driving through the streets in their car, a Bulgarian terrorist emerged from the crowd and attempted to shoot both the King and the FM with a Mauser. Fortunately, patrolling police noticed the gun and pushed it away from the car, causing the assassin to miss the shot. The assassin attempted to flee but was apprehended by the angry crowd and reported beaten to death, while the police appear to make no attempt to stop them. The terrorist was thought to be a Macedonian separatist seeking vengeance on King Alexander.\n\nThis assassination attempt had the potential to be a huge disaster, not only for the political environment in France, but also for our diplomatic relations with Yugoslavia. Fortunately, neither of them was hurt."
 FRA_Assassination_of_Alexander_I.7.A: "A close call, that’s for sure."

 FRA_Assassination_of_Alexander_I.8.t: "French Minister Barthou Killed in Marseille, King Alexander Alive and Well"
 FRA_Assassination_of_Alexander_I.8.d: "[FROM.GetNewsIcon]A disastrous incident for the country has occurred! French Minister Barthou was assassinated while visiting France with King Alexander of Yugoslavia.\n\nWhile the King and the Minister were being driven slowly through the streets in the car, a Bulgarian terrorist emerged from the crowd and attempted to shoot both the King and the FM with a Mauser.\n\nAfter two shots were fired at the FM, patrolling police noticed the assassin and pushed the gun away from the car, causing the assassin to miss the shots aimed at King Alexander. The assassin attempted to flee but was apprehended by the angry crowd and reported beaten to death, while the police appear to make no attempt to stop them. He died of his injury later in prison. The Terrorist was thought to be a Macedonian Separatist seeking vengeance against King Alexander.\n\nThis assassination attempt could have serious consequences for France's political environment, as the death of Barthou would mean a significant weakening of the Reformist government."
 FRA_Assassination_of_Alexander_I.8.A: "At least our King is safe..."
 FRA_Assassination_of_Alexander_I.8.B: "A horrible tragedy!"

 FRA_Assassination_of_Alexander_I.9.t: "Funeral of Louis Barthou"
 FRA_Assassination_of_Alexander_I.9.d: "[FROM.GetNewsIcon]Today in Paris, the funeral for the former Foreign Minister Louis Barthou was held , four days after he was killed in the Ustaše terror attack in Marseille. Many people, both civilians and politicians alike have come to honour Barthou, paying their respects to a major player in French politics. A member of the Alliance Démocratique, he held the prestigious post of Prime Minister in 1913, and oversaw major changes to our nation's social policy, including the introduction of allowances to families with children.\n\nAs well as serving as Prime Minister, he has also served as the Foreign Minister before his unfortunate death, with many agreeing that Barthou's greatest diplomatic achievement was the improvement of Franco-Soviet relations. He is largely responsible for the Soviet Union's admission to the League of Nations, and prior to his death, he was involved in efforts to establish an "Eastern Pact," which would have included Germany, the Soviet Union, Poland, the Baltic States, and Czechoslovakia. The goal of this was to maintain peace and settle border disputes between the Soviets and Germans, but this is unlikely to come to fruition now.\n\nThe current Minister of Security, Albert Sarraut, has resigned in shame, stating that better security measures should’ve been put in place, and that it was his fault for overlooking such a great detail"
 FRA_Assassination_of_Alexander_I.9.A: "A sad ending for a great man."

 FRA_Assassination_of_Alexander_I.10.t: "Barthou Supports the Reform."
 FRA_Assassination_of_Alexander_I.10.d: ""
 FRA_Assassination_of_Alexander_I.10.A: "Good"

