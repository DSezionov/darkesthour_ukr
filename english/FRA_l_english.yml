 FRA_Question_of_Hatay.1.t: "Turkey is asking for Hatay"
 FRA_Question_of_Hatay.1.d: "The leaders of the nation of Turkey have approached us. They propose that the province of Hatay, in the northern-most point of Syria should have a referendum about staying in our great Syrian colony or becoming a state in their Republic. It was inhabited by ethnic Turks who left after the successful war of independence. Although many left for a better life, some people still remain, having lived here for generations. This does make it a good target for their leaders, it hasn't got any strategic value and it may convince them to join the War."
 FRA_Question_of_Hatay.1.A: "Hold the referendum"
 FRA_Question_of_Hatay.1.B: "That land is Ours!"

 FRA_Events.1.t: "Finishing up the Maginot Line"
 FRA_Events.1.d: "We are almost completely done with the construction of the Maginot line but the military is split on their priorities, Armée de l'Air clam the Luftwaffe should be our main concern. They will most likely be just as effective over the french skies. All the while the Armée de Terre claim the Heer is our primary concern. The German's Panzers will smash us to bits if we do not prepare for them and make sure our forts are up to date."
 FRA_Events.1.A: "They might go above it!"
 FRA_Events.1.B: "They might try to break through!"

 FRA_Events.2.t: "1936 Legislative Elections"
 FRA_Events.2.d: "It's the 1936 French legislative elections, one that is sure to be remembered. The current state of France, both social and economically has polarised politics. Socialists and the PCF wish to safeguard workers rights, paving a way for a revolution. The far-right leagues remain a powerful opposition despite attempts at keeping them down. The centre is stunned, while republicans and the moderated right is desperately trying to garner support. Whatever the results, the next government will have a big role in bringing The Republic back on its feet."
 FRA_Events.2.A: "Léon Blum - Popular Front"
 FRA_Events.2.B: "Pierre-Étienne Flandin - Droite Parlementaire"
 FRA_Events.2.C: "Louis Marin - Droite Parlementaire"

 FRA_Events.3.t: "General Strike"
 FRA_Events.3.d: "[FROM.GetNewsIcon]The victory of the Popular Front in the 1936 elections has provoked a massive strike. Workers have stopped working in practically every factory, efficiency and production have been slashed in half, and some laborers have taken it upon themselves to take their workplaces hostage. They are certain they will get what they want from the Popular Front, who was elected by them and ran on a platform of expanded rights for workers. Although we are being exploited, they are right. We must reach an agreement, and quickly. Every possible concession must be made to get our economy back on its feet, because if these strikes continue, it may remain crippled for years. The world is leaning once more towards war; we cannot afford to waste time and production."
 FRA_Events.3.A: "It keeps going from worse to worse."

 FRA_Events.4.t: "General Strike"
 FRA_Events.4.d: "[FROM.GetNewsIcon]With the Republican Coalition's government well established for the time being, numerous union leaders, as well s the PCF leadership, have called for a massive strike across Metropolitan France. They demand that \"The rights of the French workforce are upheld by the state, and that no compromise be made with the 'bourgeois coalition.'\" Production has been halved and the already unstable republic wavers yet again. The Prime Minister has yet to release any official statements."
 FRA_Events.4.A: "Just what we needed..."

 FRA_Events.5.t: "Anti-Republican Strikes Grow"
 FRA_Events.5.d: "The Anti-Republican general strike has reached its peak! The disease has spread across all of France, as more and more workers have joined their cause, those who don't are blocked from entering the factories by the legions of strikers that occupy them. France has stopped working, production-wise, our cabinet has entered complete chaos and the calls for action by the middle and upper classes have become impossible to ignore. Something must be done, immediately!"
 FRA_Events.5.A: "They will never have enough, will they?"

 FRA_Events.6.t: "More Strikes!"
 FRA_Events.6.d: "[FROM.GetNewsIcon]The general strike has expanded! Following the example of their cohorts, more and more workers across France have laid down their tools to protest their conditions and demand expanded rights. Before, production levels were brought low, but we were still functioning. However, with this expansion, our entire economy has stagnated. This means our construction projects have halted, our factories can no longer produce, and no more guns are being made. We've got to reach an agreement no matter the cost. French industry won't survive much longer on the global market without it."
 FRA_Events.6.A: "Damn Strikes! Why can't they just be happy with what they have?"

 FRA_Events.7.t: "Matignon Compromise is signed!"
 FRA_Events.7.d: "[FROM.GetNewsIcon]The Anti-Republican strike has come to an end. The damage to our economy has yet to be accounted for, and the French citizen's views on the state has been somewhat tarnished, nevertheless, through careful coordination between our cabinet, factory owners and union leaders, we have managed to bring the country back from the verge of revolution. Both sides had to give up some of their demands, and it's unlikely they will remember us fondly for it, but an accord has been made, and things can go back to the way they were."
 FRA_Events.7.A: "See? Everyone's happy. Now get back to work..."

 FRA_Events.9.t: "Maurice Thorez calls for an end of all Strikes"
 FRA_Events.9.d: "[FROM.GetNewsIcon]“One must know how to finish a strike, at the moment that the main points have been obtained.”\n Maurice Thorez, the leader of the Communist Party, has called for an end to the strikes that we have had such problems in dealing with. Slowly, across the country, men and women return to work, having obtained what they wanted. The Matignon Agreements have given them many new rights, and, soon, our economy will get back on its feet. However, our problems are not over. Factories are reporting struggles in adapting to the changes, workers still doubt our ability to restrain factory bosses, and the Popular Front is fracturing. Our problems have only begun."
 FRA_Events.9.A: "At long last, the strikes are over."

 FRA_Events.10.t: "French Popular Party founded"
 FRA_Events.10.d: "[FROM.GetNewsIcon]Jacques Doriot, a once-avid communist who was expelled from his own party after advocating the formation of a Popular Front with the less-radical Socialist Party, has struck back at his party. After shifting towards a more \"national\" socialist viewpoint, Doriot decided to establish a new party whose agenda is more in line with that of Nazi Germany. The new Parti Populaire Français may be easily confused with the Popular Front, but the two could not be more different. The new party calls Saint-Denis its home and, after the banning of fascist groups, extremists such as the Action Française and Croix-de-Feu are flocking to its banner. This does not bode well for France. We cannot have radicals tearing apart our internal stability as we faces threats abroad."
 FRA_Events.10.A: "The enemies of the people are within France as well."
 FRA_populary_party_long: "French Popular Party"
 FRA_populary_party: "FPP"

 FRA_Events.11.t: "Jacques Bainville passes away"
 FRA_Events.11.d: "[FROM.GetNewsIcon]Jacques Bainville, a prominent monarchist and avid hater of the German Reich, has passed away. His writings as a historian and journalist reveal a man disgusted with the direction of France in the past centuries, and he recruited many angry young souls to join him in the militant, fascist Action Française. However, he is most known for his writings on the Treaty of Versailles. He attacked the document that brought us peace, labeling it as \"too harsh in its mild features, too mild in its harsh features,\" believing that the treaty would provoke the German people to seek revenge while not stopping them from taking it. His burial shall take place in two days, but we have learned that he was denied the last rites by Cardinal Jean Verdier since the Pope condemned the Action Française. Many in our government are glad to see the man gone, but his death may stir up trouble with the far right..."
 FRA_Events.11.A: "La vie des mots n’est pas indépendant de la vie des idées."

 FRA_Events.12.t: "Léon Blum Attacked and Wounded!"
 FRA_Events.12.d: "[FROM.GetNewsIcon]Léon Blum, the head of the Socialist Party, has been brutally attacked! As the moderate leftist departed the National Assembly, having his taxicab cross the funeral procession of Jacques Bainville, he was set upon by far-right militants known as the King's Camelot and cut around the head. They were inspired by the rightist journalist Charles Maurras, who called for “the knife” to be used against politicians who supported the recent League of Nations sanctions against Italy earlier in the day. While active and devoted, the youth organization is looked down upon by other fascist groups for its violent tactics and its tendency to become involved in street brawls with leftist organizations and competitors among the right. This event will hopefully direct public opinion away from the right, but in the meantime, the president has declared its dissolution, along with its parent organization, the Action Française. However, this may rile up both the left and the right..."
 FRA_Events.12.A: "Violence on the streets of Paris? What next?"

 FRA_Events.13.t: "BEF crosses the channel"
 FRA_Events.13.d: "[FROM.GetNewsIcon]They have arrived. The brave British Expeditionary Force commanded by the famed General Lord Gort have crossed the English Channel yesterday and have arrived in France to help their soldiers fight the monstrous German war machine. They will travel around the country to arrive at the border, where they are supposed to stop another attack on the Benelux from the Jerry's. We hope that this will not develop in another 4 years of trench warfare and that we will stop this horrible ideology, making sure that Europe will not fall to it. We will kick the Nazi bastards up the rear end, tally ho!"
 FRA_Events.13.A: "Let's hope for the best..."

 FRA_Events.14.t: "Leftist Organizations Protest!"
 FRA_Events.14.d: "It is just as we expected. Léon Blum's beating has enraged the left, who are protesting our feeble crackdown on the far-right. However, much we might want to, harsh retaliation would only make the situation worse by giving the right a reason to, potentially, revolt. The last thing we need is a civil war, so we need to focus our efforts on calming both sides without choosing one, even if our policies are socialist. Let's take shelter and hope this storm passes and doesn't rip the roof off of French democracy, leaving it open to the elements."
 FRA_Events.14.A: "Dammit! We're pinned between two sides!"

 FRA_Events.16.t: "Viénot Agreements"
 FRA_Events.16.d: "[FROM.GetNewsIcon]The political crisis that involved Syria in the last two years has recently dramatically grown to an unbearable level. Movements and protests which call for an immediate independence of the country have now started a sixty-day-strike, guided by their nationalist leaders, which is having devastating effects on the economy and on our national stability. in order to avoid further and worse consequences, an immediate encounter between our and their leaders has been made.\n\nThis morning, in Paris, our president and a Syrian delegation signed the Viénot Accords, where we both agreed for a gradual independence of Syria in exchange for some economic reliefs, French military presence in the country and aid in case of war.\n\nAcceding to their requests might not be positive for our image, but in these difficult times, we need to preserve our stability."
 FRA_Events.16.A: "Syria or something?"

 FRA_Events.17.t: "Dissolution of the North African Star"
 FRA_Events.17.d: "Reorganised in 1933, The Étoile Nord-Africaine independence movement still had ties to the PCF last decade, and although its current outfit is set on achieve Algeria's freedom through peaceful means, the risks of a revolution being sparked on our most valuable colonial holding, at the same time Europe experiences a volatile period, are too great to be ignored. We'll follow through with abolishing it legally, for the second time, and imprisoning their leaders for the time being. This should buy us enough time to deal with the situation on a more opportune date."
 FRA_Events.17.A: "Excellent!"

 FRA_Events.18.t: "Storm hits the Vendée Coast"
 FRA_Events.18.d: "An enormous storm has hit the Vendée Coast, causing enormous devastation. Many have been uprooted from their homes, the roads are wrecked, and the railway is destroyed. The damage on our infrastructure there cannot be repaired; we're going to have to salvage what's left. We should be able to recover from the storm quickly."
 FRA_Events.18.A: "Great. Another storm. Just what we needed."

 FRA_Events.19.t: "Inauguration of the Universal Exhibition of Paris"
 FRA_Events.19.d: "Today, we begin the Exposition Internationale des Arts et Techniques dans la Vie Moderne. This great event brings together the greatest nations in the world, inviting them to showcase the best work of the artists they call their own. But, as all things these days, the exhibition was hijacked by competing nations. The Germans designed their pavilion to stand as a sort of bulwark against the Soviets, with the eagles and swastikas familiar to their regime and a large statue, depicting two naked men joining hands, staring defiantly at the Soviet pavilion across the pond. This one had atop its roof the famous statue, \"Worker and Kolkhoz Woman\" depicting a man and a woman carrying, respectively, a hammer and a sickle, thrusting forward. Italy, being Italian, attempted to bring forth the image of a benevolent dictatorship, with murals depicting Italian technology and the success of Corporatism. The British pavilion, by far, was the least impressive, being a simple white box, containing words that we French use that come from the English language. The event was a success, bringing thousands of spectators, but one wonders whether the competitiveness on display is a sign of times to come..."
 FRA_Events.19.A: "Who knows?"

 FRA_Events.21.t: "Nationalist riots in Tunisia"
 FRA_Events.21.d: "The violent grip of nationalism has once again taken hold of the Tunisian Protectorate.\n\nFor years, the Tunisians, led by the Destour Party, have been calling for independence. They demanded that we withdraw our forces from their soil, and that we simply abandon our business interests there. They lobbied for increased autonomy within the French Empire, and proclaimed that France should not dominate Tunisia's politics and society.\n\nHowever, losing Tunisia would have been a significant blow to our trade routes, causing irreparable damage to our economy and immense suffering to our people. As a result, the decision was made to reject these requests and maintain Tunisian State protection. This decision caused the party to become even more violent, and they have gained enormous support from the Tunisian people in recent weeks.\n\nAs a result, the decision was made to outlaw the Destour Party for the sake of regional stability and peace. The Tunisian Nationalist Movement was expected to disorganise and disintegrate as a result of the ban on their prominent nationalist party. However, the act had the exact opposite effect. Tunisian nationalists have united in their opposition to our occupation, resulting in violent riots in major Tunisian cities. There has even been talk of the party's radicals splitting off to form a separate, more nationalist party.\n\nTunisia's situation must be brought under control as soon as possible. Our country's well-being and prosperity are far more important than what some terrorists demand."
 FRA_Events.21.A: "We will not give in that easily!"

 FRA_Events.22.t: "Édouard Daladier President of the Council"
 FRA_Events.22.d: "It seems that the Popular Front government's attempts at keeping France together failed miserably, when today, following a series of events revolving the PCF, the Front's members and the recent developments at the Munich Conference, the PCF called for mass strikes, with the Popular Front's leadership denouncing them as \"Warmongers.\" Effectively, the government has collapsed and now all that remains is the Radical Party, led by Édouard Daladier. The new Liberal government has a legacy of failures to leave behind and great changes in Europe's horizon to endure. Now, in France, both the right and left strain even further from each other, and its wounds can be seen by all, friend or foe."
 FRA_Events.22.A: "Such a sudden change in course cannot be good for France."

 FRA_Events.24.t: "Peugeot 202"
 FRA_Events.24.d: "Following a incredible diner in the Bois de Boulogne district, the mobile manufacturer Peugeot has presented its latest model to its enthusiasts, the 202. Both tasteful, easy to mass-produce and accessible, this full-chassis instant-classic has come to be known for the quality of its improvements over previous models, including the whooping 100 km/h maximum velocity, and seem to be a new, constant, sight all across France."
 FRA_Events.24.A: "How do I get one?"

 FRA_Events.25.t: "150th Bastille Day"
 FRA_Events.25.d: "It's been 150 years since the Storming of the Bastille. Every single day since then, the French people have fought for democracy and rights, never losing hope, never tiring. Just as our ancestors raided that castle to show the King that they would not bow, so we must struggle against those who wish to usurp our democracy. This becomes more and more important in recent days, with the rise of extremist ideologies and threats to French sovereignty. The French Tricolore continues to wave in the roughest of weather. So we must uphold our ways. But this day is not one for worry. It is one for celebration of our past, the present, and whatever lies in the future. Fireworks will light the skies of Paris, and our children and their children will remember the sacrifices made for liberty."
 FRA_Events.25.A: "Vive La France!"

 FRA_Events.26.t: "Maurice Thorez Deserts to the USSR"
 FRA_Events.26.d: "With communism banned in France, and the PCF recognised as illegal, it seems that the party's Secretary General Maurice Thorez, rather than accepting the draft decided to flee into the Soviet Union. While this might be considered a hard blow against the far-left in France, partisanship is unlikely to wean, and even though many have considered armed resistance despite the outcome of the upcoming conflict, there are many that continue to claim that a a non-revolutionary power-struggle should remain the focus of the PCF remnants. Thorez himself claimed he'll continue to write for the the party's newspaper, the \"Humanité Clandestine,\" and his sway over the French left is likely to remain strong."
 FRA_Events.26.A: "We don't have time to worry about him now. Let him freeze in Siberia!"

 FRA_Events.28.t: "The Destour Question"
 FRA_Events.28.d: "If anything the recent protests against French rule over the protectorate of Tunisia has proven the need to swift action! The time has come to put an end to the Constitutional Liberal Party In Tunisia, once and for all. These rebellious acts against French authority are an obvious breach of the laws agreed by both sides by the civilian population, and shall not stand. The Destour shall be put down, either through peaceful dissolution or through force."
 FRA_Events.28.A: "Shut them Down!"

 FRA_Events.29.t: "Empire Colonial Français"
 FRA_Events.29.d: "French power stretches across the globe. We triumphed in the Race for Africa, and secure the colonies of the Germans after we defeated them in the Great War. We control Indochina, a rich source of tea, rice, coffee, pepper, coal, zinc and tin, and various islands that we can use to project naval power. However, our once glorious empire has fallen into disrepair. Our portion of Africa has no industrial base, guerrilla separatists harass our forces in Asia, and the dockyards in French Polynesia, among others, are small and useless. This must change. War is brewing in Europe, and we must have the ability to draw upon the power of our colonies should the French homeland ever fall into enemy hands. Soon, the French Colonial Empire will be a force to reckon with on its own."
 FRA_Events.29.A: "Let Us Begin"

 FRA_Events.30.t: "The Crackdown"
 FRA_Events.30.d: "Following an exacerbated address to the French media, Prime Minister Pierre-Étienne Flandin declared the mass strikes that have plagued France to be both illegal and dangerous for the nation's security, and promised to, with haste, put an end to it all. From there he and his councilors have retreated back to the Cabinet, and the press conference disbanded. Now, what actions will be carried out against the strikers is on the Prime Minister's hands, and the results of such actions are only his to bear. Union leaders, as well as the PCF leadership, have come together right after, expressing a desire to continue the resistance against the \"Republican Offensive\", one way or the other. The situation grows dire."
 FRA_Events.30.A: "Send in the Police!"
 FRA_Events.30.B: "Send in the Army!"

 FRA_Events.31.t: "Police Clashes With Unionists"
 FRA_Events.31.d: "News from Metropolitan France reached the rest of Europe today, when, after 12 hours of thorough negotiations between officers of the National Gendarmerie and the high echelon of Union leaders, an explosion was heard not too far from there. Someone had attempted to throw an explosive at the crowd, but missed by far. Soon enough, guards of the Municipal Police, alongside mounted Gendarmerie started to disperse the crowd by force, and the order was repeated throughout the country. In total, at least 13 wounded have been reported, but luckily no deaths occurred. The PCF, alongside most of the left have criticised the actions of Prime Minister Flandin, even going so far as to point out parallels to pre-republican France, but it seems the Strikes have died out, for now."
 FRA_Events.31.A: "I think this deserves a toast!"

 FRA_Events.32.t: "Five Dead In Police Action"
 FRA_Events.32.d: "Shootings across the streets of Paris today, when, as the army approached one of the last holdouts of the general strike, they were confronted by a crowd of workers, barricaded inside a car factory and refusing to come out. After heated discussions with the troops ordered there, a barrage of rocks and bottles from strikers resulted in a chaotic situation that ended with the whole building on fire. Five men perished in the flames. As the news reached the leaders of the CGT-SR and the PCF, both have agreed to, rather than calling off the strikes altogether, strengthen the resolve of the protests, and have urged all to return to the factories, and under no circumstances allow the general strikes to die down. Violence has erupted between the Police, Armed Forces and Strikers, PCF members and deserters all across Metropolitan France, and unconfirmed news about more deaths float around the press. Maurice Thorez, PCF's figurehead, has called upon several left-leaning politicians, French intelligentsia and union leaders to convene in an undisclosed location, and while the meaning of it is yet unknown, members of the police and Republican Coalition expect nothing good out of it."
 FRA_Events.32.A: "No! This cannot be happening"

 FRA_Events.33.t: "CGT-SR And PCF Ally Against Republican Aggression"
 FRA_Events.33.d: "Terrible news, as another morning rises, citizens of France, and all Europe, are shocked to know that, following a late-night meeting between leaders of the far-left and union leaders, the PCF and the CGT-SR have joined forces in what can only be called \"Revolutionary Action\", and with the help of disgruntled army deserters, have seized weapons and materials, following the example of the Spanish. Block by block, they advanced throughout the night, setting up barricades, local garrisons and overwatches, as well as engaging against police and army forces across the suburbs. At least 50 dead have been confirmed, as of yet, and, for the surprise of all, even prominent Generals seem to have joined the rebels. It seems that, once more, France is plunged into a revolution."
 FRA_Events.33.A: "Stand by France!"
 FRA_Events.33.B: "Stand by The Commune!"

 FRA_Events.34.t: "The Far-Left Dissolution"
 FRA_Events.34.d: "The entirety of the political left has been left speechless when, early today, after a brief announcement to the press, Prime Minister's Flandin's motion to Ban the Far-Left parties, particularly the PCF, was not only approved but put into practice hours later. Local police, aided by the Gendarmerie, broke through lines of rushed assembled crowds around the PCF headquarters, as well as several known venues and the residences of specific individuals. It's yet unknown how this will affect the General Strike."
 FRA_Events.34.A: "Let's see if they can organise a strike from prison"
 FRA_Events.34.B: "Let them go free, as long as they don't try anything..."

 FRA_Events.35.t: "The PCF Leadership Is Pardoned"
 FRA_Events.35.d: "In an interesting turn of events, Prime Minister Flandin has decided to allow the Parti Communiste Français' leadership to walk free from prison today, offering them a pardon in exchange for the ceasing of the general Strike and further cooperation with the Republican Coalition in the upcoming years. Interestingly enough, French newspapers discovered that, soon after they were freed, none else than Maurice Thorez himself asked for the other leaders from the now dissolved left-leaning leagues, as well as union leaders of the CGT, to convene into a yet unknown location."
 FRA_Events.35.A: "This might have been a mistake..."

 FRA_Events.36.t: "Maurice Thorez Declares The French Socialist Republic"
 FRA_Events.36.d: "A gunshot that might forever change France's destiny echoed across Paris today, when, after an incursion against a local garrison post in the outskirts of town, what could only be described as a human wave managed to take over and barricade the building. When the police was dispatched to the outpost, a single shot erupted into a bloody skirmish between PCF members, aided by partisans from the CGT and other minor far-left parties, and the municipal guard. Those who returned to town described none other than Maurice Thorez himself was leading the crowd, and without warning dozens of accounts started to come from across Metropolitan France, describing workers, many wielding weapons of foreign-design, taking over buildings, police stations and army outposts, setting fire to barracks and stealing provisions. Later, Maurice Thorez gathered an even bigger crowd, yet to be counted, and declared that \"the era of white terrorism must be brought down, with or without peace\" before declaring the French Socialist Republic. Europe watches in fear."
 FRA_Events.36.A: "Vive la République!"
 FRA_Events.36.B: "Vive la Commune!"

 FRA_Events.37.t: "Corruption Scandal!"
 FRA_Events.37.d: ""
 FRA_Events.37.A: ""

 FRA_Paul_Boncour_Government.1.t: "Paul-Boncour loses the confidence of the Chamber"
 FRA_Paul_Boncour_Government.1.d: "The bill pushed by Prime Minister Paul-Boncour to establish a more strict budgetary rigor to increase taxes and reduce public expenditure has proven to be immensely unpopular among French parliamentarians. As a result, the Chamber has withdrawn its confidence in the President of the Council. Naturally, this lack of support from the parliament caused the government to fall, ending the Paul-Boncour administration. The short-lived government only lasted one month before falling to the cruel game that is French politics."
 FRA_Paul_Boncour_Government.1.A: "Maybe his replacement will have better luck."
 FRA_Paul_Boncour_Completed: "§YNew Prime Minister§! Nominated"

 FRA_Negotiations_with_Socialists: "Negotiations with Socialists"
 FRA_Negotiations_with_Socialists_desc: "\n\n\n£decision_header_FRA_Decret_Law_Paul_Reynaud£\n\n\n\nThe RAD and Daladier have been slowly building up a friendship with the SFIO because of our similar beliefs, but we still end up arguing about many issues. However, the threat of a complete economic meltdown has shown us that we need to put aside our differences and reinforce our ties with the Socialists. Making new economic reforms that we can both agree on will make them easy to implement, and even create a long-lasting alliance between our parties."

 FRA_Servant_Budget.1.t: "Socialists do not vote to cut civil servants' budgets"
 FRA_Servant_Budget.1.d: "The Daladier administration has suffered a major setback. The Socialists in the Chamber have rejected the proposal of the President of the Council to cut the budget destined to the civil servants. The Chamber initially agreed with the plan presented by Minister of Budget Lucien Lamoureux, that consisted in a reducing the salaries of civil servants by five percent. However, attempts to push for further salary cuts have ended in a complete failure. With the lack of confidence of the Chamber, it is very likely that Daladier government will follow the same fate that the Paul-Boncour administration suffered months ago."
 FRA_Servant_Budget.1.A: "Merde!"
 FRA_Servant_Budget_Refused: "Refused Budget Cut"

 FRA_Servant_Budget.4.t: "Socialists vote to cut the civil servants’ budgets"
 FRA_Servant_Budget.4.d: "After a hard-fought vote in the Chamber, the Socialists finally agreed to cut the civil servants’ budgets. The plan presented by Minister of Budget Lucien Lamoureux of reduction of salaries by five percent was seen as a reasonable enough measure to get approved. The Radicals in the Chamber argued that pushing for further cuts would be a pointless and dangerous move, so they decided to accept the compromise. With this victory, the Daladier administration is one step closer to a balanced budget and will likely avoid the fate of its predecessor."
 FRA_Servant_Budget.4.A: "Finally, we are making progress."
 FRA_Servant_Budget_Accepted: "Accepted Budget Cut"

 FRA_National_Lottery.1.t: "The National Lottery is created"
 FRA_National_Lottery.1.d: "The recent finance law establishes a new French National Lottery to help war veterans and farmers affected by natural calamities. The decree also states the government will fix the conditions of organizations and modalities of the lottery within the next month. Originally, the concept of a National Lottery was introduced through the Royal Lottery of France by the old Bourbon monarchy. We can't deny the usefulness of some ideas of the Ancient Regime, even if our distaste for the monarchic form of government should be pretty obvious at this point. Charity raffles and other forms of clandestine lotteries are already pretty common, but hopefully this one will bring money to the state coffers."
 FRA_National_Lottery.1.A: "This could help."

 FRA_Agricultural_Law.1.t: "Agricultural law reorganizing the wheat market"
 FRA_Agricultural_Law.1.d: "Our attempts to regulate the wheat market are not enough. Since the surplus still influences the market, prices are continuing to decline, threatening to ruin many agricultural cooperatives. To help the farmers affected by the price declines, the government has issued a law fixing wheat prices. The decree establishes that wheat cannot be sold below the price of 115 francs per quintal, regardless if stocked under contract or not. This fixed price will increase every month by the Ministry of Agriculture to finance storage and handling costs. These measures however are temporary, and the market will return to normal once we solve this problem."
 FRA_Agricultural_Law.1.A: "This will help our farmers."

##########################################
## French Democratic Focuses
###########################################
### Cartel ###
 FRA_Cartel_des_Gauches: "The Cartel des Gauches"
 FRA_Cartel_des_Gauches_desc: "The Cartel of the Left is the name of the governmental alliance between the Radical-Socialist Party and the socialist French Section of the Workers' International, and other smaller left-republican parties that had previously formed in 1924 to 1926 and most recently in 1932. The Cartel des gauches has won general elections twice, in 1924 and in 1932. The first Cartel was led by Radical-Socialist Édouard Herriot, but the current one is weakened by parliamentary instability and without a clear leader.\n\nIf the government is not able to solve the parliamentary instability soon, other political parties may take advantage of our weakness and try to seize power for themselves or mobilize our citizens against us..."

 FRA_National_republican_League: "The National Republican League"
 FRA_National_republican_League_desc: "The National Republican League is a right-wing political movement founded in November 1924 by former President of the Republic Alexandre Millerand. The LRN is envisioned as a coalition of the republican and parliamentary right opposing the Cartel of the Left. It brings together the two main right-wing and center-right parties, the Republican Democratic and Social Party and the Republican Federation, as well as smaller formations.\n\nIt opposes the policy of the Cartel of the Left, condemning disarmament, deserter amnesty, and a policy of complacency with the USSR. On the other hand, it advocates enforcing the provisions of the Treaty of Versailles against Germany and calls for no concessions on the issue of war reparations. On economic issues, the LRN is adamantly anti-communist, defending a balanced budget and social reforms while expressing contempt for strike leaders and revolutionaries."

 FRA_Apply_Huygen_Books: "Apply the Huygen Books"
 FRA_Apply_Huygen_Books_desc: "The second Cartel won a majority of seats in 1932, but its parties could not agree on forming a government coalition. In exchange for their participation in government, the socialists are asking for specific conditions, which can be found in a book titled "Les Cahiers De Huyghens" written by the SFIO's co-leader, Paul Faure. To have a chance of stabilising our government, we will give in to their demands and begin implementing some of these conditions, such as better working conditions and reduced military spending."

 FRA_Side_with_the_Radicaux: "Side with the Radicaux"
 FRA_Side_with_the_Radicaux_desc: "When looking for support to stabilize parliament , we will turn to the Radical Party. It has become an intermediary party between the left and the right, likely to ally with the socialists or the conservatives depending on the circumstances. It is very attached to private property and secularism, and it supports a free trade customs regime. The Radicals have occupied a more central and dominant position on the political spectrum since the formation of the SFIO in 1905. Even if the socialists, conservatives and other parties disagree, the Radical party nowadays is particularly influential, making it a valuable ally in our efforts to stabilise the government."

 FRA_The_Concentration_Republicaine: "The Concentration Republicaine"
 FRA_The_Concentration_Republicaine_desc: "We are currently too weak and lack meaningful support to govern effectively. To avoid another crisis like the February 6 riots and the fall of another government like the one under Doumergue, we need to bring together various republican sensibilities within our government. To form a strong government and stabilise the country, we will seek a union of the centres through an alliance of radicals and some center-right parties such as the Alliance démocratique and the Fédération république. It is our only effective means of avoiding any future political crisis. We will be able to finally push for a proportional representation programme and a constitutional revision that strengthens the executive's powers thanks to this new and powerful alliance."

 FRA_Forty_Work_Week: "Implement the Forty Hour Week "
 FRA_Forty_Work_Week_desc: "The socialists demand that the government pass a slew of new programmes aimed at benefiting the working class as soon as possible. They argue that it is necessary to liberate workers and the economy as a whole, and that this will be accomplished by enacting some of their most pressing demands, such as a 40-hour work week with immediate wage increases and paid vacations. These initial reforms, according to socialists, will increase industrial production and reduce unemployment while improving working conditions and living standards for the average worker."

 FRA_Unemployment_Assurance_System: "Unemployment Assurance System"
 FRA_Unemployment_Assurance_System_desc: "Another socialist demand is the creation and implementation of a new system to assist and cover unemployed citizens in emergency situations. Illness, old age, and the need for nursing care are examples of such situations. If a person is unable to work for an extended period of time due to illness, they will be compensated with sickness benefit. If someone becomes unemployed, the government will provide financial assistance to cover their living expenses. Each working citizen will have to contribute some of their earnings to pay for this system. Contributions to the system will be determined by one's income."

 FRA_Fight_Two_Hundred_Familly: "Fight the Two Hundred Families"
 FRA_Fight_Two_Hundred_Familly_desc: ""

 FRA_National_Lottery: "National Lottery"
 FRA_National_Lottery_desc: "Some of the veterans that saved France from the German menace are suffering on the streets of Paris, crippled by the effects of the war. On the other hand, the farmers that feed the French nation are going through a series of agricultural calamities, and they are unable to make a profit. We need to do something to help both of them in these rough times, but taxes are always unpopular. Instead, we'll give the people something in exchange. The government has decided that creating a National Lottery is a good way to help veterans, war invalids and those farmers that suffered the wrath of nature, with big monetary prizes for those lucky enough to hit the correct numbers"

 FRA_Limit_Foreign_Workers_Job: "Limit Foreign Workers Jobs"
 FRA_Limit_Foreign_Workers_Job_desc: "Our economic situation is not improving as quickly as we had hoped, forcing us to resort to desperate measures. We will implement a policy against allowing in foreign workers into our country. Asylum seekers, including thousands of Jews fleeing Germany, will no longer be accepted. Simply put, we lack the necessary resources and a legal framework to effectively treat refugees. Middle-class citizens resent Jews and are enraged by competition for jobs or business, so this will at least gain us some popularity among them."

 FRA_Protect_Local_Market: "Protect the Local Markets" 
 FRA_Protect_Local_Market_desc: "The depression had an impact on our local economy, causing general unrest and dissatisfaction with the government among the populace. People are becoming increasingly agitated as the situation has not improved significantly and they are unable to compete with foreign businesses. As a result, we will implement a protectionism policy against foreign goods imports in order to protect our domestic market and businesses. This will help to protect jobs, support and grow small businesses and industries, and provide a layer of security to the country."

 FRA_Formalize_the_Post_of_President_du_Conseil: "Formalise the Post of Président du Conseil"
 FRA_Formalize_the_Post_of_President_du_Conseil_desc: "The weak position of the President of the Council of Ministers, is one of the most pressing issues responsible for the current political and parliamentary instability. The President of the Council is currently, at best, a puppet of the parliament and, at worst, an ineffective observer. This has been seen with the February 6 riots and the inability of the govenrment to act and bring the situation under control. This position should be strengthened and given more authority so that he can weather and control any political tensions in the country. By strengthening the government, we ensure that France does not fall into instability again and demonstrate to the people that we are willing and capable of supporting and governing them."

 FRA_Ban_armed_Militias: "Ban Armed Militias"
 FRA_Ban_armed_Militias_desc: "While the Fascist Organizations and parties are still small and in the grand scheme of things simply irrelevant, their vehement opposition to everything this state stands for and their tendency for violence, accompanied by fanatical paramilitaries and thuggish followers, it is no surprise that the existence of these Organizations and Parties has become a major undermining factor to the stability of our Republic.\nTo exploit the Fascist's current weakness and limit the damages they have already done to France, it has become a necessity to quickly and decisively crack-down on any Fascist organization, in a series of countrywide raids, mass arrests, and forced dissolutions."

### National Union ###

 FRA_National_Union_Government: "National Union Government"
 FRA_National_Union_Government_desc: "Since Daladier's decision to resign, the turmoil and chaos of the February 6 riots have gradually subsided. This is the first time in the Third Republic that a government has been forced to resign due to street protests. In his place steps Gaston Doumergue, a rightist Radical Republican who is ostensibly the only figure acceptable to both the far-rightist leagues and to the centrist parliamentary parties, together with what is termed a \"National Union Government\". But there is one matter that must be decided immediately: which parties will form the new National Union Government?"

 FRA_Fix_the_Current_Situation: "Stabilise the Nation"
 FRA_Fix_the_Current_Situation_desc: "Institutional reform has become a public issue: in the aftermath of the events of February 6, reformist themes have infiltrated the press, and the vast majority of public opinion and the political class agree on the need to amend the institutions and change the way the regime operates. We will reform institutions to reduce ministerial instability in order for this new National Union Government to survive. This cabinet, in which the public places its greatest hopes because it represents national unity, is made up of ministers from all political parties who bicker amongst themselves and do not get along, resulting in inefficiency and instability."

 FRA_Launch_the_Reform_of_the_State: "Launch the Reform of the State"
 FRA_Launch_the_Reform_of_the_State_desc: "Institutional reform has become a public issue: in the aftermath of the events of February 6, reformist themes have infiltrated the press, and the vast majority of public opinion and the political class agree on the need to amend the institutions and change the way the regime operates. We will reform institutions to reduce ministerial instability in order for this new National Union Government to survive. This cabinet, in which the public places its greatest hopes because it represents national unity, is made up of ministers from all political parties who bicker amongst themselves and do not get along, resulting in inefficiency and instability."

 FRA_Trust_the_Political_Class: "Trust the Political Class"
 FRA_Trust_the_Political_Class_desc: "Doumergue can no longer afford to irritate both the parliamentarians and his ministers with his repeated appeals to the people with hints of Bonapartism. The method of addressing the citizens directly is significantly clumsy and borders on a political error. Doumergue irritates the deputies and senators by repeatedly appealing to the people and acting above Parliament. They denounce the evasion of parliamentary sovereignty and the dubious taste of the President of the Council for the government of opinion. The left was quick to condemn President Doumergue's Bonapartist tendencies, as he appeared to be seeking support for his person rather than his programme.\n\nTo avoid turning his entire government against him and for the good of the country, Doumergue will now follow the advice of his ministers rather than seeking public approval and acting above the law. Another political crisis is the last thing we need."

 FRA_The_Modern_Napoleon_III: "The Modern Napoleon III"
 FRA_The_Modern_Napoleon_III_desc: "Doumergue understands that he cannot enact meaningful reforms through traditional parliamentary sovereignty. As a result, he has begun giving radio addresses in order to extol the power of the people, on which he intends to rely in order to overcome parliamentary reluctance and carry out the planned reforms.\n\n"In order to bring about this recovery, we need method, perseverance in the effort, patience, time, and, last but not least, real and sufficient power, which I certainly have. This authority does not belong to the government. I don't have it, and neither does the parliament. But you, as the Country, have it. If you want to, you can change the minds of those who are unwilling to change and accomplish everything that needs to be done. My deepest conviction is that only the striking manifestation of your will can be sovereign in order to clean up the atmosphere in which we live and the air we have all been breathing for far too long."\n\nDoumergue's popularity is at an all-time high, and it does not appear to be waning anytime soon."

 FRA_Adopt_Marquet_Rivolet_Proposal: "Adopt the Marquet-Rivolet Proposal"
 FRA_Adopt_Marquet_Rivolet_Proposal_desc: "Choosing to trust his ministers and parliaments ,over trying to persuade the public to support him, proved to be the correct decision, as Doumergue did not hesitate to seek the advice of his ministers when seeking solutions to our economic problems. Charged with preliminary work, Labor Minister Adrien Marquet and Pensions Minister Georges Rivollet submitted a very promising proposal that includes a major works policy. This major works policy, a classic liberal policy to combat unemployment and stimulate industrial activity, aims to create jobs for the unemployed across the country."

 FRA_Dissolve_the_Parliament: "Dissolve the Parliament"
 FRA_Dissolve_the_Parliament_desc: ""In politics as in war, one must never miss the opportunity to win a victory. One pays dearly for armistices granted too soon and respites left to the adversary." Doumergue has realized the necessity to take advantage of the psychological shock created by February 6. He has ordered the dissolution of the parliament. Under the pressure of exacerbated anti-parliamentarianism and in the face of the very broad popular support enjoyed by Doumergue, the Senate now has to choose if they dare to oppose the dissolution. If the Senate accepts to dissolve the Parliament, Doumergue will be able to get rid of the "old, defeated and anguished Cartelist Chamber."\n\nThe government, free from the control of the elected representatives, will have complete freedom to dissolve and carry out the planned constitutional revisions. Even though this is a somewhat risky move, Doumergue cannot let this opportunity that has opened up pass by."
 FRA_Dissolve_the_Parliament_tt: "§AWe will ask the Senate to dissolve the Parliament§!"

 FRA_The_Wise_of_Tournefeuille: "\"The Wise of Tournefeuille\""
 FRA_The_Wise_of_Tournefeuille_desc: "It's finally time. Gaston Doumergue has been working towards this moment since assuming power. He is now closer than ever to enacting one of the most significant reforms in French history. Since he made public his project titled "Wise Man of Tournefeuille," named after his wife's home in Tournefeuille, there has been a lot of scepticism and doubt about the institutional changes and reforms included and whether or not the bill would ever be able to pass Congress. Today, his bill will be presented to Congress, and it will be decided whether Doumergue will be remembered as one of France's most important historical figures and reformers, or as an insane man with a broken dream and failed ambitions."

 FRA_Hold_General_Election: "Hold General Elections"
 FRA_Hold_General_Election_desc: "The next step is to hold general elections as quickly as possible now that the Parliament has been successfully dissolved. Given how well-liked Doumergue is among the populace, the Radical party is almost certain to win a majority of the seats. This will give Doumergue and his party control of the parliament and the freedom to enact any reforms they see fit without the possibility of opposition from other parties. This completes our ongoing efforts to successfully allow Doumergue to transform this nation in the manner that he has always envisioned it."

### Front Populaire ###

 FRA_Victory_of_the_Popular_Front: "Victory of the Front Populaire"
 FRA_Victory_of_the_Popular_Front_desc: "The Popular Front, a loose coalition of radical socialists, communists, and less radical leftists, has managed to triumph, carrying 57.7 % of the popular vote. Their government seems poised to make changes to France and, as they obtained a majority with 149 seats, they will be able to carry out their will. The new Président de la République is Léon Blum, a moderate leftist and a Jew who was heavily influenced by the Dreyfus Affair. Many doubt his ability to control the more radical part of his coalition, but he has established firm control over his government."

 FRA_Jean_Zays_Reforms: "Jean Zay's Reforms"
 FRA_Jean_Zays_Reforms_desc: "Jean Zay, Minister of National Education and Fine Arts, has proposed that, in addition to the previous social reforms enshrined in the Matignon Accords, a series of reforms aimed at the education sector be implemented. He proposes raising the school leaving age from 13 to 14 as the earliest possible end point, increasing the number of classes, mandatory physical education, establishing school canteens and school medicine, promoting technology and hygiene lessons, increasing the number of scholarships and holiday camps, and instituting a common curriculum in elementary schools."

 FRA_Great_Social_Reform: "The Great Social Reforms"
 FRA_Great_Social_Reform_desc: "The workers' movement celebrated the election victory by calling a general strike, resulting in a wave of strikes involving two million workers and the seizure of many factories, effectively paralysing the country. The strikes are spontaneous and unorganised, but the business community is terrified of a Bolshevik revolution and has been secretly meeting with Blum to negotiate a series of various social reforms in order to obtain a return to work. We will promise to enact these reforms as soon as possible in order to calm the situation."

 FRA_Create_the_CNRS: "Create the CNRS"
 FRA_Create_the_CNRS_desc: "To better coordinate laboratory activity and maximise the return on investment from scientific research, we will combine a resource agency, the National Fund for Scientific Research, and a major laboratory and researcher institution, the National Center for Applied Scientific Research, into a new and larger public scientific research body, the National Center for Scientific Research. Jean Zay, Minister of National Education and Fine Arts, has prepared the merger, and Blum will sign the decree establishing the CNRS, which will advance France in all areas of knowledge."

 FRA_Securite_Social: "The Securite Social"
 FRA_Securite_Social_desc: "Legislation aided the development of insurance companies at the turn of the twentieth century. Legislators mandated that employers purchase insurance to cover indemnity payments to injured employees on April 9, 1898. Then, on April 5, 1928, insurance coverage was expanded to include illness, maternity, and death. On April 30, 1930, the law was once again expanded to include agricultural jobs.\n\nWe'll take it a step further. We will establish a universal social security programme to cover all citizens, regardless of class, who are unable to work due to illness or injury. We have outlined the broad principles that will govern the integration and evolution of social security in France, allowing us to build a standardised, national social security system."

 FRA_Introduce_Womens_Suffrage: "Introducing women's Suffrage"
 FRA_Introduce_Womens_Suffrage_desc: "Although several countries began granting women suffrage at the end of the nineteenth century, France is still one of the last who hasn't done so. In fact, the Napoleonic Code declares women's legal and political incapacity, which has previously thwarted efforts to grant women political rights. During the French Revolution in 1789, the first feminist claims emerged. Following the Great War, French women continued to demand political rights, and despite the Chamber of Deputies' support, the Senate consistently refused to examine the proposed legislation.\n\nSurprisingly, the French political left, which is generally supportive of women's emancipation, has previously opposed the right of women to vote because it would support conservative positions. It is past time to change this outdated and despicable status quo and grant women political rights."

 FRA_Application_of_the_Blum_Violette_Act: "Application of the Blum-Violette Act"
 FRA_Application_of_the_Blum_Violette_Act_desc: "The French premier and governor-general of Algeria, Léon Blum and Maurice Viollette, have presented a proposal to the Popular Front government aimed at addressing the issue of long-standing French colonialism in Algeria, as well as the territory's Muslim majority's persistent disenfranchisement.\n\nThe proposal will allow a small number of Algerian Muslims to obtain full French citizenship while remaining subject to Muslim law on certain social issues such as marriage and divorce, custody and inheritance. These benefits will be granted to the highly educated, as well as Algerian men serving in the French military, with the intention of expanding the benefits to other Muslims in the future."

 FRA_begin_rearmament: "Begin the National Rearmament"
 FRA_begin_rearmament_desc: "It is clear that Europe is, once again, heading towards war. Denying that fact is endangering the lives of millions of French men, women and children. Yes, our scars from the Great War have yet to heal, our economy is in shambles and our populace is deeply divided by it, and keep pretending that everything will be fine is no longer an option at this point. From here onward, our government's priority is giving the army a chance at staving off France's enemies, we'll issue the order to build new factories, and demand that production begins forthwith."

 FRA_Ban_the_Far_Right_Ligue: "Ban the Far-Right Leagues"
 FRA_Ban_the_Far_Right_Ligue_desc: "In the last years, far-right movements in France have been on the rise. Blinded by foolish dreams of a greater and more powerful France, our citizens are flocking to these extremist leagues. They join their riotous manifestations and boycott public services in some kind of flawed form of protest. Several attempts of appeasing these groups have been made, but not a single one has brought substantial results. In the past few days, the situation has worsened: whispers of these movements allying with foreign powers have reached our ears, threatening our national security. Before the problem gets even bigger and external forces to get involved, a complete and total ban of these far-right movements must be put in place. Our political stability will suffer, but a greater good is at play."

 FRA_Unity_for_the_Left: "Unity for the Left"
 FRA_Unity_for_the_Left_desc: "The Globe Congress, also known as the Unity Congress or the First Paris Congress, was the founding congress of the Workers' International's French Section. It was the first socialist congress, held in Paris in 1905. With the success and popularity of the Popular Front, we will now hold a second Globe Congress, inviting various existing French socialist currents to discuss the future of The Popular Front, France, and the world at large.\n\nRepresentatives of France's entire Left will attend, from the French Communist Party all the way to the Radical Party. It will be a time of deliberation, of learning and of planning. Most importantly, we will demonstrate to the French people and the rest of the world that France stands united against fascism and any other internal or external threat. The unification of the French Left has always been a goal of ours, and we are now closer than ever to realising it."

 FRA_Le_Triomphe_de_la_Sociale: "Le Triomphe de la Sociale"
 FRA_Le_Triomphe_de_la_Sociale_desc: "Léon Blum is not yet finished. There is still much work to be done and many more reforms to be implemented before his mission and duty to the French people is truly complete. France has seen a number of significant changes and reforms in recent years, and we have even more planned for the near future. The Popular Front supports Council President Leon Léon and believes in his vision, and the socialists are more united and stronger than ever. They will lead France into a prosperous, free, and democratic future together. The Popular Front will provide a set of lessons and even an inspiration for the future of France."

 FRA_National_Office_of_Industry: "National Office of Industry"
 FRA_National_Office_of_Industry_desc: "The Front Populaire previously established the National Office of Wheat, which was tasked with stabilising the market for this essential cereal in order to guarantee income to producers through interventionist price policy, to assist farmers in marketing agricultural produce at fair prices, and to stabilise prices and curb speculation. Since the Office of Wheat has been a success, we will extend the concept of National Offices tasked with market stabilisation to the entire industry by establishing the National Office of Industry."

 FRA_The_Under_Secretariat_for_Mining_Affairs: "The Under-Secretariat for Mining Affairs"
 FRA_The_Under_Secretariat_for_Mining_Affairs_desc: "The mining industry's development in general is subject to many uncertainties, including industry expansion or contraction, fluctuations in raw material prices, and environmental pressures. This is one of the reasons why the industry is so volatile. For example, it is not uncommon for a mine to be closed down shortly after it begins operations due to a drop in stock market prices. Geological hazards must also be considered, which are not always obvious during the research process. For example, it has frequently occurred that a mine on which hopes were pinned quickly proved to be inoperable due to numerous faults.\n\nAs a result, in addition to our efforts to establish the National Office of Industry, we will establish the Under-Secretariat for Mining Affairs, which will be responsible for regulating and stabilising the mining industry."

 FRA_Promote_Anti_Fascist_Policy: "Promote Anti-Fascist Policy"
 FRA_Promote_Anti_Fascist_Policy_desc: "France, as well as the rest of the world, is in grave danger. The rise of fascism, particularly in Europe, has forever altered the political climate and the state of the world. The Popular Front is, above all, a coalition against fascism, and it has so far succeeded in preventing fascism from entering France. However, we did not take the threat of fascism seriously a few years ago, and we are now paying the price. Since then, our perception has shifted dramatically, and we now recognise that fascism poses an existential threat not only to us, but also to our allies and every democratic nation in the world."

 FRA_The_Bastion_of_Democracy: "The Bastion of Democracy"
 FRA_The_Bastion_of_Democracy_desc: "When food prices rose due to a poor harvest in 1789, the third estate, comprised of ordinary citizens, revolted against that form of government, demanding proper political representation, a fair tax system, and the creation of a constitution. When Louis XVI refused these demands, the citizens of Paris stormed the Bastille in solidarity with their delegates in the Assembly of Estates. The French Revolution was in full swing.\n\nFrance, along with the United States, is rightfully regarded as the birthplace of modern democracy. The United States has not faced the threat of military invasion since the early nineteenth century. In contrast, we were overrun by foreign armies and later fought two major wars on our own soil for more than 65 years. We have also experienced civil strife, including revolutions and civil wars. Nonetheless, we have persevered time and again, and we will continue to do so as long as our country is governed by democracy. With war looming and fascist countries threatening our very existence, it is time for France, the First Bastion of Democracy, to persevere once more."

 FRA_The_Peace_Front: "The Peace Front"
 FRA_The_Peace_Front_desc: "Britain has put forward a policy of establishing a peace front to deter German aggression. The rise in French industrial output and greater financial stability has led to a more favourable view of war with the Reich than had previously been the case.\n\nUnlike Britain, however, we are eager to include the Soviet Union in the peace front, as only an alliance with the Soviets can prevent Hitler from invading Eastern Europe. On economic and military grounds, it is preferable for the Soviet Union to serve as the eastern pivot of the peace front rather than Poland, as the British would prefer. The prospect of the Soviet Union joining the "peace front" is a lifeline and the best way to avoid another world war."

### Daladier ###

 FRA_The_end_of_the_Ruling_party: "The End of the Front Populaire"
 FRA_The_end_of_the_Ruling_party_desc: "After a year of intense activity, the Popular Front's spirit had dwindled and it could only survive as the European crisis worsened. It has fallen short of the left's expectations. Workers have gained significant new rights, but their wage increases are offset by price increases. Unemployment has remained high, and overall industrial output has remained flat. Industry is struggling to adjust to the imposition of a 40-hour workweek, which has caused significant disruptions, while France desperately attempts to catch up to Germany in military production. Léon Blum resigned after failing to secure funding to implement a major financial reform policy.\n\nÉdouard Daladier has returned to public prominence after a year away from frontline politics, taking a populist stance against the banking oligarchy that has taken control of French democracy: the Two Hundred Families. He was elected president of the Radical-Socialist Party, which he led into the Popular Front coalition. Daladier has now assumed the presidency of the Council and will lead France into a different direction."

 FRA_Create_Family_Code: "Create the Family Code"
 FRA_Create_Family_Code_desc: "A more generous system of family allowances will be established, with percentages of wages set at 5% for the first child, 10% for the second child, and 15% for each additional child. A home mother allowance, which has been advocated for by natalist and Catholic women's groups since 1929, will also be established. The new benefit is available to all mothers who are not professionally employed and whose husbands receive family allowances. We will also add 10% for employees whose wives stay at home to care for their children. The Family Code will include provisions for family allowances. A decree will also be issued to allow the establishment of vocational guidance centres. Finally, a new law will be enacted that will give the Department of Workplace Inspection the authority to order temporary medical interventions."

 FRA_Decret_National_Defence: "Decree of National Defence"
 FRA_Decret_National_Defence_desc: "War is on its way, and it's coming fast. As part of our effort to put the French economy on a war footing, we will increase the military budget from 29 billion francs to 93 billion francs through decret-law in order to be properly prepared and have a chance of victory in the coming conflict. This is an urgent matter of national security and the future of France, and we cannot allow debate or bickering within our government to stymie our efforts. French production must increase if France is to meet the German challenge. This is the price of freedom."

 FRA_Il_Faut_Remettre_la_France_au_Travail: "Il Faut Remettre la France au Travail"
 FRA_Il_Faut_Remettre_la_France_au_Travail_desc: ""We're going blindfolded towards an abyss", Paul Reynaud stated on a radio broadcast. And he's right. Our reforms, no matter how painful they may be, are absolutely necessary. In 1932, Daladier was informed by German rivals to Hitler that Krupp manufactures heavy artillery, and the Deuxième Bureau was aware of the scope of German military preparations but lacked hard intelligence on hostile intentions. These intentions are now more obvious than ever. We need to prepare our industry and production for war, which means returning the people to work. We will begin undoing some of the reforms instituted by the Popular Front in order to transform France into a manufacturing powerhouse."

 FRA_Buy_American_Planes: "Buy American Planes"
 FRA_Buy_American_Planes_desc: "Daladier has begun secret negotiations with the Americans on how to circumvent the Neutrality Acts and allow us to buy American aircraft to compensate for the underperforming French aircraft industry. Daladier is most interested in purchasing American warplanes because it is the only way to significantly strengthen the French Air Force. The major sticking points in the talks are how we will pay for the American planes and how to get around the Neutrality Acts.\n\nFurthermore, France defaulted on its Great War debts in 1932, violating the 1934 Johnson Act, which prohibits American loans to nations that have defaulted on their Great War debts. We've even offered to give up our Caribbean and Pacific holdings, as well as a lump sum payment of 10 billion francs, in exchange for the unlimited right to buy American aircraft on credit. After lengthy negotiations, we have finally reached an agreement that will allow us to place large orders with the American aircraft industry."
 
 FRA_The_Firmness_Policy: "The Firmness Policy"
 FRA_The_Firmness_Policy_desc: ""I've decided on my path; forward with France!" Daladier announced his government's domestic and foreign policies will be based on "firmness" at a rally in Marseille. In response to strikes across the country, Daladier declared a national emergency, dispatched the military to Paris and other major cities, suspended civil liberties, outlawed the communist press, directed police to use tear gas to disperse striking workers and storm factories occupied by the workers, and has announced that any worker who participated in the strikes will be fired immediately with no severance pay.\n\nMore importantly, we must maintain a firm stance on foreign policy. France is on the verge of war, and we are powerless to intervene, hoping that the situation will resolve itself. This will no longer be the case. We will hold talks with our allies, the United Kingdom and the United States, in the hopes of finally persuading the British to make the "continental commitment" and pressuring the US to provide assistance for the upcoming war. We need to have such an overwhelming array of forces arranged against Germany, that it will deter them from invading any more countries."

 FRA_Reynaud_Deregulation_Policy: "Reynaud's Deregulation Policy"
 FRA_Reynaud_Deregulation_Policy_desc: "The Popular Front's reforms have led this country to ruin, and if we are to recover, we must begin undoing them immediately. Daladier, at the suggestion of Paul Reynaud, will issue several decree-laws that will reverse the Popular Front's policies. For example, a 40-hour work week is a law of laziness and national treason.\n\nReynaud endorses radically liberal economic policies in order to draw France's economy out of stagnation, centered on a massive program of deregulation. The notion of deregulation is very popular among France's businessmen, and Reynaud believes that it is the best way for France to regain investors' confidence again and escape the stagnation its economy has fallen into. One of the most important aspects of Reynaud's strict policy is the elimination of the 40-hour work week, which raises the legal weekly working time to 41.5 hours. Because of the return of capital, this policy allows for the financing of rearmament, and this activity allows for the resumption of GDP growth. "Do you think France can maintain its lifestyle while spending $25 billion on weapons and resting two days a week?", as Reynaud fittingly put it."

 FRA_Rule_by_Decret_Law: "Rule by Decree-Law"
 FRA_Rule_by_Decret_Law_desc: "In French law, a décret-loi is an act of government taken by virtue of legislative authority in a field normally within the jurisdiction of the law. The decree-law is a rare extension of regulatory authority into the legislative domain, made possible by an enabling law passed by Parliament. Parliament delegates to the government its competence in a legal matter that normally belongs to Parliament.\n\nTo avoid the fall of our government and stabilise our country, Daladier will use several decret-laws to undo all of the damage done by the Popular Front and quickly stabilise the government without parliament interfering and impeding our efforts. Some may see this as authoritarian or an abuse of power, but they will thank us once we have fixed this country."

 FRA_Act_Against_the_Enemy_of_the_State: "Act Against the Enemies of the State"
 FRA_Act_Against_the_Enemy_of_the_State_desc: "Daladier will issue a decree-law on the police force for foreigners to ensure national security and reserve employment for French workers. It will allow for the internment of undesirable foreigners as well as any individual, French or foreign, deemed dangerous to national defence or public security, primarily Jews from Central Europe. In the event of armed conflict, it also allows for the internment of all foreign nationals of enemy territories aged seventeen to sixty-five, including nationals of enemy countries who have taken refuge in France.\n\nThis includes reopening several old internment camps as well as building new ones. Various internment camps will be established to house the approximately 500,000 Spanish Republican refugees and military personnel who fled to our country during the Spanish Civil War. Internment camps for defeated Spanish Republicans will be set up across the entire French territory."

 FRA_War_On_Pacifism: "Deal with the Pacifists"
 FRA_War_On_Pacifism_desc: "The Nantes congress is the Socialist Party's ordinary congress, which will be held at the Beaujoire Exhibition Center in Nantes. The congress will take place in the aftermath of the Left's and Popular Front's massive successes and popularity. A debate with various pacifist currents and supporters of the Left Parties and the Popular Front will be launched.\n\nWhile many believe that war is imminent and unavoidable, others prefer a more diplomatic solution or even neutrality in the upcoming conflict. While one side contends that we cannot abandon our allies and other democratic nations under threat around the world, the other contends that we are putting our country and people at unnecessary risk, and that intervening could even lead to our annihilation. To put an end to this debate once and for all, a final decision must be made."

 FRA_National_Defense_Bonds: "National Defense Bonds"
 FRA_National_Defense_Bonds_desc: "Because our monthly government expenditure totals 4,500 million francs, we are utterly reliant upon the success of its devaluation. We needed to sell more short-term bonds to generate revenue, but investors have been hesitant to buy French bonds because Germany is threatening France. Because the franc is tied to the pound, we needed loans from Britain, which were not forthcoming, leaving us with no options. Our government has faced severe monetary problems as a result of British and American investors' unwillingness to purchase French bonds.\n\nHowever, since Daladier transferred "free-market liberal" Paul Reynaud from the Justice Ministry to the Finance Ministry, France has regained the trust of international investors, who are now buying French bonds again."

### Economy ###
 
 FRA_Continue_Herriot_Deflation: "Continue Herriot's Deflationist Policy"
 FRA_Continue_Herriot_Deflation_desc: "In dealing with the current severe economic crisis, some in government advocate for a continuance of the vigorous deflationary policy of the previous Herriot government, the cornerstone of which is a return to fiscal balance through reduced spending. Although public employees will be the most affected by this policy, it will affect all salaried workers. In full accordance with this deflationary policy, we will provide for even more cuts in spending, with a particular emphasis on public servant salaries and veterans' pensions, in order to rebalance our finances. Nonetheless, even if it is not the most popular solution to the economic crisis, it is a necessary one. However, we must tread carefully or our remaining public and parliamentary support will dwindle fast."

 FRA_Central_Committee_Stock_Exchange: "Central Committee of the Stock Exchange"
 FRA_Central_Committee_Stock_Exchange_desc: "The stock market is an unpredictable and dangerous game that can result in total damnation at any time, ruining powerful corporations and even entire nations in the process. Needless to say, we don't want this kind of thing to happen again. Minister of Finance Georges Bonnet proposed the establishment of a central committee to control the stock exchange. The objective is reforming both the regime of Initial Public Offering (IPO) and the introduction of foreign securities in the stock market. We hope that this will help to reduce the losses result of the economic crisis and avoid future ones as well."
 FRA_Central_Committee_Stock_Exchange_Completed: "Central Committee of the Stock Exchange Completed"

 FRA_Reorganize_Wheat_Market: "Reorganise the Wheat Market"
 FRA_Reorganize_Wheat_Market_desc: "Wheat is without a doubt the most important crop on France, representing twenty-five percent of the cultivated land. Since bread is a fundamental part of the French diet, wheat producers occupy a privileged place in the French economy. Surplus from the wheat crop of the prior year caused wheat prices to decline considerably, dislocating the entire market and affecting other crops as well. A new agricultural law will fix the prices of the wheat to try to solve this annoying problem. We need to get the wheat market to work again as fast as possible."

 FRA_Sanitize_Finances: "Sanitise Finances"
 FRA_Sanitize_Finances_desc: "When Doumergue arrived in Paris and discovered the extent of the economic problems, he was quickly overwhelmed by the day-to-day economic difficulties. He has given little thought to France's institutional future since then. Therefore we will reject the idea of immediate institutional reform in the face of the urgency of financial matters: the budget for 1934 has yet to be voted on, and the state coffers are empty. For the time being, we will accept the Constitution as it is and work with it. Once the economy is stabilised, we will consider revising the Constitution in order to return it to normal functioning. Institutional reform is no longer a priority for Doumergue. Judicial, economic and foreign policy problems take precedence over institutional issues."

 FRA_Reoganise_Economic_Sector: "Reorganise the Economic Sector"
 FRA_Reoganise_Economic_Sector_desc: "Pierre Laval has proposed a severe deflationary policy to help the economy recover faster. This includes a 10% reduction in all public expenditures, including personnel costs, as well as annuity and state loan arrears. Expenditures will be cut by 5 billion francs, with civil servants' salaries being cut by 10%. The general income tax will be raised by 1.2 billion Swiss francs. To avoid a disproportionate tax burden on households, a decree-law will reduce gas and electricity prices, rents, and mortgage interest by 10%.\n\nAfterwards, there will be a much needed administrative reorganisation, creation of re-education centres for the unemployed and reorganisation of the services of the Ministry of Commerce. Furthermore, we will take over the financial management of autonomous state offices and public establishments, as well as companies, syndicates, and associations or enterprises of any kind that have requested financial assistance from the State. While these measures will undoubtedly be unpopular and viewed as overly harsh by many, they are necessary in order to get our economy back on track as soon as possible."

 FRA_Franc_Devaluation: "Devaluate the Franc"
 FRA_Franc_Devaluation_desc: "Our government has been successful in resolving the social crisis at home. However, the economy remains stalled, with our output still not having recovered to 1929 levels, and higher wages being offset by inflation as more and more businessmen move their funds overseas. For the time being, we are forced to halt our reforms, such as pensions, and devalue the franc, which we should have already done much sooner. The current situation is transforming the right's concern into steadfast opposition, while disappointing the left wing of the SFIO and the PCF, severely weakening our government. People will lose faith in our government if we do not act quickly."

 FRA_Rely_on_London_and_Washington: "Rely on London and Washington"
 FRA_Rely_on_London_and_Washington_desc: "We may not like it, but we must face the facts. Without foreign assistance, we will be unable to overcome the economic crisis. We require assistance from our closest trade partners and friends, the United States and the United Kingdom, in order to successfully recover our economy. We will hold a meeting and discuss the possibility of signing a monetary agreement to fix the value of the franc at 43 to 49 milligrammes of gold, down from 65.5 milligrammes previously. The best and simplest way to a quick recovery is to align ourselves with their economies."

 FRA_Begin_Nationalisation: "Begin Nationalisation"
 FRA_Begin_Nationalisation_desc: "Aware of the threats to peace, we will begin France's rearmament and attempt to make up for the delay caused by Pierre Laval's 1935 policy of reducing public spending, including on military matters. The partial nationalisation of the armament industries as well as the new leaders' energetic policy, will revitalise France's armament potential.\n\nIn addition, we will nationalise several civilian industries, putting them under direct state control. Finally, we will establish the French National Railway Company, by nationalising our major railway companies. It will operate national rail traffic on our rail network, including passenger and freight railway services, as well as rail infrastructure maintenance and signalling. We will own 51% of the SNCF and invest heavily into public subsidies in the system.\n\nThis policy of nationalisation will allow for a massification of production while avoiding many of the drawbacks of private industry, such as cash flow issues and order uncertainty."

 FRA_Control_Bank_de_France: "Control the Bank de France"
 FRA_Control_Bank_de_France_desc: "The Bank of France is France's central bank, in charge of the French government's accounts, as well as the Treasury's and some public companies' accounts and payment facilitation. We have always advocated for the Bank of France to be reformed, and now we have the opportunity to do so. We will democratise the Bank of France by allowing all shareholders to attend meetings and establishing a new council with more government representation, thereby increasing state supervision. We will also make administrative changes in the civil service, such as naming a new governor of the Bank of France."

 FRA_Nationalise_Private_Arm_Factory: "Nationalise Private Arms Factories"
 FRA_Nationalise_Private_Arm_Factory_desc: "Our enemies are rearming even quicker than we expected. Each day, thousands of their men are equipped and sent to prepare for war while our economy flounders. Our sudden imposition of the 40-hour workweek, among other things, has left every industry in France struggling to adapt, tanking their efficiency. Although our opponents among the right may criticise this move as “communist,” the economy is in dire need of government intervention. We need to step in to fuel rearmament as quickly as possible, and only one solution presents itself; the complete nationalization of the arms industry. We will commandeer the production of weapons to ensure that when the storm comes, France’s young soldiers will be well equipped to weather it."

 FRA_National_Office_Agriulture: "The National Office of Agriculture"
 FRA_National_Office_Agriulture_desc: "We will establish the National Office of Agriculture, tasked with stabilising the market for this essential cereal in order to guarantee income to producers through an interventionist price policy, to help farmers market agricultural produce at fair prices and to stabilise prices and curb speculation. To that end, the office will be granted a monopoly on the export and import of wheat and flour in order to appease the growing peasant rage. The Ministry of Finance and the Ministry of Agriculture are in charge of the office.\n\nMembers of its general council represent various economic partners such as producers, cooperatives, millers, intermediaries, and consumers, and they must agree on a fair price. The Wheat Board will fundamentally alter the grain market structure and hasten the formation of new grain cooperatives."

 FRA_Put_France_in_Autarky: "Put France in Autarky"
 FRA_Put_France_in_Autarky_desc: "An influential expert, Emmanuel Monick, recently presented Léon Blum with the trade-off of solving thuis economic crisis in the following terms: "There are two ways of doing it. Either you introduce exchange controls, you impose strict dirigisme, you put France in autarky - and then you are obliged to institute an authoritarian regime that risks sliding towards totalitarianism. Or you open the borders, you maintain a regime of free exchange, and then you have to rely on London and Washington to bring about an adjustment of currencies together with a coalition of democratic regimes."\n\nBlum has decided to avoid relying on foreign nations because they are too unpredictable and involve too many risks. Instead, we will attempt to place France in autarky by establishing a self-sufficient economic system with limited trade."

 FRA_Grand_Travaux_Policy: "Relaunch the Grands Traveaux Policy"
 FRA_Grand_Travaux_Policy_desc: "Some members of the government have proposed a "major works" policy to revitalise our cities and economy. An architectural programme that will provide modern civic building projects as well as begin planning for the construction of autoroutes and the expansion of existing roads. The project's size and ambitious nature will be a significant challenge, but if we succeed, not only will our economy take a significant step towards recovery, but it will also provide us with an excellent opportunity to stabilise our government and calm the current political and public tensions."

 FRA_The_Plan_Marquet: "The Plan Marquet"
 FRA_The_Plan_Marquet_desc: "Our Minister of Labour and mayor of Bordeuax, Adrien Marquet, has presented a plan aptly called the "Marquet Plan" to the government. This plan entails the development and construction of national industry. The Plan will include a major works programme aimed at combating unemployment. It is a massive plan to revitalise public works and industry, with 10.5 billion francs allocated over five years. We will immediately approve this plan and begin preapring. The sooner we begin implementing the plan, the faster our economy will recover."

 FRA_Companie_National_du_Rhone: "Found the Companie National du Rhone"
 FRA_Companie_National_du_Rhone_desc: "The Rhône, is a major river in France and Switzerland, which rises in the Alps and flows west and south through Lake Geneva and southeastern France before emptying into the Mediterranean Sea. This river has a lot of untapped potential, and with the formation of a new company, we'll be able to start utilising it.\n\nThe Compagnie Nationale du Rhône is a new electricity generation company that primarily supplies renewable energy from Rhone River hydroelectric facilities. Our government will entrust the company with the sole concession to develop and operate the Rhone for seventy-five years, with four important goals in mind: power generation, navigation, irrigation and other agricultural uses, and flood protection for riverside towns and land. The first steps towards deepening the navigation channel and building scouring walls will be taken soon."

 FRA_Air_France: "Found Air France"
 FRA_Air_France_desc: "The Great Depression fragmented and weakened French aeronautics at the end of the 1920s, when most countries already had large national aeronautic companies. We have largely, but unevenly, subsidised unprofitable French companies in order to maintain our prestige in aeronautics and ensure our warplane potential.\n\nIn this economic context, we will pass a law to merge the four main French air transport companies, Air Orient, Air Union, CIDNA, and Farman Lines. It has been proposed to name the new company "Air France". The new company will be a semi-public company with a capital of 120 million francs in which we hold at least 25% of the shares and will be represented on the Board of Directors in the same proportions."

 FRA_Full_Economic_Power_for_the_Wise: "Full Economic Power for the Wise"
 FRA_Full_Economic_Power_for_the_Wise_desc: "Now that Doumergue's reform bill has been passed and signed into law, the President has greater control over the national budget. This enables Doumergue to finally fix the economy and implement any reforms he deems necessary without being hampered by parliamentary inaction. Neither the parliament nor the Chamber of Deputies can now stymie or obstruct his efforts. With this a quick recovery and future prosperity is all but guaranteed. With the passings of his reforms, Doumergue will build an eternal legacy as he will bgo down in history as the Saviour of the Republic."

 FRA_Establish_the_Commissariat_au_Plan: "Establish the Commissariat au Plan"
 FRA_Establish_the_Commissariat_au_Plan_desc: "The establishment of the General Planning Commission, an advisory body reporting to the government, will be one of the first economic reforms. The Modernization and Re-equipment Plan, designed to spur economic reconstruction, will be the General Planning Commission's first plan. Its goals are to develop national production and foreign trade, particularly in fields where France has a competitive advantage, to increase productivity, to ensure full employment, to raise the standard of living, and to improve the environment and national life conditions."

 FRA_Establish_the_French_Regions: "Redraw the French Regions"
 FRA_Establish_the_French_Regions_desc: "Currently, French regions function as confederations of smaller local governments. Day-to-day operations have left little room for economic strategy or long-term planning. Our local governments encourage waste and duplication, and many citizens are still unsure which level of government is responsible for which services.\n\nWe will redraw the French regions and reduce the overall number of regions in order to save money and reduce bureaucracy. This will reduce overlapping responsibilities, red tape, and wasteful costs, making life easier for citizens and businesses alike. However, the primary and most compelling reason for reform is economic. The reforms are intended to transform our regions into economic development engines. Redrawing regional boundaries is only the first step; the new regions can expect a significant expansion of powers and funds after that."

 FRA_A_New_Era_of_Prosperity: "A New Era of Prosperity"
 FRA_A_New_Era_of_Prosperity_desc: "All of the economic reforms have already begun to bear fruit. We are experiencing a revitalization of our industry, a reduction in unemployment, and an overall improvement in living standards. People have jobs again, and they are motivated and optimistic about our country's future. This marks the beginning of a new era in France's economic prosperity and stability. Doumergue has finally realised his vision of a reformed France, and whatever happens, he will be remembered as one of France's greatest leaders, successfully pulling the country out of the Great Depression, reviving the economy, and restoring political stability."

