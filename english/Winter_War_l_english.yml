l_english:
######################################################################
# Decisions
######################################################################
 WW_Invite_Nord_Volunteers_DEN: "Invite Danish Volunteers"
 WW_Invite_Nord_Volunteers_DEN_desc: "Denmark. The former land of warriors and kings is now an isolated outpost of freedom, desperately hiding from the Germans' prying eyes through inaction. Counting on the Danish government to intervene directly is a losing strategy; they must keep their limited military forces on the lookout for Germans. However, they have indicated a willingness to let their people take the initiative. Many Danes, like us, want to fight the Soviet menace and free Finland from the Communist yoke. Copenhagen's deliberate inaction can encourage these daring individuals to join the Corps. Denmark will not stop them, and may even welcome the removal of these 'radicals'."
 WW_Invite_Nord_Volunteers_NOR: "Invite Norwegian Volunteers"
 WW_Invite_Nord_Volunteers_NOR_desc: "The Kingdom of Norway is a relatively new country, having emerged from its union with Sweden only three decades ago. Since then, it has developed into a model nation with a strong economy, identity, and military. However, Oslo, like Stockholm and Copenhagen, does not want to offend the Soviets or the Germans. However, like our country, it has a large population of people who desperately want to help the Finns. Volunteers are already gathering in Finnmark, located in the far north. By combining these men into our Corps, we could send an advance unit into Finland sooner than anticipated."
 WW_Nordic_Volunteer_Corps_decisions: "Nordic Volunteer Corps"
 WW_Nordic_Volunteer_Corps_decisions_desc: "\n\n\n£decision_header_WW_Nordic_Volunteer_Corps£\n\n\n\nThe Soviet snake advances westward, preying on Finland. The Finns fight valiantly against overwhelming odds, but it is clear that if they are to prevail, they will require assistance. While our government has so far refused to intervene out of fear of inciting the Germans or Soviets, our people are demanding action. We will form a Nordic volunteer corps to let them embark on their adventures.\n\nAs a show of unity against Soviet expansionism, the Corps should ideally include representatives from all Nordic countries. Isolated from the rest of Europe, particularly the West, we will fight on our own. Through it all, we must emerge victorious and put an end to Russia's ambitions, lest all of Scandinavia become the latest victim of her whims."
 WW_Look_for_Volunteers: "Look for Volunteers"
 WW_Look_for_Volunteers_desc: "We are one of the Scandinavian countries that is most committed to defending Finland. Behind closed doors, we have quietly gathered volunteers for the beleaguered Finns, whether for strategic reasons or out of pure humanity. This sentiment is shared by our citizens, who are among the most vocal public supporters of Finland in the region. As the Corps grows, we must take advantage of this mood. We will launch a propaganda campaign to raise awareness about the Corps' formation with the government's tacit approval. From Lapland to Skane, posters will blare the call to arms. Our police will remove them as soon as they are discovered, but there is so much crime up here that they may stay for a while."
 WW_Form_the_Swedish_Volunteer_Corps: "Form the Swedish Volunteer Corps"
 WW_Form_the_Swedish_Volunteer_Corps_desc: "The stories of devastation in Finland have deeply affected the hearts of our people. When they learn about the terror bombings in Helsinki and the brave defenders of the Mannerheim Line, they are compelled to join the fight. Men have responded to the call to defend Finland in groups of one, two, and finally hundreds. Some of these men are veterans of the Finnish Civil War. They will depart immediately, accompanied by fellow veterans in the Army command, to serve on the Front or in support roles as needed, under Finnish command. This will not only advance our national defence against the Soviets, but it will also provide us with valuable experience for future rearmament."

 WW_Volunteer_Corps_DEN_Accepted: "§YDenmark§! has accepted our invite."
 WW_Volunteer_Corps_DEN_Denied: "§YDenmark§! has declined our invite."
 WW_Volunteer_Corps_NOR_Accepted: "§YNorway§! has accepted our invite."
 WW_Volunteer_Corps_NOR_Denied: "§YNorway§! has declined our invite."
 WW_Form_the_Swedish_Volunteer_Fleet: "Form the Swedish Volunteer Fleet"
 WW_Form_the_Swedish_Volunteer_Fleet_desc: "With Finland under attack and the situation on the eastern border deteriorating by the day, we will start organising a volunteer air flotilla to help our Nordic neighbours. Though we remain officially neutral, we will quietly approve the transfer of fighter and light bomber aircraft, as well as a team of dedicated volunteers. Operating from improvised airfields, they will defend the region and provide much-needed relief to Finnish forces on the frontlines."

######################################################################
# Events
######################################################################
 WW_Volunteer_Corps.1.t: "The Winter War"
 WW_Volunteer_Corps.1.d: "The Soviets have struck Finland! After months of posturing and bluster, the Soviets gave up on peace and unleashed their powerful military to destroy Finland. Battles rage from Karelia to the Arctic, as Soviet troops cross the border. Reports from heavily defended areas, such as Karelia, appear initially promising. The disorganised Soviet charge failed to break the Finns.\n\nThis situation has made the rest of Scandinavia nervous. Much of their population, and even some in their governments, want to help Finland and thwart the Communist advance. However, with Berlin, Moscow, and possibly even London looking for an excuse to intervene, we are all aware that we must proceed cautiously. We must assist Finland while remaining discreet.\n\nThis has resulted in a shared idea: a Nordic Volunteer Corps comprised of volunteers from Denmark, Sweden, and Norway. With our combined resources, the Corps could be perceived as an independent organisation, despite being large enough to have an impact on Finnish battlefields. However, convincing even one government to agree to the plan, let alone all three, could be difficult. For Finland's sake, though, an effort must be made."
 WW_Volunteer_Corps.1.A: "The Three Brothers stand as one!"

 WW_Volunteer_Corps.2.t: "The Finnish Question"
 WW_Volunteer_Corps.2.d: "We were not surprised to learn from our neighbour that an informal Nordic Volunteer Corps for Finland had been formed. They have been a vocal supporter of the Finns' struggle against the Soviets since its inception. What surprised us, however, was when informal back channels requested that we donate troops. Many in government were initially dismissive because we were so far from the front and had Germans breathing down our necks.\n\nThen we gave it another thought. While we cannot openly contribute troops, we may fail to prevent our citizens from doing so. Support for Finland has become a widely popular movement in Denmark's streets, with many young men openly wanting to fight. If we just let them go, with some half-hearted attempts to stop them to save face, we could solve a lot of problems at once.\n\nWe will be able to tell the Germans truthfully that we do not support the Finns, we will be free of these militant radicals, and we will continue to assist the Finns in their fight against our common enemy, the Soviets. Then, when these veterans return home, we can use them to strengthen our armies for when the Germans finally come north."
 WW_Volunteer_Corps.2.A: "For a free Finland!"
 WW_Volunteer_Corps.2.B: "Let's not anger the Soviets."

 WW_Volunteer_Corps.3.t: "The Finnish Front"
 WW_Volunteer_Corps.3.d: "Our country has a unique relationship with Finland. Our people demand that we take action to combat the Soviet incursion, and the government is concerned about having Soviet troops on our borders. However, they fear the Germans more. The government believes that sending overt assistance to Finland will only enrage the Germans and invite an invasion. So, when we were asked to support the Volunteer Corps, we initially declined.\n\nHowever, after some consideration, some ministers have begun to advocate for some covert support. Many fighting-age men are eager to cross the border into Northern Finland and confront the Soviets. They are already on their way to Finnmark to do exactly that. By allowing them to travel to Finland, we can gain valuable military insights from returning veterans while also eliminating the more violent militants.\n\nPeople have taken the lead in other ways as well. Donations are pouring in at sporting events across the country for the so-called Finland Collection, which is already the most popular collection in our history. Women knit shooting gloves, men donate rifles, and families pack backpacks with care packages for Finnish soldiers. The Germans would understand that we cannot prevent this aid from reaching Finland, which was collected without government approval."
 WW_Volunteer_Corps.3.A: "For a free Finland!"
 WW_Volunteer_Corps.3.B: "Let's not anger the Soviets."

 WW_Volunteer_Corps.4.t: "The ‘Swedish’ Volunteer Corps"
 WW_Volunteer_Corps.4.d: "Only a decade ago, when we Finns looked across the Aaland Strait, we saw enemies in Stockholm staring back. War was only narrowly avoided several times during those tense years. However, it appears that war has produced strange bedfellows. The Aalands dispute, as well as other minor disagreements, have been forgotten. Sweden, once a strategic rival, has now emerged as our most formidable defender against the Soviet hordes.\n\nThousands of Swedes arrive in ports across Southern Finland to defend our homeland, along with hundreds of Norwegians and Danes. Some come with rifles, others with wrenches or bandages, but everyone is equally welcome. They have quickly integrated into the command structure and are expected to be deployed shortly. Their governments have officially ignored these volunteers. Despite this, it is clear that they had some covert knowledge of the Corps. The Corps' arrival and symbolism have proven to be an effective tool. With the unofficial support of all of our Nordic brothers, morale is once again rising among the people. With our combined strength, the dream of a free Finland will not die!"
 WW_Volunteer_Corps.4.A: "Perkele!"

 WW_Volunteer_Corps.5.t: "Swedish Planes Arrive"
 WW_Volunteer_Corps.5.d: "Despite its official neutrality, the Swedish government has approved the transfer of volunteer pilots and aircraft to help us fight the war. The newly formed Flygflottilj 19 has started arriving at makeshift bases in northern Finland. Their mission, comprised of Swedish pilots flying Gloster Gladiator fighters and Hawker Hart bombers, and supported by a small ground staff, is straightforward: defend our northern cities, provide reconnaissance, and strike Soviet positions wherever possible. Despite its modest size, the contribution is strategically valuable. By taking over some of the air defence, they allow our overburdened air units to focus on the more intense fighting in the south."
 WW_Volunteer_Corps.5.A: "To the skies, with Swedish aid!"
