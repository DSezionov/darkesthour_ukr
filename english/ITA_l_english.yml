 # IRI
 ITA_Istituto_per_la_Ricostruzione_Industriale_category: "Istituto per la Ricostruzione Industriale"
 ITA_Istituto_per_la_Ricostruzione_Industriale_category_desc: "\n\n\n£decision_header_ITA_IRI£\n\n\n\nAs Great Depression affected our economy and especially financial sector, the Government came up with idea to start taking over bank's stakes in large companies and injecting capital into failing businesses. To achieve this goal in 1933 the Government authorized creation of The Institute of Industrial Reconstruction (IRI) which from now one would operate as de facto owner of large number of banks and private companies.\n\n£money_icon  Maintenance of IRI Shares and Activities: [?ITA_IRI_Maintenance|R]£money_icon\n£civ_factory£ Speed of Civilian Factories Construction: §Y[?ITA_IRI_Civilian_Factories_speed|%2G]§!\n£mil_factory£ Speed of Military Factories Construction: §Y[?ITA_IRI_Military_Factories_speed|%2G]§!\n£dockyard_icon Speed of Dockyard Construction: §Y[?ITA_IRI_Dockyards_speed|%2G]§!\n£resources_to_market_icon£ Resource Extraction Efficiency: §G[?ITA_IRI_Resource_Extraction|%2+]§!\n"
 ITA_IRI_Maintenance_tt: "§OIRI§! £money_icon Daily Maintenance: [?ITA_IRI_Maintenance_gain|=+] \n"
 ITA_IRI_Resource_Extraction_tt: "§OIRI§! £resources_to_market_icon£ Resource Extraction Efficiency: [?ITA_IRI_Resource_Extraction_gain|=%2+]\n"
 ITA_IRI_Dockyards_speed_tt: "§OIRI§! £dockyard_icon Dockyard Construction Speed: [?ITA_IRI_Dockyards_speed_gain|=%2+]"
 ITA_IRI_Military_Factories_speed_tt: "§OIRI§! £mil_factory£ Military Factory Construction Speed: [?ITA_IRI_Military_Factories_speed_gain|=%2+]"
 ITA_IRI_Civilian_Factories_speed_tt: "§OIRI§! £civ_factory£ Civilian Factory Construction Speed: [?ITA_IRI_Civilian_Factories_speed_gain|=%2+]"
 ITA_IRI_Other_Decisions_Unlocked: "§LNew Decisions§! will be §GAvailable§!"
 ITA_Absorbing_Other_Shares: "§gAbsorbing Other Shares§!"
 ITA_Incorporate_Istituto_di_Liquidazioni: "Incorporate the Istituto di Liquidazioni"
 ITA_Incorporate_Istituto_di_Liquidazioni_desc: "The Istituto di Liquidazioni will be formally merged into the IRI, ensuring that its operations are in line with the overall goal of state-led economic rehabilitation. This combination provides the Institute with additional resources, coordinated supervision of distressed companies, and a direct link to national industrial strategy. By incorporating the administration of failing businesses into the IRI framework, we ensure that liquidations, restructurings, and asset redistributions are carried out efficiently, strategically, and in the national interest."
 ITA_Incorporate_Istituto_di_Liquidazioni_tt: "§LWe must Incorporate \"Istituto di Liquidazioni\" before Proceeding Further.§!"
 ITA_Absorb_Shares_of_Banca_Commerciale_Italiana: "Absorb Shares of Banca Commerciale Italiana"
 ITA_Absorb_Shares_of_Banca_Commerciale_Italiana_desc: "In order to stabilise the banking sector, the IRI will be granted permission to acquire controlling shares of Banca Commerciale Italiana. Years of reckless lending and rising defaults have left the bank vulnerable and incapable of self-recovery. Through state intervention, we will stabilise its balance sheets, restore depositor confidence, and ensure that its massive industrial holdings are focused on national interests rather than private speculation."
 ITA_Absorb_Shares_of_Banco_di_Roma: "Absorb Shares of Banco di Roma"
 ITA_Absorb_Shares_of_Banco_di_Roma_desc: "Banco di Roma, a renowned institution that once represented the capital's financial might, is now burdened with unpaid loans and depleted reserves. The IRI will acquire the bank's primary shares, placing it under government control. This strategy will avoid a collapse that would devastate both business and public trust. Entrusting the bank's large assets to responsible management will result in stability and a disciplined financial system driven by the public interest."
 ITA_Absorb_Shares_of_Credito_Italiano: "Absorb Shares of Credito Italiano"
 ITA_Absorb_Shares_of_Credito_Italiano_desc: "Credito Italiano, a long-standing pillar of Italian industry, is facing insolvency as a result of bad loans acquired during the economic crisis. The IRI's action, which involves the absorption of its controlling shares, is another step towards unifying the financial sector under competent public oversight. This acquisition protects both the bank's depositors and the industries that rely on its credit lines."
 ITA_Liquidate_Societa_Finanziaria_Italiana: "Liquidate Società Finanziaria Italiana"
 ITA_Liquidate_Societa_Finanziaria_Italiana_desc: "Società Finanziaria Italiana, which is plagued by speculative projects and insolvent investments, will be liquidated under IRI supervision. This way, we hope to recover significant assets and redeploy them to industries critical to national development. The dissolution eliminates inefficient intermediaries and reduces systemic risk, allowing us to direct capital towards industries important for employment, infrastructure, and strategic growth."
 ITA_Liquidate_Sofindit: "Liquidate Sofindit"
 ITA_Liquidate_Sofindit_desc: "Sofindit, a holding company that invests in mining, textiles, and small manufacturing businesses, has been unable to remain profitable. The IRI will liquidate Sofindit and use its assets to fund modernisation projects in steel, chemicals, and energy. By reallocating these resources, we will strengthen critical industries, keep jobs in regional hubs, and eliminate speculative inefficiencies. This measured liquidation will provide us with valuable capital, which we will use to reduce our country's exorbitant unemployment."
 ITA_Liquidate_Societa_Elettrofinanziaria: "Liquidate Società Elettrofinanziaria"
 ITA_Liquidate_Societa_Elettrofinanziaria_desc: "Società Elettrofinanziaria, which has made significant investments in electrical utilities and small industrial businesses, has struggled with debt accumulation and failed acquisitions. The IRI will liquidate the corporation, regaining its energy assets and allocating funds to larger, more strategic initiatives that can help reduce the country's unemployment rate. By doing so, we will strengthen the national grid and ensure that resources are concentrated where they can have the greatest impact on economic recovery and long-term industrial modernisation."
 ITA_Subsidize_Management_Training_for_Steel_Industry: "Subsidise Management Training for Steel Industry"
 ITA_Subsidize_Management_Training_for_Steel_Industry_desc: "To modernise Italy's steel industry, we will fund specialised management training for executives at mills across the nation. By investing in technological competence, production planning, and organisational efficiency, we ensure that steel companies remain competitive while meeting national infrastructure and defence needs."
 ITA_Acquire_Societa_Idroelettrica_Piemontese: "Acquire Società Idroelettrica Piemontese"
 ITA_Acquire_Societa_Idroelettrica_Piemontese_desc: "The IRI will acquire Società Idroelettrica Piemontese, a major regional hydroelectric power producer in northern Italy. State control allows for synchronised electricity production and industrial expansion, supporting the steel, chemicals, and transportation industries. To reverse the effects of the Great Depression, we will incorporate this enterprise into national planning, ensuring a consistent energy supply and stimulating industrial modernisation."
 ITA_Reprivatize_EDISON_and_SADE_Companies: "Reprivatise EDISON and SADE Companies"
 ITA_Reprivatize_EDISON_and_SADE_Companies_desc: "After stabilising under IRI supervision, EDISON and SADE, the two largest electricity providers in Lombardy and Veneto, will be returned to private ownership. Carefully chosen industry partners will ensure operational efficiency while retaining state control of critical energy infrastructure. This regulated privatisation encourages investment, promotes innovation, and ensures that Italy's expanding industrial sectors have access to reliable energy, thereby striking a balance between state intervention and private entrepreneurship."
 ITA_Nationalize_Banca_dItalia: "Nationalise Banca d'Italia"
 ITA_Nationalize_Banca_dItalia_desc: "The Banca d'Italia, the country's central bank, will be fully nationalised to ensure monetary policy and economic stability. State control enables the coordinated administration of money, credit, and banking supervision, thereby promoting industrial recovery and financial confidence. By aligning the central bank with national interests, we can stabilise markets, direct resources to critical sectors, and boost public trust."
 ITA_Nationalize_Banca_Commerciale_Italiana: "Nationalise Banca Commerciale Italiana"
 ITA_Nationalize_Banca_Commerciale_Italiana_desc: "The Banca d'Italia, the country's central bank, will be fully nationalised to ensure monetary policy and economic stability. State control enables the coordinated administration of money, credit, and banking supervision, thereby promoting industrial recovery and financial confidence. By aligning the central bank with national interests, we can stabilise markets, direct resources to critical sectors, and boost public trust."
 ITA_Nationalize_Banco_di_Roma: "Nationalise Banco di Roma"
 ITA_Nationalize_Banco_di_Roma_desc: "Banco di Roma, a large financial institution critical to commerce in the capital and southern Italy, is in trouble, threatening both local industry and national credit markets. We will completely nationalise the bank, placing it under state supervision to ensure disciplined lending, protect savings, and stabilise the economy."
 ITA_Nationalize_Banco_di_Roma_tt_picture: "\n\n\n\n£picture_ITA_Nationalize_Banco_di_Roma\n\n\n\n\n\n\n"
 ITA_Nationalize_Credito_Italiano: "Nationalise Credito Italiano"
 ITA_Nationalize_Credito_Italiano_desc: "Credito Italiano, a leading bank in northern Italy and a key financier of heavy industry, manufacturing, and exports, is experiencing financial difficulties that jeopardise industrial credit and economic confidence. We will nationalise the bank, putting it under direct state control to protect deposits, stabilise lending, and direct capital to strategic sectors. This intervention maintains support for steel, machinery, and energy production while increasing public trust in the financial system."
 ITA_Establish_FINMARE: "Establish FINMARE"
 ITA_Establish_FINMARE_desc: "The IRI will work to establish FINMARE, a state-controlled body that will oversee shipping and maritime logistics. By centralising merchant fleet management, we will improve efficiency, upgrade ports and vessels, and align marine transport with national industrial objectives. FINMARE ensures that our maritime capacity helps to boost economic recovery, facilitates trade, and strengthens key infrastructure."
 ITA_Reorganize_Italia_and_Lloyd_Triestino_Shipping_Compaines: "Reorganise Italia and Lloyd Triestino Shipping Compaines"
 ITA_Reorganize_Italia_and_Lloyd_Triestino_Shipping_Compaines_desc: "The Italia and Lloyd Triestino shipping companies will be restructured under IRI supervision to improve operational efficiency and financial stability. Years of mismanagement and market volatility have harmed our merchant fleet, threatening trade and industrial supply networks. To ensure that maritime transport meets our needs, we will consolidate leadership, streamline operations, and invest in technology."
 ITA_Reogranize_Adriatica_and_Tirrentia_Shipping_Companies: "Reogranise Adriatica and Tirrentia Shipping Companies"
 ITA_Reogranize_Adriatica_and_Tirrentia_Shipping_Companies_desc: "Adriatica and Tirrenia, which are critical for domestic and Adriatic Sea transportation, will be reorganised with state oversight to improve efficiency and financial stability. IRI management will optimise routes, modernise vessels, and ensure consistent connections between northern and southern Italy. This initiative promotes regional industry, tourism, and domestic trade while strengthening our maritime infrastructure and creating jobs in coastal hubs."
 ITA_Establish_FINSIDER: "Establish FINSIDER"
 ITA_Establish_FINSIDER_desc: "FINSIDER, a state-backed holding company, will be established to coordinate investment in the national steel industry. FINSIDER promotes efficient industrial growth and technological advancement by controlling steel manufacturers' shares, supporting modern mills, and allocating resources to integrated production cycles. The company will strengthen our industrial independence, creates jobs in critical regions, and enables coordinated planning across the steel and machinery industries."
 ITA_Invest_in_Cornigliano_Integrated_Production_Cycle_Steel_Mill: "Invest in Cornigliano Integrated Production-Cycle Steel Mill"
 ITA_Invest_in_Cornigliano_Integrated_Production_Cycle_Steel_Mill_desc: "We will invest in the Cornigliano steel mill to establish a fully integrated production cycle that spans raw iron to finished steel products. This investment modernises our steel industry, increasing output and reducing reliance on imports. The initiative, coordinated by FINSIDER and IRI, generates skilled jobs, improves Liguria's industrial infrastructure, and provides critical materials for machinery, transportation, and construction."
 ITA_Acquire_SIAC_Shares: "Acquire SIAC Shares"
 ITA_Acquire_SIAC_Shares_desc: "To protect critical steel and infrastructure sectors, we will acquire a controlling stake in SIAC, one of the country's most important industrial companies. This action will stabilise key industries, reduce reliance on foreign suppliers, and increase domestic output. SIAC will use government funding to expand its manufacturing capabilities, modernise its operations, and create much-needed jobs during the our current crisis."
 ITA_Subsidize_Modernization_of_Mining_Machinery: "Subsidise Modernisation of Mining Machinery"
 ITA_Subsidize_Modernization_of_Mining_Machinery_desc: "Italy's mining industry, particularly coal and iron extraction, is plagued by outdated equipment and inefficiency, threatening productivity. We will fund the upgrade of mining machinery, allowing companies to increase output, reduce costs, and maintain labour stability. This project ensures a consistent supply of raw materials for steel, chemicals, and heavy industry, while also benefiting regional economies through IRI cooperation."
 ITA_Absorbed_SME: "Absorbed SME Shares"
 ITA_Absorb_Shares_of_Societa_Meridionale_di_Elettricita: "Absorb Shares of Società Meridionale di Elettricità"
 ITA_Absorb_Shares_of_Societa_Meridionale_di_Elettricita_desc: "Società Meridionale di Elettricità, southern Italy's main electricity supplier, is experiencing financial difficulties, threatening power supplies to local industry and ports. The IRI will absorb its shares, giving the state control over energy production and distribution. This approach allows for grid modernisation, reliable power for growing industrial clusters, and the integration of the southern sector into national development strategies."
 ITA_Subsidize_Establishment_of_the_Navalmeccanica: "Subsidise Establishment of the Navalmeccanica"
 ITA_Subsidize_Establishment_of_the_Navalmeccanica_desc: "We will contribute to the establishment of Navalmeccanica, a new shipbuilding and naval engineering company. This project promotes domestic shipbuilding by increasing commercial and naval capabilities and encouraging technological innovation. State funding creates jobs at coastal shipyards, allowing us to maintain our naval dominance in the Mediterranean Sea while modernising the Italian fleet."
 ITA_Subsidize_Establishment_of_Montecatini_Chemical_Plants: "Subsidise Establishment of Montecatini Chemical Plants"
 ITA_Subsidize_Establishment_of_Montecatini_Chemical_Plants_desc: "Montecatini, a major Italian chemical manufacturer, will receive government funding to construct new facilities for fertilisers, industrial chemicals, and synthetic materials. These facilities provide critical inputs to agriculture, textiles, and industrial manufacturing, reducing reliance on foreign imports. The initiative encourages regional development and creates skilled jobs."
 ITA_Merge_Investment_Department_of_IRI_with_the_IMI: "Merge Investment Department of IRI with the IMI"
 ITA_Merge_Investment_Department_of_IRI_with_the_IMI_desc: "The IRI's investment department will collaborate with the Istituto Mobiliare Italiano to improve monitoring of industrial financing. This consolidation improves the coordination of financing and investment in key industries like steel, energy, and transportation. By streamlining capital allocation and knowledge sharing, we will improve industrial planning, make better use of public resources, and strengthen the state's ability to drive economic reconstruction and modernisation in critical industries."
 ITA_Invest_in_Synthetic_Rubber_Production_by_Pirelli_Group: "Invest in Synthetic Rubber Production by Pirelli Group"
 ITA_Invest_in_Synthetic_Rubber_Production_by_Pirelli_Group_desc: "The IRI will now focus its efforts on assisting the Pirelli Group in increasing synthetic rubber production, reducing reliance on imported raw materials, and promoting strategic industries such as automotive and military. This investment modernises chemical and manufacturing processes while also ensuring stable supply chains for industrial applications. This way, we will save a lot of money and reduce our reliance on imported goods."
 ITA_Invest_into_Alfa_Romeo_Avio: "Invest into Alfa Romeo Avio" 
 ITA_Invest_into_Alfa_Romeo_Avio_desc: "Alfa Romeo Avio, Italy's largest automotive manufacturer's aeronautical division, will receive state funding to increase production of aircraft engines and innovative mechanical components. This initiative enhances domestic aviation capabilities, supports both military and civilian aviation, and encourages mechanical engineering innovation. By linking Alfa Romeo Avio to national industrial and defence objectives, we will strengthen our military and civilian industries while lowering unemployment."
 ITA_Invest_in_Alfa_Romeo_tt_picture: "\n\n\n\n£picture_ITA_Invest_in_Alfa_Romeo\n\n\n\n\n\n\n"
 # Drain the Swamps
 ITA_Drain_the_Swamp_category: "Drain the Swamps"
 ITA_Drain_the_Swamp_category_desc: "\n\n\n£decision_header_ITA_Draining_the_Swamps£\n\n\n\nItaly, despite having a landmass comparable to other large European nations such as the UK and Poland, suffers from a chronic need of land. Its territories are mountainous and hilly which ill-lend themselves to the development of agriculture and industry. However there is still unexploited flat land within our borders, ready to be cultivated. Unfortunately said land is covered by great swamps that need drainage which can only be accomplished by investing many man-hours of work and electric resources into the project. The Fascist Party will see that Italy's potential is brought out.\n\n                                      Drainage of: §O[This.Dynamic_ITA_Swamp_Name]§!\n                                              Stage of Drainage: [This.Dynamic_ITA_Swamp_Stage]\n            Next Stage of Drainage Effects: §Y[This.Dynamic_ITA_Swamp_Stage_Effects]§!\n                                                  Progressing at: [?ITA_Swamps_Progress_Monthly|%%1G]\n                                                    kW Produced: §G[?ITA_Swamps_kW_Produced]§!\n                                                     kW Upkeep: §R[?ITA_Swamps_kW_Upkeep]§!\n"
