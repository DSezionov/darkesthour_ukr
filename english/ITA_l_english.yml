 ITA_High_Command_Incompetence: "High Command Incompetence"
 ITA_High_Command_Incompetence_desc: "One of the chronic issues of the Italian army ever since The Great War has been its upper brass. It is formed by a highly aristocratic strata that are often detached from the realities of war, there is a great lack of experience amongst its rank holders, not only due to the youth of the Italian nation and the lack of military adventures in its time but also due to widespread nepotism leading to unfit people in command roles. \n\nThis continued nepotism and snobbish behavior continued even after the Fascist rise to power and it seems to have further consolidated itself as Mussolini used the army and the old guard leading it to consolidate his state."
 
 ITA_High_Command_Incompetence_2: "High Command Incompetence"
 ITA_High_Command_Incompetence_2_desc: "One of the chronic issues of the Italian army ever since The Great War has been its upper brass. It is formed by a highly aristocratic strata that are often detached from the realities of war, there is a great lack of experience amongst its rank holders, not only due to the youth of the Italian nation and the lack of military adventures in its time but also due to widespread nepotism leading to unfit people in command roles. \n\nThis continued nepotism and snobbish behavior continued even after the Fascist rise to power and it seems to have further consolidated itself as Mussolini used the army and the old guard leading it to consolidate his state."

 ITA_Regio_Esercito_Reorganization: "Regio Esercito Reorganization"
 ITA_Regio_Esercito_Reorganization_desc: "Ever since the institution of the new Fascist government, the army has been a popular talk point amongst its members and that of party propaganda and was a particularly hot issue in the post-war years as the demobilization was slow and sluggish due to unrest in the country. Through the fascist optic, the army is seen as the sword that will exemplify the Italian people through its might and discipline, sadly that has not been the case. \n\nThe constant debates over the size of the standing army, during the 20s, the equipment needed to supply them, the recruitment and training of new soldiers were constantly an issue but by the start of the 30s, as the political climate cooled down and Mussolini’s grasp of the state of the situation became more consolidated, plans have been put forth to finalize the Army’s reorganization with the most current effort regarding the integration of the MVSN."
 
