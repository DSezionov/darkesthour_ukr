 ITA_Italia_Imperiale: "Italia Imperiale"
 ITA_Italia_Imperiale_desc: "If Italy wants to be a feared and respected nation amongst its peers in Europe, it must follow in the footsteps of the other great powers we compete with. The first step to doing that, of course, is to begin building a colonial empire like those of Britain or France. Much like the Romans, our ancestors, Italy shall rise again as the centre of a new empire, the centre of imperial order whose shining light shall sketch from mighty Rome to even the darkest corners of Africa. Libya was a good start, to be sure.\n\nNearby and in a position to be a threat to both France’s and Britain’s North African colonial holdings. However, we need to think bigger. There is but one unconquered jewel left in Africa, and we shall have it. A symbol of Italy’s rejuvenation. Abyssinia."

 ITA_Possible_with_Ethiopia: "§RWe have been patient with Ethiopia for forty years. It is enough now!§!"

 ITA_Integration_of_Albania: "Integration of Albania"
 ITA_Integration_of_Albania_desc: "Albania had been an Italian possession for centuries. First it was owned by the Romans for millennia and then, after the Ottomans swept through the area, the coasts were under the influence of Venice. It wasn’t until the Ottomans that Italian influence in the region was finally expelled. Since then it's been a dream of our great nation to once more own that land. Not only is it historically ours, but it's strategically vital. Its position gives us a powerful base in the Balkans from which to work from and the Port of Vlore and island of Sazan are keys to controlling the mouth of the Adriatic. We began making inroads into that historical blunder of a country in 1924 and 1926. The Albanian economy now runs solely on loans from Italian banks, its army is trained and led by Italian officers, and its government is dominated by Italians. Their despot, Zog, foolishly decided to repay our kindness by turning his back on us and seeking help from the equally vulnerable Balkan nations. He believes they will be able to stop us. We will show him and the rest of the world that we are not to be taken lightly."

 ITA_Italianizzazione: "Italianizzazione"
 ITA_Italianizzazione_desc: "The Balkans are home to a diverse range of countries and cultures. Bulgarians, Serbs, Croats, Greeks, Macedonians, and others are all involved in low-intensity ethnic conflict. This constant warfare must end if the region is to ever experience peace, especially under our benign rule. After gaining a foothold in the region through the conquest of Albania, we must now devise a strategy to bring this historically turbulent region the peace it so richly deserves.\n\nFortunately, the solution is simple. We'll simply Italianize the entire region. Croats, Serbs, Albanians, and Bulgarians will no longer exist. There will only be Italians, living in peace with their fellow citizens and working together for the Imperium's success and prosperity."

