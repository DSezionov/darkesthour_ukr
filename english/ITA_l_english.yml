 ITA_Overfunded_Regia_Marina: "Overfunded Regia Marina"
 ITA_Overfunded_Regia_Marina_desc: "The Italian navy has received particular attention from the Duce himself, reputing it to be the shield of Italy and the main way Italy will be able to project its power across the world, and through it show the strength of the fascist system. Not only, but it is also the duty, nay, the Destiny of the Italians to rule the waves of the Mediterranean, just as their glorious ancestors had once before. \n\nHowever with the carte blanche, the Navy has been given in regards to its funding and expansion, it has opened up a myriad of holes and cracks for the generous amounts of money of the state to fall through. The Admirals grow content, palms are greased but the efficiency of staff and sailors is on the decline."
 
