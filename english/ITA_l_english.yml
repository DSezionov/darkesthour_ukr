 # Pacify Abyssinia
 ITA_Pacify_Abyssinia_category: "Pacify Abyssinia"
 ITA_Pacify_Abyssinia_category_desc: "\n\n\n£decision_header_ITA_Pacify_Abyssinia\n\n\n\n\n§YAbyssinia§!, the shining jewel of our latest African conquests. Beautiful, exotic, and unfortunately, highly volatile at the moment. The conquest of §YAbyssinia§! was a hard fought affair, with the locals having put up major resistance on both the Northern and Southern front of the war. They were far more successful in resisting us than any other African nation was in resisting outside European colonization attempts. It is perhaps for this reason they continue to resist us with their various guerrilla movements throughout the provinces, they have some vague idea that they will be able to expel us from the region. We will disabuse them of that notion.\n\nNow that our §Gcolonial administration§! is firmly in control of the region, we can begin engaging these rebels head on, raiding their hideouts and killing their leaders. To further solidify our control, we can exploit ethnic divisions in the populace to weaken their resolve against us, and once the situation is stable enough to permit it, we can even begin bringing in ethnic Italians to truly begin integrating this new province as a part of the §OItalian Empire§!. Just as we pacified Libya, so too shall we pacify §YAbyssinia§!.\n\n£resistance_icon Resistance Growth: §Y[?AOI.ITA_Ethiopian_Unrest_partisan|%2R]§!\n\n£resistance_icon Damage to Garrisons: [?AOI.ITA_Ethiopian_Unrest_damage|%2R]\n"
