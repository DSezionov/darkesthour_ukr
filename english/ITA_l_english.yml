 ITA_Nothing_Outside_The_State: "Nothing Outside the State"
 ITA_Nothing_Outside_The_State_desc: "It has been ten years since the Duces March on Rome and still the Fascist State we seek to build has not fully been developed in Italy.\nThere are still traitors to our nation hiding beneath the populace, the economy of Italy has been hit hard by the Great Depression and the state of our army leaves doubts to the question if we can defend ourselves in a new European war.\n\nThere is a lot to be done in Italy and abroad the world, problems left to solve, enemies left to defeat with no certainty except the knowledge that no one will fight these battles in our stead. The Italian people need to be united behind the Duce, the Fascist Party and the State should Italy have any chance of gaining its destiny and conquering the History of the 20th century and we will do everything possible to achieve the level of unity required!\n\nThe 20th century will be the century of Fascism, no matter who opposes us!"

 ITA_Control_Over_the_Party: "Control Over the Party"
 ITA_Control_Over_the_Party_desc: "The National Fascist Party has been the sole governing party in Italy for more than 10 years now and as such both the populace and party stand united by the guidance of our great Duce.\n\nHowever, there have, in recent years, many individuals and movements inside the party that seek to subvert or even destroy our fascist movement and the leadership of Il Duce. Such insubordination cannot be tolerated and it has finally become time to show to the monarchists inside our party, that the NFP is Mussolini's realm, not the Kings. We will have to make some changes to our personal structure while sending a clear message to the King and his supports: There is only one way for the Monarchy to stay alive- with Mussolini by its side."

 ITA_Opera_Nazionale_Balilla: "Opera Nazionale Balilla"
 ITA_Opera_Nazionale_Balilla_desc: "The Opera Nazionale Balilla, better know as the Balilla; is the official youth wing of the National Fascist Party and thus one of the most important organizations in the entire Kingdom of Italy.\n\nHere the youth is taught the ideals of the new Fascist man, while rigorous exercise and education in patriotism, proper conduct, and loyalty to the state, prepare the youths to properly fulfil their duties to the state, as soldiers, workers, or mothers.\n\nGiven the success of the Balilla and the subsequent emergence of similar youth wings around the entire world, further confirming that we are on the right path, we should aim at expanding the program, aiming at the inclusion of the entire Italian youth, whether they live in the city and the countryside. In addition to this, the activities conducted by the Balilla will be expanded further, with near-daily meetings of the local wing becoming mandatory, while bigger activities such as marches, shooting exercises, or excursions to important places of Italian history should occur at least once a month. Should this follow the massive success of the previous model, we will soon live in a better country with an entirely new generation, ready to realize the dream of a truly unified and strong Italy."

 ITA_Establish_MinCulPop: "Establish MinCulPop"
 ITA_Establish_MinCulPop_desc: "For years now the Press Office of the Head of Government has overseen the regulation of all sorts of mass media inside Italy acting as an overseeing body, checking most of the literary and radio channels for anti-government agitation and bolshevik thought.\n\nThe Germans however have shown with their Ministry of Public Enlightenment and Propaganda, that even greater control over the media is an amazing tool, which can be utilized to great effect for a variety of purposes.\n\nDeeply impressed by the German example, Mussolini has thus ordered the creation of the Ministero della Cultura Popolare, abbreviated MinCulPop, to actively influence and oversee any form of media in the Kingdom of Italy, creating blacklists, censoring unsavoury contents and uniting all offices charged with producing our government media. Given enough time the MinCulPop will be our greatest tool to control Italy and to build the Fascist state."

 ITA_Carta_della_Scuola: "Carta della Scuola"
 ITA_Carta_della_Scuola_desc: "Education in Italy has, for the better part of its entire history, been highly dependent on your rank and social status. If you are rich, you lived in a rich neighbourhood with a good school, where you would get a good education, which would allow you to go to university, get a degree, get a well-paying job and in the end stay rich. If you are poor however you had to go to a poor school, in a poor neighbourhood, where you only could learn the basics of education before you had to once again go to work to support your family.\n\nIt is given that this state of affairs is unacceptable, robbing Italy of massive amounts of potential while creating a wedge and contempt between the classes.\n\nTo root out this problem, the NFP has decided to enact a reform of the school system, the Carta della Scuola. This new law will from now on allow less economically inclined citizens to visit prestigious schools through generous scholarship grants, while already existing schools in poorer areas will receive greater funding than their bourgeoise counterparts. Furthermore, the law will create state-sponsored night schools, which will allow manual workers to receive new experiences in specialized manual work, while unproductive, chronic students will be forced to finally contribute to society, by reducing the number of study titles an individual can hold."

 ITA_Additional_Funding_for_Dopolavoro: "Additional Funding for Dopolavoro"
 ITA_Additional_Funding_for_Dopolavoro_desc: "The Opera Nazionale Dopolavoro, or Nationalist After Work Club, was founded in 1925 and served as a leisure and recreational organization for adults in Fascist Italy. The OND, which was formed at the request of loyal trade unions, has done wonders in siphoning support away from the Socialists. The OND covers its members' vacations and trips to many of Italy's most beautiful and once-exclusive resorts. These working-class, blue-collar factory workers who take these trips find the luxurious lifestyle offered by these resorts appealing and know who to thank for such an experience. Despite this, the program has consistently failed to convert its participants into committed Fascists, as its leader Augusto Turati intended. However, Mussolini sees its value as long as it keeps people out of the clutches of the Red Menace. It has been so effective in its role that Mussolini has doubled its budget so that more people can benefit from the Fascist system's kindness."

 ITA_Expand_the_Assets_of_Istituto_Luce: "Expand the Assets of Istituto Luce"
 ITA_Expand_the_Assets_of_Istituto_Luce_desc: "Inside our fascist society, the Instituto Luce is the corporation, which is responsible for the production of movies and documentaries with strictly informative purposes, with the studio having produced hundreds of such films and documentaries since its founding in 1924.\n\nTo further support the great work the Instituto is doing and expand its capabilities as a propaganda tool the Duce himself, has decided to expand the assets of the Instituto allowing it to produce even more films with a higher production budget. These films will be the forerunners in informational productions throughout the entire world, teaching our entire country about the great glories of Italian history."

 ITA_Establish_ENIC_Movie_Corporation: "Establish ENIC Movie Corporation"
 ITA_Establish_ENIC_Movie_Corporation_desc: "While the Instituto Luce so far has only been responsible for informational movie production, there are many inside the party that wishes to wrangle away the entertainment movie industry away from private industry and to place it under the responsibility of the state.\n\nWith this goal in mind, the Italian government has formally founded the ENIC Movie corporation, which from now on will seek to replace private or foreign business, as the main film production and movie distribution entity in Italy. Equipped with the greatest minds of Italian directing, as well as generous funding and an ever-expanding number of cinemas the ENIC will soon be able to produce true masterpieces, which will both entertain and educate the population of Italy, while hopefully breaking Hollywoods monopoly over the movie industry."

 ITA_Reign_In_The_Branches: "Reign In the Branches"
 ITA_Reign_In_The_Branches_desc: ""

 ITA_The_Four_Powers_Act: "The Four Powers Act"
 ITA_The_Four_Powers_Act_desc: "Mussolini has taken it upon himself to diffuse tensions in Europe as they reach feverish proportions. To accomplish this, he will propose a Four Powers Pact. This agreement between Italy, France, the United Kingdom, and Germany will go a long way toward simplifying European power politics. The strongmen on the Continent will no longer have to worry about the opinions of insignificant and small states. Germany wishes to reintegrate the German territories? They can negotiate with the other Great Powers through the mechanisms of this pact to ensure that such a just move does not lead to an unjust war. This Pact will also allow Mussolini to strengthen ties with France and Britain, two major Mediterranean powers. With enough territorial incentives elsewhere, they might be able to support his pet project, Mare Nostrum. With enough benefits to all those involved, who could refuse it?"

 ITA_Expand_The_Assets_Of_Istituto_Luce: "Expand the Assets of Istituto Luce"
 ITA_Expand_The_Assets_Of_Istituto_Luce_desc: ""

 ITA_The_Integral_Swamp_Drain_Project: "The Ingeral Swamp Drain Project"
 ITA_The_Integral_Swamp_Drain_Project_desc: ""

 ITA_Reaffirm_The_Locarno_Treaty: "Reaffirm The Locarno Treaty"
 ITA_Reaffirm_The_Locarno_Treaty_desc: "With Hitler now being the dictator of Germany and his gang of expansionists by his side, it seems a new area of German expansionism is upon us. This expansionism, which already chugged Europe into the horrors of the great war is a grave danger to our allies in Austria and by extension to us.\n\nTo counteract Hitler's motives and to show the world where we stand Italy will put out a declaration showing our firm support for the Locarno treaties, which regulate the German borders in the West.\n\nThis will show Hitler that Italy is no friend of his new Germany while being an important signal to the British and French, showing them that Italy is a firm ally of the European status-quo, hopefully soothing them in regards to our colonial ambitions in Africa."

 ITA_The_Rome_Protocolos: "The Rome Protocols"
 ITA_The_Rome_Protocolos_desc: "No nation has escaped the devastating effects of the Great Depression, ourselves included. That said, this economic downturn may give us some political opportunities we could exploit for our own advancement. Austria and Hungary have struggled with the depression much like we have and have indicated a willingness to enter negotiations with us for trade agreements and economic access to the Mediterranean, specifically the Adriatic Sea.\n\nWhile Hungary’s motivation is primarily its wheat crisis, Austria has a slightly different motivation. While their economy is certainly suffering hardship that a trade deal with us could help alleviate, their primary concern is the ever more belligerent Germany on their border. While these talks likely wouldn’t delve into the realm of any specific kind of defence treaty, this could be an opportunity for them, and for us, to open the door to that kind of opportunity should we so choose."

 ITA_Protect_Workers_Livelihoods: "Protect the Workers' Livelihoods"
 ITA_Protect_Workers_Livelihoods_desc: "The workers in our country are working hard for our push towards autarky but it is apparent that they are not treated with the among of care they deserved for their work. Workplace injuries have been a huge problem for our workers, especially when there are no measures taken to even care for their livelihoods, how can we gain the respect of our workers when their livelihoods are at risk?\n\nIt is time for the  National Institute for Insurance against Accidents at Work (INFAIL) to protect workers from their misfortunes and gain their support."

 ITA_Provide_Additional_Funding_to_the_OND: "Provide Funding to the OND"
 ITA_Provide_Additional_Funding_to_the_OND_desc: "The Opera Nazionale Dopolavoro (OND), the National Afterwork Club, is the current leisure and recreational organization of the Kingdom of Italy, being a direct auxiliary of the National Fascist Party. The OND so far has helped provide leisure activities such as concerts, plays, outdoor hikes, and much more to nearly every Italian worker, for little to no price, opening up the cultural glories of Italy to the common man. Due to its work, the OND has become extremely popular and is one of the largest mass organizations in our state, surpassing even our Fascist union, which greatly helped us to convince the workers of the benefits of the fascist system.\n\nThus it is logical to further expand the work of the OND to provide more and better activities to even more people around the country, hopefully greatly expanding the standing of the National Fascist Party in the populace."

 ITA_Battaglia_Del_Grano: "Battaglia del Grano"
 ITA_Battaglia_Del_Grano_desc: "For years, we have been reliant upon importations of foreign grains, and this has significantly increased our international trade deficit. How can we move to self-reliance when even basic food staples must be imported from foreign countries? \n\nWe must change this and become self-reliant in the production of wheat, to be viewed as a major power in Europe. Tariffs on grains shall be raised in favour of domestic grain production and its expansion. Grants shall be procured and given for those who are producing crops to buy farming machines, fertilizers and whatever is needed to boost our homeland production!"

 ITA_The_Stresa_Front: "Commit to the Stresa Front"
 ITA_The_Stresa_Front_desc: "Germany in recent years has become an increasingly belligerent and hostile power in Europe. While Italy may be safe from its expansionism by way of the Alps, Austria, our neighbour, is not. They don’t have the manpower, industry, or public support to maintain any sort of protracted conflict against Germany. France and England are worried, rightly, that Germany could attempt to seize the nation, which already speaks the same language and shares Germanic culture, in order to further strengthen its position in Europe and grow stronger.\n\nWe must stand firm beside France and Great Britain against this German threat. A fully unified Germany poses a threat to all of Europe. By reaffirming our commitment to the independence of Austria and others, we can lay the groundwork for something more concrete while we pursue our own colonial aims in Africa and abroad."

 ITA_LItalia_Per_Prima: "L'Italia per Prima"
 ITA_LItalia_Per_Prima_desc: "Italy was betrayed during the Great War. Despite fighting alongside the British and French to the tune of hundreds of thousands of dead, they refused to give us the land we so rightfully fought for. No more. The world is entering a new era. The hounds of war are howling in the distance, and a new struggle is beginning to determine the future identity and landscape of Europe.\n\nWhether we shall strike out on our own, forming our faction fighting for dominance over this new Europe, or align ourselves with the German titan that stirs to our North, one thing is certain. No longer will Italy bow down to the decadent plutocrats of the West. Italy first, forever!"

 ITA_Inauguarate_New_Cities: "Inaugurate New Cities"
 ITA_Inauguarate_New_Cities_desc: ""
 
 ITA_The_Results_Of_Battaglia_Della_Lira: "The Results of Battaglia della Lira"
 ITA_The_Results_Of_Battaglia_Della_Lira_desc: "Our revaluation plan has been in motion ever since the 1920s and the results are showing now. The policy hit our export trade, but also benefited our heavy industries, such as steel and chemicals, Tariffs on undesirable imports has made their prices high and restricted their demands, protecting our “Battle for Grain” policy. \n\nHowever, or workers were suffering from wage cuts to match the new value of the lira and the fall is faster than the food prices, thus their quality of life is plummeting. \n\nThis brings up the question: should we continue the Quota 90?"

 ITA_Legitimize_Fascism_to_the_Free_World: "Legitimise Fascism to the Free World"
 ITA_Legitimize_Fascism_to_the_Free_World_desc: "One of the greatest things about democracies for fascist nations like ourselves is their free speech laws. By aligning ourselves with France and Great Britain as a bulwark against German National Socialism in the North, we have shown the citizens of those nations that not only are their governments willing to negotiate with a fascist nation, they are willing to join an alliance to fight alongside one.\n\nWe have made ourselves look tame to the democracies of the west, and in doing so have gained a foothold in the minds and political spaces of their populations. While it would be a stretch to say that any of these nations are willing to embrace fascism, this is certainly an important first step."

 ITA_The_Rome_Pact: "The Rome Pact"
 ITA_The_Rome_Pact_desc: "Italy can longer allow itself to be dominated by other major powers in Europe. We have proven that we are a nation worthy of respect and admiration. Becoming a subordinate in an alliance with other major powers is beneath us.\n\nAustria and Hungary have been good neighbours and trade partners with us for years. With our good relations, their relatively small sizes, and their safety and security being compromised by the looming German threat on the Austrian border, they are the perfect candidates to be the foundation of our new organization, the Rome Pact. Building off the Rome Protocols we signed not long ago, Italy can finally have a vehicle through which to extend its political and military power throughout Europe."

 ITA_Revive_The_Roman_Farmer_Soldier_Ideal: "Revive the Roman Farmer Soldier Ideal"
 ITA_Revive_The_Roman_Farmer_Soldier_Ideal_desc: ""

 ITA_Pact_With_Albion: "Pact With Albion"
 ITA_Pact_With_Albion_desc: "Despite our differences in opinion on political matters, Great Britain is a nation that deserves our respect. A nation that single-handedly dominated the 19th century, far surpassing all others in its industrial and economic prowess, and in the process building up one of the most powerful navies and colonial empires in history. Though Great Britain is nowhere near as ascendant and powerful as it had been before the First World War, it remains a strong nation at home in Europe and abroad.\n\nIf we could only come to some sort of trade agreement or political alliance with them, it is certain that we would both benefit."

 ITA_Further_Cooperation_With_Gaul: "Further Cooperation With Gaul"
 ITA_Further_Cooperation_With_Gaul_desc: "If we are to pursue relations with any nation on the European continent, it should be France. The monster of Europe that once nearly subjugated all of its enemies under Napoleon, and came back to rival Britain’s colonial empire not a few decades later. The lands Caesar once conquered with ease have become a power unto themselves.\n\nIf we could secure the border we share with France with an alliance, it would free up our own troops to focus on a potential invasion from the north, or allow us quick access to a German front coming down through Alsace or the Benelux. Continental Europe shall be at our beck and call!"

 ITA_Look_Over_to_Hispania: "Look Over to Hispania"
 ITA_Look_Over_to_Hispania_desc: ""

 ITA_In_The_Footsteps_of_Giant: "In the Footsteps of Romulus"
 ITA_In_The_Footsteps_of_Giant_desc: "Nearly 2000 years have passed since the conclusion of the Gallic Wars. Over the course of eight years, the brutish Gaul was beaten back, and civilization was enforced upon his lands. True civilization, not the backwater tribal confederations that had existed before the Romans came. It is for that same reason that Italy once more must embark upon a new conquest of French lands.\n\nTheir people languish under the degenerate rule of plutocrats and capitalists. We know that under a strong leader, France can become great. Under the Romans, Gauls became a productive and peaceful place, and under Napoleon, France grew to control most of mainland Europe. Much like the Romans brought civilization to Gaul, we too shall bring Fascism to France."

 ITA_Align_With_Mitteleuropa: "Align With Mitteleuropa"
 ITA_Align_With_Mitteleuropa_desc: "Time and time again, we tried to collaborate with the so-called democracies of the old continent to no avail. The United Kingdom and the French Republic, ever concerned about the ‘peace and stability’ of Europe, failed to see the future that is fascism. The Germans, however, have shown their willingness to not only accept our ideology but also our ambitions. It is only natural, then, to pursue closer ties in the form of an alliance, pledging to help each other in fulfilling our goals.\n\nConcessions will have to be made by each side where conflicts of interest arise, of course. Dropping Italia’s interest in Austria will certainly please the Germans, and will make a fine enticement to begin negotiations. Compromise is of utmost importance if we wish to maintain a productive relationship with our northern friends. "
 ITA_Aliging_with_Germany: "We §Yshall strengthen§! our relations with §gGermany§!"

 ITA_Ask_for_Diplomatic_Support_Against_Yugoslavia: "Diplomatic Support Against Yugoslavia"
 ITA_Ask_for_Diplomatic_Support_Against_Yugoslavia_desc: "During the Great War, the British and the French, as stipulated in the Treaty of London of 1915, promised us large territorial gains if we abandoned our commitment to the Central Powers and joined the conflict on their side. Hundreds of thousands of deaths later, the end of the war saw us being betrayed by our ‘allies’, many of the agreed-upon lands instead becoming part of Yugoslavia whilst we received for our sacrifice only comparatively modest terra firma.\n\nWith a rapprochement having taken place between us and the two colonial powers, it is time to correct the ‘Mutilated victory’. We shall ask the United Kingdom and France to help us gain what is rightfully ours, that is the Adriatic Yugoslavian territories pledged to Italia 20 years ago. This time, we hope, justice will prevail."

 ITA_Hardline_Against_Germany: "Hardline Against Germany" 
 ITA_Hardline_Against_Germany_desc: "Ever since they have taken power in Germania, the NSDAP and, more importantly, Adolf Hitler, has proven to be hellbent on obtaining what they claim to be rightful ‘Aryan territory’. Any sane person would understandably call such a mindset delusional, but such lunacy is very dangerous, especially when an entire nation is lead by those who believe in it. While we are not yet a target of German expansion, no one can deny that if they obtain what they covet, it wouldn’t be long before we find ourselves looking down the Wehrmacht’s gun barrel.\n\nItalia’s stance on the Third Reich must be clear: we will not tolerate the warmongering of a nation that only 20 years ago sought to kneel the entire continent!"

 ITA_Reinforce_Our_Relationships: "Reinforce Our Relationships"
 ITA_Reinforce_Our_Relationships_desc: "Our rekindled friendship with the West is certainly a boon that gives us plenty of advantages, especially against a bellicose Germany. As recent examples have shown, however, Francia and the Regno Unito have a tendency to abandon those they claimed to protect or help. Relying on the platitudes of others is a grave mistake, one that we are painfully familiar with. We shall not dig our own grave.\n\nTo expect the help of others while they have nothing to lose is a reality we find ourselves in, and one we have to change. Trade acts, joint military exercises, intelligence sharing, these, and more, will be sought with the British and the French. Making us as indispensable to their well-being as possible will make them have second thoughts before they throw us under the bus just so they can ride it a little longer."

 ITA_Towards_a_Latin_Axis: "Towards a Latin Axis"
 ITA_Towards_a_Latin_Axis_desc: "We have no interest in battles of belief, such as the ones that are about to be carried by our fellow European powers. All we desire is our rightful lands, nothing more, nothing less. Nevertheless, events outside of our control seem to slowly drag us into the coming war. Our interests will, sooner or later, clash with one camp or another.\n\nThankfully, we are not alone in our prospects. Fellow descendants of Rome, likewise caught between a rock and a hard place, are not too keen in partaking in what will amount to a pointless massacre. Alone, we might not be able to deter the bellicose nations, but together we can prove to be a far more potent international player, capable of choosing our own path. From the Atlantic to the Black Sea, the Latin Axis will represent the interests of the various members that are about to enter it. And we, as the obvious leaders of this alliance, will make sure our fellow sister nations are shielded from the ravenous eyes of the continent’s vultures."

 ITA_The_Balkan_Strategy: "The Balkan Strategy"
 ITA_The_Balkan_Strategy_desc: "The Balkans are, as they have always been, a divided place, rife with conflict, seen and unseen. This is a weakness, working against the interests of not only its nations but the world as seen 20 years ago. No empires have been able to successfully subdue the ferocious spirit that lies in the people of this area. None except Rome. Bringing peace and stability to the area, the Romans ushered in what is perhaps the only time in history in which the peninsula enjoyed relative prosperity.\n\nAs we are Romulus’s heirs, it is only right we bring the benefits of our rule to the suffering people of this most unfortunate place. They might not desire it, but they didn’t want it the first time either. Pax Romana will make itself known anew, with all the glory and happiness which accompanies it."

 ITA_Expand_Our_Influence: "Expand our Sphere of Influence"
 ITA_Expand_Our_Influence_desc: "While our valiant Regio Esercito could dispatch any Balkan 'nation' that dared to oppose us, war is extremely unpopular. That is why we will first seek Balkan hegemony through diplomacy rather than war. Greece, in particular, will be our first serious target. Adding them to our influence as a large nation with a healthy population will reap numerous benefits. To keep Greece under control, we need an outpost in the Aegean Sea. Taking those islands would not only provide us with a prime point from which to strike Greece if they try to reject our gracious guidance, but it would also provide us with a launchpad from which to strike Turkey and what lies beyond."

 ITA_Preventive_Measures_in_the_Mediterranean: "Preventative Measures in the Mediterranean"
 ITA_Preventive_Measures_in_the_Mediterranean_desc: "The curtain is rising once more. The shadow that has stalked the continent for the last 20 years has at last showed itself in all its terror. Germany, it seems, has learned nothing from the suffering it has endured and has decided to plunge Europe into an era of turmoil a second time. We are firmly on the side of the free world, ready to defend a way of life that is so precious to not only us but also countless people across the Globe.\n\nIt is our duty to repel any attempt by the Third Reich to expand its territory, along with its sickening ideology. To fulfil Italia’s commitment to stopping the Germans, though, we need to be able to protect those who can not defend themselves. The Mediterranean, our sea, is full of nations incapable of mounting an effective resistance against any serious military power. To mitigate this unfortunate situation, we will ask the British and the French for permission to occupy such weak countries, only until the German threat is no more, of course."

 ITA_Take_Down_The_Plutocratic_Nations: "Take Down the Plutocratic Nations"
 ITA_Take_Down_The_Plutocratic_Nations_desc: "Rome always had enemies. The Gauls and the Britons were some of the most ferocious adversaries, stymying Roman expansion for an impressive time. Alas, Aeneas’s men could not be stopped, and their people were incorporated into the empire.\n\nThe names might have changed over time, but the situation has not. The British and the French, possessing much land around the Mare Nostrum, are denying us our legacy and birthright. Unfortunately for all parties involved, war is the only way to gain what is rightfully ours. Even more unfortunately for them, Romulus’s spirit is awakened afresh, while their glory days are long gone.\n\nIt is time for the true heirs of Rome to restore the Pax Romana. Roma Invicta!"

 ITA_Rescure_Italic_Business: "Rescue Italic Business"
 ITA_Rescure_Italic_Business_desc: ""

 ITA_A_New_Autarkic_Initiative: "A New Autarkic Initiative"
 ITA_A_New_Autarkic_Initiative_desc: ""

 ITA_Acquire_Hydroelectric_Power: "Acquire Hydroelectric Power"
 ITA_Acquire_Hydroelectric_Power_desc: ""

 ITA_Nationalise_Strategic_Industries: "Nationalise Strategic Industries"
 ITA_Nationalise_Strategic_Industries_desc: ""

 ITA_Reduce_Work_Hours: "Reduce Work Hours"
 ITA_Reduce_Work_Hours_desc: "By reducing work hours we will boost the morale and wellbeing of our workers, which will lead to them being more productive and efficient at work. It will furthermore be possible to manage the workers' performance by allocating more hours to higher-performing workers and fewer hours to the less efficient ones. Lastly, it should also attract more people, domestic and foreign, to work in our factories, which will increase our employment rate and boost our civilian and military industry.\n\nLet the hard-working people of Italy rest a bit so that when the time comes where we desperately need them, they will be there, motivated and ready"

 ITA_Institutionalize_IRI: "Institutionalize the IRI"
 ITA_Institutionalize_IRI_desc: ""

 ITA_Autarkic_Steel_Mills: "Autarkic Steel Mills"
 ITA_Autarkic_Steel_Mills_desc: ""

 ITA_Take_Over_Shipbuilding_Industry: "Take Over Shipbuilding Industry"
 ITA_Take_Over_Shipbuilding_Industry_desc: ""

 ITA_Impero_Coloniale_Italiano: "L'Impero Coloniale Italiano"
 ITA_Impero_Coloniale_Italiano_desc: "Italy wasn't united when the Race for Africa started. As a result, we were excluded from the conflict, and by the time we came together, there were very few locations left on the Continent. Eritrea and Somaliland were really meagre consolation prizes. That's why we seized possession of our Empire. The first was Libya in the early 1900s against the faltering Turkish Empire, and Ethiopia more recently. We need to develop these lands now that we have them. They are currently a backwater, undeveloped, and so useless that the blood and wealth expended to acquire them are nearly worthless.\n\nThey must first be modernised in order to catch up to Europe's rapid development. Even our most \"developed\" colony—if you can call it that—is currently a rural money-sink. In order to introduce civilization to these arid territories, new roads will be paved, trains will be constructed, and facilities will be set up. Then our own kind hearted people will move in to assist these individuals in eventually reaching their full potential. Then—and only then—can we actually start to receive our money back."

 ITA_A_New_Governor_General: "A New Governor General"
 ITA_A_New_Governor_General_desc: "Tripolitania and Cyrenaica were the two independent colonies that made up Libya until recently. But this situation can't continue. Because the provinces are so big and poorly inhabited, it is both impractical and ineffective to rule them independently. Therefore, both colonies have been combined into the larger Colony of Libya, which is the name chosen for the Greek word for all of North Africa aside from Egypt, by the Grand Council of Fascism. Of course, this new colony will require a Governor General, and Mussolini has a choice in candidates.\n\nFirst is famous aviator Italo Balbo has a flamboyant demeanour and a desire that rivals the Duce. Unfortunately, Mussolini sees him as a threat because of this. Therefore, although the position would be ostensibly a promotion, it is obvious to those in the know that it is actually a form of internal exile until his popularity wanes.\n\nThe other option is Rodolfo Graziani, the Iron Marshal who conquered Ethiopia. Since he did so well in East Africa, why not in the eternally rebellious Libya, which is so often plagued with native uprisings. Sure his methods are rather harsh, some would even claim barbaric, but they are no doubt effective. Maybe what Libya needs is an iron fist rather than a velvet glove."

 ITA_Construct_the_Litoranea_Libica: "Construct the Litoranea Libica"
 ITA_Construct_the_Litoranea_Libica_desc: "The colony's lifeline is the Libyan shore. Without it, the colony's other components are utterly useless. A variety of roads, some paved and some not, some multilane and some little more than a path in the sand created only from frequent use, connected the several villages and communities along the coast up until this point. This terrible situation needs to be changed if Italy wants to make Libya a colony worth possessing. The Litoranea Libica is being built for this reason, according to the Governor General. From the border with Tunisia to the border with Egypt, a massive, paved expressway will follow the coastline.\n\nWith the help of this well-built, well-maintained road connecting all the Libyan cities, we intend to promote higher economic output and further connect the various regions of the colony like the threads of a spider's web. The road's construction will undoubtedly be challenging, but Italy has never been deterred by difficulty before, and once it is complete, it will rank among Africa's greatest engineering achievements."

 ITA_Establish_the_Africa_Orientale_Italiana: "Establish the Africa Orientale Italiana"
 ITA_Establish_the_Africa_Orientale_Italiana_desc: "As a result of the conquest of Ethiopia, we now have a sizable colonial presence in the Horn of Africa. This has made direct administration of these territories extremely difficult. Ethiopia presents a new challenge due to its massive population and rebellious people, as opposed to Eritrea and Somaliland, which are relatively easy to maintain control over. To better manage the region, we will reorganise the colonies of the Horn, Eritrea, Somaliland, and now Ethiopia, into a new colonial government. Like India was to the British and Algeria was to the French, Italian East Africa is to be Mussolini's crowning achievement, the jewel in his new Imperial crown.\n\nWhen we're finished, they won't be entirely Ethiopians committed to some made-up tribal identity, but rather proud Italians eager and ready to serve Rome to the best of their abilities. Even though it will be difficult, nothing is impossible when the iron will of fascism is behind us. Ethiopianism must be destroyed, just as Ethiopia has been destroyed."

 ITA_The_Italian_Negus: "The Italian Negus"
 ITA_The_Italian_Negus_desc: "Our King, Victor Emmanuel III, is normally unproblematic. At over 60 years old, he is merely a rubber stamp, a figure we can parade around to gain support. Despite his meekness, Mussolini isn't yet naive enough to dismiss him completely. If he ever turned his back on us, it would be simple for him to get rid of us. Mussolini is now officially under his command, and with the utterance of a single word, he is gone. Platitudes and titles are the only things a King could possibly want, so we must give them to him. By our own volition, we have already installed him as Albania's king. He will, however, be given a new one.\n\nDuring a ceremony in Rome, he will receive the Crown of Solomon, assuming the new title of Negus of Ethiopia and adding to his long list of achievements. It will not only appease the old bag of bones, but it will also show the rest of the world our long-term commitment to Ethiopia. Nobody, not the French, not the British, and certainly not the ineffective League of Nations, will be able to deprive us of our honour."

 ITA_Develop_the_Cities: "Develop the Cities"
 ITA_Develop_the_Cities_desc: "There are pockets of civilisation along Libya's coast, despite the fact that the remainder of the country is nothing but hostile desert sprinkled with hostile tribe-controlled oases. The twin cities of Tripoli and Bengasi are situated on the opposite ends of the coastal population belt. A large portion of Libya's population is located between them, making their continuing rule and prosperity essential to our colonization objectives. In order to ensure that both of these cities' prospering economies never falter and to lure more well-behaved and obedient Italian settlers to the Fourth Shore, we shall initiate a number of development programs in both of them."

 ITA_Construct_the_Via_Balbo: "Construct the Via Balbo"
 ITA_Construct_the_Via_Balbo_desc: ""

 ITA_End_the_Pacification: "End the Pacification"
 ITA_End_the_Pacification_desc: "Locals and Senussi natives, primarily a tribe in Cyrenaica, have fought Italian troops ever since they entered Libya. Since Mussolini came to power, the war has flared up once more after years of intermittent fighting. This is so that Mussolini may complete his aim of crushing the Senussi completely, opening up all of Libya to Italian colonialism. He has done reasonably well at this duty. The Senussi were blocked off from outside support by a barbed wire barrier, and then their local base of support was destroyed when up to 100,000 people were sent to detention camps.\n\nThe Army utilized brutal force and chemical weapons at the same time to ultimately remove the taint of resistance. The horrific conflict, in which up to a third of Cyrenaica's inhabitants may have perished, according to some of our analysts, is finally coming to a conclusion. Their leader is dead, their people are in camps toiling away to the bone in the vain hope of achieving freedom, and those who are left are too battered and terrified to oppose us. By our graciousness, Libya may now enjoy peace."

 ITA_Piccola_Roma: "Piccola Roma"
 ITA_Piccola_Roma_desc: "Because of the focus on Ethiopia, our original colony in Eritrea has recently suffered from neglect. This cannot continue because it is the only way for our armies and influence to reach the entire country of Ethiopia. Asmara, Eritrea's capital, is a small city with a small population. This has limited the items we can import through the colony. To correct this, we have already begun sending colonists to the city. Asmara's skyline has already changed dramatically as a result of Italian immigration, resembling a city in Umbria or Calabria rather than the Horn of Africa. Piccola Roma, or Little Rome, derives its name from its Italian design.\n\nHowever, we will not be satisfied with simple architectural changes. Asmara will become a true industrial hub, similar to those in the Northern Peninsula. Previously, many awards were given to hardworking settlers who had ideas for manufacturing various goods. It would improve the colony's economy and independence while also improving its historically poor performance. Because shipping products from Italy to the Horn is expensive, the less we have to send, the more money we may save."

 ITA_Cittadinanza_Italiana_Speciale: "Cittadinanza Italiana Speciale"
 ITA_Cittadinanza_Italiana_Speciale_desc: "Not all the Muslim Italians in the area rebelled against us when we civilized Libya. In fact, a few people have joyfully embraced our rule and made significant progress assimilating into Italian society. They have picked up our language, adhere to our rules, and some even worship our god. If this innovative thinking is to be promoted, it needs to be rewarded. As a result, we altered Italy's citizenship rules, per the Duce's directives, to permit those Libyans who can read and write Italian and who have bravely and devotedly served Italy to become Italian citizens.\n\nThey will, of course, be granted all the rights and advantages accorded to all Italian citizens upon receiving this greatest of distinctions. This includes receiving positions in the Libyan government, but only in Libya. Naturally, they won't be permitted to govern over Metropolitan Italians; doing so would be absurd and could give them false impressions about their actual social standing. Instead, by placing Libyans in the lower echelons of the colonial administration, we may, hopefully, extinguish the lingering embers of native resistance while also inspiring others to follow their example."
 ITA_Cittadinanza_Speciale_Troops_tt: "§gLibyan Divisions§! £helmet_icon_1_20x20  will be deployed in §YTripoli§! and §YBengasi§!"

 ITA_Linea_Dellimpero: "Linea dell'Impero"
 ITA_Linea_Dellimpero_desc: "Our national airline has begun a new route in our quest to build a colonial empire to be proud of, from the pieces we have taken. The Imperial Road connects Rome to Bengasi, then to Asmara, Addis Abeba, and finally to Mogadiscio. The route will transport passengers and mail to all of our Empire's major cities. As the airline's crown jewel, it has received extensive national and local news coverage. Easy air access to these remote locations will not only bring our Empire closer together, but will also make colonisation of these regions easier."

 ITA_Build_the_Imperial_Road: "Build the Imperial Road"
 ITA_Build_the_Imperial_Road_desc: "The infrastructure in Ethiopia is a myth. While there are many paved roads in Addis Abeba, once you leave the city, the roads quickly turn to dirt paths. These are not appropriate routes for an imperial force like ours. It's not just humiliating; it's also a financial liability. Because these tracks are mostly one lane, trucks must slow down and frequently become stuck in traffic jams.\n\nOur response to Ethiopia's lack of development will be the construction of the brand-new Imperial Road. The extension from Addis Abeba to the port cities would not only make it easier to transport goods to the ports, but it would also bring the three colonies together. Furthermore, and perhaps most importantly, it will win us favour with the locals. Many of them still regard us as hostile intruders and fight us with shot and shell whenever they have the opportunity. Even though building a few roads will not make millions of irate Ethiopians fall head over heels in love with us, that is not what we require. Passivity is what we require, and it will arrive quickly if people can gain easier access to the creature comforts that we will bring to this desolate wilderness."

 ITA_Ethiopian_Hydroelectricity: "Ethiopian Hydrolelectricity"
 ITA_Ethiopian_Hydroelectricity_desc: "Ethiopia has many rivers. Even the Nile, the most powerful of them all, begins as the Blue Nile from Lake Tana in Ethiopia. The importance of energy grows exponentially year after year, and the same is true of its potential sources. Water is one of these resources that is almost as old as humanity. We have used it for propulsion since ancient times, and today we can harness the power of that most precious of resources to create an infinite supply of power.\n\nThen, using this energy, modernity, motorization, and electricity can be brought to a place where all three are desperately lacking. Everything has been hampered by the lack of motorised transportation in the countryside. By providing such a modern convenience to the entire countryside, we will increase the colony's economic output and gain favour with the populace. How can we be such horrible people if we lighten their load?"

 ITA_Annex_la_Quarta_Sponda: "Annex La Quarta Sponda"
 ITA_Annex_la_Quarta_Sponda_desc: "Italy has a lot of \"shores\". The First Shore, which consists of our Adriatic Coast, the Second Shore, which is our Tyrrhenian Coastline, and the Third Shore, which is the conquering of the Balkan shoreline along the Adriatic, are the first three shores. However, The Fourth Shore is both the most recent and most foreign to us. It comprises Libya, our first colonial acquisition and the foundation for our larger Mare Nostrum project.\n\nAs with any colony, we have maintained Libya at a distance up until this point. But thanks to our efforts, the colony is gradually becoming an essential component of our state. It is inhabited by Italians, can read and write in Italian, honourably and valiantly serves the Italian state, and is a significant economic gear in the huge machine that is our country's economy. Losing it would strike at the very heart of our country and our sense of identity. Because of this, we will now formally elevate the area from its current status as a lowly colony to one that is just as much a part of the Italian State as Sicily or even Rome."

 ITA_Ambitions_on_the_Horn: "Ambitions on the Horn"
 ITA_Ambitions_on_the_Horn_desc: "The Horn of Africa is at war. An opportunity has arisen as Italian forces clash with French and British forces from Provence to Tunis to Libya. We control the majority of the Horn, but the British own the northern part of Somalia, and France maintains a presence in Djibouti, which is important both economically and strategically. If we are to maintain control over our holdings in East Africa, we must destroy enemy influence.\n\nThese colonies are not well guarded. There are only a few regiments in British Somalia, and none in Djibouti. By taking them, we would gain security, but we would also jeopardise the English connection to the rest of their Asian Empire. Djibouti is located at the mouth of the Red Sea. It is strategically located to block off a vital shipping route, such as Singapore to the east or Gibraltar to the west. Taking it would give us a great vantage point for blocking ships entering and exiting the Suez Canal. When we take the Canal, our entire journey will be cut in half."

 ITA_Rescue_Italic_Businesses: "Rescue Italic Businesses"
 ITA_Rescue_Italic_Businesses_desc: "Ever since the disaster of depression, we have been trying to rescue our economy from completely failing. Although our public welfare and infrastructure programs have been largely helpful in providing employment opportunities, our banks are still in disaster due to the large amount of money they lent to the industry. We must save them as well as many large industrial companies from complete failure.\n\nTo achieve this we must bail out failing firms and provide capital for new industrial investment, It is time to establish new management: Institute of industrial reconstruction (IRI) to deal with this"

 ITA_Place_Federconsorzi_Under_Government_Control: "Place Federconsorzi under Government Control"
 ITA_Place_Federconsorzi_Under_Government_Control_desc: "The modernization and expansion on the agricultural front are crucial for our shift towards autarky, and in this front, Federconsorzi has been largely helpful, but their huge autonomy and the lack of coherent national organization have made distribution on a national level quite difficult.\n\nIf we are to reach an autarkic initiative for grain production and general management must be established so we can better manage the production and distribution of grain on a national level. Time to place them into government control for better management"

 ITA_Improve_Labor_Conditions_For_Women: "Improve Labour Conditions for Women"
 ITA_Improve_Labor_Conditions_For_Women_desc: "With the adoption of law number 653 the admission of women to unhealthy, underground, nocturnal or other jobs that are deemed “morally dangerous” will be limited. Furthermore, for women who have reached the age of 15, the working time cannot exceed 11 hours a day.\n\nThis should show the women of Italy that we have not forgotten them and care about them. This will also significantly boost the morale and well being of our female workers, which will, in turn, cause an increase in productivity and support for the government."

 ITA_Adopt_Law_on_Child_Labor: "Adopt Law on Child Labour"
 ITA_Adopt_Law_on_Child_Labor_desc: "For too long have we turned a blind eye to child labour. It is time we adopt a law that will forbid child labour. After all, these children are the future of Italy and will one day fill the place of the old generation. This will not only open up new employment spaces but will also allow us to better influence the new generation. These children should learn to love their country, not slave away in some factory. \n\nLet the old generation work, while we educate these children on Italian values and principles so that in the future we will have a loyal and strong generation, willing to work and give their life for Italy."

 ITA_Introduce_Currency_Control: "Introduce Strict Currency Control"
 ITA_Introduce_Currency_Control_desc: "A further measure to combat the Great Depression is the introduction of foreign exchange controls. We will abandon the fixed rate of the lira and restrict the amount of currency that may be imported or exported. We will also ban the usage of foreign currency within our country and ban locals from possessing foreign currency. \n\nFurthermore, we will be restricting currency exchange to government-approved exchangers. These controls will allow us to better manage our economy by controlling the inflow and outflow of currency, which may otherwise create exchange rate volatility."

 ITA_Bank_Law_of_Nineteen_Thirty_Six: "Bank Law of 1936"
 ITA_Bank_Law_of_Nineteen_Thirty_Six_desc: "The Italian banking system desperately needs reform. As things stand today, the entire industry is a jumble of short and long term banks that can do a lot of things that they can't do anywhere else for good reason. Mussolini has found it necessary to reform this system to a more modern standard as he seeks to lift the Italian economy to new heights. The new Banking Law of 1936 is a broad document that limits banks' activities and severs the deep financial ties that banks have with the industries they support. This legislation includes common sense regulations such as prohibiting banks from serving on company boards, instituting specializations for banks in temporal, institutional, and operational credit, and establishing a government agency to oversee credit activity. All of this will work wonders to clear the cobwebs from the system and make the entire industry a better system for everyone involved."

 ITA_Fascization_Of_Confindustria: "Fascization of Confindustria"
 ITA_Fascization_Of_Confindustria_desc: "With the new Director Volpi in charge, a major industrialist and Fascist since 1922, it is time that we take matters into our own hands and steer the Italian economy in a way that will align with our interests. \n\nThis should be a fairly easy task, seeing how the leaders of the Italian production world view Mussolini as a modernizer and beneficial to their interests. We will enact anti-inflationary measures, perform a revaluation of the lira and strive to attract more foreign investors, but will also be sure to protect domestic Italian manufacturers through protectionism."

 ITA_Abandon_Fixed_Rate_of_Lira: "Abandon Fixed Rate of Lira"
 ITA_Abandon_Fixed_Rate_of_Lira_desc: "It is time we take further measures to combat The Great Depression. By abandoning the fixed rate of Lira and instead introduce a floating rate, we will be able to dampen the effects of The Great Depression. A major advantage of a floating exchange rate is that we avoid the possibility of a currency crisis and therefore avoid forced devaluation.\n\nA forced devaluation will change the exchange rate by more than the day-by-day exchange rate fluctuations under a flexible exchange rate system. If we want to end the Great Depression it is therefore important we abandon the fixed rate of the Lira unless we want to find ourselves in yet another crisis."

 ITA_Omodeos_Electro_Irrigation_Plan: "Omodeo's Electro-Irrigation Plan"
 ITA_Omodeos_Electro_Irrigation_Plan_desc: "Access to cheap energy sources is crucial to the economic progress of the state. Too long have the Italian people been left in the dark while the rest of Europe advanced into a new age of electrification. In order to boost civilian and military industry, proposals based on early ideas of engineer Angelo Omodeo outline the construction of dams in Northern Italy at the Vajont and Cormor River. Cheap energy produced from these dams could increase the efficiency of factories, allowing for a higher capacity of machinery to be employed.\n\nConstructing these hydroelectric dams would not only benefit plans for electrification, but they would also create new employment opportunities in the region."

 ITA_Unification_of_Electricity_Networks: "Unification of the Electricity Networks"
 ITA_Unification_of_Electricity_Networks_desc: "To truly harvest the power of industrial electrification, a statewide solution must be implemented. New power grids being built across the peninsula will light up every street corner, factory, and house. In many places, people will ascend from darkness and finally enjoy the fruits of technological innovation.\n\nRural backwater towns will transform into vibrant bustling hubs for commerce and transportation, further integrating previously neglected regions. Foreigners will be forced to recognize Italy as a modern, economically independent player on the European stage."

 ITA_Expand_OCI_Production: "Expand OCI Production"
 ITA_Expand_OCI_Production_desc: "The Fiat OCI is a treaded tractor that was originally designed to assist the Italian Army in dragging artillery pieces up mountains. It has been used successfully in Ethiopia and Libya, and the Air Force has requested some to help drag planes around runways. However, the tractor has previously only been manufactured in a single factory in Modena. Only this one factory produces far too few for us to use as widely as we would like. We must immediately increase production of such a critical machine. Fiat will be incentivised to open more factories across the country dedicated to the production of the OCI. It will not only allow for more of these tractors to be manufactured, but it will also create more jobs for the people."

 ITA_Sell_Isotta_Fraschini_to_Ford: "Sell Isotta Fraschini to Ford"
 ITA_Sell_Isotta_Fraschini_to_Ford_desc: "A global symbol of wealth, Isolatta Fraschini dominated the market for luxury cars during the early part of the century. However, after being financially crippled by the Great Depression, the famed automaker has experienced stagnant growth.\n\nAn offer to purchase the company by Ford has the potential to revitalie the Italian auto industry while also introducing new production techniques to increase efficiency."

 ITA_Standardization_of_Vechicle_Models: "Standardisation of Vehicle Models"
 ITA_Standardization_of_Vechicle_Models_desc: "Currently, locally produced vehicles come in a range of different specifications and models. Mass production of these disparate vehicles would be both costly and logistically impossible. \n\nStandardizing various vehicles to use similar components can increase production efficiency and lower costs."

 ITA_Serpieri_Acerbo_Law_on_Land_Expropriation: "Serpieri-Acerbo Law on Land Expropriation"
 ITA_Serpieri_Acerbo_Law_on_Land_Expropriation_desc: "A strong agricultural base is the bedrock of any true modern nation. Unfortunately, the Italian Peninsula lacks arable land, as the majority of the Peninsula is part of the mountainous Apennine Range. We have very little farmland, which is concentrated in the far south and far north. However, some of the citizens' lands are not being used to their full potential. They are either underutilized or not farmed at all. We cannot continue to allow such waste. So, in the interest of the State, we will pass legislation allowing the State to seize any land that it deems underutilised. This land will then be given to the Opera National Combatants and War Veterans to be given to those warriors of the Great War who were abandoned and left destitute by the previous government. Those who fight for this land, like the Legions of old Rome, will now be able to use it."

 ITA_Mechanization_of_Agriculture: "Mechanisation of Agriculture"
 ITA_Mechanization_of_Agriculture_desc: "Even though man is the most perfect machine, he requires assistance. Much of Italy's farmland is farmed with hand tools or oxen-drawn ploughs. This significantly slows the pace of work and limits the output of these farms. The solution is obvious if we want to increase crop yields. We must subsidize Italian agricultural mechanization. It will aid not only in the purchase of tractors, but also in the mechanization of all levels of the supply chain. Farmers will be given numerous opportunities to use cutting-edge technology. Some believe that this program exists solely to improve the lot of the average Italian; of course, a farmer who farms more will be more prosperous. Mussolini wants Italians to prosper, but he also actually needs Italy to be self-sufficient. If war breaks out in Europe, food may become scarce, and he does not want Italy to go hungry."

 ITA_Drain_the_Swamp: "Drain the Swamps"
 ITA_Drain_the_Swamp_desc: "The Pontine Marshes have been a liability for our economic growth and water supplies, and created a malaria problem for the country, we shall conduct a grand project to combat this situation. We must completely overhaul the terrain and clear way the potential source of diseases.\n\nWe must start by draining and refitting the swamps to make them more habitable and then regulate the water sources. Opera Nazionale Combattenti shall oversee the project and the mobilization of the labourers necessary."

 ITA_Inaugurate_New_Cities: "Inaugurate New Cities"
 ITA_Inaugurate_New_Cities_desc: "Our swamp draining and terrain refitting project has been successful in general and now it is the time we step into the next stage of the project. Settling project shall begin with the constructions of homesteads and public utilities, lands shall be parcelled among settlers, then works against mosquitoes must begin, with screens and whitewash, In the end, public health service shall be established to get rid of malaria from the place.\n\nWith enough time we would be able to establish entire new cities atop of these once inhabitable swamps."

 ITA_Parola_dOrdine_Autarchia: "Parola d'Ordine \"Autarchia\""
 ITA_Parola_dOrdine_Autarchia_desc: "Our adventures in Africa and interest in Spain have made us a pariah to the rest of the world. To the West, we are nothing more than an expansionist threat to global peace, and as such, we have faced severe sanctions. Of course, it is not enough to bring our economy to its knees, but it has not left us unscathed. The seismic shocks that our economy experienced when the sanctions were first imposed awoke Mussolini to the true threat that reliance on foreign trade posed.\n\nIf Italy was completely reliant on the rest of the world for survival, we would have to submit to its will. That would imply giving up our recent gains in Albania, Ethiopia, and possibly Libya! We cannot allow this to happen. We must protect the economy from the rest of the world through direct investment and protectionist tariffs. We must truly implement Autarky!"

 ITA_Fiance_RIEC_Radar_Research: "Finance RIEC RADAR Research"
 ITA_Fiance_RIEC_Radar_Research_desc: "Important work is being done at the RIEC in Livorno. Ugo Tiberio is hard at work developing cutting-edge science and creating Italy's own RADAR system. Since the invention of the airplane, warfare has literally taken on a new dimension, and detecting these planes as far away from their targets as possible has become critical. Not only that, but there are theories that the same principle could be applied to ships, revolutionising naval warfare. Every country with a notable research sector is attempting to perfect the RADAR system. If we want to stay ahead of the curve, we need to give Tiberio more money. As our brightest star in this field he is our only hope of staying ahead of the West."

 ITA_Gufo_Naval_Radar: "\"Gufo\" Naval RADAR"
 ITA_Gufo_Naval_Radar_desc: "Our efforts have paid off! We finally have a working radar after a lot of hard work and, more importantly, money. The Gufo, which means \"owl,\" is a naval radar designed to keep our ships operational at night. Our adversaries are already developing their own models, so if the proud Regia Marina is to retain its ability to challenge for control of the Mediterranean, it must develop its own model.\n\nEarly tests have been promising, and Tiberio, the Gufo's developer, has suggested that more tests be conducted, but this is not possible. Dozens are already ready to be installed on our ships, and many more are being built. With the conquest of the night, the Royal Navy will no longer presume its superiority over us!"

 ITA_Mobilitazione_RaRi: "Mobilitazione RaRi"
 ITA_Mobilitazione_RaRi_desc: "Following a series of successful and promising tests with our new radar technology, it is time to devote additional resources to the research and development of new radar technologies, as well as the construction of additional radar stations. We will use radar extensively in our military forces and day-to-day operations. The Gufo naval radar has proven particularly useful as a search radar for our naval crews, and we intend to improve it even further. This new technology will undoubtedly give us an advantage over our adversaries, especially if we use it to its full potential."

 ITA_Re_Establishment_of_IRI: "Re-Establishment of the IRI"
 ITA_Re_Establishment_of_IRI_desc: "The IRI, or Instituo per la Ricostruzione Industriale, is a massive organisation with a single goal: to help the Italian economy rebuild. After the economy was completely destroyed by the Great Depression, Mussolini wisely realised that it could not recover on its own. It was simply too exhausted to resume.\n\nHowever, nationalisation is Socialism, and the Fascists are no longer Socialists. So, the IRI was established to allow the government to take over failing businesses and banks without actually doing so. It will serve as a holding company, purchasing and then rescuing failing businesses deemed critical to the nation's economic health by the government. Already, the government has compiled a long and ever-expanding list of companies that must be saved. They may object to this blatant government intervention, but it is necessary if Italy is to recover from the Great Depression."

 ITA_Agreements_on_Guest_Workers: "Agreements on Guest Workers"
 ITA_Agreements_on_Guest_Workers_desc: "Germany requires labour to power its admittedly massive war machine. Italy has a surplus of workers. The Duce has recognized the opportunity for a deal and is taking steps to take advantage of it. Albert Speer has approached him about bringing Italian workers into Germany to fill positions left vacant by German soldiers marching off to war. These men will not only send their wages home to be invested in the Italian economy through consumer spending, but they will also gain valuable knowledge from a very productive people.\n\nAll the Duce has asked Speer for in return for his enormous generosity is military advisors. The German Army is one of Europe's best, and the Italian Army could always use some pointers. Speer readily agreed, and the promised advisors are already on their way to Rome to take up their posts."

 ITA_Electrification_Of_Railroads: "Electrification of Railroads"
 ITA_Electrification_Of_Railroads_desc: "While the old, clunky steam and coal trains are both inexpensive and functional, Il Duce is not satisfied. If Italy is to rise to greatness, its internal transportation system must become the most efficient in the world! Already, the Duce has ordered the construction of hundreds of miles of rail lines, with a focus on two major new routes connecting Rome and Naples, as well as Bologne and Florence.\n\nThis is only the beginning of his ambitious plan to transform Italy's railways into the most efficient in Europe, if not the world. To help achieve this, the plan includes the purchase of new electric trains. These trains, which are at the cutting edge of transportation technology, are quickly gaining a reputation for being both more efficient and longer lasting than their furnace-powered predecessors. While the initial costs are high, particularly for adapting existing lines to accommodate these new trains, the end result will be monumental."

 ITA_Develop_Porto_Maccarese: "Develop Porto Maccarese"
 ITA_Develop_Porto_Maccarese_desc: "With the expansion of the Regia Marina, additional ports are required to support its operations. Fortunately, Italy's position on a peninsula in the heart of the Mediterranean provides many existing facilities. These range from the major naval bases at La Spezia, Taranto, and Napoli to dozens of smaller anchorages scattered along the coastline. However, expanding them all will take a long time, which Italy does not have. Instead, the Navy has presented a number of ports that will be expanded.\n\nThe port at Maccarese is, of course, first on the list. As a small town, it does not appear to be an ideal location for a major port. However, Rome is only a few dozen miles away. With a major port so close to the capital, the navy will be able to station its best ships to protect our new Rome's beating heart from any seaborne threats. Not only that, but Mussolini, who has always kept a close eye on the development of the Navy, will find it easier to inspect his vast fleet. He won't have to fly from one end of Italy to the other to find the Navy; instead, he'll just drive to a picturesque port town."

 ITA_Expand_Porto_Marghera: "Expand Porto Marghera"
 ITA_Expand_Porto_Marghera_desc: "The Società Porto Industriale began constructing the large industrial zone of Porto Marghera in 1917, reclaiming lagoon land and constructing railways, navigable artificial canals, and roads. Every company in the area, in particular, has been linked to the national railway network via two railway branches.\n\nThe Vittorio Emanuele Canal, which connects the Maritime Station to Marghera, was inaugurated in 1922, and traffic began in 1925. Between 1920 and 1928, Marghera was home to 51 factories involved in the metallurgical, chemical, mechanical, shipbuilding, oil, and electrical industries.\n\nExpansion plans for Porto Marghera have been drawn up, which include the construction of additional factories as well as several railway parks."

 ITA_Expand_The_Macchi_Factory: "Expand the Macchi Factory"
 ITA_Expand_The_Macchi_Factory_desc: "Nieuport-Macchi is an Italian-French hybrid company. During the Great War it was a huge success, producing numerous French fighter planes for the Italian Air Force. It is still an important part of the Italian aviation industry. But Mussolini is a big-picture thinker who had bigger plans for Macchi's important Milan factory. Its emphasis on fighters and seaplanes imposes some constraints, but Mussolini ignored them. He has proposed that a significant tax write-off for Macchi will provide them with enough funds to expand in recognition of their patriotism during the Great War. When sufficiently bolstered, the Italian Air Force will be able to rule the skies in the same way that the Army will rule the ground."

 ITA_Expand_Pomigliano_DArco_Plant: "Expand Pomigliano d'Arco Plant"
 ITA_Expand_Pomigliano_DArco_Plant_desc: "Alfa Romeo is a manufacturer of custom automobiles. Its automobiles are among Europe's best-built and most expensive. It is unquestionably a national treasure of Italy. However, Italy requires planes rather than vehicles. The Italian government, which owns a significant portion of the company, has given Romeo permission to begin producing aircraft engines. Romeo, on the other hand, would prefer a brand-new facility to accomplish this. The largest and most technologically advanced mega-factory ever proposed in Europe has been displayed. Manufacturing workers would live in a new community built around it, similar to Wolfsburg, Germany, where Volkswagen is headquartered. It will take a long time and a lot of money to complete, but the company assures us that every lira will be worth it."

 ITA_Modernize_Capronis_Taliedo_Plant: "Modernise Caproni's Taliedo Plant"
 ITA_Modernize_Capronis_Taliedo_Plant_desc: "Leading the way in Italian aviation is Caproni. They produced aircraft for the Air Force during World War I, and after the war's end, they started producing aircraft for civilian use. They still have some military applications, though. As innovators by tradition, Caproni has garnered a lot of attention for some of its most recent creations. The Caproni Campini N1, also known as the CC1, was created by engineer Secondo Campini and Caproni in collaboration.\n\nCanpini has pleaded for assistance even if testing and even completion of the plane are still a ways off. By putting money into their pockets, they were able to develop the CC1 to the prototype stage as well as expand their production and produce more aircraft for the upcoming conflict with the Western democracies. Not only that, but if they are finished quickly enough, we could have the incredible privilege of becoming the first country to fly a jet-powered plane."

 ITA_Establish_ANIC: "Establish ANIC"
 ITA_Establish_ANIC_desc: "To truly achieve Autarky and self-sufficiency, we must first eliminate our reliance on foreign imports for our energy needs. We import 75% of our energy requirements! This is intolerable. To begin the process of producing home-grown Italian oil, the Azienda Nazionale Idrogenazione Combustibili, or ANIC, was established.\n\nHowever, because Italy lacks the massive oil fields of other countries such as the United States, we must follow in the footsteps of Germany and seek synthetic oil distilled from coal, most likely from Albania. However, Italy lacks the patents required to produce such critical resources. The German chemical giant IG Farben long ago patented all of the most effective methods. If we are to start building up our energy sector we must acquire the patents from IG."

 ITA_Establish_SAIG: "Establish SAIGA"
 ITA_Establish_SAIG_desc: "The majority of the world's rubber comes from natural sources, primarily vast rubber plantations in Africa and South East Asia. The United Kingdom and France, Italy's likely future adversaries, own all of those plantations. It would be foolish to continue relying on their favour to obtain rubber, a resource that is becoming increasingly valuable by the year. We must immediately establish a local rubber industry! Fortunately, the International Rubber Company of the United States has made a potentially game-changing discovery, at least for us.\n\nThey discovered that rubber can be extracted from the guayule shrub, which grows in their southern deserts. We discovered, through close collaboration with the IRC, that the guayule has taken quite well to the area around Cerignola in Puglia. We can start producing our own domestic rubber by farming this unique plant. To manage the project, we established Società Agricola Italiana Gomma Autarchica, or SAIGA, which controls both the guayule seeds and the process of turning the plant into rubber."

 ITA_Nationalize_Foreign_Investments: "Nationalise Foreign Investments"
 ITA_Nationalize_Foreign_Investments_desc: "Italy, like any other country, has foreign investors. These companies are either wholly owned subsidiaries of foreign corporations or joint ventures between foreign corporations and local, Italian corporations. However, the presence of foreigners in our economy is a knife in our throat. Their continued expansion places an increasing portion of our economy in the hands of non-Italians, leaving us at the mercy of the rest of the world. We must seize all foreign-owned businesses in Italy if we are to achieve autarky and truly free ourselves from our internationalist shackles.\n\nIt will be costly, but it is a necessary cost for our country's security. Our foreign ministry has also warned us about the international consequences of this act. This would significantly harm our standing among world powers and make the international community more hesitant to invest in our country in the future. Benito Mussolini, who is both Foreign Minister and Prime Minister, has assured these concerned citizens that he is aware of the consequences, but that Italy must proceed regardless."

 ITA_Introduce_General_Sales_Tax: "Introduce a General Sales Tax"
 ITA_Introduce_General_Sales_Tax_desc: "Until now, there hasn't been a general sales tax on all goods, and the taxes that do exist are usually at different rates depending on the goods. If the consumer does not know what the tax will be, they will be confused and hesitant to purchase products. Many people refuse to buy something if they are unsure whether they can afford it. We must address this issue in order to boost consumer confidence and make the entire purchasing process easier.\n\nStandardising taxes across entire sectors of the economy will also help to reduce Italy's infamous red tape and bureaucracy. Of course, we can't raise taxes too much because that would have the opposite effect. Not only that but the standardized taxes must be different according to the product. Buying a bag of beans should cost less after tax than buying a ton of steel. If we are to do this and do this right we must take our time and figure out just the right rate."

 ITA_Enforce_Food_Rationing: "Enforce Food Rationing"
 ITA_Enforce_Food_Rationing_desc: "If the Italians know one thing, it's food. Our cuisine is well-known throughout the world for its high quality and variety, and it is our most valuable cultural export. However, we are entering a difficult period. If we allow people to continue eating large amounts of carbs, we will starve quickly if a blockade is imposed in the event of war. We had already rationed some items, but the regulations were lax, and people flouted them with little fear of being caught.\n\nWe were content to let this go during peacetime, but with war on the horizon, we must close our iron fist. Rationing rules will be strictly enforced, and rationing will be extended to include more foods such as pasta. As we receive more imports from around the world, we will be able to stockpile enough supplies to keep us under siege for as long as necessary, until the blockade is broken or the war is won, whichever comes first."

 ITA_Battaglia_Della_Produttivita: "Battaglia della Produttività"
 ITA_Battaglia_Della_Produttivita_desc: "The Battle of Productivity is just the latest in a long line of Battles launched by the Fascist government. This Battle however is one of the utmost importance. The Italians have the spirit and the passion to win the coming wars. However spirit and passion do not win wars alone. A man must have the proper weapons to fight! Unfortunately only the northern half of the country is really industrialized, and those factories are still subject to repeated strikes, walkouts and lockouts. If we are to give our valiant fighters the tools needed to beat Italy’s enemies we must crush the remnants of the poisonous Union movement. However an iron fist will meet resistance so we will not jump to crushing them outright. Through paid incentives for increased output and reduced use, we can make the average Italian more productive than even the Germans... hopefully."

 ITA_Introduce_Three_Shift_Working_System: "Introduce a 3-Shift Working System"
 ITA_Introduce_Three_Shift_Working_System_desc: "Unproductive factories are those that are shuttered. Most Italian factories currently close at midnight and reopen at 8 am. Eight hours of missed productivity is something we can't stand to have. The Three Shift Work Day was the most promising of the factories' own solutions, which they had developed. While most places have two shifts, from 8 a.m. to 4 p.m. and then from 4 p.m. to midnight. With the new strategy, employees will work a third shift from 8 p.m. to midnight. This will increase production even more and keep the factories open twenty-four hours a day.\n\nThe factories will need to hire more people now that the new shift is in operation, which will help to cut our unemployment rates as well. Of course some have raised objections to this, as some always do. They point out that living the life of a night owl can be incredibly inconvenient since the third shift will have to sleep all day. When suggested that there might even be protests Mussolini could only respond \"At least they will be at night when nobody can see them.\""

######################################################################
#  Italy Spirits
