l_english:
######################################################################
#  Italy Events
######################################################################
 ITA_Ethiopian_War.0.t: "Pietro Gazzera Dismissed as Minister of War, Mussolini Takes His Place"
 ITA_Ethiopian_War.0.d: "[FROM.GetNewsIcon]The news came through today of Pietro Gazzera's dismissal as minister of war directly from the top, but to no great surprise seeing the many conflicts within the leadership of the military and the party he's caused. The man, having been in the position since 1929 has done a competent job at keeping and expanding our armed forces, however, his views for the MVSN has been unacceptable. Ever since 1931 Gazzera's ambition has been to reintegrate the MVSN directly inside the Regio Esercito and effectively dissolve it, this has been met with fierce resistance from the National Fascist Party exponents. His opposition to these members and unwillingness to back down had prompted the Duce to step in and mend the situation, but to no avail, Gazzera wouldn't budge. \n\nAs such, his office has been removed from under his control and placed under the ever watching eye of Mussolini which will undoubtedly be the best for the cohesion of the armed forces and the future of our military endeavours. However, Gazzera remains a senator so his work with the party will continue even if in offices of diminished power."
 ITA_Ethiopian_War.0.A: "Don't bite the hand that feeds you"

 ITA_Ethiopian_War.1.t: "Fate of colonial expansion in Abyssinia"
 ITA_Ethiopian_War.1.d: "Since the rise of Fascism in Italy, our governors in the Horn have grown restless. Mussolini's proclamations of Empire appear to have encouraged them to seek their own expansion. However, with Europeans or the sea on all sides, there is only one way for our colonial projects to expand: into Abyssinia. After humiliating us once during the first war in the 1890s, Italian generals are eager to avenge the defeat and restore Italian prestige. The Duce, on the other hand, is unusually cautious.\n\nBoth England and France have a stake in the region, and if Italy moves too quickly, they may intervene. While Mussolini is confident that his army can defeat the Ethiopians, he is less confident that it can defeat both Britain and France at the same time. Furthermore, with much of the Italian Army deployed in Africa, the Italian homeland is vulnerable. Recent diplomatic efforts have made significant progress in isolating Ethiopia, but one wrong move, or one made in haste, can undo years of planning."
 ITA_Ethiopian_War.1.A: "Il Duce quells down authoritative figures among the generals"
 ITA_Ethiopian_War.1.B: "Il Duce lets his trusted generals do their work"

 ITA_Ethiopian_War.2.t: "Italo-Ethiopian joint non agression statement"
 ITA_Ethiopian_War.2.d: "[FROM.GetNewsIcon]Today Ethiopians, Italians, Eritreans and Somalians breathe a little easier as the representatives of the Duce and the Negus converged in order to preserve stability in the Horn of Africa via a joint non-aggression statement before the League of Nations. For much time Italy's ambitions in the region have been the origin of tensions over territory but it seems that the Duce is intent on extending an olive branch and put the past to rest.\n\nMembers of the assembly were pleased to see that the League's intention of keeping the peace among the member nations gave fruit to this development.\nSome however doubted the genuineness of such statement, labelling it a facade in order to buy time and that there will still be plenty of troops in the Italian Horn, but these voices went largely ignored as the headaches caused by such scepticism were much larger than accepting the fact that Italy was ready to, at least for now, curb the bad blood between the two nations.\n\nThe Duce, on the other hand, was seen with a rather satisfied visage in front of the response of the international community to his diplomatic move."
 ITA_Ethiopian_War.2.A: "It seems like no blood will be spilled today."

 ITA_Ethiopian_War.3.t: "Tensions Over Wal Wal!"
 ITA_Ethiopian_War.3.d: "“The gall, the audacity!” said commander Cimmaruta as he looked over the intel coming from the Walwal front on his desk.\n\n“How dare these savages to come up to OUR fort on OUR land and demand that we leave with our tails between our legs? No doubt those British pissants have incited them to do it, they wouldn't have in them to do it without them.”\n\n“Bruno!” he shouted; a sunburnt, short Sicilian junior officer was rudely awoken from his daydream as he waited for the commander to read the reports prostrated before him, quickly reinforcing his \"at the ready\" stance.\n\n“Gather your men and start moving towards the Walwal fort post haste, I shall inform the others and contact command, this is unacceptable”\n\nThe officer did nothing but nod at his CO's barks and exited the room in a hurried manner with the commander trailing shortly before him."
 ITA_Ethiopian_War.3.A: "The pieces start falling into place"
 ITA_Ethiopian_War.3.B: "Placate tensions"

 ITA_Ethiopian_War.4.t: "Ethiopian Troops Foray at Walwal"
 ITA_Ethiopian_War.4.d: "[FROM.GetNewsIcon]We have received word that Ethiopian troops have shown up at the garrison of Ualual in southern Ethiopia. The brave Dubats stationed there have resisted the threats from the Ethiopian and although no fire has been exchanged the situation remains tense.\n\nItalian troops have been sent to reinforce the fortification and it is hoped that will be enough to stave off the feral enemy troops and that the situation will be shortly resolved."
 ITA_Ethiopian_War.4.A: "Faber est suae quisque fortunae"

 ITA_Ethiopian_War.5.t: "The Reclamantion of Walwal"
 ITA_Ethiopian_War.5.d: "[FROM.GetNewsIcon]The Italian posturing in our sovereign land is unacceptable, for too long we have listened and tried to abide by the treaties with the Italians and each time we have gotten betrayed by them, our patience has its limits! The positioning of their troops in such a bold manner inside our agreed-upon international borders is nothing short but a declaration of hostilities!\n\nWe shall make pressure without troops to kick them out peacefully but we can't expect things to go as smoothly if we bring international attention to this issue the League will surely support us and Italy will back down. The time for waiting is over!"
 ITA_Ethiopian_War.5.A: "Do not mess with the Lion!"

 ITA_Ethiopian_War.6.t: "Clash with Ethiopian troops at fort Ual-ual"
 ITA_Ethiopian_War.6.d: "To Governor-General Maurizio Rava, RCSCT Command, Mogadiscio\nUrgent military communication, to be delivered immediately\n\nA week ago at the Ual-ual fort in which the local garrison of Dubats resided in was approached by a contingent of what we assumed then to be a rogue regiment of Abyssinians and were threatened to abandon the fort at once in the name of the Emperor of Abyssinia.\n\nThe garrison refused the threats and sent a direct correspondence to the nearby colonial troop contingent under the command of yours truly after which the Abyssinians retreated.\n\nIn the following days, our troops arrived at the location in order to investigate the matter and understand what had happened. However, during the investigative works the Somalis were once again approached by the Ethiopian contingent backed by Albionic advisors, we tried to reason with them and offer an agreement but their eternal greed blinded them and left off in a fury.\n\nFollowing the previous exchange, we knew that it was only a matter of time before we'd cross swords however we did not expect to be attacked undeclared. This morning a patrol of our brave Dubats was mowed down by Abyssinian machinegun fire, probably lent to them by the very same British we've encountered.\nResponse was swift and decisive, the Abyssinians were driven back with minimal casualties and extreme prejudice thanks to modern firepower. In the face of the presented situation, we must ask for a course of action.\n\n- Captain Roberto Cimmaruta, RCSTC"
 ITA_Ethiopian_War.6.A: "The prey postures before the predator"

 ITA_Ethiopian_War.7.t: "Skirmish at Walwal"
 ITA_Ethiopian_War.7.d: "The border between Italian Somaliland and Ethiopia is clearly defined in the Italo-Ethiopian Treaty of 1928. However, Italy built a fort at the Walwal oasis, a border zone between the nations located about 130 kilometres inside Ethiopia.\n\nTo resolve this issue and put pressure on the Italians to leave what is rightfully our land, a force of 1,000 Ethiopian militiamen was dispatched to Walwal and formally requested that the Italian garrison stationed there leave. They refused to withdraw, instead informing other garrisons of what had occurred. An Anglo-Ethiopian boundary commission arrived at Walwal the next day. A newly arrived Italian force, sent in response to our demands, confronted the commission. The British members of the boundary commission protested but eventually withdrew. Our boundary commission members, on the other hand, remained in Walwal.\n\nWe have now received reports of a clash between the Somali garrison in Italian service and a force of armed Ethiopians. According to our men, the Italians attacked them without warning or provocation. As a result of this unprovoked Italian aggression, over a hundred Ethiopians have been killed. Italy has done nothing to try to avoid this confrontation or to resolve it diplomatically.\n\nUnfortunately, all we can do is appeal to the League of Nations and report to them on what has happened as a result of Italy's disregard for human life and unchecked aggression, hoping that they will listen to us and rule in our favor."
 ITA_Ethiopian_War.7.A: "Protest this Italian aggression!"

 ITA_Ethiopian_War.8.t: "Selassie Denounces Italy's Actions at League of Nations"
 ITA_Ethiopian_War.8.d: "[FROM.GetNewsIcon]This morning following the news arriving from East Africa of an Italo-Abyssinian border clash the Emperor of Ethiopia, Haile Selassie went on international air at the League of Nations criticizing the actions taken by the Italian colonial army and denouncing the intentions of the Italian leadership.\n\n An interview with British observers then stationed in southern Ethiopia revealed that the border clash happened near a bordering oasis called Walwal, according to them this Italian forward position was in clear violation of international treaties and they further corroborated that it was seemingly the Italians that fired the first shots.\nOn the other side of the coin, the local Italian command insists that the fort was well into the respected lines of the treaty and that undisciplined Ethiopian troops opened fire on the Italian-led Somali troops, pinning the incident on the Abyssino-Somalian age-old feud.\n\n In his conference, the Emperor called for international observers to closely monitor the situation and to chastize Italian behaviour for threatening the peace in the region but the Anglo-French response has been lukewarm, to say the least, some might even say that the French might be encouraging it. A tacit accord perhaps?\n\n One thing is sure however, it will soon be seen if the League is made simply out of mere lip-service to a cause or it is backed by facts."
 ITA_Ethiopian_War.8.A: "How bothersome!"
 ITA_Ethiopian_War.8.B: "We've got bigger fish to fry."
 ITA_Ethiopian_War.8.C: "The world shall know we're not to be trifled with."
 ITA_Ethiopian_War.8.D: "The Lion will stand proud!"
 ITA_Ethiopian_War.8.E: "Interesting..."

 ITA_Ethiopian_War.9.t: "Italian Provocation at Our Border"
 ITA_Ethiopian_War.9.d: "We only desired peace. We simply wanted to raise our Empire to the necessary heights so that we could sleep soundly without fear of European encroachment. However, it appears that the dream of peace is dissolving before our eyes. The Italians, still stinging from their defeat at Adawa, have begun to probe the borders. Their attempts to provoke us are, at best, juvenile. Just a few units crossing the border, making noise, and then returning to Eritrea.\n\nEven as our country's hawks call for war, we have been able to resolve these grievances peacefully. Even the doves recognise that this is only the first step in Italy's obvious attempt to colonise us. They want us to react violently in order to give them the pretext to invade. We will not provide them with that satisfaction. We will keep trying to keep things calm and force Italy to make the first move."
 ITA_Ethiopian_War.9.A: "A storm gathers over the savannah."
 
 ITA_Ethiopian_War.10.t: "Ethiopia Abstains from Responding"
 ITA_Ethiopian_War.10.d: "Our efforts to provoke the Abyssinians into conflict appear to have failed. They have refused to engage our men when they invade their territory and stubbornly retreat if we chase after them. Abyssinia has to be the first brick in the foundation of his new Roman Empire. We must keep trying to provoke them into a violent response. The ability to portray ourselves as defenders will go a long way towards mitigating the inevitable backlash to our next conquest."
 ITA_Ethiopian_War.10.A: "Avanti!"
 
 ITA_Ethiopian_War.11.t: "Ethiopia Responds to Our Provocations"
 ITA_Ethiopian_War.11.d: "Our provocations were effective, as the Ethiopians retaliated in kind. The Ethiopians attacked a Somali garrison in our service with rifle and machine-gun fire, resulting in a skirmish between the two sides. According to preliminary reports, more than a hundred Ethiopians, as well as 50 Italians and Somalis, have been killed.\n\nThis incident, along with Ethiopia's repeated threats of armed attacks on our garrison in the area, must be addressed. Now that we have evidence of an attack on our forces by Ethiopian forces, the League of Nations cannot ignore this fact and continue to hold us back. It is time to make the final preparations to finally crush the Ethiopians once and for all."
 ITA_Ethiopian_War.11.A: "Mobilize the garrison!"
 
 ITA_Ethiopian_War.12.t: "Victory at the Ethiopian Border"
 ITA_Ethiopian_War.12.d: "Vittoria! As our men approached the Ethiopian border, they were attacked almost immediately by an Ethiopian squad. An argument erupted after some words were exchanged. When someone fired, the battle began. Men fired point blank or pounced on one another in this open savannah battle. After a ferocious few minutes, the Ethiopians broke and fled, leaving several of their comrades behind. Following orders, the commander captured those who could be saved and left the rest to rot. The Ethiopians can now be painted as the aggressors, as they initiated the attack, according to the only surviving report. Meanwhile, the men's morale has skyrocketed, and they are more determined than ever to finish their mission."
 ITA_Ethiopian_War.12.A: "One step down the road to victory."
 
 ITA_Ethiopian_War.13.t: "Defeat at the Ethiopian Border"
 ITA_Ethiopian_War.13.d: "Catastrofe! When our men arrived in Ethiopia, they were met by a squad of Ethiopian soldiers. Words were exchanged, and an argument ensued, leading to someone, most likely the Ehtiopians, opening fire. Our men clashed with theirs with fire and steel in a brief but ferocious battle. However, it appears that our men were ultimately defeated.\n\nSeveral have been left dead or injured in Ethiopian hands, and reports of our men fleeing to Eritrea have been widely circulated in Ethiopian newspapers. Our foreign ministry now begins the humiliating task of bringing back the wounded whom the Ethiopians have captured. The international community has condemned this action as blatant aggression, and our Ethiopian project has been pushed back several weeks, if not months. Before we can try again, we must send men to Africa, rebuild supply stocks, and boost morale."
 ITA_Ethiopian_War.13.A: "A temporary setback."
 
 ITA_Ethiopian_War.14.t: "Victory against the Italians"
 ITA_Ethiopian_War.14.d: "The Italians crossed our borders once more, arrogantly attempting to assert their dominance. Our brave men in uniform were quick to confront them. An argument erupted, and someone opened fire first. The ensuing battle was brutal, with our men firing at the enemy point blank or attacking them with knives drawn. However, the affair ended advantageous for us. The Italians fled, dropping whatever they couldn't easily carry with them leaving behind dozens of their men.\n\nWe have taken in the injured and are waiting for the Italians to grovel in order for them to be returned. Meanwhile, the Emperor has claimed that this victory demonstrates the effectiveness of his reforms. The men who brought the battle to a successful conclusion have become model soldiers and have been showered with praise, boosting the morale of the entire army."
 ITA_Ethiopian_War.14.A: "God has granted us victory!"
 
 ITA_Ethiopian_War.15.t: "Defeat at the Italian Border"
 ITA_Ethiopian_War.15.d: "The Italians appear to have probed our borders once more, as a small squad crossed the border. We quickly confronted them, but the Italians refused to leave. An argument erupted, and someone fired. The battle was brutal, bloody, and animalistic. However, our men were unable to repel the Italians' attack. They were forced to retreat, leaving behind many of their countrymen. Our adversaries are using this as proof of our leaders' incompetence. Meanwhile, our army's morale has suffered as it is more uncertain than ever about the looming conflict with the Italians."
 ITA_Ethiopian_War.15.A: "May God have mercy on us."
 
 ITA_Ethiopian_War.20.t: "Border Skirmish Ends Indecisively"
 ITA_Ethiopian_War.20.d: "Our two sides engaged in a brief battle, but the outcome was frustratingly inconclusive. We exchanged shots with the enemy for nearly an hour before both sides decided to retreat. Our adversary touts this as a decisive victory, but anyone who reads beyond the headline can see that it has solved nothing. At the very least, our team can be relieved that it did not suffer a complete defeat. However, we must prepare so that the next time this happens, it will end better for us."
 ITA_Ethiopian_War.20.A: "Not a victory, yet not a defeat."
 
 ITA_Ethiopian_War.21.t: "A Unique Opportunity"
 ITA_Ethiopian_War.21.d: "Following the Italian invasion of Ethiopia, we now have a unique opportunity to protect our interests and boost our ambitions. While aiding Ethiopia in its conflict with Italy may appear absurd and contrary to our interests at first, it may provide us with certain benefits in the future.\n\nIf we send arms and munitions to Ethiopia, Italy may become embroiled in a protracted war with Ethiopia, which would almost certainly lead to Britain pressing the League of Nations to impose sanctions on Italy, which the French would almost certainly not veto out of fear of destroying relations with Britain. This, in turn, would lead to a crisis in Anglo-Italian relations, allowing us to offer our services and assistance to Italy.\n\nFurthermore, a prolonged Italo-Ethiopian war would deplete Italian resources, resulting in Italy's greater economic dependence on Germany and less interventionist policy towards Austria, effectively putting an end to their objections to our attempts to integrate Austria and paving the way for Hitler's Anschluss.\n\nHowever, if we decide to send guns and Italy was ever to find out, it would certainly destroy our good relations, and any hope of a future alliance between our nations."
 ITA_Ethiopian_War.21.A: "Send guns to Ethiopia."
 ITA_Ethiopian_War.21.B: "It's too risky"
 
 ITA_Ethiopian_War.22.t: "War Begins in East Africa, Italians and Ethiopians Clash"
 ITA_Ethiopian_War.22.d: "[FROM.GetNewsIcon]Today the horrors of war were extended to East Africa, as the Italian Armed Forces crossed the border into Ethiopia without a declaration of war and clashing with Ethiopian irregular units in the region. It appears that Italian Duce Benito Mussolini was not satisfied with the League of Nations decision to exonerate the African Nation of any wrongdoing following the WalWal Incident, choosing to invade the country instead.\n\nSo far the International Community has responded tepidly at best, with only the most minor of sanctions being placed upon the aggressor by the League of Nations. The Canadian delegate urged for some further response, however it seems no other nation has expressed this “Canadian Initiative” as the press have dubbed it. Even the twin powers of the United Kingdom and France have remained suspiciously silent on the matter - leaving Ethiopia to stand alone.\n\nInternational Observers predict that the isolated Ethiopia will not be able to resist the Italian invasion, with the poorly equipped and poorly trained Ethiopian Army no match for the modernized Regio Esercito."
 ITA_Ethiopian_War.22.A: "There will be no second Adwa."
 ITA_Ethiopian_War.22.B: "Let them come."
 ITA_Ethiopian_War.22.C: "Where is Ethiopia, anyway?"
 
 ITA_Ethiopian_War.23.t: "March of the Iron Will"
 ITA_Ethiopian_War.23.d: "[FROM.GetNewsIcon]Today, Marshal of Italy Pietro Bagdolio declared the start of the March of the Iron Will. It will be part military manoeuvre, part force display. The plan appears to be for him to lead a mechanized column from Dessie to Ethiopia's capital, Addis Ababa. The fact that he is confident enough to broadcast his next military manoeuvre to the entire world and use it as a PR showcase demonstrates how severely the Italians have savaged the Ethiopian Army. The Ethiopians, for their part, appear to have established a minor checkpoint along the planned route at Termaber Pass. Aside from that, with the majority of the army in the north scattered at Maychew and the army in the south still being whipped by the Italians, it's clear that the Ethiopians intend to fight their war from exile. Emperor Haile Salisse is said to have asked for permission to seek refuge in French Somaliland."
 ITA_Ethiopian_War.23.A: "Adwa avenged!"
 
 ITA_Ethiopian_War.24.t: "March of the Iron Will"
 ITA_Ethiopian_War.24.d: "[FROM.GetNewsIcon]Today, Marshal of Italy Pietro Bagdolio declared the start of the March of the Iron Will. It will be part military manoeuvre, part force display. The plan appears to be for him to lead a mechanized column from Dessie to Ethiopia's capital, Addis Ababa. The fact that he is confident enough to broadcast his next military manoeuvre to the entire world and use it as a PR showcase demonstrates how severely the Italians have savaged the Ethiopian Army. The Ethiopians, for their part, appear to have established a minor checkpoint along the planned route at Termaber Pass. Aside from that, with the majority of the army in the north scattered at Maychew and the army in the south still being whipped by the Italians, it's clear that the Ethiopians intend to fight their war from exile. Emperor Haile Salisse is said to have asked for permission to seek refuge in French Somaliland."
 ITA_Ethiopian_War.24.A: "Adwa avenged!"
 
 ITA_Ethiopian_War.25.t: "League of Nations Condemns Italian Actions"
 ITA_Ethiopian_War.25.d: "[FROM.GetNewsIcon]The League of Nations voted today, largely symbolically, to condemn the recently launched Italian invasion of Ethiopia. After beginning under false pretences, the League has united in its opposition at the urging of Ethiopia, France, and the United Kingdom. While this vote is purely symbolic, it is an important first step because it allows the League to move on to more aggressive future actions. Embargoes on Italian imports needed for the war, such as steel and oil, are among the proposed actions. However, as with anything related to the League, these proposals have been met with opposition. Predictably, the majority of this is centred on the Italian delegation, which has taken to shouting down any discussion of punitive actions against the country they represent. As Ethiopia valiantly defends its independence in an increasingly hopeless battle, the League once again demonstrates its inaction at a critical juncture."
 ITA_Ethiopian_War.25.A: "We will have our glory!"
 
 ITA_Ethiopian_War.26.t: "The Italian Invasion of Ethiopia"
 ITA_Ethiopian_War.26.d: "It appears that Italy is on the march. Mussolini, ever the blusterer, has recently increased his rhetoric against the Abyssinians, but few in the government expected a full-fledged invasion. We reasoned that the world has become too globalised, and too pacifistic in the aftermath of the Great War. However, it has become clear that this is exactly what is taking place. Italian troops have breached the Ethiopian border in many places, destroying the initial resistance. Our government, on the other hand, is hesitant to oppose this. We regard Italy as a valuable ally in the fight against the revanchist German beast that has grown along our border. If we condemn them, it will only turn Italy against us and push them into the German camp.\n\nThe people, however, hold a different opinion. They see the invasion as the worst thing that has happened since the Great War. Protests are being held across the country to condemn the Italian invasion and demand that we take action. Boycotts of Italian goods have been called for, both from the public and from members of Parliament. They are threatening to bring down the entire government if we do nothing. We could ignore them, but French history is littered with examples of what happens when the government ignores the people.\n\nWhile direct military intervention is not an option, there are other options for fighting without fighting. An embargo on military supplies would suffocate Italy and, no doubt, bring the Duce to the negotiating table. As the days pass and the crowds outside grow larger, a decision must be made before the people make the choice for us."
 ITA_Ethiopian_War.26.A: "Turn a blind eye."
 ITA_Ethiopian_War.26.B: "Choke them into submission."
 
 ITA_Ethiopian_War.27.t: "Gaul Stabs Us in the Back"
 ITA_Ethiopian_War.27.d: "The French, it appears, have decided that our invasion is a threat to world peace. The French Prime Minister has imposed an embargo on all military goods on us. What is the French justification for interfering in a dispute between two free nations? It is painfully obvious that the Prime Minister is simply caving into popular pressure. We will not give them the satisfaction of victory. We will direct our men to push harder than ever before to crush Ethiopia. Their pitiful 'embargo' will be null and void upon arrival."
 ITA_Ethiopian_War.27.A: "Francia delenda est."
 
 ITA_Ethiopian_War.28.t: "Public Outrage at the Italian Invasion of Ethiopia"
 ITA_Ethiopian_War.28.d: "It has come to our attention that Italy has invaded Ethiopia. Despite his promises to the contrary, Mussolini appears to be hell-bent on pursuing his imperial ambitions. Parliament and the general public are in uproar. We have to take a more nuanced approach.  Italy is fighting an unjust war, but Germany poses the greater threat. All of Europe must band together to bring Germany down. If we suffocate Italy, the Duce will be more likely to side with the Germans. However, there are some disadvantages to cold pragmatism. Protests against the war are already being organised, and opposition MPs are calling for action. They threaten to call a vote of no confidence if we do nothing.\n\nAs a result, there are three options. First off, we could ignore the Invasion. It would show our tacit support for the Italians without explicitly saying so. Of course, the people will riot and the MPs will rant, but we are confident that we will survive. The second option is a compromise, a condemnation but no further action. While it may sting, backchannel contacts may be able to reassure the Italians that this is just a publicity stunt. Of course, it could quell domestic protests, but it could also embolden protesters to demand more. The third step is a complete condemnation and embargo. The economic impact would suffocate the Italian war machine and calm public sentiment, but it would isolate Italy from the Allies. We need to make a decision quickly."
 ITA_Ethiopian_War.28.A: "Italy is fully to blame for this."
 ITA_Ethiopian_War.28.B: "Both nations had their hand in this."
 ITA_Ethiopian_War.28.C: "They are merely seeking their place in the sun."
 
 ITA_Ethiopian_War.29.t: "UK Gives a Silent Go Ahead"
 ITA_Ethiopian_War.29.d: "There is no word coming out of London. The United Kingdom has remained silent in the aftermath of our recent invasion. The Ambassador has been repeatedly approached by Italian journalists for comment, but he has none. Meanwhile, during a recent phone call with Il Duce, the Prime Minister made no mention of the invasion. Surprisingly, the United Kingdom appears to have decided to sit out this \"crisis.\" We are perplexed, but mostly relieved that they have. With the entire world against us, we are relieved not to have to worry about the world's largest Empire breathing down our neck. At the same time, British exports have continued unabated, fueling our war machine. We are grateful for whatever reason the English are tuning out this war. Now we can concentrate on the real issues."
 ITA_Ethiopian_War.29.A: "One less player to worry about."
 
 ITA_Ethiopian_War.30.t: "The British Denounce Us"
 ITA_Ethiopian_War.30.d: "The British ambassador to Italy, Eric Drummond, Earl of Perth, met with Mussolini today. The discussion was brief but intense. In the recent League of Nations vote, Britain was one of the most vocal delegations opposing us, and Mussolini could guess what Drummond had to say. When Drummond stated that the British government would never accept Ethiopia's annexation into the Italian Empire, Mussolini appeared to have guessed correctly. Mussolini responded that during its expansion, Britain had annexed a large number of nations, and proceeded to list over a dozen nations in India alone that the British Raj had subsumed. Drummond simply reiterated his message: the British government would never accept Ethiopia's annexation. \"What matters is not what you accept, but what happens,\" Mussolini allegedly said. \"We will have Ethiopia, no matter what your Prime Minister wants\". After a brief moment of waiting for Drummond to respond, Mussolini waved him off, not entirely surprised by what had just occurred."
 ITA_Ethiopian_War.30.A: "Perfidious Albion!"
 ITA_heavy_Embargo_opinion: "Denounced us!"
 
 ITA_Ethiopian_War.31.t: "The British Oppose Us"
 ITA_Ethiopian_War.31.d: "London's response to our invasion has been largely verbal. Mussolini is furious and has made many foul-mouthed and lengthy denunciations of Britain, but hurried back channel talks appear to have calmed him down. The British have privately assured us that this is simply a move to quell domestic outrage, and that the government has no ill will towards Italy. They no doubt still hope that we will assist them in their fight against the Germans. Mussolini himself is not entirely convinced either way. However, as he returns to Africa, the seed has been planted, and Albion could be Italia's next opponent."
 ITA_Ethiopian_War.31.A: "Not bad, but not great either."
 
 ITA_Ethiopian_War.32.t: "Albion Wants to Choke Us"
 ITA_Ethiopian_War.32.d: "The IRI report has arrived. The British have harshly condemned our invasion of Abyssinia and imposed a harsh embargo on all \"war-making goods\" that we had previously imported from them and their Empire. Much of our war-making equipment came from Britain and its seemingly limitless material wealth. Our industry has been put under tremendous strain due to the lack of their goods. While it is possible to compensate for shortfalls by diversifying into other markets, our economists are disappointed. Britain sold a lot of goods cheaply; now we'll have to pay top dollar for whatever we can get. Mussolini has decided once and for all that Britain must perish as the top minds in our Economics Ministry gather to hammer out Italy's new economic future."
 ITA_Ethiopian_War.32.A: "The rise of a new Claudius."
 
 ITA_Ethiopian_War.33.t: "Somali Unrest"
 ITA_Ethiopian_War.33.d: "Shortly before the Italians thundered over our borders, they decided to stomp on the throats of the Somali tribesmen who live in their Somali territories. They abandoned the web of treaties and alliances they had established in 1928 and began to rely on traditional colonialist tactics such as brutal suppression of dissent and divide et impera to cement their rule. This has provided us with an opportunity to capitalise on their folly. The area's various tribes are primed and ready to revolt, and with the majority of Italian troops stationed in our country, the Italians will be hard pressed to put down such a rebellion.\n\nSome in our country have suggested that we send some guns to these unruly tribes to provoke them into revolt. With a domestic war erupting, the southern front will be forced to close as the Italians refocus their attention. We could then use their distraction to roll through Somaliland or concentrate on the main northern front with impunity."
 ITA_Ethiopian_War.33.A: "Well that's a problem."
 ITA_colonial_unrest_tt: "Somali Unrest: §R+70%§!"
 
 ITA_Ethiopian_War.34.t: "The Fate of the Horn"
 ITA_Ethiopian_War.34.d: "Calamity has befallen us. As Abyssinian troops set up camp in Mogadishu and patrol the Eritrean coasts, it appears that God has turned his back on us. Our men have completely failed, and the Abyssinians have won a more comprehensive victory than they did in the 1890s. Those men who were not killed or captured along the route fled to French Somaliland or British Africa to be detained. The protesters outside are attracting tens of thousands of people, far more than the OVRA could hope to disperse. They want peace now, or our heads on a pike. The King appears to have lost faith in us, and the remnants of the Army have mutinied. Even the blackshirts complain about our African adventure's failure.\n\nLet us plead for peace. Give them what they have and return our wounded warriors to us. We may return someday, but first, we must secure the homefront! However, the Abyssinians have no navy, so we might be able to stage a landing in the Horn at a later date. Such a landing will be difficult at every stage, and if we try and fail again, the already loud protests may escalate into a full-fledged revolution. In any case, continuing the war will further erode our already shattered power base. If we fail again, the fascist experiment may come to an end."
 ITA_Ethiopian_War.34.A: "I will not be beaten by a bunch of savages!"
 ITA_Ethiopian_War.34.B: "And so my dreams come to an end before they even began."

 ITA_Ethiopian_War.36.t: "Italy Asks for Peace"
 ITA_Ethiopian_War.36.d: "Our victory appears to be finally, and mercifully, complete. After driving the Italians out of our lands, we set out to seize Somaliland and Eritrea, nearly restoring the borders of the Old Empire. We are now the world's wonder, a small and widely perceived backwards nation that has soundly and resoundingly defeated a European power.\n\nThe Italians, who appear to have regained their senses, have come to us on their knees, pleading for peace. It's easy to see why, given reports of riots in Italy. They appear to have written off Somaliland and Eritrea, requesting only that we return the wounded and captured. It is a generous offer that we must accept. They simply have nothing else to offer us. Some have proposed a forced alliance to ensure that they do not return for vengeance anytime soon. It's a tempting but risky solution. "
 ITA_Ethiopian_War.36.A: "Long live the Empire of God, the Empire of Solomon! Long Live Ethiopia!"
 ITA_Ethiopian_War.36.B: "Push the Envelope."
 
 ITA_Ethiopian_War.37.t: "The Dervish Accord"
 ITA_Ethiopian_War.37.d: "After successfully repelling Italian invasion forces for so long, the Somalis have found the courage to stage a successful revolt against their imperialist overlords, capitalising on Italy's current weak position in the region. This new development may provide us with a significant advantage and may be just what we need to drive the Italians out of our country once and for all.\n\nThe most obvious next step is to immediately send an alliance proposal to the Somali insurgents. This will allow us to coordinate our efforts and fight alongside one another against our common enemy.\n\nThe alternative is to invade newly liberated Somalia while it is weak and in disarray. This would allow us to centralise control of the region and better coordinate resources and military operations against the Italians. While the fighting spirit of the Somalis is admirable, we cannot allow ourselves to be divided in these trying times. However, this could have a negative impact on us at the international level.\n\nOf course, there is always the safest option of doing nothing and continuing to fight the Italians as we have in the past. Somalia and we will fight the Italians separately, with no official alliance."
 ITA_Ethiopian_War.37.A: "Send the alliance proposal."
 ITA_Ethiopian_War.37.B: "Prepare the invasion!"
 ITA_Ethiopian_War.37.C: "This is too risky."
 
 ITA_Ethiopian_War.38.t: "The Ethiopians Propose an Alliance"
 ITA_Ethiopian_War.38.d: "Addis Ababa has issued a statement. They have attached a rider to the proposed peace treaty, which is already a humiliation. They want us to form an alliance with the people who just humiliated us. This is a clear attempt to prevent us from attacking them again in the near future. People appear to be in favour of the idea. They have given up hope of an Empire and are content with Libya. They don't want any more of our African adventures or attempts to rebuild Rome. They see this as the best opportunity to steer us away from that path.\n\nHowever, it would be a potentially fatal humiliation. We are not only beaten like dogs, but we are also forced to shake hands with the people who have stripped us of our Empire at gunpoint. If the fascist administration survives, it will be by the skin of its teeth, and all of our progress will be undone. However, we could simply ignore the rider and sign the treaty as is. The Abyssinians realise this is a long shot and appear hesitant to include it. With a little nudge, we might be able to persuade them to withdraw their demand. Of course, it would elicit even more public outrage."
 ITA_Ethiopian_War.38.A: "One final indignity."
 ITA_Ethiopian_War.38.B: "I will not shake hands with the men who caused this!"
 
 ITA_Ethiopian_War.39.t: "The Status of Somalia"
 ITA_Ethiopian_War.39.d: "As our troops patrol Somaliland, it is clear that the military administration will not last. Some want us to directly integrate the region into the Empire. At various points in our history, we wielded power over the region. We could claim that we are simply reclaiming ancient parts of our Empire. Europeans entertained the idea of Rome long after it died; why can't we use our own, more recent Empire?\n\nHowever, there is the issue of tribes. We promised them independence, and if we break that promise, they will rebel. This will turn the entire province into a money sink that will not be resolved anytime soon. That is why some have suggested that we free Somaliland and install a local, loyal ruler. They can pretend to be independent, but we will take steps to ensure that we have the final say."
 ITA_Ethiopian_War.39.A: "Restore the Old Borders!"
 ITA_Ethiopian_War.39.B: "Give them freedom, however limited."
 
 ITA_Ethiopian_War.40.t: "Capitulation of Ethiopia"
 ITA_Ethiopian_War.40.d: "The last organized Abyssinian resistance to our victorious armies was defeated today in the town of Gogetti. Adwa's humiliation has been avenged tenfold, and Italy now has the seeds of the colonial empire it was robbed of! The barbaric tribesmen the Ethiopians had the audacity to call soldiers fell like flies as a result of the use of modern weaponry such as poison gas and machine guns! The destruction of their 'Empire' was a foregone conclusion after the fall of their capital, Addis Ababa. However, the Abyssinians persisted in their fight, and they are now paying the price for their arrogance. Their Royal Family is in exile, their Army is imprisoned, and their people are now subject to our rule.\n\nLengthy plans for the administration of newly conquered lands have been implemented as the General Staff in Rome shake hands and Mussolini toasts to the fascist system's victory. The Duke of Aosta will lead the new colonial administration of Italian East Africa (AOI). Miscegenation will be prohibited, the ruling Amhara caste will be isolated, and the people will be pacified using the tried-and-true Roman method of bread and circuses. The international community has lodged their limp wristed and ineffective 'diplomatic protests' with the equally ineffective League of Nations, but we should disregard this. Did Rome seek permission from the Gaul and British tribes before conquering the Mediterranean? No! So, just as our forefathers did before us, we'll let them scream themselves purple while we bask in the warmth of our victory."
 ITA_Ethiopian_War.40.A: "Avanti Italia"

 ITA_Colonial.1.t: "Appointing a Governor for Libya"
 ITA_Colonial.1.d: "Libya is by far and away, the most important foreign territory our nation currently controls. Not only does it give us a political instrument to showcase the Italian presence in Africa, but it is also strategically vital to the security of the empire. The Libyan territory gives us easy access to Britain and France’s North African territories, as we can easily strike out across the Nile take to choke Great Britain at the Suez if we go East or lock down the Mediterranean if we go West. Just as importantly, Libya is home to the only major source of domestic oil production in the Italian Empire.\n\nThus, one must understand the importance of ensuring good governance in the region. If the governor we choose to control the area fails in his duties, our oil could be threatened, and if the more rebellious elements of the area are not handled properly, the entire colony could be put at risk. \n\nTwo candidates have emerged for the position thus far. The first is Italo Balbo, former Marshal of the Air Force and former heir apparent to Benito Mussolini. A competent leader, who has recently fallen out of favor with the party, with the assignment to Libya being favored by many as a way to get him out of Italian politics in Rome.\n\nThe second contender is Rodolfo Graziani, the current Vice-Governor of Cyrenaica and commander of the Italian forces in Libya. He already has experience in handling the region, and his military skill and diligence could prove to be what’s necessary to crush Libyan resistance and finally complete the Italianization of Italian North Africa.\n\nWhom shall we choose to lead Libya into a glorious Italian future?"
 ITA_Colonial.1.A: "Italo Balbo will keep Rome stable."
 ITA_Colonial.1.B: "Rodolfo Graziani will bring Libya to heel."
 ITA_Italo_Balbo_Appointed_Governor: "Italo Balbo has been appointed Governor"
 ITA_Rodolfo_Graziani_Appointed_Governor: "Rodolfo Graziani has been appointed Governor"
 
 ITA_Colonial.2.t: "Inauguration of the Litoranea Libica"
 ITA_Colonial.2.d: "Today is a great day for Italians all over, as of [GetDateText] the great Duce has arrived in Libya to finally inaugurate the great project that has been in the minds of many for a long time. Today, the Italian peoples have dared to do what that Romans did not dare, what they couldn't do or did not want to do. The coast of Libya has been lined with the mark of fascist modernity and progress. A great belt of asphalt now binds the before disjointed cities of Libya; once separated by great deserts these cities now stand connected in a way never before seen on the African continent, a symbol of the Italian ingenuity and will.\n\nAs of right now the great work stands at over 1800 km of asphalt, bringing together many costal oasi that were previously semi isolated, but of most relevance is the fact that the road connects the east and west of Libya, bringing a fully connected corridor all along the coastline; allowing for the improvement of local economies, the construction of new resorts, and most importantly the easy transport of military equipment in the defense or the 4th shore if the need ever arise.\n\nLike the Romans before us, we shall bring civilization to these lands long lost. But this only marks but the beginning of the great process to reclaim our birthright and il Duce will be the guiding light towards towards this goal."
 ITA_Colonial.2.A: "Alme sol, possis nihil urbe Roma visere maius"
 
 ITA_Colonial.3.t: "Mussolini Receives Sword of Islam"
 ITA_Colonial.3.d: "*Click*\n\nThe camera shudders went off. Brief rays of light overwhelmed the bright sun of the Sahara, then it was gone as soon as it appeared.\n\nThe Duce had been trying over and over again to make connections to the Arab world, to deal an alliance between the two extremely different cultures. Desperate to showcase a connection between overlord and colony, Iusuf Kerisc gave Mussolini the Sword of Islam, a ceremonial item, to use in propaganda photos. After the shoot, he's expected to receive a wide celebration in Tripoli. Some could say all of this is for power, yes, but maybe for unity as well? The world is fractured at all corners, and any firm foundation uniting the people of Italy seems beneficial at this point, and-\n\n“Ugh! Hold the animal still, stable boy!”\n\n“So sorry sir-”\n\n...\n\n“Ah, that's better!”\n\nMussolini raised the melee weapon into the air, with the tip piercing the blue sky above. The new Protector of Islam, desperately trying to hang on to a horse, only with the assistance of a groom... Well, nothing a bit of forging can fix!"
 ITA_Colonial.3.A: "*Click*"
 
 ITA_Colonial.4.t: "Restore Libyan Rights"
 ITA_Colonial.4.d: "Can a sick man take care of others? \n\nAny sane man would say no, as it's custom to take care of the sick instead of working them more than before. Alas, that's what the Ottomans thought they could do. The broken Empire held onto the Libyan desert for more than 350 years, until we liberated them in the Tripolitanian War. Up until then, they never treated the Libyans as people. The old man of Europe coughed and wheezed - gasping for life until it was no more, it infected everything it touched. \n\nThat old man is long dead now, and we hold a small piece of its ashes. A piece of desert far, and wide - full of cultured and working people. The Libyans need a saviour to save them from the hardships left behind, and what better way to do that but treat them more equally than before? and give them the request they've earned. \n\nEstablishing new class citizenship to Libyans loyal to the fascist cause will reign in a new era for the oppressed Libyan people. More recruitment to the P.N.F and promoting religious equality are just a few examples included in the \"new\" Africa Orientale Italiana. Our ideology knows no bounds to our people...for the prosperity and for the development of our Empire."
 ITA_Colonial.4.A: "...And that's what everyone gets wrong."
 
 ITA_Colonial.5.t: "Establishment of Africa Orientale Italiana"
 ITA_Colonial.5.d: "No one ever said colonization would be easy. The British had revolutions everywhere, the French sold much of theirs, and then there's Portugal with its extensive Atlantic slave trade. They all have the same common theme: A lack of a sense of unity. The Great Powers of old thought they could just walk in and strip whatever they could, without a hint of compensation for the people there. Sure, we may have had to... “forcefully” take what was ours, but we don't consider those supportive of our colonial cause lesser than us.\n\nThe Africa Orientale Italiana, or AOI, addresses that lack. The plan consists of merging the pre-existing colonies of Italian Somaliland and Italian Eritrea with the newly conquered Ethiopian state. Although it could be an initial bureaucratic nightmare, establishing our presence and creating a national identity of Italian Africa could be worth it. Assigning a governor to the region would also help with the logistical assistance, dividing them into six separate Governorates. \n\nEl Duce pondered this and sat back in his chair. It seems all in order. It all comes down to how the citizens of our colonies will respond to the new organization. "
 ITA_Colonial.5.A: "Time to give Emmanuel a call"
 ITA_Giuseppe_Bottai_Appointed_Vicere: "§YGiuseppe Bottai§! has been appointed §OViceré§!"
 
 ITA_Colonial.6.t: "Victor Emmanuel Crowned Emperor of Ethiopia"
 ITA_Colonial.6.d: "The Italian King paced back and forth in his room, re-reading the same headlines on today's newspaper:\n\nEL DUCE WINS THE VICTORIOUS WAR AGAINST ETHIOPIA!\n\n“This isn't good, really really not good.” The King slid the paper down on his desk in front of his advisor. “Benito's support is higher than ever, and now it seems like I have no power in the public's eyes! What happens if we get involved in a higher conflict, would I be able to stop it, when he refused all advice, even on this puny war?” The monarch sat down in his chair and rubbed his head in anger and hopelessness. “It seems I'm becoming a jewelled figurehead Mussolini can throw around for fun.”\n\nThe advisor scanned the paper, searching for a solution when a curious thought entered his head. “Sir, ask the Duce to proclaim yourself the new Emperor of Ethiopia.” The King's eyes widened as he thought about the idea. “Haile Selassie is currently in exile, so you could claim the empty title all on your own. This way, Benito will be forced to give you some peace of the victory in Africa, and you can still hold some influence in the government using that.”\n\nEmmanuel sat up as if he thought such a proposal could work, then the look faded, and he sat back in his chair. “The Ethiopian reaction could easily be vitriolic, they would never accept anyone except an Ethiopian on the throne. It could easily inflame the already uneasy situation in Addis Ababa. Besides, the British and French will scoff at the entire affair, we’ll be the laughing stock of Africa and Europe.”\n\nHis adviser looked him, dead straight in the eyes:"
 ITA_Colonial.6.A: "“Would you rather Mussolini crown himself Emperor instead?”"
 
 ITA_IG_Farben_Negotation.1.t: "Approach IG Farben"
 ITA_IG_Farben_Negotation.1.d: "Many of our experts have been considering how the numerous collaborations with the German Reich could have aided in the development of a local pharmaceutical sector. Given how well our relations with the German Reich are now, we should contact IG Farben.\n\nWe now intend to send our top scientists to an internship programme, where they will gain skills and provide us with highly qualified personnel to work on a domestic brand and increase domestic manufacturing."
 ITA_IG_Farben_Negotation.1.A: "Let's present the terms."
 
 ITA_IG_Farben_Negotation.2.t: "Italy Proposes Negotiations to IG Farben"
 ITA_IG_Farben_Negotation.2.d: "We have been presented an offer by the Italian government in relation to IG Farben, a German company that is a major producer of chemicals that will be very useful for our transition to autarky. As we have good relations with the Italians, mainly due to our shared ideology and goals, they hope that we will be able to strike a deal that they can use to the fullest extent.\n\nHowever, we too want our fair share, and while we are more than willing to find a deal with them, it could be in our interests to try and increase the price that they must pay to get what they want. Of course, we can agree to the terms that they first presented to us, but it could be a good idea if we want to generate some more funds."
 ITA_IG_Farben_Negotation.2.A: "Ask for 100% increase"
 ITA_IG_Farben_Negotation.2.B: "Agree with starting proposal"
 
 GER_Request_for_100_Increase_tt: "We will request §B600§! £money_icon \n"
 GER_Agree_Starting_Proposal_tt: "We will §GAgree§! on the initial proposal of §B300§! £money_icon \n" 
 
 ITA_IG_Farben_Negotation.3.t: "Agreement on Synthetic Oil Patents with IG Farben Signed"
 ITA_IG_Farben_Negotation.3.d: "Today is a great day in Europe for fascist forces, as Italy and the Germans have finally agreed on partnership terms after lengthy negotiations. This collaboration involved a Synthetic Oil Patents agreement that will benefit both countries.\n\nSynthetic oil, which has been developed for a few years, must be the future of the fuel economy, as those who own it no longer require the massive oil wells that the French and British value so highly in the Middle East.\n\nFollowing the agreement's signing, both Il Duce and the Fuhrer addressed their ministers and populations, claiming that this is only the beginning of a \"closer relationship between the heirs of the Roman Empire and the Holy Roman Empire!\"\n\nThe British and French diplomats remained silent, claiming that the \"synthetic oil\" is a waste of time. However, this is a significant scientific advance for both the synthetic industry and a significant step toward autarky for both nations."
 ITA_IG_Farben_Negotation.3.A: "The German and the Italians, together on the road to glory!"
 ITA_IG_Farben_Negotation.3.B: "The German and the Italians, together on the road to glory!"
 
 ITA_IG_Farben_Negotation.5.t: "IG Farben Asks to Increase Price"
 ITA_IG_Farben_Negotation.5.d: "Today, we received a letter from our German friends. This letter concerned the deal we have with IG Farben.\n\nArguing that the agreement's prices are too low for the company's benefit, they have officially announced their intention to raise the prices by 100%, a decision that has concerned Italian business owners, who have warned that paying too much could have dire consequences for our economy.\n\nMussolini, on the other hand, has emphasised the significance of this Italo-German agreement, arguing that Italy cannot remain alone in a massively hostile Europe dominated by ageing democracies and archaic monarchies. He stated that Germany is currently the only potential partner, or at least the only one who does not hesitate to contact us.\n\nIn the end, the decision is ours. Should we accept the high prices in exchange for a better partnership with the Germans, or should we accept only half of their offer, upsetting our only significant investor?"
 ITA_IG_Farben_Negotation.5.A: "A price worth paying for strong allies."
 ITA_IG_Farben_Negotation.5.B: "Make a 50% counter-proposal. We will not sell our country."
 
 ITA_IG_Farben_Negotation.6.t: "Agreement on Synthetic Oil Patents with IG Farben Signed"
 ITA_IG_Farben_Negotation.6.d: "Today is a great day in Europe for fascist forces, as Italy and the Germans have finally agreed on partnership terms after lengthy negotiations. This collaboration involved a Synthetic Oil Patents agreement that will benefit both countries.\n\nSynthetic oil, which has been developed for a few years, must be the future of the fuel economy, as those who own it no longer require the massive oil wells that the French and British value so highly in the Middle East.\n\nFollowing the agreement's signing, both Il Duce and the Fuhrer addressed their ministers and populations, claiming that this is only the beginning of a \"closer relationship between the heirs of the Roman Empire and the Holy Roman Empire!\"\n\nThe British and French diplomats remained silent, claiming that the \"synthetic oil\" is a waste of time. However, this is a significant scientific advance for both the synthetic industry and a significant step toward autarky for both nations.\"
 ITA_IG_Farben_Negotation.6.A: "The Germans and Italians, together on the road to glory!"
 ITA_IG_Farben_Negotation.6.B: "The Germans and Italians, together on the road to glory!"
 
 ITA_IG_Farben_Negotation.8.t: "The Italians Ask for a Price Reduction"
 ITA_IG_Farben_Negotation.8.d: "Our proposal for a 100% price increase was rejected, and the Italian government now wants only a 50% price increase because the original proposal would have required too much financial commitment.\n\nAs a result, IG Farben are tempted to agree to the Italian proposal, which could lead to the Synthetic Oil Patents Agreement being signed shortly. If the price reduction goes through, it could result in a lower profit, although the money will help us significantly improve our economic and military capacities, as well as our connections with the Kingdom of Italy. Do we want better relations for a lower price, or do we want what we are rightly owed?"
 ITA_IG_Farben_Negotation.8.A: "Agree to a 50% reduction."
 ITA_IG_Farben_Negotation.8.B: "Insist on our proposal."
 
 ITA_IG_Farben_Negotation.9.t: "IG Farben Agrees to Reduce Price"
 ITA_IG_Farben_Negotation.9.d: "Our German partner appears to have agreed to our proposal of only a 50% price increase for synthetic oil. Given the importance of synthetic oil to our economy, this is a rather advantageous compromise for us.\n\nWe now have the power of synthetic oil on our hands, thanks to the price negotiation coming to an acceptable price that both Germany and us can agree on. This would be a critical step toward reducing our reliance on natural oil from our French and British competitors, as well as reducing the potential damage of an economic blockade."
 ITA_IG_Farben_Negotation.9.A: "Another step on the road to autarky."
 
 ITA_IG_Farben_Negotation.10.t: "Agreement on Synthetic Oil Patents with IG Farben Signed"
 ITA_IG_Farben_Negotation.10.d: "Italy and Germany have formally begun their cooperation in the field of synthetic oil after a long series of price negotiations. The two countries will now collaborate on the development and production of synthetic fuels in the hopes of reducing their own reliance on foreign oil, much to the chagrin of the United Kingdom and France, which appear to be less interested in such fields, believing it to be a scientific dead end.\n\nRegardless, the German-Italian synthetic oil cooperation has now solidified, and both parties would benefit greatly from this cooperation on many fields, more than just the industrial fronts. With a reduced price agreed, both sides stated that \"a new era of Italo-German cooperation has begun\"."
 ITA_IG_Farben_Negotation.10.A: "A great success for all!"
 ITA_IG_Farben_Negotation.10.B: "A great success for all!"

 
 ITA_Economic_Tree.1.t: "General Confederation of Italian Industry"
 ITA_Economic_Tree.1.d: "The General Confederation of Italian Industry, also known as Confindustria, is an employer's federation in Italy as well as a national chamber of commerce that was founded in the early 1910s.\n\nIl Duce has asked us to begin the project of \"fascization\" of the entire system today. How do you \"fascize\" something? Nobody knows for sure, but a few people try to obey our Duce.\n\nThere have been a few attempts to accomplish this:\n-First, everything, including government powers, must be in the hands of as many people as possible to reduce the risk of sabotage or corruption.\n-Second, the affected heavy industries must be pushed to the limit in terms of productivity, even if it means exceeding projections.\n-Third, all essential resources should be concentrated in the hands of the state so that they can be quickly distributed to the most important sectors.\n-Finally, worker privileges must be enforced as long as they do not conflict with government goals."
 ITA_Economic_Tree.1.A: "Like the Roman Eagle, the Fascization of Industry will soon be established everywhere in Italy!"
 
 ITA_Economic_Tree.2.t: "Duce Addresses the Chamber of Deputies"
 ITA_Economic_Tree.2.d: "[FROM.GetNewsIcon]\"Gentlemen, I've asked you here today for a reason. Despite their numerous differences from us, the Germans are correct on one point: The economics of Autarky.\"\n\"Do you want to suggest we're going to imitate the Teutons, my Duce? But how will the United Kingdom and France react?\"\n\"I'm not saying we sell our souls to the German devils. For the time being, all I want to do is apply for what they have here, in Italy.\"\n\"That's not the case in this instance. Do you want us to develop the South's industry? Perhaps in Sicily?\"\n\"I want more, Balbo. I want to conquer the Grano, I want to expand Libya's oil sector, and, finally, I want railways and factories that cover the entire Italian Empire, from Nice to Tirana, Palermo to Rome, and Rome to Florence!\"\n\nItalo Balbo returned to Mussolini after the meeting.\n\"That was a powerful speech, my Duce. I apologise if you felt I was criticising you.\"\n\"Not at all, my good man! We are here to make a better future for Italy, we need different views on such matters!\"\n\"Of course, I'm delighted to fight for your cause in the future!\"\nMussolini stopped walking.  \"And I was hoping you'd take charge...\"\n\"What exactly do you mean?\"\n\"I'd like you to oversee all Autarky projects. You are well-versed in the target regions, and your work as governor-general in Libya was outstanding.\"\n\"I'm grateful for this award, My Duce. I will do everything in my power to make it a success.\""
 ITA_Economic_Tree.2.A: "\"And the country needs more men who know how to do their jobs.\""
 
 ITA_Economic_Tree.3.t: "Italian Workers in Germany"
 ITA_Economic_Tree.3.d: "A new agreement between us and the Germans was struck today.\nAlbert Speer chose to contact us after noticing his lack of influence within Hitler's inner circle. As an ambitious architect, Speer attempted to centralise German industry, but with war looming, it became more difficult to find good men to run the Reich's military and civilian sectors.\n\nThe remedy for this is straightforward: young, hardworking men. Italy and Germany, as ideological partners, should collaborate on a variety of levels. For example, information in exchange for people sent to Bavaria and Rhineland, to expand the industry sector.\n\nBenito Mussolini, upon accepting this proposal, requested one thing in return: German military advisors. Speer and his delegates accepted the terms without hesitation and quickly left for Rome. Except for Speer, who was seduced by Italian architecture and visited Naples and Florence.\n\nAfter a few weeks of planning, thousands of volunteer workers, accompanied by the Army, crossed the border in Tyrol, meeting German advisors along the route. The Duce, pleased to see Italian-German relations improving, has pronounced himself pleased with the sequence of events."
 ITA_Economic_Tree.3.A: "“Italian and German workers of the world, unite!”"
 
 ITA_Economic_Tree.4.t: "New Cities in Agro Pontino"
 ITA_Economic_Tree.4.d: "After years of effort, the exhausting project has finally begun to bear fruit! Mussolini was invited a few days ago by the site manager, who gave him a symbolic key to the new city!\n\nThe new city, dubbed \"Sabaudia\", is the crowning achievement of the Ponti region. Without the swamps and diseases, cultures have begun to grow normally, and the construction of new buildings is also accelerating.\n\nA few cities have begun construction throughout the region, but only Sabaudia has progressed quickly enough to be ready for our Duce's visit. During his visit, Mussolini was impressed by the quality of the construction, despite the short time frame, but he also enjoyed the garden, which had been specially prepared for him. Seeing the beauty of the flowers in what was previously only a \"disease hole,\" the Duce invoked the Italian spirit, who can create beauty in any land if he works hard enough.\n\nFinally, after a ceremonial dinner with his son-in-law, Galeazzo Ciano, and the newly appointed mayor, Mussolini resumed his tour of the few other cities under construction in the region, hoping to meet with the workers, the \"fierce people of Italy.\""
 ITA_Economic_Tree.4.A: "First nature, now cities, wouldn’t Mussolini take himself for the new Romulus?"

 ITA_Economic_Tree.5.t: "The ONC put at the Head of Draining Projects"
 ITA_Economic_Tree.5.d: "Today, the ONC was promoted to the helm of the Italian government's largest project of the year: the Draining Projects. For months, the Duce has been submitting his project to the Great Council of Fascism, which has one clear goal: draining the country's swamps.\n\nFor centuries, the aforementioned swamps have been the source of disease transmission. The Duce then ordered the cleaning and total restructure of the Agro Pontino, the most touched area, in response to what he called a \"logical problem.\"\n\nMussolini's second project, once the draining is completed, would be to build cities in new regions and, perhaps, revolutionise architecture for Italy once more!\n\nHowever, cleaning up the area will take years for the time being. Despite the thousands of workers who come here every day, diseases like malaria continue to spread, and the resources required to complete the project are massive, especially for a country with our economy.... Despite the numerous minor issues that have arisen, the work continues, slowly but steadily. Maybe someone will live here one day?"
 ITA_Economic_Tree.5.A: "Maybe not us, but our children? Surely."

 ITA_Political_Tree.1.t: "Formation of the Corporations"
 ITA_Political_Tree.1.d: "Mussolini and the Fascist Party promise the Italian people a new economic system known as corporatism, which includes the establishment of professional corporations. Professional corporations are formed by trade unions and employers organisations from the same profession or branch. This system will be both egalitarian and traditional at the same time.\n\nThe corporate State believes that private enterprise in the production sector is the most effective and useful tool in the national interest. Given that private production organisation is a function of national concern, the enterprise organiser is accountable to the State for the direction given to production.\n\nState intervention in economic production occurs only when private initiative is absent or insufficient, or when the State's political interests are at stake. Control, assistance, or direct management may be used in this intervention."
 ITA_Political_Tree.1.A: "Everything within the state, nothing outside the state, nothing against the state!"

 ITA_Political_Tree.2.t: "No More Pacts With the Plutocrats"
 ITA_Political_Tree.2.d: "Despite its power and prestige, Italy receives no respect from the West. While our brave soldiers fought and died in the Alps by the tens of thousands, the Western plutocracies of Britain, France, and America paid no attention to us. Only when our valiant soldiers were under unprecedented enemy assault did they pay attention to us. Then, at the Piave and Vittorio Veneto, their armchair generals and aristocratic bunglers claimed victory for themselves.\n\nAs a final and most grievous insult, they gave the land we were promised, the land we fought, bled, and died for, to the Slavs! The West extols national self-determination while gleefully separating thousands of Italians from their homeland in Dalmatia, spitting in the face of the Treaty of London.\n\nSome people today want us to return to the West for help. They see Fascism's rise in Germany as a threat to us. These men, if I may use the term \"men\", are nothing more than dogs! And they, like abused dogs with nowhere else to go, want to return to their abusers! They believe that the West will suddenly treat us right, despite having no motive or reason to believe so and every reason to believe the opposite!\n\nThey will abandon the hostile actions they have taken against us up to this point simply because we approached them with our hat in hand! If they want to grovel in the dirt like worms, I say let them, but only if they do it alone! Instead, I intend to steer all proud Italians in a new direction! A new path forward in which we seize our destiny and lead Italy into a greater, more prosperous future independent of the West!"
 ITA_Political_Tree.2.A: "Viva Italia!"

 ITA_Political_Tree.3.t: "Italy Demands Dalmatia"
 ITA_Political_Tree.3.d: ""
 ITA_Political_Tree.3.A: "Accept"
 ITA_Political_Tree.3.B: "Refuse"

 ITA_Political_Tree.4.t: "The Kingdom of Italy Asks us to Submit!"
 ITA_Political_Tree.4.d: "Bulgaria is undoubtedly a new nation. First receiving its independence in the Russo-Turkish War of 1877–78, we haven't even hit the hundred years mark. However, we have striven to unite all Bulgarians under one flag in the Balkans as a strong, independent people. That idea of independence quickly came under attack when a note from the Italian government hit our ambassador's desk in Rome:\n\n“For the safety and security of peace in the Balkans and Europe, we demand that the Bulgarian government surrender its governmental autonomy to the Ministry of Foreign Affairs for Italian oversight in the nation, effective immediately. Failure to respond or cooperate will result in further conflict or full intervention.”\n\nMany of our advisers are panicking at the idea of ownership from the Italians, some claiming it could lead to complete annexation in the near future. However, are we really going to risk a full-out war, one that we could lose and kill thousands of soldiers in the process, or work with the Italians for the protection of our people?"
 ITA_Political_Tree.4.A: "Tell them we're ready to cooperate..."
 ITA_Political_Tree.4.B: "We would rather die than be under the Italian boot!"

 ITA_Political_Tree.5.t: "Italians Ask For Surrender of Our Isles!"
 ITA_Political_Tree.5.d: ""
 ITA_Political_Tree.5.A: "We are no match for their navy"
 ITA_Political_Tree.5.B: "Never again shall we be oppressed by a foreign power!"

 ITA_Political_Tree.6.t: "[FROM.GetName] Has Accepted Our Ultimatum"
 ITA_Political_Tree.6.d: "[FROM.GetName] has shown wisdom and acknowledged our superiority. They have agreed to fully meet the demands that were made to them. This has not only increased our power and influence in the Balkans, but it also serves as an example of Italian supremacy to the rest of the world.\n\nThis has brought us one step closer to total dominance of the Balkans, and Italians all over the country are celebrating, ecstatic about what the future holds for Italy. But now is not the time to be complacent: we must focus our sights and attention on a new goal, and quickly, lest someone else beats us to it."
 ITA_Political_Tree.6.A: "One after the other, they will submit."
 
 ITA_Political_Tree.7.t: "[FROM.GetName] Has Refused Our Ultimatum"
 ITA_Political_Tree.7.d: "The government of [FROM.GetNameDef] has categorically rejected our demands. Despite every opportunity for a peaceful resolution, their leaders have chosen defiance over diplomacy. Our ultimatum, which sought to bring [FROM.GetNameDef] into the Italian sphere, was met with arrogance. Our envoy's reports describe scenes of open hostility towards Rome, with military mobilisation already observed near the border. This insult to Italian honour cannot be ignored. The Regio Esercito must now take decisive action to demonstrate that Italian power cannot be ignored. The eyes of Europe are on us, and hesitation would only invite more humiliation."
 ITA_Political_Tree.7.A: "We march. Italy will have what is hers."

 ITA_Political_Tree.8.t: "[FROM.GetName] Has Accepted Our Faction Invitation"
 ITA_Political_Tree.8.d: "After careful negotiation and persuasion, [FROM.GetNameDef] has agreed to support the Italian cause. Our diplomats report on celebrations in the capital, where the signing of the treaty was heralded as a new era of cooperation. Our vision of a strong, united bloc led by Italy is becoming increasingly a reality. With [FROM.GetNameDef] now under our protection and guidance, Rome's influence extends further across the continent. This alliance will not only strengthen our military and economic position, but will also send a clear message to Europe's traditional powers."
 ITA_Political_Tree.8.A: "A proud day for the new order in Europe."

 ITA_Political_Tree.9.t: "[FROM.GetName] Has Refused Our Faction Invitation"
 ITA_Political_Tree.9.d: "Despite extensive diplomatic efforts, [FROM.GetNameDef] declined our invitation to join our alliance. Their leadership cites concerns about sovereignty and the risk of becoming entangled in our foreign ambitions, but many believe foreign pressure from London or Berlin played a role. This rejection will not impede our progress, nor will it be forgotten. The Foreign Ministry is already planning to reassess our relations with [FROM.GetNameDef], because if they do not join us as partners, they may still serve as examples of what happens to those who defy Rome."
 ITA_Political_Tree.9.A: "They will regret turning their backs on us."

 ITA_Political_Tree.10.t: "An Invitation From Italy"
 ITA_Political_Tree.10.d: "We have received a letter from the Italian Foreign Minister containing an invitation to their proposed faction, the Latin Axis.\n\nThey have supported us greatly in both the civil war and the rebuilding after it. As such, it would be logical to join arms and honour their alliance. We might be incapable of defending ourselves alone after all the devastation and their help could come in handy. We share several similarities; we are both catholic nations, we are both of Latin origin, and we are similar ideologically aligned. Furthermore, the Italians might share the fruits of their conquests with us.\n\nYet some in our cabinet recommend that we refuse their offer. Joining an alliance with Italy would tie our foreign policy to them and potentially alienate ourselves from other powers, or even drag us to an unnecessary war. Some of our generals also worry about the Italians' competence, stating that “we won't follow those megalomaniac fools into their doom.”"
 ITA_Political_Tree.10.A: "The Children of Rome Shall Unite in Open Arms!"
 ITA_Political_Tree.10.B: "Even Neutrality Will Defend Us Better Than the Italians!"

 ITA_Political_Tree.11.t: "The Reclamation of War Time Debt"
 ITA_Political_Tree.11.d: "The brave Nationalists have won the Spanish Civil War. Of course, this wouldn't have been possible without our material support. Our rifles, tanks, airplanes, and artillery are what made them victorious. These weapons weren't free, and as such, we require monetary compensation for our help.\n\nOur generals suggest that we demand the price of every Italian arm that was given to them, ranging from the smallest bullet to the biggest tank. This is the most straightforward solution at hand, the nationalists got their victory and we get our money back. Yet after the devastation the Civil War caused, the Spanish may need every single peseta to rebuild their once-great nation.\n\nOur foreign minister suggests that we overlook some of their debt. At first, this may not sound like the most brilliant idea, but it would undoubtedly bring the Spaniards closer to us. Gaining a new ally would repay our efforts tenfold. Besides, what is just a few million Liras to the great Italian economy?\n\nWe are left with to choose between demanding all of our money back, or asking for only some of it and gaining the Spanish as our comrades."
 ITA_Political_Tree.11.A: "Nothing is free"
 ITA_Political_Tree.11.B: "A new ally is worth more than any weapon"

 ITA_Political_Tree.12.t: "Italy Asks Us to Submit"
 ITA_Political_Tree.12.d: ""
 ITA_Political_Tree.12.A: "Submit"
 ITA_Political_Tree.12.B: "Refuse"

 ITA_Political_Tree.13.t: "Albania Submits to Us"
 ITA_Political_Tree.13.d: "The Albanian King Zog I has cowardly accepted our ultimatum of a total Italian takeover of the nation.\n\nAlbania has long been economically dependent on Italian loans and financial aid; we have long been close allies with them, and as a result of these loans and financial aids, Albania has become a de facto protectorate of Italy. For these and other reasons, such as the superior numbers of the Italian troops, King Zog accepted the ultimatum without much of a fight.\n\nItalian forces have already crossed the sea into Albania, imposing order and dominance on the once-independent country and, in the process, finally expanding the Italian empire."
 ITA_Political_Tree.13.A: "Now what to do with Zog?"

 ITA_Political_Tree.14.t: "Albania Refuses to Submit"
 ITA_Political_Tree.14.d: "Zog has foolishly refused our ultimatum on annexing Albania!\n\nEven after threats, proposals, and assurances, King Zog stands firm and refuses to allow Albania to be occupied and annexed. Given the Italian army's overwhelming strength and numbers, as well as Albania's economic reliance on Italian loans and financial aid, this is both unacceptable and foolish. Because of these factors, Albania has de facto become an Italian protectorate, so rejecting the ultimatum makes little sense.\n\nKing Zog will see the consequences of his actions, and he will realise that simply rejecting what Italy demands is not enough."
 ITA_Political_Tree.14.A: "War is not in our interests."
 ITA_Political_Tree.14.B: "Prepare the troops."

 ITA_Political_Tree.141.t: "Naval Landings in Albania Succeed"
 ITA_Political_Tree.141.d: "On April 7, 1939, Italian forces successfully landed in Albania, marking the first successful foreign invasion of the country. The operation, led by Italian dictator Benito Mussolini, is a decisive victory for the Italian military and a major step forward in Italy's efforts to expand its empire.\n\nThe naval landings were carefully planned and executed, with Italian ships transporting troops to the shores of Albania under cover of darkness. Once on shore, the Italian soldiers quickly secured key positions, overwhelming the Albanian defenders with their superior weaponry and training.\n\nAs the sun rose over the Albanian coastline, it became clear that the Italian invasion had been a complete success. Mussolini, who had been closely monitoring the operation from Rome, was jubilant at the news. He declared that the Italian people had once again shown their strength and determination, and that the conquest of Albania was just the beginning of a new era of Italian greatness.\n\nFor the Albanian people, however, the Italian invasion is the beginning of a nightmare. Many were killed or injured in the fighting, and the country has been left in chaos and confusion.\n\nDespite the initial success of the naval landings, the Italian occupation of Albania could prove to be a costly and difficult endeavour. The Albanian people are sure to continue to resist the Italian occupiers, and a war of resistance could drag on for years, costing countless lives and devastating the country. Nevertheless, the successful naval landings in Albania remain a key moment in Italy's history, and a testament to the power of Mussolini's fascist regime."
 ITA_Political_Tree.141.A: "A great success for our forces!"

 ITA_Political_Tree.142.t: "Albanian Resistance Crumbles"
 ITA_Political_Tree.142.d: "Our military campaign in Albania is progressing very well. For a few hours, a small force of 500 Albanians, including gendarmes and armed volunteers, managed to halt our advance. The Albanians, armed with small arms and three machine guns and supported by a coastal battery, fought fiercely until they were defeated by naval gunfire and a large number of light tanks unloaded from Italian ships. The resistance is now crumbling. They are dispersed and rapidly disintegrating. Our high command anticipates that Albania will be fully under our control within a few hours."
 ITA_Political_Tree.142.A: "Victory is near."

 ITA_Political_Tree.143.t: "Victor Emmanuel III Crowned as King of the Albanians"
 ITA_Political_Tree.143.d: "[FROM.GetNewsIcon]After Italian forces captured Albania, the Italian King, Victor Emmanuel III, has now been crowned King of the Albanians. The previous King, Zog I, his wife, Queen Geraldine Apponyi, and their infant son Leka fled to Greece, refusing to become an Italian puppet, although Zog never abdicated. Following their escape, the Albanian parliament voted to depose Zog and unite the country with Italy \"in personal union\" by handing over the Albanian throne to Italian King Victor Emmanuel III.\n\nShefqet Bej Verlaci, Albania's largest landowner, was elected Prime Minister by parliament. Verlaci additionally served as head of state for five days until now. Victor Emmanuel III formally accepted the Albanian throne today in a ceremony at Rome's Quirinale palace. Victor Emmanuel III appointed Francesco Jacomoni di San Savino, a former ambassador to Albania, to be his \"Lieutenant-General of the King\" in Albania."
 ITA_Political_Tree.143.A: "Only one of many to come."
 ITA_Political_Tree.143.B: "Let them have their useless titles."

 ITA_Political_Tree.15.t: "Italy, Centre of European Stability"
 ITA_Political_Tree.15.d: "[FROM.GetNewsIcon]Today the Final Declaration of the Stresa Conference took place, an agreement made in Stresa, a town on the banks of Lake Maggiore in Italy, between France, Britain and Italy. It aims to reaffirm the Locarno Treaties and to declare that the independence of Austria \"would continue to inspire their common policy\". The signatories also agreed to resist any future attempt by Germany to change the Treaty of Versailles.\n\nThe Stresa Front, as the agreement is also referred to, was triggered by Germany's declaration of its intention of building up an air force, increasing the size of its army and introducing conscription. All of these actions are direct violations of the Treaty of Versailles, which limits the size of the German army to 100,000 men and prohibits Germany from using conscription and having an air force.\n\nSince British politicians stated they do not want to attack or occupy Germany, but prefer to have agreements with it to maintain peace in Central Europe and with antiwar sentiment being very strong among the British public, they thought this to be the best way to contain Germany.\n\nHowever, already some people are doubtful and think that these countries will not follow up on this agreement if push comes to shove."
 ITA_Political_Tree.15.A: "Germany Must Be Kept in Check"
 ITA_Political_Tree.15.B: "Let’s See if They Keep Their Word"

 ITA_Political_Tree.17.t: "Italy Plans Preemptive Assault on Greece"
 ITA_Political_Tree.17.d: "A letter from the Italian war committee:\n\n“...To further secure trade in the Mediterranean Sea for civilian and military goods from a hostile government, a new plan of offense has been drafted against the nation of Greece. With planning established, we ask our fellow allies to support an invasion of the coastal nation for the greater good of Europe...”\n\nAlmost instantly upon reading, our own committee was split on the proposal. Some argue that it's a necessary evil to secure another front and trade in the Mediterranean. Others are saying it's warmongering and it'll spread our equipment and troops even more than they are now. \n\nHow should we respond?"
 ITA_Political_Tree.17.A: "It Is a Necessary Move to Halt the Enemy's Advances"
 ITA_Political_Tree.17.B: "Protest the Choice, but Go No Further"

 ITA_Political_Tree.18.t: "Our Decision Has Been Criticized"
 ITA_Political_Tree.18.d: "\"They laughed at us.\"\n\n\"They did what?\"\n\n\"They LAUGHED at us, sir! As we were explaining the proposal, several French diplomats started snickering at the idea of invading another country for gains we need to keep Europe free from tyrants. Soon enough, the British joined in and started joking about how we are \"modern-day Mongolia\" and \"causing more problems like always.\" The red-faced ambassador turned his back with hands clenching his hips. After some deep breaths, he started again. \"Luckily, even with the ridicule, I think we can still move forward with the offensive, even without the allied help. Then, we can show them who was right all along!\""
 ITA_Political_Tree.18.A: "Who needs them anyway?"

 ITA_Political_Tree.19.t: "Green Light From Our Allies"
 ITA_Political_Tree.19.d: "The ambassador poured himself a tall glass of fine wine. He looked pleased at himself, almost a little too much.\n\n\"You look... happy. What happened?\"\n\nThe ambassador put his drink down and smiled. \"After days and days of arguing back and forth with those pitty Frenchmen and the emotionless British we were finally able to convince them that our plan of offense was worth it. More than worth it. Almost a necessity.\" He took a long sip of his wine before giving a devilish smile. \"They gave us a complete go ahead with full support, all we have to do is enact it...\" He stood up and slowly walked to the window with his arms folded, gazing out into the night sky. \"Maybe the French and British aren't so bad after all?\""
 ITA_Political_Tree.19.A: "Yup, that's enough wine for you"

 ITA_Political_Tree.20.t: "Our Proposal Has Been Rejected!"
 ITA_Political_Tree.20.d: "The giant red letters covered the top of the thick folder, glaring with the word anybody could read:\n\nREJECTED\n\n“So, I can see they didn't take it nicely?”\n\nThe ambassador then quietly spoke like he was on the verge of tears, while simultaneously rising in anger. \"I bet they didn't even read it, sir. They probably just saw it had the word \"offense\" in it and threw it in the dumpster. What's going to happen when a pro-enemy government takes power, huh? What's going to happen when our trade routes and supply lines are cut off, huh? What's going to happen then!?\" The ambassador was hot red in the face, and ready to punch someone. Even the servant nearby left the room in a hurry. He looked up and smiled after having his head in his palms and let out a defeated laugh, “How many times are the British and French going to backstab our plans?”"
 ITA_Political_Tree.20.A: "Take a Walk Outside, Ambassador."
 ITA_Political_Tree.20.B: "We Won't Listen to Them!"

 ITA_Political_Tree.21.t: "Italy Plans Preemptive Assault on Turkey"
 ITA_Political_Tree.21.d: "A letter from the Italian war committee:\n\n“...It has come to our attention that the nation of Turkey is a viable trade partner and a geographic gateway into the Black Sea and the Balkans. With threats of a hostile government forming in the nation, we have been planning an offensive intervention. We call upon our allies to support us in the invasion for the greater good of Europe...”\n\nAn invasion of Turkey could prove beneficial for the reasons stated in the proposal. However, some of our advisers have been harshly against it, calling it “warmongering” and \"a perfect way to waste our troops' lives.\"\n\nHow should we respond? "
 ITA_Political_Tree.21.A: "It Is a Necessary Move to Halt the Enemy's Advances"
 ITA_Political_Tree.21.B: "Protest the Choice, but Go No Further"

 ITA_Political_Tree.22.t: "Our Decision Has Been Criticized"
 ITA_Political_Tree.22.d: ""
 ITA_Political_Tree.22.A: "Oh no! Anyways..."

 ITA_Political_Tree.23.t: "Green Light From Our Allies"
 ITA_Political_Tree.23.d: ""
 ITA_Political_Tree.23.A: "We do it for your own good, we swear!"

 ITA_Political_Tree.24.t: "Our Proposal Has Been Rejected!"
 ITA_Political_Tree.24.d: "The giant red letters covered the top of the thick folder, glaring with the word anybody could read:\n\nREJECTED\n\n“So, I can see they didn't take it nicely?”\n\nThe ambassador then quietly spoke like he was on the verge of tears, while simultaneously rising in anger. \"I bet they didn't even read it, sir. They probably just saw it had the word \"offense\" in it and threw it in the dumpster. What's going to happen when a pro-enemy government takes power, huh? What's going to happen when our trade routes and supply lines are cut off, huh? What's going to happen then!?\" The ambassador was hot red in the face, and ready to punch someone. Even the servant nearby left the room in a hurry. He looked up and smiled after having his head in his palms and let out a defeated laugh, “How many times are the British and French going to backstab our plans?”"
 ITA_Political_Tree.24.A: "Take a Walk Outside, Ambassador."
 ITA_Political_Tree.24.B: "We Won't Listen to Them!"

 ITA_Stresa_Front.1.t: "French Diplomatic Reaction"
 ITA_Stresa_Front.1.d: "Even though we are supposed to be Allies with the Italians, the decision of Prime Minister Mussolini to directly invade Ethiopia, an independent country, has already opened up the first cracks in our alliance.\n\nOn the one hand, this act of war is undoubtedly in breach of International Law and is heavily criticized by the majority of our population, which fiercely condemns Italy's act of aggression, meaning that a nonreaction would greatly harm our image, both domestically and internationally, while also giving Hitler the option to portray us as hypocrites, who only cite International Law to oppress Germany.\n\nHowever the Italians are vital allies against Germany and would almost certainly leave the Front, should we veto their intervention, driving them into Germanys' arms, greatly weakening our position in the wars to come.\n\nThe question remains, how should the government react?"
 ITA_Stresa_Front.1.A: "We Need the Italians. Turn a Blind Eye."
 ITA_Stresa_Front.1.B: "The French Are and Always Will Be Proponents of International Law! Veto This Invasion!"
 ITA_Stresa_Front.1.C: "Present the Italians with the Hoare-Laval proposition"

 ITA_Stresa_Front.2.t: "British Diplomatic Reaction to the Tensions in Abyssinia"
 ITA_Stresa_Front.2.d: "While the Stresa Front, our alliance with the French and the Italians, is barely a few months old, the Italians have already come forward with a request towards us and the French.\nWhile the request itself is relatively simple, non-intervention and diplomatic support for the Italian Invasion of Ethiopia, the results of us giving the Italians free rein could prove disastrous in other matters of both foreign and domestic politics.\n\nThe Italian “Intervention” in Ethiopia has been widely criticized by the general population, opposition parties, and even some of our party members for a while now, with the official British stance being one of disapproval and limited sanctions, which means that any step backward could expose us as „hypocrites“ while greatly damaging the International Laws, that we helped write and are supposed to adhere too. Furthermore, this could prove a great blow to the popularity of our government, with the majority of the population firmly being on Ethiopia's side.\n\nHowever should we refuse the Italian request, it remains a possibility that Italy leaves the Stresa Front completely, with their trust in us destroyed, driving the Italians directly into Germanys' arms.\nThis decision could very well decide the odds of the wars to come."
 ITA_Stresa_Front.2.A: "Who are we to tell them not to have an empire?"
 ITA_Stresa_Front.2.B: "The Italians are getting too big for their boots"
 ITA_Stresa_Front.2.C: "Go forth with the Hoare-Laval pact"

 ITA_Stresa_Front.3.t: "The front agrees with our decision!"
 ITA_Stresa_Front.3.d: ""
 ITA_Stresa_Front.3.A: "Great!"

 ITA_Stresa_Front.4.t: "The Front Vetoes Our Intervention!"
 ITA_Stresa_Front.4.d: "Despite our supposed alliance the British and French have seen it fit to veto our intervention in Abyssinia, costing us a great deal of international standing and making us look like war-hungry tyrants, who attack “independent“ nations for purely selfish reasons!\n\nWhile the demands we made of the Stresa Front were certainly not small ones, it seems that the British and French have forgotten their arrangments, choosing to support their rather convenient international law over agreements and allies, even going so far as to publicly condemn our intervention, exposing us to great ridicule and adversity on the international stage.\n\nIt is unclear if our alliance will survive this great betrayal, but it now seems obvious that Italias were never meant to be represented in the Stresa Front at all and with our options running thin, many people in the government have concluded that the West cannot be trusted, which would make the search for new allies a worthwhile investment."
 ITA_Stresa_Front.4.A: "We Should’ve Never Trusted the Plutocrats"
 ITA_Stresa_Front.4.B: "We’ll Pull Back, for the Sake of Peace"

 ITA_Stresa_Front.5.t: "A Proposal From the Front."
 ITA_Stresa_Front.5.d: "In response to our demands of non-intervention and diplomatic support, our Allies in the Stresa Front have come to us with a proposal to resolve the newly dubbed “Ethiopian crisis“, offering us to follow the lines of the Hoare-Laval pact, in exchange for diplomatic support and non-intervention in Abyssinia.\n\nThe current proposal would mean the exchange of some territories in Ethiopia, with the establishment of an Italian Exclusive economic zone, which could be used to greatly expand our influence in Eastern Africa, through peaceful means, while Ethiopia would gain access to our port in Assab. Our diplomats however are fairly confident, that we can change the proposal to abstain from the loss of Assab, making the agreement a low-cost, high reward venture.\n\nBut we must not forget, that even these generous concessions are less than what we initially stood to gain through war and would put a stop to future expansion in East Africa."
 ITA_Stresa_Front.5.A: "We only stand to benefit!"
 ITA_Stresa_Front.5.B: "The Ethiopians Don’t Deserve Italian Land!"
 ITA_Stresa_Front.5.C: "No Deal!"

 ITA_Normal_HL_Exchange_tt: "§gWe'll get some Ethiopian Territories and Resource Rights in exchange for the State of Assab§!"
 ITA_Harsh_HL_Exchange_tt: "§gWe won't give these Ethiopians any territory§!"

 ITA_Stresa_Front.6.t: "Deadlock in the Front!"
 ITA_Stresa_Front.6.d: "It seems that our request for non-intervention in the Ethiopian crisis has created a deadlock in the Front as both Britain and France have issued contradicting statements in response.\n\nThis leaves us with the unique position to choose between the different proposals, weighing the advantages and disadvantages against each other.\n\nWhile this is a very fortunate outcome for us, it seems that the cohesion of the front has taken a great hit, with Britain and France facing a great amount of ridicule for their incapability to come to a single conclusion. How this develops shall be seen, but, surely, any decision we take will harm the integrity of the front."
 ITA_Stresa_Front.6.A: "The British Have the Right Idea"
 ITA_Stresa_Front.6.B: "The French Know Best"

 ITA_Stresa_Front.7.t: "The Stresa Front has Collapsed"
 ITA_Stresa_Front.7.d: ""
 ITA_Stresa_Front.7.A: ""

 ITA_Stresa_Front.8.t: "The Demands of the Western Powers"
 ITA_Stresa_Front.8.d: ""
 ITA_Stresa_Front.8.A: "I suppose we have no choice"
 ITA_Stresa_Front.8.B: "To hell with the western powers!"

