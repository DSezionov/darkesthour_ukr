 ITA_Carta_del_Lavoro: "Carta del Lavoro"
 ITA_Carta_del_Lavoro_desc: "The Carta del Lavoro, introduced in 1927, embodies the Fascist regime's vision of a corporatist Italian state, aiming to bring labour and industry under state control while presenting work as a social duty and a people's right. This policy aims to strengthen Italy's economic foundations by organising workers and employers into state-approved syndicates, reducing class conflict, and increasing national productivity.\n\nWhile the charter has begun to modernise Italy's industrial and agricultural sectors, it has also given the government extensive control over labour and the economy. Its implementation faces opposition from both traditionalist elements within the bourgeoisie, who oppose state intervention, and disillusioned workers, who believe the system favours industrialists over labour rights."

