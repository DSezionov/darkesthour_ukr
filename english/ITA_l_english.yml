 ITA_Rigid_Autarky: "Rigid Autarky"
 ITA_Rigid_Autarky_desc: "The aftermath of the 1929 Wall Street crash had engulfed our economy. It continued to have a negative impact on businesses and employment for years following. We have implemented financial and industrial bailouts, as well as trade protectionism, to counteract the negative effects on our economy. Our concept of strong and extensive government intervention has proven to be very effective, as we have saved the financial system and avoided a collapse while bringing a large portion of the economy under state control. Protectionism, combined with the pressure of international sanctions, has resulted in a policy of strict autarky."

 ITA_IRI: "IRI"
 ITA_IRI_desc: "The 1929 economic downturn weakened the banks, which had taken large stakes in struggling businesses after the war. The Institute for Industrial Reconstruction was one of the financial support policies that ultimately averted a financial crisis. The IRI controls the Banca Commerciale, the Banco di Roma, and the Credito Italiano, as well as their industrial shareholdings. The IRI owns or controls 42% of Italian joint-stock companies, including a significant portion of the steel, telecommunications, and mechanical sectors. Initially conceived as a temporary recovery body, the IRI evolved into a permanent solution when we realised that the capital available on the Italian market would not allow for the reprivatisation of the investee companies."

