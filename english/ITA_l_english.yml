 ITA_Old_Style_Army: "Old Style Army"
 ITA_Old_Style_Army_desc: "Mussolini's Under-Secretary for War Production estimates that we could not possibly be prepared for a war until at least October 1942. Although we are a major power in Europe, the lack of a strong automotive industry makes it difficult for us to mechanize our military. Much of our artillery and weapons date from the Great War. Most important of all, however, is that our generals are trained in the trench warfare of the Great War and are not at all prepared for a new style of mechanized war."

