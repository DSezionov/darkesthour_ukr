 ITA_Out_with_the_old_in_with_the_new: "Out with the old in with the new"
 ITA_Out_with_the_old_in_with_the_new_desc: ""

 ITA_Gladius: "§aRegio Esercito§!"
 ITA_Gladius_desc: "The Royal Italian Army is one of the best in Europe and was established in 1861 along with the country it serves. Its warriors are valiant, and their military heritage dates back to the Roman Legions. It fought for nearly three years on one of the deadliest and most brutal fronts of the entire Great War. Il Duce himself served in the highest Alps peaks, watching his comrades scale the heights day after day in a futile attempt to gain territory. While the rest of the world forgets the Alpine Front, Italians will never forget the heroes it produced.\n\nDespite its accomplishments, the Army could benefit from some tweaks, as anyone who cares can see. The men do not want to repeat the arduous attrition of the Alpine Front, and its leadership is too entrenched in the past to implement the new strategies being demonstrated in war simulations all over the world. Its weapons are only modern by 1910s standards, let alone modern standards. If the Army is to rise to the level of the ancient Legions, it must undergo significant transformation."

 ITA_Introduce_Upper_Brass: "Introduce Upper Brass"
 ITA_Introduce_Upper_Brass_desc: "The Italian Army is suffering from a severe officer shortage. In reality, our \"High Command\" is made up of only seven generals who act as Mussolini's advisors and have no real authority. However, an army without officers is nothing more than a gang with guns. If we are to address the various issues confronting our Army, we must begin at the top. As a result, we will begin meticulously searching our army for the best of the best.\n\nThese individuals will be promoted and enrolled in officer training after demonstrating their abilities as soldiers and leaders. This would not only address our officer shortage, but would also encourage our troops to strive for excellence. They may increase their own efforts if they see their fellow soldiers being rewarded for their efforts."

 ITA_Finish_the_integration_of_the_MVSN: "Finish the integration of the MVSN"
 ITA_Finish_the_integration_of_the_MVSN_desc: "The Milizia Volontaria per la Sicurezza Nazionale, also known as the Blackshirts, form the foundation of our government. They were founded in 1923 and are made up of some of the most fervent Italian nationalists. These patriotic men should be able to serve their country naturally. As a result of this, we have begun to integrate the Blackshirts into the Army. These warriors will serve as elite regiments, overpowering the opposition where it is most vulnerable.\n\nThese Blackshirts, like the Waffen SS in Nazi Germany, will be crucial to the Army's biggest victories. Some argue that because the Blackshirts are inexperienced street thugs, they will simply disintegrate at the first sign of conflict. Mussolini, on the other hand, is well aware that this is not the case. They fought and died on the streets of Milan and Rome throughout the 1920s. They can now fight and conquer Moscow, Paris, and London's streets."
 ITA_Finish_the_integration_of_the_MVSN_tt: "£faction_texticon_ITA_mussolinists §jBlackshirt Divisions will be deployed§! "

 ITA_Biastrocchis_Reforms: "Baistrocchi's Reforms"
 ITA_Biastrocchis_Reforms_desc: "For far too long, the Army has been estranged from the regime. Its soldiers are not politically educated, and its generals are clearly more loyal to the King than to Mussolini. This cannot continue if Mussolini wishes to see Italy triumph. As a result, Federico Baistrocchi has been promoted to Army General. In addition to his suggestions for practical Army reform, such as getting new uniforms, creating new armoured units, and modernising the Army's gear and uniforms, Biastrocchi will eventually put an end to the Army's autonomous spirit.\n\nBecause he is a devoted fascist, it stands to reason that he would allow us to direct his military exploits. Hanging Mussolini's portrait in every barrack and restricting admission to military academies to Party members only are two of his most significant reforms. Along with his other more practical reforms, this will transform the Army from a rabid hound to a polished and refined force ready to conquer the world."
 ITA_Motorized_Division: "§sWe will get our first Motorized Division§!\n\n"

 ITA_Badoglios_Old_Ways: "Badoglio's Old Ways"
 ITA_Badoglios_Old_Ways_desc: "Pietro Bagdolio is an important member of the Italian Army. He joined the military in 1890 and has served in every war in which Italy has been involved since then. During the Great War he even served as vice chief of staff! Many people admire the man because of his long and extraordinarily illustrious career, and many more are eager to hear his thoughts on battle. Bagdolio, as a descendant of the old school, has very traditional ideas about how the following conflict should be fought.\n\nBagdolio disputes the German claim that the next war will be fought on marches. Instead, like the Great War, it will be marked by trenches, muck, and blood. Many people are inclined to believe his story. Nothing suggests that a tank will be particularly disruptive if adequate defences are in place. A modern army requires organisation, support, and a fighting spirit. That is why we must stick by Bagdolio as we prepare for the conflict we will soon be fighting."
 ITA_Armoured_Division_Badoglio: "§sWe will get our first £tank_icon_1_20x20 Armoured Brigade§!\n\n"

 ITA_Engineer_Dual_Purpose_Cannons: "Engineer Dual Purpose Cannons"
 ITA_Engineer_Dual_Purpose_Cannons_desc: "There is no denying artillery's power. Buildings can be destroyed by their shells just as easily as the fighting spirit of the men who inhabit them. However, artillery has a major flaw. It is only effective at a distance. If the enemy gets too close, shelling them becomes too dangerous. The infantry is also challenged by a lack of effective anti-tank weapons. As other armies around the world continue to mechanise, our Army has unquestionably fallen behind. Our tanks are less manoeuvrable, less armoured, and smaller. As a result, we are now reliant on infantry-manned anti-tank guns, which are also scarce. However, a solution to both problems has been proposed.\n\nAn artillery gun can be transformed into a powerful anti-tank weapon with a simple upgrade. The artillery would then play two roles. When the enemy got too close for the artillery to barrage, they switched to an anti-tank role and destroyed any metal monsters in their path. This would weaken the opponent's resolve while simultaneously boosting our own men's morale. At the same time, we would get more use out of each gun, justifying the use of increasingly precious materials."

 ITA_De_Bono_and_Graziani_Know_Best: "De Bono and Graziani Know Best"
 ITA_De_Bono_and_Graziani_Know_Best_desc: "As our military modernises, we have begun to devise new strategies. While innovation is wonderful, there are times when people prefer to stick to the tried and true. Emilio De Bono and Rodolfo Graziani are the two most ardent supporters of the custom. These two are fans of the previous war's \"Bite and Hold\" tactics. Some argue that these strategies are obsolete. They may, however, be our best available strategy. Given our small population and inferior weaponry, both unrelenting defence and rash attack like the Germans are ultimately unsustainable. We can only truly succeed if we strike when we are ready, seize what we can, and then hold it against inevitable counterattacks."

 ITA_A_Romans_Sword: "A Roman's Sword"
 ITA_A_Romans_Sword_desc: "In ancient Rome, every member of the Roman Legion carried a Gladius. This small sword was light, powerful, and most importantly, effective. Because of it, Rome ruled the world! As we rebuild Rome, our new Legion requires its own Gladius. It is necessary to have a weapon that can accompany the men in any situation and prevail in battle. That is the purpose of artillery. We will develop a new tool that is light enough to accompany our soldiers in any situation on any front. It must be small and light while being powerful enough to break anything thrown at it.\n\nSuch a weapon does not yet exist because making such a request is difficult. The Italian man, on the other hand, is clearly superior to his contemporaries. Many designs have already been submitted for review and approval. Our weapons will dominate every battlefield, from the highest peaks to the deepest valleys, and our opponents will learn to fear the sound of them."

 ITA_A_Romans_Tools: "A Roman's Tools"
 ITA_A_Romans_Tools_desc: "The Roman Legionnaire's arsenal was incredibly diverse. He was carrying supplies and equipment in addition to combat weapons. Every night, these tools were used to establish well-structured and prepared camps wherever the legion might stop. In a matter of hours, a field would be transformed into a bustling, well-defended camp. The modern Roman's tools will be very similar.\n\nOur soldiers will be different from those in other armies, which may only provide the bare necessities of combat and rely on shaky supply lines to hold the rest. All of the materials needed to fight and defend themselves will be brought with them. This will provide our troops with much-needed variety in their actions and approaches to combat's unpredictable situations."

 ITA_Simplify_Infantry_Support_Equipment: "Simplify Infantry Support Equipment"
 ITA_Simplify_Infantry_Support_Equipment_desc: "Every Italian soldier is given subpar infantry support equipment. Despite the fact that it is properly manufactured and used, there are simply too many variations. Because our army is rapidly expanding, we are running out of equipment to equip our soldiers. To compensate for this shortfall, we have been forced to open warehouses and distribute obsolete equipment or use other imported weaponry.\n\nAs a result, many units now have a variety of support weapons from various eras and countries. Repairing those weapons is at best difficult, and at worst completely impossible. If we are to effectively expand our Army even further, we must address these bottlenecks in the assembly line and standardise all of our support equipment."

 ITA_Lend_An_Ear_To_Pariani: "Lend An Ear to Pariani"
 ITA_Lend_An_Ear_To_Pariani_desc: "Bagdolio is a respected individual, but he is not the only one with lofty plans for reforming the Italian Army. Alberto Pariani, a skilled combatant in the Great War and later a member of the General Staff, has his own ideas for modernising the Italian Army in preparation for upcoming battles. He sees motorization as a necessary evil rather than an absurd fantasy. Because of its strength and speed, the Italian soldier can overrun enemy fronts and dash dozens of kilometres into their rear before the adversary can retaliate. Thousands of pieces of booming artillery, powerful enough to breach a bunker but portable enough to follow the advance, can aid in these advances.\n\nDigging in after every advance can only lead to another Great War, which the country and army cannot, and more importantly, will not, withstand. Mussolini understands how dangerous it is to support Pariani over Bagdolio. However, he has always had a reputation for taking risks and if Pariani is correct, the Italian Army's might and speed will astound the entire world, and the spirit of the Legions will be resurrected."
 ITA_Armoured_Division_Pariani: "§sWe will get our first £tank_icon_1_20x20 Armoured Brigade§!\n\n"

 ITA_Divisione_Binaria: "Divisione Binaria"
 ITA_Divisione_Binaria_desc: "The Italian division, like the rest of the world, had three regiments up to this point. However in comparison to the rest of the world, Italy lacks men, or at least men who want to serve. Because we must distribute replacements across three regiments, several of our divisions are severely undermanned. However, the proposed Binary Division method provides a simple and quick solution to this conundrum. The only difference between these divisions and standard divisions is that they have two regiments instead of three. Some argue that because it weakens divisions, it weakens the army. There is no other option, however, unless millions more Italian soldiers are recruited into the Army."

 ITA_Alpini_Expansion: "Alpini Division Expansion"
 ITA_Alpini_Expansion_desc: "The Regia Marina does an excellent job of protecting Italy's coastline. The only remaining route into Italy is over land. Fortunately, the massive Italian Mountains also prevent this. They are Europe's tallest mountains, and like the massive, unbroken wall that they are, they have done Italy much good over the centuries by preventing invasions of our beautiful peninsula. However, the mountains may no longer be sufficient to keep our attackers at bay. Mountain valleys that were previously inaccessible can now be traversed, albeit treacherously, thanks to recent advances in military tactics and equipment.\n\nThis necessitates 24-hour defence of the mountains. We will expand the Alpini Division to accomplish this, as well as to provide us with a troop of mountaineers if the need arises. These men are only trained in mountain warfare. They can summit any range we send them to if they can win a fight among the high Alps peaks."

 ITA_X_Flottiglia_MAS: "X Flottiglia MAS"
 ITA_X_Flottiglia_MAS_desc: "Spearfishers off the coasts of France and Italy have recently begun to develop industrial oxygen rebreathers in order to extend their time spent underwater. People at the Regia Marina are becoming more aware of recent social developments. Divers' ability to attack ships at anchor has long been recognised in Italy.\n\nThis is of particular interest to Mussolini, who has ordered the formation of Decima Flottiglia MAS, also known as X Flottiglia MAS or simply X MAS. The majority of this fleet will be small boats that will support Naval \"frogmen\" who can and will be deployed to attack enemy ships in port. With these new divers at our disposal, we can make all of our enemies fear the ocean not only at sea, but also in port."

 ITA_Gli_Arditi_Neri: "Gli Arditi Neri"
 ITA_Gli_Arditi_Neri_desc: "Throughout the Great War, Italy fielded one of the most feared Special Forces divisions. We didn't have stormtroopers like the Germans, but we did have Arditi. These individuals were hand-picked from among the Alpini or Bersaglieri as the best of the best. They were then taught cutting-edge strategies, tools, and hand-to-hand combat techniques. The Arditi were the most feared men on the Front because they were assigned the most dangerous missions and successfully completed them.\n\nAfter the war, several of these brave soldiers joined our movement, giving us a once-in-a-lifetime opportunity. We will use their expertise to bolster our own special forces teams. The Arditi way of war will not only survive, but will become a new standard, ensuring that every Italian special forces soldier is the best of the best."

 ITA_Flats_Trusty_Trucks: "Fiat's Trusty Trucks"
 ITA_Flats_Trusty_Trucks_desc: "Fiat is one of the world's best automakers. In terms of strength, fuel efficiency, and sense of power, they are unrivalled by any other automaker. These characteristics are advantageous for trucks. However, in our army, which lacks motorization, supplies are transported to the front by donkeys or horse-drawn carriages. In the mountains, it is the only option. However, a different approach is required for the vast flat plains we will soon conquer. As a result, we can count on Fiat to design a brand-new, durable, and affordable truck for our troops. We will no longer be limited by physical horsepower. Instead, the Italian Army will follow the rest of the world's lead and reap the benefits of mechanisation."

 ITA_Give_Reign_to_Messe: "Give Reign to Messe"
 ITA_Give_Reign_to_Messe_desc: "Italy is geographically distinct. As a Peninsula, it is heavily forested, with only a small portion of the land flat enough for farming, let alone tanks. As a result, our tank corps leagues have fallen behind those of other nations. This fact, combined with our industrial weakness, makes a strong armoured corps like Germany's or even France's a pipe dream in the eyes of many military planners. However, one general has a different perspective. Even in a mountainous country like Italy, Giovanni Messe sees tanks' potential in modern warfare. He has consistently argued for an expansion of Italy’s tank forces and now, with war on the horizon and our enemies fielding newer and better tank forces of their own, it's time to let him have his way."

 ITA_I_Celeri: "I Celeri"
 ITA_I_Celeri_desc: "We currently operate a small number of 'Celeri' units. These units include both motorised and horse-drawn vehicles. They have their uses in the metropole, even if they are currently civilian in nature, working on construction projects and the like. If we are to send these units to war, we must provide them with new weapons, most notably tanks that are of high quality. The'medium tank' has more armour and a heavier cannon than a light tank while retaining the mobility that heavy tanks lose. We must develop our own medium tank and then transform our units from menial labour battalions into modern Regio Esercito spearheads."

 ITA_Novum_Scutum: "Novum Scutum"
 ITA_Novum_Scutum_desc: "The Scutum was the light, rectangular shield that protected the Roman soldier from his enemy in ancient Rome. The shields you carry have little use in today's ballistic battlefields, but that doesn't mean we'll send our men into the killing fields unprotected. Our soldiers require a new type of shield, a tank that can follow them and deflect enemy fire. \n\nWe will complete this task, no matter how difficult it may be. This new shield must be light enough to climb mountains while also being tough enough to withstand the most powerful shell a man can throw at it. At the same time, if it is to be intimidating, it must deal out more than it is given. Fortunately, we already have a plethora of designs for such a beast. All we have to do is make a decision."

 ITA_II_Bassoto: "II Bassoto"
 ITA_II_Bassoto_desc: "As tanks gain more armor, we must develop larger and larger guns to pierce that armour. These weapons have already grown too large for men to carry. They are, however, too large, at least in most cases, to fit on the agile tanks required to manoeuvre our difficult terrain. As a result, we've adopted a new armoured vehicle, the tank destroyer. Its sole purpose is to be used as a hammer to strike enemy armour. We will be able to crack open any tin can the enemy throws at us if we develop more of them with larger guns. Then we can send in our own tanks and annihilate the enemy at our leisure."

 ITA_Le_Nuovi_Legion: "Le Nuovi Legioni"
 ITA_Le_Nuovi_Legion_desc: "When Mussolini took power, the Italian Army was a farce. Its soldiers were dissatisfied, its equipment was outdated, and its leaders were elderly men stuck in the past. The Italian soldier, on the other hand, has been reforged into an effective, loyal, and tenacious fighting machine. He is given some of the best equipment in the world, allowing him to go wherever we send our forces and still work flawlessly.\n\nTheir old and overly cautious leaders have been replaced by men with hearts for conquest and warfare and minds brimming with ideas for outwitting our adversary. Our men are now marching forward as a disciplined, unbreakable wave that will wash over our enemies and bring the Mare Nostrum concept to life!"

 ITA_Aquila: "§SRegia Aeronautica§!"
 ITA_Aquila_desc: "The Regia Aeronautica, as the Air Force, is naturally the service's youngest wing. It has only existed independently of the Army since the early 1920s. Mussolini, on the other hand, sees a lot of potential in this new weapon. He immediately recognised the benefits of having control of the air during a battle. However, because Italy is not yet at war, he has devised other applications. The Regia Aeronautica has evolved into the military's primary propaganda machine. Under Il Duce's orders, our brave pilots broke numerous speed and distance records, demonstrating the power of the Italian airman to all.\n\nHowever, war is on the horizon, and the air force's recent formation has become its most powerful asset. Its leaders are free of the centuries of theoretical orthodoxy that have plagued the Army and Navy, allowing for new and exciting tactical ideas to be championed. It is truly a blank canvas for Mussolini to create whatever he desires or requires."

 ITA_Badoglios_Influence: "Badoglio's Influence"
 ITA_Badoglios_Influence_desc: "Bagdolio's influence appears to extend all the way to the skies. When the air force was merely an extension of the Army, Bagdolio wielded considerable power over its use. He intended to use the air force as a hammer to strike the enemy's head, decimating them from above and making the ground advance easier. This concept of ground support has remained a core pillar of our air fleet's strategy even after the air force was separated from the Army."

 ITA_Citta_Dell_Aria: "Citta Dell'Aria"
 ITA_Citta_Dell_Aria_desc: "To remain at the forefront of aeronautical research, our air force requires a place to test new ideas and inventions, similar to what the Navy and Army have. That will be the Citta Dell'Aria, or City of the Air. There, in a field just outside Montecelio, our air force will put cutting-edge aeronautical technology to the test and set new records that will forever mark our glorious empire in the record books.\n\nMussolini will have his propaganda vehicle, the Air Force will have a proving ground to improve the Force with each passing day, and our people will have another branch of the armed forces to be proud of. It's a win-win situation for everyone."

 ITA_Douhet_Doctrine: "Douhet Doctrine"
 ITA_Douhet_Doctrine_desc: "Throughout the 1920s, many countries had their own air pioneers. The United States has Billy Mitchell, the United Kingdom has Hugh Trenchard, and Germany has Walther Wever. Giulio Douhet represents Italy. Douhet has clearly planned to use an independent air force, having recognised its potential since the turn of the century. Douhet has realised that the ability to strike deep into enemy territory, far from the front lines, is a huge advantage.\n\nHe claims that bombing military and industrial targets far behind the enemy line will irreversibly turn the enemy public against the war and force its end in our favour. By adopting this doctrine for our own air force, we can ensure that no man who rises against us does so without fear for the safety of his family at home, far from the front. Nothing will be safe from our grasp, and there will be nowhere to flee to."

 ITA_Ground_Support_Aircraft: "Ground Support Aircraft"
 ITA_Ground_Support_Aircraft_desc: "Infantry does not advance on its own. The artillery corps's innumerable guns thunder behind, shattering the enemy in front. Alongside, tanks rush forward to destroy what the artillery missed and to demoralise the enemy as they watch their comrades get run over, machine gunned, or atomized by cannon shots fired by these new metal beasts. When the infantry arrives at the enemy's position, they find nothing but broken men eager to surrender, before a single shot was even fired.\n\nNow however these men will advance with support from a new direction, diving in from above. A new breed of fighters, the ground support aircraft, has been created. Ground support aircraft are a new breed of fighter aircraft. These planes, which will be armed with both bombs and guns, will be tasked with diving straight on the enemy's head, bypassing armour designed to deflect head-on shots. Death will come from all sides, and our adversaries will have no choice but to surrender or die."

 ITA_Ex_Alto_Fulgor: "Ex Alto Fulgor"
 ITA_Ex_Alto_Fulgor_desc: "Planes have begun to drop men from the sky, just as they can drop death. Since Soviet experiments in the 1920s, the world has become aware of the possibility of so-called paratroopers. These highly trained and brave men will be used in high-risk, high-reward missions. They will be dropped far behind enemy lines to secure bridges, destroy vital targets that are out of range of conventional weapons, or simply to cause chaos.\n\nIn this new frontier, Italy will not be left behind. The 185th Division will be our own paratrooper regiment. This division, made up of our Army's best trained and bravest warriors, will be critical to our success against our enemies, whoever they may be."
 ITA_Ex_Alto_Fulgor_tt: "The £helmet_icon_1_20x20 §Y185th Divisione Paracadutisti \"Folgore\"§! will be deployed"

 ITA_New_Fascist_Airfleet: "New Fascist Airfleet"
 ITA_New_Fascist_Airfleet_desc: "Mussolini is ecstatic about the Air Force. In it, he sees a bold new frontier for Italy to conquer. While the rest of the world wallows in their tanks and trucks, Italian planes will rule the sky and annihilate any enemy that dares challenge his new Empire. Mussolini's dream air force, however, is not the air force he now commands. While the Regia Aeronautica is large and well-designed, it lags behind other air forces such as Germany and the United Kingdom. That is why Mussolini has decided to take his beloved branch in a bold new direction.\n\nThis program, dubbed the New Fascist Airfleet, will be dedicated to rapidly expanding the air force to the point where no one will be able to challenge it in the air. The programme is undeniably ambitious, but Mussolini is confident that it can be completed."

 ITA_Daredevil_Airforce: "Daredevil Air Force"
 ITA_Daredevil_Airforce_desc: "Some Generals have suggested that as we solidify our overarching operational doctrine for the Air Force, we take risks due to a lack of equipment and professionalism. They think that planes flying alongside troops, diving in and out of combat to disrupt enemy lines will allow for easier breakthroughs. They acknowledge that putting our planes right up against the enemy will result in higher losses, but they deem this is unimportant and an acceptable risk. More planes and pilots can always be built and trained.\n\nFurthermore, they insist that the sight of a 3,000 kg bird of death raining bombs and bullets into exposed positions will quickly break the enemy before heavy losses can be taken. After much debate, their point of view was accepted and will be implemented into our air force."

 ITA_Conservative_Airforce: "Conservative Air Force"
 ITA_Conservative_Airforce_desc: "Many have suggested that we continue to rely on tactical bombardment of the enemy as we solidify our overarching operational doctrine for the Air Force. While breaking an enemy at the front is certainly more heroic, they remind us that a war is won not only at the front, but also at home. According to their arguments, we can break our enemy's will to fight by destroying enemy military, industrial, and even civilian centres.\n\nNot only will it hasten the end of any future war, saving us both men and material. It will also force the enemy to devote valuable resources to far-flung rear areas in order to defend them from our bombers, which will fly safely out of range of their guns. Even if the war continues, with their factories destroyed, cities in flames, and military bases reduced to craters, any enemy attempting to fight us will be unable to do so for long. Their arguments were heard in general staff meetings, and this is how we will use our air force."

 ITA_Lariete: "L'Ariete"
 ITA_Lariete_desc: ""

 ITA_La_Folgore: "La Folgore"
 ITA_La_Folgore_desc: "The Macchi C.202 Folgore, is a new fighter aircraft designed and built by Macchi Aeronautica. Following its initial flights, the prototype was flown to the Regia Aeronautica's main test airfield in Guidonia, where test pilots reportedly responded positively. During testing, a speed of 603 km/h was recorded, as was an altitude of 5,486 m in six minutes; additionally, little of the earlier C.200's favourable manoeuvrability has been lost. Another advantage is its extremely strong construction, which allows pilots to dive the aircraft steeply.\n\nThe performance figures gathered during these tests indicate that we have finally caught up with both Britain and Germany in the field of fighter airplanes. The C.202 is lightly armed relative to its contemporaries, with just a pair of machine guns, but we are convinced that it will very quickly prove itself to be an effective and deadly dogfighter against its contemporaries. As a result of the positive flight test results, the C.202 will be ordered into production and deployed on all fronts right away."

 ITA_Il_Sparviero: "Il Sparviero"
 ITA_Il_Sparviero_desc: ""

 ITA_Tridens: "§3Regia Marina§!"
 ITA_Tridens_desc: "The Regia Marina, or Royal Navy, is Italy's most important military branch. For thousands of years, Italian states have fought to control the entire Mediterranean, akin to ancient Rome. For thousands of years, upstart rivals such as France and the United Kingdom denied them their historic right. Mussolini is just the most recent in a long line of Italian leaders who have sought the coveted Mare Nostrum.\n\nHowever, unlike his predecessors, Mussolini has a good chance of seeing it through. Already, the Italian Navy is the largest in the Mediterranean. The combined forces of the British and French Mediterranean Squadrons could not hope to challenge it in open combat. However, neither France nor the United Kingdom are taking this lying down. They are constantly bolstering their forces, so the Regia Marina must be expanded tenfold and modernised if Italian dominance is to be maintained. Italy will reclaim its sea, come hell or high water."

 ITA_Littorio_Class: "Littorio-Class"
 ITA_Littorio_Class_desc: "The French Dunkerque class is being built in response to the German Deutschland battleships. The Dunkerque is more powerful than the ships we have in the Mediterranean right now. To maintain our advantage, we must build a larger and more powerful ship than they. Our designers created the Littorio class battleship. The Littorio is nearly 238 metres long, displacing over 45,000 tonnes fully loaded, with nine 15-inch guns leading a loadout that includes three planes and tonnes of torpedoes."

 ITA_Taranto_Queen_of_the_Sea: "Taranto Queen of the Sea"
 ITA_Taranto_Queen_of_the_Sea_desc: "Northern Italy has a number of deep, well-developed ports, most notably Genoa and Venice. However, due to its underdevelopment, Southern Italy lacks such a port. That does not have to be the case indefinitely. Taranto, an ancient Greek colony on the inland Mar Piccolo, is one of Southern Italy's largest cities. Because of the aforementioned Mar Piccolo, the city is well-positioned to become our Navy's southern home on the Metropole.\n\nWhile Venice is isolated in the Adriatic and Genoa is vulnerable to French strikes, Taranto is safe from all dangers. Any squadron based there would not only be able to sail more easily into the open sea, but would also be in an excellent position to intercept any convoys passing through our sea."

 ITA_Old_Ships_New_Guns: "Old Ships, New Guns"
 ITA_Old_Ships_New_Guns_desc: "While the Regia Marina is strong and powerful, the majority of its power is based on ships that were built decades ago. Some of our oldest ships date back to the Great War or earlier! These old ships, while not worthless, fall short in the face of the most recent armour innovations. Some have suggested that we simply scrap them and rebuild them with more modern technology. That, however, is simply not possible.\n\nWhile ignoring the implications for our offensive capabilities of scrapping the core of our Navy on the eve of war, it is also a terrible waste. Instead, it is preferable, if not entirely cheaper, to simply replace these old ships' outdated weapons systems with the most recent in naval technology. With new guns, the service life of these ships could be extended for the foreseeable future, at least until we can replace them without compromising the power of our fleets."

 ITA_Ricardi_Naval_Runway_Fleet: "Riccardi's Naval Runway Fleet"
 ITA_Ricardi_Naval_Runway_Fleet_desc: "Arturo Riccardi is a naval pioneer of a different kind. He considers the introduction of aircraft carriers, which are seaborne air bases the size of cities, to be the greatest naval innovation since the sail. Since the 1920s, he has witnessed the effectiveness of these carriers in tests conducted by both our own Navy and foreign navies. He has since advocated for a radical reformation of our own navy along these lines. While our Navy is currently centred on battleships launching car-sized shells, Riccardi wants carriers to be the foundation of our fleets.\n\nWe can hit targets farther and harder than battleships, both at sea and on land, by using planes launched from these massive ships. After years of arguing, it appears he has finally gotten the Duce's attention. He has ordered the construction of our own carrier fleet and appointed the admiral as the new Chief of Naval Staff. We will control not only Mare Nostrum, but also its entire coast, thanks to them."

 ITA_Cavagnaris_Battleship_Fleet: "Cavagnari's Battleship Fleet"
 ITA_Cavagnaris_Battleship_Fleet_desc: "Domenico Cavagnari is an old soldier, and with age comes old ideas. He has come to believe in the power of a large gun on a well-built ship. Any ship will sink if a large enough shell is thrown at it, including the aircraft carriers that new sailors adore. He has witnessed the power that such battleships represent and wishes to carry this concept into the modern era. Sure, adjustments will be made; he is not blind to the entire invention of the aeroplane and its potential uses at sea.\n\nWhile the French and British pour millions of dollars into the money pit that Cavagnari believes the new naval aviation theory will become, he has diverted vast sums of money to the development of an entirely new line of battleships. Nobody, not the French or the British, will be able to deny Italy its rightful place as the hegemon of the Mediterranean with these ships sailing alongside our fleet."

 ITA_Found_Reggia_Aeronatuica_Marina: "Found the Regia Aeronautica Marina"
 ITA_Found_Reggia_Aeronatuica_Marina_desc: "The invention of human flight brought about a singular innovation in naval warfare: the aircraft carrier. They are massive ships with runways for decks that can launch squadrons of planes from the middle of the sea to strike targets on land and at sea. This is an exciting new area of naval warfare, and in order to maintain our naval superiority, we must stay on the cutting edge of it. In order to maintain our lead, we will establish a new military department, the Regia Aeronautica Marina, to coordinate the Navy's air arm. This new arm will not only coordinate the Navy's air force, but it will also develop new tactics to keep us at the forefront of this new naval frontier."

 ITA_Carrier_Experiments: "Carrier Experiments"
 ITA_Carrier_Experiments_desc: "While the Americans and the British have launched aircraft carriers and taken the lead in the field, we have lagged behind. Until recently, many of our admirals thought aircraft carriers were unnecessary in a sea like the Mediterranean, and they had deep reservations about such a new innovation. However, because of our recent adoption of them, we are now left with an idea but no practise. We need practical knowledge of how to use these new ships if we are to make effective use of them. Fortunately, the aforementioned Anglos are constantly conducting tests. Perhaps we can observe a few and learn something from our former enemies."

 ITA_Aria_Nostram: "Aria Nostram"
 ITA_Aria_Nostram_desc: "While we have control over the sea, the vast skies have become a new battleground. While general aviation is expanding rapidly, naval aviation is still in its infancy. Because land-based aircraft may not be able to reach, much of the sky over the seas and oceans remains uncontrolled. If we are to truly secure our sea, we must also secure our sky. We can send planes from our floating airstrips to attack enemy ships in their ports, even if they are far from our shores. No ship will be safe in our sea; they will learn to fear the skies just as they do the ocean."

 ITA_The_Shields_of_Our_Fleet: "The Shields of Our Fleet"
 ITA_The_Shields_of_Our_Fleet_desc: "While aircraft carriers are massive and have crews of a thousand or more, they are still extremely vulnerable. They have no big guns, enough fuel to move not only the ship but a squadron of planes with all the bombs and ammunition such a compliment necessitates, and they move extremely slowly. This makes them easy targets for enemy fire and necessitates constant defence.\n\nHowever, leaving them with larger ships such as cruisers or battleships is seen as a waste of those other ships' capabilities. Destroyers, on the other hand, are ideal for the task. They are light, manoeuvrable, and powerful enough to fend off enemy attacks long enough for a carrier to launch its planes and evacuate to a safer area."

 ITA_Novum_Pilum: "Novum Pilum"
 ITA_Novum_Pilum_desc: "The Pilum was a short, light spear that Roman soldiers used before drawing their swords for battle. At worst, it would divert the enemy's attention long enough for the Roman legion to prepare for immediate combat; at best, it would halt an enemy advance. We need a new pilum, a new weapon to launch a first strike against our enemy. Thrown from the carriers, these new pilum will be made of steel and lead rather than wood and iron.\n\nThese planes will fly far and fast, striking the enemy in unexpected places. They will deal massive damage and set our ground forces up for a simple campaign. At worst, they'll be caught reeling and allow us to get a good first strike, and at best, they'll crumble in front of us like barbarians."

 ITA_Five_Year_Plan: "Five Year Plan"
 ITA_Five_Year_Plan_desc: "Despite its power and prestige, the Regia Marina is rapidly losing ground in terms of size and power to our adversaries. It is impossible to overstate the importance of a large fleet of unrivalled power in securing our mastery of the Mediterranean. That is why Mussolini has outlined an ambitious plan to expand the navy. He has stated that the Regia Marina will more than double in size within five years, with legions of new battleships, submarines, destroyers, and cruisers.\n\nThey will be built to the highest standards using cutting-edge naval technology. With a new and updated fleet, Italy's Mediterranean dominance will be secure for all time! It will take time and money, but the Prime-Minister and the Navy have assured the country that this programme is critical."

 ITA_Meritocratic_Naval_Colleges: "Dockyard Buildup"
 ITA_Meritocratic_Naval_Colleges_desc: "We cannot build a Navy unless we have facilities to build it in. As a result, as part of our Five Year Plan, the Navy has contracted for a dozen new dockyards and expansions along Italy's long coast. The incredible power of the Italian worker is being used to rapidly expand our already massive naval construction capability from Venice to Sicily to Genoa. While some segments of the political establishment have quietly objected to the cost and duration of such a programme, they can be safely ignored. When our newly expanded and modernised navy defends their homes from the tribulations and devastation of modern warfare, our detractors will return to us singing our praises."

 ITA_Old_Guard_Hierarchy: "Coastal Fortifications"
 ITA_Old_Guard_Hierarchy_desc: "We can't build a navy if our dockyards are under constant threat. Because of advances in warfare, all of our coasts, even those far from the front lines, are now potential targets. Our docks are a valuable target for planes flying overhead, enemy marines storming our shores, and enemy troops coming from all sides. A valuable target necessitates adequate defences. That is why naval planners have devised a new defence strategy for all of our dockyards. We will fortify each of our valuable docks with a network of bunkers, trenches, machine gun encampments, barbed wire fences, and concrete barriers."

 ITA_First_Reggimento_San_Marco: "1st Reggimento San Marco"
 ITA_First_Reggimento_San_Marco_desc: "Marines, or soldiers landing from ships on hostile shores, are an idea as old as the navy itself. The Marinus, or sea infantry, were the first soldiers trained specifically for seaborne combat in Ancient Rome, but it wasn't until the Doge of Venice created the Fanti da Mar, or sea infantry, in the 1200s that the idea was revived. Since then, innovation in the field has happened in fits and starts as countries adopt and then abandon the concept.\n\nWe, as Italians and the dominant power in the Mediterranean, have always recognised their utility. This recognition is still in effect today. We will honour our own elite marine infantry, the San Marco Regiment, which has projected Italian power to far-flung lands since the Risorgimento. These elite soldiers are the Navy's clenched fist, ensuring that no enemy can retreat far enough to avoid our naval wrath."
 ITA_Reggimento_San_Marco: "§5The 1° Regiment \"San Marco\" will be mobilised§!"

 ITA_Fortezza_Sicilia: "Fortezza Sicilia"
 ITA_Fortezza_Sicilia_desc: "Sicily is critical to Italian control of the Mediterranean. With the Strait of Calabria firmly under Italian control, the only way past it is through the Strait of Sicily, which connects the island to Tunisia and is easily cut by the Regia Marina. Because of this advantage, Sicily is an ideal target for enemy invasion. An enemy takeover of Sicily would not only mean the loss of such a vital air and naval base, but it would also mean enemy troops on rightful Italian territory.\n\nIt would also provide them with a base from which to strike deeper into Italy from a direction we've never had to consider: the south. That is why we need to fortify the island. Every possible landing zone will be littered with bunkers, artillery guns, trenches, and defences. If our enemies wish to desecrate our beautiful lands, they must do so over a mountain of their own dead bodies."

 ITA_Pista_Aerea_Sicilia: "Pista Aerea Sicilia"
 ITA_Pista_Aerea_Sicilia_desc: "Sicily is located in the middle of the Mediterranean, providing our renowned Navy with significantly more coverage over Mare Nostrum than we would have had otherwise. However, with the advent of flight, we now have the opportunity to improve our control. We will construct a new airfield that will be larger and better than all others. Sicily will become Italy's unsinkable aircraft carrier after receiving a new complement of bombers and fighters. We will be able to protect our Navy from the air anywhere within our sea, as well as strike south in support of our troops in Libya. Our enemies will never be safe again with our navy patrolling the seas and our air force tearing through the skies."

 ITA_A_New_Arsenale_Di_Venezia: "A New Arsenale Di Venezia"
 ITA_A_New_Arsenale_Di_Venezia_desc: "The Arsenal of Venice is a collection of workshops and shipyards in Venice that have been building ships on a near industrial scale since 1104. During Venice's Republican period, the Arsenal was the backbone of the fleet, allegedly capable of building and launching a ship in a single day using early industrial methods. Using the Arsenal, Venice became the premier naval power in the Mediterranean for centuries, until Napoleon finally put an end to the Republic. His troops also set fire to much of the Arsenal, which has remained a shadow of its former self ever since.\n\nIt now functions as a hybrid living museum and active shipyard. This will not continue. If we are to achieve Mediterranean dominance, we must completely rebuild the Arsenal. The few existing structures will be modernised and brought up to modern standards. When the construction is completed, we will be able to match, if not surpass, Venice's incredible naval output."

 ITA_Underwater_Warfare_Necessaries: "Underwater Warfare Necessaries"
 ITA_Underwater_Warfare_Necessaries_desc: "For much of history, warfare was limited to the surface, and if a ship went below the waves, it was sunk. That, however, is no longer the case. Since the early 1900s, the invention of the submarine has brought battle both above and below the waves.\n\nIf our massive, expensive fleet is to remain operational for any length of time, it must be protected from surface threats, air threats, and now threats from beneath the sea. Not to mention that with advanced submarines, we can strike enemy ships in port, providing us with yet another means of preventing our adversary from ever finding safety. Submarines are and will be critical components of any fleet, and ours must be the best available."

 ITA_Mare_Nostrum: "Mare Nostrum"
 ITA_Mare_Nostrum_desc: "Italy has ruled the Mediterranean for centuries. No ship sailed the seas without our permission during the Roman Empire. Our grip has all but vanished since the fall of the Eternal City, the centuries of fracturing of Italy, and the rise of France and Britain. That has to change. Mussolini must have his sea if he is to have his new Rome.\n\nWhile some argue that we should invest in vulnerable, hulking shells of ships whose only purpose is to force the Navy to become an extension of the Air Force. Fortunately, we have stuck to the strategy that has won us the day so many times before. God is on the side of the fleet with the bigger guns, and when we're done, we'll have the world's largest guns."

 ITA_Impero_Class: "Impero Class"
 ITA_Impero_Class_desc: "Our investments have paid off! Today we will lay down the Impero, the newest design given to us! The second of our Littorio Class, it will serve as the focal point of our new fleet. We will have a decisive advantage over the French and British with her (eventually) sister ship, the Roma. It is an absolute monster of a ship, equipped with anti-aircraft guns, 15-inch guns, and 14-inch armour on the main belt. While the combined French and British navies still outnumber us in the Mediterranean, they could throw a million smaller ships at us and our flagships would easily blow them out of the water!"

 ITA_Crusier_Backbone: "Cruiser Backbone"
 ITA_Crusier_Backbone_desc: "No fleet can be entirely composed of massive battleships. It is also impractical without taking into account the herculean expense of building and maintaining such a fleet. Such ships are too large and cumbersome for some missions, such as recon or forward observation. Instead, all large ship fleets are made up primarily of cruisers, which are a step down from their larger cousins. Easier to construct with guns capable of sinking a battleship if used in sufficient numbers. Their primary mission, however, is to protect our larger ships from enemy cruisers and submarines. Our sword can strike our enemies with impunity while protected by their shield."

 ITA_Settle_Italian_Farmers: "Settle Italian Farmers"
 ITA_Settle_Italian_Farmers_desc: "It would be a grave error to leave Libya as a solely Muslim Italian territory. We must create a new neighbourhood for Italians to dwell in on the Fourth Shore. In addition to making space on our prized Peninsula for a greater population, the influx of Italians into Libya will provide us another set of eyes to watch the always insurrectionist natives. The European Italians do not and will not possess the same treasonous ideologies as the Muslim Italians, who may still cling to their ancient tribal allegiances. We can rely on them to keep an eye on their neighbours and alert the authorities to any unusual activity. Not only that but the boost of a the white population will bring more investment to the colony, helping it turn an even larger profit and integrate it more and more into the Italian state."

 ITA_Coastal_Development: "Coastal Development"
 ITA_Coastal_Development_desc: ""

