 ITA_AOI: "AOI"
 ITA_AOI_desc: ""

 ITA_Divide_et_Impera: "Divide et Impera"
 ITA_Divide_et_Impera_desc: "Ethiopia, contrary to popular belief, is not a paradise on Earth. Prior to our invasion, the Amhara ethnic group of Northern Ethiopia ruled. As a result, some other groups, such as the Oromos and Somalis, suffered. In a region dominated by Muslims and Jews, the ruling Solomid family was also devoutly Christian. This long-standing conflict between different ethnic groups and religions provided a unique opportunity for our colonial regime in Ethiopia.\n\nWe will now use this strategy in Ethiopia, just as the Romans did before us, whose Divide et Impera strategies allowed them to rule an empire stretching from Palestine to Spain. We will depose Ethiopia's current Amhara elites and install long-suffering Muslims and Jews in positions of power. Furthermore, we will encourage them to resolve differences that have existed between them for thousands of years, which will add to the already existing tension. Some have criticised this strategy as being excessively nasty, insensitive, and cruel. However, it appears to us to be as realistic as it could be."

