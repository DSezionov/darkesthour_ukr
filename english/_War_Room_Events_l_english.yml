 # War Room Events:
 ## Groza:
 WAR_ROOM_EVENT_1_NAME: "GROZA: Roadwork Makes Dreamwork"
 WAR_ROOM_EVENT_1_DESC: "The Soviet road system is in shambles. We will need to launch a massive programme to bring it up to speed with the war we intend to wage. Old roads will be paved, new roads will be built, and they will all be linked together in a complex web of redundant routes in the event that one is disabled by sabotage."
 WAR_ROOM_EVENT_1_OPTION_1_NAME: "Upgrade Roadways into Germany"
 WAR_ROOM_EVENT_1_OPTION_1_DESC: "By bringing our men and machines to bear on Germany, we risk striking at the heart of the monster we are now confronted with. The Germans will be forced to concentrate their efforts against us, and we must prevail in this titanic battle."
 WAR_ROOM_EVENT_1_OPTION_2_NAME: "Upgrade Roadways into Hungary and Romania"
 WAR_ROOM_EVENT_1_OPTION_2_DESC: "By improving our southern roads, we will prepare our troops for a quick victory. Romania is an important oil ally for Germany, and Hungary is a bulwark protecting the country's southern flank. Germany is vulnerable without them."
 WAR_ROOM_EVENT_1_OPTION_3_NAME: "Upgrade Roadways into Finland"
 WAR_ROOM_EVENT_1_OPTION_3_DESC: "The Scandinavian nations watch over us like a hawk. A swift and hard strike could do severe damage, seizing important cities. Let us prepare ourselves for battles in scnadinavia and meet steel with steel."

 WAR_ROOM_EVENT_2_NAME: "GROZA: Fortifications"
 WAR_ROOM_EVENT_2_DESC: "To ensure that our defensive capabilities do not deteriorate during our war with the Germans, additional defences should be built. In anticipation of an offensive from Germany and their allies, we must prepare additional bunkers and defensive earthworks on various fronts."
 WAR_ROOM_EVENT_2_OPTION_1_NAME: "Fortify the German front"
 WAR_ROOM_EVENT_2_OPTION_1_DESC: "Our primary concern will be to strengthen defences against German offences on the main eastern border."
 WAR_ROOM_EVENT_2_OPTION_2_NAME: "Fortify the Hungary-Romania Front"
 WAR_ROOM_EVENT_2_OPTION_2_DESC: "Our southern flank must be secured. We will construct additional defences there to free up resources for the main front."
 WAR_ROOM_EVENT_2_OPTION_3_NAME: "Fortify the Finland-Norway Front"
 WAR_ROOM_EVENT_2_OPTION_3_DESC: "Our northern flank's security must be ensured, and strengthening its defences will be our top priority."

 WAR_ROOM_EVENT_3_NAME: "GROZA: Supply Issues"
 WAR_ROOM_EVENT_3_DESC: "Our generals' Grand Front Offensive is simply unfeasible at this time. Our rail network is simply not equipped to support a thousand-mile-long offensive. Not to mention the scarcity of supplies. War preparations are already underway, and it will only be a matter of time before the Germans realise it.  We must choose one route into Hitler's Empire and prepare quickly."
 WAR_ROOM_EVENT_3_OPTION_1_NAME: "Upgrade Railways into Germany"
 WAR_ROOM_EVENT_3_OPTION_1_DESC: "It's only natural that our main thrust will be into the beast's heart. We'll slam into their lines like a hammer, shattering their best-laid defences. The city of Berlin will then be picked like an overripe apple."
 WAR_ROOM_EVENT_3_OPTION_2_NAME: "Upgrade Railways into Hungary and Romania"
 WAR_ROOM_EVENT_3_OPTION_2_DESC: "There are numerous advantages to going around their southern flank. Not only are the Germans not expecting it, but it would also provide us with access to Romanian oil and the Hungarian plain. Without resources or defensive positions, Germany will crumble."
 WAR_ROOM_EVENT_3_OPTION_3_NAME: "Upgrade Railways into Finland"
 WAR_ROOM_EVENT_3_OPTION_3_DESC: "Going through the North is more of a pragmatic decision than a strategic one. Scandinavia provides German forces with a launch pad right next to West Russia's beating heart. We'll overwhelm them there before crushing them on the mainland."

 WAR_ROOM_EVENT_4_NAME: "GROZA: Open New Industrial Jobs"
 WAR_ROOM_EVENT_4_DESC: "Our war machine is hungry for more as it roars to life. There should be more of everything. To feed it, we've started drafting civilians into an Industrial Corps. While the draft has already provided us with millions of recruits, we have yet to decide where to send them. Where are they needed the most?"
 WAR_ROOM_EVENT_4_OPTION_1_NAME: "Expand Krasny Oktyabr Steel Plant"
 WAR_ROOM_EVENT_4_OPTION_1_DESC: "Even in ruins, the Red October Plant is the largest steel plant in the Union. We should send our men to rebuild it so that we can once again produce high-quality steel and rebuild the city. The heart will beat again!"
 WAR_ROOM_EVENT_4_OPTION_2_NAME: "Expand Mining Industry"
 WAR_ROOM_EVENT_4_OPTION_2_DESC: "Our factories are unable to function without minerals. We must send our men to the mines and instruct them to increase their extraction targets. We should also broaden our search for new veins into Siberia and locate additional mines to dig."
 WAR_ROOM_EVENT_4_OPTION_3_NAME: "Expand Baku Oil Field"
 WAR_ROOM_EVENT_4_OPTION_3_DESC: "From the homefront to the battlefront, oil is critical at almost every stage of the war. We should send men to Baku to boost oil production and facilitate field expansion!"

 WAR_ROOM_EVENT_5_NAME: "GROZA: Soviet War Machine"
 WAR_ROOM_EVENT_5_DESC: "The German factory is, without a doubt, something to be emulated. The efficiency alone seems like a pipe dream to us. However, in order for us to win this new Revolutionary War, our factories and industries must rise to the occasion. A decision must be made: Should we improve existing factories or simply build more?"
 WAR_ROOM_EVENT_5_OPTION_1_NAME: "The Industry Modernization Program"
 WAR_ROOM_EVENT_5_OPTION_1_DESC: "Rather than spending months building new factories, we should work to improve the efficiency of the ones we already have. We can increase production by up to tenfold by replicating American methods."
 WAR_ROOM_EVENT_5_OPTION_2_NAME: "The Industrial Expansion Program"
 WAR_ROOM_EVENT_5_OPTION_2_DESC: "It will take far too long to inspect and improve each factory. We should simply construct more! More factories will produce more goods faster."
 WAR_ROOM_EVENT_5_OPTION_3_NAME: "Scrap the plans, Soviet industry is fine"
 WAR_ROOM_EVENT_5_OPTION_3_DESC: "The skeptics have been personally dealt with. This war is more than capable of being won by Soviet industry. Anyone who believes otherwise is a counter-revolutionary and a fascist who must be executed!"

 WAR_ROOM_EVENT_6_NAME: "GROZA: Stalin's Vanguard"
 WAR_ROOM_EVENT_6_DESC: "Every army has a vanguard, and we are no exception. The Red Army can rely on a number of elite units. These highly trained and expertly organized units have already distinguished themselves as defenders of the Revolution. As our armies advance west into the heart of the darkness, we must decide who will be championed as the spear's tip. They will be the focus of our propaganda and will be given the most advanced weapons."
 WAR_ROOM_EVENT_6_OPTION_1_NAME: "Guards Motorised Brigade"
 WAR_ROOM_EVENT_6_OPTION_1_DESC: "Guards Motorised Brigades are the Red Army's mobile arm. They are equipped with light vehicles, allowing for flexibility and speed on both offence and defence. Their mobility will enable our forces to respond quickly and seize opportunities across the front."
 WAR_ROOM_EVENT_6_OPTION_2_NAME: "Guards Tank Brigade"
 WAR_ROOM_EVENT_6_OPTION_2_DESC: "These metal machines are some of our Army's toughest and most visible units. We will demonstrate the superiority of Soviet power and Revolutionary Science by focusing on them!"
 WAR_ROOM_EVENT_6_OPTION_3_NAME: "Guards Mechanised Brigade"
 WAR_ROOM_EVENT_6_OPTION_3_DESC: "The Guards Mechanised Brigades combine infantry and armour into a single, highly effective fighting force. They are designed to operate independently in fast-paced operations, thanks to improved protection and firepower."

 WAR_ROOM_EVENT_7_NAME: "GROZA: Combat Focus"
 WAR_ROOM_EVENT_7_DESC: "Our generals must be able to navigate all types of terrain efficiently and outmanoeuvre the enemy in order to advance quickly. We'll have to decide which terrain we want our generals to master in order to ensure a quick victory."
 WAR_ROOM_EVENT_7_OPTION_1_NAME: "Their cities will fall under our will!"
 WAR_ROOM_EVENT_7_OPTION_1_DESC: "All of our efforts and preparations will be futile if we are unable to capture the enemy cities once we reach them. We will concentrate on urban combat training to ensure that cities will not be an obstacle."
 WAR_ROOM_EVENT_7_OPTION_2_NAME: "Mountains? What mountains?"
 WAR_ROOM_EVENT_7_OPTION_2_DESC: "Mountains are among the most difficult terrains to fight in, which means they could easily cost us a significant amount of time and casualties. We will focus on mountain combat training to ensure that mountains are not an impediment."

 WAR_ROOM_EVENT_8_NAME: "GROZA: Main Docking Port"
 WAR_ROOM_EVENT_8_DESC: "In preparation for our eventual confrontation with the Germans, we must prepare for a naval battle and subsequent naval invasion against them. To better support our naval forces for these missions, we must prepare major docking points for our navy in anticipation of a major naval battle there. We currently have three potential docking points for our navies, with one of them being the focus of our anticipated major naval confrontation."
 WAR_ROOM_EVENT_8_OPTION_1_NAME: "Murmansk, for the Northern Fleet"
 WAR_ROOM_EVENT_8_OPTION_1_DESC: "The protection of our northern maritime activities and the Northern Fleet will be our primary focus."
 WAR_ROOM_EVENT_8_OPTION_2_NAME: "Leningrad, for the Baltic Fleet"
 WAR_ROOM_EVENT_8_OPTION_2_DESC: "Our primary concern should be control of the Baltic. We will concentrate on naval security in Leningrad and, by extension, the Baltic."
 WAR_ROOM_EVENT_8_OPTION_3_NAME: "Sevastopol, for the Black See Fleet"
 WAR_ROOM_EVENT_8_OPTION_3_DESC: "Our main goal is to secure the Black Sea. We will concentrate on better preparing Sevastopol for the Black Sea Fleet."

 WAR_ROOM_EVENT_9_NAME: "GROZA: Question of Finland"
 WAR_ROOM_EVENT_9_DESC: "With our victory in the winter war and the establishment of the Finnish Democratic Republic, we now have more options for involving Finland in Operation Groza. We must coordinate and prepare Finland for Operation Groza, as well as devise an effective strategy that will provide us with additional advantages in the upcoming war."
 WAR_ROOM_EVENT_9_OPTION_1_NAME: "Operation Polyarnyi Bastion"
 WAR_ROOM_EVENT_9_OPTION_1_DESC: "We will fortify Finland and turn it into an impenetrable ice fortress. While focusing on the main front in the east, we will be able to easily repel any German counterattacks on Finland."
 WAR_ROOM_EVENT_9_OPTION_2_NAME: "Operation Arkitcheskiy Shtorm"
 WAR_ROOM_EVENT_9_OPTION_2_DESC: "Finland will be our mighty ice hammer, smashing the Germans in the North and Scandinavia. We will attack from two fronts to maximise our chances of a quick victory."
 WAR_ROOM_EVENT_9_OPTION_3_NAME: "Finland is better under our complete rule"
 WAR_ROOM_EVENT_9_OPTION_3_DESC: "The Finnish government is an unknown factor and thus a risk. In the upcoming war, they might make strategical errors which we cannot afford. Thus, it is safer to centralize and integrate them directly into our nation."
 SOV_Focus_on_Finnish_Defense_tt: "We will focus on §2Finnish defensive capabilities§!"
 SOV_Focus_on_Finnish_Offense_tt: "We will focus on §RFinnish offensive capabilities§!"
 ## Unthinkable:
 WAR_ROOM_EVENT_10_NAME: "UNTHINKABLE: OSS FIELD REPORT 98801"
 WAR_ROOM_EVENT_10_DESC: "American OSS operatives completed their preliminary infiltration missions in Soviet-occupied Eastern Europe, particularly Germany, and delivered a comprehensive report to high command. Now, High Command must decide on the next steps."
 WAR_ROOM_EVENT_10_OPTION_1_NAME: "Focus on Infiltrating Civilian Centers"
 WAR_ROOM_EVENT_10_OPTION_1_DESC: "We may authorise the OSS and MI6 to deploy additional assets in Soviet-occupied and Soviet cities and civilian hubs, allowing us to gather intelligence on their industrial capabilities as well as the morale of the occupied peoples and Soviets themselves. Most importantly, this course of action would outline primary industrial and rail targets for air raids upon the start of Unthinkable, potentially sabotaging and disrupting Soviet efforts to win over local populations to their side."
 WAR_ROOM_EVENT_10_OPTION_2_NAME: "Focus on Forward Deployments"
 WAR_ROOM_EVENT_10_OPTION_2_DESC: "Instead, the OSS and MI6 may use their assets to infiltrate Soviet military units based in Germany and Czechoslovakia. They may provide us with information on the exact number of Soviet troops deployed to the aforementioned areas, the competency of the men and leadership, troop morale, and, most importantly, their positions and possible arrival times for reinforcements. Good intelligence on Soviet army units will help us gain an advantage in the early stages of Unthinkable."
 WAR_ROOM_EVENT_10_OPTION_3_NAME: "Focus on Airbases"
 WAR_ROOM_EVENT_10_OPTION_3_DESC: "Finally, OSS and MI6 may send assets to Soviet airbases in Europe to determine the exact number of planes and pilots deployed, as well as the plane models, pilot competencies, deployment areas, and potential aces. With this intelligence, we could launch preemptive and well-timed strikes against Soviet airpower in Europe, destroying their airbases and aircraft before they even leave the ground and kill experienced pilots. Having the upper hand in the air will give us the upper hand on the ground."

 WAR_ROOM_EVENT_11_NAME: "UNTHINKABLE: Allied [This.GetWarRoomArmoredSpelling] Reserve"
 WAR_ROOM_EVENT_11_DESC: "During our upcoming invasion of Soviet-controlled Europe, armoured and mechanised forces will be crucial. The Allied powers are mustering, producing, and scraping together as many tanks and other armoured vehicles as they can for the upcoming conflict, not only to try to mitigate the massive Soviet numerical advantage, but also to serve as the primary offensive spearheads in driving through the communist lines. However, there is disagreement among the high command as to how to tactically deploy these armoured vehicles."
 WAR_ROOM_EVENT_11_OPTION_1_NAME: "Attempt to Pulverize Soviet Forward Defenses"
 WAR_ROOM_EVENT_11_OPTION_1_DESC: "We could use our armoured forces as hard and massive spearheads, annihilating initial Soviet fortifications and defensive positions, creating gaps, before our infantry forces move in to exploit the gaps with the help of our airpower, collapsing Soviet lines and forcing retreats, allowing us to quickly liberate Germany. Although this tactic is likely to result in quick breakthroughs, it does not aim to completely destroy large Soviet military formations, as many in the high command hope."
 WAR_ROOM_EVENT_11_OPTION_2_NAME: "Attempt to Encircle Soviet Armies"
 WAR_ROOM_EVENT_11_OPTION_2_DESC: "We could instead opt for a German-style Bewegungskrieg, rushing our armoured spearheads deep through Soviet lines with the goal of encircling entire Soviet divisions and causing chaos and disruption in the Soviet rear, forcing unplanned routs that create opportunities for additional encirclements. After all, it worked exceptionally well for the Germans in 1939, 1940, and 1941 against Poland, the West, and the USSR. If we could replicate that level of success, we could annihilate large Soviet military formations, causing massive chaos, and capturing large numbers of prisoners. However, some argue that this tactic is too risky or predictable - something the Soviets had faced already many times before."

 WAR_ROOM_EVENT_12_NAME: "UNTHINKABLE: Eyeing the Enemy"
 WAR_ROOM_EVENT_12_DESC: "We conducted extensive aerial reconnaissance over Bolshevik-occupied Europe, identifying potential locations for breakthroughs at the start of Operation Unthinkable. There are three major terrain types: hills, plains, and forests, each with a different density. High Command must now agree on which terrain type to prioritise for pushing our infantry and armoured forces through, based on risk factors and potential enemy defences."
 WAR_ROOM_EVENT_12_OPTION_1_NAME: "Move Through the Forests"
 WAR_ROOM_EVENT_12_OPTION_1_DESC: "This is one of the most risky options, but it may also be the most rewarding. Assaults on forest terrain are dangerous. Men can get lost, vehicles can get stuck, and god forbid a unit is cut off. Nonetheless, the enemy may not expect us here. After all, we saw the effectiveness of breakthroughs through forest terrain during the last war, when Germany's dense trees and shrubs provided excellent concealment from air reconnaissance."
 WAR_ROOM_EVENT_12_OPTION_2_NAME: "Move Through the Lowlands"
 WAR_ROOM_EVENT_12_OPTION_2_DESC: "The simplest and most effective approach would be to avoid densely wooded or high terrain and instead rely on flat plains for our assault. This would allow us to fully utilise our armoured forces, with tanks and half-tracks having no hindrance in wide open fields; however, it would also leave our forces vulnerable to artillery, aerial reconnaissance, and air bombardment. Furthermore, the enemy's armoured forces would have no trouble navigating this terrain."
 WAR_ROOM_EVENT_12_OPTION_3_NAME: "Move Through the Hills"
 WAR_ROOM_EVENT_12_OPTION_3_DESC: "A third option is to concentrate on hilly, highland terrain. Attempting breakthroughs in such territory would undoubtedly result in increased casualties, as men would have to slog up hills littered with Soviet machineguns, artillery, and mortars, resulting in many deaths and injuries. However, seizing high points would provide us with good artillery cover over nearby territories and allow for downhill descents."

 WAR_ROOM_EVENT_13_NAME: "UNTHINKABLE: Operation Mage Hands"
 WAR_ROOM_EVENT_13_DESC: "If we are to overcome the Soviet advantage in terms of men and machinery, we will need to deploy weapons capable of large-scale destruction in large quantities during our upcoming war with the USSR. Atomic bombs, which are capable of levelling entire cities, could be used. Certainly, destroying multiple Soviet divisions and their commanders in a city with a single bombing raid would be advantageous. But, after all, atomic bombs are difficult to manufacture, and we could only produce so many, to say nothing of the civilian toll."
 WAR_ROOM_EVENT_13_OPTION_1_NAME: "Focus on Plutonium Refinement"
 WAR_ROOM_EVENT_13_OPTION_1_DESC: "The most destructive course of action would be to expand the allied powers' nuclear arsenal for future use against the USSR. With significant investments in the extraction of Plutonium-239, the primary fissile isotope used in the production of nuclear weapons, we could rapidly increase our number of Atom Bombs to the thousands and begin steady production before deploying them to Europe. Using them against the USSR and Soviet-occupied Europe would give our forces a significant advantage, as we could destroy entire cities with single bombing raids. However, some argue that this policy is too destructive and short-term. After all, we're here to liberate Europe, not turn it into a pile of radioactive ash."
 WAR_ROOM_EVENT_13_OPTION_2_NAME: "Utilize Captured V-2 Schematics"
 WAR_ROOM_EVENT_13_OPTION_2_DESC: "During the final years of the war, our forces obtained the blueprints for the production of the feared German V-2 rockets, which were guided ballistic missiles capable of hitting targets at long ranges and the first man-made objects to reach space. Using these schematics and the assistance of a few captured scientists, combined with allied industrial capacity, we could produce the V-2s in massive quantities before annihilating Soviet strategic targets with them."

 WAR_ROOM_EVENT_14_NAME: "UNTHINKABLE: Contingency Plan Alpha"
 WAR_ROOM_EVENT_14_DESC: "It is entirely possible that the USSR strikes at Free Europe before we strike at the lands under communist control, or that our initial invasion of Soviet-occupied territories fails and the USSR launches a massive counterattack. We must now decide how, in the worst-case scenario of a successful Soviet counteroffensive or even a first strike, we will defend Europe's free nations and our German occupation zones."
 WAR_ROOM_EVENT_14_OPTION_1_NAME: "Protect German Urban and Industrial Centers"
 WAR_ROOM_EVENT_14_OPTION_1_DESC: "Many in the high command advocate for Western Germany's defence, particularly its industrial centres, which could serve as strongholds if fortified. If the Soviets are stopped before they reach the Rhine, a renewed push could drive them back to the Soviet occupation zone in East Germany, allowing for an offensive against Berlin and Czechoslovakia. As a result, if we model Contingency Plan Alpha along these lines, we would prepare for a possible West German defence by fortifying Hamburg, Bremen, Nuremberg, and other cities, as well as establishing strong defensive lines along the major rivers west of the Rhine."
 WAR_ROOM_EVENT_14_OPTION_2_NAME: "Protect the Rhine"
 WAR_ROOM_EVENT_14_OPTION_2_DESC: "Some argue that defending Germany west of the Rhine against a large Soviet offensive is impractical. Cities are too spread out, rivers are too small, or they flow into the Soviet occupation zone. As a result, our only option would be to retreat beyond the Rhine, halting the Soviet advance along the river and allowing us to gather reinforcements before crossing, counterattacking, and driving the USSR out of Western Germany. This option would be more feasible in terms of defence and would still keep the Ruhr out of Soviet hands, but it would necessitate the sacrifice of major cities such as Hamburg."

 WAR_ROOM_EVENT_15_NAME: "UNTHINKABLE: Bringing in the Seabeas"
 WAR_ROOM_EVENT_15_DESC: "The US High Command has authorised the redeployment of the United States Naval Construction Battalions, nicknamed 'Seabees' from the Pacific to the European theatre of operations in preparation for the implementation of the Harris-LeMay Plan, which would see the largest aerial bombing campaign in human history carried out against Soviet-occupied Europe upon the start of Operation Unthinkable. The Seabees will be tasked with expanding and constructing emergency airfields in occupied Germany, including hangars and runways capable of accommodating B-29 Superfortress strategic bombers."
 WAR_ROOM_EVENT_15_OPTION_1_NAME: "Focus on the British Zone"
 WAR_ROOM_EVENT_15_OPTION_1_DESC: "In an act of solidarity, the Americans have decided to lend us the services of the Seabees. As a result, our zone of occupation in Northwest Germany will serve as the primary point of implementation for the Harris-LeMay Plan, with the greatest expansion of local airfield infrastructure. We certainly cannot refuse such a gesture."
 WAR_ROOM_EVENT_15_OPTION_2_NAME: "Focus on the American Zone"
 WAR_ROOM_EVENT_15_OPTION_2_DESC: "With the arrival of the Seabees, we can now concentrate them in our zone of occupation in Germany, specifically Southern Germany and Bavaria. The Harris-LeMay Plan will thus be centred on Bavaria and the US Occupation Zone as a whole. The message is clear: the New World will take the lead in this affair."

 WAR_ROOM_EVENT_16_NAME: "UNTHINKABLE: Operation Roundhouse"
 WAR_ROOM_EVENT_16_DESC: "Czechoslovakia has fallen under Soviet control, as expected after Soviet boots trampled its soil, claiming 'liberation' from the Nazis while imposing their own tyranny on the country. However, not all is lost. Many former Czechoslovak resistance members, as well as exiled Czechoslovak army units that returned after Germany was defeated, are still active in the country and eager to shake off the communist yolk. Despite deep Soviet infiltration, the government remains technically controlled by nationalist Edvard Beneš."
 WAR_ROOM_EVENT_16_OPTION_1_NAME: "Make inroads with the Czechoslovak enlisted men"
 WAR_ROOM_EVENT_16_OPTION_1_DESC: "Following the Nazi takeover, several Czechoslovak army and air force units fled to fight alongside the allies against Germany. Following the Nazi defeat, they returned to their homeland to form the foundation of a reformed Czechoslovak army. And yet, their country is not as they wish. They return to a communist-dominated land, not much unlike Germany. If we reached out to them and offered them assistance, we could organise a military uprising once our forces entered Czechoslovakia."
 WAR_ROOM_EVENT_16_OPTION_2_NAME: "Reach out to the Czechoslovak Democrats"
 WAR_ROOM_EVENT_16_OPTION_2_DESC: "Czechoslovakia is, at least for now, technically not a communist country, with its president Edvard Beneš being himself the complete opposite of a communist. Many people, both inside and outside of government, share his views and would gladly assist us in liberating their country from the Soviet yolk by coordinating a purge of pro-Soviet officials and disarming and arresting some Soviet forces on the eve of our invasion. However, infiltration runs deep within the Czechoslovak government. NKVD spies and communist supporters are everywhere, and communications with Beneš could reveal our plans to the USSR."

 WAR_ROOM_EVENT_17_NAME: "UNTHINKABLE: Operation Boothe"
 WAR_ROOM_EVENT_17_DESC: "The USSR's biggest port in the Far East, Vladivostok, poses a serious challenge to American hegemony and naval superiority in the area. Therefore, it is a top priority to destroy or capture it in the first few days or weeks of Operation Unthinkable. Our options are few, but both are reliable - a massive strike or a ground invasion from China."
 WAR_ROOM_EVENT_17_OPTION_1_NAME: "Plan a raid on the harbor"
 WAR_ROOM_EVENT_17_OPTION_1_DESC: "A massive air raid carried out by carrier aircraft from the US Pacific Fleet and the British Pacific Fleet could destroy Vladivostok's port, airport, and industrial infrastructure all at once. This would certainly rule out the possibility of the Soviets using the city as a port or launching point for fighter and bomber aircraft, but such a solution would not be permanent. After all, it won't be long before the Soviets rebuild the city. "
 WAR_ROOM_EVENT_17_OPTION_2_NAME: "Reach out to the Chinese Nationalists"
 WAR_ROOM_EVENT_17_OPTION_2_DESC: "In order to capture Vladivostok, we may have to take on a much larger task: eliminating the Chinese Communists. We may put boots on the ground in northern China and overrun CCP positions in Manchuria before moving into Vladivostok and seizing the port. Of course, this is extremely risky because we would be relying on the Chinese Nationalists' discretion and willingness to engage in a renewed, large-scale battle against not only the Chinese Communists but also the USSR itself. And God forbid that our troops become bogged down in North China, or that the KMT sympathises with the Soviet cause, in which case they may notify the USSR. But if we succeed, the entire Far East may be open to us..."

 WAR_ROOM_EVENT_18_NAME: "UNTHINKABLE: Dusting off the Pike"
 WAR_ROOM_EVENT_18_DESC: "British and French forces devised Operation Pike in the early stages of the war, when the USSR and Germany occupied Poland together, effectively making the USSR an accomplice of Hitler. An extensive bombing campaign was planned to destroy Baku's refineries, oil pipelines, and oil wells, depriving the USSR of 70% of its oil production and crippling its economy. The plan was shelved and never implemented, only coming to light briefly in 1942 when it appeared that German forces might capture Baku, with the plan being reformed at the time into a contingency plan to prevent Germany from extracting oil in Azerbaijan."
 WAR_ROOM_EVENT_18_OPTION_1_NAME: "Destroy the Baku Fields"
 WAR_ROOM_EVENT_18_OPTION_1_DESC: "The British and French High Commands have proposed a modernised version of the original plan. An extensive bombing campaign of the oil fields is planned, with strategic bombers being used. Because of the manner in which oil is extracted, the Earth is so saturated with the substance that it could take months to extinguish oil fires and years to restart oil fields. What the bombs do not destroy, the fires will."
 WAR_ROOM_EVENT_18_OPTION_2_NAME: "Prepare to capture Baku"
 WAR_ROOM_EVENT_18_OPTION_2_DESC: "Some members of the High Command instead propose a more ambitious strategy for depriving the Soviets of their oil. Instead of a bombing campaign, which would leave the region covered in massive oil fires and destroy all oil extraction technology and hardware, we could launch an offensive into the Azerbaijan SSR, attempting to capture the oil fields and refineries intact. Our forces could move from occupied Iran and quickly overrun Baku and possibly the entire Azerbaijan Soviet Socialist Republic, adding a dozen or more million tonnes of oil production to our total."

 WAR_ROOM_EVENT_19_NAME: "RED DAWN: A Report from Factory Floor, No. 472"
 WAR_ROOM_EVENT_19_DESC: "TRUSTED EYES ONLY.\n\nA comprehensive report has arrived from Factory Floor No. 472, detailing the current state of industrial output and the dire need for modernization and efficiency improvements. As the nation emerges from the devastations of WWII, we stand at a crossroads: we can either invest heavily in rapid industrial upgrades to boost productivity or focus on incremental improvements to stabilize the economy and workforce."
 WAR_ROOM_EVENT_19_OPTION_1_NAME: "Rapid Modernization"
 WAR_ROOM_EVENT_19_OPTION_1_DESC: "One of the Politburo and State Planning Committee's two main proposals is to immediately allocate a large sum of funds to rapidly upgrading and modernising our factories, as well as to make increasing production efficiency through the installation of modern equipment and factory expansion our top economic priority. We need everything we can get for the upcoming war."
 WAR_ROOM_EVENT_19_OPTION_2_NAME: "Incremental Improvements"
 WAR_ROOM_EVENT_19_OPTION_2_DESC: "We could also choose to approach this with a cool head: don't spend so many resources on so many modernisations, which are also desperately needed for the military, when the workforce and economy as a whole aren't stable. We must make gradual and consistent changes to ensure that our economy is stable after the war and that our labour market does not experience severe fluctuations. This will ensure long-term economic stability and prevent our economy from collapsing if Red Dawn drags on or fails."
 SOV_Rapid_Modernization_TT: "Grants ($MODIFIER_CONSUMER_GOODS_FACTOR$: §Y10.0%§!, $MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10.00%§!, $MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+10.00%§!) until the final conclusion of the operation."
 SOV_Incremental_Improvements_TT: "Grants ($MODIFIER_CONSUMER_GOODS_FACTOR$: §Y5.0%§!, $MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5.00%§!, $MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+5.00%§!) until the final conclusion of the operation."

 WAR_ROOM_EVENT_20_NAME: "RED DAWN: \"A Meeting with the Politburo\""
 WAR_ROOM_EVENT_20_DESC: "The Chamber of the Politburo would be loud, as the voices of its members would echo throughout the hall of the Kremlin. But with the entrance of the Premier [SOV.GetLeader], their voices would fall short. He'd quietly take his seat in front of the committee before staring out at them with his cold eyes. For they too knew the peace they now experienced was futile. War would soon return to Europe and the Soviet Union. But one question remained on the committee, how would the Soviet Union prepare this time?  Would they shift the gears of the Union into a war-like machine preparing the people for a war like none before, by moving most of the Union's production into planes to challenge American air superiority? Or would they move their efforts to assembling a tank army like none seen ever before?"
 WAR_ROOM_EVENT_20_OPTION_1_NAME: "Modern Wars Require our force never to be outmatched"
 WAR_ROOM_EVENT_20_OPTION_1_DESC: "The Americans and British have complete control over the skies and can rain hell on us and our allied and occupied territories in Europe. While the Red Air Force is enormous, it pales in comparison to the combined strength of American and British land-based and carrier aviation. We must immediately focus on increasing production of our latest aircraft models so that we can compete with the West in the skies."
 WAR_ROOM_EVENT_20_OPTION_2_NAME: "They shall know our steel."
 WAR_ROOM_EVENT_20_OPTION_2_DESC: "Tanks are central to modern warfare, and operational success today is impossible without them. These metal beasts are required for quick and efficient breakthroughs in the enemy line, as well as the destruction of enemy light forces, and when combined with infantry support, they are nearly unstoppable. We must direct more steel resources towards the production and expansion of our tank stockpiles, which will be used to their full potential in the upcoming war."
 WAR_ROOM_EVENT_20_OPTION_3_NAME: "Neither"
 WAR_ROOM_EVENT_20_OPTION_3_DESC: "We will maintain the status quo, without weakening one branch or production area in favour of another. An imbalance will only lead to defeat; the most powerful air forces cannot function without ground forces, and vice versa."
 SOV_Shifting_Production_1_TT: "Grants $STAT_COMMON_BUILD_COST_IC$§G-10.00%§! to all airframes at the cost of a $STAT_COMMON_BUILD_COST_IC$§R+10.00%§! increase to all armour until the final conclusion of the operation."
 SOV_Shifting_Production_2_TT: "Grants $STAT_COMMON_BUILD_COST_IC$§G-10.00%§! to all armour at the cost of a $STAT_COMMON_BUILD_COST_IC$§R+10.00%§! increase to all airframes until the final conclusion of the operation."

 WAR_ROOM_EVENT_21_NAME: "RED DAWN: A Report From the Far-Eastern Fleet"
 WAR_ROOM_EVENT_21_DESC: "\"REPORT NO. 4728 'CONDITION ON THE FAR-EASTERN FLEET'\"\nTRUSTED EYES ONLY.\n\nThe Situation of the Soviet Far-Eastern Fleet is a disaster, following the First Russo-Japanese War it remains a shell of its former self. If this fleet truly wishes to challenge the Americans in the Pacific then it must become a fleet that is willing to challenge the Americans, for the Soviet Union must be prepared for war on all fronts to avoid another disastrous defeat on sea."
 WAR_ROOM_EVENT_21_OPTION_1_NAME: "Remembrance of the Tsarist Navy"
 WAR_ROOM_EVENT_21_OPTION_1_DESC: "Despite its crushing defeat in 1905, the Tsarist Navy was vast, and its logistics and bureaucracy were well organised. We will emphasise organisational efficiency, the transfer of heavier vessels, and the promotion of a \"fleet in being\" doctrine to counter the overwhelming British and American naval presence in the Pacific, as well as preventing possible landings in Siberia or total naval dominance by the allies."
 WAR_ROOM_EVENT_21_OPTION_2_NAME: "Invest into Morskaya Pekhota"
 WAR_ROOM_EVENT_21_OPTION_2_DESC: "The Soviet navy does not sit idly by in port, just guarding against the enemy! It is an iron lance designed to strike the enemy and dominate his territorial holdings near the sea. We will make significant investments in our landing craft development program and a doctrine that supports amphibious invasions, allowing us to land by sea on allied-controlled islands and territories and take the fight to them rather than simply guarding our shores."
 SOV_Far_East_Fleet_Report_1_TT: "Grants ($MODIFIER_XP_GAIN_NAVY$: §G+0.15§! daily, $MODIFIER_NAVY_ORG_FACTOR$: §G+10.0%§!, $MODIFIER_NAVAL_DOCTRINE_COST_FACTOR$: §G-50.00%§!) until the final conclusion of the operation."
 SOV_Far_East_Fleet_Report_2_TT: "Grants ($MODIFIER_AIR_NAV_EFFICIENCY$: §G+10%§!, $MODIFIER_NAVAL_INVASION_PENALTY$: §G-10%§!, $MODIFIER_REPAIR_SPEED_FACTOR$: §G+5%§!) until the final conclusion of the operation."

 WAR_ROOM_EVENT_22_NAME: "RED DAWN: The Northern Plains of Europe"
 WAR_ROOM_EVENT_22_DESC: "The planned main offensive of Operation \"Red Dawn\" across the European plain in Germany aims for maximum speed, surprise, and breakthrough, necessitating the adoption of a specific doctrine to achieve these breakthroughs. The Red Army is vast, but its resources and logistics are limited, so areas, and more importantly, methods of attack, must be prioritised, with high command devising two viable options."
 WAR_ROOM_EVENT_22_OPTION_1_NAME: "Nasha Bronya"
 WAR_ROOM_EVENT_22_OPTION_1_DESC: "The flat plains of Northern Germany provide ideal conditions for the deployment of tanks in large armoured spearheads to punch through allied lines, causing chaos in their advance while also creating gaps and allowing infantry to flood in. It is proposed that we simply overwhelm the enemy with the sheer power and size of our tank forces, smashing his lines and driving towards France and the Benelux. At the same time, we may work on improving the fuel efficiency of our tanks and developing a logistics plan to efficiently distribute supplies among our armoured forces, so that they do not become stuck and overrun in a counterattack."
 WAR_ROOM_EVENT_22_OPTION_2_NAME: "Thunderous Arsenal"
 WAR_ROOM_EVENT_22_OPTION_2_DESC: "A tank assault is potentially too risky and resource intensive. After all, the enemy is likely to expect us to use massive armoured spearheads and will have amassed large amounts of anti-tank weaponry and defences in his territories. We must attack them with overwhelming firepower, rather than running them over. We will work to build a truly massive artillery arsenal, with the goal of annihilating enemy lines with massed bombardments from a distance."

 WAR_ROOM_EVENT_23_NAME: "RED DAWN: The Purge of the Unfaithful"
 WAR_ROOM_EVENT_23_DESC: "Interior Minister Václav Nosek, a close ally in the Czechoslovak government, has begun to significantly expand his and the Communist Party of Czechoslovakia's control over the country's police and security forces, replacing many high- and low-ranking officers in the National Security Corps with loyal communist party members or sympathisers. This gives us an excellent opportunity to expand our control over the Czechoslovak Republic and acquire additional assets within the country."
 WAR_ROOM_EVENT_23_OPTION_1_NAME: "Increase Covert Support"
 WAR_ROOM_EVENT_23_OPTION_1_DESC: "With the removal of many noncommunists from the country's security services, we may gain a slew of new assets and intelligence on the situation, while also increasing the prevalence of Marxist ideology in Czechoslovakia. We will contact many of them and win them over to our side, making them friends. They will provide us with all of the information gathered by the National Security Corps, as well as assist in the covert dissemination of communist propaganda and favouritism towards communists in legal matters."
 WAR_ROOM_EVENT_23_OPTION_2_NAME: "Maintain Current Level of Support"
 WAR_ROOM_EVENT_23_OPTION_2_DESC: "There is no reason for us to interfere further. Czechoslovakia appears to be on a communist course, especially with this new action, and it is only a matter of time before the KSČ seizes full control of the country. Investing in a predetermined outcome could harm our relationship with Beneš and waste resources."
 SOV_Political_Pressure_On_CZE_TT: "Grants ($MODIFIER_CIVILIAN_INTEL_FACTOR$: §G+5%§!, $MODIFIER_PROPAGANDA_MISSION_FACTOR$: §G+5%§!) until the final conclusion of the operation."

 WAR_ROOM_EVENT_24_NAME: "RED DAWN: X Telegram"
 WAR_ROOM_EVENT_24_DESC: "The Communist Party of Czechoslovakia's rapidly growing popularity ensures that it will soon seize control of the government. All that remains is for President Edvard Beneš, a prominent non-communist, to relinquish his stubborn grip on power and let the KSČ take its proper place. The Politburo is divided on sending a threatening telegram to Beneš, raising the possibility of Soviet intervention in Czechoslovakia if communist demands are not met."
 WAR_ROOM_EVENT_24_OPTION_1_NAME: "Red Whispers"
 WAR_ROOM_EVENT_24_OPTION_1_DESC: "Beneš has no play here, and we must make that clear. We will send a \"politely worded\" telegram to Prague, describing our full intentions of using Soviet troops to ensure that \"the will of the people\" is met and a KSČ government is formed, if Beneš fails to meet the KSČ's demands for governmental control in the near future."
 WAR_ROOM_EVENT_24_OPTION_2_NAME: "Silent Shadows"
 WAR_ROOM_EVENT_24_OPTION_2_DESC: "Sending such a telegram would be unwise. It will further destabilise Czechoslovakia and may make Beneš openly hostile to our ambitions. As a last resort, he may decide to align with the West. We'll put the telegram on hold for the time being, but we'll keep the intervention plan in place. We will notify KSČ leadership of our intention to provide military support if necessary."

 WAR_ROOM_EVENT_25_NAME: "RED DAWN: The Prague Uprising"
 WAR_ROOM_EVENT_25_DESC: "The Communist Party of Czechoslovakia has raised the issue with President Beneš and organised large worker demonstrations in Prague. Of course, these demonstrations are staged to appear \"spontaneous\", as if the people rose up and demanded that the President form a communist-led government, rather than being planned from the top down by party leadership. This presents an opportunity to escalate protests and increase pressure on Beneš."
 WAR_ROOM_EVENT_25_OPTION_1_NAME: "Send Soviet workers in"
 WAR_ROOM_EVENT_25_OPTION_1_DESC: "We will covertly send Soviet workers to Prague to participate in the demonstrations, making them appear much larger than they are. This will put even more pressure on the President, increasing the likelihood that he will cave to communist demands. Of course, this will not be a cheap endeavour, as we will have to covertly transport thousands of foreigners into the country without being caught, which will necessitate extensive bribery and planning."
 WAR_ROOM_EVENT_25_OPTION_2_NAME: "Maintain the Current Level of Support"
 WAR_ROOM_EVENT_25_OPTION_2_DESC: "The President is already backed into a corner, and our funding and support for the KSČ are sufficient without sending thousands of Soviet citizens to Prague. Beneš has no choice but to cave or face an outright coup by the communists, which would result in a far worse fate than his removal from power. We must simply sit back and watch as the dominoes fall."

 WAR_ROOM_EVENT_26_NAME: "RED DAWN: Status of the Soviet Armed Forces [GetYear]"
 WAR_ROOM_EVENT_26_DESC: "With the rebuilding efforts in full swing, a comprehensive report on the status of the Soviet Armed Forces has been compiled. This report highlights the strengths and weaknesses of our current military capabilities and provides crucial insights for further strategic planning. It is imperative that we address any deficiencies and capitalize on our strengths to ensure the success of Operation Red Dawn."
 WAR_ROOM_EVENT_26_OPTION_1_NAME: "Focus on the Krasnaya Armiya"
 WAR_ROOM_EVENT_26_OPTION_1_DESC: "The Red Army will carry out the majority of the heavy lifting in pushing across the continent to France's western and southern shores. As a result, it requires the most assistance; a larger fleet is one thing, but if our men are outmatched on land, Red Dawn will be over before it even begins. To ensure maximum efficiency and effectiveness, we will invest heavily in training our men, developing new weapons, and revisiting and rethinking battle plans."
 WAR_ROOM_EVENT_26_OPTION_2_NAME: "Focus on the Krasnyy Flot"
 WAR_ROOM_EVENT_26_OPTION_2_DESC: "The combined strength of the British Royal Navy and the United States Navy is impressive, with numerous carriers and capital ships. If our fleet is to defend our shores from the enemy and match them in naval battle, it must be given all of the necessary provisions for expansion, modernisation, and upgrading, such as the development of a new class of battleship and the reshuffling of command based on merit, as well as increased training for sailors and officers and the development of our naval warfare doctrine."
 WAR_ROOM_EVENT_26_OPTION_3_NAME: "Focus on the Voyenno-vozdushnyye Sily"
 WAR_ROOM_EVENT_26_OPTION_3_DESC: "Any successful offensives on land and sea require overwhelming aerial might, which we currently lack. The allied powers dominate the skeis, with a combined air force that is more experienced, better equipped, and significantly larger than the Red Air Force. We must focus our efforts on challenging their air dominance by exponentially increasing aircraft production, pilot and crew training, and the number of airmen, as well as researching new jet models to counter the American and British ones."

 WAR_ROOM_EVENT_27_NAME: "RED DAWN: Fortify the Vanguard"
 WAR_ROOM_EVENT_27_DESC: "Our troops are now pouring into allied territory, with columns of vehicles and soldiers racing for strategic cities and objectives. However, even as they make rapid progress, we must exercise caution because such an offensive cannot last indefinitely. Indeed, streams of allied men and material are already flooding the continent, and a large counteroffensive appears to be on the horizon. We must fortify our lines in case we have to retreat."
 WAR_ROOM_EVENT_27_OPTION_1_NAME: "Operation Zheleznyy Zanaves"
 WAR_ROOM_EVENT_27_OPTION_1_DESC: "Soviet planners have drawn up Operation 'Iron Curtain', aimed at fortifying border areas between the occupation zones of Germany. This will help stem the tide of a successful Allied counterattack and stop a drive on Berlin. These fortifications will not be particularly impressive because we are short on time, but with widespread conscription of local German labourers and the assistance of heavy machinery, they can become quite imposing."
 WAR_ROOM_EVENT_27_OPTION_2_NAME: "Operation Soviet Bulwark"
 WAR_ROOM_EVENT_27_OPTION_2_DESC: "Plans for Operation 'Soviet Bulwark' have been drawn up to build extensive fortifications in our occupied and allied territories in Southern Europe and the Balkans, particularly Hungary, Romania, Bulgaria, and Yugoslavia. When combined with the already poor terrain, they would serve to halt potential allied advances into our Southern territories, especially if Czechoslovakia fell under their control."

 WAR_ROOM_EVENT_28_NAME: "FALL WESERÜBUNG: Our Soldiers in the North"
 WAR_ROOM_EVENT_28_DESC: "The Conquest of the North presents unique challenges, but we can only address one. Should we train our troops to fight in the snowy peaks, plan for quick air landings, or rely on the ever-dependable Panzer thrust?"
 WAR_ROOM_EVENT_28_OPTION_1_NAME: "No Mountain High Enough"
 WAR_ROOM_EVENT_28_OPTION_1_DESC: "Scandinavia is known for its towering peaks. If we are to tame that wild land, we must be able to fight effectively at heights that no man was designed for. Start a rigorous training program in the Alps!"
 WAR_ROOM_EVENT_28_OPTION_2_NAME: "Victory from Above"
 WAR_ROOM_EVENT_28_OPTION_2_DESC: "The Nordic countries' vast, empty distances present a unique logistical challenge. A novel solution, ironically adapted from the USSR, has been proposed. We will plan a series of air landings to seize key cities in the region."
 WAR_ROOM_EVENT_28_OPTION_3_NAME: "The Mobile Thrust"
 WAR_ROOM_EVENT_28_OPTION_3_DESC: "Our reliable Panzer thrusts have yet to fail us. They won victories that many thought were impossible a year ago, and they will do the same in the North. We must begin a massive winterization program for our Panzers prior to deployment."

 WAR_ROOM_EVENT_29_NAME: "FALL WESERÜBUNG: Reorganize Marinegruppenkommando West"
 WAR_ROOM_EVENT_29_DESC: "To cover our invasion of the North, we must reconfigure our naval forces in the North Sea. We must adopt one of two radically different disciplines. We can request that they intercept any British response or keep them in port for a more important battle."
 WAR_ROOM_EVENT_29_OPTION_1_NAME: "Direct Engagement"
 WAR_ROOM_EVENT_29_OPTION_1_DESC: "The Kriegsmarine must sail out and divert the Royal Navy at all times! Let no British ships dock in Norwegian ports! We may lose a lot of boats, but if this invasion is to succeed, the Nordic nations cannot expect Allied assistance!"
 WAR_ROOM_EVENT_29_OPTION_2_NAME: "The Hidden Arm"
 WAR_ROOM_EVENT_29_OPTION_2_DESC: "The Kriegsmarine cannot fight the Royal Navy. It's simply too large and well-trained. They will be required in future operations, so throwing them away for such a minor campaign would be foolish. Keep them at port; we'll need them later."

 WAR_ROOM_EVENT_30_NAME: "OPERATION OVERLORD: Naval Force Allocation"
 WAR_ROOM_EVENT_30_DESC: "Operation Neptune calls for a combined allied naval task force to support the landings during Overlord and provide naval protection for the channel. Each allied nation participating in Operation Overlord is expected to contribute a certain number of men and material, and we are no different. We must now decide how much we are willing to send for this operation."
 WAR_ROOM_EVENT_30_OPTION_1_NAME: "Minimal Forces"
 WAR_ROOM_EVENT_30_OPTION_1_DESC: "We can only spare a few ships and aircraft. Some will not appreciate it, but we must also protect our own homes. After all, the threat from the Kriegsmarine is not critical, and how many ships does the fleet require for shore bombardment? The other powers will take care of things."
 WAR_ROOM_EVENT_30_OPTION_2_NAME: "Medium Forces"
 WAR_ROOM_EVENT_30_OPTION_2_DESC: "We cannot spare an enormous force of ships for the landing, but we must not appear uncommitted and suffer the consequences of a weak naval task force in the largest amphibious operation ever planned. We'll send enough ships, men, and planes to the Neptune task force to provide more than adequate naval support, while keeping a large reserve for other missions."
 WAR_ROOM_EVENT_30_OPTION_3_NAME: "All we have"
 WAR_ROOM_EVENT_30_OPTION_3_DESC: "The massive scale and significance of this operation cannot be overstated: tens of thousands of men and pieces of equipment landing in fortified territory with the goal of liberating half of a continent. There can be no half-measures. We must send as much of our navy as possible, utilising all of our available ships. Only then can we ensure the landings are safe from threats."

 WAR_ROOM_EVENT_31_NAME: "PLAN R4: Choosing the Goal"
 WAR_ROOM_EVENT_31_DESC: "With the Scandinavians refusing to negotiate, force must now be used. As the War Cabinet meets with the High Command, three R-4 variants are presented. Each becomes more complex, time-consuming, and requires an increasing number of troops."
 WAR_ROOM_EVENT_31_OPTION_1_NAME: "Norway and nothing else!"
 WAR_ROOM_EVENT_31_OPTION_1_DESC: "Plan R-4-1, calls for occupying only the northern Norwegian ports, which would allow us to have control over Norway's iron export market. The operation is limited, with only a few brigades needed to defend the ports and little resistance expected."
 WAR_ROOM_EVENT_31_OPTION_2_NAME: "Just Sweden’s major mines are required."
 WAR_ROOM_EVENT_31_OPTION_2_DESC: "Plan R-4-2 directs us to occupy the Swedish iron mines. They will be given an ultimatum: accept our occupation or face war. Many in the High Command believe that if they fight, the war will be brief, but a larger troop contingent will be required."
 WAR_ROOM_EVENT_31_OPTION_3_NAME: "All of Scandinavia’s ore must be secured!"
 WAR_ROOM_EVENT_31_OPTION_3_DESC: "Plan R-4-3 is the most extensive of the proposed plans. It entails occupying Norway's ports, Sweden's mines, and then proceeding to Finland's mines in the north. The Finns will not resist, but this will require a significant deployment."

 WAR_ROOM_EVENT_32_NAME: "PLAN R4: Our Special Forces"
 WAR_ROOM_EVENT_32_DESC: "The War Cabinet has approved the deployment of a significant number of specialised and \"elite\" units to Norway as the first wave of landings, followed by our regular troops. These men are undoubtedly the best in the British Army; however, we are not fools. We cannot land all of our specialised contingents at once, so certain types of units must be prioritised."
 WAR_ROOM_EVENT_32_OPTION_1_NAME: "Mountaineers should be the main striking force."
 WAR_ROOM_EVENT_32_OPTION_1_DESC: "Norway's terrain is undeniably harsh, with plenty of mountains that pose strategical challenges. Regular troops are not trained to fight in these conditions, so we need to deploy more specialised mountaineer units who can fight in these conditions."
 WAR_ROOM_EVENT_32_OPTION_2_NAME: "Marines are the spearhead of our campaign."
 WAR_ROOM_EVENT_32_OPTION_2_DESC: "Our operational planning is based on rapid amphibious landings before bringing in heavier equipment. This requires a large contingent of troops trained in amphibious operations, so we must assign additional Royal Marine formations to the operation."