# Debug Mode
 Debug_Decisions: "Debug Mode"

# Political Action
 open_new_industrial_jobs: "Open New Industrial Jobs"
 open_new_industrial_jobs_desc: "To combat rising unrest and economic stagnation, the government has authorised a temporary surge in industrial hiring. Expanding our industrial workforce by opening new factories and creating job opportunities will help to improve our factories' productivity. While this will strain political cohesion and fuel logistics, it may help to stabilise the country and increase our production capabilities in the short term."
 anti_fascist_raids: "Anti-Fascist Raids"
 anti_fascist_raids_desc: "The spread of extreme ideologies that threaten equality and liberty must be closely monitored. Fascist groups attempt to undermine our country's stability through violence, intimidation, and propaganda. We can weaken their networks before they gain traction by allowing security forces to raid their meeting places, seize illegal materials, and apprehend key agitators. We will ensure that the poisonous foundations of fascism are eradicated before they cause irreversible damage to our political institutions and society."
 anti_autocrat_raids: "Anti-Autocrat Raids"
 anti_autocrat_raids_desc: "Ambitious generals, monarchists, and self-proclaimed saviours conspire in secret to undermine our liberties in favour of authoritarian rule. To protect the people's voices, we must take immediate action against these potential tyrants. The state will send detectives to investigate covert relationships, shut down loyalist presses, and imprison known loyalists. Our country's independence must be safeguarded against those who seek crowns and dictatorships."
 anti_democratic_raids: "Anti-Democratic Raids"
 anti_democratic_raids_desc: "The increasing influence of democratic reformers jeopardises the state's stability and cohesiveness. Their constant calls for elections, free expression, and civilian oversight undercut power and fuel discontent. To prevent chaos and maintain strict control, security agents will target democratic agitators. Meeting places will be closed, leaflets seized, and leaders detained. The security of the state is far more important than some meaningless elections."
 anti_socialist_raids: "Anti-Socialist Raids"
 anti_socialist_raids_desc: "Radical agitators promise revolution and upheaval, convincing people to sacrifice stability for anarchy. Their calls for class warfare threaten to destabilise our economy and society. We will eliminate subversive cells and their underground networks before they can cause disruption. Though some may see these measures as overly harsh, they are necessary to maintain order and ensure that the country remains united, prosperous, and free of extremist manipulation."
 anti_communist_raids: "Anti-Communist Raids"
 anti_communist_raids_desc: "Communist organisers instilled their poison in factories and unions, encouraging insurrection and the abolition of our country's rule of law. Their philosophy threatens to pit employee against employer, and citizen against nation. To maintain order and prevent an uprising, we will conduct coordinated raids on communist organisations, seize illegal publications, and imprison ringleaders. This decisive action will protect our citizens from the instability of class conflict and ensure that the red tide never spreads within our borders."

# Economic Recovery
 Wartime_Economic_Recovery: "Wartime Economic Recovery"
 Wartime_Economic_Recovery_desc: "The war in which we are currently engaged is actively eradicating the last of the depression's negative economic effects. With an increase in investments in the military industry and war bonds, as well as many young men who were previously unemployed enlisting to serve their country, we are now nearing the end of our recovery from the early 1930s economic downturn. Our industry and economy will soon be stronger than ever, propelled by the destruction, conquest, and unity of war."

