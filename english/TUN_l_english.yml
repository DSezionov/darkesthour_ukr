TUN_Economic_Crisis: "The Tunisian Crisis"
TUN_Economic_Crisis_desc: "The Great Depression has reduced many nations' economies to ashes, but the colonies of great empires are frequently forgotten. One specific example is Tunisia, a French colony that has been completely devastated by the financial crisis. Known locally as the Tunisian Crisis, the situation has become completely untenable for both Tunisians and French settlers. Agriculture has been hit the hardest, particularly wheat and olive oil producers, resulting in the majority of the region becoming a poor and starving wasteland in desperate need of aid.\n\nFactory and construction workers are reluctant to work for the wages and effort required, while Tunisians become increasingly dissatisfied with their failing government, reducing local stability. The French government must take action to alleviate Tunisia's suffering and restore a sense of normalcy in the colony. If there are none, Tunisia will be generally unhelpful in addressing any threats to Paris that may arise."