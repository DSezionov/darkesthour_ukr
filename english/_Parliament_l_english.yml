 USA_Lobby_Republican: "Lobby for Republican Support"
 USA_Lobby_Republican_desc: "The Republican Party's influence is growing, but for it to truly thrive, we must take active steps to ensure national support. We will raise the party's profile by participating in political activities and gaining support from powerful institutions and public figures. Furthermore, the benefits of expanding Republican power may be critical, laying the groundwork for future stability and progress under their banner."
 USA_Lobby_Democratic: "Lobby for Democratic Support"
 USA_Lobby_Democratic_desc: "The Democratic Party has the power to shape our country's destiny, but in order to fully realise its potential, we must work tirelessly to gain support from various political factions. This planned political effort may pay off handsomely, resulting in a more progressive and balanced society in the long run. We must carefully weigh the risks, as alienating other factions could have serious consequences, but the benefits could lead to our people uniting around a common cause."
 USA_Lobby_Progressive: "Lobby for Progressive Support"
 USA_Lobby_Progressive_desc: ""
 USA_Republican_Campaign: "Pro-Republican Campaign Effort"
 USA_Republican_Campaign_desc: "Given the Republican Party's growing prominence, we must take active steps to increase its electoral strength and maintain its control across the country. This campaign will bring together resources and major political leaders to influence public opinion and spread the Republican message across the country. If successful, this campaign will ensure the party's continued dominance in national policy and government."
 USA_Republican_Popularity_Low_tt: "§RRepublican§! §Ypopularity§! is below §Y55%§!"
 USA_Democratic_Campaign: "Pro-Democratic Campaign Effort"
 USA_Democratic_Campaign_desc: "To ensure the long-term viability of the Democratic cause, we must invest resources in spreading its message across the country. Through coordinated campaigns and public communication, we can unite citizens around a vision of unity, reform, and stability. This way, the Democratic Party will be able to secure crucial votes to carry out its reforms and policies for the American people."
