 GER_PARTY_NATIONAL_SOCIALISM: "NSDAP"
 GER_PARTY_NATIONAL_SOCIALISM_LONG: "Nationalsozialistische Deutsche Arbeiter Partei"
 GER_PARTY_NATIONAL_SOCIALISM_DESC: "The Nationalsozialistische Deutsche Arbeiterpartei (NSDAP), emerged from the political and social turmoil that followed the Great War. Its parent organization, the Deutsche Arbeiterpartei (DAP) was founded in Munich on January 5th, 1919, by Anton Drexler, a locksmith and journalist, along with a small group of nationalistic individuals. Its early focus was on nationalism, anti-Semitism, and opposition to the Treaty of Versailles. In September, Adolf Hitler, a former soldier, joined the party as a propaganda agent. His charismatic speaking skills and fervent nationalism quickly elevated his status within the party. In 1920, he was assigned the task of writing the party’s program, which laid out its ideological foundations.\n\nIn 1920, the NSDAP published its 25 Points, outlining its core beliefs, including Aryan Supremacy, anti-Semitism, anti-Capitalism, and the abrogation of the Treaty of Versailles. The party underwent a reorganization and adopted the Swastika as its emblem On November 8, 1912, Hitler and the Sturmabteilung (SA) attempted to overthrow the Weimar government in what became known as the Beer Hall Putsch. The coup failed and Hitler was arrested and sentenced to prison. During his time in prison, he wrote Mein Kampf, outlining his political ideology and future plans for Germany.\n\nAfter his release from prison, Hitler focused on rebuilding the NSDAP and expanding its influence through legal political activities. The party participated in elections and gained a small but dedicated following. Economic hardships and political instability during the period helped the NSDAP gain supporters.\n\nThe onset of the Great Depression in 1929 severely impacted Germany’s economy and politics. The NSDAP capitalized on public dissatisfaction, promising to address economic woes and restore Germany’s former glory. In the September 1930 elections, the NSDAP secured over 18% of the votes and became the second-largest party in the Reichstag."
 GER_PARTY_AUTHORITARIANISM: "DNVP"
 GER_PARTY_AUTHORITARIANISM_LONG: "Deutschnationale Volkspartei"
 GER_PARTY_AUTHORITARIANISM_DESC: "The Deutschnationale Volkspartei (German National People’s Party) was founded in 1918 in response to the collapse of the German Empire and the abdication of Emperor Wilhelm II. Comprising conservative aristocrats, landowners, industrialists, and nationalist figures, the DNVP aimed to counter the political influence of socialist and democratic movements that were gaining ground in the wake of the Great War.\n\nWith strong ties to the former Alldeutscher Verband, who represented the most aggressive, jingoistic, annexationist faction of the German right-wing in the Great War, the DNVP retained its parent organization’s fanatical ideological fervor and champions pan-Germanism, anti-parliamentarism, anti-socialism, and anti-Semitism. During the early years of the Republic, the DNVP became one of the largest parties in the Reichstag under the guidance of their somewhat bull-headed leader, media magnate, Alfred Hugenberg. It often formed alliances with other conservative parties and held ministerial positions in coalition governments.\n\nIn recent years though, the DNVP has continued to suffer electoral losses, its constituents entrusting their votes instead to the NSDAP. Despite attempts being made to reconcile the German right as in the days of the Harzburg Front, ideological deviations and clashes of personality have prevented the party from harmonizing with the NSDAP, which now in the wake of the National Elections of 1932, clearly represents the face of the German right."
 GER_PARTY_SOCIAL_CONSERVATISM: "Zentrum"
 GER_PARTY_SOCIAL_CONSERVATISM_LONG: "Deutsche Zentrumspartei"
 GER_PARTY_SOCIAL_CONSERVATISM_DESC: "The Zentrum, officially known as the Zentrumspartei (Centre Party) was established in 1870 as a response to the discrimination and marginalization of Catholics in the newly unified German Empire as part of Chancellor Otto von Bismarck’s Kulturkampf.  It aimed to protect the rights of Catholics and other religious minorities in an otherwise predominantly Protestant state. The party’s initial focus was on issues such as religious freedom, education, and social welfare.\n\nIn the late 19th and early 20th centuries, the Zentrum became a powerful force within the Reichstag. It often operated as a ‘swing party’ able to cooperate with both conservative and progressive factions, allowing it to wield significant influence over legislation and government policy. The party’s members and supporters are diverse, ranging from conservative Catholics to more liberal elements.\n\nDuring the Great War, the Zentrum initially supported the war effort, but internal divisions emerged over time. Since the war’s end, the party has played a key role in shaping the Republic. It has been involved in the formation of several coalition governments, and some of its leaders have held prominent positions, the last of which being the now disgraced former Reich Chancellor Heinrich Brüning who resigned in 1932."
