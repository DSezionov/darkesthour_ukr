 ENG_PARTY_SOCIAL_CONSERVATISM: "Conservative Party"
 ENG_PARTY_SOCIAL_CONSERVATISM_DESC: "The Conservative Party, founded in the nineteenth century as a successor to the old Tory tradition, is committed to defending monarchy, empire, and traditional British institutions. In the midst of economic hardship and social unrest, it promotes fiscal discipline, cautious reform, and the maintenance of domestic and international order."
 ENG_PARTY_CLASSICAL_LIBERALISM: "Liberal Party"
 ENG_PARTY_CLASSICAL_LIBERALISM_DESC: "The Liberal Party, once the dominant force in British politics, now advocates for individual liberty, free trade, and parliamentary reform. Though weakened by internal divisions and the rise of Labour, it continues to advocate for progressive social policies, internationalism, and the protection of civil rights."
 ENG_PARTY_SOCIAL_LIBERALISM: "Liberal National Party"
 ENG_PARTY_SOCIAL_LIBERALISM_DESC: "The Liberal Nationals, formed in 1931 as a result of a split within the Liberal Party, works closely with the Conservatives to support the National Government. They present themselves as pragmatists willing to sacrifice old liberal dogmas for national recovery, advocating tariff reform, fiscal stability, and loyalty to traditional institutions."
 ENG_PARTY_SOCIAL_DEMOCRACY: "National Labour"
 ENG_PARTY_SOCIAL_DEMOCRACY_DESC: "National Labour, which emerged from Ramsay MacDonald's split with the Labour Party in 1931, supports the Conservative-led National Government while claiming to represent working-class interests. Supporters emphasise duty, moderation, and national unity over class conflict, while detractors see the group as little more than a personal vehicle for MacDonald's continued hold on power."
 ENG_PARTY_SOCIALISM: "Labour Party"
 ENG_PARTY_SOCIALISM_DESC: "The Labour Party, formed in the early twentieth century from trade unions and socialist societies, serves as the political voice of the British working class. It advocates for social justice, workers' rights, and public ownership of key industries, while opposing the National Government's austerity policies. Despite its recent electoral defeat and internal divisions, Labour remains the primary force for progressive reform in Britain."
