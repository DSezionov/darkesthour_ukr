 GER_PARTY_SOCIAL_LIBERALISM: "DDP"
 GER_PARTY_SOCIAL_LIBERALISM_LONG: "Deutsche Demokratische Partei"
 GER_PARTY_SOCIAL_LIBERALISM_DESC: "Deutsche Demokratische Partei Description"
 GER_PARTY_SOCIAL_DEMOCRACY: "SPD"
 GER_PARTY_SOCIAL_DEMOCRACY_LONG: "Sozialdemokratische Partei Deutschlands"
 GER_PARTY_SOCIAL_DEMOCRACY_DESC: "The Sozialdemokratische Partei Deutschlands (Social Democratic Party of Germany) or SPD has a rich history as the oldest and among the most influential of political parties in the unified Germany. Founded as the Allgemeiner Deutscher Arbeiterverein (General German Workers’ Association in 1863, it merged with the Sozialdemokratische Arbeiterpartei (Social Democratic Workers’ Party) at the Gotha Conference of 1875 to form the Sozialistische Arbeiterpartei Deutschlands. A proponent of Marxism, the party advocated for workers’ rights, social justice, and democratic reforms.\n\nAfter almost twelve years of illegality under the Bismarckian government, the party returned to the forefront of politics in 1890, successfully entering the Reichstag and changing its name to the Sozialdemokratische Partei Deutschlands (Social Democratic Party of Germany) at its annual party convention in Halle. Despite attempts to suppress and restrict the influence of the SPD on the part of the National Liberals and Conservatives, the party became the largest in the Reichstag by 1912, a position it would hold for over a decade.\n\nAt the outbreak of the Great War, the SPD was divided into two factions that adopted opposing perspectives to the party’s endorsement of the conflict. In 1916, the unshakably anti-war faction of the SPD was expelled, its members coalescing to form the Unabhängige Sozialdemokratische Partei Deutschlands (Independent Social Democratic Party of Germany) its members including Rosa Luxemburg, Karl Liebknecht and Hugo Haase.\n\nThe tumultuous events of the Great War and the subsequent German Revolution of 1918-1919 brought about significant change. The SPD played a pivotal role in the establishment of the so-called new Republic including supplying its first President, party leader Friedrich Ebert. The government introduced a large number of reforms in the following months, including various civil liberties and labor rights.\n\nWhile attempting to combat impending hyperinflation and foreign occupation, the SPD also had to contend with several violent uprisings across the political spectrum, all of whom intended to overthrow the young Republic. The use of military force, in particular the utilization of the right-wing Freikorps against Communist revolutionary forces resulted in a permanent split between the SPD and its more radical wing - the USPD which would later evolve into the KPD.\n\nThe SPD has continued to retain strong influence in German politics despite the ongoing economic crisis and the gradual erosion of the political center. However, with extremism on the rise, the future of the SPD and social democracy as a whole in an increasingly polarized nation has now come into question."
 GER_PARTY_SOCIALISM: "SAPD"
 GER_PARTY_SOCIALISM_LONG: "Sozialistische Arbeiterpartei Deutschlands"
 GER_PARTY_SOCIALISM_DESC: "Sozialistische Arbeiterpartei Deutschlands Description"
 GER_PARTY_MARXISM_LENINISM: "KPD"
 GER_PARTY_MARXISM_LENINISM_LONG: "Kommunistische Partei Deutschlands"
 GER_PARTY_MARXISM_LENINISM_DESC: "The Kommunistische Partei Deutschlands (Communist Party of Germany) or KPD has a complex history deeply intertwined with the social and political dynamics of Germany during the 20th Century. Founded in 1918, in the aftermath of the Great War and the German Revolution, the KPD emerged as a major socialist force advocating for radical change.\n\nThe party’s early years were marked by revolutionary fervor, as Germany grappled with the aftermath of its defeat in the war and the economic turmoil that followed. The KPD played a pivotal role in the uprisings that led to the abdication of the Kaiser and the establishment of the Republic. However, clashes with other left-wing groups, especially the SPD, prevented the formation of a united socialist front.\n\nIn the last decade, the KPD has pursued revolutionary goals, often engaging in protests, strikes, and political agitation. Its confrontational approach often puts it at odds not only with the SPD but also with the government and conservative forces. It is certainly not an unusual sight on the streets of larger German cities to see mobs of SA-men face off against members of the Roter Kämpferbund (Red Front Fighters), the party’s paramilitary wing. However, the KPD’s open and unapologetic alignment with the Soviet Union and its ideology has often been considered a reason for its marginalization in mainstream German politics. "

