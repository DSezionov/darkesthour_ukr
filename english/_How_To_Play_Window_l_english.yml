 HOW_TO_PLAY_WINDOW_TUTORIAL_5_BIG_TITLE: "$DH_TUTORIAL_WINDOW_AGENCY_TAB_BIG_TITLE$"
 HOW_TO_PLAY_WINDOW_TUTORIAL_5_SMALL_TITLE_1: "$dh_tutorial_window_agency_tab_small_title_1$"
