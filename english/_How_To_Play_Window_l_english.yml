 HOW_TO_PLAY_WINDOW_TUTORIAL_5_SMALL_TITLE_2: "$dh_tutorial_window_agency_tab_small_title_2$"
 HOW_TO_PLAY_WINDOW_TUTORIAL_5_TEXT_2: "Clicking the '§YWar Room Intel§!' button in the intelligence agency tab will open an overview of all the War Room Operations you have gained intel on. \n\n£dh_tutorial_war_room_intel_button_agency \n\n\nIntel you have not yet gained from an operation that you have discovered is marked with a '?'. \n\n\n\n\n£dh_tutorial_war_room_intel"

 HOW_TO_PLAY_WINDOW_TUTORIAL_6_BIG_TITLE: "$DH_TUTORIAL_WINDOW_DIPLOMACY_TAB_BIG_TITLE$"
 HOW_TO_PLAY_WINDOW_TUTORIAL_6_SMALL_TITLE_1: "$dh_tutorial_window_diplomacy_tab_small_title_1$"
 HOW_TO_PLAY_WINDOW_TUTORIAL_6_TEXT_1: "$dh_tutorial_window_diplomacy_tab_text_1$"
 HOW_TO_PLAY_WINDOW_TUTORIAL_6_SMALL_TITLE_2: "$dh_tutorial_window_diplomacy_tab_small_title_2$"
 HOW_TO_PLAY_WINDOW_TUTORIAL_6_TEXT_2: "Once you have gained intel on a country's War Room Operations, it is saved so you can view it later. \n\nTo view all the intel you currently have on other countries' War Room Operations, click on the '§YOpen Country List§!' button in the bottom left corner of the diplomacy tab to go to the complete country list, instead of viewing a specific country's diplomacy tab. \n\n£dh_tutorial_country_list_button"
 HOW_TO_PLAY_WINDOW_TUTORIAL_6_SMALL_TITLE_3: "$dh_tutorial_window_diplomacy_tab_small_title_3$"
 HOW_TO_PLAY_WINDOW_TUTORIAL_6_TEXT_3: "Clicking the '§YWar Room Intel§!' button at the top of the country list in the diplomacy tab will open an overview of all the War Room Operations you have gained intel on. \n£dh_tutorial_war_room_intel_button \n\n\nIntel you have not yet gained from an operation that you have discovered is marked with a '?'. \n\n\n\n\n£dh_tutorial_war_room_intel"

