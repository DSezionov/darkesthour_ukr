 HOW_TO_PLAY_WINDOW_TUTORIAL_2_BIG_TITLE: "$DH_TUTORIAL_WINDOW_POLITICS_TAB_BIG_TITLE$"
 HOW_TO_PLAY_WINDOW_TUTORIAL_2_SMALL_TITLE_1: "$dh_tutorial_window_politics_tab_small_title_1$"
 HOW_TO_PLAY_WINDOW_TUTORIAL_2_TEXT_1: "The §RDarkest Hour§! mod has added another resource that is used by a lot of things in the game: £money_icon §YMoney§!. \n\nThe '§YManage Economy§!' button in the politics tab allows you to open the new economy window. \n\n\n£dh_tutorial_manage_economy_button \n\n\n\nThere you can view and manage your current income and expenses as well as your loans and inflation."
 HOW_TO_PLAY_WINDOW_TUTORIAL_2_SMALL_TITLE_2: "$dh_tutorial_window_politics_tab_small_title_2$"
 HOW_TO_PLAY_WINDOW_TUTORIAL_2_TEXT_2: "The interactions with subjects have been greatly modified and expanded upon. \n\nThe simple vanilla subject overview has been replaced by an indepth mechanic. The '§YSubject Manager§!' button in the politics tab allows you to open the new subject manager window. \n\n\n£dh_tutorial_manage_subjects_button \n\n\n\nThere you can interact with and take actions on each of your subjects individually. \n\nIn order to access the subject mananger, you need to have subjects and must not be a subject yourself."

