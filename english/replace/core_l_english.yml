  water_modifier_the_devils_triangle_name: "The Devil's Triangle"
  water_modifier_the_devils_triangle_tt: "£stalin_paranoia  Random sailors disappearing chance: §R+35.00%§!\n£stalin_paranoia  Mysterious storm formation chance: §R+40.00%§!\n£stalin_paranoia  Hull Breach from Nowhere: §R+15.00%§!\n£stalin_paranoia  Erosion of Sanity: §R+2.00%§! \n\n§LAliens, honestly. If I had to believe any of these theories, I'm gonna go with aliens. I gotta go with aliens, bruh. The Bermuda Triangle could be the true censor of the Earth, and it's a perfect place to snatch unsuspecting travelers.\n - American sailor§!"
  water_modifier_thick_sargassum_name: "Thick Sargassum"
  water_modifier_thick_sargassum_tt: "The waters of the Sargasso Sea are dense with floating mats of sargassum seaweed, creating a tangled and sluggish environment for naval vessels. Historically, sailing ships could become becalmed or trapped amid the thick weed, while even modern vessels risk fouled propellers and reduced speed. Submarines find ample cover in these murky waters, making detection difficult and ambushes all the more likely"

