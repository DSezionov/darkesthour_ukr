 spawn_landmark_Boulder_Dam: "Constructs the new landmark \"§YBoulder Dam§!\" between §g[379.GetName]§! and §g[377.GetName]§!."
 spawn_landmark_Pentagon: "Constructs the new landmark \"§YThe Pentagon§!\" in §g[362.GetName]§!."
 spawn_landmark_Hindenburg: "§YThe Hindenburg§! has taken flight. It will circle around §gLake Constance§! until future events."
