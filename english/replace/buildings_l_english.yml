l_english:

### Changed Vanilla Entries

### DH - Buildings
# (also includes overridden vanilla names, kept as one list for simplicity)
 infrastructure: "£infrastructure_icon_20x20 Infrastructure"
 infrastructure_plural: "Infrastructure"
 infrastructure_desc: "This building provides the state with improvement of infrastructure. It increases your supply power in strategic regions and increases your divisions' speed."
 arms_factory: "£mil_industry_icon_20x20 Military Complex"
 arms_factory_plural: "Military Complexes"
 arms_factory_desc: "This building provides the state with industry for production of new military equipment. Can be converted to civilian industry if needed."
 dockyard: "£dockyard_icon_20x20 Naval Dockyard"
 dockyard_plural: "Naval Dockyards"
 dockyard_desc: "This building provides the state with industry for building new ships."
 industrial_complex: "£civ_industry_icon_20x20 Civilian Industry"
 industrial_complex_plural: "Civilian Industries"
 industrial_complex_desc: "This building provides the state with industry for production of civilian goods or construction of new buildings. Can be converted to military industry if needed."
 air_base: "£airbase_icon_20x20 Air Base"
 air_base_plural: "Air Bases"
 air_base_desc: "This building provides the state with deployment for your air forces."
 naval_base: "£navalbase_icon_20x20 Naval Base"
 naval_base_plural: "Naval Bases"
 naval_base_desc: "Extends the range of your fleet and provides repair services for it. Allows overseas supply and export of resources. Higher levels increases the supply throughput."
 bunker: "£landfort_icon_20x20 Land Fort"
 bunker_plural: "Land Forts"
 bunker_desc: "This building inflicts an attack penalty of $VALUE|+%0$ for each fort level on the attacker in combat. Attacking from multiple directions will reduce forts effect."
 coastal_bunker: "£coastalfort_icon_20x20 Coastal Fort"
 coastal_bunker_plural: "Coastal Forts"
 coastal_bunker_desc: "This building inflicts an attack penalty of $VALUE|+%0$ for each fort level on the attacker in naval invasion combat."
 anti_air_building: "£antiair_icon_20x20 Anti-Air"
 anti_air_building_plural: "Anti-Air"
 anti_air_building_desc: "This building provides the state with protection from enemy bombers and ability to fire at attacking aircraft."
 synthetic_refinery: "£synthetic_icon_20x20 Synthetic Refinery"
 synthetic_refinery_plural: "Synthetic Refineries"
 synthetic_refinery_desc: "This building provides the state with"
 synthetic_refinery_amount: "$VALUE|Y0=$"
 synthetic_refinery_resource: "£resources_strip|$FRAME$"
 radar_station: "£radar_icon_20x20 Radar Station"
 radar_station_plural: "Radar Stations"
 radar_station_desc: "Radar allows you to gain intel on enemy troops in nearby states.\nA higher radar level in a state increases the effective range of the radar.\nRadar also provides the state with better detection of enemy air forces, giving your planes a better chance to engage them.\nIn addition radar increases the detection of enemy fleets at sea."
 rocket_site: "£rocketsite_icon_20x20 Rocket Site"
 rocket_site_plural: "Rocket Sites"
 rocket_site_desc: "This building provides the state with deployment for produced rockets."
 nuclear_reactor: "£nuclear_reactor_icon_20x20 Nuclear Reactor"
 nuclear_reactor_plural: "Nuclear Reactors"
 nuclear_reactor_desc: "This building provides the state with production of enriched Uranium for use in Nuclear weapons."
 fuel_silo: "£fuelsilo_icon_20x20 Fuel Silo"
 fuel_silo_plural: "Fuel Silos"
 fuel_silo_desc: "This building provides your nation with more room for stockpiling §HFuel§!."

# DH - GUI Additions
 SHOW_CONSTRUCTION_SPEED_BUTTON_TT: "§YOFF§! \n§GClick§! to show the construction speed modifiers for the buildings."
 HIDE_CONSTRUCTION_SPEED_BUTTON_TT: "§YON§! \n§GClick§! to hide the construction speed modifiers for the buildings."

