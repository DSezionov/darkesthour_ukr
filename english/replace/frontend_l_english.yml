 FE_DIFFICULTY_VERY_EASY: "Don't Hurt Me"
 FE_DIFFICULTY_VERY_EASY_TOOLTIP: "§RThe Don't Hurt Me Difficulty§!\nRecommended for: Your Grandma; Everyone Who Complained the Mod Was Too Hard\n\n§LDesigned to offer a minimal challenge, this difficulty grants significant bonuses to the player. You will have a very easy time and should not face any major challenges in your playthrough.§!\n\n\n\n\n£picture_Difficulty_Dont_Hurt_Me\n\n\n£picture_Empty_Texticon"
 FE_DIFFICULTY_EASY: "Recruit"
 FE_DIFFICULTY_EASY_TOOLTIP: "§RThe Recruit Difficulty§!\nRecommended for: Casuals; Sims Gamers; New Players\n\n§LDesigned to offer a small challenge, this difficulty grants small bonuses to the player. While somewhat easier than the vanilla experience, this difficulty should provide a fun experience if you are new to Hearts of Iron IV or are returning to the game after a long break.§!\n\n\n\n\n£picture_Difficulty_Recruit\n\n\n£picture_Empty_Texticon"
 FE_DIFFICULTY_NORMAL: "Soldier"
 FE_DIFFICULTY_NORMAL_TOOLTIP: "§RThe Soldier Difficulty§!\nRecommended for: Average Joes; Hearts of Iron Enthusiasts; Wehraboos\n\n§LDesigned to offer a more challenging experience, this difficulty grants minor bonuses to AI nations, making the game a bit harder than the usual vanilla experience. However, people that are familiar with the vanilla game should not struggle too much.§!\n\n\n\n\n£picture_Difficulty_Soldier\n\n\n£picture_Empty_Texticon"
 FE_DIFFICULTY_HARD: "§RDarkest Hour§!"
 FE_DIFFICULTY_HARD_TOOLTIP: "§RThe Darkest Hour Difficulty§!\nRecommended for: Everyone Who Complained The Mod Was Too Easy; Dark Souls Players\n\n§LDesigned to offer a fun but challenging experience. A good balance between challenge and fun, this is the difficulty recommended by the developers. Harder than the vanilla experience, even seasoned Hearts of Iron IV players could find themselves stuck between a rock and a hard place.§!\n\n\n\n\n£picture_Difficulty_Darkest_Hour\n\n\n£picture_Empty_Texticon"
 FE_DIFFICULTY_VERY_HARD: "Mein Leben"
 FE_DIFFICULTY_VERY_HARD_TOOLTIP: "§RThe Mein Leben Difficulty§!\nRecommended for: TommyKay; Basement Dwellers; People Who Have Never Touched Grass\n\n§RDeath at the gates again. Howling my name. Can't greet you today. I have a war to win.§!\n\n§LDesigned to offer a very challenging experience, this difficulty grants major bonuses to all AI nations. This difficulty is significantly harder than the vanilla experience and even seasoned Hearts of Iron IV players will struggle with some of the challenges this experience provides.§!\n\n\n\n\n£picture_Difficulty_Mein_Leben\n\n\n£picture_Empty_Texticon"
 
 UPDATE_STICKER_STRATEGIC_COMMAND_FRA_TOOLTIP: "£picture_Empty_Texticon\n\n£picture_system_darkest_hour_strategic_command\n\n\n\n\n\n§Y1.1.0§! - §3French Republic§! ----------------------------------\n\nSupported 1.1 Mechanics:\n• Reserves and Militias (§Y2§!) £trigger_yes \n• War Room £trigger_no \n\n• Vichy France now becomes a German puppet after Case Anton rather than directly annexed, but with their navy and army removed.\n• Case Anton and Operation Torch have been made more simple for 1.1 to allow for better game flow and AI utilization. They will be made more in-depth in the future France update.\n• Various tweaks, fixes and changes to existing focus triggers and effects.\n• Brand new post-war shared focus tree with mostly alt-history content to engage militarily against the USSR as well as decolonization. Available for the US, UK and France.\n• Advanced decision categories relating to the shared tree/\n\n§YFor the complete changelog with all nations, mechanics, map work, and fixes, check the changelog channel in our Discord server§!."

 UPDATE_STICKER_STRATEGIC_COMMAND_USA_TOOLTIP: "£picture_Empty_Texticon\n\n£picture_system_darkest_hour_strategic_command\n\n\n\n\n\n§Y1.1.0§! - §3United States of America§! ---------------------\n\nSupported 1.1 Mechanics:\n- Reserves and Militias (§Y2§!) £trigger_yes \n- War Room (§Y1§!) £trigger_yes \n\n• Added new events, spirits and minor changes (buffs) to US Army, Air and Navy Focus trees.\n• The following landmarks will now be built throughout the game: Boulder Dam, Pentagon, Golden Gate Bridge\n• Researching nukes will now trigger a Trinity Test event, featuring an on-map 3D nuclear detonation.\n• USA can now form South Korea through decisions after the historical surrender of Japan.\n• Brand new post-war shared focus tree with mostly alt-history content to engage militarily against the USSR as well as decolonization. Available for the US, UK and France.\n• Advanced decision categories relating to the shared tree.\n• “Operation Unthinkable” war room operation.\n\n§YFor the complete changelog with all nations, mechanics, map work, and fixes, check the changelog channel in our Discord server§!."

 UPDATE_STICKER_STRATEGIC_COMMAND_ENG_TOOLTIP: "£picture_Empty_Texticon\n\n£picture_system_darkest_hour_strategic_command\n\n\n\n\n\n§Y1.1.0§! - §3United Kingdom§! ----------------------------------\n\nSupported 1.1 Mechanics:\n- Reserves and Militias (§Y3§!) £trigger_yes \n- War Room (§Y3§!) £trigger_yes \n\n• A new naval minelaying mechanic was added, which is unlocked by a focus and involves events and decisions.\n• Minor effect buffs to the army and colonial trees.\n• Two new minor events relating to overseas territories - the Transfer of Dindings and the Lapse of Liugong.\n• Brand new post-war shared focus tree with mostly alt-history content to engage militarily against the USSR as well as decolonization. Available for the US, UK and France.\n• Advanced decision categories relating to the shared tree.\n• “Operation Unthinkable” war room operation.\n• “Operation R4” war room operation.\n\n§YFor the complete changelog with all nations, mechanics, map work, and fixes, check the changelog channel in our Discord server§!."

 UPDATE_STICKER_STRATEGIC_COMMAND_GER_TOOLTIP: "£picture_Empty_Texticon\n\n£picture_system_darkest_hour_strategic_command\n\n\n\n\n\n§Y1.1.0§! - §3German Reich§! ----------------------------------\n\nSupported 1.1 Mechanics:\n- Reserves and Militias (§Y10§!) £trigger_yes \n- War Room (§Y1§!) £trigger_yes \n\n• New victory spirit when Germany defeats the Soviet Union.\n• Similar to the Soviet’s 5-Year Plan mechanic, Reichsautobahn now alerts the player with events when the decision is completed.\n• Added Victory Fever national spirit after Germany defeats France to fix PP issues.\n• Revamped Reichskommissariats (new decision images and revamped effects/names of the subject type). All RKs will now be formed through decisions, improving consistency.\n• New unique autonomy levels (Mitstreiter, Marionettenstaat, etc)\n• Added a new type of unit “SS Light Infantry”.\n• New global news event if Germany decides to push to the Urals (which will also add debuffs to Germany).\n• Added various alt-history partitions of Germany to the Yalta conference.\n• Denmark will now remain out of the war while occupied by Germany, with a later event for direct occupation.\n• “Operation Weserubung” war room operation.\n\n§YFor the complete changelog with all nations, mechanics, map work, and fixes, check the changelog channel in our Discord server§!."

 UPDATE_STICKER_STRATEGIC_COMMAND_ITA_TOOLTIP: "£picture_Empty_Texticon\n\n£picture_system_darkest_hour_strategic_command\n\n\n\n\n\n§Y1.1.0§! - §3Kingdom of Italy§! ----------------------------------\n\nSupported 1.1 Mechanics:\n- Reserves and Militias (§Y1§!) £trigger_yes \n- War Room £trigger_no \n\n• Tweaks to various focus effects.\n• Italian Civil War, featuring the Italian Social Republic, will now trigger correctly based on conditions mimicking IRL, with its capital at Salo. Improved orders of battle, borders and generals.\n• Alessandro Pavolini (Party Secretary) is now the secondary leader of the RSI.\n• A successful Axis invasion of Greece (as happened historically) will lead to the formation of the Hellenic State puppet government. Crete will remain unoccupied until actually invaded.\n\n§YFor the complete changelog with all nations, mechanics, map work, and fixes, check the changelog channel in our Discord server§!."

 UPDATE_STICKER_STRATEGIC_COMMAND_JAP_TOOLTIP: "£picture_Empty_Texticon\n\n£picture_system_darkest_hour_strategic_command\n\n\n\n\n\n§Y1.1.0§! - §3Empire of Japan§! ----------------------------------\n\nSupported 1.1 Mechanics:\n- Reserves and Militias (§Y1§!) £trigger_yes \n- War Room £trigger_no \n\n• Completely reworked the previously underdeveloped top-left branch (Foreign Policy Branch). Added Hirota's Three Principles focus representing Japan’s historical attempt at reconciliation with China (low chance of success). Players must then choose between the Strike North (alt-history WIP) or Strike South (historical) strategy paths, with additional focuses supporting each.\n• Added a new central branch focused on curbing extremism and modest economic development.\n• Right-side branch (Colonial Economy) now includes focuses for developing Japan's colonial holdings: Taiwan, Korea, and especially Manchuria.\n• Introduced a new branch centered around Prime Minister Fumimaro Konoe. Reflects Japan’s political consolidation: merging political parties, controlling labor unions, youth mobilization, and a choice between full state control or collaboration with Zaibatsus.\n• New late-game focuses after declaring war on the U.S., depicting the militarization and total wartime mobilization under PM Hideki Tojo. Includes increased state control, societal indoctrination, and wartime economic buffs.\n• Minor tweaks to existing military branches (Army, Navy, Airforce) to make rewards more interesting, without major structural changes.\n• Made the events leading up to the Sino-Japanese war more historical in terms of timing and effects.\n• Overhauled the unconditional surrender of Japan event to produce a more historical outcome.\n• French Indochina will no longer be part of Japan’s wars once it’s occupied in 1940, only when Operation Meigo is executed, splitting it into 3 puppet states.\n• Improved the content for the formation of Japanese puppets.\n\n§YFor the complete changelog with all nations, mechanics, map work, and fixes, check the changelog channel in our Discord server§!."

 UPDATE_STICKER_STRATEGIC_COMMAND_SOV_TOOLTIP: "£picture_Empty_Texticon\n\n£picture_system_darkest_hour_strategic_command\n\n\n\n\n\n§Y1.1.0§! - §3Union of Soviet Socialist Republic§! -------------\n\nSupported 1.1 Mechanics:\n- Reserves and Militias (§Y5§!) £trigger_yes \n- War Room (§Y2§!) £trigger_yes \n\n• Brand new post-war focus tree with one historical and one alternate branch.\n• Total rebalance of Soviet’s Second 5 Year as well as Third 5 Year Plan focus tree and content.\n• Second 5-Year Plan decisions now give events to prevent the player from missing them as well as to give more lore.\n• New event chains and “Socialist Competition” mechanic.\n• New defeat spirit after Germany defeats the Soviet Union.\n• On-map Volga-Don Canal that lets you move ships between the Caspian and the Sea of Azov - buildable through decision.\n• The Great Purge has gotten a complete new look as well as technical improvements.\n• The consequences of failing the purge have been completely overhauled. Explore it in-game :)\n• Completely overhauled the Stalin Constitution path.\n• Removed “The Leningrad Circle” and “The Manchurian Candidate” alternate paths from the tree, due to being illogical and implausible.\n• New “Liberation of Europe” decision category, for example including decisions forming the DDR, communist Austria (alt-hist), the PKWN (mid-war) and implementing full communism in Romania.\n• USSR can now form North Korea through decisions after the historical surrender of Japan.\n• New decision to withdraw from Manchuria (after August Storm) in favor of your chosen Chinese ally.\n• “Red Dawn” war room operation.\n• Operation “Groza” remade into a war room operation.\n\n§YFor the complete changelog with all nations, mechanics, map work, and fixes, check the changelog channel in our Discord server§!."

 UPDATE_STICKER_STRATEGIC_COMMAND_POL_TOOLTIP: "£picture_Empty_Texticon\n\n£picture_system_darkest_hour_strategic_command\n\n\n\n\n\n§Y1.1.0§! - §3Republic of Poland§! -------------------------------\n\nSupported 1.1 Mechanics:\n- Reserves and Militias (§Y2§!) £trigger_yes \n- War Room £trigger_no \n\n• Rework of the war tree (rebalanced, buffed, new rewards).\n• New army spirits and rewards.\n• It’s more clear to the player when some focus events will happen thanks to localization.\n• When Poland capitulates, Wladyslaw Sikorski will become Prime Minister and Wladyslaw Raczkiewicz will become President, as happened OTL.\n• When Poland capitulates, it will also receive the name “Polish Underground State” and the Armia Krajowa flag.\n• NOTE: These are only minor improvements, a complete overhaul is currently in the making in collaboration with the Historical Poland Redux team.\n\n§YFor the complete changelog with all nations, mechanics, map work, and fixes, check the changelog channel in our Discord server§!."

 UPDATE_STICKER_STRATEGIC_COMMAND_ETH_TOOLTIP: "£picture_Empty_Texticon\n\n£picture_system_darkest_hour_strategic_command\n\n\n\n\n\n§Y1.1.0§! - §3Ethiopian Empire§! ----------------------------------\n\nSupported 1.1 Mechanics:\n- Reserves and Militias £trigger_no \n- War Room £trigger_no \n\n• Ethiopia will now return to the map after Italian East Africa is defeated by the Allies.\n• Small tweaks and changes to content, including more effects/rewards to some focuses as well as timing tweaks.\n• A new event for buying weapons from the British or French.\n\n§YFor the complete changelog with all nations, mechanics, map work, and fixes, check the changelog channel in our Discord server§!."

 WARNING_TEXT_DH: "Your §Ocurrent heart's of iron IV version§! is shown in the bottom left corner of your screen.\n\nIf it says:\n\"§OMUSKETEER v1.17§!...\"\nthis means that you are running DH on an §Runsupported§! hoi4 version.\ncompatibility patch for the latest hoi4 update is §Ycoming soon§!.\nMeanwhile, please downgrade your game to §Yv1.16.10§!.\n\nIf needed, look at top of our steampage for instructions."