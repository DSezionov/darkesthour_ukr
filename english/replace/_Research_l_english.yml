#### Support Companies Technology ########################################################################
###### Engineers
 tech_engineers: "Engineer Company"
 tech_assault_weapons_1: "Attack Coordination"
 tech_assault_weapons_1_desc: "Engineer units' roles extend beyond fortification and demolition to include close cooperation with frontline infantry and armour. By integrating with assault formations, they can provide real-time battlefield assessment, obstacle clearance, and breaching support. Their coordination ensures that artillery barrages, infantry advances, and armour thrusts are all timed correctly."
 tech_assault_weapons_2: "Flamethrowers"
 tech_assault_weapons_2_desc: "Since humans first learnt to control fire, we have always devised new ways to kill with it, and this is no exception in the modern era. While weapons that spit fire at the enemy have existed since Roman times, modern flamethrowers are far less primitive. With modern advancements, we can use the power of flame to set opposing fortifications on fire and smoke out the enemies inside. Not to mention the danger fire can pose to an enemy himself."
 tech_assault_weapons_3: "Improvised Combat Tactics"
 tech_assault_weapons_3_desc: "Our troops should be disciplined and listen to their commanding officers, but we must also teach and allow them to do what is necessary in the moment to achieve victory, especially if they are unable to receive or be given orders. The days of two armies fighting on equal terms against each other are over; now is a time of chaos and improvisation, which our troops must master. To win, our soldiers must adapt to any situation and use any means or weapons at their disposal."
 tech_assault_weapons_4: "Demolition Team"
 tech_assault_weapons_4_desc: "Our enemies in war may fight valiantly; even if we are able to hold firm and prevent them from pushing into our lands, there will still be the issue of pushing into theirs. As we proceed, we will undoubtedly encounter various fortifications and defences designed to slow our assault. To breach these bulwarks, we should form specialist teams trained to sneakily approach any enemy fortification and blow it to kingdom come, allowing our armies easy access."
 tech_assault_weapons_5: "Mine Detectors"
 tech_assault_weapons_5_desc: "Far too many times, our troops and vehicles have unknowingly entered a hidden enemy minefield and been reduced to a red mist in a matter of seconds. To prevent these cunning traps from killing any more of our men, we will need to use mine detectors. Mine detectors are handheld machines with a disc at the bottom that are also used to find metals in general. They are waved over the ground and signal to the user when a mine is discovered, allowing it to be safely removed."
 tech_assault_weapons_6: "Men-Portable Flamethrowers"
 tech_assault_weapons_6_desc: "New advancements in flamethrower technology have allowed us to revisit the device's scorching power and improve it beyond previous levels. Now we can strap the fuel tank to a soldier's back and allow him to walk around with a flamethrower in hand. This advancement allows for increased efficiency and deadliness because we can now fire directly at our enemies rather than attempting to aim in their general direction."
 tech_warforged_builders: "Warforged Builders"
 tech_warforged_builders_desc: "Engineering units receive specialised training and equipment for rapid construction in combat situations. Bridging teams, field fortification specialists, and logistics enablers work together to quickly erect strongpoints, lay track, and reinforce infrastructure."
 tech_entrenchment_1: "Trench Warfare"
 tech_entrenchment_1_desc: "Trench warfare is a battle strategy in which multiple long pathways are dug into the ground, low enough for multiple men to walk from place to place without fear of being shot across the battlefield. It was widely used to brutal, if tiring, effect during the Great War. It is primarily used for long-term wars in which the goal is to outlast the enemy and halt any assault with the sheer size of the defences."
 tech_entrenchment_2: "Pillboxes"
 tech_entrenchment_2_desc: "Fixed defensive emplacements are incorporated into forward and rear positions to provide continuous fire support and control over key terrain. Pillboxes are made of reinforced concrete or packed earth and timber, and they are designed to withstand small arms and light artillery. These hardened shelters are typically equipped with machine guns, anti-tank rifles, or light mortars, allowing engineer companies to quickly anchor a defensive line. Their presence slows enemy advances and improves infantry's ability to hold key positions."
 tech_entrenchment_3: "Reinforced Bunkers"
 tech_entrenchment_3_desc: "Engineers build fortified bunkers that can withstand sustained bombardment and direct hits from heavier weapons. These structures, built with layered concrete, steel supports, and shock-absorbing materials, serve as command posts, ammunition depots, and protected shelters for troops under heavy fire. Unlike smaller field emplacements, reinforced bunkers are semi-permanent and require extensive planning and construction, but they significantly improve survivability and operational endurance in static or contested areas."
 tech_entrenchment_4: "Blockhouses"
 tech_entrenchment_4_desc: "Blockhouses are a compact yet durable defensive structure made primarily of concrete and steel, designed to house small infantry units with overlapping fields of fire. They are easier to build than more elaborate bunkers and are commonly used to secure key terrain such as crossroads, bridges, or hilltops. Blockhouses, with firing slits and internal ventilation, provide all-around protection against infantry assaults and limited artillery fire."
 tech_entrenchment_5: "Hedgehog"
 tech_entrenchment_5_desc: "The hedgehog is a fixed anti-tank barrier composed of steel beams or reinforced materials arranged in a cross-shaped pattern. It is designed to stop or redirect tanks and other armoured vehicles and does not require maintenance or personnel. These obstacles, which are frequently deployed in rows across roads, open fields, or urban chokepoints, are easy to manufacture, quick to install, and extremely effective at delaying enemy advances."
 tech_entrenchment_6: "Dragon's Teeth"
 tech_entrenchment_6_desc: "Dragon's teeth are far more than just an intimidating name; they are a new anti-tank strategy that, if used, has the potential to be extremely effective. By laying down a pattern of small, pyramid-shaped blocks made of reinforced concrete that resemble large teeth, we may be able to provide tanks and infantry with an obstacle they will not easily cross, slowing them down enough for our troops to pick them off fairly easily. When combined with other traps, they can be extremely deadly."
 tech_amphibious_1: "Raft River Crossing"
 tech_amphibious_1_desc: "Temporary raft bridges allow engineer units to transport infantry, light vehicles, and supplies across rivers and water obstacles when permanent infrastructure is unavailable. These crossings, made of pontoons, timber, or inflatable materials, require precise coordination and consistent manpower. Despite being vulnerable to enemy fire and adverse weather, they enable quick tactical manoeuvres in terrain that would otherwise be impassable."
 tech_amphibious_2: "Cargo Ship Transports"
 tech_amphibious_2_desc: "Standardised cargo ships are the foundation of long-distance military logistics, transporting critical materiel, vehicles, ammunition, and personnel across the seas. These vessels are designed for bulk and endurance rather than speed, and they operate in convoys with naval escorts for protection. Efficient cargo handling equipment and modular storage allow for faster loading and unloading at ports, making them an important link in maintaining overseas operations and supply lines."
 tech_amphibious_3: "Beachheads"
 tech_amphibious_3_desc: "When a naval invasion force lands on the shores of enemy-held territory, the battle is often not one of man versus man, but of who can gain the most organisation and reinforcements. We will gain an advantage by having our soldiers establish a temporary front line - or beachhead - from which they can defend until the proper reinforcements arrive to push forward into enemy territory. In this regard, we should make the use of beachheads a common strategy in any future invasion."
 tech_amphibious_4: "Pontoon Bridges"
 tech_amphibious_4_desc: "Floating bridge systems enable rapid river crossings without the need for permanent infrastructure. These bridges, made of modular pontoons linked together, can support infantry, light vehicles, and, in some cases, armoured columns. Engineer units deploy them to maintain momentum during advances across water obstacles, and they are usually used in conjunction with temporary roadways and ferry systems."
 tech_amphibious_5: "Assault Boats"
 tech_amphibious_5_desc: "Assault boats are lightweight, portable, and frequently collapsable vessels designed to transport infantry across rivers or coastal zones during combat operations. Used primarily during initial crossings, they prioritise speed and surprise over protection and capacity, allowing troops to establish footholds before heavier bridging equipment arrives."
 tech_amphibious_6: "Amphibious Vehicles"
 tech_amphibious_6_desc: "Amphibious vehicles, designed to travel on both land and water, bridge the gap between sea-based landings and inland mobility. These machines, which are often lightly armoured and equipped with treads or wheels, can transport troops, supplies, or light equipment from ship to shore and then continue to operate once inland. Their adaptability makes them indispensable in coastal assaults, marshy terrain, and river crossings, reducing reliance on permanent infrastructure."
###### Recon
 tech_recon: "Recon Company"
 tech_recon2: "Camouflage Techniques"
 tech_recon2_desc: "There are numerous ways for our soldiers to remain stealthily hidden from enemy view and thus survive. Unfortunately, many of our soldiers are either unprepared or unaware of such camouflage techniques, which is a mistake that must be corrected immediately. We will be able to lose fewer soldiers and perform far better ambushes if we conduct research into new techniques that allow our men to remain unseen, as well as distribute handbooks to them on how to use these new methods."
 tech_recon3: "Motorized Recon"
 tech_recon3_desc: "Fast, lightly armed vehicles give reconnaissance units the mobility they need to probe enemy lines, scout flanks, and respond quickly. These formations, mounted on trucks, motorcycles, or light utility vehicles, give up heavy protection in favour of speed and reach. Motorised recon is used to identify threats, locate gaps, and relay battlefield intelligence in real time. It improves operational awareness and allows for faster tactical decision-making."
 tech_recon4: "Scout Cars"
 tech_recon4_desc: "Scout cars, designed for speed, stealth, and light fire support, are a more durable and well-armed alternative to soft-skinned reconnaissance vehicles. These armoured vehicles patrol ahead of the main forces, probing enemy positions and relaying battlefield information. Their small size, agility, and frequently mounted light armament or machine guns make them ideal for deep patrols, ambush spotting, and making quick contact with enemy units without becoming fully engaged."
 tech_recon5: "Improved Shadowing Techniques"
 tech_recon5_desc: "Improved shadowing techniques allow reconnaissance units to track enemy movements from a safe distance without being detected. Scouts can monitor enemy troop concentrations and logistics without engaging by moving with discipline, using effective camouflage, and making the best use of terrain, providing up-to-date intelligence that helps shape operational decisions."
 tech_recon6: "Specialized Survey"
 tech_recon6_desc: "Reconnaissance teams trained in specialised survey techniques can identify and document key features of terrain, infrastructure, and defensive positions. This includes evaluating road conditions, determining river depths, marking minefields, and identifying natural chokepoints."
 tech_recon7: "Harsh Environment Training"
 tech_recon7_desc: "Far too many of our soldiers have been forced to leave the field or have died as a result of extreme weather due to a lack of knowledge and preparation to face not only their enemies but Mother Nature as well. Whether it's frostbite in the winter, heatstroke in the summer, flash floods during heavy downpours, or something else, far too many good men are killed by nature. As a result, we should require our soldiers to undergo harsh environmental training to mitigate this."
 tech_recon_in_force: "Reconnaissance-in-Force"
 tech_recon_in_force_desc: "Reconnaissance-in-force entails sending a unit to deliberately engage the enemy in order to gather intelligence on their strength, position, and readiness. Unlike traditional reconnaissance, the goal is to elicit a response, causing the enemy to act and allowing the attacking force to assess their capabilities. This tactic provides useful information for larger offensives and reveals weaknesses in the enemy's defences."
 tech_recon_by_fire: "Reconnaissance-by-Fire"
 tech_recon_by_fire_desc: "Reconnaissance-by-fire entails directing fire at likely enemy positions to elicit a response that reveals enemy presence and location. It is particularly useful in dense terrain or low-visibility situations where visual contact is difficult. Though it risks revealing the attacker's location, it is still a quick and aggressive way to confirm enemy deployments prior to a larger engagement."
 tech_shadow_operatives: "Shadow Operatives"
 tech_shadow_operatives_desc: "Shadow operatives are elite reconnaissance agents trained in stealth, infiltration, and human intelligence gathering. They collect critical battlefield information by operating behind enemy lines or within occupied territory, employing concealment, disguise, and observation techniques. These operatives are frequently tasked with identifying enemy command structures, tracking down high-value targets, and coordinating with local informants - all while remaining undetected."
##### Military Police
 tech_military_police: "Military Police"
 tech_military_police2: "Martial Courts"
 tech_military_police2_desc: "Martial courts are judicial bodies run by the military that are activated during times of war or national emergency. They handle cases involving violations of military law, sabotage, desertion, and actions that are detrimental to military discipline or operational security. They frequently use expedited procedures and are intended to deliver quick, decisive rulings to maintain control and ensure order in times when civilian legal systems are overwhelmed or suspended."
 tech_military_police3: "Whistleblowers"
 tech_military_police3_desc: "In occupied territories, we occasionally encounter people who are quite pleased with our rule and, in exchange for better treatment, will offer to inform us on the movements of resistance forces fighting against our occupation. These whistleblowers can be extremely useful in preventing rebellion or apprehending individuals who have hidden sympathies that we are unaware of. We should train our military police to accept and utilise whistleblowers more."
 tech_military_police4: "Frequent Patrols"
 tech_military_police4_desc: "Military police conduct routine and highly visible patrols to enforce discipline, ensure security, and keep order in both frontline and rear-area zones. These patrols act as a constant reminder of authority, discouraging misconduct and detecting potential threats or breaches before they escalate."
 tech_military_police5: "Harsher Punishments"
 tech_military_police5_desc: "Discipline is enforced through stricter sentencing and less leniency for infractions. Military police and commanding officers are authorised to impose harsh penalties for desertion, looting, insubordination, and disobedience. The goal is to maintain cohesion and order during wartime by imposing severe consequences that deter even minor offences."
 tech_military_police6: "Martial Law"
 tech_military_police6_desc: "While often viewed as an alarming and authoritarian practice, our military police must learn how to completely and utterly control the area to which they are deployed, even if it means replacing local civilian rule with their own through the declaration of martial law. Although it is likely to incite public outrage, complete military occupation and the temporary deprivation of liberties may be required to bring a region under our control."
 tech_military_police7: "Anti-Partisan Operations"
 tech_military_police7_desc: "Military units are restructured and trained for operations behind enemy lines, specifically targeting hostile irregulars and sabotage networks. The emphasis is on reconnaissance, rapid response, and intelligence gathering in difficult terrain. Military police, local collaborators, and security detachments work together to identify, isolate, and eliminate partisan elements. These operations aim to secure supply routes, prevent uprisings, and re-establish state authority in contested or occupied territories."
 tech_military_police8: "Guardian Enforcers"
 tech_military_police8_desc: "A small group of military police officers is organised into elite internal security units tasked with maintaining order in volatile areas. These enforcers have expanded authority, combining investigative skills with paramilitary training. Their presence acts as both a deterrent and a rapid-response force, capable of quelling dissent, enforcing curfews, and protecting critical infrastructure. They are frequently deployed to high-risk areas where traditional military or civilian police forces are insufficient."
###### Signal Company
 tech_signal_company: "Signal Company"
 tech_signal_company2: "Early Phone Communication"
 tech_signal_company2_desc: "As communication technology advanced throughout the Great War, it allowed for further advancements in the capabilities of the many nascent signal units around the world. Improved radio communications and early motorcycles have begun to phase out the old messenger pigeons, but the most significant advancement has been the use of proper phone lines between signal units. This gives our boys vital security, keeping our most important secrets out of the hands of unsavoury people."
 tech_signal_company3: "Information Assurance"
 tech_signal_company3_desc: "To better protect classified military secrets, signal troops have begun using advanced and cutting-edge cypher machines to encrypt and decrypt sensitive data sent between signal units. These ciphers are encrypted using codes that are often so advanced that the only way to crack them is to obtain the original code books, which our trust signal troops would never allow to fall into enemy hands."
 tech_signal_company4: "Radio Communication"
 tech_signal_company4_desc: "As radio and cypher technology advanced throughout the interwar period, it became widespread enough to be used as a standard means of inter-unit communications. Our troops no longer rely on antiquated messenger pigeons carrying handwritten communications that could be lost or fall into enemy hands. Instead, they use cutting-edge radio communications, which allows for much greater coordination between multiple units in a much shorter time frame."
 tech_signal_company5: "Network Management"
 tech_signal_company5_desc: "Now that our communication technology has enabled the near-instant coordination of multiple units, it has necessitated the introduction of communication hubs to manage the sheer volume of outgoing and incoming messages between signal units. These network hubs will greatly improve unit cohesion while also assisting in the compilation of the tidal wave of military intelligence delivered by our soldiers in the field."
 tech_signal_company6: "Radio Tower Installation"
 tech_signal_company6_desc: "While a portable radio and a signal officer or two may suffice for a small group of units communicating over a short distance, larger formations attempting to communicate over much greater distances will require something of higher calibre. The construction of radio towers near the headquarters of our various signal units will significantly increase efficiency and reduce burdens on an often overburdened communication network."
 tech_signal_company7: "Echo Command"
 tech_signal_company7_desc: "Battlefield communication is one of the most important aspects of modern warfare, and advances in technology have allowed us to greatly improve it. Our soldiers can now relay information faster and clearer than ever before to their commanders across the battlefield, who then relay that information to all other relevant soldiers, allowing them to stay prepared and battle more effectively. These devices include walkie talkies and advanced radios."
###### Weather Company
 desert_support_company: "Desert Support Company"
 desert_support_company_desc: "Provides equipment and support on hot terrain and deep desert biomes."
 snow_support_company: "Snow Support Company"
 snow_support_company_desc: "Provides equipment and support on cold terrain and deep snow weather."

 weather_company: "Weather Equipment"
 weather_company_desc: "Weather equipment is a type of specialised troop support equipment designed to deal with extreme weather on various battlefields around the world. Weather equipment, for example, could include environment-specific medicine or clothing, such as heavier, insulated coats and boots for combat in the extreme cold or specialised lightweight camouflage clothing for desert warfare. Overall, it is critical for armies fighting or training to fight in harsh environments."

 study_hot_environment: "Study Hot Environment"
 study_hot_environment_desc: "As our military improves, we have seen a need to provide our personnel with appropriate equipment. Studying hot temperatures and their effects on equipment and personnel allows us to better adapt to challenging situations. It also improves operational readiness and lowers attrition in arid environments."
 study_cold_environment: "Study Cold Environment"
 study_cold_environment_desc: "Harsh winters, constant mud, and snow can deplete any army, no matter how powerful or large. If we want to avoid this, we must train our army to maintain fighting efficiency while reducing losses. We will have a significant advantage over opposing ground forces."
 weather_company_desert: "Sand Protection Masks"
 weather_company_desert_desc: "One problem that our troops face while fighting in hot desert areas appears to be sand. Fighting without any protection around the nose or mouth appears to be downright dangerous, yet our men continue to engage in combat with no defence against the earthly elements. To address this, we will create masks that are specifically designed to keep sand out of our infantry's lungs, allowing them to spend more time shooting and less time wheezing."
 weather_company_desert2: "Kerchief for Sand"
 weather_company_desert2_desc: "Another simple way for our men to defend themselves against the afflicting rock granules is to provide them with their own kerchief or bandana. While a simple and admittedly outdated method of avoiding sand, they are effective, inexpensive, and easily integrated into a uniform. One could argue that we have better and more advanced methods for protecting our troops from the elements, but this is a good start in combating Mother Nature's arid offensives."
 weather_company_desert3: "Anti-Sand Goggles"
 weather_company_desert3_desc: "Professional grade goggles, which we can easily supply to our soldiers, are an advanced method of combating the desert elements. With them, combined with our previous investments in nose and mouth protection, our soldiers' faces will finally be safe. Sand will no longer get in their eyes and distract them when they can simply brush it from their goggles and continue fighting. Furthermore, they may have a similar application against snow, making them an even better investment."
 weather_company_desert4: "Camouflaged Helmet"
 weather_company_desert4_desc: "The terrain of the desert provides little cover and little opportunity for an enemy to miss one of our soldiers but there are ways to shield our men from their enemies' watchful gaze. For example, we can use tactical camouflage on their helmets. This will cause their heads to blend in with the sand, making them much more difficult to spot, particularly from above. This will give us a significant advantage when it comes to hiding from and defending against opposing forces in the desert."
 weather_company_desert5: "Desert Foxes"
 weather_company_desert5_desc: "What we've done to mitigate the effects of sand and heat has already helped our troops fight in such conditions. With the equipment we've built and the experience we've gained, we're truly experts in desert combat; no one can deny that the sweltering heat of the desert no longer phases our army. As our newest recruits eagerly queue to serve in the sun with proper provisions, we realise that we not only fight effectively in the sand, but also thrive there."

 weather_company_snow: "Sheep Coats"
 weather_company_snow_desc: "In the fight against freezing temperatures, we have overlooked nature's creations in favour of technology. A quick solution to the horrors of pneumonia and frostbite that our troops face when fighting in the winter is to look to animals that can survive such low temperatures, such as sheep. By combining sheepskin and wool into a single comfortable coat, we can provide our troops with natural warmth to defend against the cold."
 weather_company_snow2: "Warmer Undershirt"
 weather_company_snow2_desc: "One thing we can do to protect our troops from the cold is improve their clothing, particularly their undershirts. Though their uniforms, particularly on wintry battlefields, are often designed to keep them warm, their undershirts are not, and this must be addressed. If we provided higher quality materials for our men's inner clothing layer, it would undoubtedly have additional features such as increased protection and comfort, which would improve divisions overall while also protecting them from the cold."
 weather_company_snow3: "Thick Coats"
 weather_company_snow3_desc: "To protect against the harshest colds or thickest sandstorms, coats designed to be as heavy and warm as possible must become standard equipment. These coats will keep our infantry completely unaffected by subzero temperatures, allowing them to fight through both enemy and natural assaults. While the sheer size of these coverings may impede movement, it is clear that the benefits far outweigh the drawbacks."
 weather_company_snow4: "Camouflaged Uniforms"
 weather_company_snow4_desc: "Camouflage has proven to be an intelligent form of deception that works for both humans and animals. During the Great War, the French used hidden markers and painted artillery, while the British used it on their ships. Despite this, it has yet to become common in uniforms, owing to the impossibility of 'all-terrain' camouflage. Still, providing our army with bleak-shaded uniforms designed to blend in with the winter will make it much more difficult for enemies to track down our men."
 weather_company_snow5: "Cold-Blooded Wolves"
 weather_company_snow5_desc: "Our efforts in defeating the winter have paid off. Our men are now confident in their ability to invade and defend Siberia if needed. We have provided them with such excellent equipment that they are now solid experts at fighting in subzero temperatures. The only thing we can do from here is provide additional training and centralise what we have learnt into guides and manuals so that everyone is up to speed; otherwise, our troops will hunt, survive, and thrive in the ice."
###### Field Hospital
 tech_field_hospital: "Field Hospital"
 tech_field_hospital_health_1: "Early Bandages"
 tech_field_hospital_health_1_desc: "Troops can be wounded on the battlefield by a variety of threats, including local wildlife, accidents, weather conditions, and enemy bullets and bayonets. These wounds are easily infected, and even the smallest gash can develop into something fatal. Putting research into standardised bandages to be distributed to our men would be a surefire way to at least prevent some of these unnecessary deaths."
 tech_field_hospital_health_2: "Basic Surgical Interventions"
 tech_field_hospital_health_2_desc: "Having medical personnel on call to treat the wounded has long been a staple of warfare, but we must go further. By employing not only doctors and nurses, but also medical professionals trained for more difficult scenarios, we will be able to save more lives, no matter how severe the previously fatal injury. More specifically, hiring specialised surgeons to save troops returning from the frontlines eliminates the risk of death and infection that typically accompany gunshot wounds and the like."
 tech_field_hospital_health_3: "Disease Prevention"
 tech_field_hospital_health_3_desc: "One of the most serious issues confronting our armed forces is the prevalence of illness. Aside from fighting the enemy, illness is the most common cause of death among our soldiers, whether due to extreme weather, open wounds, or simply a lack of awareness. To address the latter item on that list, we can do everything we can to educate our men about disease prevention through mandated guides, short films, and whatever else is required to ensure our soldiers are properly sanitary."
 tech_field_hospital_health_4: "Antibiotics"
 tech_field_hospital_health_4_desc: "Bacterial infections are a constant threat to soldiers on the battlefield because they are so contagious and easy to contract. Anything from an open wound, poorly cooked food, and strong weather could cause one of our men to contract a disease that would knock them off the battlefield for days, if not permanently. To combat this, we should make the administration of antibiotics - medicine designed specifically to prevent or kill bacterial infections - commonplace in battle."
 tech_field_hospital_health_5: "Blood Transfusions"
 tech_field_hospital_health_5_desc: "The loss of blood can be as dangerous to a soldier as the wound itself. Doctors working on patients returning from the battlefield should always be prepared and trained to perform blood transfusions, a critical procedure in which a healthy person's blood is safely taken and placed in the bloodstream of an injured person with blood loss. These procedures have existed since the nineteenth century, but recent advances have made them safer and more effective."
 tech_field_hospital_health_6: "Basic Pharmacology"
 tech_field_hospital_health_6_desc: "Pharmacology, or the study of drug use and medication, has been researched since the 11th century, but due to limited technology at the time, it was not studied as extensively as it is now, and was primarily focused on herbs and plants. With our new processing methods, devices, and medical breakthroughs, modern forays into pharmacology will undoubtedly provide us with ways to combat pain, disease, and even mental afflictions, potentially aiding in combat stress reactions."
 tech_field_hospital_health_7: "Mass Produced Penicillin"
 tech_field_hospital_health_7_desc: "Alexander Fleming discovered penicillin in 1928, a new antibiotic derived from the moulds of the penicillium fungus. Its discovery has resulted in numerous medical breakthroughs, and scientists are still discovering new applications for it today. It is currently being used to treat newborn eye infections and strep throat, both of which were previously untreatable."
 tech_field_hospital_psychology_1: "First Psychology Textbook"
 tech_field_hospital_psychology_1_desc: "Psychology, or the study of the mind and behaviour, is a relatively new field in the modern era. Assessing a mind and its reasoning is useful for both returning soldiers, to learn why their brains react to wartime trauma in the way they do, and using psychological research to predict our enemy's next moves."
 tech_field_hospital_psychology_2: "PTSD Research"
 tech_field_hospital_psychology_2_desc: "While accounts of soldiers experiencing unnatural fear outside the battlefield after enduring serious trauma date back to Assyrian times, it is only recently that we have begun to consider researching or assisting soldiers who are so terrified that they are unable to reintegrate into their civilian lives. During the Great War, we called this shell shock and thought it was a side effect of a weak mind, but we now know that is incorrect."
 tech_field_hospital_psychology_3: "Electroshock Therapy"
 tech_field_hospital_psychology_3_desc: "The use of electricity to treat psychological disorders has been tried since the 1500s, and its popularity and success rate have only increased since then. With our new technology, which allows for safer conditions and a more direct connection to electricity rather than static - not to mention, aided by numerous studies - we may be able to shock depression and schizophrenia out of ailing patients by inducing purposeful seizures through a process known as electroshock therapy."
 tech_field_hospital_psychology_4: "Mental Specialists"
 tech_field_hospital_psychology_4_desc: "As we continue to research the human mind and treat the afflictions that our soldiers may face after the war, we will require highly knowledgeable individuals at every turn. These people, who can be regarded as nothing more than pure professionals in the field of mental health, such as psychiatrists and psychologists, must be hired immediately to guide us and assist the many soldiers dealing with illnesses that may not have to be permanent."
 tech_field_hospital_psychology_5: "Routine Controls"
 tech_field_hospital_psychology_5_desc: "One of the most notable things we've learnt from our hired mental health specialists is the importance of establishing a consistent and unchanging routine for patients suffering from various disorders. The idea is that providing the afflicted with a regulated, steady, and stable life will improve their mental health and may even lead to them developing a more sound mind as a result."
 tech_field_hospital_psychology_6: "Group Therapy"
 tech_field_hospital_psychology_6_desc: "Group therapy is a relatively new but no less interesting or worthwhile approach to dealing with trauma, not only in soldiers but also in the general population. The idea is to bring together a group of patients who have had similar traumatic experiences in what is known as a training group, where they will share their stories and learn about each other, with the end goal of the group realising they are not alone in their struggles and being in a better mental state as a result of the human interaction."
 tech_field_hospital_psychology_7: "Reintroduction to Society"
 tech_field_hospital_psychology_7_desc: "In the early days of psychology and mental illness treatment, it was thought that such people would never be able to live normal lives again. Typically, they were imprisoned in institutions until their deaths, mistreated, and isolated from society. But no longer. With our many advances in mental health and the discovery of modern treatments for many diseases, these poor souls may one day find peace, stability, and a life outside of an asylum."
 tech_life_wardens: "Life Wardens"
 tech_life_wardens_desc: "Our medical officers are given the most up-to-date knowledge in their field as well as the best equipment available today. Rigorous training programs have given them steel nerves - enough to pull dying soldiers from active warzones to a makeshift operating room where they perform life-saving surgeries with little preparation."
###### Logistics Company
 tech_logistics_company: "Logistics Company"
 tech_logistics_company2: "Supply Line Management"
 tech_logistics_company2_desc: "Efficient supply line management ensures that frontline units always receive fuel, ammunition, food, and medical supplies. This focuses on planning efficient transportation routes, coordinating deliveries, and reducing delays or disruptions. By streamlining the flow of resources from depots to combat zones, the army maintains operational momentum while reducing the risk of shortages or overextension."
 tech_logistics_company3: "Frontline Supply"
 tech_logistics_company3_desc: "Getting essential goods to the front lines requires more than just stockpiles; it also necessitates agile logistics close to the fighting. This approach accelerates supply nodes and mobile depots, reduces the time between need and delivery, and ensures that units remain combat-effective during fast-moving operations."
 tech_logistics_company4: "Manned Convoy System"
 tech_logistics_company4_desc: "To reduce delays and protect valuable cargo, convoys are organised into manned groups with designated escorts and coordinators. Each convoy moves on a set schedule, which improves accountability, reduces losses, and ensures a consistent flow of supplies to forward positions."
 tech_logistics_company5: "Static Area Supply System"
 tech_logistics_company5_desc: "Rather than relying solely on moving convoys, supply hubs are built near stable frontlines or garrison areas. These semi-permanent depots enable localised distribution, reduce travel demands on logistics units, and ensure consistent resupply in low-mobility sectors."
 tech_logistics_company6: "Rear Area Supply Dumps"
 tech_logistics_company6_desc: "Large storage zones are set up safely behind the frontlines to stockpile ammunition, fuel, rations, and equipment. These dumps serve as central nodes in the supply network, feeding forward depots and mobile convoys while ensuring that major operations can continue even if transit lines are temporarily disrupted."
 tech_logistics_company7: "Deep Logistics Organization"
 tech_logistics_company7_desc: "A tiered and layered logistics structure extends deep into the military's rear areas, linking industrial centres, railway networks, and frontline depots in a cohesive and resilient system. Clear hierarchies, delegated responsibilities, and defined flow routes allow supplies to move more quickly and reliably over long distances."
 tech_logistics_company8: "Low Echelon Supply System"
 tech_logistics_company8_desc: "Armies reduce their reliance on higher commands for basic resupply by providing dedicated logistical elements to frontline units. Decentralised storage, simplified distribution protocols, and unit-level transport ensure that critical supplies such as ammunition, food, and medical supplies are delivered quickly in the face of enemy fire."
 tech_logistics_company9: "Circular Front Line Supply System"
 tech_logistics_company9_desc: "A circular supply model, as opposed to static lines or direct resupply routes, ensures that materials flow continuously through rotating delivery loops. This reduces congestion, lowers the risk of disruption, and ensures that supplies reach frontline units from multiple directions. The system adapts well to shifting frontlines, resulting in a more resilient logistical chain in fast-paced combat zones."
##### Maintenance Company
 tech_maintenance_company: "Maintenance Company"
 tech_maintenance_company2: "Extensive Equipment Cleaning"
 tech_maintenance_company2_desc: "Far too often, our soldiers report that their weapons are broken or jammed, only to have maintenance teams report that they are simply dirty in some way. We will teach the vast majority of soldiers how to properly and thoroughly clean their equipment in order to prevent these incidents from occurring and to free up their time for more important tasks through instructional pamphlets and mandatory demonstrations."
 tech_maintenance_company3: "Equipment Education"
 tech_maintenance_company3_desc: "Training soldiers and support crews in the operation and maintenance of military equipment reduces wear, accidents, and unneeded downtime. When personnel understand the tools they use, from rifles to radios to engines, they are better able to detect problems early and perform basic field repairs. This foundational knowledge improves maintenance cycles and increases equipment lifespan in both frontline and backline areas."
 tech_maintenance_company4: "Stock and Storage"
 tech_maintenance_company4_desc: "Proper inventory management and storage methods ensure that parts, tools, and replacement equipment are readily available when needed. Units avoid waste, duplication, and critical shortages by organising depots and putting in place basic tracking systems. This backbone of logistical readiness supports ongoing operations and contributes to combat effectiveness by ensuring consistent equipment availability."
 tech_maintenance_company5: "Worktask Requisition System"
 tech_maintenance_company5_desc: "Assigning repair and maintenance duties using a structured requisition process reduces downtime and confusion. Tasks are delegated based on their priority and urgency, ensuring that damaged equipment is repaired quickly. This system improves workshop efficiency, eliminates bottlenecks, and ensures that field units receive timely mechanical attention."
 tech_maintenance_company6: "Rear Area Vehicle Repair Shop"
 tech_maintenance_company6_desc: "Establishing dedicated repair facilities behind the front lines enables damaged vehicles to be retrieved, serviced, and returned to service without overwhelming frontline maintenance crews. These workshops, staffed by trained mechanics and stocked with spare parts, extend equipment life and ensure a steady flow of operational vehicles back to combat units."
 tech_maintenance_company7: "Deep Vehicle Repair Organization"
 tech_maintenance_company7_desc: "A layered repair network ensures that vehicles receive the proper level of maintenance based on their damage severity. Minor repairs take place near the front, while more extensive overhauls are handled at specialised depots deeper in the back. This structure reduces downtime, prevents backlogs, and ensures continuous operational readiness over long campaigns."
 tech_maintenance_company8: "Armored Recovery Vehicles"
 tech_maintenance_company8_desc: "For far too long, we have lost vehicles on the battlefield due to mechanical failures, ditches, or simply being hit by the enemy, only for those enemies to overtake them, steal our technology, and then use our own weapons against us. To address this issue, we must use Armoured Recovery Vehicles, which are large armoured machines built from tank hulls and other materials and equipped with cranes to tow or repair damaged vehicles so they can fight again. We can even tow away enemy vehicles."
 
 night_vision: "Night Vision I"
 night_vision_desc: "Being able to see the enemy without being seen is key to night operations. With the invention of infra-red technology, we can outfit our army with devices which, though unwieldy, makes this possible."
 night_vision2: "Night Vision II"
 night_vision2_desc: "Early infra-red scopes, although initially intended for use by snipers, had a limited vision range. As both portability and vision improves, these devices can be used by more troops operating at night."

 
 #### Air Technology #####################################################################################
 fighter: "Fighter"
 fighter_equipment: "Fighter"
 fighter_equipment_desc: "Fighters are the backbone of any air force. They are used to achieve air superiority, engage enemy bombers and fighters. They are all-rounders, being able to fulfill any mission given to them, but excelling at none in particular."
 
 interceptor: "Fighter-Bombers"
 interceptor_equipment_desc: "Fighter-Bombers are short-range fighters designed to destroy enemy bombers. They have high speed and good manouverability to make them agile enough to evade the machine guns of the bombers, while having the firepower needed to disable a heavy, armoured bomber. Against enemy fighters, they are less effective yet they still put up a good fight."
 
 cv_fighter: "Fighter"
 cv_fighter_equipment: "Carrier Fighter"
 cv_fighter_equipment_desc: "Carrier-based aircraft are naval aircraft designed for operations from aircraft carriers. While both the technologies of aircraft and aircraft carriers were both in their relative infancy by the end of the Great War, experiments had already begun to attempt to intertwine the two. The first landing on the deck of a ship had occurred even before the war, and with the rapid rise of aviation in warfare, the need for specialized aircraft adapted for take-offs and landings from these ships became recognised."

 jet_fighter: "Fighter"
 jet_fighter_equipment: "Jet Fighter"
 jet_fighter_equipment_desc: "Fighters are the backbone of any air force. They are used to achieve air superiority, engage enemy bombers and fighters. They are all-rounders, being able to fulfill any mission given to them, but excelling at none in particular."
 
 nav_bomber: "Naval Bomber"
 nav_bomber_equipment_desc: "The Naval Bomber is designed for use over water and make accurate tactical strikes against enemy surface vessels using torpedoes or armor-piercing bombs. They have a limited dog-fighting capability, which makes them vulnerable if intercepted by fighters."
 
 cv_nav_bomber: "Torpedo Bomber"
 cv_nav_bomber_equipment_desc: "A torpedo bomber is an aircraft designed shortly before the First World War, with it's purpose being to carry and drop aerial torpedoes, executing heavy damage against ships of any type. The torpedoes are generally kept under the wings in later models and under the aircraft's center in earlier models. While the torpedoes launched from a bomber are generally lighter than those carried by boats, they can be devastating in swarms"
 
 tac_bomber: "Tactical Bomber"
 tac_bomber_equipment_desc: "Tactical Bombers are medium-sized aircraft, larger than Fighters, yet smaller than Strategic Bombers, which are used primarily for delivering attacks against enemy ground units such as Armor and Infantry. Although they have a limited dog-fighting capability, they can be easily outmatched by Fighters in air combat."
 
 heavy_fighter: "Heavy Fighter"
 heavy_fighter_equipment_desc: "Heavy Fighters are long-range fighters, designed to escort bombers and keep enemy interceptors from the bombers. They are drilled in tactics to achieve this mission. In Air Superiority missions, they are less effective."
 
 strat_bomber: "Strategic Bomber"
 strat_bomber_equipment: "Strategic Bomber"
 strat_bomber_equipment_desc: "Strategic Bombers are the heaviest type of aircraft, designed to deliver a large payload of bombs to enemy provinces, with the aim of crippling his industry and infrastructure. However, the Strategic Bomber is slow despite its long range, which can make it vulnerable to attack by fighters."
 
 transport_plane: "Transport"
 transport_plane_equipment_desc: "Transport Planes are designed to ferry men and materials over long distances quickly. Paratroops need Transport Planes in order to make a paradrop."
 
 guided_missile: "Rocket"
 guided_missile_desc: "The Ballistic Missile is designed to deliver a payload of explosives to a distant target. Its high speed makes it almost impossible to intercept but it is an expensive way of destroying the enemy with conventional explosives. Nuclear weapons are needed to give it more than psychological effect."

 rocket_interceptor_equipment: "Rocket Interceptor"
 rocket_interceptor_equipment_desc: "A rocket-powered aircraft uses a rocket for propulsion. Rocket planes can achieve much higher speeds than similarly sized jet aircraft, but typically for at most a few minutes of powered operation, followed by a glide. Unhindered by the need for oxygen from the atmosphere they are suitable for very high altitude flight. They are also capable of delivering much higher acceleration and shorter takeoffs."

 ### Engineering Technology ###################################################################################
 
 
 radar_1: "Radio Broadcasting"
 radar_1_desc: "The radio is a relatively new invention, with the first successful transmissions occurring in the early 1900s. While its civilian uses continue to expand, it is the military potential of radio broadcasting that demands our attention. By transmitting orders, reconnaissance updates, and strategic information across long distances in real time, radio allows for unprecedented coordination between headquarters and units in the field."  
 radar_2: "Decimetric Radar"
 radar_2_desc: "Radar systems with decimetric wavelengths have a significantly greater detection range and reliability than previous models. These systems are better suited to tracking large aerial and naval targets over vast distances. Their longer wavelength allows for better performance in bad weather, making them an important part of early warning networks and coastal defence."  
 radar_3: "Search Radar"
 radar_3_desc: "Search radar is designed to scan large areas of airspace or open water while continuously rotating to detect incoming threats at a distance. It functions as the eyes of any air defence or naval screen, providing constant updates on enemy positions and directing friendly assets accordingly. Its role is critical in alerting command elements and initiating appropriate responses."  
 radar_4: "Cavity Magnetron"
 radar_4_desc: "The advent of the cavity magnetron marks a watershed moment in radar technology. It makes it possible to develop small, effective radar sets for aircraft and ships by producing high-power microwave frequencies in a compact unit. This improvement enables higher resolution, smaller antennas, and more effective tracking and targeting across multiple platforms."  
 radar_5: "Air Radar Application"
 radar_5_desc: "The adaptation of radar for use in aircraft transforms air combat and reconnaissance. Airborne radar allows pilots to detect enemy aircraft, surface vessels, or terrain features beyond visual range and in poor visibility. These systems are critical for night fighting, long-range interception, and battlefield navigation."  
 radar_6: "Monopulse Technique"
 radar_6_desc: "The monopulse radar technique calculates the target's direction with high precision by splitting a single radar pulse across multiple beams. This eliminates the need for scanning delays and significantly improves the ability to track fast-moving or manoeuvring threats. It represents a significant advance in radar accuracy and resistance to electronic countermeasures."  
 radar_7: "Centimetric Radar"
 radar_7_desc: "These radars, which use centimetric wavelengths, can detect smaller targets with greater accuracy. This capability is critical for detecting periscopes, fast boats, and low-flying aircraft that may escape detection by longer-wavelength systems. Their higher frequency output also helps with target definition in cluttered environments."  
 radar_8: "Improved On-Board Application"
 radar_8_desc: "As radar becomes more widely adopted across platforms, onboard integration improves dramatically. Systems are wired directly into combat information centres and fire control suites, allowing for faster decision-making. Improved interfaces and automated processing allow crews to quickly interpret radar data, increasing both survivability and lethality in combat."  

 computing_1: "Automatic Feed Calculator"
 computing_1_desc: "This early mechanical aid automates repetitive calculations by advancing variables through pre-programmed gears and cams. It is commonly used in artillery units and logistical planning to reduce manual workload, improve consistency of results, and speed up firing preparations or inventory assessments."
 computing_2: "Analog Fire Control"
 computing_2_desc: "Analogue fire control systems use mechanical components to convert target data like distance, speed, and bearing into precise firing solutions. These systems are integrated into naval vessels, coastal batteries, and anti-aircraft platforms to improve salvo coordination and timing. Operators manually enter changing conditions, but once configured, the system can quickly calculate continuous updates, giving units an advantage in combat."
 computing_3: "Analytical Engine Computing Unit"
 computing_3_desc: "The analytical engine is a conceptual and partially realised design that draws on early mechanical computation work. It performs complex, multi-stage calculations using punch cards, gear-driven logic, and modular memory units. Despite its size and complexity, it introduces important features such as conditional operations and automated output, making it useful for detailed engineering tasks, cryptographic work, and logistical forecasting."
 computing_4: "Accounting Machine"
 computing_4_desc: "These tabulating devices, which were originally designed for administrative purposes, are now used in the military to process and organise data related to personnel, equipment, and supply movements. They use punch cards and mechanical sorters to quickly compile records and statistical summaries. The accounting machine provides a new level of speed and accuracy in managing the massive bureaucratic demands of modern warfare."
 computing_5: "Basic Computing Machine"
 computing_5_desc: "An early computing platform capable of carrying out general arithmetic and basic logical operations. It runs fixed routines stored on paper tape or hardwired circuitry, with limited memory and speed. Despite its simplicity, it is extremely useful for repetitive technical tasks such as ballistics calculation, code-breaking assistance, and logistical planning."
 computing_6: "Electromechanical Relay Computer"
 computing_6_desc: "These machines use relays to open and close circuits in sequence, allowing them to perform a wide range of logical and mathematical operations. Although slower than electronic counterparts, they are more reliable than purely mechanical systems and can be reconfigured for various tasks. Relay computers are used in codebreaking facilities, technical research labs, and large-scale logistics hubs where consistent computation is required."
 computing_7: "Automatic Digital Computer"
 computing_7_desc: "The switch to vacuum tube-based circuitry enables this generation of computers to operate entirely electronically, significantly increasing their speed and range of functions. These machines can be programmed to simulate battles, decrypt complex cyphers, and process massive amounts of data in hours rather than days."
 computing_8: "Stored-Program Computer"
 computing_8_desc: "This technology allows both instructions and data to be stored in a computer's internal memory, allowing machines to switch tasks or self-modify while operating. It significantly reduces setup time and increases flexibility, allowing computers to support a wide range of military functions, including radar targeting and supply forecasting."
 decryption_encryption_1: "Ciphering Machine"
 decryption_encryption_1_desc: "Mechanical and electromechanical cypher devices generate and decode secure messages through complex arrangements of rotors, plugboards, or electronic circuits. They are critical to protecting communications over land, air, and sea, making it more difficult for adversaries to intercept or decipher sensitive data. Each unit adheres to a synchronised encryption protocol, necessitating both precise operation and constant attention to maintain information superiority."
 decryption_encryption_2: "Teleprinter"
 decryption_encryption_2_desc: "The teleprinter allows for direct, typed communication across long distances by electrically transmitting keystrokes to a paired machine. It is an important tool for military coordination, allowing for quick dispatches between commands without relying on manual Morse code or hand-delivered messages. Its dependability and speed significantly enhance command responsiveness in active theatres."
 encryption_1: "3-Rotor System"
 encryption_1_desc: "To scramble letters into ciphered outputs, a compact encryption device uses a series of three rotating wheels, each with variable internal wiring. Each rotor's position changes with each keystroke, resulting in a constantly shifting code. This system is widely used for its portability and moderate security, and it serves as the foundation for mid-level encrypted military communications."
 encryption_2: "6-Rotor System"
 encryption_2_desc: "This advanced cypher device expands on previous rotor machines by incorporating additional layers of encryption via six rotating rotors. The increased complexity significantly improves security, making codebreaking by adversaries much more difficult without inside knowledge or extensive analysis."
 encryption_3: "5-bit Combinations"
 encryption_3_desc: "A standardised encoding system that represents characters with five binary digits. Despite its limited symbol variety, it is efficient and reliable for military telegraphy, radio teletype, and early cryptographic systems. It is the foundation of simplified data encoding schemes used in communication networks and cypher devices."
 decryption_1: "Cryptographic Mathematical Theory"
 decryption_1_desc: "Mathematical breakthroughs in combinatorics, permutation, and probability have a direct impact on cypher strength and analysis. Applying rigorous theory to encryption and decryption allows for the creation of stronger codes and more systematic approaches to breaking enemy communications. These theories influence how machines are designed to deal with complex cryptographic problems."
 decryption_2: "Computing Machine Support"
 decryption_2_desc: "Integrating early computing machines into codebreaking and data analysis opens up new possibilities in intelligence work. These machines are tasked with simulating cypher wheels, testing key permutations, and detecting repeated patterns in intercepted data."
 decryption_3: "Identification of Parallel Texts"
 decryption_3_desc: "Analysts develop techniques to isolate likely phrases or recurring terms by comparing encrypted messages that appear to be copies or revisions of earlier texts. This method is critical for exploiting enemy communication patterns and serves as an invaluable tool for both manual cryptanalysts and machine-assisted operations."
 train_equipment: "Train"
 train_equipment_short: "Train"
 train_equipment_desc: "Trains transport supplies from the Supply Capital to Supply Hubs connected by rail."
 train_equipment_1: "Civilian Train"
 train_equipment_1_short: "Civilian Train"
 train_equipment_1_desc: "Taken over by the military from regular civilian freight duty, this train engine is well-suited to move a large amount of supplies over long distances. However, its civilian construction makes it vulnerable."
 train_equipment_2: "War Austerity Train"
 train_equipment_2_short: "War Austerity Train"
 train_equipment_2_desc: "A simplified design that ommits many features commonly found on regular freight trains for the sake of cheaper production. It is still every bit as vulnerable as a regular train, but can more easily be replaced."
 train_equipment_3: "Armored Train"
 train_equipment_3_short: "Armored Train"
 train_equipment_3_desc: "A train engine encased in heavy armor to make it less vulnerable to enemy attack. It can carry as much cargo as any other design, but is more expensive to produce."
 railway_gun_equipment: "Railway Artillery"
 railway_gun_equipment_desc: "A heavy cannon mounted on a railway carriage for transportation."
 railway_gun_desc: "Railways offer an opportunity to move heavy guns far inland at a reasonable speed, allowing us to bombard enemy position at great range and with good effect."
 railway_gun_equipment_1: "Railway Gun"

 rocketry_1: "Experimental Rocket Engine"
 rocketry_1_desc: "Advancing the science of rocketry by improving the range and reliability of liquid-fuel rockets will teach us enough about the technology to allow the construction of launch sites for more advanced models."
 rocketry_2: "Rocket Test and Research Facility"
 rocketry_2_desc: "Dedicated facilities are being built to test and improve rocket propulsion systems, guidance mechanisms, and warhead designs. These facilities enable controlled experimentation and long-distance trials, hastening progress in both surface-to-surface missiles and airborne weapons."
 rocketry_3: "Rocket Engine"
 rocketry_3_desc: "Knowledge of rocket propulsion is reaching a point where we can construct flying bombs and rocket-powered aircraft, operating at previously unreachable speeds."
 rocketry_4: "Flying Bomb"
 rocketry_4_desc: "A pilotless aircraft equipped with an explosive payload and a timed or primitive guidance system. These early cruise missiles are launched from ground installations or aircraft and are designed to hit targets without endangering pilots. Despite their limited accuracy, they have a significant psychological and strategic impact, ushering in unmanned strike warfare."
 rocketry_5: "Strategic Rocket"
 rocketry_5_desc: "The first long-range ballistic missiles can be built and made ever more precise, reaching distant enemy cities and even into space."
 rocketry_6: "Ballistic Missle"
 rocketry_6_desc: "The future of rocketry opens up possibilities like intercontinental missiles, the range of which knows few limits while the payloads grow more lethal."
 rocketry_jet_1: "Early Turbo Jet Engine"
 rocketry_jet_1_desc: "This propulsion system introduces the concept of thrust, which is produced by compressing air, mixing it with fuel, and expelling it at high speeds. Early models have reliability issues and require a lot of maintenance, but they can go much faster than piston engines."
 rocketry_jet_2: "Practical Tubo Jet Engine"
 rocketry_jet_2_desc: "Refinements in materials, engineering tolerances, and fuel delivery systems result in a dependable, repeatable turbojet engine suitable for front-line service. These engines enable aircraft to climb quickly and fly at high speeds, outpacing traditional fighters and bombers."
 rocketry_interceptor_1: "Rocket Interceptor"
 rocketry_interceptor_1_desc: "Rocket-powered interceptor aircraft based on gliders can, for short periods of time, move faster than any other plane. While volatility of the fuel puts the planes at risk, they can take off and react to attacks faster than any enemy will expect."
 rocketry_interceptor_2: "Improved Rocket Interceptor"
 rocketry_interceptor_2_desc: "Still considered extremely dangerous to operate, the rocket-powered fighters are now aided by auto-pilots and towing by other aircraft to maximize the use of their extreme speed but short fuel window."

 nuclear_1: "Van De Graaff Generator"
 nuclear_1_desc: "Invented by American physicist Robert J. Van de Graaf, this electrostatic generator uses a moving belt to accumulate electric charge on a hollow metal globe on top of an insulated column, creating very high electric potentials. This generator was developed as an early particle accelerator for physics research, as its high potential can be used to accelerate subatomic particles to great speeds. While primitive, it provides some early insights into the field of nuclear research."
 nuclear_2: "Atomic Research"
 nuclear_2_desc: "In nuclear fission, splitting the atom yields enormous amounts of energy and limitless destructive capability."
 nuclear_3: "Research Laboratories"
 nuclear_3_desc: "While scientists always require a safe and secure environment in which to conduct potentially dangerous experiments, we, as a state, must expect more from them in order to truly charge into the future. As a result, our architects have been tirelessly working on mock-ups for new scientific buildings that will be specifically designed to bring many scientists together with the best equipment and provisions in order to make truly significant breakthroughs."
 nuclear_4: "Nuclear Research"
 nuclear_4_desc: "Scientific research into the properties of atomic nuclei reveals enormous energy potential hidden within matter. Radioactivity, neutron behaviour, and atomic theory are the primary research topics, with applications ranging from energy production to weaponization."
 nuclear_5: "Isotope Separation"
 nuclear_5_desc: "To unlock nuclear energy, specific isotopes, such as uranium-235 or plutonium-239, must be separated from more common forms. This process necessitates advanced techniques such as gaseous diffusion and electromagnetic separation. The technology is costly and complex, but it is required to produce materials suitable for long-term chain reactions."
 nuclear_6: "Controlled Nuclear Chain Reaction"
 nuclear_6_desc: "With proper isotope and neutron moderation, a self-sustaining nuclear chain reaction is possible. This breakthrough demonstrates that nuclear energy can be safely harnessed in a laboratory setting, paving the way for reactor development and, potentially, the creation of compact, high-yield explosives."
 nuclear_7: "Experimental Reactor"
 nuclear_7_desc: "The construction of the first operational nuclear reactor enables hands-on testing of fuel behaviour, neutron flux, and thermal regulation. Though not yet used for large-scale power generation, this facility serves as a testing ground for safe containment, reactor design, and future atomic system operational protocols."
 nuclear_8: "Nuclear Reactor"
 nuclear_8_desc: "As we gain a better understanding of the power of the atom, we must construct facilities to further investigate nuclear capabilities and test fission nuclear chain reactions on a larger, more secure scale. These sites may not only advance our research, but also produce energy for our people and weapons for our military. Indeed, some of our scientists have requested that these sites be used to create the most powerful and destructive weapons possible."
 nukes: "Nuclear Bomb"
 nukes_desc: "A project to construct an atomic bomb will be one of the most secretive and difficult tasks a nation can undertake, but, if successful, may change not only the course of today's wars but of the future of the world."
 nuclear_10: "Nuclear Propulsion"
 nuclear_10_desc: "\n Nuclear marine propulsion is propulsion of a ship or submarine with heat provided by a nuclear power plant. The power plant heats water to produce steam and it is this steam that powers the steam turbines and turbo generators. The power is then transferred to a gearbox that reduces the ratio by around 50 to 1 and this powers the propulsor. Naval nuclear propulsion is used specifically within naval warships such as supercarriers and submarines."

 ### Land Doctrines Technology   ########################################################################
 # WW1 + Interwar Doctrines
 Twentieth_Century_Warfare: "20th Century Warfare"
 Twentieth_Century_Warfare_desc: "With the mobilization of the European powers, fullscale war has descended upon the continent. Around the globe, lessons are being learned about the new warfare of the 20th Century. Brutal, loud and unprincipled, gone are the days of marching in columns and flying the colors. New organizational structures and tactics are required if we wish to gain the advantage in this new era."
 Leading_by_Task: "Leading By Task"
 Leading_by_Task_desc: "The \"Leading by Task\" doctrine emphasises a decentralised command structure in which leaders are assigned specific tasks rather than micromanaging every action. This approach promotes initiative and adaptability in subordinates, allowing for faster responses to changing battlefield conditions. It is based on trust and a clear understanding of the overall objective, allowing units to act independently while working towards the same goal."
 Leading_by_Order: "Leading By Order"
 Leading_by_Order_desc: "The \"Leading by Order\" doctrine emphasises centralised command, in which decisions are made by higher-ranking officers and communicated down the chain of command as explicit orders. This approach ensures strict discipline and control over units, leaving little room for deviation from the plan. Orders are clear and precise, with little room for interpretation by subordinates. While this can improve coordination and reduce the risk of disorganised actions, it also relies heavily on the efficiency and decisiveness of higher command, leaving less flexibility on the battlefield."
 Strongpoint: "Strongpoint"
 Strongpoint_desc: "All along the European plain, trenches stretch across the landscape. Rudimentary at first, these dugouts are allowing staging positions to be set up directly at the battlefield. The concept of strongpoints creates areas where supplies, communications and even artillery lines can be used to invade or fortify local sectors. A new doctrine is emerging along the front, and it’s 10 feet deep."
 Mass_Charge: "Mass Charge"
 Mass_Charge_desc: "While the war started at a breakneck pace, it has slowed to a crawl. In a bid to try and upend enemy positions, many commanders are using outdated mass infantry charges to cross the newly known No Man's Land. While the tactic has provided some limited success, we are bleeding casualties. Therefore, more men are required to bolster our divisions if we are to further this strategy."
 Static_Defence: "Static Defence"
 Static_Defence_desc: "Trench Warfare has now become the default doctrine of this terrible conflict. Day by day, lines are wired, supplies are cached and tunnelers are digging. It is becoming clear that widespread offensives will give nothing but blood and inches. Staying below ground, below the storm of lead, is providing a defense unlike any conflict before. A war of attrition has begun."
 Counterattack: "Counterattack"
 Counterattack_desc: "High Command has learned many lessons over the past months about offensive movements in defensive environments. Tunnelers are creating paths below the lead laden air, officers are finding breaks in the wires and artillery is creating literal walls of ordinance. Combining these tactics with immediate counterattacks is allowing our gains to be counted in miles rather than yards."
 Defence_In_Depth: "Defence In Depth"
 Defence_In_Depth_desc: "A deeper knowledge of fortification tactics is required to keep our armies in the conflict. Trenches are being designed snaking miles behind the battlefield. Pillboxes are deployed, artillery is emplaced and barbed wire is being unwrapped. The literal dirt beneath our feet is being gauged in its defensive properties. It’s no longer a static front, strategic depth is the path for total victory."
 Schwerpunkt: "Schwerpunkt"
 Schwerpunkt_desc: "In this bloody war of attrition, widespread offensives just lead to widespread casualties. All the largest battles drain the manpower of the involved nations. Instead, using a  focus point, or Schwepunkt, will bring tactical success. Every unit, company, officer and general are planning a single point of attack, even if risking other sectors. Concentrated spearheads will plow the enemy trenches."
 Separate_Arms_Force: "Separate Arms Force"
 Separate_Arms_Force_desc: "Technology marches right alongside the armies. A new metal machine, known as a tank, are able to traverse the deadly middleground and breakthrough trenches. Flying vehicles, aircraft, provide hourly reconnaissance. Artillery grows larger in range and caliber. They have found their niche in this conflict, and while tactics are lacking, their individual contributions cannot be ignored."
 Combined_Arms_Effort: "Combined Arms Effort"
 Combined_Arms_Effort_desc: "Aircraft send reports on successful artillery barrages. Infantry hug the tanks closely across No Man’s Land. Slowly but surely, these individual machines of war have become entangled with modern battlefield tactics. While the trenches of old are still the default measure of war, these technologies are once again modifying the doctrine. Metal is replacing dirt as the scenery of combat."
 Specialized_Branch_Tactical_Experience: "Specialized-Branch Tactical Experience"
 Specialized_Branch_Tactical_Experience_desc: "This terrible war is now in its final death throes. We have learned so much in the last few years of the conflict. Our armed forces have become their own fleshed out branches. Ground based infantry, mechanized forces, blue water navies and airborne fleets are now expertly bringing the bloodshed to a conclusion. This doctrine is the future, whether a bright or dark one."
 Cross_Branch_Tactical_Experience: "Cross-Branch Tactical Experience"
 Cross_Branch_Tactical_Experience_desc: "This terrible war is now in its final death throes. We have learned so much in the last few years of the conflict. Our armed forces have integrated heavily between the individual branches. Naval forces work in tandem with our airborne fleets, while ground based infantry ride along or just behind our mechanized machines. This doctrine is the future, whether a bright or dark one."
 Beyond_Trench_Warfare: "Beyond Trench Warfare"
 Beyond_Trench_Warfare_desc: "The Great War has finally concluded. Millions have perished in the largest conflict in human history.  Industrialized, entrenched and explosive, battlefield warfare has been transformed forever. So much has changed, and many have yet to fully understand what the doctrine of war will be beyond the trenches. While the ink is still wet on the treaties, some wonder if this is really an end or just a beginning."
 # Mobility Focus
 Mobility_Focus: "Mobility Focus"
 Mobility_Focus_desc: "Mobility Focus is a tactic that uses speed and manoeuvrability to isolate and disorganise opposing forces. Rather than engaging in long, head-on battles, this strategy uses quick movements to penetrate weak points, bypass strongholds, and encircle enemy units, cutting them off from supplies, reinforcements, and command structures. By staying one step ahead of the opposition, they maintain operational momentum and seize the advantage before the enemy can regroup or react."
 Spearhead: "Spearhead"
 Spearhead_desc: "To break through opposing lines, our armoured forces must focus on a small front and overwhelm their opponents. As they advance, they must have infantry support from behind to protect their vulnerable flanks and cover any counterattacks that may occur. These independent units will provide us with a significant advantage over any infantry force we encounter."
 Armored_Schwerpunkt: "Armored Schwerpunkt"
 Armored_Schwerpunkt_desc: "The term "Schwerpunkt," or "point of main effort," refers to the practice of concentrating tanks, artillery, infantry, and close air support in a single, critical location in order to break through enemy lines. Furthermore, once a breach has occurred, the attackers continue on, enveloping, isolating, or bypassing resistance without becoming bogged down. Strong reserves remain mobile to counterattack wherever needed and provide defensive cover for the armour."
 Combined_Arms_Offensive: "Combined Arms Offensive"
 Combined_Arms_Offensive_desc: "A "combined arms offensive" is defined as the coordinated deployment of multiple combat forces to achieve battlefield superiority. The fundamental goal is to overwhelm the enemy by making them vulnerable to at least one type of force, regardless of how they react. Furthermore, each component of the offence strives to leverage their strengths to compensate for the weaknesses of the others."
 Delay: "Delay"
 Delay_desc: "Ambushes, roadblocks, and hit-and-run operations can all help to slow enemy momentum while allowing for reinforcements and escape. These operations can turn short-term losses into long-term gains by exhausting the opponent or altering the overall battlefield situation. Though they may not defeat the opponent, they can tip the scales in a larger campaign."
 Elastic_Defense: "Elastic Defense"
 Elastic_Defense_desc: "Elastic defence is a dynamic defensive tactic that reduces human casualties by delaying and attriting by giving up space, followed by counterpunches when the attacker is vulnerable. Furthermore, by constructing a "deeper" layer of fortifications, an elastic defence allows the defender more time to respond and launch a counterattack while the attacker is spread out and slowed down. As a result, in order to stress an attacker's logistics, a defender may cede lightly defended territory."
 Kampfgruppe: "Kampfgruppe"
 Kampfgruppe_desc: "The term "Kampfgruppe" refers to a battle formation composed of armour, infantry, and artillery that is tailored to the requirements of a specific mission. It encourages flexibility and local superiority while preserving decentralised command. Another benefit is that it promotes resilience and can facilitate cross-unit collaboration."
 Firebrigades: "Firebrigades"
 Firebrigades_desc: "Fire Brigades are not part of the standard combat plan, but are intended to quickly fill gaps or deal with unexpected obstacles, much like a fire department responds to a fire. As a result, their primary goal is to contain and, if possible, resolve these issues, which means they are prepared with little to no notice."
 Spearhead_HQs: "Spearhead HQs"
 Spearhead_HQs_desc: "Spearhead Headquarters primary responsibility is to establish command and control early, shape the battlefield, and provide situational information to higher-level commanders. Furthermore, they are intended to take immediate command of a joint or combined force, integrating information, logistics, and communications to enable quick, decisive action. They are an important structure in spearhead operations because they provide the necessary organisation for the troops to continue their advance."
 Modern_Blitzkrieg: "Modern Blitzkrieg"
 Modern_Blitzkrieg_desc: "Our efforts to learn from our army's experience have yielded the pinnacle of modern combat, Modern Blitzkrieg. Overwhelming concentrations of armoured infantry and artillery, combined with constant air support, have become our standard mode of combat against any opponent we may encounter. We can defeat any army with swift and decisive battles, delivering a crushing blow before they can fully mobilise."
 # Planning Focus
 Planning_Focus: "Planning Focus"
 Planning_Focus_desc: "Extensive planning and preparation are absolutely required to win any conflict. As a result, if we are to master the art of warfare, our generals and officers must focus on meticulously planning every aspect and detail before engaging in any combat, whether it is an offensive plot or a defensive strategy. Only in this manner can we defeat enemy armies and declare victory."
 Grand_Battle_Plan: "Grand Battle Plan"
 Grand_Battle_Plan_desc: "As witnessed during the Great War, if we want to build impenetrable defences and launch massive offensive manoeuvres, we must collect massive amounts of information to ensure that we do not face unexpected challenges. This will give us a significant strategic advantage over our adversaries, allowing us to conduct large-scale operations smoothly."
 Trench_Warfare: "Trench Warfare"
 Trench_Warfare_desc: "Previous international conflicts have demonstrated that trench warfare is the only strategy for fighting large hostilities. We will improve our fighting strategy to ensure that our troops are always well entrenched and can become so in a timely and efficient manner. Our trenches will become impenetrable, fearsome fortresses."
 Mass_Assault: "Mass Assault"
 Mass_Assault_desc: "Undoubtedly, the only way to overwhelm and conquer enemy defences is to attack them with such an immense number of soldiers that they are forced to surrender or face death. Our forces are to attack any opponent they come across mercilessly and ensure that they achieve their desired goal, no matter the cost. Quantity will always outweigh quality."
 Pre_Planned_Defense: "Pre-Planned Defense"
 Pre_Planned_Defense_desc: "According to studies and statistics, if we prepare our defences well in advance of enemy attacks, we will be able to repel any assault, no matter how large, that may be launched against our forces. All commanders will keep their forces dug in and prepared for any defensive stand that may occur. We will never be the victims of a surprise attack."
 Central_Planning: "Central Planning"
 Central_Planning_desc: "As previously stated, the secret behind any successful offensive operation is extensive planning and adequate cooperation among our intelligence branches. We must ensure that any attack we launch is well-planned and receives all relevant intelligence. Officers from all branches will now work together to organise an operation so that it runs as smoothly as possible."
 Attritional_Containment: "Attritional Containment"
 Attritional_Containment_desc: "If we are unable to launch an offensive to destroy an enemy location, small-scale attacks must be launched on a continuous basis. This will result in casualties and prevent the opponent from launching an attack of their own. Furthermore, the constant attacks will provide a morale hit within the enemy troops, which will be constantly harassed and will be unable to mount any meaningful operation or rest and recover from our previous offensive operations."
 Assault_Breakthrough: "Assault Breakthrough"
 Assault_Breakthrough_desc: "Concentrating the offensive on a single front is often far more effective than launching a massive assault across all fronts. To keep casualties and material loss to a minimum, our commanders will aim for breakthroughs at one or two strategically chosen points. After we make the breakthrough, our troops will flood in and exploit the gap, collapsing enemy lines and inflicting massive losses."
 Operational_Stages: "Operational Stages"
 Operational_Stages_desc: "An attack on the entire front is unlikely to succeed and could cost us a large number of troops and materials. We will conduct our offensive manoeuvres in stages, concentrating our troops on smaller fronts where we are most likely to gain superiority and make significant advances. Using this method, we will be able to overwhelm enemy lines and collapse the entire front."
 Branch_Interoperability: "Branch Interoperability"
 Branch_Interoperability_desc: "Cooperation between branches is essential in any military, whether in defensive or offensive operations. We will work to improve relations between the air force, navy, and army, even if the decision is unpopular. This will provide us with enormous advantages, as cooperation will be critical to outperforming our competitors."
 Assault_Concentration: "Assault Concentration"
 Assault_Concentration_desc: "Prior to an attack, the leading elements are meticulously prepared and deployed in forward positions, allowing maximum force to be applied in the early stages. Furthermore, the attacking force will be composed of infantry and armour divisions, ensuring that our advances are not easily reversed by enemy counterattacks. All offensives that use this technique are almost certain to succeed."
 Light_Mobility: "Light Mobility"
 Light_Mobility_desc: "As technology and warfare advance, mobility becomes increasingly important for offensive operations, as even minor changes in speed can devastate an overwhelming attack. Our generals and officers will begin motorising our armed forces to provide the much-needed mobility for our offensives. The days of attacking with slow infantry are over."
 Combined_Arms: "Combined Arms"
 Combined_Arms_desc: "When infantry, armour, and support units work together, they are far more effective than when used separately. Tanks can break through enemy lines with speed and firepower, whereas infantry and support units can fill gaps and repel enemy counterattacks. When combined into a cohesive instrument, they will form a formidable and adaptable force that every enemy we encounter will fear."
 Infiltration_Assault: "Infiltration Assault"
 Infiltration_Assault_desc: "Infantry must strike the opposing line's weak points in the early stages of an attack to get around and isolate the better-defended areas, which the remaining attacking troops can then destroy. If they are successful in infiltrating enemy lines, the line could collapse and be destroyed by troops. However, these attacks must be executed with caution in order to avoid revealing the surprise."
 Infiltration_in_Depth: "Infiltration in Depth"
 Infiltration_in_Depth_desc: "To deliver a critical blow and make an exploitable breakthrough, we will train our forces to bypass and isolate enemy strongpoints. Our assault troops will only achieve their goal if the enemy is completely cut off from all communication and supply lines. This will cause panic among soldiers and commanders, creating the ideal conditions for the remainder of the troops to launch an offensive and cripple the enemy lines."
 Light_Infantry_Tactics: "Light Infantry Tactics"
 Light_Infantry_Tactics_desc: "These doctrines instruct infantry forces to infiltrate enemy positions under cover of darkness or terrain, striking where defences are vulnerable, rather than relying on overwhelming firepower or mass assaults. By emphasising small-unit leadership and initiative, light infantry formations become more resilient and capable of conducting continuous offensive operations even in challenging conditions. This strategy improves organisation and increases breakthrough potential, allowing our troops to hold for longer and push deeper during attacks."
 # Firepower Focus
 Firepower_Focus: "Firepower Focus"
 Firepower_Focus_desc: "The tragedies of the Great War demonstrated that throwing oneself at the enemy not only fails to win battles, but also wastes manpower, from which we may never recover. Our strategy will now be to focus our efforts on massing massive amounts of artillery capable of blasting and destroying opposing forces without requiring our soldiers to confront them directly. Hopefully, this will reduce the number of casualties while destroying enemy forces without firing a single rifle."
 Superior_Firepower: "Superior Firepower"
 Superior_Firepower_desc: "By emphasising artillery and support weapons, we will be able to maximise the damage dealt to the forces we fight while protecting our troops from suicidal attacks intended to break the enemy's lines. Precision fire and sustained barrages will shatter enemy formations, disrupt command structures, and erode morale long before direct engagements begin. Furthermore, this approach not only saves lives, but it also ensures strategic superiority via tactical discipline and superior weapon integration."
 Delay_2: "Delay"
 Delay_2_desc: "Ambushes, roadblocks, and hit-and-run operations can all help to slow enemy momentum while allowing for reinforcements and escape. These operations can turn short-term losses into long-term gains by exhausting the opponent or altering the overall battlefield situation. Though they may not defeat the opponent, they can tip the scales in a larger campaign."
 Mobile_Defense: "Mobile Defense"
 Mobile_Defense_desc: "Static defence formations can be problematic because reinforcing them takes time and effort. To address this issue, we will emphasise the strategic deployment of mobile troops as a first response when a defensive line is under threat of collapse. This will provide a significant advantage because we will be able to repel attacks more easily and reinforce our troops as needed."
 Stand_Off: "Stand Off"
 Stand_Off_desc: "Improving tactical discipline, communication, and command structure will allow our infantry formations to perform well in combat even under extreme conditions. When troops are better organised, they can hold the line for longer periods of time, regroup faster, and respond more effectively to changing battlefield conditions. Our infantry gains a great deal of resilience, allowing it to carry out long-term operations with greater confidence and stability."
 Integrated_Support: "Integrated Support"
 Integrated_Support_desc: "Support companies are critical to any unit organisation, especially infantry and tank units. If we want them to work efficiently and provide the best possible support to our fighting men, we must fully integrate them into our divisions. Support forces are closely integrated with combat troops, resulting in more offensively capable divisions."
 Regimental_Combat_Teams: "Regimental Combat Teams"
 Regimental_Combat_Teams_desc: "Infantry regiments work closely with supporting units such as artillery, tanks, and reconnaissance components to form regimental combat teams, resulting in a small, self-sufficient unit with greater attacking flexibility. These combined-arms formations are designed to operate autonomously, allowing them to respond quickly to changing tactical conditions without relying on centralised command or higher-level reinforcement."
 Mechanized_Offensive: "Mechanized Offensive"
 Mechanized_Offensive_desc: "Motorised forces have traditionally performed well, but to lead offensives, we require infantrymen who can ride into battle in armoured vehicles capable of carrying and protecting heavy weaponry. Furthermore, while the armour may cause a slight slowdown in general offensives, it will provide critical protection, allowing us to reduce casualties and making mechanised soldiers a formidable foe for opposing armies."
 Combined_Arms_Defense: "Combined Arms Defense"
 Combined_Arms_Defense_desc: "By better coordinating troops, armour, and support forces, we can create a strong front line capable of repelling even the most determined attacks. This new defensive strategy emphasises improved communication, coordinated manoeuvres, and mutual assistance among unit types, allowing them to cover each other's weaknesses. Our frontline battalions will be better organised and able to withstand enemy attacks."
 Airland_Battle: "Airland Battle"
 Airland_Battle_desc: "As previously stated, our offensive and defensive strategies are based on the idea that our troops must be supported and protected before engaging in battle. As such, we will collaborate with the air force to ensure that our soldiers are always protected from the skies. Taking control of the air is more than just an advantage; it's a necessity."
 # Manpower Focus
 Manpower_Focus: "Manpower Focus"
 Manpower_Focus_desc: "We must not squander valuable resources and time by researching and developing complex and sophisticated weapons to arm our troops. Our forces can defeat any enemy, regardless of how advanced their equipment is, if we deploy them in sufficient numbers and with strong morale and discipline. By focusing on developing a large, well-trained, and motivated army, we can ensure victory through human determination and the power of numbers."
 Peoples_Army: "People's Army"
 Peoples_Army_desc: "We prioritise people over weapons, believing that greater motivation compensates for inferior technology, which necessitates widespread citizen support. Furthermore, this army will fight and defeat any adversary in the name of the people. Their encouragement, contributions, and sacrifices form the basis of any national effort that will propel every man to complete victory over any enemy military force."
 Large_Front: "Large Front"
 Large_Front_desc: "To maintain coherent and well-organised fronts, we must improve our soldiers' ability to coordinate across large areas. Furthermore, by using this method, armies can sustain long-term conflicts while outmanoeuvring opponents due to sheer depth, scale, and organisational supremacy. This method emphasises the integration and synchronisation of multiple divisions, corps, or even entire armies to achieve strategic objectives on multiple fronts."
 Large_Formation_SOP: "Large Formation SOP"
 Large_Formation_SOP_desc: "Rather than relying on advanced technology or pinpoint strikes, we will deplete the opponent through constant pressure and depth of numbers.This technique relies heavily on efficient resource utilisation and simplified logistics to keep troops provisioned and ready for long-term engagement, even in harsh conditions. Discipline, determination, and coordinated activity can exhaust any opponent."
 Pocket_Defense: "Pocket Defense"
 Pocket_Defense_desc: "When confronted with an enemy encirclement, our troops must do everything in their power to inflict as many casualties as possible while holding out until the last bullet and man. Every shot fired, every minute spent, and every blow delivered to the enemy must serve a larger purpose: to delay, weaken, and bleed the attacker. Their sacrifice will not be in vain, but will serve as a testament to the spirit of resistance."
 Defense_in_Depth_2: "Defense in Depth"
 Defense_in_Depth_2_desc: "By providing measured, light opposition and briefly yielding ground, we can exchange space for time, bringing opposing forces deeper into our defence. This strategy buys valuable time to regroup, reinforce critical areas, and plan a counterattack. This tactical manoeuvre disrupts their momentum while also strengthening our defensive capabilities, allowing us to reclaim the initiative. When the adversary is exhausted, overworked, and lacks coordination, an opportunity to strike decisively arises."
 Movement_Speed_Offensive: "Swift Offensive Theory"
 Movement_Speed_Offensive_desc: "Swift Offensive Theory significantly reduces organisational loss during movement, ensuring that our units remain coherent and ready for immediate action, even while on the road. With an accelerated reinforcement rate, we ensure that any gaps in our ranks are quickly filled, keeping the attack going. This will also allow us to strike quickly and decisively while remaining adaptable to changes on the battlefield."
 Mechanized_Wave: "Mechanized Wave"
 Mechanized_Wave_desc: "Mechanised troops are best suited for making quick advances to fully exploit breakthroughs, assisting armoured units, and defending the breach's flanks. Once armoured troops have penetrated enemy lines, mechanised infantry can surge forward to support and consolidate advances, preventing the enemy from regrouping or reinforcing their positions."
 Peoples_War: "People's War"
 Peoples_War_desc: "While battles are won by men and bullets, wars are won by people. If we are to achieve complete victory over our enemies, we must ensure that every woman, man, and child contributes in their own unique way to the war effort. This collective effort not only strengthens our resolve, but it also fosters a sense of unity and purpose among the people, which will undoubtedly propel us to victory."
 Rural_Guerilla_Tactics: "Rural Guerrilla Tactics"
 Rural_Guerilla_Tactics_desc: "The enemy must never rest, because every second of strength they exert could result in the death of one of our soldiers. Commanders must now order their forces to harass opposing formations, whether they are fleeing or attacking. Furthermore, if separated from their unit, our men must engage in guerilla tactics to limit the enemy's ability to defend."
 Mobile_Guerilla_Warfare: "Mobile Guerrilla Warfare"
 Mobile_Guerilla_Warfare_desc: "By focusing on quick, unpredictable movements and engagements, our forces remain elusive and adaptable, keeping the enemy on their toes. Furthermore, this approach to combat is based on hit-and-run tactics, allowing our troops to recover and regroup quickly after each skirmish. Whether harassing enemy supply lines or executing surprise strikes, we keep our forces one step ahead, ready to strike when least expected and recover quickly."
 Revolutionary_Base_Areas: "Revolutionary Base Areas"
 Revolutionary_Base_Areas_desc: "Revolutionary Base Areas serve as the foundation for our long-term operations, giving us the flexibility and resilience needed to fight on multiple fronts, regardless of the enemy's attempts to disrupt our supply lines. By focusing on critical resource and shelter supply points, we ensure that our troops are well-supplied even in the most extreme conditions. This ensures that our strength is unwavering, regardless of the challenges we face."
 Revolutionary_Base_Areas_Expansion: "Revolutionary Base Areas Expansion"
 Revolutionary_Base_Areas_Expansion_desc: "Revolutionary Base Area expansions enable us to build even more fortified supply hubs, giving us greater influence and control over critical regions. By increasing the number of critical zones, we not only reduce the likelihood of supply shortages, but also strengthen and maintain our troops' support networks. This extensive network increases flexibility, allowing our forces to operate efficiently across vast territories."
 Asymmetric_Warfare: "Asymmetric Warfare"
 Asymmetric_Warfare_desc: "Regardless of the enemy's strength or vast resources, our troops will fight using every strategy they can think of to repel and defeat them. Whether it is guerrilla warfare or suicide attacks, our soldiers will attack the enemy regardless of the cost or risk. Each battle fought will not only be a step closer to victory, but will also demonstrate our people's resilience and courage."
 Deep_Operations: "Deep Operations"
 Deep_Operations_desc: "By combining specialised tanks with improved organisation and speed, we create an unstoppable force capable of piercing enemy lines with precision. With increased army breakthrough, we ensure that our forces can exploit weaknesses in enemy defences and advance relentlessly. This strategy enables us to maintain momentum and put the opposition on the back foot, all while remaining flexible and autonomous at all levels."

 #### Special Technology #############################################################
 FIN_ski_infantry: "Ski Troops"
 FIN_improvised_at: "Improvised AT Weaponry"
 FIN_concentrated_fire: "Concentrated Fire"

 #### Industry Technology #############################################################
 Industrial_Management: "Industrial Management"
 Industrial_Management_desc: "Industrial management organises the chaos of mass production. By organising labour, streamlining logistics, and coordinating output across factories, it ensures that materials, manpower, and machines all work together. Proper oversight reduces bottlenecks, improves supply chains, and enables planners to respond quickly to changing demand."
 Factory_Electrification: "Factory Electrification"
 Factory_Electrification_desc: "Factory electrification replaces outdated mechanical systems with electric power, resulting in more reliable and flexible machinery. Electric motors reduce maintenance, improve safety, and boost productivity by allowing for faster, more consistent operation."
 Facilities_Design: "Facility-Design"
 Facilities_Design_desc: "Facility design focuses on optimising the layout and infrastructure of manufacturing plants to improve efficiency and workflow. It entails strategically arranging equipment, raw materials, and workstations to reduce downtime, improve worker safety, and boost overall productivity."
 Moving_Assembly_Line: "Moving Assembly Line"
 Moving_Assembly_Line_desc: "The moving assembly line transforms mass production by introducing a continuous, automated process for assembling products. Workers can focus on specific tasks performed in a precise sequence by placing the product on a conveyor system that moves through various stations. This system significantly reduces production time, increases output, and lowers labour costs, making it a key component of large-scale manufacturing, particularly for complex products such as vehicles and machinery."
 Mass_Production: "Mass Production"
 Mass_Production_desc: "Mass production is the use of standardised techniques and machinery to produce large quantities of identical products in a timely and efficient manner. Mass production saves time, money, and labour by utilising automated systems, assembly lines, and interchangeable parts. This method is particularly useful in industries such as automotive, consumer electronics, and weapons manufacturing."
 Skilled_Workforce: "Skilled Workforce"
 Skilled_Workforce_desc: "A skilled workforce is a group of workers who have specialised knowledge, training, and experience in a specific field or trade. These workers are capable of performing tasks that necessitate a higher level of expertise, which is frequently acquired through formal education, vocational training, or years of practical experience. Manufacturing, engineering, healthcare, and information technology all require a skilled workforce to perform precise, complex tasks and utilise advanced technologies."
 Dispersed_Industry: "Dispersed Industry"
 Dispersed_Industry_desc: "Dispersed industry is the practice of distributing industrial production across multiple locations rather than concentrating it in a single central area. This strategy seeks to mitigate the risks associated with having all production in one location, such as vulnerability to natural disasters, enemy attacks, or supply chain interruptions. Distributing industrial facilities allows a country or company to maintain operational continuity, increase resilience, and potentially optimise regional economic development. Local resources, lower labour costs, and reduced congestion can all help dispersed industries."
 Concentrated_Industry: "Concentrated Industry"
 Concentrated_Industry_desc: "Concentrated industry is the practice of centralising industrial production in a few key locations, typically within a specific region or urban area. This approach enables economies of scale, in which large factories and facilities can operate more efficiently, lowering production costs per unit. It also allows for easier access to skilled labour, advanced infrastructure, and a larger consumer base. Because of the close proximity of resources, talent, and research hubs, concentrated industries can drive faster innovation and technological advancements."
 Factory_Controllers: "Factory Controllers"
 Factory_Controllers_desc: "Factory controllers are specialised individuals or systems in charge of overseeing and managing operations in manufacturing facilities. Their primary responsibilities include monitoring production lines, ensuring that machinery and equipment are in working order, managing employees, and optimising raw material usage. Controllers also prioritise maintaining high quality control standards, meeting production quotas, and reducing waste or inefficiencies in the manufacturing process."
 Assembly_Lines: "Assembly Lines"
 Assembly_Lines_desc: "Assembly lines are a manufacturing process in which items are assembled sequentially through a series of steps, with each worker or machine performing a specific task. This method significantly increases manufacturing efficiency by breaking down the production process into specialised tasks. Workers or machines transport partially assembled items via conveyor belt to the next station, where additional components are added or the item is further processed."
 Serial_Production: "Serial Production"
 Serial_Production_desc: "Serial production refers to the continuous, streamlined manufacture of standardised goods in sequential batches. Each product undergoes the same manufacturing steps, resulting in efficiency and consistency across large quantities. Unlike mass production, which requires constant repetition, serial production allows for occasional variations in design or configuration while maintaining uniform assembly processes."
 Parallel_Production: "Parallel Production"
 Parallel_Production_desc: "Parallel production is a manufacturing method in which multiple units or product types are produced concurrently on separate lines or workstations. Parallel production, as opposed to serial production, which follows a fixed sequence for each unit, allows different processes to occur concurrently, significantly improving throughput and flexibility. This method is especially useful when time is of the essence or when multiple components must be built separately prior to final assembly. It reduces bottlenecks by distributing workloads, improves redundancy in the event of equipment failure, and enables facilities to respond quickly to changing demands."
 Modular_Design: "Modular Design"
 Modular_Design_desc: "Modular design is an engineering and manufacturing philosophy in which products are made up of standardised, self-contained components, known as modules, that can be created, maintained, upgraded, or replaced independently. Each module serves a specific purpose, and together they form a cohesive system. This approach simplifies production and repair processes, shortens development time, and allows for a high degree of customisation without having to redesign the entire product."
 Bespoke_Design: "Bespork Design"
 Bespoke_Design_desc: "Bespoke design is the process of creating equipment, tools, or machinery that is tailored to specific operational requirements rather than relying on standardised, mass-produced models. This approach prioritises customisation, ensuring that every detail - from materials to system layout - is tailored to a specific environment, user, or task. While bespoke design requires more resources and time than modular or serial production methods, it provides significant benefits when performance, precision, or niche functionality are critical."
 Production_Scheduling: "Production Scheduling"
 Production_Scheduling_desc: "Production scheduling is the process of planning and organising manufacturing tasks to maximise the use of time, labour, and materials. It determines when and how each job is completed, synchronising machinery, labour, and resources with delivery deadlines and output targets. Effective scheduling reduces downtime, bottlenecks, and improves overall productivity. It enables factories to switch between product types with minimal disruption while also balancing workloads across multiple departments or production lines."
 Basic_Construction_Machines: "Basic Construction Machines"
 Basic_Construction_Machines_desc: "Basic construction machines provide mechanical assistance to heavy labour tasks that were previously performed only by hand or animal. These include early bulldozers, steam shovels, cranes, and concrete mixers, all of which significantly reduce the time and manpower required to build infrastructure ranging from roads to factories."
 Novel_Drills: "Novel Drills"
 Novel_Drills_desc: "Drilling technology advancements have improved the speed, precision, and durability of excavation and boring operations. These innovative drills, powered by compact engines or early electrification, have replaced older manual and steam-powered tools with more efficient rotary and percussive mechanisms."
 Contemporary_Construction_Standards: "Contemporary Construction Standards"
 Contemporary_Construction_Standards_desc: "Modern construction benefits from a shift towards standardised building practices that ensure consistency, safety, and efficiency. These standards specify materials, load-bearing requirements, and design tolerances, reducing structural failures and improving interoperability across projects and regions. Architects and builders can streamline planning and ensure compatibility with emerging technologies such as prefabrication and modular assembly by implementing unified codes and engineering principles."
 Advanced_Drilling_Method: "Advanced Drilling Methods"
 Advanced_Drilling_Method_desc: "Modern drilling techniques increase speed, accuracy, and versatility in construction, mining, and infrastructure development. These methods use precision-guided equipment, rotary and percussion systems, and drill heads that can adapt to a variety of geological conditions."
 Construction_Site_Management: "Construction Site Management"
 Construction_Site_Management_desc: "Efficient site management is critical to completing large-scale construction projects on time and within budget. This discipline coordinates labour, equipment, materials, and safety protocols to ensure that daily operations run smoothly. Clear task delegation, logistics planning, hazard mitigation, and communication between engineering and labour teams are all important best practices. Effective site oversight minimises delays, prevents accidents, and ensures regulatory compliance."
 Mineral_Discovery: "Mineral Discovery"
 Mineral_Discovery_desc: "The search for valuable mineral deposits is critical to industrial development and strategic resource planning. Advances in geological surveying, core sampling, and remote sensing techniques allow for more accurate identification and assessment of underground reserves."
 Heavy_Load_Transport_Trucks: "Heavy-load Transport Trucks"
 Heavy_Load_Transport_Trucks_desc: "Heavy-load transport trucks, designed to transport massive amounts of materials, equipment, and supplies, serve as the logistical backbone of modern industry and military operations. These trucks, equipped with reinforced chassis, high-torque engines, and all-terrain capabilities, can transport cargo over long distances and rough terrain with ease. They increase operational reach and efficiency by supplying front-line units or supporting large-scale construction projects."
 Superior_Soil_Surveys: "Superior Soil Surveys"
 Superior_Soil_Surveys_desc: "An accurate understanding of the terrain is critical for efficient construction and resource development. Superior soil surveys assess soil composition, stability, and load-bearing capacity by utilising modern sampling techniques, improved classification systems, and early geotechnical analysis. These surveys help engineers and planners select the best construction methods, reduce the likelihood of structural failure, and optimise foundation designs. As a result, projects are completed faster, materials are used more efficiently, and there are fewer delays caused by unforeseen ground conditions."
 Motorized_Plowing: "Motorized Plowing"
 Motorized_Plowing_desc: "Motorised ploughing replaces traditional animal-drawn implements with engine-powered tractors and ploughs, resulting in significantly higher agricultural efficiency. This mechanisation enables faster soil preparation, deeper tillage, and cultivation of larger areas with fewer workers. Motorised ploughing increases crop yields while reducing manual workload and expanding arable land capacity, thereby supporting overall food production and rural development efforts."
 Farm_Tractors: "Farm Tractors"
 Farm_Tractors_desc: "Farm tractors are the backbone of modern mechanised agriculture, providing the power required to perform a variety of tasks such as ploughing, harrowing, hauling, and planting. Their versatility and durability significantly reduce the need for manual labour and animal power. Tractors, outfitted with standardised hitch systems and increasingly powerful engines, streamline fieldwork and allow for the use of specialised attachments, making large-scale farming more efficient, consistent, and productive."
 Scientific_Agricultural_Processes: "Scientific Agricultural Processes"
 Scientific_Agricultural_Processes_desc: "Scientific agricultural processes use biology, chemistry, and environmental science principles to increase crop yields and improve soil health. Crop rotation, targeted fertilisation, integrated pest management, and the use of high-yield seed varieties are some of the methods used. Farmers who use research-based practices can increase productivity while reducing waste and long-term land damage."
 Mechanized_Agriculture: "Mechanized Agriculture"
 Mechanized_Agriculture_desc: "Ploughing, planting, irrigating, and harvesting are examples of mechanised agriculture, which involves the use of machines to perform tasks that were previously done manually. Tractors, combine harvesters, and other specialised equipment significantly improve efficiency and enable larger-scale operations. This shift to mechanisation lowers labour costs and saves time, allowing farms to increase productivity and manage larger areas of land."
 Agricultural_Chemistry: "Agricultural Chemistry"
 Agricultural_Chemistry_desc: "Agricultural Chemistry entails the study and application of fertilisers, pesticides, herbicides, and growth regulators, as well as soil chemistry, in order to maximise agricultural yields and preserve soil health. Agricultural chemistry seeks to protect crops from pests and diseases by developing specialised chemicals and techniques, increasing nutrient availability, and improving overall plant growth."
 Industrial_Pasteurization: "Industrial Pasteurization"
 Industrial_Pasteurization_desc: "Industrial pasteurisation is a large-scale controlled heat treatment that removes harmful microorganisms from perishable foods and beverages, most notably milk, juices, and canned goods, while preserving taste and extending shelf life. By standardising temperature and timing protocols, this process ensures product safety and consistency across batches."
 Rudimentary_Oil_Refining: "Rudimentary Oil Refining"
 Rudimentary_Oil_Refining_desc: "Rudimentary oil refining covers fundamental techniques for separating crude oil into useful components such as kerosene, lubricants, and fuel oils. Using simple distillation towers and low-efficiency furnaces, the process uses heat to vaporise crude oil and condense its fractions at varying temperatures."
 Oil_Distillation: "Oil Distillation"
 Oil_Distillation_desc: "Oil distillation is the systematic separation of crude oil into distinct fractions such as petrol, diesel and heavy oils using controlled heating and condensation. This process uses fractional distillation columns to sort hydrocarbons according to their boiling points."
 Basic_Oil_Refining: "Basic Oil Refining"
 Basic_Oil_Refining_desc: "Basic oil refining covers the necessary infrastructure and methods for converting crude oil into usable products such as kerosene, fuel oil, and lubricants. It represents a significant step forward in the conversion of raw petroleum into practical energy sources by employing simple thermal distillation processes."
 Enhanced_Catalytic_Reformer: "Enhanced Catalytic Reformer"
 Enhanced_Catalytic_Reformer_desc: "The enhanced catalytic reformer improves the efficiency and quality of fuel production by incorporating advanced catalysts and higher-pressure systems into the refining process. This enables higher yields of high-octane petrol and valuable petrochemical byproducts from lower-quality feedstocks. This upgrade enables refineries to meet rising industrial and transportation fuel demands while reducing waste and improving overall process economics. It also contributes to the production of critical inputs for plastics, aviation fuel, and synthetic materials."
 Isomerization: "Isomerization"
 Isomerization_desc: "Isomerisation alters the molecular structure of hydrocarbons, transforming low-octane compounds into high-octane fuels. This process improves petrol quality by converting straight-chain paraffins into branched isomers while consuming less crude oil. Isomerisation benefits refineries by improving fuel efficiency, reducing engine knocking, and increasing product blending flexibility."
 Early_Synthetic_Rubber_Production: "Early Synthetic Rubber Production"
 Early_Synthetic_Rubber_Production_desc: "Early synthetic rubber production emerges in response to natural rubber shortages, particularly during wartime or trade disruptions. Manufacturers use basic petrochemical processes to create alternatives such as Buna-S and Buna-N, rubbers derived from styrene and butadiene. Though not as flexible or durable as natural rubber, these early synthetics are critical for producing tires, hoses, seals, and other essential components."
 Nitrile_Butadiene_Rubber_Fabrication: "Nitrile Butadiene Rubber Fabrication"
 Nitrile_Butadiene_Rubber_Fabrication_desc: "Nitrile Butadiene Rubber fabrication represents a significant advancement in synthetic elastomer development. Engineers create a material with excellent oil, fuel, and abrasion resistance by copolymerising butadiene and acrylonitrile, making it ideal for demanding industrial and automotive applications. NBR is created through controlled emulsion polymerisation, followed by mixing, vulcanisation, and shaping. Its combination of flexibility, chemical resistance, and durability makes it a popular material for seals, gaskets, fuel lines, and protective gloves."
 Chloroprene_Rubber_Production: "Chloroprene Rubber Production"
 Chloroprene_Rubber_Production_desc: "Chloroprene rubber, also known as Neoprene, is formed by polymerising chloroprene. This synthetic rubber has weather resistance, flame retardancy, and moderate oil tolerance, making it suitable for a variety of industrial and consumer applications. The production process begins with controlled emulsion polymerisation, followed by coagulation, drying, and compounding. The end result is a versatile elastomer that can be used in wetsuits, belts, hoses, electrical insulation, and industrial gaskets."
 Early_Synthetic_Oil_Production: "Early Synthetic Oil Production"
 Early_Synthetic_Oil_Production_desc: "Early synthetic oil production stemmed from the need to supplement or replace natural petroleum with man-made alternatives. Using coal or natural gas as feedstocks, this process typically converts carbon-based materials into synthetic hydrocarbons using methods such as Fischer-Tropsch synthesis or thermal cracking. Though less efficient than direct extraction of natural oil from the Earth, this early stage represents a significant advancement, particularly in regions with limited crude oil reserves."
 Widespread_Use_of_Lignite_Coal: "Widespread Use of Lignite Coal"
 Widespread_Use_of_Lignite_Coal_desc: "As energy demands rise and high-grade coal becomes less available, the use of lignite coal grows rapidly. Despite having a lower carbon content and higher moisture than bituminous coal, lignite is abundant, easy to mine, and sufficient for many industrial applications. Its widespread use fuels power plants, steam locomotives, and the early chemical industries. Despite being less efficient and more polluting than harder coals, lignite is critical in regions with limited energy options, supporting electricity generation and early synthetic fuel production."
 Refined_Pyrolysis_Process: "Refined Pyrolysis Process"
 Refined_Pyrolysis_Process_desc: "Advances in organic pyrolysis now enable more controlled thermal decomposition, resulting in higher-quality byproducts such as synthetic gas, tar, charcoal, and oils. This process can be made significantly more efficient and reliable by improving heat application, pressure control, and feedstock preparation. The refined pyrolysis method is particularly useful in early petrochemical industries and wartime fuel production. It provides a method for extracting useful hydrocarbons from low-grade biomass and coal, paving the way for synthetic fuels, carbon-rich materials, and a variety of industrial chemicals."
 Major_Hydrogeneration_Productivity_Gain: "Major Hydrogeneration Productivity Gain"
 Major_Hydrogeneration_Productivity_Gain_desc: "Significant improvements in the hydrogenation process, which is used to refine fuels, harden oils, and manufacture synthetic materials, have resulted in significant productivity gains across a wide range of industries. By optimising catalysts, pressure conditions, and reactor design, facilities can now achieve faster reaction times, higher yields, and lower energy consumption. These advancements are especially useful in synthetic fuel production, chemical manufacturing, and food processing."

