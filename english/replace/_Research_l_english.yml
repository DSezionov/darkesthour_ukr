 ### Rockets and Missiles
 guided_missile_equipment: "Guided Missile"
 
 guided_missile_equipment_1: "Flying Bomb"
 guided_missile_equipment_1_short: "Flying Bomb"
 guided_missile_equipment_1_desc: "The Flying Bomb is a pilotless aircraft powered by an early jet engine, designed to deliver a payload of explosives to an area target. It is slower than a rocket or missile, which means that it can be intercepted and shot down by enemy fighters."
 
 guided_missile_equipment_2: "Strategic Rockets"
 guided_missile_equipment_2_short: "Strategic Rockets"
 guided_missile_equipment_2_desc: "Strategic rockets are unmanned, long-range weapons powered by liquid or solid fuel propulsion systems. They are designed to carry a high-explosive payload over long distances using a high-arcing ballistic trajectory. These weapons launch vertically, leave the stratosphere, and fall at high speeds into their targets, making them difficult to intercept with conventional air defence systems."
 
 guided_missile_equipment_3: "Ballistic Missiles"
 guided_missile_equipment_3_short: "Ballistic Missiles"
 guided_missile_equipment_3_desc: "Ballistic missiles are advanced unmanned delivery systems capable of striking targets over long distances with greater speed, precision, and payload flexibility. These missiles maintain a suborbital trajectory by employing more efficient propulsion systems, superior aerodynamics, and inertial guidance. Their high terminal velocity and altitude profile make interceptions extremely challenging."
 
 guided_missile_equipment_4: "Intercontinental Ballistic Missile"
 guided_missile_equipment_4_short: "ICBM"
 guided_missile_equipment_4_desc: "Intercontinental ballistic missiles are the most advanced type of unmanned strategic weapons. Designed to strike targets across continents, they use multi-stage propulsion and high-precision guidance systems to deliver payloads over long distances.Their rapid deployment and nearly uninterceptable descent phase make them an important tool for power projection. Launch systems are highly automated, ensuring a quick response in strategic scenarios."
 
