#### Special Forces #######################################################################################
 Specialized_Units: "Specialized Units"
 Specialized_Units_desc: "These formations are designed to operate in harsh and demanding environments where regular infantry cannot. Whether dropping behind enemy lines, scaling treacherous terrain, storming fortified beaches, or conducting covert strikes deep in hostile territory, specialised units receive rigorous training and tailored equipment. Their adaptability and precision make them ideal for missions that require speed, surprise, and terrain mastery to succeed."
 Transport_Plane_1926: "Transport Plane '26"
 Transport_Plane_1926_desc: "Primitive biplane transports move light cargo and a few troops over short distances. They are made of wood and fabric and have limited speed, range, and protection. Loading is slow, turbulence is dangerous, and the weather can easily ground them. However, they mark the beginning of air logistics, which is capable of leaping over impassable terrain and crossing large areas of territory faster than any supply convoy."
 Transport_Plane_1934: "Transport Plane '34"
 Transport_Plane_1934_desc: "With general advancements in aircraft technology, transport planes have improved as well, with the majority of designs shifting from biplane to monoplane. These designs feature enclosed cabins, stronger frames, and longer ranges. These aircraft can now transport more people or light equipment, as well as larger quantities of supplies like food or fuel, making tactical redeployments more feasible. Reliability improves, but takeoff and landing still require clear, flat runways. These aircraft are still vulnerable, but not as fragile as their older counterparts."
 Air_Supply: "Air Supply"
 Air_Supply_desc: "Air supply operations provide a critical lifeline to isolated units by avoiding hostile terrain, frontlines, and destroyed infrastructure. Cargo planes drop food, ammunition, fuel, and medical supplies via parachute or low-altitude release. While weather, enemy fighters, and flak pose constant threats, well-executed air support keeps surrounded forces fighting and allows for deeper advances."
 Transport_Plane_1940: "Transport Plane '40"
 Transport_Plane_1940_desc: "The introduction of all-metal airframes and twin-engine powerplants enables heavier loads, higher speeds, and improved altitude performance. Troop deployment is now routine, and vehicle airlift is feasible. With reinforced cargo floors and side doors, these planes can handle large paratroop operations, strategic supply airlifts, and equipment redeployment on a massive scale, making them far more appropriate for military operations."
 Glider: "Glider"
 Glider_desc: "Assault gliders are silent and engineless, carrying commandos and light equipment deep behind enemy lines. Built of lightweight wood and canvas, they are towed into the sky by powered aircraft before being cut loose and descending unexpectedly. Inside, soldiers sit shoulder to shoulder with guns and supplies, preparing for a rough landing in fields or on roads. Glider missions are fragile and dangerous, blurring the line between transport and suicide, but when they work, they deliver surprise with lethal force and insert skilled soldiers where they can cause the most damage."
 Transport_Plane_1944: "Transport Plane '44"
 Transport_Plane_1944_desc: "Combat-tested designs dominate the skies, having been tested by wartime lessons and proven to be strong, rugged, and capable of handling difficult airstrips under fire. Troops, jeeps, artillery, and ammunition crates all fit in the hold. Rear ramps make unloading faster, and onboard radios allow for mid-flight coordination. These transports are the foundation of airborne warfare and emergency supply across continents."
 Static_Line: "Static Line"
 Static_Line_desc: "Static lines are a new invention that allows for the hypothetical deployment of troops from planes to the ground behind enemy lines. A cord that pulls a would-be soldier's parachute open as they jump out of the plane. Rather than the soldier manually opening the chute while falling towards the ground, which wastes valuable seconds, this process makes low-altitude jumps far easier to perform. These designs may finally make organised paratrooper divisions possible."
 Airborne_Training_School: "Airborne Training School"
 Airborne_Training_School_desc: "Airborne training schools are established to train infantry units for parachute operations. Jump techniques, equipment handling, aircraft embarkation and disembarkation, and coordinated operations after landing are the primary topics of instruction. Trainees practise static-line jumps from towers and aircraft, with exercises conducted both day and night. The program also includes training in light weapons, navigation, and small-unit tactics to ensure that paratroopers can work independently once deployed."
 Airborne_Assault: "Airborne Assault"
 Airborne_Assault_desc: "Airborne assault operations require the rapid deployment of paratroopers into enemy territory in order to seize key objectives and disrupt enemy forces. This tactic relies on surprise, with paratroopers jumping from transport aircraft and immediately engaging in combat. The goal is to secure critical terrain, such as airfields, bridges, or communication hubs, while disrupting the enemy's ability to respond quickly. After landing, troops must quickly plan and carry out assaults with limited support, relying on speed and coordination to overwhelm isolated enemy units before they can regroup."
 Pathfinders: "Pathfinders"
 Pathfinders_desc: "Pathfinders are small, specialised units that are sent ahead of the main airborne force to mark drop zones, gather intelligence, and establish initial control over the landing area. They are inserted by parachute or glider and operate with minimal equipment and no immediate reinforcement, relying instead on stealth, precision, and training. Their role is critical in ensuring that airborne assaults land accurately and effectively, often determining the overall success or failure of the operation."
 Amphibious_Landing: "Amphibious Landing"
 Amphibious_Landing_desc: "Amphibious landing operations involve moving infantry, equipment, and support elements from transport ships to contested shorelines. Troops are typically loaded onto small landing craft from troopships located offshore, often several kilometres from the beach. These craft then approach designated landing zones, sometimes with the assistance of naval gunfire and air support. Troops disembark directly into shallow water or onto temporary piers and advance over sand, mud, or rocky terrain while encountering barbed wire, mines, and entrenched enemy positions."
 Amphibious_Operations: "Amphibious Operations"
 Amphibious_Operations_desc: "Amphibious operations are a comprehensive military effort to project force from sea to land, combining naval transport, aerial cover, and ground combat forces. These operations necessitate close coordination among fleets, landing units, logistics personnel, and command staff. Unlike simple landings, full amphibious operations include preliminary bombardments, feints to confuse defenders, follow-up waves of mechanised support, and the quick establishment of supply chains once a beachhead is secured. Troops must be trained to disembark under fire, navigate chaotic shorelines, and quickly transition from sea-borne to land combat."
 Naval_Landing_Forces: "Naval Landing Forces"
 Naval_Landing_Forces_desc: "Naval landing forces are specialised infantry units trained to storm hostile shores during amphibious assaults. These troops work closely with naval command and are prepared for the unique challenges of coastal combat, such as fighting through beach defences, clearing obstacles, and securing initial perimeters for follow-up forces. They receive intensive training in small boat handling, rapid disembarkation, and combat under heavy artillery and small arms fire. Unlike conventional infantry, naval landing forces are trained to fight with limited support in unpredictable conditions such as tide shifts, uneven terrain, and immediate counter-attacks. Their role is to seize critical coastal positions, set up landing zones, and hold them until heavier equipment and reinforcements arrive."
 Beachmasters: "Beachmasters"
 Beachmasters_desc: "Beachmasters are the coordination backbone of amphibious operations, in charge of establishing and maintaining order amidst the chaos of a contested landing zone. They direct landing craft, guide disembarking troops, and organise the rapid flow of supplies, vehicles, and wounded along a narrow, vulnerable beachfront. Under fire, beachmasters ensure that successive waves of the assault force land where and when they are supposed to, reducing congestion and increasing tempo."
 Amtracs: "Amtracs"
 Amtracs_desc: "Amphibious Tractors, or Amtracs, are tracked vehicles that can move from ship to shore and then inland without having to change to land-based transportation. Built with watertight hulls and the ability to float, they can easily operate in shallow waters and cross beaches. Their tracked design enables them to navigate rough terrain once ashore, making them useful for transporting troops, supplies, and light equipment during amphibious missions."
 Transport_Boats: "Transport Boats"
 Transport_Boats_desc: "Transport boats provide the primary link between ships and shore, ferrying troops and supplies over short distances. They are simple, tough, and intended for repeated use in harsh conditions. Without armour or ramp systems, they are frequently used in low-risk zones or as backup after an initial beachhead has been secured. Their shallow drafts enable access to difficult coastal terrain, and they can be loaded and unloaded quickly, making them useful for maintaining an amphibious presence."
 Landing_Craft: "Landing Craft"
 Landing_Craft_desc: "Landing craft are purpose-built vessels that transport infantry, vehicles, and cargo directly to hostile shores. They typically have reinforced hulls to withstand light fire and rough beach conditions, as well as front ramps for quick disembarkation. Their low profile makes them difficult to spot from a distance, whereas their flat bottoms allow for quick grounding and retreat. They are an essential component of any modern amphibious assault, balancing power, durability, and speed."
 Assault_Landing_Craft: "Assault Landing Craft"
 Assault_Landing_Craft_desc: "Assault landing craft are specialised versions of landing ships designed for initial wave assaults. They are often armoured to withstand small arms fire and shrapnel, and have stronger ramps, improved engines, and reinforced hulls to deal with chaotic landing zones. Some models feature defensive weapon mounts or smoke generators. These craft prioritise survivability and speed in order to deliver assault troops to the beach and through enemy fire before retreating for another run."
 Specialized_Support_Craft: "Specialized Support Craft"
 Specialized_Support_Craft_desc: "Auxiliary vessels designed for tasks other than direct troop transport. These include aircraft designed for medical evacuation, command and control, engineering support, and equipment repair near landing areas. Many have onboard communications arrays, cranes, or supply caches, and some are designed for firefighting or recovery missions. They contribute to operational continuity during amphibious campaigns by bridging logistical gaps between shore and fleet."
 Mountain_Warfare: "Mountain Warfare"
 Mountain_Warfare_desc: "Mountain warfare entails combat in rugged, high-altitude terrain where conventional operations fail. Troops trained for these conditions can adapt to steep slopes, unstable terrain, and limited mobility. Combat in valleys, passes, and ridgelines requires endurance, acclimatisation, and small-unit tactics. Success depends on mastering the landscape, as weather and terrain are frequently more dangerous than the enemy."
 Mountain_Warfare_Equipment: "Mountain Warfare Equipment"
 Mountain_Warfare_Equipment_desc: "Gear intended for cold, high-altitude combat. This includes insulated clothing, crampons, ice axes, climbing ropes, and lightweight mobility equipment. Weapons and equipment are designed to withstand freezing temperatures, and include specialised medical and survival kits. Each item is designed to be durable and practical in difficult terrain and harsh weather conditions."
 Mountainous_Terrain_Combat_Tactics: "Mountainous Terrain Combat Tactics"
 Mountainous_Terrain_Combat_Tactics_desc: "Mountainous terrain combat tactics emphasise leveraging the landscape to gain an advantage. Troops use high ground for observation and defence while moving through narrow passes and valleys. Stealth and speed are essential for avoiding detection. Small units frequently operate independently, relying on surprise and ambush. The terrain also necessitates specialised movement techniques, with an emphasis on conserving energy as much as possible and using climbing and scrambling techniques to overcome obstacles."
 Rock_Climbing: "Rock Climbing"
 Rock_Climbing_desc: "Rock climbing training prepares soldiers to navigate vertical and steep terrain. Troops are taught how to use climbing ropes, harnesses, and carabiners to ensure a safe and efficient ascent and descent. They also learn how to scale natural rock faces and man-made obstacles. This training improves mobility in mountainous areas and overall endurance, allowing soldiers to navigate through otherwise impassable terrain in combat scenarios."
 Ski_Training: "Ski Training"
 Ski_Training_desc: "Ski training prepares soldiers to move quickly and efficiently through snow-covered terrain. It teaches cross-country and downhill skiing techniques that emphasise stamina, balance, and manoeuvrability. Soldiers are trained to navigate snowfields, forests, and rugged terrain while carrying equipment. This training improves mobility in winter and increases the ability to operate in cold, mountainous environments."
 Crampons: "Crampons"
 Crampons_desc: "Specialised footwear attachments intended to provide traction on icy or rocky terrain. Soldiers are trained to use these devices to climb and move through frozen or steep terrain. Crampons are essential in mountainous and Arctic conditions, allowing soldiers to safely climb glaciers, ice fields, and jagged rock faces."
 All_Terrain_Support_Vehicles: "All Terrain Support Vehicles"
 All_Terrain_Support_Vehicles_desc: "All Terrain Support Vehicles are designed to provide logistical and combat support in a variety of environments, including deserts, forests, swamps, and snowy landscapes. These vehicles have heavy-duty tires or tracks, allowing them to navigate difficult and uneven terrain. They are used to transport troops, supplies, and equipment to locations inaccessible to standard vehicles."
 Special_Forces: "Special Forces"
 Special_Forces_desc: "Special Forces are elite military units that train for unconventional warfare, reconnaissance, sabotage, and high-risk operations behind enemy lines. These troops are recruited from the most capable and disciplined soldiers and go through extensive physical and mental conditioning to learn skills like demolition, infiltration, survival, and foreign weapon use."
 Hot_Environment_Training: "Hot Environment Training"
 Hot_Environment_Training_desc: "Hot Environment Training prepares troops to operate effectively in arid, tropical, and desert environments where extreme temperatures, dehydration, and heat exhaustion are constant hazards. Soldiers learn how to stay hydrated, identify heat-related illnesses, and adapt their equipment and routines to the harsh environment. The emphasis is on stamina, resource management, and terrain navigation to ensure that units can remain combat ready in the face of relentless sun and scorching heat."
 Cold_Environment_Training: "Cold Environment Training"
 Cold_Environment_Training_desc: "Cold Environment Training provides soldiers with the knowledge and discipline required to survive and operate in sub-zero temperatures, snow-covered terrain, and icy winds. Troops are taught cold-weather survival skills such as shelter construction, fire starting, and safe movement across frozen terrain. Training also includes the use and maintenance of cold-resistant gear, layered clothing, and weapon functionality in freezing temperatures."
 Softer_Requirements: "Softer Requirements"
 Softer_Requirements_desc: "Adapting recruitment and training standards allows for greater enlistment while maintaining core combat effectiveness. This includes lowering physical requirements for support roles, increasing educational flexibility, and changing criteria for non-frontline personnel. Such changes increase manpower availability while maintaining unit cohesion and logistical efficiency."
 Light_Clothing: "Light Clothing"
 Light_Clothing_desc: "Light clothing designed for warmer climates improves comfort and mobility for troops operating in hotter environments. Its breathable, moisture-wicking materials allow soldiers to tolerate prolonged exposure to high temperatures with less fatigue."
 Clothes_Insulation: "Clothes Insulation"
 Clothes_Insulation_desc: "Clothing insulation is intended to provide essential warmth and comfort in cold environments without limiting movement. These garments use advanced materials like wool, synthetic fibres, or down to trap body heat and regulate temperature even in extreme cold. This insulation allows soldiers to perform in freezing temperatures, lowering the risk of hypothermia and ensuring that mobility and endurance are not compromised during long operations."
 Elite_Forces: "Elite Forces"
 Elite_Forces_desc: "Specialised military units are prepared for high-risk, high-reward missions that demand advanced skills and exceptional discipline. These forces receive extensive training in a variety of disciplines, including close-quarters combat, intelligence gathering, covert operations, and strategic planning. The emphasis is on developing both physical endurance and mental toughness, allowing them to function independently in hostile environments. These units are also well-adapted to various environments and terrains, such as desert, arctic, and mountainous, and are adept at operations behind enemy lines."

