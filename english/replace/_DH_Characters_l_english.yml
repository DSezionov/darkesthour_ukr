### Character Descriptions
 AFG_Mohammad_Zahir_Shah_desc: "Mohammad Zahir Shah, barely a man at 19, finds himself thrust onto the ancient throne of Afghanistan. The ink on his French textbooks has scarcely dried as he dons the mantle of kingship in a land where tribal loyalties often outweigh national ones.\n\nBorn into privilege but raised far from the centers of power, Zahir Shah is an enigma to his own people. His father's assassination has catapulted him from the classrooms of Paris to the treacherous corridors of Kabul's royal palace. The young king's mind teems with visions of modernization gleaned from his time in Europe, yet he must now navigate a labyrinth of age-old traditions and rivalries.\n\nIn the shadow of the Hindu Kush, Zahir Shah's uncles pull the strings of governance. Mohammad Hashim Khan, his uncle and Prime Minister, looms large - a seasoned schemer in a land where politics is often a blood sport. The young king must learn quickly, for in Afghanistan, even the throne can be a precarious perch.\n\nAs the world teeters on the brink of upheaval, Afghanistan stands at a crossroads. To the north, the Soviet bear growls with revolutionary fervor. To the east, British India eyes the mountain passes with imperial suspicion. Within his own borders, reformists whisper of progress while conservatives cling fiercely to the old ways.\n\nZahir Shah's reign begins not with a bang, but with a question mark. Will he be a mere figurehead, a puppet dancing to his uncles' tune? Or will this untested youth surprise friend and foe alike, charting a new course for his nation?\n\nIn the bazaars of Kabul and the remote valleys of the countryside, the people watch and wait. Some see in their young king the promise of a new dawn, others the naive pawn in a game centuries old. As Zahir Shah takes his first tentative steps as ruler, the fate of Afghanistan hangs in the balance.\n\nThe board is set, the pieces are in motion. In this high-stakes game of power and survival, can a boy king become the master of his own destiny - and that of his nation?"
 ALB_Pandeli_Evangjeli_desc: "Pandeli Evangjeli is not a man of firebrand speeches or populist appeal. He is, instead, the quiet technician of state, a seasoned administrator serving beneath the imposing shadow of King Zog. As one of Albania's most experienced politicians, Evangjeli offers continuity, calm, and unwavering loyalty to the throne.\n\nA veteran of the early independence movement and one of the few prominent Orthodox Albanians in high office, Evangjeli understands the delicate sectarian and regional balances that hold Albania together. He has no illusions about his role: to manage, to moderate, and to execute the will of the king. In a fragile state where patronage often trumps policy, his quiet steadiness has proven indispensable.\n\nBut competence alone cannot resolve Albania's deeper issues: economic dependency, political centralization, and the ever-growing influence of Italy. Evangjeli can keep the wheels turning, but the direction of the vehicle lies far beyond his hands."
 ALB_Zog_I_desc: "Few rulers embody the contradictions of modern monarchy like King Zog I. Born Ahmet Zogu, a tribal chieftain turned politician, he clawed his way to power through intrigue, opportunism, and sheer tenacity, declaring himself king in 1928 and fashioning a throne out of dust and ambition.\n\nZog is not a monarch by divine right, but by force of personality. He governs Albania with autocratic authority, a revolver always close at hand, and a cabinet filled with loyalists. In a land where tradition and modernity collide, Zog styles himself both as a progressive reformer and a traditional Balkan strongman. He has built schools and roads, centralized power, and attempted to modernize his country, but always under his watchful eye.\n\nDependent on Italian loans and facing constant threats to his life, Zog's rule is precarious, his crown heavier than gold. Albania may be poor, divided, and fragile, but so long as Zog sits on the throne, it is his kingdom, and he means to keep it that way."
 AOI_Pietro_Badoglio_desc: "A general first, a politician second, and a survivor always. Decorated for his role in the Great War and later elevated to Marshal of Italy, Badoglio built his reputation on the battlefield, most infamously in Ethiopia and Libya, a campaign marked by chemical weapons and ruthless colonial repression. Yet, for all his loyalty to Mussolini's regime, Badoglio was no true ideologue. His allegiance lay with the monarchy, the army, and the preservation of Italy's state apparatus above all else.\n\nWhen the Fascist edifice began to crumble, Badoglio stepped into the vacuum, not to lead a revolution, but to contain one. Now he navigates the transition between dictatorship and Allied occupation with signature ambiguity: condemning Fascism while retaining its bureaucrats, promising democracy while maintaining martial law. To some, Badoglio is a steady hand amid chaos, a necessary bridge between past and future. To others, he is the embodiment of Italy's institutional cowardice: always present, never accountable, and loyal to whichever order keeps him in uniform.\n\nBadoglio does not shout or inspire. He endures. And in a nation lurching between extremes, perhaps that alone is enough."
 AST_Ben_Chifley_desc: "Many politicians are forced to make compromises on their  promises. A strong leader, on the other hand, deals in absolutes. He fights for what he believes in and refuses to give in to the other side until he has won. Many people call this obstinacy. Others describe it as strong-willed. It's safe to call Ben Chifley both.\n\nChifley, who has been a member of the Labor Party since the 1920s, is an unwavering supporter of the party's cause. Serving briefly as Defence Minister in the 1930s, he established himself as a close ally of John Curtin and bravely followed him to victory in 1941. He never let the stress of World War II get to him while serving. Unfortunately, Curtin did not live to see the war's end, and Chifley took his place as Prime Minister..\n\nFighting for the soldiers' immediate return, he is constantly at odds with the newly formed Liberal Party's leader, 'Pig Iron Bob,' the man who sold Australia's iron to the Japanese. The conflict between them is almost as heated as the one that existed prior to the war between Curtin and Lyons. Nonetheless, Chifley will continue to steer the country in the direction he sees fit, and in which many Australians agree.\n\nAs the Pacific War draws to a close, Chifley must quickly transition from wartime to peacetime as Prime Minister. His government will be defined by how he conducts himself in the aftermath of the greatest conflict in history. One thing is certain: the new peacetime political landscape will be drastically different, for better or worse.."
 AST_Isaac_Isaacs_desc: "A scholar of the law, a fierce Australian patriot, and a symbol of national maturation, Sir Isaac Isaacs is not merely the King's man in Canberra: he is the Commonwealth made flesh. The first native-born Governor-General, Isaacs' appointment marked a bold assertion of dominion independence and a departure from long-standing British custom. For some, he is a proud pioneer. For others, an unsettling precedent.\n\nFormerly Chief Justice of the High Court, Isaacs brings a sharp legal mind and an unshakable belief in parliamentary democracy. He is not content to act as a ceremonial figurehead. At times, he pushes the boundaries of his role, insisting that the Governor-General serve not just the Crown, but the Australian people.\n\nIn a world where the empire trembles and dominions find their voice, Isaac Isaacs may be more than a symbol - he may be a glimpse of the future."
 AST_John_Curtin_desc: "John Curtin has the ability to say he was all of these things in his life: a supporter of workers, a union advocate, a Labour MP in Parliament, and finally Prime Minister. This Western Australian politician has a lot to live up to after rising to prominence through the Labour Party in the 1920s and eventually taking over after James Scullin stepped down.\n\nThe Labour Party struggled after the loss of experienced politicians such as Joseph Lyons and James Fenton due to a leadership change. However, this was a learning experience for them. They were united and strong under Curtin's firm, guiding hand of leadership, with one common goal: rights for the working man and his family. Curtin, like the Labour Party as a whole, gained popularity by campaigning hard for the common man.\n\nUnder his leadership, the Labour Party has fought tooth and nail with the United Australia Party on issues such as the economy, tariffs, pensions, and trade. Curtin is a strong proponent of rearmament, citing Japan's ever-expanding empire as a threat. The UAP supports the Conservatives in London, with some Labor Party members quietly supporting them. Curtin will have to deal with the Australian people's unwillingness to go to war and prepare them for the impending global conflict now that he is in office.\n\nLeaders and political ideologies come and go over time. However, only a few Prime Ministers are recognised and thanked for their accomplishments. Whatever happens in the coming years, John Curtin will be one of those Prime Ministers."
 AST_Joseph_Lyons_desc: "Steady, soft-spoken, and reassuring in troubled times, Joseph Lyons is the quiet face of conservative recovery in Depression-era Australia. A former Labor man turned centrist statesman, his departure from the party of his roots was both principled and pragmatic, born out of deep disagreements over how to handle the nation's economic crisis.\n\nNow at the helm of the newly forged United Australia Party, Lyons offers a message of balance: fiscal restraint without cruelty, reform without revolution. He is no firebrand, no radical, and no ideologue. That, perhaps, is his greatest strength. While others shout, Lyons listens. While others demand, Lyons delivers calm. To a population battered by economic despair and political upheaval, his demeanor offers something rare: trust.\n\nBut trust alone may not suffice. In a world growing darker by the day, Australia's quiet caretaker must soon prove whether moderation can stand against the storms to come."
 AUS_Engelbert_Dollfuss_desc: "A small man with towering ambition, Engelbert Dollfuß stands at the crossroads of Austria's identity crisis. Surrounded by enemies, Dollfuß has made a clear choice: dissolve the old republic and replace it with a new, Catholic-authoritarian order, forged in the image of Italian corporatism and conservative Catholic values.\nTo his supporters, he is Austria's savior, the man who will save the nation from German absorption and socialist anarchy. To his enemies, he is a dictator cloaked in crucifixes. Yet for all his rhetoric, Dollfuß knows Austria is fragile, economically dependent, militarily weak, and politically isolated. And the shadow of Hitler grows longer by the day.\n\nIn the marble halls of Vienna, Engelbert Dollfuß builds a new Austria. One that prays, obeys, and fights to remain its own."
 AUS_Kurt_Schuschnigg_desc: "Kurt Schuschnigg inherited a nation born from defeat and steeped in crisis. A devout Catholic and Great War veteran, he was appointed chancellor following the assassination of his friend and predecessor, Engelbert Dollfuss. Schuschnigg, as leader of the Fatherland Front, is the primary proponent of Austrofascism - a corporatist, authoritarian ideology that promotes a distinct Austrian identity wholly seperate from that of its aggressive German neighbour.\n\nHis rule is defined by a single, overwhelming task: the preservation of Austrian independence. Schuschnigg walks a fine line, attempting to suppress the Nazi party at home while navigating a perilous diplomatic landscape abroad. A lawyer by trade and a chancellor by tragedy, Schuschnigg is a patriot, but not a man of iron. He is forced to make compromise after compromise, desperately attempting to buy time against a foe who sees his country as a province to be reclaimed, rather than a sovereign state.\n\nWith enemies at the gate and traitors within, the fate of Austria rests on his shoulders, and he is acutely aware that he may be its last true defender."
 AUS_Wilhelm_Miklas_desc: "A quiet man in a loud time, Wilhelm Miklas presides over a crumbling republic with restraint and increasing helplessness. A schoolteacher by profession and a devout member of the Christian Social Party, Miklas rose to the presidency as a figure of national unity. But unity, it seems, is in short supply.\n\nAs Austria drifts from parliamentary democracy to authoritarian rule under Dollfuß, Miklas choses continuity over confrontation. Though he disapproves of the regime's more repressive elements, he signs the decrees, attends the ceremonies, and keeps the outward forms of the presidency intact even as real power shifts elsewhere. His critics see a weak man unwilling to act. His defenders, a constitutionalist trying to hold the line with the tools he has.\n\nBut Miklas is no fool. He knows what looms across the German border, and what the price of defiance may be. In the twilight of Austria's independence, Wilhelm Miklas remains the last custodian of a fragile state - a man caught between his conscience and his country's fate."
 AZR_Jafar_Pishevari_desc: "A fiery revolutionary born in Iranian Azerbaijan, Ja'far Pishevari spent decades as a committed communist agitator, journalist, and organizer. Hardened by years of imprisonment and political exile, he emerged as the most prominent advocate for a socialist, self-governing Azerbaijan. His rhetoric fused Marxist ideals with Azerbaijani nationalism, making him a rallying figure for those disillusioned with Persian centralism and foreign influence.\n\nWhen political opportunity arose, Pishevari was ready to step forward, determined to turn decades of underground struggle into the foundation of a new, Soviet-aligned republic."
 BEL_Albert_I_desc: "King Albert I is no distant monarch of marble halls and courtly etiquette, he is a man forged in mud and gunpowder, a sovereign who stood with his soldiers in the trenches of the Yser and refused to abandon his people in their darkest hour. Albert earned not only the crown but the love of a nation through courage, humility, and an unshakable sense of duty.\n\nIn peacetime, Albert has remained a steadying hand, quietly guiding Belgium through reconstruction, political division, and the fragile balance between liberalism, Catholicism, and socialism. Though the crown grants him limited political power, his moral authority remains immense. He is a symbol of unity in a land divided, and a reminder that leadership need not shout to be heard.\n\nIn a world once again growing restless, Belgium still looks to its king, not to rule, but to lead by example."
 BEL_Charles_de_Broqueville_desc: "A veteran of war and politics, Charles de Broqueville returns to lead Belgium in a time of economic uncertainty and social unrest. Calm, deliberate, and devoutly Catholic, he sees his role not as that of a visionary, but as a steward of order, guarding the fragile balance between Walloon and Flemish, monarch and parliament, Church and State.\n\nHaving governed through the fires of the Great War, de Broqueville understands the weight of leadership in crisis. Though he once clashed with King Albert over military strategy and civilian authority, both men share a deep commitment to national unity. Now, as the Great Depression grips Europe and radical ideologies spread, he hopes to preserve Belgium's constitutional traditions without sacrificing its soul.\n\nPragmatic but principled, cautious but firm, de Broqueville is no stranger to adversity. His Belgium may be small, but he intends it to remain sovereign, stable, and free."
 BRA_Getulio_Vargas_desc: "Getúlio Vargas, President of the Republic of the United States of Brazil, continues to lead his country as their \"president\". His dictatorship, the \"Estado Novo,\" or New State, appears to be on track to rule Brazil for an extended period of time. While Brazil remains within the United States' sphere of influence, Vargas' regime has taken a great deal of inspiration from the populist regimes that arose in Europe after the Great War, and his country, under his guidance, could be dragged into the next great war."
 BUL_Boris_III_desc: "Tsar Boris III walks a tightrope, one spun from dynastic legitimacy, national humiliation, and the unrelenting pressures of a continent sliding into chaos. The son of Ferdinand, born into the aftermath of lost wars and bitter treaties, Boris ascended the throne with humility and quiet purpose. Over time, he has proven himself not as a warrior-king, but as a master of subtle power: patient, pragmatic, and deeply aware of his country's fragile position.\n\nThough Bulgaria remains a constitutional monarchy on paper, the reality is quite different. Party politics have been gradually sidelined and Boris has assumed a central role in state affairs, guiding the nation through backchannels and trusted intermediaries. His rule is neither openly despotic nor fully democratic. Boris dreams not of conquest, but of reclamation. The lost lands of Macedonia, Thrace, and Dobrudja haunt Bulgaria's national consciousness. And while foreign powers may offer a path to those dreams, the Tsar knows well the price of dangerous friendships.\n\nHe rules not with an iron fist, but with a steady hand. And in these uncertain times, that may be Bulgaria's only anchor."
 BUL_Nikola_Mushanov_desc: "Stubborn, principled, and resolutely constitutional, Nikola Mushanov is a relic of an older Bulgaria, one where parliaments debated, coalitions shifted, and power came not from the barrel of a gun, but from the ballot box. As Prime Minister, he tries to steer the country through economic turmoil and rising extremism with liberal moderation and democratic ideals. In return, he is met with sabotage and cynicism.\n\nBut Mushanov endures. Though sidelined by authoritarian forces, he remains a symbol of parliamentary integrity, a rare advocate for civil liberties and legal governance in a region increasingly seduced by kings, colonels, and ideologues. His voice may be quiet, but it is unwavering: no strongman, no foreign master, no fleeting promise of stability is worth the price of Bulgaria's soul.\n\nAs storms gather across Europe, Nikola Mushanov waits - for his country to remember that dignity lies not in domination, but in the rule of law."
 CAN_Mackenzie_King_desc: "Mackenzie King was a bright young man who earned five university degrees and became deeply concerned about social welfare issues in Canada. He was appointed to the position of Deputy Minister of Labour in 1900. During his tenure, he was elected to the Liberal Party's House of Commons. This success made King the first-ever Minister of Labour, but it all came crashing down when he lost his parliamentary seat two years later, prompting King to withdraw from politics.\n\nThe Liberal Party became fractured and divided over the issue of conscription as the Great War progressed, with many of its members defecting to the conservative coalition government. Following the war and the death of the Liberal Party's leader, King triumphantly returned to politics, filling the leadership void and making it his sole responsibility to reconcile the factions within the party and reunite the party, which he accomplished by leading the Liberals to victory in the 1921 elections.\n\nAs Prime Minister, he attempted to reduce ethnic tensions, deal with immigration, and increase the dominion's autonomy within the Commonwealth. However, King's Liberals were defeated in the 1930 elections, as the Great Depression loomed and the economy suffered.\n\nHowever, the conservative government failed to address the crisis, and King was re-elected prime minister after only one term. He now has a second chance at success, and if he is to bring prosperity to Canada, he must seize it with both hands."
 CAN_R_B_Bennett_desc: "A self-made millionaire and commanding presence in any room, R. B. Bennett is a man who believes in the power of discipline, order, and enterprise. From the small town of Hopewell Hill to the highest office in Canada, his ascent has been marked by drive, intellect, and a firm belief in the virtues of hard work.\n\nNow, as Prime Minister during the darkest days of the Depression, those very beliefs are being put to the test. Bennett governs with the instincts of a businessman: methodical, stern, and reluctant to embrace sweeping social reform. Yet the scale of the crisis threatens to outpace his cautious approach. Criticized for his aloofness and seen by many as out of touch with the suffering of ordinary Canadians, he has begun to shift, tentatively, toward more interventionist policies.\n\nBut time may be running out. The people are growing restless, and the economy offers no mercy. In Bennett's Canada, resolve alone may no longer be enough."
 CAN_Vere_Ponsonby_desc: "A gentleman of the old order and a steady hand in uncertain times, Vere Ponsonby serves not to rule but to represent. As Governor General of Canada, he is the living embodiment of the Crown's dignity: aloof from politics, yet essential to the rituals of state.\n\nBorn into the British aristocracy, his experience as a soldier, businessman, and public servant has made him well-suited to the quiet responsibilities of constitutional guardianship. In a Canada wracked by economic despair, Ponsonby is no architect of policy, but his presence offers reassurance: of continuity, of stability, and of a link to the wider Empire. He listens carefully, speaks rarely, and rules never, but his signature marks every law, and his approval greets every Prime Minister.\n\nHe is a reminder that even in a modern world, tradition still stands watch."
 CHI_Chiang_Kai_Shek_desc: "Order, security, and protection: does one not desire these things in life?\n\nThe ability to sleep peacefully at night with one's door open, knowing that no one will break in? The freedom to conduct one‟s business ventures without fear of theft or arson? That is what everyone wants in life: to feel safe and secure, safe from the chaos and anarchy that breed terror and fear. Leaders should keep their citizens secure and safe, and they should be someone to look up to for salvation in the face of terror and evil that sweeps the land. Enter Chiang Kai-shek, a man of action who personifies everything citizens desire.\n\nChiang Kai-shek, a military man and one of the Kuomintang's rising powers, believes in the Three Principles of the People, but he understands that this benevolent and ambitious philosophy cannot be realised unless China is stabilised and under the political tutelage of the KMT. He is well aware that no other political organisation, not the Communists and their wretched supporters in the CCP, nor the Japanese and their ‘Xuantong Emperor,' is capable of realising Sun Zhongshan's vision for China. Only under KMT rule, excluding the Leftist wing, can China truly become what it should be.\n\nChiang, on the other hand, has his own issues to deal with. Many in the KMT, particularly Wang Jingwei and his Left-KMT, believe Chiang is merely a political exploiter who uses crises to his advantage. Not only that, but warlords still rule China, and the Communists and Japanese remain a threat, all of whom want to destroy China for their own reasons.\n\nChiang will either rule China or destroy it. It's as simple as that."
 CHI_Lin_Sen_desc: "Do you remember Pinocchio?\n\nIf you do, this story will sound familiar. A politician seeking independence because he must answer to a higher authority. He may appear to be free because he holds the so-called top position in the land, but he isn't. He is bound by strings that bind him to doing whatever he is told to do, or doing nothing at all.\n\nThat is Lin Sen.\n\nLin Sen, like Pinocchio, is a puppet controlled by his master, also known as the Generalissimo. Chiang wields so much power over Lin Sen that Lin Sen is merely a placeholder, a man occupying the position for Chiang so that no one can question his authority or decisions. After all, who can blame a general for acting on orders from his so-called ‘commanding officer'?\n\nHowever, he, like Pinocchio, desires freedom, to be free of all constraints. He may eventually be free of Chiang and able to pursue his true desires, but, unlike Pinocchio, his master is unwilling to let go of his strings..."
 CHI_Wang_Jingwei_desc: "There is an opportunity in every crisis, and China itself is in a state of crisis.\n\nThe Generalissimo rules China with an iron fist, and while this has its advantages, aggression is impractical when your opponent is stronger and more powerful than you. Chiang merely acts tough with the Japanese Empire, but he merely fuels tension that will consume him once it reaches a breaking point. Some, however, are willing to take advantage of Chiang's aggressive demeanour...\n\nEnter Wang Jingwei, a man close to the Generalissimo but opposed to his active aggression policy. Wang is a firm believer in appeasement. He is well aware that Chiang's stance would merely satisfy Japan's desire for war, and that only by caving to their demands, appeasing them and diplomatically negotiating with them, can China be saved.\n\nHowever, the true issue is whether this will result in China's salvation or her damnation..."
 CZE_Jan_Malypetr_desc: "Jan Malypetr is not a revolutionary, nor does he pretend to be one. A veteran of the agrarian movement and a quiet master of parliamentary arithmetic, Malypetr governs with the patience of a farmer and the caution of a man who knows how fragile democracy truly is.\n\nAs Prime Minister of Czechoslovakia, Malypetr walks a political tightrope, balancing the demands of rival parties, rising social tensions, and the looming specter of extremism both at home and abroad. His strength lies not in charisma, but in consensus; not in bold vision, but in maintaining what Masaryk built.\n\nYet as Europe grows darker by the day, Malypetr's measured style invites criticism. Some see him as too soft to face the fascist menace, too indecisive to confront internal divisions, and too rooted in the past to chart a future."
 CZE_Tomas_Masaryk_desc: "Philosopher and father of the Czechoslovak Republic, Tomáš Garrigue Masaryk stands apart from the militarists and strongmen of Europe. A moralist in politics and a democrat by conviction, Masaryk built a nation not through conquest or ideology, but through ideas - the idea that liberty, education, and national self-determination could form the pillars of a modern state.\n\nA former professor and a fierce critic of both Austro-Hungarian despotism and Bolshevik extremism, Masaryk shaped Czechoslovakia into a rare beacon of parliamentary democracy in a continent sliding toward darkness. He governs not by force, but by example, earning the reverence of his people and the cautious respect of his rivals. Now in his twilight years, Masaryk watches Europe with concern. Fascism spreads, borders are redrawn in smoke and steel, and old empires stir once more. Whether Czechoslovakia can survive in such a world is uncertain.\n\nBut so long as Masaryk draws breath, the republic will stand for something greater than fear. It will stand for hope, reason, and the belief that a nation can be decent and free."
 DEN_Christian_X_desc: "Mounted on horseback through the streets of Copenhagen, King Christian X is more than a ceremonial figure: he is the face of Danish unity in uncertain times. Stern in bearing and conservative in temperament, the King sees himself as a defender of tradition, even as the tides of democracy and social reform steadily reshape his kingdom.\n\nThough bound by the limits of constitutional monarchy, Christian has not shied from testing those boundaries when he deems the nation's integrity at stake. His relationship with parliament is often uneasy - his sense of royal duty, uncompromising. To him, the crown is not a relic, but a trust passed down through generations, a sacred link between monarch and people.\n\nIn an age of upheaval and radicalism, Christian X offers the Danes something older: stability, sobriety, and a quiet, unyielding patriotism."
 DEN_Thorvald_Stauning_desc: "Calm in voice, rugged in appearance, and steadfast in purpose, Thorvald Stauning is a man who speaks not to inflame the masses, but to uplift them. A former cigar maker and trade unionist, he rose through the ranks not by revolution, but by reason, seeking always to temper class struggle with cooperation and common sense.\n\nStauning's vision is not of barricades and manifestos, but of a Denmark where worker and employer can share in stability and prosperity. With the world mired in depression and extremist ideologies gaining ground abroad, he offers a third path: a social democracy rooted in compromise, civic peace, and state responsibility.\n\nThough some dismiss him as too moderate for a socialist, others see in Stauning the quiet architect of a new kind of nation. One where security is not a privilege, but a right, and where progress marches hand in hand with democracy."
 ENG_Edward_VIII_desc: "Born to rule, but never quite ready to lead, Edward VIII embodies a crown in conflict with itself. Charismatic, fashionable, and adored by the press, Edward captured the public imagination long before he ever wore the crown. Yet behind the charm lies a man often at odds with the solemnity of his office: restless, impulsive, and deeply skeptical of the traditions that define monarchy.\n\nTo his supporters, Edward represents a modern monarchy, one unafraid to challenge outdated conventions and speak plainly in a time of uncertainty. To his critics, he is dangerously unmoored: politically naive, overly sympathetic to authoritarian regimes on the continent, and far too willing to blur the lines between sovereign and statesman.\n\nThe throne grants him a platform, but not immunity from consequence. In the balance hangs not just a king, but the fate of the nation he was never meant to lead."
 ENG_George_VI_desc: "A sportsman, a pilot, a naval officer, and a business enthusiast, but never a king. George was born fourth in line to the throne, after his grandfather, father, and older brother, Edward, who was only a year older. This created the illusion that George would never be the heir to the British Crown, giving him far more time to devote to his future subjects than would otherwise be possible.\n\nThe new Duke of York's naval involvement allowed him to take part in the Battle of Jutland during the Great War, and he was also the first member of the British Royal Family to qualify as a Royal Air Force pilot. However, after the war, George's primary concern shifted to British industrial welfare, and his frequent visits to factories earned him the moniker ‘Industrial Prince.'\n\nIn contrast to his much more glamorous and extroverted brother, Edward, the Duke of York completed his duties quietly and efficiently, despite having a stutter that caused him to dread public speaking.\n\nThe Monarchy had entered uncharted territory with Edward VIII's abdication, which came as a shock to George, who had little experience with politics. Many questioned the new King, seeing him as nothing more than an interloper to the ever-popular Edward VIII.\n\nInexperienced, unpopular, and with the Monarchy still reeling from the abdication crisis, how will George VI restore the British Empire's glory?"
 ENG_George_V_desc: "After his father died in 1910, George Frederick Ernest Albert, or George V, ascended the British throne as King of the United Kingdom and the British Dominions, as well as Emperor of India.\n\nWithin his realm, he has witnessed the rise of the first mass mobilised widespread political movements: socialism, communism, fascism, Irish republicanism, and the Indian independence movement, but on the outside, he has also witnessed the fall of his first cousins Nicholas II of Russia and Wilhelm II of Germany's empires. He has presided over the empire his forefathers left him and guided the British Empire to its greatest effective extent, avoiding the unenviable fate of his relatives.\n\nWhile Europe slowly and steadily sinks into economic depressions and becomes a target for extremist movements, the British Monarch nears the end of his life, growing older and suffering from smoking-related health problems. The British economy and political landscape are in disarray as a result of the Great Depression and its aftermath, and the natives of the British colonies' call for independence grows stronger. The King must steel his resolve and guide his people through, if not for himself, then for the legacy of a now-wilting empire."
 ENG_Harry_Pollitt_desc: "Harry Pollitt is a man who never abandoned the cause of the working class, even as the world reshaped itself in blood and betrayal. Born in a Lancashire slum and forged in the heat of labor struggles, Pollitt rose through the ranks of Britain's trade union movement before becoming the face of British communism. As General Secretary of the Communist Party of Great Britain, he commands the loyalty of dockers, miners, and millworkers, offering them not vague reform but a total transformation of society.\n\nTo Pollitt, capitalism is not just unjust, it is doomed. Fascism is its final, violent stage, and the only path forward lies through international solidarity, proletarian revolution, and unwavering commitment to Marxist-Leninist principles. Critics call him a puppet of Moscow, a traitor to Britain, and a dreamer clinging to foreign ideals. But Pollitt sees himself as a realist in an age of collapsing empires, and he knows that history never favors the timid.\n\nIf the red flag ever rises over Westminster, it will not be through speeches or ballots alone, but through struggle. And Harry Pollitt will be there, standing at the front of the line."
 ENG_Lord_Halifax_desc: "To some, he is the last true English statesman: aristocratic, pious, and steady in a world gone mad. Edward Wood, the 1st Earl of Halifax, is a relic of a different age. An age of empire, scripture, and quiet power. Born into nobility, Halifax carries himself with a calm, deliberate dignity. But beneath the formal manner lies a man deeply concerned with preserving order at almost any cost.\n\nHalifax is one of the chief architects of appeasement, believing that peace with Hitler can be negotiated through reason and restraint. He sees the rise of fascism not as an existential threat, but as a regrettable consequence of Versailles and Bolshevik chaos. Halifax does not crave power, nor does he possess the populist fire of Mosley. But in moments of crisis, his kind often find themselves handed the reins, not because they are bold, but because they are familiar. In a Britain desperate for continuity, that may be enough.\n\nThe question is whether the old ways can still hold back the new darkness, or whether Halifax, in trying to preserve peace, will only delay the inevitable reckoning."
 ENG_Oswald_Mosley_desc: "He once strode through the halls of Westminster as a rising star of Britain's political class - eloquent, ambitious, and impossible to ignore. But Oswald Mosley is no longer a man of Parliament. He is now a man of uniforms, banners, and marching boots. Disillusioned by what he saw as the cowardice and corruption of democratic politics, Mosley broke ranks from both Conservatives and Labour and founded the British Union of Fascists, promising national rebirth through discipline, unity, and authoritarian rule.\n\nTo his supporters, Mosley is Britain's answer to Mussolini: a dynamic visionary who will sweep away the decaying old order and restore pride to the nation. To his enemies, he is a dangerous demagogue, seduced by continental fascism and all too eager to trade liberty for spectacle and control. His open admiration for Hitler and alignment with anti-Semitic elements have drawn sharp condemnation, even as his rallies grow in size and his Blackshirts grow bolder. He offers order and purpose, but at the cost of freedom, pluralism, and peace.\n\nThe question is no longer whether Mosley can lead. The question is what kind of Britain will emerge now that he does."
 ENG_Ramsay_MacDonald_desc: "If there was a man, a politician, to represent British socialists, James Ramsay MacDonald would be an obvious choice.\n\nMacDonald was born on October 12, 1866, in Lossiemouth, Scotland, the illegitimate son of poor Scottish parents. He was born in the right place and at the right time to embrace Marxist ideals. At the tender age of nineteen, he joined the Social Democratic Federation, and later the Bristol Socialist Society, which would prove beneficial to his immediate and long-term political success in London.\n\nIn 1900, this led to him joining the Labour Representation Committee, followed by his acquisition of the position of chairman of the Labour Party in 1911. Macdonald was able to secure the position of Prime Minister in the election of 1923 and he hasn't left the political sphere since.\n\nMacDonald was only Prime Minister for a short and uneventful ten months before Stanley Baldwin reclaimed the position in November, 1924. In the meantime, however, support for the Labour Party grew, and MacDonald reclaimed the position of Prime Minister in 1931.\n\nRamsey MacDonald's leadership is under threat from the Tories, who are closing in on reclaiming control of Parliament."
 ENG_Stanley_Baldwin_desc: "A man born into a wealthy family will have an abundance of opportunities throughout his life. When it comes to Stanley Baldwin, there is little change from this statement.\n\nBaldwin was a fitting image for a man involved in politics, but he spent the majority of his life outside the halls of the House of Commons. He has industrial experience, and, like any good politician, he served in the army but never saw combat.\n\nBecause becoming an MP was not a high enough aim for him at his age, Baldwin quickly rose through the ranks of both government and party. Tragedy in the Tories created an opening for Baldwin, who became Prime Minister in 1923 and again in 1924. His tenure lasted until 1929, when the Labour Party won the elections and forced Baldwin into opposition.\n\nUnfortunately for his successor, Baldwin became Lord President of the Council and re-emerged as a candidate for Prime Minister. Baldwin accomplished this goal by clawing his way back to the top, and he now sees global turmoil developing. Worse are the domestic issues, primarily economic problems, throughout the United Kingdom and the rise of extremist factions on the Isles. Finally, the King's failing health threatens a royal succession, but Baldwin has little time to be concerned about this.\n\nWith King George on the verge of death, only time will tell how his son's accession will affect Baldwin's and Britain's path."
 ENG_Winston_Churchill_1935_desc: "The Dardanelles Campaign and the subsequent deaths of 250,000 men have haunted the people of the British Isles in the years since the Great War, serving as a reminder of the folly of war and the value of life. No one has been haunted by these memories more than the campaign's main sponsor, Winston Churchill. However, it appears that his nightmare is coming to an end, as he has been appointed Prime Minister, succeeding Ramsay MacDonald as the leader of the British government.\n\nChurchill, a popular and promising politician with a penchant for the unconventional, found himself in a political wilderness. He had a small chance to revitalise his career as Chancellor of the Exchequer in Stanley Baldwin's Conservative government, but after several mistakes that contributed to the country's current economic crisis and a Labour victory in the subsequent general election, that opportunity blew past him.\n\nNow considered damaged goods, he decided to devote himself to literature and speeches, thereby remaining politically relevant. During this time, he made it clear that he supported military rearmament and that he wanted the government to stand firm against any aggression. These were bold opinions that earned him much-needed support in Parliament.\n\nMany people were surprised by Churchill's appointment, despite his slightly improved political standing, but he has no time to waste. Churchill will need to act quickly to secure his precarious political position and usher in the slew of changes he has so vehemently advocated — a daunting task for someone with such a poor track record."
 ENG_Winston_Churchill_desc: "War. It has gripped the world once more, and the United Kingdom was unprepared. Because of their lack of preparation, they are now in a perilous position, with much of Europe already in the hands of fascism.\n\nThis was not necessary. The appeasement policy was a mistake because it only demonstrated weakness while doing nothing to satisfy the revisionist powers' appetite for land, and in the end, it didn't matter because war still arrived. To have a fighting chance, everyone must put in a massive effort to get every part of the country in shape. To kickstart this effort, a new leadership was needed, and it had to be someone who could inspire the British people and ingrain in them a never-say-die spirit.\n\nWinston Churchill provided that new leadership.\n\nChurchill was a war correspondent who wrote about his experiences while serving in the army as a young man. After that, he became a politician, serving in both Conservative and Liberal governments. Churchill was not popular among his fellow Tories prior to his appointment as Prime Minister due to his defiant nature, but public support and aggressive anti-German rhetoric propelled him into 10 Downing Street.\n\nAs Churchill assumes command, the fate of Britain and the world's democracies hangs in the balance. Will his unwavering determination and \"bulldog\" spirit be enough to stem the tide of fascism, or will it fall short, allowing the sun to finally set on the British Empire?"
 EST_Konstantin_Pats_desc: "A lawyer, publisher, and statesman, Konstantin Päts is one of the principal architects of the Estonian Republic, and now, one of its chief protectors. A veteran of independence and a skilled political operator, Päts views the democratic institutions he helped build with a mixture of pride and growing concern.\n\nAs economic hardship and extremist movements take root, he fears that open politics may become a gateway not to freedom, but to ruin. Though outwardly a supporter of parliamentary rule, Päts sees himself above party squabbles, a proponent of national continuity rather than shifting majorities. He believes in stability, order, and cautious reform - values that may soon place him on a collision course with democracy itself.\n\nTo save Estonia, Päts may decide that the people must be shielded from their own choices."
 ETH_Haile_Selassie_desc: "Widely acknowledged as the Emperor of Ethiopia, and celebrated by Rastafarians as the savior of the African Race, Haile Selassie's ideological perspectives propelled Ethiopia towards a promising era of modernization.\n\nTafari rose through the ranks to become governor of Sidamo, and later of Harer province, embracing many progressive ideas along the way. Following Emperor Haile Selassie death, his grandson Lij Yasu ascended to the throne. Following his deposition, Empress Zauditu ascended to the throne, appointing Tafari as regent and heir apparent.\n\nTafari assumed the throne in 1928, taking the name Haile Selassie after the death of Empress Zauditu in 1930, eventually becoming Emperor. In 1931, he drafted a new constitution that limited the powers of Parliament. Throughout the late 1920s, Haile Selassie seized control of the Ethiopian government, enacting policies with many progressive elements.\n\nThree years into his imperial reign, Haile Selassie aims to push Ethiopia even further towards modernity and integration with the rest of the world. However, enemies lurking beyond the country's borders pose significant threats."
 ETH_Tafari_Makonnen_desc: "Widely acknowledged as the Emperor of Ethiopia, and celebrated by Rastafarians as the savior of the African Race, Haile Selassie's ideological perspectives propelled Ethiopia towards a promising era of modernization.\n\nTafari rose through the ranks to become governor of Sidamo, and later of Harer province, embracing many progressive ideas along the way. Following Emperor Haile Selassie death, his grandson Lij Yasu ascended to the throne. Following his deposition, Empress Zauditu ascended to the throne, appointing Tafari as regent and heir apparent.\n\nTafari assumed the throne in 1928, taking the name Haile Selassie after the death of Empress Zauditu in 1930, eventually becoming Emperor. In 1931, he drafted a new constitution that limited the powers of Parliament. Throughout the late 1920s, Haile Selassie seized control of the Ethiopian government, enacting policies with many progressive elements.\n\nThree years into his imperial reign, Haile Selassie aims to push Ethiopia even further towards modernity and integration with the rest of the world. However, enemies lurking beyond the country's borders pose significant threats."
 FIN_Carl_Gustaf_Emil_Mannerheim_desc: "Carl Gustaf Emil Mannerheim born 4th of June 1867 was a Finnish military leader born of a German-Swedish noble family, nevertheless he was no less loyal to Finland than any other man that could trace his heritage in Finland for hundreds of years. He was a key figure in the great struggle for the existence of Finland as a self-determined state born of the dying Russian Empire and defender of democratic, republican ideals in spite of the Bolshevik revolution.\n\nMannerheim was, as a young man, trained extensively in the art of warfare on horseback, in fact throughout most of his military record in the Imperial Army he fought with and lead cavalry corps, from being part of the Chevalier Guard Regiment to commanding the Guards Cavalry Brigade; Not only was he highly capable in warfare he also had extensive knowledge and experience in on-the-field intelligence-gathering and espionage after several spent in Asia undercover for the Russian government.\nThe true test of his mettle and abilities came in 1918 with the Bolshevik revolution of Russia spreading itself in the newly formed independent state of Finland, where he didn't only fight the Finnish Red Guard but also remnants of the Russian Imperial Army. Despite the initial situation of advantage for the red guard Mannerheim managed to weather it through his tactical prowess and help from the German Empire. At the end of the day, following months of bloody fighting, the war was over and Mannerheim stood victorious.\n\nDuring the inter-war years, Mannerheim did not assume any political office and did not join any political parties. Although he had his sympathies for the right-wing and did not truly believe in democracy he pursued a policy of nonpartisan often trying to reconcile the right and left-wing in order to face adversities as one nation, united.\nThis policy has borne its fruits as the public opinion of him shifted into that of a uniter and a truly neutral party amongst the bickering of the political parties and as of 1933, he became the Field Marshal of Finland. As the Red Bear rises in the East and the Black Eagle in South Finland's position seems more precarious than ever and it is no doubt that Mannerheim will fill a central role in what is to be this nation's future."
 FIN_Kyosti_Kallio_desc: "Time. It is a linear concept. Always in one direction, never changing, never being changed. So one must use it wisely, or else they will have lived a life unfulfilled.\nNot this man. Not Kyösti Kallio.\nBorn to a small family in the Duchy of Finland, this man would eventually become something more than a simple citizen, more than a politician. Instead, he would become a symbol. To the Finnish people.\nKallio would find himself in a perilous situation following the liberation of the country from Provisional Rule. Mainly, where would the country go? Would it become a socialist den of debauchery? Or would it thrive in the flames of war?\nKallio, while a member of the agrarian league, saw the destruction the Reds had done, and instead decided to use the law to suppress these maniacs. \nYet he wasn't just a man of the law, for he was able to be president multiple times in the '20s, managing to steer the country towards a more prosperous path.\nKallio has shown us that time can be used more efficiently, achieving many things in such a small amount of time.\nTime may be linear, but it is certainly not uneventful."
 FIN_Pehr_Evind_Svinhufvud_desc: "Few men alive can claim to have shaped a nation with both pen and pistol, but Pehr Evind Svinhufvud is one of them. A former judge turned revolutionary statesman, he stood at the helm of Finland's declaration of independence in 1917 and became the unflinching face of Finnish sovereignty through civil war, foreign pressure, and political chaos.\n\nNow elected president, the aging but still formidable Svinhufvud presides over a fragile democracy scarred by ideological division. A staunch conservative, monarchist by instinct, and deeply anti-communist, he views Bolshevism as an existential threat and is unafraid to wield authority in its suppression. Yet despite his stern image, he remains deeply committed to legal order and the defense of constitutional government.\n\nTo some, he is a relic, a rigid patriarch from an earlier time. To others, he is the nation incarnate: austere, principled, and unyielding. In these uncertain years, Svinhufvud offers what Finland craves most: stability through strength."
 FIN_Risto_Ryti_desc: "Finance, and politics. Now normally, those two things should not mix, since the times that happened resulted in less than savory results. Corruption, nepotism, and manipulation of the government to suit one's needs. However, when the two mix in just the right way, they can produce some spectacular results.\nEnter Risto Ryti. A man who was more than a hideaway during the Independence War, he was able to rise through the government. Yet this was not because of connections, or by his political knowledge, but rather, but his acumen in finance and economics. When he was 23, he was appointed as finance minister under Juho Vennola, managing the economy with precision and efficiency.\nNothing would trump that until he became the governor of the national bank. \nThis one appointment would be his moment.\nHe managed to get the country running after Black Monday, stabilizing the economy and showing the world that Finland was not the backwater it was seen to be. Let this man be an example to all of us of the true strength of the Finnish people, and that we are not the backwater we once were!"
 FIN_Toivo_Mikael_Kivimaki_desc: "In a republic still haunted by civil war and threatened by extremism, Toivo Mikael Kivimäki stands as a quiet defender of parliamentary order. A jurist and scholar by training, Kivimäki is no fiery orator nor strongman, but he brings to the premiership a steely resolve wrapped in calm technocratic confidence.\n\nTasked with steering Finland away from the chaos that culminated in the Mäntsälä Rebellion, he favors careful negotiation over confrontation, and moderation over dogma. Though aligned with the conservative camp, Kivimäki is wary of the reactionary right and unflinching in his opposition to both radicalism and populist militarism. His government is built on fragile coalitions and hard compromises, reflecting the careful balance Finland must maintain to survive.\n\nIn an era where louder voices dominate headlines, Kivimäki's strength lies in discretion, legality, and administrative skill. Whether that will be enough to shield the republic from the storms ahead is yet to be seen."
 FRA_Albert_Lebrun_desc: "Albert Lebrun emerged from the chaos of the Third French Republic as a man of balance.\n\nThe French financial and economic situation had never been worse, resulting in unaffordable strikes and civil defiance among the French people during and immediately after the Great War. Within the Third Republic's fractured and fragile internal politics, a clear division had begun to form amid the turbulence.\n\nThe Radical Socialist party tightened its iron grip on the Republic, while the Bloc Nationals hoped to establish their control, while other factions such as the Anarchists and Monarchists carved out their own spheres of influence. In such a volatile political environment, any attempt to unite the various parties under one man could spark a civil war.\n\nLebrun's rise to power was based on his ability to keep the delicate French status quo intact. His election as a moderate conservative was largely a compromise to France's various factions, and his centrist political stance allowed him to appease members of both the Left and the Right. In France, he is acting as both a mediator and a symbol of unity.\n\nBut, as the French political parties begin to drift apart again, and an inevitable conflict looms on Europe's horizon, Lebrun is faced with a dilemma. Can Lebrun truly mend the Republic's schisms, or will France descend into another revolution?"
 FRA_Albert_Sarraut_desc: "Albert Sarraut has enjoyed a long ministerial career. Born 1872 in Bordeaux, he graduated from law school and became a radical-socialist deputy. He was particularly involved in the management of the French colonies. Twice Governor General of Indochina, then Minister of Colonies, he is one of the main inspirers of colonial policy.\n\nHis two terms at the head of French Indochina were marked by a desire to introduce more elements of democracy into the colonial system, notably by giving a greater role to the indigenous elites. He reformed the administration, developed the education system in Indochina and gave Indochinese more opportunities to join the civil service.\n\nNow that he is leading France, rather than one of her colonies, Sarraut must put what he learned in the colonies to use and begin transforming France into a better democracy."
 FRA_Charles_Maurras_desc: "A poet of order, a philosopher of hierarchy, and an enemy of the Republic in both word and deed. Charles Maurras dreams not of the France that is, but of the France that was. As chief theorist of Action Francaise, he preaches a doctrine of integral nationalism: monarchist, Catholic, and unapologetically anti-democratic. To Maurras, the Republic is not a compromise, it is a mistake. It breeds disorder, invites foreign influence, and abandons France's spiritual essence in favor of liberal decadence.\n\nHis writings rail against Jews, Freemasons, Protestants, and foreigners. His ideology is not fascist in the Italian sense, but it shares its authoritarian soul and loathing of modernity. Though never a man of mass politics, Maurras has shaped the minds of soldiers, students, and statesmen. His ideas echo in the chambers of Vichy, and his pen has inspired more than one sword to be drawn against the Republic.\n\nIn a France searching for stability, Maurras offers roots, deep, ancient, and uncompromising. But whether those roots nourish or poison the nation depends on what grows from them: a revival of French greatness, or a grave dug in the name of tradition."
 FRA_Edouard_Daladier_desc: "There will come a time in a man's life when he must make decisions that will make or break everything. The current French Prime Minister, Édouard Daladier, appears to be approaching a ‘make or break' moment.\n\nDaladier was born on June 18th, 1884, in Vaucluse, the son of a village baker. He was educated at Lyon's Lycée Duparc, where he was first exposed to socialist politics. He joined the French Army as a sergeant at the start of the Great War. He fought in the Battle of Verdun in 1916, earning a field commission as a Lieutenant and multiple medals, including the Legion of Honor. His large stature and bravery in the face of danger earned him the moniker ‘Bull of Vaucluse.'\n\nHe became a leading member of the Radical-Socialist Party after entering the Chamber of Deputies as the representative for Vaucluse, leading it since 1920 and elevating it to the status of France's most notable left-wing party. The numerous attempts to form a broad republican-left front on which France could run finally paid off on December 18th, 1932, with the formation of the said coalition.\n\nHis rise, however, has not been without setbacks. The rise of the French Far Right and Far-Right leagues has been a thorn in his side, with their populist rhetoric attracting increasing support. If they gain significant power, they may be able to bring down the Republic as a whole, with the Army siding with these thuggish anti-republicans.\n\nDaladier stands as a bulwark of Republicanism in the face of rising reactionary fury. Will he stand firm, or will the Tricolore be ripped from its pole once more?"
 FRA_Joseph_Paul_Boncour_desc: "Augustin Alfred Joseph Paul-Boncour is well-known in French politics, owing to the numerous positions he has held in government throughout his life, including Minister of War and Foreign Minister in 1932. Now having been appointed as the Prime Minister of France only a year ago, he is facing his most difficult challenge yet.\n\nBoncour is well-known for his socialist beliefs, involvement in labour movements, and organisation of the Bourses du Travail's legal council. He eventually joined the French Section of the Workers' International, which he would end up leaving, as his moderate and reformist stance differed from that of the party. After his departure from the party, Boncour's political career shifted to the French Socialist Party and he would end up joining the newly formed Socialist Republican Union in 1935.\n\nBoncour was elected to the Senate in 1931, served as a Permanent Delegate to the League of Nations in 1932, as Minister of War in 1932, and as Foreign Minister in 1932. In times of political crisis, appointing someone with as much political experience as Joseph Paul-Boncour as Prime Minister seems only natural. His position, however, is becoming increasingly unstable as new challenges emerge, such as the ongoing economic crisis and internal party divisions."
 FRA_Leon_Blum_desc: "Léon Blum, a man who does not waver in the face of adversity and who stands firm for his true beliefs, has persevered through difficult times and led the socialists of France to greatness. Unlike many other modern leaders, Blum's youth was focused on law and literacy rather than politics.\n\nBlum had been deeply affected by the Dreyfus Affair, and it was his campaign as a Dreyfusard that brought him into contact with socialist leader Jean Jaurés, who inspired Blum to join the French Section of the Worker's International. Blum witnessed the appalling state of France's internal politics, where rival factions divided the country.\n\nThe assassination of Jaurés in 1914 shook the SFIO to its core, but the October Revolution further splintered the party. While Blum worked hard to unite both supporters and opponents of the Soviet Regime, an internal schism was already visible, leading to the party's split. The Leninists created French Communist Party, and the SFIC and the SFIO remained held together in the hands of Blum.\n\nAs a result of Hitler's rise to power increasing support for fascism, Stalin encouraged a coalition between the SFIC and the SFIO, forming the Popular Front. The Front won a landslide victory in an economically depressed France, but Blum's victory within a divided nation alienated many.\n\nCan Blum, now Prime Minister, successfully bring France's fractured people back together?"
 FRA_Marceau_Pivert_desc: "A teacher turned firebrand, Marceau Pivert emerged as the uncompromising voice of the SFIO's radical wing, urging the left not to stop at reforms, but to push forward toward true socialism. While Blum hesitated and struck cautious compromises, Pivert demanded action: nationalizations, workers' control, and a permanent break with capitalist power.\n\nAn ardent internationalist and anti-fascist, Pivert condemns appeasement and fascist sympathies in all their forms, whether they come wrapped in royalist banners or bureaucratic inaction. But his intransigence has left him politically isolated, even within the left. Derided as naive by centrists and denounced as divisive by communists, Pivert's vision often remains just out of reach: too idealistic for power, too principled for compromise.\n\nYet should France stand at a crossroads once more, between fear and hope, order and justice, Pivert will be there with his answer: not retreat, but revolution."
 FRA_Marcel_Bucard_desc: "Medals on his chest, fire in his speeches, and a cross on his lapel. Marcel Bucard presents himself as France's last bulwark against Marxism, freemasonry, and moral decay. A decorated veteran of the Great War, Bucard returned from the trenches disillusioned with parliamentary squabbling and liberal compromise. What he found instead was inspiration in the iron discipline of Italian fascism. Founding the Mouvement Franciste with the open support of Mussolini, Bucard offered a vision of France renewed: Catholic, corporatist, authoritarian, and purged of subversive elements.\n\nBucard's Francistes are known for their black uniforms, paramilitary marches, and violent rhetoric. To his supporters, Bucard is a patriot betrayed by a Republic too weak to defend itself, a man of faith, order, and sacrifice. To his enemies, he is little more than a puppet of Rome and Berlin, a political thug wrapped in clerical robes and fascist slogans.\n\nWhen France descends into chaos or civil strife, men like Bucard do not hesitate to seize the moment. And if they do, they will claim that they are saving France, even as they bury the Republic beneath the tricolor and the cross."
 FRA_Pierre_Etienne_Flandin_desc: "During the Great War, Pierre-Étienne Flandin, a leader of the liberal right and the head of the Alliance Démocratique, was a military pilot. His political career took off in the early 1930s, when he served as Minister of Trade and Industry in the Tardieu cabinets of 1930, Minister of Finance in the Laval cabinets of 1931-1932, and Minister of Trade and Industry again in the Tardieu cabinets of 1932. He joined the Alliance Démocratique in 1914 and rose to become its leader in 1933.\n\nAs Minister of Commerce, he represented France at the economic conferences of the League of Nations and the Geneva Assembly. As Finance Minister, he had to deal with the banking crisis affecting the French economy. By bailing out the Banque Nationale de Crédit, he avoided a crash that would have plunged France into the same difficulties that eventually forced Belgium, England and even the United States to devalue their currencies.\n\nHowever, with the German threat on the horizon, Flandin has adopted a defeatist stance. In his eyes, it may be necessary to abandon Central Europe to Germany and fall back to the territories of the French Empire."
 FRA_Pierre_Laval_desc: "\"I defy anyone - and I have said this to the Germans - to build a solid, articulated, and viable Europe without France's consent.\"\n\nA socialist early in his life, Laval became a lawyer in 1909 and was famous for his defence of strikers, trade unionists and leftists from government prosecution. In 1914, he was elected to the Chamber of Deputies as a member of the SFIO, and he remained committed to his pacifist convictions during the Great War. After his defeat in the 1919 election, Laval left the party and distanced himself from the left.\n\nIn 1924 he returned to the Chamber as an independent, and was elected to the Senate three years later. In the following years he held a series of governmental positions, including Minister of Public Works, Minister of Justice and Minister of Labour. In 1931, Laval became Prime Minister, but his government fell only a year later.\n\nAlthough he is now right-wing and anti-communist, Laval maintains his pacifist stance and will go to any length to protect France and her territories."
 GER_Adolf_Hitler_Deputy_desc: "‘Sic Parvis Magna.' Do you understand what it means? It's Latin for ‘Greatness from humble beginnings.' It means that anyone, even at the bottom of the social ladder, can achieve anything they set their minds to. One such man is Adolf Hitler.\n\nHitler was a nobody before Hindenburg appointed him to one of the highest positions in the country. He was a small-time failed artist in Vienna who was rejected from every art school in Austria, which they attributed to his ‘lack of artistic expression' and seeing his works as nothing more than ‘detailed architect concepts.' This was regardless of the fact that his education was abysmal, and his father frequently used corporal punishment to punish him for his failures. However, opportunities arise in times of crisis, and opportunities did arise.\n\nWhile selling art on the streets, Hitler would often observe from a distance anti-Semitic groups giving speeches in Vienna, analysing their rhetoric and ingenious use of language and speech to captivate an audience, as well as adapting their philosophies to please the crowds.\n\nWhen the Weltkrieg began, Hitler travelled to Germany and enlisted as a Heer soldier. There, he made internal connections, and after the war, he found his ideal opportunity: the chance to convert shame into anger and defeatism into nationalism.\n\nYear after year, he consolidated his power within the collapsing Weimar Republic, establishing connections from all political parties, from Junkers to military officers to ordinary citizens.\n\nOne of these connections was Hindenburg, who was backed into a corner and reluctantly appointed Hitler to combat the rising tide of Leftism. Hindenburg, unlike Hitler, is a diminished, frail man. His days are numbered, and when Hindenburg dies, Hitler will be in complete control.\n\nThe question is, what does Germany's future hold?"
 GER_Adolf_Hitler_desc: "Ein Volk, ein Reich, ein Führer: If you would have walked down the streets of Berlin during Hitler’s appointment to the Chancellorship, the slogan plastered to every poster would be as familiar as a children's rhyme. However, the title of Führer means much more than just “leader.” It is given to someone who embodies the heart and soul of the German nation, and that person is none other than Adolf Hitler - a man who, long before reaching high office, openly preached his totalitarian vision for Germany.\n\nBefore Hindenburg appointed him to the highest office in the country, he was a nobody. And without the changed conditions of a lost war, a revolution, and a pervasive sense of national humiliation, he would have stayed a nobody. But the failed artist from Vienna turned fringe politician took every opportunity that he could. In the Beer Hall Putsch he believed that he could force the government to give him power, as Mussolini did in Rome. He was mistaken, but he was now known, and while incarcerated he realized that the only way to power was through the democratic system itself - a system he repeatedly vowed to dismantle once it no longer served him.\n\nHis popularity among the far right grew even greater after his arrest and release. He made connections, delivered speeches, gave a voice to phobias, prejudice, and resentment as no one else could, and waited for his chance to make a comeback. In these years he spoke openly of tearing up the Versailles restrictions, rebuilding Germany’s military strength in defiance of international law, and reshaping society along rigid racial lines that targeted Jews and other minorities. To many, such rhetoric marked him as little more than a raving madman. As the Weimer government struggled to keep the country afloat after the global economy crashed, Hitler ran against Hindenburg in the 1932 German elections, but failed. But at the end of the day, Hindenburg appointed him to the Chancellorship anyway, giving the Nazi Party what they desperately sought after.\n\nAs Paul von Hindenburg breaths his last breath, Hitler’s legal charades combined the office of Chancellor with the office of President, giving him the title of Führer and Reichskanzler. Now, the Führer stands, on what he believes, is the verge of greatness. With the power of the entire government on his side, and the world seemingly in the palm of his hands, he presents himself as the architect of a new order, one defined by ideological purity, and the suppression of all those he deems unworthy of belonging to the German nation. The German people have long waited for what they deserve, and the world can do nothing but watch.\n\n"
 GER_Albert_Speer_desc: "Efficiency, discipline, and modernity. Albert Speer offers the facade of rational order amidst the chaos of the Reich. An architect by training, Speer rose rapidly through the ranks thanks to personal charm and an uncanny ability to win Hitler's trust. As Minister of Armaments and War Production, he transformed Germany's wartime economy, streamlining logistics and centralizing control to keep weapons and machinery flowing.\n\nUnlike many of his peers, Speer avoids grandstanding and ideological dogma. He presents himself as apolitical, focused solely on results. But this supposed detachment conceals deep complicity. His reforms were built on forced labor, his factories fueled by suffering, and his efficiency serves the machinery of total war. To some, he represents the possibility of a more rational, technocratic Germany. To others, he is a dangerously ambitious operator - too willing to dissociate himself from the ideology he ultimately serves.\n\nAlbert Speer may not wear a uniform or raise his voice, but in conference rooms and ledgers, he is shaping the Reich's future with quiet, calculating precision."
 GER_Alfred_Hugenberg_desc: "Old power does not die quietly: it negotiates, publishes, and plots. Alfred Hugenberg, a titan of industry and press, is not a creature of the revolution, but of the empire. A monarchist at heart and a nationalist by design, Hugenberg represents the conservative elite that once ruled Germany with boardroom deals and editorials rather than rallies and uniforms.\n\nThrough his vast media empire, he shaped public opinion for decades, dreaming of a Germany restored to order, hierarchy, and imperial grandeur. A founding member of the DNVP, Hugenberg believes he can harness the Nazi movement for his own ends, clinging to influence as a representative of the old guard, a bridge between Germany's imperial past and its radical present. He commands loyalty among traditional conservatives, industrialists, and media networks that long predate the NSDAP. His vision for Germany is authoritarian, capitalist, and nationalist, but not revolutionary. He fears the chaos of the masses as much as he despises socialism.\n\nTo some, Hugenberg offers stability and a return to respectable authoritarianism. To others, he is a spent force. A man of yesterday, tolerated only so long as he remains useful."
 GER_Ernst_Rohm_desc: "Ernst Röhm, a violent, aggressive, and cruel man, has been through a great deal. Adolf Hitler's onetime close friend, Röhm, led the Sturmabteilung until he became disillusioned with his old friend and his decisions. Röhm then deposed Hitler and is currently in charge of a new Germany.\n\nRöhm had a successful military career earlier in his life, earning a medal for his service during the Great War. He was a frontline soldier before being injured and forced to become an officer. Five years after the war, Röhm retired from the army and joined the NSDAP.\n\nLater, Röhm became dissatisfied with the party leaders' refusal to accept his proposals for a legal alternative to the SA, which was outlawed. Röhm then resigned, left Germany, and joined the Bolivian army as an advisor. However, the ban was lifted a few years later. At Hitler's request, Röhm returned to lead the Sturmabteilung and put his radical ideas into action.\n\nAfter Hitler took complete control of Germany and the SA suppressed all opposition, Röhm and much of his militia advocated for a ‘Second' revolution that would benefit the working class and fight capitalism.\n\nThis Second Revolution has come to pass. Hitler and his cronies have been deposed, and the streets are now ruled by the Sturmabteilung. But Röhm's regime is frail, and in order for it to survive, he must legitimise it in the eyes of the people and empower his most powerful tool, the SA."
 GER_Erwin_Rommel_desc: "A soldier who dedicates his life to his country is often rewarded with many things - welfare, lifestyle, and respect - but soldiers are rarely rewarded with the control of an entire nation.\n\nThat is, until the Desert Fox obtained one for himself.\n\nErwin Rommel was no ordinary Reich soldier; he served the Kaiser, the Republic, and now the Führer. Every time he took the lead, he produced positive results quickly. Poland, France, and Africa all faced the Desert Fox's might and terror, succumbing one by one to his supreme strategies. Even the American Army could not withstand Erwin Rommel's Forces' tactical and strategic superiority once the Panzers began landing on the streets of New York and Washington.\n\nThe dust has settled, and America is now officially under the Reich's control. It was assumed that Rommel would complete his duties in North America and return to Germany, but the Führer had other plans. The Führer charged Rommel with the most important task of all: controlling America and firmly establishing the Reich's rule over it. As an added bonus, the Führer bestowed upon Rommel the highest rank possible in his lifetime: Reichsmarschall.\n\nRommel, with the Führer's unwavering support, will do whatever it takes to bring America under the Reich's control. The task is difficult seeing as America is a vast region founded on rebellion and liberty, and it intends to rebel against the Reich through any means necessary. When all is said and done, the German flag will be the only one flying among the Rust Belt rubble.\n\nEmpires rise and fall, but America's Empire was swept away before it even began..."
 GER_Gregor_Strasser_desc: "Many different men have been described as the bourgeoisie's bane. The world is divided on what the true revolution is, from men of steel in the East to men of words in the West. Gregor Straßer was born in Germany, the true heart of Europe, a man who broke the false dichotomy, rejected the social left degeneracy, and brought about the German Workers' Liberation.\n\nGregor Straßer was born in 1892, the elder of the Straßer boys, his brother, Otto, and himself. He had a typical middle-class German upbringing, attending school, getting good grades, and eventually becoming an apprentice pharmacist in the Bavarian village of Frontenhausen. During the Great War, he attended officer training, joined an artillery regiment, and eventually rose to the rank of Oberleutnant, earning an Iron Cross for his valour.\n\nFollowing the war, he joined the Freikorps alongside his brother and Heinrich Himmler, and took part in the failed 1920 Kapp Putsch, which Otto had switched sides from and opposed - having joined the left-wing. Both Straßer brothers eventually agreed on politics, joining the NSDAP and turning it into a fervently anti-capitalist cause. Over the next decade, the Straßer brothers kept the flame of the Revolution burning in the face of reactionary forces within the party led by Hitler himself, through the party's fall in 1923 and rise again in 1925, and all the way to the present."
 GER_Heinrich_Himmler_desc: "A loyal servant of the Führer in name, and a cold-eyed architect of a new order in practice, Heinrich Himmler is the most dangerous man in Germany that few dare to say so aloud. As Reichsführer-SS and chief of all German police, Himmler has built a vast, sprawling empire of terror. His power lies not in charisma or public visibility, but in an iron web of institutions: the SS, the Gestapo, the concentration camps, the racial offices, and the growing shadow army of the Waffen-SS.\n\nTo Himmler, National Socialism is more than politics, it is a sacred racial mission, steeped in mysticism, order, and blood. He dreams not merely of conquest, but of reshaping the very fabric of Europe. Behind his pince-nez glasses lies a fanatical vision of a world purged of what he deems impure or disloyal. As the regime tightens, his influence has only grown. The SS now rivals the Wehrmacht and Party structures bend to his will.\n\nHe may serve the Führer today, but Himmler's ambitions stretch beyond loyalty. In his mind, the future belongs to the SS, and he intends to be its high priest and supreme commander when that future arrives."
 GER_Hermann_Goring_desc: "Few men within the Reich have risen as high, or maneuvered as skillfully, as Hermann Göring. A decorated ace of the Great War and the architect of the Luftwaffe, Göring sits at the pinnacle of power just beneath Hitler. As Reichsmarschall he commands both military prestige and political clout. His appointment as Hitler's designated successor only solidifies his position as the second most powerful man in Germany.\n\nGöring's talents lie not in ideology, but in ambition and administration. He is a master of influence, knowing when to flatter and when to assert. His vast estates and private art collection, however, speak to a man who has not separated public duty from private gain, to say nothing of his morphine addiction. To allies, Göring is a necessary stabilizing force: loyal to Hitler, yet pragmatic in execution. To rivals, he is a self-serving power broker whose lavish lifestyle and opportunism betray the ideals of the Party.\n\nHe is the second man in the Reich, but he never forgets he was once promised to be the first."
 GER_Joseph_Goebbels_desc: "Words can wage wars. No one understands this better than Joseph Goebbels. As Minister of Propaganda and one of Hitler's most loyal disciples, Goebbels shaped the soul of the Third Reich, not through bullets or battalions, but through speeches, films, newspapers, and unrelenting ideological warfare. He is the voice of the regime, the architect of its illusions, and the firebrand who turned myth into policy and hatred into action.\n\nGoebbels is not a man of compromise. To him, politics is total, war is absolute, and propaganda is the most vital weapon of all. Where others jockey for power, Goebbels wields emotion, myth, and fear with surgical precision. His influence over public morale, censorship, and cultural life is nearly absolute. He is one of the few trusted to speak for Hitler, and perhaps the only one who truly grasps the psychological dimensions of power.\n\nIn recent years, his voice has grown darker, his tone more apocalyptic, and his loyalty more desperate. To his enemies, he is a poisonous demagogue. To his followers, a prophet of national rebirth. But to history, Joseph Goebbels may stand as the man who taught a nation how to believe in its own destruction."
 GER_Konrad_Adenauer_desc: "Where others sought to dominate Germany with ideology or force, Konrad Adenauer seeks to rebuild it with law, dignity, and quiet resolve. Once Mayor of Cologne and a rising star of the Catholic Centre Party during the Weimar Republic, Adenauer was cast into political wilderness after refusing to cooperate with the Nazi regime. Removed, surveilled, and briefly imprisoned, he survived not through compromise, but through caution and an unshakable belief in constitutional democracy.\n\nNow, as Germany stands at a crossroads, Adenauer returns, not as a radical, but as a steady hand. A devout Catholic, a federalist, and a pragmatic statesman, he envisions a Germany rooted in Western values, Christian ethics, and the rule of law. He believes in reconciliation without forgetting, in sovereignty without militarism, and in stability without tyranny. He is deeply skeptical of extremism in all forms, whether from the left or the right, and sees the future of Germany in cooperation, not conquest.\n\nIn a nation still shadowed by dictatorship and war, Adenauer may be exactly what is needed: not a revolutionary, but a restorer."
 GER_Kurt_von_Schleicher_desc: "When one speaks of ambition and Germany in the same sentence, who could possibly come to mind if not for incumbent Reich Chancellor Kurt von Schleicher? A veteran of multiple battlefields, military and political, few could claim to have earned the title Maestro of Intrigue and truly deserve it as much as the acclaimed General.\n\nWere it not for his decisiveness in negotiating the Ebert-Groener Pact and crushing the forces of revolution in 1918, would the nascent Reichswehr have been able to maintain its privileged position and autonomy within the new Republic?\n\nWho else but he could have had the foresight to seek cooperation with the emerging Soviet Union to undermine their shared enemy - the System of Versailles?\n\nWould the Black Reichswehr have managed but an iota of success were it not for his willingness to stain his hands with the blood of traitors and so-called revolutionaries alike?\n\nReich President Hindenburg is a man of great esteem but would he have been able to hold on to power for as long as he has so far without Schleicher's sage council?\n\nAnd of course, let it not be forgotten who so deftly orchestrated the downfall of the weak and ineffectual governments of Heinrich Brüning and Franz von Papen.\n\nIndeed, Schleicher's ambition knows no equal. And as the sun rises on a new year, his ambition reignites itself in preparation for a new challenge: recharting the course of German history. As the last vestiges of the hated Republic rapidly unravel, a moment of opportunity arises; an opportunity to restore Germany to its rightful place among the nations, a Germany of morality, of soldiery duty and comradeship, a better Germany for a better Europe. And at its helm, Schleicher will lead, his ambition carving a path for the Reich to reach heights hitherto unknown.\n\nBut Schleicher may have to tread more carefully than he thinks. Though he refuses to accept it, these days when people speak of ambition and Germany, his name is not the only one to be uttered from their lips. When it comes to the question of who truly is the most ambitious man in Germany, Schleicher is no longer alone."
 GER_Martin_Bormann_desc: "Rarely seen, seldom heard, but always present. Martin Bormann is the shadow that stretches across the Reich's inner circle. As head of the Party Chancellery and personal secretary to the Führer, Bormann wields power not through charisma or military rank, but through files, memos, and relentless control of access to Hitler himself. No appointment, decree, or request reaches Hitler's desk without first passing through Bormann's hands.\n\nThis bureaucratic stranglehold has made him a feared and resented figure among Nazi leadership. Yet his loyalty to Hitler is absolute, and his understanding of the Party's internal machinery unparalleled. Unconcerned with military affairs or public recognition, Bormann has instead focused on consolidating Party control over the state and pushing an even harsher line on ideological purity and racial policy.\n\nCold, methodical, and ideologically committed, he is a new breed of Nazi official. One who views power not as a spectacle, but as a system to be mastered. If Hitler is the heart of the Reich, Bormann is its bloodstream: pumping orders, silencing dissent, and ensuring that no one forgets who truly controls the apparatus of power."
 GER_Otto_Wels_desc: "A man of principle in an age of brutality, Otto Wels stands not for power or prestige, but for the enduring dignity of democracy. A veteran of the Great War and a lifelong Social Democrat, Wels played a crucial role in defending the Weimar Republic during its most fragile years. Yet when the Reichstag descended into darkness, it was Wels who stood and defied Hitler, declaring that \"freedom and life can be taken from us, but not our honor.\"\n\nThat moment, brief and doomed though it was, ensured Wels a place in history as the last voice of democratic resistance. Now, in a Germany striving to rebuild itself from authoritarian ruin, Wels serves as a man whose authority rests not on force, but on conviction. He brings to government a cautious realism shaped by defeat, exile, and betrayal, but also a deep faith in parliamentary governance, civil rights, and the working class. He is not a revolutionary, nor a populist, but a principled steward of democracy, dedicated to ensuring that tyranny never again finds fertile ground in German soil.\n\nWhere others speak of power, Wels speaks of responsibility. In that, he is perhaps the rarest kind of leader."
 GER_Paul_von_Hindenburg_desc: "Nostalgia is a powerful emotion. It enraptures the human heart, leaving no room for compromise or doubt. For the sake of recapturing old magic, there is little a man would be unwilling to do. But nostalgia is a poisoned chalice, and the best of us learn this lesson too little too late.\n\nEnter Paul von Hindenburg, the Hero of Tannenberg, architect of the Siegfriedstellung, and the Kaiser's most trusted Field Marshal, who less than twenty years prior, led the Imperial Army in the Great War to establish the Reich as the unquestioned hegemon of Europe under the tutelage of the Prussian Eagle.\n\nBut alas, it was not to be. By the summer of 1918, the Entente offensive had reached a crescendo and the fading strength of the exhausted armies of the Central Powers was finally broken. The war to end all wars had come to an ignominious end and soon after  did the Kaiserreich that Hindenburg had dutifully served. Disgraced and defeated, the old Field Marshall laid down his baton and retired from army life, seeking peace in his elderly years.\n\nHowever, the fickle hand of fate had other plans for Hindenburg.\n\nFollowing the death of Reich President Freidrich Ebert in 1925, Hindenburg was given another chance to heal old wounds and perhaps, if fate should be so kind, to finish what he had started so long ago. Under his guidance, the Republic gained some semblance of stability and Hindenburg assumed the position of a pseudo-Kaiser, ruling by decree with near unlimited authority. For a brief moment, the magic was recaptured. But just as he ruled Germany as an Ersatz-Kaiser, so too was the image of an idealized past he believed he had revived been nothing more than a cruel mirage. Today, Germany once more lies prostrated not by enemy arms but by global forces outside Hindenburg's ability to control or even fully understand. All he does know is that Germany suffers with no apparent way to alleviate it.\n\nBut it seems there is someone who does. Reich Chancellor Kurt von Schleicher has submitted a bold proposal, one that involves employing the services of NSDAP leader, Adolf Hitler, a character if there ever was one. Hindenburg is hesitant but Germany languishes all the same. \n\nSo be it then. Let Hitler throw his hat into the ring and may Germany prosper for it. Let this be the final attempt of an old, war-weary soldier to recapture that lost magic for better or for worse."
 GER_Rudolf_Hess_desc: "Quiet, austere, and unwavering in his loyalty. Rudolf Hess remains one of the most enigmatic figures at the highest level of the Reich. An early follower of Hitler and a veteran of the infamous Beer Hall Putsch, Hess has long been more than just a political functionary. Though he lacks the flamboyance of other Nazi elites, Hess compensates with relentless ideological devotion and administrative discipline, ensuring that no deviation from National Socialist orthodoxy is tolerated within the party's ranks.\n\nTo Hess, Hitler is not merely a political leader, but a near-mystical figure: the embodiment of Germany's destiny. He wields little influence over military or economic matters, yet his signature lies behind countless internal regulations and ideological purges. Some, however, regard him as a relic of an earlier phase of the movement, increasingly out of touch with the ruthless realpolitik practiced by men like Göring and Himmler.\n\nAnd yet, he endures, unshakable in his belief that history itself has granted the Führer a divine mission, and that his duty is to serve that mission to the letter, no matter the cost."
 GER_Wilhelm_III_desc: "It is often said that a man pays for his father's sins, and there is no better example of this than young Wilhelm, former Crown Prince of Prussia and now Kaiser of the German Empire.\n\nHis father used his son's birth to spite his British relatives, refusing to use a British physician to ensure a safe birth after one had failed for the old Wilhelm. Instead, he asked his aunt Helena to ensure a safe birth, which occurred on May 6th, 1882.\n\nIn his early years, the Prince lived the Prussian Military Noble way of life, attending a military academy and joining the army, just like his father. Wilhelm had been active in pushing German expansion prior to the Great War, and he hoped to play a leading role in the war's outbreak. Despite his age of thirty-two and having never commanded a unit larger than a regiment, the Crown Prince of Prussia was appointed commander of the 5th Army in August 1914, shortly after the outbreak of the Weltkrieg.\n\nHis father's incompetence resulted in the usurpation of power from the monarchy to the Weimar Republic, forcing the monarchy to abdicate, but Wilhelm was undeterred, returning to Germany in 1923 with the intention of returning to politics. Wilhelm's support for the DNVP and military factions ensured that when the failed Republic was overthrown, he was immediately restored to the throne to lead Germany as his father had once done.\n\nYoung Wilhelm can finally right his father's wrongs, restoring Germany to its rightful place in the sun.\n\nFür Kaiser, Gott und Vaterland!"
 GER_Wilhelm_II_desc: "One rarely gets a second chance to govern a country, especially if the first attempt fails. Second chances are extremely rare when one fails on such a grand scale as Wilhelm II did, but that is exactly what he has received. One more chance.\n\nPrior to the war, the Kaiser pursued massive naval expansion plans in an attempt to build a navy capable of competing with the British Royal Navy, while also strengthening the army and rapidly growing the German economy, eventually making it the strongest in continental Europe. Despite these advancements, Germany lost the war. As a result, Wilhelm abdicated both the Imperial and Prussian crowns and was exiled to the Netherlands, where he planned to spend the rest of his life. He, however, did not.\n\nThe turmoil that followed the war's end in Germany was devastating, and the problems that the new federal republic faced were too much to bear. It was then disbanded and replaced by a government run by people who only served to drag Germany further down the wrong path. Many army officers were dissatisfied with the government and decided to take drastic measures. This resulted in Wilhelm's return, who was chosen over his son, the Crown Prince.\n\nCurrently, the old Kaiser is nothing more than a puppet controlled by the military. If he is to make the most of this second chance and use his vast experience, he must establish his authority as Germany's rightful ruler and restore Prussian constitutionalism. However, if he cannot control the army, he will be nothing more than a powerless figurehead..."
 GRE_Alexandros_Zaimis_desc: "A statesman of the old school, Alexandros Zaimis represents an era of moderation and diplomacy in a country increasingly hostile to both. Born into a family of statesmen and steeped in the traditions of constitutional monarchy, Zaimis has served Greece in nearly every possible capacity: as Prime Minister, High Commissioner of Crete, and now, President of the fragile Second Hellenic Republic.\n\nHe is respected, even admired, for his integrity, calm demeanor, and impartiality. But in a Greece divided between monarchists and republicans, Venizelists and royalists, soldiers and civilians, neutrality can be as dangerous as partisanship. Zaimis's quiet leadership has bought time, but not unity, and as coups brew and tempers flare, his presidency risks becoming a footnote to the larger battles engulfing the nation.\n\nZaimis does not seek power, nor does he cling to it. But whether he can guide Greece through its storm by reason alone, or whether the storm will sweep away men like him entirely, remains to be seen."
 GRE_Panagis_Tsaldaris_desc: "Measured, conservative, and bound by legalism, Panagis Tsaldaris finds himself at the helm of a kingdom frayed by a decade of coups, counter-coups, and partisan vendettas.\n\nA staunch monarchist and head of the People's Party, Tsaldaris seeks not glory or revolution, but a return to constitutional order - a rare goal in a nation where politics often comes at the point of a bayonet. His government, though legally sound, is perched atop a volatile foundation. The republican Venizelists remain powerful and distrustful, the army is riddled with factionalism, and the economic crisis has only deepened public despair. Yet Tsaldaris insists on following the rule of law, even when others around him abandon it.\n\nHe is no populist firebrand, no strongman in waiting. Rather, he is a man of patience and process, and in a country like Greece, that may be his greatest weakness."
 HOL_Charles_Ruijs_de_Beerenbrouck_desc: "Calm, reserved, and devout, Charles Ruijs de Beerenbrouck does not seek to command with charisma, but to govern with care. A stalwart of the Roman Catholic State Party, his rule is defined by moderation, balancing the competing forces of socialism, liberalism, and confessional conservatism that shape Dutch politics.\n\nIn a world increasingly drawn to extremes, Ruijs de Beerenbrouck remains committed to parliamentary democracy, social order, and moral principle. He believes that stability is not a luxury but a duty, and that consensus, not conflict, is the hallmark of effective governance. Yet as economic crisis deepens and the ideological storms gather beyond the borders of the Netherlands, such moderation may soon be tested.\n\nHe is not a man of revolution, but of quiet endurance. And in uncertain times, that may be exactly what the Netherlands needs."
 HOL_Wilhelmina_desc: "A monarch by duty and a patriot by nature, Queen Wilhelmina has ruled the Netherlands through war, economic crisis, and the shifting tides of modernity. Though bound by constitutional limits, she has never been a mere ornament of the state. Stern in character, deeply religious, and unafraid to speak her mind, Wilhelmina considers herself the guardian of Dutch independence and moral clarity.\n\nIn an age of rising populism and growing extremism, she remains a steadfast symbol of national continuity. Her presence offers reassurance in troubled times, not through spectacle or oratory, but through quiet, unwavering strength. She does not seek power, but should her country's sovereignty be threatened, few doubt she would rise to its defense.\n\nTo the Dutch people, she is not just a queen. She is the soul of the nation."
 IRE_Domhnall_Ua_Buachalla_desc: "Domhnall Ua Buachalla is not a leader in the traditional sense. He does not command armies or draft legislation. But in the quiet corridors of power, he has played a subtle yet pivotal role in Ireland's transformation from colonial dominion to sovereign state. A veteran of the Easter Rising and a loyal ally of Éamon de Valera, Ua Buachalla was appointed Governor-General in 1932.\n\nHis selection marked a clear break with the old order. He refuses to reside in the Viceregal Lodge, declines to attend royal functions, and makes no secret of his republican sympathies. In doing so, he turned a ceremonial office into a political weapon - not by action, but by abstention.\n\nUnder de Valera's government, Ua Buachalla's quiet resistance to the remnants of British protocol is helping erode the last vestiges of monarchy in Irish affairs."
 IRE_Eamon_de_Valera_desc: "Éamon de Valera embodies the long, bitter journey from rebellion to republic. A veteran of the Easter Rising and a master of constitutional maneuvering, de Valera has spent his life balancing the twin pillars of Irish nationalism and pragmatic statecraft.\n\nTo his supporters, 'Dev' is the architect of Irish sovereignty, unflinching in his mission to free Ireland not only from British rule, but from foreign influence altogether. Under his leadership, Ireland has begun to assert itself: rewriting the constitution, reducing ties with the British crown, and carving out a path of neutrality in a world drifting toward war. But to his critics, de Valera is cautious to a fault, more comfortable rewriting legal frameworks than confronting hard economic or social realities. His aloof demeanor and centralization of power invite concern, even as his nationalism resonates with a population still healing from civil war.\n\nDe Valera does not seek glory in foreign entanglements. His war is quiet, fought in legislatures and courtrooms, and his weapon is the slow, steady erosion of colonial legacy. In a world of dictators and demagogues, he is something rarer: a revolutionary bureaucrat."
 IRQ_Faisal_I_desc: "The future Faisal I was nothing more than a speck under the Ottoman Empire's rule. When the empire went to war with the Entente, joining the Central Powers in the process, that quickly changed.\n\nFaisal was a leading figure in the Arab Revolt, harnessing the Arabs' resentment of their Ottoman masters and using the leadership and coalition-building skills that his father taught him as a child. Faisal, however, became disillusioned as the fighting raged on.\n\nHe decided he wanted an empire for himself and engaged in backroom dealings with the Ottoman side, stating that he would defect if given significant territory to rule over — he was denied. This jeopardised the positive, ‘faithful friend' image he presented to the Entente, so he abandoned his pragmatic scheming.\n\nFaisal's desire for territory was satisfied after the Great War when he was appointed King of Syria. This did not last long, as he was expelled from the country following defeat in the Franco-Syrian War — a minor setback, as he was soon installed as the king of British-mandated Iraq. Maintaining positive relations with Britain while pursuing his pan-Arab agenda was not easy, but he eventually gained the country's independence through his pragmatic nature and ability to negotiate effectively.\n\nWith Iraq set free, Faisal I is closer than ever to realising his pan-Arab dream, though he must remain patient because there is still a long way to go and one wrong move could destroy everything he's worked for..."
 IRQ_Naji_Shawkat_desc: "Naji Shawkat, the provincial governor's son, was born on May 26th, 1891, in the Iraqi city of Al-Kut.\n\nShawkat's father was elected to the Ottoman parliament shortly after the completion of his studies in 1909, allowing Naji to attend law school in Istanbul. Shawkat worked as an Assistant General Prosecutor in al-Hila until the outbreak of the Great War, when he joined the Ottoman army as a reservist. Shawkat was captured after two years of fighting in the Mesopotamian campaign and joined the Arab Revolt which was led by the Sharif of Mecca, Hussein ibn Ali al-Hashimi.\n\nFollowing Nuri as-Said's resignation in 1932, Faisal I, Hussein's son and King of Iraq, asked Shawkat to accept the position of Prime Minister and lead a non-partisan compromise cabinet free of the factionalism caused by the signing of the Anglo-Iraqi Treaty and capable of restoring stability to the troubled country.\n\nShawkat is opposed by anti-treaty nationalists such as Rashid Ali al-Gaylani's Party of National Brotherhood, as well as much of the existing political elite and army factions. It will take deft manoeuvring of the volatile Iraqi political scene for the Shawkat government to survive."
 ITA_Alcide_De_Gasperi_desc: "Alcide De Gasperi is not a man of crowds or thunderous speeches. A founding member of the Italian People's Party, De Gasperi was among the few Catholic statesmen who resisted both fascist violence and liberal complacency. As Mussolini's regime tightened its grip, De Gasperi was arrested, silenced, and eventually forced into obscurity, finding refuge in the Vatican Library, where he worked in quiet exile.\n\nBut even in those years of darkness, he never abandoned his belief in democracy, Christian ethics, and the moral responsibility of the state to protect its most vulnerable. Where others sought power through strength or fear, De Gasperi envisioned a republic founded on dignity, pluralism, and peace. He opposed totalitarianism in all its forms, whether draped in the red flag or the black shirt, and believed Italy's future lay not in empire or vengeance, but in cooperation, moderation, and reconstruction.\n\nTo his critics, he is too soft-spoken, too idealistic for a continent in flames. But to his supporters, he is precisely what Italy needs: a man untainted by the old regime, immune to the temptations of tyranny, and determined to build a nation not on might, but on principle."
 ITA_Benito_Mussolini_desc: "A country in shambles, its people enraged, its economy in decline, and so much blood spilled for so little gain. This was Italy after the Great War. People looked everywhere for a change, for someone who could channel their rage toward those who had betrayed them and restore their country's greatness and prosperity. They were looking for a true Italian saviour.\n\nOut of the political chaos that ensued, one man emerged, offering the Italian people their dreams - an Italy that could compete with the biggest and best nations - a land complete with the rightful territory it earned in the Great War but was not given. This was Benito Mussolini, the Iron Prefect who would soon become ‘Il Duce.'\n\nMussolini, a former socialist, became an ardent nationalist after being rejected by the Socialist Party and serving in the Royal Italian Army. Beyond that, however, something defined him - his talk of a national ‘spirit,' his talk of rejecting falsehoods imposed by the modern world - all of this was seen and heard by a nation thirsting for vengeance, leading to the March on Rome in 1922 and a brutal consolidation of power over the following years.\n\nItaly is at a crossroads, with the new Fascist system firmly in place and trains running on time. Can Mussolini bring the glory he promised the Italian people to his country, or will his system wither and crumble like the Roman Empire he admires? In any case, Il Duce is bracing for the impending storm, and no one knows what it will bring."
 ITA_Vittorio_Emanuele_III_desc: "“To be a king, all you need to know is how to sign your name, read a newspaper and mount a horse.”\n\nThat was the only piece of advice Umberto I, Victor Emmanuel's father, gave before being assassinated at the turn of the century, and it wasn't particularly great advice.\n\nDecades later, ‘Little Saber' and his reign have seen much - war, economic depression, numerous prime ministers, and the establishment of a fascist dictatorship. Despite his shy and withdrawn nature, the monarch wielded considerable power and influence in many of these matters.\n\nIn the case of the Great War, he personally decided that the Kingdom would join the fight alongside the Entente. Instead of hiding, he went to the front lines in the north, braving the constant bombardments alongside his troops, and earned the moniker ‘Il Re Soldato,' or ‘The Soldier King.' However, the British and French exploited the nation's bravery and courage after their victory, leaving Italy with a ‘Vittoria Mutilata,' a ‘mutilated victory,' an injustice that has haunted him for many years.\n\nHowever, in the aftermath of the war, Victor Emmanuel became even more involved, resolving one parliamentary crisis after another. This quickly sapped his enthusiasm, and with the people's appetite for fascism growing and civil war looming, the King appointed Benito Mussolini as Prime Minister, hoping to bring order to the chaos.\n\nIt has been many years since Il Duce's ascension, and the King has since taken the backseat in which he has always felt most at ease, letting politicians do the politicking, his silence on the fascist regime's atrocities deafening. Despite this, he continues to enjoy widespread support - though for how much longer is unknown..." 
 JAP_Hideki_Tojo_desc: "To understand Hideki Tojo is to understand the soul of wartime Japan: hierarchical, disciplined, and utterly convinced of its divine mission. A general of the Imperial Japanese Army, Tojo rose through the ranks as a strict, methodical officer, a man who believed order was virtue, and hesitation was weakness. An unyielding militarist and devout nationalist, Tojo saw the parliamentary system as a hindrance and diplomacy as a delay.\n\nIn his view, Japan's destiny lay in expansion: to secure resources, territory, and prestige befitting an empire that viewed itself as the rightful ruler of Asia. He viewed war not as a last resort, but as a necessary assertion of national will. Tojo has quickly become the architect and face of Japan's total war.\n\nTojo is not charismatic nor visionary. He is a bureaucrat in uniform, a cold tactician with little patience for nuance. But his strength is in his absolute belief in discipline, duty, and sacrifice. And as Japan marches deeper into conflict, it does so to the beat of Tojo's drum: rigid, relentless, and blind to the cliff's edge." 
 JAP_Hirohito_desc: "They say that power is void and meaningless in silence. It makes no difference how much power you have physically, legally, or in any other way if you don't use it.\n\nThat is the unfortunate reality of the Showa Emperor, a man whose lineage is divine at its core and whose people regard him as a deity. He has been told what to do his entire life, unable to express an opinion or speak his mind, only to condone and accept the consequences.\n\nHe has faithfully listened to his small council of officers, people who have made a mockery of the Showa, using his divine will to achieve unrivalled power within Nihon. With all of the world's power, wealth, and glory, the Showa remains silent on issues that define his country, only approving them on a whim. As he signs a treaty to disarm and promote peace, he authorises an incursion into Manchuria.\n\nWill the Showa Emperor finally exercise the divine will that his forefathers have been cultivating for centuries, or stay silent forever and let others use him as an opportunity for their own plans?"
 JAP_Keisuke_Okada_desc: "A Navy man through and through Admiral Okada has served as executive officer on a successor of vessels, before being given his own command, the Kasuga in 1910. Okada assumed the post of Commander-in-chief of the Combined Fleet in 1924. In 1927, he became Minister of Navy in the administration of Tanaka Giichi, but resigned in 1929 to assume the post of military councillor on the Supreme War Council.\n\nOkada is one of the few supporters within the upper ranks of the Imperial Japanese Navy of the arms reduction treaty resulting from the London Naval Treaty of 1930, which he helped negotiate and worked hard for its ratification. He again served as Navy Minister in the Saitō Makoto cabinet of 1932.\n\nOkada is known as one of the democratic and moderate voices against the increasing strength of the militarists and adamant in his opposition to war with the United States. Now that he was named Prime Minister of Japan, he will no doubt be a major target for extremist forces."
 JAP_Saito_Makoto_desc: "Compromise, experience, connections, and good fortune propelled Saito Makoto to the highest levels of Tokyo government.\n\nHe was not the first choice, and he was not supposed to rise to power. Nihon needed a new face after the death of his predecessor, one who could stem the tides of the military while also preserving the civilian government. With the pressure mounting, the Emperor chose to install Makoto to power.\n\nHe was a military man, specifically of the Navy, which served as a great counterbalance to the IJA's emergent influence. He had governing experience, with his time in Chosen demonstrating that he could take action and serve as a unifying Prime Minister capable of preventing the military from taking matters into its own hands. He was the ideal candidate, in the right place and at the right time, thanks to his connections as a privy councillor. Some may argue that he is almost too perfect for a candidate.\n\nThe question is, is he truly the saviour Nihon requires, or does he have a hidden flaw in his reputation..."
 LAT_Alberts_Kviesis_desc: "A jurist by training and a moderate by temperament, Alberts Kviesis presides over the Latvian Republic with restraint, and an unwavering belief in constitutionalism. Rising from the conservative Latvian Farmers' Union, Kviesis was chosen not for fiery speeches or sweeping vision, but for his reliability, an administrator of quiet conviction during a time of political turbulence.\n\nYet in an era where strongmen rise and parliamentary systems falter, Kviesis often seems out of place. His presidency is defined more by preservation than ambition, more by caution than confrontation. As ideological tensions sharpen and the specter of authoritarianism looms over the Baltics, Kviesis continues to walk a careful line, hoping that legality and prudence will outlast passion and force.\n\nHe may not shape the future, but he is determined to hold the center, for as long as it holds."
 LAT_Margers_Skujenieks_desc: "Pragmatist, reformer, and quiet nationalist, Marģers Skujenieks embodies the struggle to balance democracy with discipline in a young Latvian republic. Originally a social democrat, Skujenieks evolved into a moderate nationalist who sought to reconcile parliamentary politics with the need for firm leadership in troubled times.\n\nTwice Prime Minister, he worked to stabilize the country amid economic pressure and political fragmentation, often walking a tightrope between competing factions. Neither a demagogue nor a dreamer, Skujenieks believes in measured progress, administrative efficiency, and national cohesion. But his growing disillusionment with the dysfunction of parliamentary rule has pushed him closer to authoritarian solutions, even if cloaked in constitutional language.\n\nIn a world growing darker by the day, he remains determined to find a Latvian path between chaos and tyranny, though time may force him to choose one or the other."
 LIT_Antanas_Smetona_desc: "Scholar, orator, and nationalist, Antanas Smetona stands at the helm of Lithuania not by the will of parliament, but by the force of conviction. Once a leader of the democratic independence movement, Smetona turned against the very institutions he helped build, dissolving political opposition and concentrating power in his own hands.\n\nTo his supporters, he is the protector of the Lithuanian nation, uncompromising, cultured, and devoted to the survival of a fragile state in a dangerous neighborhood. To others, he is an authoritarian cloaked in patriotism, silencing dissent and ruling through a narrow elite. Yet Smetona sees no contradiction: in a world of Bolshevik menace and Polish ambition, he believes national unity must come before democratic luxury.\n\nThe time for debate, he claims, has passed. Now is the time for strength, vigilance, and the eternal defense of Lithuania."
 LIT_Juozas_Tubelis_desc: "Quiet, methodical, and intensely loyal, Juozas Tūbelis is the architect behind Lithuania's economic stability and administrative discipline. While Smetona speaks from the podium, Tūbelis works behind the desk, crafting policy, managing budgets, and steering the state through financial and political storms with a steady hand.\n\nAn economist by education and a nationalist by conviction, he believes in order, national self-sufficiency, and the careful cultivation of Lithuanian industry and agriculture. Though lacking the charisma of a popular leader, Tūbelis commands respect within government circles for his competence and unwavering support for the authoritarian regime. To him, ideology is secondary to stability - democracy, a distraction from national survival.\n\nHe is not a man of slogans. He is a man of systems, and for a small nation surrounded by great powers, that may be enough."
 NEA_Zhang_Xueliang_desc: "Known as the 'Young Marshal,' Zhang Xueliang walks the razor's edge between loyalty and ambition, nationalism and survival. The heir to his father's Manchurian warlord legacy, Zhang inherited not just armies and influence, but the impossible task of reconciling personal power with national duty.\n\nThough aligned with the Nationalist government, his loyalty to Chiang Kai-shek has always been tempered by independence and a deep frustration with Nanjing's failure to resist Japanese aggression. Zhang is torn between restraint and action. He is no revolutionary, but neither is he content to watch China bleed from the sidelines.\n\nA man of contradictions - modern and traditional, loyal and defiant - Zhang may yet change the course of Chinese history, not through war, but by the boldness of a single decision. A patriot by heart, a warlord by inheritance, and a gambler by necessity."
 POL_Ignacy_Moscicki_desc: "Ignacy Mościcki's rise from distinguished member of the Polish Chemical Society to President of Poland demonstrates a remarkable life.\n\nMościcki entered politics during the 1926 coup, when he was appointed president on the recommendation of Piłsudski. He served diligently in this role, displaying loyalty, and never openly expressed dissent against the Marshal's leadership. Regrettably, his tenure coincided with a period of political unrest.\n\nAs President, Mościcki focused on stabilising the country and addressing the country's economic challenges. He prioritised infrastructure development and agricultural reforms when implementing many policies. Regrettably, his presidency occurred during Piłsudski's authoritarian rule, which hampered democratic processes and created numerous challenges and complexities in Polish governance.\n\nAs he returns to office following the 1933 election, Mościcki is tasked with navigating the turbulent waters of the Great Depression, ensuring that Poland is strong and ready to face any challenges that may arise."
 POL_Jozef_Pilsudski_desc: "Many regard Józef Piłsudski as the founder of modern Poland, and his influential political career after the Great War has earned him recognition as a pivotal figure in Poland.\n\nGermany and Austria-Hungary declared Poland's independence during the Great War, where Piłsudski was named head of the military department in the newly formed Polish state council. However, in 1917, he was imprisoned because of disagreements with Germany and Austria. Following the war, Piłsudski was hailed as a national hero and appointed as head of state and Chief of the Army. During the Soviet-Polish war, he was promoted to Marshal of Poland and oversaw a strategic manoeuvre that ensured Poland's victory.\n\nPiłsudski agreed to serve as Chief of Staff after Stanisław Wojciechowski was elected president. Piłsudski led a contingent of regiments in a march on Warsaw during a period of political crisis and economic depression, compelling Wojciechowski to resign and facilitating Piłsudski's ascension to the presidency. However, he declined the position, instead appointing Ignacy Mościcki while serving as Minister of Defence.\n\nWith Piłsudski firmly established in government, his future holds promise for an intriguing path."
 POR_Antonio_de_Oliveira_Salazar_desc: "Aloof, austere, and obsessively methodical, António de Oliveira Salazar is not a man one expects to find at the helm of a nation, yet he has come to define modern Portugal more completely than any general or king. Once a professor of economics at the University of Coimbra, Salazar rose to power not through bombast or battlefield triumphs, but through numbers, balancing Portugal's chaotic finances with such precision that the generals of the 1926 coup turned to him for salvation.\n\nFrom here, he is building the Estado Novo: a rigidly authoritarian, deeply Catholic regime grounded in hierarchy, tradition, and national self-sufficiency. To his supporters, Salazar is a bulwark against communism, decadence, and disorder, a philosopher-king who governs not with passion, but with quiet conviction. To his critics, he is a repressive technocrat who stifles dissent, censors thought, and enshrines poverty under the banner of stability.\n\nIn Portugal, nothing moves without Salazar's say. He is the architect of silence, and in the silence, he rules."
 POR_Oscar_Carmona_desc: "Óscar Carmona rose from the ranks of the Portuguese Army not through charisma, but through discipline and a deep disdain for the chaos of the First Republic. A quiet conspirator in the 1926 coup that ended parliamentary rule, Carmona soon emerged as the figurehead of a new order, one grounded in stability, conservatism, and military authority.\n\nThough president in name, Carmona governs less by personal ambition than by the authority he lends to António de Oliveira Salazar, his chosen Prime Minister. Their relationship is clear: Salazar shapes policy, Carmona signs it into law. Carmona is no ideologue. He is a soldier first, a republican second, and a statesman only by necessity. He believes in duty, in hierarchy, and in preserving order above all else.\n\nAs Europe fractures and ideologies clash, Carmona's Portugal remains neutral, authoritarian, and deliberately quiet - a reflection of the man who leads it."
 PRC_Bo_Gu_desc: "History is said to be a great teacher, and Bo Gu knows this. As one of the twenty-eight Bolsheviks inspired by the Soviet revolution, he knew that if he could replicate Moscow's efforts in China, the Chinese people would be liberated from the yolk of emperors who were only interested in securing their own power, rather than in the welfare of the people.\n\nOf course, that was only theoretical. Power politics do not end simply because one believes in revolution, and Bo Gu had to make strides toward victory. Of course, he won, but winning is not the same as maintaining. His CCP leadership is sloppy at best, with failures to capture cities from the KMT thugs, and cracks are appearing in his leadership. He must act now or risk being overtaken by more ambitious men."
 PRC_Mao_Zedong_desc: "As the son of a prosperous peasant family, Mao draws his lineage and experiences from the strata of Chinese society that will prove to be the bedrock of his later endeavours.\n\nBorn during the final dying breath of a decaying empire, the times ahead for China and Mao would be difficult and bloody, but they would also be times of change, social upheaval, reform, and reconstruction. These were revolutionary times. Such were the exact thoughts of Mao Zedong as a young man as he read book after book. From his home fields to the libraries of Changsha, he immersed himself in ideologies and philosophical thought that most Chinese people could not comprehend.\n\nWhile brutes and strongmen ruled China and oppressed the lower classes, believing that their pervasive brutality would go unnoticed as in the past, a coalition of social dissenters and intellectuals banded together. Indeed, with the establishment of the Communist Party of China, the common man's tears of oppression and cries for liberation were given a face. Following the betrayal of the Kuomintang's cowardly nationalists, and with the establishment of the Red Army, it had also gained a body of which Mao was a maximal component.\n\nMao revealed himself to be not only an ideologue, but also a formidable tactician, thanks to the instrumental knowledge he gained from studying such great minds as Napoleon and Sun Tzu. A guerrilla-centric warfare style supported by discipline, peasant and bandit regimes, and topographic knowledge proved more than enough to halt the Nationalists' advances into the territories of the newly established Chinese Soviet Republic.\n\nMao has proven himself to be a dynamic statesman and a cutthroat commander through his tireless efforts to better the people and the revolution, propelling him to the top of the party's popularity and ranks. But difficult times lie ahead, and it remains to be seen whether he can lead the people to a new China."
 RAJ_Freeman_Freeman_Thomas_desc: "A consummate imperial statesman, Freeman Freeman-Thomas is the latest in a long line of British aristocrats tasked with overseeing the jewel in the Crown: India. Courteous, polished, and seasoned by years of service across the Empire, he rules not as a despot, but as the embodiment of His Majesty's interests and a guardian of imperial order.\n\nYet the days of unchallenged British dominion are fading. Gandhi's movement stirs millions, the Indian National Congress grows defiant, and communal tensions simmer just beneath the surface. Freeman-Thomas stands at the center of this gathering storm, balancing between the demand for reform and the instinct for control. He offers measured concessions, oversees cautious constitutional advances, and hopes, perhaps naively, that imperial unity can endure without the lash.\n\nIn his manner, he is a gentleman. In his duty, a bulwark. And in his legacy, a question mark that looms over Britain's future in the East."
 ROM_Carol_II_desc: "Charming, cultured, and utterly unpredictable, King Carol II reigns not only with a crown, but with a flair for the theatrical. Returning from exile in 1930 after previously renouncing the throne, Carol ousted his own son to reclaim power, backed by promises of stability and a desire for redemption.\n\nTo his admirers, Carol is the modernizer Romania desperately needs: a cosmopolitan king with a taste for high culture, strong leadership, and national grandeur. To his critics, he is a self-serving manipulator, seduced by vanity, addicted to control, and dangerously reliant on court favorites and backroom schemes. Behind the facade of royal elegance lies a calculating mind, building a personal regime of loyalists, stifling parties, and silencing dissent. His private life, dominated by scandal, has long blurred the line between court and cabaret.\n\nBut in a kingdom strained by economic hardship and political fragmentation, Carol's ambition may be the only constant. He was not meant to rule. Yet he rules nonetheless - on his own terms."
 ROM_Iuliu_Maniu_desc: "Integrity is a rare currency in politics. Rarer still in a country caught between royal ambition and rising extremism. Iuliu Maniu, however, has made integrity his banner. A Transylvanian statesman and principled democrat, Maniu helped steer the unification of Greater Romania, and now stands as one of its few remaining defenders of liberal parliamentary rule.\n\nAs leader of the National Peasants' Party, Maniu champions land reform, civil liberties, and constitutional government. He is neither a revolutionary nor a monarchist sycophant, but a stubborn believer in the promise of democratic institutions, even as they crumble around him. His tenure as Prime Minister is marked by conflict with King Carol II, whose growing authoritarianism Maniu has openly and courageously resisted.\n\nThough reserved and austere in manner, Maniu is a symbol of steadfastness in uncertain times. Yet his refusal to compromise has left him politically isolated, trapped between the king's ambitions and the Iron Guard's fury. Whether Romania will remember him as a savior of democracy or merely a tragic idealist remains to be seen."
 ROM_Mihai_I_desc: "The young King is now back on the throne, but his ability to reign has waned completely as a result of the dreadful war, his father's incompetence, and the Mareșal's ambitions. Not to say he used to wield political power, but he no longer does. The truth is that, ever since his coronation, Michael has been powerless and a victim of his circumstances.\n\nMichael has been used as a pretty face to look at for those around him for their own gain, much like a ragdoll in the hands of a pouty child, and this has remained unchanged to this day. The king is merely a figurehead to give legitimacy to Antonescu's regime and a figure to rally the people behind, but in the years since the war, that role has declined as the Mareșal's war exploits have spiked his popularity amongst the masses. Still, Michael continued to appear alongside Antonescu at public meetings, national holidays, and other joyous occasions, but every time the young king's role seems to be reduced more and more despite the fact that he's the de jure holder of the executive power in the country. Every time, he appears to recede further into the shadows, more like a mythical figure than a tangible person.\n\nIndeed, his situation is dire; he is being followed by Antonescu's hounds wherever he goes, and his lack of experience allows a superficial naiveté to show whenever he interacts with public figures, or so he lets on. While Michael is inexperienced, he is still a young man with more than half of his life ahead of him, and sitting in a catatonic state waiting to die would be uncharacteristic of such a lanky young man.\n\nThe great Conducător's eyes can't be everywhere at once, and his leadership isn't appreciated by everyone, so Michael has plenty of opportunities to use his own sharp wits and contacts to potentially better improve the situation in his favour despite the close control in his regard. But he knows he can't do anything right now, so he waits. He waits, but only time will tell if his patience is rewarded."
 SAF_DF_Malan_desc: "Daniel François Malan was born on May 22nd, 1874 in Riebeek-West, Cape Colony, and rose to prominence as a South African politician. The Malan surname emerged in South Africa when a French Huguenot refugee named Jacques Malan from Provence (Mérindol) arrived sometime before 1689. D.F. Malan became involved in National Party politics shortly after the party's formation in 1914.\n\nPolitical parties often used daily newspapers to spread their ideals and messages to the public. However, nationalist-minded Afrikaners in the Cape had no such outlet, so in 1915 they decided to release their own daily paper, De Burger, which later became Die Burger, with D.F. Malan as its editor.\n\nHe is truly a charismatic leader unlike any other, and he is also a great world statesman. Our people can only hope that he will lead us to glory and make us the masters of Africa."
 SAF_JBM_Hertzog_desc: "J.B.M Hertzog, a general in the Second Boer War, was known for his daring and resourcefulness while leading his guerrilla forces. Despite his desire to continue fighting, Hertzog was persuaded to put an end to the bloodshed and restore peace to the Cape.\n\nPrior to entering politics after the war, Hertzog maintained a \"South Africa First\" stance, wishing for the country to be free of foreign control. When he became Minister of Justice, he maintained his nationalist stance, which frequently caused friction with his colleagues. As a result, he was excluded from the new government formed in 1912.\n\nHertzog, on the other hand, did not give up. Instead, he founded the National Party, which grew in popularity throughout the Great War by opposing the Union government's support for the British.\n\nThis opposition was successful, as Hertzog's National Party formed a coalition government with the Labour Party and took power in the 1924 general election. The National Party won the subsequent election amidst many social and economic improvements for working-class whites. Hertzog's second term saw more social and economic progress for the white minority.\n\nDespite his constant disregard for the coloured majority, Hertzog was elected to a third term as Prime Minister. If he is to win a fourth term, he must navigate these increasingly turbulent times while remaining committed to his policy of promoting South African independence from the British Empire..."
 SAF_Jan_Smuts_desc: "The Afrikaner stateman's political career took many twists and turns. From a tenacious soldier fighting the British for Boer independence to a staunch supporter of collaboration with the UK. Despite his opponents' criticism of his authoritarian tendencies, Jan Smuts remains one of South Africa's most influential and powerful men.\n\nSmuts, who was born into a respectable Afrikaner farming family, developed an early interest in literature and philosophy. It therefore came as no surprise that he pursued a legal career abroad, despite some minor financial difficulties. His abrasiveness and seriousness, on the other hand, did not endear him to his peers. He would later become involved in the Boer War against the British, first as a logistics officer and then as a commander of small guerrilla raids. When the writing was on the wall for the Boer cause, he advised that surrendering was the best option to avoid endangering civilian lives.\n\nSmuts fought on in the political arena, determined to protect Afrikaner interests. Needless to say, he had a lot of success in that field, becoming an important player in the negotiations for Afrikaner autonomy and the formation of the Union of South Africa, as well as serving as Prime Minister of the united Afrikaner political party that he helped to create: the South African Party. Smuts solidified his position as a long-time ally and friend of the British crown, fighting in the Great War against colonial German troops and even mediating in the Irish conflict.\n\nRecently, the veteran politician has criticised the Treaty of Versailles and its likely ramifications for Germany and Europe. Only time will tell if he is correct..."
 SOV_Aleksey_Rykov_desc: "A revolutionary by conviction, a bureaucrat by necessity, and a fading star in a sky now dominated by harsher lights. Aleksey Rykov is a man out of touch with the times. Once a loyal Leninist and key figure in the Bolshevik seizure of power, Rykov served as Premier of the Soviet Union following Lenin's death. He envisions a pragmatic path to socialism, one that allows space for limited private enterprise.\n\nAs Stalin pushed for rapid industrialization and absolute control, Rykov's cautious approach was denounced as weakness, even treason. He now lingers in the upper echelons of Soviet power as someone whose authority is more ceremonial than real. To older Party veterans, Rykov represents the last thread of the original revolution, a voice of reason, a believer in collective leadership, and a reminder of a less paranoid era. Watched closely, Rykov remains, for now, within the machinery he helped build.\n\nHe may still dream of a rational socialism, but in these times, dreams are dangerous things."
 SOV_Andrei_Zhdanov_desc: "To Andrei Zhdanov, the Soviet Union is not just a state, it is a civilizational force, locked in eternal struggle against the decadence of the West. A longtime Party functionary and one of Stalin's most trusted lieutenants, Zhdanov has built his career on ideological clarity and unshakable loyalty. In his vision, there is no room for ambiguity, no tolerance for doubt. The world is divided cleanly: socialist light or capitalist decay.\n\nHis true power lies in the Party apparatus, where he shapes doctrine, rewards conformity, and ensures that no intellectual strays from the Party line. To his supporters, Zhdanov is the ideological guardian of the USSR, the man who preserves the purity of the revolution and the unity of thought. To his rivals, he is a dangerous zealot, willing to destroy lives in pursuit of a theoretical ideal.\n\nCold, ascetic, and exacting, he views culture as a battlefield and himself as its general. If Stalin is the voice of power, Zhdanov is its conscience, and its censor."
 SOV_Georgy_Malenkov_desc: "Few in the Soviet Union wield more influence than Georgy Malenkov. A loyal servant of Stalin since the 1920s, Malenkov built his career in the engine room of Soviet power: Party administration, personnel control, and the secretive oversight of military programs. He is a man of files and faces, not speeches, a trusted operator whose ability to manage complex institutions has made him indispensable in the corridors of the Kremlin.\n\nMalenkov is no ideologue. He is a technician of power, favoring stability over slogans, efficiency over fanaticism. Calm, careful, and politically cautious, he has avoided the extremes of men like Beria or Zhdanov, quietly consolidating influence while others fell to purges or overreach. To some, Malenkov is the perfect successor-in-waiting: loyal, competent, and non-threatening. To others, he is a shapeshifter, neither reformer nor hardliner, but something in between. His loyalties are to the system, not to any faction. And in a system where personalities rise and vanish in an instant, that may be the smartest loyalty of all.\n\nIn Stalin's shadow, Georgy Malenkov has learned the rules of survival. The question now is whether he will write his own."
 SOV_Iosif_Stalin_desc: "Many things are required for leadership - charisma, will, diplomacy, strategy - and these things are often refined and softened over time, seeing as politics is a gentleman's game in which such crude methods of torture, assassination, or murder have no place in this world. Only a few brave and daring souls, such as Joseph Stalin, would dare to return to such primitive forms of governance.\n\nStalin appeared to be the least likely person to inherit a country like Russia, having been born into a poor but religious family. However, fate moves in mysterious ways, and Stalin stumbled upon a golden opportunity. He was able to obtain a book containing teachings that were diametrically opposed to those taught in his school - revolution and socialism painting each page. Over time, he became increasingly committed to the revolution, even at the expense of his grades and class standing. Stalin didn't care since he considered it to be a means to an end.\n\nAnd it was worth the risk as he finally got his chance to rise through the ranks of the Communist Party, becoming close to Vladimir Lenin. He became the Party's point man for various \"illegal\" operations, such as robbery and extortion. His extremist and radical approaches were not well received by the Party, as such, they attempted to isolate him; however, isolating him had the opposite effect - it had made him more popular than ever.\n\nHowever, once the dust settled and the revolution was declared a success, the true power struggle began. Lenin never saw Stalin as his successor, but through politicking and strategy, Stalin rose to the top of the food chain, pushing Trotsky to the sidelines. Stalin's rule has been nothing short of brutal; his insistence on rapid industrialization has resulted in misery, with famine rife and bodies abandoned in the streets. Stalin's rule, however, is under threat, with many factions attempting to depose him.\n\n There is only one certainty: Stalin will not be deposed easily. His influence and power make it possible for anyone who opposes him to suffer the most unfortunate of outcomes..."
 SOV_Kliment_Voroshilov_desc: "Kliment Yefremovich Voroshilov, one of the earliest Bolsheviks and a veteran of the Revolution, is a man whose loyalty has long outlasted his brilliance. His loyalty to Stalin is absolute, but his refusal to contradict or challenge him has frequently come at a cost. Decisions are postponed, uncomfortable truths softened, and failures explained away with patriotic rhetoric. Nonetheless, his ideological purity and loyalty have helped him survive where others have fallen.\n\nAmong his peers, he is regarded as a relic of the revolutionary era: dutiful, ceremonious, and resistant to progress. He surrounds himself with symbols of military glory and frequently speaks of discipline, unity, and sacrifice. Behind the polished speeches and public confidence, however, is a man who is resistant to change, clinging to past ideals even as the world around him moves on without him.\n\nIn the end, Voroshilov's greatest strength - his loyalty - may also be what ensures he fades into history as a man who followed too faithfully, and led too little."
 SOV_Lavrentiy_Beria_desc: "Lavrentiy Beria, chief of the NKVD and master of the Soviet Union's security apparatus, is the man behind the curtain. The executor of terror, the compiler of dossiers, and the quiet arbiter of life and death across the USSR. With a file for every man and a plan for every rival, Beria's power lies not in ideology, but in information, loyalty to Stalin, and the willingness to do whatever must be done.\n\nRuthless even by Soviet standards, Beria modernized the machinery of repression. Under his watch, gulags expanded, political enemies vanished with clinical efficiency, and internal surveillance reached terrifying new heights. Yet he is not a simple butcher. Beria is intelligent, calculating, and disturbingly pragmatic. Behind closed doors, however, darker rumors persist, of disappearances that never made it to the files, and abuses that served no state purpose.\n\nLavrentiy Beria does not believe in the revolution. He believes in control. And in the depths of the Kremlin, where files are thicker than books and silence is the loudest sound, that belief may be the most dangerous of all."
 SOV_Lazar_Kaganovich_desc: "Lazar Kaganovich is a builder in every sense of the word, having left his mark on railways, cities, factories, and the Moscow Metro. However, behind these successes are difficult truths: the human cost of collectivisation, the displacement of entire communities, and the pressure on workers to meet impossible quotas. Under his watch, forced collectivisation and ruthless industrial campaigns sweep across the country. Kaganovich, on the other hand, only sees it as the necessary price of modernity.\n\nKaganovich is known among his subordinates for his high standards and intolerance of failure. He approaches politics with the same precision as he does engineering: problems must be solved, inefficiencies removed, and opposition eliminated. His devotion to Stalin is undeniable, and he has demonstrated a willingness to go to extreme lengths to prove it.\n\nKaganovich is the \"Iron Lazar\", a man whose resolve cannot be broken. Whether he is remembered as a builder of socialism or a destroyer of men depends entirely on which records survive him."
 SOV_Nikolai_Voznesensky_desc: "Younger than most, quieter than some, but no less dangerous for it. Nikolai Voznesensky represents the Soviet future that might have been. An economist by training and a protégé of Andrei Zhdanov, Voznesensky rose to prominence as the head of Gosplan, the Soviet Union's central economic planning agency. Tasked with organizing war production, Voznesensky proved himself indispensable.\n\nIn high-level councils, he moves with quiet confidence, his youth and sharp intellect earning both admiration and suspicion. To reformers, he is a symbol of what the Soviet Union could become: a modern, technocratic power guided by reason as much as ideology. To hardliners, he is an outsider rising too fast, a threat in the making. His ties to the Zhdanov faction and his growing influence in economic affairs have placed a target on his back.\n\nVoznesensky is not a soldier, nor a spy, but in a system where survival is the highest skill, his mind may be his most dangerous weapon."
 SOV_Nikolai_Yezhov_desc: "He smiles, he nods, he signs the order, and thousands disappear. Nikolai Yezhov, Commissar of the People's Commissariat for Internal Affairs, is not a general, not a statesman, not a public face of the revolution. He is a shadow with a pen and a list. As the chief architect of the Great Purge, he holds terrifying authority over the fate of millions. The NKVD under his rule is a machine of blood and silence, turning comrades into traitors, whispers into evidence, and fear into policy. Entire ranks of the Red Army, the Party, and Soviet society have vanished under his watch: confessed, condemned, and erased.\n\nTo others in the Kremlin, he is a butcher, a true believer without restraint, and a man whose rise is a warning to all. Yet Yezhov shows no doubt, no remorse. He believes that only through cleansing fire can the revolution be purified, and that loyalty must be proven through action, not sentiment.\n\nHe is the embodiment of the Purge itself: small in stature, immense in cruelty. In the corridors of the Soviet state, there are no safe places when Yezhov walks the halls."
 SOV_Sergey_Kirov_desc: "Sergei Mironovich Kirov is the prototypical Soviet man. He embodies the qualities that any Soviet should strive for: ‘solider, friend, and loyal supporter of the Revolution.'”\n\nKirov, who was born in Urzhum on March 27th, 1886, was instrumental in the rise of the Petrograd Soviet, the success of the October Revolution, and the civil war that followed. Kirov led Bolshevik forces in Astrakhan during the battles that raged there until 1920.\n\nKirov assumed leadership of the Azerbaijani Communist Party after the civil war in 1921 and quickly developed a devotion to Joseph Stalin. Kirov was given the secretary position of the Leningrad City Committee, more commonly known as a mayorship, in 1926 as a reward for his loyalty. He had remained a devoted supporter of Joseph Stalin, though this devotion could be put to the test if Stalin were to betray his trust.\n\nWill Kirov be able to usher in a new dawn for the common worker, or will he be swept aside into the dustbin of history, never to be mentioned in future textbooks?"
 SOV_Vyacheslav_Molotov_desc: "\"The trouble with free elections is that you never know how they are going to turn out.\"\n\nMolotov rose to prominence as a distinguished member and organiser of the Bolshevik party since 1906, gaining experience within the party and playing a pivotal role in the establishment of the Pravda newspaper. Following the 1917 revolution, Molotov assumed various positions in various party organisations.\n\nIn 1921, Molotov ascended to the ranks of the Central Committee, concurrently attaining candidacy for the Politburo. Following Lenin's death in 1924, Molotov staunchly supported Stalin in the ensuing power struggle, earning full membership in the Politburo by 1926, after Stalin assumed leadership.\n\nContinuing his rapid rise, Molotov took control of the Moscow Party Committee in 1928 and orchestrated a purge of those who opposed Stalin's ideology. In 1930 he became the Soviet Union's second most powerful figure, succeeding Alexey Rykov as Chairman of the Council of People's Commissars, a position he still holds today. During his term so far, Molotov has overseen the implementation of agricultural collectivization.\n\nWhat the future holds for Molotov remains uncertain. Only time will reveal his subsequent fate within the party." 
 SPA_Francisco_Franco_desc: "The Caudillo himself, Francisco Franco is a man who wants nothing more than the restoration of the Spanish prestige and glory, which is now lost as a relic of time. \n\nFrancisco Franco's quest for power starts from the very day of his birth, as his Father's family had created a dynasty of Naval Admirals for Spain, producing generations of naval officers, all of which are both loyal to the Crown, yet skilled as grand strategists of naval warfare. Unfortunately for Franco, he wasn't accepted into the Navy, so he had to turn to the alternative - the Army.\n\nFranco was especially successful in the Army, establishing a loyal following of conservative and reactionary officers, willing to follow him and lead Spain back to its true nature. As democracy and republicanism sweeps España, the more followers he gains, especially since the military machinery was filled with reactionary officers.\n\nNow, as El Caudillo, he shall guide Spain through a new era, one where Spain shall no longer bow down to the winds of Liberalism, and instead give way to the fires of Reactionarism and Authoritarianism, whatever it takes..."
 SPA_Jose_Diaz_desc: "Quiet, disciplined, and unwaveringly loyal to the Comintern line, José Díaz is the ideological backbone of the Spanish Communist movement. Rising from the harsh world of Andalusian labor struggles, Díaz has forged himself into the perfect cadre: a man of iron will and few words, forged in the doctrine of class struggle and international solidarity.\n\nAs General Secretary of the Communist Party of Spain, he has worked tirelessly to turn the once-fractured PCE into a centralized force aligned with Moscow's strategic vision. Under Díaz, the party has embraced discipline, unity, and subordination to the broader anti-fascist cause. His leadership is less about charisma than cohesion - a quiet authority that keeps the gears of revolution turning. Yet even among allies, questions linger. Is Díaz a patriot or a proxy? A servant of the Spanish working class, or an agent of Stalinist orthodoxy?\n\nAs the Republic fights for its life, José Díaz watches from party headquarters, red pen in hand, drawing hard lines between friend and foe."
 SPA_Manuel_Azana_War_desc: "Once again, the house of cards collapses on itself. So is Spain's everlasting misery throughout its hundreds of years of turbulent history, which now rests in the hands of newly appointed President Manuel Azaña.\n\nAzaña is a controversial figure among his people. To some, he is the sole defender of Spain's chance to join the modern world as a beacon of republican ideals in this age of totalitarianism, while to others, he is the Bolshevik destroyer of culture.\n\nNeither description adequately describes the rather unassuming idealist who, in the midst of Europe's Great War, cultivated his ideals for a new Spain based on the etiquette of the French Enlightenment. More than any other prominent republicans, he was responsible for deposing Primo de Rivera and King Alfonso XIII's dictatorship in 1930, and he could be considered the figurative \"father\" of the experiment that was the Second Spanish Republic.\n\nAfter only five years, it has ripped itself apart in front of his eyes. Spain is engulfed in civil war, and the responsibility for preserving this creation has been placed squarely in the hands of its creator. Only time and circumstance will determine El Presidente's course of action in this most dire of circumstances, whether to rise above or capitulate to this situation he has created..."
 SPA_Manuel_Azana_desc: "In the vivid and chaotic politics of Spain's second decade of the twentieth century, a young man named Manuel Azaña tirelessly indulges himself in the debates and speeches of the Ateneo de Madrid, passionately arguing with Spain's most educated intellectuals and writers, wrestling over how to proceed with reform: a word that would follow him throughout his life.\n\nAzaña, a great admirer of France and its politics, embraced the French republican system as the only way to bring true democracy and equality to Spain under one flag. Primo de Rivera's dictatorship only served to embolden and solidify his ideological position.\n\nHe began his first projects in 1931, as a believer in the necessity of deep reforms, acting as a magnet between socialists, republicans, and the bourgeoisie. Faced with ever-increasing problems and a looming civil war that could lead to the demise of his beloved republic, Manuel Azaña's legacy is one of a man embracing modern visions of his times and one of the few believers in the functioning of a democratic, equal, and solid republic."
 SPA_Niceto_Alcala_Zamora_desc: "'The Most Excellent' is a title Niceto Alcalá-Zamora can proudly claim.\n\nBeginning his career as a lawyer and progressing through the Ministries of Public Works and War, he was forced to either oppose Rivera's monarchy-instigated dictatorship or accept it, as most political parties did. He opted for the former, and thus led the opposition to both the dictatorship and the monarchy. This path proved him to be a man of conviction and will, with neither prison nor persecution deterring him.\n\nWhen Alfonso XIII abdicated, Alcalá-Zamora rushed to Madrid, occupied the ministries by force, and established the provisional government. Though he quickly resigned as Prime Minister due to his disagreements with the new constitution's anti-religious articles, he was elected by an absolute majority as the Republic's first president."
 SWE_Gustaf_V_desc: "Old, austere, and unshakably dignified, King Gustaf V has seen Sweden pass through eras of empire, liberal reform, and democratic transformation. Though his crown no longer carries real power, the king remains a steadying symbol in a continent veering toward chaos.\n\nBehind his icy bearing and regal reserve lies a man deeply concerned with Sweden's sovereignty, neutrality, and preparedness in the face of rising storms. Gustaf is not blind to the tides of ideology sweeping Europe. A conservative by temperament and upbringing, he views the extremes of socialism and fascism alike with cautious mistrust. Yet he also understands the limits of his station, carefully navigating the expectations of a constitutional monarch while privately advocating for national defense and internal unity.\n\nHe may not dictate policy, but in times of crisis, the king's words still carry weight."
 SWE_Per_Albin_Hansson_desc: "Neither revolutionary nor reactionary, Per Albin Hansson believes in building a home, not just for the wealthy or the powerful, but for every Swede. His vision of folkhemmet, the people's home, is more than rhetoric: it is a blueprint for a new kind of society, one founded on equality, cooperation, and social responsibility.\n\nHansson leads not with fiery speeches or grand gestures, but through quiet determination and political pragmatism. He understands that progress is not imposed from above, but carefully negotiated within the boundaries of democracy and tradition. With the world reeling from depression and extremism on the rise across Europe, he sees in Sweden a chance to prove that social justice and stability can coexist.\n\nA builder of consensus in a time of division, Hansson walks a narrow path, balancing reform with restraint, and compassion with caution. His Sweden may be modest in size, but under his leadership, it may yet become a model for the future."
 SWI_Edmund_Schulthess_desc: "Edmund Schulthess is not a man of slogans or spectacles. He is a man of quiet deliberation and firm principles. Trained as a businessman and shaped by decades of public service, Schulthess represents the conservative-liberal heart of the Swiss political tradition: a commitment to economic prudence, political neutrality, and collective responsibility.\n\nWithin the collegial structure of the Federal Council, Schulthess stands out as a stabilizing force, a voice for measured action in times of turmoil. He has overseen portfolios from trade to industry, and in each, he has defended the virtues of Swiss independence: a strong currency, a balanced budget, and a well-armed neutrality. Though the world outside descends into ideological madness, Schulthess remains unmoved. Fascism and communism are alien to his worldview, threats to the civic republicanism he believes must endure.\n\nTo him, Switzerland must be a rock in a flooding river: unyielding, if not unshakable. He is not here to reshape the world. He is here to preserve his country from it."
 SWI_Federal_Council_desc: "In an age of dictators and demagogues, Switzerland offers a quiet anomaly: a nation governed not by one voice, but by seven. The Federal Council, a collegial body composed of representatives from the nation's major parties and cantons, rules by consensus - a slow, methodical process that reflects the deep-rooted Swiss preference for stability, neutrality, and internal harmony.\n\nEach year, a new member serves as President of the Confederation, a role that carries more ceremonial weight than actual power. In truth, leadership in Switzerland is distributed, debated, and balanced across linguistic, religious, and political lines. In a time when neighbors turn to repression or revolution, the Federal Council seeks compromise, guided by a cautious pragmatism and a near-religious commitment to neutrality.\n\nBut neutrality is not passivity. Behind the mountains and bank vaults lies a nation quietly preparing, fortifying its defenses, arming its citizenry, and ensuring that, should war reach its borders, it will not be caught unaware."
 TUR_Fevzi_Cakmak_desc: "President Atatürk's death has left a void in the country's leadership. Without him, the prospect of a great, independent Turkey is jeopardised. Strong leadership is required to fill this void, which Ismet Inönü simply cannot provide. Fortunately, the Grand National Assembly recognised this and chose Fevzi akmak, Chief of General Staff, Field Marshal, and Independence War veteran, as the new president.\n\nDespite the change in leadership, political corruption and disloyalty have persisted, and have been exacerbated by Atatürk's death. This will be a significant obstacle for Çakmak to overcome if he is to implement his modified version of the late president's ideas and beliefs, which is based on policies that focus more on developing the currently inadequate military while also emphasising the nationalist elements of Atatürk's vision.\n\nApart from the increased emphasis on the military and nationalism, Çakmak does not share Atatürk's desire to put power in the hands of the people, and will not waste his time attempting to implement a multi-party system for the third time. He intends to reinvest that time in areas that require further development if Turkey is to catch up with the rest of the world.\n\nÇakmak believes he is the right man to lead Turkey into a prosperous future, but as tensions rise across Europe, the smallest misstep could spell disaster for the country, destroying everything that Atatürk built and what he is attempting to build upon."
 TUR_Ismet_Inonu_desc: "The Turkish people are in mourning. President Atatürk's untimely death is devastating, and his vision for a modern, secular Turkey may now be jeopardised. The Grand National Assembly saw only one choice for his successor, former Prime Minister Ismet Inönü, in order to provide an easy transition in leadership and continue progress toward the late president's goals.\n\nIn addition to his new title of president, Inönü has also been given the title of ‘Millî Şef,' or ‘National Chief,' as the leader of the Republican People's Party, the country's sole political party. Atatürk attempted to address the lack of a political spectrum, but was unable to do so due to the high level of corruption that Inönü now faces.\n\nAs a result of this corruption, the new president will need time to implement a multi-party system that will last and continue to modernise and democratise Turkey in accordance with Atatürk's vision. This may all be for naught, as tensions rise across Europe and the prospect of a large-scale war approaches; the prospect of escaping the war appears dim due to Turkey's ideal geographical location.\n\Nonetheless, Inönü will try to maintain his resolve. He will go to any length to preserve and protect this country, and he will not jeopardise the future of everything he and Atatürk have built by taking sides in the brewing storm...\n\nWill his bet on neutrality pay off, or will it be the downfall of this fledgling republic?"
 TUR_Ismet_Inonu_desc_Deputy: "Ismet Inönü has spent much of his life serving his country, first in the Ottoman Empire's army and now as the Republic's first Prime Minister.\n\nAs a soldier in the Ottoman army, he was a gunnery officer who spent his early battles suppressing revolts across the now-defunct empire. During the Great War, he rose to the rank of Colonel, where he met his future president, Mustafa Kemal Atatürk, on the frontlines. After being defeated at the Battle of Megiddo, Inönü was sent back to Istanbul and appointed Undersecretary of War, and then General Secretary of Documentation in the Military Council.\n\nInönü joined the Turkish National Movement, where he reunited with Atatürk, shortly after the war's end and the subsequent occupation of Constantinople by Allied forces as part of the treaty signed by the sultanate. Assigned to the Western Front of the Independence War, Inönü led his forces to victory and was appointed Chief Negotiator for the Turkish delegation, squeezing concessions from his counterparts at the negotiating table. This convinced Atatürk to appoint Inönü, his friend and ‘brother,' as Prime Minister when the Republic was established.\n\nNow, Inönü works tirelessly to combat corrupt politicians and aid in the implementation of Atatürk's vision for a new Turkey, one with a prosperous future free of the flaws of the old Ottoman Empire."
 TUR_Mustafa_Kemal_Ataturk_desc: "Mustafa Kemal Atatürk rose to prominence as an Ottoman field marshal during the Great War due to his role in the Ottoman Empire's victory at the Battle of Gallipoli. Following its defeat in the war, the sultanate accepted an armistice and the Treaty of Sèvres, which enabled the empire and even parts of Anatolia to be partitioned.\n\nIn response, the Turkish National Movement, led by Atatürk, was formed. The movement revolted against the treaty, resulting in the War of Independence, the abolition of the Sultanate, the formation of the Grand National Assembly of Turkey, and the election of Atatürk as the first President of the Republic.\n\nHe then embarked on a massive reconstruction of the country's political, educational, and cultural systems, with the goal of creating a modern, secular state. To protect the young republic from the destabilising influences of foreign ideologies, Atatürk instituted a one-party system with the intention of making it temporary. However, both attempts to establish a multi-party state failed. Despite this setback, Atatürk continued with his reforms, which included the development of a new Turkish alphabet that was a modified version of its Latin counterpart.\n\nAtatürk has made significant progress in reforming Turkey, but he is facing stiff opposition from greedy and corrupt politicians who reject the need for change. However, if he succeeds in reinventing Turkey, he will be regarded as an outstanding man.\n\nBut the question is, will he be able to do it?"
 USA_Alf_Landon_desc: "Alf Landon, a millionaire businessman and Kansas governor born in Pennsylvania in 1877, perfectly embodies the Rockefeller Republican.\n\nLandon moved from Ohio to attend the University of Kansas. He had hoped to become a banker, but instead found himself invested as an independent producer in the booming local oil industry. When the United States entered the Great War in 1918, Landon enlisted in the Army, rising to the rank of captain in the Chemical Corps but never seeing action in the trenches. He returned to Kansas after being discharged, where his work in the oil industry would make him a millionaire.\n\nLandon was a vocal supporter of Theodore Roosevelt's Progressive Party in Kansas, serving as the governor's private secretary before taking over as governor himself in 1932. Landon emerged as a liberal Republican leader after his re-election two years later, as one of only two Republican governors to survive that year's Democratic landslide. Landon would soon become the Republican nominee for the 1936 presidential election.\n\nLandon supported many aspects of the ‘New Deal,' but he criticized many areas of inefficiency and perceived hostility toward businesses. Voters appeared to share his concerns, as they voted FDR out and Landon into office."
 USA_Charles_Curtis_desc: "Charles Curtis is a politician with a career that has spanned more than three decades. In 1928, he reached the pinnacle of his long career, becoming Vice President of the United States, partnering with Herbert Hoover in a landslide election victory for a term that is now only a few months away from being over.\n\nCurtis studied and practiced law and then became a prosecutor before being elected to the House of Representatives. Curtis valued personal connections and was an excellent coalition and consensus builder in the Senate, where he went after his stint in the House. He was an excellent Minority Whip and, later, Majority Leader, being called a ‘walking political encyclopedia' by many of his colleagues.\n\nCurtis ran for President in the 1928 Republican National Convention, but fell far short of establishing a successful anti-Hoover movement after Hoover gained enormous traction following the incumbent President Calvin Coolidge's withdrawal from the race. Curtis' tune quickly changed after the party leaders offered him the vice presidency.\n\nCurtis' exemplary record made him an ideal choice for Vice President, but during Herbert Hoover's administration, Curtis has been relatively inactive, attending cabinet meetings only sporadically. When his term as Vice President ends, he will most likely return to his legal career, which will undoubtedly be lucrative given the connections he has made throughout his political career."
 USA_Charles_L_McNary_desc: "Charles Linza McNary has one of the most illustrious careers of our time. Beginning as a deputy district attorney under his brother John Hugh McNary, he quickly rose to prominence, first as dean of Willamette University College of Law in his hometown of Salem, and then as an Oregon Supreme Court justice.\n\nHe has served in the Senate since 1917, and he has been the Senate Minority Leader since 1933. McNary spent a lot of time in the Senate working on agricultural and forestry issues. He also backed many New Deal programs at the start of the Great Depression.\n\nHe was chosen as the Republican vice presidential nominee as a western farm leader to balance the ticket of presidential nominee Wendell Willkie, an east-coast pro-business leader. Even though the two men disagree on many issues, they are willing to collaborate in order to have a successful term."
 USA_Franklin_D_Roosevelt_desc: "The American people have suffered greatly as a result of the Great Depression, and it does not appear that the suffering will end anytime soon. Wages have fallen across the country, workers have been laid off, and homelessness is on the rise.\n\nAttempts by the previous administration to stimulate the economy and restore confidence in the financial system were ineffective and frequently had the opposite effect. This eroded public trust in the government, resulting in an overwhelming vote for the first Democratic President since Woodrow Wilson. That man was Franklin Delano Roosevelt.\n\nBorn in New York and distantly related to former President Theodore Roosevelt, FDR began his political career as a state senator before becoming Assistant Secretary of the Navy. But tragedy struck in 1921 when he was diagnosed with polio. He was paralyzed from the waist down, which kept him out of politics for years.\n\nRoosevelt, on the other hand, would not let his career end there. He fought hard to make a comeback and was eventually successful when he became Governor of New York, a position he held until his current position as Commander in Chief of the United States of America.\n\nAs President, Roosevelt will attempt to revitalize the American economy and begin to pull the country out of the Great Depression by enacting a series of programs known as the ‘New Deal.' Nobody knows if it will work, but he has brought something new to American politics and hope to the American people..."
 USA_Harold_Stassen_desc: "\"Government is like fire. If it is kept within bounds and under the control of the people, it contributes to the welfare of all. But if it gets out of place, if it gets too big and out of control, it destroys the happiness and even the lives of the people.\"\n\nHarold Edward Stassen, born in West St. Paul, Minnesota, was elected county attorney of Dakota County, Minnesota after graduating from the University of Minnesota. In 1938, he was elected Governor of Minnesota. Stassen is the youngest person to ever hold that position. He also delivered the keynote address at the Republican National Convention in 1940.\n\nStassen has always been a liberal Republican who has challenged the more conservative elements of the Republican Party, but he has never had the real power to do so. With his unexpected \"promotion,\" Stassen now has the means and resources to effectively oppose the conservatives."
 USA_Harry_S_Truman_desc: "\"If we see that Germany is winning we ought to help Russia, and if Russia is winning we ought to help Germany, and that way let them kill as many as possible although I don't want to see Hitler victorious under any circumstances.\"\n\nHarry S. Truman grew up in Missouri and served as a captain in the Field Artillery during World War I. When he returned home, he opened a haberdashery in Kansas City, Missouri, and was elected as a Jackson County judge in 1922. In 1934, Truman was elected to the United States Senate from Missouri.\n\nFrom 1940 to 1944, he rose to national prominence as the chairman of the Truman Committee, which sought to reduce waste and inefficiency in wartime contracts. Truman visited several military bases in 1940. He used his chairmanship of the Committee on Military Affairs Subcommittee on War Mobilization to launch investigations into abuses while the country was preparing for war. Truman appointed a new special committee to conduct a formal investigation. Truman led the committee with extraordinary skill and usually achieved consensus, resulting in widespread media coverage that earned him a national reputation."
 USA_Henry_A_Wallace_desc: "Henry Agard Wallace, a renowned American statesman, economist, and agriculturist, influenced the agricultural and economic scene during his tenure as Secretary of Agriculture, where he redefined the agricultural landscape.\n\nWhile his family was tied to the Republican party, Wallace diverged from the party's stance on highly protectionist tariff policies, leaving it in 1928. Joining the Democratic party, he became a natural candidate for the position of Secretary of Agriculture in 1933. He spearheaded the formulation of policies that would shape the New Deal legislation, most notably the Agricultural Adjustment Act of 1933.\n\nMany people laid the groundwork for a presidential campaign during the 1940 presidential election. With the outbreak of global conflict, Wallace publicly endorsed President Roosevelt's third term. Despite Roosevelt's insistence on Wallace serving as his vice president, he was faced with scrutiny because of his family's deep Republican roots. He did, however, end up securing the position of Vice-President.\n\nWith the Democrats having won the 1940 election, Wallace begins his tenure as Vice President. His assistance will be critical in adapting to the changing circumstances of the current political landscape."
 USA_Henry_Luce_desc: "\"The world of the 20th century, if it is to come to life in any viability of health and vigor, must be to a significant degree an American century.\"\n\nHenry Robinson Luce founded and oversees a publishing empire that has transformed journalism and the reading habits of millions of Americans. Luce has established the first multimedia corporation with his radio projects and newsreels.\n\nSince then, he has remained an influential Republican Party member and a key figure in the so-called \"China Lobby,\" steering American foreign policy and popular sentiment in favor of Kuomintang leader Chiang Kai-shek in their war against the Japanese.\n\nLuce penned a famous editorial in Life magazine in 1941, called \"The American Century\", where he envisaged that the United States would achieve world hegemony, and in the same year, declared the 20th century to be the \"American Century\". He now has the opportunity to lead the United States into this new age."
 USA_Herbert_Hoover_desc: "\"Economic depression cannot be cured by legislative action or executive pronouncement. Economic wounds must be healed by the action of the cells of the economic body - the producers and consumers themselves.\"\n\nDuring the Great War, Hoover devoted his talents to humanitarian work. He was eventually appointed as the head of the Food and Drug Administration and was later appointed to the position of Secretary of Commerce, when finally in 1928, he was able to secure the presidency. However, 1929 would prove to be a disastrous year for Hoover. The stock market in the United States crashed, causing the economy to spiral out of control. Due to his conservative philosophy, Hoover believed that assistance should be handled on a voluntary basis without government intervention, causing him to veto any bills for relief efforts.\n\nOverall it has been a terrible term for the Hoover Administration, whose reputation has been tainted by the economic crisis and, in particular, the Bonus Army scandal. Herbert Clark Hoover's disastrous presidency has now resulted in his party's defeat in the 1932 elections at the hands of the Democrats.\n\nAs his term comes to an end, Hoover grits his teeth and licks his wounds as he prepares to hand over power to the upcoming president, Franklin Delano Roosevelt."
 USA_John_Nance_Garner_desc: "Vice President John Nance Garner has always rubbed some individuals the wrong way, viewed as both a popular figure in some circles and a ‘evil old man' in others. His likability, however, was not on the minds of the people at the inauguration, but rather how he planned to help the country get back on its feet and recover from the four-year-long economic crisis.\n\nGarner, who is originally from Texas, studied law before entering politics as a county judge. He only stayed for a short time before being elected to the Texas House of Representatives. During his two terms, he earned the nickname ‘Cactus Jack' for his unwavering support of the prickly pear cactus when the legislature decided on a state flower.\n\nGarner entered national politics after being elected to the newly created 15th congressional district in the United States House of Representatives. He served fifteen consecutive terms in the House, rising through the ranks to become Minority Leader and, soon after, Speaker of the House. Since Prohibition was in effect, he ran a ‘Board of Education,' where his colleagues could drink alcohol and ‘strike a blow for liberty.'\n\nDespite his lifetime of experience, ‘Cactus Jack' is unlikely to have the opportunity to influence the President's liberal thinking. However, he will almost certainly be tasked with the difficult task of ensuring that the ‘New Deal' promised to the American people becomes a reality. This will not be a simple task..."
 USA_Norman_Thomas_desc: "Norman Thomas, known for his progressive socialist ideology, has emerged as a prominent figure within the socialist party, leaving his imprint on the realms of economic and social reform.\n\nJoining the Socialist Party in 1918, Thomas, who was not afraid to enter the political arena, ran several campaigns. He ran for governor under the socialist party's ticket in 1924. His tenacity was further demonstrated by his unsuccessful bids for mayor of New York City in 1925 and 1929. However, his presidential campaign in 1928 turned out to be a failure.\n\nDuring President Franklin D. Roosevelt's presidency, Thomas emerged as a critic of the New Deal, arguing that its emphasis on economic imperatives overshadowed the nation's pressing moral issues. He emphasised the importance of a comprehensive approach to governance that includes both economic prosperity and ethical considerations.\n\nNow, in the midst of a remarkable turn of events, Thomas finds himself at the helm of the United States, assuming the mantle of leadership with the solemn duty of putting his socialist economic and social policies into action. In this pivotal role, he strives to pave the way for a more equitable American society, ensuring the country's continued glory."
 USA_Raymond_Baldwin_desc: "Raymond Earl Baldwin joined the United States Navy at the start of the Great War and rose to the rank of lieutenant in September 1918. In August 1919, he resigned from the Navy and returned to Yale Law School. He passed the bar exam and practiced in New Haven and Bridgeport. Following that, he served as prosecutor and later judge of the Stratford Town Court.\n\nHe was elected governor of Connecticut in 1938 as a conservative Republican, promising a balanced budget, government aid to private businesses, and lower taxes. He drastically reduced the state budget, resulting in a million-dollar surplus.\n\nWendell Willkie was an early supporter of Baldwin. He ensured that Connecticut's delegation at the 1940 Republican National Convention backed Willkie, which was critical in defeating frontrunners Thomas Dewey, Robert A. Taft, and Arthur Vandenberg. Willkie had unofficially promised Baldwin the position of running mate, but party leaders pushed Willkie to name Charles McNary instead, and Baldwin graciously stepped aside. Now it appears as though Willkie kept his promise after all, albeit unwillingly."
 USA_Robert_Taft_desc: "\"The New Dealers, labor politicians and Socialists have tried to take advantage of the natural American instinct for charity to forward their plans to socialize the furnishing of the necessities of life to all. If the Government gives free medical care to everybody, why not free food, clothing and housing?\"\n\nA lot can be said about Robert Alphonso Taft Sr., also known as \"Mr Republican\": politician, lawyer, and scion of the Republican Party's Taft family. Taft served in the United States Senate representing Ohio, briefly as Senate Majority Leader, and was a leader of the conservative coalition of Republicans and conservative Democrats that prevented the New Deal from being expanded.\n\nTaft had previously sought the Republican presidential nomination, frequently battling for control of the party with the moderate faction led by Thomas E. Dewey. He has also emerged as a prominent non-interventionist, opposing American involvement in the war.\n\nTaft's non-interventionist stances harmed his 1940 campaign, and the Republican National Convention instead nominated Wendell Willkie. Now Taft's efforts appear to have paid off after all, and he will do everything in his power not to let this opportunity pass him by."
 USA_Thomas_E_Dewey_desc: "\"No man should be in public office who can't make more money in private life.\"\n\nThomas Edmund Dewey, lawyer and politician from New York, has been known for his relentless effort to curb the power of the American Mafia and of organized crime as prosecutor and District Attorney. He leads the moderate faction of the Republican Party in opposition to conservative Ohio Senator Robert A. Taft.\n\nDewey is an advocate for the professional and business community of the Northeastern United States, which consists of internationalists who are in favor of the fight against communism and the Soviet Union, and support most of the New Deal social-welfare reforms enacted during the administration of Roosevelt.\n\nDescribed as \"an odd mix, a pay-as-you-go liberal and a compassionate conservative\" and regarded as an honest and highly effective governor, Dewey will have his skills put to the test as he is leading America through crisis."
 USA_Wendell_Willkie_desc: "\"Freedom is an indivisible word. If we want to enjoy it, and fight for it, we must be prepared to extend it to everyone, whether they are rich or poor, whether they agree with us or not, no matter what their race or the color of their skin.\"\n\nWendell Lewis Willkie, an American lawyer, corporate executive and now President of the United States. A long-time Democratic activist, Willkie changed his party registration to Republican in late 1939. As German forces advanced through western Europe, many Republicans did not wish to nominate an isolationist like Robert A. Taft, or a non-interventionist like Thomas E. Dewey, and turned to Willkie instead.\n\nA big advocate of pro-business policies, protecting individual rights, and opposing foreign aggression while supporting world trade, Willkie now has the opportunity to shape the United States as he had always envisioned them."
 YUG_Aleksandar_I_desc: "To his admirers, King Aleksandar I is the father of Yugoslavia, the unifier of Serbs, Croats, and Slovenes into a single kingdom, a man who sacrificed democratic niceties to preserve unity and stave off chaos. To his detractors, he is a royal autocrat, a centralizer obsessed with erasing identities in the name of artificial cohesion.\n\nSince his proclamation of the Dictatorship in 1929, Aleksandar has ruled not through parliament, but by decree, suspending the constitution, banning political parties, and silencing opposition. His vision is clear: a strong, centralized Yugoslavia under one crown, one people, one identity. National divisions, ethnic pluralism, and federalist aspirations have no place in his carefully designed kingdom. Yet the kingdom grows restless. Beneath the imposed unity, tensions smolder. Croats demand autonomy, Macedonians and Bosniaks resist assimilation, and even within Serbia, voices question the price of peace.\n\nAleksandar rules with an iron resolve, but the foundations beneath his throne may be far more brittle than they appear."
 YUG_Milan_Srskic_desc: "In a kingdom where politics now takes place behind palace doors, Milan Srškić is the perfect Prime Minister: discreet, obedient, and reliably unremarkable. Appointed by King Aleksandar I, Srškić governs not by popular mandate, but by royal favor, a steward of authority rather than a wielder of it.\n\nOnce a lawyer and parliamentary functionary, Srškić rose through the ranks not by demagoguery or bold reforms, but by quiet competence and political loyalty. His task is not to lead a nation, but to manage it, to hold the state together through bureaucratic steadiness while the king exerts real control from the shadows. Yugoslavia, wracked by ethnic divisions and haunted by its fragile unity, teeters between order and disintegration.\n\nSrškić offers no grand solutions, no national vision. Only silence, obedience, and an unwavering commitment to the status quo. In this regime, that is not a flaw. It is his greatest qualification."