### CRUMBLING EMPIRE (Britain POV)
 ENG_Crumbling_Empire.1.t: "The Fallen Bridge"
 ENG_Crumbling_Empire.1.d: "We have just received reports that the last pockets of organized resistance have surrendered to German forces in London. Small arms can be heard across the city, but no significant unit has remained after the final push to capture Tower Bridge and Vauxhall Bridge. The swastika now flies over Buckingham Palace and the House of Commons. Big Ben was destroyed by a German bombing, and only the lower building of Westminster remains of what was one of the most iconic buildings in London and the United Kingdom.\n\nFortunately, the majority of the civilian population evacuated before the Germans arrived, but we can only pray for those who remained. [ENG.GetLeader] refused to evacuate, but it's likely that he left with the Royal Family, who evacuated well before the fall of the city.\n\nWhile London has fallen, the war must go on, but because it was one of the key cities in England, it'll be difficult to resist the German offensives. We must continue to battle the Nazis and prevent them from capturing the remainder of the United Kingdom."
 ENG_Crumbling_Empire.1.A: "We shall NEVER surrender...right?"
 
 ENG_Crumbling_Empire.2.t: "The Coats Mission"
 ENG_Crumbling_Empire.2.d: "\"We will first travel to Pitchford Hall, your Majesty, then from there, if needed, we will drive the family to Liverpool to prepare for your departure to Canada.\"\n\n\"If needed?\"\n\n\"Yes, if the enemy manages to reach the Midlands, we have direct orders to evacuate you and the rest of the family to...-\"\n\nThe commander trailed off. He squinted his eyes, looking at something in the distance. Then, a look of pure dread appeared on his face. He slowed the car down and took a sharp turn onto a dirt side-road full of trees on each side, with the rest of the convoy following. Silence followed, with no one daring to take a breath. In the distance, multiple figures emerged, with dark grey suits, helmets... and guns. The commander turned his head back, whispering “Get your heads down!” The German patroller's footsteps became louder, louder, then German laughs and talking came into range. Now they were right next to the clearing, with the armoured cars on the other side. But what was something of a miracle, and possibly drunk patrollers, they didn't look over, and the footsteps slowly faded, along with their talking. The commander slowly lifted his head to look out the side window. Nothing in sight.\n\n“Bloody hell. Sorry for that, your Majesty, but no time to catch our breaths. We keep moving, and quickly.”"
 ENG_Crumbling_Empire.2.A: "Too close for comfort."

 ENG_Crumbling_Empire.3.t: "Women, Children and Conservatives First"
 ENG_Crumbling_Empire.3.d: "“Please sir, I'm begging you, you have to let us on this ship! My wife and kids are there! They can't be left alone, please sir!” Tears filled the father's eyes.\n\n“My kids need to be on that ship! They need to get out of here, who knows when another one will come! ” Another mother cried.\n\nA soldier addressed the crowd: “Folks, I'm sorry, but there just isn't enough room. You'll have to board another ship.”\n\nRight as the crowd of civilians was to make another plea, several armored cars rolled forward through the chaos of the port. Out came multiple MPs and rich aristocrats. A group of soldiers parted the crowd, and the guard of the ship's entrance let them in without hesitation. As they boarded the ship, outrage began to fill the crowd.\n\n“You cowards! You're leaving us to die!”\n\n“What happened to the women and children first policy, you bloody dicks!”\n\n“You're supposed to lead and help us!”\n\nFood and garbage filled the air as people threw whatever they had at the elite. And they didn't even look back at the people they were supposed to help, stranding them on the isles, and leaving them in the hands of the Germans"
 ENG_Crumbling_Empire.3.A: "And what about us?!"

 ENG_Crumbling_Empire.4.t: "Curtains"
 ENG_Crumbling_Empire.4.d: "“We live in a period, where...”\n\n“SHUT UP”, one of the guards shouted, ramming the end of his rifle into Mosley's stomach. He had been trying to convince the guards that the end was inevitable and that the UK should accept its fate. Emotions were high in the prison cell where Oswald lay, bruised and bloodied, with each of the guards taking their turns to attack him and hurl insults towards him.\n\n“You fascist traitor! You think the Germans will save you? Hah! They'd make you nothing more than their little bitch.” John, a proud Labour voter, had never liked Oswald since the day he created the BUF, and had been a part of a mob that once tried to attack Mosley in his early days of fascism. And now he was in charge of making sure that the Germans never got to him; he had the final say over what happened to his enemy, Oswald Mosley.\n\n“There's only one option we have in this hour of darkness: slay this fucker and leave him to rot in this wretched place”, exclaimed John. The others all looked at one another, nodding their heads in agreement. “How are we going to do it though?”, one of them asked.\n\n“In the most painful way possible”, snarled John.\n\nThey picked Mosley up and slammed him against the wall, and he was sobbing by now, trying to apologise and make up for what he said were “terrible mistakes”. “That doesn't cut it now you slimy bastard. Bring him this way”, yelled John. The rest dragged Mosley into the courtyard of the prison, out into the cold bitter air of the night, and he was promptly thrown down onto the ground, kneeling and begging for mercy. The guards formed a line and waited for John's orders.\n\n“Ready... Aim... Fire!”\n\nAnd with four gunshots, the figurehead of British fascism was gone, snuffed out before he could betray anyone else. One of the guards poured a can of petrol over him, and John grabbed a match. Lighting his cigarette, and then Mosley's lifeless corpse, he watched all that anger, all that hatred, burn before him."
 ENG_Crumbling_Empire.4.A: "And no one shed a tear"

 ENG_Crumbling_Empire.5.t: "Departure"
 ENG_Crumbling_Empire.5.d: "“We're leaving now, Prime Minister... you aren't coming, are you?”\n\nChurchill sat on the far end of the bed with a bottle of Champagne on his nightstand. He didn't say a word, only looking down at the floor. The King closed the door and walked over to his bed, and sat next to him. The two sat for a few minutes until Churchill broke the solemn silence. \n\n“Do you ever regret asking me to become Prime Minister of this country?”\n\nThe king looked over, pausing for a second until answering. “Not at all. While I at first preferred Halifax at the beginning, and maybe it would've been better to sue for peace before the invasion, I don't think anyone could lead Britain through this time better than you have. You will then, and always, have my support. Even with the buggers marching around London and my palace.\" Churchill chuckled to himself and grinned slightly.\n\n“Your Majesty, I will lead England to its last breath. Even then, its heart will live in every home, every street, and every mind of every British citizen. No matter where, no matter when, no matter who conquers our island, we will fight for freedom.”\n\nThe King smiled. “Yes, yes we will... and I know I've asked thousands of times before, but for one final time, please, you should come with us to Canada. If Britain does fall, we will need someone leading the fight in exile. We need you.”\n\n“Your Majesty, with all due respect, that is still one of your dumbest ideas yet. I don't know why you keep bringing it up.” The two laughed one final time together.\n\n“I will fight for this country until God takes me. If Britain needs anything right now, it's their leader.”\n\n“That's the Churchill I know. And let's be honest, you never took any of my advice anyways... Do you think  that I'll ever see you again, after all of this?\n\nChurchill looked over, “I won't make any promises, your Majesty, but do know this: I will not leave this island until Britain is saved.”"
 ENG_Crumbling_Empire.5.A: "Goodbye, Winston. God be with you."

 ENG_Crumbling_Empire.6.t: "Et Tu, Hun?"
 ENG_Crumbling_Empire.6.d: "\"Are you sure, Mr. Prime Minister?\" \"Mrs. Churchill and the children are already here,\" the other end of the telegram inquired, \"but the Protocol requires all government officials and their families to...\"\n\n\"Not for me!\" exclaimed Winston Churchill. I will not let the British people see their Prime Minister as a coward who will flee with his tails between his legs!\" \"Understood, Prime Minister,\" the other side says over the phone, breaking the silence, \"I wish you the best of luck.\"\n\nWinston Churchill hung up the phone, walked over to his desk, and pulled out a drawer containing a Webley Pistol and a case of cigars. He lit up one of the cigars, took a big puff, and opened a bottle of Pol Roger, drinking as much as he could stomach. It might be the last drink he ever has, he reasoned. Noises began to come from outside his room, loud, heavy steps, steps too loud for any proper British gentleman, steps too heavy for any British of good manners.\n\nWinston knew exactly who was taking these steps, so he checked his Webley's chamber and cocked its hammer, waiting for the people outside the doors to come in for a proper welcome..."
 ENG_Crumbling_Empire.6.A: "Gone, but not forgotten"

 ENG_Crumbling_Empire.7.t: "Sunset"
 ENG_Crumbling_Empire.7.d: "It was dusk but the flames still lit up the desolate streets of London. What were once grand avenues and magnificent Victorian buildings had been destroyed by the Blitz and the last months of the war, the rest had been burning steadily for days, giving the night a strange crimson colour.\n\nTower Bridge had been sabotaged by some seasoned resistance fighters, blocking the Thames and making access to the other side of the river difficult, but to little effect. St Paul's Cathedral had also failed to withstand the devastating forces and had been hit by several shells and other bombs. God too seemed to have fled England with the government.\n\nProbably the most tragic loss was the destruction of the left wing of Buckingham Palace. Now the home of the British kings, looked like just another ruin, the last vestige of a past that was no longer there.\n\nThe sun had now set over London, and a long night was just beginning."
 ENG_Crumbling_Empire.7.A: "God have mercy on us all"

 ENG_Crumbling_Empire.8.t: "Carving the Carcass"
 ENG_Crumbling_Empire.8.d: "London burns. And with it, the British Empire, a once proud and mighty power with the world at its feet, now sunken to the bottom of despair and desolation.\n\nBut not all countries see it that way. Some see it with glowing eyes, ready to pounce on defenseless territory.\n\nBuilding an empire makes enemies of many, with those exact enemies waiting until the time is right to take back what they see as theirs. And with British rule across the world in chaos, the dead body of the British Empire is slowly being picked upon, nations circling like vultures and taking pieces of a carcass spanning a third of the globe.\n\nIn Africa and the Middle East, various independence movements are already declaring unrecognized states, although it remains to be seen if Axis will let so much territory slip away from them. South Africa and Rhodesia expand their borders in an attempt to consolidate the region and protect their interests, and Yemen moves to claim land it has wanted for years.\n\nIn Asia, the question of the problems within the Raj will have to be solved by those who live there, which will surely spell disaster for some and opportunity for others. Malaya is now free, although what kind of future they want is still clouded, especially with Japan keenly eyeing the region. Australia also seeks to strengthen its interests, and will want to become a bulwark against Japanese expansionism, perhaps even aligning itself with US interests.\n\nAs the sun sets on the British Empire, a new sun rises over a world, clouded in ever more confusion about what the future holds."
 ENG_Crumbling_Empire.8.A: "All empires fall eventually..."

 ENG_Crumbling_Empire.9.t: "Götterdämmerung"
 ENG_Crumbling_Empire.9.d: "The unthinkable has occurred. Several German paratroopers and infantry units landed at four different locations on our shores. After a crucial naval battle between the Royal Navy and the German Fleet, led by Erich Raeder, they gained enough naval and aerial superiority thanks to the new Focke-Wulf 190 fighter - which outperformed the Spitfire -  to land.\n\nThe German tanks and infantry had a difficult time breaking through our defences due to strong resistance from the Home Guard and other units. The fallschirmjäger have also landed behind lines, capturing key buildings and radio towers.\n\nMultiple counter-offensives began as soon as the enemy landed, but because the Home Guard were untrained and the other British Army units were at half-strength and missing a lot of heavy weaponry, the attacks were repulsed and the Germans were able to continue their offensive to London.\n\nIt is unclear whether more landings will take place, but given their near-complete aerial superiority and vastly outnumbering our tanks, it will be difficult to mount a strong enough defence to successfully repel the German advance toward London."
 ENG_Crumbling_Empire.9.A: "May God save us all!"

 ENG_Crumbling_Empire.10.t: "Concilii Consultum Ultimum - The Final Act"
 ENG_Crumbling_Empire.10.d: "[FROM.GetNewsIcon]“Unternehmen Seelöwe ist ein Triumph! Die siegreiche Wehrmacht nähert sich London!”\n\nThe headlines in the German Reich are all the same: the United Kingdom is in danger. [ENG.GetLeader] has announced to the House of Commons, paraphrasing his own speech, that \"we will fight them in the cities and in the palaces, in London and in Belfast, to the last British soul!\"\n\nIn a lengthy speech delivered in front of the assembly, [ENG.GetLeader] also proposed a final act before the capital's fall. The Concilii Consultum Ultimum, or \"Final Act of the Council,\" declared to the rest of the world that the British people will do nothing but fight. Fight against the Nazis and their collaborators to protect their culture, King, and homes...\n\nDespite his family's attempts to persuade him to flee to Canada, the King, his Imperial Majesty George VI, approved this final act of the British Parliament with an absolute majority.\n\nAs the sounds of cannons approached the building, shaking the entire structure, [ENG.GetLeader] finally said, covering the noise, \"Now take up arms, and fight for Britain!\""
 ENG_Crumbling_Empire.10.A: "The destiny of England now rests with its own people..."

### THIRD VERSAILLES (Germany POV)
 Third_Versailles.1.t: "Dusk Over England"
 Third_Versailles.1.d: "In those painful and hard days after November 1918, we watched the British Empire stand over us, laughing and expanding while we were left to pick up the pieces of a broken nation, a nation we had fought so hard to protect, one trying to claim its rightful place in the world. Those scenes of jubilant British soldiers receiving a warm welcome when they returned to London are etched into our memories forever, a stark contrast between the situations both of our nations faced.\n\nNow, it is their turn to look on in horror as the British state crumbles before their eyes.\n\nWhile we acknowledge that they fought hard to try and protect a pitiful excuse for a home, they stood no chance against the full might of the German army, which proudly marched through many cities and streets, including the main prize: London. The blight of Versailles and the memory of 1918, finally avenged, with our place in the world secured at last after all these years. It truly is a sight to behold.\n\nYet not all is well on the isles. The Scottish have taken their chance for independence by the scruff of the neck, and have immediately begun preparing fortifications should we decide to strike them. The remains of the British government and the upper classes have fled to Canada, where they say they will “continue the fight against fascism”, although how much of a fight they put up remains to be seen. And those who still remain here will now be subject to our rule, but of course, only those who have a reason to fear us should be afraid, for we shall be kind to the average British citizen. After all, their services to the Reich will be much appreciated.\n\nThe sun sets over England, and it is only a matter of time before it disappears from view forever."
 Third_Versailles.1.a: "Now they must suffer as we did in 1918."
 Third_Versailles.1_tt: "The once mighty British Empire lays §Rbroken§! before our might.\n\nStarts the §YThird Treaty of Versailles§! event chain."
 
 Third_Versailles.2.t: "The King in Exile"
 Third_Versailles.2.d: "Now that the cowardly French and pitiful British have kneeled before the might of German supremacy, it is time to consider peace terms. However, with the current illegitimate English government, there is no chance of starting peace talks. If we are to win this war and establish our dominance in Europe, we must first reorganise the British government, and we have just the man for the job.\n\nEdward VIII, former King of the United Kingdom, is currently appointed Governor of the Bahamas, after accusations of being a Nazi sympathiser. Edward and his wife sympathised with national socialism and our government before and during the war, touring Germany shortly after their marriage where they had tea and a long conversation with Adolf Hitler. Edward has even asked the Wehrmacht for protection during the occupation of France. Therefore we have made sure to keep a close eye on him so that we may be able to use him once the time is right.\n\nWith Operation Sealion being a success, there is no better time to restore the rightful ruler of England back to the throne."
 Third_Versailles.2.a: "Send the good news to Edward."
 
 Third_Versailles.3.t: "The Re-Coronation of Edward VIII"
 Third_Versailles.3.d: "[FROM.GetNewsIcon]Surprising news from London today, as Edward VIII was re-coronated as King of the United Kingdoms of England and Wales. Edward VIII, who had abdicated years before to marry American starlet and divorcee Wallis Simpson, had arrived on the isles only days before to reclaim the throne.\n\nEdward VIII was crowned for the first time in Westminster Abbey's regal and immaculate halls, but the scene is very different this time. The abbey has already been severely damaged by German artillery and firebombing, and the roof must be quickly rebuilt for the ceremony. The abbey's front is adorned with the swastika of the German Reich rather than the Union Jack.\n\nThe Fuhrer, Adolf Hitler, was in attendance and was heavily escorted by his bodyguards. Observers believe that the re-coronation of the king is a political move by Hitler to end fighting and resistance on the British Isles, as King George VI has fled to Canada and condemned the action, calling it \"nothing more than a puppet king with his strings clenched tight.\"\n\nExperts believe that the British populace who have remained on the island will rally to Edward VIII, who had much popular support during his short reign, as they feel abandoned by the king and his government. Only time will tell who will become known as the \"true king.\""
 Third_Versailles.3.a: "Nothing more than a charlatan claiming to be king!"
 Third_Versailles.3.b: "God save the King!"
 Third_Versailles.3.c: "And so the House of Windsor turns on itself"
 
 Third_Versailles.4.t: "Das Ende der Westlichen Welt"
 Third_Versailles.4.d: "After many years, after the many bloody trials; Germany is finally winning.\n\nThe issue with the king had been dealt with, since the near-total occupation of the British Isles had left no main government to arrive for the negotiations. Instead, the selected king Edward the VIII will represent Britain itself. France has already been dealt with, so now it's time to finally dictate peace.\n\nHitler was excited at the prospect of a German Europe, but peace had to be made first to give the German Volk a breath of fresh air. But where would a good place be? Where would be a place where Germany would regain its prestige and power by crushing the British and French in revenge? Hitler knew exactly the place where the negotiations would take place, and now he had to make it clear to his cabinet.\n\n“To undo the humiliating peace upon us in the First World War”, Hitler stated to his surrounding cabinet, “We must enact revenge and redemption. By holding these said negotiations in The Hall of Mirrors in Versailles.”\n\nTo Hitler, the palace in which Germany was shamed and defeated shall be overshadowed by this new victory Germany would obtain. Germany shall never let itself be humiliated anymore, and the Fatherland from now on will embark itself to be the most powerful nation in the world."
 Third_Versailles.4.a: "And I know just the place - Versailles"
 Third_Versailles.4_tt: "Our victory over our old enemies is complete, and now it is time to dictate our terms."
 
 Third_Versailles.5.t: "The Third Treaty of Versailles - Wales"
 Third_Versailles.5.d: "As our negotiators work on the treaty of peace with England, an unexpected question has arisen. While we were resting, our delegation was approached in secret by a Plaid Cymru delegation. They have come to us to request that Wales be separated from England. The concept has a lot of potential. Separating Wales from England would give us a potential ally on the island while weakening England because much of the coal used in England comes from Welsh fields. Furthermore, rumours persist that Saunders Lewis, leader of Plaid Cymru and likely leader of a free Wales, has sympathies for our government.\n\nOur more lenient negotiators, on the other hand, have pointed out that the idea has drawbacks as well. A free Wales could easily support the Americans or, God forbid, the Soviets over us. Not only that, but Wales would be completely defenceless against foreign invasion. With a low population, an extraction-based economy, and a national identity that has been nearly stomped out over the past 500+ years of English dominance, the country has few long-term prospects. They insist that any separation would be temporary for these reasons, and that the English would eventually reassert dominance in some form or another. Instead, they argue that the English should simply keep Wales."
 Third_Versailles.5.a: "Wales will be granted independence."
 Third_Versailles.5.b: "England may keep Wales."
 
 Third_Versailles.6.t: "The Channel Islands"
 Third_Versailles.6.d: "As we cut up Europe to our pleasure, the future of the Channel Islands - Guernsey, Alderney, Sark and Herm, has come to the forefront. The islands themselves are miniscule compared to our other conquests in terms of landmass and population. They do, however, have a greater significance. Until Operation Sea Lion, these British holdings off the coast of France were the only ones held directly by our forces in Europe. Not only that, but their location is significant as well. Being just off the Norman coast they are close to right in the middle of the Channel. Controlling them could have enormous strategic implications.\n\nThe Kriegsmarine has recognised the potential significance of the islands and has requested that we keep them so that we can further develop them into a proper naval outpost, allowing us to easily project power into the Channel and beyond. It would also be simple to Germanize. With such a low native population, even a small naval base could employ enough Germans to turn the islands into a territory as loyal as Berlin.\n\nOthers, however, have objected to such a remote outpost. They have suggested that we simply return the islands to the English. Finally, a decision must be made as the delegates gather to put pen to paper."
 Third_Versailles.6.A: "They shall become a Kriegsmarine base!"
 Third_Versailles.6.B: "England may keep the Channel Islands."
 
 Third_Versailles.7.t: "The Status of Cornwall"
 Third_Versailles.7.d: "Despite being a British position for over a thousand years, Cornwall has retained its distinct culture, more akin to Wales or Ireland than the rest of Britain. This distinction has fostered a sense of independence in the former Duchy, which our delegates have noted. While independence is not an option, cutting them off from the British and using them to keep tabs on the English has gained traction among our negotiators.\n\nThe ability to easily move large numbers of men across the Channel to an already well-established base reduces the likelihood of a future British uprising. The Royal Navy is still a formidable force at sea, but the British Army couldn't stand up to us, even before we ground it to dust.\n\nSome have suggested that we simply return Cornwall to the United Kingdom. They point out that local resistance will inevitably be strong, just as it will be in any other part of England that our troops may control. This would necessitate more troops than our military plans allow for, not only to man the border, but also to quell the inevitable revolts. Not only that, but the Cornish dislike us slightly less than the British. Any garrison in Cornwall will be left at the end of an extremely shaky supply line, fighting an endless guerilla war on their own turf against an enemy with no immediate support. In a nutshell, it would be a military disaster waiting to happen."
 Third_Versailles.7.a: "We will seize Cornwall as a base."
 Third_Versailles.7.b: "England may keep Cornwall."
 
 Third_Versailles.8.t: "The Issue of Armament and Security"
 Third_Versailles.8.d: "While there has been some moderate debate on previous issues, the future of the British military is unquestionable. No self-respecting German could stomach an unlimited British army or navy. The only point of contention was the size of the new British military. After a full day of deliberation, the draft was written up and ready for the English to read. When the two delegations met for negotiations, it was no surprise that the Germans quickly handed over their demands to the British. After inspecting them, the outrage began.\n\nThe British Army was to have a strength of no more than 40,000 men, including command and support personnel. There would be no reserve or national guard forces. Tanks, planes (including gliders), and submarines were prohibited from use by Britain, and any in British possession were to be turned over immediately. The British Navy was to be completely disbanded, with the exception of a token coast guard with no more than 50 ships and 10,000 enlisted sailors. As a result, the British merchant marine would be spared. Because all planes were to be turned over to Germany, the RAF will have to be disbanded.\n\nAfter being informed that not signing would resume the war, the enraged British finally quieted down. With no other choice and great solemnity, the British signed."
 Third_Versailles.8.a: "The Lion will be declawed."
 
 Third_Versailles.9.t: "Final Issue - War Reparations"
 Third_Versailles.9.d: "As the conference draws to a close, the delegates have reached the final point on the agenda: payment. This was a particularly pressing issue for Germany because the reparations demanded by the Treaty of Versailles were a major point of contention during their rise to power. They will now be able to inflict similar suffering on the British people. Following discussions with Berlin, the German delegates presented the British with a bill for 140 billion marks, valued at their 1939 value. This payment was to be made in ten equal annual installments of 14 billion marks. If Britain fails to make a payment, the German Reich has the right to seize 14 billion marks in British imports.\n\nThe British delegation objected vehemently, stating that it would require as much money as possible to rebuild its shattered nation and pointing out that prior to the war, the Reich imported approximately 14 billion marks worth of product from all over the world. Instead, they proposed a payment of 132 billion gold marks, the same amount that the Allies forced Germany to pay after the great War. The German delegation flatly refused, stating that if the demand was not accepted within 72 hours, the war would continue. After all attempts at renegotiation failed, the British silently signed off on the bill seventy hours later."
 Third_Versailles.9.a: "England will play for the damage it has done."
 
 Third_Versailles.10.t: "The Third Treaty of Versailles - France"
 Third_Versailles.10.d: "With Britain finally having surrendered, we may now have the opportunity to reach a final agreement with France. Today, Vichy and German delegates have convened in Versailles to decide the future shape of Europe. This time, however, it is Germany that has emerged victorious.\n\nThe conference has proceeded relatively smoothly, thanks to Hitler's close supervision. Much has been discussed, though little has yet been agreed upon. Today's debate centers on how to punish France geographically for its past aggression.\n\nThe delegation's more moderate members advocate for lenient terms, proposing that we reclaim the lost province of Elsaß-Lothringen and reintegrate its German population, while leaving the rest of France as an independent, voluntary member of the Axis.\n\nThe harsher faction, however, has petitioned the Führer to approve a more extensive annexation: the \"zone interdite\" in northern France, to be incorporated directly into the Reich and colonized by German populations, while also establishing a permanent German veto in French governance."
 Third_Versailles.10.a: "We will settle for lenient terms."
 Third_Versailles.10.b: "We demand harsher terms!"
 Third_Versailles.10.c: "They resisted until the end. Harshest terms it is."
 
 Third_Versailles.11.t: "The Status of Brittany"
 Third_Versailles.11.d: "The situation in Brittany is similar to that in Cornwall. It was, however, independent for much longer, and was only recently absorbed by France. It has retained a Gaelic flavour despite being thoroughly tainted by French culture. However, Breton nationalism persists, and some argue that it should be capitalised on. We have nothing to lose and a lot to gain by weakening France in any way we can. Furthermore, having an ally in the French rear would make Paris think twice if they ever thought they were above their station.\n\nThe moderates, on the other hand, argue that Brittany would be cut off from German support if and when France returned to try to reclaim it. Not only that, but cutting off any piece we can justify will only incite a vengeful France against us. They warn, cautiously and respectfully, that our leaders' new Europe may not last long if everyone in Europe despises us more than each other. After some deliberation, a memo from Berlin arrives. A decision was made."
 Third_Versailles.11.a: "Establish Brittany"
 Third_Versailles.11.b: "No - France may keep it"
 
 Third_Versailles.12.t: "Final Issue - The Franco-Italian Border"
 Third_Versailles.12.d: "We were the only ones who smashed France early in the war and rolled up their defences in days. We accomplished in a matter of weeks what the Kaiser failed to accomplish in four long, gruelling years. Meanwhile, Mussolini sat in Rome drinking wine and eating pasta, allowing us to take the majority of the casualties while he dithered. Then, in the final weeks of the campaign, he failed to attack! The Italians only got anything because of our grace and generosity. They are now demanding more. They want everything they took from France, including land they arguably do not deserve.\n\nDenying them anything, on the other hand, would simply alienate our only true ally in Europe. Sure, the Italian Army is less than stellar, but keeping them on our side keeps them away from our enemies and strengthens our new order. Some have suggested that if we don't want to give them everything they want, we should at least give them all the land up to the Rhone River. It's a long way from Mussolini's ambitions, but it might be enough for him to walk away from the talks without hating us."
 Third_Versailles.12.a: "Italy may have its claimed territory."
 Third_Versailles.12.b: "Italy may have land up to the Rhone"
 
 Third_Versailles.13.t: "Italian Claims in France Are Recognized" # ITA POV
 Third_Versailles.13.d: "The negotiations in Versailles have finally borne fruit. Though our sacrifices in the war were far less than those of our northern ally, the Germans have decided to respect our claims on French territory. Italy stands taller today, for we have secured new lands without a single serious concession.\n\nThe world will now recognize the strength and legitimacy of Italy's demands, and the Duce's vision of an Italy restored to greatness has taken a vital step forward."
 Third_Versailles.13.a: "An important victory for Italy!"

 Third_Versailles.14.t: "The Third Treaty of Versailles"
 Third_Versailles.14.d: "[From.GetNewsIcon]Today, Axis leaders from all over Europe have descended on Versailles, the French town where the German Empire was established and where the same nation was dismantled after defeat in the First World War. The problem was that the United Kingdom did not formally surrender, as the remaining members of the government instead fled to Canada and established a provisional government in Ottawa under exiled King George VI. As a result, the German Reich decided to establish an Axis-aligned regime in England, with [ENG.GetLeader] as the new Prime Minister and Edward VIII as the proclaimed king.\n\nGermany has now dictated terms to the defeated powers, and delegates from across Europe have signed the Third Treaty of Versailles. The United States, however, refuses to recognize the newly established British regime and continues to support the exiled government in Ottawa as the legitimate authority representing the United Kingdom.\n\nWith the conclusion of the treaty, Germany has secured victory in the West, marking the end of the Second World War on the Western Front and the beginning of a new era in which the Reich dominates continental Europe."
 Third_Versailles.14.A: "The dawn of a new era!"
 Third_Versailles.14.A.tt: "§GCongratulations! You've won the war in the West!§!\n§RHowever, DH 1.1 does not yet feature a Trans-Atlantic conflict with the U.S. Stay tuned for a future update!§!"
 Third_Versailles.14.B: "Those bastards!"
 Third_Versailles.14.C: "A long-lasting peace? Or just another ceasefire?"