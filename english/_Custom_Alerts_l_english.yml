l_english:
 # GUIs:
 DH_CUSTOM_ALERTS_DISMISSED_BUTTON_TT: "§YЗакриті сповіщення моду§!"
 DH_CUSTOM_ALERTS_DISMISSED_BUTTON_TT_DELAYED: "Деякі сповіщення, додані модифікацією §fDarkest Hour§! були закриті. \n§GClick§! щоб знову відобразити їх, якщо вони є дійсними. \n--------------\nНаразі закриті такі сповіщення модифікації: §Y[This.GetCustomAlertsDismissedList]§!"

 DH_CUSTOM_ALERTS_ENTRY_BUTTON_TT: "§Y[This.GetCustomAlertName]§!"
 DH_CUSTOM_ALERTS_ENTRY_BUTTON_TT_DELAYED: "[This.GetCustomAlertDesc] \n§GRight-click§! щоб закрити."

 # Scripted Localisation:
 DH_CUSTOM_ALERT_DISMISS_TT_LIST_NAME_OTHERS: "\n[This.GetCustomAlertNameOtherContext][This.GetCustomAlertsDismissedListEntry]"
 DH_CUSTOM_ALERT_DISMISS_TT_TOO_MANY: "... та [?num_temp] інші"

 # Custom Alerts:
 CUSTOM_ALERT_1_NAME: "Досягнуто мінімальний прогрес у виконанні операції"
 CUSTOM_ALERT_1_DESC: "Принаймі §Y1§! активна операція досягла мінімального необхідного прогресу, щоб її можна було запустити. \nЦе не обов’язково означає, що ви виконали всі вимоги для її запуску. \n§GClick§! щоб відкрити вікно §Y$DH_WAR_ROOM_HEADER$§!."
 CUSTOM_ALERT_2_NAME: "Досягнуто максимальний прогрес у виконанні операції"
 CUSTOM_ALERT_2_DESC: "Принаймі §Y1§! активна операція досягла §Y100%§! прогресу. Запуск її зараз дасть максимально можливий бонус. Однак, якщо є можливість, ви все одно можете прийняти ще кілька рішень, щоб отримати додаткові бонуси за них, незалежно від прогресу підготовки. \nЦе не обов’язково означає, що ви виконали всі вимоги для її запуску.. \n§GClick§! щоб відкрити вікно §Y$DH_WAR_ROOM_HEADER$§!."
