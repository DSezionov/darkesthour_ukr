 SOV_Introduce_Childcare_idea: "Women in the Workforce"
 SOV_Introduce_Childcare_idea_desc: "Women are viewed as delicate and ineffective in the capitalist West, better off wasting away behind a stove. We know, however, that they are just as useful on the job as any man. We welcome them as the West closes off a valuable and massive workforce. Allowing all women to work alongside their husbands in factories will achieve true equality and raise output to levels unimaginable in the West. With women able to fill less critical positions in the workforce, more military-aged men have become available for enlistment in the Red Army. Our people will march forward, arm in arm, with everyone contributing to our ultimate victory!"

 SOV_Promote_Kolkoz_farms_1: "Kolkoz Agricultural Model"
 SOV_Promote_Kolkoz_farms_1_desc: "Men were slaves to kulaks in the Old Empire, who amassed vast sums of money, vast tracts of land, and more material wealth than the Tsar. However, such frivolity has now been eradicated from our country. The Kulaks are either dead or imprisoned, and their vast estates have been dismantled and rebuilt as the Kolkoz, or collective farm. People there collaborate not for their own benefit, but for the benefit of the Union. They own no land and produce only what they require, preventing wealth accumulation. When used on a large scale, such a system is revolutionary. For the first time in Russia's long history, farmers collaborate with the state rather than work against it."

