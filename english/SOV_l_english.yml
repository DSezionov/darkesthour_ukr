 # Western Military Reorganisation
 SOV_Western_Military_Reorganisation_category: "Western Military Reorganisation"
 SOV_Western_Military_Reorganisation_category_desc: "\n\n\n£decision_header_SOV_Western_Military_Reorganisation£\n\n\n\nWith the westward expansion of the Union, the §RPeople's Commissariat of Defense§! calls for the §Gconsolidation and reorganization§! of our military forces stationed in the Western regions. This would involve the establishment of a new military district in the regained territories, and the westward expansion of the existing zone itself.\n\nOther measures will include the building of a new §gline of defense§! along the border and westward relocation of troops currently garrisoning the Stalin Line. Exercises, revised military plans, and raising additional divisions ensures the bolstering of our preparedness and strength.\n\nWhile we do not currently assess any possible §Raggression§! from our neighbors, it is still in our interests to maintain a significant §Lmilitary presence§! in the region to deter any such acts from taking place."
 SOV_Begin_Construction_of_the_Molotov_Line: "Begin Construction on the Molotov Line"
 SOV_Begin_Construction_of_the_Molotov_Line_desc: "Our expansion into Eastern Europe has pushed our western borders significantly eastward. The Stalin Line has become obsolete as a first line of defence; a new bulwark is required. This new line will run from the Baltic Sea to the Carpathian Mountains, and it will include advanced bunkers, artillery, anti-aircraft defences, and infantry bases. To build it, we'll have to push the Stalin Line back slightly. If the Germans come knocking, they will face the most outstanding defensive works this side of the Maginot Line!"
 SOV_Expansion_of_the_Stalin_Line: "Expansion of the Stalin Line"
 SOV_Expansion_of_the_Stalin_Line_desc: "The Stalin Line has been defending our country since the 1920s. It has long been considered complete, and it is an extremely formidable defensive line. However, as the diplomatic situation around us has deteriorated, it has been determined that the Stalin Line must be strengthened. We must construct more bunkers, increase the number of professional troops in the trenches, and expand fortified districts to channel potential attacks into predetermined elimination corridors."
 SOV_Conduct_Field_Exercises: "Conduct Field Excercises"
 SOV_Conduct_Field_Exercises_desc: "The Red Army is a fierce beast. A horde of wild dogs biting at Socialism's enemies. However, as with any dog, idleness has left them flabby and weak. The Army hasn't seen real combat in decades, and the last war was a humiliation we'd rather forget. If we are to fight tomorrow's enemies, we must train now. That is why we will conduct massive field exercises to test and perfect the latest tactics and equipment for our valiant soldiers. The Red Army will reclaim the vigour it used to conquer the Union and use it to bring liberation to the world's oppressed workers once more!"
 SOV_Mobilisation_Plan_1941: "Mobilisation Plan 1941"
 SOV_Mobilisation_Plan_1941_desc: "Drawing recruits from the Finnish border and the Central Asian steppe requires effort, planning, and a great deal of coordination. That is why the STAVKA has begun to develop a new Mobilisation Plan. The plan will be lengthy and complicated, but with it, we will be able to make use of the Union's vast resources of men and machines. The Mobilisation Plan will guide all deployment and procurement decisions."
 SOV_Reestablish_the_Mechanised_Corps: "Reestablish the Mechanised Corps"
 SOV_Reestablish_the_Mechanised_Corps_desc: "Early Soviet mechanised corps were designed as deep-battle formations capable of breaking through enemy lines and exploiting operational depth using massed armour and motorised forces. Their disbandment in the early 1930s deprived the Red Army of a cohesive mechanised arm. Now, with fascism on the rise, we must re-establish and expand them in order to keep up with the growing and modernising borgeois armies."
 SOV_Convince_Stalin: "Convince Stalin"
 SOV_Convince_Stalin_desc: "Fascism in Germany has proven to be the most aggressive and violent form of monopoly capitalism ever seen on Earth. German rearmament and anti-Bolshevik rhetoric serve as confirmation that the bourgeois state is preparing for a war against socialism. However, it appears that Stalin is unconvinced. He must be convinced that the German regime is ideologically committed to the Soviet system's destruction, and he must allow for preparations for the inevitable Soviet-German annihilation war."
 SOV_Prepare_Contingencies_for_a_War_in_the_West: "Prepare Contingencies for a War in the West"
 SOV_Prepare_Contingencies_for_a_War_in_the_West_desc: "While the Western Allies are our allies, we understand the limitations of such an alliance. Western capitalists are little better than Hitler's fascists or Japanese militarists. While we have no desire to start a war with the West, we cannot rule out the West starting a war with us. So, as we did with the Hiterlites previously, we must prepare. Plans for invasions, deployments, and objectives will be developed. Their revolution will come, but on our own terms. However, if the West attempts to force the issue, we will demonstrate the strength that once conquered Europe and can do so again."

