 # Operation Red Dawn Post-Launch
 SOV_Post_Launch_Operation_Red_Dawn: "Post-Launch Operation Red Dawn"
 SOV_Post_Launch_Operation_Red_Dawn_desc: ""
 SOV_Establish_The_Otrady_KGB: "Establish the Otrady KGB"
 SOV_Establish_The_Otrady_KGB_desc: "The Soviet Border Guard Forces are vast and numerous, but they are not the best troops; their primary role is to prevent illegal entry into and exit from the Soviet Union, as well as to intercept any incoming contraband and suppress dissent at the border. However, with our armies now advancing into the West, there is no longer a place for these men to sit at the border, working for the security services, while their Red Army comrades fight the capitalist enemy. The Border Guards must be mobilised, organised into divisions and corps, and deployed to the front lines. Every Soviet man must fight for his motherland until complete victory is achieved!"
 SOV_NKVD_Divisions: "Soviet NKVD Divisions"
 SOV_Establish_Occupation_Administrations: "Establish Occupation Administrations"
 SOV_Establish_Occupation_Administrations_desc: "As our mighty Red Army sweeps across Europe, we are left to govern millions of people, many of whom have been misled by capitalist lies and do not want to live under the USSR's rule. Fortunately, we don't have to do that job alone, as there are plenty of locals willing to assist us, particularly the communist parties of the territories we control. We will immediately establish occupational administrations, led by these local collaborators and overseen by the Red Army and our security services, to ensure the smooth governance of these new territories while our forces focus on defeating the West."
 SOV_Fortify_The_Vanguard: "Fortify the Vanguard"
 SOV_Fortify_The_Vanguard_desc: "We must proceed with caution and rational thought, preparing contingency plans in the event of a successful Western counterattack. After all, the last thing we want is American tank columns racing towards Berlin, throwing our army to the way-side. To that end, Stavka has ordered that our new frontier areas be fortified, either in Germany or in the Balkans, to provide a safe line of retreat and defence in the event that either is required."

