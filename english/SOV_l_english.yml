 SOV_NKVD_1: "NKVD"
 SOV_NKVD_1_desc: "The People's Commissariat for Internal Affairs was established in 1934 as the Union's primary internal security force. It has quickly become an organisation that strikes terror in counterrevolutionaries across the Union, led by Lavrentiy Beria. They have become incredibly effective at weeding out subversives from seemingly docile populations and making them vanish. As Trotskyists and wreckers continue to try to infiltrate the Union, we have become increasingly reliant on them. While it is widely acknowledged that some of those shot by the NKVD were most likely innocent, their deaths are justified for the sake of the Union's stability. Every day, Beria and his ever-expanding list sign the death warrants of hundreds of people, and every night, trucks full of NKVD men spread out across the Union to attack the day's enemies. No scum should feel safe in his hole as long as Beria and his men are after them!"
 SOV_NKVD_2: "NKVD"
 SOV_NKVD_2_desc: "The People's Commissariat for Internal Affairs was established in 1934 as the Union's primary internal security force. It has quickly become an organisation that strikes terror in counterrevolutionaries across the Union, led by Lavrentiy Beria. They have become incredibly effective at weeding out subversives from seemingly docile populations and making them vanish. As Trotskyists and wreckers continue to try to infiltrate the Union, we have become increasingly reliant on them. While it is widely acknowledged that some of those shot by the NKVD were most likely innocent, their deaths are justified for the sake of the Union's stability. Every day, Beria and his ever-expanding list sign the death warrants of hundreds of people, and every night, trucks full of NKVD men spread out across the Union to attack the day's enemies. No scum should feel safe in his hole as long as Beria and his men are after them!"

 SOV_Unity_Achieved: "Unity Achieved"
 SOV_Unity_Achieved_desc: "With the 17th Congress concluded and all opposition swept away, the All-Union Communist Party remains unchallenged. Stalin's victory combined the will of the people and the state into a single, unbreakable force. In this moment of triumph, we can use our newfound political power to steer the Soviet Union towards greater stability and purpose. Under unified leadership, the party and the people march forward - resolute, organised, and confident in the future."


 ## Special Ideas
 SOV_idea_The_Great_Patriotic_War: "The Great Patriotic War"
 SOV_idea_The_Great_Patriotic_War_desc: "At 4 a.m., without making any claims against the Soviet Union or declaring war, German troops attacked our country, attacked our borders in numerous locations, and bombed our cities from their planes. This unprecedented attack on our country is a heinous act of treachery unlike any other in civilised history. The Soviet Union's government expresses firm confidence that our country's entire population, workers, peasants, intellectuals, men and women, will carry out their duties and work with due consciousness. To ensure victory over the enemy, all of our people must band together like never before to meet the needs of the Red Army, Navy, and Aviation. Our cause is righteous. The enemy will be defeated. Victory will be ours!"
