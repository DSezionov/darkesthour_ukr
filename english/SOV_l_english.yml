 SOV_german_betrayal: "German Betrayal"
 SOV_german_betrayal_desc: "Germany has proven herself to be untrustworthy by declaring war on the Soviet Union, breaking the pact between us. But rest assured, that this betrayal will not go unpunished."

 SOV_patrotic_war: "The Great Patriotic War"
 SOV_patrotic_war_desc: "The fascist invader may have driven deep into the Soviet Union, but the Red Army and Red Navy are self-sacrificingly disputing every inch of Soviet Soil. The Soviet people must realise this and adandon all heedlessness, they must mobilise themselves and re-focus all their work on wartime production. There can be no mercy for the enemy."

