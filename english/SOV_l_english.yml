#  Soviet Union Decisions
######################################################################
 # The Kirov Question Decisions
 SOV_The_Kirov_Question_category: "The Kirov Question"
 SOV_The_Kirov_Question_category_desc: "\n\n\n£decision_header_SOV_Kirov£\n\n\n\n The Soviet Premier, §YJoseph Stalin§!, has initiated a repression of those §Renemies of the people§! who dare call themselves communists. \nHe sees a future in which our glorious Union, the first bastion of communism in a capitalist world, may be under assault from outside forces, and the §R“Fifth Column”§! of wreckers, terrorists and spies might weaken us from inside. \n\nTherefore, this organization must be rooted out and destroyed, no matter the impact to our central command, before they can cause any more harm. We should also stage §Gshow trials§! for those Trotskyites and others who may wish to subvert the revolution. These operations will be carried out by the NKVD. \n\nHowever, Stalin has some doubts about the loyalties of its chief, §YNikolai Yehzov§!..."

 SOV_Resolve_the_Kirov_Question: "§RResolve the Kirov Question§!"
 SOV_Resolve_the_Kirov_Question_tt: "§OSergei Kirov§!'s Popularity is on the Rise§!"
 SOV_Invite_Kirov_to_Leave_Leningrad: "Invite Kirov to Leave Leningrad"
 SOV_Replace_the_Head_of_the_Leningrad_Branch_of_the_NKVD: "Replace the Head of the Leningrad Branch of the NKVD"
 SOV_Ask_the_NKVD_for_a_Solution_to_the_Kirov_Question: "Ask the NKVD for a Solution to the Kirov Question"
 SOV_Unassign_Kirovs_Bodyguards: "Unassign Kirov's Bodyguards"
 SOV_Unassign_The_Smolny_Institute_Guard_Post: "Unassign The Smolny Institute Guard Post"

 # Stalinist Doctrine
 SOV_Stalinist_Doctrine_category: "Stalinist Doctrine"
 SOV_Stalinist_Doctrine_category_desc: "\n\n\n£decision_header_SOV_Stalinist_Doctrine£\n\n\n\nComrade Stalin's current position as General Secretary, as well as his ambitious plans for the Soviet Union and unique perspective on socialism, have pushed the original concept to new heights. The Stalinist Doctrine of Marxism-Leninism advocates abandoning the primary goal of World Revolution in favour of developing socialism within a single state. At the same time, while Marx argued that proletarian dictatorship was only a transitional phase, Stalin reinforces it as a necessary and permanent order of things, with a strong, central state required to protect the revolution and the Soviet Union. This doctrine, and its implementation as the guiding principle of the Soviet Union firmly positions Stalin as one of the main leaders of the communist movement."

 SOV_Start_of_Constitutional_Elections: "Start of Constitutional Elections"
 SOV_Start_of_Constitutional_Elections_desc: "The Stalin Constitution is a true example of socialist achievement, as one of the most progressive documents of our time, granting extensive rights and freedoms to Soviet citizens, most notably direct election of government bodies by the Soviet people through representatives from the All-Union Communist Party. While this document may be liberating for workers, it contains numerous loopholes that allow for harsh repressions against enemies of the people, counterrevolutionaries, and those who may seek to threaten us. We will crush any candidate who may pose a threat to Comrade Stalin's leadership."
 SOV_Start_of_Constitutional_Elections_Succeded_tt: "The elections will be held.\nTurnout will be §Bin§! our favour."
 SOV_Start_of_Constitutional_Elections_Failed_tt: "The elections will be held.\nTurnout will be §Ragainst§! our favour.\n"

 SOV_The_Hight_Spirit_of_Marxism_Leninism: "The High Spirit of Marxism-Leninism"
 SOV_The_Hight_Spirit_of_Marxism_Leninism_desc: "By focussing Marxist-Leninist thought on the authority of the Communist Party and its leader, Comrade Stalin, we ensure that political enthusiasm, loyalty, and discipline remain high throughout the Party, the army, and the rest of Soviet society. Revolutionary zeal is the foundation of proletarian strength; if it dwindles, the effectiveness of our institutions and the security of socialism as a whole may be jeopardised, allowing oppressive capitalist elements and foreign imperialist infiltrators to enter."

 SOV_Keep_the_Spirit_High: "Keep the Spirit High"
 SOV_Keep_the_Spirit_High_desc: "To maintain revolutionary enthusiasm and fervour across the Union we must actively use propaganda, political supervision, and ideological education on a societal level. By reinforcing loyalty within youth organisations, the army, and the broader population, we can ensure that devotion to the socialist cause and the Communist Party leadership remains high, and that everyone is ready to unite under the party's socialist vanguard to achieve true communism."
 SOV_Keep_the_Spirit_High_tt: "The mission '§YThe High Spirit of Marxism-Leninism§!' has less than §Y120§! days remaining."

