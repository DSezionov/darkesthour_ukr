 SOV_Centerally_Planned_Economy: "Centrally Planned Economy"
 SOV_Centerally_Planned_Economy_desc: ""

 SOV_Pragmatic_Command_Economy_idea: "Centrally Planned Economy"
 SOV_Pragmatic_Command_Economy_idea_desc: ""

 SOV_Collectivization_Process: "Soviet Collectivization Process"
 SOV_Collectivization_Process_desc: ""

 SOV_Industrial_Ethos: "Industrial Ethos"
 SOV_Industrial_Ethos_desc: "If a nation, any nation, is to be strong it must be industrialised. When we came to power, the Union was mostly farms and workshops, with a few factories strewn about, mostly in cities. However, thanks to the indomitable spirit of the worker and the Party's incredible foresight, things have changed. Now the heart of the Union beats with the rhythmic hums of engines, the roar of blast furnaces and the rumble of trains and cars. Stalin and the brave Bolshevik Party propelled Russia out of agrarian backwardness and into a future of competition with the industrial giants of Britain, America, and Germany in what will undoubtedly be remembered as the fastest and most effective period of modernization in history. With their guidance, surpassing them is merely a historical formality."

 SOV_Industrial_Ethos1: "Industrial Ethos"
 SOV_Industrial_Ethos1_desc: "If a nation, any nation, is to be strong it must be industrialised. When we came to power, the Union was mostly farms and workshops, with a few factories strewn about, mostly in cities. However, thanks to the indomitable spirit of the worker and the Party's incredible foresight, things have changed. Now the heart of the Union beats with the rhythmic hums of engines, the roar of blast furnaces and the rumble of trains and cars. Stalin and the brave Bolshevik Party propelled Russia out of agrarian backwardness and into a future of competition with the industrial giants of Britain, America, and Germany in what will undoubtedly be remembered as the fastest and most effective period of modernization in history. With their guidance, surpassing them is merely a historical formality."

 SOV_Industrial_Ethos2: "Industrial Ethos"
 SOV_Industrial_Ethos2_desc: "If a nation, any nation, is to be strong it must be industrialised. When we came to power, the Union was mostly farms and workshops, with a few factories strewn about, mostly in cities. However, thanks to the indomitable spirit of the worker and the Party's incredible foresight, things have changed. Now the heart of the Union beats with the rhythmic hums of engines, the roar of blast furnaces and the rumble of trains and cars. Stalin and the brave Bolshevik Party propelled Russia out of agrarian backwardness and into a future of competition with the industrial giants of Britain, America, and Germany in what will undoubtedly be remembered as the fastest and most effective period of modernization in history. With their guidance, surpassing them is merely a historical formality."
 
 SOV_Purged_NKVD: "Purged NKVD"
 SOV_Purged_NKVD_desc: "The recent 18th Congress blamed the purges' excesses squarely on the NKVD and its leadership, absolving all senior party leadership of responsibility. This has resulted in a cleansing of the NKVD's top ranks, with many officers removed and even arrested, and other trusted operatives reassigned, leaving the NKVD weakened and disorganised, while political oversight has been significantly tightened. This has limited the NKVD's ability to act decisively, and fear of further repercussions has slowed internal enforcement."

 SOV_New_Opposition: "New Opposition"
 SOV_ew_Opposition_desc: "The 18th Congress has concluded, but the silence it left behind is more powerful than any speech uttered within its walls. What should have been a demonstration of unity instead revealed the Party's divisions. Delegates returned to their offices, whispering, observing, and considering their allegiances. Ministers pause and generals exchange wary glances. Stalin's control remains on paper, but the unquestioning loyalty that once distinguished the Politburo has faded.\n\nA storm is gathering, and everyone knows it."

