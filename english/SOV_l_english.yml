 SOV_Soviet_Collectivization2_desc: "Our agricultural sector's collectivization aims to integrate individual landholdings and labour into collectively and state-controlled farms. It was expected that replacing individual peasant farms with collective ones would immediately increase food supply and raw material supply for the processing industry. Instead, collectivization has resulted in several famines as well as active peasant resistance throughout the country."

