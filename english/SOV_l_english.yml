 SOV_THE_GREAT_PURGE_STATUS_IN_PROGRESS_TT: "This §YPhase§! of the purge is §Oin progress§! - The operation awaits final authorization from the Politburo before implementation."
 SOV_THE_GREAT_PURGE_TT: "§YThe Great Purge mechanic§! is now active.\n\nStalin starts with a §YParanoia level of 75%§!, which changes by a set amount each week and can also be increased or decreased by various other sources. If his §YParanoia is not contained§!, the §RImminent Counter-Revolution§! will ultimately lead to §YStalin’s downfall§!.\n\nStalin must §Ysuccessfully complete§! all §Y4 Phases§! of §fthe Great Purge§! in order to §Gfinish it§!."
