l_english:
######################################################################
#  Soviet Union Events
######################################################################

 SOV_Death_of_Stalin.1.t: "Death of Joseph Stalin"
 SOV_Death_of_Stalin.1.d: "Our Great Leader Joseph Stalin has passed away, leaving behind a grateful people, happy to have experienced his light. On this we will make sure concensus is reached."
 SOV_Death_of_Stalin.1.A: "Beria will assume power for now."

 SOV_Death_of_Stalin.2.t: "Succession of Stalin"
 SOV_Death_of_Stalin.2.d: "With the passing of Stalin the position of Chairman of the Council of Ministers has become vacant. Currently, 4 men seem to have come forth to claim new leadership. Comrade, who shall it be?"
 SOV_Death_of_Stalin.2.A: "Nikita S. Khrushchev."
 SOV_Death_of_Stalin.2.B: "Georgy Malenkov."
 SOV_Death_of_Stalin.2.C: "Lavrenti P. Beria."
 SOV_Death_of_Stalin.2.D: "Georgy Zhukov."

 SOV_Repurpose_Naval_Guns.1.t: "Repurpose Old Naval Guns"
 SOV_Repurpose_Naval_Guns.1.d: "The Red Navy has recently submitted a report to the People's Commissariat of Defense of the Soviet Union, highlighting a large surplus of naval guns in the inventory. These guns, though antiquated, can easily be repurposed into land-based heavy guns, suitable for ground combat. Their large-caliber would allow their usage in demolishing enemy strong points and bunkers and can be very useful for the Red Army. And at the same time, their large size and limited mobility would create difficulties for them to keep up with the advancing Red Army. These old guns can at the same time be repurposed into permanently stationary coastal battery emplacements and can be used to create fortress cities and bases, already naval planners have created plans to emplace these guns, with particular plans for Sevastopol, which can easily be turned into an impenetrable fortress."
 SOV_Repurpose_Naval_Guns.1.A: "Repurpose the steel monstrosities into Artillery Pieces."
 SOV_Repurpose_Naval_Guns.1.B: "Repurpose the steel monstrosities into Coastal Batteries."

 SOV_Transpolar_Flight.1.t: "Via the North Pole"
 SOV_Transpolar_Flight.1.t.SOV: "Glory to Stalin's Falcons"
 SOV_Transpolar_Flight.1.d: "[FROM.GetNewsIcon]Yesterday a specially outfitted Soviet ANT-25 landed in Vancouver in the United States of America, completing the first ever transpolar airplane flight. It flew from the Soviet Union to the United States across the North Pole, the aircraft being piloted by our very own falcons - pilot Valery Chkalov, co-pilot Georgy Baidukov, and navigator Alexander Belyakov.\n\nLong and careful preparations were made for the flight, as a forced landing in the Polar Regions would mean certain death for the entire crew, after taking off the first 24 hours of the trans-polar flight proved to be routine and uneventful, but the remainder of the long flight would test the mettle of the Soviet Union’s elite flyers. As the flight neared the Polar Regions, the aircraft’s magnetic compass became inoperable; navigation had to rely solely on dead reckoning and a solar heading indicator, with corrections made by regular sun and star observations. But Despite all the odds, the flight landed at Vancouver's Pearson Airfield successfully after a flight of 63 hours and 16 minutes, and were welcomed as heroes. While they do nation-wide tour of the United States, which includes a meeting with President Roosevelt and a parade in New York City, the people at home desperately await to welcome the heroes.\n\nWhile they do a nation-wide tour of the United States, which includes a meeting with President Franklin D. Roosevelt and a parade in New York City, the people at home desperately await to welcome the heroes."
 SOV_Transpolar_Flight.1.A: "Congrats, to the air pioneers."

 SOV_Transpolar_Flight.2.t: "The Lost Falcons"
 SOV_Transpolar_Flight.2.d: "Yesterday, we lost contact with Valery Chkalov and his crew of three. They were flying a specially outfitted ANT 25 and were tasked with attempting the world's first-ever transpolar flight. Prior to their unfortunate disappearance, Chkalov reported that all instruments were functioning properly and that his crew was in good condition, which has raised questions about their disappearance. The last sighting of the aircraft was near the 75th parallel.\n\nDue to the highly secretive nature of the mission, Canadian and American authorities were not informed, but there will be no need to tell them now. We have already sent planes into the air to search the area for Chkalov and his crew, however, the chances of finding them are quite low.\n\nTo avoid any trouble, Comrade Stalin has ordered the covering up of all records related to the flight and its fate."
 SOV_Transpolar_Flight.2.A: "Their fate shall be forever shrouded in mystery"

 SOV_COMECON.1.t: "Join the COMECOM"
 SOV_COMECON.1.d: "You should join the COMECON Comrade!"
 SOV_COMECON.1.A: "We shall indeed."
 SOV_COMECON.1.B: "DAMN YOU COMMIES!"

 SOV_Liquidate_The_Church.1.t: "End of the Churches"
 SOV_Liquidate_The_Church.1.d: "The Orthodox Church has wielded considerable influence over the citizenry of our country, this influence especially prevailed during the time of the rotten Tsars, it was greatly reduced after our glorious revolution, but it still continues and persists in large parts of the society.\n\nThe State has decided, in accordance with its official mandate of state atheism or “Gosateizm” to launch a new wave of attacks at the Church, aimed at eliminating or greatly curbing the influence of the Orthodox Church in the Soviet Society.\n\nWe can launch widespread raids, these would include confiscating Church property, deporting the church clergy, and conduct lynchings of the “believers“. This will create some apprehension in the society, on the other hand, a softer and longer but more effective way would be to initiate a cultural program where the tenets of “Socialist Science” will be promoted along with “Gosateizm”, the stigma faced by religious Christians in the society as a whole and in terms of their professional life will in most likelihood commit many to denounce the Orthodox Church, and fully integrate themselves into the Soviet society."
 SOV_Liquidate_The_Church.1.A: "They have subverted the socialist cause long enough, burn their institutions"
 SOV_Liquidate_The_Church.1.B: "A gradual process and change will allow the workers to embrace “Gosateizm” much more extensively."

 SOV_Introduce_Childcare.1.t: "A New Step for Women in the USSR"
 SOV_Introduce_Childcare.1.d: "[FROM.GetNewsIcon]Though the Soviet state had established women equal in all spheres and walks of life since the revolution, in reality, due to limited economic independence, their individuality remained dependent on men.\n\nThe state has long looked at women as an untapped labor force, which even the most western countries shy away from. In a bid to strengthen the women and encourage greater participation in the industrialization program sweeping through the country, the state has instituted a massive childcare system, whose facilities will be available to all working mothers at a highly subsidized rate.\n\nThis progressive move has left many foreign commentators in awe, some who have long criticized the Soviet Union as highly repressive have been left speechless, while others are reporting how other countries, especially the “Democratic” ones should take a look at the Soviet system, which has come a long way in combating societal inequalities."
 SOV_Introduce_Childcare.1.A: "We applaude these progressive reforms"
 SOV_Introduce_Childcare.1.B: "An unnecessary upsetting of the social order"
 SOV_Introduce_Childcare.1.C: "A progressive step, perhaps one we should take ourselves"

 SOV_Russification.1.t: "Russification of the USSR"
 SOV_Russification.1.d: "[FROM.GetNewsIcon]Primus inter pares\n\nOur great nation,the home of the great revolution, consists of several smaller and some larger republics. Despite attempts in the early 20s during the “Korenizatsiya” policy to encourage representation of individuals from each republic in the Soviet system and usage of native languages, the Russians have continued to dominate the Soviet society, and it is clear that they will continue to do so. The Soviet Union needs to become a singular entity and needs to be based around a single culture, the Russian culture, even many in the higher echelons of the party leadership are Russified individuals and native Russians.\n\nThough not officially “superior”, the state directive will be simply that among the equal republics of the great Union, the Russian Republic is “more equal”. With a single language, there would be better functioning of the state, better coordination with local administrations, and in the army, Regional units would be able to coordinate in a more effective manner. A common culture would enable and foster camaraderie between the people, all the way from the workers in Vladivostok to the workers in Baku."
 SOV_Russification.1.A: "Let's bind the glorious Union with the thread of a single culture."

 #### The Great Purge Failure Events
 SOV_Great_Purge_Failure.0.t: "Now We Know the End..."
 SOV_Great_Purge_Failure.0.d: "The Sun was rising. Stalin took a moment to observe its beauty as its rays began illuminating Moscow. Only then did he realize he had spent the entire night working in his office. Tired as he was, his eyes could not ignore the soldiers now marching toward the Kremlin. As the soldiers neared the Kremlin, he recognized one face among them. It was none other than Mikhail Tukhachevsky. What on Earth is that bastard doing here? He was supposed to be reassigned to Stalingrad and arrested on the way. That Trotskyite rat must have foreseen the trap, Stalin thought. Where was Voroshilov? He reached for the phone, only to find the phone lines had been cut.\n\nHe took the pistol kept in his desk for special occasions and instinctively headed for the safest place in his office, the closet. Moments later, men burst in. One lunged toward Stalin. He fired, hitting the soldier in the leg, but the others quickly overpowered him. Once the General Secretary was on the ground, beaten and disarmed, Tukhachevsky himself entered the room. The Man of Steel didn't have much to say and neither did the Red Napoleon. The silence was broken only when another man rushed in, reporting that Voroshilov had been taken care of. Tukhachevsky nodded to the soldier aiming his rifle at Stalin. A single shot rang out, and everything faded to bla—\n\nStalin shot up in his bed, drenched in cold sweat, his heart pounding and his breath heavy. For a moment, relief came over him, but it quickly turned into unease. Was it only a nightmare, or a premonition of things to come? A shattered Union, torn apart by infighting and ambition. A Red Army broken, as officers vie against one another for power and influence. Is this to be the consequence of his cleansing of the Union? For the first time, doubt crept into his mind. Had his vigilance turned into madness? Had he crossed a line that should never have been crossed? In his effort to save the Soviet Union, had he instead doomed it - and himself along with it?"
 SOV_Great_Purge_Failure.0.A: "Outside, the sun was rising over Moscow - but not for him."
 SOV_Great_Purge_Failure.0.A_tt: "Confidence in §YStalin§! is §Rshaken§!. His paranoia has given way to doubt, instability and hidden defiance. Entire ministries have been §Rparalyzed§! as a result of his endless arrests and the public is beginning to take notice of his senseless suspicion.\n\n§YThe Man of Steel§! still sits on the throne, but the foundation beneath him is beginning to crack. Should this course continue, the Union - and Stalin himself - §Rmay not endure§!."

 SOV_Great_Purge_Failure.1.t: "Now We Know the End..."
 SOV_Great_Purge_Failure.1.d: "The Sun was rising. Stalin took a moment to observe its beauty as its rays began illuminating Moscow. Only has he realized he spent the entire night working in his office.\n\nTired as he was, his eyes couldn't ignore the soldiers marching towards the Kremlin. \"What the hell could they be coming for? The change of guards was several hours ago.\" As Stalin was wondering, more and more armed men were pouring towards him. Two divisions could be filled with that many people.\n\nAs the soldiers were nearing the Kremlin, he recognized the face of a particular one. It was none other than Mikhail Tukhachevsky. \"What on Earth is that bastard doing here? He was supposed to be reassigned to Stalingrad and arrested on the way! That Trotskyite rat must have foreseen the trap! I'll gut him myself!\"\nStalin thought as the sound of shooting disturbed the silence of the early Moscow morning. He reached for the phone instantly: \"Voroshilov, where the fuck are you? Fifth columnists are storming the Kremlin!\" Only now did he realize the phone lines have been cut.\n\nHis next action was to arm himself with the pistol kept in his desk for special occasions. Instinctively he headed for the safest place in his office, the closet. In an instant, mutineers busted in. One of them opened in on Stalin. His first reaction was to pull the trigger, shooting the soldier in the leg. The other mutineers quickly dragged out the Man of Steel. Once the General Secretary was on the ground beaten and disarmed, Tukhachevsky himself entered the room. The two looked deep into the other's eyes in silence. The once-great leader of the Soviet Union didn't have much to say, neither did the Red Napoleon.\nThe silence was broken by a mutineer rushing into the office, reporting that Voroshilov has been taken care of. \"Well, then there is only one last loose end to tie to complete our revolution.\" Said Tukhachevsky, while giving the sign to the soldier aiming his rifle at Stalin. In an instant, life left Stalin's body."
 SOV_Great_Purge_Failure.1.A: "The Man of Steel now lays on the ground as cold as steel."
 SOV_Great_Purge_Failure.1.A_tt: "General Secretary §YIosif Stalin§! has been §Rkilled§! during the coup.\nPeople's Commissar for Defense §YKliment Voroshilov§! has been §Rkilled§! during the coup as well.\nMarshal §YMikhail Tukhachevsky§! has taken over!\n\n§RMoscow is yet not fully secured...§!"

 SOV_Great_Purge_Failure.2.t: "Napoleonchik Pobezhdyon"
 SOV_Great_Purge_Failure.2.d: "Failure. How could it be that the revolution would die in this way? They had been on the cusp of victory. These thoughts quickly flashed through Tukhachevsky's head, one after another, as he fell backwards towards the marble Kremlin floor. The answer was truly any number of things, from the organization of the putschists to the weapons they had used. For Tuchachevsky's, however, the blame fell squarely on but one individual, the one whose death might have changed everything. Semyon Budyonny\n\nThe intent had been to storm the Kremlin and the Moscow military district headquarters, kill the Soviet leadership quickly, and then organize for a final battle outside the Kremlin with whatever remaining forces stationed in Moscow. The faster they could decapitate the leadership of the Soviet Union, the faster the coup could be completed. The battle started well enough. The lobby had been quickly secured, and many important offices and their occupants shot up. However, guards stationed throughout the building killed an increasing number of his men as they slogged through the fortified complex. One of the last major military figures they had on their kill list was Budyonnov. If they could kill Budyonnov, there would be nobody left in Moscow to organize local forces against him.\n\nBut the bastard slipped away. Only two of his men managed to slip past the guards who had organized in a last ditch effort to defend Budyonnov's office, both of whom were caught off guard by the Nagant revolver Budyonnov kept in his office. From there Budyonnov somehow managed to fight his way out, grouping the remaining guards into a small battalion of men that fought their way to the entrance and out to the river, where he met up with the reserve forces of the Moscow Military District.\n\nTuchavesky had fought. He and his men did everything they could to hold off Budyonnov's newfound forces storming the Kremlin, but it was for naught. Two bullets lodged firmly in his gut as he lay on the floor, Tukhachevsky in his last thoughts reflected that he didn't feel much of anything now."
 SOV_Great_Purge_Failure.2.A: "A revolution deferred."
 SOV_Great_Purge_Failure.2.A_tt: "The §RTukhachevsky Plot§! has been defeated by Marshal §YSemyon Budyonny§!, albeit at a high cost..."

 SOV_Great_Purge_Failure.3.t: "The Revolution Secured"
 SOV_Great_Purge_Failure.3.d: "Of all the chaos and confusion that has been thrown at us since the days of the October Revolution, it seems that another spanner has been thrown in the works of the hulking machine that is the Soviet Union.\n\nJoseph Stalin, the Man of Steel, our glorious leader, has been slain by ruthless counterrevolutionaries.\n\nAnd not just Stalin, but many of our top officials, such as the NKVD leadership, and even Voroshivlov, one of our top military commanders. So many intelligent and powerful men, taken by the vicious claws of the traitorous Tukhachevsky and his foolish followers.\n\nBut while we may still have tears in our eyes for those we have lost, we must not become distracted from the grave task that is at hand; filling the void that has been left within the ranks of the Politburo. There will be many opportunists waiting for the right time to make their move, so if we are to prevent any further descent into instability, we must act quickly. Thus, the Central Committee has been called for an emergency session in hopes to find a way out of this dark tunnel we find ourselves in.\n\nWhilst we have already decided that Molotov will remain Premier, we still must vote for the crucial role of General Secretary.  There are two frontrunners, with the first being the loyal Stalinist Lazar Kaganovich. He was a close friend of Stalin and choosing him would ensure that we will be able to continue to build on the vision our late leader had for the Union.\n\nAlthough Kaganovich seems like the best choice, the other proposal has been Marshall Semyon Budyonny, who helped put a stop to the threat posed by the counterrevolutionaries. Although not everyone within the Central Committee is sure of the direction he will take our country in, he would be able to provide a great sense of strength and stability, something which the nation is lacking because of recent events.\nWhatever choice we make, it is sure to have great implications for not just the Soviet Union, but for the entire world..."
 SOV_Great_Purge_Failure.3.A: "Only Marshall Budyonny can save the revolution now!"
 SOV_Great_Purge_Failure.3.B: "Comrade Kaganovich will carry the torch of Stalinism forward!"

 SOV_Great_Purge_Failure.4.t: "Stalin Killed in Conspiracy, Red Military Dictatorship Averted"
 SOV_Great_Purge_Failure.4.d.BUDYONNY: "[FROM.GetNewsIcon]Today is a dark day for the Soviet Union as the General Secretary of the Central Committee of the Communist Party, Joseph Stalin, has been shot and killed by Marshal Mikhail Tukhachevsky and his men. It is said that the so-called \"Red Napoleon\" and two brigades worth of soldiers loyal to him assaulted the Kremlin and the surrounding areas of Moscow. Eventually, they reached the General Secretary's Office, where Stalin was executed. While Tukhachevsky and Stalin were known to not be on the best terms, due to Tukhachevsky being suspected to have had Trotskyite sympathies, it seems no one in the Soviet Union expected him to go this far.\n\nAfter the death of Stalin and the Minister of Defense Voroshilov, Tukhachevsky and his men attempted to seize the Moscow Military District headquarters. The district's commander Semyon Budyonny resisted and managed to not only defend the headquarters, but also to lead his men to victory as he defeated Tukhachevsky and his co-conspirators in an attack on the Moscow Kremlin.\n\nWith the death of Stalin and Voroshilov, as well as the head of the NKVD and several other party functionaries, the Soviet Union now enters a precarious new age. On the latest gathering of the Central Committee, the Soviet officials elected a new General Secretary. The vacant position will be filled by the hero of these recent events, Marshal Semyon Budyonny. A war hero and a cavalryman to the core, the new leader of the USSR is an unknown variable. How will the Marshal lead the Union?"
 SOV_Great_Purge_Failure.4.d.KAGANOVICH: "[FROM.GetNewsIcon]Today is a dark day for the Soviet Union as the General Secretary of the Central Committee of the Communist Party, Joseph Stalin, has been shot and killed by Marshal Mikhail Tukhachevsky and his men. It is said that the so-called \"Red Napoleon\" and two brigades worth of soldiers loyal to him assaulted the Kremlin and the surrounding areas of Moscow. Eventually, they reached the General Secretary's Office, where Stalin was executed. While Tukhachevsky and Stalin were known to not be on the best terms, due to Tukhachevsky being suspected to have had Trotskyite sympathies, it seems no one in the Soviet Union expected him to go this far.\n\nAfter the death of Stalin and the Minister of Defense Voroshilov, Tukhachevsky and his men attempted to seize the Moscow Military District headquarters. The district's commander Semyon Budyonny resisted and managed to not only defend the headquarters, but also to lead his men to victory as he defeated Tukhachevsky and his co-conspirators in an attack on the Moscow Kremlin.\n\nWith the death of Stalin and Voroshilov, as well as the head of the NKVD and several other party functionaries, the Soviet Union now enters a precarious new age. On the latest gathering of the Central Committee, the Soviet officials elected a new General Secretary. The vacant position will be filled by Lazar Kaganovich, the Narkom of Heavy Industry. Known to be a close supporter of Stalin, it is likely that the new leader of the USSR will stay true to the vision of his predecessor."
 SOV_Great_Purge_Failure.4.A: "We have only to kick in the door..."
 SOV_Great_Purge_Failure.4.B: "To victory under the marshal! URA!"
 SOV_Great_Purge_Failure.4.C: "The drums of war beat in the east once more."
 SOV_Great_Purge_Failure.4.E: "To communism under comrade Kaganovich!"
 SOV_Great_Purge_Failure.4.F: "So begins the reign of Iron Lazar."

 #### The Great Purge Events
 SOV_Great_Purge.1.t: "The Yagoda Proposal"
 SOV_Great_Purge.1.d: "NKVD chief Genrikh Yagoda has submitted to the Politburo, earlier today, a rather controversial proposal. Within he suggests the complete and utter removal of the Trotskyist influence, which still haunts the USSR to this day, via the method of \"remote camps\". Quite obviously, this has caused outrage from both the Right Opposition and those within the Politburo who still sympathize with the theories of Trotsky. Hard-line communists already appear to be leaning in support of Yagoda's radical plans. Whatever happens, it is clear the party is still open to infighting and will continue to be so for the foreseeable future unless decisive action is taken."
 SOV_Great_Purge.1.A: "We must fend off all threats of the revolution!"

 SOV_Great_Purge.2.t: "Proposal Approved by the Politburo"
 SOV_Great_Purge.2.d: "NKVD chief Genrikh Yagoda submitted a proposal to the Politburo for sending \"all the Trotskyists\" into the \"remote camps\"... Under Comrade Stalin's order, Trotsky was been taken from Power, expelled from the party and exiled. The threat of an uprising against the state, however, must be preemptively shut down by excluding the Trotskyites from our society to camps far, far away, in order to ensure a peaceful people within Russian borders. With the Politburo now on board, all the USSR shall be freed from Trotskyist influence."
 SOV_Great_Purge.2.A: "Stalin's leadership must be secured!"

 SOV_Great_Purge.3.t: "Trial of the Anti-Soviet Trotskyist Center"
 SOV_Great_Purge.3.d: "Despite the fact that Trotsky was removed from his position over a decade ago, his influence lives on in the form of our generals, who regard such values as better and more efficient. We saw these people as competitors, people who were deemed more worthy in comparison, but ultimatelyhad to go. The Trial of the Sixteen removed many Trotskyists, most notably Lev Kamenev and Grigory Zinoviev, who were influenced by Trotsky's ideas. Under pressure and in constant fear of being killed, Trotsky himself sought asylum in Mexico, but was tried as the main conspirator in his absence.\n\nThe NKVD has now obtained some vital information about Pyatakov, including his visit to Trotsky in Norway. This activity has been deemed anti-party and anti-Soviet by the party. Pyatakov was personally appointed as a witness by Stalin at the infamous Moscow Trial of Kamenev and Zinoviev in the summer of 1936, and now, regarded as a traitor himself, Pyatakov and his defendant Karl Radek, have been sentenced to death. Hopefully, Trotsky's puppet strings in the party will be forever cut..."
 SOV_Great_Purge.3.A: "How many more trials will there be?"

 SOV_Great_Purge.4.t: "Tukhachevsky's Case"
 SOV_Great_Purge.4.d: "As the trials come to a close, we have one of the final puzzle pieces needed to properly purge the Trotskyists from our communist party. One of the deep operation theorists, Mikhail Tukhachevsky, was seized and transported back to Moscow in a prison van. After a lengthy interrogation by the NKVD, Tukhachevsky collapsed and immediately admitted to being a German agent. While we finally have one of the last enemies of the state in our hands, it's possible we could let Tukhachevsky off in favour of another scapegoat, saving us a great general. After some consideration, Stalin has suggested to charge one of Tukhachevsky's close associates, Rokossovsky. The court faces a long night deciding which of these two is more anti-party."
 SOV_Great_Purge.4.A: "Tukachevsky is an enemy of the state, he said it himself. Sentence him to death!"
 SOV_Great_Purge.4.B: "Tukachevsky is a symptom rather than the source, sentence Rokossovsky, and keep Tukachevsky close."

 SOV_Great_Purge.5.t: "Teutonic Menace"
 SOV_Great_Purge.5.d: "Since the age of Alexander Nevsky to the Kaiser's predatory eyes, the Teutonic Menace has posed a severe threat to our nation and people. With the ascent of Adolf Hitler, it appears that this menace will once again threaten the motherland. With their Judeo-Bolshevism discourse and direct targeting of our German brothers of similar mentality, it is clear that in the future, they will follow in the footsteps of their teutonic forebears and try to hit us while we are weak.\n\nTo counter such a threat, we must seek foreign allies, yet doing so would necessitate collaboration with the Western bourgeoisie, our other destined adversary. A decision must be made between temporarily suspending our ideological struggle in order to deal with a larger threat and fighting this war in our own methods."
 SOV_Great_Purge.5.A: "The Union now looks westward..."

 SOV_Great_Purge.6.t: "The Common Threat"
 SOV_Great_Purge.6.d: "We have known since the days of the Tsar that the capitalist west is our ideological enemy. But, with the Teutonic eagle preying its eyes on Europe and grabbing for meat, we must consider their threat. The possibility of a Teutonic attack must be stopped, and the Union cannot do so on its own; we must work with the West. It is not an easy decision to make, but it must be made. With some \"help\" from France, the UK, and Czechoslovakia, we might be able to stop the Germans before they show their teeth. For the peace and security of Europe, let's stop the fascist menace before they do any more harm!"
 SOV_Great_Purge.6.A: "An Anti-Fascist front that will span the globe!"

 SOV_Great_Purge.7.t: "7th World Congress of the Comintern"
 SOV_Great_Purge.7.d: "The 7th World Congress of the Communist International began this evening in Moscow's House of Unions' Hall of Pillars. The gathering, held almost exactly seven years after the last Comintern World Congress, was attended by 513 delegates representing 65 Comintern member parties and 19 sympathising parties.\n\nThe keynote address delivered by Wilhelm Pieck of the Communist Party of Germany set the tone for the 7th World Congress. While praising the 1928 tactic of \"class against class,\" Pieck admitted that \"a certain number of sectarian mistakes were made.\" During the late 1920s strike movement, this push for ideologically pure leadership divided workers, gaining the support of some while alienating others and ultimately failing due to \"clumsy and sectarian tactics.\"\n\nFollowing Pieck's keynote report and the lengthy discussion that followed, a second report, this time by Georgi Dimitrov, was presented on the task of building working-class unity in opposition to fascism. Dimitrov began by defining fascism as \"the open terrorist dictatorship of the most reactionary, chauvinistic, and imperialist elements of finance capital,\" intent on wreaking organised \"terrorist vengeance against the working class and the revolutionary section of the peasantry and intelligentsia.\" Dimitrov described fascism's foreign policy as \"jingoism in its most brutal form, fomenting bestial hatred of other nations.\" The 7th World Congress resulted in the endorsement of a Popular Front of communist and non-communist forces against the growing threat of fascism in Europe, paving the way for advocacy of collective security between our country and the various capitalist states of Europe\". This represents a dramatic shift away from the Comintern's previous support for class warfare, which was endorsed by the 6th World Congress."
 SOV_Great_Purge.7.A: "United against fascism."

 SOV_Great_Purge.8.t: "Helmsman's Wrath"
 SOV_Great_Purge.8.d: "Making enemies of the revolution pay for their transgressions was nothing new for Pavel - not with his years of experience in the VChK since the start of the civil war. However, the lists he'd seen handed out today came as a surprise. There were hundreds condemned to immediate imprisonment, or worse, in Stalingrad alone. After decades of relative peace in the RSFSR, this wave of repression came as a sobering reminder. Counterrevolutionaries were always on the move, and leaving them be even for a moment was criminal complacency.\n\nOne only needed to look at what happened to comrade Kirov - a great revolutionary snuffed out so abruptly, all because the machine of repression paused for a few years. Per comrade Stalin's orders, a reminder to all enemies of communism was long overdue. However, as Pavel knocked on the door of the first dissident on his list, a horrible feeling nagged at him. As if this was only the beginning of something never before seen. Oh well. He silenced the internal voice of worry, and barked an order:"
 SOV_Great_Purge.8.A: "Open up!"

 SOV_Great_Purge.9.t: "Choosing Molotov"
 SOV_Great_Purge.9.d: "\"The Soviet Government intends to improve its relations with Hitler, and if possible, sign a pact with Nazi Germany. As a Jew and an avowed opponent of such a policy... you stand in the way.\"\n\nLitvinov's immediate reaction was one of disbelief, then fiery anger. He stood up and banged on the table, arguing over the claim, ready to defend his policies, his faith, his entire career. The meeting room grew tenser, as the others waited for Stalin's response. He sucked on his pipe and said with a chilling tone:\n\n\"Enough.\"\n\nThe man of steel thrust a paper of registration, already filled out, towards Litvinov. \n\n“Sign.”\n\nSeeing the futility of his situation, he took up a pen and signed it. NKVD agents are currently surrounding the Foreign Office, and Molotov, Beria, and Malenkov are expected to inform him of his dismissal any second now. While we will keep Litvinov in the party, with him out of the government, Molotov can finally take his place as Minister of Foreign Affairs. Molotov's foreign policy will help us solidify a pact with Germany, further establish our influence in Europe, and reconcile with Japan. Litvinov failed to do anything with the Allied powers, but Molotov won't fail with the Axis."
 SOV_Great_Purge.9.A: "Sorry Maxim, things change."

 SOV_Great_Purge.12.t: "Memento Mori"
 SOV_Great_Purge.12.d: "“So poor old Kirov is dead? This... this is a loss for the Soviet Union”.\n\nThe adviser had never seen Stalin look genuinely sad and disappointed in hearing the death of an old comrade, as most of the time, he had organized their deaths. But not this time. This one came as a complete shock to Stalin, and one that upset him greatly.\n\nSergei Kirov, a friend, a comrade, and a true revolutionary. He had always been with Stalin since the days of the October Revolution of 1917, rising through the various ranks of the Communist Party and eventually settling as the head of the party in Leningrad. And even though Stalin would be seen as his superior, he was never treated that way by the General Secretary, and even found himself on the Politburo when Stalin came to power. However, all of that came to a sudden halt, when Kirov was shot by who NKVD sources are calling a “known Zinovievist”, Leonid Nikolaev. While those who have been deemed responsible have been put on trial and dealt with, this is far from the end.\n\n“We do not know how many more of these counter-revolutionaries and revisionists remain within the cracks of the party. They could be in the army, the navy the airforce, perhaps even the politburo! This is the beginning of something that will ensure the revolution lives on, and one by one, those who disagree with the principles of the revolution will be cut from society...”\n\nAs Stalin trailed off into a paranoid rant, the adviser only hoped that what was to come would spare him from any fateful end."
 SOV_Great_Purge.12.A: "The axe is sharpened..."

 SOV_Great_Purge.14.t: "Resolution of Politburo"
 SOV_Great_Purge.14.d: "\"Comrade, I come to you today to present my final choice.\"\n\"About Kirov's affair?\"\n\"Not just that, but concerning the Soviet Union's future,\" Stalin responded, his voice visibly exhausted.\n\"His death was not simply an assassination. This was nothing more than a massive conspiracy against the Union's leaders, including me.\"\n\"...But how many can there be?\"\n\n\"Thousands, on every street corner in every city...\"\nMolotov, perplexed, raised his head.\n\"How will we identify them? They will realise we intend to eliminate them long before the last of them are executed.\"\n\"Through their Trotskyist connections, as well as others.\" Stalin seemed increasingly tense.\n\"Who must be dealt with?\"\n\"We must eliminate the Bukharinist opposition. Their soft approach to capitalism is treason.\"\n\"Correct. As a result, we will crush the Trotsky Revolution and adherents of Bukharin's economic programme. I'll forward this to the NKVD, and...\"\n\"I haven't finished yet!\"\n\"What? You think destroying both sides isn't enough?\"\n\"Don't forget who you're talking to, Molotov... The last one we need to eliminate is the most difficult: Tukhachevsky.\"\n\n\"You... want to eliminate the Red Marshall?\" Molotov now became pale.\n\"The Red Napoleon, the head of the Red Army?\"\n\"Yes, that is exactly what I want. That's all I have for now.\"\nBefore leaving, Molotov gave Stalin one last look: a few minutes ago, he was weakened, and now, in a few words, he ordered the extermination of the opposition. Stalin stared him down in the doorway and responded to his glare:"
 SOV_Great_Purge.14.A: "\"You know what, Vyacheslav? I'm not a new Robespierre. I'm stopping a tank-driver from causing my downfall.\""

 SOV_Great_Purge.15.t: "The End of Yezhov"
 SOV_Great_Purge.15.d: "Yezhov wandered aimlessly through Moscow's streets and back alleys, drink in hand, slowly stumbling in the general direction of his home. How could he, once the NKVD's king, have been reduced to this? Yezhov's face twisted into a scowl. Of course, he knew the answer: it was all because of that pudgy psychopath, Beria. He should have expedited that monster's execution immediately when he ordered it in ‘38. If he had, Beria would never have had the opportunity to appeal to Stalin for mercy.\n\nYezhov tripped over a crack in the pavement and briefly fell to the ground. As he stood up to continue walking, the Kremlin in the distance caught his eye. It's not like he hadn't noticed his power was being usurped. The reassignment of his first deputy, Mikhail Frinovsky, signaled the impending \"dismissal.\" He should known, because he used to organize such dismissals. Hell, he did the same thing to his chief predecessor.\n\nOf course, Frinovsky, like many of Yezhov's proteges, had been formally arrested a few months before. He had time to warn his old friend and mentee Aleksandr Uspensky, who went into hiding, but who knew how long he would be able to avoid capture. If he had learned anything about running the NKVD, it was how effective the organization was at locating and eliminating its targets.\n\nThere was no one left for Yezhov to rely on, neither student nor ally. Politically he had become radioactive. No member of the Politburo would dare talk to him outside of their assigned work for fear of being associated with him. Yezhov didn't even have his wife. While there had never been a great love between them, to have seen her commit suicide using those sleeping pills weighed heavily upon him.\n\nAs he finally stumbled back to the block that held his apartment, his eyes sluggishly focused on the two men in uniform standing at the entrance to the building. A feeling of ice pierced Yezhov's heart as one of the men opened his mouth to speak the words Yezhov knew were coming."
 SOV_Great_Purge.15.A: "\"Comrade Nikolai Yezhov, you are being arrested on suspicion of anti-Soviet behavior\""

 SOV_Great_Purge.17.t: "18th Congress of the All-Union Communist Party"
 SOV_Great_Purge.17.d: "[Dynamic_SOV_Great_Purge_17_desc]"
 SOV_Great_Purge.17_Purge_Ongoing.d: "The All Union Communist Party's 18th Congress convened today, and it was a very different group of men than the previous one. This is the first Congress held since Stalin cleansed the leadership of Trotskyite infiltration. Many of the men who once stood in this hall have died or are in prison. Those who have arrived are either too afraid to speak out against Stalin in such a public forum or they owe their jobs and lives to him. As a result, the purpose of this Congress has largely been to rubber stamp the General Secretary's new agenda. This agenda is also quite full. The Congress will confirm Stalin's bold new foreign policy direction, reform the Bolshevik Party to control who can now join the Party, and approve the next Five-Year Plan.\n\nMost people are interested in the foreign policy debate because it has been reported that Stalin has grown angry at Litvinov and his outreach to Western democracies. Some speculate that he may appoint Premier Molotov, who has shown favouritism toward the Fascists in the West, to Litvinov's old post."
 SOV_Great_Purge.17_Purge_Failed.d: "The 18th Congress of the CPSU met in the aftermath of the recent wave of NKVD repressions that had swept through the Party and the country. The delegates gathered to discuss recent events and seek explanations for the unprecedented level of violence that had occurred recently, all under the guise of protecting the party and state security.\n\nDuring the proceedings, Politburo members took turns speaking, emphasising the alleged deviations of the NKVD leadership while denying responsibility for the purges of communist personnel, claiming that the violence and arrests were the result of the NKVD acting independently, without direct approval from the Party as a whole. The NKVD was accused of acting erratically and disobeying the party's orders, and it bore sole responsibility. Stalin addressed the Congress directly, claiming that the NKVD had engaged in counter-revolutionary policies and was primarily responsible for the excesses.\n\nTheir speeches made it clear that responsibility would be centralised on the NKVD leadership, absolving senior Party officials of personal responsibility. Despite these assurances, Congress revealed that many fundamental issues remained unresolved. Delegates left with the impression that, while the immediate crisis had been contained, the systemic issues that allowed such violence to occur remained unresolved, leaving the Party vulnerable to future instability."
 SOV_Great_Purge.17_Purge_Not_Started.d: "As the 18th Congress begins, the Union remains largely unchanged. Stalin delivered a long and winding speech about the West's failures and the threat that Nazi Germany posed. But something was off. Perhaps it was the tremor in his voice as he looked around the room, noticing certain Politburo members who stared back. Perhaps it was simply a lack of zeal or a weak attempt to convey a unifying message.\n\nNobody trusted it. Nobody believed it, and no one seemed to trust or believe each other. There was no passion as the speeches progressed, with each speaker clearly concealing their true feelings about the state of the Union, lying about how well we are doing at building socialism and the greatness of each five-year plan. \n\nThis silent paranoia gradually spread throughout the room as the hours passed, and by the end, it appeared that everyone had chosen a side, with various factions sitting together, waiting for someone to yell out or throw a punch. But it never happened. Gone seemed to be any sort of faith in Stalin, except for a few hardliners, and there was no patriotism in his or anyone else's speech.\n\nThe hours passed, and the 18th Congress came to a conclusion. As each delegate rose and departed, staying far from their adversaries... "
 SOV_Great_Purge.17.A: "The people's voice?" 
 SOV_Great_Purge.17.B: "Throw the NKVD to the wolves."
 SOV_Great_Purge.17.C: "...everyone could tell a storm was coming."

 SOV_Great_Purge.18.t: "The Cult of Stalin"
 SOV_Great_Purge.18.d: "Comrade Stalin, the \"architect of socialism,\" leads the Soviet Union fearlessly into a brighter future! His ideals are the ideals of our country! His vision is the vision that will lead to the prosperity of our great Union!\n\nEven children can see the magnificence that emanates from our great \"liberator of nations\"! They follow the principles they learned in the Komsomol and Young Pioneers in the schools, holding \"classroom trials\" to uphold the integrity of their classmates and themselves, playing Reds and Whites games, and even pretending to be our glorious leader, Stalin, himself!\n\nOfficials at all levels of government are hanging on his every word! They look to Comrade Stalin as the guiding light of Soviet influence, shining brightly on all nations of the world! Those who oppose Stalin are opposing not only him, but also the will of the Soviet Union and all of its citizens! Lead the way, oh great Soviet patriarch!"
 SOV_Great_Purge.18.A: "Long live Stalin!"

 SOV_Great_Purge.19.t: "A Day of Pioneers"
 SOV_Great_Purge.19.d: "Oleg and Olga had never left the Moscow suburbs before, only knowing a life of cramped living conditions and smokey streets from the factories that had sprouted up across the city. They did, however, discover a new way of life all the way down in Crimea, one of the forest, new friendships, and devotion to the revolution.\n\nArtek, the first All-Union Young Pioneer camp, opened in 1925 and offered a variety of activities for children aged 7 to 15. Unlike the Hitler Youth or the League of German Maidens, both boys and girls participated together, with an emphasis on comradery and togetherness. This was good for Oleg and Olga because they were close and did everything they could together.\n\nOleg and Olga were sent to Artek by their local trade union in Moscow, and they had no idea what they were getting themselves into, or what life would be like in another part of the Union. However, after being greeted by an enthusiastic camp leader, they quickly found themselves pushing the boundaries of what they would normally do, from learning basic survival skills to assist in the wilderness to team building exercises like den building and mapping exercises.\n\nIf there was one part of the day that they both enjoyed the most, it was at the end of each day, when the children gathered to sing patriotic songs and tell stories about the revolution. And as they settled into their cabins each night, they knew that they and the revolution were safe, as the portrait of Stalin watched over them, looking ahead to a future that none of them could predict."
 SOV_Great_Purge.19.A: "A truly 'revolutionary' experience!"

 SOV_Great_Purge.20.t: "The Honoring of Lenin"
 SOV_Great_Purge.20.d: "Today is a holiday. On the same day, fifteen years ago, on April 3, 1922, Joseph Stalin was elected General Secretary of the Bolshevik Party. And, after all this time, many of his plans have been realised: Russia is rapidly industrialising, the army has been cleansed of Trotskyist opposition, and, at long last, he has emerged as the Soviet Union's sole true leader.\n\nHowever, even thirteen years after his death, Stalin continues to refer to one man: Vladimir Lenin. The man who brought the revolutionaries together, the man who paved the way for the Bolsheviks to seize power. However, Stalin did not completely disregard Lenin's legacy. Of course, he and Lenin disagreed on how and when the revolution should spread, but Leon Trotsky had the same reservations about communism in one country during his lifetime.\n\nBut now Stalin must choose between continuing to do things his way and respecting Lenin's legacy. Should he choose to assume Lenin's mantle, he will do what he believes is best for communism, but always in the name of the man who gave his name to Marxism-Leninism. In contrast, if he chooses to be the Servant of Lenin, Joseph Stalin will be required to be more respectful of Lenin's reforms and way of thinking, as the first revolutionary who changed the way in Russia.\n\nThe final choice, of course, lies only with him..."
 SOV_Great_Purge.20.A: "Take the Mantle of Lenin, for a more Stalinist way!"
 SOV_Great_Purge.20.B: "Be the Servant of Lenin, for the honouring of Marxism-Leninism!"

 SOV_Great_Purge.21.t: "Stalin's Address"
 SOV_Great_Purge.21.d: "\"Comrades, men of the Red Army and Red Navy, commanders and political instructors, working men and women, collective farmers-men and women, intellectual workers, brothers and sisters!\" On behalf of the Soviet Government and our Bolshevik Party, I greet you. This country has largely realized socialism, the first stage of communism. Now, the Soviet Union must serve as a rallying point for the revolution so that the cause of socialism can be spread throughout the world. Rather than limiting themselves to forming a united front with working-class parties, Communist parties should seek to form a popular front with all anti-fascist parties.\n\nThe capitalist system is nearing its end, and unless a socialist revolution sweeps Europe and the world, we will be crushed by world capitalism's military might, just as the Paris Commune was crushed by force of arms in 1871. And remember: an internationalist is someone who is willing to defend the USSR without reservation, without wavering, unconditionally; the USSR is the foundation of the global revolutionary movement, and this revolutionary movement cannot be defended and promoted unless the USSR is defended.\n\nLong live our magnificent Motherland, her liberty, and independence! Forward to victory under the banner of Lenin!\""
 SOV_Great_Purge.21.A: "Glory to the creator of all our victories, Comrade Stalin!"

 SOV_Great_Purge.22.t: "Order No .00447"
 SOV_Great_Purge.22.d: "\"Comrade, today, I want to submit to you this new order, 00447.\"\n\"And what is the goal of this new one?\"\nSlowly, Iejov started walking into the office.\n\n\"Its goal? I can assure you that with this new order, we will finally decapitate the opposition!\"\n\"What kind of opposition? Do you mean the terrorist Trotskyists? Or the Bukharin merchants?\"\n\"No, comrade, I want to deal with the real devils of the Soviet Union: the old kulaks, criminal parasites, and all anti-soviet elements we can find!\"\nIn Stalin's absence, Molotov, who represents the Politburo, shook his head.\n\n\"I'm not sure, Nikola, and besides, I believe Stalin would like to see this before we implement it...\"\n\"Do you wish to wait, Molotov? Don't you realize that every hour we wait makes them stronger? The only way to deal with the kulaks, traitors and parasites of the Union, is to purge them!\"\n\n\"Arlight, alright! Just hand me a pen.\"\n\nAfter little hesitation, Molotov finally approved and signed the sheet. He then left the office to report to the first secretary.\n\nNow, the streets of Moscow are witnessing the beginning of a new purge, as ex-kulaks, criminals, and regime opponents are being arrested and sent to where they belong: the gulags."
 SOV_Great_Purge.22.A: "The Union is saved from itself."

 SOV_Great_Purge.23.t: "A Scathing Report"
 SOV_Great_Purge.23.d: "“Comrade, are you sure about this?”\n“I am, Vyacheslav, of course I am!”\n“But, these reports... it will cause some trouble.”\n“Which will lead to more purges, I know.”\n“I see you have already made your decision about this.”\n\nThis discussion takes place in the office of Stalin's, in company of his friend and collaborator, Molotov. Today, they took the harsh decision to send a report criticising the NKVD's performance. And, when they criticise the NKVD, they are directly attacking Nikolai Yezhov.\n\nFor a while now, they have been worried by his actions in the purges, and his growing influence. In reaction to the situation, they have both decided to cut his ascension, and they will remove him from the head of the agency.\n\nAnd, to do this, what better solution than using the legal way? Yezhov has not reached his quotas, and Yezhov will pay it. The “Bloody Dwarf” will not be a threat any longer."
 SOV_Great_Purge.23.A: "How many men does it take to exercise a purge? Two. One to deal with the purge itself. The second to eliminate the first."

 SOV_Great_Purge.24.t: "Icarus"
 SOV_Great_Purge.24.d: "Yevgenia was dead. Frinovsky was as good as dead. Uspensky was gone, and if he was lucky, he'd never be seen again.\n\nNikolai stared at the paper on his desk. Although Yezhov's eyes burned with hatred, the paper did not ignite. The paper was the culmination of his shame, despair and loss - it was a request to be relieved of responsibilities as People's Commissar of Internal Affairs, officially at least. In practice? It was his death sentence.\n\nBeria, the Georgian snake, had managed to not only escape his death, but turn the odds against Nikolai. In retrospect, he took too many risks, acted with too much confidence, flew too close to the sun. And now Stalin wanted him gone, and there wasn't a thing he or anyone else in this wretched world could do about it. And so the hate vanished from his eyes, endless despair taking its place."
 SOV_Great_Purge.24.A: "Resigned, shamed, defeated."

 SOV_Great_Purge.25.t: "A Secure Union"
 SOV_Great_Purge.25.d: "For some weeks now, the purges have greatly decreased. As the days pass, it becomes more and more evident that it was not just an impression. It was real. After months of terror and oppression, executions and deportations, finally... the job has been done.\n\nThis morning, Stalin received a message from his comrade, the new head of the NKVD: Lavrenti Beria. He explained that the Purges, finally, were a complete success.\n\nIf it has taken a long, long time to be achieved, but now, every enemy of the government has been destroyed, one by one.  The Trotskyists and trotsko-fascists, in the order of Leon Trotsky, and followers of a Permanent Revolution, have been destroyed. The Bhukarinists, following Nikolai Bukharin and his capitalist-like communism, have been crushed. The Zinoviests, from Grigori Zinoviev's camp, and allegedly the heirs of Leninism, have been eradicated.\n\nAnd, finally, the military traitors. The faithfull of the former leader of the Red Army Mikhail Tukachevsky and all their cliques of followers, they were all hanged.\n\nAfter years of infection and parasitism, the party and the army have been purged of all threats to Stalin, to Bolshevism, and to the Revolution.\n\nFinally, the leaders of the Union no longer have any opposition. The words of Stalin to his mother are now completely true."
 SOV_Great_Purge.25.A: "Do you remember the tsar? Well, I'm like a tsar."

 SOV_Rokossovsky_Purge: "§RRokossovsky won't be available later on!§!"

 SOV_Great_Purge_Failure_Second_Phase.1.t: "Et Tu, Klim?"
 SOV_Great_Purge_Failure_Second_Phase.1.d: "Stalin is sitting in his office in the Kremlin, as he hears a knock on the door. As the door opens the Minister of Defense Kliment Voroshilov enters the office. Stalin gestures for him to take place on a chair opposite of his desk.\n\n\"Mikhail Lukin is a threat to national security and a traitor to the Motherland.\", Stalin says before Voroshilov even sits down.\n\n\"General Secretary, I assure you that Lukin is a loyal and capable Commander and has no intention of plotting against the government.\", Voroshilov calmly responds.\n\n\"What is it with you and that man? Why do you continue to protect him? He is a loose end that needs to be tied up.\", Stalin said, noticeably agitated.\n\n\"The reason I am protecting him is because there is no doubt in my mind that he is loyal. But if you really think that he is a danger then I will arrange for him to be reprimanded and sent to Serbia where he will not be able to cause any damage.\", Voroshilov responds, now seemingly distressed.\n\n\"That will not do. I want him gone for good. No half-measures. I will not take any chances or show any mercy to traitors. You will do as I say.\"As soon as these words left Stalin's mouth, Voroshilov shoots out of his chair and raises his voice: \"Lukin is a good man! How many more loyal, innocent people have to die until you are satisfied Joseph?\"\n\nWhile Voroshilov was stepping out of line and almost shouting at him, Stalin noticed something. On Voroshilov, tucked in his belt, was a Nagant revolver. And suddenly it dawned on him. He now knew why Voroshilov was protecting Lukin.\n\n\"Why are you carrying that?\" Stalin shouted as he pointed at the weapon. \"This is not the first time you have conspired against me, but it will be the last. I should have had you killed back then, but I won't make the same mistake twice. I thought you could be trusted, but it seems I was wrong.\", he starts to ramble as his shouting gets louder and his face starts to turn red from anger.\n\nVoroshilov, stunned and confused, can't believe what he is hearing. \"What are you saying, Joseph\" Have you completely lost your mind? You are paranoid! You are completely delusional\"\n\nBut Voroshilov does not have much time to defend himself as Stalin calls for his guards which promptly seize and arrest the marshal."
 SOV_Great_Purge_Failure_Second_Phase.1.A: "It seems no one can be trusted."

 SOV_Great_Purge_Failure_Second_Phase.2.t: "Stalin's Retreat"
 SOV_Great_Purge_Failure_Second_Phase.2.d: "For the members of the Politburo, it was just another session. Following Voroshilov's arrest, Stalin had gone in hiding and only communicated with the Politburo through signed communiques' brought by a special NKVD courier. But today Second Secretary Lazar Kaganovich was about to set something in motion that would forever alter the future of the Soviet Union.\n\nAs the session drew to a close, Kaganovich received a letter from Stalin's courier: He was to prepare the trial and execution of Marshal Voroshilov. As the members of the Politburo left, he relayed a message to Marshal Budyonny, requesting his immediate presence. Simultaneously, he called upon Kalinin and Molotov, two men he trusted with his life.\n\n\"Stalin's paranoia has completely consumed him. While Stalin is in hiding and sending his petty communiques, the State is growing weaker and more unstable by the day. We have to do something, lest Stalin completely ruin the Union.\"\n\nKaganovich then looked at the faces of the two and awaited their reaction. He could see that they were shocked, horrified even. But could sense that they were in partial agreement to his words.\n\n\"Lazar, what are you saying? You will get us all killed just for talking about this!\", Molotov replied.\n\n\"I have just  received this letter, stating that Voroshilov is to be put on trial and executed. We all know that Voroshilov is as loyal as they come. If Stalin is willing to kill his closest and most loyal comrades, then who knows if we, or maybe even the entire Politburo, might be next? It is time we put an end to this madness.\"\n\n\"I don't like this Lazar, but I know that you are right. This affair with Voroshilov is just too much.\", Molotov said. \"I agree.\", Kalinin followed up: \"Stalin has gone insane. We can't govern this Union, if we kill ourselves first.\"\n\n\"Then we are in agreement.\", Kaganovich nodded.\n\nAt this moment, Marshal Budyonny arrived. \"I hope this is important Lazar. What is the reason for this meeting?\""
 SOV_Great_Purge_Failure_Second_Phase.2.A: "Saving the Soviet Union."

 SOV_Great_Purge_Failure_Second_Phase.3.t: "Now We Know the End"
 SOV_Great_Purge_Failure_Second_Phase.3.d: "At dawn, Kaganovich, Molotov, Budyonny and a few other officers, accompanied by a Brigade of Red Army soldiers marched towards Stalin's Dacha, where he had been hiding ever since Voroshilov's arrest. As they approach the Dacha, they were stopped by NKVD guards, who, upon seeing the armed escort of the entourage, started aiming their weapons at them: \"Second Secretary, what is the meaning of this?\". \"Stalin holds no authority anymore. You are outnumbered. Lay down your weapons and your lives shall be spared\", Kaganovich replied. The guards hesitated for a moment, but in the end, decided to comply. They were handcuffed and escorted out of the area, while Kaganovich's entourage entered the Dacha proper.\n\nAfter the entourage reached Stalin's office, they barged in & saw Stalin sitting on his desk attending to a large pile of documents. Before the General Secretary could inquire upon the reason for the intrusion, Budyonny drew his \"Honorary Revolutionary Weapon\" upon Stalin. Molotov pulled out a document from his coat and handed the paper to Kaganovich, who starts reading it aloud: \"Joseph Vissarionovich Stalin, after the necessary investigations conducted by the Politburo, you have been found guilty of treason and plotting against the Soviet State. And are hereby sentenced to execution\". In a fiery outburst, he started screaming and cursing, threatening to have the \"conspirators\" and everyone they know shot. But his rambling was cut short by Budyonny's bullet.\n\nAfter the General Secretary fell to the ground, the entourage left the office. Outside, Kaganovich was approached by a Captain, asking what to do with the NKVD guards. \"They are all guilty of treason. Execute them.\" The young officer nodded and ran off. With a series of gunshots from the executions ringing in the background, Kaganovich turned to Molotov and Budyonny: \"My comrades. We have done it. We have saved the Soviet Union.\" Molotov stayed silent, but the Marshal replied, with a smug face."
 SOV_Great_Purge_Failure_Second_Phase.3.A: "The NKVD will have to answer for the murder of Joseph Stalin."

 SOV_Great_Purge_Failure_Second_Phase.4.t: "Stalin Killed in Conspiracy, NKVD Executive Arrested"
 SOV_Great_Purge_Failure_Second_Phase.4.d: "[FROM.GetNewsIcon]Earlier today the public of the Soviet Union has fallen into a state of sadness and despair, as the General Secretary of the Central Committee of the Communist Party, Joseph Stalin, was reported to have been killed by NKVD plotters.\n\nFollowing Stalin's death, the Red Army has been quick to move in. And has captured and arrested large swathes of the NKVD's leadership. It has been stated by the Central Committee and the Politburo that the conspirators were put on trial and have already been found guilty by the presiding judge from the Politburo on charges of murdering the General Secretary and conspiring against the State.\n\nAfter the majority of the NKVD's leadership was arrested, the Central Committee and the Politburo declared an emergency session, where the Second Secretary and Narkom of Heavy Industry, Lazar Kaganovich, was elected to lead the Soviet Union as General Secretary in the \"interim\". A determined and devout Stalinist, it is expected that he will follow in Stalin's footsteps and continue his policies. "
 SOV_Great_Purge_Failure_Second_Phase.4.A: "More of the same, it seems."

 SOV_Great_Purge_Failure_Second_Phase.5.t: "The Union Mourns, Stalin's Body Lies in State at Moscow"
 SOV_Great_Purge_Failure_Second_Phase.5.d: "[From.GetNewsIcon]Today, the Soviet Union is deafeningly silent. Iosif Stalin, the comrade First Secretary, was betrayed a few days ago. Taking advantage of the Union's political problems, opposition leaders attacked both the Kremlin and Stalin's dacha. Although the total losses are unknown at this time, it is clear that the hierarchy was decapitated following Stalin's death. Although there was some military infighting on the streets, it is now certain that the coup has ended.\n\nSo far, we know that the rebellion was led by none other than Lazar Kaganovich, one of the closest collaborators of Stalin in the Politburo.\nThe \"Politburo Coup,\" as it was quickly nicknamed, gathered the majority of the Politburo and united in an attack on Stalin's dacha. This betrayal is the result of Stalin's recent incapacity, as he vanished from Moscow after ordering the arrest of Kliment Voroshilov. Immediately following the plot, Kaganovich declared that the attack, as well as Stalin's death, were the fault of the NKVD, which had betrayed the Union. In response, Marshall Budyonny launched a massive purge of the security agency... beginning with its leader, Lavrentiy Beria.\n\nToday, Stalin's body rests in the Red Place, next to Lenin's burial."
 SOV_Great_Purge_Failure_Second_Phase.5.A: "Stalin is dead. May the Politburo avenge him and save the Union!"
 SOV_Great_Purge_Failure_Second_Phase.5.B: "A new government, or just a continuation of the old system?"

 SOV_Moscow_Trials.1.t: "Trial of the Sixteen"
 SOV_Moscow_Trials.1.d: "The trial of the Sixteen, the first of what will be many of these trials, marks the beginning of a new age in Soviet politics. A cleansing, of sorts, as we rid ourselves of the corrupt and Trotskyist influences within our government. Sometimes it is better to amputate the limb, rather than let the gangrene fester and spread until the whole body is engulfed and destroyed. We have decided to take similar measures in the purging of many Soviet politicians. Although through the use of show trials, their guilt on the actions they are accused of may be questionable, they are undoubtedly a corrupting source within our administration. In the October house of unions in Moscow, sixteen individuals who had been suspected of a plethora of crimes, ranging from terrorism to plotting an assassination on Joseph Stalin, were found guilty of all charges. They were promptly sentenced to death and subsequently brought to the cellars of Lubyanka Prison were they each had a bullet put through their skulls. Prominent members of the sixteen executed individuals include Grigory Zinoviev and Lev Kamenev and whilst their absence leaves a hole in our political governance, their deaths mark the beginning of a greater struggle for purity within the USSR."
 SOV_Moscow_Trials.1.A: "Sometimes it is better to amputate the limb"

 SOV_Moscow_Trials.2.t: "Trial of the Anti-Soviet Trotskyist Centre"
 SOV_Moscow_Trials.2.d: "Second of the so-called ‘Moscow Trials', the trial of the Anti-Soviet Trotskyist Centre involves the persecution of seventeen politicians, including figures such as Karl Radek. Whilst thirteen of the initial suspects were taken away and shot immediately, we have decided it best to spare several of the implicated traitors including Radek. Radek has provided us with useful information, particularly in regards to the potential treachery of many other prominent politicians and generals, including Bukharin and Tukhachevsky. Whilst the trial itself may not have been as significant as the last, it sets the stage for important later trials that will take place. The implications of Radek have made it clear that the military, along with many other political sections, is not to be trusted. We will see to them in the future. As for Radek, a labor camp seems the appropriate response, considering the information he has provided. We will dispose of him at a later date."
 SOV_Moscow_Trials.2.A: "Are we safe from the Counter-Revolutionaries?"

 SOV_Moscow_Trials.3.t: "Trial of the Anti-Soviet Military Organization"
 SOV_Moscow_Trials.3.d: "As the trials come to a close, we have one of the final puzzle pieces needed to properly purge the Trotskyists from our communist party. One of the deep operation theorists, Mikhail Tukhachevsky, was seized and transported back to Moscow in a prison van. After a lengthy interrogation by the NKVD, Tukhachevsky collapsed and immediately admitted to being a German agent. While we finally have one of the last enemies of the state in our hands, it's possible we could let Tukhachevsky off in favour of another scapegoat, saving us a great general. After some consideration, Stalin has suggested to charge one of Tukhachevsky's close associates, Rokossovsky. The court faces a long night deciding which of these two is more anti-party."
 SOV_Moscow_Trials.3.A: "Tukachevsky is an enemy of the state, he said it himself. Sentence him to death!"
 SOV_Moscow_Trials.3.B: "Tukachevsky is a symptom rather than the source, sentence Rokossovsky, and keep Tukachevsky close."

 SOV_Moscow_Trials.4.t: "Trial of the Twenty-One"
 SOV_Moscow_Trials.4.d: "The third show trial, which commenced earlier this month, tied together all the loose threads from earlier trials. It includes 21 defendants alleged to belong to the so-called \"Bloc of Rightists and Trotskyites\". As part of the great purge, an overwhelmingly saddening task necessary to ensure loyalty to our motherland, the Trial of the Twenty-One will finish our struggle with the defiant upper class. Ambassadors, heads of mighty organizations and plain doctors alike will fall by our hand, doth they betrayed our motherland!"
 SOV_Moscow_Trials.4.A: "As we suspected, enemies are everywhere!"

 SOV_Leningrad_Circle.1.t: "The Meeting"
 SOV_Leningrad_Circle.1.d: "“But that's not in the spirit of the revolution that Comrade Lenin wanted” said one of the Red Army Generals present in the meeting, “Well Comrade Lenin sure as hell didn't want Stalin in power”, said Marshal Tukhachevsky.\n\nThe group of Generals all held some of the most important ranks in the Red Army, each of the Military districts had at least one officer or more representing them in this meeting, on their orders the entire Red Army could be mobilized immediately for war or for any other “purpose”.\n\nMarshal Tukhachevsky ranted on how political interference had prevented him from capturing Warsaw in 1920, with many other officers also concurring and lamenting how almost daily interference by Political Commissars and their authority to countermand unit officer's orders prevents them from doing something as trivial as regular shooting practices. A relatively junior officer from the Volga Military District pointed out how the Red Army's leadership is being culled of the so-called “Trotskyites” and has made many of the commanders fearful of their lives, as executions and dismissals have become almost regular. After several hours of discussion, the officers dispersed, promising to meet again soon."
 SOV_Leningrad_Circle.1.A: "Lenin's Legacy will no longer be tarnished!"

 SOV_Leningrad_Circle.2.t: "Tukachevsky's Secret Speech"
 SOV_Leningrad_Circle.2.d: "Every single of these “Secret Meetings” has ended with the officers agreeing on nothing, with none of them ready to take any decisive action. However, this meeting was different.\n\n“They killed all of my sons and nephews, that Pig Stalin himself handed me their “confession letters, still damp with their own blood,” said one of the Generals. Many in the meeting had been serving since the Civil War, begging for reforms of any kind, but were deeply disappointed with the party apparatus' inaction. These Reformists held most of the sway in these meetings, and their support was necessary if anything substantial was to come out of these meetings. Marshal Tukhachevsky, often the most vocal in these meetings, began by expressing his dissatisfaction with the lack of action that had been taken, lamenting over how even Comrade Lenin's closest associates had not been spared in the ongoing violent purge, and how only the “removal” of Stalin could stop the madness. Many were visibly aghast at the word “removal” but encouraged by the “Ayes” of the others, specifically the Reformists, Tukhachevsky resumed by enumerating that the purge would never end, possibly until he himself got shot. He only ended when the desk tapping had become so loud that even he could not hear his own words."
 SOV_Leningrad_Circle.2.A: "Cowards die many times before their deaths, but the valiant never taste death, but once"

 SOV_Leningrad_Circle.3.t: "March on the Kremlin"
 SOV_Leningrad_Circle.3.d: "After cutting all the landlines going out of Moscow, Tukhachevsky's troops from the Leningrad Military district poured into the city. Soon the guards at the Kremlin were overpowered without any significant struggle, save for a couple of firefights. The Marshal personally entered the Kremlin with a detachment of troops to arrest Stalin and other Party members present in the Kremlin.\n\nMarshal Tukhachevsky leading a group of officers kicked down the door of Stalin's personal office in the Kremlin Senate to find him hiding behind his desk, he motioned his adjutant to arrest him, Stalin spat all manners of abuses and threats while being lifted and handcuffed.\n\nInitially thought to be a Coup involving only a few Red Army units, it's full scope and extent was soon revealed when later in the evening several cars entered Moscow with Red Army officers from the surrounding military districts, “escorting” Politburo members that had not been present in the City earlier in the day.\n\nThe nearly bloodless coup has been largely successful. Already proceedings have begun in a special court set up in Moscow, headed by the Marshal himself to sentence the “Traitors” of the Union."
 SOV_Leningrad_Circle.3.A: "There's no turning back now..."

 SOV_Leningrad_Circle.4.t: "Civil War!"
 SOV_Leningrad_Circle.4.d: "After severing all lines of communication to and from Moscow, thousands of troops from the Leningrad Military District poured all over the city, establishing checkpoints and perimeters all over the city, most sites of the governmental and key locations being quickly secured, but at the Kremlin, there were short but intense firefights, the outnumbered guards being constantly ordered to stand their ground by Joseph Stalin who had barricaded himself in the office.\n\nAfter subduing the guards, Marshal Tukhachevsky and his top aides made their way to Stalin's office, and dragged the General Secretary out, who was cowardly hiding behind his desk, initially hurling abuses defiantly, he soon began to sob helplessly. His desperate pleas were being constantly interrupted by punches, kicks and his own crying and sobbing, after reaching the Red Square, he was thrown face down onto the pavement, breaking his nose, and causing his blood to stain the brick. Not long after, a truck arrived, carrying fifteen of the most senior NKVD officials that had been present at the Lubyanka building, which had surrendered almost immediately after realizing the overwhelming number of the Army troops.\n\nFollowing an improvised proceeding in the middle of the nearly empty Red Square, the Marshal sentenced Stalin and the NKVD personnel, sixteen men who represented a symbolic reprisal for the sixteen who had been “convicted” at the start of the Purge. Stalin, who had crawled like an infant in the ground, was still wailing and was forced to get on his knees, with the others. Tukhachevsky then took out his own service weapon to shoot each of the 16 while pausing in between to reload. Within minutes there were 16 lifeless bodies slumped in the Red Square, bodies of “traitors” as the Marshal's adjutant wrote in his official report."
 SOV_Leningrad_Circle.4.A: "Not that I loved Caesar less, but that I loved Rome more"
 SOV_Leningrad_Circle.4.B: "Za Rodinu! Za Stalina!"

 SOV_Leningrad_Circle.5.t: "Coup d'État in the Soviet Union!"
 SOV_Leningrad_Circle.5.d: "[FROM.GetNewsIcon]"
 SOV_Leningrad_Circle.5.A: "This can't be good"
 SOV_Leningrad_Circle.5.B: "To Victory!"
 SOV_Leningrad_Circle.5.C: "Good...The rotten structure is crumbling"

 #### Baltic Events
 Baltic_Ultimatum: "Baltic Basing Rights"

 # Estonia
 SOV_Estonia.1.t: "Soviet Union Demands a Treaty!"
 SOV_Estonia.1.d: "The Soviet Union has come to us demanding a Treaty of Mutual Assistance between our two governments- it seems that developments to the west have caused Moscow to re-evaluate their strategic position. The treaty contains seven articles, of which 1, 3, and 5 are most significant.\n\nArticle 1 of the Soviets' desired treaty compels both nations to defend one another in case of an attack by a third power, certainly meaning Germany.\n\nArticle 3 grants the USSR the right to station troops in several military bases on Estonian soil.\n\nArticle 5 reaffirms that both nations will remain sovereign and retain their current governments.\n\nDespite Article 5's recognition of our nation's sovereignty, many in Tallinn feel that agreeing to the treaty and opening our borders to Russian troops would essentially be signing away our independence. At the very least, it would firmly commit us to the Soviet sphere of influence. In the end, however, if Moscow decides to take what they want by force, we are in no position to resist."
 SOV_Estonia.1.A: "There's no point in resisting, sign the treaty."
 SOV_Estonia.1.B: "If we must die for our freedom, so be it."

 SOV_Estonia.2.t: "Soviet-Estonian Mutual Assistance Treaty"
 SOV_Estonia.2.d: "After a week and a half of high tensions some small relief appears to have come to the growing Baltic Crisis. Today Foreign Ministers Molotov, and Selter signed a Mutual Assistance Treaty between The Soviet Union and The Estonian Republic.\n\nTensions Have been rising between both The Soviets and The Estonians over the course of months. With the signing of the Molotov Ribbentrop Pact and the beginning of The Invasion of Poland, many feared that with the western allies distracted now in the west no assistance would come to Estonia and other baltic nations. Now those fears have all come to pass, The Soviets have demanded the Estonian Government sign an intolerable treaty.\n\nThe Treaty includes many articles and provisions mainly aimed at mutual defense but most importantly the Treaty has given the Soviets the right to base troops in Estonian territory. This article worries many in The Estonian Public and government but the guarantees of sovereignty have alleviate this worry some what."
 SOV_Estonia.2.A: "Peace in our Time?"

 SOV_Estonia.3.t: "Soviet Union Demands a New Government!"
 SOV_Estonia.3.d: "We have received a notice from the Soviet ambassador, a notice that has been dreaded and inevitable. Since the Mutual Assistance treaty was forced upon us last year, it has been expected that the Bolsheviks would eventually try to subvert our independence, and it is now clear that is indeed occurring. Moscow is demanding an unspecified amount of Red Army soldiers be stationed in Estonia and a new communist government be installed, in effect, occupying our nation.\n\nAny chance at an effective resistance is a small one, with contacts in Lithuania and Latvia informing us of similar resolutions against them. While one could possibly hope for European intervention, it seems doubtful that the Western Allies would stick up for us, especially while Hitler continues to rampage around. Still, this is our independence we're discussing, there will be no turning back from the brink."
 SOV_Estonia.3.A: "We stand no chance against the Red Tide, agree to Soviet demands."
 SOV_Estonia.3.B: "Defy the Reds, the Bolsheviks will bleed for Estonia!"

 SOV_Estonia.4.t: "Pro-Soviet Administration Established in Estonia"
 SOV_Estonia.4.d: "[ROOT.GetNewsIcon]Reports from Tallinn this morning confirm that Soviet forces have assumed full control over Estonia, likely marking the beginning of the country's incorporation into the Soviet Union. Red Army units, already stationed in the country under the recently signed mutual assistance agreement moved swiftly to secure key positions, encountering little organized resistance. A provisional socialist administration has now been established under the supervision of Moscow.\n\nCommunist organizations within Estonia have declared support for the new government, hailing the arrival of Soviet troops as a liberation from capitalist rule. In contrast, many Estonians regard these developments as a bitter echo of the Estonian War of Independence two decades ago, when the young republic fought successfully to repel Soviet forces. Now, twenty years later, history appears to have come full circle.\n\nMeanwhile, President [EST.GetLeader] has been detained by Soviet authorities and deported to Ufa, while Prime Minister Jüri Uluots has escaped abroad, forming a government-in-exile in the West and vowing to continue the struggle for Estonian sovereignty. Western nations have issued condemnations of the Soviet actions, but Moscow shows no sign of retreating."
 SOV_Estonia.4.A: "Welcome to the Union!"
 SOV_Estonia.4.B: "A shocking upset!"

 SOV_Estonia.5.t: "Formation of the People's Governmnet"
 SOV_Estonia.5.d: "Bowing to the power of the Bolshevik state, a pro-Soviet government has been formed in Tallinn. Headed by Andrey Zhdanov, the new socialist hierarchy will form the backbone of the revitalized Estonian state. The ultimatum also has allowed free movement of Soviet forces through her sovereign territory. While there are some protests by civilians in the capitol and Narva, so far, life for many Estonians has continued as usual.\n\nThe Red Army is expected to make it's move tomorrow, formally beginning our occupation."
 SOV_Estonia.5.A: "Welcome to the Motherland!"

 SOV_Estonia.6.t: "Elections for People's Riigikogu"
 SOV_Estonia.6.d: "[ROOT.GetNewsIcon]\nA Soviet-backed party in a Soviet-backed government is only a step closer to full Soviet annexation. With the recent parliamentary election in our country, the communists have taken power, but the reactionaries in our nation claim this was through unconstitutional means. Much like our Baltic sisters, we had been staunch supporters of republicanism since our nation's founding, but this seemingly unfair election has had quite the toll on Estonia's future. Many conservatives' fears have been realized with the total control the communist party holds over the parliament, and this new “People's Riigikogu” is controlled by those who want to achieve closer and closer ties with the USSR.\n\nEven before the voting ended, Soviet troops had occupied the countryside and the cities, harassing and arresting any dissenters who opposed a Workers' Estonia. It is certain that closer and closer relations will be established between our government and the Soviets; moreover, the Workers' People's Union has claimed that allying to the USSR gives us protection against the expansionist Germans, a sign of friendship between Moscow and Tallinn. However, many fear that “friendship” will lead to a Russian dominated Estonia, the very same system we broke away from in 1918. To make the situation worse for those calling for independence, many within the People's Riigikogu are calling for immediate annexation into the USSR. The results of a 100% communist parliament are sure to vote in favor of one choice - the birth of a quite close friendship, almost too close."
 SOV_Estonia.6.A: "The birth of a new friendship indeed."

 SOV_Estonia.7.t: "Establishment of Estonian SSR"
 SOV_Estonia.7.d: "Election results are being tallied all around Estonia, from the urban areas to the rural zones. Unsurprisingly, since they were the one and only party with a list of candidates on the ballots, the “Union of the Estonian Working People” is expected to win in a sweeping victory. The Republic will be rebranded as the Estonian SSR, in a nod to Moscow's overwhelming authority. Already, Red Army soldiers are scouting areas in Tallinn for local socialist monuments, and there is a rumour of a petition being prepared in regards to Estonia formally joining the Soviet Union.\n\nRegardless of what is to occur, the nation's future is now tied directly to the USSR, for better or for worse."
 SOV_Estonia.7.A: "Reap, sickle, and beat out, hammer!"

 SOV_Estonia.8.t: "Estonian SSR requests to join the Union"
 SOV_Estonia.8.d: "We have received a telegram from Tallinn requesting a formal integration process to begin, allowing the Estonian SSR to join our glorious Soviet Republic. While this has been a goal of ours since the division of Poland, it was desired to have the Estonians ask us for permission, rather than the opposite. Even slight appearances can have drastic consequences.\n\nWith the Western Allies too busy focused on the Führer to interfere, now begins the process of Sovietization of Estonia. The People's Parliament shall help us craft the laws and begin the nationalization of certain heavy industries. Redistribution of wealth and property will be slowly introduced. Any complaints by the people will be, of course, duly noted."
 SOV_Estonia.8.A: "Welcome, Comrades! We have borscht!"

 # Latvia
 SOV_Latvia.1.t: "Soviet Union Demands a Treaty!"
 SOV_Latvia.1.d: "The Soviet Union has come to us demanding a Treaty of Mutual Assistance between our two governments- it seems that developments to the west have caused Moscow to re-evaluate their strategic position. The treaty contains seven articles, of which 1, 3, and 5 are most significant.\n\nArticle 1 of the Soviets' desired treaty compels both nations to defend one another in case of an attack by a third power, certainly meaning Germany.\n\nArticle 3 grants the USSR the right to station troops in several military bases on Latvian soil.\n\nArticle 5 reaffirms that both nations will remain sovereign and retain their current governments.\n\nDespite Article 5's recognition of our nation's sovereignty, many in Riga feel that agreeing to the treaty and opening our borders to Russian troops would essentially be signing away our independence. At the very least, it would firmly commit us to the Soviet sphere of influence. In the end, however, if Moscow decides to take what they want by force, we are in no position to resist."
 SOV_Latvia.1.A: "There's no point in resisting, sign the treaty."
 SOV_Latvia.1.B: "If we must die for our freedom, so be it."

 SOV_Latvia.2.t: "Soviet-Latvian Mutual Assistance Treaty"
 SOV_Latvia.2.d: "After weeks of high tensions some small relief appears to have come to the growing Baltic Crisis. Today Foreign Ministers Molotov, and Munters signed a Mutual Assistance Treaty between The Soviet Union and The Latvian Republic.\n\nTensions Have been rising between both The Soviets and The Latvians over the course of months. With the signing of the Molotov Ribbentrop Pact and the beginning of The Invasion of Poland, many feared that with the western allies distracted now in the west no assistance would come to Estonia and other baltic nations. Now those fears have all come to pass, The Soviets have demanded the Latvianian Government sign an intolerable treaty.\n\nThe Treaty includes many articles and provisions mainly aimed at mutual defense but most importantly the Treaty has given the Soviets the right to base troops in Estonian territory. This article worries many in The Latvian Public and government but the guarantees of sovereignty have alleviate this worry some what."
 SOV_Latvia.2.A: "Peace with Honour?"

 SOV_Latvia.3.t: "Soviet Union Demands a New Government!"
 SOV_Latvia.3.d: "News from the East!\n\nFollowing our recent treaty agreements with the USSR, they have stepped up their demands, and are awaiting our response.\n\nMoscow has demanded that we establish a new Parliament headed by the communist party in our country. This is an egregious request, as we have held up the ideals of a fair republic since 1918, and we should not have to bend over to Russian bullies.\n\nHowever, many in our current government fear that refusing the Soviet's demand is an act of suicide. They claim that we will be occupied by the Red Army in one way or another, and that accepting these demands will just make life easier and result in fewer Latvian deaths.\n\nWhatever the resolution, our decisions have costed us, and our independence from Bolshevism is waning."
 SOV_Latvia.3.A: "We stand no chance against the Red Tide, agree to Soviet demands."
 SOV_Latvia.3.B: "Defy the Reds, the Bolsheviks will bleed for Latvia!"

 SOV_Latvia.4.t: "Pro-Soviet Administration Established in Latvia"
 SOV_Latvia.4.d: "[ROOT.GetNewsIcon]News from Riga this morning confirms that Soviet forces have taken full control of Latvia, as Moscow moves to formalize its influence over the Baltic region. Red Army units, present in the country since the previous signing of the mutual assistance pact, have now occupied all key strategic centers and government offices. In their wake, a new pro-Soviet cabinet under Augusts Kirhenšteins has been installed, pledging loyalty to the Soviet Union and promising to lead Latvia toward socialism.\n\nThe sudden political transformation has stunned much of the population. Many Latvians recall the struggles of the Latvian War of Independence just over two decades ago, when the nation fought to secure its freedom from both German and Bolshevik forces. Today, that independence appears to have vanished under Soviet pressure.\n\nPresident [LAT.GetLeader] has been detained by Soviet authorities and deported eastward under guard. While some officials have chosen to cooperate with the new regime, others have fled abroad, declaring their refusal to recognize the Soviet occupation. Western governments have lodged formal protests, but their words have done little to alter the situation on the ground. Soviet banners now fly over Riga, and the establishment of the Latvian Soviet Socialist Republic seems only a matter of time."
 SOV_Latvia.4.A: "We welcome our new Latvian comrades."
 SOV_Latvia.4.B: "Frightening."

 SOV_Latvia.5.t: "Formation of Pro-Soviet Government"
 SOV_Latvia.5.d: "The Right and Center are in agony, and the Left reigns victorious.\n\nFollowing the recent treaty and subsequent establishment of a Pro-Soviet government.The Communist Party of Latvia, now known as the Working People's Bloc, exercises control over the state. Many conservatives and centrists are outraged over the coming elections, which will undoubtedly be incredibly one-sided, yet Red troops guard the Parliament building, unyielding in the face of these protests. Other parties in parliament are still allowed to operate, but many fear that the Red Army will, in the coming days, cease their activities and arrest any dissenters and political opponents to a Red Latvia.\n\nThe next few days will ultimately uncover the fate of Latvia, but many have already lost hope and are preparing for the eventual annexation into the USSR."
 SOV_Latvia.5.A: "The opponents to a Red Latvia are those who love Germany more."

 SOV_Latvia.6.t: "Elections for People's Seimas"
 SOV_Latvia.6.d: "[ROOT.GetNewsIcon]\nA Soviet-backed party in a Soviet-backed government is only a step closer to full Soviet annexation. With the recent parliamentary election in our country, the communists have taken power, but the reactionaries in our nation claim this was through unconstitutional means. Much like our Baltic sisters, we had been staunch supporters of republicanism since our nation's founding, but this seemingly unfair election has had quite the toll on Latvia's future. Many conservatives' fears have been realized with the total control the communist party holds over the parliament, and this new “People's Parliament” is sure to want to achieve closer and closer ties with the USSR.\n\nEven before the voting ended, Soviet troops had occupied the countryside and the cities, harassing and arresting any dissenters who opposed a Workers' Lativa. It is certain that closer and closer relations will be established between our government and the USSR; moreover, the Workers' People's Bloc has claimed that allying to the USSR gives us protection against the expansionist Germans, a sign of friendship between Moscow and Riga. However many fear that this “friendship” will lead to a Russian dominated Latvia, the very same system we broke away from in 1918. To make a situation worse for those calling for independence, many within the People's Parliament is calling for immediate annexation into the USSR. The results of a 100% communist parliament are sure to vote in favor of one choice - the birth of a quite close friendship, almost too close."
 SOV_Latvia.6.A: "The birth of a new friendship indeed."

 SOV_Latvia.7.t: "Establishment of a Latvian SSR"
 SOV_Latvia.7.d: "An independent Latvia is no more. The Republic is dead, and the Soviets reign victorious.\n\nEarlier today, the Working People's Bloc set into motion legislation to officially establish a Soviet Socialist Republic. Any doubt that the party was in full collaboration with the USSR, and that the intended outcome was full annexation into the Union has been extinguished. Soviet sympathisers praise this move, but many on the right and center are fleeing Latvia for a better life in their eyes. However, with recent events in Estonia and Lithuania regarding Soviet occupations as well, the Scandinavian states and even Germany will be their best options.\n\nAt this stage, Latvia still holds a shred of independence, but the Peoples Seimas has already drafted legislation to let go of that sliver of freedom, and officially join the USSR as a fellow Soviet Socialist Republic."
 SOV_Latvia.7.A: "Twenty-two years just to be under Russian rule once more."

 SOV_Latvia.8.t: "Latvian SSR requests to join the Union"
 SOV_Latvia.8.d: "Following our recent occupation and Stalinist coup of Latvia, they have come to use with an offer that we surely couldn't refuse. The Latvian SSR has given us the opportunity to formally annex them into the USSR, declaring them a sister republic within the Union.\n\nOf course, this offer only makes sense; Communist brethren must stick together in the face of Kraut expansionism and imperialism. They were misguided in 1918 and the subsequent bids for independence in the face of the evil White army and the Red Army. Thus, they have finally come to their senses and are willing to join a Republic that values them, unlike a Russian dominated state or a Tsardom.\n\nWith our troops already occupying the cities and countryside, it should be easy to put down any dissenters to their collaboration within the USSR, and we will make sure to protect them in case the Germans come knocking."
 SOV_Latvia.8.A: "Let us graciously welcome them in"

 # Lithuania
 SOV_Lithuania.1.t: "Soviet Union Demands a Treaty!"
 SOV_Lithuania.1.d: "The Soviet Union has come to us demanding a Treaty of Mutual Assistance between our two governments- and they're offering us our official capital, Vilnius, occupied by Poland since 1920. The treaty contains nine articles, of which 1, 2, 4, and 7 are most significant.\n\nArticle 1 transfers the region of Vilnius to our ownership, returning the old capital to Lithuanian hands.\n\nArticle 2 of the Soviets' desired treaty compels both nations to defend one another in case of an attack by a third power, certainly meaning Germany.\n\nArticle 4 grants the USSR the right to station troops in several military bases on Lithuanian soil.\n\nArticle 7 reaffirms that both nations will remain sovereign and retain their current governments.\n\nDespite Article 5's recognition of our nation's sovereignty, many in Kaunas feel that agreeing to the treaty and opening our borders to Russian troops would essentially be signing away our independence. At the very least, it would firmly commit us to the Soviet sphere of influence. In the end, however, if Moscow decides to take what they want by force, we are in no position to resist."
 SOV_Lithuania.1.A: "Vilnius is worth the Soviet presence, sign the treaty."
 SOV_Lithuania.1.B: "Vilnius isn't worth our freedom."

 SOV_Lithuania.2.t: "Soviet-Lithuanian Mutual Assistance Treaty"
 SOV_Lithuania.2.d: "The Papers in both Moscow and Lithuania today were filled with victorious news. The long negotiated Treaty of Mutual Assistance was signed in Moscow by Foreign Ministers Molotov and Urbšys. In Moscow it is being hailed as another victory of the workers in the overthrow of capitalism as Soviet troops move into Lithuania for its protection. Meanwhile in Lithuania the treaty is being hailed as a victory since in return for the basing of these Soviet units Lithuania will be returned its historical capital of Vilnius along with other lost territories that the Russians have recently captured in Poland.\n\nSince the Soviet-Polish War and neither the Soviets or the Lithuanians have been satisfied with their borders with Poland. The recent invasion of Poland has provided now the perfect opportunity to redraw this border for a more mutually beneficial state. Lithuania will be receiving almost all the lost territory in the Vilnius region along with the Soviets cedeing large areas of Lithuanian Majority.\n\nAlthough quite popular publicly, the treaty has sewn much discontent amongst the lithuanian public, especially amongst nationalist groups. The words “Vilnius is ours, but Lithuania is Russia's” are heard onn far too many mouths for the governments comfort. In spite of this large numbers of celebrations have been planned for the handover days of the territories."
 SOV_Lithuania.2.A: "Please Clap!?"

 SOV_Lithuania.3.t: "Soviet Union Demands a New Government!"
 SOV_Lithuania.3.d: "It is astonishing that Lithuania has managed to retain its independence from the red menace to its East for so long. In 1918, Lithuania had barely managed to escape the Bolshevik grasp, but much time had passed since then, and now the Reds have come to reclaim what they have always considered theirs: the Baltics. The Soviet ambassador has presented the Lithuanian government with a list of outrageous demands for the establishment of a new administration on Lithuanian soil. No doubt, these demands will simply be the start of the USSR's tightening grip.\n\nNo matter how much President Smetona will want to bury his head in the sand and ignore this difficult situation, a decision that will decide the fate of the nation needs to be made. He can either steel his resolve and prepare the country for war by refusing these ridiculous demands, or he can preserve the lives of his people and prevent bloodshed by submitting the nation to the whims of the Soviet Union. Both are dim prospects, but time is running out, and a decision needs to be made."
 SOV_Lithuania.3.A: "Give in to their demands. We have no choice."
 SOV_Lithuania.3.B: "Nonsense! We beat them once, we can do it again!"

 SOV_Lithuania.4.t: "Pro-Soviet Government Installed in Lithuania"
 SOV_Lithuania.4.d: "[FROM.GetNewsIcon]Events in Kaunas have taken a dramatic turn as Soviet troops have entered the country in force and a new government loyal to Moscow has been proclaimed. Following an ultimatum demanding the entry of additional Red Army units and the arrest of several ministers, the Lithuanian leadership found itself with little choice but to submit.\n\nPresident Antanas Smetona, refusing to cooperate with the Soviet demands, has fled abroad, denouncing the move as the end of Lithuanian independence. In his absence, Justas Paleckis has assumed authority and announced the creation of a \"People's Government\", committed to friendship with the Soviet Union and the construction of socialism in Lithuania.\n\nPublic reaction remains subdued but tense. While some greet the arrival of the Red Army as a guarantee of peace and security, many Lithuanians view it as an occupation in all but name. Western governments have issued formal protests, but the Soviet position appears unshakable. With Moscow now directing affairs in Kaunas, Lithuania's future as an independent state hangs by a thread."
 SOV_Lithuania.4.A: "A victory for the Lithuanian workers!"
 SOV_Lithuania.4.B: "A worrying situation unfolds."

 SOV_Lithuania.5.t: "Formation of the People's Governmnet"
 SOV_Lithuania.5.d: "The reactionary Lithuanian government has outlived its usefulness. With the resignation of Prime Minister Merkys and the coward Smetona fleeing the country, a new People's Government will now rule the country. Comrade Vladimir Dekanozov is now in the process of recruiting men loyal to our cause in order to fill a new cabinet. At the head of this cabinet will be a new Prime Minister, leftist journalist Justas Paleckis. There are doubts about his allegiance to the revolution, but he is sure to be more reliable than the Trotskist deviants that call themselves the Lithuanian Communist Party. However, we shouldn't need to worry for long, as Paleckis' government will prove to be only a transitional period as we work to incorporate Lithuania into the Union.\n\nAll these years of reactionary propaganda have fooled the Lithuanian people, and so the new government will need to assure them that we'll protect their independence and keep their best interests at heart. Along with the reversal of this reactionary indoctrination, the Seimas will need to be disbanded, political prisoners must be released, and reform must be pursued in the education and healthcare sectors. \n\nUnfortunately, foreign observers have declared that this change of government violates the Lithuanian constitution. But they can complain all they want: Lithuania will soon join his working-class brothers in the Union."
 SOV_Lithuania.5.A: "We are almost there."

 SOV_Lithuania.6.t: "Elections for People's Seimas"
 SOV_Lithuania.6.d: "[ROOT.GetNewsIcon]\nAnd the results are in.\n\nFollowing the recent establishment of the People's Government earlier this year, and the re-emergence of the Lithuanian Communist party, the next step for relations with the Soviets was naturally a Lithuanian parliament dominated by communists. The Seimas had been the cornerstone of our republicanism since our nation's founding, but now many conservatives' fears have been realized with the total control the communist party holds over the People's Seimas and the government as a whole. Even before the voting ended, Soviet troops had occupied the countryside and the cities, harassing and arresting any dissenters who opposed a Workers' Lithuania. It is certain that closer and closer relations will be established between our government and the USSR, and many are even calling for total annexation. They have claimed that the USSR granting us Vilnius was a sign of friendship and determination for further cooperation, but many fear that this “friendship” will lead to a Russian dominated Lithuania, the very same system we broke away from in 1918."
 SOV_Lithuania.6.A: "The People's Seimas shall cast its judgment."

 SOV_Lithuania.7.t: "Establishment of Lithuanian SSR"
 SOV_Lithuania.7.d: "Following their nearly unopposed victory in the first elections to the People's Parliament, the newly legalized Lithuanian Communist Party has announced the creation of the Lithuanian Soviet Socialist Republic.\n\nDeputy Chief of the People's Commissariat for Foreign Affairs Vladimir Georgievich Dekanozov has been tasked with ensuring the nation's compliance with the Soviet's demands, taking a leading role in establishing a new government on the model of the Soviet party-state.\n\nWhile Lithuania remains nominally independent, the Red Army has supplanted the local armed forces, and opposition leaders have made a habit of disappearing into the vast Siberian wastes."
 SOV_Lithuania.7.A: "“Neither Nests Nor Sentinels, Only the Rustling of Young Birch Trees...”"

 SOV_Lithuania.8.t: "Lithuanian SSR requests to join the Union"
 SOV_Lithuania.8.d: "Separated from their Russian brothers, the Lithuanian workers have been under the yoke of the reactionary elite for too long. This injustice has ended today, as the new administration of the Lithuanian SSR notified us earlier today of their intention of joining our glorious union. A Lithuanian delegation of notable public figures traveled to Moscow, signing an official document ratifying the integration of Lithuania into the Soviet Union. \n\nLithuania's old oppressors tried to break the will of their workers and exploit them, but with our assistance, the common Lithuanian man rose from his shackles, and fought for what he desired. This is how it should be."
 SOV_Lithuania.8.A: "Welcome back, Lithuanian comrades!"

 #### Politburo Weakened Events
 SOV_Politburo_Weakened.1.t: "Rise of the Stalin Opposition"
 SOV_Politburo_Weakened.1.d: "The Politics and the leadership of our great Union both have had peculiar histories, expected to lead a global revolution, the untimely death of our Country's founding father brought much sorrow to our country. After Lenin's death, a \"troika\" consisting of Grigory Zinoviev of the Ukrainian SSR, Lev Kamenev of the Russian SFSR, and Joseph Stalin of the Transcaucasian SFSR led the nation after a brief struggle against Leon Trotsky and his supporters, with the power being eventually consolidated under the seat of the incumbent General Secretary Joseph Stalin.\n\nThough seemingly a powerful and strong figure to some, the leader has had his fair share of failings - a debatable involvement in the eventual disaster in the Polish campaign, destructive attitudes in fulfilling his policies of industrialization and collectivization that have killed many and even generated famines, it is alleged that even the founding father, Lenin in his last days was concerned about Stalin and had tried to facilitate his dismissal to prevent his future involvement in the government's policies.\n\nMuch of the critique against him has generally been random and unorganized, but finally and for the greater good, unfounded as well as founded accounts indicate that the dissension against him has been consolidated and is now organized among and with the patronage of some high ranking Politburo members. Though the extent and scope is not fully known, it has become quite evident that opposition against Stalin and his policies is starting to manifest and has become indicative to other Party members as well."
 SOV_Politburo_Weakened.1.A: "Maintain the Status-quo"
 SOV_Politburo_Weakened.1.A_tt: "We will maintain the current §YPolitburo§!'s Strenght\nPolitburo & Orgburo Strenght: §YModerate§!"
 SOV_Politburo_Weakened.1.B: "The revolution has already been subverted enough!"
 SOV_Politburo_Weakened.1.B_tt: "We will push for even more empowering of the §YStalin Opposition§! within the §OPolitburo§!, this could give us an §Gedge§! over the §RStalinist Faction§!, However this could §Rbackfire...§!"

 SOV_Politburo_Weakened.2.t: "The Politiburo Supports the Opposition"
 SOV_Politburo_Weakened.2.d: "After much ramblings, uncertainties, and intrigue in the higher echelons of the political structure and leadership of the Soviet Union, it has become quite evident that the “Opposition” has consolidated itself and has a more than significant presence in the party circles.\n\nSeveral members of the Politburo, who are not supposed to give in to “factionalism” have made their intentions clear, and indicated that they will do everything in their power to remove General Secretary Stalin, this development has effectively led to the de-facto creation of an anti-Stalinist power bloc. \n\nThough not with certainty, it is widely believed that the oppositionists themselves are divided into their own sections, it is suspected that there are 3 main constituents, Nikolai Bukharin, leading the right-leaning members, highly improbable but rumored Sergei Kirov from the Party Center, and insignificant yet present Lev Kamenev and Grigory Zinoviev who lead the left elements. Kamenev and Zinoviev have long been considered as Stalin rivals and even Nikolai Bukharin's disagreements with the General Secretary regarding the decision of collectivization, which led to millions of deaths and his subsequent drifting away from Stalin all indicate their possible involvement in the “Opposition”. But the rumors about Sergei Kirov's involvement, which some think to be absurd are the real shockers considering his personal relationship with the General Secretary, though seemingly improbable, he is an influential member and commands enough respect to even refuse Stalin's directives, whatever the case maybe it remains clear for any action to be taken against Stalin by the politburo, all the sections will play decisive roles, especially with the 17th Congress of the All-Union Communist Party coming up, which will elect the Central Committee."
 SOV_Politburo_Weakened.2.A: "Hopefully.....the Union and the party will know peace once more."
 SOV_Politburo_Weakened.2.A_tt: "§RStalin§! has been overpowered by the §OPolitburo§!\nPolitburo & Orgburo Strenght: §GOverwelming§!"

 SOV_Politburo_Weakened.3.t: "Stalin Denounces the Opposition's Plot"
 SOV_Politburo_Weakened.3.d: "Party General Secretary Joseph Stalin has long been viewed as a man of action, many observers and commentators have been restlessly anticipating his reply and course of action against the “Opposition” that has seemingly assembled against him, who claim their existence is an answer to the incompetent leadership, brutality and the atrocities for which the General Secretary has been held responsible. \n\nIn his address to the party members present in the last Politburo session held, the so-called “Man of Steel” has denounced the “Opposition” which has been rallying against himself. In his speech he highlighted his achievements and his work for the socialist cause, enumerating his “contribution” to the society by mentioning the recently completed first five-year plan and his collectivization policies, at that moment there was a snide remark by a party member “Millions Dead, seem to be a good enough contribution to the cause”, Stalin was confounded by such a brazen disrespect of his authority, and with no opposition from any other party members, the full scope of the “Opposition” became evident.\n\nAfter fumbling, never used to such an interruption Stalin continued albeit now with less clarity and proceeded with further attacks against his critics, accusing them of being agents of Trotsky attempting to bring down the State from within to fulfill the nefarious goals of anti-revolutionaries. Despite some cheers and approvals from some of the Stalinist supporters, the indifferent attitudes and rhetorics by many clearly indicated that the General Secretary had lost a large amount of approval, which would in all cases be evident and manifest in the upcoming 17th Congress of the All-Union Communist Party."
 SOV_Politburo_Weakened.3.A: "The dying throes of a bygone man."
 SOV_Politburo_Weakened.3.A_tt: "§RStalin§! has detered our effort to empower the §OPolitburo§!\nPolitburo & Orgburo Strenght: §GOverwelming§!"

 #### 17th Congress Events
 SOV_XVII_Congress.1.t: "First day of the 17th Congress"
 SOV_XVII_Congress.1.d: "[FROM.GetNewsIcon]It is another historic event here today in the capital Moscow, for revolutionaries from all sides of the political aisle have gathered here today to convene the 17th Congress of the All-Union Communist Party. \n\nAttended by more than a thousand delegates who have been handpicked to proactively and pragmatically represent the many sectors and party members in the Communist Party, this Congress will discuss a wide variety of issues from Party Organization Reform to the status of the brilliant Five Year Plan which has brought unprecedented levels of prosperity never before seen in Russia in history, along with electing various of our comrades into the important organs of the Party.\n\nThis is a historic day, whose deliberations and decisions shall shape our glorious Union forever!"
 SOV_XVII_Congress.1.A: "I hereby call to order..."

 SOV_XVII_Congress.2.t: "Comrade Stalin's Reports"
 SOV_XVII_Congress.2.d: "“Comrades, more than three years have passed since the Sixteenth Congress. That is not a very long period. But it has been fuller in content than any other period- I do not think that any period in the last decade has been so rich in events like this one.”\n\nStalin's report centers on three main areas:\n-The great depression ravaging the capitalist world, which is unprecedented in its length and severity. In contrast to this, the USSR's production has more than doubled,\nclearly showing the superiority of the socialist model.\n-The growing tensions between the European powers, and between Japan and China, which threaten to plunge the world into war once more.\n-Soviet diplomatic relations with the rest of the world, which have improved greatly with the signing of nonaggression pacts with Poland, Finland, Italy, and France. Relations have been restored with the United States and China as they see our increasing economic and military might.\n\nAs the speech comes to an end, applause can be heard ringing throughout the congress chambers- even some members of Nikolai Bukharin's right opposition can be seen clapping and cheering. As the applause dies down, the General Secretary makes one last remark..."
 SOV_XVII_Congress.2.A: "Praise the good work of the Party"
 SOV_XVII_Congress.2.B: "Makes a neutral and Bureaucratic Discourse"
 SOV_XVII_Congress.2.C: "Criticize the party and demand improvements"

 SOV_XVII_Congress.3.t: "The Party recognizes their failures"
 SOV_XVII_Congress.3.d: "We expected today a rejection of blame from the party- what we did not expect was that they would accept the criticism, and that is what has come to pass.\nThe party is not monolithic, and there is always dissent, but on most occasions, a compromise is made and a decision announced. Stalin's harsh criticism of the party hasn't made him any new friends, but it seems enough of the politburo to see the truth in Stalin's criticisms to make a statement. However, by carefully examining the reactions of the politburo members, a deeper truth can be found. It seems that the decision to accept culpability for what many see as Stalin's failures was hotly contested behind closed doors and that a large bloc of the politburo does not agree with their peers. Going forward, this split will likely affect the politburo's decision making for the rest of the congress, if not longer. A delegate to the left whispers ominously.\n\n“What was it that American President said?”"
 SOV_XVII_Congress.3.A: "The Party will betray the revolution nevermore."

 SOV_XVII_Congress.4.t: "The Members did not Accept Criticisms"
 SOV_XVII_Congress.4.d: "After Comrade Stalin put forth fierce criticism of the CPSU and its members in his reports about the general state of the Union, many were quick to disregard these accusations as outrageous and the specific problems as “blown out of proportion“ and “not representative for the state of the Union and Revolution“. And while many party members were content with these statements, fine with the reassuring pat on their back put forth by their fellow comrades, there were others who were deeply affected by Comrade Stalin's reports.\nWhat did the party truly achieve from the start of the Revolution?\nTrue they won the war against the Reactionaries but after that? The dream of the world revolution died before Warsaw, the dream of eternal prosperity died with the plethora of international sanctions and the revolutionary spirit of 1917 drowned in a sea of misery and war. The dream of the communist utopia simply vanished in the face of the cold reality. But who could be blamed? The farmer who toils in the fields to prevent another famine from plaguing the country? The factory worker who works long hours in the factories to ensure that the Union is on par with the capitalist countries?\nThe soldiers, who are ready to give their blood and lives to keep the revolution going? No, they can't be blamed, for they still give everything for the Revolution. Soon the delegates realized that only the party can be blamed and that only they can correct the mistakes they made, that improvement is needed to rekindle the flame of the Revolution. And improve they will, for only the party will be able to guide the proletariat towards utopia"
 SOV_XVII_Congress.4.A: "A house divided against itself..."

 SOV_XVII_Congress.5.t: "The Five Year Plan Debate"
 SOV_XVII_Congress.5.d: "Next on our agenda is a speech from Vyacheslav Molotov, Chairman of the Council of People's Commissars, and Valerian Kuybyshev, Chairman of the State Planning Committee, on the necessity of a second 5-year plan. While the first 5-year plan overhauled agriculture in the union, seeing state-enforced collectivization, the \"liquidation\" of the Kulaks, and the construction of a foundation for heavy industry, it did not fully meet all of its goals- greatest of them a full transition of the economy to socialism. Molotov and Kuybyshev propose a second 5-year plan that will achieve the remaining uncompleted objectives of the first, as well as create further heavy industry and infrastructure. Both Molotov and Kuybyshev are close allies of Stalin's, and going through with the plan will greatly increase the General Secretary's power over the state and economy. On the other hand, as many of the delegates have observed, the first 5-year plan's successes came at a cost and even so weren't entirely successful."
 SOV_XVII_Congress.5.A: "We must rally the workers for this historic task"
 SOV_XVII_Congress.5.B: "Reinforce criticism of the brutal collectivization"
 SOV_XVII_Congress.5.B_tt: "Such harsh criticism will help “disjoint” §RJoseph Stalin§! from power"

 SOV_XVII_Congress.6.t: "Organizational Issues"
 SOV_XVII_Congress.6.d: "To be a card-carrying member of the party no longer means what it used to, and Lazar Kaganovich has come before the politburo to tell us of what can be done. Since the Bolsheviks under Lenin seized the apparatus of the state, party membership has become more and more necessary for everyday life in the union. As such, membership has exploded, and many of these new members are... less than dedicated to our goals. Kaganovich suggests that we extend party membership only to those who have proven themselves through work in a social organization, and increase the number of recommendations required to join. Finally, Kaganovich proposes that we replace the current Rabkrin, the committee designed to expose corruption and government wrongdoing, with a new People's Control Commission dedicated to the oversight of the many oblasts, krais and autonomous republics of the Union."
 SOV_XVII_Congress.6.A: "I move to create the Peoples' Control Comission"
 SOV_XVII_Congress.6.A_tt: "End the §RRabkrin System§! and pass their areas of action to the §OPeople's Control Commission§!"
 SOV_XVII_Congress.6.B: "The Rabkrin will be enough, with a little revision"
 SOV_XVII_Congress.6.B_tt: "The §ORabkrin System§! is efficient and doesn't need to end. We will only do some §Greforms§!."

 SOV_XVII_Congress.7.t: "Elections to the Central Organs of the Party"
 SOV_XVII_Congress.7.d: "At last, the most important issue on our agenda is the matter of elections to the party's Central Committee. The Politburo will stay largely the same as it is now, with only one position changing hands, but the Secretariat will see radical change, with a majority of its members being replaced. Despite all these changes, most delegates expect Josef Stalin to retain the post of General Secretary. However, perhaps there is one who could challenge Stalin for leadership- Sergei Kirov. Kirov has always had the support of a wide swathe of the party and has started to drift away from Stalinism, exerting more and more independence from Moscow every day. Perhaps Stalin's ten-year rule will soon come to an end."
 SOV_XVII_Congress.7.A: "Significant Votes against Stalin."
 SOV_XVII_Congress.7.A_tt: "§OThe Politburo§! has chosen to vote §RStalin§! out of office"
 SOV_XVII_Congress.7.B: "Overwhelming Victory for Comrade Stalin"
 SOV_XVII_Congress.7.B_tt: "§OThe Politburo§! has chosen to vote for comrade §GStalin§!"

 SOV_XVII_Congress.8.t: "Significant Votes Against Stalin"
 SOV_XVII_Congress.8.d: "The early votes have come in, and they paint a grim picture for Stalin's continued leadership. The party leadership uses a voting system where candidates are voted against, and the candidate with the fewest votes against takes the position- Stalin has already received a significant amount of those votes. What might have been unthinkable a few years ago now presents itself as a tantalizing opportunity- the removal of General Secretary Joseph Stalin? Much of the party has always hated the old enforcer, some even claiming Lenin tried to prevent Stalin's leadership from his deathbed, but they have never had a good way to oust him- until now. In dim backrooms and hotel rooms, a plot is beginning to coalesce. They can get the votes, all they need now is a candidate to take the General Secretaryship, and they already have someone in mind. Though once a Stalin ally, he has slowly drifted away from Stalin in recent years, preferring vibrant St. Petersburg to the halls of power in Moscow."
 SOV_XVII_Congress.8.A: "The Party Goes with the Opposition"
 SOV_XVII_Congress.8.A_tt: "It seems even a 'man of steel' rusts away.\n§OThe Politburo§! chose §YNikolai Ivanovich Bukharin§!"
 SOV_XVII_Congress.8.B: "The Party Calls a Provisional Goverment."
 SOV_XVII_Congress.8.B_tt: "It seems even a 'man of steel' rusts away.\n§OThe Politburo§! chose §YSergei Mironovich Kirov§!"

 SOV_XVII_Congress.9.t: "The Party calls for a Provisional Government"
 SOV_XVII_Congress.9.d: "Long after a party spokesman was expected to announce the next general secretary, a nervous young man dashes to the podium to deliver a hastily prepared statement. The unlucky aide looks out over the crowd, visibly shaken, and speaks so quickly it's hard to understand his words. \"The party has decided that to maintain strong leadership in this time of crisis, comrades Kirov, Molotov, and Kalinin will form a provisional government.\" The chambers are silent for a moment before they explode into activity, a tsunami of sound washing over the seated crowd. Delegates scramble across the floor for hurried discussions with their friends and allies.\n“This is unprecedented!”\n“Is that legal? Can they do that?”\n“At least Kirov's on the provisional government.”\n“Now this is why we should have voted for Stalin.”\n\nAfter a time, the discussion dies down, and the new troika, reminiscent of the triumvirates of Rome, will begin their work to lead and protect the revolution."
 SOV_XVII_Congress.9.A: "But which will be Caesar?"

 SOV_XVII_Congress.10.t: "The Party goes with the Opposition"
 SOV_XVII_Congress.10.d: "A heavy silence smothers the congress chambers when the party's decision is announced, and Nikolai Bukharin's opposition is asked to create a new government. Making up the \"right\" wing of the Party, the opposition and their allies had been in decline all over the socialist world- until now. Bukharin slowly walks up to the front of the room, and every single footstep can be heard echoing through the vast emptiness of the congregation hall. As the old revolutionary takes the podium, every single eye is fixed on him, scanning, searching for any clue for his next words.\nComrade Bukharin smiles and humbly accepts the monumental task of leading the revolution in these most perilous of times.\nWhen our Union is threatened, when the reactionaries circle like hungry wolves around us, Bukharin will do everything to protect the revolution, our revolution, from those who would crush the workers under their boot."
 SOV_XVII_Congress.10.A: "Lenin lives, Bukharin lives."

 SOV_XVII_Congress.11.t: "Poltiburo Votes for Stalin"
 SOV_XVII_Congress.11.d: "After many stressful and long days we, The Party, have chosen Josef Stalin as the man who shall lead our nation to more prosperous times. Our comrade's Stalin's fate was known from his birth, he was set to lead the Party, and The Motherland to a more prosperous and better future, we believe he has everything that The Party asks for and we believe he truly is the right man for the Soviet Union. Sergei Kirov lacked the will and determination to our glorious cause and he shall be remembered as a loser against comrade Stalin and shall be forgotten by history. Our comrade Stalin certainly lacked neither the will nor the determination to The Motherland, he knows what it takes to be a true member of The Party. His name shall be written in history books as was foretold. May he leads us to glory and once more the world shall fear the Red Menace."
 SOV_XVII_Congress.11.A: "You there. Get me... Sergei Kirov."

 SOV_XVII_Congress.12.t: "Kirov denounces a plot against Stalin"
 SOV_XVII_Congress.12.d: "Scandal at the congress! Leningrad party boss Sergei Kirov, once a steadfast ally of General Secretary Stalin, has come forward claiming he was approached by a rogue faction of the politburo after last night's proceedings. Kirov says the traitors offered him the post of General Secretary upon ousting comrade Stalin, but he immediately refused and went straight to Stalin to report the plot. While the plot has been foiled, for now, this incident has shown that dissent does exist in the highest echelons of the party. Worse still, the dissenters are bold enough to go about their plotting right under the General Secretary's nose. Bukharin is safe, for now, but it may be wise for him to find other allies."
 SOV_XVII_Congress.12.A: "Even the sword doesn't cut the head of the one who confesses."

 SOV_XVII_Congress.13.t: "The End of the 17th Congress"
 SOV_XVII_Congress.13.d: "[FROM.GetNewsIcon]After a grueling 15 days, the 17th Congress of the All-Union Communist Party has finally come to an end. A party functionary calls the congress to a close with what might have been a small sigh of relief, and the event is finally over. The assembly begins to shuffle out of the congress chambers and down the halls, dog tired.\nAll the delegates are happy to return home to their wives and families at long last, and some prepare for a long journey to the furthest corners of the Union in the Caucasus and far east.\n\nAfter weeks of constant cacophony, the Kremlin finally falls silent.\n\nDecisions made these two weeks will guide the course of both the Soviet Union and the international socialist revolution for years to come, and will surely change the world as well. Here though, the citizens of the USSR can only hope that the delegates have acted in their best interest, and time will tell if they have."
 SOV_XVII_Congress.13.d1: "[FROM.GetNewsIcon]After much deliberations, the proceedings of the 17th Congress of the All-Union Communist Party have concluded in the city of Moscow, the capital of the country. The meeting has been labeled as the \"Congress of Victors\" to mark the success of the first five-year plan and the collectivization of agriculture.\n\nApart from the main agendas discussed by the body, the composition of the Central Committee was also elected, and to the shock of many, the Congress voted out the current General Secretary, Joseph Stalin with well over one hundred votes against him.\n\nSergei Kirov, a very prominent politician, part of the “Old Guard ” and a personal friend of Joseph Stalin himself has been elected as the new General Secretary and will be heading a Troika comprising of Party veterans Vyacheslav Molotov and Mikhail Kalinin as the leaders of the Central Committee. Kirov, the current head of the Communist Party in Leningrad only received 3 votes against. His ideas are well known in the party, a strong supporter of industrialization and collectivization in the Country, it is widely believed in the country that the new General Secretary will bring much glory to the Worker's cause."
 SOV_XVII_Congress.13.d2: "[FROM.GetNewsIcon]The recently organized 17th Congress of the All-Union Communist Party in Moscow has finally concluded after nearly 2 weeks of proceedings. It was one of the largest party gatherings to have yet taken place, with almost if not all of the top hierarchy of the party in attendance.\n\nSupposed to be the “Congress of Victors” to mark the achievements of the successes of the first five-year plan and the collectivization instituted in the agricultural sector. But instead, the highlight has been the formation of a “Provisional Government”, headed by long time party member Nikolai Bukharin.\n\nThe current General Secretary Joseph Stalin received more than 100 votes against him for the Central Committee elections, making it evident that it was impossible for him to be elected in the face of such great opposition from Party ranks. A staunch proponent of the New economic policy during the early 1920s, many are scratching their heads, trying to predict the direction in which Comrade Bukharin will steer the nation to, but rest assured the people of the glorious Soviet Union will continue to thrive under his guiding hand."
 SOV_XVII_Congress.13.A: "Order the NKVD Chief to Persecue Kirov"
 SOV_XVII_Congress.13.A_tt: "§RKirov§! is a menace to our power, he has to go\n§OComrade Stalin§! to lead us until further notice"
 SOV_XVII_Congress.13.B: "Keep an eye on Kirov"
 SOV_XVII_Congress.13.B_tt: "The §ONKVD§! should monitor §RKirov§!'s movements\n§OComrade Stalin§! to lead us until further notice"
 SOV_XVII_Congress.13.C: "Kirov is loyal to the party"
 SOV_XVII_Congress.13.C_tt: "We dont need to do anything about him\n§OComrade Stalin§! to lead us until further notice"
 SOV_XVII_Congress.13.D: "Lenin lives, Kirov lives."
 SOV_XVII_Congress.13.D_tt: "A new chapter in the Soviet experiment"
 SOV_XVII_Congress.13.E: "Lenin lives, Bukharin lives."
 SOV_XVII_Congress.13.E_tt: "A new chapter in the Soviet experiment"
 SOV_XVII_Congress.13.Com_Stalin: "Congrats, to Comrade Stalin."
 SOV_XVII_Congress.13.Com_Kirov: "Congrats, to Comrade Kirov."
 SOV_XVII_Congress.13.Com_Bukharin: "Many well wishes to Comrade Bukharin."
 SOV_XVII_Congress.13.Fas: "Enjoy it, while it lasts."
 SOV_XVII_Congress.13.Neu: "Lets see what the future holds for the Soviet people."
 SOV_XVII_Congress_complete: "§LXVII Congress must have ended§!"

 SOV_Generals_Promotions.1.t: "General Promotions"
 SOV_Generals_Promotions.1.d: "During the last few months, the Soviet army school has trained and taught some new promising officers. But, as the number of officers increases, it is obvious that we need more generals to lead them.\n\nThis, along with other elements which has boosted the competence of our army altogether, has convinced the high command to promote new generals to lead the glorious Red Army.\n\nWe need the best, and we need them now. The Soviet Union requires a good military body, and what is better than a powerful army? A powerful army led by competent and charismatic leaders."
 SOV_Generals_Promotions.1.A: "They shall make our Union proud!"

 SOV_Second_Year_Plan.1.t: "Liquidation of Khutors"
 SOV_Second_Year_Plan.1.d: "Initially khutor farming appeared in Russia in XVIII centry at cossack territories. Khutor was a small settlement, usually having less than 10 households, usually rich owners. Khutors spread all accross Russian Empire during the Stolypin's agrarian reform focused on bringing capitalism to Russian agricultural sector. These khutors now hinder collectivization and thus must be liquidated"
 SOV_Second_Year_Plan.1.A: "Use every means necessary to get rid of them."

 SOV_Second_Year_Plan.2.t: "Liquidate Khutors in Kuban"
 SOV_Second_Year_Plan.2.d: "Finally freedom-loving cossacks of Kuban can be brought to the heel. With liquidation of their small settlements (khutors) we can strive for better indoctrination of these suspicious rural-dwellers"
 SOV_Second_Year_Plan.2.A: "This is just the beginning."

 SOV_Second_Year_Plan.3.t: "Liquidate Khutors in Ukraine"
 SOV_Second_Year_Plan.3.d: "For many years Ukraine served as major grain basket of the Russian Empire. During Stolypin's agrarian reform, new khutors appeared here en masse. Now is the time to eliminate them. Ukrainian peasants should live in large villages, where it is easier to control them and make them work in kolkhozes"
 SOV_Second_Year_Plan.3.A: "Our work is not over yet!"

 SOV_Second_Year_Plan.4.t: "Childcare System in the USSR"
 SOV_Second_Year_Plan.4.d: "Children are the future of every nation. Every single one of them holds the potential to become anything from a hard-working peasant, growing tonnes upon tonnes of crops to feed their fellow comrades, to a scientist, ready to make the next breakthrough in medicine, electricity or technology! Truly, they are the hope of the Motherland.\n\nHowever important children are, though, one cannot deny they are a hindrance for the first few years of their lives. Utterly dependent on their mothers for everything from moving to eating, they act as a distraction and hinder productivity. A natural question arises, then: How can we take care of the present and the future at the same time?\n\nThe answer lies in our childcare system. While not the first ones to implement it, we are the ones who perfected it. Crèches, government-supported daycare institutions, are places where infants and toddlers are taken care of by women specifically tasked with nurturing our precious little ones, making sure their needs are taken care of.\n\nAs there is no longer any need for them to look after their offspring, millions of young mothers can dedicate themselves fully to working to further the Motherland's cause. As an added bonus, since they can occupy vital places in the workforce, more men can be conscripted than could be otherwise. The ingenuity of the Soviet people knows no bounds."
 SOV_Second_Year_Plan.4.A: "No one can say we don't think of the children."

 SOV_Second_Year_Plan.5.t: "Empowerment of Women in Soviet Union"
 SOV_Second_Year_Plan.5.d: "By 1917 only three nations in Europe had female suffrage: Finland, Denmark and Norway. On 20 July 1917 Provisional Government enfranchised women with the right to vote, making Russian Republic one of the most democratic nations in the world. Bolshevik revolution strengthened equality of men and women even more by adopting Constitution of 1918"
 SOV_Second_Year_Plan.5.A: "A women's place is at the heart of the revolution!"

 SOV_Second_Year_Plan.6.t.A: "The Great Soviet Famine"
 SOV_Second_Year_Plan.6.t.B: "Famine Grips the Union"
 SOV_Second_Year_Plan.6.d.A: "Sacrifice. This is the word that represents our cause the best. Without sacrifices, progress cannot be achieved. Men and women alike must give up their ambitions, their comfort, their very lives to further the communist dream. A reality understood by all, yet we find ourselves facing something we couldn't have predicted in our darkest dreams.\n\nSwollen faces, legs and arms. Graves that seem without end. Hate, fear and hopelessness. These are all part of the everyday lives of millions of our citizens in the vast grain plains of the Soviet Union. If luck exists, then we certainly lack it, for a myriad of causes have gathered to give us what can only be called the worst famine in the history of the USSR.\n\nOur policy of urbanisation and industrialisation led to countless peasants moving in the cities to work in the factories and meet the quotas required by the Five-Year Plan. This decrease in the number of farmers should have been mitigated by increased agricultural efficiency and yield due to the collectivisation undertaken at the same time, but natural disasters, food exports and the resistance of kulaks, holders of arable land from the time of the tsar, have lead to a catastrophically low harvest.\n\nSiberia, Kazakhstan, Northern Caucasus and Ukraine are only some of the many regions affected by the lack of food. As their people starve and struggle to survive, we find ourselves unable to feed them without compromising the industrialisation program.\n\nAnd we will do no such thing. Whatever the cost may be, the Five-Year Plan must continue."
 SOV_Second_Year_Plan.6.d.B: "The reports are in, and the conclusion is undeniable. Famine has gripped the Union. From Ukraine to Vladivostok, men, women, and children scavenge for scraps to avoid starvation another day. The weak and sick die first, and the NKVD has received numerous reports of cannibalism among the recently deceased in Siberia's rural areas. Our security forces responded quickly to this barbarism, but the fact that it occurred at all remains a source of horror for our proud people.\n\nWe have taken action to alleviate the disaster. Food has begun to arrive from overseas, and relief camps are being planned to address the growing tragedy. Unfortunately, such critical responses will take time to be implemented effectively. Already, blame has been tossed around. We must remind people that such responses are counterproductive and borderline reactionary. This problem, like all other issues we face today and in the future, will be resolved. Those who accuse us of failing to anticipate the unexpected will face consequences."
 SOV_Second_Year_Plan.6.A: "Whatever the cost..."
 SOV_Second_Year_Plan.6.B: "A new Battle for Bread begins!"

 SOV_Second_Year_Plan.7.t: "Famine Caused by too Many Exports"
 SOV_Second_Year_Plan.7.d: "As it stands, we lack the industrial equipment and expertise necessary to accomplish the Five-Year Plan on our own. To solve this problem, we have had to, regrettably, export our own sweat and blood, that being food, to foreign powers in exchange for advanced industrial technology and personnel to train our people. The sheer humiliation aside, we cannot deny that we have still not caught up to the West. Thankfully, the Plan has as its aim to bring the Soviet Union to the same level as them and make us technologically independent.\n\nWhile the benefits of the food export can be clearly seen, so can the negative effects. We have already been stretching the limits of our capacity to feed the citizens with the industrialisation and urbanisation programs, but having to sell abroad our people's source of sustenance has finally hit the nail in the figurative coffin. A famine is beginning to set in the food-producing areas of the Soviet Union, as the farmers' yields are taken from them to feed the workers in the cities and the citizens of nations they did not even hear of.\n\nIf we wish to at least alleviate the symptoms of the disease, then action must be taken sooner than later, lest the whole body begins to suffer."
 SOV_Second_Year_Plan.7.A: "Solutions must be found."

 SOV_Second_Year_Plan.8.t: "Pasha Angelina"
 SOV_Second_Year_Plan.8.d: "[FROM.GetNewsIcon]Women are an essential component of every society. They are the ones who raise our future generations of citizens and look after the homes while the men toil in the Motherland's fields and factories. No one can deny the importance of their roles, but they may have more potential than one can see at first glance.\n\nPraskovya Nikitichna Angelina, a young udarnik and Stakhanovite movement participant is the best example of such potential. In 1929, 'Pasha Angelina,' as she is colloquially known, began attending tractor-driving courses in her native oblast while also working at a dairy farm. She quickly established herself as a role model for both men and women, her leadership and dedication evident as she organised an all-female tractor team that achieved 129% of the quota and thus ranked first among the tractor teams in the region. The young worker has since become a celebrity, having been widely covered in the media and depicted on our propaganda posters.\n\nHer most recent statement was 'One hundred thousand female friends - onto the tractor!', encouraging her fellow women to take on tractor operator roles previously held only by men. We can only encourage this type of appeal because we desperately need manpower. Dark clouds are gathering to our east and west, and our armies are in desperate need of reinforcements to prepare for the impending storm. Every female tractor worker means another soldier conscripted into the Red Army. Pasha Angelina's work and exhortations will be fully supported in the future."
 SOV_Second_Year_Plan.8.A: "To the tractors!"

 SOV_Second_Year_Plan.9.t: "Rise of the Tolkachi"
 SOV_Second_Year_Plan.9.d: "Our planned economy could be said to be a work in progress', for it has many deficiencies and what some would call ‘flaws'. One of the more concerning ones is our inability to set realistic targets and commit resources to enterprises that are in most need of them. This has been leading to widespread inability to meet the quotas set by the Five-Year Plans, not helped by the fact that the various enterprises can't simply buy the lacking resources because of the non-existent market economy.\n\nTo overcome this conundrum, a peculiar trend has emerged in the form of Tolkachi. Literally meaning ‘pushers', these employees have as objective the use of ‘informal connections' to enable production managers to meet or manipulate targeted outputs imposed by the State Planning Committee, better known as ‘Gosplan'.\n\nAn obvious form of corruption, the trend has nevertheless gained momentum, so much so that the Tolkachi have come to occupy an unofficial but powerful position as mediators between the enterprises and commissariats. This tendency, however immoral and damaging, is predicted to only rise in prevalence if the very cause of its existence is not dealt with."
 SOV_Second_Year_Plan.9.A: "At least have the decency to admit failure"

 SOV_Second_Year_Plan.10.t: "Battle for Harvest 1933"
 SOV_Second_Year_Plan.10.d: "The harvest is a task that goes far beyond the boundaries of a single farm or region. Across the vast expanses of the Union, from the fertile plains of Ukraine to the more difficult soils of Siberia, the success of our agricultural activities defines the strength of our nation. For years, we have invested in modernising our agricultural sector, but much more must be done to meet our people's growing demands.\n\nHarvesting involves more than just picking crops; it's also about efficiently distributing resources, meeting quotas, and quickly organising work. Mistakes or inefficiencies in this massive operation could lead to hunger and shortages. Every individual and worker has a role to play. The tools and resources provided by the state must be used effectively, and every effort must be made to prevent disruptions."
 SOV_Second_Year_Plan.10.A: "The harvest will not wait."

 SOV_Second_Year_Plan.11.t: "Battle for Harvest [GetYear]"
 SOV_Second_Year_Plan.11.d: "Every year, the battle for the harvest begins anew. Our future iis determined by the success of our agricultural activities across the vast expanse of the Union, from lush plains to more difficult places. Resources must be properly allocated, and employees must be organised to meet seasonal demands. The land may be plentiful, but no crop is guaranteed. Effective work completion requires coordination and discipline at all levels. Any delays or errors in this operation may result in nationwide shortages. Every region, kolkhoz, and worker must collaborate to ensure the harvest's success."
 SOV_Second_Year_Plan.11.A: "Once more, to the fields."

 SOV_Second_Year_Plan.12.t: "Harvest of [GetYear]"
 SOV_Second_Year_Plan.12.d: "The sowing is complete, and the harvest has been collected across the vast fields of the Soviet Union. This year's agricultural yields reflect both previous seasons' investments and the unpredictable nature of the weather. Our granaries are currently full, and our reserves are secure, so the state is prepared for any future crises, but the work is far from complete.\n\nThe surplus grain is now in storage, and it's time to decide what to do with it. A portion will be allocated to the state's needs, while the remainder will be used for domestic purposes, ensuring that our people are properly fed. The remainder will be exported abroad to generate foreign currency for the purchase of machinery, technology, and resources needed to further industrialise our country."
 SOV_Second_Year_Plan.12.A: "The harvest is complete."

 SOV_Bessarabia.1.t: "The Soviet Ultimatum"
 SOV_Bessarabia.1.d: "A note has arrived from Moscow demanding that we immediately evacuate all civil and military authorities from Bessarabia, a territory they claim was seized from them during the Great War. The ultimatum goes further, insisting we also cede Northern Bukovina as 'compensation' for the suffering of the Ukrainian people.\n\nSoviet divisions have been seen concentrating along the Dniester River. Our Crown Council must now decide whether to yield to their demands or resist and risk open war."
 SOV_Bessarabia.1.A: "We yield - for now."
 SOV_Bessarabia.1.B: "Never!"

 SOV_Bessarabia.2.t: "Romania Accepts the Ultimatum"
 SOV_Bessarabia.2.d: "The Romanian government has wisely agreed to all our demands and has begun evacuating both military and civilian authorities from Bessarabia and Northern Bukovina. Our troops have crossed the Dniester without resistance and are now taking control of the territory.\n\nThe Romanian Army retreats in bitterness, abandoning fortifications, depots, and strategic positions they had prepared for decades. The workers of Kishinev, Chernovitsy and Belgorod-Dnestrovskiy now eagerly celebrate their liberation from reactionary oppression."
 SOV_Bessarabia.2.A: "A bloodless victory!"

 SOV_Bessarabia.3.t: "Romania Rejects the Ultimatum"
 SOV_Bessarabia.3.d: "Romania has foolishly rejected our ultimatum, declaring their refusal to surrender any more territory. Their army is mobilizing along the Prut, preparing to resist our advance. The decision leaves us with no alternative but to enforce our demands by force of arms.\n\nThe Red Army stands ready to move."
 SOV_Bessarabia.3.A: "Then we will take it by force."

 SOV_Bessarabia.4.t: "Creation of the Moldavian SSR"
 SOV_Bessarabia.4.d: "With Bessarabia secured, the time has come to reorganize the territory. The Moldavian Autonomous Soviet Socialist Republic, previously a subdivision of Ukraine, has been elevated into the Moldavian Soviet Socialist Republic, incorporating central and eastern Bessarabia. At the same time, the northern Khotyn district and the southern Budjak region have been transferred to the Ukrainian SSR. The local populations have been relocated accordingly.\n\nThis reorganization demonstrates the strength and wisdom of our administrative power and the final liberation of Bessarabia's workers from the chains of the past."
 SOV_Bessarabia.4.A: "The matter is settled."

 SOV_Bessarabia.5.t: "Soviet Union Demands Bessarabia; Romania Defiant"
 SOV_Bessarabia.5.d: "[FROM.GetNewsIcon]The balance of power in Eastern Europe has taken a dramatic turn. The Soviet Union has issued a sweeping ultimatum to Romania, demanding the immediate cession of Bessarabia and Northern Bukovina, territories it claims were unjustly annexed after the Great War. Many foreign observers assumed that Romania, caught between great powers and already weakened by recent losses, would have no choice but to submit.\n\nIn a surprising move, however, the Romanian government has rejected Moscow's demands. The Romanian Crown Council has declared that no further concessions can be made without sacrificing the nation's honor and sovereignty. The army has been placed on high alert, and mobilization is underway. Across the Prut River, Soviet forces are reported to be massing in overwhelming numbers, prepared to cross into Romanian territory at any moment.\n\nThe crisis has drawn the attention of Europe's capitals. Romania occupies a critical position between the Black Sea, the Balkans, and Central Europe. Control of Bessarabia offers access to key rivers and railways, as well as the oil-rich region of Ploiești just beyond. Some fear that a Soviet advance could place the Red Army dangerously close to the heart of the continent."
 SOV_Bessarabia.5.A: "The Red Army will crush them!"
 SOV_Bessarabia.5.B: "We will defend every inch of soil!"
 SOV_Bessarabia.5.C: "A critical moment for the region."

 SOV_Bessarabia.6.t: "Romania Cedes Bessarabia and Northern Bukovina"
 SOV_Bessarabia.6.d: "[FROM.GetNewsIcon]The Romanian government has accepted the Soviet ultimatum to withdraw from Bessarabia and Northern Bukovina, territories long contested between the two nations. After a tense period of deliberation, Romanian officials ordered their army and administration to retreat behind the Prut River, abandoning fortifications, railways, and arsenals built up over decades. The Red Army crossed the Dniester shortly thereafter, raising the Soviet flag over Chisinău, Cernăuti, and the Black Sea port of Cetatea Albă.\n\nInternational observers describe the retreat as disciplined but deeply humiliating for Romania. Civilians streamed westward alongside withdrawing troops, fearing reprisals from the incoming Soviet authorities. Reports already speak of arrests, deportations, and political purges targeting the local elites and former Romanian officials. Moscow, by contrast, has declared the operation a triumph of socialist liberation, claiming that Moldavian and Ukrainian workers have been freed from exploitation.\n\nStrategically, the cession alters the balance of power in the Balkans. By extending its frontier to the Prut River, the Soviet Union has strengthened its position on the Black Sea and now stands closer to Romania's oil reserves at Ploiesti. Western capitals, though shocked, are largely powerless to intervene."
 SOV_Bessarabia.6.A: "The Red Army marches forward!"
 SOV_Bessarabia.6.B: "Another act of aggression!"
 SOV_Bessarabia.6.C: "A bitter pill for Romania."

 SOV_Integration_of_Tuva.1.t: "Accession to the Union of Soviet Socialist Republics"
 SOV_Integration_of_Tuva.1.d: "From the snowy peaks of the Tannu-Ola Mountains to the broad valleys of the Yenisei, the people of Tuva have long looked to Moscow as their guiding star. The Soviet Union has been our protector, our teacher, and our comrade in the struggle for socialism. Now, as the world is engulfed in conflict and the call for unity grows ever stronger, the Supreme Soviet has proposed that the Tuvan People's Republic formally join the family of Soviet republics. This historic step will ensure the prosperity of our workers and herders under the banner of Lenin and Stalin. The Great Motherland welcomes us as equals, and we shall answer her call with joy and gratitude."
 SOV_Integration_of_Tuva.1.A: "We join with pride!"

 SOV_Integration_of_Tuva.2.t: "Integration of the Tuvan Autonomous Oblast"
 SOV_Integration_of_Tuva.2.d: "As expected, the representatives of the now former \"Tuvan People's Republic\" have just informed us that the region has agreed to join the Soviet Union as an Autonomous Oblast. The integration of such a small and remote land has gone beneath the notice of most of the world's major powers - many of which never recognised the state in the first place, instead falsely labelling it a \"puppet regime\" under our tutelage. However, domestically the news is cause for at least muted celebration among the public, as the incorporation of yet more fellow proletariat into our great nation is always welcomed."
 SOV_Integration_of_Tuva.2.A: "Welcome to the Union, Comrades!"

 SOV_Integration_of_Tuva.3.t: "Tuva Joins the USSR; \"Tannu what?\""
 SOV_Integration_of_Tuva.3.d: "[FROM.GetNewsIcon]SATIRE -- In a development that has left cartographers, historians, and anyone with a functioning sense of geography scratching their heads, the so-called \"Tuvan People's Republic\", formerly known as Tannu-Tuva, has officially become the Tuvan Autonomous Oblast of the Soviet Union. Nestled somewhere between Siberia and Mongolia, or possibly in a cloud, given how little anyone outside this region seems to know about it, Tuva seems to have existed since the end of the Russian Civil War as a Soviet client state. In a move that is apparently newsworthy, the Soviets have also settled the Tuvan-Mongolian border dispute, a diplomatic headache so obscure that most of the world never realized it was even a thing.\n\nSalchak Toka, head of Tuva, reportedly declared: \"Finally, my people can sleep soundly under the warm, glorious embrace of [SOV.GetLeader]! Also, apparently we now have borders, who knew?\". Or did he? Who knows! The rest of us are left marveling at the sheer audacity of writing an entire article about a place we couldn't point to on a map if our lives depended on it."
 SOV_Integration_of_Tuva.3.A: "Who wrote this garbage?"
 SOV_Integration_of_Tuva.3.B: "..congratulations?"

 SOV_Sino_Japanese_War_Chinese_Defeat.1.t: "Kuomintang Pleas for Aid!"
 SOV_Sino_Japanese_War_Chinese_Defeat.1.d: " "
 SOV_Sino_Japanese_War_Chinese_Defeat.1.A: "We cannot afford to anger Japan."
 SOV_Sino_Japanese_War_Chinese_Defeat.1.B: "Chiang is a lost cause, but we must still secure our eastern flank!"
 SOV_Sino_Japanese_War_Chinese_Defeat.1.C: "Japan must be contained. Inform Chiang's government that they shall have our protection."

 SOV_Sino_Japanese_War_Chinese_Defeat.2.t: "Sheng Submits"
 SOV_Sino_Japanese_War_Chinese_Defeat.2.d: "Since taking power in 1933, Chinese warlord Sheng Shicai has maintained close ties with the Soviet Union. This was reinforced when Sheng petitioned the Soviet Union for military assistance against his rivals, Ma Zhongying and Zhang Peiyuan. In exchange for the military assistance, Sheng pledged his allegiance to the Soviet Union and declared himself a staunch supporter of Communism.\n\nStalin, on the other hand, saw Sheng's support for Communism as impetuous, calling Sheng's vision \"premature.\" Stalin and other high-ranking Communist Party members expressed particular concern about how progressive Sheng's ideals were, and whether they would be met with hostility by Xinjiang's overwhelmingly traditional Muslim population.\n\nNevertheless, a recent compromise has been reached. Sheng has agreed to a more modest application of Communist principles in Xinjiang. However, this decision has raised a new question. Should the Xinjiang province be admitted to the Union of Soviet Socialist Republics? Sheng Shicai and many Politburo members would support such a measure. This, however, would undoubtedly tarnish future Soviet relations with Mao Zedong and the Chinese Communists in Shaanxi.\n\nAnother solution is to create a \"sister republic\" by forcing Sheng Shicai to follow the party line while remaining a clear part of China. This would reduce Soviet influence in China slightly while maintaining Sino-Soviet relations for the time being."
 SOV_Sino_Japanese_War_Chinese_Defeat.2.A: "Welcome to the Union, Comrades!"
 SOV_Sino_Japanese_War_Chinese_Defeat.2.B: "A \"Sister Republic\" is a more prudent solution."

 SOV_Sino_Japanese_War_Chinese_Defeat.3.t: "Sheng Resists!"
 SOV_Sino_Japanese_War_Chinese_Defeat.3.d: "Since taking power in 1933, Chinese warlord Sheng Shicai has maintained close ties with the Soviet Union. This was reinforced when Sheng petitioned the Soviet Union for military assistance against his rivals, Ma Zhongying and Zhang Peiyuan. In exchange for the military assistance, Sheng pledged his allegiance to the Soviet Union and declared himself a staunch supporter of Communism.\n\nStalin, on the other hand, saw Sheng's support for Communism as impetuous, calling Sheng's vision \"premature.\" Stalin and other high-ranking Communist Party members expressed particular concern about how progressive Sheng's ideals were, and whether they would be met with hostility by Xinjiang's overwhelmingly traditional Muslim population.\n\nBecause of this disagreement, Sheng Shicai has flatly rejected our offer of membership in the Union of Soviet Socialist Republics. Unfortunately, Sheng has remained firm in his beliefs and has refused to join any union unless he is allowed to implement his own Communist vision in Xinjiang. The politburo's reactions range from disappointment to outrage, with many remarking that Sheng Shicai has \"bit the hand that fed him.\" Some members openly discuss overthrowing the rogue Communist warlord and imposing Soviet dominance through military force.\n\nThis path might prove dangerous as it would certainly be seen as both an intrusion on Chinese sovereignty to the Kuomintang government as well as a breach of Sino-Soviet trust."
 SOV_Sino_Japanese_War_Chinese_Defeat.3.A: "Now to do this the hard way."

 SOV_Stalin_Constitution.1.t: "History in One Stroke"
 SOV_Stalin_Constitution.1.d: "[FROM.GetNewsIcon]Again our glorious government has moved further in achieving class equality and in furthering the interests of the hardworking workers of the Union in a single stroke, by having adopted a new Constitution.\n\nThe new \"Stalin\" Constitution will be replacing the heavily revised 1924 constitution. The new constitution has been termed as an unprecedented step for the Soviet people, the Constitution enumerates economic rights not included in constitutions of the so-called Western \"democracies\". It has repealed restrictions on voting, abolishing the \"lishentsy\" category of people, and has added universal direct suffrage and the right to work. In addition, the new Constitution has recognized collective social and economic rights including the rights to work, rest and leisure, health protection, care in old age and sickness, housing, education, and cultural benefits. The new Constitution also provides for the direct election of all government bodies and their reorganization into a single, uniform system.\n\nOur General Secretary Joseph Stalin, genius of the new world, the wisest man of the epoch, the great leader of communism, has personally chaired over a special commission of 31 members in the creation of this new constitution which has already been enacted by the Congress of Soviets, which itself has been reformed into the Supreme Soviet."
 SOV_Stalin_Constitution.1.A: "Rejoice, Comrades."
 SOV_Stalin_Constitution.1.tt: "Applies an update to the [SOV.GetFlag]§R Red Banner§! - a slightly modified hammer & sickle.\n\n"

 SOV_Stalin_Constitution.2.t: "The 1937 Elections"
 SOV_Stalin_Constitution.2.d.succeded: "The first election under the new 1936 Constitution has arrived, and the Party is eager to see how it turns out. Prior to the election, our General Secretary delivered a speech in Moscow's Bolshoi Theatre, which was met with thunderous applause and praise. Our dear General Secretary assures the public in his speech that they can rely on him to lead the Union to an even brighter future, with the elections serving as a beacon for the classes.\n\nMany independent parties have entered the election in an attempt to run in it, including the Orthodox Church which are running as religious candidates. However, due to recent events, including the belief that there is a group of scheming individuals who wish to destabilise the government, the multi-candidate election has been cancelled in order to prevent further sabotage within the government, with the NKVD due to conduct an extensive investigation later.\n\nDespite this, the election resulted in a majority and a united party, with a few supporters of independent parties. The opposition is non-existent, indicating yet another victory for the main party and allowing our General Secretary to sit comfortably."
 SOV_Stalin_Constitution.2.d.failed: "The first legislative elections under the new Stalin Constitution were intended to demonstrate to the world the strength and confidence of the socialist state. Instead, they have become one of the most embarrassing failures in modern Soviet history. The promise of open and fair elections prompted thousands of citizens to run as independent candidates, campaigning outside of the Party's control and gaining widespread support in their communities. In rural areas, peasants gathered in large numbers to demand that Moscow keep its promise of \"democratic participation.\"\n\nThe NKVD's internal troops were forced to intervene as protests spread throughout the republics. Though order is being restored, the damage to the Party's reputation has already been done. Foreign observers, once impressed by the Constitution's promises, now dismiss it as a meaningless gesture. Western newspapers describe the elections as \"a farce,\" claiming that the Soviet Union has no genuine interest in democracy, as evidenced by the NKVD's actions.\n\nIndependent candidates have been arrested or silenced, the press is more tightly controlled than ever, and NKVD patrols monitor every gathering of workers and peasants. The Constitution exists on paper, but its spirit has vanished. What was supposed to be a triumph for socialism has become a painful reminder that true freedom in the Soviet Union is only available at the Politburo's discretion."
 SOV_Stalin_Constitution.2.A: "Elections are great when you're winning!"
 SOV_Stalin_Constitution.2.B: "This was a mistake..."

 SOV_Stalin_Constitution.22.t: "Elections Cracked Down in the USSR"
 SOV_Stalin_Constitution.22.d: "[FROM.GetNewsIcon]The first legislative elections under the Stalin Constitution in the Soviet Union caused widespread chaos and confusion throughout the country. Thousands of independent candidates, many of whom openly criticised the Communist Party, registered to run, overwhelming local electoral committees. Crowds gathered in cities, demanding representation, while many meetings aimed at educating citizens about the voting process quickly devolved into shouting matches and confrontation.\n\nSecurity forces intervened in several regions, using arrests and force to restore order, with reports of clashes between demonstrators and the NKVD. The unrest has exposed tensions between local Party officials and the general public, as well as internal Party divisions, with some members privately criticising the lack of control over the electoral process.\n\nThe international reaction has been swift. Western media labelled the elections a \"farce\" and questioned the Soviet Union's commitment to democracy, with many outlets portraying the unrest as evidence that the regime is incapable of meaningful reform. Even officially neutral nations have expressed concern, seeing the incident as evidence of instability at the heart of the Soviet state."
 SOV_Stalin_Constitution.22.A: "It is naught but a few Western-backed troublemakers!"
 SOV_Stalin_Constitution.22.B: "The Soviet \"democracy\" was always a lie!"

 SOV_Stalin_Constitution.3.t: "Socialism Achieved"
 SOV_Stalin_Constitution.3.d: "Through struggle and strife, the sacrifices of specific peoples and abroad, and the willpower of the workers and the all-united Communist Party and the Supreme Soviet's actions, our interests and ideals have been achieved. Capitalists and old-world Reactionaries will no longer have a stranglehold on our Union, as our truly socialist state will undoubtedly inspire the world revolution. Our inner circle has even agreed, as stated in front of the General Secretary's face, that such an ideal has been attained.\n\nIn a conference held by Stalin himself, his announcement of the state's achievements would be met with thunderous applause, so much so that the audience would remain applauding for several minutes. There is no longer any room for opposition, as socialism will reign supreme from now on, and the enemies from within have been eliminated, the poison of the state sucked out."
 SOV_Stalin_Constitution.3.A: "There is no room for reactionaries here."

 SOV_Invasion_of_Persia.1.t: "Plan for an Invasion of Persia"
 SOV_Invasion_of_Persia.1.d: "We received an important message from the Soviet Union today, in which they stated that they are prepared to invade Persia. Strategic goals of the invasion include securing Allied supply lines to the Soviet Union via the Persian Corridor, securing Persian oil fields, limiting German influence in Persia, and preventing an Axis advance from Turkey through Persia toward the Baku oil fields or British India. With the Wehrmacht steadily advancing through the Soviet Union, the Persian Corridor of the Trans-Persian Railway provides one of the simplest ways to supply the Soviets with Lend-Lease goods sent by sea from the United States.\n\nDespite the Shah's official neutral foreign policy, pro-German protests and rallies are increasing in Persia, and the Shah has refused our demands for the expulsion of German residents. If Persia falls into Axis hands, our Anglo-Persian Oil Company's oil refineries, which are critical to the war effort, will follow. \"Military experts believe it is almost certain that if the Reich succeeds, an attack on Egypt will be launched,\" said C. L. Sulzberger, a well-known international correspondent. \"If the Germans take over the Caucasus and then move on to Iran and the Persian Gulf, they will vastly outflank Britain's Middle Eastern positions and may be causing trouble in Iraq by autumn.\" Operation Countenance will begin in 60 days, giving us enough time to station our troops on Persia's western border before the surprise invasion. "
 SOV_Invasion_of_Persia.1.A: "The Middle East belongs to the Allies."
 SOV_60_Days_to_Prepare: "§LWe will have 60 days to prepare for an Invasion of Persia§!"

 SOV_Invasion_of_Persia.2.t: "Capitulation of Persia"
 SOV_Invasion_of_Persia.2.d: "Now that Iran has surrendered to the combined forces of the United Kingdom and the Soviet Union, terms and negotiations for the occuptation of the country have begun. It has been decided that the Soviet Union will occupy northern Iran, while the United Kingdom will occupy parts of southern Iran.\n\nThe Persian Corridor is to become a route for a massive flow of supplies to the Soviet Union and also the British in the Middle East. The new Shah will sign a Tripartite Treaty Alliance with Britain and the Soviet Union to aid in the allied war effort in a non-military way. This treaty will commit the Allies to leaving Iran not more than six months after the cessation of hostilities."
 SOV_Invasion_of_Persia.2.A: "The Lion and Sun has fallen."
 SOV_Invasion_of_Persia.2.B: "The Lion and Sun has fallen."

 SOV_CHI_Intervention.1.t: "Operation [GetMonth] Storm; Soviet Invasion of Manchuria"
 SOV_CHI_Intervention.1.d: "[FROM.GetNewsIcon]Even before the outbreak of the Sino-Japanese War, the Soviet Union had covertly lent material and political support to several Chinese factions, hoping to strengthen its influence and maintain a foothold in the region. However, with offensive forces now available and Japanese forces continuing to rampage across East Asia, the Politburo in Moscow convened with the Stavka to reconsider its stance. After intense deliberation, the Soviet leadership decided to intervene directly.\n\nEarly this morning, Soviet mechanized and infantry formations crossed the borders from the Primorsky and Amur regions, launching a large-scale offensive into Manchukuo. The declaration of war was formally delivered to Tokyo by the Soviet ambassador only moments before the first artillery barrages commenced. [SOV.GetLeader] has publicly stated that this action seeks to curb Japan's unchecked militarism and to defend the sovereignty of East Asian peoples from imperial aggression.\n\nWhile foreign observers have questioned Moscow's true motives, [SOV.GetLeader] dismissed such criticism as \"perfidious act to justify Japanese aggression\". On the ground, Soviet armored columns and motorized brigades have already engaged elements of the Kwantung Army, whose command now faces the daunting task of reinforcing a colossal border of over 4000 kilometers. Initial reports indicate fierce clashes along the Manchurian frontier, with both sides racing to secure key rail junctions and fortified passes before winter sets in."
 SOV_CHI_Intervention.1.A: "Asia's fate hangs in the balance..."

 SOV_CHI_Intervention.2.t: "Xinjiang Severs Ties with KMT; Red Army Enters"
 SOV_CHI_Intervention.2.d: "[FROM.GetNewsIcon]Reports from Central Asia indicate that the warlord [XIJ.GetLeader], ruler of Xinjiang, has officially cut all ties with the Nationalist government in [CHI.Capital.GetName]. In a dramatic turn of events, Sheng declared the establishment of a \"People's Government of Xinjiang\" and announced his commitment to the socialist cause.\n\nSoviet forces, reportedly “invited” across the border to safeguard regional stability, have entered the province in large numbers. Red Army units now occupy key positions in Ürümqi, Hami, and Ili, effectively securing the region under Moscow's influence.\n\nThe Kuomintang has denounced the move as a betrayal of Chinese sovereignty, but with its attention fixed on the east, there is little it can do to respond.\n\nFor the Soviets, this development extends their strategic reach deep into Central Asia, while for China, it marks the loss of yet another frontier province. Observers warn that the creation of a Soviet-aligned regime in Xinjiang could have far-reaching consequences for the balance of power in Asia."
 SOV_CHI_Intervention.2.A: "A new red star rises over the deserts of the west."

 SOV_CHI_Intervention.3.t: "Invitation from Moscow to join the [SOV.GetFactionName]"
 SOV_CHI_Intervention.3.d: "Relations between the Soviet Union and the Chinese Communist Party have long been cordial, and now we are offered the chance to transform that friendship into a formal alliance. A Soviet ambassador has extended an invitation for us to join the [SOV.GetFactionName], promising military assistance, economic cooperation, and the backing of the Socialist world. Such an alliance would strengthen our position against both the Western imperialists and the remnants of the Kuomintang.\n\nYet caution is warranted. Aligning ourselves too closely with Moscow could upset the regional balance and draw us into conflicts for which we may not yet be ready. There is also the question of Soviet influence, as accepting their hand may come with unseen strings.\n\nThe choice before us is clear: shall the red sun rise beside the hammer and sickle, or shall China chart its own revolutionary path?"
 SOV_CHI_Intervention.3.A: "We risk upsetting a fragile balance in Asia. Humbly decline."
 SOV_CHI_Intervention.3.B: "We graciously accept, send them our reply!"

 SOV_CHI_Intervention.4.t: "Rejected by [PRC.GetLeader]"
 SOV_CHI_Intervention.4.d: "“The offer which you propose - an alliance between us - is not of our interest. We hereby reject it.”\n\nThe translator that stood beside Mao Zedong repeated the words in Russian towards Joseph Stalin, with his diplomat Molotov by his side and an army of diplomats behind him. The talks, negotiations, and the possibility of the Soviet Union wielding power have all been snuffed out. All for naught. \"What do you mean it's not of interest to you?\" Stalin said with his teeth clenched. The message was delivered to Mao by the translator on his side. Mao responded in an unimpressed manner. \"We don't want to be your pawns; we already have our own problems.\"\n\nStalin interrupted before the translator could finish. \"Pawn? PAWN? PAWN?\" \"WHAT IS THAT INSULT?!\" He screamed. \"We are extending OUR hand to assist YOUR rump state because WE are generous enough to do so, and you DARE TO REFUSE IT?\" Instead of doing it word for word, the translator by his side had calmly paraphrased it to Mao. Following that, an uneasy, thickening silence descended on the conference room. Mao finally responded after a solid minute.\n\n\"In that case, yes, we do.\" With the current circumstances, this is not an equal partnership. As far as I can tell, there would be no gains for us. It would be a platform for you to spread your influence, and we don't want to mix with or become entangled in anything, particularly foreign influence\", he insisted. The translation was done word for word. Stalin was enraged, but he took a few deep breaths and calmed down. \"All right,\" Stalin said. \"Be my guest if you want to be alone in a sea of greedy, exploitative warlords.\"\n\nHe and his assembled diplomatic team left the building. He did not look back."
 SOV_CHI_Intervention.4.A: "Fools!"

 SOV_CHI_Intervention.5.t: "[PRC.GetLeader] accepts our offer!"
 SOV_CHI_Intervention.5.d: "Today marks an important day for the Communist Internationale, as news from China has reached us: the Chairman of the Chinese Communist Party, Mao Zedong, has accepted our invitation to join the Comintern! Mao will soon travel to the Soviet Union to sign the treaty. The treaty will lay the groundwork for greater Sino-Soviet Cooperation and a wider partnership. For China, it will provide security guarantees and increase the scope for economic cooperation between our two countries, and for us it will provide a new and valuable ally, one that will assist us in future struggles. This could mark the beginning of a long and beneficial alliance, not just against the other Chinese Warlords but also against the Western Powers."
 SOV_CHI_Intervention.5.A: "Welcome, CCP comrades!"

 SOV_CHI_Intervention.6.t: "The Sino-Soviet Alliance"
 SOV_CHI_Intervention.6.d: "[FROM.GetNewsIcon]A political earthquake occurred today when a Soviet ambassador in London confirmed to his British counterpart that Vyacheslav Molotov, the Soviet Minister of Foreign Affairs, met with Mao Zedong, the Chairman of the Chinese Communist Party.\n\nDespite the lack of information about what they may have said, [SOV.GetLeader] stated in a rare display of emotion that \"This is the first step in a long friendship between the Soviet Union and the legitimate government of China. I'm glad to see them finally join the [SOV.GetFactionName]\".\n\nWhile the news was well received in the Soviet republics and in other communist circles worldwide, the governments of France and the United Kingdom reacted rather coldly, citing concerns about their colonial possessions in the Pacific. Unsurprisingly, the American reaction was harsh, with the President accusing Soviet leaders of attempting to destabilise the region. According to rumours, he immediately renewed his friendship with the Chiang Kai-Shek government, as well as asking for weapons and military equipment."
 SOV_CHI_Intervention.6.A: "The world situation is heating up."

 SOV_CHI_Intervention.7.t: "The Soviet Demands"
 SOV_CHI_Intervention.7.d: ""
 SOV_CHI_Intervention.7.A: "Yes"
 SOV_CHI_Intervention.7.B: "No"

 SOV_CHI_Intervention.8.t: "KMT Forced to Allow Communists into Government"
 SOV_CHI_Intervention.8.d: "[FROM.GetNewsIcon]Unexpected news has emerged from China: Chiang Kai-shek, the leader of the Republic of China, has been forced to admit CCP members to the central government, a move widely interpreted as a sign that his power is dwindling.\n\nWhile it is unclear what compelled Chiang to allow his sworn enemies to come so close to power, many experts believe that the Soviet Union exerted significant pressure, seeing the CCP as a means to further the revolution and secure Soviet interests in the region. While the Soviet government has expressed delight at the announcement, they strongly deny any involvement in the matter.\n\nMany KMT members were outraged by the decision, with one source close to Chiang declaring that \"the poisonous dagger of communist evil has been plunged into our nation, and it will be a swift death for our country.\" Democratic nations around the world have also condemned the move, warning that China could fall to communism and that many other countries are vulnerable to the same fate. They also warned that any attempt by communists to seize complete control of the country would almost certainly result in embargoes and the abolition of diplomatic relations."
 SOV_CHI_Intervention.8.A: "The liberation of the Chinese workers is near!"
 SOV_CHI_Intervention.8.B: "A death knell for our nation."
 SOV_CHI_Intervention.8.C: "An extraordinary move with grave consequences."

 SOV_CHI_Intervention.9.t: "Chiang Refuses Soviet Demands"
 SOV_CHI_Intervention.9.d: "[FROM.GetNewsIcon]Following a flurry of diplomatic messages, threats, and warnings, Chiang Kai-Shek has publicly condemned Soviet efforts to force CCP members into the central government. Chiang has refused any cooperation with the CCP, revealing written demands from both the Soviet Union and the Chinese Communists, reinforcing his anti-communist credentials while increasing tensions in the region that appear to be spiralling out of control.\n\nThe CCP has reacted angrily, claiming that they only wanted to work with Chiang to \"help build a better China for an uncertain future,\" and that \"the rhetoric coming from Nanjing is extremely threatening.\" As a result, the CCP has begun to seek protection from the USSR, including military and economic assistance. In response to this \"unprecedented move,\" the Republic of China has begun a rapid military buildup campaign in preparation for any Soviet Union attack.\n\nOther nations around the world are looking on with concern, with the USA calling for calm in the region and the need for a peaceful solution to be found. While this would be the ideal outcome, it seems that the plea for call for cool heads may have fallen on deaf ears."
 SOV_CHI_Intervention.9.A: "We must protect our communist brothers and sisters!"
 SOV_CHI_Intervention.9.B: "China will be the bulwark against the communist menace."
 SOV_CHI_Intervention.9.C: "The drums of war grow louder in China."

 SOV_CHI_Intervention.10.t: "The KMT Defies Us!"
 SOV_CHI_Intervention.10.d: "The Kuomintang government in China has informed us that they will not honour our request to allow Chairman Mao and his constituents to hold seats in the Chinese government. This is an outrage and an insult to the blood shed by those in the Red Army alongside their Kuomintang brothers in repelling the vile Japanese invaders! They must have earned their seats in government just as much as those Kuomintang dogs!\n\nStalin is enraged by this development. He has made loud and bombastic promises to invite Chairman Mao and his followers into the Comintern in order to protect them from Kuomintang aggression. While this strategy may result in greater Soviet influence in China, it may also backfire and drag the Union into a long, protracted land war in the East, with the important port of Vladivostok becoming vulnerable to a quick cut-off if war breaks out. Whatever we decide, we must move quickly and decisively."
 SOV_CHI_Intervention.10.A: "Send word to Chairman Mao; we shall protect the workers of China!"
 SOV_CHI_Intervention.10.B: "We resent the Kuomintang's choice, but the risk of war is too much..."

 SOV_CHI_Intervention.11.t: "Red Army Withdraws from Manchuria; Covert Handover Executed"
 SOV_CHI_Intervention.11.d: "[FROM.GetNewsIcon]After a period of occupation following the Red Army's decisive invasion of Japanese-controlled Manchukuo, Soviet forces have begun a phased withdrawal from the region, leaving administration in the hands of their handpicked Chinese allies, whom Moscow had carefully positioned through advisors, political agents, and local alliances.\n\nWhile the bulk of the Red Army returns to the Russian Far East, the Soviets retain control of the heavily fortified enclave of Port Arthur and Dalian, a peninsula with extensive naval facilities previously governed by Japan since 1905 as the \"Kwantung Leased Territory\". Military advisors remain embedded in Manchuria, coordinating training, logistics, and the organization of new local units, while economic specialists oversee industrial reconstruction and the redistribution of captured Japanese equipment and resources.\n\nOpponents of Manchuria's new rulers have publicly denounced the covert handover, accusing the Soviets of orchestrating a puppet regime and violating Chinese sovereignty. Rival factions have pledged to reclaim the territory, vowing to mobilize military and political efforts to reassert control over the province. Nevertheless, Manchuria will remain aligned with Moscow's strategic goals for the foreseeable future."
 SOV_CHI_Intervention.11.A: "The right choice for the Manchurian worker."
 SOV_CHI_Intervention.11.B: "A bold move by Moscow."

 SOV_CHI_Intervention.12.t: "Demands Unification of China!"
 SOV_CHI_Intervention.12.d: "[FROM.GetNewsIcon]Today [SOV_Supported_Faction_in_China] has sent the other Chinese warlords an ultimatum to unify under the banner of [SOV_Supported_Faction_in_China.GetName] in order to stabilize the Chinese region and to liberate the workers of the whole Chinese region and to put an end to Japanese domination. This action has enraged Japan's government and will cause further tensions in the diplomatic relations between [SOV_Supported_Faction_in_China.GetName] and Japan because of their ever stronger grip over Asia. The ultimatum has also reached Germany, where the German Reich have declared support for the Japanese and being against the intervention by [SOV_Supported_Faction_in_China.GetName].\n\nIt is unsure what the response will be from the warlords but this surely will spark the Chinese powder keg and will most likely result in another war between the various factions, including the Communists and the Kuomintang."
 SOV_CHI_Intervention.12.A: "C'mon... Another one?"

 SOV_CHI_Intervention.13.t: "Choosing a Faction to Support"
 SOV_CHI_Intervention.13.d: "The situation in China grows ever more complex. The struggle between Chiang Kai-shek's Nationalists, Mao Zedong's Communists, and the semi-independent warlords of the western provinces presents both risks and opportunities. We must decide carefully where to direct our support in order to shape the outcome in favor of Soviet interests.\n\nBacking the Kuomintang could secure influence in a strong, unified China while buying time against external threats. However, they do not align with our socialist ideals.\n\nSupporting the Communist Party of China offers the promise of a truly revolutionary ally, one whose ideological commitment aligns with our own goals. However, they are significantly weaker militarily.\n\nAlternatively, we could provide assistance to Xinjiang, using our influence to encourage [XIJ.GetLeader]'s government to sever ties with China and establish a loyal People's Government, extending direct Soviet control into China's western frontier while sacrificing our influence elsewhere. The choice we make will determine the balance of power in China and whether the Red Star rises to dominate the East."
 SOV_CHI_Intervention.13.A: "Back the Chinese Communists."
 SOV_CHI_Intervention.13.B: "Support the Kuomintang."
 SOV_CHI_Intervention.13.C: "Aid Xinjiang."

 SOV_SPA_Intervention.1.t: "A Spanish People's Republic"
 SOV_SPA_Intervention.1.d: "Years of careful planning, secret support, and relentless guidance have borne fruit. Through clandestine networks, arms shipments, and political advisors, Moscow has shaped the fate of Spain from the shadows. The fractured Republican government, weakened by internal strife, crumbled under the disciplined advance of the Spanish Communist Party.\n\nIn Madrid, Barcelona, and across factories, farms, and industrial centers, PCE organizers seized key positions, rallied workers and peasants, and purged reactionary elements. Under the steadfast leadership of José Díaz, the Spanish People's Republic has emerged, fully committed to socialism and pledged to the cause of the international proletariat.\n\nSpain is now a comrade of the Soviet Union, a steadfast ally in the Mediterranean, and a beacon of socialist victory in Western Europe. Our influence has toppled the old order and sent an unmistakable message to fascists and capitalists everywhere: the workers of the world are united, and socialism cannot be stopped.\n\nTo cement this historic alliance, Spain has signed an official military pact with the Soviet Union, binding our nations together in defense of socialism and the international communist cause."
 SOV_SPA_Intervention.1.A: "For the workers of Spain and the world!"

 SOV_SPA_Intervention.2.t: "Spain Aligns With Moscow In Communist Takeover"
 SOV_SPA_Intervention.2.d: "[FROM.GetNewsIcon]For several years, the Spanish Republic relied heavily on Soviet assistance in its struggle against the Nationalist insurgency. Moscow supplied aircraft, armor, and advisors at a time when most other powers held back, giving the Republican forces the means to rally and, eventually, to prevail. During the war, Communist cadres grew steadily in influence, gaining positions within the security services and the workers' committees that controlled much of the wartime economy.\n\nIn the weeks following the Republican victory, these cadres acted with increasing confidence. Labor militias and police units loyal to the Communist Party took control of ministries, railway junctions, and key garrisons. With communications cut and several cabinet members unable to assert authority, the sitting government has resigned, leaving [SPA.GetLeader] and the Party to declare a Spanish People's Republic.\n\nThe new regime has now announced a formal pact with the Soviet Union, providing for military cooperation, advisory missions, and economic planning under Moscow's guidance. While the government insists Spain retains its sovereignty, the pact places the country firmly within the Soviet sphere, granting Moscow direct access to naval facilities in the western Mediterranean and positioning Soviet forces along France's southern frontier."
 SOV_SPA_Intervention.2.A: "The socialist bloc grows ever stronger!"
 SOV_SPA_Intervention.2.B: "This could upend everything!"

 ### Liberation of Europe
 SOV_Liberation_of_Europe.0.t: "Operation Groza"
 SOV_Liberation_of_Europe.0.d: "[FROM.GetNewsIcon]In a grim turn of events, the Soviet Union has declared war on the German Reich, plunging Eastern Europe back into chaos. The Molotov-Ribbentrop Pact, which saw them tear apart Poland while providing each other with resources and weapons, has been rendered obsolete.\n\nMost foreign observers are surprised today, just as they were when the Pact was signed. Because of the decapitation of the Red Army as a result of Stalin's Purges, it was expected that the Soviet Union would not be ready for war anytime soon.\n\nIn the midst of all of this, the people of Eastern Europe have seen their lives completely transformed in a matter of hours. It appears that their homes will be the battleground for this disastrous clash between the two titans.\n\nThis turn of events appears to have taken the Western World by surprise. There has been no official statement, and cabinet meetings appear to have been called in haste in London and Washington DC to assess the situation.\n\nWhile the Germans have the technological superiority, the Soviet Union's abundance of men and resources tips the scales in its favour. It is unclear who will come out on top in this conflict. However, one thing is certain: millions of men will march to their deaths to answer this question once and for all."
 SOV_Liberation_of_Europe.0.A: "The final conflict is upon us."
 SOV_Liberation_of_Europe.0.B: "The world will tremble, no matter who wins this final war..."

 SOV_Liberation_of_Europe.100.t: "The Liberation of Europe"
 SOV_Liberation_of_Europe.100.d: "Andrey had always liked watching the sun rise, especially when he would get up for work in the early hours of the morning. But he knew that today, he would not get to enjoy it, for his sights were on something much more important. Today, he would play his part in the first stages of the liberation of workers across Europe.\n\nThe fascist menace had been staring down the Soviet Union ever since the division of Poland, and there had been some rumors among the Soviet populace that perhaps an uneasy friendship was forming between the two nations. That is not the case, as secret orders have been passed down through the ranks to all commanders, with their soldiers and forces notified of the monumental action that was about to begin. The invasion of the German Reich that was about to begin was almost an inevitability, especially as the revolution had “not yet been secured”, as Stalin stated.\n\n“Tank Unit 73, you have permission to begin your attack”, the voice over the radio crackled. And just like that, Andrey and his tank squad went to war. Perhaps this would finally be the war to end all wars, he thought. It certainly would be for the German border guards they encountered. Taking them by surprise, they destroyed their truck and cut them down as they desperately tried to find cover. Andrey almost felt sorry for them, but quickly remembered that it was them or him, and after all, they were fascist beasts that had to be slain.\n\nIt didn't take long before they were ordered to halt by their commander so that the logistics could catch up. Andrey opened the hatch to take a deep breath of the morning air, watching the sun rise at last, rising over what would be a new world. And, saying to the rest of his crew:\n\n“Smile comrades, for the liberation of Europe has begun!”"
 SOV_Liberation_of_Europe.100.A: "Sunrise for the revolution, sunset for the eagle."

 SOV_Liberation_of_Europe.1.t: "The Liberation of Czechoslovakia"
 SOV_Liberation_of_Europe.1.d: "Our men now patrol the streets of Prague and Bratslava, as well as the many ancient and modern fortifications found throughout Czechoslovakia. However, as our men prepare for occupation, we have received an interesting proposal. Slovak 'national communists' have asked us to divide Czechoslovakia. They condemn Czech bureaucrats' dominance of Slovakia as well as the Bohemians' 'cultural imperialism'.\n\nSome of our bureaucrats have been persuaded by their arguments and have embraced their cause. However, Prague has a different story. They point out that nationalists are a small minority and cannot speak for the majority of Slovaks. They have also implemented a cultural integration and acceptance programme that ends what they refer to as the previous government's 'unfortunate policies'. They also argue that a united Czechoslovakia will be stronger than Bohemia or Slovakia alone."
 SOV_Liberation_of_Europe.1.A: "Czechoslovak workers, breathe the fresh air at last!"
 SOV_Liberation_of_Europe.1.B: "The Slovak workers shall have their own state."

 SOV_Liberation_of_Europe.2.t: "The Polish Committee of National Liberation"
 SOV_Liberation_of_Europe.2.d: "The Polish Committee of National Liberation (PKWN) has officially been established, creating a rival authority to the government-in-exile, the Armia Krajowa, and the underground state. It will be led by Polish communists Bolesław Bierut and Edward Osóbka-Morawski, while all communist Polish military units are incorporated under generals Karol Świerczewski and Zygmunt Berling.\n\nThe PKWN will administer territories liberated by the Red Army, oversee local government, coordinate logistics, and manage military operations. Soviet advisers are already on the ground, assisting with administration and ensuring loyalty to Moscow. Local communist activists and administrators are being mobilized to enforce PKWN directives and integrate occupied areas under central control.\n\nIts creation marks a decisive step toward a socialist Poland, providing a structured alternative to the reactionary forces of the old Polish state."
 SOV_Liberation_of_Europe.2.A: "Let's get to work!"
 SOV_Liberation_of_Europe.2.A.tt: "The [POL.GetFlag]§YPolish Committee of National Liberation§! is founded to govern any and all Polish territory liberated by the [SOV.GetFlag]§RRed Army§!.\n\n"
 SOV_Liberation_of_Europe.2.A.tt.2: "The [POL.GetFlag]§RPolish Armed Forces in the East§! are deployed in §Y[SOV.capital.GetName]§! to fight alongside us on the Eastern Front."

 SOV_Liberation_of_Europe.3.t: "Full Communist Takeover in Romania"
 SOV_Liberation_of_Europe.3.d: "[FROM.GetNewsIcon]In a momentous turn of events, Romania has officially been declared a People's Republic, ending the reign of King Mihai I and transferring authority to the Soviet-backed Romanian Communist Party. Party leaders hailed the move as \"a glorious day for the Romanian worker,\" marking what they describe as the triumph of socialism and the working class.\"\n\nThe move comes after a period of intense political maneuvering following Romania's armistice with the Allies and de-facto occupation by the Red Army. All remaining institutions have now been brought under the control of provisional organs loyal to the Party.\n\nObservers note that the transition signals a decisive shift in Eastern Europe toward Soviet-aligned socialist governments. All political opposition is being systematically dismantled, with officials emphasizing that the country will now pursue sweeping reforms in land redistribution, industry nationalization, and worker representation.\n\nHowever, the transition has not been universally welcomed. Many Romanians remain deeply skeptical of the Communist takeover, with segments of the population expressing concern over the loss of political freedoms and the heavy influence of the Soviet Union. Street celebrations coexist with quiet unease, highlighting a nation divided over its future direction."
 SOV_Liberation_of_Europe.3.A: "A glorious day for the Romanian worker!"
 SOV_Liberation_of_Europe.3.B: "It was inevitable under the Soviet boot."

 SOV_Liberation_of_Europe.4.t: "The Liberation of Hungary"
 SOV_Liberation_of_Europe.4.d: "Our troops entered Budapest and accepted the surrender of the High National Council. After deposing the fascist regime, they may hope, if not expect, that we will leave them in power, allowing them to rebuild their reactionary political structure. This is idiocy. According to Moscow, the Council may continue to hold power as caretakers for the time being. However, we are to locate the remaining Hungarian Communists and prepare them to take over when we leave. This will prevent the resurgence of a fascist, oppressor state in Budapest while also ensuring worker liberation under a unified, Moscow-friendly regime."
 SOV_Liberation_of_Europe.4.A: "The memory of the First Republic will be honored!"

 SOV_Liberation_of_Europe.5.t: "The Liberation of Bulgaria"
 SOV_Liberation_of_Europe.5.d: "We now have control of Bulgaria and are faced with the dilemma of what to do with it. We've been given almost complete freedom to make decisions so far behind our lines and away from the Allies. The first and most obvious option is to put a friendly regime in power and move on. However, a more intriguing option has emerged. Because of our unique situation as kingmakers in Eastern Europe, we can accomplish what countless Slavs have attempted and failed to do.\n\nWe can unite the Balkan Slavs and form a stronger Yugoslavia. While the pre-war nation was resilient, it failed to achieve its ultimate goal of Pan-Slavic unification. If we merge Bulgaria into the Yugoslav project now that it has been liberated and is led by a friendly government, we will not only complete a long-standing political project, but we will also gain a stronger ally in the Balkan region."
 SOV_Liberation_of_Europe.5.A: "Long live the Socialist Republic of Bulgaria!"
 SOV_Liberation_of_Europe.5.B: "Unite the Slavs!"

 SOV_Liberation_of_Europe.6.t: "The Liberation of Greece"
 SOV_Liberation_of_Europe.6.d: "As our forces raise our flag in Athens and lounge in the shade of Cretan olive orchards, we must now complete the mission in Greece. Directly administering the area is not possible. Its distance from Moscow and lack of connection with the Union render such an endeavour futile. At the same time, the EAM is planning to resume its campaign to restore the monarchy. Let us hand over the nation to the left-wing ELAS and allow them to crush the EAM. Then we'll have a strong ally in Athens and won't have to worry about chasing down rebels until the end of time."
 SOV_Liberation_of_Europe.6.A: "Plato's Republic, redefined."

 SOV_Liberation_of_Europe.7.t: "The Liberation of Yugoslavia"
 SOV_Liberation_of_Europe.7.d: "Yugoslavia is under our control, but not solely through our hands. Jozef Broz Tito, a long-time Soviet Communist and partisan, had led an effective resistance movement in the mountains since the Kingdom's fall. By the time our men arrived at the former Yugoslav frontier, Tito and his men had effectively confined the Germans to cities and major roads.\n\nAs we swept away the last remnants of German rule in the former Kingdom, Tito is the obvious choice to lead the new Soviet Republic. Tito will lead a powerful Balkan force with additional lands in Istria, Zara, and possibly Bulgaria. However, because he did much of the liberation without us, our control over him will be limited. We may be able to remedy this, but not anytime soon."
 SOV_Liberation_of_Europe.7.A: "Long live Tito! Long live Yugoslavia!"
 SOV_Liberation_of_Europe.7.B: "Finish unifying the Slavs! Build a better Nation!"

 SOV_Liberation_of_Europe.8.t: "The Liberation of Finland"
 SOV_Liberation_of_Europe.8.d: "The stain of the Winter War has been avenged! From Helsinki to Oulu and even further north, Soviet troops patrol the frozen and barren land. The stubborn Finns fought just as hard as they had the last time, but now that our Red Army was fully operational, we crushed them as we should have. The question now is what to do with the stubborn Suomi. There are some in the leadership who want us to take what we wanted in the Winter War while leaving the country under a friendly socialist government. It would delegate fighting the inevitable and intense resistance to the new Finnish government, saving us the trouble.\n\nHowever, there is another faction that seeks vengeance. They have revived the old plan to directly integrate Finland back into the Union as a Socialist Republic, similar to Ukraine or Belarus. They recognise that resistance will be difficult, but they argue that it will be well worth it to eliminate the security threat that an independent Finland, even under our nominal control, poses to Leningrad."
 SOV_Liberation_of_Europe.8.A: "Free Finland and let them kill each other for a change."
 SOV_Liberation_of_Europe.8.B: "Set up the Socialist Republic as an integral part of the Union!"

 SOV_Liberation_of_Europe.9.t: "Establishment of the German Democratic Republic"
 SOV_Liberation_of_Europe.9.d: "Today, under the guidance and protection of the Soviet Union, history has taken a decisive step forward. In our zone of occupation, the German people have declared the foundation of the German Democratic Republic, a socialist state built upon the principles of Marxism-Leninism.\n\nIn East Berlin, jubilant crowds gathered to witness the ceremony, where trusted pro-Soviet comrades announced the creation of a workers' and peasants' republic. The red flag now flies proudly over the German capital, symbolizing both the defeat of fascism and the dawn of a new socialist brotherhood.\n\nWith the establishment of the DDR, the socialist camp in Europe grows stronger. The German working class has been given a voice and a future, and the bonds between our peoples tighten in the common struggle against imperialism and reaction!"
 SOV_Liberation_of_Europe.9.A: "The workers revolution shall last for all eternity!"

 SOV_Liberation_of_Europe.10.t: "The Liberation of Austria"
 SOV_Liberation_of_Europe.10.d: "With our occupation zone firmly established in Austria, the question of the nation's future can no longer be postponed. The proposed idea of a neutral Austria stands in direct opposition to our mission of uniting Europe under socialism. Compromise only delays the inevitable - the liberation of all peoples from capitalist influence. Now, we must determine the next step in securing Austria's place within the socialist world.\n\nOne path envisions the creation of a loyal Austrian Democratic Republic, a sovereign state under the guidance of Marxist-Leninist principles. The other proposes the full abolition of the Austrian nation-state, rather decisively merging it with our intended socialist order in Germany. Whichever course we choose, the western capitalists will have no influence over our liberated territories."
 SOV_Liberation_of_Europe.10.A: "Long live the Austrian Democratic Republic!"
 SOV_Liberation_of_Europe.10.A.tt: "The [AUS.GetFlag]§YAustrian Democratic Republic§! is founded, controlling the [SOV.GetFlag]§RSoviet occupation zone§!."
 SOV_Liberation_of_Europe.10.B: "We shall merge Austria into Germany."
 SOV_Liberation_of_Europe.10.B.tt: "The [SOV.GetFlag]§RSoviet occupation zone§! in [AUS.GetFlag]§YAustria§! will be incorporated into any future [GER.GetFlag]§YGerman§! socialist state if established."

 SOV_Liberation_of_Europe.11.t: "The Liberation of the Netherlands"
 SOV_Liberation_of_Europe.11.d: "The ancient land of the Dutch has been a centre of commerce and capitalism since before capitalism existed. Their proximity to the hearts of the French and British world empires placed their bankers and merchants in a prime position to amass enormous wealth. It is time to correct history's failure. The Dutch people, who have long been oppressed by their monarch and constrained by the 'Pillars', can now experience true freedom.\n\nAs our soldiers spread out across Amsterdam, the Hague, and Zeeland, they have begun to assist the poor and oppressed in tearing down these ancient dividing lines and requisitioning the vast wealth owned by the landowning classes of the various pillars, aided of course by the Socialist 'Pillar' who have been fighting this system for decades. With the Queen having already fled overseas, what follows is merely a formality. Let us burn her portrait and demolish these pillars!"
 SOV_Liberation_of_Europe.11.A: "The Land of Commerce will now be the Land of Communes!"

 SOV_Liberation_of_Europe.12.t: "The Liberation of Belgium"
 SOV_Liberation_of_Europe.12.d: "As our troops entered Belgium and spread out, something happened that was unlike anything else we had liberated. The Flemish and Walloons raced to establish independent Socialist Republics. With the dissolution of the Belgian state before our armies, it appears that the long-simmering tensions between the two groups have finally exploded.\n\nThe Flemish and Walloon Republics declared independence from Belgium and petitioned us for recognition. Meanwhile, Belgian Communists in Brussels have urged us to ignore the proclamations. They have sworn repeatedly that they have a plan to bring both sides together in peace. After much deliberation, the two sides have reached an agreement, and the entire country of Belgium awaits the dictated future."
 SOV_Liberation_of_Europe.12.A: "Subdue the Wallons and Flemish! Belgium stands united against Capitalism!"

 SOV_Liberation_of_Europe.13.t: "The Liberation of Luxembourg"
 SOV_Liberation_of_Europe.13.d: "As our troops crossed from Germany and headed for the French border, many who had never looked at a map were surprised to find themselves technically in a different country. The tiny microstate of Luxembourg has been liberated from the tyranny of its Duke, and the Luxembourgish Communists, who are few in number but still active, have been given power. As we prepare to expand our Revolution into France, we can be confident that we will have a small but important ally in Luxembourg."
 SOV_Liberation_of_Europe.13.A: "May the crossroads of Western Europe remain free and red!"

 SOV_Liberation_of_Europe.14.t: "The Liberation of Denmark"
 SOV_Liberation_of_Europe.14.d: "Our armies have defeated Denmark almost as quickly as the Germans did many years ago. The Danish Communists staged parades as the King and his family boarded a plane bound for Greenland. Meanwhile, our soldiers have received a mix of jubilation from the Communists and wary looks from the rest of Danish society. While Christian X was an autocratic monarch, his devotion to the state had won him many supporters since 1920.\n\nWhile the Danes are saddened to see their beloved King flee, they are also drawn in by our promises of freedom and wealth equality. We have issued strict orders to curb 'revolutionary excess' as we begin the long battle for hearts and minds. The establishment of a new Socialist administration will be extremely beneficial in this regard."
 SOV_Liberation_of_Europe.14.A: "The logical end to the Easter Crisis"

 SOV_Liberation_of_Europe.15.t: "The Liberation of Norway"
 SOV_Liberation_of_Europe.15.d: "As our men descend from the mountainous and freezing North, they spread out along the flatter coastlines to disarm any remaining resistance. A few Norwegian communists have greeted our men with flowers and chocolate, but they appear to be the exception. As the King delivered his final address before fleeing to exile, our men were disheartened to see so many Norwegians mourning his departure.\n\nAs we begin to prepare to set up our new socialist ally for success, it is clear that we will face an uphill battle. Already, Royalist generals have refused to serve under the new administration, fleeing with their King, retiring, or disappearing into the mountains. It appears that Norway's fjords will have to wait until they can truly run red with something other than blood."
 SOV_Liberation_of_Europe.15.A: "Free the Norwegians and prepare counterinsurgency operations."

 SOV_Liberation_of_Europe.16.t: "The Liberation of Sweden"
 SOV_Liberation_of_Europe.16.d: "Sweden is now firmly within our grasp, as our men move quickly to secure Stockholm and the valuable iron mines in the country's north. Their King, Gustaf V reportedly was seen boarding a plane last night. As our military administrators rush to fill the power vacuum, we've discovered that the people are open to our new rule. Gustaf appears to have been overly interventionist in matters of national policy, earning him many enemies in the public.\n\nWhile the Swedish Communist Party remains small, the Party predicts a relatively smooth transition to Republican rule. Accusations of Gustaf's authoritarian intentions had kept the flames of Republicanism alive in Stockholm since the Great War, when the King established a puppet government to run the country himself. As the Swedish Communists prepare to take over the country, our men breathe a sigh of relief, anticipating an easy occupation."
 SOV_Liberation_of_Europe.16.A: "Liberate the Swedes from the tyranny of Kings."

 SOV_Liberation_of_Europe.17.t: "The Liberation of France"
 SOV_Liberation_of_Europe.17.d: "The City of Lights illuminates the Red Banner as Soviet troops patrol the Champ de Elysee and camp out in Versailles. France, once the seat of the arch-autocrat the Sun King Louis XIV and the beating heart of the first Proletarian Revolution, now once more tastes freedom. Gone now are the days when the right stomped on the rights of the workers, colonized far-flung corners of the world and stole the rightful wealth from the French people. As the PCF begins to prepare for its rise to power, our only question is what shape France will take. The possibilities are near endless and with our total control over Western Europe we can do what we want."
 SOV_Liberation_of_Europe.17.A: "Establish the French Commune!"
 SOV_Liberation_of_Europe.17.B: "Hand the occupied territories over to the Free French."

 SOV_Liberation_of_Europe.18.t: "The Liberation of Britain"
 SOV_Liberation_of_Europe.18.d: "The Red Banner flies over Parliament, and Soviet forces oversee the rebuilding of England, Scotland, and Wales. However, what to do with the Isles remains a pressing issue. The long-dormant nationalist movements in Scotland and Wales have resurged. Without English administrators to oversee them, many Scots and Welsh are more confident in their arguments for the dissolution of the Kingdom.\n\nWith the monarch having fled London for the first time in centuries, they claim there is nothing else connecting them to England. They even have gone so far as to claim the title of England's first colonies. Of course, the CPGB opposes all of this. They argue that the Scots and Welsh have been English for so long that they cannot survive as separate nations. The three countries' economies are simply too intertwined to ever be separated. After hearing all of the arguments, the Occupational Authorities received their orders."
 SOV_Liberation_of_Europe.18.A: "Keep them united, a single struggle against the forces of reaction!"
 SOV_Liberation_of_Europe.18.B: "Break the Union! Long Live the Council Republics!"
 SOV_Liberation_of_Europe.18.C: "Restore the British government."

 SOV_Liberation_of_Europe.19.t: "The Liberation of Ireland"
 SOV_Liberation_of_Europe.19.d: "Today, the Emerald Isle shines ruby red as Soviet troops patrol the streets from Ulster to Cork and fortify positions throughout Dublin. As our Occupational Authority settles in, they've begun to hear arguments about what will happen to the isle. The Communists, of course, see this as a golden opportunity to unify the Isle. They have asked us to free all 35 counties under their jurisdiction so that Ireland can be united and free for the first time in history.\n\nThe local Ulsterites, on the other hand, have opposed them. They claim to have little kinship with the rest of Ireland after being separated for so long. They have instead requested that they be released under their own independent government. They have also suggested that if we have a British or English ally, they be given to them, as many Ulsterites still have a strong bond with England, even if a Windsor no longer sits in London."
 SOV_Liberation_of_Europe.19.A: "Unite all of Ireland."
 SOV_Liberation_of_Europe.19.B: "Create an Irish Soviet Republic."
 SOV_Liberation_of_Europe.19.C: "Give Ulster to our English friends, liberate the rest of the Isle!"

 SOV_Liberation_of_Europe.20.t: "The Liberation of Spain"
 SOV_Liberation_of_Europe.20.d: "After fighting in the Pyrenees and a brief campaign across the vast Spanish peninsula, we now control Spain. It was once the heart of the world's greatest colonial empire, but it has fallen far. Constant chaos following Napoleon's invasion triggered a civil war not long ago, and now, before they could rebuild, another war has destroyed everything once more. The Spaniards are defeated and dejected, barely able to muster the strength for another round of rebuilding.\n\nTo win them over, we simply need to provide stability and prosperity. To accomplish this, several plans have been proposed. The simplest is to liberate Spain and establish a stable Communist regime backed by Soviet weapons. However, it has been suggested that if we also control Portugal, we should unite the two. Many leaders in both countries have advocated for an Iberian Union. With their people united, they could kickstart a recovery and secure Communism in Iberia."
 SOV_Liberation_of_Europe.20.A: "Spain rebuilds again, this time under the Hammer and Sickle."
 SOV_Liberation_of_Europe.20.B: "Unite Iberia, the powerhouse of Southern Europe!"

 SOV_Liberation_of_Europe.21.t: "The Liberation of Portugal"
 SOV_Liberation_of_Europe.21.d: "After a brief battle, the Portuguese Army has either followed their King into exile or surrendered. While the fleeing government has forced colonial authorities in Angola and Mozambique to remain subservient, we have been given complete control of the Lusitania. However, what to do with the land is up for debate.\n\nPortuguese communists are divided, with some arguing that we should allow them to establish a free Communist Republic to remove the stain of Salazarist and monarchist rule. They have sworn that, as a free nation, they will take responsibility for liberating Monarchist Portugal's colonies and serving as a springboard for the African Revolution. Others, however, look to Spain. They are ardent supporters of the Iberian Unionist ideal and advocate for Portugal's integration into a larger Union."
 SOV_Liberation_of_Europe.21.A: "Free Portugal and wipe away the stain of monarchism."
 SOV_Liberation_of_Europe.21.B: "Spain and Portugal will march into the future, united as cultural brethren."

 SOV_Liberation_of_Europe.22.t: "The Liberation of Italy"
 SOV_Liberation_of_Europe.22.d: "Our men have spread out across Italy, having broken the Alpine passes and shattered the Italian Army. With the Italian government collapsing, the country is nearly conquered. As our men work to disarm the last remnants of the Italian Army, the Occupation Authority has already begun to plan for the eventual handover to the PCI.\n\nThe people, tired of the war they had been losing for some time, greeted our victorious soldiers enthusiastically. Garrison troops rarely had to rely on rations because local families offered to cook for their liberators, and collaborators were so numerous that most had to be turned away. It is becoming clear that, despite a strong rightist current in some areas, Italy is on track to become a shining jewel of the Communist world."
 SOV_Liberation_of_Europe.22.A: "Viva Italia! Long Live the ISR!"

 ###Red Army Tree
 SOV_Red_Army.1.t: "State of the Red Army"
 SOV_Red_Army.1.d: "A report to the general staff of the Red Army on its combat ability.\n\nThe Workers and Peasants Red Army is commonly referred to as the Red Army. It is now plagued with corruption ranging from the lowest of officers to even our own commissars. Once the proud army of the people and the sign of the liberation of the working class is now a disorganized mess and severely lacking doctrinal coordination.\n\nTwo factions seem to be forming among our officer class. The first one is the doctrine of “deep battle”:  The process of thrusting into an enemy's rear after a breakthrough is made. Then there is the old guard's preferred way of doing things: \"human wave tactics\". This doctrine is comprised of overpowering our enemy by sheer numbers.\n\nIt is highly recommended that serious consideration and evaluation of the Red Army take place as advised in the 17th Congress."
 SOV_Red_Army.1.A: "A crucial issue that needs to be addressed. "
 SOV_Red_Army_tt: "----------------- | §YREWORK SOON§! | -----------------\n§L Rework of the branch coming in the future\n                   Post-Launch 1.1 Patch§!\n\n"

 SOV_Red_Army.2.t: "Reports About Low Readiness of the Army"
 SOV_Red_Army.2.d: "As the Great Purge has progressed, the Red Army has received a lot of attention. Because it was once led by the arch traitor Leon Trotsky himself, Stalin fears that many of its soldiers and generals still owe allegiance to him or the Tsar they served before the Revolution. Alleged letters between Marshal Tukhachevsky and German intelligence heightened these fears. Because of these concerns, the Red Army's officer corps has been reduced significantly. This has alleviated the General Secretary's concerns, but according to a recent report, has left the Red Army a shell of its former self. Some of the current officers barely survived the Purge, making them too afraid to act on their own. Others were only recently promoted, so they lack the necessary experience. Those assumptions also only apply to officers who are present. Many officer positions remain unfilled, forcing lower ranks to assume responsibilities for which they were not trained.\n\nTaken as a whole, this report paints a bleak picture. It depicts the Red Army as a vehicle on its last legs, waiting for one more thing to go wrong before collapsing. This is especially troubling given the threat posed by Fascist and Capitalist hordes to the West, who appear destined to attack us."
 SOV_Red_Army.2.A: "Shoot the bastard who wrote this!"

 SOV_Red_Army.3.t: "Reorganization of the General Staff"
 SOV_Red_Army.3.d: "With the administration focusing on comprehensive reform of the Red Army, the issue of its leadership has arisen. Since time immemorial, the Russian Army has relied on its overwhelming numbers to overwhelm and crush its adversaries. Our Imperial predecessor's failures in the Great War demonstrated that modern weapons are far too effective at killing to continue that strategy. If the Red Army is to stand up to modern armies like Germany's or Western capitalists', it must develop a modern doctrine. There are two visionaries who have presented their own ideas; it is up to us to simply choose one of them.\n\nThe first is Mikhail Tukhachevsky, also known as the Red Napoleon. He fully recognises the utility of tanks and has advocated for the Red Army's ultimate mechanisation. His ideas are revolutionary, but some consider them disruptive. His reforms would take years to implement, which we may not have.\n\nKliment Voroshilov is his opponent. He has been instrumental in weeding out subversives in the organisation and is a devoted Party member if there ever was one. His own recommendations are more measured. He has stressed the importance of using artillery to destroy enemy positions before our conscripts arrive on the battlefield."
 SOV_Red_Army.3.A: "Tukhachevsky charges ahead!"
 SOV_Red_Army.3.B: "Voroshilov smashes his opposition!"

 SOV_Red_Army.4.t: "Introduction of Military Ranks to the Army"
 SOV_Red_Army.4.d: "Many things were abolished in the aftermath of the Revolution due to the taint of Tsarism. Military ranks were one of those many things. In fact, in our revolutionary zeal, the term \"officer\" was dropped entirely. In their place, the Red Army has used a service classification system ranging from K-1 to K-9. These served as military ranks, but had been cleansed of the previous system's long history of Tsarism. The system, however, was not without flaws. The insignia dictated a commander's category, not his rank, but soldiers still had to address commanders using functional titles.\n\nAll of this resulted in titles like Comrade Deputy Chief of Staff of Corps. While these issues did not jeopardize the military's ability to function, the eventual clunkiness of some titles led to some officers in the field simply reverting to the old Tsarist rank system in the heat of battle. Rather than execute these men for treason, the Army and government have recognized the system's flaws. After much deliberation, they have decided to reinstate military ranks in the Army, but not Tsarist ranks. Instead, it will be a hybrid of the old Tsarist system and a new system entirely created by the state."
 SOV_Red_Army.4.A: "A satisfactory compromise"

 SOV_Red_Army.7.t: "On the Cossacks"
 SOV_Red_Army.7.d: "The Cossacks are a unique ethnic group in Russia. They are both an ethnic group centred on the Don, Terek, Ural, and Dnieper River basins and a special military elite. This military elite has a long history in Russia, having fought alongside the Tsar against Napoleon, the Turks, the Germans, and the English and French in the Crimea. When we took power in 1918, the Cossacks rebelled on behalf of their Tsarist masters. They provided assistance to the German invaders and even established a brief state in the Don. With the demise of that so-called state, however, the Cossacks are once again at our mercy.\n\nSome have suggested that we simply eliminate them. Their fight against us demonstrates how heinous their entire class is, and they should be exterminated along with all other enemies of the state. Others, on the other hand, have a different idea. They claim that while the Cossacks did fight us, it was at the behest of their leaders. They claim that if given the opportunity, many Cossacks would have joined us in our just cause. After all, they were not blind to the facts on the ground in 1917; they could see Russia's impending disaster just as well as we did. They use the Red Cossacks' valiant service during the Civil War to prove their point. These valiant men served honourably until they were nearly annihilated by the Poles in 1920. Perhaps we should honour their memory by rehabilitating their comrades."
 SOV_Red_Army.7.A: "Reintegrate the cossack units"
 SOV_Red_Army.7.B: "Purge them"

 SOV_Red_Army.8.t: "Katyusha, Stalin's Organs"
 SOV_Red_Army.8.d: "From the offices of rocket scientists and engineers pulling all-nighters back in the late 1920s in the Gas Dynamics Laboratory, became a new form of artillery in the matter of a decade, albeit experimental in nature. The Reactive Scientific Research Institute has given us the BM-13, after many tests, but our comrades of the artillery corps were disappointed in their reload times, but the results are there, from 5 kilometres, an intense saturation bombing of an area with devastating effect. We have yet to see what the maiden combat use shall result in."
 SOV_Red_Army.8.A: "O is for obliterating everyone. And R is for rockets to get those that hide."

 ###Airforce Tree
 SOV_Airforce.1.t: "The Heroes of Aviation"
 SOV_Airforce.1.d: "For a long time, we have maintained that the Union's progress is forged through the collective sweat and blood of all citizens in our country, with no room for individuals to claim something for themselves. Recent advancements in the air force, however, have caused us to reconsider, and we believe it is time to honour outstanding pilots who truly devote themselves to the revolution.\n\nValery Chkalov has spent the majority of his life in aviation, joining the early foundations of the Red Air Force and becoming a mechanic at the age of 16 in 1920, and by the early 1930s was already training the next generation of Soviet pilots. His notable accomplishments include performing 250 loop-the-loops in just 45 minutes, which was a sight to behold.\n\nGeorgy Baydukov has served in the military since 1926 and is well known among pilots and aviation students for developing instrument flight rules for the entire Air Force, which has been critical to its development.\n\nAlexander Belyakov is a skilled navigator, having travelled to Udd Island over a distance of over 9374 kilometres, spanning the entire width of our vast country. He's also flown from Moscow to the United States over the North Pole, a feat only a great Soviet man like him could accomplish.\n\nFinally, Mikhail Gromov is the Central Aerohydrodynamic Institute's chief pilot. He has served in the Air Force since graduation and has even won the Soviet weightlifting championship!\n\nThese men are excellent role models for all people in the Soviet Union, whether they are workers, soldiers, or pilots!"
 SOV_Airforce.1.A: "Incredible accomplishments by incredible men!"

 SOV_Airforce.2.t: "The Ladies of the Air"
 SOV_Airforce.2.d: "\"Women and men! Together as one!\". Marina's room was filled with the same lines she heard every day over the radio's speaker. She had devoted every fibre of her being to the revolution. Despite this, she had never been able to pursue her dream of becoming a pilot. In theory, all people in the USSR were equal, yet she had never seen female pilots flying the latest developments in plane technology. All she wanted was to get out of the thick haze that hung over Moscow.\n\nA knock on her door jolted her back to reality, with one of her neighbours most likely trying to sell her cheap and suspect-looking vodka. She was pleasantly surprised, however, to see Mikhail, the local postman, standing at the door. She'd never been happier to see a postman before, because it meant she'd finally be interacting with someone who wasn't one of her neighbours.\n\n“Letter for Marina Raskova” he smiled, handing her the small, and slightly damp envelope. “It looks important too”, he said, pointing towards the seal on it.\n\nMarina recognised the seal; the Soviet Air Force.\n\n“Thank you very much!”. She almost wanted to hug Mikhail, but he was gone before she could. Going back inside, she tore open the letter, and quickly began reading it.\n\n“Miss M Raskova,\n\nWe are excited to announce the formation of a new squadron, the 588th Night Bomber Regiment. We know you've been in close contact with [SOV.GetLeader] about this proposal, and we'd be delighted to welcome you as an air advisor in government. You can, of course, lead this squadron yourself, but we believe your expertise is best served here in government.\n\nYours sincerely\nSoviet Air Force Command”\n\nMarina knew what her heart wanted, but she thought that perhaps the government could do with a woman who knew her way around planes..."
 SOV_Airforce.2.A: "...my place is here, in the heart of the government."
 SOV_Airforce.2.B: "...the wind will whisper when the Night Witches come."

 ### Soften Legislation
 SOV_Soften_Legislation.1.t: "Amendments to the Law of Three Spikelets"
 SOV_Soften_Legislation.1.d: "One year ago, the Soviet Union's government passed a law, with a big impact in the agriculture sector. This is not really a new thing, as there were plenty of such laws for the last 16 years.\n\nNo, the important matter was the importance of this last law. The Law of Three Spikelets, as it was nicknamed by the peasants, is a law enacted to counter the sabotage in the crops. That sabotage was obviously orchestrated by the rich peasants, or “kulaks”, who want to eat what they produce instead of giving their crops to the rest of the people of the Union.\n\nThis was declared an unacceptable situation by the government, who enacted the law to punish these thieves before they propagate inside the union. And, in reaction, the responsibles peasants were persecuted by the kolkhoz.\n\nBut, as the New Year began, Stalin declared that this law was perhaps too harsh, surely in reaction to the extreme unpopularity engendered by it. The law was not totally abolished, but, if all works as it should, the arrests should decrease.\n\nEven more importantly, hunger and deep need were evoked to explain the violations of the law. And, first within the Union, amnesty should be declared for those who were already arrested because of this law."
 SOV_Soften_Legislation.1.A: "A big step forward for our agricultural policy!"

 SOV_Soften_Legislation.2.t: "Discussion on Return of Citizen's Rights for Lishensi"
 SOV_Soften_Legislation.2.d: "The new Soviet constitution! What a great project for the country! But, before its completion, we need more work to be done. One of the important points to be changed is the question of the Lishensi.\n\nThe Lishensi are a special category of people, which consist of former privileged classes and their families, condemned criminals, and kulaks, for the most known.\n\nOf course, all of the Lishensi have no reason to love Stalin and his Bolsheviks, so, to appease tensions, the comrade General Secretary gives his authorization to return them their political rights.\n\nStalin also asked to abolish this entirely people's category, and to start a silent amnesty for the kulaks. The deportation of the latter should be definitively halted, and, lastly, the deported Kulaks will be able to apply for their rehabilitation.\n\nAs the news about this proposition is diffusing in Moscow, some manifestations have been noted in the now former centres of Kulak's and other Lishensi's population, but, for once, these are not manifestations against the government. They are in its favour."
 SOV_Soften_Legislation.2.A: "Citizens of the Soviet world, unite!"

 ### Molotov Ribbentrop
 SOV_Molotov_Ribbentrop.1.t: "Invade Poland"
 SOV_Molotov_Ribbentrop.1.d: "The Germans have made their move and declared war on Poland. As agreed in the Molotov Ribbentrop Pact, we shall move into Eastern Poland to begin our military operations. We should quickly secure territories along the border we have agreed with the Germans and make sure we have full control of the region by the time we make contact with the German forces approaching from the west. With our combined might, we shall swiftly eliminate the overstretched Polish forces.\n\nThough the General Secretary has certain Doubts about the willingness of the Germans to halt when they reach the agreed area, he is confident that this operation will result in a positive gain for the USSR overall and is worth the risk to do so."
 SOV_Molotov_Ribbentrop.1.A: "The agreement shall be respected."
 SOV_Prepare_for_War_with_POL: "With the signing of this pact between our two nations, the destinies of Germany and our great Soviet Union are now intertwined.\n\nShould [GER.capital.GetName] declare §Rwar§! on Poland, we will be expected to follow through in very short order. §RPreparations must be made now for immediate intervention, once the die is cast.§!\n\n"

 SOV_Molotov_Ribbentrop.2.t: "The Soviet Union Proposes a Non-Aggression Pact"
 SOV_Molotov_Ribbentrop.2.d: "It is no secret that our relations with the Soviet Union have always been shaky at best. They fought against us during the Great War, and our ideologies couldn't be more dissimilar. However, we have recently been contacted by Soviet diplomats who have stated their desire to begin negotiations for a possible Non-Aggression Pact between our two countries.\n\nWhile the prospect of a potential political agreement between Germany and the Soviet Union appears absurd at first and contradicts everything we stand for, there are some advantages to such an arrangement, even if it is only temporary. For starters, it would deal a significant blow to the morale of any countries that wish to halt our ambitions. The biggest advantage, however, is that other countries are less likely to intervene in any of our future wars, and if they do, we are not at risk of being attacked by the Soviet Union and possibly fighting a two-front war.\n\nIf we choose to accept, we can always have a spontaneous change of heart if we believe the Soviets have outlived their usefulness."
 SOV_Molotov_Ribbentrop.2.A: "Begin negotiations."
 SOV_Molotov_Ribbentrop.2.B: "A German-Soviet Pact? Ridiculous!"

 SOV_Molotov_Ribbentrop.3.t: "Germans Refuse the Non-Aggression Pact"
 SOV_Molotov_Ribbentrop.3.d: "The Germans have turned down our offer of a non-aggression pact and are unwilling to enter into any kind of negotiations. This has thrown our plans off course, because if we invade Poland or the Baltic states, the risk of German intervention remains.\n\nOverall, this does not bode well for our country because it implies that the Germans have other plans involving the Soviet Union that do not include long-term peace or an alliance. We must now be extremely cautious and closely monitor Germany's next moves. We will immediately begin defensive preparations for a possible future conflict so that we can defend the Motherland if the Germans were ever to try anything. While this is a disappointing outcome, we will not let it be our undoing."
 SOV_Molotov_Ribbentrop.3.A: "Fascist fools."

 SOV_Molotov_Ribbentrop.4.t: "Germans want to start the talks!"
 SOV_Molotov_Ribbentrop.4.d: "Wonderful news! The Germans have agreed to the idea of our two countries forming a non-aggression pact and have stated that they want to begin negotiations as soon as possible. This is a huge victory for our administration because we no longer have to fear a German invasion and can instead direct our attention and forces eastward. It also implies that we may be able to work out some sort of territorial arrangement, as both of our countries claim Polish territory. Furthermore, now that the threat of German intervention has passed, we can begin moving into the Baltic states.\n\nThe fact that the Germans have agreed to talk is already a significant step forward in improving relations, which we have been attempting for years. There is no time to waste; we will immediately arrange a meeting between our diplomats."
 SOV_Molotov_Ribbentrop.4.A: "Let the negotiations begin!"

 SOV_Operation_Groza.1.t: "Major New Jobs at Oilfields"
 SOV_Operation_Groza.1.d: "Baku is widely regarded as the most important city in the Soviet Union. While Leningrad and Moscow are our political capitals, and Stalingrad is our industrial heart, Baku provides us with something far more important. Baku is the gateway to the vast oil sea beneath the Don and Caucasus mountains. It is the heart of our oil industry, and as oil has become increasingly important not only for civilian life, but also for military operations, Baku has grown in importance.\n\nWe have sent the best administrators we have to the city ahead of the army of workers from across the Union. These new workers will not only improve efficiency at existing wells, but will also prepare for the opening of new wells throughout the region. We will have enough oil to fuel a tank fleet that will easily crush the Germans."
 SOV_Operation_Groza.1.A: "Black Gold is Soviet Gold!"

 SOV_Operation_Groza.2.t: "Openings of New Mines"
 SOV_Operation_Groza.2.d: "While more factories open, many government officials are concerned that we will run out of materials to supply those factories. German factories operate 24 hours a day, seven days a week. Closing a single factory for even a single minute due to a lack of resources puts us behind the Americans in the race to supply our troops on the front lines. This task, which is massive in scale and complexity, necessitates more resources to complete.\n\nToday, new mines are being opened across the Union to exploit the bounty of Soviet soil. Every day, new discoveries of untapped and abundant veins are made and exploited almost as quickly. Our factories will never have to wait for resources, and our soldiers will never have to rely on obsolete surplus equipment."
 SOV_Operation_Groza.2.A: "The Earth fights for us!"

 SOV_Operation_Groza.3.t: "Stalingrad, Center of Industry"
 SOV_Operation_Groza.3.d: "Stalingrad is our industrial heart, as well as the seat of Soviet power. An unbroken stream of guns, tanks, and bullets flows from the city to the front lines. Every man in town is motivated to work harder. However, things can always be better. Accepting normalcy means passing up opportunities for success.\n\nAs men flood in, the city is sprouting up like a weed. All of this revolves around the well-known Red October Steel Plant. Steel is flowing from it in greater quantities and quality than ever before. The influx of new workers has resulted in a construction boom, with homes, shops, and recreational facilities being built throughout the city. The City of Steel has come to life, and nothing seems to be able to stop it."
 SOV_Operation_Groza.3.A: "The Industrial Heart beats once more!"

 SOV_Operation_Groza.4.t.FIN: "Soviet Aid"
 SOV_Operation_Groza.4.t.SOV: "Meeting in Helsinki"
 SOV_Operation_Groza.4.d.FIN: "Soviet delegates have arrived in Helsinki to meet with us in order to discuss war plans and strategy for the upcoming conflict. We have reached the following conclusion after a long day of deliberation and strategizing.\n\nThe Soviet Union will send military advisors to Helsinki until Operation Groza is completed. These advisors will not only help our High Command organise the Armed Forces and develop military strategies and tactics, but they will also assist in the recruitment and training of new recruits, making the process more effective. Finally, additional shipments of weapons and military equipment have been authorised."
 SOV_Operation_Groza.4.d.SOV: "Our delegates have arrived in Helsinki to meet with the Finnish government to discuss war plans and strategy for the upcoming conflict. We have reached the following conclusion after a long day of deliberation and strategizing.\n\nWe will send military advisors to Helsinki until Operation Groza is completed. These advisors will not only help the Finnish High Command organise the Armed Forces and develop military strategies and tactics, but they will also assist in the recruitment and training of new recruits, making the process more effective. Finally, additional shipments of weapons and military equipment have been authorised."
 SOV_Operation_Groza.4.A: "Accept the Deal."
 SOV_Operation_Groza.4.B: "May the preparations begin."

 SOV_Operation_Groza.5.t: "Send Weapons to Finland"
 SOV_Operation_Groza.5.d: "When it comes to weapons and military equipment, Finland is woefully under-equipped. Their current stockpile is insufficient. If we want Finnish soldiers to be able to fight and hold off the Germans, we must address this issue. The only thing left to do is figure out what exactly to send them.\n\nWe have the option of sending some of our weapons and artillery, military support equipment and motorised equipment, or both. Alternatively, if we so desire, we can send them nothing if we believe that their current equipment is adequate and that we can make better use of it ourselves."
 SOV_Operation_Groza.5.A: "Send both Weapons & Support Equipment"
 SOV_Operation_Groza.5.B: "Send only Weapons"
 SOV_Operation_Groza.5.C: "Send only Support Equipment"
 SOV_Operation_Groza.5.D: "Don't send anything"

 SOV_Operation_Groza.6.t: "Polyarnyi Bastion"
 SOV_Operation_Groza.6.d: "Finland shares a border with Norway, which poses a significant security risk to the country. If we are to turn Finland into an impenetrable fortress, it is critical that we fortify this region more than any other. We will have to figure out how to best achieve this.\n\nOn the one hand, we could concentrate on land fortifications and fortifying the actual border, ensuring that enemy forces cannot cross into Finnish territory via Norway. On the other hand, we can invest in coastal fortifications and secure the Finnish coast near the Baltics to easily repel any naval landings and avoid being attacked and invaded from behind."
 SOV_Operation_Groza.6.A: "We will fortify the border with Norway."
 SOV_Operation_Groza.6.B: "We must protect our coasts!"

 SOV_Operation_Groza.7.t: "Scavenge Fortifications for Materials"
 SOV_Operation_Groza.7.d: "As our forces advanced into our adversary's heartland, many fortifications were left unmanned. These bunkers, trenches, pillboxes, and foxholes are now abandoned and decaying, serving no purpose. However, enterprising supply officers have begun to look at them with interest. Thousands of these static defences house countless guns of all calibres that would be better served on the front. Retreat is impossible, so not salvaging them is just a waste."
 SOV_Operation_Groza.7.A: "Scavenge Fortification on the German Border"
 SOV_Operation_Groza.7.B: "Scavenge Fortification on the Hungarian-Romanian Border"
 SOV_Operation_Groza.7.C: "Scavenge Fortification on the Finnish Border"
 SOV_Operation_Groza.7.D: "Do Nothing"

 SOV_Fortifications.1.t: "Leningrad: An Impenetrable Fortress"
 SOV_Fortifications.1.d: "With the fascist hordes pouring across the border and into our Union, it is clear that one of their primary targets is Leningrad. The birthplace of the October Revolution, the crown jewel of the north, and one of Russia's most historic cities. It cannot and will not fall into the hands of the fascists. The city's Council of Deputies has ordered emergency defensive measures to prepare for potential attacks. Civilian \"First Response Teams\" have been formed, and over a million men, women, and children have been mobilised to help build fortifications or form units to actively combat fascists when they arrive in the city.\n\nLeningrad's residents work tirelessly to defend the city. Hundreds of kilometres of barricades and wire entanglements have been built, as well as thousands of fortified weapons emplacements made of impenetrable Soviet concrete and timber, thousands of anti-tank ditches, and tens of thousands of kilometres of open trenches dug and excavated. To strengthen the city's defences, the guns from the Red Navy's Cruiser \"Aurora\" have been stripped and will be used to bombard the approaching fascists. Leningrad will remain firm. The city will not fall!"
 SOV_Fortifications.1.A: "The fascists will break their jaws against the city's defenses!"

 SOV_Fortifications.2.t: "Tula Fortifies for Battle"
 SOV_Fortifications.2.d: "As the ruthless fascist invaders march ever closer to the sacred heart of our Motherland, the city of Tula rises as a blazing beacon of Soviet resistance and industrial might. Known far and wide as the Arsenal of the Union, Tula's legendary weapons factories churn tirelessly day and night, forging the rifles, tanks, and artillery that will shatter the enemy's skull.\n\nBut steel and fire alone will not stop the invaders. The heroic people of Tula—workers, soldiers, women, and even children—have united to build a fortress around their city. Trenches carved from the earth, anti-tank ditches like roaring rivers of defiance, and concrete bastions stand as monuments to their unbreakable spirit.\n\nEvery bullet made here defends not just Tula, but the beating heart of Moscow itself. The fascists seek to crush our industry and break our will, but they will be met with iron and fire. Tula will not yield—it is the shield that guards the gateway to our capital, and it will be held at all costs!"
 SOV_Fortifications.2.A: "The guns of Tula roar for victory—let the invaders taste Soviet steel!"

 SOV_Fortifications.3.t: "Stalingrad: The Heart of Soviet Resistance"
 SOV_Fortifications.3.d: "As the German Wehrmacht pushes relentlessly across the southern steppes, the city of Stalingrad stands as a symbol of unyielding Soviet will. This vital industrial hub on the banks of the Volga River has become a fortress, where every factory, street, and home is fiercely contested.\n\nThe city's defenders, made up of battle-hardened soldiers, local militias, and civilians alike, have transformed Stalingrad into a labyrinth of trenches, barricades, and fortified strongholds. Factories continue to churn out weapons even under bombardment, fueling the fight to hold this crucial gateway.\n\nLosing Stalingrad would mean the enemy controls the Volga, cutting off vital supply lines and threatening the entire southern front. The people of Stalingrad are determined: they will fight to the last man to keep the city from falling into fascist hands."
 SOV_Fortifications.3.A: "Stalingrad will not break—its defenders will crush the fascist advance!"

 SOV_Fortifications.4.t: "Moscow: The Last Stand"
 SOV_Fortifications.4.d: "The enemy drives ever deeper into the heart of our Motherland, their greedy eyes fixed on the greatest prize of all: Moscow, the seat of Soviet power and the beating heart of the Revolution. To the fascists, capturing the capital means shattering our will; to us, defending it means saving the Union itself.\n\nThe State Defense Committee has declared Moscow a fortress. Entire defensive rings have been carved into the earth: lines of bunkers, barbed wire, anti-tank ditches, and artillery emplacements stretching for hundreds of kilometers. The people of Moscow, from Red Army soldiers to factory workers and students, labor day and night, digging trenches by hand and turning factories into bastions of steel and fire.\n\nThe spirit of the Revolution burns bright in the capital. From the Kremlin to the outer defenses, every street can become a barricade, every home a fortress, every citizen a soldier. The fascists may dream of parading through Red Square, but they will find only ruin and death. Moscow will not fall."
 SOV_Fortifications.4.A: "Moscow will never yield!"


 ### Post-War Stuff
 SOV_Post_War.0.t: "Victory in the Great Patriotic War"
 SOV_Post_War.0.d: "The guns have finally gone silent. The Red Army's banners now proudly fly above the ruins of Berlin, Warsaw, Budapest, and countless other cities once occupied by the fascist invader. After years of unimaginable sacrifice, hardship, and resilience, the Soviet Union has emerged victorious. The Great Patriotic War is over.\n\nOur people have gone through trials that would have shattered lesser nations. Millions of lives were lost, cities destroyed, and entire regions devastated, but the Soviet people's resolve was never broken. The Red Army not only defended the motherland, but also liberated Europe's oppressed peoples. Across the Union, from Minsk to Vladivostok, there is both mourning and celebration.\n\nNow is the time to start rebuilding the motherland and shaping a new world order. The red flag flies high above Europe. The Soviet people prevailed."
 SOV_Post_War.0.A: "Pobeda!"

 SOV_Post_War.1.t: "The Man of Steel Speaks"
 SOV_Post_War.1.d: "'Comrades! Today, we celebrate our accomplishments. The Soviet people and the Soviet system withstood Teutonic fascism. For the first time since the First Patriotic War, Russian troops are marching through Germany and Eastern Europe. However, believing that we have defeated all of our enemies is a mistake. The great lesson of Russian history is that when one enemy falls, another rises to take his place. The capitalist West has replaced the Hitlerite threat. Whereas they once reached out to us in friendship, they now retreat in fear and suspicion.\n\nTheir ultimate plan, to allow us to die on their own altar so they may sweep up the remains, failed with our victory. Robbed of the death of their most hated enemy, they have turned to more direct methods of opposition. They've reminded themselves that the liberation our system promises is completely opposed to their slave system. They have divided Europe, Asia, and Africa in order to expand their predatory markets and hand over control to their corporate puppet masters. We cannot bear the thought of throwing our country's youth into the charnel pits of war again so soon after the last war.\n\nWe will sit and watch as the capitalist system decays from within. We will watch as the top 1% spend themselves in decadent opulence while the rest of the population suffers. We will watch as America's racist and oppressive policies rip their beloved Union apart. Meanwhile, we will prosper as we work together in spirit and purpose to achieve equality and utopia. And when the capitalist system finally collapses, the world will be able to experience peace and prosperity!'"
 SOV_Post_War.1.A: "Glory to Marx and Lenin! Glory to the Soviet Worker!"

 SOV_Post_War.2.t: "The Fate of Yugoslavia"
 SOV_Post_War.2.d: "Joyous news from the powderkeg have reached us: another nation has joined the revolution! Yugoslavia has broken free from its capitalist chains and monarchist ties. But there is a problem: Josip Broz Tito, the man who leads Yugoslavia as it is now known. Communists should naturally respect one another; however, he does not because his version of communism differs from ours. Because of this, our diplomats doubt he will consider joining us, despite the fact that we should all be working together to eliminate the Bourgeoisie. As a result, we have narrowed down to three options on how to proceed:\n\nWe can simply leave them alone, hoping that as ideological partners, they will not choose to side with either the West or the East. This would be a popular choice among members of the public and administration, as well as one that would cause the least amount of international tension.\n\nWe could also try inviting Yugoslavia to the Comintern and hope Tito will see reason for the benefit of all workers. It would be an excellent choice to demonstrate to communists around the world that the USSR supports all forms of socialism, not just its own and its satellite states. If we were successful however, we would alarm the West.\n\nThe third and most contentious option, which is fully supported by the NKVD, is that Tito is the problem, not Yugoslavia as a whole. Some have proposed assassinating him and rigging elections so that a more amenable leader emerges. However, executing this without much planning leaves this plot vulnerable to backfiring, not to mention the West's outrage if our operation was discovered."
 SOV_Post_War.2.A: "Let us at least try to gain new allies."
 SOV_Post_War.2.B: "If there's no Tito, there's no problem. Get rid of him!"
 SOV_Post_War.2.C: "Their false revolution will fall apart anyways."

 SOV_Post_War.3.t: "The Balkan Blister"
 SOV_Post_War.3.d: "While the citizens finally rest, half relieved that the war is over and half still in mourning, there is new rage within the Kremlin Senate. Yugoslavia has faced numerous challenges in recent years, beginning with the fact that it was governed by a monarchy, followed by the German-Italian invasion. However, communist partisans led by Josep Broz Tito set out to liberate all Yugoslav workers. Although there was some doubt about Tito's willingness to ally with us due to his alternative form of communism, any hope of such a possibility has been dashed.\n\nWhat was thought to be a successful revolt was crushed by the capitalists. Despite Allied support for Tito, who may not have been a true ally, but was certainly preferable to the now hostile government, the cruel monarchy has been restored to power. The royalists have concocted a convoluted lie to justify their rage against us; they claim that, despite our funding of the Chetniks, a royalist division, we did not send them any equipment, thus supporting Tito through our 'inaction'. Even the Chetniks have falsely claimed they did not receive anything from us.\n\nThey now declare hatred and even hint at renouncing their recognition of the Soviet government from 1940! A clear indication that they have sworn off diplomacy. However, with the West responsible for Tito's material support, Yugoslavia may choose to go its own way rather than align with them, but their pre-war ties make this a remote possibility. With Tito's partisans defeated and the Yugoslav nation back under bourgeois control, we now have another enemy to add to the list."
 SOV_Post_War.3.A: "Calling the Tsarists legitimate after 30 years? Ha!"

 SOV_Post_War.4.t: "The Fate of Iran"
 SOV_Post_War.4.d: "With the conclusion of the Second Patriotic War, our occupation of northern Iran has become the first flashpoint in the new Cold War. Both the British and ourselves occupied parts of Persia to secure vital oil and supply routes through the Shahdom, both promising to leave once the war was won. The British have left, but our departure proves more complex. Kurdish and Azerbaijani separatists have established Soviet Republics in Mahabad and Tabriz, and they are urging us to protect them from the inevitable attempts at Iranian reintegration. If we support Persian Azerbaijan and Kurdish Mahabad, we will set a hostile tone in this developing Cold War. However, we would gain two outposts in the Middle East, allowing us to project our power and influence, most likely forcefully, across the strategically critical region.\n\nHowever, if we pull out and leave them to their fates, we would not only demonstrate to the world that we are not just another expansionist dictatorial regime, but we would also gain significant potential influence in the Middle East. We would avoid crippling Iran's steadily growing Communist opposition to the Shah and, by demonstrating our peaceful intentions, bolster other Communist movements not only in the Middle East but around the world.  All of this is without mentioning the fact that Mahabad and Persian Azerbaijan are extremely unstable. It is already clear that we will have to occupy the regions indefinitely."
 SOV_Post_War.4.A: "We cannot leave our Brothers in Arms!"
 SOV_Post_War.4.B: "Leave them to die and show the world our benevolence."

 SOV_Post_War.5.t: "The Minsk Trials"
 SOV_Post_War.5.d: "[FROM.GetNewsIcon]The trials of 18 German war criminals who committed crimes during the Nazi occupation of Belarus began today in Minsk. They are made up of German soldiers and SS men of various ranks, ranging from general to private. The Soviets clearly intend to use this as a demonstration of Soviet justice against the German menace, as well as to provide closure to the victims' families. Their conviction is already a foregone conclusion, as the majority, if not all, of them have confessed to the crimes charged against them, most likely under torture.\n\nAll that remains to be seen is how fair the punishments will be. Legal experts in the West anticipate summary execution for the entire group, and there is already some debate in the West about whether all of the men are truly guilty in the first place. This debate, however, has no traction in Soviet courts. Soon, German blood will be shed on Soviet Union fields, this time, it is not in defence of tyranny, but to preserve liberty."
 SOV_Post_War.5.A: "Justice!"
 SOV_Post_War.5.B: "Victor's justice is rarely truly just."
 SOV_Post_War.5.C: "A Red Nuremberg."

 SOV_Post_War.6.t: "The Fortunes of an Era"
 SOV_Post_War.6.d: "Today, the world was stunned to see Soviet trucks full of agricultural produce trundling across the border to Romania for export. During the occupation and retreat, the Nazi occupiers caused significant damage to Soviet agriculture, stealing what they could and killing and burning what they couldn't. Stalin, on the other hand, has insisted that all agricultural shortfalls have been addressed through the tireless efforts of the noble Soviet labourer.\n\nReels of footage showing Soviet farm workers throwing bushes of corn, wheat and hay into trucks have flooded major newsrooms, along with a Politburo report of record harvests. While few are willing to believe the claim of record harvests, it appears that the Soviet farm sector recovered from the horrors of war incredibly quickly. As Soviet grain, barley, and other agricultural products flood into Eastern Europe's devastated economies, the world marvels at the Soviet worker's capabilities."
 SOV_Post_War.6.A: "A compelling case for collectivization."

 SOV_Post_War.7.t: "The Red Atom"
 SOV_Post_War.7.d: "[FROM.GetNewsIcon]The Soviet Union announced today the construction of the APS-1, or Atomic Power Station 1, in Obninsk's 'Science City'. The reactor, which uses nuclear reactions to convert water into steam that drives turbines, is a one-of-a-kind power plant. While only creating a mere 5 MW of power, the fact that it creates any has surprised foreign scientists. The Soviets have even announced that it has been connected to the USSR's national power grid, becoming the first such plant to do so.\n\nForeign observers are surprised but not shocked as the Soviets tout their pursuit of peace with American weapons of war. Nuclear power plants have been drawn on many foreign blackboards in labs around the world, with many viewing them as the next logical step in nuclear science. With the recent detonation of their own bomb, the Soviets were expected to pursue nuclear power next. However, the technology is theoretical in most parts of the world.\n\nOther nations' projects have been hampered by safety concerns and low power outputs. However, the apparent success of the APS-1 has put such concerns to rest for good. Leaders in all nuclear nations' capitals are demanding their own nuclear power plants, as scientists around the world scramble to emulate Russia's example."
 SOV_Post_War.7.A: "The Last line of the People's Defense!"
 SOV_Post_War.7.B: "What in the Goddamn?"
 SOV_Post_War.7.C: "A guillotine hanging over every throat."

 SOV_Post_War.8.t: "A New Day in a New Germany"
 SOV_Post_War.8.d: "The Soviet occupation of East Germany ended today with an elaborate ceremony that included grand proclamations, elaborate military showmanship, and displays of newfound friendship. Attempts to unify Germany under the banner of neutrality have failed, and with the West clearly preparing to form their own German state out of their occupied territories, the Soviet Union has decided to meet them tit for tat. The German Democratic Republic will become the Soviet Union's newest communist ally in Europe, serving as the Western bastion of Communism on the continent. What Communists survived the Nazi purges promise to be a Soviet utopia and a model for Communist societies around the world.\n\nThe people rejoice in the knowledge that they are once again in control of their own fate. They, however, are not as independent as they appear. Even a cursory look at the agreement that established the GDR reveals that Soviet troops will not leave Germany. In fact, they will not only remain in their bases, but more will arrive soon to strengthen the new border with the West. Meanwhile, the new leadership is brimming with Soviet loyalists eager to do whatever Moscow asks of them. Already heavily militarised, this new state in the heart of Europe faces a dangerous future. Regardless, none of this matters right now. Germany is free, if not united, once more, and rebuilding can finally begin."
 SOV_Post_War.8.A: "Communism comes to the home of Marx."

 SOV_Post_War.9.t: "The Zhdanov Doctrine"
 SOV_Post_War.9.d: "Today, the Central Committee, led by Secretary Andrei Zhdanov, issued a resolution criticising the magazines Zvezda and Leningrad for publishing apolitical and cosmopolitan content. These articles directly criticised the Soviet system at a time when it was facing the most severe attacks from the West. If we didn't know better, we'd call such affronts treason, but we can take advantage of this opportunity. We can use this to gain control of Soviet culture and eliminate what little bourgeois influence remains, cementing our dominance in our people's hearts, minds, and actions.\n\nThere is little to prevent us from isolating this consolidation within our own union. The Comintern is notoriously fractious. This prevents us from effectively directing Communist parties and allows oppressive fascists and capitalists to remain in power. We must take a more direct role in directing and influencing our Communist brethren."
 SOV_Post_War.9.A: "The Comintern is Dead! Long Live Cominform!"

 SOV_Post_War.10.t: "The Birth of Cominform"
 SOV_Post_War.10.d: "[FROM.GetNewsIcon]Today, the Soviet Union announced the formation of the Cominform in an effort to align their satellite states with the global Communist movement. The Cominform allows the Soviet Union to more directly guide Communist states in Europe to align with Soviet principles. Soviet officials have hinted that the Cominform's current limited form, which is primarily focused on Europe, is only temporary, and that the General Secretary intends to expand it to include all of the world's Communist parties. However, there are some kinks in the Soviet plan. The Greek and Chinese Communist Parties have been excluded in order to prevent the West from labelling foreign-backed insurgents, as it has done in the past."
 SOV_Post_War.10.A: "For Socialist Unity!"
 SOV_Post_War.10.B: "Pah! A blatant NATO ripoff."
 SOV_Post_War.10.C: "The Soviet fist grips tighter."

 SOV_Post_War.11.t: "Famine Strikes Russia"
 SOV_Post_War.11.d: "[FROM.GetNewsIcon]Today word has spread throughout the Soviet Union that their state-sponsored story of incredible agricultural recovery is a sham. Famine has spread throughout South-West Russia, nearly engulfing the Ukrainian SSR and spreading into Moldova and Southern Russia itself. Ukraine, once known as the Union's breadbasket, is still recovering from the devastation caused by German occupation. Many farmers died or fled, and those who remained saw their fields destroyed by fleeing German troops. Unfortunately, the expected has occurred, and the Soviets are now rushing to treat the wound.\n\nNKVD agents have flooded the affected areas, and mass arrests and deportations to GULAGs are also reported. While the famine is expected to be short-lived, with next year's harvest already underway, the prospect of food next year provides little comfort to those who are starving right now. As policymakers in Washington, London, Paris, and the UN debate what they should or can do, they should be aware that every minute they wait may result in thousands more deaths from starvation in Kyiv, Luhansk, and Chisinau."
 SOV_Post_War.11.A: "Western lies!"
 SOV_Post_War.11.B: "Another preventable disaster."
 SOV_Post_War.11.C: "Yet another contribution to Soviet suffering."

 SOV_Post_War.12.t: "The Lies We Tell Ourselves"
 SOV_Post_War.12.d: "Famine has once again gripped Russia. It is not as devastating as the Holodomir or the famine of the early Revolution, but it is still a famine. People in Ukraine and southwest Russia are starving as a result of agricultural shortfalls. This is an obvious result of the German devastation. The Huns burned and stole everything they could, leaving our agricultural heartland desolate and in ruins. Despite our claims, the loss of an entire harvest made famine almost inevitable. As hundreds of thousands begin to starve, dissent has grown in the Ukrainian SSR. This has necessitated an increase in heavy-handed tactics. Following a massive security operation yesterday, over 76,000 dissidents were sent to GULAGs.\n\nIt is a difficult pill to swallow that West Ukraine, which we seized from Poland but have yet to collectivise, has escaped the famine. Instead, whatever excess is produced in these areas is being sent to other areas of the SSR. It isn't enough to feed everyone, but each new loaf of bread means one fewer angry and hungry rebel. However, the famine will be temporary. The seeds for next year's harvest have already been planted. We must simply wait out this latest horror until next year's harvest."
 SOV_Post_War.12.A: "Let's just hope nobody finds out about this."

 SOV_Post_War.13.t: "With Bated Breath"
 SOV_Post_War.13.d: "The most powerful men in the Soviet high command gathered in the Kremlin's shadowy halls. The aftermath of Germany's defeat was spread across the table, a map of Europe bearing the scars of war. Stalin had been watching the scene for several hours: the men at the table arguing and debating the Soviet Union's future.\n\n\"Let us establish a new status quo with the West, spreading our influence discreetly in order to spare our people the cost of another war. People are exhausted, and resources are scarce. Do not allow our great victory to be followed by false overconfidence and zealous idealism.\"\n\n\"Idealism? Overconfidence? One could think you have no faith in the Soviet Union and our capabilities. Do not forget that it was the Red Army that brought the fascist dogs to their knees, liberated Europe and won the war. The West is as exhausted and weakened as it has ever been in recent decades. We would be fools not to seize this opportunity to bring the West under our control.\"\n\n\"Are you listening to yourself? You would undo our achievements and victory in the war for another world war? Make no mistake: a war with the Allies will mean our annihilation and the downfall of the Soviet Union. We cannot hope to win another war on this scale with no resources or men that are willing to fight.\"\n\nStalin had heard enough as he slowly rose from his chair. It was time to make a decision that would shape the course of not only the Soviet Union, but the entire world for decades to come."
 SOV_Post_War.13.A: "I will be remembered as the man who brought the West to its knees."
 SOV_Post_War.13.B: "Let the West enjoy their victory. Their time will come."

 SOV_Post_War.14.t: "Our Finest Hour"
 SOV_Post_War.14.d: "Comrades, men of the Red Army and Red Navy, commanders and political instructors, working men and women, our Motherland has finally defeated the capitalist and bourgeois scum! As I address you all, the democracies of mainland Europe, forced to their knees by the Red Army, have acknowledged defeat and declared unconditional surrender. Our troops have begun the liberation of workers from their capitalist oppressors while actively suppressing any form of resistance. Our nation's great sacrifices in recent years have not been in vain, and we have demonstrated time and again that the Soviet Union is the undisputed master of Europe and beyond.\n\nThe Union is celebrating victory despite the fact that it has no intention of destroying or dismembering Europe's states and people. We have always had a singular goal and obligation. The complete liberation of its people from the capitalist virus. The workers' long struggle for survival and freedom has ended in victory. The enormous banner of human freedom and peace will now sail over Europe. But our work is not yet finished. Our mission will be complete when the entire world can enjoy the worker paradise that we have built and maintained in our beloved Motherland."
 SOV_Post_War.14.A: "A new dawn for the Soviet Union."

 SOV_Post_War.15.t: "There will be no Cold War"
 SOV_Post_War.15.d: "In the dimly lit chamber of the Kremlin, Stalin's stern look cast an imposing shadow over his cabinet. The air hung heavy with anticipation as he addressed the room.\n\n\"Today, we stand at the precipice of history, united under the banner of the Soviet Union. Our triumph over the forces of fascism has marked a turning point. Yet, our struggle is far from over. The time has come for us to consolidate our gains, to fortify the foundations of our socialist state. Our first goal is clear — to solidify our rule over Central Europe, pushing the Western allies out of German soil. This is not just a strategic imperative but a duty to ensure the security and prosperity of our motherland.\n\nBut our ambitions do not end there. We must extend our influence to the heart of Europe, controlling the destiny of nations such as France and Italy. This is the path to securing our dominion over the mainland. And yes, comrades, we aim for a goal that some may deem audacious — the British Isles. We shall stretch our hands across the waters, shaping the fate of those isles in the name of socialism. As we embark on this new chapter, let it be known that the time for preparation has begun. The sacrifices we make today will pave the way for a future where the Soviet Union reigns supreme.\"\n\nAs the assembly dispersed, the general staff exchanged worried glances. They understood the gravity of Stalin's directives. The coming campaign would be brutal and each departing figure knew that what lay ahead would demand sacrifice. The echoes of Stalin's proclamation reverberated in their minds, signaling the dawn of a new, dangerous chapter for the Soviet Union."
 SOV_Post_War.15.A: "You cannot make a revolution with silk gloves."

 SOV_Post_War.16.t: "A meeting in Paris"
 SOV_Post_War.16.d: "Soviet agent Georges Cagou knocked on the door of the small flat in downtown Paris. After a brief moment, the door opens to reveal a group of French Communists, young men who survived the war and had given up hope of Western \"liberation.\" They had gathered now to right this wrong. Georges got right to work after a brief introduction using their pre-assigned codenames.\n\n\"Comrades, liberation is near. The Red Army is massing on the new front in Germany and will soon fall like a hammer on the Western forces. The Red Army has asked you to strike at the heart of Allied resistance in Europe as we overrun Germany. The City of Lights will go dark, and when dawn breaks, all of Europe will be red\" he smiled. Hawk, one of the Frenchmen, unrolled a map. It was from Paris and had a variety of multicoloured marks all over it. \"The red marks are electrical plants and hubs that will be attacked first by the partisans. Then we move on to the blue marks, which indicate important locations such as intersections, police stations, and government buildings.\"\n\n\"This could work,\" Georges said as another knock came at the door. There were no other guests expected, so the men all looked at each other with equal parts concern and confusion. When the door was opened, a neighbour asked for flour. \"I don't have any more ration cards\" Hawk replied after a brief pause. \"I'm sorry,\" he said as he shut the door behind her. \"They cut rations yesterday\" Hawk returned to Georges. \"They'll cut them again tomorrow. Liberation cannot come soon enough.\" \"Limitless prosperity is just a few months away, Comrade\" Georges smiled. \"For all of us.\""
 SOV_Post_War.16.A: "Wheels within Wheels, Plans within Plans."

 SOV_Post_War.17.t: "A Message from Moscow"
 SOV_Post_War.17.d: "Today, Marshal Tito received a message from the Soviet Union, the self-proclaimed defenders of global Communism. They have extended an invitation to join the Comintern, an international organisation formed to unite all Socialist and Communist parties and nations worldwide. Tito had already accepted the invitation before any discussion could take place, but as his advisors began to weigh in, doubts about Soviet intentions began to arise.\n\nThe Soviet Union has made it clear that they see themselves as the global communist leader, and that in order to succeed, all communist movements must follow their word. The younger generation of Communist advisors around Tito has warned him not to tie Yugoslavia up in the Comintern, as this is a clear attempt by them to assert control over the Yugoslav Communist Party from Moscow. However, older Communists are less concerned. They see this as a genuine attempt by the formerly isolated Soviet Union to foster socialist brotherhood. They claim that without Moscow, the Yugoslav Socialist experiment would be in grave danger considering its proximity to the West."
 SOV_Post_War.17.A: "Let us hear them out at least."

 SOV_Post_War.18.t: "An Invitation to Belgrade"
 SOV_Post_War.18.d: "The Yugoslavs have accepted our invitation to meet in Belgrade to discuss the terms of their joining the Comintern. This is only the first step towards securing Communism in the Balkans. The Yugoslavs pose a clear threat to Soviet objectives in the Balkans. As a large nation with an individualistic leader similar to our own, taming them before they can assert their independence would smother a potential source of conflict in the future. However, how to do so has remained unclear.\n\nTo us, it is obvious that the Soviet Union is required for all Communist states to survive, so any offer from us would be readily accepted. However, some advisors, whether brave or stupid, have tentatively suggested that the Yugoslavians be treated with caution. They remind us that Tito is a charismatic leader who is dogmatic in his own right, and that NKVD intelligence warns against Soviet inventions. They warn that he may make demands that we must accept if we want the Yugoslavs to join the Comintern."
 SOV_Post_War.18.A: "Off to Belgrade!"

 SOV_Post_War.19.t: "The Two Sides Meet"
 SOV_Post_War.19.d: "The Belgrade conference has started with our first offer. After some pleasantries, we offered to admit the Yugoslavs to the Comintern as equals among Communist nations. Not only that, but we have invited them to an upcoming conference aimed at bringing the Comintern nations closer together. The Yugoslavs quickly retreated to discuss the offer with Tito. Meanwhile, our delegates have already begun packing for their return trip to Moscow. How could the Yugoslavs be so arrogant as to demand more when every other Eastern European nation received the same deal?"
 SOV_Post_War.19.A: "Another Socialist brother in the pack."

 SOV_Post_War.20.t: "The Two Sides Meet"
 SOV_Post_War.20.d: "The meeting began with pleasantries and small talk before the Soviets made their offer. They have offered us a place in the Comintern as well as an invitation to another meeting aimed at strengthening the Comintern's unity. This is the same deal that every other Eastern European nation received, and our older Communist advisors have advised us to accept it as is. However, younger Communists in the delegation who support the Pan-Slavic ideal have a different idea.\n\nThey emphasise the importance of our joining the Comintern to the Soviets, as we are the largest Communist state in the Balkans and the only truly independent Eastern bloc state. They believe that we can turn this necessity into the realisation of the true Yugoslav dream. They have urged us to ask for Albania and Bulgaria in exchange for membership in the Comintern. They argue that the Soviets would have little choice but to agree. "
 SOV_Post_War.20.A: "Just join the Comintern, for Socialist brotherhood!"
 SOV_Post_War.20.B: "Make the Counteroffer!"

 SOV_Post_War.21.t: "The Yugoslavs Agree!"
 SOV_Post_War.21.d: "As expected, the Yugoslavs have accepted our generous terms. Tito's boasting about being the only true independent Communist nation in the Balkans was merely bluster. The Yugoslavs have now fallen in line and joined the Comintern. Another delegation is on its way to Belgrade to draft the legalese for a treaty, which is expected to be signed in the coming months. Our dream of a Soviet Balkans has come true without compromise, and we can now look to the West, united and prepared for the Communist future that is undoubtedly on its way."
 SOV_Post_War.21.A: "A showing of true solidarity!"

 SOV_Post_War.22.t: "Negotiations are a success!"
 SOV_Post_War.22.d: "Today, the Yugoslav and Soviet delegations shook hands in a public ceremony in Belgrade. Both sides came to the table hoping for a deal, and one was reached after only a brief discussion. While it is clear that the Soviets achieved everything they could have desired by taming a potential rival for influence in the Balkans, few people care. All have recognised the greater threat that the capitalist fascists pose to the West and have banded together in a show of solidarity. Now that they are united against a common foe, the Communist cause has the potential to surge forward and bring about the inevitable World Revolution."
 SOV_Post_War.22.A: "The Handshake that saved Communism!"
 SOV_Post_War.22.B: "The Handshake that saved Communism!"
 SOV_YUG_JOIN_COMINTERN_TT: "§Y[YUG.GetNameDefCap]§! will join our faction once the Cominform is formed."

 SOV_Post_War.23.t: "The Yugoslav Counteroffer"
 SOV_Post_War.23.d: "What arrogance! It appears that the Yugoslavs regard themselves as superior to their Soviet counterparts in the Balkans and have responded with a counter-offer. They offer to join the Comintern and Cominform, but they want to be able to incorporate Albania and Bulgaria into their South Slavic Federation. This is a huge demand. They want us to give up two entire nations, both of which will be staunch Soviet allies in the future, in exchange for their loyalty. This has surprised some of our delegates, however, they have presented us with a different option. They propose that they be allowed to deny the annexation of Bulgaria and Albania, which they claim the Yugoslavs will not fight for.\n\nOur men in Belgrade believe the Yugoslavs are simply asking for too much, knowing they will not receive it all. Then they can give up things they don't care about while still getting what they want and appearing reasonable. They expect a counter-offer in which the Yugoslavs can absorb Albania but not Bulgaria. This would be a better deal because it prevents the Yugoslavs from becoming too powerful to control while satisfying their desire to expand."
 SOV_Post_War.23.A: "Give the Yugoslavs what they want"
 SOV_Post_War.23.B: "They cannot gobble up two nations for nothing!"

 SOV_Post_War.24.t: "The Yugoslavs Accept"
 SOV_Post_War.24.d: "After more preliminary discussions, the Yugoslavs accepted our offer to join the Comintern and Cominform in exchange for allowing them to absorb Bulgaria and Albania. As the two delegations shake hands and draft official documents, Moscow's congratulations are tinged with unease. While everyone agrees that this is a victory for Communist solidarity, which has been notoriously difficult to achieve, some are concerned about the deal's long-term implications. The more sceptical believe that caving to the Yugoslavs will set a bad precedent. That all Balkan states, if not all of Eastern Europe, will soon demand territorial concessions from other Eastern bloc nations in order to continue participating. If that happens, it's only a matter of time before the entire Bloc falls apart.\n\nWe have, however, categorically dismissed their concerns and insisted to both the sceptics and the rest of Communist Europe that this is a single, unrelated event. Any further territorial concessions are out of the question, and the Communist alliance is 'for perpetuity'. We've also released a secret memo outlining military measures that will be taken to keep any rebellious subjects in line."
 SOV_Post_War.24.A: "A victory for the European Worker!"

 SOV_Post_War.25.t: "Negotiations are a success!"
 SOV_Post_War.25.d: "As delegations shake hands in Belgrade and legal documents are drafted, it's clear that the Soviets and Yugoslavs have reached an agreement. In exchange for the Soviets allowing the annexation of Bulgaria and Albania into Yugoslavia, the Balkan federation agreed to join the Comintern and, eventually, the Cominform. The agreement has been heralded in the Soviet Union as another victory for Communist brotherhood in Europe and an example of Soviet leadership in the Communist world.\n\nMeanwhile, the Yugoslavs have spun it even more successfully. To them, this represents the ultimate realisation of Yugoslavia's long-held Pan-Slavic dream. Tito, who was already well-known for his actions during the German occupation, has since become the most beloved figure in Yugoslav history. From Slovenia to Kosovo, men and women praise Grand Marshal Tito, the man who finally brought Yugoslavia together."
 SOV_Post_War.25.A: "A new era begins!"
 SOV_Post_War.25.B: "A new era begins!"
 SOV_YUG_join_comintern_ALB_BUL: "The Yugoslavs will join in return for Bulgaria and Albania"

 SOV_Post_War.26.t: "The Soviet Response"
 SOV_Post_War.26.d: "It appears that the Soviets found our annexation of Albania and Bulgaria intolerable. While our more zealous delegates wanted us to walk out of the negotiations right away, cooler heads crafted a second offer. Instead of absorbing both Bulgaria and Albania, how about only Albania? Our troops are already in the country, and Albania shares many linguistic and cultural similarities with our state. Tito is adamant that he cannot allow his country to join an alliance that may not be beneficial to it in exchange for nothing. While not taking all of Bulgaria and Albania would be painful, as it would deny us our dream of Greater Yugoslavia, Albania is a sufficient consolation prize."
 SOV_Post_War.26.A: "Make the final offer."
 SOV_Post_War.26.B: "Leave"

 SOV_Post_War.27.t: "The New Deal"
 SOV_Post_War.27.d: "After we denied the Yugoslavs' dream of Greater Yugoslavia by denying their annexation of Bulgaria and Albania, some believed the negotiations were over. Instead, after some thought, it appears Tito has devised a new offer. This new deal is simply a smaller version of the original offer. The Yugoslavs have dropped their demand for Bulgaria but continue to demand the annexation of Albania. Tito has made it very clear that this is his final offer. If we do not allow him to annex even Albania, he will end the negotiations without a deal.\n\nFew members of the delegation are particularly concerned about losing Albania in exchange for bringing Yugoslavia into the Soviet sphere. Not all delegates agree though. Some have viewed Yugoslav actions in the negotiations thus far as impertinent and arrogant. They see Tito as a Stalin-like figure who, if allowed to join the Communist alliance, would undermine it. They have suggested, against the advice of the rest of the delegation, that we reject even this final offer. They regard the Yugoslavs as superfluous and believe it is unavoidable that they will join. The West would undoubtedly reject them, so the diplomatically isolated Yugoslavs would soon return to Moscow."
 SOV_Post_War.27.A: "Give them Albania."
 SOV_Post_War.27.B: "Let them wither, alone and unwanted."

 SOV_Post_War.28.t: "The Soviets Agree"
 SOV_Post_War.28.d: "After a tense week and a half of deliberation, the Soviet delegation has returned and agreed to our final offer. They also claim they have agreed to withdraw Soviet troops from Albania soon, allowing Yugoslav troops to enter and prepare the region for annexation. In exchange, we have agreed to immediately join the Comintern and Cominform when they are officially established. The soon-to-be-drafted treaty is likely to be less than we would have liked, but more than most had hoped for.\n\nThe loss of Bulgaria, which is likely to last forever, stings some old die-hards, but more reasonable heads, such as Tito, accept Albania's annexation as a measure of repayment for our sacrifice against the Germans. Now, Yugoslavia looks forward to its future as an important member of the proletarian struggle against fascists in the West."
 SOV_Post_War.28.A: "For Socialist brotherhood!"

 SOV_Post_War.29.t: "Negotiations are a success!"
 SOV_Post_War.29.d: "Today, as both sides smile for the cameras, put pen to paper, and sign the provisional Belgrade Agreement, Yugoslavia joins the Communist bloc as a comrade in arms against the West. After the Soviets turned down their first offer to join, many expected the eminently proud Tito to walk out of negotiations. Instead, he stayed and, through clever manoeuvring, was able to obtain some, if not all, of what he desired.\n\nAs part of the preliminary agreement, Soviet troops were completely removed from Albania and quickly replaced by Yugoslav troops. When the terms were released, the Albanian Communists, led by Enver Hoxa, condemned the 'betrayal' and vowed to resist the Yugoslavs. Already, skirmishes have broken out across the small nation. However, the Soviet Union's guarantee of annexation has rendered any Albanian resistance moot, at best. Albania must die for Communism to survive."
 SOV_Post_War.29.A: "Now to turn to the real enemy."
 SOV_Post_War.29.B: "Now to turn to the real enemy."
 SOV_YUG_join_comintern_ALB: "The Yugoslavs will join in return for Albania"

 SOV_Post_War.30.t: "Negotiations Fail"
 SOV_Post_War.30.d.SOV: "The Yugoslav delegation has been sent away, and negotiations for Yugoslavia's entry into the COMINFORM have been halted because we were unable to reach an agreement with their diplomats. They proposed the absurd idea of Albania and Bulgaria joining Yugoslavia, most likely against the wishes of at least the Bulgarian communists. We tried to persuade them to limit their demands but their diplomats refused to budge, so we had to cancel our meetings.\n\nClearly, the Yugoslavs believe they can survive without Soviet assistance and protection, or that they can deviate from the ideals of communism laid out by Lenin and Stalin. They will learn the hard way that betraying the socialist brotherhood results in only hard times."
 SOV_Post_War.30.d.YUG: "Our negotiations with the Soviets came to an abrupt end when their delegation flatly refused our demands for the integration of Bulgaria and Albania into Yugoslavia. Our delegates stood firm and pressed the demands for territorial enlargement, but the Soviets were unwilling to budge, and no agreement was reached. As a result, the decision has been made to officially end the negotiations for our entry into the COMINFORM and recall our delegation from Moscow.\n\nThe Soviets, of course, have arrogantly labelled us \"unwilling to compromise,\" despite the fact that it was they who, in their arrogance, believed that we would enter their sphere in exchange for almost no gain on our part. Moscow's once-warm attitude towards us has turned cold and shunning."
 SOV_Post_War.30.A: "Then we will leave them in the cold."
 SOV_Post_War.30.B: "They need us more than we need them."

 SOV_Post_War.31.t: "Moscow-Belgrade Schism"
 SOV_Post_War.31.d: "[FROM.GetNewsIcon]Today, long-simmering tensions between the Soviet Union and Yugoslavia have erupted into a full-fledged diplomatic breakdown. After negotiations in Belgrade to bring Yugoslavia into the fold failed to yield meaningful results, both delegations returned to their leaders with little positive to say about each other. While the Soviet Union is undoubtedly planning Tito's removal from the Kremlin, in Yugoslavia, Tito is taking advantage of the opportunity to settle old scores.\n\nHe has begun to prepare for a massive purge of Soviet loyalists from the Yugoslav administration. There are also rumours in Belgrade that Tito may contact the West to establish preliminary ties. While the split has remained diplomatic, the threat of Soviet intervention, either directly or through subversion, is ever-present. Analysts have repeatedly stated that there is little doubt that the Soviet Union will not tolerate such opposition in its own backyard."
 SOV_Post_War.31.A: "A knife to the back!"
 SOV_Post_War.31.B: "An expected outcome."
 SOV_Post_War.31.C: "An unexpected opportunity?"
 SOV_Post_War.31.D: "Yet another Leftist schism."

 SOV_Post_War.32.t: "Yugoslavia calls in the deal"
 SOV_Post_War.32.d: "Our long-awaited project, the Cominform, has been created. As part of the Belgrade agreement signed a while ago, we invited the Yugoslavians to join. They wasted no time reminding us that we agreed to allow their expansion in exchange for their membership. With cooled heads, some of our diplomats have suggested actually refusing them at this final hurdle, when it is too late to back out. However, we have already written off the nations we promised Yugoslavia, so, we'll give the Yugoslavs permission to take what they're owed."
 SOV_Post_War.32.A: "Such is the reality of geopolitics."
 SOV_Post_War.32.B: "Such is the reality of geopolitics."

 SOV_Post_War.33.t: "The Yugoslav Expansion"
 SOV_Post_War.33.d: "[FROM.GetNewsIcon]Reports from the Balkans confirm that long-rumored Belgrade Agreement clauses between Yugoslavia and the Soviet Union have now gone into effect. After taking their seats in the Cominform, Yugoslav forces crossed established borders and formally declared the annexation of several neighbouring territories, citing previous diplomatic understandings reached shortly after the agreement was signed.\n\nMany observers were taken aback by how quickly the operation took place. Yugoslavia has long stationed troops in these regions, but the sudden decision to formalise control has caused strong reactions abroad. Local communist and nationalist movements have issued statements condemning the annexations, warning that the expansion threatens regional stability and will worsen existing tensions. Despite these protests, the international response has been limited to diplomatic objections, with no immediate action planned.\n\nAs borders are redrawn without the consent of those affected, comparisons to previous periods of appeasement in Europe are already being made. It is unclear whether this marks the end of Yugoslav ambitions or just the beginning."
 SOV_Post_War.33.A: "Sacrifices must be made for the greater good."
 SOV_Post_War.33.B: "A second Münich!"
 SOV_Post_War.33.C: "The art of the deal before our very eyes."

 SOV_Post_War.34.t: "Yugoslavia Honors the Deal"
 SOV_Post_War.34.d: "Today we completed the creation of the Cominform, our grand project to bring the Communist world closer to his ideals. Initial concerns that the Yugoslavs would finally back out of their promise to join were alleviated when the Yugoslav delegation to the founding meeting was among the most vocal supporters of the organisation. Initial concerns about a split have been put to rest forever, as the Yugoslavians take their proper place as another brother in arms in the great proletarian struggle.\n\nMeanwhile, in the halls of the Kremlin, a sigh of relief can be heard, as the optics of a split in the Communist world, at a time when unity was most important, could be disastrous. Now, Communist Europe will march into the future together, arm in arm, against the forces of international capitalism and reaction!"
 SOV_Post_War.34.A: "A grand show of unity!"

 SOV_Post_War.35.t: "An Invitation from Moscow"
 SOV_Post_War.35.d: "Today, Tito received a message from that boorish thug that calls himself the leader of the Soviet Union, requesting a meeting between the two. He appears to want to invite us to Cominform, the Soviet-controlled international communist bloc. As we have largely liberated ourselves, we have maintained some degree of freedom from Soviet oversight. They appear to want to see that freedom end. Tito's advisors are split on whether or not to join the organisation.\n\nMany older Communists are eager to accept Soviet assistance, seeing the USSR as not only the standard bearer and inheritor of Marx's vision, but also the only nation powerful enough to continue the World Revolution until it is truly global. However, a younger group of Tito's close associates is more cautious. They see this as Stalin's blatant attempt to impose the same level of control over Yugoslavia as he does over the rest of the Eastern bloc.\n\nHowever, Tito is divided on the issue. He recognises the benefits of joining the Soviet alliance, with appropriate safeguards in place. The Soviets could assist in rebuilding the country after the war, coordinating Yugoslavia's protection from Western subterfuge, and, as a devoted Communist, contributing to the advancement of the World Revolution is a goal in itself. However, the dangers are very real. It is immediately clear that joining the Cominform would expose the Federation to Soviet predations. It would limit Yugoslavia's diplomatic options at a time when every possibility must be considered. Furthermore, what if the Soviets adopt an unfavourable stance towards Yugoslavia?"
 SOV_Post_War.35.A: "We will not talk to that Georgian gangster!"
 SOV_Post_War.35.B: "For the Revolution, let's talk."

 SOV_Post_War.36.t: "The Yugoslavs Will Not Attend"
 SOV_Post_War.36.d: "If the Communist nations are to fend off the titans of global finance and capital from the West, they must band together. That is the purpose of the Cominform: to unite and coordinate the International Proletarian Struggle. The nations liberated by us eagerly accepted the organization's invitation, rightfully grateful for their freedom. However, it appears that the Yugoslavs had a different idea. Marshal Josef Tito, their leader, believes he owes no such debt to us, spitting on the bodies of thousands of brave Soviets who died defending his country. He flatly refused our generous offer to even discuss joining the alliance.\n\nOutraged by Yugoslavia's rejection the STAVKA has been ordered to prepare invasion plans for the Balkan state immediately. Not only that, but the NKVD has begun to infiltrate the country in case a less flashy display of Soviet power is required. Finally, what happens next is yet undetermined. It is unclear whether whether invading Yugoslavia, assassinating Tito, or simply isolating them diplomatically is the best approach."
 SOV_Post_War.36.A: "There can be no Communism without us!"

 SOV_Post_War.37.t: "The Yugoslavs Attend the Conference!"
 SOV_Post_War.37.d: "With the West becoming increasingly belligerent, it is critical that Communist nations across Europe and the world band together to fight for global liberation. That is the purpose of the Cominform, which has already attracted all of the nations liberated by our Red Army in Europe. The only one remaining is the Yugoslavs. Despite being liberated by our forces, they have rallied around the Communist Nationalist regime, which has established some independence from our influence. Them joining the Cominform would give us access to Belgrade and bring the Federation in line.\n\nTito has accepted the offer to discuss joining; it is now up to the diplomats to work out the details. It is expected that the Yugoslavs will make ridiculous demands to avoid our advice, but with strong wills and silver tongues, we will bring Tito down. Only then will we be able to focus solely on our true enemy, Western capitalists!"
 SOV_Post_War.37.A: "Union, Solidarity, Revolution!"

 SOV_Post_War.38.t: "What shall we do now?"
 SOV_Post_War.38.d: "Today, our diplomats met with Soviet officials in Szklarska Poreba to discuss our participation in the emerging Cominform. The Soviets have explained it rather benignly as primarily a propaganda bureau for Communists to combat rising anti-communist sentiment in the West and Western-aligned countries. According to them, joining would simply allow us to reach out more effectively to our oppressed brothers across Europe, as well as those who are still hesitant to follow the Party Line at home. As an olive branch, the Soviets have even offered to let Belgrade host the organization's headquarters. However, we have received additional secret communiques from our diplomats that tell a different story.\n\nThey tell us that they have the unspoken impression that this organisation is simply another attempt by the Soviet Union to gain more control over the Communist world. While the organisation would be based in Belgrade, the majority of its members are Soviet puppets, specifically men chosen for their loyalty to the USSR. This means that the Soviets would make almost all of the organization's decisions. Our vote would be more symbolic than anything. They suspect this will be used to force us to follow the Stalinist party line, which Tito may not want to do. However, our diplomats say this based on intuition, and they could be wrong."
 SOV_Post_War.38.A: "Yugoslavia will do what is best for us, not for the USSR!"
 SOV_Post_War.38.B: "We must stand together, or fall separately!"

 SOV_Post_War.39.t: "The Yugoslavs do not sign!"
 SOV_Post_War.39.d: "Today, the Yugoslav delegation walked out due to numerous disagreements. They returned to Belgrade without saying anything else, and Yugoslavia has effectively refused to join the Cominform. In the end, we have little choice but to accept the inevitable. For the time being, it appears that we have lost control of the Balkans' largest state. Already, the Politburo issued a statement condemning the Yugoslav Communist Party for 'Titoism' and anti-Sovietism.\n\nMeanwhile, Tito has issued his own statement, describing the Cominform as a thinly disguised way for us to exert control. He has called on all Communist governments to join him in forming an independent communist bloc free of Moscow's control. Not only that, but he has pledged to station troops in Albania to discourage Soviet interests and supply Greek communists, directly violating the Percentage Agreements signed by the United Kingdom and the Soviet Union. "
 SOV_Post_War.39.A: "Yet another Communist schism."

 SOV_Post_War.40.t: "The Yugoslavs Join the Cominform!"
 SOV_Post_War.40.d: "After some tense negotiations and prerequisite wheeling and dealing, the Yugoslavs agreed to join the Cominform. Despite some vocal concern in their camp about our intentions, they appear to have set this aside to advance the cause of socialist brotherhood. We had to give them the headquarters, but that was nothing compared to what we got in return. The Yugoslavs have already established themselves as the last Communist regime in Europe to defy us. This agreement provides us with an opportunity to further influence them and bring them in line with the rest of our socialist brothers in Eastern Europe.\n\nThose who hold more idealistic views see this as an important step for another reason. Allowing such an obvious and outspoken dissident voice in the Communist movement to join the Cominform may encourage other, equally unsatisfactory Communist regimes to do the same. Of course, those are few and far between now, but as the western house of cards collapses, it is unavoidable that some party will try to assert its independence. Yugoslavia could be a way to reach out to these dissidents and draw them closer to us."
 SOV_Post_War.40.A: "Another victory for the Revolutionary struggle!"

 SOV_Post_War.41.t: "Giving the Order"
 SOV_Post_War.41.d: "Nobody really expected this. It was understood that we had to be ruthless at times to ensure the Union's safety, but ordering Tito's assassination over the question of whether Yugoslavia should be admitted to the Comintern? To many, it was an overly violent reaction to a minor issue.\n\nBut that is what was ordered. This alternative form of communism, like Trotsky's, was unsustainable. It was dangerous, and a statement had to be issued to remind those false communists of the consequences of attempting to be independent in the face of global revolution. The NKVD quickly identified a candidate: a hardline, pro-Soviet man born in Ljubljana who was willing to die if it meant Tito would as well.\n\nIt would be quiet and unobtrusive if possible. He would sneak into Tito's Belgrade home in the early morning and, if everything went as planned, slit the Yugoslav leader's throat with a hunting knife. If no guards were nearby or heard him, he would leave the same way he came. This did not account for anyone else in the house, including secretaries, visitors, and family, but risks had to be taken.\n\nAnd that was it: the entire plan, except for minor details like guard rotations and who would drive the assassin inside. It was a hastily drafted document at the request of [SOV.GetLeader], but the NKVD insisted on its readiness. A final meeting late at night to discuss the plot was held. After hours of arguing, the last question hanging in the air within the Premier's office was, despite the consequences, straightforward.\n\n\"Permission to proceed?\""
 SOV_Post_War.41.A: "\"Granted.\""

 SOV_Post_War.42.t: "Assassins strike at Tito!"
 SOV_Post_War.42.d.SOV: "We are plagued by terrible news from Belgrade and chaos in the NKVD, despite the fact that our attempt to remove Tito from Yugoslavia went nearly perfectly, up until the actual assassination. The man we hired was apprehended by one of Tito's aides, fumbled the knife, stabbed him in the stomach rather than slitting his throat, then got cold feet, breaking his promise to be caught and killed for a better Yugoslavia, and dove out the window.\n\nYugoslav diplomats, military officials, and even the general public have already noted the similarities between Trotsky's assassination and this attempted one, with the unusual choice of weapon and the boldness of the location particularly suspicious. The NKVD, of course, has completely backtracked on its previous claims of being fully prepared for this, and is now blaming everyone but themselves for the assassination's failure. Claiming that they had no time to prepare and were unsure of the plan from the start, they have gained sympathy from those uninvolved with the planning.\n\nTo top it all off, Tito is still alive, albeit in critical condition. While international outrage has not yet occurred, if more information about our involvement in the Yugoslav President's current state becomes public, we may face further criticism. For all intents and purposes, the NKVD's and, though no one dare say it, the Premier's hubris may have turned this into a nightmare for both nations' administrations."
 SOV_Post_War.42.d.YUG: "The screams of ambulance sirens, police cars, and other emergency vehicles woke Belgrade up early today. They descended on where the President had been sleeping and surrounded the estate like it was a fortress. That same morning, around 6 a.m., an American diplomat scheduled to meet with the President the next day arrived on an early flight and proceeded directly to Tito's residence. Demanding that they meet now, one of Tito's aides went up to Tito's office to wake him, only to find a man with a large knife standing over the sleeping President.\n\nWhile it appeared that the man was about to slit Tito's throat, the aide's presence clearly scared him, and he ended up stabbing Tito in the stomach instead, leaving him with a life-threatening wound. The man, presumably still stunned by his discovery, jumped out of a window and fled, sparking a citywide manhunt for Tito's attacker.\n\nSecurity reports suggest that the would-be assassin was not just a disgruntled citizen, but a foreign agent; worse, all signs point to Moscow. The dramatic and brutal flair of a hunting knife within the target's home is far too reminiscent of the ice pick used to assassinate Trotsky. While our President is not dead, he is fighting for his life after suffering significant damage to a vital organ. Tito has been the foundation on which Socialism has grown in Yugoslavia, and if he dies, who knows what will happen."
 SOV_Post_War.42.A: "Sit, wait, and hope he dies."
 SOV_Post_War.42.B: "We can only wait with bated breath."

 SOV_Post_War.43.t: "The Assassination Succeeds"
 SOV_Post_War.43.d: "The news has finally arrived: Tito has died. No doubt, somewhere else, another country's secret service is celebrating the clear hit on our beloved President, and we have a prime suspect: Moscow. The theory that the Soviets saw our non-alignment as a threat and decided to deal with the man who was perpetuating it is not outlandish, given that they have done so to numerous political opponents before. The manner in which Tito died is reminiscent of other NKVD assassinations, and to top it off, the Soviets have already issued a brief, well-worded statement on the assassination only an hour after Belgrade broke the news as if their statement had been prepared in advance.\n\nHowever, investigating this heinous act comes second to securing the nation. While Yugoslavia appears to be whole, even calm, in its mourning, we know this is not the case. With our strongman gone, militant groups who were only afraid of him and not of our armed forces have already begun to become more daring, carrying out attacks and promoting nationalistic causes across our union.\n\nThen, of course, there is the question of who will replace Tito. Arsenije \"Arso\" Jovanović, a decorated but suspiciously pro-Soviet general, and the far more liberal Milovan Djilas, who has been open about his democratic views, have already entered a fairly vicious power struggle. Alarmingly, military factions have already begun to take sides between these two opponents. Whatever happens, we have lost a great man - the man who liberated us from Nazi oppressors and kept Yugoslavia together in the face of numerous problems that threatened to tear it apart."
 SOV_Post_War.43.A: "Everything is falling apart."

 SOV_Post_War.44.t: "The Assassination Succeeds"
 SOV_Post_War.44.d: "The hidden panic behind closed doors, particularly in the NKVD, has subsided today as word of Belgrade's headline news has finally reached us. Despite our botched hit on the Yugoslav leader, it was successful. While outside, Soviet citizens appear to either ignore or mourn the death of a fellow communist, and no one appears to be aware of our involvement. Meanwhile, inside the Kremlin, a very rare celebration took place, with our administration and some NKVD officials opening the vodka to commemorate our victory and the death of yet another traitor to the Revolution.\n\nThe NKVD's official statement has now reverted from fully ready to never ready to fully ready, seemingly patting itself on the back for the hit's semi-success. Meanwhile, our assassin has resurfaced and denies hiding from us, claiming that he was hiding from Yugoslav security forces. While he is unlikely to go unreprimanded or unpunished, he will most likely live, with our administration having calmed down slightly from his initial failure.\n\nHowever, all is not well in Yugoslavia; chaos is on the rise. Despite our initial celebrations, our Soviet-aligned candidate for Yugoslavia, Arsenije \"Arso\" Jovanović, has not gained popularity as planned. Many Yugoslavs blame us for their leader's death. The situation there is teetering on a knife's edge, with liberal-minded politicians like Milovan Djilas gaining traction, and our finally successful plan may still fail at the last minute."
 SOV_Post_War.44.A: "The bastard is dead!"

 SOV_Post_War.45.t: "The Death of Tito"
 SOV_Post_War.45.d: "[FROM.GetNewsIcon]Today brought shocking news from Yugoslavia: Josep Broz Tito, the country's dictator, had died. His death was the result of an attack in his Belgrade home. A man, suspected by many to be an NKVD agent, but this is unconfirmed, snuck in through his bedroom window, armed with a hunting knife.\n\nAfter being surprised by one of Tito's aides, the man appears to have switched his approach, stabbing Tito in the stomach rather than slitting his throat. Despite the best efforts of the hospital to which he was rushed and all available medical resources, Tito died as a result of his wounds, particularly the jagged cuts caused by the knife. Despite his communist views, Tito organised partisan groups during the war to combat the Nazi occupation of the Balkans and earned the respect of Western leaders.\n\nAccording to speculation, Tito's neutrality towards both the Comintern and the Western alliances infuriated the Soviet Union, who declared him a traitor. Regardless of the strange circumstances surrounding his death, Yugoslavia has lost a hero. Many people have taken to the streets to mourn and call for the capture of the escaped assassin, and everyone is left wondering who will lead the country as Tito's successor."
 SOV_Post_War.45.A: "The extremes to which men go."
 SOV_Post_War.45.B: "Surely this will break their spirit!"
 SOV_Post_War.45.C: "Communists killing each other? Ha!"

 SOV_Post_War.46.t: "Chaos"
 SOV_Post_War.46.d: "Following the death of our beloved Tito, the chaos has only grown. Nationalist groups seeking to dismantle Yugoslavia have launched uprisings, terror attacks have rocked major cities, and stability is at an all-time low - it appears that Tito was the only thing holding us together. The police are completely overwhelmed, the public is terrified, and government officials are unsure how to proceed.\n\nA number of our loyalists appear to believe that Tito's death can only be traced back to the USSR due to overwhelming evidence - and this has been bolstered by the sudden appearance of propaganda for \"Arso\" Jovanović, a pro-Soviet military general who was extremely talented during the war but is a new name in politics. While this propaganda was initially accepted, and some called for Jovanović to be their leader, some more sceptical citizens saw it as more Soviet meddling, this time attempting to install a leader who would join the Comintern.\n\nThose seeking an alternative have joined forces with those who disliked Tito to support left-wing Milovan Djilas, who advocates for 'democratic socialism', a far more liberal form of government. Arso supporters accuse Djilas of being a Western spy interested in capitalism, while Djilas supporters accuse Arso of being an Eastern spy interested in turning us into a Soviet satellite.\n\nThese two camps have already begun to fight, and even in lawlessness, it is clear that once stability is restored, one of these men will rule what remains of the nation. Top advisors believe that a peaceful resolution to this tumultuous period is impossible, and tensions have reached a point where conflict is expected within the next few weeks."
 SOV_Post_War.46.A: "We only wanted neutrality."
 SOV_Post_War.46.B: "Forward. For all Oppressed Workers!"

 SOV_Post_War.47.t: "Backfire"
 SOV_Post_War.47.d: "Unfortunately, despite our successful assassination of Tito, things have not gone as planned in Yugoslavia. Following his death, we focused on promoting Arso Jovanović through propaganda. However, this appears to have backfired, as the NKVD's sloppy work in concealing our involvement in the assassination has led the Yugoslav populace to interpret our 'endorsement' as exactly what it is: an attempt to install a pro-Soviet leader. The scrutiny has weakened support for Jovanović and created a schism in the country's political landscape.\n\nThose who oppose Soviet policies have shifted their support to Milovan Djilas, a capitalist socialist democratic leader who stands in stark contrast to Jovanović. Aside from ethnic nationalist groups, there are few other contenders in the race for Yugoslavia's leadership - and it appears that power will not be handed over to one of these men without the other having a say about it if clashes in the streets between supporters of the two are any indication.\n\nBoth parties have suddenly become armed - we assume, that because we secretly sent weapons to Arso's men, the West has likely sent equipment to Djilas' - and as attacks from various partisan causes continue to strike Yugoslavia's major cities, battle lines are gradually being drawn. Bases of support and whispers of impending conflict cover the Balkan nation, and it appears that our simple strike against one annoyance is quickly turning into a civil war that will cost many lives."
 SOV_Post_War.47.A: "No man... still problems?"

 SOV_Post_War.48.t: "The Yugoslav Civil War"
 SOV_Post_War.48.d: "[FROM.GetNewsIcon]Yugoslavia's conflict has escalated into a violent civil war between supporters of socialist-democratic Milovan Djilas and hardline communist Arsenije \"Arso\" Jovanović. Following the death of former leader Josip Broz Tito earlier this year, whom many believe was assassinated by the NKVD, a power struggle erupted between the two men, and neither relinquished until their supporters were fully armed and strong bases of support for each had been established.\n\nDjilas has a long history in Yugoslavian politics, known for his critiques of communism aimed at improving it. However, Jovanović does not share the same reputation. Jovanović was an experienced partisan during the Nazi occupation of Yugoslavia, and the sudden rise in propaganda and support for him is odd given his lack of previous experience in government. Some Yugoslavs see Arso's popularity as yet another example of Soviet meddling.\n\nWhether aided by foreign powers or not, the two sides have already committed palpable violence against one another, and the citizens, who are still recovering from the harsh effects of Nazi occupation, will be thrown back into the depths of war."
 SOV_Post_War.48.A: "Here lies one half of Yugoslavia..."

 SOV_Post_War.49.t: "Djilas wins the Yugoslav Civil War"
 SOV_Post_War.49.d.SOV: "[FROM.GetNewsIcon]Milovan Djilas' forces have defeated army units loyal to Arsenije \"Arso\" Jovanović, bringing an end to Yugoslavia's civil war. Djilas, who calls himself a \"Social Democrat,\" is a known supporter of staunch Yugoslav opposition to Moscow and has declared himself and his new Belgrade government fully willing to cooperate with the West in matters concerning Yugoslavia's future, leaving the USSR in the dust in terms of Yugoslav diplomacy. Anger remains high across Yugoslavia over Marshal Tito's assassination, which many believe was carried out by Soviet intelligence services.\n\nAlthough the civil war has ended, Djilas' new government still has a lot of work ahead of it. Infrastructure has been destroyed, inflation is rampant, famine threatens, and the civil war has reopened old wounds between Yugoslavia's various ethnic groups. Ethnic violence is on the rise throughout the country. However, Yugoslavia is unlikely to be able to secure its footing without significant foreign aid, and any hopes that the COMINFORM had of a friendly Yugoslavia have been dashed."
 SOV_Post_War.49.d.others: "[FROM.GetNewsIcon]The guns have fallen silent across Yugoslavia, as Milovan Djilas' forces secured victory in the raging civil war that had previously torn the country apart. For the time being, the country has been stitched back together under a new and moderate leadership that appears to be moving away from communism. Djilas promised immediate reconstruction of the country, fairness and equality for the various ethnic groups comprising it, and a reapproachment with the Western powers in a speech to a gathered crowd in bomb-shattered Belgrade. Anger remains high across Yugoslavia over Marshal Tito's assassination, which many believe was carried out by Soviet intelligence services.\n\nAlthough the civil war has ended, Djilas' new government still has a lot of work ahead of it. Infrastructure has been destroyed, inflation is rampant, famine threatens, and the civil war has reopened old wounds between Yugoslavia's various ethnic groups. Ethnic violence is on the rise throughout the country. However, with the expected assistance of the West, Yugoslavia is expected to be able to hold together and rebuild."
 SOV_Post_War.49.A: "Now the real battle begins."
 SOV_Post_War.49.B: "They have betrayed the ideals of Marx!"
 SOV_Post_War.49.C: "A potential partner in the Balkans!"
 SOV_Post_War.49.D: "Is Yugoslavia leaving the USSR's orbit?"

 SOV_Post_War.50.t: "A Message to the West"
 SOV_Post_War.50.d: "Since Tito was assassinated and our neutrality was abandoned, Djilas has sought assistance from the West, even if it was an unpopular decision among some of our more communist citizens. During the civil war, the United States and its allies provided significant assistance, sending us weapons and money to keep the effort against Arso going. Without the constant stream of aid, we might not have won the war. Now, however, we face a much larger and more intimidating threat than our own people. The Soviets' Iron Curtain satellites stare at us, and suspicious troop movements along our border constantly instill fear in our, admittedly small, army. If we are to survive and build a truly new Yugoslavia without the threat of Soviet \"intervention\" at any time, we must be supported by arms that rival the Cominform.\n\nWith our course decided and advisors stating that we are unlikely to be denied, President Djilas has sent a letter requesting immediate access to the Western alliance. This will, of course, enrage the Soviets and likely result in some sort of repercussion, but it is most likely their fault that Djilas is even President at all. Furthermore, as an incentive, the Americans offered that we would join their \"Marshall Plan\" if we allied with them. The plan would undoubtedly provide much-needed economic assistance in returning to where we were before the civil war, Tito's reign, and the Nazi occupation."
 SOV_Post_War.50.A: "We can only rise with the eagle of freedom by our side!"

 SOV_Post_War.51.t: "Yugoslavia seeks to join [THIS.GetFactionName]"
 SOV_Post_War.51.d: "Today, we received a message from Milovan Djilas, the current President of Yugoslavia and a true defender of democracy. Despite being identified as a communist, he is more of a democratic socialist who has already established free elections after defeating his civil war opponent, pro-Soviet general Arsenije Jovanovic. Djilas claims that his victory over Jovanovic has enraged the Soviets towards the new Belgrade administration, and that he fears they will declare war as a result of \"Arso's\" defeat.\n\nHe claims that Yugoslavia is under threat of Soviet \"intervention\" - citing their alleged assassination of Tito as evidence that they have already meddled in Yugoslavian politics - and that if we do not join in arms, we will sacrifice it to becoming a satellite because it lacks enough men to defend itself following its civil war. As one might expect, this is a half-hearted plea for an alliance, which is understandable and expected, especially given the West's previous support for Djilas - it wouldn't make sense not to accept given that we've practically done everything we can except declare our official support for him.\n\nOn the one hand, the threat of a Soviet invasion of Yugoslavia is very real, and they have previously invaded nations to expand their influence; additionally, they should expect us to help any ailing democracy. On the other hand, more cautious elements of our government believe that expanding our military alliance eastward will make the Soviets feel directly threatened, potentially leading to war. The choice is ours: protect Yugoslavia in the hope of securing peace while risking it, or let the threat of war loom in order to possibly prevent further destruction."
 SOV_Post_War.51.A: "Welcome back to Western protection, Yugoslavia!"
 SOV_Post_War.51.B: "We cannot risk an end to peace, even to avoid war."

 SOV_Post_War.52.t: "Yugoslavia joins [ENG.GetFactionName]"
 SOV_Post_War.52.d: "[FROM.GetNewsIcon]Democratic nations rejoice as Yugoslavia, a recovering country, joins the Allies. Following its brutal civil war, now-President of Yugoslavia Milovan Djilas became concerned about the amount of Soviet scrutiny and troop movements near or directly on his borders. Fearful of a communist invasion, the liberal leader turned to his former Western benefactors, who had already assisted him, to protect his newly free nation from the threat of Soviet \"intervention\".\n\nHe was quickly accepted into the military faction, with most Western powers agreeing that his reasons were valid, and additional recovery aid, as well as troops from Allied nations, have poured into the Balkans, vowing to defend it from Soviet tyranny and rebuild it to what it was before Tito's takeover and the Nazi invasion - with Djilas personally vowing to not just make it what it was, but to make it better.\n\nThe Soviets have quickly labelled this as an attack on their sphere of influence, Western imperialism, and a slew of other insulting terms, but Yugoslavia has affirmed its decision. As a result, tensions in the Balkans have decreased overall, as the Soviets have been forced to reduce their military presence as to not seem aggressive; however, tensions between East and West have risen as a result of this development."
 SOV_Post_War.52.A: "Yugoslavia is safe with us!"
 SOV_Post_War.52.B: "They will come to regret this."
 SOV_Post_War.52.C: "At least peace is preserved for now..."

 SOV_Post_War.53.t: "Alliance Rejected"
 SOV_Post_War.53.d.NATO: "We received troubling news today. The Allies have responded to our request to join them. Surprisingly, they answered with a resounding no. They claim that while they may have helped us during the civil war, it was only to prevent a Stalinist like Jovanovic from gaining power, and that we should not have expected anything else, given our proximity to the USSR.\n\nThe letter states that they cannot risk raising tensions any further for fear of war, and that while they have promised aid if the terrifying communist tidal wave of troops pours into our country, that is all they can do to maintain global security. It also cites Djilas' former ties to Tito's communism as another reason they would not want us, stating that some specific members would not feel comfortable collaborating with us.\n\nNeedless to say, this development has shocked the public and personally enraged President Djilas, who has resorted to calling his former benefactors backstabbers. On the streets, those who believed that safety would be assured in the mighty hands of Western armies have panicked and protested, claiming that without their defence, our wounded military will be viewed as nothing more than an easy target by the Soviets.  Security forces have made a half-hearted attempt to quell these rabble-rousers with what few resources they have, but it appears that our police, who have also taken to the press to protest, share this desperate outlook."
 SOV_Post_War.53.d.WP: "The Soviets have apparently denied us entry into the [SOV.GetFactionName]. Obviously, we sent them a message asking if this message was for us; even though it clearly is, a double-check couldn't hurt, given how unusual this turn of events is.\n\nAfter all of the aid they sent to defeat Djilas, collaboration between our two governments, and the fact that they were most likely the reason Jovanovic had a chance at power, their refusal of us is extremely perplexing. Their official reason is that the West has been suspicious of our country since Tito's death, and that allying now would be far too compromising in terms of global tensions. Furthermore, they claim that they must focus on helping their own workers as well as the workers of their satellites, leaving no room to continue assisting us in recovering from our civil war or resupplying our military. It is a complete reversal of their previous policies towards us, which has surprised our high command.\n\nArso has taken this especially hard, having been forced into neutrality, like Tito, and being flatly rejected by his heroes in Moscow. He hasn't been seen in hours, and with the public looking to him for guidance amid our newfound isolation, we'll need his strategic mind and strong hand more than ever. We have also detected Western military presence near our borders. Without the armies of the East to assist, some of our civilians are concerned that the West will try to \"save us from ourselves\"."
 SOV_Post_War.53.A: "You help us to abandon us?! What is this nonsense!?"

 SOV_Post_War.54.t: "Jovanović Wins the Yugoslav Civil"
 SOV_Post_War.54.d.SOV: "[FROM.GetNewsIcon]Arsenije \"Arso\" Jovanović's forces have defeated Milovan Djilas' troops, officially ending the deadly Yugoslav Civil War. Jovanović, a Moscow-aligned follower of Marx and Lenin, plans to rebuild Yugoslavia through five-year plans and collaboration with socialist states such as COMINFORM and the USSR, leaving imperialist Western powers behind. Jovanović has expressed his desire to re-establish positive relations between Yugoslavia and the USSR, which had deteriorated under Tito's regime. He plans to join COMINFORM as soon as possible.\n\nAlthough the civil war has ended, Djilas' new government still has a lot of work ahead of it. Infrastructure has been destroyed, inflation is rampant, famine threatens, and the civil war has reopened old wounds between Yugoslavia's various ethnic groups. Ethnic violence is on the rise throughout the country. Citizens, on the other hand, are likely to be able to live peacefully, knowing that they now have an effective government in place and that assistance from COMINFORM is on its way."
 SOV_Post_War.54.d.others: "[FROM.GetNewsIcon]Arsenije \"Arso\" Jovanović's forces have defeated Milovan Djilas' troops, officially ending the deadly Yugoslav Civil War. Jovanović, a known communist hardliner and proponent of Stalinism, has declared his intentions to work with the USSR and COMINFORM to rebuild Yugoslavia and reshape its current diplomatic sphere. Jovanović plans to join COMINFORM and accuses Western powers of funding and supporting the traitor Djilas and his forces, threatening the country's unity. \n\nAlthough the civil war has ended, Djilas' new government still has a lot of work ahead of it. Infrastructure has been destroyed, inflation is rampant, famine threatens, and the civil war has reopened old wounds between Yugoslavia's various ethnic groups. Ethnic violence is on the rise throughout the country. However, it is likely that the country will be held together by orders from Moscow."
 SOV_Post_War.54.A: "Victory, comrades!"
 SOV_Post_War.54.B: "Our plan has worked out perfectly."
 SOV_Post_War.54.C: "A Balkan Stalin..."
 SOV_Post_War.54.D: "So Yugoslavia will enter the Soviet orbit after all."

 SOV_Post_War.55.t: "A Message to Moscow"
 SOV_Post_War.55.d: "Again, we are in turmoil, but not from Nazis, nationalists, or even traitors. No, this time we are in the crosshairs of the West, which seeks to corrupt the great socialist beacon that is Yugoslavia. Since we rid our country of Djilas, his followers, and all of the spies in our administration, we have received criticism. British imperialists, American capitalists, and all of their lackeys are outraged at what they perceive to be injustice; however, one nation that understands the need to act is our benefactor to the East: the Soviet Union.\n\nArso has long admired the USSR and Stalin's policies, and now more than ever, we will need Moscow's assistance to repair the damage caused by traitor Djilas and to protect us from the West's destructive gaze. A message has been drafted requesting Yugoslavia's admission to the Comintel which would officially unite the workers of our two countries and end Tito's foolish non-alignment policy. It is expected that the Soviets will accept because there is no reason why they would not want us; the only problem we may face is some of the remaining non-aligned citizens who falsely claim that allying with the USSR will turn us into a satellite.\n\nObviously, these are dissenters or spies, and they will be dealt with accordingly. The West will undoubtedly see this as a challenge and a threat, but it is to be expected - if they have anything to say, they must do so to the Red Armies of Belgrade and Moscow together! Tito is dead for a reason: with Arso in charge and workers united, the world's march towards a global socialist revolution accelerates."
 SOV_Post_War.55.A: "Yugoslavia will be mighty with allies; and the West shall shake!"

 SOV_Post_War.56.t: "Welcome to the party!"
 SOV_Post_War.56.d: "After the twists and turns of the last few months in our Yugoslavian plot, the time has finally come. It took a civil war, but you can't build a socialist utopia without murdering a few bourgeois traitors first. As expected, Arso has finally submitted a request for direct entry into the Cominform, citing the need for additional assistance and the rebuilding of his military.\n\nWhile only a short time ago this would have been regarded as a triumph and the success of our plot to restore Yugoslavia to true communism... circumstances have changed. The unexpected civil war, combined with all of our support for Jovanovic, has caused some in our administration to believe that Yugoslavia is now a liability. They would require a steady flow of aid to maintain a stable recovery rate, which is more than a state that must first assist its own workers and satellites can afford to provide.\n\nWorse, the West viewed Yugoslavia as a new low for the USSR, with most Allied nations believing that we assassinated Tito and funded Jovanovic to bring about this exact scenario. When they bring up our supposed 'tyranny', it has become a talking point in most of their political circles, and our more cautious administrators warn that if we go ahead with the plan, it could be a breaking point. Indeed, the West is suspicious of Yugoslavia and our relationship with them, and tensions have risen as a result of recent events. While we doubt that the weak capitalists would have the courage, there is a chance that they will declare war to \"protect\" Yugoslavia."
 SOV_Post_War.56.A: "Bring forth the consequences- our workers will be united!"
 SOV_Post_War.56.B: "Perhaps Jovanovic is better used as a... distant friend."

 SOV_Post_War.57.t: "Yugoslavia joins [SOV.GetFactionName]"
 SOV_Post_War.57.d: "[FROM.GetNewsIcon]A year or two ago, today's headlines would have been unthinkable in the world - but given everything that has happened, they now seem expected. Yugoslavia, which was once ruled by Tito and was completely opposed to an alliance with the Soviet Union, has now directly joined them under the rule of \"Arso\" Jovanovic.\n\nThe Soviets celebrated their victory with a military parade in Moscow, which brought together Russian and Yugoslav forces in a single march to demonstrate their newfound unity. \"It is only right for us to unite against the capitalist democracies of the West, as all workers will eventually do,\" Jovanovic said in a rare press interview. \"Tito was an imbecile to have not seen the clear benefit in working with the defender of the proletariat.\"\n\nThe official reasoning for the alliance was an apparent amassing of Western troops on the borders of the still-healing Balkan nation, which an unnamed American diplomat denied and accused Arso of being a Stalinist puppet. Most of the world appears to quietly agree that Arso's ties to hardline Stalinism have been obvious since his days as a partisan during the Nazi occupation, and no one expects him to change his mind now."
 SOV_Post_War.57.A: "The Balkans become darker..."
 SOV_Post_War.57.B: "One step closer to global revolution!"
 SOV_Post_War.57.C: "And one more nation falls to Soviet tyranny..."

 SOV_Post_War.58.t: "The Assassination fails"
 SOV_Post_War.58.d: "Prime Minister Tito has been declared stable, bringing a sigh of relief to every home in the Western Balkans today. When he was stabbed, doctors and medical professionals from top institutes across our great country rushed to save his life, and their efforts were successful. The nation is overjoyed, and celebrations have taken to the streets as police work tirelessly to find the man who almost took Tito away from us. As new eyewitnesses emerge, the evidence supporting the theory that Moscow is to blame grows stronger, with some swearing they saw a suspicious man speaking Russian near Tito's estate earlier that morning.\n\nThis event also benefited us in some ways: rebel groups expecting Tito to die started causing havoc throughout the country, making themselves easier to catch when they had to flee because he didn't. The initial panic and infighting have subsided, and the country appears to be slightly more united than it was before the assassination attempt. While the recovering Tito maintains his non-alignment stance, he now enjoys Western media coverage, hoping to sensationalise the story and, like us, blame Moscow for the attack. As is customary, Moscow responded by blaming the West.\n\nTito is said to be eager to return to running the country and ensuring the success of Balkan socialism, while a group of plotters is undoubtedly fuming over their failed attempt. Security has been quickly upgraded in preparation for a second attempt on Tito's life, but for the time being, everything is relatively calm."
 SOV_Post_War.58.A: "Non-Alignment survives; and thus, so does the nation of Yugoslavia."

 SOV_Post_War.59.t: "The Assassination fails"
 SOV_Post_War.59.d: "Outrage, shock, and suspicion have swept through both the Kremlin and the NKVD headquarters in recent hours, as Yugoslavia announced that Tito is expected to survive the wounds inflicted by our assassin. Numerous NKVD officers have abruptly vanished from their posts, fleeing an impending crackdown and condemnation for their inadequate efforts to rid the world of the Yugoslav traitor. Meanwhile, the small number of Soviet officials who were aware of our involvement began pointing fingers at one another, blaming everyone else in an attempt to avoid being purged.\n\nFurthermore, Yugoslavian police have found eyewitnesses who claim to have heard a man in a car speaking Russian shortly before the attempted hit - our assassin's driver, who was supposed to get him out. Even Tito, though weak, appears to believe we did it, saying in a brief statement from his hospital bed that no one else had the same motivation as we did. Almost everyone, including some Soviet citizens who we quickly arrested for speaking too loudly about this issue, suspects us, and the West has been quick to condemn us. \n\nIn response, we told the media that we had nothing to do with this 'horrible attack on a fellow, if non-aligned communist' and that it was most likely committed by a 'bourgeois royalist'. Behind closed doors, [SOV.GetLeader]'s hatred for Tito has only grown, as he sees him as a greater threat than ever. He immediately directed the NKVD to 'try again and succeed, or it's Siberia for all of you.'"
 SOV_Post_War.59.A: "What do you mean we tried to kill Tito? We'd never."

 SOV_Post_War.60.t: "Moscow-Belgrade Schism"
 SOV_Post_War.60.d: "[FROM.GetNewsIcon]Tensions in the Balkans have flared up again. Belgrade has issued a statement blaming the USSR for the attempted murder of Yugoslavian dictator Josip Broz Tito. Their reasoning stemmed from eyewitnesses swearing they heard men speaking in Russian shortly before Tito was stabbed, as well as dissatisfaction in Moscow with Tito's nonalignment despite the fact that the country was also communist.\n\nWhile relations between the countries were not ideal, the accusation prompted Moscow to label Yugoslavia 'traitors to the global revolution'. Western agencies quickly backed Belgrade, expressing their belief that the hit was carried out by the NKVD - and while Tito has assured Yugoslavia's independence from the East and West, a recent press release from his hospital bed quotes him as saying:\n\n\"It is clear that the Soviets cannot be trusted. We will always be independent from all influence, but during these times, we may have an interest in American business.\" It is clear that whoever planned to assassinate Tito failed miserably, and all diplomacy between the USSR and Yugoslavia came to an abrupt halt as both looked at each other with distrust and fury."
 SOV_Post_War.60.A: "And so the Soviets no longer support the workers of the world; but only their own."
 SOV_Post_War.60.B: "Yugoslavia will fall."
 SOV_Post_War.60.C: "And so the communists no longer support the workers of the world; but only their own."

 SOV_Post_War.61.t: "Try, try, try again?"
 SOV_Post_War.61.d: "Our first attempt at removing Tito failed. He continues to openly defy Moscow, turning the incident into anti-Soviet propaganda. In Belgrade, he positions himself as a proponent of true socialism, free of foreign interference. In the Kremlin, however, his survival is viewed as a humiliation and an insult that must be addressed.\n\nThe NKVD claims that the assassin's network was compromised shortly after the mission began. Tito's counterintelligence has proven alarmingly effective, most likely aided by British advisors eager to keep Yugoslavia out of our reach. However, his security can only be perfect for so long. Opinions differ among Politburo members. Some argue that another attempt is required, and Tito must be removed before his heresy spreads throughout the socialist camp. Others warn that each failure risks further embarrassment, and that our fixation on one man may reveal more about our own flaws than his strength.\n\nThe question now is whether we should continue in this game of cat and mouse, or accept that the Yugoslav problem cannot be solved with a bullet. Tito may have eluded us this time, but his defiance continues to wreak havoc on the socialist world. As long as he lives, his message of independence has the potential to infect others."
 SOV_Post_War.61.A: "Enough humiliation. We will deal with him politically."
 SOV_Post_War.61.B: "Tito lives - for now. Prepare the next team."

 SOV_Post_War.62.t: "The Soviet Thorn"
 SOV_Post_War.62.d: "The message from Moscow has arrived - not through diplomats or official channels, but through the bodies of assassins. For months, Yugoslav intelligence has quietly intercepted Soviet agents, assassins, and infiltrators, all with the same goal: to eliminate Marshal Tito. All attempts have failed and each has only bolstered his legend.\n\nPatience has run its course. According to the Ministry of the Interior, at least five separate attempts have been foiled. The government has met in Belgrade to decide on the appropriate response. Tito, calm but visibly furious, reportedly stated: \"If they send another killer, I'll send one to Moscow, and I won't have to send a second.\" His words have spread like wildfire, echoing through factories, barracks, and cafés alike.\n\nThe Kremlin may regard Tito as a traitor, but to the people of Yugoslavia, he is now something more: a symbol of independence, a man who faced down the world's greatest tyrant and survived. The time has come to send our own message, one that will be heard from Belgrade to the Red Square."
 SOV_Post_War.62.A: "Let them know we are not afraid."

 SOV_Post_War.63.t: "Tito's Warning"
 SOV_Post_War.63.d: "The Yugoslav issue has now become a public spectacle and a humiliation for Moscow. This morning, Belgrade broadcast Marshal Tito's fiery speech, in which he openly accused the Soviet Union of sending assassins to murder him. He boasted of apprehending five would-be killers, one armed with a bomb and another with a rifle. His final words have already been repeated throughout Europe: \"If you don't stop sending killers, I'll send one to Moscow and I won't have to send a second.\"\n\nThe statement has spread rapidly through foreign newspapers and embassies. Western journalists mock us and even our allies express concern about Stalin's obsession with Tito. In the Kremlin, tempers flare. Some NKVD members claim that leaks jeopardised the operations, while others believe Tito received assistance from British intelligence.\n\nRegardless of who is to blame, the damage has been done. One defiant man in Belgrade pierced the image of Soviet infallibility, which had been carefully cultivated since the Great Purge. In private, the conclusion is clear: direct action against Tito has failed. However, grudges in Moscow are never forgotten, and the day may still come when the reckoning arrives."
 SOV_Post_War.63.A: "Enough. No more attempts - for now."

 SOV_Nuclear_Bomb.1.t: "The Power of the Sun"
 SOV_Nuclear_Bomb.1.d: "Our nuclear program continues apace, matching the Americans in destructive power, tit for tat. Until now, both of our countries have only considered the military applications of nuclear technology. A group of scientists in Moscow has presented us with a new application for the atom: power. They claim that by using nuclear reactions to heat water into steam, we can harness the power of the atom to generate nearly limitless, clean energy. They've even built a research reactor at their university in Moscow.\n\nThe men at Lab No. 2 have already drawn up plans for the first purpose-built nuclear reactor to be built in Obninsk's growing 'Science City'. The APS 1, as it has been named, will serve as both a power plant and a research reactor, assisting in the further development of power generation methods. We will triumph over the Americans by being the first to advocate for the peaceful use of their military weapons.\n\nSome have carefully explained that to immediately announce the APS's unveiling may be premature. They raise numerous concerns about how well it will function once connected to the power grid. They also guarantee that Americans will discredit the APS if it remains disconnected from the national grid. They have requested that they be allowed to connect it to the grid to demonstrate its ability to generate public power before the APS is announced."
 SOV_Nuclear_Bomb.1.A: "Let's connect it to the grid first."
 SOV_Grid_Connected_Power_Plant_tt: "\n§YKaluga:§! Add §G1§! §YNuclear Power Plant.§!\n§YPower Plant§! state modifiers:\n Max Factories in State: §G+20%§!\n Local Available Resources: §G+15%§!\n Local Construction Speed: §G+30%§!\n Research Speed: §G+5%§!\n\n"
 SOV_Grid_Connected_Power_Plant_Alt_tt: "\n§YPower Plant§! state modifiers:\n Max Factories in State: §G+20%§!\n Local Available Resources: §G+15%§!\n Local Construction Speed: §G+30%§!\n Research Speed: §G+5%§!"

 SOV_Nuclear_Bomb.2.t: "First Lightning"
 SOV_Nuclear_Bomb.2.d: "It's time. After years of struggle, toil, and deception, the RDS Project has reached a successful conclusion. One bomb, built on a Fat Man design stolen from the Americans, sits far away, ready to detonate. Various war weapons, such as planes and artillery pieces, as well as specially built homes and bridges, are stationed at varying distances to test the RDS-1's destructive power. The men in the bunker are farther away than any of them, safe from fallout and, hopefully, harm.\n\nThey're all nervous. Not like the men who did it first at Los Alamos, but a distinct Russian fear. They are afraid it will fail. If this bomb fails, Stalin may retaliate. He has been closely following the project since its inception and is optimistic about its success. The Purges demonstrated how dangerous his wrath can be. The men exchange glances as the time approaches. Two breaths later, an assistant flips a switch, starting the detonation sequence."
 SOV_Nuclear_Bomb.2.A: "T -5 seconds..."

 SOV_Nuclear_Bomb.3.t: "Red Sun"
 SOV_Nuclear_Bomb.3.d: "The flash was brilliant. As a second sun rose over the Kazakh plains, Kurchatov exhaled a breath he had not realised he had been holding. A second later, a shock wave struck their bunker. A roar more powerful than any man had ever heard. Then it was over. A massive mushroom cloud, black as death, rose into the sky, bringing an eerie silence. Kurchatov felt conflicted. Excited that the test worked, horrified by the hell he had unleashed, and proud of his achievement.\n\nThen he was a scientist again. Data was collected, results were obtained, and research resumed. It quickly became clear that the RDS was 50% more powerful than expected. He had just dropped a sun over Kazakhstan. The worst part was that Stalin always wanted more. The Americans would develop more powerful weapons to counter theirs, and the world would suffer.\n\nAs Kurchatov returned to the lab, visions of Moscow burning beneath a dozen mushroom clouds filled his mind. Women and children are burning like kindling in a campfire. Men fighting and dying in the ruins during a nuclear rainstorm. Visions of nuclear war. He turned back to watch the mushroom cloud fade away, and he couldn't help but feel as if he'd just doomed humanity to extinction."
 SOV_Nuclear_Bomb.3.A: "Bud' chto budet..."

 SOV_Nuclear_Bomb.4.t: "Five Minutes to Midnight"
 SOV_Nuclear_Bomb.4.d: "When [USA.GetLeader] awoke today, he did not expect to receive the most important news of his presidency. Yet here he was, sitting dumbfounded behind the Resolute Desk, an open folder spread out in front of him. Admiral Roscoe Hillenkoetter, Director of Central Intelligence, stated that \"samples of air masses\" collected over the North Pacific contained \"abnormal radioactive contamination.\" He emphasised that it did not expressly prove the Soviets had an A-bomb, but it was certainly evidence of a nuclear test.\n\nHe advised us to immediately announce our test results. The Soviets' possession of this weapon has a significant impact on the global strategic calculus. We are no longer the sole nuclear power on Earth. If caught secretly testing a bomb, the Soviets would be forced to admit it, or they would lie through their teeth and no one would believe them. It would be a brilliant move, a geopolitical checkmate. However, some advisors disagree with this.\n\nThey argue that disclosing this would expose the existence of our nuclear detection technology. There was no other way we could have found it, as readings indicated that the test area was in Central Asia. Even if we don't explicitly admit to spying on the Soviets and possessing nuclear detection technology, it doesn't take a genius to read between the lines. They urge extreme caution and ask the President to sit on the news, allowing the Soviets to announce it themselves while maintaining our own secrecy."
 SOV_Nuclear_Bomb.4.A: "Better we announce it than Stalin."
 SOV_Nuclear_Bomb.4.B: "Preserve technological secrecy."

 SOV_Nuclear_Bomb.5.t: "[USA.GetLeader] Says: Reds Have Exploded Atom!"
 SOV_Nuclear_Bomb.5.d: "[FROM.GetNewsIcon] -- Statement by the President --\n\n\"I believe the American people, to the fullest extent consistent with national security, are entitled to be informed of all developments in the field of atomic energy. That is my reason for making public the following information.\n\nWe have evidence that within recent weeks an atomic explosion occurred in the U.S.S.R.\n\nEver since atomic energy was first released by man, the eventual development of this new force by other nations was to be expected. This probability has always been taken into account by us.\n\nNearly four years ago I pointed out that \"Scientific opinion appears to be practically unanimous that the essential theoretical knowledge upon which the discovery is based is already widely known. There is also substantial agreement that foreign research can come abreast of our present theoretical knowledge in time.\"\n\nThis recent development emphasizes once again, if indeed such emphasis were needed, the necessity for that truly effective enforceable international control of atomic energy which this Government and the large majority of the members of the United Nations support.\""
 SOV_Nuclear_Bomb.5.A: "We must catch up."
 SOV_Nuclear_Bomb.5.B: "How could they know?"
 SOV_Nuclear_Bomb.5.C: "We live in dark times."

 SOV_Nuclear_Bomb.6.t: "Caught Red Handed"
 SOV_Nuclear_Bomb.6.d: "When the news of America revealing the RDS test to the world reached Moscow, it was met with utter shock. There was no way the Americans could have detected an explosion in Central Asia. After a marathon of discussion and debate, only one explanation seemed obvious: the Americans have some of the most advanced nuclear detection technology on the planet. Detecting it in such minute concentrations so far away from the explosion is impressive.\n\nSome High Command members want us to deny the claims anyway. Sure, the Americans claim that we detonated an A-Bomb, but all of their evidence boils down to some dirt on a plane. We can simply deny that their findings are even close to valid and leave it at that. Naturally, the majority of the world has accepted their declaration. The UN is buzzing with discussion about our test. If we deny it we will undoubtedly look foolish.\n\nThe alternative, however, is dangerous in a novel way. Another faction has demanded that we deny our test but increase our efforts to create larger bombs. When we finally reveal our nuclear program to the world, we will do so with great fanfare. However, there is some risk involved. It would start a nuclear arms race with the United States. The weapons we share could cause untold damage as is, but if the bombs are larger and more numerous, we would doom our children to extinction thousands of times over."
 SOV_Nuclear_Bomb.6.A: "Deny the claims, redouble our efforts!"
 SOV_Nuclear_Bomb.6.B: "Deny the claims and nothing more."

 SOV_Nuclear_Bomb.7.t: "Soviets Deny Nuclear Test!"
 SOV_Nuclear_Bomb.7.d: "[FROM.GetNewsIcon]The Soviet government issued a statement today in response to the United States' accusations of a nuclear weapons test. They categorically deny that the Americans discovered evidence of a nuclear test. Instead, they claim it was simply the byproduct of a large construction project. The explanation was quickly dismissed in many capitals as an obvious lie, but what the Soviets said next drew far more attention.\n\nThe following few paragraphs of the statement, while long and winding, implied that the Soviets already had the bomb for quite some time. If true, this would be a huge revelation. To develop, test, and keep a weapon secret for so long would be an almost unprecedented feat of subterfuge in world history. However, given the Soviet Union, it is not entirely without merit. If they truly already have had the bomb for some time, the next logical question is how many they now have and how powerful they are."
 SOV_Nuclear_Bomb.7.A: "Ha! We fooled them!"
 SOV_Nuclear_Bomb.7.B: "Poppycock!"
 SOV_Nuclear_Bomb.7.C: "One step closer to Armageddon!"

 SOV_Nuclear_Bomb.8.t: "Escalation"
 SOV_Nuclear_Bomb.8.d: "With the Soviets holding the bomb, it is clear that America is no longer safe. We can no longer impose our nuclear monopoly to keep them in check. We must create something new, something they do not have. Fortunately, the Joint Chiefs have an idea. Edward Teller, a Manhattan Project alumnus, has proposed a more sophisticated design for a more explosive device. He calls it the hydrogen bomb.\n\nThese bombs could be many times more destructive than a conventional nuclear weapon. Better yet, the Soviets are unlikely to have any, having only recently mastered nuclear fission. Many other Manhattan alumni, including Oppenheimer and Einstein, have spoken out privately against such a weapon. However, having such a vital weapon available and leaving it to the Russians to acquire first would be a near-fatal breach of duty. With the H-bomb, the JCS assures us that we will have an advantage.\n\nThey have also included NCS 68, a report on the future of American defence spending, as part of their suggestion. The report emphasises the enormous political and military consequences of a Communist nuke. It has terrified Washington and the public, leaving our men and boys vulnerable. As a result, the report recommends a massive increase in defence spending to address this vulnerability and restore Americans' sense of security in their own homes."
 SOV_Nuclear_Bomb.8.A: "Give Teller his money!"
 SOV_Nuclear_Bomb.8.B: "This is too much, even for me!"

 SOV_Nuclear_Bomb.9.t: "The K-1 Reactor"
 SOV_Nuclear_Bomb.9.d: "By splitting the atom, humanity has opened Pandora's box. All major countries are pursuing larger and better bombs in a desperate attempt to stay ahead of their competitors. However, a new branch of nuclear science has begun to emerge. Some physicists have identified a new application for nuclear fission. They propose that by harnessing the energy of a nuclear chain reaction, we can heat water and spin water turbines, potentially creating limitless and clean energy.\n\nUnfortunately, we were not the first to subscribe to this idea. Other countries have prototype reactors in various stages of development. Fortunately, this turned out to be a blessing in disguise. The NKVD was able to infiltrate a few facilities and steal some construction documents, which greatly aided our reactor construction efforts. Now that a test reactor at Moscow's Kurchatov Institute has been completed, it was time to turn it on for the first time. After a few tense moments, it was clear that the test had been successful. Although the power output was only 24 kW, it is a start. The concept has been proven in front of our eyes."
 SOV_Nuclear_Bomb.9.A: "Excellent work, Comrade Professor!"

 SOV_Nuclear_Bomb.10.t: "Soviet Union Successfully Tests World's First Nuclear Reactor!"
 SOV_Nuclear_Bomb.10.d: "[FROM.GetNewsIcon]Today, the Soviet Union announced that the K-1 Nuclear Test Reactor had been successfully tested at the Kurchatov Institute outside of Moscow. The nuclear reactor reportedly uses a nuclear reaction to convert water into steam, which spins a series of turbines, generating power. The K-1 produces a pitiful 24 kW of power and is not even connected to the Soviet power grid, but the successful test confirms physicists' longstanding theory.\n\nOutwardly, the world has reacted with a mix of congratulations and silent recognition of the Soviet achievement. At the same time, it is assumed that they are rushing their nuclear science teams to complete their reactors, if they haven't already. In any case, the Soviet declaration appears to be a significant step forward by the Communist superpower in the scientific field."
 SOV_Nuclear_Bomb.10.A: "Another demonstration of Soviet superiority!"
 SOV_Nuclear_Bomb.10.B: "They got lucky this time!"

 SOV_Obninsk_Nuclear_Power_Plant: "Obninsk Nuclear Power Plant"

 # Global winter of 1939-40
 SOV_Global_Winter.1.t: "Photos of People, People Who Lived Once"
 SOV_Global_Winter.1.d: "Elena trudged through the snow, solemnly. This battlefield had been active days before, but it was clear that the troops had moved on. The absence of animals and the gentle whispering of the trees made the scene almost serene, though it would have been more peaceful without the bodies. Walking up to a foxhole with her camera, she discovered a scene that would have made any other person recoil - but to Elena, it was just another day of finding people who were once alive. Two men.\n\nBoys might have been a better term, sent off without proper equipment. She cursed the commanders first, then the leaders who declared war, and finally the war itself. The two had no wounds or actual injuries; they had simply frozen, alone, with nothing to keep them warm, and died of hypothermia. One held in his hand what Elena assumed to be someone's picture. She didn't dwell on it for long because it wasn't right, and she didn't think she'd stay stoic if she imagined the life this one could've lived and had lived thus far if not for a foolish training regimen - if they had any training at all.\n\nShe leaned down, said a small prayer and recited a poem verse before taking a photograph. It wasn't ethical, but it made her money and kept these two from being forgotten. Moving on, she wondered where she could sell it. Perhaps to the Soviets, or to an independent person covering it for a distant nation. More importantly, she wondered when needless death like this would end. Perhaps never. Hopefully soon."
 SOV_Global_Winter.1.A: "Only the dead have seen the end of war."

 # Global winter of 1941-42
 SOV_Global_Winter.2.t: "The Winter has come to our Motherland"
 SOV_Global_Winter.2.d: "Winter has once again arrived in the Motherland, as we are being blanketed by snow and cold temperatures. While the conditions are not ideal for our brave soldiers, we are undoubtedly better prepared to survive than the fascist invaders! Our soldiers are from Europe, Central Asia, and even the far eastern lands of Siberia.\n\nAll of them have endured harsh winters like these, and our troops are prepared for any freezing temperatures that may be thrown at them. As our enemies freeze to death and are completely unprepared, all they can do is push deeper into our territory, causing them to be stuck dying in their own foxholes! The winter will bring their attack to an end."
 SOV_Global_Winter.2.A: "General Winter has our back!"

 # Socialist Competition
 SOV_Socialist_Competition.1.t: "Socialist Competition"
 SOV_Socialist_Competition.1.d: "The Socialist Competition, first devised by Vladimir Lenin, was an integral part of the Soviet Union and its economy, encouraging worker efficiency and exceeding quotas. Its use has grown in importance since the implementation of the First and Second Five Year Plans, with the State Planning Committee, led by the Politburo, expanding and encouraging competition among the Union's factories, mines, and kolkhozes.\n\nUnlike capitalist competition, which benefits only the greed of wealthy factory workers, socialist competition ensures that the workers, at its core, receive all profits through the Soviet state as a conduit. The competition winners, as well as Soviet citizens who exceed their quotas, are frequently rewarded with pay raises, medals, and hailed as proletarian heroes. Through such a method, state industry can be driven by consistent competition among workers and enterprises."
 SOV_Socialist_Competition.1.A: "Rewards often truly do go a long way."
 SOV_Socialist_Competition.2.t: "Socialist Competition of [GetYear]"
 SOV_Socialist_Competition.2.d: "Preparations are underway for the annual Socialist Competition ceremony, which will recognise and celebrate the past year's achievements. Across the Union, factories, mines, shipyards, collectives, and other industries have submitted production reports, which are now being reviewed by Party commissions.\n\nSoon, one sector will be declared victorious, whether it is the steelworkers of the Urals, the oilmen of Baku, or the miners of Donbas. The outcome will set the tone for the next cycle of work, encouraging increased productivity across all sectors of the economy. All of our proletarian comrades are encouraged to follow the example of the victors in the coming year. Allow their success to be the benchmark against which all labour is measured."
 SOV_Socialist_Competition.2.A: "Glory to the Working People!"
 SOV_Socialist_Competition.3.t: "Izotov Movement"
 SOV_Socialist_Competition.3.d: "Nikita Alekseevich Izotov, a coal miner from the Orel Oblast of the RSFSR, has consistently set several astounding records at his \"Kochegarka\" No. 1 coal mine, exceeding his quota several times in 1932, first by 562% in January, then by 558% in May, and finally by an absolutely astounding 2000% in June, mining 607 tonnes of coal in a single 6-hour shift. On May 11th, 1932, he personally published an article in the newspaper \"Pravda\" detailing his experiences working in a coal mine and describing what is known as the \"Izotov Method\" of coal mining, which is based on thorough study of the coal seam, the ability to quickly mount mine workings, a clear organisation of labour, and tool maintenance.\n\nNews of his accomplishments quickly spread throughout the Union, igniting the \"Izotov Movement,\" a worker's movement among coal miners dedicated to using and learning Izotov's methods to increase coal production. In December 1932, a \"Izotov School\" was established at the site of the \"Kochegarka\" No. 1 mine, where Izotov would personally lead daily briefings and teach the workers advanced coal mining techniques.\n\nThe movement is still going strong today, and Izotov is regarded as a socialist labour hero, having received the Order of Lenin and the Order of the Red Banner of Labour for his achievements. More and more \"Izotov Schools\" are popping up across the country, and coal mines are quickly adopting the \"Izotov Method\". Soviet coal production has since skyrocketed, and coal miners' morale is at an all-time high."
 SOV_Socialist_Competition.3.A: "Comrade Izotov is truly an inspiration to us all!"
 SOV_Socialist_Competition.4.t: "Vinogradov Movement"
 SOV_Socialist_Competition.4.d: "It has long been customary in the Soviet Union's textile manufacturing plants and weaving factories to cram as many factory machines as possible into the buildings and service them with a small team of employees. While this reduces costs for the same production rate, it also significantly exhausts textile workers. Nonetheless, many, thanks to their socialist spirit and firm belief in Comrade Stalin's leadership, overcome all workplace difficulties and even set records. Weavers E. Vinogradova and V. Sandalova recently set a new record by beginning to service 70 machines on their own with a small team.\n\nIn the coming months, they will set new records by servicing 100 and 144 machines. This has sparked a full-fledged efficiency movement among textile workers, with workers striving to service as many machines as possible with the smallest team possible. Given that this reduces textile production costs and increases efficiency, the Soviet government has fully agreed to support the Vinogradov movement. Vinogradov factories have begun implementing a \"third\" night shift to increase production as fewer workers are required to meet quotas.\n\nWeavers in factories adhering to the Vinogradov movement have also seen significantly increased pay, with the factories able to use increased funds from the Vinogradov efficiency for pay raises. Record-breaking weavers can earn up to 1200 rubles per month, which is a fortune by any standard. The Vinogradov movement demonstrates that socialism can unite workers under one banner while increasing efficiency, quality, and workplace happiness to previously unheard-of levels."
 SOV_Socialist_Competition.4.A: "We must give thanks to Comrade Stalin for his wise guidance!"
 SOV_Socialist_Competition.5.t: "Stakhonavite Movement"
 SOV_Socialist_Competition.5.d: "Alexey Stakhanov, a coal miner from the Orel Oblast, recently rose to prominence throughout the Soviet Union after breaking a record by mining an incredible 102 tonnes of coal in a single shift, completely exceeding his quota. This feat has been detailed and documented in newspapers across all SSRs, including one of the largest, \"Pravda\". Workers across the union are taking inspiration from Comrade Stakhanov and aiming to increase their efficiency at work and consistently exceed their quotas through sheer hard work.\n\nGiven that increased efficiency could only be beneficial, the Council of People's Commissars has agreed to sponsor such actions and encourage higher quotas, as well as make Stakhanov a propaganda figure, documenting him touring mines and speaking with admirers. Comrade Stakhanov's feat has thus spawned a whole movement, with workers calling themselves \"Stakhanovites\" because they consistently strive to give 110% to their jobs and consistently exceed quotas.\n\nThis has significantly increased our union's industrial and mining output, particularly in the coal mining sector, and Comrade Stakhanov has been awarded the Order of Lenin for his efforts in making this happen."
 SOV_Socialist_Competition.5.A: "The worker's of the union labor evermore tirelessly for its benefit!"
 SOV_Socialist_Competition.7.t: "International Worker's Day Celebrations Commence"
 SOV_Socialist_Competition.7.d: "[FROM.GetNewsIcon]A grand spectacle was held in Moscow to commemorate May 1st, International Worker's Day. As always, the day was a national holiday, with no school or work attendance. Meanwhile, a grand parade was held in Moscow. Tens of thousands of soldiers, hundreds of tanks, vehicles, and artillery pieces march through Red Square, with massive portraits of Lenin and Marx overlooking the power of their creation. Comrade Stalin personally observed the parade, saluting the troops from Lenin's Mausoleum alongside the Politburo while listening to the crowds' cheers and the roar of military planes flying overhead.\n\nTens of thousands of civilians attended the parade, waving Soviet flags and communist banners, while top-tier military equipment was on full display. The motherland's boundless strength was on display during the parade, both in celebration of the workers and as a warning to potential aggressors who sought to destroy the USSR's socialist paradise."
 SOV_Socialist_Competition.7.A: "Slava CCCP!"

 # Red Vanguard Events
 SOV_Red_Vanguard_GER.1.t: "Militant Separatists Arrested During Attack"
 SOV_Red_Vanguard_GER.1.d: "Terror has broken out in the capital! Several hours ago, armed gunmen launched a direct assault on one of our government offices. The group overpowered the guards stationed outside and broke in with brute force. They apparently searched the grounds for any high-ranking government officials within the building but were unsuccessful. Changing their strategy, they attempted to take hostages instead, resulting in an eventual standoff with police.\n\nAs they were rounding up the staff, a fortunate break occurred for our workers: a nearby police officer noticed the commotion and, having received army training during the war, managed to disarm and apprehend the entire group. Such a heroic action was praised and turned into a major news story. However, the question remains in the minds of our citizens: why would criminals do this? This was answered, oddly enough, by the gunmen themselves, who, after being apprehended, were surprisingly vocal about their reasonings - but their motive was as strange as their crime.\n\nAccording to their story, the entire purpose of this was to assassinate those in the government cabinet, plunge the country into anarchy, and then 'free the workers of Central Europe by inspiring those in the old states before the Austro-Hungarian Empire and Germany's unification to have revolutions of their own'. Essentially, the men believed they could inspire local communist revolutions in the aftermath of Germany's postwar division, and that the borders would become a revolutionary version of those that existed before the Second Reich. The gunmen have been imprisoned, but the attack has left some wondering who would fund such a strangely aligned organisation."
 SOV_Red_Vanguard_GER.1.A: "If it's the Soviets, they overestimate their capabilities."

 SOV_Red_Vanguard_GER.2.t: "The Red March"
 SOV_Red_Vanguard_GER.2.d: "Our good nation's government has had an unusual day. When most of us - and most of our citizens - awoke today in the capital, the sun was shining and it was a completely ordinary morning. That was when the sound of marching began, off in the distance. It was barely audible at first, but as time passed, it became clear that a thousand or more demonstrators were slowly approaching from the countryside, like ghosts from a bygone era. Men, women, young and old descended on the city centre, all dressed in red.\n\nThis colour was not coincidental; between indistinguishable personal shouts, the Internationale was loudly sung, and the marchers' signs were mostly sickles and hammers. Police attempted to control the crowd, but the demonstrators ignored everything they said. They marched through the barricades, repeating their chants and singing their songs, as if we were being attacked by the spirits of previous revolutions.\nThe few marchers who were apprehended and detained haven't said anything about their purpose or cause, instead staring blankly at their interrogators in an unsettling way. The most popular theory is that this was all a Soviet operation, with them organising agents and local sympathisers throughout the country, outfitting them with uniforms, and then leading them on a nationwide march. Regardless, as the army marched on to the next town, the city was eventually cleared as if nothing had happened, with the exception of some pamphlets supporting a communist revolution."
 SOV_Red_Vanguard_GER.2.A: "...and then they were gone."

 SOV_Red_Vanguard_GER.3.t: "A Visionary of the Wrong Sort"
 SOV_Red_Vanguard_GER.3.d: "\"When the workers run this state and we are free of capitalism, I promise you that the world will experience unprecedented progress! Without a boss or a politician trying to sell or hide the cure to a disease for profit, everyone, from the youngest rural boy to the oldest city woman, will have it right away. We will have cars that can travel at unrivalled speeds, as well as communications that will allow you to speak with a friend on the other side of the world! All this, and more. All I need from you is to fight for it\"\n\nThese hopeful but seditious words concluded a speech shouted by a man with an odd, non-German accent. Taking place in the centre of a town near but not within our capital, he drew a crowd of over 50 people to hear him speak at length about his future vision. He spoke of grand inventions and solutions to everyday problems, and the audience was captivated, as if they were listening to a preacher - only this man was preaching revolution rather than the word of God.\n\nHe emphasised one point over all while confusing our good citizens with impossibilities: every problem could be solved in a communist state. Only without capitalism could these grand visions be realised here, the man yelled. Of course, as good a speechwriter as he was, words would not protect him. The mayor of the town quickly dispatched the police, much to our relief, as it was long past time for these hypnotised citizens to return to work - and even more so for this suspected Soviet agent to be arrested. As he was handcuffed, he shouted one last thing before being taken to interrogation: \"See?! They do not want our innovative utopia to come true!\""
 SOV_Red_Vanguard_GER.3.A: "No, we don't."

 SOV_Red_Vanguard_FRA.1.t: "Communists Infiltrate the Far-Left"
 SOV_Red_Vanguard_FRA.1.d: "A concerningly large crackdown on far-left parties has been ordered today across France, but primarily in Paris. Across the country, those found to be Soviet sympathisers or French communists have been detained for questioning or arrested for treason against France. This comes after the same parties began to make concerning overtures to the USSR, with some politicians even outright saying that the Soviets would make far better allies than both Britain and the United States - and one even being discovered to own a hand-written list of wealthy business owners throughout France who would 'have to be removed' if a 'Third French Revolution' occurred.\n\nFurthermore, many of our working class - or, at least, those who were initially thought to be working class before being discovered to have never been seen by anyone and are now thought to be spies - have been caught putting up an alarmingly large number of political posters in shopfronts and alleyways alike, promoting nothing less than communist ideals. This subtle - and sometimes not so subtle - propaganda has transformed moderate leftists into revolutionaries, and France, while mostly stable, has experienced a significant shift towards communism as a result.\n\nThis all happened, most horrifyingly, in a single month, prompting the harsh police response. At least now, it is hoped that we can restore order with no suspicious foreign influence reigning over France. However, in the absence of leftists, the right has gained traction, and they are quick to blame everything on a Soviet spy operation. Unfortunately, one suspects they may not be too far off."
 SOV_Red_Vanguard_FRA.1.A: "We do not need more Robespierres right now!"

 SOV_Red_Vanguard_FRA.2.t: "The Lyon Arsonist"
 SOV_Red_Vanguard_FRA.2.d: "Lyon is on edge after multiple homes suddenly and inexplicably caught fire in the last few weeks, either burning down or requiring rescue by local firefighters. No deaths have been reported, but the fires caused numerous injuries and cost a shocking few million francs in repairs. This was because all of the houses that caught fire had one thing in common: they were all in upper-class neighbourhoods and could best be described as mansions.\n\nThe wealthy owners of the mansions were rightfully outraged by the loss of their property and demanded that the police thoroughly investigate the matter because 'our specific houses could not all spontaneously combust, could they?' Unfortunately, they were correct. Eventually, police used eyewitness reports, muddy boot tracks and a phone call from a concerned pub patron who overheard a conversation about setting things on fire right before the fires to arrest Joseph Percy, a man with no criminal record but a long history with the French Communist Party.\n\nMr. Percy was detained for questioning and quickly broke down, claiming he 'intended to burn down the palaces of excess' and 'char the rich to dust within their homes'. He was later arrested on multiple charges of arson; however, the issue remains that he could not have set fire to all of the homes at the same time. He didn't reveal who his partners were, but the police suspect the Soviet Union of providing him with the resources. Mr. Percy, a middle-class man, could not have afforded the equipment and team required to carry out this many crimes."
 SOV_Red_Vanguard_FRA.2.A: "Were these more uncivilized times, we would've burned HIM at the stake!"

 SOV_Red_Vanguard_FRA.3.t: "The Strange Case of Oiseauette Boulanger"
 SOV_Red_Vanguard_FRA.3.d: "One month ago, Oiseauette Boulanger, one of the first female MPs in the French Parliament, representing the PCF in the Gironde constituency, went missing shortly after leaving the Palais Bourbon. Police launched an investigation; losing a member of government is not easy, but no evidence or contact was established. Eyewitnesses claimed to have seen her willingly get into a black car outside her flat that night, but these reports were dismissed as hearsay.\n\nHowever, this is not the most concerning aspect; rather, she was carrying critical documents such as military designs, a detailed census of French citizens' political ideologies, and more. These, along with her, have vanished into the hands of unknown forces. Today, however, she returned to the National Assembly as if nothing had occurred. Police spoke with her, but she was nonchalant and quiet, claiming that she had never had any documents and that someone else must have them, which is obviously false. \n\nIt's a strange event, with Ms. Boulanger missing for a month and ignoring what appeared to be a kidnapping. The leading theory from the left is that she was kidnapped and forced to remain silent about what happened, most likely due to a threat to her life. The right, on the other hand, believes she is part of a conspiracy to leak information to the Soviet Union while portraying herself as a victim of crime - and that she, as a militant communist, orchestrated the entire operation. Regardless of what one believes, Oiseauette appears unwilling to comment on the matter and has returned to her post, leaving her coworkers uneasy."
 SOV_Red_Vanguard_FRA.3.A: "Put a police watch on her - for her safety AND ours."

 SOV_Red_Vanguard_ITA.1.t: "Workers March in the South"
 SOV_Red_Vanguard_ITA.1.d: "Today's Mezzogiorno brings troubling news: a large number of Italian workers have begun to march in support of 'worker's solidarity', a term that, while not technically seditious, is also fairly socialist-aligned. It has long been known that Northern Italy is generally better off than the South, with the majority of Italian poverty occurring there, but any dissent there is usually caused by single individuals who can be easily apprehended by the police.\n\nThis new form of protest is surprisingly well-funded and effective, with a large group of people who have inspired others to join in, and it has forced the South's factories to halt production because too many workers have left to march for anything to be done. While not an official strike, it is having much the same effect as one, with the exception that these workers do not have specific demands to which we can agree or disagree; for the time being, they are simply marching to make their presence known.\n\nBetween the signs calling for the end of poverty, the demands for equal opportunity, and the simple demands to be seen and heard, there are symbols that concern us. While the majority of these people are simply disgruntled workers who want to make their efforts known, the hammer and sickle can be seen like a poisonous shadow, with signs with it drawn dodging in and out between protestors, confusing us as to who is raising them. While we don't know if the communists funded or took advantage of this event, they're out there and spreading."
 SOV_Red_Vanguard_ITA.1.A: "The Red Menace is, quite literally, on the march."

 SOV_Red_Vanguard_ITA.2.t: "Trading Ship Sunk Off Coast of Genoa"
 SOV_Red_Vanguard_ITA.2.d: "We received troubling news today about an incident off the coast of Genoa, a northeastern port city. An armed group reportedly boarded a vessel believed to be on its way to the United States after being approached by a smaller ship. The ship was carrying valuable items, mostly expensive clothing intended for celebrities or models - coats, hats, etc.\n\nOne would expect the criminals to steal these fine accessories, but instead they burned them with a lighter, igniting a fuel line. Shortly after, the engine exploded, causing the boat to sink into the Tyrrhenian. Fortunately, the crew was apprehended rather than left to die, and the coast guard moved quickly to apprehend the criminals. Following a tense hostage situation that injured one crew member, the group was arrested.\n\nWhile all of this is terrifying, the reason for the sinking could be an Italian national security concern. While questioning one of the hostages, police discovered an intriguing piece of evidence: when he repeatedly asked one of the pirates why they were doing all of this, one reportedly replied, \"to show the bourgeoisie capitalists what we think of their fancy lives.\" This is already concerning: the group not only attacked a shipping vessel, but they appear to be communists. We've also traced the boat they used to approach the convoy back to the USSR, which has resulted in an exponential increase in tensions between our countries."
 SOV_Red_Vanguard_ITA.2.A: "Why would the Soviets care about our clothes?"

 SOV_Red_Vanguard_ITA.3.t: "The Venetian \"Revolution\""
 SOV_Red_Vanguard_ITA.3.d: "A strange and somewhat amusing story has emerged from the city of Venice and reached our ears. Last week, a small but significant number of gondolier men and women began shouting down the canals that Venice had become an independent nation. Obviously, this was not true; this group was not armed, nor were they well-known or influential. The majority of the rabble was mocked and laughed off the water until they walked home ashamed, but the strangeness of it all prompted an investigation. Venice hasn't been independent since 1797, for starters. Napoleon and then the Austrians destroyed the concept of freedom, and the Lion of Saint Mark was the last party to spread similar ideas in 1921.\n\nThere was no real impact on Venice, other than it being remembered as a strange day for the town and its residents. There is an interesting fact about this that has not yet been stated: for some reason, these people intended to formalise this new Venetian government under Stalinism. Yes, in between the cries of \"Free Venice,\" the same voices yelled \"Hang the Capitalists\" and when questioned, the revolutionary gondoliers were openly supportive of the USSR.\n\nOne woman who drove one of the boats told us that \"the Russian Revolution was one of the greatest things to happen in history, and an Italian Revolution of the same nature and force should happen here for the good of our many working class.\" Their intentions are questionable at best, and we have ordered that they be closely monitored from now on."
 SOV_Red_Vanguard_ITA.3.A: "Revolution? Have they tried electroconvulsive therapy?"

 SOV_Red_Vanguard_ENG.1.t: "Red Versus Purple"
 SOV_Red_Vanguard_ENG.1.d: "Today, in the streets of London, local police arrested a group of young men who appeared to be attempting to paint anti-monarchy phrases on the sides of local buildings, as well as splashing red paint on the windows of many government members' homes. How they obtained these addresses is extremely suspicious, and the same government officials who had their homes vandalised have become visibly alarmed in their speech and demeanour during meetings.\n\nThey insisted on further investigation; we agreed, and to our surprise, we discovered suspicious activity. For a group of random young rabblerousers who have never held a high-paying job, the amount of money they currently have and have already spent on their efforts suggests a strangely well-funded operation, leaving us to wonder who is funding such destablising propaganda.\n\nIn interrogation, the socialists - if they are that, and not something worse - have been strangely silent, while the generic tactics used by police have been wildly and concerningly ineffective as if they have been trained to refute these strategies. Regardless, we will detain these dissenters for as long as possible in the hopes that one of them will reveal where they were receiving support from - though some have already pointed fingers at the Soviet Union. As we clean up and paint over 'Down with the King', 'Send the Empire off to Death', and 'Hang the Imperialists', it's clear that we've won this round, but now we're all wondering what they'll try next."
 SOV_Red_Vanguard_ENG.1.A: "That's one point for King and Country!"

 SOV_Red_Vanguard_ENG.2.t: "Planned Hit on an MP Stopped"
 SOV_Red_Vanguard_ENG.2.d: "A tip from a concerned neighbour last night prompted a full-fledged investigation into the activities of four men and one woman from Bristol, all of whom appeared to be planning to assassinate a member of parliament next Thursday. The well-intentioned citizen had contacted local police, unsure if her concerns were warranted but \"too concerned to not say anything,\" as she stated. Over the last few weeks, she claims she has heard people entering and exiting her neighbor's house at all hours of the night.\n\nAs a light sleeper, this woke her up several times before she noticed what was going on. After spotting what she believed to be a weapon she reported the suspicious behaviour. Following a quick raid, the local police discovered detailed plans, pictures, and weapons that revealed the clear plot and intended target of this heinous plot: a rising Conservative who has recently taken a harder line against the Soviet Union above all else. The conservative would have apparently been shot point blank during a planned local speech, and the other four conspirators would have started a riot nearby in support of 'worker's solidarity'. Obviously, with all ringleaders apprehended, none of this will happen.\n\nThe MP in question has thanked and promised more support for the police, as well as increased anti-communist rhetoric, with the event actually increasing his popularity and strengthening opposition to the Soviets. He is expected to continue to succeed in his career, while his would-be killers will almost certainly be convicted of attempted murder in the coming days."
 SOV_Red_Vanguard_ENG.2.A: "That neighbor deserves an award!"

 SOV_Red_Vanguard_ENG.3.t: "Scottish Communists Spread Independence Propaganda"
 SOV_Red_Vanguard_ENG.3.d: "A group of Scottish nationalists were apprehended in Glasgow today for distributing leaflets advocating for Scotland's full independence under a communist government 'crafted by the hands of Scottish workers and Scottish workers alone'. Fortunately, nobody seemed to be impressed by these buffoons, and a number of people turned the local constables on them rather than supporting their cause. Regardless of the actual effectiveness - or ineffectiveness - of this display, nothing like it has ever been seen in our history.\n\nTo see what is essentially our ideological opposite openly promoting themselves on the street is concerning at best, and a direct threat to us and our country's security at worst. But the story doesn't end there. Local police discovered that they have no records of these propagandists, or at least of any names they used to identify themselves, implying that they are most likely providing us with fake identification. Police then tried standard procedure to get them to reveal their true names, but failed spectacularly. The incident has quickly become a media firestorm, with the media spinning the story to portray the secessionists as nothing less than Soviet agents.\n\nThis was obviously dismissed by us until MI6 frightfully stated that they might be correct, as their subsequent investigation revealed that each of the pamphleteers, after learning their true names, had some form of connection to the USSR, whether through family or more dubious means. We are still investigating this, but the fact remains that something is going on in our country."
 SOV_Red_Vanguard_ENG.3.A: "At least we now know the true identities of these parasites!"

 SOV_Red_Dawn.1.t: "Beneš Submits to Moscow"
 SOV_Red_Dawn.1.d: "[FROM.GetNewsIcon]President Edvard Beneš has announced a sweeping reshuffle of the Czechoslovak government in response to mounting pressure from the Soviet Union and the Czechoslovak Communist Party. Beneš reluctantly appointed a new cabinet comprised entirely of Communist or pro-Communist figures, effectively bringing the government under KSČ control.\n\nThe resignation crisis, which began as a protest against Communist control of the Ministry of Interior and its increasingly oppressive policies, quickly escalated into a political standoff. Beneš faced difficult decisions due to his isolation and the presence of Soviet troops near the eastern border. With little hope of Western intervention, the President accepted Communist demands today, thereby legitimising the new government led by Prime Minister Klement Gottwald.\n\nAs the new government was announced, Communist-aligned \"people's militias\" staged massive demonstrations in Prague's streets. Radio Prague broadcast triumphant speeches hailing the \"working people's victory\", while non-Communist sources reported fear and uncertainty. International observers now consider Czechoslovakia to be firmly within the Soviet sphere, with some even claiming that the country was the victim of a political coup, which effectively ended the country's renowned status as the only Western democracy in Eastern Europe."
 SOV_Red_Dawn.1.A: "Yet another nation carries out the will of the workers!"
 SOV_Red_Dawn.1.B: "Soviet power is growing..."
 SOV_BENES_SUBMITS_TO_MOSCOW_TT: "Beneš has submitted to §YMoscow§!."

 SOV_Red_Dawn.2.t: "Jan Masaryk found dead!"
 SOV_Red_Dawn.2.d: "[FROM.GetNewsIcon]Czechoslovakia is in shock and confusion as news spreads of Foreign Minister Jan Masaryk's sudden and suspicious death. Masaryk, widely regarded as a symbol of democratic hope and the son of Czechoslovakia's founding president, was discovered dead beneath the window of his apartment. Authorities claim that he \"fell\" from his bathroom window in an apparent suicide, but rumours of foul play, possibly by Soviet agents, are already circulating both at home and abroad.\n\nMasaryk, known for his firm but cautious resistance to communist influence, became increasingly isolated due to the growing influence of the Communist Party of Czechoslovakia. His death marks the removal of one of the country's last prominent noncommunist officials. The KSČ promptly appointed Vladimír Clementis, a communist loyalist, as Masaryk's successor. The move solidifies KSČ's control over Czechoslovakia's foreign policy, firmly anchoring the country in the Eastern Bloc and pushing it away from the Western ideals it once held."
 SOV_Red_Dawn.2.A: "An unfortunate accident, one that worked in our favor."
 SOV_Red_Dawn.2.B: "The Russians are definitely involved."

 SOV_Red_Dawn.6.t: "Evropeyskiy Kommunizm"
 SOV_Red_Dawn.6.d: "FOR POLITBURO'S EYES ONLY\n\nState Security Services have launched Operation \"Red Vanguard\", a prelude to Operation \"Red Dawn\", in accordance with the Central Committee of the Communist Party of the Soviet Union's directives and with Comrade General Secretary's personal authorisation. This operation aims to destabilise and weaken Western Europe's capitalist regimes in preparation for the upcoming liberation campaign.\n\nOur resident agents have successfully communicated with the leaders of major communist parties in France, Italy, West Germany, and the Low Countries. Material and financial support has been discreetly transferred through trusted intermediaries, with instructions to increase propaganda efforts, organise mass strikes, and undermine public trust in reactionary governments.\n\nIn the meantime, covert arms shipments have been delivered to communist guerrilla formations in the countryside and industrial areas. Partisan cadres are receiving accelerated training in sabotage, intelligence gathering, and urban warfare from our security advisors. When Operation \"Red Dawn\" begins, these networks will start uprisings behind enemy lines, disrupt enemy communications, and seize critical infrastructure to help the Red Army advance. All efforts are strictly clandestine. Any compromise in these preparations will result in severe consequences."
 SOV_Red_Dawn.6.A: "The West doesn't know what's coming to them..."

 SOV_Red_Dawn.7.t: "The Proletariat Triumphant"
 SOV_Red_Dawn.7.d: "[FROM.GetNewsIcon]Soviet forces completed Operation \"Red Dawn\" in a stunning and rapid military campaign, establishing complete control over continental Europe. Red Army and Air Force divisions, backed by local communist collaborators and guerrilla uprisings, swept through France, Italy, West Germany, and the Low Countries with efficiency and speed unparalleled since the German invasions. During the collapse of democratic governments and the evacuation of key political figures, communist administrations have been installed in all major European capitals. The Kremlin announced today the formal integration of these new \"People's Democracies\" into the growing sphere of socialist nations aligned with Moscow, with the Soviet General Secretary hailing the victory as a \"historic victory of the proletariat over the forces of imperialism.\"\n\nFollowing this sweeping conquest, the Soviet Union announced the launch of the Fourth Five-Year Plan, which has been expanded to include the reconstruction and transformation of Europe on socialist principles. Soviet planners outline massive projects, including the collectivisation of European agriculture, the nationalisation of key industries, and the reconstruction of war-torn cities as \"socialist model societies\". Major infrastructure projects, such as pan-European rail networks and hydroelectric dams, are already underway. Moscow promises a new era of peace and prosperity under the banner of \"scientific socialism\".\n\nWashington now stands as the last bastion of democracy."
 SOV_Red_Dawn.7.A: "Now onto World Communism!"
 SOV_Red_Dawn.7.B: "Now onto World Communism!"
 SOV_Red_Dawn.7.C: "Oh Dear God..."

 ##################################
 # Soviet Post-Unthinkable Content
 ##################################

 # Soviet Civil War Event Chain
 Soviet_Civil_War_Leadup.1.t: "REPORT ON REVOLUTIONARY ACTIVITY"
 Soviet_Civil_War_Leadup.1.d: "Comrade Chairman, a national bloodbath has begun and appears unlikely to end anytime soon. I'll speak plainly, if only because nothing can be hidden any longer. We have been completely and unequivocally defeated. Everything east of the Urals has fallen to Bunyachenko's 'Russian Republic' and the rest of our great country is in uproar. Stalin is no longer alive, and most people now spit on the name of the man they once revered. Every major city, every single city in our union, including some of the poorer districts of the capital, is currently beyond our control. In most parts of the country, party officials have defected or gone underground; those who were too slow or too proud have quickly found themselves on the wrong end of a firing squad, if they are lucky. Suffice it to say, our authority is limited to any gun that swears allegiance to us.\n\nFor what it's worth, Zhukov has refused orders to use the Red Army to crush the insurgents. Instead, he has declared that the Army \"stands with the people,\" whatever that means, and will do what is best for them. We interpret this to mean that he will wait until the power struggle within our Union is over before pledging to whoever wins. Some Army units have pledged their allegiance to us over him, but they are far from sufficient to reestablish control over the entire Union. A civil war appears to be unavoidable. This report contains no recommendations. There isn't much else that can be done. Good luck sir, and may God save us in the next life."
 Soviet_Civil_War_Leadup.1.A: "We have been damned for his sins."

 Soviet_Civil_War_Leadup.2.t: "An End to All Things"
 Soviet_Civil_War_Leadup.2.d: "Rage. Rage erupted in the Man of Steel. It consumed him more than it ever had before. There was chaos in his capital, his new capital. Men and women were killed on the streets for scraps, the Army is shooting anyone they perceive as a threat, and vultures are circling.\n\n\"Khruschev, Malenkov, Beria, Molotov, and even Zhukov! The entire brood is waiting for the right moment to strike. They'll no doubt want to drag me to court for some kangaroo trial and then shoot me like the dog they think I am. Rats who are ungrateful! I was the one who saved the Union from the Hitlerite threat! I transformed a backwards farming nation into an industrial superpower! Now they want to undo everything Lenin and I accomplished? This is worse than treason, this is barbarism!\"\n\nHe slammed his fist on his desk, causing it to shudder. He needed to do something to save himself, but he also knew there was nothing he could do. He had no allies left, only angry, vengeful enemies. He was trapped and had no way out. Or did he? A serene calm overtook the General Secretary as a previously unthinkable idea entered his mind. He knew exactly what he had to do. He opened a desk drawer and discovered an M1895 Nagant inside. He'd had it since his days as a Georgia gangster. It got him through the Civil War and he kept it as a memento. Now it has one final task.\n\nHe had one final smug thought as he picked up the weapon and looked at it, breathing heavily from the weight of what he was about to do. \"If they want a trial, they can accuse my corpse,\" he said before sticking the barrel in his mouth and pulling the trigger."
 Soviet_Civil_War_Leadup.2.A: "The shot heard around the world."

 Soviet_Civil_War_Leadup.3.t: "Deja Vu"
 Soviet_Civil_War_Leadup.3.d: "Malenkov, Khrushchev, Beria, and Zhukov stood on the rim of a crater, watching a body burn inside. Malenkov discovered him slumped in his chair; Khrushchev and Beria had arranged for this hasty cremation, and Zhukov had made certain that no one else was aware of it. They were the only four people on the planet who knew about Stalin's death, particularly how he died. They wouldn't be alone for long, though. The four of them would have to break the news at some point, but how they would do so is debatable.\n\nMalenkov and Beria desired a brief statement stating that he died in his sleep. They would then appoint Malenkov as his successor, as named in Stalin's will, which all four knew did not exist. Meanwhile, Khrushchev and, to a lesser extent, Zhukov wanted to tell the people Stalin had committed suicide, denounce him as a traitor, and seize the one-time opportunity to reverse Stalinism's terror and inefficiency.\n\nThe impromptu funeral began to disintegrate as the smoke began to stink. Zhukov was the first to depart. The Army was mutinous, and his absence felt like a dereliction of duty. Then Beria left to add more names to his ever-expanding list. Malenkov and Khrushchev exchanged glances before going their separate ways. Cronies needed to be mobilised, propaganda was printed, and people were swayed. There was no time to waste if either of them had their own vision of the future realised, especially on something as frivolous as old friends."
 Soviet_Civil_War_Leadup.3.A: "And so the gears turn."

 Soviet_Civil_War_Leadup.4.t: "Light the Match"
 Soviet_Civil_War_Leadup.4.d: "Khrushchev has been on a three-week'morale-boosting tour' of the countryside. Zhukov has not returned his calls. Malenkov was becoming concerned about what they were up to. The Praesidium had become increasingly tense in recent weeks, and the Army had become increasingly belligerent and fractious. As the Union's remnants burned, their potential saviours tore themselves apart. Malenkov hoped to move quickly and seize control of Kruschev and Zhukov. With a united political front, the chaos could be quickly contained. That was looking increasingly unlikely. Malenkov determined that he needed to act quickly. Every minute he waited put the Union in danger.\n\nHe picked up the phone and dialled Beria's number. Before the first ring was over, the NKVD leader picked up. \"Beria, we must act. Something is going on between Khrushchev and Zhukov. Find both of them and deal with them quietly.\"\n\n\"Certainly, sir. Khrushchev is already in Tyumen. Something bad could happen to him. Zhukov has gone dark, most likely on one of his bases where I am blind. But we'll get him eventually. Every rat has to see the sun, right?\" Beria replied.\n\n\"If anyone discovers what is going on, the whole thing could come crashing down. That is why I am urging you once more to do this quietly. Nobody who doesn't need to know will hear anything. Allow the agents to do their jobs and then deal with the agents yourself.\" Malenkov proposed. \"With due respect, sir, I do not require any advice. Stalin taught me how to do this sort of thing very well.\" Beria said before hanging up the phone. Malenkov hung up as well, but with more tenacity than Beria. He had no choice but to wait."
 Soviet_Civil_War_Leadup.4.A: "The die is cast."

 Soviet_Civil_War_Leadup.5.t: "The Conflagration"
 Soviet_Civil_War_Leadup.5.d: "As the fire behind them died down, Zhukov and Khrushchev sped down the street in their car. They had narrowly avoided another assassination attempt. Someone planted a bomb at a supposedly private meeting location. They were a little late, which was the only thing that kept them alive. In Tyumen, Khrushchev literally dodged a bullet, and Zhukov had already put down two attempts by conscripts to lynch him. Both were aware of who was behind these attacks. They were both aware of what this meant. They arrived quickly at a military base outside of Omsk where Zhukov had a staunchly loyalist garrison. The two men were quickly led in, and the base was secured. They had a lot of calls to make.\n\nAcross the Union, garrisons rose up against Malenkov and Beria over the next few hours and Zhukov or Khrushchev were immediately proclaimed by them as the new Premier. Others did so as part of a general rebellion, assuring their commander that they would declare their support for them soon. Others, presumed to be loyal, refused to rise for whatever reason. However, these mutinies were the spark that ignited the civilian populace.\n\nAs soon as word of the mutinies reached the cities, civilians began to rise. Mobs clashed in the streets, while Malenkovite and Zhukovist army units struggled to maintain order. Zhukov and Khrushchev issued a joint statement two hours after the first shots were fired, declaring Malenkov and Beria illegitimate and establishing their own government. Malenkov and Beria, in turn, declared them both traitors and demanded their execution. Russia was back in civil war, and only God knew how bad it would get."
 Soviet_Civil_War_Leadup.5.A: "For Stalin's Legacy!"
 Soviet_Civil_War_Leadup.5.B: "For the Future!"

 Soviet_Collapse.1.t: "Mass Desertions in the Army"
 Soviet_Collapse.1.d: "Comrades,\n\nThis memorandum is to inform you of a disaster unfolding across all operational sectors of the armed forces that remain loyal to the Union's legitimate government, which is headquartered in Sverdlovsk. What was once considered a morale issue has evolved into a complete breakdown of discipline, command structure, and fighting spirit. The Red Army, the people's shield and the Party's sword, is dissolving in front of our eyes.\n\nThe situation cannot be overstated. Desertions have reached previously unheard-of levels in our military history in just the last week. According to reliable estimates, over 110,000 men have deserted in the last two and a half weeks, with the rate increasing to several thousand per day. Entire corps have evaporated. Units on the Omsk and Far Northern fronts report command breakdowns so severe that operational orders are no longer transmitted or followed. Some commanders have defected to the traitorous clique in Novosibirsk.\n\nThe Air Force has been reduced to fragmented squadrons incapable of maintaining control over the skies. Fuel supplies are depleting, sometimes destroyed by retreating troops and sometimes stolen by mutineers. Deserters have seized logistics trains. Political departments across multiple army groups are no longer operational, and our own commissars report being ignored, threatened, or shot."
 Soviet_Collapse.1.A: "No! The Union can't die like this..."

 Soviet_Collapse.2.t: "Chaos in Sverdlovsk"
 Soviet_Collapse.2.d: "The smoke from the morning blast still hangs on the charred walls of the Council Chambers. Lavrentiy Beria, the architect of terror and the power behind the throne in Sverdlovsk, is dead after being ripped apart by an explosive device planted under his car. By the afternoon, the news had already spread throughout the city, with Malenkov's government unable to effectively prevent rumours from spreading or the remaining newspapers from publishing.\n\nThe event has thrown the city into a state of chaos. Georgy Malenkov, now without his capable steward and puppet master, appears to have abandoned all attempts at government administration, failing to command during meetings and locking himself in his chambers for hours or days at a time. Meanwhile, violence has erupted in Sverdlovsk. Beria's death has created a power vacuum within the NKVD remnants in the city, as well as the government itself. Looters have taken to the streets, ransacking shops and workplaces, attacking government officials, and closing factories during strikes. Meanwhile, the Red Army loyal to Malenkov and the Sverdlovsk government continues to disintegrate, with thousands of men leaving their posts and disappearing into the vast Siberian countryside."
 Soviet_Collapse.2.A: "This is truly the end..."

 Soviet_Collapse.3.t: "A Plea for Help"
 Soviet_Collapse.3.d: "Earlier this morning, the ROA High Command in Moscow received a coded telegram from a group of senior Red Army officers still holding out in Sverdlovsk. The message was brief, riddled with encryption errors, and obviously rushed. Its content was clear: they have lost control. With Beria assassinated and Malenkov either unwilling or unable to lead, the so-called legitimate Soviet government is in irreversible collapse.\n\nThe officers, some of whom had previously fought against our forces, are now pleading for help. They describe anarchy gripping the streets, military units disbanding, factory workers striking or fleeing, and marauding bands of deserters transforming the hinterlands into a patchwork of banditry and ruin. \"The Party is dead,\" the last line reads. \"But Russia may yet live.\"\n\nThis was yet another opportunity for the ROA to remove another communist stain from Russia's history, to expand the Russian State's territories eastward, and to have another industrial city and many of the Urals' rich resources under our control, all while facing little resistance and capturing the territory at the communists' invitation. Plans for the takeover have been drawn up, quickly dismissing any dissenters or cautious officers. We will enter those territories to restore order, then stay to reunite Russia and remove the stain of communism from the Urals."
 Soviet_Collapse.3.A: "\"Ready our divisions, gentlemen.\""

 Soviet_Collapse.4.t: "The Deathblow"
 Soviet_Collapse.4.d: "Colonel Pavel Obolensky stood looking out his apartment window as columns of men, tanks and trucks rolled down Sverdlovsk's Lenin Avenue, banners fluttered in the breeze. A grey, freezing mist hung low over the concrete sprawl of Sverdlovsk as the lead elements of the Russian Liberation Army appeared on the city's roads, their vehicles proudly flying the Russian State tricolour and the ROA's Blue Cross. The once-feared Red Army garrisons had vanished into the forests, surrendered, or were already quaking in preparation to join the ROA. Only scattered pockets of resistance remained, with some fanatical NKVD remnants taking up positions on rooftops and shooting down incoming forces with rifles and molotov cocktails. Their bodies are now strewn throughout the city.\n\nPavel was one of the officers who petitioned the Russian State to intervene and restore order in Sverdlovsk. Of course, they were all aware that once in the city, the ROA would not leave. Pavel questioned whether he had made the right decision as he watched a T-34 destroy the statue of Lenin in the city centre. However, he dismissed such thoughts. He stepped away from the window and began walking towards the government offices. He would continue to serve Russia, but not as a communist."
 Soviet_Collapse.4.A: "As the Union falls, the Russian tricolor flies proudly over the Urals."

 Soviet_Collapse.5.t: "The Liberation of the Urals"
 Soviet_Collapse.5.d: "[FROM.GetNewsIcon]The geopolitical power in what remains of the former USSR has shifted once more, as Russian Liberation Army soldiers, under orders from Bunyachenko, entered and occupied the territories of the Sverdlovsk Government - one of the two rump governments claiming to be the legitimate successor of the USSR. The territories of the Sverdlovsk government had been plagued by anarchy and instability as a result of mass troop desertions and the assassination of Lavrentyi Beria, allowing for a swift occupation by the ROA's battle-hardened and well-armed forces. Shortly after the occupation of strategic areas, the annexation of the Sverdlovsk territories into the Russian State was announced.\n\nLocal civilians in Sverdlovsk and Chelyabinsk greeted arriving tank columns with flowers, and statues of Lenin across the territory are being torn down, while the old Soviet Union's hammer and sickle flags lie discarded in the street, replaced by the Russian State's towering white-blue-red tricolour. Former Red Army soldiers and officers are already handing in their weapons and queuing up to join the Russian Liberation Army, voluntarily or not. Meanwhile, Georgy Malenkov and other members of his government have been arrested and transported to Moscow for detention and trial."
 Soviet_Collapse.5.A: "More importantly, the Urals are now at our disposal."
 Soviet_Collapse.5.B: "Our great enemy has been replaced with an even greater one."
 Soviet_Collapse.5.C: "Yet another capitalist victory."
 Soviet_Collapse.5.D: "Interesting Developments..."

 Soviet_Collapse.6.t: "The Gulags Go Silent"
 Soviet_Collapse.6.d: "Concerning news has come in from the Gulags on our territory. More specifically, the complete lack of news from those Gulags is what causes concern. For several days, the majority of guard commanders in the Trainsbaikal region's many corrective labour camps have not delivered their reports on the status of their camps and prisoners - not even a single telegram from the least remote of the camps. Subsequent attempts to contact the camps have failed, with telegrams, phone calls, and human messengers all going unanswered.\n\nAlthough not an existential threat, this development is extremely concerning. To have almost the entire Gulag system of the Transbaikal territories go silent as if in an instant is a megalithic anomaly, and it could signal an event far more dangerous than a lack of communications: a Siberian-wide prisoner revolt, if such a thing is even possible."
 Soviet_Collapse.6.A: "Re-establish contact immediately!"

 Soviet_Collapse.7.t: "Infighting in the Army"
 Soviet_Collapse.7.d: "To: Marshal G. K. Zhukov, Supreme Commander of the Armed Forces\n\nComrade Marshal,\n\nAt 0430 hours yesterday, elements of the 212th, 319th, 517th, and 457th Penal Battalions launched coordinated acts of insurrection against the Novosibirsk Military Command. The outbreak began in the city's southeastern outskirts, where guards reported sustained gunfire and explosions near Munitions Depot 3. Simultaneously, within the city limits, a group of 212th mutineers attempted to seize an armoury near District 4. The urban fighting between the defectors and local garrison troops from the 97th Rifle Division lasted nearly five hours, with the enemy eventually repelled and the remaining members either captured or fleeing into the countryside.\n\nDeserters were seen setting up ambushes along known patrol routes in the forests, sparking engagements. These groups, estimated to number between 200 and 250 armed men, were cornered by elements of the 13th Infantry Regiment and dispersed after a 24-hour sweep. Rough terrain and thick cover allowed an unknown number of people to flee into the Transbaikal wilderness. Harsh weather and limited supplies are likely to reduce their numbers. Though the rebellion was crushed, its mere existence has shaken confidence among certain senior officers. The use of penal units is still necessary, but their loyalty cannot be assumed.\n\nWe maintain control, but the margin is thinner than it was last week. I urge the Stavka to treat internal discipline as a matter of national survival."
 Soviet_Collapse.7.A: "Signed, General-Lieutenant A. I. Yeryomenko."

 Soviet_Collapse.8.t: "The Siberian Revolt"
 Soviet_Collapse.8.d: "What began as scattered acts of sabotage and defiance in the far east has now escalated into open rebellion. Throughout Transbaikal, entire communities have abandoned Novosibirsk. Cossack riders, indigenous peoples, and desperate ex-prisoners have taken up arms against the state, launching attacks from the forests, hills, and villages where our banners once flew.\n\nIn the forests near Nerchinsk, armed men stormed outposts and killed local commissars. Some were Transbaikal Cossacks, riding under torn flags. Others were escaped prisoners, still wearing ragged uniforms and carving rifles from the dead. Entire villages turned, allowing rebels to pass through and cutting power lines. Government patrols have vanished. Rail lines became silent. A handwritten note reading \"No more orders\" was nailed to the desk of one station master. In Ulan-Ude, a mob dragged the local garrison chief to the street and beat him to death with shovels.\n\nThe uprising is uncoordinated, but it is spreading. Ethnic Russians, indigenous clans, and even former Gulag inmates fight side by side. They do not demand elections. They do not issue manifestos. They simply want the government gone. This is a full-fledged uprising of all the peoples that the Soviet Union has mistreated and punished over the years."
 Soviet_Collapse.8.A: "Where is the Red Army?! Scatter these rebels!"

 Soviet_Collapse.9.t: "The Government Flees"
 Soviet_Collapse.9.d: "It happened in the dead of night. An unmarked aircraft slipped out of Novosibirsk under heavy guard. Nikita Khrushchev was among the passengers, accompanied by several senior ministers and Central Committee members. Soon, the plane had crossed into the Far Eastern Republic, an American-backed Siberian state based in Vladivostok, where they formally requested asylum, which the Americans granted within an hour.\n\nWord spread quickly. By midday, barricades had been erected across Novosibirsk, with ministries closed, phones ringing unanswered, and orders being ignored. For the first time since the rebellion began, no one was left in the capital to issue orders. With the leadership gone and rebel forces pressing from the east, it appeared that the republic would cease to exist. However, the void would not last long.\n\nThat evening, tanks rolled into the city centre, flying Soviet flags rather than rebel ones. Marshal Georgy Zhukov, who had just returned from the front lines, led them. He made no speeches as he entered the Central Committee chamber, dissolved the civilian government, and declared martial law over the Novosibirsk government's remaining territory. Within hours, all resistance in the capital was crushed. Military police arrested dissidents, pacified ministries, and restored a command structure."
 Soviet_Collapse.9.A: "The Marshal will restore order! The Union will be saved!"

 Soviet_Collapse.10.t: "The Fall of Novosibirsk"
 Soviet_Collapse.10.d: "[FROM.GetNewsIcon]The city was extremely quiet. No gunfire or sirens - just the soft crunch of boots on broken glass. Mikhail trudged through Novosibirsk's empty streets, rifle in hand, eyes scanning the rooftops. No shots. No resistance. Just the wind. \"They really left it,\" someone said behind him. \"Cowards.\" Mikhail said nothing. He did not believe in miracles, but they were real. The red banners were torn down, and half of the checkpoints were abandoned.\n\nThey passed a burned-out truck and a pile of discarded uniforms, their red stars scraped off with knives or fingernails. In the government quarter, a group of rebels stood outside the main headquarters. A man was tied to a pole. Mikhail recognised the battered face despite the blood. \"Is that him?\" he enquired. \"Zhukov,\" a comrade said. \"They caught him attempting to flee east. He shot two men before they tackled him.\"\n\nSomeone read the charges: mass executions, forced conscription, war crimes. The rebels did not wait long. Three quick, sharp shots. Zhukov's body slumped sideways and remained there. A longer and more profound silence ensued. Then somebody spat on the ground. Later, as they raised the Siberian Republic's green-and-white flag above the government building, Mikhail leaned against a wall, watching the smoke rise."
 Soviet_Collapse.10.A: "This is the end..."
 Soviet_Collapse.10.B: "We mourn the brave Marshal, killed by bandits..."
 Soviet_Collapse.10.C: "Concerning Developments..."

 Soviet_Collapse.11.t: "The Siberian Republic"
 Soviet_Collapse.11.d: "[FROM.GetNewsIcon]The power struggles in the former Soviet Union have shifted dramatically once more. Following fierce fighting, Red Army desertions, and the collapse of the Soviet Novosibirsk government, the Siberian Republic was proclaimed once more, restoring the short-lived government that first emerged during the chaos of 1918.\n\nThis time, it has a face familiar to history: Marina Yurlova, a Baikal Cossack, White Army veteran, and former émigré. Yurlova, a child soldier during the Russian Civil War, spent decades abroad writing about her experiences, but has recently returned to Siberia. When the uprising began, she joined it. When it faltered, she steered it. Now, much older, she has taken control of the young republic. Yurlova spoke to a crowd of soldiers, workers, and residents outside the damaged regional administration building in Novosibirsk, which had its Soviet symbols removed.\n\nThe new republic is fragile. Much of its infrastructure is in ruins, the economy has been drained by years of centralised control, and many rural areas are still unstable. Nonetheless, a provisional Duma has been formed by rebel leaders, civic figures, and community representatives. It has already begun coordinating food distribution, securing arms depots, and developing a legal framework for \"a sovereign Siberian democratic republic\"."
 Soviet_Collapse.11.A: "The sons and daughters of Siberia are victorious!"
 Soviet_Collapse.11.B: "Let's just hope they don't come for us next..."
 Soviet_Collapse.11.C: "Tsarists, traitors, all of them!"
 Soviet_Collapse.11.D: "Concerning developments..."

 Soviet_Collapse.12.t: "The Death of the Soviet Union"
 Soviet_Collapse.12.d: "[FROM.GetNewsIcon]After decades of terror, repression, and total war, the red star has finally fallen. The Union of Soviet Socialist Republics no longer exists in any meaningful form as the last two Soviet rump states, the self-proclaimed governments in Sverdlovsk and Novosibirsk, have collapsed. The world now wakes to a new era: the Soviet Union is no more.\n\nFollowing the collapse of central authority, Allied-aligned Russian forces entered Sverdlovsk with little resistance. Former Prime Minister Georgy Malenkov was arrested without incident. NKVD remnants fought briefly, but the majority surrendered. In the East, the final blow was delivered by internal rebels rather than foreign armies. Novosibirsk fell after intense street fighting, and Marshal Georgy Zhukov, once regarded as the last hope for Soviet unity, was assassinated by the insurgents. With the rise of the Siberian Republic under interim leader Marina Yurlova, there is no trace of central Soviet authority east of the Urals.\n\nThe fall of the Soviet Union has sparked celebrations in capitals around the world. Church bells rang throughout Prague. Flags were waved in Warsaw and Riga. Students marched through Paris and London, cheering the ultimate demise of the world's first communist superpower. The grandest of celebrations took place in Berlin, with both allied soldiers occupying the city and German civilians and veterans participating. Globally, socialist and revolutionary movements are reeling. What remained of their patron is now lost, relegated to history books and the frail memories of individuals."
 Soviet_Collapse.12.A: "This is a disaster..."
 Soviet_Collapse.12.B: "The Red Menace is gone!"

 Soviet_Victory.1.t: "The Union Restored"
 Soviet_Victory.1.d: "[FROM.GetNewsIcon]Today, the guns have fallen silent on Novosibirsk's shattered streets. After months of civil war, Lavrentiy Beria has defeated his opponents and declared the Soviet Union restored to his rule. The cities are scarred, the people are broken, and yet Beria's voice echoes across the radio, promising order and rebirth. In reality, what has emerged is not a rebirth, but something colder, darker, and far more ruthless.\n\nPurges have resumed in Sverdlovsk and Novosibirsk. Dissidents vanish, labour camps expand, and the Red Army marches once more - not to defend the people, but to keep them in check. The streets are quiet now, not out of peace, but because of fear. While Beria claims to represent the revolution, many argue that this is no longer the Soviet Union, but rather the empire of a tyrant in all but name.\n\nOnly time will tell whether this new regime can keep its grip or if it, too, will crumble under the weight of its own brutality."
 Soviet_Victory.1.A: "Order has been restored - permanently."
 Soviet_Victory.1.B: "The iron fist clenches tighter."

 Soviet_Victory.2.t: "The Union Restored"
 Soviet_Victory.2.d: "[FROM.GetNewsIcon]The civil war in the East has ended, and the guns have gone silent across the steppes. Lavrentiy Beria is gone, and Sverdlovsk is in ruins. In his place rises Nikita Khrushchev, a former loyal functionary who is now the unlikely architect of a fragile peace. With Beria defeated and the secret police dismantled, Khrushchev ushers in a new era of reform and survival.\n\nFactories begin to hum again, not out of fear, but with purpose. Political prisoners walk free. The NKVD's black cars no longer patrol the night. Across the battered Union, a cautious hope emerges. However, uncertainty persists: The West is wary, the party is divided, and the scars of civil war are deep.\n\nIt remains to be seen whether Khrushchev can truly rebuild his Union, or if it will collapse under the impossible weight of its past."
 Soviet_Victory.2.A: "The future is unwritten."
 Soviet_Victory.2.B: "A second chance - or a final gasp?"

 SOV_The_Unions_Dying_Gasp: "The Union's Dying Gasp"
 SOV_The_Unions_Dying_Gasp_desc: "The Soviet Union has fractured beyond repair. Following the shock of Operation Unthinkable and the fall of Moscow, central authority crumbled, leaving rival governments in Sverdlovsk and Novosibirsk vying to carry on the Soviet legacy. Both rump states are dealing with shattered military forces, disrupted supply lines, and fractured communication networks. Local commanders and officials frequently disregard orders, pursuing their own agendas amidst rising lawlessness. Resources are scarce, factories have been damaged, and morale is low."
 SOV_SOVIET_CIVIL_WAR_TT: "We will have §Y260§! days to defeat the enemy. If we succeed, the Union shall be restored, but if we fail, the §RSoviet Union§! will §tperish forever§!."

 Far_Eastern_Republic.1.t: "The State of the Far East"
 Far_Eastern_Republic.1.d: "For the second time in fifty years, American boots touch Russian soil. With the locals defeated, our focus has shifted to the future. What to do with the area has become a hot topic, with three options being seriously considered. The first and most basic step is to continue your direct occupation. However, this is the least desirable move. Not only will it trap significant troops in a quagmire with no clear end, but it will be extremely unpopular in the Far East and at home.\n\nThe second option is to form a Far Eastern Republic led by locals. This will quickly disentangle us from the area and provide us with an important ally in the Far East. However, the risk is equally high. If the Russians begin to reunite, there is little chance that the Far East Republic will remain independent without significant support. If that happens and the Russians retake the Far East, we will have squandered valuable resources, time, and goodwill for absolutely no real benefit.\n\nThe final option is more radical. Some have proposed reviving the old Green Ukrainian state that existed in the area during the 1920s. This would put the area in the hands of local Ukrainians, resulting in an ethnic time bomb. The hope is that the Russians will be too busy fighting the Ukrainians to band together against us. This is almost guaranteed to throw the Far East into chaos."
 Far_Eastern_Republic.1.A: "We built one nation, lets build another."
 Far_Eastern_Republic.1.B: "The Ruskies had the right idea, they just need a better teacher."
 Far_Eastern_Republic.1.C: "Better they kill each other than kill us, right?"

 Far_Eastern_Republic.2.t: "The American Occupation"
 Far_Eastern_Republic.2.d: "Joseph Stilwell was not cut out for this. He much preferred China. As he stepped out of the plane, he was met with a barrage of jeers and shouts from an angry crowd on the tarmac. It appears the citizens of Vladivostok are not too pleased with his arrival. A part of him wanted to speak up and calm them down, but then someone threw a bottle. It shattered against the side of the plane, forcing Stilwell to shout to keep his men from firing back.\n\nNo, whatever he could say would only make things worse. As the saying goes, discretion is sometimes preferable to valour. Instead, he forced a smile that he hoped appeared more genuine than it was and hurriedly walked through the corridor created by his soldiers. He walked briskly to the nearby terminal, where he was met by an unknown man who handed him a manila folder labelled \"USFARCOM SITREP REPORT\" and stamped CLASSIFIED. Stilwell opened it, but quickly regretted his decision.\n\nFor the time being, things were calm; tens of thousands of soldiers managed to keep their cool. However, this did not preclude the existence of numerous issues. The Port of Vladivostok, the entire reason he was here, was out of commission due to severe sabotage. Meanwhile, CCCP cells held marches every other day and seized a few slums. If he was to repair things around here, he would have a lot of work to do."
 Far_Eastern_Republic.2.A: "\"I have my work cut out for me.\""

 Far_Eastern_Republic.3.t: "The Second Far Eastern Republic"
 Far_Eastern_Republic.3.d: "Joseph Stilwell despised his job. He sat in a nice office, but it was in the middle of nowhere. He was given broad mandates and open orders to 'build democracy in the Far East.' His superiors appear to have forgotten that he was a general and not a bureaucrat. He destroyed nations rather than building them. For both his and the Russian's sake, he was determined to be here as short of a time as possible. He simply needed a president to hand over the reins to, and the brass gave him two options.\n\nOne was Aleksandr Kerensky. Former First Republic president who ultimately lost to Kornilov and then Lenin. Since then, he has been bumming around New York. He has experience, yes, but the Russians despise him for failing to stop the military and the Communists, or for not giving in sooner. Choosing him would be a risky bet in terms of public relations, but as a proven capable administrator, we wouldn't have to teach him much of anything.\n\nThe other option is safer, albeit less experienced. Spiridon Merkulov briefly led the Priamur Republic before being deposed in a coup. However, his benevolence during his reign, as well as his subsequent activism, earned him favour with the Russian community. Choosing him would allow us to quickly gain the trust of the local Russians. However, due to his lack of experience, we would need to stay involved for a longer period of time."
 Far_Eastern_Republic.3.A: "Kerensky! Second times the charm!"
 Far_Eastern_Republic.3.B: "Merkulov! The heart of the Far East!"

 Far_Eastern_Republic.4.t: "Red October Nevermore"
 Far_Eastern_Republic.4.d: "Aleksandr Kerensky stood before the American general as he lectured him, but he did not listen. He was back in Russia after spending decades in exile. When he was summoned to Vladivostok, he didn't believe it at first; it wasn't until a War Department clerk arrived to pick him up that he realised he was truly returning home - to a home that no longer wanted him. The protesters were already outside. Damn Reds, it was as if he'd never left.\n\nKerensky was determined to do things differently, however. He had previously underestimated the Reds, believing they were ultimately reasonable outside of the 'fringe' Bolsheviks. He realised he was mistaken. He now understood that communism was fundamentally opposed to democratic government. Even now, they were plotting to overthrow his new republic. But he had better men by his side. The Americans would never allow a repeat of 1917. With them as his hammer, Kerensky believed he could eventually crush the Communists and bandits. After avenging his humiliation, he could finally march west.\n\nKerensky realised Stilwell was waiting for him to speak. \"Oh, yes, sir. I will ensure that this new Republic shines brightly in the darkness that has enveloped Russia.\" Stilwell shrugged, \"As long as you hold up your end, Alex.\" Kerensky sneered internally at his casual use of shorthand, \"Personally, I couldn't care less what you lot do here.\""
 Far_Eastern_Republic.4.A: "\"Today, Vladivostok, tomorrow, Moskva!\""

 Far_Eastern_Republic.5.t: "The First Step"
 Far_Eastern_Republic.5.d: "Spiridon Merkulov could not believe his luck. He had assumed that after the Civil War, he would never return to Russia. But here he was, ruling over Vladivostok. The Communists were gone, but not forgotten, and it was now up to him and his administration to guide Russia into a new era of prosperity. Merkulov had already failed Russia once, and he was determined not to fail again.\n\nThat did not mean it would be easy. The city was largely in ruins, people were starving, and anarchy persisted in the countryside. The Americans were breathing down his neck, demanding that he open the port immediately. Didn't they realise there were bigger problems to solve first? Before industry and luxury, the people required peace, land, and bread. Merkulov chuckled dryly at himself. Maybe Lenin wasn't completely wrong in that regard. One step at a time, the issues would be resolved, and prosperity would return to the Far East.\n\nThen came the future. A future in which a united Russia thrived under a healthy democracy as an active member of the global community. Merkulov's thoughts returned to the American 'guards' outside his door. Perhaps that would be in the distant future. Certainly one he would not see. However, what was a legacy if not a seed planted for future generations to grow? Merkulov prepared himself for the task ahead. He had a lot of work to complete."
 Far_Eastern_Republic.5.A: "Every journey begins with a single step."

 Far_Eastern_Republic.6.t: "The Republic of Green Ukraine"
 Far_Eastern_Republic.6.d: "Mikhail Tereschenko sat in his office chair, looking down at the folder on his desk. The Americans left it as a parting gift before leaving him to fend for himself. It was labelled simply SITREP and was extremely small. Tereschenko read the five or so pages hastily typed up by the Americans in a matter of a few dozen minutes. The ink hadn't even dried. However, in those five pages, a terrible picture was drawn. Tereschenko suddenly regretted accepting the American offer.\n\nHis army, for what it is, is outwardly mighty. However, by the Americans' own admission, the soldiers are second-rate. Their morale has plummeted, their weapons are a century old, and their opponents outnumber them by a large margin. Not to mention that the majority of them are Civil War veterans, complete with the frailties that come with advanced age. The young men who have volunteered do so solely to get food and shelter. They will undoubtedly fight poorly.\n\nMeanwhile, militias of various types operate in the countryside surrounding Vladivostok. Communists, Russian whites, ordinary bandits, and even Jews have taken up arms against him. They rule vast tracts of land without fear of attack by government forces, instead fighting amongst themselves for the spoils. There are rumours that some are even funded by foreign countries such as Japan or the Siberians. An explosion occurred somewhere in the city. Mikhail sighed and put his head in his hands."
 Far_Eastern_Republic.6.A: "\"Mother, what have I gotten myself into?\""

 Far_Eastern_Republic.7.t: "America Occupies the Far East"
 Far_Eastern_Republic.7.d: "[FROM.GetNewsIcon]In a shock declaration, the United States has declared that their occupation of the Far East will continue 'for the foreseeable future.' Led by General Joseph Stilwell and US FARCOM, the occupation promises to respect local traditions and return power to the people; however, few believe them. Within the rest of Russia, the American occupation has been denounced as 'naked colonialism,' with all Soviet successor states declaring their intention to expel the Americans, by force if necessary.\n\nMeanwhile, inside the occupation zone, various forms of peaceful resistance have sprung up. Marches fill every street, and cries for reunification are already ringing in the air. Stilwell's mandate for peacekeeping allows him a lot of leeway in dealing with them, but whoever fires the first shot will undoubtedly spark another ferocious war.\n\nBack home, the declaration has been met with equal rage. Enemies of the administration in Congress have adopted the label of colonialism and have condemned the President in every speech for this blatant aggression. Peaceniks have organised anti-occupation demonstrations in Washington, and the general public, which is already tired of war, is wary of another."
 Far_Eastern_Republic.7.A: "A Righteous War!"
 Far_Eastern_Republic.7.B: "What year is it?"
 Far_Eastern_Republic.7.C: "They are no better than the Germans!"
 Far_Eastern_Republic.7.D: "Nothing but naked opportunism."

 Far_Eastern_Republic.8.t: "The Second Far East Republic is Proclaimed!"
 Far_Eastern_Republic.8.d: "[FROM.GetNewsIcon]Today, in a grand speech, the newly christened president of the Far East Republic announced the establishment of the new state. The state, which echoes the failed First Republic during the Civil War, has elicited mixed reactions from the public. Local communists and the other Russian states have condemned them. They accuse it of being an American colony in all but name, and the fact that US troops are still patrolling the streets makes their claim more difficult to deny.\n\nHowever, long-suffering Russian Whites have begun to flock to the new state in large numbers. They believe it marks the beginning of a grand reclamation of Russia. They see the Far East's future as a blank canvas on which to paint their own dreams and goals, no matter how contradictory they are. Meanwhile, in the United States and around the world, the news has elicited shrugs. The American people are simply relieved that US troops will be returning soon, and Congress has already begun to shift its focus to the next political battle. Meanwhile, America's allies and adversaries have long since turned their attention away from Russia."
 Far_Eastern_Republic.8.A: "We will be home by Christmas!"
 Far_Eastern_Republic.8.B: "A puppet of American greed!"
 Far_Eastern_Republic.8.C: "In other news..."

 Far_Eastern_Republic.9.t: "Green Ukraine Lives Again!"
 Far_Eastern_Republic.9.d: "[FROM.GetNewsIcon]In a shocking announcement, Washington has declared it is handing over the Russian Far East to the Ukrainian minority there. This country, reminiscent of the attempted Green Ukraine in the 1920s, has had far more success. Several countries have already recognised it, and much of America's allies in Europe appear to be on the verge of doing so. Unsurprisingly, none have been more eager than Ukraine, which has issued a statement welcoming their Far Eastern counterparts to the world stage and promising any and all assistance.\n\nHowever, national reports are less optimistic. The Russian states have declared Green Ukraine a \"historical aberration\" that they plan to \"correct.\" To that end, the countryside has descended into violence, with various militias rising up against the new government. Various warlords have declared allegiance to the defunct CCCP, the Romanovs, or the Moscow-based Republic, or they have simply asserted their own right to rule.\n\nIn the end, it remains to be seen whether Green Ukraine can withstand the unavoidable civil war. If this is the case, they will have earned the right to exist and act as a deterrent to Russian power in the Far East. If they fail, it's unclear who will succeed them. All that can be said with certainty is that the Far East's near future will be a sea of blood."
 Far_Eastern_Republic.9.A: "Not our problem anymore."
 Far_Eastern_Republic.9.B: "Another enemy, another war, another day."
 Far_Eastern_Republic.9.C: "War comes again to the Far East."

 ##################################
 # Soviet Replacing Litvinov Path
 ##################################
 SOV_Replacing_Litvinov.1.t: "Who will Succeed Litvinov?"
 SOV_Replacing_Litvinov.1.d: "Although Maxim Litvinov has performed admirably as People's Commissar for Foreign Affairs, the party apparatus and Comrade General Secretary have become disinterested in his moderate approach to foreign policy through the Litvinov Protocol and the non-militaristic stance he generally takes in foreign affairs. It is time for a change of course, and this can only be accomplished by replacing Litvinov with a more assertive individual - one who is not afraid to impose Moscow's law on the world.\n\nOnly one real option for Litvinov's replacement stands out to us: Vyacheslav Molotov, an old Bolshevik and current Chairman of the Council of Ministers, who is known for accepting a less pacifist approach to foreign policy and a greater willingness to antagonise outside powers in exchange for political, economic, or territorial gains. The Litvinov Protocol will be re-examined, and most likely abandoned. Such fanciful notions of \"peace\" cannot impede our progress."
 SOV_Replacing_Litvinov.1.A: "A new era for Soviet foreign policy."

######################################################################
#  Soviet Union Focuses
######################################################################
 SOV_NKVD_Agency: "NKVD"
 SOV_NKVD_Agency_desc: "Counterrevolutionaries and agents of the West seek to subvert the cause of our great revolution, both from the inside and the outside. It is evident we need to charge an organisation with countering these threats, the organisation must be equally ruthless and merciless to counter the threats to our great nation. It has been decided to reform the NKVD or the People's Commissariat for Internal Affairs, which had been disbanded in 1930, in its latest form, it will be reinstated as an All-Union Ministry, and be handed all the responsibilities of the OGPU and more. The greatly strengthened NKVD will immediately begin countering internal subversive activities and carry out tasks in foreign lands to further the socialist cause."

 SOV_Yagodas_Iron_Fist: "Yagoda's Iron Fist"
 SOV_Yagodas_Iron_Fist_desc: "Whatever benefits and advantages the other possible candidates offer for the post of heading the NKVD, seems redundant when compared to Genrikh Yagoda. Yagoda is a man of passion and energy combined with the necessary ruthlessness needed to run the state based security apparatus, the NKVD. He will be entrusted with the task for rooting out all subversive and counter revolutionary activities in the nation, a long drawn out task, but a task suitable for Yagoda who will no doubt excel in it...for the time being at least."

 SOV_Agranovs_Pragmatic_Approach: "Agranov's Pragmatic Approach"
 SOV_Agranovs_Pragmatic_Approach_desc: "Now that a State based security apparatus has been firmly established, what must be decided upon is who should lead the NKVD and its approach in countering the national threats. While it is evident that the leadership would need to be ruthless and merciless, it seems some measure of cunningness and pragmatism will also be required. Yakov Agranov, a highly effective and competent individual, has an extensive record of countering subversive activities in the union in the past years, and his pragmatism, at least compared to the “other” option, seems to offer considerably more merit."

 SOV_Socialist_Justice: "Socialist Justice"
 SOV_Socialist_Justice_desc: "Our nation and its ideology exist for the benefit of the worker and the peasant. In Western Countries, the courts and the laws all exist to favour the greedy money men, men who seek to rob the common man for everything he's worth, unlike our nation where the working class is not only respected, but revered, for it is the driver of the nation and its economy. The people of our nation need to be reminded of the tenets of the socialist cause, and hence it is in the national interest, to propagate “Socialist Justice”. The People's Commissariat for Justice, which was once chastised by our founding father- Lenin himself, needs to once again be reminded of its duties in working to end the class struggle and to promote equality among all."

 SOV_Arrest_Political_Enemies: "Arrest Political Enemies"
 SOV_Arrest_Political_Enemies_desc: "Some members in the VKP(b) are still uncomfortable with Comrade Stalin being the General Secretary, despite his numerous achievements, they often oppose his proposals in the Presidium of the Supreme Soviet. It is a well known fact that all of Comrade Stalin's proposals are in the most sincere interests of the nation and for furthering the socialist cause, but some of his political enemies refuse to see the bigger picture. The NKVD has recently uncovered some “links” between hid political enemies and some Trotskyite cells operating in the country, forget the personal animosity between these traitors and Comrade Stalin, they need to be arrested immediately to prevent further subversion of the socialist cause."

 SOV_Total_Party_Censorship: "Total Party Censorship"
 SOV_Total_Party_Censorship_desc: "There always has been a culture of spreading unconfirmed incidents and rumours in the party circles, the VKP(b) and its members are entrusted with the very important task of preserving the integrity of the socialist cause in the Soviet Union. Misinformation and rumours are distractions that only prohibit the members of the Party in completing their duties and seeing the complete picture. Keeping the National and Socialist interests at heart, the best course of action to prevent further unfiltered information from reaching the ears of the party members and the general population as well, is to begin extending the censorship laws, to the general population as well as to the members of the VKP(b)."
 SOV_Total_Party_Censorship_tt: "Makes changes to the 'Stalin Constitution', based on the world events."

 SOV_1937_Constitutional_Elections: "1937 Legislative Elections"
 SOV_1937_Constitutional_Elections_desc: "After the Stalin constitution which among its several other points promised democratic proceedings for the election of all governmental bodies, it is time to begin implementing such a practice in actuality. The upcoming legislative elections to the Supreme Soviet, will follow a complete “democratic” approach. Though the process is more or less redundant, as the population understands the need for the important figures, prime among them, the current General Secretary Stalin himself, instead of any other “alternative” candidates, on top of that the NKVD will ensure no “counterrevolutionary” can contest in the elections."
 SOV_1937_Constitutional_Elections_tt: "The mission '§YStart of Constitutional Elections§!' was §Rcompleted§! or §Bfailed§!."

 SOV_XVIII_Congress: "XVIII Congress"
 SOV_XVIII_Congress_desc: "\n\n\n£picture_SOV_XVIII_Congress_Focus_Image\n\n\n\n\nVery soon, in Moscow, the 18th Congress of the All-Union Communist Party will begin. It will be the first one after the “purification” of the leadership from trotskyites, counterrevolutionaries and other subversive elements.\n\nAmong its many agendas, it will conduct an analysis of the internal and international situation of the country, as well as its future development perspectives, and discuss important aspects of the foreign policy of the USSR, particularly our disappointment with the western democracies and their failure to adopt the policy of collective security. In the aspect of party affairs it will also attempt to sanction the new Party's statute which needs to be revised to reflect changes in the class structure of the Soviet society."
 SOV_XVIII_Congress_tt: "§GWill Stalin guide the union to a bright future?§!"

 SOV_Purges_in_the_Red_Army: "Purges in the Red Army"
 SOV_Purges_in_the_Red_Army_desc: "Our initial assumption that only the KPSS had been infiltrated by the “fifth columnists” has proven to be wrong, among other sections of the society, even the Red Army has been affected by subversive individuals, working from within the organisation itself. It's astonishing but the latest NKVD report is very definite, and has implicated senior commanders all the way from the division level to Army level for traitorous offences, ranging from having trotskyite sympathies to being actively involved in spying and collaborating with Foreign entities......even a few of the Marshals have been implicated. Comrade Stalin has authorised the NKVD to begin extending the purge to the Red Army as well and cleanse it of these traitorous individuals immediately."

 SOV_State_Defense_Committee: "State Defense Committee"
 SOV_State_Defense_Committee_desc: "War is upon us, the very existence of the revolution and its birthplace has been threatened, we cannot afford to lose this battle of survival. Our Nation covers an extraordinarily wide expanse of land, stretching for thousands of kilometres from the Baltic Sea, all the way to the Pacific ocean. The wide expanse creates several organisational difficulties, in an attempt to better coordinate national efforts, especially for war, it has been decided to centralise power and form a national organisation, i.e. the State Defense Committee(GKO or ГКО). The GKO which staffed by the top members of the KPSS, including General Secretary Stalin himself, will be tasked with coordinating all the national wartime efforts to maximise operability and functionality."

 SOV_Zhdanovs_Party_Supremacy: "Zhdanov's Party Supremacy"
 SOV_Zhdanovs_Party_Supremacy_desc: "In the difficult decision to adopt whose ideas in the functioning of the State Defense Committee, its chairman- General Secretary Stalin himself, has selected Zhdanov's line of thinking. Andrei Zhdanov has long been admired by the General Secretary, and some of his ideas as to how the GKO should function has been well received by Comrade Stalin. In addition he was an active participant in the purging of the KPSS and other state organisations and hence his political reliability and sincerity towards the cause is that of the highest order. Effective immediately Zhdanov has been granted the necessary authorization to begin shaping the activities of the GKO in the way he seems it to be the most appropriate, keeping the national interests at hearts."

 SOV_Malenkovs_Pragmatic_Faction: "Malenkov's Pragmatic Faction"
 SOV_Malenkovs_Pragmatic_Faction_desc: "Georgy Malenkov heads a “pragmatic” faction opposed to Zhdanov's policies, who favour science and engineering as conduits for moving the nation forwards. Malenkov stresses upon the universal values of science and engineering, and proposes to promote the technological experts to the highest positions in the Soviet administrative elite. Despite some opposition to his ideas, it seems Malenkov's “pragmatic”approach offers considerably more benefits, and will most definitely allow for the maximum potential in the mobilisation of both material human resources."

 SOV_Triumph_of_Zhdanovchina: "Triumph of Zhdanovchina"
 SOV_Triumph_of_Zhdanovchina_desc: "\"Zhdanovshchina\", as advocated by Andrei Zhdanov, places high emphasis on a purified communist ideology, though many party members are receptive to his way of thinking and its tenets, some of the people from Malenkov's “pragmatic” approach are opposed to it. Despite their consternations, Comrade Stalin has decided to adopt Zhdanov's ideas. The General Secretary agrees with Zhdanov, in the belief that proper ideology trumps science and has called for the prioritization of political education and ideological purity. It is a general consensus in the VKP(b), and specifically in the mind of the General Secretary to go ahead with Zhdanov's ideas in their entirety."

 # SOV_Socialism_Achieved: "Socialism Achieved"
 # SOV_Socialism_Achieved_desc: "Since the days of the revolution, we have been pushing the boundaries of what a perfect socialist state should look like in accordance with the ideas of Engels, Marx, and Lenin. And after many years of toil and hardship, we have finally achieved a socialist society that shall be a model for all. Comrade Stalin set his sights on achieving “Socialism in one country”, and he has done this through many harsh, but necessary actions. The bourgeoisie has been crushed, workers and peasants live together in harmony, and it seems highly unlikely that capitalism can ever be restored to the Soviet Union. However, while we may be a workers utopia, some still question if our victory is final, with many citing that Lenin wanted us to go further, and bring the beacon of socialism and workers unity to many other nations across the globe. While we do not know the answer to that, what we do know is that the Union of Socialist Soviet Republics will live on forever more!"

 SOV_The_Short_Course: "The Short Course"
 SOV_The_Short_Course_desc: "To ensure the doctrinal integrity of our movement and the future of socialism in the Soviet Union, we must elevate Marxism-Leninism to its pinnacle. The \"Short Course\" is our guiding light, the definitive document outlining the truth about our path. This book, under Stalin's guidance, will serve as the foundation for our ideological education. All Party members, workers, and peasants must be educated on its principles, because it is more than a book; it is the foundation of our revolution. Those who reject or misinterpret its principles will be expelled, because going against this fundamental teaching is an attack on the revolution itself."


