 # Phase 2
 SOV_Deportations_of_Germans_and_Poles: "Deportations of Germans and Poles"
 SOV_Deportations_of_Germans_and_Poles_desc: "The Soviet Union's German and Polish minorities have long been viewed with suspicion, as their proximity to foreign borders and cultural and linguistic ties to external powers have created a dangerous potential for disloyalty. With fascist agitation on the rise in Europe and foreign intelligence agents constantly looking for weaknesses, these groups cannot be ignored as a potential fifth column. To protect the frontier and maintain internal stability, the NKVD has developed a mass resettlement program. Thousands of Polish and German families will be removed from their homes and relocated eastward to Siberia and Central Asia, where their presence can be better monitored and their potential use as enemy agents or collaborators in border regions eliminated."
 SOV_Case_of_the_Anti_Soviet_Trotskyist_Center: "Case of the Anti-Soviet Trotskyist Center"
 SOV_Case_of_the_Anti_Soviet_Trotskyist_Center_desc: "The NKVD discovered a conspiracy of Trotskyists while attempting to eliminate political opponents of Stalin's rule and ensure national security. Known colloquially as the Anti-Soviet Trotskyist Centre, this network of conspirators, which included some of the party's highest-ranking officials, sought to undermine the state, sabotage industry, and aid foreign enemies. Among those accused are prominent old party leaders and more than two dozen other associates.\n\nThe NKVD conducted thorough interrogations on each of these suspects, extracting confessions from all of them. Two separate public trials will be held, ensuring that the hammer of justice falls on traitors to the motherland. Of course, they will all be found guilty, and most will face summary execution. That is already decided."
 SOV_Deportations_of_Kulaks_and_Mullahs: "Deportations of Kulaks and Mullahs"
 SOV_Deportations_of_Kulaks_and_Mullahs_desc: "The Kulaks are staunch opponents of the revolution. Their land hoarding denies hard-working lower-class peasants the opportunity to work for themselves on small plots or collective farms rather than for an upper-class master. To begin the eradication of the Kulak class, the NKVD will round up kulaks and their families, transporting them to Siberia by cattle car and nationalising their assets. At the same time, Mullahs, prominent Islamic leaders and scholars of Islamic law, pose a significant threat to Soviet control in our Central Asian republics. Their religious fanaticism and high level of education allow them to persuade entire Muslim villages to rebel and counter-revolution, necessitating their mass arrest and deportation from Muslim majority areas."
 SOV_Expel_Officers_Excluded_from_the_Party: "Expel Officers Excluded from the Party"
 SOV_Expel_Officers_Excluded_from_the_Party_desc: "Investigations by the NKVD and Party Control Commission have turned up troubling evidence of disloyalty among certain commanding officers. Some have openly questioned the Party line, while others have demonstrated a reckless disregard for discipline and authority. By expelling these officers from their commands and removing them from the ranks of the Red Army, the Party will demonstrate its vigilance. Their removal will serve as both a punishment for betrayal and a warning to all others who may waver in their support for socialism and the Soviet Union."
 SOV_Liquidate_the_Menshevik_Underground: "Liquidate the \"Menshevik Underground\""
 SOV_Liquidate_the_Menshevik_Underground_desc: "Despite the consolidation of Bolshevik power, remnants of the Menshevik movement continue to operate in secret, infiltrating the party and undermining its principles and leadership. Known as the \"Menshevik Underground,\" this network disseminates counter-revolutionary propaganda, attempts to organise sabotage, and maintains contact with hostile foreign powers.\n\nThe NKVD has identified key members of this underground who continue to promote Menshevik principles. Their actions, if left unchecked, could sow the seeds for the resurgence of treasonous and counter-revolutionary elements within government institutions. To eliminate this threat, the NKVD has compiled arrest lists for members of this network, thereby permanently neutralising this threat to the state."
 SOV_Replace_Agranov: "Replace Agranov"
 SOV_Replace_Agranov_desc: "Yakov Agranov, NKVD Deputy Chairman and Director of the Main Directorate of State Security, has outlived his usefulness. He is known among the leadership for fabricating numerous conspiracies that resulted in the arrest and trial of state enemies. However, his well-known public image and position in the NKVD's power structure, combined with his close ties and loyalty to Yagoda, pose a threat to our control over the NKVD. His close relationship with Yagoda is especially concerning, and many believe that Agranov may also be involved in anti-Soviet activities. He will thus be demoted to the head of the NKVD branch in Saratov, where he will remain until his arrest."
 SOV_Anti_Soviet_Military_Organisation: "Trial of the Anti-Soviet Military Organisation"
 SOV_Anti_Soviet_Military_Organisation_desc: "The Red Army, Navy, and Air Force have no shortage of experienced generals, drawn from the ranks of both old Bolsheviks as well as young reformers. Both of these groups are useful, with extensive experience in military command and administration. And both of these groups pose a threat. The ability of officers from both cadres to think independently and accomplish their goals, even if it means deviating from the party line, calls into question our unquestioned rule. At the same time, men like Tukhachevsky's vast popularity and heroic reputations, as well as their reformist attitudes, raise the possibility of \"Bonapartist\" thoughts among them. With the help of the NKVD, a number of these men will be arrested and tried."
 SOV_Bloc_of_Rightists_and_Trotskyites: "Case of the Bloc of Rightists and Trotskyites"
 SOV_Bloc_of_Rightists_and_Trotskyites_desc: "The NKVD revealed the existence of a dangerous conspiracy at the heart of the Soviet Union: the so-called Bloc of Rightists and Trotskyites. This alliance unites the remnants of every defeated faction, committing treason against socialism and the Party's leadership. The investigation has revealed that Bukharin and Rykov, senior Revolutionary figures, are the leaders.\n\nAlongside them stands Yagoda, the former head of the NKVD who betrayed his duty, as well as traitors and collaborators with foreign powers. By ordering the Bloc's liquidation, we will eliminate the last remaining open resistance within the Party ranks. A public trial will expose their lies to the world, and their punishment will serve as a warning to all who dare to question the Soviet people's strength or leadership."
 SOV_Purge_Anti_Soviet_Army_Officers: "Purge Anti-Soviet Army Officers"
 SOV_Purge_Anti_Soviet_Army_Officers_desc: "Recent investigations have revealed a network of officers in our upper ranks who harbour anti-Soviet sentiments, question the Party's leadership, or have ties to enemies abroad. If left unchecked, such elements could weaken the Red Army during a time of great danger. These men, however decorated they may be, have proven unworthy of the trust placed in them. For the sake of the Revolution, their influence must be cut out, and they must all be arrested."
 SOV_Purge_Anti_Soviet_Army_Officers_2: "Purge Anti-Soviet Army Officiers"
 SOV_Purge_Anti_Soviet_Army_Officers_2_desc: "Recent investigations have revealed a network of officers in our upper ranks who harbour anti-Soviet sentiments, question the Party's leadership, or have ties to enemies abroad. If left unchecked, such elements could weaken the Red Army during a time of great danger. These men, however decorated they may be, have proven unworthy of the trust placed in them. For the sake of the Revolution, their influence must be cut out, and they must all be arrested."
 SOV_Purge_Soviet_Officers_tt_picture: "\n\n\n\n£picture_SOV_Purge_Officers\n\n\n\n\n\n\n"
 SOV_Repress_Political_Enemies: "Repress Political Enemies"
 SOV_Repress_Political_Enemies_desc: "Across the Union, individuals and groups continue to oppose the leadership, sow discord, and undermine socialism. They hide in factories and cultural institutions, using deception and subversion to weaken the state from the inside. To protect the Revolution, these political enemies must be identified, removed from positions of power, and placed under close supervision."
 SOV_Intensify_NKVD_Work_Against_the_Churches: "Intensify NKVD Work Against the Churches"
 SOV_Intensify_NKVD_Work_Against_the_Churches_desc: "Religion is a tool for capitalist control. As such, it must be curtailed, restricted, and eventually eradicated from the Soviet Union, and, once global communism is achieved, the entire planet. To that end, the NKVD and League of Militant Atheists' anti-religious program will be expanded, including increased investigations and arrests of bishops and priests, as well as restrictions on government jobs for churchgoers and the closure and demolition of Orthodox churches and cathedrals, particularly in major cities, in order to convert them to public or industrial spaces."
 SOV_Investigate_the_Navy: "Investigate the Navy"
 SOV_Investigate_the_Navy_desc: "The Red Navy is a source of pride for both Soviet citizens and the Soviet government, and plays an important role in keeping Soviet shores and ports secure. It is precisely this critical role in the Union's security, as well as the traditional respect and honour that naval officers are awarded and expect, as well as the history of agitation and revolutionary or counter-revolutionary sentiment in navies around the world, that makes the Red Fleets so vulnerable to foreign infiltration, counter-revolutionary sentiment, and resistance to state policies. The NKVD will thus be ordered to launch investigations into the naval officer corps, allowing for the weeding out of both top brass and junior officers."
 SOV_Imminent_Counter_Revolution: "Imminent Counter-Revolution"
 SOV_Imminent_Counter_Revolution_desc: "Whispers of conspiracy echo through the corridors of power, and enemies - real or imagined - lurk in every corner of the Party and the Red Army. Time is running out, and unless decisive action is taken, the counter-revolution will not only survive but may sweep away Stalin himself."

