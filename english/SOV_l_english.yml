 # Formation of the Guards Army
 SOV_Formation_of_the_Guards_Army: "Formation of the Guards Army"
 SOV_Formation_of_the_Guards_Army_desc: "\n\n\n£decision_header_SOV_Guards_Army£\n\n\n\nArise brave men and women for your scared duty, arise factory worker's from your labor, arise peasant's from your slumber to your scared responsibility.\n\nArise to the defense of the motherland.\n\nThese are the duties of the Guard."
