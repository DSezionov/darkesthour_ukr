 # Liberation of Europe
 SOV_Liberation_of_Europe: "The Liberation of Europe"
 SOV_Liberation_of_Europe_desc: "\n\n\n£decision_header_SOV_Liberation_of_Europe£\n\n\n\nAs the §RRed Army§! moves westward across Europe, the question is no longer whether we will win, but what Europe's future will look like once we do. Our advance has done more than just break enemy lines. It has disrupted entire systems. In town after town, the old ruling classes crumble and the population turns to the Red Army for stability. This vacuum of power presents us with an opportunity that we have never had on such a large scale.\n\nWe must act quickly and deliberately, collaborating with local communists, labour unions, partisans, and sympathetic political groups to establish provisional committees and people's governments that support our cause. These §Rnew administrations§! will restore order, root out fascist remnants, and lay the groundwork for loyal, socialist states."
 SOV_Liberation_of_Czechoslovakia: "Liberate Czechoslovakia"
 SOV_Establish_the_PKWN: "Establish the PKWN"
 SOV_Establish_the_PKWN_desc: "The Polish Armia Krajowa and the London-aligned government-in-exile are reactionary, capitalist forces nondeserving of our recognition or assistance. To secure the liberation of the Polish working class and ensure a friendly, communist state, we must establish a rival authority capable of governing liberated territory. The Polish Committee of National Liberation (PKWN) will administer areas freed by the Red Army, incorporate all Polish communist units under commanders such as Karol Świerczewski and Zygmunt Berling, and serve as the foundation for a new socialist Poland loyal to Moscow."
 SOV_Oust_the_King_of_Romania: "Oust the King of Romania"
 SOV_Oust_the_King_of_Romania_desc: "King Mihai's monarchy remains a barrier to the full liberation of Romania's working class and the implementation of socialist reforms. Following the armistice, reactionary forces around the crown still control key institutions and could obstruct the revolutionary transformation of land, industry, and the state. To allow for the implementation of the Romanian People's Republic, the monarchy must be abolished, with full authority transferred to a loyal government controlled by the Romanian Communist Party to guide Romania toward socialism."
 SOV_Liberation_of_Hungary: "Liberate Hungary"
 SOV_Liberation_of_Bulgaria: "Liberate Bulgaria"
 SOV_Liberation_of_Yugoslavia: "Liberate Yugoslavia"
 SOV_Liberation_of_Greece: "Liberate Greece"
 SOV_Liberation_of_Finland: "Liberate Finland"
 SOV_Establish_the_DDR: "Establish the German Democratic Republic"
 SOV_Establish_the_DDR_desc: "With fascism defeated in Germany, the time has come to establish a socialist German state under the protection of the Soviet Union. By creating the German Democratic Republic, we can ensure that the German people build a society based on workers' and peasants' principles, free from reactionary and imperialist influence.\n\nThis new state will strengthen the socialist camp in Europe, provide a reliable ally, and secure the future of socialism on German soil."
 SOV_Implement_Socialism_in_Austria: "Implement Socialism in Austria"
 SOV_Implement_Socialism_in_Austria_desc: "The Western powers cling to their fantasy of a \"neutral\" Austria, a fragile construct meant to shield capitalist interests and halt the march of socialism across Europe. But neutrality is not peace; it is stagnation, and stagnation is death. The Austrian people have endured centuries of exploitation under monarchs, fascists, and imperialists. Now, under the banner of the Soviet Union, they shall at last know true liberation.\n\nTwo great paths stand before us. One envisions the birth of the Austrian Democratic Republic, a sovereign socialist state built upon the will of workers, guided by the fraternal support of the Soviet Union. The other seeks the abolition of the bourgeouis construct that is Austria, instead combining it with our area of influence in Germany, a decisive act that would bring together the German-speaking proletariat in a single, indestructible socialist bastion at the heart of Europe."
 SOV_Implement_Socialism_in_Austria.tt: "§RThe Western Allies still occupy large parts of Austria. Unilaterally detaching our zone will worsen tensions, end all negotiations for a unified state and establish an Iron Curtain across Austria.§!"
