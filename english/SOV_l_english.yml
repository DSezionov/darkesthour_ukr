 # Operation Polyarnyi Bastion & Operation Arikitcheskiy Shtorm 
 SOV_Operation_Polyarnyi_Bastion_category: "Operation Polyarnyy Bastion"
 SOV_Operation_Polyarnyi_Bastion_category_desc: "We will fortify Finland and turn it into an impenetrable ice fortress. While focusing on the main front in the east, we will be able to easily repel any German counterattacks on Finland. Giving Finland the opportunity to do so will necessitate extensive planning and resources."
 SOV_Operation_Arikitcheskiy_Shtorm_category: "Operation Arikitcheskiy Shtorm"
 SOV_Operation_Arikitcheskiy_Shtorm_category_desc: "With our victory in the winter war and the establishment of the Finnish Democratic Republic, we now have more options for involving Finland in the war against Germany. We must coordinate and prepare Finland for the upcoming conflict, as well as devise an effective strategy that will provide us with additional advantages in the upcoming war."
 SOV_Meeting_in_Helsinki: "Meeting in Helsinki"
 SOV_Meeting_in_Helsinki_desc: "We will send delegates to Helsinki and meet with the Finnish government to discuss war plans and strategy for the upcoming conflict. The Finnish government requires our assistance if they are to be useful in the upcoming conflict, and we will make certain that they receive it."
 SOV_Send_Weapons: "Send Weapons"
 SOV_Send_Weapons_desc: "When it comes to weapons and military equipment, Finland is woefully under-equipped. Their current stockpile is insufficient. If we want Finnish soldiers to be able to fight and hold off the Germans, we must address this issue. The only thing left to do is figure out what exactly to send them."
 SOV_Supply_the_North: "Supply the North"
 SOV_Supply_the_North_desc: "The north of Finland has always had severe supply problems. Even though it is a strategically important region bordering Norway and Sweden, military personnel stationed there must wait weeks, if not months, for various shipments and reinforcements to arrive. We will address this issue by building a new railway line to that region, ensuring a steady supply of equipment."
 SOV_Mobilize_Finnish_People: "Mobilize the Finnish People"
 SOV_Mobilize_Finnish_People_desc: "If the Finns are to make a difference and have a chance against the Germans in the upcoming conflict, they will need as many able-bodied men as possible to fight. Every Finnish man will be required to serve in the military for three years, increasing their available forces and preparing them for war."
 SOV_Mobilization_Order: "Mobilization Order [GetYear]"
 SOV_Mobilization_Order_desc: "It is now time for the Finnish government to issue an official mobilisation order. Special military forces will be deployed in accordance with our chosen strategy to ensure the success of the Finns, and Soviet advisors will be instructed to step up their efforts as the war approaches."
 SOV_Meeting_in_Helsinki_2: "Meeting in Helsinki"
 SOV_Meeting_in_Helsinki_2_desc: "We will send delegates to Helsinki and meet with the Finnish government to discuss war plans and strategy for the upcoming conflict. The Finnish government requires our assistance if they are to be useful in the upcoming conflict, and we will make certain that they receive it."
 SOV_Send_Weapons_2: "Send Weapons"
 SOV_Send_Weapons_2_desc: "When it comes to weapons and military equipment, Finland is woefully under-equipped. Their current stockpile is insufficient. If we want Finnish soldiers to be able to fight and hold off the Germans, we must address this issue. The only thing left to do is figure out what exactly to send them."
 SOV_Supply_the_North_2: "Supply the North"
 SOV_Supply_the_North_2_desc: "The north of Finland has always had severe supply problems. Even though it is a strategically important region bordering Norway and Sweden, military personnel stationed there must wait weeks, if not months, for various shipments and reinforcements to arrive. We will address this issue by building a new railway line to that region, ensuring a steady supply of equipment."
 SOV_Mobilize_Finnish_People_2: "Mobilize the Finnish People"
 SOV_Mobilize_Finnish_People_2_desc: "If the Finns are to make a difference and have a chance against the Germans in the upcoming conflict, they will need as many able-bodied men as possible to fight. Every Finnish man will be required to serve in the military for three years, increasing their available forces and preparing them for war."
 SOV_Mobilization_Order_2: "Mobilization Order [GetYear]"
 SOV_Mobilization_Order_2_desc: "It is now time for the Finnish government to issue an official mobilisation order. Special military forces will be deployed in accordance with our chosen strategy to ensure the success of the Finns, and Soviet advisors will be instructed to step up their efforts as the war approaches."
 SOV_Fortify_the_Border_with_Norway: "Fortify the Border with Norway"
 SOV_Fortify_the_Border_with_Norway_desc: "Finland shares a border with Norway, which poses a significant security risk to the country. If we are to turn Finland into an impenetrable fortress, it is critical that we fortify this region more than any other. We will have to figure out how to best achieve this."

 # Operation Groza Post-Launch
 SOV_Post_Launch_Operation_Groza: "Post-Launch Operation Groza"
 SOV_Post_Launch_Operation_Groza_desc: "It's finally time. Our armies are now marching inexorably West, and the burzhui oppressors in Berlin are terrified. Their puppet masters in Paris, London, and Washington keep a wary eye on us, fearful that our inevitable victory will bring down their own decaying systems around them. After establishing its foundation, the victorious Revolution will inevitably sweep Europe and then the world.\n\nHowever, just because our men are on the march does not mean they are not in need of assistance. They actually require more assistance than ever before. Let us work harder than ever before so that our fathers and sons can complete the impossible task of the World Revolution and return home victorious and free."
 SOV_Supply_Hub_Construction_Speed: "Build More Supply Hubs"
 SOV_Supply_Hub_Construction_Speed_desc: "As our men advance, it becomes a recurring issue that we outrun our supply bases. This has resulted in numerous untimely halts to allow supplies to be trucked or even hauled by hand to the Front. Every second we don't move forward is another second the enemy has to dig in. It entails more and heavier fighting, as well as more heroes being shipped home in boxes rather than parading through Berlin or Red Square. We should concentrate on establishing bases near the front lines."
 SOV_Emergency_Fortifications: "Emergency Fortifications"
 SOV_Emergency_Fortifications_desc: "The enemy's defences are hardening, the advance is slowing, and our soldiers are dying in increasing numbers. STAVKA wanted to avoid something like this, but it's clear that, for the time being, the front is stagnant. We need to hand out shovels and axes and tell our men to dig in and hunker down. When the time is right, these men will emerge from their holes and trenches to destroy the enemy in front of them!"
 SOV_Scavenge_Fortifications_for_Materials: "Scavenge Fortifications for Materials"
 SOV_Scavenge_Fortifications_for_Materials_desc: "As our forces advanced into our adversary's heartland, many fortifications were left unmanned. These bunkers, trenches, pillboxes, and foxholes are now abandoned and decaying, serving no purpose. However, enterprising supply officers have begun to look at them with interest. Thousands of these static defences house countless guns of all calibres that would be better served on the front. Retreat is impossible, so not salvaging them is just a waste."
 SOV_Drop_the_Machine_Gun_Get_the_Machine_Drill: "Drop the Machine Gun, get the Machine Drill"
 SOV_Drop_the_Machine_Gun_Get_the_Machine_Drill_desc: "As our men march forward, carrying the torch of liberty, a problem we thought was solved has resurfaced. The Army has depleted pre-war stockpiles, and we have had to raid museums in occupied territory as well as our own to find weapons to distribute. The Revolutionary Reserve Corps, which was supposed to pick up these weapons when the men carrying them were killed, will be reassigned. They will be sent to the factories to increase production and ensure that the weapons they wield are of this century."
 SOV_Soldiers_Favourite_Companion: "Soldier's Favourite Companion"
 SOV_Soldiers_Favourite_Companion_desc: "Vodka. It is an important part of the Russian diet. To the average soldier, it is a way to unwind and forget about the rigours of battle and their station far from home. However, the battle is even more fierce in this war. The constant and apocalyptic carnage on the front has had a significant impact on our soldiers. Desertion rates are rising, as are cases of shell shock. Our first attempt to solve this problem through mass executions failed. Instead, we'll double the amount of vodka served to the men. On the eve of major offensives, we will triple it. Perhaps if they're drunk and happy, they'll stop 'getting lost' behind the lines."
 
 # The Red Vanguard
 # Decision
 SOV_The_Red_Vanguard: "The Red Vanguard"
 SOV_The_Red_Vanguard_desc: "As we suspected, War with the West is coming and the final struggle for Europe will soon begin. However, there are those behind enemy lines who see us as allies and liberators rather than foes. We must reach out to them and ready them for the coming struggle, and to give them the tools required to ensure they cause as much chaos as possible for the bourgeoisie."
 SOV_RV_Red_Suits_Greece: "Red Suits Greece"
 SOV_RV_Red_Suits_Greece_desc: "While our armies march through Central Europe, we must not forget about the other nations on this continent, particularly those in the South. And one stands out above the rest: Greece, one of the few Southern European countries that is not forced to join our sphere or is socialist in its own right. Now, as the war rages, we need every ally we can get, and we will turn Greece into one by financing its local communist politicians and partisans, providing them with weapons and money, and allowing for a Marxist uprising during which Soviet volunteers can be dispatched to assist the communists."
 SOV_RV_Bolster_Communists: "Bolster Communists in §Y[?red_vanguard_selected_country.GetNameWithFlag]§!"
 SOV_RV_Bolster_Communists_desc: "By assisting local Communist movements, we can offer ideological guidance, material assistance, and organisational expertise to our comrades who are oppressed by the bourgeoisie. Furthermore these movements have the potential to destabilise the nation's administration, jeopardising its stability and causing significant problems that will be difficult to control. The seeds of revolution, once planted, will grow in strength as strikes, protests, and underground gatherings undermine trust in the regime."
 SOV_RV_Send_Guns_to_Guerillas: "Send Guns to §Y[?red_vanguard_selected_country.GetFlag][?red_vanguard_selected_country.GetAdjective]§! Guerillas"
 SOV_RV_Send_Guns_to_Guerillas_desc: "When it comes to fighting oppression, weapons can be more powerful than words. Sending shipments of rifles, machine guns, and explosives to our comrades fighting for the workers' cause ensures that the Communist partisans are well-prepared for a long and difficult resistance until the Red Army arrives.  Furthermore, with the right weapons, rebels can destroy rail lines, ambush supply convoys, and assassinate collaborators, forcing our adversary to shift critical forces away from other sectors. Beyond the immediate tactical advantage, simply knowing that the Soviet Union is providing material assistance strengthens our ties to the future communist administration that will succeed the bourgeois oppressors."
 SOV_RV_Train_Partisans: "Train Partisans in §Y[?red_vanguard_selected_country.GetNameWithFlag]§!"
 SOV_RV_Train_Partisans_desc: "Armed resistance will not thrive without discipline, coordination, and proper training. To address this issue and maximise the impact of Communist cells, we must send experienced Soviet operatives to provide military training and political guidance. These operatives will teach guerillas essential skills that will ensure that every action is carried out with maximum efficiency. Once trained, these partisans will be able to carry out increasingly daring operations, such as targeting enemy command centres and undermining the legitimacy of the ruling government. Citizens will be inspired to rise up and join the cause once they see how organised and disciplined the movement is. The partisan force we will cultivate will eventually become the backbone of the Communist revolution."
 SOV_RV_Target_Infrastructure: "Target Infrastructure in §Y[?red_vanguard_selected_country.GetNameWithFlag]§!"
 SOV_RV_Target_Infrastructure_desc: "Railways, bridges, and supply depots are all examples of infrastructure that are essential to any modern nation.  By directing our partisans and resources, we can limit the enemy's ability to supply their soldiers while maintaining civil order.  Destroyed railways will cause delays in reinforcements, while blasted bridges will isolate divisions and cause chaos and confusion among the military's top brass.  Each act of sabotage will force them to assign soldiers to guard duties, resulting in a personnel shortage. The partisans will emerge as a formidable force, terrifying the populace."
 SOV_RV_Attack_Military_Industry: "Attack Military Industry in §Y[?red_vanguard_selected_country.GetNameWithFlag]§!"
 SOV_RV_Attack_Military_Industry_desc: "Partisans, armed with explosives and inside information from military plants' employees, will launch operations to start fires and sabotage assembly lines in order to halt the flow of weapons to the enemy's troops. Beyond the financial consequences, such strikes instill fear in industrial workers who are not yet committed to our cause, making them hesitant to support the war effort. Strikes and protests, combined with planned sabotage, will reduce productivity and morale at work."
 SOV_RV_Attack_Civilian_Industry: "Attack Civilian Industry in §Y[?red_vanguard_selected_country.GetNameWithFlag]§!"
 SOV_RV_Attack_Civilian_Industry_desc: "Civilian factories manufacture critical materials for both the military and civilian populations. By focussing our efforts on sabotaging these businesses, we will hit the enemy right in the Achilles' heel, causing chaos across the country. The public, already weary of war, will become increasingly hostile to their own government as shortages worsen and living conditions deteriorate. A hungry, freezing, and demoralised population will question the legitimacy of the ruling class, creating an ideal environment for Communist doctrine."
 SOV_RV_Attack_Naval_Industry: "Attack Naval Industry in §Y[?red_vanguard_selected_country.GetNameWithFlag]§!"
 SOV_RV_Attack_Naval_Industry_desc: "Sea power has always been a tool of imperialism, and shipyards play an important role in a nation's ability to project power around the world. The Partisans will now focus their attacks on navy facilities, planting bombs in dry docks to disrupt shipbuilding.  Furthermore, sabotage at steelworks can disrupt the supply of critical naval components, causing delays in development. Sailors will begin to doubt their safety, lowering morale in the ranks. Every ship lost or delayed weakens the country's ability to counter our naval force."
 SOV_RV_Raise_a_New_Partisan_Division: "Raise a New Partisan Division in §Y[?red_vanguard_selected_country.GetNameWithFlag]§!"
 SOV_RV_Raise_a_New_Partisan_Division_desc: "When the underground conflict reaches a critical point, disparate partisan bands must be unified into a more organised combat force.  By causing a new political split, we may be able to transform chaos into coordinated resistance. This division, however irregular, will be equipped, trained, and commanded with Soviet assistance. This is more than just resistance; it's the formation of a new revolutionary army to fight alongside the Red Army."
 SOV_RV_Call_Up_Partisans: "Call Up Partisans in in §Y[?red_vanguard_selected_country.GetNameWithFlag]§!"
 SOV_RV_Call_Up_Partisans_desc: "Decades of repression and covert resistance have resulted in a network of workers, peasants, and honest citizens who are eager to respond to our appeal. By rallying partisans against the continent's bourgeois leadership, we will unleash a wave of opposition. Armed with weapons captured or supplied by the Soviet Union, these fighters will do everything in their power to support the Communist cause in their country and our efforts to liberate people from capitalist pigs. A successful mass mobilisation could shift the balance of power, hastening Communism's inevitable march across Europe."
 change_RV_Divisions_tt: "Increase the amount of §YRed Vanguard§! divisions by 10."
 change_RV_Equipment_tt: "Add §Y1000 Infantry Equipment§! to the Red Vanguard divisions."

