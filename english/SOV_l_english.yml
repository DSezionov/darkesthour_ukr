 SOV_Invade_Poland: "Invade Poland"
 SOV_Invade_Poland_desc: "The Germans have made their move and declared war on Poland. As agreed in the Molotov Ribbentrop Pact, we shall move into Eastern Poland to begin our military operations. We should quickly secure territories along the border we have agreed with the Germans and make sure we have full control of the region by the time we make contact with the German forces approaching from the west."
 SOV_Demand_Bessarabia: "Demand Bessarabia"
 SOV_Demand_Bessarabia_desc: "Now that we have acquired our claims in the North, it is time to face attention to the Balkans once more. Romania holds a once key part of the Russian Empire - the province of Bessarbia, with a significant Russian population. It is time to continue our expansion into Europe."
 SOV_Demand_Karjala: "Demand Finnish Karelia"
 SOV_Demand_Karjala_desc: "The international situation continues to develop, and not necessarily to the Soviet Union's advantage.\n\nAs war in the west draws ever closer, we must look to the defense of the workers. Leningrad sits only 20 miles from the Finnish border, and should the Finns ally with or fall to the enemy, the city of the revolution would be in grave danger. It is essential to the defense of the Soviet Union that the border be shifted outward and away from the city.\n\nDue to our standing non-aggression pact with Finland, we will first attempt to solve this matter peacefully in a series of bilateral talks. Surely they will understand our point of view.\n\nShould the Finns resist, however, we will remind them just how small their little country is.."

 SOV_Everything_According_to_Plan: "Everything According to Plan"
 SOV_Everything_According_to_Plan_desc: "The Finnish refusal to cede the lands necessary for the defense of Leningrad forces us to act. To secure our northwestern border, we must strike hard and advance rapidly. The longer the war drags on, the more dangerous it becomes for our prestige and for the Red Army itself."

 SOV_Winter_War_About_Win: "If we win this war §Yquickly§! we'll get §Ghuge benefits!§!"

 SOV_Integration_of_Tuva: "Integrate the [TAN.GetFlag]§RTuvan People's Republic§!"
 SOV_Integration_of_Tuva_desc: "The Tuvan People's Republic, a small and largely unrecognized state along the Siberian-Mongolian frontier, has remained under Moscow's influence since the end of the Russian Civil War. Governed by a loyal communist cadre and dependent on Soviet economic and military support, Tuva functions less as an independent nation than as an extension of Soviet administration. With Red Army advisers already entrenched in Kyzyl and the local leadership ideologically aligned with Moscow, formal integration would merely recognize the reality on the ground.\n\nThis is also a convenient moment to resolve the long-standing border dispute between Tuva and Mongolia. Soviet cartographers have proposed that the arid frontier strip south of the Tannu-Ola Mountains be fully incorporated into Tuva. In return, Tuva will permanently cede the remote Darkhad Valley in the east to Mongolia for logistical reasons."
 SOV_Baltic_Basing_Rights: "Ask for Basing Rights in the Baltic"
 SOV_Baltic_Basing_Rights_desc: "Now that Germany is seeking claims in the East, we must prepare for a possible event of a mass German invasion of our motherland. We should exert our influence over the Baltic and seek military presence in Riga, Tallinn and Kaunas."
 SOV_Iran_Invasion: "Soviet Invasion of Iran"
 SOV_Iran_Invasion_desc: "Iran is a corrupt, fascist dictatorship and the underbelly of our nation. If they were to join Germany on Barbarossa or cut off our supply routes, it would have disastrous consequences on our morale. We must force the Shah to step down, or face a pre-emptive strike."
 SOV_Occupy_Estonia_And_Latvia: "Occupy Estonia and Latvia"
 SOC_Occupy_Estonia_And_Latvia_desc: "Now that the west is distracted with Germany's aggression, it is finally the ideal time for expansion. The Red Army shall march into Riga and Talinn and put an end to the authoritarian regimes of Latvia and Estonia."
 SOV_Occupy_Lithuania: "Occupy Lithuania"
 SOV_Occupy_Lithuania_desc: "Now that Latvia and Estonia has been dealt with, now is the time to seize the last of the Baltic states. Lithuania's industry shall come in very useful once the inevitable finally arrives."
 SOV_Invade_Germany: "Invade Germany"
 SOV_Invade_Germany_desc: "The German Reich in the west is becoming increasingly aggressive towards it's neighbours, invading nations from Scandinavia to the Balkans as a means of expanding their influence. Despite their non-aggression pact with us, It's only a matter of time before they come knocking on our doorstep. It is finally time to intervene in the Second World War."
 #Second Five-Year Plan
 SOV_Second_Five_Year_Plan_category: "Second Five-Year Plan"
 SOV_Second_Five_Year_Plan_category_desc: "\n\n\n£decision_header_SOV_Second_Five_Year_Plan£\n\n\n\nThe industrial might that our grand union can muster certainly knows no bounds. And with the rising tension in Europe and the Far East, it is imperative that we utilize a §YSecond Five Year Plan.§! After all, we saw the immense success of our previous Five Year Plan; albeit, with some difficulties regarding our methods. However, these supposed mistakes will not be repeated, and the successes of the previous plan will only be increased.\n\n Our main objective for this Five Year Plan is to continue the §Ymass mechanization§! we have been experiencing over the past few years. We will also see to the empowerment of our dear workers, who toil the §Ycollective farmland§! with such rigour, and their families, who provide the children to continue the revolutionary cause.\n\n We will see our glorious Union achieve §Gindustrial, agricultural, and cultural success§! to rival and even surpass that of the dreaded Germans.\n"
 SOV_Moscow_Metro: "Moscow Metro"
 SOV_Moscow_Metro_desc: "\n\n\n\n£picture_SOV_Moscow_Metro\n\n\n\n\n\n\nThe ongoing project of the construction of the Moscow Metro is nearing completion. Thousands of Soviet workers, guided by several foreign engineers and designers have over the last few years have done considerable work, and quite successfully so. Once complete, the Moscow Metro system will become the finest and most modern metro transit system in the whole world.\n\nTo celebrate this achievement of the Soviet state and its people, a fine song by the name of \"Songs of the Joyous Metro Conquerors\" has been composed, and preparations are being made for celebrations on the inauguration day. It is projected that on the day first itself, the metro will allow for over 280,000 people to be able to ride and experience this marvel in modern engineering."
 #SOV_Moscow_Metro_tt_picture: "\n\n\n\n£picture_SOV_Moscow_Metro\n\n\n\n\n\n\n"

 SOV_Second_Five_Year_Plan_tt: "One §YSecond Five Year Plan§! decision has completed."

 SOV_Second_Five_Year_Plan.1.t: "State of the Art Metro built in Moscow"
 SOV_Second_Five_Year_Plan.1.d: "[FROM.GetNewsIcon]The USSR's State Planning Committee just issued a statement to the international press during a conference in Moscow, informing the world of the completion of an 80-kilometer-long, ten-line, cutting-edge metro system in the USSR's capital, Moscow. A specific plan was developed for it in 1930, and it is now being implemented, with Moscow residents enjoying much easier commutes throughout the city.\n\nThe beautifully constructed areas of the metro, with elegant columns and painted frescoes designed to resemble a palace, were photographed and filmed numerous times by reporters on a tour of the metro, with Soviet officials extolling it as the 'Palace of the People'.\n\nA great news spectacle took place when Y. H. Zabrovsky, a 75 year old pensioner and veteran of the Russo-Japanese War, purchased the first metro ticket and officially became the first passenger of the Moscow metro. Initially, Soviet news crews mistook Mr. Zabrovsky for P. N. Latyshev, a hero of labor, who bought ticket No. 1 of the A Series at the Sverdlovsk Station, but the mistake has been corrected.\n\nAs the Soviet citizens celebrate, the world waits to see what other projects the USSR has in store."
 SOV_Second_Five_Year_Plan.1.A: "The Palace of the People shall shine as a beacon of light and glory in the world!"
 SOV_Second_Five_Year_Plan.1.B: "The Russians certainly know how to impress..."

 SOV_Ural_Heavy_Machinery_Plant: "Ural Heavy Machinery Plant"
 SOV_Ural_Heavy_Machinery_Plant_desc: "\n\n\n\n£picture_SOV_Ural_Heavy_Machinery_Plant\n\n\n\n\n\n\nIn 1926, we began construction on the Ural Heavy Machinery, or Uralmash, with the goal of creating a local industrial centre to supply equipment to our metallurgical and mining industries in Siberia and the Urals, such as presses, cranes, blast furnace equipment, and so on.\n\nDue to a lack of technologies in our Soviet motherland, the plant will rely on foreign-imported equipment and specialists, particularly from German industrial conglomerates and giants such as \"Hydraulik\", \"Schlemann and Wagner,\" \"Krigar\" \"Sheppard,\" \"AEG,\" \"Mars-Werke,\" among others. After several setbacks, the plant is nearing completion and, with a financial boost from the state, will be ready and operational within the next few months."
 SOV_Second_Five_Year_Plan.2.t: "A Titan of the Urals"
 SOV_Second_Five_Year_Plan.2.d: "With financial assistance from the Soviet Government, the Uralmash completed construction and, in a grand ceremony attended by journalists from all over the Union, began production of the first necessary equipment for our Siberian and Uralian metallurgical and mining industries, with fresh off-the-line presses and cranes being photographed and posted in newspapers across the Union. In addition, a new 'Socialist City' has been built in Sverdlovsk to house the many thousands of Uralmash employees. The plant is now regarded as a Titan, shining in socialist glory throughout the Urals and the Union."
 SOV_Second_Five_Year_Plan.2.A: "The Uralmash will shine in glory among the snows and mountains!"

 SOV_Kramatorsk_Heavy_Machine_Tool_Engineering_Plant: "Kramatorsk Heavy Machine-Tool Engineering Plant"
 SOV_Kramatorsk_Heavy_Machine_Tool_Engineering_Plant_desc: "\n\n\n\n£picture_SOV_Kramatorsk_Heavy_Machine_Tool_Engineering_Plant\n\n\n\n\n\n\nOur leader's ever-expanding and more ambitious plans for Soviet mining and industry require an increasing amount of resources to be realised. Currently, the Soviet Union lacks a strong domestic base for developing mining and metallurgy, particularly in the Ukrainian SSR and parts of the RSFSR. To develop our industry in Ukraine while also supplying our mines and plants with necessary products, we will build the 'Kramatorsk Heavy Machine Tool Engineering plant', which will manufacture necessary equipment for mining and metallurgy.\n\nThis project will not only help to develop our machine tool industry and supply our mining and metallurgy, but it will also create thousands of jobs for Kramatorsk residents and the surrounding areas."
 SOV_Second_Five_Year_Plan.3.t: "Donetsk Machine Tool Industry"
 SOV_Second_Five_Year_Plan.3.d: "With the establishment of the Kramatorsk Heavy-Machine Tool Engineering Plant, Donetsk Oblast is quickly becoming a manufacturing hub for machine tools that supply industries throughout our great Socialist Union. The town of Kramatorsk reaps the benefits of the Plant, growing from a small urban centre to a thriving city with a strong industrial base. Every day, people from the countryside in Ukraine and Russia arrive in Kramatorsk in the hopes of finding work at the Heavy Machine Tool Engineering Plant, a highly sought-after position.\n\nThe mining and metallurgical industries in the Western Union, particularly in the Ukrainian SSR parts of the RSFSR, are expected to thrive as a result of the Heavy Machine Tool Engineering Plant's construction, with all necessary machine tools produced domestically. Our mining and metallurgical industries will be completely self-sufficient, using domestically produced tools and labour to produce the ores and metals required for the Union to thrive!"
 SOV_Second_Five_Year_Plan.3.A: "The Soviet Citizen celebrates!"

 SOV_Ural_Railroad_Car_Factory: "Ural Railroad Car Factory"
 SOV_Ural_Railroad_Car_Factory_desc: "Although our Union is strong and glorious, it still falls short in many areas of domestic production. Domestic railway car production is an area of particular concern. Our socialist paradise is vast, with many railways connecting its cities and countryside, but railway car production in the Union remains small and inefficient, forcing our major railways to rely on imports from abroad or significantly limit their operations.\n\nTo address this issue, we began construction of the 'Ural Railway Car Factory' at Nizhny Tagil, but progress has been slow thus far. If we increased funding for the project significantly, construction would be accelerated, and the railway car factory would soon become a reality."
 SOV_Second_Five_Year_Plan.4.t: "The Centre of Soviet Railroad Car Production"
 SOV_Second_Five_Year_Plan.4.d: "Nizhny Tagil, in Sverdlovsk Oblast, has long been a centre of locomotive and rail technology production in Russia, where the first Russian steam locomotive was developed. It is now home to the Ural Railroad Car Factory, a massive complex employing tens of thousands of workers that will meet all of the Union's goods car needs domestically while also producing a surplus to be exported abroad.\n\nWith the construction of this factory, our railways will thrive, transporting goods and passengers in quantities unprecedented in the history of our socialist paradise. Nizhny Tagil will also become a major industrial centre in the Ural Region, with the town rapidly expanding to accommodate the plant's many thousands of employees and their families. Under the wise leadership of our Great Helmsman, Comrade Stalin, the Union's industry and railroads will reach new heights!"
 SOV_Second_Five_Year_Plan.4.A: "The UralVagonZavod is a testament to the might of the proletariat!"

 SOV_Chelyabinsk_Tractor_Plant_Plan: "Chelyabinsk Tractor Plant"
 SOV_Chelyabinsk_Tractor_Plant_Plan_desc: "With our collectivization policies, the Soviet peasant is becoming increasingly reliant on one piece of machinery: the tractor. Currently, we lack a domestic production base for tractors, both military and agricultural. Thus, the People's Commissariat for Agriculture has devised a plan to build a large factory in Chelyabinsk with the purpose of producing  Soviet tractors for peasants to till their fields with, and hopefully, artillerymen to haul their guns with.\n\nNot only will the plant provide us with an ample domestic supply of these machines, but it will also create tens of thousands of jobs for Chelyabinsk residents and encourage extensive development of the city, resulting in regional economic prosperity and joy for Soviet workers. All that is required is Comrade Stalin's signature and the necessary funding to make the tractor plant a reality."
 SOV_Second_Five_Year_Plan.5.t: "The Chelyabinsk Tractor Plant"
 SOV_Second_Five_Year_Plan.5.d: "The first batch of Stalinets-60 Tractors, infused with the power of Soviet metal and the diligence of Soviet workers, has rolled off the production lines of the Chelyabinsk Tractor Plant and will be shipped across the Union to benefit our people, military, and agriculture. The S-60, which is heavily built and powered by a powerful benzine engine, is a formidable piece of machinery capable of ploughing fields with little effort and hauling even the heaviest of loads. The People's Commissariat for Defence, in particular, is very interested in acquiring S-60 tractors for hauling and transporting artillery, and the Chelyabinsk Tractor Plant is already receiving a flurry of orders from farms and military units."
 SOV_Second_Five_Year_Plan.5.A: "Soviet Machinery is Truly the Greatest in the World!"

 SOV_Krivoi_Rog_Steel_Mill: "Krivoi Rog Steel Mill"
 SOV_Krivoi_Rog_Steel_Mill_desc: "The People's Commissariat for Heavy Industry of the USSR and Comrade Stalin intend to develop Ukraine, a primarily agricultural territory and our Union's breadbasket, into a heavy industry hub, with the goal of making it the primary steel supplier for both domestic consumption and export. To that end, we will finance the construction of a massive steel mill in Krivoi Rog, just beyond the Dnieper.\n\nWith over 20,000 employees, three blast furnaces, and two open hearth furnaces, it will be one of the largest steel mills in our Union, and certainly the largest in Ukraine, producing over a million tonnes of steel per year. The mill's construction will bring great prosperity to Krivoi Rog, transforming it from a small industrial centre into a massive and thriving city of steel production."
 SOV_Second_Five_Year_Plan.6.t: "A Titan of Soviet Steel Production"
 SOV_Second_Five_Year_Plan.6.d: "The mill was the first thing I noticed when I arrived in the city. That massive production machine that transformed ore into steel and would now serve as my permanent workplace. It stood like a titan on the outskirts of the city, dwarfing the surrounding buildings.\n\nWhen I first read the advertisement for the new steel mill in Krivoi Rog looking for RSFSR specialists, I was sceptical. I had a good job here in Moscow, and moving all the way to Ukraine would be a huge challenge for my family. Furthermore, the 12-hour shifts would undoubtedly be long, hard, and laborious. Then I read the pay: 2.50 rubles per day of labour.\n\nFour weeks later, I'm walking to my first 12-hour shift at the mill. Elena, my daughter, says, 'All will be well'. I find myself believing that a lot more than before.\n\n- Diary of Yuri Ivanov, worker at the Krivoi Rog Steel Mill"
 SOV_Second_Five_Year_Plan.6.A: "The Soviet Worker is proud to serve his motherland!"

 SOV_New_Lipetsk_Steel_Mill: "New Lipetsk Steel Mill"
 SOV_New_Lipetsk_Steel_Mill_desc: "One of the primary goals of the Second Five-Year Plan, as envisioned by Comrade Stalin and the State Planning Committee, is to transform the USSR's heavy industry, particularly its steel industry, into one of the largest and most productive in the world. As part of the plan to achieve this lofty goal, a large steel mill in Lipetsk will be built to supply steel to the surrounding regions and the military. Stalin anticipates a rapid construction and opening of the mill. Let us not disappoint him."
 SOV_Second_Five_Year_Plan.7.t: "Lipetsk - A center of Steel Production"
 SOV_Second_Five_Year_Plan.7.d: "When a Soviet man visits or lives in the city of Lipetsk, he sees the wonders of his achievements. A massive Goliath on the horizon, several blast furnaces rising high and mighty, giant clouds of smoke billowing out as workers convert iron ore into steel. The Novolipetsk Metallurgical Plant is a marvel of Soviet industry and engineering. When combined with other massive steel mills across the country, it will be a key component in elevating the Soviet Union's heavy industry to new heights, putting it on par with and ahead of Western capitalists. Nobody will be able to match Soviet industrial might!"
 SOV_Second_Five_Year_Plan.7.A: "Soviet Steel is the mightiest of all!"

 SOV_New_Tula_Steel_Mill: "New Tula Steel Mill"
 SOV_New_Tula_Steel_Mill_desc: "The Korobkovskoye iron ore field, just outside of Tula, has been determined to be the ideal location for a new steelworks. The field is very rich in iron ore, making it a valuable asset to the Tula region and the Union as a whole, and it must be exploited. The People's Commissariat for Heavy Industry and the State Planning Committee have approved plans to build a new iron and steel mill on the field's site, known as the 'New Tula Steel Mill', but funds are still needed to complete the project."
 SOV_Second_Five_Year_Plan.8.t: "Steel For Stalin"
 SOV_Second_Five_Year_Plan.8.d: "Joseph Stalin, General Secretary of the All-Union Communist Party, puffed on his pipe while completing paperwork and signing documents. As he finished signing the final piece of paperwork, there was a knock at the door. God forbid, he wanted to dine with Khrushchev and Molotov, but he had to deal with more serious matters.\n\n\"Enter,\" he said, taking a few short puffs from his pipe before sighing and adjusting his moustache.\n\nTwo NKVD guards entered and presented the General Secretary with a crate. When the container was opened, steel ingots were discovered inside. The workers at the New Tula Steel Mill had sent Comrade Stalin a crate of steel produced by the mill as a token of gratitude for his generosity in building the mill and providing them with jobs.\n\n\"Mhm. Fine specimen. Take it away immediately and call Molotov. I recently received some imported Cognac from France. We'll drink to the mill!\" Stalin told the guards before shooing them away."
 SOV_Second_Five_Year_Plan.8.A: "Comrade Stalin is the guiding light of the Soviet worker!"

 SOV_Azovstal_Steel_Rolling_Plant: "Azovstal Steel Rolling Plant"
 SOV_Azovstal_Steel_Rolling_Plant_desc: "As part of the People's Commissariat of Heavy Industry's plan to transform Ukraine, particularly Eastern Ukraine, from an agricultural territory to a centre and absolute powerhouse of Soviet heavy industry, we will begin construction of a large iron and steel works in the port city of Mariupol, which will be known as 'Azovstal', after the sea to which it looks. Mariupol is already a major Black Sea port; it will now be transformed into a national steel and iron production centre. With Comrade Stalin at the helm, we can expect quick results!"
 SOV_Second_Five_Year_Plan.9.t: "A City Within a City"
 SOV_Second_Five_Year_Plan.9.d: "The Azovstal Iron and Steel Works has been completed, and delegates from the State Planning Committee, the People's Commissariat of Heavy Industry, and the Ukrainian Communist Party opened the massive complex in a grand celebration in front of cheering Mariupol residents and workers. One of the most modern steel mills in the Union, it houses blast furnaces, a sinter plant, a coke making complex and a steel works with a 250 tonne open hearth furnace.\n\nWith more than 12,000 employees, the plant has spawned the development of an entire city outside the plant, complete with homes, schools, movie theatres, a hospital and maternity clinic, and two parks for workers to enjoy. When combined, the plant and its surrounding housing and services resemble a socialist utopia within Mariupol. Mariupol will soon become a beacon of socialist labour and prosperity!"
 SOV_Second_Five_Year_Plan.9.A: "The Soviet worker labors for the good of the Union, and for that he is richly rewarded."

 SOV_Zaporozhstal_Steel_Rolling_Plant: "Zaporozhstal Steel Rolling Plant"
 SOV_Zaporozhstal_Steel_Rolling_Plant_desc: "The city of Zaporozhia in the Ukrainian SSR has always been a major urban centre, but its industrial, particularly heavy industrial, potential has always been limited to the city and the surrounding Zaporozhye Oblast. The People's Commissariat of Heavy Industry is currently drawing up plans and documents to build a large steel works in the city, with the goal of making it a national centre of steel production and further expanding and developing it, as well as obtaining the necessary steel supplies for the ever-growing Red Army, with an annual production capacity of several million tonnes of crude steel, iron, and rolled steel."
 SOV_Second_Five_Year_Plan.10.t: "The Socialist Industrial Beacon of Southeastern Ukraine"
 SOV_Second_Five_Year_Plan.10.d: "Zaporozhye is a rapidly growing urban centre in Eastern Ukraine. It is home to the Dnieper River hydroelectric dam, as well as a number of smaller factories that manufacture everything from consumer goods to Red Army ammunition. The city now welcomes another addition to its expanding industrial landscape. The Zaporozhstal Steel Rolling Plant is a massive iron and steel production complex with over 10,000 employees and an annual capacity of millions of tonnes.\n\nPeople have begun to praise the steel mill as a 'Beacon of Socialist in Southeastern Ukraine', because the workers not only work long hours for the betterment of the Union, but they also receive free education, healthcare, and housing just outside the massive steel mill."
 SOV_Second_Five_Year_Plan.10.A: "The Soviet worker serves his motherland and Comrade Stalin with pride!"

 #SOV_Steel_Mill_tt_picture: "\n\n\n\n£picture_SOV_Steel_Mill\n\n\n\n\n\n\n"

 SOV_Tashkent_Textile_Factory: "Tashkent Textile Factory"
 SOV_Tashkent_Textile_Factory_desc: "In 1932, we began construction on a massive textile factory in the Uzbek city of Tashkent, which promised to bring prosperity and growth to the city while also supplying Siberia and the Far Eastern part of the Union with necessary textiles for the well-being of its citizens and industries. Our General Secretary, upon learning of the factory's unfinished state, demands a faster pace of construction.\n\nThe People's Commissariat for Light Industry has thus authorised a new injection of funds into the project to complete the workshops' construction and install necessary equipment. The Tashkent Textile Factory, with thousands of employees, 15 spinning machines, and an expected production capacity of many spindles and looms, will be one of the largest in the Union. With the wise guidance of our General Secretary, construction is moving forward!"
 SOV_Second_Five_Year_Plan.11.t: "The Fruits of Uzbek Socialism"
 SOV_Second_Five_Year_Plan.11.d: "\"Our current production capacity is 113 thousand spinning spindles and 3250 looms, Comrade First Secretary. The spinning machines that were installed only a few weeks ago are performing admirably. Our employees are very happy with them and their working conditions.\", the director of the Tashkent Textile Factory told Ikramov, shouting over the din and thunder of the textile machines in one of the workshops they were visiting, the first on their tour of the factory.\n\nIkramov looked around. Many men and women rushed back and forth, operating the textile machines in the workshop. Although the man had little knowledge of how textile production worked, everything appeared to be going well based on the factory director's explanations. A sharp-eyed NKVD guard walked around the factory floor, while portraits of Stalin and Ikramov himself looked down on the employees.\n\n\"Ah, Comrade, please tell the First Secretary your name and how you enjoy working here.\", the director said, drawing one of the workers aside and making him face Ikramov. Out of the corner of his eye, Ikramov noticed the NKVD guard staring down both the worker and the manager.\n\n\"Mirzali Shukrullayev, Comrade First Secretary.\" I am honoured that you came to visit my workplace, and I am delighted to work here. The working conditions are the best in Tashkent! Uzbekistan will prosper thanks to my and my comrades' hard work!\" The worker rambled off.\n\nIkramov chuckled and patted the man's shoulder. \"Be at ease, comrade. It makes me happy that this factory and its employees work so hard and efficiently. Comrade Stalin would be proud.\" Another chuckle. Ikramov's plans to turn Uzbekistan into a textile and cotton powerhouse appear to be on track. Soon, the entire Soviet Union would rely on Uzbek textiles."
 SOV_Second_Five_Year_Plan.11.A: "The worker, leader, and the country all reap the rewards of collective labor!"

 SOV_Barnaul_Paper_Cotton_Factory: "Barnaul Paper-Cotton Factory"
 SOV_Barnaul_Paper_Cotton_Factory_desc: "Our expanding industry in Siberia, Central Asia, and the Far East requires an increasing supply of textiles for workers and residents. The People's Commissariat of Light Industry and the State Planning Committee have devised a plan to build a large textile plant in Barnaul, employing over a thousand workers in spinning, weaving, and finishing factories. The plant's construction will not only provide much-needed supplies of low-cost, high-quality textiles to our hardworking employees, but it is also expected to boost the Altai Region's economy significantly. Prosperity for all under Socialism!"
 SOV_Second_Five_Year_Plan.12.t: "The Textiles of Altai"
 SOV_Second_Five_Year_Plan.12.d: "After some construction delays, the Barnaul Paper-Cotton Plant has been completed, and workers have already begun producing the plant's first textile products. Under the watchful eye of our great General Secretary, whose portrait hangs in every room, over a thousand workers from Altai and other regions operate large machines and produce fine textiles for all Siberian workers and peasants to enjoy. Meanwhile, the workers benefit from the many free and accessible services provided by the 'Socialist City' built around the plant. The chairman of the All Union Communist Party Barnaul Regional Committee has sent a report to Moscow, describing the plant's work and product as'more than satisfactory'."
 SOV_Second_Five_Year_Plan.12.A: "The worker, leader, and the country all reap the rewards of collective labor!"

 SOV_Norilsk_Ore_Mining_Smelting_Plant: "Norilsk Ore Mining & Smelting Plant"
 SOV_Norilsk_Ore_Mining_Smelting_Plant_desc: "The area around the tiny settlement of Norilsk, 300 kilometres north of the Arctic Circle, which also includes the Norillag Corrective Labour Camp, has been discovered to contain rich deposits of copper and polymetallic ores, particularly nickel. These resources must and will be utilised for the betterment of our socialist paradise. All that would be required is some signatures to transfer control of the area to the NKVD, who would then use the counter-revolutionaries and traitors housed in the Norillag Camp to construct an ore mining complex."
 SOV_Second_Five_Year_Plan.13.t: "Growth Built on Suffering"
 SOV_Second_Five_Year_Plan.13.d: "Dimitry's breath fogged up as he and his dozen-man work detail were led into the mines by two NKVD guards, their rifles ready. The lack of food, the cold, and the exhausting, long hours of hard work in the mines had reduced him to a shell of his former self. He was a well-known violinist in Leningrad, a talented music teacher, and a popular composer. He refused to work for the communist party or compose propaganda music for them.\n\n\"That's probably what got me sent here.\", he thought to himself as he descended deeper into the copper mine. He was at the back of the 12-man work detail, so he was constantly getting shouts of \"Davai!\" and rough pushes from the armed NKVD guards behind him. The malnourished man could only humbly lower his head and continue walking. Another 14-hour day of work is in store. Dimitry just hopes a drunken guard will shoot him one night and save him from more of this icy, backbreaking misery."
 SOV_Second_Five_Year_Plan.13.A: "The Union has no place for counter-revolutionaries in society!"

 SOV_Ural_Kuznetsk_Ore_Mining_Smelting_Works: "Ural-Kuznetsk Ore Mining & Smelting Works"
 SOV_Ural_Kuznetsk_Ore_Mining_Smelting_Works_desc: "The Kuznetsk Iron and Steel Works was completed in 1932, but has since been operating at a slow pace, producing far less than its maximum capacity of 1.5 million tonnes of pig iron per year. The People's Commissariat for Heavy Industry, and thus Comrade Stalin, are extremely dissatisfied. The Council of People's Commissars has voted to increase funding for plant operations while also ordering harsh punishments against plant managers and counter-revolutionary infiltrators who are sabotaging production and efficiency."
 SOV_Second_Five_Year_Plan.14.t: "A Trial in the Night"
 SOV_Second_Five_Year_Plan.14.d: "Vladimir sat at his desk, idly puffing on a cigarette and sorting paperwork. He spent the majority of his time as a plant manager at the Kuznetsk Iron and Steel Works behind a desk. Typing and approving reports, reviewing wages, production rates, and so on. He usually stayed late to finish work ahead of schedule, and today was no exception. Suddenly, he heard a loud banging on the door.\n\nAs he pressed the handle to open the door, he had no time to react before two NKVD men grabbed him and placed a bag over his head. The man protested, but he was dragged into a car and taken to the local NKVD headquarters. When he removed the bag, he saw a trio of NKVD officers in front of him, with a portrait of Stalin on the wall.\n\n\"Vladimir Baranov, you have been accused of counter-revolutionary activities, including sabotaging pig iron production at the Kuznetsk Iron and Steel Works in exchange for private payments from Western intelligence agencies. Several confessions signed by your coworkers, as well as a discreet investigation, have provided irrefutable evidence of your guilt.\", stated the highest-ranking officer. Vladimir was always aware that both Moscow and the local party branch were dissatisfied with the low production rates, but there was nothing he could do about it. The freezing temperatures and a lack of highly skilled workers made it impossible to operate efficiently without additional resources.\n\n\"This tribunal hereby finds you guilty of counter-revolutionary activities, crimes against the proletariat, and espionage for Western powers, and hereby sentences you to 50 years of hard labour.\", the agent continued.\n\n\"P- p- please...\", Vladimir stammered out, as he slumped to his knees and began to wail, cry, and beg. The two NKVD members dragged him away."
 SOV_Second_Five_Year_Plan.14.A: "Saboteurs will be harshly punished!"

