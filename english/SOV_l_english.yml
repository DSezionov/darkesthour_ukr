 SOV_Women_in_the_Workforce: "Women in the Workforce"
 SOV_Women_in_the_Workforce_desc: "As part of our commitment to total liberation, we have decided to focus on the home. For far too long, women have been confined to their homes while their menfolk, the family's breadwinners, go off to earn all of the money. This will now change. We will open up many more positions in the economy for women. In addition, we plan to launch a massive campaign to persuade women to leave their homes and work. By freeing up these menial positions, not only do we continue to liberate women from the patriarchy's reactionary shackles, but we also free up men for more labor-intensive jobs."

 SOV_Women_in_the_Workforce_1: "Women in the Workforce"
 SOV_Women_in_the_Workforce_1_desc: "The liberation of women is complete. Women are now fully integrated into the workforce in most jobs. While the most labor-intensive industries, such as construction and resource extraction, continue to be dominated by men due to choice rather than social standards. This has not only made households richer by providing two sources of income rather than just one, but it has also increased women's equality at home."

 SOV_Red_Dream_Over_Europe: "Red Dawn over Europe"
 SOV_Red_Dream_Over_Europe_desc: "\n\n\nThe clock strikes eleven, and the West's bell rings. As the Union prepares for its final, massive effort, wheels within wheels and plans within plans sputter to life. The STAVKA, which was once preparing to transition into a more peacetime operation, has reconvened at 37 Kirov St. Within its hallowed halls, the Soviet People's greatest military minds gather to pour all of their accumulated expertise into their next given task, the order to overrun the rest of Europe and liberate the people!\n\n\nMeanwhile, across the Union, people are bracing themselves for the impending trial, eager to see this last war end. There is no doubt that the upcoming conflict will be difficult, perhaps even more so than the Patriotic War."

 SOV_Call_Upon_The_Red_Vanguard: "Call upon the Red Vanguard"
 SOV_Call_Upon_The_Red_Vanguard_desc: "As our armies strike deep into the heart of the Capitalist beast, the time has come to appeal to the people for assistance. Those communist movements we previously approached are still gathering weapons, selecting targets, and recruiting members. We are receiving thousands of secret communications from dozens of cells ranging from Scotland to Greece, all pleading for the word to be given. That moment has finally arrived. We urge all comrades to rise above the filth and squalor to which your masters have condemned you! Raise your hands for the sake of your children's futures! Put an end to the oppressive system that only wants to keep you down!"

 SOV_Stakhanovite_Movement_idea: "Stakhanovite Movement"
 SOV_Stakhanovite_Movement_idea_desc: "Aleksei Grigorievich Stakhanov is a model Soviet worker! He mined 102 tonnes of coal in six hours, 16 times his quota. This superhuman feat of endurance has quickly proven beneficial to us. To motivate our employees to achieve even greater feats of endurance, efficiency, and productivity, we elevated Stakhanov to the status of hero, setting a shining example for all to follow.\n\nHis inspirational example, as well as the generous rewards for those who can match or exceed his feat, have swept the nation. Soviet workers from Siberia to Ukraine, Murmansk to Georgia, are tripling their efforts and honing their craft to perfection.\n\nNo effort or sacrifice is too great if the end result is nothing but perfection!"

 SOV_Stakhanovite_Movement_idea_2: "Stakhanovite Movement"
 SOV_Stakhanovite_Movement_idea_2_desc: "Aleksei Grigorievich Stakhanov is a model Soviet worker! He mined 102 tonnes of coal in six hours, 16 times his quota. This superhuman feat of endurance has quickly proven beneficial to us. To motivate our employees to achieve even greater feats of endurance, efficiency, and productivity, we elevated Stakhanov to the status of hero, setting a shining example for all to follow.\n\nHis inspirational example, as well as the generous rewards for those who can match or exceed his feat, have swept the nation. Soviet workers from Siberia to Ukraine, Murmansk to Georgia, are tripling their efforts and honing their craft to perfection.\n\nNo effort or sacrifice is too great if the end result is nothing but perfection!"

 SOV_Izatov_Movement_idea: "Izatov Movement"
 SOV_Izatov_Movement_idea_desc: "Taking Nikita Alekseyevich Izotov's accomplishments as an example, Soviet workers have begun to push themselves and their peers harder for increased workplace efficiency and quota compliance. As a result, production of goods and resources in the union has increased, albeit at the expense of overall well-being. However, the Soviet man toils and dies for his motherland!"

 SOV_Vinogradov_Movement_idea: "Vinogradov Movement"
 SOV_Vinogradov_Movement_idea_desc: "After a small team of weavers successfully operated 70 weaving machines at the same time, Soviet textile workers felt emboldened and uplifted. Many people now strive to work harder and meet their quotas, even at the expense of their personal health and well-being. As a result, the Soviet weaving and textile industries have increased production."

 SOV_Second_Five_Year_Plan: "Second Five-Year Plan"
 SOV_Second_Five_Year_Plan_desc: "The First Five Year Plan was a resounding success, transforming not only the sagging Soviet economy but also society. Its success has prompted the General Secretary to push for the Second Five Year Plan. It has similar ambitious goals, having begun in 1932 and expected to be completed no later than 1937. Soviet heavy industry, factories, steel mills, and infrastructure will be expanded and improved to meet European quality and quantity standards.\n\nStarting from our admittedly pathetic and inefficient base, we face an uphill battle. However, the Soviet people are not strangers to hardship. We will do whatever it takes to strengthen the Rodina and create a Socialist Paradise capable of repelling even the most industrialised enemies."

 SOV_Five_Year_Plan_Fulfilled: "Five-Year Plan Fulfilled"
 SOV_Five_Year_Plan_Fulfilled_desc: "We did it! We completed and exceeded Comrade Stalin's five-year plan! We have reached unprecedented heights thanks to the combined efforts of the proletariat, engineers, workers, and collective farms, and our industry is far ahead of many European countries. Comrade Stalin's second five-year plan increased the country's GDP per capita, commissioned over 4,500 new enterprises, expanded the defence industry, and the country's industry stopped losing money for the first time since the end of the NEP policy. We have demonstrated that a closed and controlled economy, led by a wise Leader, can perform equally well as capitalist systems."

 SOV_Five_Year_Plan_Failed: "Five-Year Plan Failed"
 SOV_Five_Year_Plan_Failed_desc: "The second five-year plan was intended to catch up with the economic well-being of the capitalist West while also improving population prosperity, but it failed miserably. Comrade Stalin is extremely unhappy and has once again begun to suspect that the country's economic sector contains traitors. This misunderstanding needs to be resolved as soon as possible. It appears that reforms are required, and many party members are already convinced that the country requires changes."

 SOV_Soviet_Famine_idea: "Failure of the Harvest"
 SOV_Soviet_Famine_idea_desc: "The reports coming in from farms across the Union are concerning. The major push for industrialization has drawn, and in some cases forced, farmers into factories. Many farms have died as a result of abandonment or underperformance, leaving inexperienced sons or hired help to manage them.\n\nUkraine appears to be hardest hit. However, other kolkhozy from other republics have managed to compensate for some, if not all, of the shortfalls. Imports may compensate for another part, but we are still short on food for the immediate future.\n\nThere will be some hunger in the stomachs of some loyal Soviets for the next few months, but our administration, from the General Secretary to the lowest apparatchik, recognises that this is far from the worst that could have happened."

 SOV_Soviet_Small_Famine_idea: "Harvest Shortages"
 SOV_Soviet_Small_Famine_idea_desc: "The latest harvest numbers are in, and they do not look good. Even the inflated figures are still far below expectations. This means that there isn't enough food in the Union. There are as many solutions to the impending famine as there are food supplies. Some have proposed additional imports, while others have blamed farmers for not working hard enough and urged the government to punish the worst kolkhozy to inspire the rest to produce better harvests the next time.\n\nHowever, this does not address the immediate issue of many Soviets being destined to starve, and there is little we can do to prevent it."

 SOV_Soviet_Big_Famine_idea: "Major Failure of the Harvest"
 SOV_Soviet_Big_Famine_idea_desc: "It's 1921 all over again, but there's no civil war to blame. Our own mismanagement, combined with an ongoing drought, has resulted in a near-collapse of the agricultural sector.\n\nHarvests are far below what we require to feed our people, and only a miracle can prevent millions of Soviet citizens from starving. Rations have already been cut in half, and we are preparing to cut them again. Cannibalism and mass starvation are being reported from rural towns that rely on government food stores. Ukraine and Kazakhstan, once considered the Union's breadbaskets, are now filled with walking skeletons.\n\n§RWe have fallen far, and this is only the beginning.§!"

 SOV_Soviet_Work_Discipline: "Soviet Work Discipline"
 SOV_Soviet_Work_Discipline_desc: "Nothing can stop a Soviet worker. Rain, sleet, snow, mud up to their necks, and rivers running through city streets will not deter them from coming to work. Workplace injuries, except for those that are life-threatening, do not cause assembly lines to stop. Every hour of the day, the Soviet people work to create the Socialist paradise envisioned by Marx and Lenin, and the world will regard the Union as the world's workshop."

 SOV_Soviet_Work_Discipline_2: "Soviet Work Discipline"
 SOV_Soviet_Work_Discipline_2_desc: "While the people continue to work, their efforts have been refined even further. Alcohol consumption during breaks has been reduced, breaks have been staggered, and the revolutionary work week has been modified to better meet the demands of our quotas. What was once a finely tuned national machine has been honed to near-perfection. Already, factories across the Union are reporting nearly double-digit productivity gains."

 SOV_Vocational_Training_System: "Vocational Training System"
 SOV_Vocational_Training_System_desc: "Previously, when people switched jobs to something they didn't know, \"learning on the job\" took up the majority of the first few weeks or months. However, this new network of vocational schools has put an end to that productivity drain. In schools across the country, enthusiastic workers are learning new trades and skills to help them work better and faster for the benefit of the Union.\n\nNot only have new employees enrolled, but older workers have also signed up to learn more modern techniques and how to use newer tools. Our factories' efficiency has already increased significantly, and it is only natural that this trend will continue."

 SOV_Struggle_for_Quality_of_Production: "Struggle for Quality of Production"
 SOV_Struggle_for_Quality_of_Production_desc: "We have reversed the trend of mass produced, cheap, and poorly made products by implementing extensive floor reforms and widespread adoption of failsafe programmes such as quality checking. The Soviet Union stamp will no longer be associated with easily breakable crap, but rather with the most eloquently made and finely constructed products used all over the world!"

 SOV_Transformation_of_Nature_idea: "Transformation of Nature"
 SOV_Transformation_of_Nature_idea_desc: "The Union works for the betterment of the world, while the world works for the betterment of the Union! Through massive construction projects, we have begun to shape the Earth to our liking. In any other country, even one of these projects would be a massive, once-in-a-generation undertaking. However, with our Union united in vision and purpose, what once took decades for lesser people will take us only a few years!"

 SOV_Command_Structure_Paralyzed: "Command Structure Paralyzed"
 SOV_Command_Structure_Paralyzed_desc: "Since the Purge, all military decisions have come from the General Secretary. However, he has been unavailable for several weeks, apparently distressed by the invasion. This, combined with the enemy's sudden and ferocious attack, has paralysed our command structure. As our men fall back further and further, and entire divisions disintegrate or are annihilated by the German onslaught, we can only hope that the General Secretary emerges from hiding soon and STAVKA takes control of the situation."

 SOV_Command_Structure_Paralyzed_2: "Command Structure Paralyzed"
 SOV_Command_Structure_Paralyzed_2_desc: "The Red Army faces annihilation if nothing is done. Titanic battles are being fought with only the most cursory involvement of High Command, as the General Secretary refuses to return from his internal exile. Millions of men are marching east, and many are aware that the only thing standing in their way is a wall of bodies and the vast, nearly empty plains of the Union. Until the commanders, from the General Secretary in his dacha to the colonels on the front lines, can restore discipline to the Army, all that remains is to seize the German Army's gears with the youth of an entire generation."

 SOV_The_German_Betrayal: "The German Betrayal"
 SOV_The_German_Betrayal_desc: "When men in Georgia reached an agreement, it felt as if it had come down from Mount Sinai. That does not appear to be the case in Berlin.\n\nThe treacherous Germans have broken the Molotov-Ribbentrop Pact and stormed across the Polish border. Their terrible scythe has ripped through massive numbers of troops, and their armies tread over ever-expanding sections of the Motherland; if any other nation faced such an assault, it would undoubtedly collapse.\n\nHowever, the Germans are not up against any other nation, but the socialist vanguard. Invasion is as common to us as oppression is to the damned Teutonic menace! They are simply another reactionary foe seeking to extinguish this bastion of freedom and democracy on the European continent.\n\n§RLike Napoleon a century ago, the Germans will be swallowed by the vast steppe, and Berlin will fall in due course.§!"

 SOV_Mobilization_of_the_Soviet_Industry_1: "Mobilization of the Soviet Industry"
 SOV_Mobilization_of_the_Soviet_Industry_1_desc: "Our industrial sector is in absolute disarray.\n\nMany experienced factory workers have died behind German lines or have been forced to join the army. Meanwhile, their factories have been destroyed or are located behind enemy lines. There is little being produced as our country recovers from the unexpected attack. This has not only strained resources throughout the Union, but it is nothing short of a disaster for the military, which is rapidly depleting its supply warehouses.\n\nIf we are to survive, we must repair our industrial sector immediately. It will require a massive effort from every Soviet citizen who has yet to be subjected to German terror, but we are not unfamiliar with massive efforts."

 SOV_Mobilization_of_the_Soviet_Industry_2: "Mobilization of the Soviet Industry"
 SOV_Mobilization_of_the_Soviet_Industry_2_desc: "We've started shipping our factories to the east, some as far as Siberia, to avoid the German advance or bombs. Meanwhile, we've started tracking down factory workers and pressuring them to return to work, as well as looking for some particularly skilled men who were drafted and rehiring them. This, however, is still a lengthy process. Many of the factories we'll have are on trains or are just getting started in Siberia.\n\nThose that have been established are still severely understaffed, with the majority of new employees being trained. It will take some time before we return to normal levels. We must fight on, giving our industry as much time as possible to recover."

 SOV_Mobilization_of_the_Soviet_Industry_3: "Mobilization of the Soviet Industry"
 SOV_Mobilization_of_the_Soviet_Industry_3_desc: "At the start of the invasion, it appeared that we would never recover. The strike was so catastrophic, with near-apocalyptic consequences, that many people secretly wondered if we could fix it. However, it is becoming clear that our policies are highly effective. The industry we saved has reached pre-war production levels, and our current industrial crisis has passed.\n\nGuns, tanks, and bandages are now returning to the military at pre-war levels, and factories are staffed by competent, if not skilled, workers. However, now that the bare minimum has been met, there is an opportunity to improve."

 SOV_Mobilization_of_the_Soviet_Industry_4: "Mobilization of the Soviet Industry"
 SOV_Mobilization_of_the_Soviet_Industry_4_desc: "Stunning reports show that we have begun to exceed pre-war industrial production. Spurred on by the patriotic fervour that pervades every Soviet citizen, our workers work double or even triple shifts, eager to contribute what they can to the Front. Meanwhile, we've begun to expand existing factory complexes and even build new ones.\n\nEvery gun, bullet, and bandage that leaves the factory increases our forces' strength and brings Europe closer to true liberation."

 SOV_Mobilization_of_the_Soviet_Industry_5: "Mobilization of the Soviet Industry"
 SOV_Mobilization_of_the_Soviet_Industry_5_desc: "We have achieved heights never seen before in Russian history. Our workers are among the most productive in the world! They are true models of efficiency. Across the lands under our control, our industrial sector has not only met, but far exceeded our needs, allowing massive exports to resume. Civilians can now return to shops and find shelves stocked with creature comforts that were scarce when the invasion began.\n\nThis has resulted in less unrest and more hard work. Things have simply gone perfectly, and there is little sign that they will slow down anytime soon."

 SOV_Mass_Mechanization_idea: "Mass Mechanization"
 SOV_Mass_Mechanization_idea_desc: "The introduction of machines in factories has been a revolution in itself. The average worker has nearly doubled his output and, following the learning period, has experienced fewer workplace accidents. The machines produce endless mountains of whatever we want, all to a uniform standard. The job loss has also been minimal, as most workers' jobs have changed from tediously hammering shoenails to operating and maintaining the machine that does it for them.\n\nEvery soldier will no longer pray that his gun was made by a good worker. Our people can now be confident that whatever they wield was manufactured to an exacting standard and of unrivalled quality."

 SOV_From_Forts_to_Tombs: "From Forts to Tombs"
 SOV_From_Forts_to_Tombs_desc: "The enemy sits in his fortifications, striking down ever more valiant warriors from the people who feel safe and secure. He has no idea that he has only served himself on a silver platter. Suddenly, a screaming eagle of iron and rage appears from the sky, a bomb falls, and the once great fortification vanishes in a flash of fire, dirt, concrete, and blood. Cries of Ura echo across the smouldering wreckage as our ever-faithful Soviet warriors press on.\n\nScenes like this play out all across the Front as our valiant Air Force ensures that nothing stands between us and Berlin."

 SOV_The_Great_Terror_1: "The Great Terror"
 SOV_The_Great_Terror_1_desc: "The NKVD scoured the Union for Trotskyists who had infiltrated the highest levels of the Soviet government and administration. The Opposition Bloc, Trotsky's old comrades and Stalin's oldest foes, has now felt the power of the state security apparatus, thanks to orders from Stalin and Yezhov. Kamenev, Zinoviev, Radek, Sokolnikov, and other former Soviet socialist titans will be exposed as treasonous rats.\n\nThese 'great' men are not the only ones being investigated. The NKVD has also targeted their supporters within the Soviet administration."

 SOV_The_Great_Terror_2: "The Great Terror"
 SOV_The_Great_Terror_2_desc: "There will be no rest for the wicked. With the destruction of the Trotskyite Opposition, the NKVD's focus has shifted from the now-cleansed administration to the state. Kulaks, peasants who have advanced to landlordism, will be the primary targets. Their families will be killed, and they will be erased from history! They won't be the only ones.\n\nThe Union is home to treasonous ethnic minorities such as Poles, Finns, Afghans, Iranians, and Chinese, among others. Their traitorous leaders and families will be killed, and their fifth columns will be driven out of their power bases.\n\nThe Army, the state's vanguard and Trotsky's old stronghold, is also being cleaned up, convulsing with suspicion and accusations, leaving the entire organisation a husk that can be rebuilt more loyal and competent than before."

 SOV_The_Great_Terror_3: "The Great Terror"
 SOV_The_Great_Terror_3_desc: "The Purge has spread throughout the population, and neighbours are now turning on one another.\n\nEvery day, the NKVD receives tens of thousands, if not more, accusations of treason. Every day, lists of names are printed, and every night, NKVD agents sweep through the cities, rounding up thousands of suspected dissidents and executing them en masse. Families have been destroyed, thousands have died, and thousands more are living on borrowed time; paranoia has become the word of the day.\n\nThe Union has come to a halt as no one does anything without casting a hard glance over their shoulder in case a neighbour notices them, reports them to the NKVD, and a Black Truck whisks them away to oblivion. The fire of zealous purging has engulfed the entire country and is out of control of the government.\n\nUnfortunately, the only thing left to do is wait until it finally, cataclysmically, burns itself out and hope there are still people around to smother the embers."

 SOV_The_Great_Reorganisation: "The Great Reorganisation"
 SOV_The_Great_Reorganisation_desc: "Previously, our country was plagued by traitors and parasites in our ranks who refused to allow socialist reforms to be implemented and worked tirelessly to prevent Comrade Stalin from carrying out his work and challenging his leadership. Now that our country has rid itself of traitors, it is time for big things to happen. But first, we must fill out the cadres and select leaders for the areas where the now-repressed elements and undesirable individuals used to reside. It will take time, but it is worthwhile. At the very least, we will no longer be subjected to national conspiracies."

 SOV_The_Great_Disgrace: "The Great Disgrace"
 SOV_The_Great_Disgrace_desc: "As the gunfire fades, the bodies begin to be buried, leaving us to look around and begin the long and difficult task of rebuilding a shattered state apparatus. Fearful of enemies both outside and within, we allowed the Madman from Georgia to almost rip the heart out of the Union in pursuit of his own paranoia-fueled goals. Thousands were killed to satisfy a mind that could not feel secure.\n\nNow that he is gone, the Union is on the verge of a bright future, brighter than at any time since Lenin's death. All that remains for us to do is take this next, bold step into the future and lead the people to a new utopia free of the paranoia, oppression, and fear of Stalinist purges."

 SOV_Heroes_of_the_Air: "Heroes of the Air"
 SOV_Heroes_of_the_Air_desc: "Human flight is a reality, and only the bravest, or perhaps the stupidest, among us will take hold of the flight stick and defy gravity. These men do so not for glory or fame, but for the thrill of flight, to see the world from a completely new perspective, to accomplish feats unprecedented in military history, and to secure the newest theatre of war for the Motherland.\n\nLet their names be remembered for all time and sung with the highest praise. With these men leading the way, the future of aviation is truly Soviet."

 SOV_Growing_Flight_Industry: "Growing Flight Industry"
 SOV_Growing_Flight_Industry_desc: "Our flight industry has been degraded for a long time, and we have not paid enough attention to it. The majority of the Russian Empire's aircraft designers sailed away with the white emigration abroad, leaving us with only old and unusable models unfit for air combat. Now, as our country struggles to catch up with its European competitors, our aircraft engineering is beginning to recover. We are working hard to establish new scientific centres for the study of aviation design, as well as new airfields, which have been scarce in the country for many years."

 SOV_Wings_of_the_Red_Army: "Wings of the Red Army"
 SOV_Wings_of_the_Red_Army_desc: "The Red Air Force is still receiving its wings. We had to rush them to the front to combat enemy fighters because they were untested in combat and admittedly behind the times. This has yielded predictable results. These new martyrs' sacrifices, however, will not be in vain. Their deaths provided us with invaluable information on both air tactics and aeroplane construction principles.\n\nOur scientists and industrialists have begun their studies, lest they become the next glorious martyr."

 SOV_Wings_of_the_Red_Army_2: "Wings of the Red Army"
 SOV_Wings_of_the_Red_Army_2_desc: "The Red Air Force is still receiving its wings. We had to rush them to the front to combat enemy fighters because they were untested in combat and admittedly behind the times. This has yielded predictable results. These new martyrs' sacrifices, however, will not be in vain. Their deaths provided us with invaluable information on both air tactics and aeroplane construction principles.\n\nOur scientists and industrialists have begun their studies, lest they become the next glorious martyr."

 SOV_the_Soviet_Famine: "The [GetYear] Soviet Famine"
 SOV_the_Soviet_Famine_desc: "Promising initial reports have misled us, and our actions have resulted in what can only be described as a massive famine in the state farm apparatus. Food shortages, which have plagued us since the war, have only gotten worse following a major drought, which has had a negative impact on all harvest yields, reducing them by up to 60%. Food price increases and ration system cuts have forced several closures, including those of state-owned enterprises, while our people cannot afford food.\n\nHundreds of thousands of people are starving, particularly children, the elderly, the unemployed, and the disabled, and millions more are at risk of starvation.\n\nThe government has failed to respond, and there are insufficient grain reserves to distribute among the population."

 SOV_Cold_War: "A Cold War"
 SOV_a_Cold_War_desc: "There's no going back. The British prime minister delivers a fiery speech, calling for an Anglo-American alliance against the Soviet Union, which he accuses of erecting an \"iron curtain\" separating Europe. The General Secretary vigorously responds in kind, comparing the British prime minister to Adolf Hitler, accusing him of advocating the racial superiority of English-speaking nations in order to satisfy their hunger for global dominance and declares his speech a call for war on the USSR. On the other side of the ocean, the United States is outraged, adopting a policy of containment with the goal of stopping the spread of communism.\n\nRelations between the East and West have reached an all-time low, and whilst nobody is willing to directly wage war on each other, there is no doubt that both spheres are in conflict."

 SOV_Thermonuclear_Warfare: "Thermonuclear Warfare"
 SOV_Thermonuclear_Warfare_desc: ""

 SOV_German_Scientists: "German Scientists"
 SOV_German_Scientists_desc: "Thousands of former Nazi German specialists, including scientists, engineers, and technicians, from companies and institutions involved in military and economic policy in the Soviet occupation zone of Germany and Berlin, are being transported to the Soviet Union as war reparations.\n\nMuch related equipment is also being moved, with the goal of relocating research and production research centres from Germany to the Soviet Union and gathering as much material as possible from test facilities."

 SOV_Fourth_Five_Year_Plan: "Fourth Five Year Plan"
 SOV_Fourth_Five_Year_Plan_desc: "The Fourth Five-Year Plan has been officially launched, with a focus on repair and rebuilding rather than new facility construction. It sees the restoration of the country's destroyed regions as the primary economic and political task, as well as achieving the pre-war level of industrial and agricultural development and then significantly exceeding this level for the growth of the Soviet people's material well-being.\n\nAlready, the repair work is moving quickly and producing spectacular results. Entire German factories and their employees are being transported to the Soviet Union to train Soviet citizens in specialised work processes. One-third of the fourth plan's capital expenditure is going to Ukraine, which is important agriculturally and industrially and has been one of the areas most devastated by war."

 SOV_Growing_Prosperity: "Growing Prosperity"
 SOV_Growing_Prosperity_desc: "While most Western countries are still struggling to recover from the war's devastation, we are once again a step ahead. Our economy, particularly the agriculture sector, is quickly recovering as a result of our zealous determination to advance economic reform.\n\nFurthermore, the advances toward the abolition of the ration system portrays us as economically powerful and diplomatically sovereign, whereas several countries, including the United Kingdom and France, which are much richer and less devastated by the war, continue to use ration cards. Continued food exports and our independence from foreign assistance, combined with ambitious economic goals for food production, point to a bright future for the Soviet Union and our economy."


 SOV_Painting_the_White_Cliffs: "Painting the White Cliffs"
 SOV_Painting_the_White_Cliffs_desc: "The Russian Marines have stormed the small but vital city of Dover, its white cliffs covered in red - both politically by us and physically by the blood of the English bourgeoisie army that defended it so weakly. With both a landmark and a port city taken from them, the English have lost war support and are now firmly on the back foot - we can keep them there by sending the remainder of our Army to deal the final blow to the decrepit monarchists. Victory truly follows the Morskaya Pekhota, and if this is the best the United Kingdom can do, ending the world's largest colonial empire may be as simple as the Soviet Army walking into London."

 SOV_Rising_Tensions_with_the_West: "Rising Tensions with the West"
 SOV_Rising_Tensions_with_the_West_desc: "The early days were so promising. Many people argued for the continuation of our common Alliance in Moscow, Washington, and London. With the horrors of the Second World War still fresh in their minds, many people were desperate to prevent something similar from happening again. However, now that the war has been won and peace has been restored, those hopes have faded. The tone in Western capitals has shifted from one of camaraderie to one of confrontation. They now speak of denunciations of our system and people while downplaying our sacrifice. While forecasting the future is impossible, everyone agrees that the coming days will be bitterly cold."

 SOV_An_Exhausted_Populace: "An Exhausted Populace"
 SOV_An_Exhausted_Populace_desc: "The people are exhausted, their fighting spirit depleted. In the cities, they are concentrating on rebuilding their shattered lives or, in most cases, gathering what little they have left and moving to a less devastated area. In the countryside, people are working hard to re-establish their farms and ranches that were destroyed by our retreat or the Germans. People all over the Union want the same thing: peace. People will not follow us into another war. They are simply exhausted."

 SOV_The_Tired_Army: "The Tired Army"
 SOV_The_Tired_Army_desc: "The Red Army sits in its barracks, celebrating their victory over the fascist threat. However, many of the soldiers are just as tired as the people because they are far from home and have seen dozens of their friends die every day for years. The Rodina's spirit no longer calls them to strike out, but rather to return home. Officers are reporting a flood of leave requests, and those who no longer have a home to go to are simply physically exhausted. The Army marched for so long and so hard, fighting all the way. It's understandable that they believe they deserve a good long rest."

 SOV_the_Reinvigorated_Army: "The Reinvigorated Army"
 SOV_the_Reinvigorated_Army_desc: "Our reforms have paid off, and the Red Army of today looks nothing like the Army of the 1930s. Where there was once ineptness and green boys running around playing with soldiers, there are now legions of battle-hardened men fighting for the Revolution with zeal and efficiency. Our officers, having learned the lessons of war in the crucible of battle, lead them in daring and effective military manoeuvres. The Army's spirit has also been revived. The men no longer talk about returning home; they talk about spreading the Revolution once more!"

 SOV_the_Missing_Peace: "The Missing Peace"
 SOV_the_Missing_Peace_desc: "The illusion of unity has been shattered. Old enemies resurface in the former Union territories, including nationalists, exiles, and reactionaries, all emboldened by foreign invasion and internal weakness. From the forests of Ukraine to the streets of Warsaw, rebellion is brewing. Even in the heart of the Union, whispers of dissent become louder. Until these threats are addressed, our ability to mobilise the people will be severely limited."

 SOV_Victory_at_Any_Cost: "Victory at Any Cost"
 SOV_Victory_at_Any_Cost_desc: "As the bear clashes with the eagle, our resolve strengthens: this war will be won at any cost. Conventional weapons have ravaged the continent, but the atom is now our only hope for victory. Comrade Kurchatov's breakthroughs require every resource and ounce of willpower we have. Our factories will burn plutonium and uranium in unprecedented quantities. We will create weapons of unparalleled power — larger, deadlier, and more numerous than ever before. For the glory and security of the Union, nothing is off limits."

 SOV_Masters_of_Europe: "Masters of Europe"
 SOV_Masters_of_Europe_desc: "From Brest to Moskva, the USSR's iron will crushed the Allies. Our troops return battered, the cost of the war visible in our shed blood and lost men. Europe, the continent that has caused so much strife in the past with its decadence, colonialism, and wars over small pieces of land, has been added to our glorious Union. With a classless society, it is certain that it will never return to its former state. While some partisans advocate a return to bourgeoisie regimes, calling us illegitimate, there is no doubt that the war is over and that we are the undisputed rulers of Europe. London, Paris, Berlin, and Rome all belong to Moscow, with their workers finally freed and local communist parties gaining popularity rapidly."

 SOV_Crushed_Spirit_of_the_Revolution: "Crushed Spirit of the Revolution"
 SOV_Crushed_Spirit_of_the_Revolution_desc: "The remnants of what was once the mighty Soviet Union are beginning to realise that we have been defeated by the Nazi threat. Stalin has died, the people's protector unable to bear their country's collapse, and we have lost our most important cities, and thus our most valuable industry.\n\nThe Union is paralysed, with construction moving at a glacial pace due to a lack of suitable manpower and a lack of faith in a system that was once so powerful and terrifying, even to the Nazis. Many people wonder how long it will be before the Germans invade the rest of our country, or if we will simply collapse under the pressure of minorities and reactionary traitors. Communism must live on, but the spirit of our revolution, which led to our victory over the Tsar in 1923, has been crushed and may never rise again."

 generic_communist_agitation: "Communist Agitation"
 generic_communist_agitation_desc: "The peace has been shattered all at once. The Soviets have incited our local communist movement to revolt. They raid factories and supply depots, attack army camps, and disseminate anti-war propaganda. Our people are tired of war and the constant threat of violence that comes with living in a war zone. This resumption of the homefront has begun to sap our people's resolve. If we are to see this conflict through to victory, we must deal with these rabble rousers quickly."

 SOV_The_Stalin_Thaw: "The Stalin Thaw"
 SOV_The_Stalin_Thaw_desc: "Our heavy-handed approach to ideological control within the party, combined with fierce opposition across the country to forced collectivisation policies, has resulted in widespread discontent within both the All-Union Communist Party and the general public. These dissenters, while quiet and repressed for the time being, are growing in number and could soon become a major issue if nothing is done. As a result, we have ordered the easing of some of the more extreme and heavy-handed policies, allowing relative freedom for Communist Party political cadrees across the country in order to reduce tensions over various issues and disagreements on specific socialist policies."

 SOV_Marxism_Leninism_idea: "Marxism-Leninism"
 SOV_Marxism_Leninism_idea_desc: "Marxism-Leninism is the guiding ideology of the Soviet state, derived from Bolshevism through Iosef Stalin's key writings. It is a fundamental revision of Classical Marxism, combining the ideas of Marx, Lenin, and Stalin to form a completely new view of socialism. Marxism-Leninism holds that a vanguard party organised through democratic centralism would seize power on behalf of the proletariat and establish a one-party communist state that would control the means of production, effectively suppressing counter-revolution and ensuring workers' rights. At the same time, Marxism-Leninism abandons the concept of World Revolution in favour of socialism in one country."

 SOV_High_Stalinism_idea: "High Stalinism"
 SOV_High_Stalinism_idea_desc: "Now that the people's enemies have been defeated in the Great Patriotic War and the USSR has triumphed, no one can question the will of the Communist Party. Comrade Stalin is our nation's great helmsman, skilfully steering the proletarian revolution through all difficulties and challenges. He has granted us a glorious victory, and he alone has ensured the people's triumph over oppressors and invaders. He represents the vanguard of the revolution, ensuring prosperity for all and the Soviet Union's continued dominance. All people have banded together and closed ranks around our Great Leader, and he sends them forward into the bright future of socialism and its triumphant march against imperialism."

 SOV_Stalin_Constitution_idea_0: "Stalin Constitution"
 SOV_Stalin_Constitution_idea_0_desc: "The adoption of the \"Stalin Constitution\" to replace the Soviet Union's 1924 constitution is a watershed moment for the Soviet state and people. The constitution guarantees extensive freedoms for USSR citizens, including the ability to directly elect their representatives, equality for women, and extensive protections and economic benefits for workers. However, the constitution contains numerous loopholes that allow power to be concentrated in the hands of Comrade Stalin and the Party leadership, while opponents are crushed under the guise of \"preventing counterrevolution\" - loopholes that will be heavily exploited to prevent enemies of the people from challenging the state."

 SOV_Stalin_Constitution_idea_1: "Stalin Constitution"
 SOV_Stalin_Constitution_idea_1_desc: "The adoption of the \"Stalin Constitution\" to replace the Soviet Union's 1924 constitution is a watershed moment for the Soviet state and people. The constitution guarantees extensive freedoms for USSR citizens, including the ability to directly elect their representatives, equality for women, and extensive protections and economic benefits for workers. However, the constitution contains numerous loopholes that allow power to be concentrated in the hands of Comrade Stalin and the Party leadership, while opponents are crushed under the guise of \"preventing counterrevolution\" - loopholes that will be heavily exploited to prevent enemies of the people from challenging the state."

 SOV_Stalin_Constitution_idea_2: "Stalin Constitution"
 SOV_Stalin_Constitution_idea_2_desc: "The adoption of the \"Stalin Constitution\" to replace the Soviet Union's 1924 constitution is a watershed moment for the Soviet state and people. The constitution guarantees extensive freedoms for USSR citizens, including the ability to directly elect their representatives, equality for women, and extensive protections and economic benefits for workers. However, the constitution contains numerous loopholes that allow power to be concentrated in the hands of Comrade Stalin and the Party leadership, while opponents are crushed under the guise of \"preventing counterrevolution\" - loopholes that will be heavily exploited to prevent enemies of the people from challenging the state."

 SOV_Tarnished_Constitution: "Tarnished Constitution"
 SOV_Tarnished_Constitution_desc: "The elections held under the new Stalin Constitution were intended to demonstrate Soviet democracy's maturity and unity, but when independent and non-Party candidates gained unexpected popularity, we were forced to intervene to maintain the legislature's ideological purity. The subsequent crackdowns, arrests, and disqualifications of undesirable elements have made abundantly clear that the freedoms promised in our constitution were never intended to challenge Party authority, and that any of the great liberties promised to the Soviet people can be immediately violated at the will of the secret police and the Politburo."

