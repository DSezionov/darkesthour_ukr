 # Intervene in Spain
 SOV_Intervention_in_Spain: "Intervention in Spain"
 SOV_Intervention_in_Spain_desc: "\n\n\n£decision_header_SOV_Intervention_in_Spain£\n\n\n\nCurrent Soviet External Influence: [?soviet_influence_SPA|%Y0] - [ROOT.Dynamic_SOV_Soviet_Influence_SPA]\n\nThroughout our efforts to further affect the outcome of the Civil War, the more we intervene, the more the Spanish Republic can trust and count on Soviet support.\n\nLeft-wing organisations are already prevelent within the Popular Front, including the Spanish Socialist Workers Party (PSOE), Communist Party of Spain (PCE), the Republican Left (IR), Republican Union (UR) and the National Labour Confederation, otherwise known as the CNT.\n\nWith this previously unseen level of revolutionary co-operation, a military victory in Spain may present us with the opportunity to expand our influence and secure a new Socialist ally outside Eastern Europe."
 SOV_Send_Infantry_SPA: "Send Infantry Equipment"
 SOV_Send_Light_Armor_SPA: "Send Light Armor"
 SOV_Send_Medium_Armor_SPA: "Send Medium Armor"
 SOV_Send_Artillery_SPA: "Send Artillery"
 SOV_Send_Military_Experts_SPA: "Send Military Experts"
 SOV_Damage_Nationalist_Influence: "Damage Nationalist Influence"
 SOV_Seize_Spanish_Gold_Reserves: "Seize Spanish Gold Reserves"
 SOV_seized_gold_reserves: "Seized our gold reserves"
 SOV_Send_International_Brigades: "Send International Brigades"
 SOV_Send_International_Brigades_tt: "We will send §Y4 International Brigades§! to aid our §Y[SPA.GetFlag][SPA.GetAdjective]§! comrades in their struggle"
 SOV_Subjugate_Spain: "Subjugate  §Y[SPA.GetNameWithFlag]§!"
 SOV_Subjugate_Spain_desc: "After years of covert support, the Republicans have finally secured victory in the civil war. Our advisers, weapons, and influence have reshaped the Spanish state from within, and the time has come to complete the work. The Spanish Communist Party is ready to seize power, overthrowing the existing Republican government.\n\nThe Spanish People's Republic will pledge full allegiance to Moscow, placing Spain firmly within our sphere and providing the Soviet Union with a strategic military and naval foothold in Western Europe. From the Pyrenees to the Mediterranean, our influence will now extend further, sending a clear message to fascist and capitalist powers alike."
 SOV_support_SPA: "Soviet Intervention in Spain"

