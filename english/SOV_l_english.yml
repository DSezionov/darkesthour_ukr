 SOV_Send_Light_Armor: "Send Light Armor"
 SOV_Send_Medium_Armor: "Send Medium Armor"
 SOV_Send_Artillery: "Send Artillery"
 SOV_Send_Military_Experts: "Send Military Experts"
 SOV_Send_Volunteer_Divisions: "Send Volunteers"
 SOV_Send_Volunteer_Divisions_tt: "We will send §Y4 Soviet Volunteer Divisions§! to §Y[SOV_Supported_Faction_in_China.GetFlag][SOV_Supported_Faction_in_China.GetNameDEF]§!"
 
 SOV_Operation_Zet: "Operation Zet"
 SOV_Operation_Zet_desc: "Under the covert program known as Operation Zet, we can discreetly expand our lethal support for the Kuomintang. This initiative allows us to channel additional aid in the form of I-15 and I-16 fighters, SB-2 bombers, volunteer Soviet airmen, aviation instructors, armored specialists, as well as shipments of rifles, machine guns, artillery, radios, spare parts, and industrial equipment."
 SOV_The_Manchurian_Operation: "Operation [GetMonth] Storm"
 SOV_The_Manchurian_Operation_desc: "The Japanese imperial experiment has gone on long enough. After years of expansion and atrocities in East Asia, the time has come to crush the Kwantung Army in Manchuria and liberate the occupied territories. Our forces will launch a massive, coordinated offensive, striking deep into Japanese-held territory to force a swift end to their war and secure the Soviet Far East. Operation [GetMonth] Storm will demonstrate the might of the Red Army and ensure that Japan is defeated decisively, preventing any future threat to our eastern borders."
 SOV_Withdraw_from_Manchuria: "Withdraw from Manchuria"
 SOV_Withdraw_from_Manchuria_desc: "With internal conflict in China boiling once more, we will convert occupation into influence. Soviet forces will swiftly withdraw from Manchuria and Chahar, handing territory, infrastructure and captured materiel to our preferred Chinese allies to strengthen their position, create a friendly buffer on our eastern border, and ensure a pro-Soviet outcome in the region."
 SOV_Subjugate_Xinjiang: "Subjugate  §Y[XIJ.GetNameWithFlag]§!"
 SOV_Subjugate_Xinjiang_desc: "Through careful use of our influence within [XIJ.GetLeader]'s government, we will pressure Xinjiang to formally sever its ties with the Nationalist regime in [CHI.Capital.GetName]. By guiding the creation of a \"People's Government of Xinjiang,\" we will secure a loyal socialist ally on China's western frontier, extending Soviet power into Dzungaria and the Tarim Basin."
 SOV_Invite_PRC_to_Faction: "Invite  §R[PRC.GetNameWithFlag]§! to the §Y[ROOT.GetFactionName]§!"
 SOV_Invite_PRC_to_Faction_desc: "With the Communist Party of China victorious over the Kuomintang and China once again united under their banner, thanks in no small part to our steadfast support, it is only fitting that they join our [ROOT.GetFactionName]. We shall formally extend an invitation to [PRC.GetLeader], cementing our alliance and ensuring the unity of the socialist world."
 SOV_Force_Compromise_in_China: "Force Compromise in China"
 #SOV_The_Unification_of_China: "The Unification of China"

