 SOV_Genrikh_Yagoda_Great_Purge_desc: "§YGenrikh Yagoda, §La loyal Chekist and long-time deputy in the OGPU, advanced steadily through the ranks as an effective administrator and organiser. He was appointed to oversee the newly formed NKVD and has directed the state's security apparatus, expanding the Gulag system and managing large-scale projects. Though not known for his ideological zeal, Yagoda's bureaucratic skill and willingness to carry out repression earned him the NKVD leadership. His position, however, is far from secure, as rivals and suspicions surround him in the ever-changing climate of the Great Purge."
 SOV_Yakov_Agranov_Great_Purge_desc: "§YYakov Agranov §Lbegan his career as a devoted Chekist, earning a reputation as a skilled interrogator and investigator during the early years of the Soviet Union. Rising through the ranks of the OGPU, he played a key role in high-profile political trials, demonstrating both loyalty to Stalin and the ability to extract confessions. Agranov is now the NKVD's Deputy Chief, in charge of critical investigations and operations against perceived state enemies. His close relationship with Yagoda has given him power, but it has also put him at risk, as shifting allegiances and suspicions during the Great Purge could turn him from yesterday's enforcer to tomorrow's target."
 SOV_Nikolai_Yezhov_Great_Purge_desc: "§YNikolai Yezhov §Lhas risen quickly through the ranks due to his unwavering loyalty to Stalin. He was trusted with key positions in the Central Committee and the Secretariat, and he proved to be a tireless bureaucrat with an iron will. Yezhov now directs the NKVD with ruthless efficiency. His subordinates refer to him as the \"Iron Dwarf,\" and he oversees unprecedented mass arrests, interrogations, and executions. His devotion to Stalin protects him for the time being, but the climate of suspicion ensures that no one, including the chief, is safe forever."
 SOV_Lavrentiy_Beria_Great_Purge_desc: "§YLavrentiy Beria, §La long-time Caucasus Party organiser, rose to power through political cunning and unwavering loyalty to Stalin. In Georgia, he rose to prominence by eliminating rivals and ensuring Moscow's dominance over the region. Beria has begun to reorganise security services, expand surveillance, and tighten internal discipline. Intelligent and pragmatic, he prefers efficiency to chaos, but his methods are no less brutal. Despite his growing influence, the shadow of the Purge ensures that power in the NKVD is never truly secure."
 SOV_Mikhail_Frinovsky_Great_Purge_desc: "§YMikhail Frinovsky, §La former sailor in the Imperial Russian Navy, joined the Bolsheviks during the Civil War and served with distinction in the Red Cavalry. He rose through the political commissar ranks, earning a reputation for discipline and personal bravery. Frinovsky joined the NKVD in the mid-1930s and quickly rose through the ranks with Yezhov's support. He is now the Deputy People's Commissar for Internal Affairs, in charge of border troops and special operations. His loyalty to the Party is unquestionable, but his close relationship with Yezhov puts his position in jeopardy as the direction of the Purge shifts."
 SOV_Vsevolod_Merkulov_Great_Purge_desc: "§YVsevolod Merkulov §Ljoined the Cheka's successor organisations in the early 1920s and worked his way up the ranks of state security. He was known for his bureaucratic skills rather than his field command, and he formed a close working relationship with Lavrentiy Beria, who became his chief patron. Merkulov, who currently serves as Deputy People's Commissar for Internal Affairs, is in charge of the NKVD's administrative and intelligence functions. Despite not being a frontline enforcer, his efficiency and connections ensure his influence. His fate, however, is directly related to Beria's rise - or fall."

