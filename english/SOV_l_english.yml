 # Transformation of Nature
 SOV_Trasformation_of_Nature_category: "Transformation of Nature"
 SOV_Trasformation_of_Nature_category_desc: "\n\n\n£decision_header_SOV_Great_Plan_for_Transformation_of_Nature£\n\n\n\nThe Great Plan for the Transformation of Nature is an extremely ambitious and intensive development program, proposed and being implemented under the aegis of General Secretary Stalin. Its motto calls for \"the great transformation of nature\" (or великое преобразование природы), referring to the introduction and implementation of new land development, agricultural practices and water projects in order to improve the agricultural sector throughout the nation.\n\nThese include the planting and construction of gigantic networks of shelterbelts (\"forest strips\" or лесополоса), the introduction of grassland crop rotation and the construction of ponds, reservoirs & irrigation canals to ensure highly sustainable crop yields. This project has been well received, though there have been some discerning reports about the \"nest method\" of plantation. However, they are secondary activities in purview of the much larger project. As we embark on this campaign for the national good, we develop the Motherland, & in the words of the General Secretary Stalin \"defeat drought\".\n"
 SOV_Windbreaker_in_Central_Russia: "Plant Windbreaker Mainlines in Central Russia"
 SOV_Windbreaker_in_Central_Russia_desc: "In order to protect Central Russia's agricultural areas from harsh weather and winds, we will order the construction of large windbreakers. These extensive belts of trees and shrubs are intended to reduce soil erosion, limit the accumulation of snowdrifts, and protect farmland from seasonal winds that have previously harmed crops. The windbreakers are expected to stabilise the environment, increase crop yields, and strengthen the heartland's resilience to harsh weather."
 SOV_Windbreaker_in_Southern_Russia: "Plant Windbreaker Mainlines in Southern Russia"
 SOV_Windbreaker_in_Southern_Russia_desc: "To protect fertile steppe areas from damaging winds and drifting sand, we will order the construction of large windbreakers. These long, carefully aligned belts of trees and vegetation are designed to protect collective farms, roads, and settlements while reducing soil erosion and preserving agricultural productivity. Once completed, these windbreakers will stabilise the southern plains, protect crops from the damaging effects of wind and dust storms, and boost the local economy's resilience."
 SOV_Windbreaker_in_Northern_Caucasus: "Plant Windbreaker Mainlines in Northern Caucasus"
 SOV_Windbreaker_in_Northern_Caucasus_desc: "We will plant windbreaker mainlines across the North Caucasus to protect agricultural zones, villages and transportation routes from the effects of strong mountain and steppe winds. These tree and shrub belts are carefully designed to reduce soil erosion, prevent snowdrifts and dust storms, and provide long-term environmental stability. Once installed, the windbreakers will protect crops, increase harvest reliability, and strengthen the region's resilience to natural disasters, ensuring that the North Caucasus remains a productive and sustainable part of the Soviet heartland."
 SOV_Construct_Central_Turkmen_Canal: "Construct Central Turkmen Canal"
 SOV_Construct_Central_Turkmen_Canal_desc: "We will construct the Central Turkmen Canal, which will divert water from the Amu Darya into Turkmenistan's arid regions. This canal is intended to support agriculture by increasing irrigation for collective farms and allowing the expansion of cotton, grain, and other critical crops in desert areas. Once completed, the canal will convert large tracts of previously unproductive land into arable land, stabilise water supplies for settlements, and help to grow regional agriculture. This project will allow us to expand our use of natural resources in order to increase productivity, secure food supplies, and boost the Turkmen SSR's economic development."
 SOV_Build_Hydroelectric_Plants: "Build Hydroelectric Plants"
 SOV_Build_Hydroelectric_Plants_desc: "We will authorise the construction of hydroelectric dams across major rivers to generate electricity for industry, irrigation, and urban areas. These dams will provide a consistent source of electricity, promote regional economic development, and allow for river flow regulation to prevent flooding and increase agricultural productivity downstream. Once completed, these dams will increase our industrial capacity, provide electricity to remote areas, and integrate water management into larger economic development goals."
 SOV_Construct_Volga_Don_Canal: "Construct Volga-Don Canal"
 SOV_Construct_Volga_Don_Canal_desc: "We will construct the Volga-Don Canal, which will connect the Volga and Don river systems, providing a navigable waterway for transportation, irrigation, and regional economic development, as well as a critical link between the Caspian Sea and the Sea of Azov. The canal will speed up the movement of goods, improve access to agricultural regions, and connect previously isolated industrial and farming areas into a more efficient network. Despite its high resource requirements, the canal is expected to significantly improve internal transportation, trade and logistics, and provide water management benefits that reduce flooding and support irrigation projects."
 SOV_Complete_All_Decisions: "Complete All Projects"
 SOV_Complete_All_Decisions_desc: "The Great Plan for the Transformation of Nature will be carried out through extensive forestry, irrigation, canal building, and hydroelectric development. However, partial completion cannot yield the full benefit expected by the plan. All projects must be completed within a year to demonstrate the superiority of socialist planning. People need to see results in their fields, on their tables, and in their factories, and the propaganda value of visible success cannot be underestimated. Delays would sap enthusiasm and undermine trust in the Plan's promises."

 # Soviet Public Loans
 SOV_Soviet_Public_Loans_category: "Soviet Public Loans"
 SOV_Soviet_Public_Loans_category_desc: "\n\n\n£decision_header_SOV_Soviet_Public_Loans£\n\n\n\n\nThe State exists to feed and keep it's populace happy, and from a pessimistic but slightly more realistic point of view - the populace exists to feed the State machinery and keep it up and running. With the several massive developmental projects being undertaken at the moment, a need for capital has arisen. We have formulated a rather ingenious scheme of funding our industrialisation efforts, and that is by making the populace pay for these governmental programs, for these endeavours only seek to benefit them if nothing else. Under this scheme, the population would be \"encouraged\" to buy government bonds, which in some cases, would be a considerable part of their income. However, we'll promise the remuneration of these bonds at a \"later\" date. This scheme may damage our reputation with the people, so we must continue to maintain the population's happiness and keep them convinced that the money they are spending is in the national interest, and therefore theirs.\n\nThe higher the §LPopulation Suspicion§! is the §RLess Money§! we'll get from §YLoans§!\n\n§YTotal§! Loans Taken: §Y[?SOV_Total_Loans_Taken]§!£money_icon\n\n\n§LCurrent Population Suspicion§!: [This.Dynamic_SOV_Public_Loans]"
 SOV_Loans_Due_Date: "Days Left until Loan Due Date"

 # Socialist Competition
 SOV_Socialist_Competition_category: "Socialist Competition of [GetPriorYear]"
 SOV_Socialist_Competition_category_desc: "\n\n\n£decision_header_SOV_Socialist_Competition£\n\n\n\n\nIf we do not push ourselves every day, we will fall further and further behind the enemy. To prevent this, we will encourage our glorious employees to strive for ever-higher heights and greater accomplishments. Our industrial planners are confident that by offering calculated rewards, we can elicit the greatest efforts, allowing everyone to benefit from their accomplishments. Then their comrades, seeing how greatness is rewarded, will follow suit.\n\n                 §YThere can only be 1 winner of [GetPriorYear]'s Socialist Competition.§!"
 SOV_Socialist_Competition_Decision_1: "Praise Factory Workers!"
 SOV_Socialist_Competition_Decision_1_desc: "Our factory workers are the pride and lifeblood of our union. They make use of our abundant natural resources to produce products that are necessary for daily life. The Soviet man cannot physically prosper or even survive without the Soviet factory worker. The Red Army would not exist if our workers had not worked so hard to produce the finest weapons and vehicles out of impenetrable Soviet steel. We must thus honour these men and women, these citizens, who are the foundation of the Union's success and prosperity. May their lives continue to flourish forever!"
 SOV_Socialist_Competition_Decision_2: "Praise Dockyard Workers!"
 SOV_Socialist_Competition_Decision_2_desc: "The labour and deeds of men who work at our ports and docks across the Union are frequently overlooked. The dockyard worker works 12 hours a day, shaping Soviet steel and iron into mighty sea beasts capable of travelling the world, spreading Soviet goods and socialism, or defending our socialist paradise from invaders with thick naval guns. Their efforts are critical to the survival and prosperity of our country, and they deserve to be recognised for their contributions."
 SOV_Socialist_Competition_Decision_3: "Praise our Miners!"
 SOV_Socialist_Competition_Decision_3_desc: "Soviet miners are the foundation of our industrial production and development. Without the metals and alloys they obtain, none of our factories could function. The Union wouldn't even be able to make ploughs! The miner bears responsibility for not only the prosperity of our industry, but also the survival of the Union as a whole. As a result, their accomplishments must be recognised and honoured, lest their significance be overlooked."
 SOV_Socialist_Competition_Decision_4: "Praise the Soviet Union's Builders!"
 SOV_Socialist_Competition_Decision_4_desc: "The builders and construction workers in our Union are the backbone of Soviet welfare and industry. Without the builders, Soviet men would be unable to live in luxurious Kommunalkas. Without the builders, Soviet men would be unable to obtain a job and a wage in a factory. Without the builders, Soviet men would not have access to schools, hospitals, parks, or even paved roads. For this reason, we must recognise and praise the builders in this year's competition. The Union appreciates their selfless labour!"
 SOV_Socialist_Competition_Decision_5: "Praise our Oil Roughnecks!"
 SOV_Socialist_Competition_Decision_5_desc: "The oil workers of our Union, who work tirelessly in the Caucasus and other areas to fuel our union's growing might, industry, and military power, have thus far gone unnoticed and underappreciated by the government and a large portion of the union's population. We must thus provide them with the recognition they crave and deserve. We will recognise their tireless efforts in this year's socialist competition so that everyone in the union understands that the oil worker is the glue that holds our socialist paradise together."
 SOV_Socialist_Competition_Decision_6: "Praise our Factory Worker's Will!"
 SOV_Socialist_Competition_Decision_6_desc: "Soviet factory workers are the world's quickest and most efficient. Through his many hours of selfless and exhausting labour, he produces many tonnes of steel, machinery, military equipment, and other consumer goods required for a comfortable life in our socialist utopia. However, the Soviet worker, no matter how efficient and tireless he is, deserves recognition for his diligent and efficient service. We will praise the worker's never-ending and unparalleled efficiency in this year's socialist competition, so that everyone in the union can celebrate and laud the Soviet worker and give him the recognition he so rightfully deserves."
 SOV_Socialist_Competition_Decision_Timer: "Ceremony Ends"
 SOV_Socialist_Competition_Decision_Timer_desc: "Ceremony ends soon. Pick the winner in time or lose the possibility to so until next year's Socialist Competition ceremony."
 SOV_SOCIALIST_COMPETITION_HAS_CHOSEN_A_DECISION_TT: "Has chosen a winner for this year's Socialist Competition."
 SOV_SOCIALIST_COMPETITION_HAS_CHOSEN_A_DECISION_TT_NOT: "Has not chosen a winner for this year's Socialist Competition yet."

