 # The Great Patriotic War
 SOV_The_Great_Patriotic_War_category: "The Great Patriotic War"
 SOV_The_Great_Patriotic_War_category_desc: "\n\n\n£decision_header_SOV_The_Great_Patriotic_War£\n\n\n\n[GER.GetLeader]'s Germany has invaded our country! We've tried everything to keep the Nazis at bay, yet they've still come to destroy our people! Despite the Red Army's courageous fight, and despite the enemy's greatest divisions and air force units being obliterated and slaughtered on the battlefield, the opposition continues to press forward, with new soldiers being thrown to the front on a regular basis. \n\nThe Motherland must be preserved to prevent the German war machine from reaching Moscow! Every weapon, every man, and every woman must be used to repel their assault, no matter the cost!\nThis is no ordinary war, but a war to defend our very right to live!\n\n§RLong live our magnificent Motherland, and may the Germans be sent back to the hell from which they came!§!\n"
