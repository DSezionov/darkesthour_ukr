 SOV_High_Agricultural_Employment: "High Agricultural Employment"
 SOV_High_Agricultural_Employment_desc: "In our country, agricultural work is envisioned on a large scale. In contrast to peasant small-scale work, huge glamorous columns of machines are to work the fields. Our industrial capacity, however, is suffering as a result of the high agricultural employment. If we are to embark on a rapid heavy industrialization programme, we must address this issue and shift workers from agricultural to industrial jobs."

 SOV_High_Agricultural_Employment1: "High Agricultural Employment"
 SOV_High_Agricultural_Employment1_desc: "In our country, agricultural work is envisioned on a large scale. In contrast to peasant small-scale work, huge glamorous columns of machines are to work the fields. Our industrial capacity, however, is suffering as a result of the high agricultural employment. If we are to embark on a rapid heavy industrialization programme, we must address this issue and shift workers from agricultural to industrial jobs."

 SOV_High_Agricultural_Employment2: "High Agricultural Employment"
 SOV_High_Agricultural_Employment2_desc: "In our country, agricultural work is envisioned on a large scale. In contrast to peasant small-scale work, huge glamorous columns of machines are to work the fields. Our industrial capacity, however, is suffering as a result of the high agricultural employment. If we are to embark on a rapid heavy industrialization programme, we must address this issue and shift workers from agricultural to industrial jobs."

