 SOV_Choose_a_Faction_to_Support: "Select a Faction to Support"
 SOV_Choose_a_Faction_to_Support_desc: "The struggle for China's future is reaching a critical point, and we must decide carefully where to place our support.\n\nWe could back the Kuomintang, the strongest faction, but the least ideologically aligned with our socialist goals. Alternatively, we could support the Chinese Communist Party, whose ideology aligns closely with our own, but is significantly weaker and has a history of significant military defeats. There is also the option of aligning with the warlord of Xinjiang, using our influence to encourage [XIJ.GetLeader]'s government to break from Nanjing and align with Moscow, potentially expanding our borders at the expense of socialist solidarity."
 SOV_Support_KMT_tt: "We will dedicate our support to  §B[CHI.GetNameWithFlag]§!, enabling us to send them equipment and support."
 SOV_Support_PRC_tt: "We will dedicate our support to  §R[PRC.GetNameWithFlag]§!, enabling us to send them equipment and support."
 SOV_Support_XIJ_tt: "We will dedicate our support to  §Y[XIJ.GetNameWithFlag]§!, enabling us to send them equipment and support."
