######################################################################
#  Soviet Union Ideas
######################################################################
 SOV_The_Great_Soviet_Famine: "The Great Soviet Famine"
 SOV_The_Great_Soviet_Famine_desc: "Even though the Politburo tries to push the current problems out of the public eye, it is an open secret that the collective efforts of the CPSU in both Ukraine and Kasachztan have led to massive famines ravaging the SSRs and its population, even though both areas are commonly known as the “breadbasket of the Union“. Experts have already handed over several secret reports to Moscow, that predict that “if the problems regarding the agricultural sector of both the Kazakh and Ukrainian SSRs are not solved with utmost urgency, these areas will lose approximately 25 to 40% of their population, 75% of their livestock, 40% of their economic potential and their remaining loyalty to both the Soviet Union and the guidance of comrade Stalin.“ So far the leadership of the Soviet Union hasn't formulated a plan in combatting the critical situation, but it is clear that something must be done to prevent the Ukrainian and Kazakh workers from abandoning the Union."

 SOV_Purging_the_Army: "Purging the Army"
 SOV_Purging_the_Army_desc: "We have begun to cleanse the Army of fifth columnist filth. The Generals, ever suspicious of our dear Leader and his Party, are obviously plotting to overthrow the Soviet order in pursuit of their own short sighted goals. To get rid of this insidious influence we have begun to meticulously audit our Army and remove and discard any generals of…questionable loyalties. These men of course decry us for the disorganization and chaos such a purge has brought onto the Army. They claim that the men are now not only without a leader, but also terrified of disobeying their superiors, even if they give obvious bad orders. To us, however, this loud and public criticism is simply confirmation of their treasonous intentions."

 SOV_Purging_the_Army_2: "Purging the Army"
 SOV_Purging_the_Army_2_desc: "The Generals have been cowed, but our work is only just beginning. Their treasonous rot has penetrated deep into the officer corps. With the top cleaned, it's time to delve into the muck and mire of the vast officer corps and root out those who are disloyal. Officers are being arrested by the truckload as a number of large-scale conspiracies are discovered and dismantled. Their leaders are publicly shot in front of their troops to inspire loyalty. Unfortunately, this has only exacerbated the Army's chaotic state, as paranoia and accusations fly like bullets. This short-sighted pain will be justified by the loyalty engendered by such a purge."

 SOV_Aftermath_of_the_Ryutin_Affair: "Aftermath of the Ryutin Affair"
 SOV_Aftermath_of_the_Ryutin_Affair_desc: "While chairman Stalin has been the leader of the Union for quite a few years now, there are still forces inside the party which oppose Stalin and his authoritarian way to achieving communism. While these forces mostly operate in secret groups inside the party recently a group under the leadership of Martemyan Ryutin and Nikolai Bukharin has openly positioned itself against Stalin by formulating a pamphlet called “Appeal to All Members of the All-Union Communist Party“ and a 200-page document “Stalin and the Crisis of the Proletarian Dictatorship“, which both fiercely criticized Stalin, referring to him as “gravedigger of the Revolution“, and his policies of rapid industrialization and forced collectivization.\n\nDespite the fact that it is unlikely that the Ryutin group will assume power anytime soon, the “Ryutin affair“ has shown and opened up deep wounds inside the CPSU, which will have to be tended to in order to save the revolution."

 SOV_Final_Phase_of_the_Decossackization: "Final Phase of the Decossackization"
 SOV_Final_Phase_of_the_Decossackization_desc: "Considered by many a nomadic, militaristic, and reactionary people, the cossacks present a challenge on our path to socialism. The Cossacks have long upheld the old order, repressing the peasants in the days of the Tsardom and fighting alongside Denikin's White Army in the Civil War. Since 1919 we have made several concerted efforts to eliminate the Cossacks as a class and as a culture. Agricultural collectivization has stripped the wealthiest cossacks of their lands, and cossacks from the Don to Irkutsk found guilty of counterrevolutionary activities in the thousands. Those once-mighty Cossacks, the right arm of the Tsar, are rapidly losing their identity, and the idea of a distinct cossack culture is fast becoming a distant memory."

 SOV_Cossacks_Reintegrated: "Reintegrated Cossacks"
 SOV_Cossacks_Reintegrated_desc: "Until now, the Cossacks functioned as a state within a state. They were some of the most dictatorial units in the old Tsarist Army, characterised by intense autocracy and paternalism. In the midst of the Revolution and Civil War, the strict hierarchy was destroyed. Since then, we have completely crushed them. Many of those who were not executed or who renounced their Cossack heritage were imprisoned in GULAGs. This repression was critical in the reeducation of an entire ethnic group, expelling the autocratic elements from their very essence. After being thoroughly rehabilitated, many of the younger Cossacks are as loyal to the Party and Union as their fathers were to the Empire. Their fathers, meanwhile, are no longer a threat, having grown old and broken from their labour. Now that they are no longer subjected to repression, they can demonstrate their loyalty like any other citizen."

 SOV_Mass_Political_Repression: "Mass Political Repression"
 SOV_Mass_Political_Repression_desc: "The All Union Communist Party is the people's vanguard! It is their only defence against the exploitation and predation of the noble worker by swindlers and fraudsters who want to enslave the noble worker to capital! Allowing these 'parties' to exist would be a recipe for disaster. They would persuade the weak-willed and weak-minded to join their cause and cause havoc. While it may feel dreadful, the people have one voice, one vision, and that is ours to impose on them. Those who speak out against revolutionary propaganda will face harsh punishment, and those they seduce will be taken away for re-education. Through this process, we ensure that our Socialist Paradise will continue to be a beacon of liberty for the global proletariat."

 SOV_Mass_Political_Repression_2: "Mass Political Repression"
 SOV_Mass_Political_Repression_2_desc: "Our previous methods have been successful in subduing the people. Party membership has increased year after year, and more people are reporting disloyal neighbours and friends. The Party apparatus has begun to permeate public life, and the Party itself has become a near-omnipotent force in people's minds. The NKVD has been unleashed to pursue leads provided by our loyal citizens, and it has been very successful in rounding up state enemies. As part of that suppression, all parties other than the Popular Front have been completely banned, leaving only the Bolshevik Party and its satellites as legal parties, with the opposition reduced to a few small regional communist parties controlled by the Party."

 SOV_Mass_Political_Repression_3: "Mass Political Repression"
 SOV_Mass_Political_Repression_3_desc: "The Bolshevik Party has become an inseparable part of the state's functioning. There are no more opposition parties, whether controlled or not. Unions have been completely subsumed under government control. Every bureaucrat, from the lowest-level assistant to the General Secretary, carries a card and is well-versed in Marxist and Stalinist theory. People report any suspicious behaviour, which is quickly investigated and dealt with by the NKVD, which conducts its own investigations into those it considers suspect. Culture is also completely under the Party's control, ensuring that no subversive messages are woven into the media consumed by the pliable proletariat. The government and the people are united and speak with one voice, which screams one pledge: Long Live Stalin and the All-Union Communist Party!"

 SOV_Repressed_Church: "Repressed Church"
 SOV_Repressed_Church_desc: "Throughout human history, the Church has served as a pillar of reactionary thought. They have a long history of resisting change and assisting Kings and Emperors in their pursuit of personal gain. After centuries of struggle, we have completely defeated the Church, and it now works for us. The Priests no longer preach from the counter-revolutionary pulpit, but rather serve as loyal party organs, instilling the Party's righteousness and mission in those who are still hesitant to trust us. The so-called Renovated Church will be promoted by our government until it eventually replaces the old apparatchiks who continue to fight us. Only then will God truly become a devoted Marxist."

 SOV_Deficient_Economy: "Deficient Economy"
 SOV_Deficient_Economy_desc: "While the first five year plans have been largely successful in transforming the Soviet Union from a primitive agrarian nation to a modern, industrial world global power, which is perfectly able to stand up to the economies of the western reactionaries in both size and production output, there are still a variety of inefficiencies preventing the Soviet Union from becoming the perfect example of an effective socialist economy.\n\nBut despite the progress reported and achieved by the Politburo, it is undeniable that exactly this rapid expansion has created a variety of problems, that have put a lid on the general efficiency of our economy through both uncoordinated planning and lackluster modernization efforts, while both bureaucratic obstacles and red tape have been growing rapidly since the start of the five-year plans. While these problems are definitely not overly dramatic and unsolvable, it will still need a large amount of work and optimization to fix these issues and finally make the Soviet economy a force to be reckoned with."

 SOV_Deficient_Economy_2: "Deficient Economy"
 SOV_Deficient_Economy_2_desc: "While the first five year plans have been largely successful in transforming the Soviet Union from a primitive agrarian nation to a modern, industrial world global power, which is perfectly able to stand up to the economies of the western reactionaries in both size and production output, there are still a variety of inefficiencies preventing the Soviet Union from becoming the perfect example of an effective socialist economy.\n\nBut despite the progress reported and achieved by the Politburo, it is undeniable that exactly this rapid expansion has created a variety of problems, that have put a lid on the general efficiency of our economy through both uncoordinated planning and lackluster modernization efforts, while both bureaucratic obstacles and red tape have been growing rapidly since the start of the five-year plans. While these problems are definitely not overly dramatic and unsolvable, it will still need a large amount of work and optimization to fix these issues and finally make the Soviet economy a force to be reckoned with."

 SOV_Soviet_Collectivization: "Soviet Collectivization"
 SOV_Soviet_Collectivization_desc: "Our agricultural sector's collectivization aims to integrate individual landholdings and labour into collectively and state-controlled farms. It was expected that replacing individual peasant farms with collective ones would immediately increase food supply and raw material supply for the processing industry. Instead, collectivization has resulted in several famines as well as active peasant resistance throughout the country."

 SOV_Soviet_Collectivization1: "Soviet Collectivization"
 SOV_Soviet_Collectivization1_desc: "Our agricultural sector's collectivization aims to integrate individual landholdings and labour into collectively and state-controlled farms. It was expected that replacing individual peasant farms with collective ones would immediately increase food supply and raw material supply for the processing industry. Instead, collectivization has resulted in several famines as well as active peasant resistance throughout the country."

