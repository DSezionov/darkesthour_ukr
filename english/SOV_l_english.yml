 # Battle for Harvest "Year"
 SOV_Battle_for_Harvest_category: "Battle for Harvest [GetYear]"
 SOV_Battle_for_Harvest_category_desc: "\n\n\n£decision_header_SOV_Battle_for_Harvest£\n\n\n\nThe lands of our glorious Union are vast, expansive, and varied, and these lands bear the responsibility of feeding an equally large and diverse populace. While the 'Chernozem' abundant land in Ukraine, & southern Russia allow for highly productive agricultural activities, there are frontier regions, some near the fringes of Siberia, others in Transcaucasia, the Steppes, Central Asia and some even near the Urals, which all significantly contribute to our yearly harvest as well.\n\nThese climates and circumstances do not favour the peasant, but the State does. To increase our yield and agricultural output, the State will pump in the necessary capital and resources, along with allocating machinery and tools so that in the end, no worker will sleep on a hungry stomach.\n"
 SOV_Invest_Significant_Resources_1933: "Invest Significant Resources"
 SOV_Invest_Significant_Resources_1933_desc: "Due to the issues with the harvest in the previous years, we have done everything possible to prepare for this year's sowing season. While monetary investment will be necessary, we have set aside the necessary surplus equipment to meet our goals. However, for the next year's sowing season we will need to produce more."
 SOV_Invest_Medium_Resources_1933: "Invest Medium Resources"
 SOV_Invest_Medium_Resources_1933_desc: "Due to the issues with the harvest in the previous years, we have done everything possible to prepare for this year's sowing season. While monetary investment will be necessary, we have set aside the necessary surplus equipment to meet our goals. However, for the next year's sowing season we will need to produce more."
