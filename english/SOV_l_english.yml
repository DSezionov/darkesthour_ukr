 SOV_Gulag_Based_Economy_Projects: "Gulag Based Economy Projects"
 SOV_Gulag_Based_Economy_Projects_desc: "Workers, for all of their advantages, have disadvantages. One of the most important is their insistence on safe and sensible working schedules and areas. Fortunately, there is a class of people who do not have the luxury of favourable working conditions: prisoners. We've just purged ourselves of thousands of counterrevolutionary filth, who are now taking up space in gulags across the country and wasting food at every meal. We'll start by making them repay their debt to the Union. We will organise our massive GULAG population into work crews and dispatch them to help their former countrymen build the nation they despise. They will have plenty of time to reflect on their failures as they slave away in the cold of Siberia, hammering roads through mountains or whatever else is required of them."

