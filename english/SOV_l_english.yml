 SOV_Purge_Failed: "§YStalin§! §Rfailed§! the purge."

 # Phase 3
 SOV_Mass_Formation_of_NKVD_Troikas: "Mass Formation of NKVD Troikas"
 SOV_Mass_Formation_of_NKVD_Troikas_desc: "The Party has discovered new levels of subversion that are festering within the state and social institutions. To expedite the elimination of hidden enemies we will empower NKVD troikas to administer swift and decisive justice. These special commissions, made up of Party loyalists and security officers, will bypass bureaucratic red tape and issue quick verdicts against saboteurs, wreckers, and counter-revolutionaries."
 SOV_Start_the_German_Operation: "Start the German Operation"
 SOV_Start_the_German_Operation_desc: "The NKVD has intercepted reliable intelligence proving that agents of German ancestry, whether nationals, émigrés, or Soviet citizens of German descent, have infiltrated key sectors of the state, military, and industrial organisations. These fifth columnists, who are under direct influence from German military intelligence, pose an immediate threat to our security. We intend to expose the spy network through targeted arrests, interrogations, and public confessions. By carrying out NKVD order 00439, we will eliminate this internal front and remind all foreign nationals within our borders that their loyalty to the Soviet state is unbreakable."
 SOV_Purge_the_Red_Army_Intelligence_Services: "Purge the Red Army Intelligence Services"
 SOV_Purge_the_Red_Army_Intelligence_Services_desc: "The Red Army's intelligence apparatus, which was once trusted to protect our military from internal and external threats, has suffered significant damage. Traitors embedded within have fabricated reports, suppressed intelligence, and collaborated with foreign operations to undermine the Soviet Union's defence. This level of treason in our military intelligence cannot continue. The NKVD will completely clean out the GRU and all allied departments, replacing corrupted officials with trusted Party loyalists. Those found guilty will be tried for treason and espionage."
 SOV_Execute_the_Kulak_Operation: "Execute the Kulak Operation"
 SOV_Execute_the_Kulak_Operation_desc: "The kulaks have long opposed collectivism and proletarian dictatorship. Though the initial waves of dekulakization purged many, current evidence indicates that a large number of these reactionary elements remain in the Soviet countryside. They continue to undermine grain production, incite anti-Soviet sentiment, and poison the minds of the working peasants with bourgeois poison, all while posing as cooperative farmers or even Party supporters. Through order 00447, the NKVD will eliminate this parasitic elite through mass arrests, summary trials, and long-term deportations."
 SOV_Deport_Koreans_to_Central_Asia: "Deport Koreans to Central Asia"
 SOV_Deport_Koreans_to_Central_Asia_desc: "With tensions rising in the Far East and the Imperial Japanese threat becoming more audacious, the strategic integrity of our eastern frontiers cannot be compromised. We discovered a potential risk among the Korean population in Primorsky Krai and its surrounding areas. While many of these people may support the Soviet Union on an individual level, their proximity to the Japanese border, cross-border familial connections, and linguistic and cultural ties make them vulnerable to infiltration. As a precaution, the Central Committee has authorised the mass deportation of ethnic Koreans to secure settlements in Central Asia.\n\nWe must also eliminate the small Posyetsky Korean National District, established in 1926, to ensure that no treacherous separatism can develop."
 SOV_Deport_Kurds_from_Azerbaijan: "Deport Kurds from Azerbaijan"
 SOV_Deport_Kurds_from_Azerbaijan_desc: "The situation in the southern borderlands has become increasingly untenable, with rumours of nationalist agitation and possible separatist sentiment spreading. Foreign powers and pan-nationalist ideologues have sowed the seeds of discontent in Azerbaijan's Kurdish community. Their tribal structures, distinct language, and religious particularism set them apart from the general Soviet population, making integration and ideological devotion difficult to enforce. The NKVD has documented secret meetings, illegal correspondence with foreign agents, and the formation of ethnic militias. To ensure the unity of the Azerbaijani SSR, the Central Committee approved the Kurdish people's evacuation to designated zones within the Kazakh and Uzbek SSRs."
 SOV_Launch_Latvian_Operation: "Launch Latvian Operation"
 SOV_Launch_Latvian_Operation_desc: "The so-called \"Latvian diaspora\" in the USSR has long been a source of unrest. Many Latvian nationals and émigrés were once lauded as fellow revolutionaries, but recent investigations have revealed that they have become tools of foreign intelligence, particularly German, Polish, and British operatives. The Latvian Operation will identify and remove these hostile elements in a systematic manner in accordance with NKVD order 49990. NKVD agents will arrest known suspects, question their associates, and extract confessions that will reveal larger networks of treason."
 SOV_Purge_Estonians_Finns_Bulgarians_and_Greeks: "Purge Estonians, Finns, Bulgarians and Greeks"
 SOV_Purge_Estonians_Finns_Bulgarians_and_Greeks_desc: "Across the Soviet Union's borders, there are numerous minority groups whose national allegiances are to foreign states and ideologies rather than to the Union. Estonians and Finns have strong ties to the bourgeois regimes on our northwest border. Meanwhile, Bulgarians and Greeks have proven vulnerable to monarchist and religious influences. A widespread purge will now start. All citizens of Estonian, Finnish, Bulgarian, and Greek descent will be monitored, arrested, and deported as necessary. These ethnic operations eliminate foreign powers' ability to incite internal revolts while also defending our socialist unity against ethnonationalist degeneration."
 SOV_Send_Frinovsky_to_the_Far_East: "Send Frinovsky to the Far East"
 SOV_Send_Frinovsky_to_the_Far_East_desc: "The People's Commissariat has received alarming information from the Far Eastern provinces, including infiltration by reactionary elements, suspicious military personnel, and widespread ideological complacency. To restore discipline and communist vigilance, we are sending Mikhail Frinovsky, Deputy Chief of the NKVD and a dependable implementer of Party decisions, to Khabarovsk. His goal is to purge the Red Army and civil administration of all deviationists, foreign agents, and nationalist sympathisers. Mass arrests will be permitted, and any evidence of counter-revolutionary activity will result in immediate extermination."
 SOV_Appoint_Beria_as_Deputy_NKVD_Chief: "Appoint Beria as Deputy NKVD Chief"
 SOV_Appoint_Beria_as_Deputy_NKVD_Chief_desc: "The failure of previous security personnel to detect certain high-level schemes has necessitated a reassessment of NKVD leadership.  To improve internal vigilance and administrative efficiency, Lavrentiy Beria, a proven and brutal implement of Party orders, will be promoted to Deputy NKVD Chief. His dedication is unwavering, and his methods have already proven effective in the Georgian SSR. Mikhail Frinovsky will be appointed People's Commissar of the Navy, a promotion from his current position as Deputy NKVD Chief. With Beria's appointment, the purge will enter a new phase. He will direct operations against military personnel and party officials suspected of sabotage or ideological impurity."
 SOV_Form_Local_Special_Troikas: "Form Local Special Troikas"
 SOV_Form_Local_Special_Troikas_desc: "The NKVD will approve the formation of local Special Troikas, which are extrajudicial commissions with the authority to investigate, prosecute, and sentence traitors without delay.These committees, which include party leaders, NKVD personnel, and military representatives, will work independently to clear towns, workplaces, and collective farms of class enemies. These Troikas will administer swift and decisive justice, ensuring that no saboteur goes unpunished due to bureaucratic delays or poor legalism. They will work within quotas and report directly to Moscow, avoiding local corruption and obstruction."
 SOV_Purge_Remaining_Kulaks: "Purge Remaining Kulaks"
 SOV_Purge_Remaining_Kulaks_desc: "Despite previous efforts, remnants of the kulak class persist in the countryside, hoarding grain, undermining collectivisation, and poisoning the minds of honest peasants with anti-socialist propaganda. These public enemies must be eradicated once and for all. The NKVD will intensify operations against suspected kulak elements, aided by local Party committees and informant networks. Property will be taken, villages will be cleaned up, and families will be relocated or liquidated as necessary."
 SOV_Find_Industrial_Saboteurs: "Find Industrial Saboteurs"
 SOV_Find_Industrial_Saboteurs_desc: "The Soviet economy suffers unexplained delays, breakdowns, and deficits. An investigation reveals a bleak explanation: industrial saboteurs working in our factories, mines, and transportation networks. These traitors pose as engineers, foremen, and technicians, but they actually work for foreign powers, class enemies, and reactionary cabals. The NKVD will launch a major campaign to find and expose these saboteurs."
 SOV_Find_Industrial_Saboteurs_2: "Find Industrial Saboteurs"
 SOV_Find_Industrial_Saboteurs_2_desc: "The Soviet economy suffers unexplained delays, breakdowns, and deficits. An investigation reveals a bleak explanation: industrial saboteurs working in our factories, mines, and transportation networks. These traitors pose as engineers, foremen, and technicians, but they actually work for foreign powers, class enemies, and reactionary cabals. The NKVD will launch a major campaign to find and expose these saboteurs."
 SOV_Step_up_Mass_Operations: "Step up Mass Operations"
 SOV_Step_up_Mass_Operations_desc: "The scope of the scheme revealed by the NKVD far exceeds even the most dire predictions. Wreckers, Trotskyites, Kulaks, and Foreign Agents. Their numbers are large, and their methods are devious. Limited purging is no longer sufficient. It is time for massive operations, with widespread arrests, long lists of suspects, and accelerated sentences. The Union is under threat from within, and only massive repression can restore order."
 SOV_Commit_to_Ethnic_Operations: "Commit to Ethnic Operations"
 SOV_Commit_to_Ethnic_Operations_desc: "According to intelligence reports, various ethnic groups in the Soviet Union are defecting at a rapid pace. Encouraged by foreign propaganda and nationalist delusions, members of these communities have formed underground groups, illegally crossed borders, or assisted foreign intelligence agencies. This cannot be allowed. Loyalty to the Soviet Union will be determined by actions, not origin; however, if evidence of treason is discovered, punishment will be severe."
 SOV_Imminent_Counter_Revolution_2: "Imminent Counter-Revolution"
 SOV_Imminent_Counter_Revolution_2_desc: "Whispers of conspiracy echo through the corridors of power, and enemies - real or imagined - lurk in every corner of the Party and the Red Army. Time is running out, and unless decisive action is taken, the counter-revolution will not only survive but may sweep away Stalin himself."

 # Phase 4
 SOV_Criticise_the_NKVD: "Criticise the NKVD"
 SOV_Criticise_the_NKVD_desc: "The Party must now face an unsettling reality: portions of the NKVD, previously tasked with protecting the Revolution, have abandoned their duties. Under Yezhov's unstable leadership, mass arrests were made based on quotas rather than evidence. Loyal Party members, innocent workers, and even committed revolutionaries were all caught up in the repressive apparatus. Personal vendettas, carelessness, and outright criminality have harmed our security organs' credibility."
 SOV_Stop_the_Activities_of_Extrajudicial_Organs: "Stop the Activities of Extrajudicial Organs"
 SOV_Stop_the_Activities_of_Extrajudicial_Organs_desc: "The time has come to dismantle the ad hoc mass repressive apparatus that operated outside the bounds of legality. The local Special Troikas and extrajudicial institutions, established at the height of the counter-revolutionary threat, fulfilled their mandate. However, they have also become unmanageable. Their continued operation threatens to undermine Party authority and erode public trust in state institutions. These provisional tribunals, which were necessary during the darkest days of the Purge, must now be suspended."
 SOV_Purge_the_NKVD: "Purge the NKVD"
 SOV_Purge_the_NKVD_desc: "The disease within the NKVD has spread too far to be overlooked. Under Yezhov, the organisation shifted from a working-class shield to a weapon used blindly, even against innocent people. Informants were rewarded for lying, interrogators for being cruel, and officers for statistics rather than truth. Many of those who organised the Purge did so not to defend the state, but to advance personal interests or conceal their own crimes. Now that Beria has risen to power, it is time for the NKVD to face justice. Dozens of prominent officials have already been imprisoned or killed for their crimes. Those who betrayed the Party with innocent blood will face the consequences."
 SOV_Restore_Socialist_Legality: "Restore Socialist Legality"
 SOV_Restore_Socialist_Legality_desc: "Arrests were made without warrants, interrogations were carried out without supervision, and sentences were imposed without a trial. While the Purge was successful in destroying organised opposition, it also swept up the loyal, innocent, and ideologically sound. Now a new course must be charted. Comrade Beria, tasked with restoring discipline and order within the NKVD, has begun the process of re-establishing \"Socialist Legality,\" a legal regime based on proletarian dictatorship but guided by principle rather than paranoia. The courts will resume their proper duties in determining guilt. NKVD actions will now require extensive documentation, verifiable evidence, and Party approval."
 SOV_Invalidate_Extrajudicial_Sentences: "Invalidate Extrajudicial Sentences"
 SOV_Invalidate_Extrajudicial_Sentences_desc: "As new leadership takes over the NKVD, a sobering fact emerges from last year's archives: countless citizens were sentenced without due process. Special Troikas operated without court oversight, passing death sentences based on unverified accusations, confessions obtained through torture, or quotas imposed arbitrarily by higher authorities. These were not isolated failures, but rather systemic excesses that have tarnished the reputation of our internal security apparatus. A new panel, led by Comrade Beria, will conduct a thorough investigation into these extrajudicial sentences. Files will be reopened, cases will be re-examined, and convictions that lack compelling evidence will be reversed."

