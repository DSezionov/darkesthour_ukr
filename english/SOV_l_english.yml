 # Intervene in China
 SOV_Intervention_in_China: "Intervention in China"
 SOV_Intervention_in_China_desc: "\n\n\n£decision_header_SOV_Intervention_in_China£\n\n\n\nWarlords, civil wars, Japanese invasions - China is a complicated land. Amid the turmoil, countless factions struggle for control, each claiming to represent the true will of the Chinese people. To us in Moscow, this chaos is both a danger and an opportunity. The instability on our southern frontier cannot be ignored, yet it also opens the door for socialist influence to take root.\n\nMany within the Politburo and the Red Army General Staff argue that supporting one of these Chinese forces could strengthen our position in Asia and counter the encroachment of hostile powers. But whom should we trust? Some factions speak of revolution yet lack strength, while others command armies but remain tied to the interests of landlords and reactionaries. The decision will not be easy, but with careful judgment, we may find a partner capable of carrying the banner of progress and standing beside us against imperial aggression.\n\nSoviet Influence in §Y[SOV_Supported_Faction_in_China.GetNameDef]§!: [?soviet_influence|%Y0] [ROOT.Dynamic_SOV_Soviet_Influence]"
