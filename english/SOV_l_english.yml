 #Red Army ideas
 SOV_Tukhachevsky_Reforms: "Tukhachevsky's Reforms"
 SOV_Tukhachevsky_Reforms_desc: "Tukhachevsky is a well-known Red Army commander who rose to prominence during the Russian Civil War due to his exceptional abilities. He is a patriot and communist who is willing to use any means necessary to defeat imperialism. Tukhachevsky has been appointed by the USSR's Supreme Headquarters to lead the Red Army's new reforms.\n\nHis plan calls for the new Red Army units to be fully mechanised, well-trained, and equipped with cutting-edge technologies. The formation of new divisions and battalions for our army has begun, with the active introduction of radio communications, vehicles, and supply services. Training for new personnel services and officers began, and the rank system was reformed and centralised, making unit management and troop interaction even more effective. The new Red Army is indestructible and legendary!"

 SOV_Tukhachevsky_Reforms_2: "Tukhachevsky's Reforms"
 SOV_Tukhachevsky_Reforms_2_desc: "Marshal Mikhail N. Tukhachevsky's extensive Red Army reforms, which focused on reducing red tape between the Party and troops and allowing them to do far more than before, have proven enormously successful. Because of these enhancements, divisions can now not only adapt faster in the heat of battle and make necessary decisions without requiring permission from the Party, but they can also plan much more efficiently.\n\nThe Red Army is not only better, but also smarter, thanks to new theories like Tactical Deep Battle, which uses powerful strategic breakthroughs and encirclements to drive the enemy to collapse. Army academies across the Union have encouraged more clever thinking, and our commanders' skill on the battlefield has grown exponentially. Our enemies will tremble now that our army has been freed from the chains of mindlessness and the bureaucrats that bound it. It can now destroy opposing forces without hesitation or ineptness!"

 SOV_Voroshilovtchina: "Voroshilovtchina"
 SOV_Voroshilovtchina_desc: "Kliment Voroshilov, an old warhorse, has been entrusted with the future of our military. He has been more than cooperative with the government, being a dogmatic Stalinist and close confidant of Stalin. While his subordinates and Army colleagues have few positive things to say about his military abilities, Stalin is unconcerned. Voroshilov was chosen for political stability rather than his military prowess. With him at the helm, the Red Army will remain a strong and loyal pillar to the state. Even as he settles into his new position, he has already begun to rid the upper echelons of untrustworthy commanders."

 SOV_Voroshilovtchina_2: "Voroshilovtchina"
 SOV_Voroshilovtchina_2_desc: "Kliment Voroshilov, an old warhorse, has been entrusted with the future of our military. He has been more than cooperative with the government, being a dogmatic Stalinist and close confidant of Stalin. While his subordinates and Army colleagues have few positive things to say about his military abilities, Stalin is unconcerned. Voroshilov was chosen for political stability rather than his military prowess. With him at the helm, the Red Army will remain a strong and loyal pillar to the state. Even as he settles into his new position, he has already begun to rid the upper echelons of untrustworthy commanders."

 SOV_Deep_Battle: "Deep Battle"
 SOV_Deep_Battle_desc: "As part of Tukhachevsky's reforms to modernise the Red Army, he adopted a new army doctrine developed since the Civil War. Previously, it referred to the dispersal, disorganisation, and consistent destruction of enemy forces with the assistance of light reconnaissance battalions and manoeuvrable transport units. With the advancement of tank science, this theory has evolved into the theory of rapid breakthroughs and enemy dispersion via mobile tank groups. It is ideal for the USSR's light and medium tank production."

 SOV_Mass_Mobilization_idea: "Mass Mobilization"
 SOV_Mass_Mobilization_idea_desc: "Russia has always been known for the quality of its army, but it is foolish to deny that our military science has fallen far behind that of Europe over the last two decades. Our army is inexperienced, and any drastic reforms could completely destroy our modern structure of interaction between the branches of the armed forces. As part of the adoption of moderate reforms in the ranks of the Red Army, a decree was signed to increase the length of service and mandatory conscription of the majority of the population. Our army is large, but it lacks valuable personnel. This problem can be partially solved by bringing in new volunteers."

 SOV_Human_Wave: "Human Wave"
 SOV_Human_Wave_desc: "Although brutal, we believe there is no other option. To deal with the onslaught, Moscow must counterattack, even as casualties mount. There will always be more men willing to die for the labour movement and communism, and their lives will be critical to the Union's survival. The current population of SSRs must be used to its full potential. To apply this to warfare, the military has used 'human wave tactics', which are massive tsunamis of soldiers that, while unprotected, seek to overwhelm and uproot enemy fronts while also disrupting organisation.\n\nSimply put, the wave drowns the opposing force in blood, bodies, and bullets - whether it is enemy or Red Army blood, it makes no difference as long as it leads to proletarian victory. While such tactics were largely ineffective for previous nations, we hope that by killing enough people, we will defeat our enemies and bring about revolutionary peace." 

 SOV_Tankograd_idea: "Tankograd"
 SOV_Tankograd_idea_desc: "The largest of Stalin's new tank factories, Tankograd, is located in a city in the Ural foothills. The Chelyabinsk Tractor Plant's name betrays its true purpose. This massive factory produces tanks for our growing military every minute of every month. The Red Army becomes more mechanised and capable of fighting the people's enemies as a result of their blood and sweat. Chelyabinsk, already a growing city, is experiencing a population boom as thousands of factory workers and the supporting businesses they bring with them flood the city. The ChTZ is a smashing success as a poster project for the First Five Year Plan!"

 SOV_Krasnaya_Armiya_Vorzrozhdayetsya: "The Red Army Reborn"
 SOV_Krasnaya_Armiya_Vorzrozhdayetsya_desc: "The Red Army, which was once a band of militias fighting the Tsar, is no longer a disorganised force. Rather, it is a strategising force to be reckoned with on the battlefield. An army of millions protects the Soviet Union, willing to give their lives for a free global proletariat. Grand reforms have increased the Red Army's size, uprooting issues one by one until it could stand as a terrifying force. Organisational issues, traitors, strategic deficits, and the need for new commanders are all factors that could permanently cripple a lesser nation's military.\n\nAnd yet, here it is, thriving and powerful. Our forces are disciplined, confident in their breakthrough and mass assault tactics. The Soviet soldier is no longer recognisable and has changed dramatically for the better; the Red Army as a whole has been truly reborn."

 SOV_Sovetskaya_Administratia: "Sovetskaya Administratia"
 SOV_Sovetskaya_Administratia_desc: "In the territories we liberated, we established communist administrations run by locals loyal to us and Marx's ideals, in collaboration with the Red Army High Command, which also has a say in how the liberated territories are run, at least until the war is over. These local collaborators are invaluable in ensuring efficient governance and eliminating misguided individuals who oppose worker liberation. At the same time, it enables basic services and production to resume quickly, and some are even able to contribute a small number of communist volunteers to our war effort."
 
 ### OPINION MODIFIERS ###
 SOV_collective_security_tt: "§YThe United Kingdom, France, and the United States§! will have a §Ghigher opinion§! of us while we have §YLitvinov§! appointed."
 SOV_collective_security: "Collective Security Policy"
