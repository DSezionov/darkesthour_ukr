 BEL_Belgitude: "Belgitude"
 BEL_Belgitude_desc: "The Belgian identity is a patchwork of languages, loyalties, and regional cultures, stitched together by circumstance more than shared spirit. In times of peace, this fragile unity sustains compromise and coexistence. But under the strain of war, the divisions run deep - undermining morale, weakening resolve, and leaving the army uncertain of what exactly it fights to defend."
 
