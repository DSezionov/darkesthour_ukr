 DEN_Samarbejdspolitikken: "Samarbejdspolitikken"
 DEN_Samarbejdspolitikken_desc: "Following the German invasion, Denmark surrendered swiftly to avoid bloodshed and destruction. Unlike most occupied nations, the German authorities allowed our government, parliament, and even the King to remain in place, provided we cooperate. This \"collaboration policy\" or \"Samarbejdspolitikken\" grants us a rare degree of autonomy, but at the price of censorship, restrictions, and uneasy compliance with Berlin's demands. While the cooperation ensures stability and shields Denmark from harsher occupation, it also stirs resentment among the people, who question how long such a compromise can last."