l_english:
### CITY EVENTS
# This category contains minor events to add, change or remove cities/victory points from the map in the cases where these changes are too minor or simply not included in the main content design of the relevant nation.

### Yugoslavia
 CityEvents_YUG.1.t: "Veliki Bečkerek Renamed to Petrovgrad"
 CityEvents_YUG.1.d: "By royal decree, the city of Veliki Bečkerek has been renamed Petrovgrad, in honor of the late King Peter I Karađorđević, the monarch who led Serbia through its most trying years and helped bring about the unification of South Slavs into the Kingdom of Yugoslavia.\n\nThis renaming represents a deliberate effort by the central government to promote a unified national identity across the kingdom's diverse lands. The new name, Petrovgrad, will strengthen loyalty to the crown and symbolize the enduring legacy of King Peter I — a leader who embodied the unity and independence of the Yugoslav peoples.\n\nWhile Veliki Bečkerek's multiethnic population reflects the rich tapestry of our kingdom, this act reaffirms the authority of the crown and the common destiny of all Yugoslavs under one state."
 CityEvents_YUG.1.A: "The decree is enacted."

 CityEvents_YUG.2.t: "Petrovgrad Renamed to Zrenjanin"
 CityEvents_YUG.2.d: "By decision of the People's Assembly, and in accordance with the values of the socialist revolution, the city of Petrovgrad has been officially renamed Zrenjanin, honoring the heroic sacrifice of Žarko Zrenjanin \"Uča\", one of the leading organizers of the workers' and people's uprising in Vojvodina.\n\nA committed communist and fearless commander of the National Liberation Movement, Zrenjanin led the resistance in the Banat before his arrest and death at the hands of the fascist occupiers. His legacy endures as a symbol of the people's struggle against tyranny and foreign domination.\n\nThe renaming of the city — which once bore the name of a king — is a clear break with the old regime and its monarchical, bourgeois values. Under the new socialist order, the names of our cities shall reflect the spirit of the working class, the unity of the Yugoslav peoples, and the blood shed for liberation..\n\nFrom this day forward, the city shall carry the proud name of Zrenjanin."
 CityEvents_YUG.2.A: "In honor of our fallen comrade — Zrenjanin!"

### Russia/USSR
 CityEvents_SOV.1.t: "Tskhinvali Renamed to Staliniri"
 CityEvents_SOV.1.d: "In honor of the 56th birthday of Comrade Joseph Stalin, the great leader of the Soviet people and the heroic son of the Georgian nation, the city of Tskhinvali, capital of the South Ossetian Autonomous Oblast, has been renamed Staliniri.\n\nThis renaming symbolizes the unbreakable bond between the Soviet peoples and their wise leader, whose tireless efforts have strengthened the unity and power of the socialist motherland. Staliniri will stand as a lasting monument to the achievements of socialism and the glorious path of progress under the leadership of Comrade Stalin.\n\nThe city's new name will inspire all workers, peasants, and soldiers in the region to redouble their dedication to the building of communism and the defense of the Soviet Union."
 CityEvents_SOV.1.A: "Long live Comrade Stalin!"

 CityEvents_SOV.2.t: "Leninabad"
 CityEvents_SOV.2.d: "In the ancient Tajik city, the party secretary stood on the steps of the local administration building, unrolling the official decree in front of a small crowd of workers, students, and local officials. \"By order of the Supreme Soviet, Khujand is now Leninabad!\", he proclaimed in a grandiose and dramatic tone. The crowd clapped politely, some out of habit, some out of caution.\n\nA young factory worker in the front row shifted from foot to foot. He had heard of Lenin, of course, but his concern was the new paperwork for the factory's quotas and the upcoming inspection. “So... the city's name changes, huh?” he muttered to his friend. \"Does anything else change?\"\n\nNearby, an older merchant nodded slowly, pocketing his coins. \"Same streets, same shops\", he said quietly. \"Just a new name to report on forms\". Across the square, schoolchildren waved small red flags, mostly because teachers had handed them out, not because they understood the significance.\n\nThe secretary glanced over the square, noting the mix of expressions, some curious, some wary, some indifferent. Leninabad, he thought, would serve as a symbol of Soviet progress, whether or not the people truly felt inspired. In the coming months, new factories, schools, and offices would rise, and the city's streets would slowly take on the rhythms of the Soviet state. For now, the name was official, and life continued."
 CityEvents_SOV.2.A: "The Sovietization of Central Asia marches forward, whether they like it or not."

 CityEvents_SOV.3.t: "Grishino Renamed to Postyshevo"
 CityEvents_SOV.3.d: "By decree of the Soviet authorities, the town of Grishino in Stalino Oblast has been renamed Postyshevo, in honor of Pavel Postyshev, a devoted Bolshevik revolutionary and prominent Soviet statesman.\n\nPostyshev played a significant role in consolidating Soviet power and promoting socialist construction in Ukraine and across the USSR. His dedication to the Party and the people is commemorated through this renaming, symbolizing the unity and strength of the Soviet socialist state.\n\nThe new name reflects the commitment of the Ukrainian SSR to the ideals of Leninism and the continued development of socialism under the guidance of the Communist Party."
 CityEvents_SOV.3.A: "In honor of Comrade Postyshev!"

 CityEvents_SOV.4.t: "Postyshevo Renamed to Krasnoarmeyskoye"
 CityEvents_SOV.4.d: "Located in Stalino Oblast of the Ukrainian SSR, the town formerly known as Postyshevo — renamed just four years ago to honor the dedicated Bolshevik leader Comrade Pavel Postyshev — has now been given a new, glorious name: Krasnoarmeyskoye.\n\nThis new name pays tribute to the fearless Red Army, the iron fist defending the Soviet Union and the revolutionary vanguard of the worldwide socialist cause. As the Soviet people face ever-increasing threats from imperialist forces, Krasnoarmeyskoye will stand as a proud symbol of military strength, unity, and unwavering revolutionary vigilance.\n\nLet the workers, peasants, and soldiers of the Ukrainian SSR draw inspiration from this name, a lasting monument to the Red Army's sacrifices and victories that safeguard our socialist motherland."
 CityEvents_SOV.4.A: "Long live the Red Army — eternal defender of the Soviet people!"

 CityEvents_SOV.5.t: "Perm Renamed to Molotov"
 CityEvents_SOV.5.d: "In recognition of the outstanding service and steadfast leadership of Comrade Vyacheslav Molotov, one of the Soviet Union's most devoted statesmen and a trusted comrade of Comrade Stalin, the city and oblast of Perm has been renamed Molotov.\n\nThis renaming symbolizes the deep gratitude of the Soviet people for Comrade Molotov's tireless efforts in strengthening the Party, advancing socialism, and defending the motherland from the enemies of the people. The city of Molotov will stand as a proud monument to revolutionary dedication and exemplary communist leadership.\n\nLet the workers, peasants, and soldiers of the city bear this new name with honor and continue to build a bright socialist future under the guidance of the Communist Party."
 CityEvents_SOV.5.A: "Long live Comrade Molotov!"

 CityEvents_SOV.6.t: "Ostyak-Vogul? Nyet! Khanty-Mansi!"
 CityEvents_SOV.6.d: "In line with the Soviet policy to better recognize and organize the diverse peoples of the USSR, the Ostyak-Vogul Autonomous Okrug has been officially renamed Khanty-Mansi Autonomous Okrug.\n\nThis change replaces the outdated colonial exonyms \"Ostyak\" and \"Vogul\" with the self-designations of the indigenous peoples themselves — the Khanty and Mansi. It reflects the Party's policy of \"korenizatsiya\", aimed at promoting the national identity, culture, and development of the USSR's indigenous peoples within the socialist framework.\n\nThe renaming is a crucial step in affirming the dignity of the Khanty and Mansi peoples and strengthening their role as equal participants in building the Soviet future."
 CityEvents_SOV.6.A: "For the advancement of the Khanty and Mansi peoples!"

 CityEvents_SOV.7.t: "Keshishkend Renamed to Mikoyan"
 CityEvents_SOV.7.d: "In honor of Comrade Anastas Mikoyan, a distinguished son of the Armenian Soviet Socialist Republic and a steadfast leader of the Communist Party of the Soviet Union, the town of Keshishkend has been renamed Mikoyan.\n\nThis renaming celebrates Comrade Mikoyan's tireless dedication to the cause of socialism, his exemplary service to the Soviet people, and his significant contributions to the unity and strength of the USSR.\n\nThe people of the Armenian SSR are called upon to carry forward the revolutionary spirit embodied by Mikoyan, building a prosperous socialist future under the wise guidance of the Party and the leadership of Comrade Stalin."
 CityEvents_SOV.7.A: "Long live Comrade Mikoyan!"

 CityEvents_SOV.8.t: "Founding of Severodonetsk"
 CityEvents_SOV.8.d: "By decree of the Presidium and in accordance with the ongoing Five-Year Plan, the Soviet Union has initiated the founding of a new industrial settlement along the banks of the Seversky Donets River in the eastern Ukrainian SSR. The settlement, which will serve the expanding chemical and heavy industry sectors, shall bear the name Severodonetsk, marking its location in the north of the Donets Basin.\n\nThis new town is strategically positioned near key rail and river corridors and is to be centered around the construction of the Lysychansk Nitrogen Fertilizer Plant, a flagship of Soviet chemical engineering. The site is already drawing workers, engineers, and Komsomol volunteers from across the Union, all eager to take part in building socialism brick by brick.\n\nSeverodonetsk will not only be a city of industry but also a beacon of Soviet planning, discipline, and the inexorable progress of the proletariat. Where once there was forest and steppe, soon will rise smokestacks and schools, housing blocks and power lines — the unmistakable mark of Soviet achievement."
 CityEvents_SOV.8.A: "A monument to Soviet industrialization!"
 CityEvents_SOV.8_tt: "§YSeverodonetsk§! is founded."

### Dominican Republic
 CityEvents_DOM.1.t: "Santo Domingo renamed to Ciudad Trujillo"
 CityEvents_DOM.1.d: "On this day, the glorious capital city of our nation, Santo Domingo, is proudly renamed Ciudad Trujillo, honoring our beloved leader, Generalissimo Rafael León Trujillo.\n\nThis change symbolizes the strength, progress, and unity brought to the Dominican Republic under the visionary guidance of El Jefe. Ciudad Trujillo stands as a shining beacon of order, development, and national pride — a testament to the enduring legacy of our strong and decisive leadership.\n\nLet all Dominicans embrace this new name with pride and dedication to the continued prosperity and greatness of our homeland."
 CityEvents_DOM.1.A: "Long live Ciudad Trujillo and Generalissimo Trujillo!"
 CityEvents_DOM.2.t: "Dominican Dictator Renames Capital After Himself"
 CityEvents_DOM.2.d: "[FROM.GetNewsIcon]In what some might call an act of supreme self-confidence, Generalissimo Rafael León Trujillo of the Dominican Republic has decided that Santo Domingo just wasn't fitting enough—so he's renamed the capital Ciudad Trujillo. It seems the good Generalissimo prefers the city to carry his own name rather than the one with centuries of history.\n\nWhile the regime's progress and modernization of the country are touted, the new city name has certainly made it clear who's the boss around there. Locals might find it tricky to explain their hometown now, but surely it beats confusion—there's no mistaking where loyalty lies!\n\nInternational observers are watching with a mix of amusement and curiosity, wondering if the Generalissimo will next rename the country after himself. Until then, Ciudad Trujillo stands as a shining example of one man's love for his own name.."
 CityEvents_DOM.2.A: "Now that's Latin America, alright."
 CityEvents_DOM.2.B: "They dare mock our Great Leader?"
 CityEvents_DOM.2_tt: "§YSanto Domingo§! changes name to §YCiudad Trujillo§!. Glory to El Presidente."

### Germany
 CityEvents_GER.1.t: "Stadt des KdF-Wagens"
 CityEvents_GER.1.d: "By the will of the Führer and in accordance with the grand vision of a motorized German future, the Reich has laid the foundation stone for a new city in the Province of Hanover: the Stadt des KdF-Wagens bei Fallersleben. This city, purpose-built to house the workers of the Volkswagen plant, shall stand as a symbol of German labor, planning, and social unity.\n\nAt the heart of this new community is the KdF-Wagen - the People's Car, an affordable automobile for every German family, crafted by German hands under the banner of National Socialist innovation. Designed by Dr. Ferdinand Porsche and championed by the Führer himself, this new model of industry and community will transform the everyday life of the Volksgenossen.\n\nThe city shall not merely be a settlement, it is to be a living monument to National Socialist ideals: a harmonious place where labor and life serve the unity of Volk and Führer. In time, it will grow beyond factories and barracks into a proud German city of its own."
 CityEvents_GER.1.A: "A city worthy of the German worker!"
 CityEvents_GER.1_tt: "§YStadt des KdF-Wagens§! is founded."

### CAPTURE EVENTS
# This category contains pure flavor events that trigger upon the control of a specific province or state in a war. Not limited to cities but will mostly relate to cities.

 CaptureEvents.zoom: "Where?" # Generic event option that goes to the captured location

### United States
 CaptureEvents_USA.2.t: "Raising the Flag on Iwo Jima"
 CaptureEvents_USA.2.d: "[FROM.GetNewsIcon]In a defining moment of the Pacific War, American forces have completed Operation Detachment, the invasion of Iwo Jima, under the command of Lieutenant General Holland M. \"Howlin' Mad\" Smith, overcoming fierce Japanese resistance to secure the island after weeks of brutal combat. For over a month, U.S. Marines and naval units waged a relentless assault against deeply entrenched Japanese defenders who resisted to the last man. The island's volcanic terrain, riddled with tunnels, bunkers, and hidden artillery positions, made every advance a costly struggle.\n\nAfter weeks of brutal combat and heavy bombardment, American troops secured Mount Suribachi, where the raising of the Stars and Stripes has become an enduring symbol of courage and sacrifice. The victory came at a staggering price: thousands perished as Japanese troops fought with fanatical resolve, choosing death over surrender and defending every inch of ground until the last.\n\nThe fall of Iwo Jima gives the United States a crucial forward base in the western Pacific. Its airfields now allow American bombers and fighters to launch direct strikes against Japan's industrial centers and to provide emergency landing grounds for returning crews. Strategically, the capture of Iwo Jima brings the Pacific campaign into its final, decisive phase, one that will carry the war to the very doorstep of the Japanese homeland."
 CaptureEvents_USA.2.A: "Next stop: The Home Isles."
 CaptureEvents_USA.2.B: "One small island does not bring victory."
 CaptureEvents_USA.2.C: "Another domino falls."

 CaptureEvents_USA.4.t: "Operation Iceberg Successful; U.S Tenth Army Takes Okinawa"
 CaptureEvents_USA.4.d: "[FROM.GetNewsIcon]After weeks of relentless fighting, American forces have secured control over Okinawa, one of the last major Japanese strongholds in the Ryukyu Islands. U.S. troops landed under heavy artillery and machine-gun fire, pushing inland through fortified positions, cave networks, and entrenched defensive lines. Japanese forces fought with determination to the last man, while kamikaze pilots inflicted severe losses on Allied ships offshore. The civilian population, caught in the crossfire, suffered devastating casualties, leaving the island scarred by the intensity of the struggle.\n\nOkinawa's capture gives the Allies an essential staging ground for the next phase of the war against Japan. The island's ports allow the assembly of troops, equipment, and supplies for a potential invasion of Kyushu. The ferocity of Japanese resistance on Okinawa demonstrates that any landings on Japan itself will face entrenched defenders willing to fight to the death, suggesting extremely high casualties in future operations. Nevertheless, controlling Okinawa brings the Allies within striking distance of Japan, allowing them to intensify pressure on cities, industry, and supply lines, and making an eventual invasion of the home islands a concrete, achievable objective."
 CaptureEvents_USA.4.A: "Okinawa is ours, but the price was unimaginable."
 CaptureEvents_USA.4.B: "Our sons have fallen, yet the homeland remains unbroken."
 CaptureEvents_USA.4.C: "Japan's doorstep is exposed."

 CaptureEvents_USA.6.t: "U.S. Marines Storm Peleliu; High Casualties For Little Gain?"
 CaptureEvents_USA.6.d: "[FROM.GetNewsIcon]American troops have secured Peleliu, a secondary island in the Palau chain, after weeks of brutal combat against entrenched Japanese defenders. U.S. Marines landed under heavy fire and advanced through fortified positions, caves, and coral ridges, sustaining extremely high casualties in what has been described as one of the most grueling assaults in the Pacific campaign. Japanese troops resisted to the last, with nearly all defenders killed, while the small civilian population was caught in the crossfire and suffered greatly. \n\nThe battle has sparked controversy due to the island's limited strategic value relative to the enormous loss of life. Peleliu's airfield offers a forward base for operations in the Palau Islands and the Philippines, but many military analysts and journalists question whether the human cost was justified. The intensity of the fighting highlighted both the skill and desperation of Japanese defenders, and the challenges posed by well-fortified positions on small islands. Peleliu serves as a sobering example of the price of island-hopping, and a grim preview of the heavy resistance likely to be faced in the approach to Japan itself."
 CaptureEvents_USA.6.A: "Another hard-fought island secured."
 CaptureEvents_USA.6.B: "Even small islands are defended to the last."
 CaptureEvents_USA.6.C: "The Allies advance inch by bloody inch."

 CaptureEvents_USA.8.t: "Liberation of Manila"
 CaptureEvents_USA.8.d: "[FROM.GetNewsIcon]American and allied Filipino forces have liberated the Philippine capital of Manila from Japanese occupation. The operation, conducted under Lieutenant General Walter Krueger's Sixth Army as part of Operation Mike, saw U.S. troops and Filipino guerrillas face ferocious resistance from Japanese forces determined to defend the city to the last.\n\nThe collaborationist Second Philippine Republic saw its president, José P. Laurel, flee the city immediately towards Japan, leaving nominal authority in the hands of General Tomoyuki Yamashita. Yamashita ordered a withdrawal to avoid urban combat, but Admiral Sanji Iwabuchi, commanding naval and remaining ground units in Manila, refused to retreat, instead ordering urban resistance to the last man, resulting in widespread destruction of key infrastructure rather than allowing it to fall intact. Civilian casualties swelled enormously amidst the fighting, with widespread destruction across historic districts and government centers.\n\nThe liberation culminated in Admiral Iwabuchi, refusing to surrender, committing ritual suicide. President [PHI.GetLeader] and General Douglas MacArthur then dramatically reentered the city, fulfilling MacArthur's vow, \"I shall return\", and marking the formal restoration of the Philippine Commonwealth government and the reassertion of legitimate Filipino authority after years of Japanese occupation."
 CaptureEvents_USA.8.A: "Vengeance at last!"
 CaptureEvents_USA.8.B: "Back to square one, at worst."
 CaptureEvents_USA.8.C: "Those poor civilians..."

### Romania
 CaptureEvents_ROM.2.t: "Romania Retakes Bessarabia and Northern Bukovina!"
 CaptureEvents_ROM.2.d: "[FROM.GetNewsIcon]The Romanian Army has re-entered and secured control over Bessarabia and Northern Bukovina - territories that were ceded to the Soviet Union just a few years ago. The government in Bucharest has declared this a moment of national restoration, and celebrations have begun across Romania.\n\nBessarabia, lying between the Prut and Dniester rivers, had been part of Romania since the end of the First World War. Its population is largely Romanian-speaking, and many families on both sides of the Prut have long-standing ties. Northern Bukovina, though smaller, holds deep historical and cultural significance as part of the old Moldavian principality. The loss of these regions to the USSR had never been accepted by the Romanian public. When Soviet troops entered in 1940, it was under threat of national destruction, and that memory still stings for many in the country.\n\nNow, Romanian troops have pushed back across the Prut. Most of the fighting took place in scattered clashes along the border and Soviet rearguard actions, but the Romanian advance has been swift. In Chisinău, Romanian flags were raised without major resistance. Civilians greeted the troops with caution, but in many cases, with quiet support. These are also economically valuable, with good farmland and important rail lines. Their recovery is a step toward rebuilding national strength. Now, some wonder, if Romania will not look even further eastwards, towards Odessa and Ukraine."
 CaptureEvents_ROM.2.A: "This land is ours once again!"
 CaptureEvents_ROM.2.B: "A failure, but not a terrible one."
 CaptureEvents_ROM.2.C: "Will Romania continue past the Dniester?"

 CaptureEvents_ROM.4.t: "Romanian Troops Capture Odessa; Transnistria Governorate Established"
 CaptureEvents_ROM.4.d: "[FROM.GetNewsIcon]After intense fighting along the Black Sea coast, Romanian forces have seized Odessa. The strategic port city, a Soviet Navy stronghold, fell to the Axis after a determined campaign marked by stubborn resistance, high casualties, and brutal urban combat. Soviet defenders, aided by coastal artillery and hastily organized militias, resisted fiercely at every block, converting factories, apartment buildings, and sewer tunnels into fortifications. The port and naval base were particularly well-defended, requiring heavy bombardment and close-quarters fighting before being taken.\n\nRomanian forces suffered heavy losses, but the operation is being hailed in Bucharest as one of the army's most challenging and proudest achievements, as well as a step toward future advances beyond the Dniester. However, much of Odessa lies in ruins. Rail lines are destroyed, supply depots burned, and civilian infrastructure heavily damaged. The city's population, already reduced by evacuations and siege, faces an uncertain future under occupation.\n\nIn the aftermath, Romania has established the Transnistria Governorate, annexing the territory between the Dniester and Southern Bug rivers, with Odessa serving as its capital. Gheorghe Alexianu has been appointed governor, and Germany has acknowledged total Romanian authority over the region as a reward for their role in the campaign against the Soviet Union."
 CaptureEvents_ROM.4.A: "Odesa este româncă!"
 CaptureEvents_ROM.4.B: "The fascists have stolen our port!"
 CaptureEvents_ROM.4.C: "Will the locals put up with this?"

### Faction - Allies
 CaptureEvents_Allies.2.t: "Allied Victory at Monte Cassino!"
 CaptureEvents_Allies.2.d: "[FROM.GetNewsIcon]After intense fighting, the Allied forces have finally penetrated the Axis defensive lines at Monte Cassino. Perched high above the Liri Valley, the Benedictine monastery, now reduced to rubble by shelling and bombing, was the cornerstone of the German Gustav Line and the key to unlocking the road to Rome. The battle was long and bitter, spanning four assaults and resulting in many casualties. Soldiers from all over the world banded together for a common goal: to defeat fascism. They fought uphill under fire and stormed the abbey with incredible determination.\n\nAmong the artillery units was an unlikely comrade: Wojtek, a Syrian brown bear. Wojtek, an enlisted corporal, carried artillery shells to front-line guns, unconcerned about the sounds of war around him and reportedly roaring with delight as the guns fired. The Allies are now pushing deeper into Italy, while Axis forces retreat to new defensive positions on the peninsula. The conflict in that theatre may not be over yet, but it appears to be moving closer to an allied victory. "
 CaptureEvents_Allies.2.A: "Onto Rome, brothers!"
 CaptureEvents_Allies.2.B: "Only a temporary setback."
 CaptureEvents_Allies.2.C: "A new phase of the Italian theater..."

 CaptureEvents_Allies.4.t: "Battle of Castle Itter; Wehrmacht Turns on SS"
 CaptureEvents_Allies.4.d: "[FROM.GetNewsIcon]Allied forces, joined by surrendered German Wehrmacht troops under the command of Major Josef \"Sepp\" Gangl, have successfully secured Castle Itter in the Austrian Alps. The castle, used as a prison for prominent French detainees, was under threat from desperate SS units determined to prevent the prisoners' liberation.\n\nIn a remarkable and unprecedented alliance, Wehrmacht soldiers sided with the Allies to defend the castle against SS attacks. The defenders, including Allied troops, Major Gangl's Wehrmacht unit, Austrian resistance fighters, and the castle's inmates, utilized the fortress's medieval walls, towers, and narrow courtyards to repel repeated assaults. Despite being heavily outnumbered, this combined force held the castle, preventing the SS from recapturing the prisoners.\n\nThe victory at Castle Itter carries significant tactical and symbolic implications. Strategically, it demonstrates that some Wehrmacht units can and are willing to break from SS control when faced with moral and practical choices, highlighting fractures within the German military. Symbolically, the battle has become an extraordinary example of cooperation between former enemies - Allied troops, Wehrmacht soldiers, and French prisoners fighting side by side against the Waffen-SS."
 CaptureEvents_Allies.4.A: "The Krauts are turning on each other!"
 CaptureEvents_Allies.4.B: "A treacherous enemy from within!"
 CaptureEvents_Allies.4.C: "A historic alliance indeed."

 CaptureEvents_Allies.6.t: "Liberation of Rome"
 CaptureEvents_Allies.6.d: "[FROM.GetNewsIcon]After months of relentless advance up the Italian peninsula, Allied forces have triumphantly entered Rome. The Eternal City, long under Fascist domination, now welcomes liberation as the tricolor flies once again above the ruins and monuments of the ancient capital. Civilians poured into the streets to greet the Allied columns, cheering the soldiers who brought an end to nearly two decades of dictatorship.\n\nWith Rome freed, the pro-Allied Italian government under King Victor Emmanuel III and Prime Minister [ITA.GetLeader] has triumphantly returned to the national capital. From the Quirinal Palace, the government announced its intention to cede power to a democratic civilian administration led by Ivanoe Bonomi, signaling the rebirth of constitutional rule and national reconciliation.\n\nFor Mussolini's puppet regime, the so-called Italian Social Republic (RSI) in the north, the news is disastrous. Its claims to legitimacy have been shattered, its authority reduced to a handful of northern provinces under German protection. Even as the Allies prepare to push toward Florence and the Po Valley, the fall of Rome marks an unmistakable turning point: Fascism in Italy is in its death throes, and the road to liberation lies open."
 CaptureEvents_Allies.6.A: "The true government returns!"
 CaptureEvents_Allies.6.B: "Mussolini's days are numbered."
 CaptureEvents_Allies.6.C: "Time for a glorious counterattack!"
 CaptureEvents_Allies.6.D: "Powerful images!"

 CaptureEvents_Allies.7.t: "Mussolini Executed by Partisans, Northern Italy Liberated"
 CaptureEvents_Allies.7.d: "[FROM.GetNewsIcon]\"Il Duce\" Benito Mussolini, the former Fascist dictator of Italy, has been captured and executed near Lake Como by Italian partisans under the command of Walter Audisio, known as \"Colonel Valerio.\" Those traveling with him included his mistress, Clara Petacci, and Party Secretary Alessandro Pavolini as they attempted to flee north into Switzerland. Mussolini and Petacci were quickly captured and executed at Dongo, as Pavolini briefly escaped by swimming across the lake, only to be cornered and killed in Mexican standoff with pursuing partisans after running out of bullets. All of the bodies were taken to Milan, where they were hanged in Piazzale Loreto, the same square where Fascists once displayed slain partisans.\n\nAcross northern Italy, towns and cities once under the Italian Social Republic (RSI) are surrendering to a combination of partisan militias and Allied troops. Civilians are emerging from hiding, witnessing the rapid collapse of a regime that has gripped their nation for nearly two decades. Resistance fighters are securing infrastructure and restoring order, handing control to the pro-Allied government of [ITA.GetLeader].\n\nStrategically and symbolically, the fall of the RSI secures a final victory for the Allies and the Italian resistance, decisively concluding the Italian campaign."
 CaptureEvents_Allies.7.A: "Serves him right!"
 CaptureEvents_Allies.7.B: "[ROOT.GetLeader] must never suffer such a fate!"
 CaptureEvents_Allies.7.C: "Gruesome!"
 CaptureEvents_Allies.7.tt: "[ITA.GetFlag]§YBenito Mussolini§! gets a brand new portrait."

 CaptureEvents_Allies.9.t: "Operation Cowboy"
 CaptureEvents_Allies.9.d: "[FROM.GetNewsIcon]In what may be the oddest engagement of the war so far, American troops and German soldiers joined forces yesterday in a daring operation to secure Hostau, a stud farm in Czechoslovakia, and rescue the prized Lipizzaner stallions kept there. While most battles involve tanks, artillery, and strategic towns, this one prominently featured… horses.\n\nElements of the U.S. 42nd Cavalry Reconnaissance Squadron arrived at the farm from the west, finding the Wehrmacht already defending the farm against a determined Waffen-SS force. Locals reportedly did double takes as American jeeps and German halftracks rolled side by side, bullets whizzing overhead.\n\nThe mission's objective: prevent the Waffen-SS from harming the Lipizzaner stallions, and ensure the horses did not fall into Soviet hands as Red Army forces advance into Czechoslovakia from the east. After brief firefights and some clever maneuvering, the combined forces successfully secured the horses and evacuated them to Western Allied lines, along with a number of prisoners caught in the skirmish.\n\nObservers described the surreal sight of American and Wehrmacht soldiers working together to herd horses under fire. One U.S. sergeant dryly noted: “\"I've seen a lot in this war, but never a cavalry operation quite like this\""
 CaptureEvents_Allies.9.A: "Hooves and guns, and everyone's still \"neigh\"-borly."

### Italy
 CaptureEvents_ITA.2.t: "Italy Captures Malta In Air-Sea Assault"
 CaptureEvents_ITA.2.t2: "Axis Forces Capture Malta In Air-Sea Assault"
 CaptureEvents_ITA.2.d: "[FROM.GetNewsIcon]Italian forces have achieved a stunning victory in the Mediterranean, seizing the British fortress-island of Malta after a bold and meticulously coordinated invasion. Following weeks of relentless air raids by the Regia Aeronautica that shattered the island's defenses, Italian paratroopers and marines stormed ashore under heavy fire, securing key landing sites and pressing inland toward Valletta. After days of intense urban fighting and the collapse of British supply lines, the Union Jack was lowered over the Grand Harbour as Italian troops raised the tricolor above the ancient bastions.\n\nThe Regia Marina's naval superiority proved decisive, repelling Royal Navy counterattacks and ensuring the safe landing of reinforcements. Rome has declared Malta an integral part of Italian territory, citing cultural and geographic ties and its strategic importance to the nation's control of the central Mediterranean. The island is to be reorganized under Italian administration as a new province, fulfilling long-standing national claims and marking a decisive step toward Mussolini's vision of Mare Nostrum - \"Our Sea\". The victory reshapes the balance of power in the Mediterranean, isolating British positions in North Africa and bolstering Italian prestige at home and abroad."
 CaptureEvents_ITA.2.d2: "[FROM.GetNewsIcon]In a dramatic reversal in the central Mediterranean, combined Italian and German forces have seized the British island fortress of Malta after a coordinated air-sea invasion. Preceded by days of devastating aerial bombardment that knocked out key radar sites and airfields, Italian amphibious elements, supported by fast attack craft and Regia Marina gunfire, landed troops in multiple bays while German airborne units dropped to secure high ground and the island's principal airfields. British garrisons and local defenders fought fiercely from fortified harbors and narrow streets, but sustained bombardment, disrupted supply lines, and mounting casualties forced Lt. Gen. Sir William Dobbie to surrender in Valletta.\n\n[ITA.GetLeader] has announced that the \"Province of Malta\" will be annexed directly into [ITA.GetNameDef], citing centuries of shared history, linguistic and cultural connections, and existing territorial claims. With Malta under Axis control, the balance of power in the central Mediterranean has shifted: Axis forces now threaten Allied convoy routes to North Africa and the Suez Canal, imperilling logistics and air cover that have sustained Allied operations in the region."
 CaptureEvents_ITA.2.A: "Allied convoys now at grave risk!"
 CaptureEvents_ITA.2.B: "Hold the sea lanes at all costs!"

### Germany
 CaptureEvents_GER.2.t: "Fall of Minsk!"
 CaptureEvents_GER.2.d: "[FROM.GetNewsIcon]Minsk has been captured by German forces following a rapid and devastating offensive through Byelorussia. The city's fall marks one of the most significant Axis gains on the Eastern Front thus far, with Wehrmacht and SS units breaking through Soviet defensive lines west of the city, forcing a retreat.\n\nMinsk, the capital of the Byelorussian SSR and a critical hub for railway transport and communication, had served as a key Soviet logistics point in the region, with its railyards, power plants, and command posts now under German control. Fighting erupted in the suburbs and near bridges over the Svislach River, but defenders were unable to hold. The fall of the city will undoubtedly worsen the Red Army's supply situation in Byelorussia and deal a devastating blow to Soviet morale.\n\nThe city's future is no longer certain. The Germans have declared martial law in the city, but a civilian administration is expected to emerge in the coming months as the Germans seek to reorganise their captured territories and recruit local collaborators. Particular concern has arisen for the city's large Jewish population, which is now vulnerable to the Nazis' anti-semitic policies and unable to flee the region. "
 CaptureEvents_GER.2.A: "All of Byelorussia will be ours!"
 CaptureEvents_GER.2.B: "Only a temporary setback!"
 CaptureEvents_GER.2.C: "It is likely that grim times await the city..."

 CaptureEvents_GER.4.t: "Fall of Leningrad!"
 CaptureEvents_GER.4.d: "[FROM.GetNewsIcon]After a gruelling siege, German forces have finally captured Leningrad. The city, once the proud cradle of the October Revolution, has been battered by continuous artillery bombardment, air raids, and starvation. The German Army has now entered the city centre, raising the swastika over the shattered remains of once-grand boulevards and government buildings. Street fighting erupted in the final days as the Red Army launched a desperate defence, with workers and militia units joining the fray. Entire districts were reduced to ashes as German troops pushed deeper into the urban ruins, encountering stubborn resistance even from civilians. However, cut off, exhausted, and outgunned, Soviet forces were eventually forced to withdraw or surrender. \n\nThe city's industrial and port infrastructure lies in ruins and the Führer has no plans for reconstruction; Leningrad is to be wiped from the map. The capture of the city extends German control over the Baltic Sea and leaves the Soviet Baltic Fleet with few options after losing its main naval base. Meanwhile, cultural scars are already visible. The Hermitage Museum has been looted, its halls shattered by explosions, and valuable artefacts have already been carted off to Germany; meanwhile, the Smolny Institute and other revolutionary landmarks are in ruins. The once-vibrant Neva River now flows past bombed-out bridges, choked with corpses."
 CaptureEvents_GER.4.A: "Now the Baltic is truly ours!"
 CaptureEvents_GER.4.B: "The fascists will be kicked out of our home!"
 CaptureEvents_GER.4.C: "And another blow is stricken to the Bolsheviks..."

 CaptureEvents_GER.6.t: "German Troops Land in Britain!"
 CaptureEvents_GER.6.d: "[FROM.GetNewsIcon]An event previously thought unthinkable has become a grim reality: German forces have landed on British soil. Precise details are still scarce, but reports indicate that German infantry landings are taking place in the British Isles. Communications from England have gone dark in some areas, and chaotic scenes are said to be unfolding along major transport routes. The BBC has confirmed enemy activity on home soil, and government spokespeople have urged calm, despite the severity of the situation.\n\nThe German High Command has not made a formal announcement, but several intercepted transmissions indicate that Operation Sea Lion, the long-feared invasion of the British Isles, has begun. Sightings of heavy equipment transports suggest that this is not a one-off raid, but the start of a major offensive. Churchill's government has vowed to fight to the last man, but many question Britain's ability to repel such an invasion. Church bells in Berlin reportedly rang as state radio hinted at a historic moment in the struggle for Europe. In Washington, officials have called an emergency meeting to assess the deteriorating situation.\n\nThe war has entered a new chapter, more terrifying than the last. And it is here that the fate of Europe will be decided: whether the British Lion will stand firm against the enemy or crumble in the face of the Nazi war machine, as all others have before it."
 CaptureEvents_GER.6.A: "We must triumph here, or perish."
 CaptureEvents_GER.6.B: "We shall fight on the beaches and on the landing grounds."
 CaptureEvents_GER.6.C: "Will Britain hold against the Nazi juggernaut?"

 CaptureEvents_GER.8.t: "The Battle of Stalingrad Begins"
 CaptureEvents_GER.8.d: "[FROM.GetNewsIcon]After weeks of preparation, German forces, backed by allies, have launched an assault on Stalingrad, pushing into the city's industrial outskirts and encountering fierce Soviet resistance. Stalingrad, located along the Volga River, is both a major transportation hub and a centre of Soviet industry.  Control of Stalingrad would enable Germany to cut Soviet supply lines along the Volga and secure the northern flank of their southern advance into the Caucasus. But the city also has symbolic value: it bears the name of the Soviet leader, and its fall would be a major morale blow to the Soviet war effort, as well as a propaganda victory for Germany.\n\nGerman bombers have devastated much of the city, reducing neighbourhoods and industrial zones to rubble. However, the destruction has made the defenders' task easier. Soviet troops have dug in among the rubble, transforming every street, basement, and stairwell into a battlefield. The city's major factories, including the Red October and Tractor Factories, as well as the Univermag department store, have all been heavily fortified. Reinforcements continue to arrive, frequently ferried across the Volga while under constant fire. According to reports, many Soviet units have been instructed not to retreat under any circumstances. "
 CaptureEvents_GER.8.A: "We will will wipe it off the Earth if we have to!"
 CaptureEvents_GER.8.B: "The city bearing Stalin's name shall never fall!"
 CaptureEvents_GER.8.C: "All eyes turn to Stalingrad."

 CaptureEvents_GER.10.t: "Fall of Moscow"
 CaptureEvents_GER.10.d: "[FROM.GetNewsIcon]After weeks of brutal fighting on the outskirts and within the city, German forces have taken control of the Soviet capital. Despite fierce resistance, the Wehrmacht and Waffen-SS advanced through entrenched Red Army positions, aided by Panzer divisions and artillery. Street-by-street battles raged throughout the suburbs, reducing entire blocks to rubble due to bombardment and close-quarter fighting.\n\nThe Soviets fought fiercely to keep the city, converting every alley and rooftop into defensive positions. However, overstretched supply lines, mounting casualties, and the collapse of defences following the German breakthrough necessitated an eventual fighting withdrawal. The Soviet government and key Party figures, including Stalin, were reportedly evacuated eastward just days before the final German breakthrough. Lenin's embalmed body was also removed from his mausoleum in a hasty and heavily guarded operation.\n\nClose-quarters fighting, artillery shelling, and aerial bombardment have all caused damage to the city's historic sites, most notably the Kremlin and Lenin's Mausoleum. Following that, a triumphant parade was held on Red Square. The fall of Moscow dealt a severe blow to Soviet morale. While the Soviet leadership promises to continue the war from the east, the loss of their capital is an event that the world will not forget."
 CaptureEvents_GER.10.A: "Now onto the Urals!"
 CaptureEvents_GER.10.B: "Like Tsar Alexander was forced to abandon the city, so were we."
 CaptureEvents_GER.10.C: "The end of the USSR seems to be drawing near..."

 CaptureEvents_GER.12.t: "Fall of Kiev"
 CaptureEvents_GER.12.d: "[FROM.GetNewsIcon]Kiev, one of Eastern Europe's oldest and most culturally significant cities, has fallen under German control. After weeks of brutal fighting along the Dnieper and surrounding regions, Axis forces penetrated Soviet defences and entered the city, encountering sporadic resistance amid shattered neighbourhoods and smouldering ruins.\n\nKiev, once the heart of Kievan Rus' with centuries-old monasteries, cathedrals, and historic buildings, has been devastated. Much of the destruction was caused not only by artillery and air strikes, but also by Soviet demolition teams, which destroyed bridges, rail yards, and key government buildings as they evacuated. Entire districts were engulfed in flames, and the once-iconic skyline of domes and spires is now obscured by rubble and smoke.\n\nThe international community also doubts that Germany will make serious efforts to rebuild the shattered city, with the exception of military installations that may serve the Wehrmacht as housing and logistics facilities. German troops advancing through the city report damage to historic sites such as the Saint Sophia Cathedral, as well as ruins along the Khreshchatyk Avenue. Civilian casualties are unknown, but are expected to be high given the scale of destruction and chaos."
 CaptureEvents_GER.12.A: "We have freed the Ukrainian capital!"
 CaptureEvents_GER.12.B: "Yet another city awaits liberation..."
 CaptureEvents_GER.12.C: "And just what do the Germans intend to do next?"

 CaptureEvents_GER.14.t: "Fall of Sevastopol"
 CaptureEvents_GER.14.d: "[FROM.GetNewsIcon]Following a protracted siege and bloody street fighting, advancing German and Axis troops captured the port city of Sevastopol on the Crimean peninsula. Sevastopol was one of the Soviet Union's most heavily fortified positions, with deep bunkers, coastal batteries, and natural defences built to withstand any siege. However, they were insufficient to halt the advancing Wehrmacht.\n\nSome Soviet troops managed to flee the doomed city, but the vast majority were killed in the fighting or captured by the Wehrmacht and are now at the mercy of the Germans in POW camps. The capture of the city also gives Germany and its allies an important port on the Black Sea, reducing Soviet naval presence. Following the city's capture, a temporary military occupational administration was established, and plans were announced to rename it \"Theoderichshafen\" in honour of the 5th-century Germanic King Theodoric.\n\nGerman engineers are reportedly already rebuilding critical infrastructure to support military logistics, as well as building barracks for occupying Axis troops to stay and rest in. Meanwhile, remaining Soviet symbols and monuments are being demolished and destroyed. Sevastopol lies in ruins, but the German war machines march on."
 CaptureEvents_GER.14.A: "It will be transformed into a true Aryan colony!"
 CaptureEvents_GER.14.B: "The red flag will fly over the city once again!"
 CaptureEvents_GER.14.C: "And the Germans continue on..."

 CaptureEvents_GER.16.t: "Wehrmacht Announces Full Control of Warsaw"
 CaptureEvents_GER.16.d: "[FROM.GetNewsIcon]After weeks of relentless assault, the German Wehrmacht has captured Warsaw, bringing the Polish capital under complete occupation. Following days of heavy artillery bombardment and continuous air raids, the city's defenders, exhausted and surrounded, surrendered yesterday, ending organized resistance in the city. Reports indicate that the destruction was severe: public buildings lie in ruins, streets are littered with debris, and fires still smolder in some districts.\n\nEyewitnesses describe scenes of chaos and fear as thousands of civilians fled the city or sought shelter in crumbling structures. Hospitals overflowed with the wounded, while emergency services struggled to cope amid the constant threat of bombing. German troops have now established checkpoints, imposed curfews, and begun patrolling the city streets, securing key governmental and military facilities.\n\nIn the city center, defenders attempted to hold the Western Citadel and the Saxon Palace, but repeated infantry assaults and coordinated Luftwaffe strikes forced capitulation. Accounts tell of Polish artillery crews continuing to fire even as buildings around them collapsed, and of civilians forming makeshift barricades to delay German advances. By evening, the last organized resistance had dissolved, leaving Warsaw under full German control, scarred by weeks of relentless urban combat."
 CaptureEvents_GER.16.A: "A decisive victory for the Reich!"
 CaptureEvents_GER.16.B: "A valiant defense!"
 CaptureEvents_GER.16.C: "Poland cannot hold on much longer..."

### Japan
 CaptureEvents_JAP.2.t: "Fall of Hawaii!"
 CaptureEvents_JAP.2.d: "[FROM.GetNewsIcon]Following a well-placed naval invasion, accompanied by naval and air support that dwarfed the attack on Pearl Harbor, jubilant Japanese troops marched through Honolulu, the capital of the U.S territory of Hawaii. American military divisions were either destroyed, forced to surrender, or forced to flee back to the mainland U.S. With Hawaii now occupied, Japanese troops have already been seen touring various monuments and natural wonders in and around the city, including Iolani Palace and Waikiki Beach, seemingly unconcerned about any counterattacks.\n\nNative Hawaiian reactions to the occupation have been mixed, with some lamenting the new military occupation and others hoping that it will spark a movement to reclaim Hawaii's independence, which it lost in the 1890s. The loss of Hawaii will cripple the American war effort in the Pacific due to its strategic importance. Some argue that it could even open up America's west coast to future naval invasions."
 CaptureEvents_JAP.2.A: "The Pacific is ours."
 CaptureEvents_JAP.2.B: "A dark day in the Pacific."
 CaptureEvents_JAP.2.C: "America bleeds."

 CaptureEvents_JAP.4.t: "Capture of Rangoon"
 CaptureEvents_JAP.4.d: "[FROM.GetNewsIcon]The city of Rangoon has fallen to Japanese troops, bringing all of Burma effectively under Japanese control. This development marks a major shift in the Pacific theatre, both strategically and economically. Rangoon had served as the main base of Allied military operations in Southeast Asia and represented a key line of defense for British India. Its loss opens a direct path toward the Indian subcontinent.\n\nEqually significant is Japan's control of the Burma Road, previously a critical Allied supply route to China. The seizure of this corridor is likely to hinder aid to Chinese forces resisting Japanese advances. Economically, the occupation of Burma delivers a major blow to the Allies: the country's rubber plantations, now under Axis control, are an essential source of a resource urgently needed by both British and American war industries.\n\nJapan has announced plans to establish an \"independent\" Burmese state under the leadership of Ba Maw, a Burmese nationalist politician. However, international observers suggest that this new administration will remain closely aligned with Japanese interests. A locally recruited force, the Burmese Independence Army, has also been formed with Japanese backing, and some of its units have already begun operating alongside Japanese divisions."
 CaptureEvents_JAP.4.A: "Onwards, to India!"
 CaptureEvents_JAP.4.B: "We must rally every resource. India cannot fall."
 CaptureEvents_JAP.4.C: "Asia trembles as the balance shifts."

 CaptureEvents_JAP.6.t: "Fall of Nanjing"
 CaptureEvents_JAP.6.d: "[FROM.GetNewsIcon]The city of Nanjing, once the proud capital of the Republic of China, has fallen to advancing Japanese troops after a swift and relentless campaign through the lower Yangtze valley. Following months of fierce fighting, Japanese forces under General Iwane Matsui and Crown Prince Yasuhiko Asaka broke through the last Chinese defensive lines and entered the city.\n\nChinese forces under General Tang Shengzhi, already weakened by successive defeats, could not stem the Japanese advance. Tang reportedly fled across the Yangtze River a day before the fall, leaving behind disorganized troops and desperate civilians. Generalissimo [CHI.GetLeader] has withdrawn his government to the interior stronghold of Wuhan, pledging to carry on the resistance until China's full liberation.\n\nControl of the capital grants Tokyo a vital foothold in central China and a potent symbol of dominance over the Nationalist regime. Reports from within the city indicate that Japanese authorities have begun to establish an administrative apparatus to manage local affairs and restore public order, with the stated aim of creating a new \"peaceful and cooperative\" governance under Japanese supervision.\n\nDespite official assurances, unease lingers among the civilian population, and foreign observers warn of the potential for harsh reprisals and abuses as the occupation takes hold."
 CaptureEvents_JAP.6.A: "We have not even begun to fight!"
 CaptureEvents_JAP.6.B: "Banzai!"
 CaptureEvents_JAP.6.C: "A blow to the Nationalist cause."

 CaptureEvents_JAP.8.t: "Capture of Wuhan; Major Japanese Victory"
 CaptureEvents_JAP.8.d: "[FROM.GetNewsIcon]Advancing Japanese forces have captured Wuhan, a vital Chinese stronghold and logistics hub known as the \"gateway to Central China\" due to its strategic location at the confluence of the Yangtze and Han rivers. The battle for the city was marred by fierce street clashes between the IJA and defenders from China's National Revolutionary Army, and much of the city is now destroyed as a result of fierce house-to-house combat, shelling, and extensive bombing by Japanese aircraft. Civilian casualties are said to be high, particularly due to the alleged use of chemical weapons by Japanese troops.\n\nThe fall of the city exposes China's central regions to Japanese offensives, jeopardises the NRA's supply lines in the region, and deals a critical morale blow to the Chinese resistance, as the city had served as a stronghold against the Japanese for many months prior to its fall. Japanese troops are expected to capitalise on their victory in the city and continue their advance, moving deeper into China's central heartland and westward towards Chongqing."
 CaptureEvents_JAP.8.A: "Only a temporary loss!"
 CaptureEvents_JAP.8.B: "Resistance is futile!"
 CaptureEvents_JAP.8.C: "Worrying."

 CaptureEvents_JAP.10.t: "Wake Island Falls to Swift Japanese Assault"
 CaptureEvents_JAP.10.d: "[FROM.GetNewsIcon]Japanese forces have overrun Wake Island after fierce fighting with the American garrison. Despite determined resistance from the defenders, including coordinated air and coastal artillery strikes, the overwhelming strength of Japanese naval and amphibious forces ultimately proved decisive. The battle saw intense exchanges both on land and at sea, with defenders inflicting notable losses before being forced to surrender.\n\nThe capture of Wake Island provides Japan with a critical forward outpost in the Central Pacific, enhancing its defensive perimeter and serving as a staging point for further operations. Strategically, Wake strengthens Japan's position in the ongoing advance toward Midway and even Hawaii itself. While the defenders fought with tenacity and inflicted damage disproportionate to their numbers, the island's fall marks another extension of Japan's reach across the Pacific. Analysts note that the swift assault highlights both the vulnerability of isolated garrisons and the effectiveness of concentrated naval-air power in expanding Japan's operational boundaries."
 CaptureEvents_JAP.10.A: "A valuable outpost secured."
 CaptureEvents_JAP.10.B: "Wake is gone… so many lives lost!"
 CaptureEvents_JAP.10.C: "Is Midway next?"

 CaptureEvents_JAP.12.t: "Open City Manila Falls to Japanese Forces"
 CaptureEvents_JAP.12.d: "[FROM.GetNewsIcon]Japanese forces have entered Manila following the orderly withdrawal of American and Philippine defenders after the city was declared an open city. The streets, largely spared from bombardment, witnessed only minor skirmishes as retreating forces delayed the advance at key approaches. Civilians watched anxiously as the Japanese flag was raised over government buildings, military depots, and transport hubs, signaling the swift extension of Japan's influence into the heart of the archipelago. The occupation provides Japan with a central stronghold, securing vital ports and road networks, and projecting power across Luzon and the surrounding islands.\n\nThough the defenders avoided catastrophic losses within the city, the fall of Manila underscores the vulnerability of even the largest urban centers to rapid maneuver and psychological pressure. For the United States, the loss of Manila represents a major blow to its strategic position in the Pacific, weakening its foothold in the Philippines and limiting options for defending Southeast Asia against Japan's growing reach. Observers note that while Manila's capture lacked the carnage of a drawn-out battle, it carries immense symbolic weight, marking a decisive step in Japan's expansion throughout the region."
 CaptureEvents_JAP.12.A: "The Rising Sun shines ever brighter."
 CaptureEvents_JAP.12.B: "We will return stronger than ever."
 CaptureEvents_JAP.12.C: "The Allies' hold on the Pacific looks shakier by the day."

 CaptureEvents_JAP.14.t: "Attu and Kiska Fall; Japan Opens Front in Alaska"
 CaptureEvents_JAP.14.d: "[FROM.GetNewsIcon]Japanese forces have seized the Aleutian islands of Attu and Kiska, marking one of the first losses of United States territory in the Pacific War. The operation unfolded under the veil of the region's notorious fog and relentless winds, allowing a fleet of destroyers and transport vessels to approach the remote outposts with little warning. Upon landing, Japanese infantry encountered only a skeletal American detachment tasked with weather observation and minimal coastal defense; the defenders, lacking substantial fortifications and supplies, withdrew into the interior, offering only brief skirmishes before surrendering the key harbors and settlements.\n\nControl of Attu and Kiska grants Japan a tactical foothold at the edge of the Aleutian Islands. The islands enable the Imperial Navy to engage Allied shipping lanes that thread through the northern Pacific, extending their defensive perimeter and creating a latent threat to the western coast of the United States. Moreover, the psychological impact of occupying U.S. soil cannot be overstated; the capture serves as a potent propaganda victory, demonstrating Japan's ability to project power far beyond its traditional sphere and forcing Washington to divert naval and air assets to a new, distant front."
 CaptureEvents_JAP.14.A: "The enemy dares to set foot on our soil?"
 CaptureEvents_JAP.14.B: "Our reach knows no bounds."
 CaptureEvents_JAP.14.C: "Japanese in the Arctic? Now, that's new."

 CaptureEvents_JAP.16.t: "The Fall of Jinan; Han Fuju Executed!"
 CaptureEvents_JAP.16.d: "[FROM.GetNewsIcon]Grim news arrives from northern China: the important city of Jinan, capital of Shandong, has fallen to advancing Japanese forces after only brief resistance. Despite promises to hold the line, the city's defenses crumbled almost immediately as provincial commander Han Fuju abandoned his troops and fled south without orders.\n\nHan, once a trusted subordinate of Feng Yuxiang and later military governor of Shandong, had ruled the province since 1930, earning nicknames such as \"Han the Pacifier\" for restoring order and \"Han the Bandit\" for his heavy-handed tactics. Under his rule, the Shandong Clique became known for strict discipline, suppression of banditry, and a measure of stability rare in warlord-era China.\n\nThe sudden collapse of Jinan has enraged the Nationalist government of [CHI.GetLeader] in [CHI.Capital.GetName], which today court-martialed and executed Han Fuju, making an example of his failure.\n\nWith Han's death, the Shandong Clique is no more. Its remaining officers and men have been folded into the central army, ending the province's semi-autonomous rule. Meanwhile, swathes of Shandong now lie under Japanese occupation, a rapid loss that delivers a severe blow to morale and grants Tokyo a propaganda victory, demonstrating the fragility of China's regional defenses in the face of the advancing Imperial Army."
 CaptureEvents_JAP.16.A: "The traitor had it coming!"
 CaptureEvents_JAP.16.B: "They're turning on each other!"
 CaptureEvents_JAP.16.C: "The war in China intensifies."

 CaptureEvents_JAP.18.t: "The Fall of Singapore"
 CaptureEvents_JAP.18.d: "[FROM.GetNewsIcon]Japanese forces have captured Singapore after a swift and devastating campaign across the Malay Peninsula. Despite its reputation as an impregnable fortress, British and Commonwealth defenses crumbled under relentless air attacks, amphibious assaults, and encirclement from the north. Cut off from supplies and facing mounting civilian casualties, Lieutenant-General Arthur Percival surrendered the city and its garrison, marking one of the most significant defeats in British military history.\n\nThe fall of Singapore shatters Allied prestige in Asia. Once hailed as the \"Gibraltar of the East\", its loss exposes vast territories of Southeast Asia to Japanese advance and severs a key link in imperial defense. Tens of thousands of British, Indian, and Australian troops have been taken prisoner, while the city's docks, airfields, and naval facilities now serve the Japanese war machine.\n\nAcross the British Empire, the news reverberates as a symbol of imperial decline. For Japan, it stands as the crowning triumph of its southern offensive, a testament to planning, audacity, and the inexorable rise of its power in the Pacific."
 CaptureEvents_JAP.18.A: "A glorious victory against the imperialists!"
 CaptureEvents_JAP.18.B: "How could this happen??"
 CaptureEvents_JAP.18.C: "The Sun has set on the Empire."

 CaptureEvents_JAP.19.t: "Dutch East Indies Surrender to Japan"
 CaptureEvents_JAP.19.d: "[FROM.GetNewsIcon]Following a rapid and overwhelming campaign, Japanese forces have secured control over much of the Dutch East Indies. After weeks of fierce fighting across Java, Sumatra, and the surrounding islands, the exhausted and outnumbered defenders of the Koninklijk Nederlandsch-Indisch Leger (KNIL) have laid down their arms. The formal surrender was signed at Kalijati Airfield in western Java, where Dutch Lieutenant-General Hein ter Poorten capitulated to the Japanese command.\n\nGovernor-General [DEI.GetLeader] was taken prisoner along with his family and much of his staff, being placed in a POW camp in Bandoeng. In Australia, Lt. Gov Hubertus van Mook has assumed leadership of the Netherlands East Indies Government-in-Exile, pledging to continue the struggle alongside the Allies until the liberation of the islands.\n\nThe campaign has delivered to Japan one of the richest prizes in the Pacific: the oil fields of Sumatra and Borneo, the refineries of Balikpapan, and the vital ports that link Southeast Asia to the Indian Ocean. With these resources now flowing under Japanese control, the Empire has greatly strengthened its industrial and naval power."
 CaptureEvents_JAP.19.A: "One day, we shall return to Batavia."
 CaptureEvents_JAP.19.B: "The islands now feed the Co-Prosperity Sphere!"
 CaptureEvents_JAP.19.C: "When will these terrible times end?"
 CaptureEvents_JAP.19.D: "A decisive defeat of the Dutch."

 CaptureEvents_JAP.21.t: "Japanese Forces Overrun Guam"
 CaptureEvents_JAP.21.d: "[FROM.GetNewsIcon]Japanese forces have captured the American territory of Guam after a swift and coordinated offensive launched from their nearby bases on Saipan and Tinian. The attack, executed with remarkable speed and precision, opened with naval bombardments and aerial strikes that crippled communications and defensive positions before landing parties came ashore.\n\nThe small American garrison, consisting of Marines, naval personnel, and local Chamorro auxiliaries, mounted a spirited defense around Agana and Piti, but they were hopelessly outmatched. Within two days, Japanese forces assumed control of the island. The Stars and Stripes were lowered, replaced by the Rising Sun, as Japanese engineers and administrators begin fortifying the captured territory.\n\nThe fall of Guam completes Japan's control over the Mariana Islands, securing a vital chain of air and naval bases in the western Pacific.\n\nFor the United States, the consequences are grave. The fall of Guam not only eliminates a key forward outpost, but also severs the already precarious logistical route to the Philippines. In Washington, officials vow that the island will one day be retaken."
 CaptureEvents_JAP.21.A: "A foolish position from the beginning!"
 CaptureEvents_JAP.21.B: "They did their best..."
 CaptureEvents_JAP.21.C: "It was a highly vulnerable position."

 CaptureEvents_JAP.23.t: "Chinese Army Defeated in Shanghai"
 CaptureEvents_JAP.23.d: "[FROM.GetNewsIcon]After violent urban combat, Japanese forces have fully expelled Chinese Nationalist troops from Shanghai's Chinese-administered districts. Japanese units, present in portions of the city since the 1932 Shanghai Incident, leveraged these footholds to immediately assault Kuomintang-held districts following the formal outbreak of war.\n\nStreet fighting, which raged from Zhabei and Hongkou to the alleys of Nanshi and Luwan, left buildings collapsed, tram lines destroyed, and entire blocks reduced to rubble. Hospitals are reporting extreme numbers of civilian casualties, potentially up to six digits. Residents carry children and belongings through devastated neighborhoods, seeking refuge wherever possible.\n\nThe Shanghai International Settlement and French Concession are now surrounded by Japanese forces, but there are still no signs that they are preparing to the enter foreign-administered areas. Observers report an uneasy calm within the settlements.\n\nColonel Kanemitsu, speaking from the Japanese command post in Zhabei, announced that a provisional administration, soon to be formalized as the Great Way Government under Mayor Su Xiwen, is being established to assume control over municipal services."
 CaptureEvents_JAP.23.A: "The work of 1932 has finally been completed!"
 CaptureEvents_JAP.23.B: "A painful loss - but not a permanent one!"
 CaptureEvents_JAP.23.C: "A major urban area gained by the Japanese."

### Russia / USSR
 CaptureEvents_SOV.2.t: "Fall of Helsinki!"
 CaptureEvents_SOV.2.d: "[FROM.GetNewsIcon]The Finnish capital, Helsinki, has fallen to the Soviets following intense fighting on the city's outskirts and in its central districts. Despite fierce resistance from Finland, Soviet forces advanced steadily, breaking through defensive lines with heavy artillery and armour. By the time Soviet troops arrived in the city centre, Finnish forces were too exhausted and outnumbered to hold. As the Red Army took control of the city, a victory parade was quickly organised to demonstrate Soviet power and commemorate the \"liberation\" of Helsinki.\n\nMarshal Kliment Voroshilov stood proudly on a reviewing platform alongside Otto Wille Kuusinen, the Finnish communist leader who had been groomed to lead a new Soviet-backed government since the invasion began in Finland. Tanks and infantry columns rolled through Mannerheimintie, with soldiers raising red flags and waving to small, stunned crowds. As the Red Army cements its control and begins rounding up suspected opponents, the fate of Finland looks increasingly bleak."
 CaptureEvents_SOV.2.A: "The Finnish proletariat are freed from the White Terror!"
 CaptureEvents_SOV.2.B: "We shall bleed the Russians dry!"
 CaptureEvents_SOV.2.C: "It seems the Soviets dominate another nation."

 CaptureEvents_SOV.4.t: "Fall of Viipuri!"
 CaptureEvents_SOV.4.d: "[FROM.GetNewsIcon]The strategic city of Viipuri has fallen after fierce fighting, signalling a significant shift on the northern front. Viipuri, Finland's second-largest city, has long been a critical gateway to the Karelian Isthmus, and it is essentially the most fortified territory on the Isthmus after the Mannerheim Line.\n\nThe defenders, consisting of experienced Finnish troops and local militia, fought fiercely among the medieval walls, stone streets, and narrow alleys. For days, artillery shells and air strikes pounded the city, reducing much of it to rubble and forcing civilians to flee or seek refuge underground. During the bombardments, the city's old castle suffered significant damage. Despite their tenacious defence, Finnish lines eventually buckled under constant pressure. To avoid being encircled, troops were forced to withdraw, leaving a shattered city and a broken defence line.\n\nViipuri's fall is not only a major military setback, but also a significant blow to Finnish morale. The city has served as Finland's cultural and economic centre, and its loss clears the way for a Soviet advance beyond the Isthmus and deeper into Finland, particularly towards the capital, Helsinki. At the same time, it demonstrated Finnish resilience and resistance to the Soviet onslaught, with its fall putting an end to most people's hopes."
 CaptureEvents_SOV.4.A: "Now the road to Helsinki is open!"
 CaptureEvents_SOV.4.B: "Our Lion will fly over the city again!"
 CaptureEvents_SOV.4.C: "The end seems to be drawing near."

 CaptureEvents_SOV.6.t: "Königsberg Falls; East Prussia Folds to the Red Army"
 CaptureEvents_SOV.6.d: "[FROM.GetNewsIcon]The heavily fortified city of Königsberg has fallen after relentless fighting, marking a pivotal moment on the Eastern Front. Königsberg, the capital of East Prussia and a vital German stronghold, had long been considered nearly impregnable due to its extensive fortifications and strategic location.\n\nThe defenders, composed of Wehrmacht units, Volkssturm militias, and local civilians, resisted fiercely within the old city walls, historic streets, and heavy fortifications. For weeks, Soviet artillery, air strikes, and coordinated infantry assaults reduced much of the city to rubble, forcing countless civilians to seek shelter in bombed-out buildings and underground bunkers. The city's medieval castle and cathedral sustained severe damage during the bombardment. Despite their determined defense, German lines finally collapsed under constant pressure, with many units either killed or captured.\n\nKönigsberg's fall represents a major military defeat for Germany and a psychological blow to both the military and civilian population of East Prussia. The city had long been a cultural and administrative centre, and its capture by Soviet forces opened the path for further advances into German territory. At the same time, the fierce resistance demonstrated by the defenders underscored the desperation and resilience of those fighting to defend the city, with its surrender signaling the effective end of organized German resistance in the region."
 CaptureEvents_SOV.6.A: "Advance, comrades!"
 CaptureEvents_SOV.6.B: "The barbarians are flooding in!"
 CaptureEvents_SOV.6.C: "The damage to such a historic city is saddening."

 CaptureEvents_SOV.8.t: "Berlin Falls to Red Army"
 CaptureEvents_SOV.8.d: "[FROM.GetNewsIcon]The city of Berlin, the heart of the Third Reich, has fallen after weeks of brutal combat. Once envisioned by Hitler as the capital of a \"Thousand-Year Reich\", Berlin has now been reduced to ruins under the relentless assault of the Red Army.\n\nThe battle raged through shattered streets, government buildings, and the sprawling network of underground bunkers. A coalition of Wehrmacht remnants, SS fanatics, Volkssturm militias, and even Hitler Youth, organized as the \"Berlin Defence Area\", fought with desperate tenacity, turning every ruined block into a fortress. Soviet artillery barrages and air strikes leveled entire districts, while fierce house-to-house fighting engulfed the city. Civilians, trapped amidst the chaos, endured starvation, bombardment, and the terror of urban warfare.\n\nThe Reichstag, symbol of German power, became the final stage of the struggle as Soviet troops stormed its halls and raised their flag above its smoldering ruins. General Helmuth Weidling proceeded to order the surrender of all remaining German troops in the city. The Führer was nowhere to be found. The capture of the city marks not only a decisive military triumph for the USSR but also the symbolic destruction of Nazi Germany itself."
 CaptureEvents_SOV.8.A: "URAAAAAAA!"
 CaptureEvents_SOV.8.B: "The war is lost."
 CaptureEvents_SOV.8.C: "A powerful moment."

 CaptureEvents_SOV.10.t: "Siege of Budapest; Hungarian Capital Falls to Red Army"
 CaptureEvents_SOV.10.d: "[FROM.GetNewsIcon]After weeks of relentless siege, the city of Budapest has fallen to the advancing Red Army, marking a decisive blow against Axis forces in Hungary. The once-vibrant capital, straddling the Danube, had become a fortress city, heavily defended by Wehrmacht units, Hungarian army forces, and Arrow Cross militias.\n\nThe battle raged across the Buda hills and Pest streets, with Soviet artillery, air strikes, and coordinated infantry assaults systematically destroying fortified positions. Civilians endured starvation, bombardment, and the chaos of urban combat, seeking shelter in ruined buildings and the remnants of Budapest's historic underground tunnels. Iconic landmarks, including the Buda Castle and Chain Bridge, suffered extensive damage during the siege.\n\nDespite desperate German and Hungarian resistance, the city's defenders ultimately collapsed under the overwhelming Soviet onslaught. Budapest's fall represents a major strategic and psychological victory for the Red Army, opening the way for further advances into Central Europe and signaling the effective end of organized Axis resistance in Hungary."
 CaptureEvents_SOV.10.A: "A foolish choice to side with the Nazis!"
 CaptureEvents_SOV.10.B: "Our brave defenders fought to the last!"
 CaptureEvents_SOV.10.C: "So many historic buildings damaged.."

 CaptureEvents_SOV.12.t: "Fall of Vienna - Soviet Forces Pour into Austria"
 CaptureEvents_SOV.12.d: "[FROM.GetNewsIcon]Soviet infantry and tanks poured into Vienna yesterday, fighting block by block through shattered streets. Artillery shells tore through corner cafés; smoke curled from toppled roofs. Elements of the German 6th Panzer Division fired from cellars and rooflines, leaving streets strewn with debris and abandoned rifles.\n\nIn Mariahilfer Straße, soldiers ducked behind crushed trams while Red Army sappers pried at unexploded shells. A bakery smoldered as infantry crouched nearby, and a broken fountain spouted water over shattered cobblestones. Civilians huddled in basements, their ears ringing from continuous machine-gun fire, while stray cats darted past shattered statues.\n\nAt the Danube bridges, German demolitions left twisted railings and scorch marks, but Soviet armor pressed across despite sniper fire. In one square, conscripts firing from cellar windows surrendered only after their ammunition ran out. Every alley, courtyard, and staircase became a battleground, a maze of smoke, rubble, and fleeting human courage.\n\nBy nightfall, Vienna was confirmed to be under Red Army control. With the Austrian capital in Soviet hands, the road into the heart of Austria now lies open, leaving the Alpine Redoubt exposed to assault from the East."
 CaptureEvents_SOV.12.A: "It will be a glorious occupation zone."
 CaptureEvents_SOV.12.B: "Protect Austria at any cost!"
 CaptureEvents_SOV.12.C: "When will this war end..."

### Finland
 CaptureEvents_FIN.2.t: "Finland Captures Petrozavodsk; Military Government Established"
 CaptureEvents_FIN.2.d: "[FROM.GetNewsIcon]After weeks of heavy fighting along the Karelian Front, Finnish forces have entered Petrozavodsk, the capital of Soviet Karelia. The city, lying on the western shore of Lake Onega, had long been a strategic hub for Red Army logistics and industry. Its fall marks a significant achievement for the Finnish advance and a major setback for Soviet defenses in the region.\n\nThe capture came after determined assaults through dense forests and marshland, with Finnish troops encircling the city and forcing Soviet units into retreat. Petrozavodsk, heavily bombarded during the fighting, sustained extensive destruction, with its factories and neighborhoods scarred by artillery fire. Despite this, the Finnish flag now flies over the city's central square.\n\nThe loss of Petrozavodsk also severs the vital rail line linking central Russia with Murmansk, forcing the Soviet Union to reroute supplies through the more remote and less developed Arkhangelsk line.\n\nIn the aftermath of the victory, Finland has established the \"Military Administration in Eastern Karelia\" to govern the occupied territories beyond the 1939 border. Officially, the area remains under military rule, but Helsinki has openly declared its intention to annex East Karelia once the war is won. The city, known to Finns as \"Petroskoi\", will officially be renamed \"Äänislinna\" (Castle of Onega), a symbolic step reflecting its envisioned role within a Greater Finland."
 CaptureEvents_FIN.2.A: "Äänislinna kuuluu Suomelle!"
 CaptureEvents_FIN.2.B: "Our allies are routing the Bolsheviks!"
 CaptureEvents_FIN.2.C: "Merely a tactical retreat!"
 CaptureEvents_FIN.2.D: "But can they hold it?"

### France
 CaptureEvents_FRA.2.t: "Liberation of Paris"
 CaptureEvents_FRA.2.d: "[FROM.GetNewsIcon]After several long years of German occupation, the city of Paris has been liberated. Following a series of uprisings by the French Resistance and the rapid advance of Allied forces from the coast, German control over the French capital has finally collapsed.\n\nFierce street fighting erupted across the city as the FFI (Forces Françaises de l'Intérieur) clashed with retreating Wehrmacht and SS units. Barricades were raised in the narrow streets, and the tricolor flag once again flew from public buildings. The arrival of General Leclerc's 2nd Armored Division and elements of the Allied 4th Infantry Division sealed the city's fate, forcing the German garrison to retreat.\n\nCrowds of Parisians flooded the boulevards, cheering the liberators and embracing members of the Resistance. The bells of Notre-Dame rang out in celebration, echoing across a city that had endured years of hardship, fear, and repression. General [FFL.GetLeader] soon entered Paris, declaring that France had freed itself through its own courage and that the French Republic had never ceased to exist.\n\nThe liberation of Paris stands as both a triumph of national pride and a turning point in the liberation of Western Europe. Once again, the City of Light shines free."
 CaptureEvents_FRA.2.A: "Vive la France!"
 CaptureEvents_FRA.2.B: "A simple tactical retreat!"
 CaptureEvents_FRA.2.C: "Onwards, to Berlin!"
 CaptureEvents_FRA.2.D: "Who was in Paris?" # lmao

### LANDMARK EVENTS
# This category contains event relating to the construction of new landmarks on the map. A common denominator for the events is checking the landmarks game rule and zooming the player's camera onto the landmark depending on the setting.

### USA
 LandmarkEvents_USA.2.t: "Boulder Dam Begins Operation"
 LandmarkEvents_USA.2.d: "[FROM.GetNewsIcon]The mighty Boulder Dam, pride of American engineering, has officially begun producing electric power today, sending its first transmission of current to the Los Angeles power grid, some 266 miles away. Built across the Colorado River at the Nevada-Arizona border, the structure rises 726 feet and stretches 1,244 feet across Black Canyon.\n\nConstruction began in 1931 under the Hoover administration and was carried forward under [USA.GetLeader]. At its peak, the project employed more than 21,000 men, many of whom toiled through desert heat and treacherous conditions. The total cost of the dam is estimated at $49 million.\n\nThough originally named \"Hoover Dam\" by the Department of the Interior in 1930, the current administration reverted to the project's planning title, \"Boulder Dam,\" in 1933, which now stands as the official name in all federal documentation. No act of Congress has yet settled the naming dispute.\n\nThe dam's operations are expected to transform the Southwest, delivering power, irrigation, and flood control to a rapidly developing region."
 LandmarkEvents_USA.2.A: "A triumph of American labor and engineering."
 LandmarkEvents_USA.2.B: "The Yankees demonstrate their industrial resolve."
 LandmarkEvents_USA.4.t: "Golden Gate Bridge Opened for Public Use"
 LandmarkEvents_USA.4.d: "[FROM.GetNewsIcon]The Golden Gate, the strait formed by the San Francisco Headlands and the Marin Peninsula, has long served as San Francisco's international gateway. For the longest time, however, the only way into San Francisco was by ferry from Marin County across the Strait or by boat into the bay. This has hampered the city's development, prompting numerous proposals for a bridge across the Gate as soon as Americans arrived. However, the rapid currents, persistent fog, and depth of the Gate had previously prevented such an endeavour; at least until 1933, when a $27 million price tag was paid by a combination of public and private donations.\n\nAfter years of hard work, millions of dollars, and the deaths of 11 men, the world's longest suspension bridge has finally opened for business. The bridge's opening was a week-long event, with 200,000 people walking across it. Angelo Joseph Rossi, the Mayor of San Francisco, drove across the bridge the next day, passing through three \"barricades\", the last of which was made up of beauty queens who only allowed him to pass after he ceremonially handed the bridge over to the Highway District. To commemorate the event, a song and poem were written, and finally, the President pushed a button in Washington DC, opening the bridge to motor traffic. The following weeks were jam-packed with celebrations."
 LandmarkEvents_USA.4.A: "A powerful monument to American innovation."
 LandmarkEvents_USA.4.B: "Once more we get to congratulate the Yankees!"
 LandmarkEvents_USA.6.t: "\"The Pentagon\" Completed; New H.Q for U.S Department of War"
 LandmarkEvents_USA.6.d: "[FROM.GetNewsIcon]For decades, the United States Department of War has struggled with its offices scattered across Washington, D.C., complicating communication and coordination. With America's growing global responsibilities, the need for a centralized headquarters became urgent. Soon thereafter, ground was broken in Arlington, Virginia, just across the Potomac River, for a massive five-sided complex that would bring the entire Department of War under one roof.\n\nThe result is the Pentagon: a five-sided fortress of concrete and steel, covering 34 acres of ground and containing over 17 miles of corridors. It is so vast that it houses its own post office, barber shops, cafeterias, and everything needed for the 25,000 military and civilian employees who will now work within its walls. Even so, its unique design ensures that no two offices are more than a seven-minute walk apart.\n\nDespite material shortages, the project moved ahead at unprecedented speed. Now completed, the Pentagon is not only the largest office building in the world but also a powerful symbol of American military strength and organizational might.\n\nIts opening has been marked with modest but dignified ceremonies, befitting the gravity of the conflict the nation now faces. Officials hope that within these walls, America's war effort can be more effectively coordinated and ultimately brought to victory."
 LandmarkEvents_USA.6.A: "The heart of American military power begins to beat."
 LandmarkEvents_USA.8.t: "Work Ceases on Mount Rushmore"
 LandmarkEvents_USA.8.d: "[FROM.GetNewsIcon]After fourteen years of ambitious labor and artistic endeavor, work on the Mount Rushmore National Memorial has officially concluded today, marking the completion of one of the most monumental projects in American history. Situated in the Black Hills of South Dakota, the colossal granite faces of Presidents George Washington, Thomas Jefferson, Theodore Roosevelt, and Abraham Lincoln now permanently grace the mountainside, each sculpted with painstaking precision by Gutzon Borglum and his team of workers.\n\nConstruction began in 1927 under Borglum's guidance and continued through economic hardships and the challenges of carving massive figures from solid rock. Thousands of tons of stone were removed using dynamite and hand tools, while dozens of workers risked life and limb to realize the vision of honoring America's founding principles and national achievements.\n\nAlthough the project did not include all the initially planned features - most notably, Borglum's proposed Hall of Records remains unfinished - the memorial stands as an enduring testament to American ingenuity, perseverance, and artistic ambition. The site is expected to become a major draw for domestic and international visitors, celebrating the nation's history and inspiring future generations."
 LandmarkEvents_USA.8.A: "We are proud to honor those who built this great nation."
 LandmarkEvents_USA.8.B: "The Yankees sure do love their Presidents!"

### USSR / Russia
 LandmarkEvents_SOV.1.t: "The Palace of the Soviets"
 LandmarkEvents_SOV.1.d: "[FROM.GetNewsIcon]The Palace of the Soviets has finally opened its doors in the Soviet capital. Towering into the Moscow skyline at an astonishing 415 meters, and crowned by a gleaming statue of Lenin extending a hand toward the future, the structure now dominates the urban and political landscape of the USSR.\n\nErected on the historic site of the demolished Cathedral of Christ the Saviour, the Palace now serves as both the seat of the Supreme Soviet and a sacred shrine to the doctrine of Marxism-Leninism. The central assembly hall seats over 20,000 delegates, while the building itself contains sprawling marble corridors, bronze friezes of revolutionary martyrs, red granite pillars, and domed galleries illuminated by massive Soviet star chandeliers.\n\nThe final structure is the product of immense planning, propaganda, and effort. Thousands of workers and engineers from across the Union were mobilized; steel from the Urals, stone from Armenia, and glass from Leningrad were brought together under the guidance of architect Boris Iofan.\n\nAt the dedication ceremony, [SOV.GetLeader] addressed a handpicked crowd, declaring: \"This palace is not a monument to a man, but to an idea—the inevitable victory of socialism over imperialism.\" The ceremony featured military bands, mass parades, and a thunderous flyover of Soviet aircraft."
 LandmarkEvents_SOV.1.A: "Before us stands the future, built by the worker's hand."
 LandmarkEvents_SOV.1.B: "A colossus rises in the East."

### VOLCANO EVENTS
# This category contains event relating to the construction of new landmarks on the map. A common denominator for the events is checking the landmarks game rule and zooming the player's camera onto the landmark depending on the setting.
 VolcanoEvents.2.t: "Mount Vesuvius Erupts"
 VolcanoEvents.2.d: "[FROM.GetNewsIcon]Mount Vesuvius has erupted in a spectacular and destructive fashion, sending towering columns of smoke and ash into the sky and spilling lava across the countryside. It is the volcano's most powerful outburst since 1906 and has caused widespread disruption across the Campania region.\n\nVillages including San Sebastiano, Massa di Somma, and Ottaviano lie buried in ash, their residents forced to flee through choking air and falling debris. Roads and railways have been rendered impassable, and crops across the lower slopes have been scorched or smothered. Roofs have collapsed under the weight of ashfall, and several injuries have been reported.\n\nThe eruption has cast a long shadow over Napoli, where black ash drifts on windowsills and residents watch the glowing summit with unease. The scene has drawn somber comparisons to the ancient catastrophe of A.D. 79, when Vesuvius buried Pompeii and Herculaneum under ash and stone.\n\nRelief efforts are underway, but the full toll of the eruption remains uncertain."
 VolcanoEvents.2.A: "The burden of recovery now falls on our shoulders."
 VolcanoEvents.2.B: "The world extends its sympathy to the people of Campania."

### ATROCITY EVENTS
# This category contains global news events concerning atrocities and other equivalent events resulting in mass casualties or human catastrophe. We carefully adhere to Paradox policy by in NO case allowing you to execute one of these through a button, direct choice or game mechanic. They will exclusively happen on their own as a consequence of various events that take place and the state of the world.
# We aim only to inform, educate and provide contrast to the "gamified" depiction of brutal regimes, military conflicts & events seen in vanilla and other mods. Darkest Hour condemns every event in this category as well as anyone responsible.

AtrocityEvents.1.t: "The Bengal Famine"
AtrocityEvents.1.d: "[FROM.GetNewsIcon]Tragedy has struck India, with the Bengal area experiencing its worst famine on record. The death toll is only mounting, with millions already dead.\n\nFamines are typically caused by wars and a lack of food supply, but Bengul's famine was caused by a combination of factors. For decades, Bengal's railroads and supply lines have been neglected, and several recent natural disasters, such as the Midnapore Cyclone, have destroyed critical infrastructure. It exacerbated the Japanese invasion of the East, weak harvests, skyrocketing food costs, and an unstable market.\n\nFood hoarding quickly became prevalent, and a food black market developed as a result of the dwindling supply. The British government's reaction to the problem has been controversial. Propaganda claiming there was no famine merely increased hoarding, and promised imports have not arrived.\n\nThe consequences have been disastrous. Millions of people have died as a result of malnutrition and disease, societal order has been disrupted, millions are homeless, and relief is predicted to be slow. However, because there was no single cause of the famine, it's difficult to estimate how much of it could have been avoided."
AtrocityEvents.1.A: "How could we let this happen?"
AtrocityEvents.1.B: "Truly awful."

AtrocityEvents.3.t: "Massacre Unearthed in Katyn Forest"
AtrocityEvents.3.d: "[FROM.GetNewsIcon]German forces advancing near Smolensk have uncovered a series of mass graves in the Katyn Forest, revealing the remains of up to 22,000 Polish military officers, police, and intellectuals. Independent forensic investigators estimate the executions occurred during Soviet control of the region.\n\nThe victims had been taken prisoner following the Soviet invasion of eastern Poland and were believed to be held in NKVD camps such as Kozelsk and Starobelsk. Personal documents and artifacts recovered at the site have confirmed their identities.\n\nArmy Group Center has invited neutral international observers, including Red Cross representatives, to inspect the site, pointing to the Soviet NKVD as responsible. In response, Soviet representatives have denied all responsibility, instead accusing the Germans of fabricating the atrocity.\n\nDespite Soviet denials, mounting forensic and documentary evidence strongly implicates the NKVD. The discovery has sent shockwaves through the Polish government-in-exile and strained Allied relations."
AtrocityEvents.3.A: "Lies!"
AtrocityEvents.3.B: "How dare they?"
AtrocityEvents.3.C: "A chilling sight."

AtrocityEvents.5.t: "Mass Graves Discovered at Babi Yar"
AtrocityEvents.5.d: "[FROM.GetNewsIcon]Soviet troops retaking Kiev report the uncovering of mass graves at the Babi Yar ravine, where thousands of civilians and prisoners are believed to have been executed during the early German occupation. Witnesses describe rows of shallow pits filled with human remains, with personal belongings such as coats, shoes, and papers scattered among the dead. Early identification efforts suggest the victims include Jewish residents, Roma, and captured Soviet soldiers.\n\nInvestigators note that the killings appear to have been carried out rapidly and systematically. Soviet authorities reported the discovery but did not invite international observers to independently verify the findings. German authorities have issued no comment, and some local collaborators are reported to have assisted in the executions.\n\nThe revelation has underscored the scale of atrocities committed by the Nazi regime, and some expect additional sites and evidence of further killings to be uncovered as investigations continue."
AtrocityEvents.5.A: "Propaganda!"
AtrocityEvents.5.B: "Our city… our people!"
AtrocityEvents.5.C: "Barbaric!"

AtrocityEvents.6.t: "Unprecedented Atrocities Reported in Nanjing"
AtrocityEvents.6.d: "[FROM.GetNewsIcon]Foreign witnesses in Nanjing have reported widespread atrocities committed by Japanese forces following the city's fall. Missionaries, journalists, and members of the International Committee for the Nanjing Safety Zone describe mass executions of Chinese civilians and prisoners of war, alongside looting, arson, and what they describe as a wave of mass assaults on women that has led some to call it the \"rape of Nanjing.\". Estimates of the dead range from tens of thousands to as high as 200,000.\n\nSurvivors recount entire districts reduced to ruin, with families torn apart and thousands of civilians marched to execution sites along the Yangtze River. Appeals for international recognition and relief have been issued by neutral observers, who warn that the scale of suffering has few precedents in modern warfare.\n\nJapanese authorities deny the charges and insist that order has been restored, but testimony from neutral witnesses continues to circulate abroad, provoking outrage and condemnation of what many fear is one of the darkest episodes of the conflict in China."
AtrocityEvents.6.A: "What are they doing to our people?!"
AtrocityEvents.6.B: "Baseless slander!"
AtrocityEvents.6.C: "Extremely disturbing!"

AtrocityEvents.7.t: "Nationalists Breach the Yellow River Dikes; Flood Unleashed"
AtrocityEvents.7.d: "[FROM.GetNewsIcon]Today, in a desperate attempt to halt the relentless advance of the Japanese Imperial Army, Chinese Nationalist forces deliberately destroyed the dikes of the Yellow River near Huayuankou in Henan. The river, long known as \"China's Sorrow,\" has been turned into a weapon of war.\n\nThe floodwaters surged across the North China Plain, inundating vast stretches of Henan and Anhui provinces. While the rising waters have already swallowed villages, farmland, and railways, the breach is intended to deny the Japanese their main invasion routes southward and buy the Nationalist government precious time to regroup.\n\nThe cost, however, is staggering. Tens of thousands have drowned in the first days, with hundreds of thousands more displaced and left without food or shelter. Refugees clog the countryside as relief efforts struggle to meet the scale of the disaster.\n\nWhether this act succeeds in blunting Japan's momentum remains uncertain, but the Nationalists have demonstrated their willingness to sacrifice their own heartland to keep the enemy at bay. What was once the lifeline of North China is now a weapon of last resort, with consequences that will scar the region for generations."
AtrocityEvents.7.A: "It had to be done."
AtrocityEvents.7.B: "Fools! We will cross their floodlands!"
AtrocityEvents.7.C: "But.. their own people?"

AtrocityEvents.10.t: "Unspeakable Genocide Uncovered at Auschwitz"
AtrocityEvents.10.d: "[FROM.GetNewsIcon][FROM.GetAdjective] troops, advancing through eastern Silesia, have liberated a vast German camp near the town of Oświęcim, known in German as Auschwitz. What they found has shaken even the most hardened soldiers.\n\nBehind barbed wire and guard towers lay thousands of emaciated survivors, barely clinging to life amidst scenes of death and despair. Abandoned barracks are filled with corpses, and evidence points to atrocities on a scale previously unimaginable. Vast crematoria, gas chambers, and stockpiles of personal belongings reveal that Auschwitz was not merely a prison, but an extermination center designed for the systematic annihilation of entire peoples. Over 1.1 million men, women, and children were murdered here, most of them Jews, along with Poles, Romanis, prisoners of war, and many others.\n\nUntil now, rumors of German atrocities had been dismissed by some as exaggerated wartime propaganda. The horrific reality now uncovered makes it clear: the Nazi regime carried out a deliberate, industrialized campaign of genocide. Across occupied Europe, at least six million Jews, hundreds of thousands of Romani, millions of POWs, Poles, disabled persons, and others were systematically exterminated in death camps, ghettos, and through mass shootings."
AtrocityEvents.10.A: "Fabrications!"
AtrocityEvents.10.B: "We're... not sure what to believe anymore!"
AtrocityEvents.10.C: "The world must never forgive these monsters!"

AtrocityEvents.11.t: "Mass Murder of Civilians Revealed in Manila"
AtrocityEvents.11.d: "[FROM.GetNewsIcon]Reports have emerged detailing the widespread atrocities committed by Japanese forces during their final weeks of occupation in Manila. Eyewitnesses, including liberated civilians, Allied military observers, and local officials, describe systematic killings, executions, and indiscriminate attacks on non-combatants carried out under the direct orders of Admiral Sanji Iwabuchi, who commanded his troops to resist to the last man and destroy the city rather than surrender.\n\nEntire neighborhoods were reduced to rubble, with families torn apart and civilians forced into mass executions. Preliminary estimates suggest that over 100,000 men, women, and children perished during the fighting, making the Manila massacre one of the deadliest urban atrocities of the Pacific War. Hospitals, schools, and historic districts were deliberately destroyed, leaving survivors to face widespread devastation and trauma.\n\nAllied authorities and local leaders are calling for urgent relief and documenting evidence, with outrage and condemnation erupting from the international community. International prosecutors are requesting the immediate arrest and trial of General Tomoyuki Yamashita, supreme commander of all Japanese forces in the Philippines, accusing him of directly enabling the massacre."
AtrocityEvents.11.A: "Those MONSTERS!"
AtrocityEvents.11.B: "They have no right to lecture Nippon!"
AtrocityEvents.11.C: "We have no words."

AtrocityEvents.13.t: "Kristallnacht"
AtrocityEvents.13.d: "[FROM.GetNewsIcon]Last night, coordinated attacks targeted Jewish homes, businesses, and synagogues across Germany. The assaults were carried out by SA paramilitaries and civilians aligned with the Nazi Party, reportedly in retaliation for the assassination of German diplomat Ernst Eduard vom Rath in Paris by Herschel Grynszpan, a Polish-Jewish exile.\n\nAccording to reports, nearly a hundred Jewish people were killed, and thousands were arrested, with many sent to detention camps. Shops were looted, synagogues were set on fire, and streets were littered with broken glass, giving the night its name, Kristallnacht, or \"Night of the Broken Glass.\" Fire brigades generally limited their efforts to preventing the spread of flames rather than extinguishing them entirely. Some citizens reportedly assisted Jewish neighbors in salvaging possessions, though many bystanders watched the destruction without intervening.\n\nThe violence spanned multiple cities, leaving significant damage to homes, businesses, and places of worship. Residents across Germany and Austria reported widespread fear and confusion in the aftermath. While previous government policies had imposed social and legal restrictions on Jewish communities, last night marked a shift toward large-scale, organized attacks."
AtrocityEvents.13.A: "Regrettable."
AtrocityEvents.13.B: "Germany has left the community of civilized nations."

AtrocityEvents.14.t: "Mass Expulsions of Germans from Eastern Europe"
AtrocityEvents.14.d: "[FROM.GetNewsIcon]Reports continue to emerge of the forced removal of ethnic Germans across Eastern Europe. In the wake of shifting postwar borders, governments in Czechoslovakia, Poland, Hungary, Romania, Yugoslavia, and the Soviet Union have begun large-scale expulsions of German populations from territories now under their control.\n\nThe process has often been accompanied by violence, property confiscation, and harsh conditions during transport. In the Sudetenland, Silesia, Pomerania, and East Prussia, civilians have been subjected to armed escorts, forced marches, and loss of homes and possessions. Hungarian and Romanian authorities have deported Volksdeutsche to labor camps or relocated them westward. In Yugoslavia, Danube Swabians have faced internment and reprisal attacks, while Soviet-controlled areas have seen mass deportations to interior labor camps.\n\nLocal authorities are citing the need to prevent a repeat of the prewar situation in which Nazi Germany demanded the return of territories with German majorities. Humanitarian reports, however, warn of civilian deaths, starvation, and exposure along crowded and poorly provisioned routes. Early estimates suggest that millions of Germans may be displaced from Central and Eastern Europe. The long-term fate of these communities remains uncertain as new borders solidify."
AtrocityEvents.14.A: "The world can't afford another \"Heim ins Reich\"."